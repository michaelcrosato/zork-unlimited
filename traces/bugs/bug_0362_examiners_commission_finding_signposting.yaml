id: bug_0362
title: Examiner's Commission exposes the finding table before evidence and spoils the trial chain
severity: content
status: fixed
root_cause: >
  A fresh MCP blind playtest found that the commission finding table was
  available from the opening turn, letting a hasty player issue a zero-evidence
  finding without warning. The same report found that the criminal-trial action
  label enumerated every required evidence category, turning the final choice
  into a checklist spoiler rather than a finding earned from the record.
fix: >
  Gate the finding table until the examiner has at least one evidence note,
  add reactive finding-table prose for fragmentary, provisional, material, and
  complete records, signpost the correspondence task from the registry, and
  replace the full-trial checklist label with a non-spoiler finding label.
files_changed:
  - content/cyoa/pack/examiners_commission.yaml
regression_test:
  - tests/regression/examiners_commission_blind_polish.test.ts
