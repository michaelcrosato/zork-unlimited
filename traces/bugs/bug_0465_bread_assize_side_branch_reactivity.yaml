id: bug_0465_bread_assize_side_branch_reactivity
title: "Bread Assize retires exhausted side branches and resolves stale side-room prose"
pack: content/cyoa/pack/bread_assize.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T205753Z_bread_assize_seed7.md
severity: S1
symptom: >
  A blind playtest found that Bread Assize side rooms kept their pre-investigation
  uncertainty after their evidence was gathered, and the Market Hall continued
  offering completed side branches even though no useful actions remained there.
  This made revisits feel anticlimactic and made the investigation look less
  responsive than its evidence model really is.
root_cause: >
  The factor-book and parish-queue scenes had one-shot evidence choices but no
  reactive post-evidence variants. The Market Hall also exposed all three side
  branch links unconditionally, so fully exhausted locations stayed on the menu.
fix: >
  Add resolved-state variants for the factor ledger and parish queue, and guard
  the Market Hall side-branch actions so they retire once their local evidence is
  complete. Verdict gates, score awards, endings, and skill-check behavior are
  unchanged.
tests:
  - tests/regression/bread_assize_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/bread_assize_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/bread_assize.yaml
  - npm run health
