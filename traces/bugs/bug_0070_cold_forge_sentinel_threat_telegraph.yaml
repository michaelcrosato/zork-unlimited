bug_id: bug_0070
pack_id: cold_forge_v1
seed: 47                          # this cycle's rotated blind-playtest seed
type: content_fix                 # one base-prose addition to bellows_walk — no engine/validator/stat/DC/flag/exit/combat/score/ending change
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T18-45-23-078Z/playtest.md
  rotated_finding_from: ai-runs/2026-06-01T18-45-23-078Z/playtest.md (cold_forge blind subagent, seed 47)
  rotated_result: >
    ROTATED the actual improvement off the assessor's rank-1 clockwork_heist, which has had ~21
    independent clean blind passes and whose deadline/legibility arc the last cycles judged complete
    and to be DEPRIORITIZED. Per blind_playtest_protocol.md's "rotate the seed and rotate the pack"
    and the standing next-focus note (rotate onto the RPG packs sunken_barrow/cold_forge), I blind-
    playtested The Cold Forge (RPG), seed 47 — it had had no blind pass this round and carries a
    standing enjoyment-3/5 note. Fresh general-purpose subagent, MCP-only, no source access. Result:
    WON ending_victory 50/50 across two runs (an informed run and a reckless-then-recovered run);
    clarity 5/5, enjoyment 3/5 (brevity/linearity, as standing-noted); zero rejected actions, no
    loops, no soft-locks; verified killing-blow skips the counter, enemy/player HP persist across
    room transitions, dropping the bar removes the gated USE + the down exit, dialogue topics are
    one-shot, the buff does not stack, RNG is seed-deterministic.
  finding: >
    cold_forge report §4/§5 (finding #1, reproduced across both runs): the lantern-spirit's +2-attack
    counsel is framed as optional lore-flavor ("take what warmth I can spare"), yet at base attack 4
    the slag-sentinel fight is a hard, even trade (both sides deal d6 + attack - defense = d6+2 = 3-8
    per round; player strikes first, 20 HP vs the sentinel's 16) that an unlucky base-stats player
    LOSES. A sensible player who reads the inscription, takes the bar, and charges in (a fair read of
    a "slow / stiff / weak from cold" sentinel) gets NO pre-fight signal that this is a fight worth
    preparing for, and there is no heal. The bellows_walk room — seen by exactly this at-risk,
    skip-the-NPC player — only REASSURES (bug_0029's "slow and stiff", "no swifter than it is now"),
    so it reads as an easy kill. The danger is by design (cold_forge_pack.test.ts: "combat with REAL
    TEETH", death ending reachable from base stats), so the missing piece is the honest CUE, not the
    threat.
root_cause: >
  bug_0029 correctly reframed the bellows_walk prose to kill a false warm-up clock, but in doing so
  left the room with only reassuring, settled-cold framing. Nothing in the prose a base-stats player
  reads before the fight conveys that the sentinel — slow though it is — still trades heavy blows and
  is worth meeting prepared, so the lantern-spirit's offered warmth reads as throwaway flavor and the
  reckless player walks into an under-armed, unhealed fight.
improvement:
  layer: content
  content:
    - content/rpg/pack/cold_forge.yaml: >
        Appended an honest threat-and-preparation beat to the bellows_walk base description, AFTER
        the preserved bug_0029 settled-cold lines: "Slow is not the same as soft, though: it is a
        man-high weight of fused slag, and the blows it does land fall like a dropped anvil. Better
        not to meet it under-armed — face it with every edge you can bring to bear." This nudges the
        player back toward the lantern-spirit's offered warmth WITHOUT naming a required item or
        claiming the buff is mandatory (the fight is provably winnable from base stats, so a hard
        requirement would be a lie). No stat/attack/defense/DC/flag/exit/combat/score/ending change;
        the +2 buff stays optional and one-shot, the fight stays the identical static 16-HP encounter
        the bug_0021 proofs require, and the canonical buffed route still wins 50/50.
