bug_id: bug_0091
pack_id: null   # engine/validator soundness guard; not specific to one pack
seed: 23
evidence:
  source: blind_playtest + validator_audit
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T23-49-45-026Z/playtest.md
  finding: >
    This cycle's mandated blind playtest ran on the assessor's rank-1 clockwork_heist (seed 23,
    fresh general-purpose MCP-only subagent, no source access). It reached all four endings (Truth
    ×2 prose variants, Rich, Caught), found ZERO functional bugs, and rated the pack clarity 5/5 /
    enjoyment 4/5. Its two notes — "the deadline feels cosmetic" and "the ledger gate is cosmetic" —
    are NOT defects: the deadline DOES fire at ticks>=10 (verified across prior cycles), tuned
    GENEROUS on purpose, and the patrol gate IS real (ticks>=4 AND not read_ledger -> ending_patrol);
    the tester simply played efficiently / crossed before the hour (ticks 2) and never tripped them.
    Same perennial perception the bug_0061..0084 reactive-prose arc already answered. With the blind
    target proven clean and the standing memory recording the content-polish backlog exhausted, I
    pursued last cycle's (bug_0090) queued next-focus #1 verbatim: "the symmetric parser/RPG check
    still open — a win_condition that is INTERNALLY CONTRADICTORY (unsatisfiable...) ... Audit + port
    isUnsatisfiable/whenProfile to the parser validator." Auditing it surfaced a LARGER adjacent gap:
    parser rooms and objects carry reactive `variants` with the EXACT first-match-wins semantics the
    CYOA validator guards (bug_0085/0086), but the parser validator checked NEITHER their ordering nor
    their satisfiability — and exit/interaction conditions (the analogue of CYOA choice conditions)
    were never checked for internal contradiction either.
failure:
  type: validator_missing_check_dead_content
  where:
    - engine:src/validate/parser_validator.ts
    - engine:src/validate/rpg_validator.ts   # delegates to validateParser, so inherits the checks
  description: >
    Parser room (RoomVariantSchema) and object (ObjectVariantSchema) `variants` are evaluated
    first-match-wins (src/parser/model.ts roomDescription / objectDescription return the first variant
    whose `when` holds, else the base description) — byte-identical semantics to CYOA scene/ending
    variants (src/cyoa/runner.ts). So the two soundness failures the CYOA validator already flags apply
    verbatim: (1) a LATER variant whose `when` is ENTAILED by an EARLIER sibling's can never be the
    first match — dead prose no playthrough surfaces (CYOA UNREACHABLE_VARIANT, bug_0085); and (2) a
    variant `when` that is INTERNALLY CONTRADICTORY (a flag/item/visited pinned both ways, or crossed
    var bounds) can never hold at all — the variant never displays (CYOA UNSATISFIABLE_CONDITION,
    bug_0086). The parser validator had NO notion of variant ordering or satisfiability. The same
    contradiction check was also absent on exit/interaction `conditions` (the parser analogue of CYOA
    choice conditions) and on `win_conditions` — the parser/RPG analogue of meta.deadline, whose
    DEADLINE_UNFIREABLE-by-contradiction case (bug_0087) was likewise unguarded. An unsatisfiable
    win_condition is additionally a latent soft-lock unsoundness: its `visited` room is still added to
    `winRooms` as a real escape target, so a never-firing win could mask a true SOFTLOCK (the exact
    pollution bug_0087 cited for CYOA). All of this is silently-dead content a blind playtest cannot
    see — it simply never appears — so only a validator can own it. The shipped reactive packs avoid
    shadowing only by hand-ordering, which is precisely the kind of invariant a validator should enforce.
fix:
  layer: validator
  summary: >
    Port the CYOA validator's WhenProfile / whenProfile / entails / isUnsatisfiable /
    checkVariantShadowing / checkUnsatisfiable machinery into parser_validator.ts (following the repo
    precedent that each validator carries its own copy — see the existing "mirrors the CYOA validator's
    deadline machinery" collectFalsifiers). Apply, in validateParser (so RPG inherits it via delegation):
    checkVariantShadowing over every room.variants and object.variants (WARNING UNREACHABLE_VARIANT when
    a later variant is entailed by an earlier sibling); and checkUnsatisfiable over every room/object
    variant `when`, every exit `conditions`, every interaction `conditions`, and every win_condition
    `conditions` (WARNING UNSATISFIABLE_CONDITION when the conjunction is internally contradictory).
    Severity WARNING matches the CYOA siblings (the game still runs; the content is just dead). No schema,
    runner, or content change — the helpers are pure and additive; absent `variants` fields are untouched.
  reachable_endings_changed: false
  content_hash_changed: false        # no content pack edited
  regression_test: tests/regression/parser_variant_shadowing.test.ts
  unit_tests:
    - tests/unit/parser_validator.test.ts   # new WARNING_FIXTURES rows: parser_unreachable_variant -> UNREACHABLE_VARIANT, parser_unsatisfiable_condition -> UNSATISFIABLE_CONDITION
  fixtures:
    - content/broken-fixtures/parser_unreachable_variant.yaml
    - content/broken-fixtures/parser_unsatisfiable_condition.yaml
verified_live: >
    Bug-first: a parser pack with a room variant ordered general-before-specific (has_flag a before
    has_flag a+b, or var ticks>=2 before ticks>=5), a flag-superset shadow, a duplicate `when`, and a
    shadowed OBJECT variant all yield UNREACHABLE_VARIANT; a variant `when` pinning a flag both ways, an
    exit condition with crossed var bounds (lvl>=5 AND lvl<=3), and an internally-contradictory
    win_condition all yield UNSATISFIABLE_CONDITION. Soundness / no-false-positive: correctly-ordered
    (specific-first) variants, incomparable (distinct-flag) variants, and an any_of (opaque) earlier
    sibling are NOT flagged. The shipped parser packs (sealed_crypt, alchemists_tower via validateParser)
    and RPG packs (cold_forge, sunken_barrow via validateRpg, which delegates) produce ZERO
    UNREACHABLE_VARIANT / UNSATISFIABLE_CONDITION findings and stay green. `npm run health` exit 0; 646
    tests pass (120 files), up from 635; no content pack edited, all content hashes unchanged.
note: >
    Soundness over coverage, same stance as bug_0085/0086/0087/0089/0090: every proof is over a pure
    conjunction of literals/var-bounds; any any_of/none_of makes a `when` opaque so it never drives a
    shadowing finding and (for the contradiction check) can only further-constrain, never rescue, an
    already-false conjunction. It detects fewer cases, never wrong ones. This closes the parser/RPG half
    of the reactive-variant + guard-satisfiability audit: bug_0085/0086 made the CYOA reactive machinery
    sound; this ports both checks to parser room/object variants and extends the unsatisfiable-guard check
    to exit/interaction conditions and win_conditions (the meta.deadline analogue), so every reactive and
    gating surface in every mode is now ordering- and satisfiability-checked.
