id: bug_0345
pack: ropewalkers_twist_v1
title: "office and rope shed still placed taken inspection items at starting positions"
severity: minor
scene: rope_office / rope_shed
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the inspector's token in the rope office, LOOK still said the
  quay contract lay beside the token on the desk. After taking the twist gauge
  or marking knife in the rope shed, LOOK still said the gauge hung on its nail
  and the knife lay on its block. Dropping those items later could also let the
  rooms fall back to their original starting-position prose.

root_cause: >
  The affected rooms had static base descriptions, and the three takeable items
  did not leave durable pickup state that room prose could read. Inventory alone
  was not enough because a player can drop the item after taking it.

fix: >
  Taking the inspector's token now sets `inspector_token_taken`, taking the twist
  gauge sets `twist_gauge_taken`, and taking the marking knife sets
  `marking_knife_taken`. The rope office and rope shed have ordered variants
  keyed to those flags, so the desk, nail, and block stay empty after the first
  pickup even if the player later drops the items. Score, exits, endings, and
  win conditions are unchanged.

tests: tests/regression/ropewalkers_twist_reactive_taken_items.test.ts
