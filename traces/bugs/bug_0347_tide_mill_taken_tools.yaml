id: bug_0347
pack: tide_mill_v1
title: "wheel-room and tool-shed still placed taken tools at starting positions"
severity: minor
scene: wheel_room / tool_shed
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the crank-handle in the wheel-room, LOOK could still say the
  handle hung on its peg, including in the single-fault wheel-room variants.
  After taking the billhook or crow-bar in the tool-shed, LOOK still said the
  billhook leaned in the corner or the crow-bar hung on its nails. Dropping those
  tools after taking them could also let the rooms fall back to their original
  starting-position prose.

root_cause: >
  The affected rooms either had static base descriptions or puzzle-state
  variants that did not account for the portable tools leaving their starting
  positions. The tools did not leave durable pickup flags that room prose could
  read, and inventory alone was not enough because the player can drop tools.

fix: >
  Taking the crank-handle now sets `crank_handle_taken`, taking the billhook sets
  `billhook_taken`, and taking the crow-bar sets `crow_bar_taken`. The
  wheel-room has ordered variants that keep the crank-handle peg empty in base
  and single-fault states, and the tool-shed has billhook-only, crow-bar-only,
  and both-taken variants. Score, exits, endings, and win conditions are
  unchanged.

tests: tests/regression/tide_mill_reactive_taken_items.test.ts
