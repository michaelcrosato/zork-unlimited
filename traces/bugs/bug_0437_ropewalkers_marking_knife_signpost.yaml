id: bug_0437
title: Ropewalker's Twist hid the marking-knife evidence path and overstated missing proof
pack: content/parser/pack/ropewalkers_twist.yaml
reported_by: blind_playtest_20260622T100839Z_ropewalkers_twist_seed7
severity: medium
symptom: >
  A fresh blind player finished the main route at 30/40 and concluded the
  marking knife was dead inventory. The knife interactions existed, but the
  contract and room prose did not make the part-hemp / notch-cable evidence path
  hard enough to see. The registered ending also claimed a notched cable span
  even on the route where the cable was never notched.
root_cause: >
  The optional knife findings were implemented as valid USE interactions, but
  their discoverability depended on taking the knife and inspecting the right
  objects. The ending text assumed the full-proof route rather than reacting to
  which knife evidence flags were actually set.
fix: >
  Strengthened in-world signposting in the contract, office, rope shed, hemp,
  knife, and measured-cable prose. Added reactive registered-ending variants for
  missing green-hemp and/or cable-notch proof so the 30/40 and 35/40 routes
  remain truthful and tell the player what evidence was thinner.
tests:
  - tests/regression/ropewalkers_twist_marking_knife_signpost.test.ts
verification:
  - npm test -- --run tests/regression/ropewalkers_twist_marking_knife_signpost.test.ts tests/regression/ropewalkers_twist_reactive_taken_items.test.ts
  - npm run validate -- content/parser/pack/ropewalkers_twist.yaml
