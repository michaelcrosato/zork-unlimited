id: bug_0454_collectors_warrant_noisy_route_signposting
title: "Collector's Warrant noisy route is explicitly signposted"
pack: content/parser/pack/collectors_warrant.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T183855Z_collectors_warrant_seed7.md
severity: S2
symptom: >
  A blind player concluded the crowbar and tidal ford were false affordances, even
  though the noisy forced-door route and hatch escape were implemented and
  reachable. The same run also flagged that taking the warrant awards maximum
  score before the player has actually escaped.
root_cause: >
  The locked-door hint described "something heavier and louder" without naming the
  visible crowbar, crowbar pickup gave only generic take text, and taking the
  warrant did not tell the player that the remaining objective was to leave by the
  front passage or, after waking the clerk, by the coal-hatch rope.
fix: >
  Named the crowbar in the locked-door hint, added crowbar pickup feedback that
  points at the forced-door command, added crisis-room prose that points warrant
  carriers at the hatch route, and added post-warrant narration that directs both
  quiet and noisy players toward the appropriate exit.
tests:
  - tests/regression/collectors_warrant_noisy_route_signposting.test.ts
verification:
  - npm test -- --run tests/regression/collectors_warrant_noisy_route_signposting.test.ts tests/regression/collectors_warrant_key_inside_measure.test.ts
  - npm run validate -- content/parser/pack/collectors_warrant.yaml
  - npm run health
