id: bug_0329
title: "white_stag: tarn post-knows_truth variant implies stone still visitable"
pack: content/cyoa/pack/white_stag.yaml
detected_by: blind_playtest_2026-06-08T16-30-09-430Z
severity: minor

description: >
  After reading the leaning stone (decipher sets knows_truth), returning to the
  tarn rendered the knows_truth variant, whose final sentence read:
  "A firmer way runs round the shore to a bluff within bowshot, and the leaning
  stone keeps its old vow at the bank."
  The phrase "the leaning stone keeps its old vow at the bank" implies the stone
  is still present and visitable. But read_stone is gated on not_flag: knows_truth,
  so the action is absent from the tarn once knows_truth is set. The prose
  overpromised an unavailable action — the only text/action mismatch in the pack.

reproduction:
  - go_on           # tarn — base text, stone present and available
  - read_stone      # shrine
  - decipher        # sets knows_truth; shrine re-renders
  - leave_stone     # back to tarn: knows_truth variant fires, stale closing shown
  # tarn text ends with "keeps its old vow at the bank"
  # but read_stone is absent from available_actions (gated on not_flag: knows_truth)

fix:
  type: content
  change: >
    Changed the closing of the knows_truth tarn variant from:
      "bowshot, and the leaning stone keeps its old vow at the bank."
    to:
      "bowshot. You have read the stone; its vow is in you now."
    Prose-only change; no flag, choice, route, or ending change.
  files_changed:
    - content/cyoa/pack/white_stag.yaml

regression_test: tests/regression/white_stag_tarn_stone_reactive.test.ts
