id: bug_0332
title: "assessor: TARGET_PER_MODE threshold too low — content_new permanently silenced"
pack: null
class: assessor-structural
severity: structural
found_by: ultraplan_cycle_20
playtest_report: null

symptom: >
  TARGET_PER_MODE = {cyoa:2, parser:2, rpg:2} while actual pack counts are
  cyoa=7, parser=5, rpg=5. The gate at assessor.ts line 566 (`if (have < target)`)
  never fires, producing zero content_new candidates. Every cycle at the 0.5 floor
  is a blind-pass content_fix stub. The loop has been saturated for 50 consecutive
  cycles (bugs 0282-0331).

root_cause: >
  The TARGET_PER_MODE deferral condition from ultraplan cycle #19 was "revisit after
  bug_0317 is locked." Bug_0317 (ITEM_UNPLACED validator) landed and was confirmed
  closed in DECISION_LOG.md. The deferral condition was satisfied but the constant
  was never raised.

fix: >
  Raised TARGET_PER_MODE to {cyoa:10, parser:8, rpg:8} at assessor.ts line 68.
  Produces content_new candidates scored at ~1.417, immediately above the 0.5
  saturation floor, redirecting subsequent cycles to net-new pack authoring.

regression_test: null
