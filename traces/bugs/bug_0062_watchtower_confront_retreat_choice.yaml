bug_id: bug_0062
pack_id: watchtower_road_v1
seed: 7
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T17-13-32-290Z/playtest.md
  finding: >
    The mandated target this cycle, The Clockwork Heist (cyoa, seed 41), passed its
    ~16th independent blind pass clean (all endings, clarity 5/5, enjoyment 4/5, zero
    rejected actions/loops/soft-locks) with no actionable defect — consistent with the
    last ~15 passes. Per the protocol's "rotate the seed and rotate the pack" and the
    last several cycles' standing recommendation, a parallel fresh blind pass ran on
    The Watchtower Road (cyoa, seed 7), deliberately probing the rarely-reached
    ending_truth + hermit scenes the deterministic coverage bot reaches 0/15. That run
    reached all three endings (truth/escape/captured), rated clarity 4/5 enjoyment 4/5,
    and raised this as its #1 concrete finding (report §B.1): at confront_smuggler,
    "after the sergeant goes white reading the damning letter, the secondary option
    still reads 'Pocket the letter and slip away to find real proof first' — you
    already HAVE the proof at that point, so the wording directly contradicts current
    state."
failure:
  type: contradictory_choice_text_vs_state
  where:
    - content:content/cyoa/pack/watchtower_road.yaml#confront_smuggler
  description: >
    bug_0055 made the confront_smuggler scene TEXT reactive (a not_flag learned_truth
    variant) and gated the two forward choices (reveal_evidence has_flag learned_truth,
    press_bluff not_flag learned_truth) — but it left the third option, the retreat,
    unconditional: id back_off, "Pocket the letter and slip away to find real proof
    first." A player who corroborated the truth (cellar barrels/ledger or the hermit,
    learned_truth set) and presents the letter sees the sergeant read his own name —
    yet is still offered a retreat whose text says they must go find proof they already
    hold. The no-proof bluffer, by contrast, reads that same line true. One literal
    string cannot serve both states.
fix:
  layer: content
  summary: >
    Choice-text-only edit to confront_smuggler. The unconditional back_off is now gated
    not_flag learned_truth (so the "find real proof first" line shows only to the
    no-proof bluffer, for whom it is correct), and a sibling hold_off (has_flag
    learned_truth) gives the proof-bearer a coherent retreat: "Hold your tongue for now
    — pocket the letter and back away from the gate." Both choices route to road_north,
    exactly as the single choice did, so neither player is funnelled anywhere new and
    every ending (truth/escape/captured) remains reachable. Mirrors the existing
    reveal_evidence/press_bluff gated pair in the same scene. No flag/route/ending
    change; the only new id is hold_off, reachable whenever learned_truth is set.
  reachable_endings_changed: false  # still truth/escape/captured; all routes intact
  content_hash_changed: true        # watchtower_road edited; canonical pin lives in
                                    # traces/bugs/bug_0002 (a HASH_PIN_FILE), re-pinned
                                    # deliberately alongside this content change.
                                    # 3947f07bb7d8e898b6bf17ce2db6352652ae0171810a705937cea2c95bb428cd
                                    # -> 4c971d435f3271731bea8db64c2ac1dfa338f53c010de55d9a3ebd56cde96d31
  regression_test: tests/regression/watchtower_confront_retreat_choice.test.ts
verified_live: >
    Through the engine over the compiled pack, building observations the way the MCP
    server does (buildObservation). With-proof route (letter + cellar ledger) reaches
    confront_smuggler with learned_truth set; its options are [reveal_evidence,
    hold_off] (no back_off), hold_off's text omits "find real proof first" and reads
    "hold your tongue", and hold_off -> road_north -> slip_into_woods -> expose_the_plot
    still wins ending_truth. No-proof route (letter, no cellar/hermit) reaches it with
    learned_truth unset; its options are [press_bluff, back_off], back_off still reads
    "find real proof first", and press_bluff still ends ending_captured.
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the multi-step letter/proof routes (a
    standing heuristic-planner limit since bug_0008), so the blind LLM playtest remains
    the load-bearing quality signal here. This fix closes watchtower's #1 actionable
    finding from this cycle without touching its routes, flags, or endings; clockwork
    (the mandated target) is verified-clean at a ~16th blind pass.
