id: bug_0395
pack: powder_mill_surety_v1
title: "clean smother route used Rafe's broken-gate epilogue"
severity: medium
scene: mill_road
reported_by: blind_playtest_20260620T175417Z_powder_mill_surety_seed7

symptom: >
  A blind playtester completed the clean safety route by smothering the priming
  tray and never fighting Rafe, but the ending still said "Rafe's broken gate
  walk" proved the miller's obstruction. The same final action also jumped from
  the yard to the road without explaining why Rafe stopped blocking the northward
  exit.

root_cause: >
  Powder Mill Surety converged the safe ordnance route and the rough combat route
  onto one ending text. The safe route's smother action sent the player straight
  to the mill road, while the shared epilogue mentioned evidence that only exists
  after defeating Rafe.

fix: >
  The base mill-report ending now describes the safe smother route: priming
  buried under dry sand and Rafe left standing with no blast to hide behind. A
  reactive `rafe_defeated` ending variant keeps the broken-gate wording for the
  fight-past-Rafe route. The smother success narration also says Rafe lowers his
  hooked staff and lets the report go north, preserving spatial continuity.

tests: tests/regression/powder_mill_route_specific_ending.test.ts
