bug_id: bug_0221
pack_id: ALL   # cross-pack structural oracle (4 parser + 5 RPG packs, 13 death endings)
seed: 13       # this cycle's mandated blind playtest (cold_forge); the oracle itself is seedless (exhaustive)
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-04T01-31-27-731Z/playtest.md   # cold_forge, seed 13
  finding: >
    Rotated the mandated blind pass OFF the assessor's recency-blind rank-1
    (lamplighters_round, blind-played AND content+engine-edited last cycle bug_0220)
    per [[assessor-blind-pass-rotation]] onto the single most-overdue dedicated-blind
    target: cold_forge (RPG), which had not appeared in the recent blind-pass history
    (last dedicated pass bug_0199). A fresh source-blind MCP-only subagent reached
    ending_victory on a prepared (50/50) and an under-armed run, rated it clarity 5/5
    enjoyment 4/5, ZERO mechanical defects. Its standing §5 note was the recurring one:
    it won both runs, so it "never reached a death ending to confirm its text reads
    well." That is the same seam bug_0125 flagged on cold_forge and the barrow render
    test flagged on sunken_barrow — and it is unconfirmable from one blind run, on one
    pack, that happens to survive.
failure:
  type: not_a_defect_coverage_gap
  description: >
    The death-ending RENDER — what a player who actually reaches a death ending is
    SHOWN — was verified for only 2 of the 9 packs that have death endings:
      - cold_forge_death_ending_render.test.ts (bug_0125) and
        rpg_barrow_death_ending_render.test.ts are PER-PACK: each drives one pack's
        death from concrete play and asserts the rendered observation.
      - {parser,rpg}_all_endings_reachable.test.ts prove every death ending is
        route-reachable, but over an ABSTRACT BFS on GameState that "never renders an
        observation".
    So for the OTHER 7 death-ending packs (alchemists_tower, friars_postern,
    lamplighters_round, sealed_crypt — parser; breaking_weir, dawn_beacon, wolf_winter
    — RPG; sunken_barrow/cold_forge already had per-pack tests) nothing locked that a
    dying player is shown the death ending's own TITLE (not a stale room name), its
    epilogue TEXT, the death:true flag a UI marks the loss with, and the score-closure
    tally. The render path is sound (src/parser/observation.ts); this only closes the
    missing systematic lock around it, uniformly and for every future pack.
fix:
  layer: test   # pure test addition; no content, engine, validator, or hash change
  summary: >
    Add tests/regression/death_endings_render_cleanly.test.ts, generalizing the two
    per-pack render oracles to a cross-pack structural net over all parser + RPG packs
    (auto-discovered, so a new pack is covered the moment it ships — the bug_0096 bar).
    For each pack it collects the declared death endings (parser/RPG carry `death`;
    CYOA's EndingSchema has none, so CYOA is out of scope by construction), runs the
    shared exhaustive solver (support/exhaustive_endings.ts) with an onState hook that
    captures the first terminal WITNESS state for each death ending — for RPG under the
    same best/worst-roll bracket the reachability proof uses, so a death falls out of
    the worst-roll regime — then builds the real player-facing buildParserObservation on
    that witness and asserts a clean render: obs.title == the death ending's title (not
    the room name), obs.description leads with the epilogue text, obs.ending.death ==
    true, the structured block carries id/title/text faithfully, and a "Final score: X
    of Y." closure rides the description only (canonical ending text stays pure). A
    declared death ending never witnessed FAILS loudly (severed route), so the render
    checks can never pass vacuously; a discovery guard asserts >= 9 death endings across
    the shipped packs so a broken glob fails rather than going silently vacuous.
  teeth_verified: >
    Confirmed the oracle catches a real render regression: temporarily changing
    src/parser/observation.ts so the death observation shows the room name instead of
    the ending title fails 9 of the 10 tests (only the discovery guard survives);
    reverted. Baseline before: 244 files / 1592 tests green.
locked_by:
  - tests/regression/death_endings_render_cleanly.test.ts
