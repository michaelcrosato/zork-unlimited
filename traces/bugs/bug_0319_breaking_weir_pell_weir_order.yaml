id: bug_0319
pack: breaking_weir_v1
title: "pell_weir says 'which I've told you of' when heard_walk is not set"
class: reactive-description-blindness
severity: minor
found_by: blind_playtest (2026-06-08T12-48-54-199Z, seed 7)

description: >
  When the player asks ask_weir (plan overview) BEFORE asking ask_walk (how to cross
  the storm-walk), the pell_weir dialogue node said "Then the storm-walk, which I've
  told you of." But heard_walk was not set at this point — Pell had not told the
  player anything about the walk yet. The presupposition was false, breaking the
  illusion that Pell's responses are reactive to the player's dialogue choices.

  Same reactive-description-blindness class as bug_0282/0283/0284/0287/0288/0302 etc.

reproduction:
  - Start a new game of breaking_weir_v1.
  - Talk to Pell; choose ask_weir BEFORE ask_walk.
  - Observe: pell_weir says "the storm-walk, which I've told you of" with heard_walk=false.

fix:
  file: content/rpg/quests/breaking_weir.yaml
  change: >
    Added a variants block to the pell_weir dialogue node.
    - Base npc_text (heard_walk NOT set): "Then the storm-walk — ask me about that
      before you set foot on it, for it is the one place out there that kills."
    - Variant when heard_walk IS set: preserves original "which I've told you of" text.
    Prose-only; no flag, condition, score, exit, or ending changed.

regression_test: tests/regression/breaking_weir_pell_weir_order_reactive.test.ts
