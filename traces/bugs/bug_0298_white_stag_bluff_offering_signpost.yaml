id: bug_0298
title: "White Stag bluff knows_truth variant — active signpost for offering vs. lowering bow"
pack: white_stag_v1
scene: bluff
severity: content_polish
class: signpost-passivity
discovered_by: blind_playtest
playtest_session: ai-runs/2026-06-08T07-33-24-573Z/playtest.md
symptom: >
  The bluff knows_truth variant closed "waits to see whether you have understood" — a binary
  framing (understood/not) that made lower_bow and lay_offering feel like equivalent "yes, I
  understood" responses. Players may not sense that lay_offering is a qualitatively distinct
  active ceremonial rite rather than another form of passive mercy.
root_cause: >
  "Whether you have understood" frames the stag's wait as a knowledge test (binary pass/fail).
  Both lower_bow (passive, let it walk) and lay_offering (active, surrender bow as rite) satisfy
  "yes, I understood." The phrase does not signal that different acts on the knowledge are possible
  or meaningful.
fix: >
  Changed closing sentence in bluff knows_truth variant from
  "waits to see whether you have understood"
  to
  "waits to see what you will do with knowing it"
  — "what you will do" is open and active, signaling that knowledge requires a response and
  different responses (passive vs. ceremonial) are meaningfully distinct. Prose-only; no
  flag/choice/gating/route/ending change.
regression_test: tests/regression/white_stag_bluff_offering_signpost.test.ts
