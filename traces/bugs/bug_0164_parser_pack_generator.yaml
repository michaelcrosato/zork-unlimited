id: bug_0164
title: "Parser pack generator — complete the generator trilogy across all three modes; mint validator-clean, exhaustively-solvable parser packs and seal a held-out parser window"
kind: invariant_lock
mode: parser
severity: enhancement
layer: gen
artifact:
  source: src/gen/parser_generator.ts
  unit_test: tests/unit/parser_generator.test.ts
  corpus_seal: bin/seal-corpus.ts
  corpus: corpus/manifest.json
  corpus_test: tests/regression/held_out_corpus_sealed.test.ts

summary: >
  The generator program (the breadth lever that "evolves the eval distribution") shipped CYOA
  (bug_0156) and RPG (bug_0159) generators and a sealed held-out corpus of them (bug_0163) — but
  only for TWO of the three game modes. The parser mode owns the STRICTEST validator in the suite
  (src/validate/parser_validator.ts, ~1200 lines: soft-locks, an obtainability fixpoint, quest-item
  loss, dialogue termination, score economy, win-fires-at-start, dead reactive content) yet it was
  still exercised only against the TWO hand-authored packs (sealed_crypt, alchemists_tower). A frozen
  eval set is the exact condition under which a self-improving agent's verifier stops being a moving
  target and becomes a memorisable one (the reward-hacking result the program resists; the assessor's
  own 0.5-floor collapse). This lands bug_0163's named next-focus item (c): a parser generator that
  mints fresh, schema-valid, validator-clean, exhaustively-solvable parser packs on demand and seals
  a fixed held-out window of them — so the parser bar too is held against never-seen content.

mandated_blind_playtest:
  target: content/cyoa/pack/white_stag.yaml
  seed: 3
  result: >
    Clarity 5/5, enjoyment 5/5. Fresh isolated subagent (no design context, MCP-tools only) reached
    3 distinct endings (offering, lost, quarry) across 4 playthroughs, confirmed the knowledge×action
    two-axis reactivity (ending_quarry serves two texts on knows_truth), the gated lay_offering, and
    the telegraphed ice death. Zero bugs, zero mechanical faults; "shippable as-is, no fixes needed."
    Report: ai-runs/2026-06-03T10-10-18-913Z/playtest.md. A blind-clean pass on a clean pack is the
    saturation signal: per docs/afk_loop.md this cycle pivoted to breadth/structural work (the parser
    generator) rather than churn another polish pass.
  rotation_note: >
    Per [[assessor-blind-pass-rotation]] the least-recently blind-played pack remains clockwork_heist
    (CYOA, last dedicated pass bug_0153). This cycle is a structural/breadth slice (a generator), not
    a content fix; the rotation pass stays owed on clockwork_heist for the next content-touching cycle.

root_cause: >
  bug_0163's header and next_suggested_focus both name a parser generator as explicitly deferred —
  the prior slices kept it out to stay one-focused. There was no src/gen/parser_generator.ts, so the
  held-out corpus spanned cyoa+rpg only and the parser validator had no moving target.

what:
  - >
    src/gen/parser_generator.ts — NEW. `generateParserPack(seed)` is PURE + DETERMINISTIC (mulberry32,
    no Date/Math.random, §8.5): same seed ⇒ byte-identical ParserPack. Fixed skeleton, theme-skinned
    by seed (6 themes): a three-room spine entrance→hub→goal whose two NON-win rooms are strongly
    connected (no quest-item soft-lock), the goal gated behind a flag-locked exit; a readable CLUE
    (+5, gated one-shot) and an NPC (ungated `bye` ⇒ dialogue always terminates) as two in-world clue
    sources (§17); a KEY in an openable coffer; a first-class UNLOCK gate (sets the gate flag the goal
    exit reads, awards +10) → the canonical win on reaching the goal; and a telegraphed DEATH fork —
    the SAME key opens a plainly-warned hazard that end_games (the failure pole, the sealed_crypt
    bound_tomb discipline, never an ambush). Exact score economy: read +5 + unlock +10 = max_score 15.
    Self-checks via ParserPackSchema.parse. `export const PARSER_GENERATOR_VERSION = 1`.
  - >
    tests/unit/parser_generator.test.ts — NEW. Holds the mint to the SAME bar as the shipped parser
    packs across 24 seeds: determinism, seed-sensitivity, schema-valid, validateParser ZERO findings
    (the strictest validator, every severity), exhaustively solvable (the shared exhaustiveEndings BFS
    reaches BOTH ending_win and ending_doom, none undeclared, no cap-out), score economy EXACT under
    the bug_0146 liveness policy (reachable max == 15: no overflow/farm, no phantom points), and a
    gate-is-load-bearing proof (restricting the search away from the key chain reaches no win). +27
    test cases.
  - >
    bin/seal-corpus.ts — add PARSER_SEEDS [0,1,2,3]; for each: generateParserPack → validateParser
    (THROW on any finding, refuses to seal a dirty parser pack) → write corpus/parser/<id>.yaml +
    a manifest entry {mode:"parser",seed,pack_id,generator_version,content_hash=hashState}. ManifestEntry
    mode union widened to "cyoa"|"rpg"|"parser".
  - >
    corpus/ — re-sealed: NEW corpus/parser/genpar_{0..3}_v1.yaml + manifest now 12 entries (4 cyoa +
    4 rpg + 4 parser). Still under the top-level corpus/ dir, NEVER under content/*/pack — so
    all_packs_validated_by_bar.test.ts still discovers EXACTLY the 10 curated packs and no blind-
    playtest obligation is added.
  - >
    tests/regression/held_out_corpus_sealed.test.ts — PARSER_WINDOW=4 added to the count assertion,
    and a third per-entry branch (mode==="parser") asserting re-mint determinism, generator_version ==
    PARSER_GENERATOR_VERSION, YAML round-trip stability, and validateParser zero findings — identical
    rigor to the cyoa/rpg branches. Total corpus window 4+4+4=12.

fix: >
  The held-out corpus now spans all three modes; the parser validator — the strictest in the suite —
  is held against fresh, never-seen content every cycle via the committed corpus/parser window and the
  standing re-mint-and-verify gate. The change is purely ADDITIVE: one new generator file, one new
  unit test, additive seal/corpus-test branches, a re-seal. No content/engine/validator/schema/
  assessor file changed; no test deleted/disabled; no hash pin moved; verify-integrity untouched.

regression:
  unit: tests/unit/parser_generator.test.ts
  corpus: tests/regression/held_out_corpus_sealed.test.ts
  asserts: >
    Every generated parser pack (24-seed spread) is schema-valid, validateParser-clean, exhaustively
    solvable to BOTH endings, and has an exact 15-point reachable economy; the gate lock is real. Every
    corpus/manifest.json parser entry re-mints to a byte-identical content_hash, round-trips through its
    committed YAML, and matches PARSER_GENERATOR_VERSION; the manifest window is exactly 4+4+4.

verification:
  - "npm run health EXIT 0 — additive: one new generator + one new unit test + additive seal/corpus
    branches + a re-seal; no test deleted/disabled, no hash pin moved, no guard weakening. Net test
    count RISES, so the count-regression guards stay satisfied."
  - "all_packs_validated_by_bar.test.ts STILL PASSES — discovery returns EXACTLY the 10 curated packs
    (corpus/ did not pollute content/*/pack)."
  - "Re-running `npm run corpus:seal` a second time produces a byte-identical corpus/ tree and manifest
    (git diff empty) — proves end-to-end determinism across all three modes."

next_suggested_focus: >
  The generator trilogy is now COMPLETE across all three modes (cyoa/rpg/parser), each minting
  validator-clean, exhaustively-solvable packs and sealed into the held-out corpus. Natural follow-ups,
  in order: (a) DEEPEN the generators behind a generator_version bump + re-seal — for parser: deeper
  maps (multi-room obtainability chains), a second key/lock tier, a USE puzzle with command_verb, or a
  multi-knowledge moral fork; (b) wire corpus/ into the benchmark scorecard (buildScorecard plays only
  curated disk YAML today — now sensible that all three modes are sealed); (c) add the generators /
  GEN_EVAL_CHECK_COUNT to PROTECTED_FILES as a trust-boundary hardening cycle. The keyed real-model
  author→play→fix→lock run remains the highest-value move overall but stays gated on owner API-key
  authorization. Blind-pass rotation: the least-recently blind-played pack remains clockwork_heist —
  rotate the next mandated content pass there.
