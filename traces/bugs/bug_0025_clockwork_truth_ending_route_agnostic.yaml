  content:
    - content/cyoa/pack/clockwork_heist.yaml: >
        ending_truth reworded "There was gold enough in this house to vanish on, but
        you leave it untouched and carry the truth out instead" -> "You came to rob
        this house and could have vanished rich on its hoard; instead you slip out
        into the dark carrying nothing but the truth." The forgone riches are now the
        heist's PURPOSE (you came to rob it; the manor demonstrably holds a fortune)
        rather than a physical object the player stood over and declined — true on
        BOTH the vault take-letter route and the crawlspace strongbox route. The
        truth-over-riches moral ("Some things are worth more than escaping rich") is
        kept verbatim. No flags / items / choices / gating / reachable endings change.
  engine:
