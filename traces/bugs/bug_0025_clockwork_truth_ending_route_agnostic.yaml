finding: >
  bug_0017 reworded ending_truth from "You leave the gold and take the truth" to
  "There was gold enough in this house to vanish on, but you leave it untouched and
  carry the truth out instead", framing the gold as a property of the manor. But
  "you leave IT untouched" STILL presumes the player was physically beside the gold
  and chose not to take it — true on the vault take-letter route, FALSE on the
  crawlspace/strongbox route, where the player never reaches the vault and never
  sees a single coin. The crawlspace is only ever reached BEFORE / INSTEAD of the
  vault (entering the vault ends the game on the next choice), so on that route the
  "leave it untouched" beat narrates an act the player never performed. The blind
  playtester hit this directly on seed 303 (report §5): "you never reach the vault
  or see the gold, so 'leave it untouched' rings false."
improvement:
