id: bug_0397
pack: quarrymens_fault_v1
title: "clean proof route was under-signposted and still offered Cale combat"
severity: medium
scene: quarry_yard
reported_by: blind_playtest_20260620T184148Z_quarrymens_fault_seed7

symptom: >
  A blind playtester naturally took the survey chain and tried the fault
  measurement immediately, failing the one-shot skill check before the pack had
  signposted that the drill marks and old seam map make the clean proof route
  reliable. On the prepared proof route, Cale still appeared in `enemies_present`
  and `attack_cale` remained legal even though the ramp prose said the proof
  had changed the argument and the north road was open.

root_cause: >
  The quarry-yard `survey_chain_taken` variant only removed stale item prose; it
  did not tell the player that the chain run is a high-stakes measurement better
  supported by evidence from the side rooms. Cale's enemy definition also had no
  state gate, so peaceful proof and combat remained simultaneously true.

fix: >
  The chain-taken yard text now points players toward the drill marks and old
  map before Cale sees the one clean run, while preserving the early-measure
  gamble. A failed-measure-plus-evidence variant acknowledges the growing proof
  instead of replaying only the kinked-chain text. Cale is gated behind
  `not_flag: fault_measured`, and the proof-route ramp prose now says he lowers
  the handle, so the clean route no longer offers incoherent combat.

tests: tests/regression/quarrymens_fault_reactive_taken_items.test.ts
