id: bug_0372
title: "wreckers_light: gallery climb was signposted but under-motivated"
pack: content/cyoa/pack/wreckers_light.yaml
detected_by: blind_playtest_20260620T071450Z_wreckers_light_seed7
severity: moderate

description: >
  The gallery's climb_to_wreck label already named the lethal descent, but the
  surrounding scene still gave no in-world reason a sensible player would climb
  down before choosing the save/wreck decision. The fresh blind playtest described
  the action as alarming and opaque: if it is a death, it should at least be
  thematically motivated. While reviewing the same gallery surface, the truth_known
  variant also proved over-specific: it said the player's hands were empty of oil
  and flame even when the player could carry exactly one of those tools.

reproduction:
  motivation_gap:
    - enter
    - out_gallery
  partial_tool_stale_text:
    - enter
    - hear_keeper
    - search_keeper
    - take_striker
    - go_down
    - unlock_chest
    - read_journal
    - back_up
    - out_gallery

fix:
  type: content
  change: >
    Added gallery prose that names the iron service rungs under the rail and frames
    the climb as a desperate attempt to reach the rocks before the ship does. Updated
    the truth_known no-false-light variant to say the bracket is useless without both
    oil and flame, rather than claiming the player's hands are empty. No choice ids,
    conditions, routes, endings, flags, or quest stages changed.
  files_changed:
    - content/cyoa/pack/wreckers_light.yaml

regression_test: tests/regression/wreckers_light_gallery_climb_motivation.test.ts
