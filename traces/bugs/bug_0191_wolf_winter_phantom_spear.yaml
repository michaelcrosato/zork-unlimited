id: bug_0191
title: "wolf_winter: phantom-spear clue (no spear item exists) + stale 'the way Cade said' journal (blind playtest finding)"
kind: content_fix
mode: rpg
severity: minor
pack: content/rpg/quests/wolf_winter.yaml
content_hash: e7e1e4b1037fc0f9b0a9c7958fd97ee773d43079fca033be68dde5cb99d80c38

summary: >
  The bug_0190 mandated blind pass ran on wolf_winter (the 13th pack / 4th RPG, shipped by bug_0189),
  RPG, seeds 7/3, and rated it clarity 5/5, enjoyment 4/5, mechanics flawless — but the independent
  blind tester found a real CONTENT CONTRADICTION: a PHANTOM SPEAR. The day-book ("SPEAR AND PADDING
  OR NOTHING") and Cade ("speared right ... both, mind, not one") both promised a *spear* as a hard
  requirement, but no spear ITEM exists in the pack — the +2 attack comes from ASKING Cade about the
  wolves, and nothing told the player that, so a careful first-timer hunted the steading for a weapon
  that was never there. The hunting-spear is the hunter's equipped weapon (reflected in base attack 5),
  not loot; the two things the player must actually GATHER are Cade's counsel (+2 atk) and the
  byre-jerkin (+2 def). A lesser bug_0188-class stale attribution rode along: the yearling's on_defeat
  journal read "the way Cade said" even on the route where the player never spoke to Cade.

reproduction:
  pack: content/rpg/quests/wolf_winter.yaml
  route: "read day-book -> (skip Cade) -> store: take/don jerkin -> paling: kill yearling"
  observed: >
    The day-book demands 'SPEAR AND PADDING OR NOTHING' and Cade promises safety only if 'speared
    right and padded', implying a spear must be acquired — but no spear object exists anywhere, and
    the only +2 attack source is the (unmentioned) act of asking Cade. The yearling-kill journal also
    asserts 'the way Cade said' on a route where Cade was never consulted.
  expected: >
    No clue points the player at an item that does not exist; the spear is established as already in
    hand; the yearling-kill journal is true whether or not Cade was consulted.

fix:
  layer: content
  change: >
    Content-only, true-in-all-reachable-states (the bug_0186 discipline), no engine/validator/schema
    change and no combat-math change (the +2 attack still comes from Cade's counsel):
    (1) the steading_yard opening now establishes the hunting-spear is ALREADY in the hunter's fist
    ('the steading's only spear, and yours by trade'), so a first-timer never looks for a weapon item;
    (2) the day-book read_text drops the 'SPEAR AND PADDING OR NOTHING' shopping-list framing and now
    states the hunter has his spear already and asks only for the two things actually gathered — Cade's
    counsel and the byre-jerkin ('THE HUNTER HAS HIS SPEAR ALREADY; WHAT HE LACKS IS THE KNACK OF IT
    AND A HIDE TO HIS BACK — SO MIND OLD CADE ... AND PULL ON THE BYRE-JERKIN ... BOTH, OR NOTHING');
    (3) the yearling on_defeat journal drops 'the way Cade said' ('You take the yearling on its rush as
    it commits, ...'), true on both the heard-counsel and no-dialogue routes. Cade's own counsel line
    ('speared right and padded') is now coherent — 'speared right' = using the spear already in hand
    the way he just taught, no longer implying an item to find.

within_the_bar: >
  validate_story stays 0/0 (content_hash fae4039e... -> e7e1e4b1...). No test pins this pack's
  content_hash (only watchtower_road pins one in test files), so nothing was forced; bug_0189's
  informational artifact hash is left as-is (it records the as-shipped pack) and this artifact carries
  the new hash. The bug_0189 regression (wolf_winter_three_fight_gauntlet.test.ts) passes unchanged —
  it asserts the combat/guarantee math and max_score, never the reworded prose.

post_fix_blind_pass: >
  A fresh blind agent replayed the FIXED pack (seed 7, three runs) and confirmed the fix: "No
  phantom-item bug. Every item a clue points to exists exactly where stated ... Nothing told me to
  find a weapon/item I couldn't then locate." Clarity 5/5, enjoyment 4/5. Report:
  ai-runs/2026-06-03T17-20-28-435Z/playtest.md.

locked_by:
  test: tests/regression/wolf_winter_phantom_spear.test.ts
  asserts:
    - "the steading_yard opening establishes the spear is ALREADY in hand (contains 'spear' + 'already')"
    - "the day-book no longer reads 'SPEAR AND PADDING' and points at Cade + the jerkin while noting the spear is already had"
    - "the yearling-kill on_defeat journal carries no Cade attribution (true on the no-dialogue route)"

verify: "npm run health EXIT 0"
