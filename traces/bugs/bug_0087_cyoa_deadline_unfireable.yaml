bug_id: bug_0087
pack_id: null   # engine/validator soundness guard; not specific to one pack
seed: 23
evidence:
  source: blind_playtest + validator_audit
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T22-53-38-839Z/playtest.md
  finding: >
    This cycle's mandated blind pass on the assessor's rank-1 target, The Clockwork Heist
    (seed 23, fresh MCP-only source-blind subagent), reached FIVE endings (Truth ×2 prose
    variants, Rich, Caught, Caught-on-the-Hour, and the ticks>=10 Overstay), rated the pack
    clarity 5/5 / enjoyment 4/5, and found ZERO functional bugs — it specifically looped past
    ticks 7/8/9 to confirm the deadline lands cleanly at 10 (the "threat that never lands"
    suspicion of earlier cycles is disproven). Its only two notes (free-vs-costly move
    asymmetry; the short strongbox route to the Truth ending) are author-intentional design,
    not defects. With the over-fitted clockwork target proven sound for the ~25th time and the
    standing memory recording the content-polish backlog as exhausted across all six packs, I
    audited the deadline machinery the pack's namesake mechanic leans on and found the soundness
    gap the variant family (bug_0085/0086) had left open.
failure:
  type: validator_missing_check_dead_mechanic
  where:
    - engine:src/validate/cyoa_validator.ts
  description: >
    bug_0085 (shadowed variant) and bug_0086 (vacuous guard) made the reactive-variant
    machinery sound: scene/ending variant `when` and choice `conditions` are now checked for
    being silently dead. But `meta.deadline.when` (the §8.4.5 global terminal added in
    bug_0079/0080) went ENTIRELY un-analysed for firability. A `meta.deadline` whose `when` can
    PROVABLY never hold is two bad things at once: (1) a Chekhov's gun — the declared urgency
    mechanic is dead, the exact "looks like a timer but never bites" sin the whole clockwork
    deadline arc (bug_0061→0084) was born to fix, now shippable by a maintainer who renames the
    watched var, drops the only `inc_var`, or fat-fingers a crossed bound; and (2) a LATENT
    UNSOUNDNESS in the validator's own soft-lock graph, which (cyoa_validator.ts successors loop)
    adds the deadline ending as a real escape edge from any scene that writes a watched var. If
    the `when` ALSO requires a flag/item nothing provides, that escape edge is a phantom — the
    graph would count a scene as escapable via a deadline that can never trigger, masking a true
    soft-lock. The blind playtest is a weak backstop: a dead deadline simply never fires, so its
    absence reads as normal (the player just never hits the hour).
fix:
  layer: validator
  summary: >
    Add `checkDeadlineFirability(when, flags_init, vars_init, writes, findings)`, called inside
    the existing `meta.deadline` block. Two sound, conservative grounds, both reusing existing
    machinery: (a) `isUnsatisfiable(whenProfile(when))` — the `when` is internally contradictory
    (a flag/item pinned both ways, or crossed var bounds), reusing bug_0086's vacuous-guard logic;
    (b) the `when` REQUIRES, in AND-context (`collectRequired`), a flag never set / item never
    granted / var that must be raised but is never written (`collectWrites`) — the same feasibility
    logic the choice-gate checks (IMPOSSIBLE_GATE / ITEM_UNOBTAINABLE) already use, now applied to
    the deadline. Either ground → WARNING `DEADLINE_UNFIREABLE` (severity matches the sibling
    dead-content findings UNREACHABLE_VARIANT / UNSATISFIABLE_CONDITION; the game is still fully
    completable, the mechanic is just dead). `writes = collectWrites(pack)` is hoisted up to the
    deadline section and reused by the later feasibility loop (no double scan). No schema, runner,
    or content change.
  reachable_endings_changed: false
  content_hash_changed: false        # no content pack edited
  regression_test: tests/regression/cyoa_deadline_unfireable.test.ts
  unit_tests:
    - tests/unit/cyoa_validator.test.ts   # new negative fixture row: deadline_unfireable.yaml -> DEADLINE_UNFIREABLE
  fixtures:
    - content/broken-fixtures/deadline_unfireable.yaml
verified_live: >
    Bug-first: a synthetic pack whose deadline fires at `doom>=5` while `doom` is never written
    (only the red-herring `ticks` is) yields DEADLINE_UNFIREABLE; so do a deadline with crossed
    var bounds (`doom>=5 ∧ doom<=3`) and one requiring an unset flag. A FIREABLE deadline
    (`doom>=1` with `doom` incremented on entry) does NOT — soundness, no false positive. The
    shipped clockwork pack (deadline `ticks>=10`, fed by real `inc_var ticks` in kitchen/landing/
    study) produces ZERO DEADLINE_UNFIREABLE and stays green; watchtower has no deadline.
    `npm run health` exit 0; 617 tests pass (116 files; +5 regression cases +1 unit fixture row,
    was 611); verify:integrity OK; typecheck/lint/format:check clean; all four health-gated packs
    validate 0/0; all content hashes unchanged.
note: >
    Soundness over coverage (same stance as bug_0085/0086): only flags a deadline whose firing is
    PROVABLY impossible — a contradiction in, or an unprovidable requirement of, the conjunctive
    part of `when`. It cannot prove unfireability that depends on a disjunction's semantics or on
    var arithmetic (e.g. a step size that overshoots an `==` target), so it detects fewer cases,
    never wrong ones. Together with bug_0079/0080 (the deadline made real + its reachability seen
    through choice effects) and bug_0085/0086 (the variant guards), the deadline mechanic and the
    reactive-guard family are now both machine-checked for silently-dead content.
