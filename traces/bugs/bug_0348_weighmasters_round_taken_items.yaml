id: bug_0348
pack: weighmasters_round_v1
title: "counting-house and warehouse floor still placed taken evidence at starting positions"
severity: minor
scene: counting_house / warehouse_floor
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the deputy's receipt, LOOK in the counting-house still said the
  receipt form lay folded on the desk corner. After taking the grain sample,
  the warehouse floor still had no durable way to distinguish the measured
  sample's starting spot from its post-pickup state. Dropping either item after
  taking it could let the room prose fall back to starting-position language.

root_cause: >
  The portable evidence did not leave durable pickup flags that room prose could
  read. Inventory alone was not enough because the player can drop the receipt
  or grain sample after first taking it.

fix: >
  Taking the deputy's receipt now sets `deputy_receipt_taken`, and taking the
  grain sample sets `grain_sample_taken`. The counting-house has a
  receipt-taken variant, and the warehouse floor now explicitly names the
  measured sample's starting spot before pickup and keeps that spot empty after
  pickup. Score, exits, endings, and win conditions are unchanged.

tests: tests/regression/weighmasters_round_reactive_taken_items.test.ts
