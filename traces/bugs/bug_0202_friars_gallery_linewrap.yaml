id: bug_0202
title: "friars_postern — The Gallery split 'night-gate' across a folded-scalar linewrap, rendering 'night- gate'"
kind: content_fix
mode: parser
pack: content/parser/pack/friars_postern.yaml
# Informational. No test pins friars_postern's content_hash, so nothing was forced; this
# content edit moves the pack hash, and the regression pins the rendered BEHAVIOUR (the
# gallery text reads "night-gate" intact), not the bytes.

summary: >
  The mandated blind pass this cycle (friars_postern, parser, seed 11 — the genuinely
  most-overdue rotation target, blind-played only ONCE before and longer ago than any other
  harness candidate; deviated from the harness recency-blind rank-1 breaking_weir, which was
  blind-played 2 of the last 3 cycles) reached ALL THREE endings (ending_free WIN 35/35,
  ending_taken DEATH 0/35, ending_thief 30/35), rated the pack clarity 5/5 / enjoyment 4/5
  with ZERO mechanical bugs. Its one concrete finding was a cosmetic content flaw: The
  Gallery's description rendered "...steps drop down to the night- gate." — a stray
  hyphen+space mid-word, visible every time the player stood in the gallery.

root_cause: >
  In the gallery `description` (a YAML `>` folded block scalar) the compound word "night-gate"
  was hard-wrapped across a source line break ("...the night-\ngate."). YAML folds a single
  newline between equally-indented lines to a SPACE, so the rendered string became
  "night- gate" (hyphen + space + gate) instead of "night-gate". Confirmed by parsing the real
  pack: the gallery description contained "night- gate", not "night-gate". A pure source-layout
  artifact — the only such linewrap-split inside rendered description text across all packs
  (the other end-of-line hyphens in content/ are all comment lines, which never render).

fix: >
  Content-only, no engine change. Rejoined "night-gate" onto a single source line in the
  gallery description so the fold no longer breaks the word; the surrounding wrap is otherwise
  unchanged. The gallery now renders "...steps drop down to the night-gate. Your own cell is
  back to the south."

out_of_band_teeth: >
  The regression (friars_gallery_linewrap.test.ts) loads the REAL pack and reads the gallery's
  effective rendered description via roomDescription, asserting it (a) contains "night-gate" and
  (b) does NOT contain "night- gate" — reverting the edit re-breaks both. A second case scans
  every room description for the folded-linewrap signature /[a-z]- [a-z]/ (a hyphen directly
  followed by a space then a letter), so a re-introduction in any room is caught, not just this
  one. Behavioural witnesses on rendered text, not a byte-pin.

regression_test: tests/regression/friars_gallery_linewrap.test.ts

verification: >
  npm run health green (verify:integrity + lint + tests + validate + playtest). friars_postern
  validate_story stays 0 errors / 0 warnings; the auto-discovered parser suites (all-endings
  reachability for ending_free/ending_taken/ending_thief, no soft-lock, score economy
  max==35, action-id uniqueness) stay green — text-only change, no structural change.

files_changed:
  - content/parser/pack/friars_postern.yaml  # gallery description: 'night-gate' rejoined onto one source line
  - tests/regression/friars_gallery_linewrap.test.ts  # new rendered-text assertion + pack-wide linewrap guard
