bug_id: bug_0131
pack_id: null   # engine fix, not a content defect — affects every RPG pack with combat
seed: 13
type: engine_fix
layer: engine_rule   # src/rpg/combat.ts narration; deterministic, no LLM-judge
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T14-22-55-560Z/playtest.md   # cold_forge seed 13 (the cycle's mandated, correctly-rotated target)
  finding: >
    A fresh MCP-only source-blind playtester of The Cold Forge (seed 13) reached
    BOTH endings (ending_victory 50/50; ending_fallen, death), rated the pack
    clarity 5/5, enjoyment 4/5, ZERO bugs. Its one concrete, repeated friction note
    (§4 AND §5) was that the cold-iron plate's +2 DEFENSE "felt invisible": "with def
    4 the sentinel hit me for 9/7; with def 2 it hit me for 8/8/9 — barely different,
    so the armor's value isn't obvious from the numbers." The player could not
    perceive that prep (the optional plate) was doing anything, because a +2 defense
    reduction is swamped by the d6 attack roll's range and the old combat narration
    showed ONLY the final damage number. The verdict explicitly asked to "make the
    plate visibly reduce incoming damage." The barrow ward drew the SAME "is my prep
    working?" note (bug_0119).
root_cause: >
  Asymmetry in src/rpg/combat.ts. The skill-check resolver (resolveSkillCheck)
  narrates its full breakdown — "rolled <d20> + <bonus> = <total> vs <DC> —
  success/failure" — so a player can see their `might` at work. The combat
  resolver (resolveAttack) did NOT: both the player-strike and enemy-hit
  narrations reported only "<name> hits you for <N> (you have <HP> left)". The
  damage formula max(1, roll + atk - def) folded the d6 roll, the attack, and the
  defense into one opaque number, so the defense term — the ONLY signal that gear
  like the plate or the barrow ward matters — was never surfaced. Across the d6's
  range a +2 defense change is imperceptible from final-number deltas alone.
fix: >
  Engine, trust-but-verify (deterministic; no clock/RNG-in-narration; no
  LLM-judge). Extracted a `rollDamage(roll, atk, def)` helper returning {dealt,
  how}: `dealt` = max(1, roll + atk - def) is BYTE-IDENTICAL to the removed
  `dmg()`, and `how` is a legible breakdown "d6 <roll> + <atk> atk - <def> def"
  mirroring the skill-check format. Both combat narrations now read
  "You strike <foe> for <N> (d6 R + A atk - D def; it has <HP> left)." and
  "<foe> hits you for <N> (d6 R + A atk - D def; you have <HP> left)." When a blow
  is clamped to the min-1 floor the breakdown states it honestly ("... = -6,
  blunted to the floor of 1"), so the shown arithmetic can never silently fail to
  equal the damage dealt. The two d6 draws (player strike, then enemy reply)
  happen in the SAME order from the SAME step-keyed stream, so determinism, replay,
  and every trace's expected_final_hash are unchanged (narration is not part of the
  state hash — cf. bug_0119). No content/pack edited; no validator/schema change;
  no hash pin moved.
within_bar: >
  Engine-only narration change. All numeric combat behaviour is identical, so the
  existing seeded-combat determinism tests (tests/unit/rpg.test.ts), the exhaustive
  RPG ending-reachability proof (tests/regression/rpg_all_endings_reachable.test.ts,
  which forces best/worst rolls via the rng seam and asserts on routing, not
  narration text), and all seven packs' validators (0/0) pass unchanged. No trace
  pins the combat narration string.
regression_test: tests/regression/rpg_combat_damage_legible.test.ts
test_cases:
  - "player strike narration decomposes into d6 + atk - def and matches the HP write"
  - "defense is legible: the same forced roll lands for exactly +2 less when plated, and the breakdown spells out the '- N def' term"
  - "a floored blow states 'blunted to the floor of 1' and removes exactly 1 HP, never an unexplained 1"
  - "numeric damage is unchanged vs max(1, roll + atk - def) across rolls 1-6 and defs 0/1/2/4/9"
