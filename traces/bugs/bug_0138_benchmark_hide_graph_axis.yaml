seed: 53
type: engine_feature
layer: engine_rule   # benchmark scorecard (src/afk/benchmark.ts) + run_playtest plumbing (src/mcp/tools.ts); deterministic, no LLM-judge
evidence:
  source: blind_playtest + ULTRAPLAN
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T16-14-57-595Z/playtest.md   # wreckers_light seed 53 (the cycle's mandated, correctly-rotated target)
  finding: >
    The mandated blind pass on The Wreckers' Light (seed 53, the least-recently
    blind-played CYOA pack per the rotation) reached all FOUR endings and rated the
    pack clarity 5/5, enjoyment 5/5, ZERO bugs — content is blind-clean at the 5/5
    high-water mark. So there was NO actionable content defect this cycle: per
    [[content-polish-backlog-exhausted]] / [[verifier-assertion-guard]] the
    deterministic assessor is collapsed to the 0.5 floor with every self-extinguishing
    structural lever disarmed. The highest-value off-list move is the on-plan
    benchmark lever bug_0137's own next-focus named: make the new hide_graph
    difficulty MEASURABLE, not just available.
root_cause: >
  bug_0137 shipped the opt-in hidden-graph observation difficulty (parser/RPG exits
  render as { direction } only, dropping the destination `to`, so the spatial map
  must be reasoned out). But the difficulty was INVISIBLE: no tool or report
  exercised it, so the scorecard — the project's one comparable per-(pack,agent)
  number — had no hidden-graph column. A difficulty that nothing measures cannot be
  compared, so a spatial-reasoning model would have no baseline to be scored against.
fix: >
  Engine/benchmark, trust-but-verify (deterministic; no clock/RNG; no LLM-judge).
  (1) Threaded the existing hide_graph option through run_playtest →
  summarizePlaytest → summarizeParserLike's buildObsFor call, so the deterministic
  coverage bot can be run with the room graph hidden. Under hide_graph the
  observation's exits carry no `to`, so coverageActionIndex's prefer-unvisited branch
  falls through to blind navigation (investigative, else first) — the deterministic
  FLOOR for spatial reasoning. (2) Added a third default scorecard cell,
  { strategy: coverage, hide_graph: true }, alongside coverage and random; replaced
  the Scorecard's `strategies: string[]` with `cells: BenchmarkCell[]` and added a
  `hide_graph` boolean to each BenchmarkRow + a `Graph` (shown/hidden) markdown
  column. Random is graph-agnostic (it never consults exit destinations), so it is
  scored only with the graph shown — a hidden-graph random row would be redundant.
  Result: every parser/RPG pack now shows a real coverage drop when the graph is
  hidden (alchemists 75%→12.5%, sealed_crypt 30%→10%, cold_forge 50%→16.7%,
  sunken_barrow 50%→16.7% at 50 runs/cell), while every CYOA pack's hidden row equals
  its shown row — the honest "no spatial dimension" for a mode with no room graph.
within_bar: >
  Additive engine/benchmark feature. The observation is not part of the state hash,
  so determinism, replay, and every trace's expected_final_hash are unchanged; the
  scorecard remains byte-identical run-to-run (the determinism test still passes). No
  content/pack edited; no validator/schema change; NO hash pin moved. The Scorecard
  type's `strategies` → `cells` reshape and the new row field are surfaced in the
  scorecard unit test (deliberately strengthened, not weakened). The committed
  scorecard (traces/benchmark/scorecard.{md,json}) was regenerated to show the new
  column. Typecheck + lint + format clean; the full pre-existing suite passes
  unchanged, plus the new cases below.
regression_test: tests/regression/benchmark_hide_graph_axis.test.ts
test_cases:
  - "hide_graph strictly degrades the coverage bot's scene coverage on a parser pack (same declared endings — observation-only)"
  - "hide_graph strictly degrades the coverage bot's scene coverage on an RPG pack"
  - "hide_graph is a NO-OP for CYOA — identical scene coverage and ending distribution with and without"
  - "random play is graph-agnostic — hide_graph leaves its visited scenes and ending distribution unchanged"
unit_test_strengthened: tests/unit/benchmark.test.ts   # the default cells include a hidden-graph coverage cell; CYOA hidden==shown while parser/RPG coverage drops; markdown has a Graph column
