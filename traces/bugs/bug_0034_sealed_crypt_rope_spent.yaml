  finding: >
    Old Well / Bottom of the Well (report §5, finding 1): after USE rope ON well the world reads
    "The hemp rope is knotted fast to the iron ring and trails down into the dark" AND the tie
    narration says it "uncoils into the dark below", yet the player still CARRIED a "coil of rope"
    — the same rope simultaneously tied off to the well and in your pocket. A direct
    state/fiction contradiction (the same class as bug_0007/bug_0028's stale "still-present"
    text), surfaced as the playtest's #1 concrete finding.
root_cause: >
  The honest fix — remove the rope from inventory when it is tied off (it stays rigged to the
  well as the way down/up) — was made ILLEGAL by a validator FALSE POSITIVE. The parser
  validator's SOFTLOCK_QUEST_ITEM "consumed with no re-grant" branch rejected ANY consumed
  quest_critical item, conflating SPENT with LOST. The rope is spent for PERMANENT progress: it
  sets the `rope_attached_to_well` flag and unlock_exits the descent, and that descent stays open
  by the FLAG, never by `has_item rope` — nothing downstream ever needs the rope in hand again.
  So consuming it cannot wedge the quest, but the check fired anyway, forcing authors to leave the
  rope contradictorily in inventory.
improvement:
  layer: engine + content
  engine:
    - src/validate/parser_validator.ts: >
        Made the SOFTLOCK_QUEST_ITEM consume-branch PRECISE: a consumed (remove_item)
        quest_critical item with no re-grant is a soft-lock only if it is still NEEDED IN HAND at
        a gate that does NOT itself consume it. Build a `neededWhileHeld` set from every
        must-hold-this-item requirement — an interaction's `item:` field and `has_item` conditions
        on exits / interactions / win_conditions / dialogue topics — tagging whether that same
        site also removes the item (its own consuming `item:` requirement is in hand at the moment
        it is spent, so it does not count). The finding now fires iff `removed && !re-granted &&
        neededWhileHeld`. Sound over-approximation of "can be lost": an item required ANYWHERE it
        is not spent still trips it; an item whose every hold-requirement coincides with its
        consumption is correctly treated as SPENT. Updated the file's header doc comment to match.
  content:
    - content/parser/pack/sealed_crypt.yaml: >
        The old_well USE-rope interaction now also `remove_item: rope` (with a comment explaining
        the rope is spent, not lost, because the descent persists by flag) and the tie narration
        was reworded to "you knot the rope fast to the iron ring and pay it out … your way down,
        and your way back up." No flag/exit/score/gating/reachable-ending change — the rope simply
        leaves your hands when it becomes part of the well.
