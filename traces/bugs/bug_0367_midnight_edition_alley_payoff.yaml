id: bug_0367
title: Midnight Edition alley threat is not load-bearing
severity: content
status: fixed
root_cause: >
  A fresh MCP blind playtest found that Garrow's men with hammers created strong
  urgency but had no effect on the final press decision. Barring the alley door
  only changed reactive prose, so the threat read like set dressing once the proof
  was found.
fix: >
  Require both the suppressed inspector's report and a barred alley door before
  the verified edition can run. Add press-floor prose that tells a player with
  proof but an unsecured door why the press still cannot safely roll, and update
  the vindicated ending to acknowledge that the barred door held long enough for
  the story to reach the street.
files_changed:
  - content/cyoa/pack/midnight_edition.yaml
regression_test:
  - tests/regression/midnight_edition_alley_payoff.test.ts
