  finding: >
    The Forge Heart (rotated report §5): "levering the grate open does NOT add a journal entry,
    while reaching the heart, killing the sentinel, and the dialogue hints all do. The grate is the
    single biggest puzzle beat and silently leaves the journal untouched — a small 'the way down is
    open' journal line would round it out." The grate's USE skill_check on_success set the quest
    stage, awarded +15, and narrated — but, alone among the pack's progress milestones, wrote
    nothing to the player's append-only log. Same class as bug_0004 / bug_0006 (a milestone reveal
    that journals nothing while every comparable beat journals).
root_cause: >
  The grate USE interaction's on_success (objects[stone_grate].interactions[USE].skill_check) had
  set_quest_stage + inc_var + narrate but no add_journal, whereas slag_sentinel.on_defeat,
  ember_chamber.on_enter, and both lantern-spirit topic effects all add_journal. The journal line
  was simply never authored for this one beat.
improvement:
  layer: content
  content:
    - content/rpg/quests/cold_forge.yaml: >
        stone_grate's USE skill_check on_success gains ONE add_journal line — "You lever the slag
        grate up off its lip; the way down into the forge's root stands open." Placed alongside the
        set_quest_stage milestone, mirroring the sentinel/ember journal beats. The check is gated
        none_of [ quest_stage forge/grate_open ] and retires on success (bug_0015 pattern), so the
        entry fires EXACTLY ONCE and can never stack. No flag/item/score/DC/exit/gating/reachable-
        ending change — the narrate, +15 award, and one-shot retire are all untouched.
