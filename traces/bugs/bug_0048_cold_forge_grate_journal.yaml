  rotated_result: >
    ROTATED the actual improvement off the assessor's rank-1 clockwork_heist. The mandated blind
    playtest (clockwork_heist, seed 113) reached all FIVE endings, clarity 5/5 / enjoyment 4/5,
    zero rejected actions / no loops / no soft-locks, and surfaced NO concrete bug — its sole
