bug_id: bug_0080
pack_id: null   # engine/validator soundness fix; not specific to one pack
seed: 7
evidence:
  source: feature_audit
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T21-21-58-139Z/playtest.md
  finding: >
    This cycle's mandated blind playtest of The Clockwork Heist (seed 7) reached three
    endings (Truth x2 variants, Rich, Caught), rated the pack clarity 5/5 / enjoyment
    4/5, and found NO functional bugs — confirming the content-polish backlog is
    exhausted. Its one substantive note was that the namesake clock "reads as
    decorative" because a sensible player never trips either clock-loss ending. I
    verified live (MCP, seed 7) that both DO fire correctly — ending_patrol via the
    no-ledger gamble at ticks 4, and ending_overstayed via the meta.deadline at ticks
    10 (the deadline fires on the very inc_var action that crosses the threshold) — and
    that both are already locked by regression tests (bug_0040, bug_0079). With the
    target pack proven sound, I audited the new deadline feature itself and found a
    latent validator soundness gap unrelated to clockwork's own tuning.
failure:
  type: validator_unsound_false_unreachable
  where:
    - engine:src/validate/cyoa_validator.ts
  description: >
    The opt-in engine `meta.deadline` (bug_0079) is evaluated by the §8.4.5 `checkWin`
    hook, which the engine runs AFTER any action's effects are applied — including a
    CHOICE's effects (src/core/engine.ts: `checkWin(next)` against the post-effects
    state). So a deadline whose watched var is advanced by a choice effect really can
    end the game on that choice. But the validator's reachability/soft-lock graph only
    registered the deadline's structural edge for scenes whose `on_enter` advances a
    watched var (it called `varsWrittenByEffects(scene.on_enter)` only). A pack that
    drives its deadline var purely through a choice effect — e.g. a natural "spend an
    hour searching" action with `inc_var` and no on_enter writer — therefore had its
    deadline ending given NO incoming edge in the structural graph, so the validator
    wrongly emitted ENDING_UNREACHABLE (an error → unplayable) on a pack that ends
    there perfectly well at runtime. A false-positive error is worse than a miss: it
    rejects a valid pack and could mask the real shape of the graph (also a latent
    false SOFTLOCK if the deadline were a scene's only escape). Clockwork itself never
    hit this because its `ticks` advance only via on_enter (kitchen/gallery/study), so
    the bug was latent until the feature was exercised more generally.
fix:
  layer: validator
  summary: >
    Extend the deadline structural-edge registration in the successors loop so it fires
    when EITHER a scene's on_enter OR any of its choices' effects writes a var the
    deadline watches (mirroring where the engine's checkWin can actually fire). One
    helper `writesWatched(effects)` reused for on_enter and `scene.choices.some(c =>
    writesWatched(c.effects))`. No schema, runner, or content change.
  reachable_endings_changed: false
  content_hash_changed: false        # no content pack edited
  regression_test: tests/regression/deadline_choice_effect_reachability.test.ts
  unit_tests:
    - tests/unit/cyoa_validator.test.ts   # new case: deadline var advanced only by a choice effect is NOT ENDING_UNREACHABLE
verified_live: >
    Bug-first: with the fix stashed, the new validator unit case fails with
    ENDING_UNREACHABLE on a choice-effect-driven deadline pack; with the fix it passes.
    The regression suite also drives the synthetic pack through the real engine — one
    `wait` choice advances the var past the threshold and the engine ends the game at
    the deadline ending — proving the validator's new "reachable" verdict matches
    runtime. Clockwork and watchtower still validate clean (unchanged: clockwork's ticks
    advance via on_enter, watchtower has no deadline). `npm run health` green.
note: >
    Soundness over convenience: the validator must never reject a pack the engine would
    happily run. This keeps the deadline feature's two declared validator guarantees
    (REF_UNRESOLVED / DEADLINE_NOT_TERMINAL, and reachability awareness) honest for the
    full set of ways a deadline can actually fire, not just the on_enter subset the one
    shipping pack happens to use.
