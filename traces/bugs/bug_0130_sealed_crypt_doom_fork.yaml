notes: >
  This is the second branch retrofitted onto this pack (after bug_0105's gate/coffin
  fork) and its FIRST failure ending. It attacks the one enjoyment knock every blind
  report still raised (no stakes) using only proven mechanics (first-class UNLOCK +
  end_game, the bug_0077/0105 path), keeps the canonical win and every prior route
  test byte-identical, and gives the pack's title and its "burnt shell" chapel a
  coherent backstory — the crypt was sealed against the plague dead.
