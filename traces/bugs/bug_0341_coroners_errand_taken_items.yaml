id: bug_0341
pack: coroners_errand_v1
title: "coroner rooms still placed taken commission and letter at starting positions"
severity: minor
scene: front_hall / study
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the coroner's letter of commission, LOOK in the front hall still
  said the commission was on the side table. After taking Rendell's sealed
  letter, LOOK in the study still placed the letter beside Calloway's hand; the
  examined-body variant used ambiguous wording instead of clearly reflecting the
  held letter state.

root_cause: >
  The front hall had no room variant keyed to `has_item: commission`, and the
  study only reacted to the body-examination flag. Neither room read the durable
  held-item state for its takeable legal evidence.

fix: >
  Added ordered room variants for the held commission, held sealed letter, and
  examined-body-with-held-letter states. Pure prose/content change: no exits,
  effects, score, or win conditions changed.

tests: tests/regression/coroners_errand_reactive_taken_items.test.ts
