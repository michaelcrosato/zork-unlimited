type: content                     # content-only — the engine post-action win hook (bug_0056) already exists
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T16-07-11-442Z/playtest.md            # clockwork_heist (assessor rank-1 mandated) — verified-clean, see below
  rotated_report: ai-runs/2026-06-01T16-07-11-442Z/playtest_alchemists_tower.md   # the rotated pass that surfaced this finding
  mandated_result: >
    The mandated blind playtest (clockwork_heist, seed 83) reached FIVE distinct endings (Rich, Truth ×2
    reactive epilogues, Caught, Caught-on-the-Hour), clarity 5/5 / enjoyment 4/5, zero rejected actions /
    loops / soft-locks — its ~13th independent clean pass. Its notes (the tick budget is invisible; the
    crawlspace is a short route to Truth) are long-adjudicated-DELIBERATE escapable-deadline / multi-route
    design (bug_0019/0040/0046). No actionable clockwork defect; verified-clean.
  rotated_result: >
    Per blind_playtest_protocol.md's "rotate the seed and rotate the pack" and "you MAY pick a higher-
    value candidate," ran a fresh parallel blind pass on The Alchemist's Tower (parser, seed 67) — the
    pack the previous cycle (bug_0056) flagged as the next-best move for the same climactic-agency family.
    It WON ending_cured 35/35 and independently surfaced the gap as its #1 finding (report §5).
  finding: >
    The Alchemist's Tower (report §5, THE CLIMAX): the winning ending narrated an act the player never
    performed, and fired on a plain MOVE. The single decisive command was `go up` (laboratory → spire);
    the transcript shows that one MOVE emitted both the `move` event and `ending: ending_cured`. The
    ending read "At the spire's height you administer the antidote. Colour returns; the long sickness
    breaks." — but there was no patient anywhere in the game, and no administer / give / use-antidote
    command was ever offered. Walking up the stairs with the antidote in a pocket auto-narrated the whole
    climax. After brewing the cure by hand step by step, the actual moment of curing someone was taken
    out of the player's hands. Verdict: "a real player would finish, but the ending undercuts it —
    anticlimactic and slightly jarring; the game claims you did something you never chose to do."
root_cause: >
  The win was `{ visited: spire }, { has_item: antidote }` and the engine evaluated it in onEnter, so
  entering the spire while holding the antidote WAS the win — there was no deliberate cure beat, and the
  spire had no patient to cure. This is the parser-pack twin of sunken_barrow's bug_0056 (a win that
  should turn on a deliberate act fired on bare room entry). bug_0056 added the engine post-action
  checkWin hook (§8.4.5) precisely to unblock this; this cycle is the content-only payoff — no engine
  change was needed.
improvement:
  layer: content
  files:
    - content/parser/pack/alchemists_tower.yaml: >
        (1) NEW object `master` — the tower's fevered patient, placed in the spire (objects: [master]),
        not takeable; its sole role is to be the deliberate TARGET of the cure. (2) The master carries a
        USE interaction (item: antidote, target: master, gated not_flag cure_administered) whose effects
        `set_flag: cure_administered`, `remove_item: antidote` (you poured it into her), and narrate the
        administering beat. (3) win_conditions.administer_cure now reads `{ visited: spire }, { has_flag:
        cure_administered }` — `visited: spire` is KEPT (the parser validator derives its SOFTLOCK guard
        from `visited` win-rooms, so dropping it would silently disable that check — same reasoning as
        bug_0056); the `has_item: antidote` term is replaced by the flag, so the win turns on the
        deliberate act (USE-antidote-on-master, fired via the engine checkWin hook), never on bare entry.
        (4) The spire room description now introduces the master and tells the player the antidote "is no
        use until you give it to her." (5) The ending_cured text was reworded to carry the AFTERMATH
        ("colour creeps back into the master's face… the long sickness breaks") rather than narrating an
        administering act the player no longer has done FOR them — the act now lives in the interaction.
        No score/max_score change (still 35; max in hand as the player makes the cure), no death-ending
        change, no other route/gating change.
verification:
