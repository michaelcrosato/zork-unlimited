summary: >
  The mandated blind pass this cycle (The Tide-Mill, parser, seed 41 — the assessor's rank-1
  nominee, a SECOND independent pass on the 16th pack) returned clarity 5/5, enjoyment 4/5,
  mechanics flawless, ZERO bugs across all three endings, and confirmed the prior cycle's
  bug_0232 stale-prose fix holds. Its only concrete note was the standing brevity ceiling
  ("short and low-resistance once the board is read"), which the loop memory says to spend as
  the brief for the NEXT net-new pack rather than churn a clean one. The assessor's whole ranked
  list is six identical 0.5-floor blind-playtest stubs — the documented saturation signal
  ([[content-polish-backlog-exhausted]]) — and the standing lever is BREADTH. The choice of MODE
  was forced by the CRITICAL WATCH: the curated benchmark floor had thinned to 0.357 vs the 0.35
  CURATED_FLOOR (benchmark_headline_no_regression), so the next bot-UNSOLVABLE puzzle pack would
  have breached it. bug_0231's own verification note named the fix in advance: "a CYOA the bot can
  complete to offset the dilution." This cycle ships exactly that.

what_shipped: >
  The project's 17th pack and 7th CYOA — The Midnight Edition (content/cyoa/pack/midnight_edition.yaml),
  a deliberately BOT-COMPLETABLE curated CYOA in a wholly new setting (a Victorian small-town
  newspaper at the dawn lock-up; no overlap with the lighthouse/manor/watchtower/hunt/sea-navigation/
  village packs). The heart is a DILIGENCE fork — distinct from wreckers_light's pure moral mirror
  and from the linear lock-and-key chains: you are the night sub-editor closing the front page as a
  source's letter accuses the town's benefactor Garrow of causing (and buying the inquest on) the
  weir-sluice drownings that killed three of his own men. The decisive verb is the SAME on the
  winning and the losing print route (set the column, pull the bed-lever); what decides the night is
  WHAT YOU KNOW WHEN YOU PULL IT —
    * verify FIRST (read_letter → search_desk for the spare key → open_safe → read_report ⇒
      knows_proof) THEN print → ending_vindicated (the considered win: the story is PROVEN by a
      Crown inspector's signed report, so Garrow cannot sue a word of it);
    * print on the source's word ALONE (no knows_proof) → ending_libel (courage without diligence:
      one charge is wrong, Garrow sues, the paper is broken and an innocent clerk wrongly named);
    * pull the story, set the safe notice → ending_spiked (the complicit pole);
    * go out to Garrow's men with their wrecking-bar at the alley door → ending_silenced (the rash
      pole, plainly telegraphed before the door is opened).
  Both bad poles are telegraphed before they fire (the letter warns one charge is unproven and that
  the proof is in Garrow's safe; the press-floor prose names plainly that printing on the word alone
  gambles a man's name; the alley scene shows the men and the bar), per §8.7 / bug_0123 "never an
  ambush". Reactive variants keep every scene honest about state it changed (letter read, safe open,
  proof in hand) — the bug_0232 stale-prose discipline applied from the start. CYOA has no score
  economy and no `death` field, so the failure poles are narrative, not typed deaths.

why_bot_completable: >
  The benchmark VALUE is the discrimination "did the agent do the diligence before the irreversible
  act" — which the planning-free coverage bot has no plan for — while the pack still COMPLETES for
  that bot because the two trivially-reachable poles (spike, silenced) and the unverified-print pole
  are each one direct choice from a hub/sub-scene, exactly the wreckers_light/watchtower_road
  skeleton that scores in the completable CYOA band. The considered ending (vindicated) is gated
  behind a four-step read-and-verify chain a greedy no-planning agent reaches only by covering
  everything first.

repro: >
  Win (the considered route):
    read_letter; go_office; search_desk; open_safe; read_report; leave_office; go_press; print_verified
      → ending_vindicated.
  Diligence gate witness: at the press floor the legal-action set offers print_verified ONLY when
  knows_proof holds and print_unverified ONLY when it does not (mutually exclusive), and search_desk
  is not offered until read_letter — so a player who skipped the verify chain literally cannot reach
  ending_vindicated.
  Libel: go_press; print_unverified → ending_libel (word alone, no proof).
  Spiked: go_press; spike_story → ending_spiked. Silenced: go_alley; confront_men → ending_silenced.

verification: >
  npm run health GREEN. New pack validates clean (cyoa, 0/0). Auto-discovered CYOA suites cover it
  the moment it ships (all four endings reachable via exhaustive concrete BFS; endings render cleanly;
  action-id uniqueness; variant liveness + most-specific-first shadowing; no inert flag; no soft-lock
  terminal; metamorphic id-invariance + observation-stream isomorphism). The pack-SPECIFIC diligence
  fork is locked by tests/regression/midnight_edition_branching.test.ts (four distinct endings; the
  print_verified XOR print_unverified knows_proof gate in the legal-action set; the search_desk
  read_letter gate; same intent → win-with-proof vs ruin-without). Scorecard regenerated at runs=50:
  curated rose 17 packs to 0.366 (was 0.357 at 16; comfortably ≥ 0.35 floor — headroom restored from
  ~0.007 to ~0.016), held-out unchanged 0.299, the curated→held-out split gap WIDENED 0.058 → 0.067
  (≥ 0.05 MIN_SPLIT_GAP). cyoa-curated per-mode dipped 0.680 → 0.657 (the new pack is a moderate
  ~0.513 coverage score, like dead_reckoning/tithe_barn/white_stag, not a 100%-completion sibling),
  which is the intended dilution direction: it lifts the OVERALL curated mean (where the floor guard
  lives) while staying a genuine reasoning test.

next_focus: >
  Curated floor headroom restored to ~0.016 — but a future bot-unsolvable curated puzzle pack will
  again erode it; the durable fix remains the keyed real-model benchmark run (ultraplan true-goal
  pivot), which populates the model rows the scorecard is built to hold and makes the coverage-bot
  floor a secondary signal. Rotate the next mandated blind pass onto the least-recently-played pack
  (NOT tide_mill, played two cycles running).

status: shipped
