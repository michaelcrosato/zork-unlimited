id: bug_0339
pack: cellarmans_dark_v1
title: "cellar rooms still placed taken tools and deed-box at starting positions"
severity: minor
scene: ale_cellar / wine_vault
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the oil-lamp or tinderbox in the ale cellar, LOOK still used base
  prose saying the lamp hung from the bracket and the tinderbox sat on the ledge.
  After lighting the lamp while holding the tinderbox, the lit-cellar variant
  still said the tinderbox was on its ledge. After taking the deed-box in the wine
  vault, LOOK still said the deed-box stood beside the cash-box.

root_cause: >
  The ale cellar had only a generic `lamp_lit` variant and no variants for the
  observable tool-held states. The wine vault had no variant reading
  `has_item: deed_box`, so the post-TAKE, pre-win state fell back to fixed starting
  prose.

fix: >
  Added ordered ale-cellar variants for lamp/tinderbox held states and reachable
  lit-lamp held-tool states, and added a wine-vault variant for the deed-box held
  state. Pure prose/content change: no exits, effects, score, or win conditions
  changed.

tests: tests/regression/cellarmans_dark_reactive_taken_items.test.ts
