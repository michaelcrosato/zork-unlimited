id: bug_0159
title: "Procedural RPG pack generator — the mode-widening slice of 'evolve the eval distribution'"
kind: engine
mode: rpg
severity: enhancement
layer: generator
artifact:
  source: src/gen/rpg_generator.ts
  test: tests/unit/rpg_generator.test.ts

summary: >
  The mandated blind pass this cycle (cold_forge, seeds 47/3 — the genuinely least-recently
  blind-played pack per [[assessor-blind-pass-rotation]]: last dedicated pass bug_0149) re-confirmed
  content is blind-clean: clarity 5/5, enjoyment 4/5, ZERO mechanical bugs across three runs (full-prep
  win, under-armed death, partial-prep knife's-edge win at HP 4). Its only note was the standing
  deliberate-brevity / breadth observation. Per [[content-polish-backlog-exhausted]] that is a breadth
  brief, not a polish edit to a clean pack — and the deterministic assessor has collapsed to the 0.5
  floor with every structural-proof axis closed (bug_0121..0158). The plan's standing next lever
  (docs/CURRENT_PLAN.md, [[fresh-pack-generator]]) is to EVOLVE the eval distribution so the verifier
  stops being a frozen, memorisable target (arXiv 2510.14253; [[verifier-assertion-guard]]). The CYOA
  generator (bug_0156→0157→0158) made the eval set a moving target — but only for the CYOA validator.
  bug_0159 WIDENS THE MODE: a pure, deterministic generator that MINTS fresh RPG packs, each held to
  the identical shipped RPG bar, so the moving target finally exercises the RPG-only validators —
  COMBAT winnability and SCORE-ECONOMY soundness — the richest verifier surfaces in the suite, which
  until now ran ONLY against the two frozen hand-authored RPG packs (sunken_barrow, cold_forge).
  Thematically convergent: this cycle's playtest target was itself an RPG pack.

mandated_blind_playtest:
  run: ai-runs/2026-06-03T07-43-13-701Z/playtest.md
  pack: content/rpg/quests/cold_forge.yaml
  seeds: [47, 3]
  result: >
    Three runs to both declared endings — ending_victory (50/50, full-prep and partial-prep) and
    ending_fallen (under-armed death). Clarity 5/5, enjoyment 4/5, ZERO mechanical bugs. Confirmed
    transparent combat math, persistent stat buffs (spirit +2 atk, plate +2 def), retryable
    non-punishing skill check, score tying exactly to max_score (50), and a real lethal failure state.
  triage: >
    No actionable content defect — cold_forge is blind-clean and its mechanics were confirmed working,
    not bugs. The only note was deliberate brevity, the standing breadth critique. Rather than
    manufacture an edit to a clean pack or author a redundant hand RPG pack, the cycle advanced the
    plan's named next lever (mode-widening the generator), using the RPG mode's distinctive validators
    as the brief: the generator emits the SAME proven hero's-quest shape at scale, so the COMBAT and
    SCORE-ECONOMY checks face a never-seen, ever-widening distribution every run.

what:
  - >
    src/gen/rpg_generator.ts — generateRpgPack(seed): a PURE, DETERMINISTIC (§8.5; mulberry32 over the
    integer seed, no Date/Math.random) function returning a schema-valid RpgPack of the proven
    cold_forge hero's-quest shape: a linear descent (entry → hall → gallery → hearth → vault) plus one
    optional side cell; an NPC whose counsel grants a one-shot +2 attack and signposts an optional
    +2-defense ward; one WINNABLE fight (enemy tuned to cold_forge's bug_0101-proven hp18/atk7/def2 —
    winnable on best reachable stats, a lethal gamble at base); one PASSABLE seeded might check to
    lever the sealed way open; a score economy whose three awards sum EXACTLY to the declared
    max_score; and two endings (relic-claimed victory + the foe's death ending). The seed selects the
    theme (5 settings), the skill difficulty (10–14, always passable), and the three award amounts
    (each from {10,15,20}, so max_score varies 30–60 while staying tight), so the eval distribution
    genuinely varies without any path becoming unprovable, the fight unwinnable, or the score
    unreachable. The emitted object is run through RpgPackSchema.parse as a generator self-check.
  - >
    The generated packs are NOT committed under content/rpg/quests: an on-demand eval distribution, not
    curated showcase content — so they incur NO blind-playtest obligation and never pollute the
    hand-authored set. Additive new files only; no engine/validator/schema/content change.

bar:
  - >
    tests/unit/rpg_generator.test.ts (27 cases) holds generated packs to EXACTLY the shipped RPG bar,
    no weaker generator-specific check: (1) determinism — same seed ⇒ byte-identical pack; (2) distinct
    seeds (different themes) ⇒ distinct packs (anti-vacuity); (3) across 24 seeds each pack is
    schema-valid, validateRpg-CLEAN (ZERO findings of ANY severity — the full parser bar PLUS the RPG
    bar, so COMBAT_UNWINNABLE / SCORE_UNREACHABLE / SKILL_CHECK_IMPOSSIBLE are all genuinely exercised),
    and exhaustively solvable by the shared exhaustiveEndingsMulti best/worst-roll bracket (both
    declared endings reached, none undeclared, no cap-out), guarded by the same no-HP-gated-routing
    assertion the shipped RPG suites use; (4) the path to victory is gated on BOTH the fight (east exit
    on the defeat flag) and the skill check (down exit on the levered quest stage) — proving the gates
    are load-bearing, the RPG analogue of the CYOA generator's truth-gate proof.

verify:
  - "npm run health — EXIT 0; verify:integrity static OK (0/0); typecheck + ESLint + Prettier clean."
  - "Additive new files only (generator + unit test + this artifact): no test deleted/disabled, no count regression, no hash re-pin, no guard weakening (verify-integrity.ts untouched)."

next:
  - >
    Continue the generator's deferred slices for the new mode, mirroring the CYOA program's order:
    (a) an MCP tool surface (generate_rpg_pack / new_game(generate_rpg_seed)) — the bug_0157 analogue;
    (b) an assessor mint-and-check lever that mints-and-validates a fresh RPG pack each cycle so the
    COMBAT/SCORE validators become a LIVE, self-renewing eval signal — the bug_0158 analogue, the
    actual cure for the 0.5-floor stall on the RPG axis; (c) persistence of a post-cutoff-timestamped
    held-out corpus (the contamination control, [[ultraplan-true-goal-pivot]]); and deepen the RPG
    generator (multiple enemies, a combat_guaranteed fairness variant, deeper maps) so it stresses MORE
    of the RPG validator each cycle. The keyed real-model author→play→fix→lock run remains the
    highest-value move overall but stays gated on owner API-key authorization.
