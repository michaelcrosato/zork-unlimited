bug_id: bug_0140
pack_id: null   # engine/agent feature, not a content defect — extends the authoring pipeline itself
seed: 41
type: engine_feature
layer: engine_rule   # agents/authoring (adapter + mock provider) + bin/author; deterministic, no LLM-judge, no API key
evidence:
  source: blind_playtest + ULTRAPLAN
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T16-44-22-598Z/playtest.md   # cold_forge seed 41 (the cycle's mandated, assessor-rank-1 target AND least-recently blind-played pack)
  finding: >
    The mandated blind pass on The Cold Forge (rpg; seed 41) reached BOTH declared
    endings (ending_victory 50/50 on the careful "gear up" route; ending_fallen, a death,
    on the hasty "rush under-armed" route — a fair, earned loss by a single exchange) and
    rated the pack clarity 5/5, enjoyment 4/5, ZERO bugs — content is blind-clean. So
    there was NO actionable content defect this cycle: per [[content-polish-backlog-exhausted]]
    / [[verifier-assertion-guard]] the deterministic assessor is collapsed to the 0.5
    floor with every self-extinguishing structural lever disarmed. The highest-value move
    is the on-plan lever bug_0139 named as next-focus #1: extend the author -> validate ->
    revise loop beyond CYOA + parser to RPG, closing the authoring pipeline over all three
    engine modes and putting the project's RICHEST validator (validateRpg) behind a real
    authoring loop (ULTRAPLAN §Week.4).
root_cause: >
  The authoring pipeline (agents/authoring) covered only CYOA (bug_0139 base) and parser
  (bug_0139): the adapter could route through validateCyoa or validateParser, but never
  validateRpg — the project's deepest validator, which runs every parser invariant
  (reference integrity / reachability / soft-lock / win-reachability) PLUS the Stage-4
  layer (player stat vars, enemies in real rooms naming declared DEATH endings, combat
  winnability, skill-check passability). So the Stage-4 RPG checks were never exercised by
  the author loop. The true goal (a contamination-free benchmark of a real model AUTHORING
  validated games) is undersold while authoring cannot reach the richest mode.
fix: >
  Engine/agent, trust-but-verify (deterministic; no clock/RNG; no LLM-judge; no API key —
  runs under the default MockAuthorProvider). (1) Added runRpgAdapter, a third call into the
  existing mode-agnostic runAdaptLoop, parametrized to route an RPG pack through validateRpg;
  runAdapter (CYOA) and runParserAdapter (parser) are untouched. (2) Added RpgAdapterOutputSchema
  (RpgPackSchema + the same per-beat classification) to agents/authoring/schemas.ts. (3) Extended
  MockAuthorProvider with a canned RPG pack — the same Lighthouse story adapted to a Stage-4
  shape: player stats (hp/attack/defense/might), a drowned-wrecker foe whose defeat_flag opens
  the stair, and a might skill check to free the salt-locked lamp; the win turns on BOTH (beat
  the wight AND pass the check), so combat and the skill check are each load-bearing. Its FIRST
  attempt ships an RPG-SPECIFIC defect — a wight whose death_ending names an undeclared ending
  — corrected once the validator's errors are fed back. (4) bin/author --mode gained rpg
  (default cyoa unchanged).
within_bar: >
  No engine/runtime/validator/schema CHANGE — validateRpg and RpgPackSchema are reused as-is.
  No content pack edited. NO hash pin moved. runAdaptLoop was already generic (bug_0139), so
  the CYOA and parser paths are behaviour-preserving (their existing authoring tests still pass).
  verify:integrity stays green; the only expected drift signal is the touched-file set, not any
  count regression.
verification:
  regression_test: tests/regression/rpg_authoring_loop.test.ts
  unit_test: tests/unit/authoring.test.ts   # added an rpg-adapter parity block
  pins: >
    The first RPG attempt is genuinely REJECTED by validateRpg with ENEMY_DEATH_ENDING_UNDECLARED
    — a Stage-4-ONLY code the parser validator alone would NOT raise (the test asserts the same
    pack passed to validateParser does not raise it), so the RICHEST validator decides correctness,
    not the model (§16); the loop converges to a GREEN RPG pack in a corrective round (rounds>=2);
    the produced pack independently re-validates green AND is a genuine Stage-4 shape (enemies +
    positive stat vars + a skill check); it is actually playable to its win through the RPG engine
    under forced best rolls — combat (2 rounds) AND the might skill check both required; and the
    shared-loop refactor leaves the parser and CYOA paths green.
  health: npm run health  # verify:integrity + lint + typecheck + full suite + validate + playtest, EXIT 0
notes: >
  Authoring is now MODE-COMPLETE across all three engine modes (CYOA / parser / RPG), each
  behind its real validator. The API-keyed keystone (a REAL frontier model driving
  runWriter/runRpgAdapter) stays deferred per docs/ULTRAPLAN-2026-06-02.md; this lands the
  key-free half — a real provider slots in behind the env var with no further wiring. The mock
  RPG pack is in-memory only (not under content/rpg/pack), so it does not enter the
  health-covers-all-packs bar or the exhaustive RPG ending-reachability solver.
