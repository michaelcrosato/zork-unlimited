bug_id: bug_0018
pack_id: clockwork_heist_v1
seed: 53
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T07-43-50-884Z/playtest.md
  finding: >
    Playtest target rotated off the heavily-polished watchtower_road (assessor
    rank-1; its "unvisited" scenes are the deterministic coverage bot's known
    puzzle-solving limit, not pack flaws) onto the CYOA pack The Clockwork Heist.
    A fresh, MCP-only blind playtester reached all three endings, rating it
    clarity 4/5, enjoyment 3/5, mechanically clean (no rejected actions, no loops,
    no soft-locks). Its #1 concrete finding (report §5), hit TWICE — once in place
    and again after leaving and re-entering — and matching the deferred bug_0017
    §5(b) next-focus note: the Cold Kitchen prose is static and contradicts the
    state the player just changed. After `take_pick` (lockpick → inventory, the
    take action correctly disappears), the room STILL reads "By the dumbwaiter, a
    servant has left a slim roll of lockpicks" — the lockpicks are in the player's
    pocket but the room insists they are still there.
failure:
  type: stale_scene_text
  where: [engine:src/cyoa/schema.ts, engine:src/cyoa/runner.ts, engine:src/cyoa/observation.ts]
  description: >
    A CYOA scene carried exactly one static `text` string, rendered verbatim by
    the observation builder regardless of state. The reactive-text `variants`
    feature existed only on the parser/RPG RoomSchema (bug_0010 / bug_0011), never
    on CYOA scenes, so any CYOA scene whose state can change (an item taken, a
    panel pried, a door opened) keeps narrating the pre-change world — a
    player-facing contradiction. The bug_0017 cycle explicitly logged this as a
    generic capability "worth its own cycle".
fix:
  layer: engine
  summary: >
    Generic, pack-agnostic engine feature: reactive CYOA scene text, mirroring the
    parser RoomSchema.variants feature from bug_0010. (1) src/cyoa/schema.ts:
    SceneSchema gains an optional `variants` array of { when: Condition[], text }
    (SceneVariantSchema), declared `.optional()` (NOT `.default([])`) so a scene
    without variants compiles byte-identically and no other pack's content hash
    drifts (bug_0010's lesson). (2) src/cyoa/runner.ts adds a pure helper
    sceneText(scene, state) = the first variant whose `when` conditions all hold
    (declared order, first-match-wins), else the base `text`. (3)
    src/cyoa/observation.ts: textFor() now takes state and routes a scene's text
    through sceneText (the single CYOA render site; endings have no variants).
    CONTENT: content/cyoa/pack/clockwork_heist.yaml kitchen gains a
    `when: [{ has_item: lockpick }]` variant whose text reports the bare spot where
    the lockpicks lay. No flags, items, choices, gating, or reachable endings
    change — only the narrated scene text reacts.
  reachable_endings_changed: false
  content_hash_changed: true   # clockwork_heist yaml: 1b121b1a... -> 587116384afa64bfc3d6a5473d69fce3d64256d87426df36aed07a594c42fa5a (unpinned; only watchtower_road is pinned)
regression_test: tests/regression/cyoa_reactive_scene_text.test.ts
verified_live: >
  Through the engine source path (seed 53): kitchen reads "a servant has left a
  slim roll of lockpicks" before take_pick; flips to "the spot where the lockpicks
  lay is bare — the slim roll is in your pocket now" immediately after, and stays
  flipped after leaving to the foyer and re-entering. ending_rich (grab gold) and
  ending_truth (crawlspace) both still fire.
