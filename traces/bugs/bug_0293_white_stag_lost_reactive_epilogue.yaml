id: bug_0293
title: "white_stag ending_lost missing knows_truth reactive epilogue"
severity: content
class: reactive-ending-blindness
pack: white_stag_v1
scene: ending_lost

description: >
  ending_lost (The Black Water) was reachable with knows_truth set
  (read_stone → decipher → leave_stone → cross_ice) but its single fixed text
  never acknowledged the player had read the stone's warning. The base text
  "The wood keeps its heart. It does not give up the foolish, or the hide they
  came for." reads as though the player acted in ignorance, even when they
  knew the stag was the winter's keeper whose killing would freeze the valley.
  The reactive-epilogue device (quarry and thaw both reframe on knows_truth;
  offering is gated on it so always a knowing act) was incomplete — the death
  ending was the one non-gated terminal missing its informed variant.

fix: >
  Added a knows_truth variant to ending_lost that opens "You step out onto
  the ice KNOWING" (mirroring tithe_barn ending_fall's structure), names the
  stone's warning explicitly, and closes "You read the stone. You knew. The
  wood keeps its keeper, and loses only the one who crossed to take it." The
  base text is unchanged and remains the correct epilogue for the uninformed
  crossing (go_on → cross_ice with no stone read). Both paths reach
  ending_lost; the variant is cosmetic prose only — no flag/score/route/ending
  change.

regression: tests/regression/white_stag_branching.test.ts (new describe block
  "white_stag — knows_truth fires reactive epilogue on ending_lost (bug_0293)",
  4 cases: informed → "you knew" / "wood keeps its keeper"; base → "the foolish"
  / no "you knew"; both reach ending_lost; informed route verifies knows_truth set)

lineage: reactive-ending-blindness class (bug_0271 dead_reckoning hub,
  bug_0272 tithe_barn fall, bug_0273 wreckers drowned, bug_0275 cold_forge,
  bug_0276 barrow woken, bug_0279 friars_postern gate)
