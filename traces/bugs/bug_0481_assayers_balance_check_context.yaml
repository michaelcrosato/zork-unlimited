bug_id: bug_0481
pack_id: assayers_mark_v1
seed: 7
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: blind-tester/reports/20260623T001332Z_assayers_mark_seed7.md
  finding: >
    The mandated blind pass found The Assayer's Mark mechanically clean and reached
    the full-score report ending, but flagged the coin-balance skill check as a
    prominent optional d20 action whose benefit and consequence were opaque. The
    visible action did not explain whether weighing the plate mattered, and success
    or failure did not obviously affect score or ending.
failure:
  type: optional_skill_check_context_gap
  scene: weighing_room
  description: >
    The coin-balance check is intentionally convergent and non-scoring: it is a
    corroborating note, while the touchstone and commission paper carry the case.
    Before this fix, that design was not visible in the live room or command text.
    A careful player could read the check as a hidden requirement, a dead action, or
    an unexplained risk.
fix:
  layer: content
  pack: content/parser/pack/assayers_mark.yaml
  summary: >
    Added weighing-room variants for the states before and after the optional balance
    check. Before the check, the room now says weighing Fitch's porringer is
    corroboration and that only the touchstone can settle the assay. After the check,
    it records that the weight note is made and reiterates that the touchstone and
    commission paper still carry the case. Added a command_template so the visible
    command reads "weigh silver plate on coin balance". The skill check, outcomes,
    score, routes, endings, and gates are unchanged.
  reachable_endings_changed: false
  content_hash_changed: true
  new_pack_hash: 9eece373840e50686819b62ec52ef0a76b0bc41c960fe20f8b5b2d39fadf4270
  regression_test: tests/regression/assayers_balance_check_context.test.ts
verified_live: >
  Focused regression coverage passed: assayers_balance_check_context,
  assayers_gate_prose_sync, assayers_seal_press_branch, and
  assayers_mark_reactive_taken_items ran 18 assertions green. Pack validation
  reports OK with 0 errors and 0 warnings for content/parser/pack/assayers_mark.yaml.
playtest_coverage:
  note: >
    This is a polish fix from a clean blind run. The optional precision check remains
    convergent and non-scoring; the change makes its purpose and non-critical status
    legible before and after the player chooses it.
