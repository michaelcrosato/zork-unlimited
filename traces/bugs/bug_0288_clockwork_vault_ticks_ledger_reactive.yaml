id: bug_0288
title: "clockwork_heist: vault ticks>=2 variant says 'you know what the hour wakes' without read_ledger set"
pack_id: clockwork_heist_v1
severity: content
class: reactive-description-blindness
where: [content:content/cyoa/pack/clockwork_heist.yaml]

summary: >
  The vault scene's ticks>=2 variant read "Past the gallery the great clock grinds
  toward the hour, and you know what the hour wakes: fill your hands and be gone
  before the chime sets the watchman walking." This presupposes the player read the
  steward's ledger and therefore knows the watchman walks on the hour. A player who
  reaches the vault at ticks 2-3 without reading the ledger ‚Äî via kitchen‚Üídumbwaiter‚Üí
  approach_vault (which requires only ticks<=3 OR read_ledger) ‚Äî sees the "you know"
  claim even though they have no established reason to know it. Same reactive-
  description-blindness class as bug_0282, bug_0283, bug_0284, bug_0286, bug_0287.

  Note: the ticks>=4 vault variant is implicitly ledger-gated ‚Äî a no-ledger player
  past the hour is routed to ending_patrol via cross_to_vault_blind, never reaching
  this room ‚Äî so "the ledger swears you can go back out" in that tier is always
  correct and requires no companion.

discovery:
  method: blind_playtest
  seed: 42
  report: ai-runs/2026-06-08T05-13-39-593Z/playtest.md
  note: >
    The blind playtester (seed 42, run 4) reached the vault at ticks=2 without reading
    the ledger (foyer‚Üíkitchens‚Üítake_pick‚Üídumbwaiter‚Üíapproach_vault‚Üípick_lock‚Üívault)
    and flagged: "the vault text uses 'you know what the hour wakes' without the ledger
    read ‚Ä¶ the player never read the ledger and therefore has no established reason to
    know this." Rated clarity 5/5, enjoyment 5/5; this was the one concrete bug in ¬ß5.

fix:
  layer: content
  description: >
    Added a ticks>=2 AND has_flag:read_ledger variant ABOVE the plain ticks>=2 tier
    (first-match-wins). The read_ledger variant keeps the original "you know what the
    hour wakes: fill your hands and be gone before the chime sets the watchman walking"
    ‚Äî appropriate for a player who earned that knowledge. The plain ticks>=2 tier
    (ledger-agnostic fallback) removes "you know what the hour wakes:" and "the watchman"
    (unknown without the ledger), replacing with "fill your hands and be gone before the
    chime sets the manor stirring." No choice/flag/effect/item/exit/gating/ending change ‚Äî
    prose only.
  content_hash_changed: true  # clockwork_heist yaml: unpinned in tests

regression_test: tests/regression/clockwork_vault_ticks_ledger_reactive.test.ts

