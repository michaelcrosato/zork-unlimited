id: bug_0156
title: "Procedural CYOA pack generator — the first slice of 'evolve the eval distribution'"
kind: engine
mode: cyoa
severity: enhancement
layer: generator
artifact:
  source: src/gen/cyoa_generator.ts
  test: tests/unit/cyoa_generator.test.ts

summary: >
  The mandated blind pass this cycle (tithe_barn, seed 13) re-confirmed content is blind-clean:
  clarity 5/5, enjoyment 5/5, ZERO mechanical bugs across all three reached endings; its only note
  was the deliberate brevity every single-fork pack draws ("it's a vignette"). Per
  [[content-polish-backlog-exhausted]] that brevity note is spent as a breadth brief, not a polish
  edit to a clean pack. But hand-authoring an 11th CYOA pack (already 6 of 10 packs) is the churn the
  saturation-triggered ultraplan (docs/CURRENT_PLAN.md) named and rejected: with the deterministic
  assessor collapsed to the 0.5 floor and every structural-proof axis closed (bug_0121..0155), the
  plan's standing "strongest NEXT move" is the OTHER convergent research lever — evolve the eval
  DISTRIBUTION so the verifier stops being a frozen, memorisable target (arXiv 2510.14253;
  [[verifier-assertion-guard]]). bug_0156 lands the first, self-contained slice of that: a pure,
  deterministic generator that MINTS fresh CYOA packs, each held to the identical shipped bar.

mandated_blind_playtest:
  run: ai-runs/2026-06-03T07-04-25-204Z/playtest.md
  pack: content/cyoa/pack/tithe_barn.yaml
  seed: 13
  result: "reached ending_fall, ending_doors, ending_bounty; clarity 5/5, enjoyment 5/5; ZERO bugs; knows_truth gate confirmed load-bearing (open_doors present when known, absent when ignorant)"
  triage: >
    No actionable content defect — tithe_barn is blind-clean and its knows_truth gate + reactive
    scene/ending variants were confirmed working, not bugs. The only substantive note was brevity,
    the standing critique of every single-fork pack. Rather than manufacture an edit to a clean pack
    or author redundant CYOA #11, the cycle advanced the plan's named next lever (a generator), using
    the "too short / vignette" note as the brief: the generator emits the SAME signature shape at
    scale — a knowledge-gated moral fork — so the distribution grows without hand-authoring each one.

what:
  - >
    src/gen/cyoa_generator.ts — generateCyoaPack(seed): a PURE, DETERMINISTIC (§8.5; mulberry32 over
    the integer seed, no Date/Math.random) function returning a schema-valid CyoaPack of the signature
    AdventureForge shape: a hub of plainly-labelled moral stances, an optional investigation that sets
    a `truth` flag, a truth-GATED "best" ending (tithe_barn's knows_truth / white_stag's carved stone /
    the watchtower's proof-gated finale), and one plainly-telegraphed lethal gamble. The seed selects
    a theme (6 settings) and the 2-vs-3 plain-stance branch, so the distribution varies while every
    path stays provable. The emitted object is run through CyoaPackSchema.parse as a generator
    self-check (a malformed emission throws at the source, never downstream).
  - >
    tests/unit/cyoa_generator.test.ts — holds every minted pack to the SHIPPED bar, reusing the
    production checks, no weaker generator-specific substitute: (1) determinism (same seed ⇒ deep-equal
    pack), (2) schema-valid, (3) validateCyoa reports ZERO findings of ANY severity (no soft-lock,
    unreachable/dead ending, impossible gate, inert flag, shadowed/unsatisfiable variant, duplicate
    ending), and (4) the shared exhaustiveEndings BFS (the bug_0121 ground-truth solver) reaches EVERY
    declared ending and no undeclared one without a cap-out — across 24 seeds. A dedicated case proves
    the truth gate is load-bearing: from the pristine hub `act_on_truth` is NOT offered and `investigate`
    IS, so the "best" ending is reachable only after the flag is set.

why: >
  Every structural proof in the suite (endings-reachable, variant-liveness, soft-lock liveness,
  score-economy, menu-integrity) runs only against a FIXED ten-pack set. A frozen eval set is exactly
  the condition under which a self-improving agent's verifier becomes memorisable rather than a moving
  target — the documented driver of the assessor's own 0.5-floor collapse and the reward-hacking result
  in arXiv 2510.14253. The IF/agentic literature's antidote is to EVOLVE the distribution; this is its
  minting core. It is key-free, makes no outbound model call, and is proven to the shipped bar by reuse
  of the very validator + solver that guard the curated packs.

scope_deliberately_excluded: >
  The larger slices are explicitly NEXT, kept out so this stays one focused, green-bar change
  (docs/CURRENT_PLAN.md rejected/next): an MCP tool to expose the generator, an assessor lever that
  mints-and-checks a fresh pack each cycle, and persistence of a held-out corpus. Generated packs are
  NOT committed under content/cyoa/pack — they are an on-demand eval distribution, so they incur no
  blind-playtest obligation and never pollute the hand-authored showcase set.

regression:
  test: tests/unit/cyoa_generator.test.ts
  guards: >
    A future generator change that emits an unclean or unsolvable pack fails loudly at the offending
    seed (validator findings non-empty, or a declared ending unreached / undeclared ending reached /
    state-cap hit). The determinism case fails if the generator stops being a stable corpus.

related:
