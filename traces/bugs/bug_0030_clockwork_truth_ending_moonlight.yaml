bug_id: bug_0030
pack_id: clockwork_heist_v1
seed: 113                          # the regression's deterministic seed (also the mandated blind-playtest seed this cycle)
type: content_fix                 # pure content; text-only reword of one ending
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T10-04-47-010Z/playtest.md   # clockwork_heist seed 113 — the cycle's mandated target
  result: >
    A fresh MCP-only blind playtester reached all three endings across four routes
    (Truth via the vault AND via the crawlspace strongbox, Caught, Rich), rated
    clarity 4/5 / enjoyment 3/5, hit zero rejected actions, no loops, no broken
    state. It raised three findings; two were dismissed on inspection and one was a
    genuine concrete on-screen continuity slip (report §5, item 3, hit on the
    crawlspace/strongbox route): "You break the seal by moonlight ... you slip out
    into the dark" reads while the player is standing in a windowless dusty
    crawlspace behind the clock, not anywhere with moonlight — the ending text is
    written assuming the (lit) vault/foyer route.
  dismissed_findings:
    - >
      "Dangling time-pressure / guard mechanic" (report §5 item 1, §5 item 4): NOT a
      defect. The guard patrol DOES fire — at ticks>=6 the gallery variant shows the
      watchman and `cross_to_vault_blind` -> ending_patrol; reading the steward's
      ledger grants the safe crossing (the approach_vault `any_of:[ticks<=5,
      read_ledger]` gate). The "running short" line is honest foreshadowing of that
      ticks>=6 guard; an efficient player who keeps ticks low simply never needs the
      ledger. Documented and deliberate since bug_0019/bug_0025 — tightening the
      deadline would punish efficient play, which bug_0019 deliberately avoids. Not
      chased.
    - >
      "No final score shown at any ending" (report §5 item 2): NOT a defect. clockwork
      is a CYOA pack with no `meta.max_score` / scoring system, so there is no score
      to total. bug_0026 added the end-of-game score summary to scoring parser/RPG
      packs (which carry max_score); CYOA packs use a separate observation and were
      intentionally untouched. The playtester misread the bug_0026 commit message.
      Showing a score here would invent one. Not chased.
  rotation_rationale: >
    Per the protocol's "you MAY pick a different candidate if your judgement and the
    playtest say it's higher value": the assessor's standing rank-3 lever is the
    repo/ESLint+Prettier tooling gap, but that is a large, unbounded "repo/L" change
    (src ~4.6k LOC across 41 files; 107 TS files total) with real risk of a mid-cycle
    red health gate, and the Hard constraints explicitly steer toward "a small,
    verified change over a broad rewrite". This cycle closes the SOLE genuine concrete
    on-screen defect the MANDATED playtest surfaced — a small, safe, player-facing fix
    with direct precedent (bug_0017/bug_0025). ESLint+Prettier is re-logged as the
    next lever.
finding: >
  ending_truth is a SHARED ending reached two ways — through the vault (take the
  sealed letter off the velvet cushion) or through the hidden crawlspace behind the
  great clock (crack the iron strongbox; bug_0022 made it a true lockbox). The old
  prose opened "You break the seal by moonlight. ..." — presuming the player breaks
  the seal in a moonlit spot. The manor's only moonlight is the foyer's glass dome;
  the vault and the crawlspace are both interior, and the crawlspace is explicitly a
  windowless, dusty passage behind the clock. So on the strongbox route the player
  breaks the seal nowhere near moonlight, narrating a setting the route never
  provided. Same class as bug_0017 / bug_0025 — shared ending prose presuming one
  specific route.
improvement:
  layer: content                  # pure content; no engine/validator/schema change
  content:
    - content/cyoa/pack/clockwork_heist.yaml: >
        ending_truth reworded so the seal is broken AFTER the escape: "You break the
        seal by moonlight. ... instead you slip out into the dark carrying nothing but
        the truth." -> "You slip out into the dark with the letter still sealed, and
        break it open by moonlight only once the manor's walls are well behind you.
        ... instead you carry away nothing but the truth." Breaking the seal outdoors,
        after leaving the manor, is true on BOTH the vault and the crawlspace/strongbox
        routes (both end with the thief slipping out into the night), so the evocative
        moonlight is kept without presuming an interior, lit setting at the moment of
        the reveal. The bug_0025 route-agnostic gold framing ("could have vanished rich
        on its hoard") and the truth-over-riches moral ("Some things are worth more
        than escaping rich") are preserved. No flags / items / choices / gating /
        reachable endings change.
  engine:
    - none: text-only content edit; no src/ change, no validator change.
verification:
