  content_hash: 833822baa1065fc4e01a4851f99397e87033fb9cd23ba35df4fabfe080fdc3e3   # was 85b5dda6998e19c7d55a27484ffb2368febcacde145889508d134ab03b6e2f66 (bug_0025); surfaced, not laundered. Unpinned (only watchtower_road is pinned in tests).
  health: exit 0 (verify:integrity OK, format:check + lint + all tests + every pack validate + watchtower coverage)
  reachable_endings_unchanged: [ending_truth, ending_rich, ending_caught, ending_patrol]   # text-only; crawlspace + vault take-letter routes still reach ending_truth, grab-gold -> ending_rich, force -> ending_caught
closes_deferred:
  - bug_0025 deferred residue — the shared ending_truth prose's last route-presuming clause (the moonlit seal-break) is now route-agnostic.
deferred:
  - >
    The repo/ESLint + Prettier tooling gap (lint is still just tsc — the assessor's
    standing rank-3 repo candidate). With every pack blind-verified and per-pack
    content polish at deep diminishing returns, this is now the strongest remaining
    lever; it is "repo/L" (unbounded, ~4.6k src LOC) so budget a cycle for it.
  - >
    No opening objective line in the Sunken Barrow's barrow_mouth — the circlet goal
    is revealed only in the final room (bug_0027 deferred[1]; bug_0015 deferred[2]).
    A one-line orientation framing would help a first-timer; small, content-only.
  - >
    Deadline legibility on clockwork (balance, not a defect): an efficient player
    keeps ticks low and never sees the ticks>=6 guard patrol (which DOES fire ->
    ending_patrol, locked since bug_0019). The "running short" line reads as a
    Chekhov's gun for such a player. Tightening it would punish efficient play, which
    bug_0019 deliberately avoids — leave as atmosphere unless reframed wholesale.
regression_test: tests/regression/clockwork_truth_ending_moonlight.test.ts   # 3 cases: (1) the seal is broken after the escape, not "by moonlight" indoors, keeping the moral + bug_0025 gold framing; (2) the windowless crawlspace/strongbox route still reaches ending_truth; (3) reachability unchanged — vault take-letter -> truth, grab-gold -> rich, force -> caught.
