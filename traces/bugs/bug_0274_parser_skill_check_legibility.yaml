bug_id: bug_0274
pack_id: sealed_crypt_v1
seed: 13
initial_state: crypt
# Surfaced by the mandated blind playtest this cycle (general-purpose subagent, MCP-only, no
# content/src/ui/tests access; seed 13; report ai-runs/2026-06-05T06-17-21-081Z/playtest.md).
# The pack came back STRONG — clarity 5/5, enjoyment 4/5, all THREE forks reached
# (victory 35/35 / plunder / doom-death), mechanically flawless ("zero rejected actions,
# zero broken state, no loops") — with TWO cosmetic §4/§5 findings that share ONE root: the
# `nerve` stat is shown in the observation's state.vars every turn but "reads like a stat
# with no mechanical role," and the `grip iron key` self-USE that rolls it "reads oddly … a
# flavor/no-op self-use." In fact `nerve` IS the var rolled by the crypt's optional `grip
# iron key` convergent skill check (d20 + nerve vs 12) — but the parser observation exposed
# only the action's { id, command, action }, so NOTHING on screen ever told a player a stat
# was in play. This is the ENGINE-wide PARSER/RPG sibling of the CYOA bug_0269 gap, not a
# sealed_crypt-specific content flaw: it would read the same for any parser/RPG pack with a
# skill-checked USE (e.g. tide_mill `nerve`, breaking_weir `nerve`, wolf_winter `defense`).
findings:
  - id: skill_checked_parser_use_does_not_surface_its_stat
    where: engine:src/parser/legal_actions.ts (enumerateActions USE) + src/parser/observation.ts + src/rpg/observation.ts
    severity: low
    description: >
      Parser/RPG skill checks are a first-class mechanic (the runner rolls d20 + the named
      skill var vs difficulty, resolveSkillCheck), and the rolled skill var is shown in the
      observation's `state.vars`. But a skill-checked USE was surfaced in `available_actions`
      as only `{ id, command, action }`, identical to a plain command. So a declared skill var
      whose sole consumer is a skill-checked USE — `nerve`, rolled by `grip iron key` —
      appears purposeless: the player sees the number but no command ever advertises that a
      stat is being tested. A blind playtester rated the pack 4/5 enjoyment and named the inert
      stat + the odd self-use among the only things keeping it from a perfect score.
    fix: >
      `enumerateActions` now attaches a `skill_check: { skill, difficulty }` annotation to a
      skill-checked USE option (`ParserActionOption.skill_check`); `buildParserObservation`
      and — via the shared enumeration `enumerateRpgActions` wraps — `buildRpgObservation`
      surface it on the action. It carries ONLY the rolled var and the difficulty — never the
      check's `on_success`/`on_failure` effects, which carry score/flag/end_game routing, so the
      destination graph stays hidden by construction (exactly as a plain command never exposes
      its effects). The field is OMITTED on every non-skill action (plain commands AND ATTACK),
      so the observation is byte-identical to the legacy shape for every existing pack's plain
      commands. The web UI renders the annotation as a "⟨nerve check, DC 12⟩" suffix on the
      command label (ui/src/engine.ts, parser + rpg branches). Generic and default-on (the
      opposite of the opt-in hide_graph difficulty): every pack's skill-checked USEs benefit, no
      per-pack authoring. No flag/var/score/exit/ending/quest/determinism change — the field is
      observation-only and never enters the state hash.
failure:
  type: design_legibility
  description: >
    No engine fault or determinism break — a missing player-facing annotation on a first-class
    mechanic. The skill var was correctly tracked and rolled by the parser runner; only the
    observation never told the player a stat was in play, so it (and the action that rolls it)
    read as vestigial. Caught by a fresh blind playtest the structural validators/solver cannot
    see — exactly the value of the §12.4 blind step. Both metamorphic per-step observation
    oracles (parser_metamorphic_observation_stream + rpg_metamorphic_observation_stream) were
    strengthened in lock-step: the newly-surfaced skill name is an IDENTIFIER (an author var), so
    it must (and does) map through the relabeling bijection, keeping the contamination-robustness
    witness sound and broader.
regression_test: tests/regression/sealed_crypt_skill_check_legibility.test.ts
notes: >
  General lesson (mirrors bug_0269): when a mechanic's PARAMETERS live only in state.vars but its
  INVOCATION is an action, surface the link on the action itself — a stat the player can see but
  can't connect to any command reads as dead weight, AND the command that rolls it reads as a
  no-op. The fix is engine-wide (all parser/RPG skill-checked USEs across both modes), not a
  reword of sealed_crypt's one beat, because the gap is structural. Closes the skill_check
  legibility class across all THREE modes (CYOA bug_0269 + parser/RPG bug_0274). Soundness note:
  surfacing skill+difficulty is appropriate legibility (a printed DC, like a tabletop check), NOT a
  benchmark leak — it reveals no destination room or effect, so it does not trivialize the
  spatial/branch reasoning the eval measures, unlike the room graph that hide_graph (bug_0137)
  deliberately hides.
