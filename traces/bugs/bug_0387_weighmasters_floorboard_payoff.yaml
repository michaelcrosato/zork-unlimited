id: bug_0387
pack: weighmasters_round_v1
title: "loose floorboard skill check had no payoff"
severity: moderate
scene: grain_loft
reported_by: blind_playtest_20260620T144105Z_weighmasters_round_seed7

symptom: >
  The blind playtester found the crowbar, used it on the badly re-nailed
  floorboard, passed a d20 check, and received only atmosphere. The board was
  visually prominent, the crowbar was nearby, and the action had a skill check,
  so the interaction looked important but delivered no item, clue, score, route,
  or later acknowledgement.

root_cause: >
  `board_checked` was authored as a private one-shot retire flag for a purely
  convergent tension beat. No room, object, ending, score, or journal surface read
  the result, so the most mechanically elaborate optional action in the pack
  behaved like a dead end.

fix: >
  A successful board check now reveals Cope's calibration cache: lead shavings,
  file marks, and a spare off-centre fulcrum casting. The finding is written to
  the journal, updates the grain loft and floorboard descriptions, retires the
  check, and adds an ending callback on the documented-win route. The required
  40-point proof chain and all ending identities are unchanged.

tests: tests/regression/weighmasters_round_floorboard_payoff.test.ts
