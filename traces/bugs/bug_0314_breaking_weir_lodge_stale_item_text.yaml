id: bug_0314
title: "breaking_weir keeper's lodge describes weir-iron and life-line after they are taken"
pack: breaking_weir_v1
class: reactive-description-blindness
severity: moderate
found_by: blind_playtest (ai-runs/2026-06-08T11-29-53-717Z/playtest.md, Bug 1)

symptom: >
  The keeper_lodge base description says "his weir-iron… leans by the door, and his
  life-line… hangs on its peg beside it" even after one or both items are in the
  player's inventory. A player who returns to the lodge between taking the tools and
  opening the relief-race sees both items still described as present in the room.

root_cause: >
  The room's static description text names both takeable objects unconditionally. The
  visible_objects list is correct (engine excludes held items), but the prose description
  has no has_item variants to shadow the stale references.

fix:
  type: content_only
  file: content/rpg/quests/breaking_weir.yaml
  change: >
    Added three new variants to keeper_lodge, ordered after the existing race_open
    variant (first-match-wins):
      (a) has_item:weir_iron ∧ has_item:life_line → "tools already in your hands" (omits both)
      (b) has_item:weir_iron only → life_line still on peg, iron omitted
      (c) has_item:life_line only → weir_iron still by door, line omitted
    No flag, score, choice, exit, or ending change.

regression_test: tests/regression/breaking_weir_lodge_items_stale.test.ts
