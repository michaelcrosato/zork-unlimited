improvement:
  layer: content   # purely additive; nothing on the existing critical path changes
  what: >
    Gave the forge its second beat — the Founder's Cell. Added a new side cell
    (founder_cell) reached by a new `west` exit off the Outer Forge, met BEFORE the
    sentinel, housing the age-dead last master of the forge. It mirrors the proven barrow
    reaver-shade shape (bug_0075), deepening the world AND offering one earned tactical
    choice:
      (a) an epitaph (readable) + a one-shot spirit lore-topic (ask_founder) that names the
          master who banked the dying fire's last coal into the Ember-Heart, set the
          sentinel to keep it, and walled himself in with the cold — and SIGNPOSTS the cell
          to the west. The topic sets heard_founder, journals (the line names "west"), and
          grants NO stat change by the telling; it then retires (one-shot, cannot be
          re-told). It loops back to spirit_root whose ungated leave_spirit keeps the node
          terminating (a gated-only escape would trip DIALOGUE_NONTERMINATING, bug_0014).
      (b) the master's cold-iron plate (takeable): TAKE it, then DON it (self-USE with
          command_verb `don`, bug_0074, so the offered + typed verb reads "don cold-iron
          plate", not the generic "use") for a one-time +2 DEFENSE (defense 2 → 4),
          journalled. Gated none_of plate_donned, so the don retires after the first use
          and the +2 cannot be farmed (mirrors the spirit's one-shot +2-attack counsel and
          the bug_0015 retire-after-success lever).
  honest_not_oversold: >
    The +2 defense is the honest DEFENSE complement to the lantern-spirit's +2 ATTACK
    counsel. Per the forge's honesty discipline (bug_0027/0029/0069/0071) it is not
    over-sold: the don narration says plainly the plate "will not swing your blade for you,
    but it will keep you standing to swing it yourself", and the spirit offers it as a
    moral choice ("Take it, if your conscience lets you"). Combat is d6 + atk − def (min 1),
    so a +2 ward EASES the sentinel's anvil-blows but never ZEROES them — the fight stays
    winnable AND lethal from base stats. The seed-1 playtester rated the fight a real even
    trade finishing at low HP, so easing it genuinely matters; the ward is optional grace,
    not a requirement.
  preserves_critical_path: >
    Nothing on the existing path changes — the rooms (sentinel fight / grate lever / ember
    chamber), the milestone scoring (still 50), the win (visited ember_chamber), the four
    spirit nodes, both endings, and every existing cold_forge regression stay green. The
    cell is a pure detour; the canonical victory route skips it entirely and never gains
    the +2 defense.
