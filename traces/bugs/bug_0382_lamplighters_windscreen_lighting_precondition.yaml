id: bug_0382
pack: lamplighters_round_v1
title: "horn windscreen looked important but did not matter to the solve"
severity: moderate
scene: river_stair
reported_by: blind_playtest_20260620T131033Z_lamplighters_round_seed7

symptom: >
  A fresh blind playtest called out the horn windscreen as a dangling promise:
  it was introduced prominently, takeable, and backed by a visible steadiness
  skill-check action, but the player could ignore it and still light the great
  harbour-lamp for a perfect 35/35 win. The prop read like the thing needed to
  shelter a flame in river fog, but the final lamp-lighting action did not use it.

root_cause: >
  Earlier fixes made the windscreen's optional skill-check one-shot and less
  misleading, but preserved the deeper mismatch: the object still looked like a
  critical fog tool while the actual critical path used only oil and tinderbox.
  The self-USE roll also created a separate visible action with no score, route,
  or ending consequence.

fix: >
  Removed the standalone windscreen skill-check and made the windscreen a real
  final-lighting precondition. The great lamp can be lit only after the font is
  filled and the horn windscreen is in hand, and the light narration explicitly
  pays off the screen by shielding the belt-lantern's flame.

tests:
  - tests/regression/lamplighters_windscreen_one_shot.test.ts
  - tests/regression/lamplighters_round_fork.test.ts
