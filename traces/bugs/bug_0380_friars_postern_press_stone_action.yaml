id: bug_0380
pack_id: friars_postern_v1
title: "friars_postern: old debtor's third-stone instruction was not actionable"
source:
  type: blind_playtest
  report: blind-tester/reports/20260620T123116Z_friars_postern_seed7.md
  seed: 7
summary: >
  A blind playtester found that the old debtor gave a precise physical instruction
  ("third stone up from the floor — press it slow and even") but the player never
  actually pressed anything. Once `knows_postern` was set, the chapel simply exposed
  `go north`, so the tactile latch clue felt decorative rather than like a puzzle step.
fix: >
  Added target-only parser USE support so fixture interactions can be represented
  without inventing a held tool. The chapel font now offers `press stone font` after
  `knows_postern`, sets `postern_opened`, retires the press action, and only then
  reveals the north exit to the street.
regression_test: tests/regression/friars_postern_press_stone_action.test.ts
verification:
  targeted:
    - npm test -- tests/regression/friars_postern_press_stone_action.test.ts tests/regression/friars_postern_dialogue_key.test.ts tests/regression/parser_command_verb.test.ts
    - npm run validate -- content/parser/pack/friars_postern.yaml
  full: npm run health
