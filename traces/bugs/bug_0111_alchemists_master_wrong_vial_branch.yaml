bug_id: bug_0111
pack_id: alchemists_tower_v1
seed: 101                          # this cycle's mandated blind-playtest seed; the regression drives seed 1/101/5 (deterministic routes)
type: content_fix                  # a new USE interaction + a new declared death ending + one reactive examine variant — no engine/validator/schema change; no score award, no flag set (no INERT_FLAG)
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T09-08-43-513Z/playtest.md   # rotated onto alchemists_tower (least-attended parser pack) — this fix's source
  mandated_result: >
    Fresh general-purpose MCP-only subagent, no source access, seeds 101 (win) / 202 (trap): WON ending_cured
    40/40 on the intended brew route and reached ending_poisoned by drinking the black phial. Clarity 5/5,
    enjoyment 4/5; zero rejected commands, no loops, no soft-locks; room/object text stayed in sync with every
    state change. ZERO functional bugs.
  finding: >
    Two complementary signals. (1) §3/§6: the lost enjoyment point is attributed to the pack being "short and
    fully linear with a single non-trivial branch (the trap)" — the same note recurs across this pack's many
    prior blind passes, and matches the standing #1 evidence-backed lever in AI_LOOP_STATE (BRANCH a linear
    parser pack, cf. bug_0099 which lifted wreckers_light 3->5). (2) §5: "the game does not offer a 'give black
    phial to master' action even while you carry it in the Spire — you can only 'drink' it ... the poison trap
    only punishes self-experimentation, not the more tempting 'I'll just give her this potion' error." An
    earlier blind tester (seed 67) raised the same missing-fork observation.
root_cause: >
  The spire climax was a single act: USE-antidote-on-master -> the win. A player who climbed to the spire
  carrying the black phial (takeable; most leave the trap on the lab bench, but a curious or recipe-skipping
  player may pocket it) had no interaction targeting the master with it, so the most natural wrong move at the
  climax — dosing the patient with the wrong vial — was silently impossible. The climax offered no decision.
improvement:
  layer: quest_structure   # adds a genuine branch at the climax (a second declared ending) + reactive prose
  content:
    - content/parser/pack/alchemists_tower.yaml: >
        (1) New interaction on `master`: USE black_phial on master, command_verb `give` / template
        "give {item} to {target}" (mirroring the antidote interaction's grammar), guarded not_flag
        cure_administered; effects = narrate + end_game ending_master_poisoned. Awards NO score (a failure)
        and sets NO flag (no INERT_FLAG). (2) New declared death ending `ending_master_poisoned` ("The Wrong
        Vial") — the wrong-fork twin of ending_poisoned (drinking it yourself), recoverable via load (§8.7).
        (3) New reactive `master` examine variant (gated has_item black_phial + not_item antidote, listed
        AFTER the antidote variant so the success state wins first-match): she visibly recoils from the dark
        phial, telegraphing the wrong move before it can be made. Header + interaction design comments added.
        The canonical win, the existing self-drink trap, and every other route/score/flag are untouched.
verification:
  - vitest (new): tests/regression/alchemists_master_wrong_vial_branch.test.ts (5 cases, live engine)
  - carrying the phial to the spire surfaces use_black_phial_on_master and firing it ends at ending_master_poisoned (death, score 0); the branch is gated on the phial (absent on the canonical antidote route, which still offers use_antidote_on_master); the reactive master examine reflects what you hold (base / recoil / pale-vial, first-match-wins); the new ending is a death and ending_cured is still a non-death win (NO_WINNABLE_ENDING intact); the pack validates 0/0; the canonical brew route still reaches ending_cured at full score
  - npm run validate -- content/parser/pack/alchemists_tower.yaml   # OK 0/0 (END_GAME_UNDECLARED satisfied — ending declared; no shadowing/unsatisfiable on the new variant)
  - npm run health   # see locked_by / notes
locked_by:
  - tests/regression/alchemists_master_wrong_vial_branch.test.ts    # 5 cases (see verification)
notes:
  enjoyment_lever: >
    This is the standing #1 next-step from the last several AI_LOOP_STATE cycles — BRANCH a linear parser pack
    — chosen because the mandated playtest's only signal was linearity-capped enjoyment (4/5) and the pack is
    otherwise content-complete and blind-clean across many seeds. The branch is in-genre (the pack header calls
    it "Sierra-Quest-style"; deadly-but-recoverable wrong choices are the genre's signature), heavily
    telegraphed (recipe + phial examine + the new recoil variant), and optional (the canonical player never
    sees it — most leave the phial on the bench), so it adds replay depth without complicating the main route.
  verifier_integrity: >
    NO protected SOURCE file touched; NO HASH_PIN file touched. alchemists_tower is NOT hash-pinned by any test
    or trace (only watchtower_road is hash-pinned; this pack has no committed replay trace), so the content
    edit moves the pack's content hash with nothing to re-pin. No override used.
  content_hash: >
    alchemists_tower content hash moves to 9003feae7d7603b3f3f8c52ce849f458519f5f209d3a1e1f8694766ddd112035
    (new interaction + ending + variant). No live pin references it; historical bug artifacts record prior
    hashes and are left untouched (frozen records).
