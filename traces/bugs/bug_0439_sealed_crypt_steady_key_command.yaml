id: bug_0439
title: Sealed Crypt still labeled its optional iron-key nerve beat as a grip action
pack: content/parser/pack/sealed_crypt.yaml
reported_by: blind_playtest_20260622T104654Z_sealed_crypt_seed7
severity: medium
symptom: >
  A fresh blind player reached the crypt and saw `use_iron_key` presented as
  "grip iron key" with a nerve d20 check. Even after earlier fixes made the beat
  room-gated, one-shot, and reactive, the visible command still read like a
  vestigial no-op rather than an intentional optional steadiness beat.
root_cause: >
  The mechanic was convergent and safe, but the command verb carried the wrong
  player-facing affordance. "Grip" described a hand motion, not the purpose of the
  roll, so the action list did not explain why a player would spend a turn on it.
fix: >
  Changed the interaction command verb from `grip` to `steady` and adjusted the
  iron key's examine prose and existing telegraph regression to match. The stable
  action id remains `use_iron_key`; the skill check, one-shot flags, score economy,
  route gating, and all endings are unchanged.
tests:
  - tests/regression/sealed_crypt_steady_key_command.test.ts
  - tests/regression/sealed_crypt_grip_telegraph.test.ts
verification:
  - npm test -- --run tests/regression/sealed_crypt_steady_key_command.test.ts tests/regression/sealed_crypt_grip_telegraph.test.ts tests/regression/sealed_crypt_skill_check_legibility.test.ts tests/regression/sealed_crypt_grip_one_shot.test.ts tests/regression/sealed_crypt_grip_room_gated.test.ts
  - npm run validate -- content/parser/pack/sealed_crypt.yaml
