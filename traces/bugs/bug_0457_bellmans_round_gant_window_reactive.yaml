id: bug_0457_bellmans_round_gant_window_reactive
title: "Bellman's Round Wool Lane acknowledges the Gant-window proof state"
pack: content/cyoa/pack/bellmans_round.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T191658Z_bellmans_round_seed7.md
severity: S1
symptom: >
  After the player found the cloak pin, read the ledger, and saw Gant through his
  shutter with a torn sleeve, blood at his cuff, and a fat purse at hand, returning
  to Wool Lane still said the case was "not proof yet." The player had enough
  evidence for the direct confrontation route, so the hub prose understated the
  current state of knowledge.
root_cause: >
  Wool Lane had a full three-category proof variant and a broad "some clues found"
  fallback, but no intermediate variant for the documentary-plus-window route. The
  Gant-window state therefore fell through to stale uncertainty prose.
fix: >
  Added a higher-specificity Wool Lane variant for found_cloak_pin, found_debt,
  and seen_torn_coat. It names the torn sleeve, blood, purse, and the now-known
  direction of the case without requiring the separate witness route.
tests:
  - tests/regression/bellmans_round_gant_window_reactive.test.ts
verification:
  - npm test -- --run tests/regression/bellmans_round_gant_window_reactive.test.ts
  - npm run validate -- content/cyoa/pack/bellmans_round.yaml
  - npm run health
