id: bug_0198
title: "The benchmark contamination signal was read off a composition-sensitive cross-mode mean — the curated→held-out gap was eroding toward MIN_SPLIT_GAP as a pure mode-mix artifact, not a contamination change"
kind: verification_deepening # the named gap-erosion WATCH lever (bug_0196): make the contamination signal composition-robust
mode: all
# Additive only. Adds a `mode_summary` slice to the scorecard + a behavioral guard. The
# regenerated scorecard.{json,md} are in neither HASH_PIN_FILES nor PROTECTED_FILES (bug_0194),
# so verify:integrity stays green with NO AI_LOOP_ALLOW_VERIFIER_EDITS. No check weakened.

summary: >
  The headline benchmark `score` per split (curated vs the contamination-free held-out corpus) is a
  FLAT mean over that split's packs, so it tracks the split's MODE COMPOSITION, not just difficulty.
  The deterministic coverage bot completes CYOA packs (~0.7 composite) but cannot plan the multi-step
  parser/RPG puzzle packs (~0.15). The curated split keeps gaining authored puzzle packs (now 6 CYOA /
  3 parser / 5 RPG = 14) while the held-out corpus stays mode-balanced (4/4/4), so the cross-mode
  curated→held-out gap had thinned from ~0.156 to ~0.056 — toward MIN_SPLIT_GAP=0.05 — purely as a
  composition artifact. This is the exact "may eventually need the composite/splits rethought" WATCH
  bug_0196 recorded. Left unaddressed, the next bot-unsolvable curated pack would have driven the
  cross-mode gap below MIN_SPLIT_GAP and fired benchmark_headline_no_regression as a FALSE contamination
  collapse.

root_cause: >
  summarize() rolls the primary-cell rows into one composite per split as mean(rowScore over the split's
  packs), with no mode dimension. The contamination thesis ("held-out is the distinct lower number") was
  being read off that flat mean, but the mean conflates two unrelated things: how hard the packs are
  (dominated by MODE for this bot — CYOA solvable, parser/RPG not) and the held-out-vs-curated signal.
  Because the two splits have DIFFERENT mode mixes, the cross-mode gap is mostly the curated split's higher
  CYOA share, not a uniform "held-out is harder" ordering.

evidence: >
  Mode-matched composites (runs=12): CYOA curated 0.705 vs held-out 0.639 (gap +0.066 — the real signal,
  the only mode the bot completes); parser curated 0.164 vs held-out 0.222 (gap -0.058 — INVERTED: the
  generated parser packs are bot-easier than the richer authored ones); RPG curated 0.151 vs held-out 0.143
  (gap +0.008 — both floor near the bot's planning ceiling). The cross-mode headline gap of ~0.056 is thus
  not a per-mode ordering at all; it is dominated by composition. At runs=50 the same shape holds (CYOA gap
  +0.094, parser -0.058, rpg +0.008).

fix: >
  (1) src/afk/benchmark.ts: added a `BenchmarkModeSummary` type and `summarizeByMode(rows)` that slices the
  primary-cell composite per (split, mode), ordered mode-alphabetical with curated before held-out within a
  mode; exposed it as Scorecard.mode_summary and rendered a "Per-mode (composition-robust)" table after the
  headline. Purely additive — the cross-mode `summary` and its bug_0178 guard are untouched (they still catch
  collapse/inflation); the per-mode slice is the composition-robust COMPANION that reads the contamination gap
  apples-to-apples within a mode. (2) Regenerated traces/benchmark/scorecard.{json,md} at runs=50 (the bug_0194
  freshness contract — a scorecard-schema change must re-emit in the same cycle or benchmark_scorecard_fresh
  goes RED).

lock: >
  tests/regression/benchmark_mode_matched_contamination.test.ts (4 cases, pinned at runs=12 like the headline
  test): mode_summary covers exactly the (split, mode) pairs the primary rows present and is stably ordered;
  each cell's score equals an independent re-mean of its rows (the self-consistency twin of the byte-pin — a
  stub diverges); the contamination gap is real and CURATED-higher in CYOA (held < curated by >= 0.03, the
  composition-robust thesis property where it actually holds); and the MINIMUM per-mode gap falls BELOW the
  cross-mode MIN_SPLIT_GAP — the witness that the headline gap is composition-inflated and the slice adds
  signal the flat mean masks. Pre-fix there is no Scorecard.mode_summary, so every case fails to resolve a
  cell — genuine witness, not vacuous green. benchmark_scorecard_fresh re-passes against the regenerated bytes.

verification: >
  npm run health GREEN. verify:integrity OK 0/0 (NO GUARD_WEAKENED / NO VERIFIER_TOUCHED / NO HASH_PIN —
  scorecard.{json,md} are in neither HASH_PIN_FILES nor PROTECTED_FILES; no floor lowered, no matcher relaxed;
  src/afk/benchmark.ts is not protected for an ADD). typecheck + lint + prettier clean. All 14 packs validate.
