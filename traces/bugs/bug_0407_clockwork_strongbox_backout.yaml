id: bug_0407
pack: clockwork_heist_v1
title: "No-pick strongbox nudge moved to the foyer without transition narration"
severity: low
scene: crawlspace
reported_by: blind_playtest_20260621T072312Z_clockwork_heist_seed11

symptom: >
  A blind playtester tried the crawlspace strongbox without lockpicks. The action
  correctly moved them back to the foyer, but the narration only explained that a
  tool was needed. The foyer scene then appeared abruptly, making the physical
  move feel like a silent teleport.

root_cause: >
  study_strongbox already had a goto to the foyer, but its narrate effect did not
  describe backing out through the panel. The event stream therefore contained a
  move with no player-facing transition prose.

fix: >
  Update the no-pick strongbox nudge to say the thief backs out through the panel
  to the foyer before naming the kitchen and study as search destinations. The
  route, flags, score, and available choices are unchanged.

tests: tests/regression/clockwork_strongbox_backout.test.ts

verification:
  - npm test -- --run tests/regression/clockwork_strongbox_backout.test.ts
  - npm run validate -- content/cyoa/pack/clockwork_heist.yaml

trace_repin: >
  None. The change updates pack prose and adds a regression test; there is no
  committed Clockwork Heist replay trace hash to repin.
