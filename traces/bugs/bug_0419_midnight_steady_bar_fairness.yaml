id: bug_0419
title: Midnight Edition steady-and-bar check looked like an unexplained risky fork
pack: content/cyoa/pack/midnight_edition.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  The blind playtest flagged steady_and_bar as a black-box skill check: the player
  could see nerve, difficulty, and d20 metadata, but not whether failure meant a
  hidden death, lost press route, or just different narration.
root_cause: >
  The action label described only the clean dramatic attempt. The YAML comments and
  branch effects were convergent, but the player-facing choice text did not say
  the roll changed the manner of barring the door rather than the outcome.
fix: >
  Reworded the steady_and_bar label to say the bar is gotten across "cleanly or
  shakily" before the player falls back inside, and added a forced-roll regression
  proving success and failure converge and the failed roll still permits the
  verified ending.
tests:
  - tests/regression/midnight_edition_steady_bar_fairness.test.ts
verification:
  - npm test -- --run tests/regression/midnight_edition_steady_bar_fairness.test.ts
  - npm run validate -- content/cyoa/pack/midnight_edition.yaml
