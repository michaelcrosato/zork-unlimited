id: bug_0432
title: Dyer's Weight did not signpost the optional vitriol tongs clue
pack: content/parser/pack/dyers_weight.yaml
reported_by: blind_playtest_20260620T121703Z_dyers_weight_seed7
severity: low
symptom: >
  The blind player finished at 40/45 and concluded the copper tongs and vitriol
  jar had no meaningful role. The tongs do unlock the final 5-point clue, but
  the jar's own examination text did not tell a player to use them.
root_cause: >
  The copper tongs described their usefulness, but a player who inspected the
  vitriol jar first saw only a sealed, acidic jar and no direct instruction to
  handle the cap with the tongs.
fix: >
  Updated the vitriol jar description to state that the copper tongs from the
  vat would lift the cap safely, preserving the optional score route and win
  gate while making the clue discoverable.
tests:
  - tests/regression/dyers_weight_vitriol_tongs_signpost.test.ts
verification:
  - npm test -- --run tests/regression/dyers_weight_vitriol_tongs_signpost.test.ts
  - npm run validate -- content/parser/pack/dyers_weight.yaml
