id: bug_0435
title: Gauger's Register made the bribe leaf look like evidence but only the purse was takeable
pack: content/parser/pack/gaugers_register.yaml
reported_by: blind_playtest_20260622T093456Z_gaugers_register_seed7
severity: high
symptom: >
  A fresh blind player examined the cloth purse, understood that the loose leaf
  tied to it was evidence and the money was bait, but found only a take-purse
  action. There was no way to preserve the paper without triggering the bribery
  ending.
root_cause: >
  The pack represented the side-payment leaf only as prose/read_text on the
  bribe_purse object. TAKE was bound to the purse itself and intentionally ended
  the game, so the player-facing instruction to value the paper had no matching
  safe action.
fix: >
  Added loose_leaf as a separate takeable object in the weighing room, removed the
  ambiguous loose-leaf alias from the purse, and made the bribery and exposed
  endings react to whether the player carried the leaf.
tests:
  - tests/regression/gaugers_register_loose_leaf_evidence.test.ts
verification:
  - npm test -- --run tests/regression/gaugers_register_loose_leaf_evidence.test.ts tests/regression/gaugers_register_bribe_purse_telegraph.test.ts tests/regression/gaugers_register_reactive_taken_items.test.ts
  - npm run validate -- content/parser/pack/gaugers_register.yaml
