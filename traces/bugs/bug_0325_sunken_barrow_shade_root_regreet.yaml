id: bug_0325
title: "sunken_barrow: reaver's shade re-shows full greeting on every return to shade_root"
pack: content/rpg/quests/sunken_barrow.yaml
class: dialogue-regreet (mechanical dialogue loop)
severity: minor
found_by: blind_playtest (seed 7, 2026-06-08T14-06-03-284Z)

symptom: >
  After asking the reaver's shade any topic and selecting the "back" prompt
  (wight_back / lord_back), the game transitions back to shade_root and re-emits
  the full first-meeting greeting: "Another one, come down for the cold crown. I
  came for it too, once, and got no farther than the wight's hall. Ask, if you
  will — I have had long years down here with nothing to do but remember." The
  phrase "Another one" specifically implies first contact, which is jarring on
  every return mid-conversation. A player who asks both topics sees the full
  greeting three times total.

root_cause: >
  shade_root had no `variants` block. The base npc_text (the full first-meeting
  greeting) fired unconditionally on every visit to the node. The topic flags
  (heard_warding, heard_lord_lore) were set by their respective nodes but no
  reader existed on shade_root to produce a different greeting on re-entry.

fix: >
  Added a `variants` block to shade_root with one variant: when any_of
  [heard_warding, heard_lord_lore], text "What else would you ask of me?"
  First visit (no flags set) still shows the full greeting. Subsequent returns
  (any topic flag set) show the short acknowledgment. No new flag, no
  score/route/stat/ending change; prose only.

regression_test: tests/regression/sunken_barrow_shade_root_short_greeting.test.ts
