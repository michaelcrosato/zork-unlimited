id: bug_0410
pack: alnagers_fault_v1
title: "Condemnation choice hid its composure tension beat"
severity: low
scene: alnage_hall
reported_by: blind_playtest_20260621T190916Z_alnagers_fault_seed7

symptom: >
  A blind playtester saw that `condemn_bassett` carries a composure skill check,
  but the visible choice text read like an ordinary deterministic verdict. That
  made the formal condemnation look like a possible untelegraphed gamble, even
  though both roll branches reach the same condemnation ending and award the same
  capstone score.

root_cause: >
  The CYOA observation exposes `skill_check` metadata, but the authored choice
  text did not name the composure moment. A human-facing renderer or a player
  scanning choice prose could miss that the roll is a dramatic tension beat, not
  a hidden route gate.

fix: >
  Reword the condemnation choice to ask the player to keep their composure while
  recording the condemnation. The underlying skill check, branch effects, score,
  and ending are unchanged; both roll outcomes still condemn the cloth.

tests: tests/regression/alnagers_fault_blind_polish.test.ts

verification:
  - npm test -- --run tests/regression/alnagers_fault_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/alnagers_fault.yaml

trace_repin: >
  None. This is a prose-only content signpost change with regression coverage;
  no committed replay trace hash is repinned.
