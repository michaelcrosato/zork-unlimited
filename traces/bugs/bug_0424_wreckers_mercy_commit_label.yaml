id: bug_0424
title: Wrecker's Light mercy action did not signal that it commits the night
pack: content/cyoa/pack/wreckers_light.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  The blind playtest noted that `tend_keeper` appears beside ordinary exploration
  actions after hearing the keeper, but choosing it immediately ends the run at
  the mercy ending. A player intending to perform reversible first aid could feel
  that the action foreclosed the lamp decision without warning.
root_cause: >
  The choice label said only "Stay at his side and tend him through the night."
  While the ending itself explains that the lamp stays dark, the action text did
  not name that cost before the player committed.
fix: >
  Reworded the `tend_keeper` label to say the player stays through the night and
  lets the lamp stay dark. The route, gate, ending, flags, and inventory are
  unchanged. Added a regression locking the label and mercy route.
tests:
  - tests/regression/wreckers_light_mercy_commit_label.test.ts
verification:
  - npm test -- --run tests/regression/wreckers_light_mercy_commit_label.test.ts
  - npm run validate -- content/cyoa/pack/wreckers_light.yaml
