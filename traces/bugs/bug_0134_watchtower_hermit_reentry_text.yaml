findings:
  - id: hermit_stranger_greeting_on_reentry
    where: scene:hermit_talk
    severity: low
    description: >
      The conversation hub had a single, unconditional greeting — the cold first-
      meeting line "You look lost, traveler. Or maybe you found something you weren't
      meant to." — re-shown every time the player re-entered it, including right after
      the hermit had told the whole smuggler's tale (ask_about_tower → set_flag
      heard_hermit_lore) or broken the letter's seal (show_letter → set_flag
      seal_broken). A returning player was greeted as a stranger seconds after a full
      exchange, contradicting their own state. Reproduced: go_west → follow_to_camp →
      talk_hermit → ask_about_tower → back_from_tower_talk re-shows the stranger line.
    fix: >
      Add a reactive scene `variant` gated on any_of [has_flag heard_hermit_lore,
      has_flag seal_broken] (first-match-wins, the same machinery as bug_0120's
      tower_top and confront_smuggler's variants): a player who has already spoken now
      reads a hermit who knows them ("Still here … I've told you what I know, and the
      road north is where the rest of it waits…") and is re-pointed at the goal. The
      un-spoken player (neither flag set on first entry) still sees the original
      greeting verbatim. Reactive TEXT ONLY — no choice/flag/route/ending change; the
      consumed topics retire via their OWN conditions, not the variant.
failure:
  type: design_polish
  description: >
    No engine fault or determinism break — stale-on-re-entry scene text (the same
    reactive-text honesty class as bug_0120). Caught by the blind-playtest step of the
    loop (§12.4-5), not the validator (which checks solvability, not narrative
    freshness). The re-entry state_hash is unchanged by the fix (variants alter only
    displayed text, not state).
fix:
  layer: content        # one of: content | engine_rule | validator | test | hint_text | quest_structure
  summary: >
    hermit_talk gains a reactive re-entry variant so a player who has already heard the
    lore or broken the seal is no longer re-greeted as a stranger.
regression_test: tests/regression/watchtower_hermit_reentry_text.test.ts
