id: bug_0305
title: "sealed_crypt — crypt room gives no reactive text after grip iron key beat"
pack: content/parser/pack/sealed_crypt.yaml
severity: moderate
class: reactive-description-blindness
discovered_by: blind_playtest_seed_7
playtest_report: ai-runs/2026-06-08T09-18-12-290Z/playtest.md

symptom: >
  The optional "grip iron key" nerve skill check sets steeled_at_the_iron (success)
  or attempted_the_iron (failure) and retires the action — but the crypt room
  description was identical before and after the beat in both cases. Multiple blind
  playtesters (seeds 7, 11, 13, 29, 43) across many cycles all flagged the action
  as a "dead widget" because no observable feedback confirmed the outcome mattered.
  steeled_at_the_iron and attempted_the_iron were read only by the interaction's
  own conditions (to prevent re-fire), never by any room variant when: clause.

root_cause: >
  Same class as bug_0282/0283/0284 (reactive-description-blindness): the crypt room
  had only the catacombs_open variant; no variant existed for either grip flag, so
  the room showed base text regardless of whether the player had steadied their hand.

fix:
  type: content
  files:
    - content/parser/pack/sealed_crypt.yaml
  description: >
    Added two reactive crypt variants ordered below catacombs_open (which remains
    highest priority). steeled_at_the_iron shows "the iron key is steady in your
    hand now"; attempted_the_iron shows "your hand is not quite steady." Both are
    purely cosmetic: no exit, score, ending, or gate change.

regression_test: tests/regression/sealed_crypt_grip_crypt_reactive.test.ts
