id: bug_0366
title: Fisherman's Privilege hides final evidence thresholds after blind play
severity: content
status: fixed
root_cause: >
  A fresh MCP blind playtest found that the missing countersignature clue in
  Agnes Tyrell's complaint did not pay off later, the Admiralty referral gate
  silently required the Ardent muster entry, and dismissal without investigation
  remained available after the office prose had already learned contrary evidence.
fix: >
  Make the office prose distinguish direct-finding evidence from the fuller
  Admiralty referral record, pay off the countersignature clue in Pryce's account,
  the roster/warrant inspection, and both serious endings, and gate dismissal so
  it is available only before any inquiry step.
files_changed:
  - content/cyoa/pack/fishermans_privilege.yaml
regression_test:
  - tests/regression/fishermans_privilege_blind_polish.test.ts
