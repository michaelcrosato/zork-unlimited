id: bug_0487
title: Gauger's Register hid its last five points behind READ wax seal-stamp
pack: content/parser/pack/gaugers_register.yaml
reported_by: blind_playtest_20260623T013947Z_gaugers_register_seed7
severity: medium
symptom: >
  A blind playtester followed the natural quiet route, examined the wax
  seal-stamp, recovered the register, and reached the winning ending at 40/45
  with no indication of what remained. The likely missing action was READ
  wax seal-stamp, even though LOOK had already exposed the batch-mark proof.
root_cause: >
  The score economy awarded five points only to READ hayman_seal. Parser players
  reasonably use LOOK and READ interchangeably for visible inscriptions, so the
  final score depended on an invisible verb distinction rather than a meaningful
  case milestone.
fix: >
  Moved those five points onto recovering the gauge register, raising the
  register's score award from 20 to 25 and making READ hayman_seal non-scoring
  corroboration. The quiet route now reaches 45/45 after recovering the register,
  while the forceful door route still caps at 40/45 because it skips convincing
  Edmund.
tests:
  - tests/regression/gaugers_register_seal_score_transparency.test.ts
verification:
  - npm test -- --run tests/regression/gaugers_register_seal_score_transparency.test.ts
  - npm run validate -- content/parser/pack/gaugers_register.yaml
