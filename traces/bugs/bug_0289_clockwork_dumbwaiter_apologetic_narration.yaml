id: bug_0289
title: "Clockwork Heist dumbwaiter narration ends with an apologetic qualifier"
pack: clockwork_heist_v1
scene: kitchen
choice: dumbwaiter
severity: content_polish
class: prose_tone
discovered_by: blind_playtest
playtest_report: ai-runs/2026-06-08T05-27-16-958Z/playtest.md
prior_fix: bug_0046

symptom: >
  The dumbwaiter narrate effect closed with "but it leaves you no closer to the vault
  than the open steps would." A blind playtester (seed 13) flagged this as "the game
  apologizing for offering the option" — the "but" conjunction frames a genuine positive
  (quieter, more direct from the kitchens) as a letdown, deflating the choice.

root_cause: >
  bug_0046 added the apologetic clause to correct an over-promise (the old framing read
  like a stealth bypass). The honest no-bypass message is already conveyed by "the very
  floor the staircase serves" earlier in the same narration — the final "but" clause
  adds apology without new information.

fix: >
  Drop the final apologetic clause. New text closes with "A quieter way up from the
  kitchens, and a more direct one." — positive framing, no over-promise (the destination
  "the very floor the staircase serves" still conveys the no-bypass truth), no apology.
  Pure prose; no state/routing/tick/flag/ending/schema change.

regression_test: tests/regression/clockwork_dumbwaiter_honest_framing.test.ts
  # Updated assertion: "very floor the staircase serves" (still present) replaces
  # "no closer to the vault" (removed). No new test file needed — existing test updated.
