bug_id: bug_0479
pack_id: alchemists_tower_v1
seed: 7
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: blind-tester/reports/20260622T234526Z_alchemists_tower_seed7.md
  finding: >
    The mandated blind pass found The Alchemist's Tower mechanically clean and reached
    both the cure and betrayal endings, but flagged the Great Hall's `steady iron key`
    action as the highest-severity confusion point. The action surfaced as a d20
    steadiness check next to the real cellar unlock, but the live room text did not
    explain why a player would steady the key or what kind of moment the roll was
    meant to represent.
failure:
  type: action_context_gap
  scene: great_hall
  description: >
    Earlier fixes had kept the optional iron-key skill check convergent, renamed it
    from "grip" to "steady", and gated it to the Great Hall before the cellar hatch
    is unlocked. Despite that, a blind player still saw it as an orphaned mechanic
    because the immediate room prose remained generic: the explanation lived mostly
    in the key's examine/take prose rather than beside the action when it appeared.
fix:
  layer: content
  pack: content/parser/pack/alchemists_tower.yaml
  summary: >
    Added a Great Hall room variant for the state where the player holds the iron key
    and the cellar hatch is still locked. The prose now says the hatch's iron lock
    answers the cold key in hand, and explicitly frames `steady iron key` as an
    optional steadying moment before turning the key. The unlocked-hatch variant
    remains first-match-wins, so this context retires as soon as the hatch opens.
    No action, score, route, ending, condition, or skill-check branch changed.
  reachable_endings_changed: false
  content_hash_changed: true
  new_pack_hash: 218b7f31492ba01aa8156d0deec75c7fa8e951b3f4c61c1f81573325ca040a5c
  regression_test: tests/regression/alchemists_iron_key_steady_context.test.ts
verified_live: >
  Focused regression coverage passed: alchemists_iron_key_steady_context,
  alchemists_grip_room_gated, alchemists_grip_post_unlock_retired, and
  alchemists_cellar_unlock_consistency ran 15 assertions green. Pack validation
  reports OK with 0 errors and 0 warnings for content/parser/pack/alchemists_tower.yaml.
playtest_coverage:
  note: >
    This is a polish fix from a clean blind run, not a structural bug. The optional
    skill check remains intentionally convergent and off the critical path; the change
    only makes its purpose legible in the state where the player sees it.
