bug_id: bug_0078
pack_id: sunken_barrow_v1   # surfaced here; the engine feature also retrofits sealed_crypt_v1 + cold_forge_v1
seed: 7                     # this cycle's blind-playtest seed for sunken_barrow; the regression drives seed 1 deterministic routes
type: engine_feature        # generalizes the bug_0074 command_verb capability to item-on-target USE, then uses it in three packs
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T20-42-17-154Z/playtest.md   # mandated target was clockwork_heist; rotated to sunken_barrow (seed 7) per the protocol's "rotate the pack" + the prior cycle's explicit next-focus note
  mandated_result: >
    The assessor's rank-1 mandated target, clockwork_heist, is over-fitted: ~22 consecutive
    pristine blind passes, micro-tuned across bug_0019-bug_0072, and explicitly deprioritized by
    the prior cycle's next-focus note and project memory ("content-polish backlog exhausted; pivot
    to structural / engine work"). The charter permits a different target "if your judgement and
    the playtest say it's higher value." This cycle blind-playtested sunken_barrow (seed 7) — a
    less-attended RPG pack that exercises the exact item-on-target verb mismatch the prior cycle's
    deferred list named (rope/TIE, iron_bar/LEVER, pry_bar/PRY). It WON ending_victory 50/50 with
    zero mechanical bugs (clarity 5/5, enjoyment 3/5) and flagged the mismatch directly.
  finding: >
    Slab Passage: "the prose insistently primes 'lever' ('made to be levered,' 'Wedge the bar
    beneath the lip and... leverage is what works it loose'), but the offered command reads 'use
    iron bar on stone slab' (USE type)... a concrete prose-says-X / button-says-Y instance." This is
    the bug_0073/0077-class consistency gap that bug_0074's command_verb fixed for SELF-USE only; it
    did not yet cover item-on-target USE. The same gap sits in sealed_crypt (the well's prose primes
    "tie" — "tied off above", knotted to the iron ring) and cold_forge (the grate is "made for a
    lever", "levered up off its lip", journalled "you lever the slag grate").
root_cause: >
  bug_0074 taught the parser a per-interaction `command_verb` for the self-USE (consume-this-thing)
  pattern (item === target), rendering "drink black phial" instead of the generic "use black phial".
  But it was confined to self-USE by a schema superRefine, and the legal-action display + the
  command parser had no path for an item-on-target natural command — which additionally needs the
  preposition and word order to vary by verb ("tie ROPE to WELL" is item-first; "lever SLAB with
  BAR" is target-first). So every tool-on-thing puzzle still surfaced and parsed only as the generic
  "use <item> on <target>", mismatching the verb the prose primed.
improvement:
  layer: engine_rule
  engine:
    - src/parser/schema.ts: >
        The superRefine that confined `command_verb` to self-USE is WIDENED to allow it on any USE
        interaction that has both an item and a target (still forbidding a builtin-verb shadow). A
        new optional `command_template` (string, `.optional()` ⇒ hash-safe) gives the item-on-target
        display phrasing with `{item}`/`{target}` placeholders; a superRefine requires it to begin
        with the command_verb, contain both placeholders, and sit only on a non-self USE
        (item !== target). Absent ⇒ byte-identical compile, unchanged content hash (mirrors
        variants / skill_check / the bug_0074 command_verb rule).
    - src/parser/legal_actions.ts: >
        the non-self USE display now reads via command_template when a command_verb is present
        ("tie coil of rope to old well", "lever stone slab with iron bar"), falling back to
        "<verb> <item> on <target>" when no template, or the generic "use <item> on <target>" with
        no command_verb. The action id is UNCHANGED (`use_<item>_on_<target>`), so every route/test
        that drives the action by id is untouched.
    - src/parser/command_map.ts: >
        `selfUseByVerb` is generalized to `customUseByVerb`, which (for an otherwise-unknown verb)
        resolves both a self-USE single-noun command ("drink phial") and an item-on-target command:
        a two-noun "<a> <prep> <b>" (any of a permissive preposition set) matched against the
        interaction's {item,target} in EITHER order (display order is presentation, not grammar), or
        a tool-less single noun naming one side of a unique such interaction ("lever slab").
        Legality (held / present) is re-checked by the engine, exactly as before. The generic
        "use <item> on <target>" path is untouched (backward compatible).
  content:
    - content/parser/pack/sealed_crypt.yaml: >
        the rope→old_well USE gains `command_verb: tie` + `command_template: "tie {item} to {target}"`.
        No flag/item/score/effect/exit/gating change; "use rope on old well" still parses; the rope
        is still SPENT on tie (bug_0034). content_hash moves (unpinned).
    - content/rpg/quests/sunken_barrow.yaml: >
        the iron_bar→stone_slab USE gains `command_verb: lever` + `command_template: "lever {target}
        with {item}"`. The skill_check (might vs 12) and one-shot retire are untouched. content_hash
        moves (unpinned).
    - content/rpg/quests/cold_forge.yaml: >
        the pry_bar→stone_grate USE gains `command_verb: lever` + `command_template: "lever {target}
        with {item}"`. The skill_check, the bug_0048 journal line, and the one-shot retire are
        untouched. content_hash moves (unpinned).
verification:
  typecheck: green (tsc --noEmit)
  lint_format: green (ESLint + Prettier)
  validate: >
    green (0 errors, 0 warnings) for every pack. alchemists_tower's content_hash is UNCHANGED
    (4130f145…) — proof the bug_0074 self-USE command_verb path still compiles byte-identically and
    the schema widening is additive. sealed_crypt 5995d851…, sunken_barrow 34deab28…, cold_forge
    e6990ac4… moved (surfaced, not laundered; only watchtower_road is pinned in tests).
  health: exit 0 (verify:integrity + typecheck + ESLint + Prettier + tests + every pack validate + playtest)
  backward_compat: >
    `command_verb`/`command_template` are `.optional()`; every pack that omits them compiles
    byte-identically and keeps its hash. The action id for an item-on-target USE stays
    `use_<item>_on_<target>`; only the displayed command string changes, and the generic
    "use <item> on <target>" still parses. The self-USE command_verb behaviour (bug_0074) is
    preserved — the generalized parser helper subsumes it.
  reachable_endings_unchanged: >
    sealed_crypt still wins (catacombs 35/35), sunken_barrow ending_victory 50/50, cold_forge
    ending_victory 50/50 — the natural command performs the identical interaction as the
    id-driven action.
verified_live: >
  Through the engine render/parse path (initStateForParserPack / initStateForRpgPack /
  enumerateActions / enumerateRpgActions / parseCommand): the slab lists id
  `use_iron_bar_on_stone_slab`, command "lever stone slab with iron bar"; parseCommand maps "lever
  stone slab with iron bar", "lever slab with bar", and the tool-less "lever slab" → USE(iron_bar,
  stone_slab); "use iron bar on stone slab" still parses; stepping the natural command sets
  barrow/slab_moved. The well lists "tie coil of rope to old well" (id `use_rope_on_old_well`) and
  accepts "tie rope to old well"/"tie rope to well"/"tie coil to well"; stepping it sets
  rope_attached_to_well, +10, spends the rope, opens the descent. The grate lists "lever slag grate
  with iron pry-bar" and accepts the lever phrasings; stepping it sets forge/grate_open. Wrong-verb
  commands ("lever rope to well", "tie slab with bar") are still not understood.
regression_test: tests/regression/parser_item_use_command_verb.test.ts   # 9 cases across 3 packs: displayed command + verb-agnostic id; natural phrasings (full, abbreviated, tool-less single-noun) parse to the right USE; generic "use ... on ..." still parses (backward compat); a wrong command_verb is rejected; executing the NATURAL command drives the same state change (rope tied/spent +10 + descent open; slab_moved; grate_open).
test_updates:
  - tests/regression/parser_command_verb.test.ts: >
      the bug_0074 schema-guard case "rejects command_verb on a non-self USE" is REPLACED by
      "accepts command_verb on an item-on-target USE (item !== target) — bug_0078 widening", plus a
      new case asserting command_template guards (missing placeholder rejected, first-word-must-equal-
      command_verb, template-needs-command_verb, two-noun-template-on-self-USE rejected). The other
      bug_0074 cases (self-USE accepted, builtin-shadow rejected, non-word rejected, absent round-
      trips undefined, the full drink-phial behaviour, win route 35/35) are unchanged — no assertion
      weakened, only the deliberately-widened one updated.
closes:
  - bug_0077 deferred note: "the rope/TIE (Old Well) and the analogous barrow iron_bar/LEVER,
    cold_forge pry_bar/PRY — these are item-on-target USEs whose prose primes a natural verb;
    generalizing bug_0074's command_verb to item-on-target is its own feature" — now implemented.
