new_pack_blind_playtest:
  run: ai-runs/2026-06-02T15-26-15-398Z/playtest_white_stag.md
  pack: content/cyoa/pack/white_stag.yaml
  seed: 9
  result: >
    Fresh source-blind MCP-only subagent reached all FOUR declared endings (offering / lost /
    quarry / thaw), rated clarity 5/5, enjoyment 4/5, ZERO bugs — "clean, finished, and
    emotionally resonant." Confirmed the state-aware bluff (knows_truth adds the reframe prose
    AND unlocks lay_offering), the gated offering ending, the telegraphed ice-death, and clean
    flag/journal persistence. Its one thematic note (spare survives regardless of knowledge) is
    intentional: the stag lives either way; reading the stone buys the offering ending + richer
    prose, not a different survival outcome.

design:
  thesis: >
    A moral fork, not a lock-and-key chain — and the OBVIOUS, sanctioned goal is the dark one.
    A starving winter and a lord's bounty make killing the white stag the easy, legible choice
    from the first beat; the depth is the player who stays the hand. A hidden "truth" (a carved
    boundary-stone naming the white stag as the winter's keeper, whose killing brings an
    unbreaking winter) is the wreckers_light/clockwork device: reading it sets knows_truth,
    which fires reactive endingText variants on the kill and the sparing AND unlocks the
    offering — the gated "best" ending, a payoff reserved for the player who read the stone
    (cf. watchtower's proof-gated finale). The dramatic irony: the desperate obvious choice
    (kill to feed them now) is what dooms the valley, while the harder mercy buys the thaw — so
    the ignorant kill is a tragedy of not knowing, and the worst kill is the knowing one.
  endings:
    - id: ending_quarry
      reach: "trail_end -> tarn -> bluff -> loose_arrow"
      note: "the kill; base text = ignorant tragedy, knows_truth variant = knowing damnation"
    - id: ending_thaw
      reach: "trail_end -> tarn -> bluff -> lower_bow"
      note: "mercy on instinct; base text vs a knows_truth 'understood it' variant"
    - id: ending_offering
      reach: "trail_end -> tarn -> shrine(decipher) -> tarn -> bluff -> lay_offering"
      note: "GATED on knows_truth — the fullest ending; lay the bow+arrow down as a rite"
    - id: ending_lost
      reach: "trail_end -> tarn -> cross_ice"
      note: "informed-risk death; the base tarn text telegraphs the rotten, ticking ice"

