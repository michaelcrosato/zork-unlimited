regression: >
  The two corpora ARE the regression: each fails loudly if any of its pinned rejection branches is ever
  removed or weakened (the validator would then accept a pack it must reject). The differential anchor
  doubles as a false-rejection guard — if a validator ever drifts to flag the clean base on one of these
  codes, the anchor fails. No source/validator/schema/generator/engine change, no pack YAML, no
  corpus/manifest.json, no scorecard byte, no scripts/verify-integrity.ts change — purely additive.
