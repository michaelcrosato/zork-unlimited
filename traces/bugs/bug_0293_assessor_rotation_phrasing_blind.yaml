id: bug_0293
title: "AFK assessor blind-pass RECENCY ROTATION went blind a THIRD time — after the cycle agent defaulted to Sonnet, its state entries wrote the looser \"blind pass on `pack`\" instead of the canonical \"Mandated blind pass ran on `pack`\", so the attendance parser saw nothing recent and re-froze on the alphabetical-first clockwork_heist (observed: 7 consecutive clockwork_heist cycles while 16 packs got zero fresh blind coverage)"
kind: engine_fix
mode: meta/tooling
severity: defect
layer: afk/assessor (blind-pass recency rotation)
artifact:
  source:
    - src/afk/assessor.ts
  test:
    - tests/regression/assessor_blind_pass_rotation.test.ts
    - tests/unit/assessor.test.ts

summary: >
  The deterministic assessor rotates the mandated blind playtest onto the LEAST-recently-attended pack by
  parsing AI_LOOP_STATE.md for each pack's most-recent attendance mention (parseAttendanceOffsets,
  src/afk/assessor.ts). The log is newest-first, so a smaller char-offset = more recent; a pack with NO
  parsed mention gets MIN_SAFE_INTEGER and ties for "never-attended first", so the FINAL id.localeCompare
  tiebreak decides — which is alphabetical, and clockwork_heist sorts early. During an AFK run the loop
  blind-played clockwork_heist for 7 CONSECUTIVE cycles (bug_0285–0292, all clockwork) while dead_reckoning,
  tithe_barn, white_stag and 13 other packs received zero fresh blind coverage — the exact lock-in the
  rotation exists to cure. The agent itself kept writing "Next: rotate blind pass to `dead_reckoning_v1`",
  but the assessor could not parse the attendance signal to honour it.

root_cause: >
  Phrasing-drift blindness — the SAME failure CLASS as bug_0128 (stale marker) and bug_0235 (backtick
  wrapper), recurred through a THIRD surface. parseAttendanceOffsets recognized only
  "Mandatory LLM playtest target this cycle: <path>" and "Mandated blind pass ran on <pack>". After commit
  63e0fa1 defaulted the cycle agent to Sonnet, Sonnet's free-form state entries dropped the canonical
  "Mandated …ran" wording and wrote "…(bug_0292): blind pass on `clockwork_heist` (seed 7; …)". That matched
  neither alternative, so EVERY entry from the run was invisible. Worse, the log-archive trim
  (chore 7fb0d45) was deleting the OLD Opus-era canonical entries (the only parseable ones) off the tail, so
  the attendance map was decaying toward EMPTY — at which point every playtest stub tied on recency and the
  alphabetical id tiebreak re-nominated clockwork_heist every cycle.

  Why the existing bug_0128 / bug_0235 real-repo guards did not catch it: both grep the live log for
  `Mandated blind pass ran on \`X\`` and `return` (vacuously skip) when not found — which is exactly the
  state the Sonnet phrasing induces (no canonical marker present at all). The bug again hid inside the
  vacuous-skip of the very tests meant to catch it; every synthetic fixture used the canonical wording, never
  the looser "blind pass on" form the live log now uses.

fix: >
  Two changes, both purely restoring the recency signal the rotation already consumes:
  (1) parseAttendanceOffsets now ALSO matches the MODEL-INDEPENDENT code-written recommendation line the
  assessor emits every cycle — `Blind-playtest "<id>"` — which is prose written by ai-loop.ts, NOT the agent,
  so it cannot drift with the model; plus the looser agent phrasing "blind pass on" (belt-and-suspenders for
  entries already in the log). The wrapper class gains `"` so the quoted id is skipped, and the regex gains
  the `i` flag for sentence-start capitalization.
  (2) packStem now strips a trailing `_v\d+`, because the code line names the pack by its ID
  ("clockwork_heist_v1") while the candidate's target is a PATH (file stem "clockwork_heist"); without the
  strip the two key to different stems and the recency lookup misses. No shipped pack file name ends in
  `_v\d+`, so the strip never collides two real packs. No change to ordering, scoring, sort direction, or any
  game behaviour.

witness: >
  Out-of-band teeth, verified against the LIVE AI_LOOP_STATE.md before/after:
  PRE-FIX  — parseAttendanceOffsets(log).get("clockwork_heist") === undefined (the just-played pack looked
             never-attended); the live assessor's #1 playtest nominee was clockwork_heist (played the prior
             7 cycles).
  POST-FIX — clockwork_heist @ offset 123 (recognized as most-recent → sorts LAST); the live assessor's
             playtest order is now dead_reckoning > tithe_barn > white_stag > lamplighters_round > tide_mill
             > breaking_weir (genuinely least-recently-played first). The fixed assessor's top pick
             (dead_reckoning) now AGREES with what the agent had been recommending all along. The new
             bug_0293 tests fail on the pre-fix class (they assert "blind pass on `X`" and `Blind-playtest
             "<id>"` parse, and that a freshly-attended pack sorts LAST) and pass post-fix.

regression_test: tests/regression/assessor_blind_pass_rotation.test.ts
# Adds a "bug_0293" describe block: (1) the Sonnet prose "blind pass on `X`" form parses; (2) the
# code-written `Blind-playtest "<id>"` line parses AND the _v1 id normalizes to the path stem; (3) a
# freshly-attended pack (via the new forms) sorts LAST, never first (dead_reckoning, never mentioned, first);
# (4) on the real repo the single most-recent pack — located via the code line / Sonnet prose, NOT the
# canonical marker the live log no longer contains — is parsed AND is not the assessor's top nominee. The
# bug_0128 / bug_0235 cases are retained unchanged. tests/unit/assessor.test.ts adds the packStem _v1 case.

scope_honesty: >
  Pure tooling fix in the deterministic assessor's recency parser. NO engine/runtime/validator/schema/
  generator change, NO pack YAML, NO hash re-pin, NO scorecard byte, NO corpus/manifest change. The assessor
  is advisory (it ranks the next-best improvement); the fix corrects WHICH pack the rotation surfaces, not
  any game behaviour. bug_0194 scorecard freshness pin unaffected (no pack content changed). The new/edited
  test files are not protected; assessor.ts is not a verifier — verify:integrity sees no VERIFIER_TOUCHED /
  GUARD_WEAKENED, and the test count only RISES.

verification: >
  npx vitest run tests/regression/assessor_blind_pass_rotation.test.ts tests/unit/assessor.test.ts → GREEN
  (29 tests: 7 prior rotation + new bug_0293 cases + unit). Live assessor rotation re-ordered correctly
  (dead_reckoning first, the least-recently-played; clockwork_heist now sorts last). npm run health → GREEN.

