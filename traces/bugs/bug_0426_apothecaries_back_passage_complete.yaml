id: bug_0426
title: Apothecaries back passage called a complete case incomplete
pack: content/parser/pack/apothecaries_standard.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: medium
symptom: >
  The blind playtest assembled the full evidence chain and reached the maximum
  score, then went south to the back passage and received ending_withdrawn text
  saying the complete chain had not been assembled.
root_cause: >
  back_passage always resolves to ending_withdrawn, whose single text assumed
  incomplete evidence even when sample_vials and proved_substitution were
  present.
fix: >
  Added a reactive ending variant for ending_withdrawn when complete evidence is
  held, preserving the partial withdrawn branch while making the prose truthful.
  Added regression coverage for complete and incomplete back-passage exits.
tests:
  - tests/regression/apothecaries_back_passage_complete_variant.test.ts
verification:
  - npm test -- --run tests/regression/apothecaries_back_passage_complete_variant.test.ts
  - npm run validate -- content/parser/pack/apothecaries_standard.yaml
