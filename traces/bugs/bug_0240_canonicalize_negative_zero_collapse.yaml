regression: >
  The contract IS the regression: it fails loudly if the canonicalizer's treatment of the sign of zero ever drifts (a
  replacer preserving -0, a sign-aware serializer) — exactly the change that would silently shift the digest of every
  state hashing a negative zero while every other canonicalize test stayed green. On a deliberate canonicalizer change,
  the operator must re-derive these contracts AND re-pin every dependent trace expected_final_hash — never relax the
  assertion to pass. Purely additive (1 extended test file, 1 new bug artifact); src/core/hash.ts byte-unchanged.
