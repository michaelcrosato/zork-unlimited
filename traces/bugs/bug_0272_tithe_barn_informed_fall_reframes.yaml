id: bug_0272
title: "tithe_barn's ending_fall was the one non-gated ending the knows_truth reactive-epilogue device skipped — the KNOWING climb read identically to the ignorant one"
kind: content_fix
mode: cyoa/reactive-prose
severity: enhancement
layer: content/reactive-epilogue
artifact:
  source:
    - content/cyoa/pack/tithe_barn.yaml
  test:
    - tests/regression/tithe_barn_informed_fall_reframes.test.ts

summary: >
  tithe_barn's whole "truth" mechanism is that reading the steward's account-book (knows_truth)
  reframes the SAME deliberate act in the epilogue — the ignorant act vs the same act done
  KNOWING the lord's grain is a hoard held back to rot for the price of it. ending_bounty
  reframes ("...and you do it KNOWING"); ending_mercy reframes ("you saved the one you could
  see"); ending_doors needs no variant because it is GATED on knows_truth, so it is ALWAYS the
  knowing act. ending_fall — climb the rotten loft after the older stores — was the one
  remaining ending: NOT gated, so it has both an ignorant climb (go_in -> climb_loft) AND a
  knowing one (read the book, return to the hub, climb anyway: go_in -> read_book -> decipher
  -> leave_book -> climb_loft), yet only the ignorant text existed. The death read identically
  whether or not you had just read that the very grain about to bury you was a deliberate hoard.

root_cause: >
  An incomplete reactive-epilogue device, not a runtime defect — the same class as bug_0271
  (dead_reckoning's deck hub printed one line however much was known): a reactive beat the
  authoring promised across its endings but did not extend to the one non-gated terminal that
  also has an informed and an uninformed path. The 2026-06-05 mandated blind pass (tithe_barn,
  seed 13; fresh MCP-only general-purpose subagent, no content/src/ui/tests access; report
  ai-runs/2026-06-05T05-33-21-886Z/playtest.md) came back STRONG and CLEAN — clarity 5/5,
  enjoyment 4/5, all FIVE endings reached (doors/bounty/fall/mercy + reactive gating verified),
  mechanically flawless, ZERO bugs — and praised the reactive granary_floor/reckoning rewrites.
  It did not single out the fall, because a death epilogue the player reaches once reads fine in
  isolation; the gap is only visible against the device's own symmetry (bounty + mercy reframe;
  the fall, equally reachable both informed and ignorant, did not). Surfaced because the
  deterministic assessor is SATURATED (all 17 packs blind-clean; the ranked list is 0.5-floor
  blind stubs) and the no-new-packs directive (2026-06-04) points the lever at content DEPTH on
  existing packs — so the cycle closed this missing reactive beat rather than churn clean content.

fix: >
  ONE content edit, content/cyoa/pack/tithe_barn.yaml: add a `variants: [{ when: [{ has_flag:
  knows_truth }], text: ... }]` block to ending_fall, ABOVE the existing base `text`, with a
  leading design comment. First-match-wins, so the informed climb renders the reframed death
  (you read the loft holds the oldest of a hoard left to rot, climbed after more of it for
  yourself alone, and that same hoard comes down to "bury the one man who read it" while the lie
  goes on — telegraphed exactly as the base is) and the uninformed climb still renders the base.
  Both paths are genuinely reachable, so the base is no dead fallback and both land on the same
  endingId — the same cosmetic-reframe-never-reroute shape as ending_bounty/ending_mercy. No
  flag, route, choice, quest_stage, gate, scoring, or schema change; no new scene or ending;
  ending_doors deliberately stays variant-free (gated => always knowing).

witness: >
  THE TEETH, verified out of band (non-vacuity): with the 4 new cases GREEN against the real
  pack, neutering the new variant's guard (`when: has_flag: knows_truth` -> a flag that is never
  set) turned 2 of the 4 RED — the informed climb (go_in, read_book, decipher, leave_book,
  climb_loft) fell back to the base text, so both the "variant is live + supersedes base"
  assertion and the non-vacuity (two distinct renders) assertion failed. Restoring the pack
  returned the suite to 4/4 GREEN with only the intended +27-line addition (git diff --stat).
  Markers are layer-unique single lines: "you set a boot to the ladder knowing" (variant only),
  "you set a boot to the ladder, and for three rungs" (base only).

verification: >
  validate_story(content/cyoa/pack/tithe_barn.yaml) -> ok:true, 0 findings (knows_truth variant
  on a reachable-both-ways ending raises no dead-fallback / unreachable-variant warning — the
  exact bounty/mercy shape the validator already accepts). npx vitest run
  tests/regression/tithe_barn_informed_fall_reframes.test.ts -> 4 GREEN. npm run health -> GREEN
  (exit 0); net test count ROSE by exactly the 4 new cases. The pack's prose/identifier set
  changed but NO pack was added or removed -> the discovered-pack set is unchanged, so bug_0194
  scorecard freshness pin stays green (no regen needed). No src/ byte, no validator/engine/
  schema/generator change, no trace-hash re-pin, no scorecard/corpus/manifest change -> the
  existing tithe_barn_branching (bug_0136) and tithe_barn_quest_stage_reactive_prose (bug_0255)
  suites stay GREEN (the new variant touches none of their markers).

scope_honesty: >
  A genuine content-DEPTH improvement (completes the reactive-epilogue device on its last
  non-gated ending), NOT a discovered live defect and NOT a structural/soundness change. Pure
  pack edit + additive regression test. The blind pass found zero bugs; this closes a
  symmetry/depth gap the pass could pass over. No new pack (honours the 2026-06-04 no-new-packs
  directive). No engine/validator/generator/scorecard/corpus byte changed.

files_changed:
  - content/cyoa/pack/tithe_barn.yaml (knows_truth variant added to ending_fall)
  - tests/regression/tithe_barn_informed_fall_reframes.test.ts (NEW)
  - traces/bugs/bug_0272_tithe_barn_informed_fall_reframes.yaml (NEW, this file)

regression: >
  The contract IS the regression: it fails loudly if the informed fall ever stops reframing
  (variant dropped or its guard broken), if the base fallback stops covering the uninformed
  climb, or if either climb is rerouted off ending_fall. On a deliberate redesign of the fall
  epilogue, re-derive these contracts from the new prose — never relax the assertions to pass.
