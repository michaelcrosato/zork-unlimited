id: bug_0469_excise_retire_exhausted_evidence_rooms
title: "Surveyor's Round retires exhausted evidence-room navigation"
pack: content/cyoa/pack/excise_surveyors_round.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T214005Z_excise_surveyors_round_seed7.md
severity: S0
symptom: >
  A blind playtester noted that after the malting floor and cellar were fully
  measured, the office still offered navigation back to those rooms even though
  they contained no remaining evidence actions, only a return link. The same
  false affordance could appear for the yard outbuildings after both yard clues.
root_cause: >
  Side-room navigation choices were ungated except for the yard's first-entry
  split. The local clue actions retired correctly, but the hub links did not
  distinguish unfinished evidence rooms from fully exhausted ones.
fix: >
  Gate the malting-floor link on not having measured the grain, the cellar link
  on either tun or gravity evidence still being missing, and the return-yard link
  on either yard clue still being missing. Partial investigations remain
  reachable; fully searched rooms retire from the office action list.
tests:
  - tests/regression/excise_surveyors_round_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/excise_surveyors_round_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/excise_surveyors_round.yaml
  - npm run health
