bug_id: bug_0110
pack_id: null   # validator soundness guard; not specific to one pack
seed: 42
evidence:
  source: blind_playtest + validator_audit
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-02T09-00-04-216Z/playtest.md
  finding: >
    This cycle's mandated blind pass on the assessor's rank-1 target, The Wrecker's Light
    (seed 42 — the THIRD dedicated blind pass after seed 7/bug_0100 and seed 23, all clean),
    reached ALL FOUR endings (saved/wrecker/mercy/drowned), found ZERO mechanical bugs, and
    rated the pack clarity 5/5 / enjoyment 4/5. The pack is content-complete and blind-clean
    across three seeds (content-polish-backlog-exhausted). With no content fix warranted, the
    cycle's improvement is the documented #3 next-step from bug_0109: port the direction-aware
    var-reachability reasoning to the choice-gate feasibility check, which still shared the
    coarse `writtenVars.has` test bug_0109 retired for deadlines.
failure:
  type: validator_incomplete_check_dead_gate
  where:
    - engine:src/validate/cyoa_validator.ts
  description: >
    The choice-feasibility loop flags IMPOSSIBLE_GATE for a choice whose AND-context condition
    requires a flag/item/var that can never be satisfied (so the choice is never offered). Its
    var test was COARSE in exactly the way bug_0087's deadline test was: for a `var_gte: {value:
    V}` gate needing a raise above init, it only checked `writes.writtenVars.has(name)` — "is the
    var written at ALL?" — ignoring direction. A var that IS written but only ever DROPS (every
    write a dec_var, an inc_var with by<=0, or a set_var that lands BELOW V) starts below V and
    can never reach it: the gate is exactly as impossible as if the var were never written, yet
    the coarse test passed it. A maintainer who gates a choice on a "resolve >= N" / "trust >= N"
    counter that is only ever spent DOWN, or set short of the bound, ships a choice the engine can
    never offer — invisible to a blind playtest (the option simply never appears, like any
    unreachable branch).
fix:
  layer: validator
  summary: >
    Make the `var_gte` choice-feasibility test DIRECTION-AWARE, mirroring bug_0109. Hoist the
    directional VarWrite data (kind + signed amount) that collectFalsifiers already builds to the
    top of validateCyoa (computed ONCE, shared by the deadline checks and now the choice loop;
    the old inner `const falsifiers` in the meta.deadline block is removed). The var-feasibility
    branch is split: `var_gte && value>init` now errors IMPOSSIBLE_GATE unless
    `varCanReachGte(value, varWrites)` holds (some write is a positive inc — repeatable round a
    loop, so it accumulates — or a set landing at/above the bound). The `var_eq && value!=init`
    branch is LEFT on the coarse "is it ever written?" test — an inc/dec/set could land on an `==`
    value, so a written var is not provably dead (soundness: only flag the provably impossible).
    No schema, runner, engine, or content change; strictly strengthens an existing ERROR for the
    provably-impossible case, never weakens a check.
  reachable_endings_changed: false
  content_hash_changed: false        # no content pack edited
  regression_test: tests/regression/cyoa_impossible_gate_direction_aware.test.ts
  unit_tests: []                      # synthetic inline packs in the regression file
  fixtures: []
verified_live: >
    Bug-first: a synthetic pack whose `gated` choice requires doom>=5 (init 0) while doom is
    driven ONLY by dec_var (counts down) now yields IMPOSSIBLE_GATE; so do sub-bound set_var (set
    doom 2) and a non-positive inc (inc doom by:0). Soundness controls: a positive inc (doom +1)
    and a set at/above the bound (set doom 7) do NOT trip it; a var_eq gate on a written var is
    NOT flagged (eq stays coarse) while an eq gate on an entirely unwritten var IS. The shipped
    clockwork pack's var-gated choice (ticks>=4, fed by inc_var ticks by:1) still produces ZERO
    IMPOSSIBLE_GATE. `npm run health` exit 0; verify:integrity OK; typecheck/lint/format:check
    clean; all seven health-gated packs validate 0/0; all content hashes unchanged.
note: >
    Soundness over coverage, same stance as bug_0085/0086/0087/0109: only flags a gate whose
    satisfaction is PROVABLY impossible. Still does not reason about overshooting an `==` target
    via a step size, nor about var_lte gates (collectRequired does not treat var_lte as a hard
    requirement — a documented limitation shared with the deadline check). With this, the
    direction-aware var-reachability reasoning introduced for deadlines (bug_0109) now also backs
    the choice-gate feasibility check — the two var-bound consumers in the CYOA validator are
    consistent.
