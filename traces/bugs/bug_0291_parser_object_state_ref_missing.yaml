bug_id: bug_0291
component: verification   # a missing reference-integrity check in the validator, not a content/pack defect
# Surfaced by ultraplan re-aim cycle #16: allEffects already iterates open_object targets
# (line ~416, for the openableObjects set) and set_object_locked targets (line ~418, for
# unlockableObjects), but neither was cross-checked against objById. A typo'd
# `open_object: "chst"` silently populates openableObjects with the phantom string "chst"
# and writes into objectState["chst"] at runtime (a key with no corresponding declared
# object, no description, no interaction entries, no rendering path). A typo'd
# `set_object_locked: { id: "chst", locked: false }` silently no-ops the lock state —
# the keyed UNLOCK verb guards on the real object "chest" (which remains locked), the
# puzzle cannot be completed, and no error is reported. A typo'd
# `place_object: { id: "chst", room: "vault" }` silently places a nonexistent object —
# never rendered, puzzle-design intent defeated, no error reported. No existing check
# catches any of these cases: INERT_OBJECT_STATE fires only as a warning when the written
# state is never read by a condition (not whether the id is declared); IMPOSSIBLE_OBJECT_STATE
# checks condition-side feasibility; ITEM_REF_MISSING (bug_0281) covers add_item/remove_item
# only. Bug_0277 sealed room-ref conditions + goto/place_object.room; bug_0278 sealed
# unlock_exit.from/.to; bug_0281 sealed add_item/remove_item item refs; bug_0291 seals
# open_object/set_object_locked.id/place_object.id object-state refs.
class: soundness/validator
title: >
  validateParser did not check open_object/set_object_locked/place_object effect targets
  against pack.objects — a typo'd object id silently creates phantom object state, silently
  no-ops a lock change, or silently places a nonexistent object, with no existing oracle
  catching it.
findings:
  - id: object_state_ref_missing_unwitnessed
    where: src/validate/parser_validator.ts validateParser body (no OBJECT_STATE_REF_MISSING emit block; allEffects used for openableObjects/unlockableObjects harvest but not for object-ref integrity)
    severity: low   # latent: 0 dangling object-state refs in all shipped packs, gap is undetected for future authored/generated packs
    description: >
      allEffects(pack) was already used at the openableObjects/unlockableObjects harvest
      (lines ~415-418 of validateParser) to collect open_object and set_object_locked.id
      targets — but neither was ever cross-checked against objById (the Map<string,
      ParserObject> built from pack.objects at line 111). A typo'd `open_object: "chst"`
      would silently populate openableObjects with the phantom string "chst" and, at
      runtime, write into objectState["chst"] — a key with no corresponding declared
      object, no description, no interaction entries, and no rendering path. The phantom
      state entry persists invisibly. A typo'd `set_object_locked: { id: "chst", locked:
      false }` would silently write objectState["chst"].locked = false — the keyed UNLOCK
      verb guards on the real object "chest" (which remains locked), the puzzle cannot be
      completed, and no error is reported. A typo'd `place_object: { id: "chst", room:
      "vault" }` would silently place a nonexistent object into the vault room — the
      object is never rendered, the puzzle-design intent is defeated, and validation says
      nothing. No shipped parser or RPG pack uses open_object, set_object_locked, or
      place_object (confirmed by grep — only content/engine_contract.yaml names them as
      vocabulary declarations), so the gap was latent but undetected for any future
      authored or generated pack with a typo'd object id.
    fix: >
      Added a dedicated OBJECT_STATE_REF_MISSING emit block in validateParser, placed
      immediately after the ITEM_REF_MISSING block and before the AMBIGUOUS_ALIAS block.
      Iterates allEffects(pack), extracts the object id from any open_object (the string
      value itself), set_object_locked (e.set_object_locked.id), or place_object
      (e.place_object.id) effect, and checks it against objById — emitting
      err("OBJECT_STATE_REF_MISSING", ..., ["object:"+objId]) for each dangling id.
      Added OBJECT_STATE_REF_MISSING to the bail-early guard (alongside EXIT_TARGET_MISSING,
      START_MISSING, UNLOCK_EXIT_ROOM_MISSING, and ITEM_REF_MISSING) because a dangling
      open_object id silently populates openableObjects with a phantom string, which could
      produce false IMPOSSIBLE_OBJECT_STATE findings downstream when the phantom id
      accidentally matches a condition-side id. Added a broken fixture
      (content/broken-fixtures/parser_object_state_ref_missing.yaml), registered it in
      the unit test VALIDATOR_FIXTURES array, added the OBJECT_STATE_REF_MISSING case to
      the negative corpus, and added the dedicated §15 regression test. RPG is covered for
      free: rpg_validator.ts delegates to validateParser — no rpg_validator.ts edit.
soundness_argument: >
  This seals intra-frame object-state-effect reference integrity, extending the
  assume-guarantee ladder established by bug_0277 (room-ref conditions + goto/
  place_object.room), bug_0278 (unlock_exit.from/.to room refs), and bug_0281
  (add_item/remove_item item refs). Error severity is sound: a dangling object-state
  effect target is a structural defect (phantom state, silent no-op lock change, or
  phantom placement — never a deliberate transient), identical class to EXIT_TARGET_MISSING
  and ITEM_REF_MISSING. Adding OBJECT_STATE_REF_MISSING to the bail-early guard is sound:
  a dangling open_object id populates openableObjects with a phantom string, which the
  downstream IMPOSSIBLE_OBJECT_STATE feasibility check could then match vacuously against
  a condition-side is_open reference to the same phantom id. The check keys STRICTLY on
  objById membership (the same Map as all other object-id checks), so it cannot
  false-positive on a declared object and tempt a weakening of a real pack to silence it.
  No shipped pack uses open_object, set_object_locked, or place_object (verified by grep
  — confirmed: 0 dangling object-state refs across all shipped packs), so the new check
  is provably green-preserving. Purely ADDITIVE (a new error code) — no existing matcher
  weakened; verify:integrity's count/floor guards remain the bar and stay green. The
  dedicated regression proves the check FIRES on a dangling open_object (case b), a
  dangling set_object_locked (case c), all three effect kinds in the same pack (case e),
  and proves NON-VACUITY (case d: correct id clears it) — the same SoundnessBench
  discipline (arXiv:2412.03154) the INERT_OBJECT_STATE / negative corpora
  (bug_0182/0218/0253/0262/0277/0278/0281) use. The shipped-packs-stay-green invariant
  (auto-discover + iterate every parser + RPG pack, assert zero OBJECT_STATE_REF_MISSING)
  pins that no real pack emits the new code (verified: 0 dangling object-state refs),
  preventing a vacuous always-fire implementation.
failure:
  type: latent_soundness_gap
  description: >
    validateParser checked objById membership for object references in room.objects
    (ROOM_OBJECT_MISSING) and container.contents (CONTAINER_CONTENT_MISSING), and for
    add_item/remove_item item-ref targets (ITEM_REF_MISSING, bug_0281), but never for
    open_object, set_object_locked.id, or place_object.id effect targets. A typo'd object
    id would silently pass all validation and produce phantom object state, a silent no-op
    lock change, or a silent phantom placement at runtime, with no existing oracle
    (SOFTLOCK, BFS solver, INERT_OBJECT_STATE, IMPOSSIBLE_OBJECT_STATE, metamorphic
    relabel) catching it.
regression_test: tests/regression/parser_object_state_ref_missing.test.ts
