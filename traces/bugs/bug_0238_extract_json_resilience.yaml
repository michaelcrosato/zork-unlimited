id: bug_0238
title: extractJson crashed on JSON hidden after a non-JSON code fence, and on a stray bracket in a prose preamble
severity: medium
layer: engine_rule
status: fixed
discovered_by: AFK improvement cycle (engine de-risk of the keyed real-model run)
component: agents/llm/extract_json.ts

summary: >
  extractJson is the single funnel every real LLM backend (OpenAI/Anthropic/Google)
  runs its reply through before the requested Zod schema sees it, so it sits
  directly on the keyed-real-model-run path the recent cycles name as the one
  remaining durable lever (ultraplan true-goal pivot). The bug_0236 (author loop)
  and bug_0237 (playtester loop) catch-blocks now TOLERATE a thrown completion —
  but "tolerate" means "fail this round and revise," so a brittle extractor makes a
  keyed run burn revise rounds (or never converge) on replies that plainly contain
  valid JSON. Two off-shape replies a live frontier model routinely emits crashed
  the OLD extractor.

root_cause: >
  (1) FENCE TUNNEL VISION — the old extractor did `text.match(/```(?:json)?…/)`
  (non-global) and used ONLY the first fenced block. A reply with reasoning in one
  ``` fence and the JSON answer in a SECOND fence (or unfenced) operated solely on
  the reasoning fence, found no bracket, and threw "No JSON found" though the answer
  was right there.
  (2) FIRST-BRACKET COMMITMENT — it took the first `{`/`[` via `body.search(/[[{]/)`
  and committed to it: if that span was not valid JSON (a stray bracket in a prose
  preamble, e.g. "Note [see schema X]: {...}"), JSON.parse threw and it never
  advanced to the real object that followed.

fix: >
  Rewrote extractJson as a strict superset. It now collects candidate source texts
  — every non-empty fenced block's body, then the whole reply — and, within each,
  tries EVERY `{`/`[` as a JSON start (helper tryParseFirstJson over balancedSpan),
  returning the first balanced span JSON.parse accepts. balancedSpan keeps the
  proven string/escape-skipping depth scan so a brace/bracket inside a JSON string
  never miscounts. On total failure it throws an attributable
  "No parseable JSON in model reply: <head> (<last parse error>)". Every reply the
  old extractor parsed still parses to the same value.

residual_limitation: >
  A preamble bracket region that is ITSELF valid JSON (e.g. "scene[0]") is still
  returned first — but that was already true of the old extractor, and the caller's
  .strict() schema rejects the wrong-shape value, so the loop revises as designed.

invisible_to_suite_because: >
  The deterministic MockProvider/MockAuthorProvider always construct and return a
  schema-valid object, never exercising extractJson's tolerance; the prior
  llm_providers.test.ts only fed it WELL-FORMED fenced/bare/prose-embedded JSON.

regression_test: tests/regression/extract_json_resilience.test.ts
verification: npm run health (verify:integrity + typecheck + lint + prettier + tests + validate x17 + playtest) GREEN
notes: >
  No pack content changed (scorecard freshness pin bug_0194 untouched). providers.ts
  is not a verifier (no VERIFIER_TOUCHED / GUARD_WEAKENED). Closes the off-shape-reply
  robustness arc on its third leg: author (bug_0236) + playtester (bug_0237) catch the
  throw; bug_0238 reduces how often the throw happens at all on the shared extractor.
