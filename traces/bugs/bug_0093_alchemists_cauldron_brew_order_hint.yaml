  - tests/regression/alchemists_cauldron_reactive_brew.test.ts     # UPDATED: its pre-herb examine assertion used a recipe-reader route (TO_LAB_READY reads the spellbook), which now hits the bug_0093 hint; repointed from the literal static string to assert the two-step hint + no post-herb brew state. The three-state tracking invariant is preserved, not weakened; the static base is now asserted by the bug_0093 non-reader case.
