bug_id: bug_0093
pack_id: alchemists_tower_v1
seed: 11                           # this cycle's rotated blind-playtest seed; the regression drives seed 11 (win route + both examine states)
type: content_fix                  # one reactive OBJECT examine variant only — no engine/validator/schema/flag/item/score/exit/interaction/gating/reachable-ending change
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T00-13-20-449Z/playtest.md   # rotated onto alchemists_tower — this fix's source
  mandated_result: >
    The assessor's rank-1 was clockwork_heist AGAIN, but it has had 27+ independent clean blind passes
    in the last ~40 ai-runs while the parser packs are the least-attended — alchemists_tower had NOT
    appeared in the last 40 runs. Per docs/blind_playtest_protocol.md's "rotate the seed and rotate the
    pack" and the project memory ("rotate the pass onto the least-attended packs"), the mandated blind
    pass was rotated onto The Alchemist's Tower (parser). Fresh general-purpose MCP-only subagent, no
    source access, seeds 11/7/3: WON ending_cured 35/35 on the intended brew route; reached ending_poisoned
    on the trap route; verified the wrong-item guard (poison cannot be delivered as the cure). Clarity 5/5,
    enjoyment 3/5; zero rejected commands, no loops, no soft-locks; room/object text stayed in sync with
    every state change. ONE concrete actionable finding (below).
  finding: >
    Laboratory / cauldron (report §4): standing in the lab with the pale herb but no water yet, the recipe
    reads "the pale herb steeped in clear water" as a SINGLE combined state, while the mechanic is two
    ORDERED steps — steep the herb FIRST, then pour in the cellar's clear spring water. The cauldron's
    pre-herb examine was the static "A simmering cauldron, waiting for ingredients", giving no hint of the
    sequence, so a careful reader could not tell whether the cauldron's OWN simmering liquid already
    counted as the recipe's clear water or whether the cellar vial was still needed. The tester explicitly
    suggested the cauldron examine "could hint at the two-step sequence."
root_cause: >
  The cauldron's reactive `variants` (bug_0023/0039) covered only the MID-steep (herb_added) and FINISHED
  (antidote_brewed) states; the PRE-herb state fell through to the static base description, which named no
  ordering and did not distinguish the cauldron's own simmering medium from the recipe's "clear water"
  ingredient. The recipe's compact phrasing ("the pale herb steeped in clear water") reads as one combined
  state rather than two ordered steps, and nothing in the lab disambiguated it.
improvement:
  layer: content   # equivalently hint_text — reactive examine prose, no mechanic
  content:
    - content/parser/pack/alchemists_tower.yaml: >
        Added ONE reactive `variant` to the `cauldron` object, gated on [{ has_flag: read_recipe }] (the
        flag the spellbook READ sets), listed AFTER the antidote_brewed and herb_added variants so it fires
        ONLY in the pre-herb decision moment (first match wins). Text: "A great cauldron of plain water
        simmering over a low flame, empty of any ingredient yet — its own simmer is not the clear water the
        recipe means. By that recipe the cure is brewed here in two steps: first steep the pale herb in it,
        then finish the green steep with the clear spring water poured in." It names the cauldron's simmer
        as NOT the recipe's clear water and spells out the two-step order. Gating on read_recipe keeps the
        bug_0052 leak lesson — a library-skipper sees the intrinsic static base, never a quoted recipe.
        Examine-only: no flag/item/score/exit/interaction/gating/reachable-ending change.
verification:
  - vitest (new + updated): tests/regression/alchemists_cauldron_brew_order_hint.test.ts (4 cases) + alchemists_cauldron_reactive_brew.test.ts → 8 tests pass
  - reader pre-herb cauldron examine names the two-step order + "not the clear water"; non-reader keeps the static base and never says "recipe"; herb_added still wins once the herb is in; canonical brew route still wins ending_cured 35/35
  - npm run health   # see locked_by / notes
locked_by:
