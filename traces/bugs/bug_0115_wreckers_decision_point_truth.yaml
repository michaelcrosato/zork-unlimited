bug_id: bug_0115
pack_id: wreckers_light_v1
seed: 11
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T10-35-28-612Z/playtest.md   # wreckers_light, seed 11
  finding: >
    The assessor's mandated target rotated onto wreckers_light (per the "rotate the seed and
    the pack" clause and project memory: rotate the mandated pass onto the least-attended
    pack). A fresh source-blind MCP-only subagent (seed 11) played 4 routes to all FOUR
    endings (saved/wrecker/mercy/drowned), rated it clarity 5/5, enjoyment 5/5, and found
    ZERO functional bugs (no rejected actions, loops, or broken state; reactive scene text
    and item-gating all verified). It raised exactly ONE substantive observation, TWICE
    (§4 confusion + §5 design flaw + §6 verdict): reading the keeper's journal (knows_truth)
    had a payoff that was "invisible within a single playthrough" — the truth reframed only
    the ENDING prose, never the decision the player was actually making, so the most
    investigative players got narrative-only payoff they could not perceive in one run.
failure:
  type: payoff_legibility_design_gap
  scene: [lantern_room, gallery]
  description: >
    knows_truth (set by reading the journal in the oil store) fired reactive variants ONLY
    on the ending text (ending_saved / ending_wrecker / ending_mercy — locked by
    wreckers_light_branching.test.ts). The two scenes where the player COMMITS the moral act
    — lantern_room (the save-beat) and gallery (the wreck-beat) — had inventory-only variants
    that read identically whether or not the player had uncovered the Mourning Star truth.
    The investigative reward was therefore real but imperceptible inside a single
    playthrough: the journal changed the epilogue you would eventually read, but not the
    weight of the moment in which you chose. The pack's design is deliberately a REFRAME, not
    a route (the journal must NEVER unlock a new ending), so the gap is one of legibility, not
    of missing mechanics.
fix:
  layer: content   # knows_truth-aware decision-point scene variants (the reactive-prose device, bug_0099/0051)
  pack: content/cyoa/pack/wreckers_light.yaml
  summary: >
    Added a knows_truth-aware variant to each of the two moral-decision scenes, placed
    most-specific-first so it wins over the inventory-only variant (first-match-wins):
      - lantern_room: when [lamp_oil, striker, knows_truth] the save-beat NAMES the Mourning
        Star and frames waking the lamp as a debt paid by a steady hand that a vengeful one
        never could — echoing the ending_saved knows_truth epilogue at the moment of choice.
      - gallery: when [lamp_oil, striker, knows_truth] the false-light beat becomes vengeance
        for the keeper's drowned son ("walk him onto the teeth that took the boy"), not bare
        greed — echoing the ending_wrecker knows_truth epilogue at the moment of choice.
    Uninformed players (no journal) still see the original inventory-only variants verbatim.
    Content-only: NO new choices, conditions, flags, routes, or endings; the available actions
    at each decision scene are byte-identical informed vs uninformed (locked by the test), so
    the reframe changes only how the moment READS, never what the player can DO.
  reachable_endings_changed: false   # same four endings; same routes; knows_truth stays cosmetic
  content_hash_changed: true         # text-only additive variants; wreckers_light is NOT a HASH_PIN_FILE, no test pins it
  new_pack_hash: 28e6eb0b77b1e57bcbba8440e2a6bc3aecff7a4842ebfc044c13e32d2da8b505
  regression_test: tests/regression/wreckers_light_decision_point_truth.test.ts
verified_live: >
    validate_pack reports ok / 0 findings. The new regression test (3 cases) passes: the
    informed save/wreck DECISION scenes contain "mourning star" (plus the distinctive
    "steers him clear" / "the teeth that took the boy" reframe phrases) while the uninformed
    ones do not and still render their original prompts ("lights up for her" / "ape a safe
    harbor"); and the available actions are identical informed vs uninformed at both beats.
    The existing wreckers_light_branching.test.ts (which exercises these exact routes to all
    four endings and locks the cosmetic-not-route ending invariant) still passes unchanged,
    confirming routes and endings are untouched.
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the multi-step arm-then-choose routes (a
    standing heuristic-planner limit), so the blind LLM playtest is the load-bearing quality
    signal — here the second dedicated blind pass on this pack (seed 11, after bug_0100's
    seed 7), clean at clarity 5/5, enjoyment 5/5 with this one legibility gap, now closed.
