id: bug_0193
title: "MCP authoring asymmetry — adapt_story only routed CYOA, so an agent could AUTHOR a fresh CYOA pack from a premise but never a fresh PARSER or RPG pack through MCP"
kind: engine_fix # MCP-surface feature addition (the authoring-side twin of the bug_0192 generation symmetry)
mode: all
# Informational. No pack content changed, so nothing re-pins. verify:integrity stays green
# with no AI_LOOP_ALLOW_VERIFIER_EDITS.

summary: >
  The two sides of the authoring program are the GENERATION surface (generate_*: a procedural,
  premise-free pack) and the AUTHORING surface (adapt_story: the §12.1–3 writer → adapter →
  validator loop that turns a one-sentence premise into a validated pack). bug_0192 closed the
  generation surface to all three modes (generate_pack / generate_rpg_pack / generate_parser_pack).
  The authoring surface was still CYOA-only: adapt_story always called runAdapter (behind
  validateCyoa). runParserAdapter and runRpgAdapter existed (agents/authoring/adapter.ts — the
  bug_0139/bug_0140 loops, each behind its richer validator) and were unit-proven, but NOTHING on
  the MCP boundary could reach them. So an agent could author a fresh CYOA pack from a premise but
  could never author a fresh PARSER or RPG pack — the parser/RPG authoring loops (and their
  reference-integrity / soft-lock / combat-winnability / skill-check validators) never faced the
  agent-facing MCP boundary the way the CYOA loop did.

root_cause: >
  src/mcp/tools.ts adapt_story hard-coded `runAdapter(provider, { story, contract })` with no way to
  select the parser or RPG adapter, and src/mcp/server.ts registered adapt_story with only a `premise`
  param. The mode-routing machinery already existed and was complete: runParserAdapter / runRpgAdapter
  take the SAME { story, contract } as runAdapter (the writer story is mode-agnostic), and the
  MockAuthorProvider already returns canned ParserAdapterOutput / RpgAdapterOutput fixtures
  (lighthouse_parser_v1 / lighthouse_rpg_v1) that those loops drive green. Only the MCP wiring was missing.

fix: >
  Additive symmetry, no check weakened, no generator_version bump, no corpus re-seal, no verifier edit.
  (1) src/mcp/tools.ts: import runParserAdapter + runRpgAdapter alongside runAdapter; give adapt_story an
  optional `mode: PackMode` (default "cyoa") and route the SAME writer story to runParserAdapter (parser,
  behind validateParser) or runRpgAdapter (rpg, behind the richest validateRpg) or runAdapter (cyoa); echo
  the resolved `mode` in the result. (2) src/mcp/server.ts: add an optional `mode` enum param
  (cyoa|parser|rpg) to the adapt_story registration and update its description. The CYOA default keeps every
  existing caller byte-compatible (mcp_tools.test.ts adapt_story case unchanged).

out_of_band_teeth: >
  tests/regression/mcp_adapt_story_mode.test.ts (5 cases): the no-mode default and mode:"cyoa" both return
  lighthouse_v1 with mode "cyoa" and a green report (back-compat); mode:"parser" returns lighthouse_parser_v1
  with mode "parser", and the returned pack is INDEPENDENTLY validateParser-clean and carries `rooms` (a real
  parser pack, not a mislabelled CYOA pack); mode:"rpg" returns lighthouse_rpg_v1 with mode "rpg", carries the
  Stage-4 `enemies` layer, and is INDEPENDENTLY validateRpg-clean; and every mode re-adapts the SAME story
  (title "The Lighthouse", classifications carried through). Genuine witness: on the pre-fix tool the `mode`
  arg is ignored and there is no `mode` field, so the parser/RPG/default-mode assertions fail.

regression_test: tests/regression/mcp_adapt_story_mode.test.ts

verification: >
  npx vitest run tests/regression/mcp_adapt_story_mode.test.ts green (5 tests). npm run health green
  (verify:integrity + lint + prettier + typecheck + all tests + all pack validates + coverage playtest).
  verify:integrity green with NO AI_LOOP_ALLOW_VERIFIER_EDITS (no protected/hash-pinned file changed, no
  floor lowered, no matcher relaxed). Mandated blind pass this cycle ran on dead_reckoning (CYOA, seed 19):
  clarity 5/5, enjoyment 5/5, zero bugs across three distinct endings — clean, the saturation signal spent
  structurally rather than on churning a clean pack.

files_changed:
  - src/mcp/tools.ts                # import runParserAdapter + runRpgAdapter; adapt_story mode param + routing + echo mode
  - src/mcp/server.ts               # add optional mode enum param to adapt_story registration + description
  - tests/regression/mcp_adapt_story_mode.test.ts
  - traces/bugs/bug_0193_mcp_adapt_story_mode_symmetry.yaml
