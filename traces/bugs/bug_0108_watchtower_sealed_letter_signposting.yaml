bug_id: bug_0108
pack_id: watchtower_road_v1
seed: 7
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-02T08-37-28-787Z/playtest.md
  finding: >
    A fresh general-purpose MCP-only source-blind subagent played The Watchtower Road
    (seed 7, plus west/stealth strategy runs). It reached all three endings
    (truth/escape/captured), found ZERO functional bugs, and rated clarity 5/5,
    enjoyment 4/5. Its single concrete actionable finding (report §5): on the dominant
    east route it took the `sealed_letter` at the overturned cart and "it never had any
    use, examine action, or effect on any ending or the checkpoint ... reads like a
    Chekhov's gun that never fires." It also noted (§4) that the checkpoint sergeant
    demands "Papers" but offered no papers verb on the run where it carried no letter.
failure:
  type: unsignposted_item_reads_inert
  where:
    - content:content/cyoa/pack/watchtower_road.yaml#abandoned_cart  # take_letter pickup journal
  description: >
    The sealed_letter is NOT actually inert — it has two real uses: `show_letter` at
    hermit_talk breaks the seal and sets learned_truth (the west player's route to the
    truth), and `show_papers` at the checkpoint routes to confront_smuggler. But both
    uses sit on routes the dominant tower/beacon path bypasses (tower_top -> light_beacon
    -> signal_fire -> decision_point never passes the hermit OR the checkpoint), and the
    pickup journal — "A wax-sealed letter, addressed to no one." — gave the player no
    hint of what the letter is FOR. So a player who grabs it on the way up the tower
    carries dead-feeling inventory and, at the checkpoint's "Papers" prompt, has no cue
    that this letter is the papers being asked for. The flaw is signposting, not
    mechanics: the affordances exist but are invisible until you happen onto the scene
    that consumes them.
fix:
  layer: hint_text
  summary: >
    The take_letter pickup journal now foreshadows the letter's two real uses instead of
    reading as a dead pickup: "A wax-sealed letter, addressed to no one — but it reads
    like the kind of papers a checkpoint guard would demand to see, or that a knowing eye
    could break open and read." The "papers a checkpoint guard would demand" half points
    at the checkpoint's "Papers" prompt + the show_papers option (resolving the §4
    friction); the "knowing eye could break open and read" half points at the hermit's
    show_letter reveal. Pure hint_text: no item, scene, choice, gate, route, or ending
    changed — only the one-shot journal string the pickup writes. The mystery beat
    ("addressed to no one") is preserved.
  reachable_endings_changed: false  # still truth/escape/captured; routes/gates intact
  content_hash_changed: true        # watchtower_road edited (journal string only).
                                    # f6b64fd9… -> 862b33adb10a4982aa8a963dbf676a77d58fb81c813940184e0615e5c52ddd7a
                                    # Re-pinned deliberately in the live assertion
                                    # (tests/unit/rpg_validator.test.ts) and the documentary
                                    # HASH_PIN_FILE (traces/bugs/bug_0002_watchtower_blind_polish.yaml).
  regression_test: tests/regression/watchtower_letter_signposting.test.ts
verified_live: >
    Through the engine over the compiled pack, building observations the way the MCP
    server does (buildObservation). Taking the letter at the cart writes exactly one
    journal entry that mentions both "papers"/"checkpoint" and "read"; the entry no longer
    reads as the bare "addressed to no one" line. The letter's two consumers are unchanged
    and still reachable: show_letter at the hermit still breaks the seal (learned_truth +
    seal_broken) and show_papers at the checkpoint still appears only when the letter is
    carried and routes to confront_smuggler. The pack validates 0 findings (no INERT_FLAG,
    coherence/beacon regressions still green).
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the multi-step letter/proof/beacon routes
    (a standing heuristic-planner limit since bug_0008), so the blind LLM playtest remains
    the load-bearing quality signal here. This fix closes the rotated cycle's single
    actionable finding by signposting an item whose affordances already existed but were
    invisible on the dominant route, without touching the pack's routes, gates, or
    reachable endings.
