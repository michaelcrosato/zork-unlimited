id: bug_0429
title: Chandler's Lot hid its bribe branch behind TAKE purse
pack: content/parser/pack/chandlers_lot.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: medium
symptom: >
  The blind playtest called out the sealed purse as an ambiguous branch: the
  examine text warned that carrying it would make the inspection look bought, but
  the visible command was still the ordinary inventory verb "take sealed purse."
root_cause: >
  sealed_purse used takeable/take_effects to trigger the bought ending, overloading
  parser TAKE semantics with a deliberate accept-the-bribe choice.
fix: >
  Converted the branch to an explicit target-only USE interaction with
  command_verb: pocket, so the offered command is "pocket sealed purse" and no
  take-purse action appears. The bad ending and full-score registration route are
  unchanged.
tests:
  - tests/regression/chandlers_purse_bribe_branch.test.ts
verification:
  - npm test -- --run tests/regression/chandlers_purse_bribe_branch.test.ts
  - npm run validate -- content/parser/pack/chandlers_lot.yaml
