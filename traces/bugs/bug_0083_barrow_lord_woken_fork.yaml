type: content_fix   # cashes an existing warning with a real fork; additive, no engine change
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T22-01-39-067Z/playtest.md   # sunken_barrow seed 7 (rotated OFF the over-fitted clockwork_heist target)
  finding: >
    This cycle's mandated blind pass rotated OFF the assessor's perennial rank-1 target
    (the CYOA pack The Clockwork Heist — ~24 consecutive pristine 5/5 blind passes,
    over-fitted across bug_0019–bug_0082; every recent cycle note says "rotate the blind
    pass onto less-attended packs; clockwork can rest") and onto The Sunken Barrow. A
    fresh MCP-only playtester (seed 7) reached BOTH endings, rated clarity 5/5 /
    enjoyment 3/5, and named the pack's SINGLE BIGGEST design gap (its words): the
    reaver's shade gravely warns "do not think to wake what sleeps beneath the slab; the
    Lord is long past waking", framing the descent as a real moral / danger choice — wake
    a powerful enemy vs. leave him be — but "the slab is the only route forward and leads
    straight to the crown on a plinth. There is no Barrow-Lord to wake, no 'disturb the
    slab' action anywhere, and no bad/death ending for greed. The single most dramatic
    warning in the game points at nothing mechanical." It also flagged a continuity
    wobble: the barrow_mouth intro sings of the crown "still on his brow", yet the Relic
    Chamber showed it on a plinth with NO Lord present. This is the same class of flaw as
    clockwork's decorative clock before bug_0079 — prose writing a check the engine never
    cashes — compounding the barrow's standing critique (brief, linear, single ending).
improvement:
  layer: content   # purely additive; nothing on the existing critical path changes
  what: >
    Made the warned-against act REAL, mirroring bug_0079's "make the namesake mechanic
    real" choice (cash the warning, don't soften it away). The Barrow-Lord now lies in a
    sealed sarcophagus at the heart of the Relic Chamber, beside the circlet's plinth
    (closing the "no Lord present / crown on his brow" continuity wobble: the circlet is
    now described as lifted from his brow to the plinth at the burying). Two real
    outcomes:
      (a) TAKE the crown and climb out — the wise path the shade urges — still fires the
          UNCHANGED win (claim_relic → ending_victory) at the full 50/50;
      (b) PRISE the sealed sarcophagus lid with the iron bar — the warned-against hubris
          — ends the run at a NEW doom ending, ending_woken ("What Sleeps Beneath",
          death: true): you wake the Lord and undo the very thing the shade begged you
          leave alone.
    The prise interaction reuses the slab's tool-and-back motif (a USE with the iron bar
    + command_verb "prise" / command_template "prise {target} with {item}", echoing the
    slab's "lever ... with the iron bar", bug_0078). The player ALWAYS holds the bar in
    the chamber (the slab cannot be levered without it, bug_0069), so the choice is always
    offered.
  informed_not_gotcha: >
    Per the barrow's honesty discipline (bug_0027/0029/0069) the doom is an INFORMED
    choice, never a gotcha: the shade warns it outright (ask_lord), the chamber prose
    telegraphs the heavy, wrong air over the sealed lid IN SCENE (so even a player who
    skipped the shade chooses with eyes open), and the sarcophagus examine repeats the
    warning. The obvious, signposted act — take the crown — is the safe one; you must go
    out of your way, with the lever-bar, to prise a dead king's coffin.
  preserves_critical_path: >
    No engine/schema/validator change. Nothing on the existing path changes — the rooms,
    combat, lever puzzle, milestone scoring (still 50), and the peaceful win (claim on
    TAKE circlet) are untouched; the canonical victory route's final STATE is byte-
    identical (no added steps, no new state-mutating behaviour on that route), so the
    pinned trace's expected_final_hash is UNCHANGED. Only the content hash moves (a new
    object, interaction, ending, and the chamber description).
