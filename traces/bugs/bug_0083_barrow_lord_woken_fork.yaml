deferred:
  - >
    From the seed-7 pass (not addressed here, milder): the wight fight is short enough
    (~2 hits) that the shade's +2 defense ward and its threatened strength-drain rarely
    bite — "thin as an RPG ... set dressing on a single trivial fight." Making the woken
    Lord a genuine OPTIONAL boss fight (where the ward finally pays off) would cash this
    too, but needs an engine notion of a DORMANT enemy (enemies are always-active in
    their room) or a new room reachable only by a goto-from-interaction (which the parser
    validator's exit-only reachability would flag UNREACHABLE_ROOM) — a broader,
    engine-layer change deferred as its own future cycle.
