id: bug_0375
pack: assayers_mark_v1
title: "assay hall claimed the court gate was clear before the commission paper"
severity: medium
scene: assay_hall
reported_by: blind_playtest_20260620T111259Z_assayers_mark_seed7

symptom: >
  After taking the silver plate and aqua fortis, touching the plate to the
  touchstone, and applying the acid, the assay hall description said "the court
  gate north is now clear." The north exit was still mechanically blocked because
  the player had not taken the commission paper from the record room.

root_cause: >
  The completed-assay room variant was keyed only to `proved_debased` plus the
  two held assay items. The actual north exit condition also requires
  `has_item: commission_paper`, so the prose advanced one proof step earlier than
  the legal exit state.

fix: >
  Split the completed-assay variants. Gate-clear prose now requires both
  `proved_debased` and `has_item: commission_paper`; the proved-only state instead
  says the commission paper in the record room still has to name the chain before
  the Warden will hear it. No effects, scores, exits, or win conditions changed.

tests: tests/regression/assayers_gate_prose_sync.test.ts
