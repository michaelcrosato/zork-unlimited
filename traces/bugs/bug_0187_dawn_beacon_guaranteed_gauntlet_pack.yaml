design:
  thesis: >
    A frontier watch-keep the night a raiding host means to ford the river below at first light. The keep's
    warning-beacon is the only thing that can wake the valley, and two raiders have slipped in to keep it
    dark. You are the last of the watch: cut past the gate-raider and the raider-captain on the beacon-stair,
    lever the toppled cresset upright (one seeded might check), climb the crown and light the beacon (the win).
  mechanic_axis: >
    GUARANTEED FAIR COMBAT — the opposite design pole from the two existing RPG packs. cold_forge (bug_0101)
    and sunken_barrow (bug_0102) are deliberate GAMBLES: even a fully-prepared player can die on bad rolls,
    neither opts in, so the validator's UPPER-bound checks were only ever exercised GREEN by the GENERATOR
    (bug_0173) and RED by synthetic packs (rpg_combat_guaranteed_optin, the negative corpus bug_0182). The
    Dawn Beacon is the FIRST curated pack to set meta.combat_guaranteed: true, and the first to drive those
    checks green on disk. The fiction earns it: the antagonists are LIVING men evenly matched with a trained
    soldier, so the old watchman can make a TRUE promise the barrow's hedging shade never could — "warded
    and counseled, no raider on that stair will put you down." That promise is the combat_guaranteed flag
    spoken aloud, honest BECAUSE the validator proves it.
  combat_math: >
    Best reachable stats = init (hp26/atk4/def2/might3) + the watchman's +2 attack counsel + the garrison
    mail's +2 defense = atk6/def4/hp26. Combat is one ATTACK = one round, player strikes first, dmg =
    max(1, d6 + atk - enemyDef); enemy retaliates on rounds it survives. Per-fight worst-case (player min
    roll, enemy max roll): gate-raider (hp12/atk5/def1) -> 2 rounds, 7 damage; raider-captain (hp13/atk5/def2)
    -> 3 rounds, 14 damage. Each < 26 (COMBAT_NOT_GUARANTEED clears) and cumulative 7+14 = 21 < 26
    (COMBAT_GAUNTLET_NOT_GUARANTEED clears) with margin. base-stat play (no prep) on worst rolls still dies
    in fight B (cumulative would exceed 26), so the death ending stays genuinely reachable — the guarantee
    only ever covers the BEST-prepared player (bug_0114).
  endings:
    - id: ending_lit
      reach: "(prepared) read orders +5 -> don mail (+2 def) -> hear counsel (+2 atk) -> kill gate-raider +10 -> kill captain +10 -> lever cresset (might) +10 -> climb to crown +15 = 50/50"
      note: "the sole win; visited: beacon_crown (locomotion win, like cold_forge's ember chamber); SCORE_PEAKS does not fire on a navigation win"
    - id: ending_fallen
      reach: "(under-armed) skip the mail and/or counsel, take worst rolls -> fall to a raider on the stair"
      note: "DEATH (both enemies' death_ending); recoverable via load (§8.7); not a win_condition"

