  hash pin moved. validate_story 0/0 (zero errors AND zero warnings; combat_guaranteed audited GREEN — both
  guarantee codes absent). Wired into the bar per [[verification-bar-covers-all-packs]]: added a
  `validate -- content/rpg/quests/dawn_beacon.yaml` step to the `health` npm script, and extended the
  all_packs_validated_by_bar discovery list (eleven -> twelve, "eleven" -> "twelve"). list_stories and the UI
  catalog auto-discover it (the UI globs content/**/pack/*.yaml). The benchmark curated split (discovered
  from content/*/pack) gains one low-scoring RPG puzzle row, which benchmark_headline_no_regression confirms
