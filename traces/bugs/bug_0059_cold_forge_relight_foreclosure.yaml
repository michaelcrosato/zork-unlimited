    both runs; clarity 5/5, enjoyment 3/5; zero rejected actions, no loops, no soft-locks.
  finding: >
    cold_forge rotated report §4: "the inscription/spirit lore implies you might be tempted to
    relight the forge, but no such action exists, so a curious player briefly wonders if there's a
    fire mechanic ... it's the one spot where flavor hints at depth that isn't there." This is a
    SEPARATE over-promise from bug_0029 (which killed the sentinel 'warm-up clock' read): the whole
    pack is a *forge* dense with heat/fire/kindling lore, and the lantern-spirit — the pack's
    explain-everything NPC — answered the sentinel and the Heart but had NO topic for the forge/fire
    itself, the most thematically tempting question. Same class as a Chekhov's gun pointing nowhere
    (cf. bug_0019/bug_0029): atmosphere implies a system the game never offers, and nothing on-screen
    closes the loop.
root_cause: >
  The lantern_spirit dialogue (npcs[lantern_spirit].dialogue) carried exactly two one-shot info
  topics — ask_sentinel and ask_heart — and no counsel about the forge/fire. A first-timer standing
  in a forge full of relight-adjacent lore has an obvious unanswered question ("can the fire be lit
  again?") that the otherwise-omniscient spirit simply did not address, leaving the relight
  temptation dangling.
improvement:
  layer: content
  content:
    - content/rpg/pack/cold_forge.yaml: >
        Added a THIRD one-shot lantern-spirit topic, ask_forge ("Ask whether the dead forge could
        ever be lit again"), gated not_flag heard_forge exactly like ask_sentinel/ask_heart, plus its
        node spirit_forge. The node denies relighting outright ("Lit again? No — never ... no bellows,
        no kindling, no craft of mine that will wake it ... none to find, and none to be made") and
        re-points at the real goal (carry the Ember-Heart out — "the only fire that leaves this
        place"). on_effects: set_flag heard_forge + one add_journal line. It loops back to spirit_root
        whose ungated leave_spirit keeps the node terminating (an all-gated escape would trip
        DIALOGUE_NONTERMINATING, bug_0014). No stat/effect/DC/exit/combat/score change — the +2
        sentinel blessing, the fight, the grate check, and the 50/50 path are untouched.
