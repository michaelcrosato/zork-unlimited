  rotated_result: >
    ROTATED the actual improvement off the assessor's rank-1 clockwork_heist. The mandated blind
    playtest (clockwork_heist, seed 17) reached 3 of 4 endings (rich/caught/truth), clarity 5/5 /
    enjoyment 4/5, zero rejected actions / no loops / no soft-locks, NO concrete bug — its bug_0040/
    0042/0043/0058 polish all held under a fresh independent pass; the one soft spot (the deadline
    reading as atmospheric for the careful player) is intentional design already exhaustively tested
    (15 clockwork regression files, incl. clockwork_guard_patrol_deadline + patrol_reachable). A
    marginal prose tweak on that delicately-tuned, heavily-pinned pack would risk regression for no
