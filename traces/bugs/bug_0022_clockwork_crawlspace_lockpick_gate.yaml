bug_id: bug_0022
pack_id: clockwork_heist_v1
seed: 29
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T08-38-02-056Z/playtest.md
  finding: >
    Playtest target stayed on the assessor's rank-1 candidate, the CYOA pack The
    Clockwork Heist (its 2 coverage-"unreached" endings + 1 unvisited location are
    the deterministic bot's planning limit — random strategy reaches all 4 endings,
    documented since bug_0019 — not pack flaws). A fresh, MCP-only blind playtester
    (seed 29) reached all four endings, rating it clarity 5/5, enjoyment 4/5,
    mechanically flawless (zero rejected actions, no loops, no soft-locks). Its ONLY
    enjoyment-docking finding (report §4 + §5), the same STRUCTURAL item deferred
    across bug_0019 §4(a) / bug_0020 / bug_0021 note (c): "The crawlspace route ends
    the whole game in 3 actions. A first-timer who examines the clock first (a
    natural choice, and the leftmost option) is routed straight to an ending before
    discovering the vault, lockpicks, ledger, or moral choice — the game's best
    content... Reachable in one click too few, that secret ending undersells an
    otherwise polished and genuinely satisfying piece."
failure:
  type: premature_ending_bypasses_main_content
  where: [content:content/cyoa/pack/clockwork_heist.yaml]
  description: >
    The crawlspace strongbox offered a brute-force `pry_strongbox` ("Lever the
    rusted strongbox open by hand", gated not_item lockpick) that reached
    ending_truth with no tool. So from the leftmost opening choice the headline
    "Truth" twist was reachable in three actions — inspect_clock -> pry_panel ->
    pry_strongbox — bypassing the vault, the lockpick puzzle, the ledger/patrol
    timing, and the gold-vs-truth moral choice. It was both the path of least
    resistance and a latent coherence crack: the brute-force pry was the ONLY place
    in the manor where forcing worked, contradicting the central motif the brass
    plate states outright — "yields only to a steady hand — never to force."
fix:
  layer: content
  summary: >
    Made the crawlspace strongbox a true lockbox that requires the lockpick — the
    heist's signature item, found in the kitchen — so the secret route complements
    rather than pre-empts the vault. (1) Removed the brute-force `pry_strongbox`;
    `open_strongbox` (has_item lockpick) is now the only way in. (2) Added a no-pick
    nudge `study_strongbox` (not_item lockpick) that narrates the locked box and the
    "never to force" rule, then routes OUT to the foyer — a real scene change is
    progress, never a self-loop (the bug_0005 / bug_0008 lesson). (3) Added a foyer
    `enter_panel` re-entry choice (has_flag found_passage) so the crawlspace stays
    reachable after you crawl out to fetch the pick — no dead content, no soft-lock.
    (4) Reworded the crawlspace base text so the strongbox reads as "locked fast"
    (justifying the pick) while still introducing the "single sealed letter"
    (preserving the bug_0017 coherence assertion). The truth, on EITHER route, now
    sits behind a picked lock — elegant symmetry that also closes the lone
    forcing-works crack. The 3-click freebie becomes a real mini-heist: discover the
    panel -> realize you need a tool -> traverse to the kitchen -> return -> crack it.
    The `enter_panel` re-entry is itself gated on the lockpick (has_flag
    found_passage AND has_item lockpick): a tool-less player has no reason or way to
    bounce back into the locked box, which also removed a transient coverage-bot
    foyer<->crawlspace oscillation a first cut (re-entry gated on found_passage
    alone) introduced — caught in the run_playtest coverage pass and fixed before
    commit, so the only remaining coverage oscillation is the PRE-EXISTING
    study<->landing one documented since bug_0008/bug_0019.
  reachable_endings_changed: false  # all four endings still fire; ending_truth still reachable via crawlspace AND vault take_letter
  soft_lock_introduced: false       # lockpick always available in the kitchen; crawlspace re-enterable via enter_panel once you hold the pick; foyer is safe ground
  content_hash_changed: true        # clockwork_heist yaml: 626c00d93cc3... -> a5f76f8a3943cdbdc7568b677ef56a493a0899334890b4fdd2d4c1c05637250d (unpinned; only watchtower_road is pinned in tests)
  coverage_net_neutral: true        # run_playtest random 100/100 ended, all 4 endings, ALL scenes visited, 0 suspicious paths; coverage leaves only the pre-existing study<->landing oscillation + vault-unvisited (the bot's documented planning limit, not introduced here)
related_test_updates:
  # The old brute-force route ["inspect_clock","pry_panel","pry_strongbox"] was used
  # as a convenient ending_truth reachability check in three pre-existing tests; each
  # is repointed to the new lockpick-gated route (surfaced, not laundered — the route
  # genuinely changed by design, mirroring the bug_0007 multi-route update).
  - tests/regression/clockwork_truth_path_coherence.test.ts   # CRAWLSPACE_ROUTE constant
  - tests/regression/clockwork_guard_patrol_deadline.test.ts  # CRAWLSPACE_TRUTH constant
  - tests/regression/clockwork_foyer_reactive_text.test.ts    # inline reachability check
  - tests/regression/cyoa_reactive_scene_text.test.ts         # inline reachability check
regression_test: tests/regression/clockwork_crawlspace_lockpick_gate.test.ts
verified_live: >
  Verified LIVE through the MCP tools (content-only change => the running server
  reloads the pack on new_game, so it is authoritative; seed 29). Discovering the
  panel without a pick (inspect_clock -> pry_panel) shows the crawlspace with ONLY
  study_strongbox + back_crawl — `pry_strongbox` is gone. study_strongbox narrates
  the locked box and routes to the foyer (move crawlspace -> foyer; a real scene
  change, no self-loop), where `enter_panel` re-entry now replaces the spent
  pry_panel. Fetching the pick (kitchens -> take_pick -> back_foyer) and re-entering
  (enter_panel) shows open_strongbox (study_strongbox gone); open_strongbox ->
  ending_truth. The 3-action freebie no longer exists; the truth now requires the
  lockpick and a traversal of the manor.
