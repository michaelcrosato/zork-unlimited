id: bug_0371
title: "white_stag: informed ice death accused ambiguous crossing intent"
pack: content/cyoa/pack/white_stag.yaml
detected_by: blind_playtest_20260620T070222Z_white_stag_seed7
severity: significant

description: >
  After reading the stone, choosing cross_ice reached ending_lost with text that
  said "You read the stone. You knew" and closed by saying the player "crossed to
  take it." The choice text says only "Chance the rotten ice straight across
  toward the stag," so a player may reasonably intend to approach the stag in
  person rather than kill or take it. The rotten-ice death is fair, but the
  moralising intent claim is not.

reproduction:
  - go_on
  - read_stone
  - decipher
  - leave_stone
  - cross_ice

fix:
  type: content
  change: >
    Rewrote the knows_truth ending_lost variant to acknowledge the stone's warning
    while preserving ambiguous intent: perhaps the hunter means to stand before
    the stag, perhaps only to close the distance. The death now punishes trusting
    rotten ice, not an assumed hostile motive. Updated the old bug_0293 regression
    anchor and added a focused regression that rejects "you knew" / "crossed to
    take it" in the informed death.
  files_changed:
    - content/cyoa/pack/white_stag.yaml
    - tests/regression/white_stag_branching.test.ts
    - tests/regression/white_stag_informed_ice_death_intent.test.ts

regression_test: tests/regression/white_stag_informed_ice_death_intent.test.ts
