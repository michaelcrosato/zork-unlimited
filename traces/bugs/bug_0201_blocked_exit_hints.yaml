id: bug_0201
title: "Locked exits' locked_msg was dead in the structured observation (silent absent-exit friction)"
severity: minor
class: engine
status: fixed
discovered_by: blind_playtest
discovered_in:
  - "ai-runs/2026-06-03T20-14-24-953Z/playtest.md (sunken_barrow, RPG, seed 23)"
  - "bug_0197 (breaking_weir blind pass) flagged the same engine-level note"

summary: >
  In the structured observation (the MCP/agent surface), a locked exit was filtered
  out entirely — absent from both `exits` and `available_actions` — so the author's
  `locked_msg` string was never shown. A room's prose would mention a way out ("an
  archway east is choked with the cold") while no corresponding exit appeared, leaving
  a blind player hunting for an option that wasn't there and unable to tell a
  gated-but-present way from a non-existent one. The free-text parser already answered
  this (attempting the blocked move prints `locked_msg`, bin/parser_play.ts), but the
  structured path did not — so the `locked_msg` strings authored across ~10 packs were
  dead content there. Two independent blind passes (bug_0197, this cycle) hit it.

root_cause: >
  src/parser/observation.ts built `exits` as room.exits.filter(condition-satisfied)
  and exposed nothing for the filtered-out (locked) exits. The deliberate design
  ("the action set never spoils HOW to open a locked exit") was correct, but it also
  suppressed the author's intended "a way exists here, blocked because X" hint.

fix: >
  Additive, render-only. src/parser/observation.ts: add a `blocked_exits:
  {direction, message}[]` field — for each room exit whose conditions are NOT met AND
  that carries a `locked_msg`, emit its direction + that message, sorted by direction,
  destination never leaked (hideGraph-safe). It is NOT a selectable action and NOT in
  `exits`, so the "never spoil HOW" design is preserved; it only restores parity with
  the free-text parser. Opt-in per exit: a gated exit with no `locked_msg` stays
  silent. RPG observation inherits the field (same builder + spread); CYOA has no
  exits and is untouched. No state/score/flag/exit-gating change — game outcomes,
  the exhaustive solvers, and the coverage bot (which read `available_actions`) are
  unaffected; the state_hash is identical.

regression_test: tests/regression/blocked_exit_hints.test.ts
notes: >
  No content edit, no hash re-pin, no verifier edit, no protected file touched. The
  authored `locked_msg` strings in sunken_barrow (guard_crypt→east, slab_passage→down)
  and the other packs now reach the structured player.
