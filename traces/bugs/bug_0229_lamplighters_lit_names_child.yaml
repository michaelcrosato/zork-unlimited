id: bug_0229
title: "Lamplighter blind-pass (seed 23): the lit Staith-Head pointed 'down to the strand' without naming the child — surfaced the remaining goal in the lamp_lit room variant to close the 35/35 'am I finished?' beat"
kind: content_fix
mode: parser
pack: content/parser/pack/lamplighters_round.yaml
# Informational. No pinned hash is touched: the change is local to one room variant (harbour_head's
# lamp_lit text) in lamplighters_round.yaml plus a pack-specific regression case. The auto-discovered
# generic parser bar (all-endings reachability, no soft-lock, score-economy max==35, action-id
# uniqueness, variant liveness) re-derives clean over the edited pack; max_score stays 35.

summary: >
  The mandated blind pass this cycle (The Lamplighter's Round, parser, seed 23 — plus greed/death
  forks on seeds 77/5) returned clarity 5/5, enjoyment 4/5, mechanics flawless: a WON 35/35 run and
  both the DEATH (ending_caught) and GREED (ending_thief) forks, all three reached cleanly with zero
  rejected actions, loops, or parse failures, no stale text. Its ONE actionable finding was a
  goal-legibility beat at the climax: the win is a LOCOMOTION win, so lighting the great lamp earns
  the final +20 and the score reads 35/35 a full turn BEFORE the game ends — you still have to walk
  `down` to the strand to reach the child. The lit Staith-Head room text pointed "the way down to the
  strand drops away to the north-east" but did not name the child waiting below, so at the very moment
  the score showed full the REMAINING goal was implicit: a player could read "35 of 35" and think they
  were finished, missing the rescue.

root_cause: >
  harbour_head's lamp_lit variant described the lit lamp and the open down-exit but framed the strand
  only as geography ("the dark down there is dark no longer… the way down to the strand drops away to
  the north-east"). The child — the reason to descend — lived in the_strand's own description and the
  endings, not in the room the player is standing in when the lamp catches. The last step was mechanically
  open and clued by the exit, but the persistent room text the player re-reads at the "am I done?" moment
  did not state it.

fix: >
  Extended the lamp_lit variant of harbour_head to name the child on the now-lit shingle below — "and
  far down on the lit shingle a small figure stirs and turns up toward the light: the lost child, still
  to be reached" — before the existing exit lines. The remaining goal is now explicit in the room itself
  the instant the lamp is lit. Pure prose: no new mechanic, no score/flag/exit/ending change; the +20
  still rides the one-shot light, the down-exit still gates on lamp_lit, max_score stays 35, and every
  ending stays reachable and unchanged. The unlit room still says nothing of a child (the strand below is
  lightless until the lamp burns), so the nudge surfaces only after the player has earned it.

regression_test: tests/regression/lamplighters_round_fork.test.ts
# New describe block "bug_0229": (1) the UNLIT Staith-Head observation does NOT mention a child (the
# strand is still dark); (2) once the lamp is lit — score 35, game not yet ended, still at the head —
# the rendered room description names the child still to be reached AND offers go_down. Asserted on the
# real observation (buildParserObservation), so it pins the variant-resolved text a live player sees.

verify:
  - "validate_story content/parser/pack/lamplighters_round.yaml → ok, max_score 35"
  - "npm run health → green (verify:integrity + lint + tests + validate + playtest)"
