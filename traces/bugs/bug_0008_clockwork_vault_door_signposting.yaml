bug_id: bug_0008
pack_id: clockwork_heist_v1
seed: 19
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T06-01-12-651Z/playtest.md
  finding: >
    Playtest target rotated off watchtower_road (heavily polished across
    bug_0002-0007) to the assessor's rank-2 candidate, clockwork_heist_v1, whose
    coverage signal showed a genuinely unreached ending (ending_rich) and an
    unvisited vault. A fresh, MCP-only blind playtester's top friction point
    (report §4 + §5, scene vault_door): a player who climbs the stairs first — a
    very natural opening — reaches the vault door with only "Force the door"
    (which the study's brass plate and the door text both say will fail, and which
    leads to ending_caught) or "Back away". The intended non-force solution
    (pick_lock) is invisible without the lockpick, which is found off in the
    kitchen. So a player who HEEDS the "never to force" clue has no valid action
    matching it, and the only way to test the warning is to trigger the losing
    Caught ending. The vault — and the Rich ending behind it — reads as a dead end,
    which is exactly why the coverage bot and a first-time player both miss it.
failure:
  type: silent_conditional_gate
  where: [scene:vault_door]
  description: >
    pick_lock is gated on holding the lockpick, so a player arriving without one
    saw only force_door (-> ending_caught) and retreat. The legal-action set was
    correct (no soft-lock: retreat always exits), but the experience was
    illegible — the door gave the clue's warning ("force will not open this") yet
    offered no action that honours it and no hint that a tool found elsewhere is
    the answer.
fix:
  layer: content
  summary: >
    Added a study_lock choice to vault_door, shown only when the player holds no
    lockpick (conditions: not_item lockpick, not_flag alarm). It emits a narrate
    event — the clockwork lock is "a lock to coax, not to break", force "will only
    wake the house", and the player "needs a slender tool and a steady hand" so
    should "search the manor for the right instrument before you try the door
    again" — and routes the player OUT to the gallery (next: landing). Like
    bug_0005's peer_into_dark it deliberately does NOT self-loop back to
    vault_door: a same-scene no-state-change step is a provable no-progress loop
    the playtester's loop-detector flags, so the nudge makes progress by moving to
    a real scene. Routing to the gallery also naturally steers the player toward
    the study (clue) and back down toward the kitchen (lockpicks) WITHOUT naming
    where the picks are, so the lock-and-key puzzle is preserved. The choice
    vanishes the moment a lockpick is carried, when pick_lock takes over.
  reachable_endings_changed: false
  content_hash_before: 2001b7b6ce11d3a88b3caf6961125c9ebc643d155e70d1c1e248ec732de2ab41
  content_hash_after: 79dead145bee8ac72df040fe68d6fdc801a39bbdf66be9476e4c2c08b8f08f29
regression_test: tests/regression/clockwork_vault_door_signposting.test.ts
