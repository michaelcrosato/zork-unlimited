id: bug_0411
pack: bread_assize_v1
title: "Market Hall kept naming completed proof as still missing"
severity: low
scene: market_hall
reported_by: blind_playtest_20260621T192738Z_bread_assize_seed7

symptom: >
  After a blind playtester completed the bakehouse investigation and returned to
  the Market Hall, the hub text still said a seal suspension needed the rest of
  the chain from bakehouse, factor, and parish queue. The bakehouse proof was
  already complete, so the guidance made a finished branch sound unfinished.

root_cause: >
  The Market Hall had one broad partial-evidence variant for every state with
  assize_read and short_weight but any missing suspension proof. That fallback
  always listed bakehouse, factor, and parish queue, instead of narrowing the
  list to the proof branches still missing in the current state.

fix: >
  Add more specific first-match Market Hall variants for partially completed
  suspension records. Completed branches now drop out of the missing-proof
  guidance while the full-proof, no-assize, and generic fragmentary states keep
  their existing behavior. Verdict gates, score awards, routes, and endings are
  unchanged.

tests: tests/regression/bread_assize_blind_polish.test.ts

verification:
  - npm test -- --run tests/regression/bread_assize_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/bread_assize.yaml

trace_repin: >
  None. This is a reactive prose refinement with regression coverage; no
  committed replay trace hash is repinned.
