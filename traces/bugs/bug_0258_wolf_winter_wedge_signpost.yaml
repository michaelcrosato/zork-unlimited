bug_id: bug_0258
pack_id: wolf_winter_v1
seed: 11
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-05T05-48-14-545Z/playtest.md   # wolf_winter, seed 11 (prepared + reckless)
  finding: >
    The harness's rank-1 mandated target this cycle was wolf_winter (a least-recently
    blind-played RPG). A fresh source-blind MCP-only subagent played two routes (prepared +
    reckless rush, seed 11), reached ending_held both ways (60/60 prepared, 45/60 reckless),
    rated it clarity 5/5, enjoyment 4/5, and found ZERO functional bugs (no rejected actions,
    loops, or broken state; combat math, quest stages, and reactive prose all verified). It
    surfaced ONE design flaw (§4/§5): the fallen paling-rail reads as a vestigial dead clue —
    its examine text promises a "wedge it across the gap" mechanic the tester concluded "does
    not exist anywhere."
failure:
  type: signposting_design_flaw   # discoverability, not a missing mechanic (cf. bug_0257)
  scene: paling_gap
  description: >
    The tester's literal claim ("no USE/wedge action anywhere") is factually WRONG: the pack
    DOES carry a full wedge mechanic — the pack's only skill_check, a self-USE on paling_rail
    with command_verb "wedge" (defense vs 11, retryable, non-lethal), plus the bug_0256
    reactive prose that rewrites the room AND the rail once `breach_braced`. Reproduced via the
    MCP tools at the paling on seed 11: before taking the rail the only paling actions are
    examine / take / attack-the-wolf; only AFTER taking the rail does a "wedge fallen
    paling-rail" action appear (the RPG runner requires the item in hand for self-USE). So the
    finding is a true DISCOVERABILITY signal, not a missing mechanic: a player whose instinct
    is to fight the obvious wolf threat never takes the rail, never sees the wedge action, and
    reads the carefully-built affordance as a Chekhov's gun that fires nothing. The pack's ONLY
    skill_check — and all the bug_0256 legibility prose built for it — was effectively DEAD
    content for a real first-time player. This is the sequential sibling of bug_0256: that fix
    made the wedge's payoff legible AFTER you do it; nothing made the wedge DISCOVERABLE in the
    first place. Compounding it, the paling_gap reactive line "the way old Cade swore the byre
    would funnel them" attributed a promise to Cade he never actually made about the rail.
fix:
  layer: content   # reactive/spoken-prose signpost only; honours the deliberate optional, stat-neutral wedge
  pack: content/rpg/pack/wolf_winter.yaml
  summary: >
    Old Cade's "how the byre is held" counsel (the cade_byre dialogue node — the natural
    in-fiction info path the player walks BEFORE the paling) now SIGNPOSTS the wedge:
    "...And mind the paling where they've broken through: one stout rail's fallen clear into
    the snow there. Take it up and wedge it back across the gap, stamp it home, and you'll
    half-shut the breach — what comes through after must come singly and slow, and that's a
    mercy in a hard fight." The heard_plan journal note gained a matching persistent reminder
    ("...take it up and wedge it across the breach to half-shut the gap."). The take-then-wedge
    is now discoverable on the natural path, and the paling_gap reactive callback to Cade's
    promise is now literally true. PURE prose: cade_byre's effects are still exactly
    {set_flag heard_plan, add_journal} — no new flag/condition/effect/route/ending — and the
    wedge stays an OPTIONAL, stat-neutral aid (bug_0256) gating no exit, win, or ending. The
    bug_0114 fairness guarantee, the three-fight cumulative-gauntlet tuning (bug_0189), and the
    prep-weighted score economy (bug_0239) are all BYTE-UNCHANGED.
  reachable_endings_changed: false   # same two endings; gating, routing, and combat untouched
  content_hash_changed: true         # text-only signpost; wolf_winter is NOT a HASH_PIN_FILE, no test pins its content_hash (see bug_0195)
  regression_test: tests/regression/wolf_winter_wedge_signposted.test.ts
verified_live: >
    validate_pack reports ok with 0 findings. Replayed via the MCP tools on seed 11: talking to
    Cade and asking "how the byre is to be held" now surfaces the rail/wedge signpost in the
    spoken text and writes the journal reminder; at the paling, taking the rail surfaces the
    "wedge fallen paling-rail" USE action, the defense check resolves (a failed 9-vs-11 then a
    successful 17-vs-11), and the room + rail prose flip to the braced-breach twin. The existing
    bug_0256 (braced_breach_legible), bug_0189 (three_fight_gauntlet), and bug_0239
    (prep_carries_score) regressions pass unchanged, confirming the wedge's stat-neutrality and
    the gauntlet/economy tuning are untouched.
playtest_coverage:
  note: >
    The deterministic solver/validator proves the wedge skill_check is sound and the pack
    winnable, but cannot judge whether a real player will ever DISCOVER an optional,
    take-gated affordance — exactly the gap a fresh source-blind LLM playtest exists to catch.
    Here the blind pass came back clarity 5/5, enjoyment 4/5 with this single discoverability
    flaw, now fixed content-only.
