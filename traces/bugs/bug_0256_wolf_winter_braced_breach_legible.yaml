id: bug_0256
title: "The Wolf-Winter's optional 'wedge the paling-rail' skill check (breach_braced) was mechanically inert — it passed a d20 check, set a flag, and the world never acknowledged it, so the invested turn had no observable payoff and the affordance over-promised"
kind: content_polish
mode: rpg/reactive-prose
severity: enhancement
layer: content/reactive-prose
artifact:
  source:
    - content/rpg/quests/wolf_winter.yaml
  test:
    - tests/regression/wolf_winter_braced_breach_legible.test.ts

summary: >
  wolf_winter carries one optional, non-gating defense skill check (DC 11): wedge the fallen
  paling-rail across the breach, setting `breach_braced`. By design it is stat-neutral — no
  score, no stat, no combat change — to keep the fair three-fight gauntlet tuning (atk7/def5/
  hp30, cumulative worst 25 < 30, bug_0189) and the prep-weighted score economy (bug_0239)
  byte-unchanged. But `breach_braced` was read ONLY by the interaction's own none_of retire
  gate: nothing else in the pack reacted to it. So a player who took the rail, passed the
  roll, and watched the success narration got NO follow-through — the room and the rail both
  kept their loose-rail prose, and the rail's affordance ("...wedge across a gap to slow what
  tries to come through it") promised a positional effect the world then never showed.

root_cause: >
  A legibility gap, not a mechanical defect. The 2026-06-04 mandated blind playtest (seed 11,
  clarity 5/5, enjoyment 4/5, both endings reachable, won 60/60 prepared) singled the wedge
  out twice — "a tempting option that appears to do nothing mechanically" and "a mechanically
  inert curiosity ... a curious player who invests the turn gets no legible reward" — and
  noted the affordance over-promised. Every other curated RPG skill check (breaking_weir's
  craft/nerve/might chain) gates progress and/or scores, so the wedge read as a half-finished
  outlier. The correct cure honours the deliberate stat-neutrality (a stat/score payoff would
  reopen the carefully tuned guarantee and break bug_0239's clean two-prep economy) and instead
  makes the consequence OBSERVABLE in the fiction.

fix: >
  `breach_braced` now drives §7.3 reactive prose on BOTH surfaces, with ZERO change to any
  stat, score, exit, win or ending (the wedge still gates nothing):
    - paling_gap gains a four-variant ordered list (most-specific-first, every variant the
      first match in a reachable state per bug_0147 liveness): yearling_down∧braced /
      yearling_down / braced / base — so wedging is acknowledged whether done before or after
      the yearling falls, and the one-throat funnel old Cade promised is shown, not just told;
    - paling_rail gains a reactive examine twin (the byre-jerkin donned shape, bug_0023):
      once wedged it reads as the brace half-shutting the breach;
    - the rail's base affordance is re-aimed from "slow what tries to come through it" to
      "half-shut it, so what comes through must come singly" — a positional truth the reactive
      prose now delivers, curing the over-promise.
  Verified end-to-end via live MCP play (seed 3: take rail → wedge [d20 16+3=19 vs 11 success]
  → the room and rail both flip to the wedged text, score still 0, stats still atk5/def3/hp30)
  and pinned by the new regression test (room/object reactive prose across all four flag
  states + the on_success carries no inc_var). validate_pack: zero findings. The wolf_winter
  gauntlet/economy suites (bug_0189/0239) stay green, byte-unchanged.
