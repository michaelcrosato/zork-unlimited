id: bug_0422
title: Tithe Barn quest hook promised a concealed record that was not hidden
pack: content/cyoa/pack/tithe_barn.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  The blind playtest noted that the opening quest text "decide the fate of the
  concealed tithe record" implied a hidden document or second ledger, while the
  steward's book is openly on the table from the first barn scene.
root_cause: >
  The world quest hook described the suppressed truth as a concealed record, but
  player-facing wording made that sound like an object-placement puzzle rather
  than a moral choice about the hoarded grain.
fix: >
  Reframed the quest hook around the actual decision: whether the lord's hoarded
  grain stays locked. Added a regression for both metadata and the opening world
  intro text.
tests:
  - tests/regression/tithe_barn_quest_framing.test.ts
verification:
  - npm test -- --run tests/regression/tithe_barn_quest_framing.test.ts
  - npm run validate -- content/cyoa/pack/tithe_barn.yaml
