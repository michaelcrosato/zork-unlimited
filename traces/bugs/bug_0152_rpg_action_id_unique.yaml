root_cause: >
  A gap in the structural-verification net, not a content defect. The MCP/UI layer (and the
  RPG runner itself) resolves a player's chosen action by a FIRST-MATCH id lookup
  (src/mcp/tools.ts actionForId: `available_actions.find((a) => a.id === id)`). If an
  observation ever offered two options with the same `id`, the SECOND would be permanently
  UNSELECTABLE — picking it silently yields the first — a phantom menu entry. bug_0151
  proved this can never happen for the two shipped PARSER packs, but left RPG uncovered:
    - bug_0151's test globs `content/parser/pack` only, so the RPG packs' parser-shaped
      menus were never inspected — and RPG opens a DIFFERENT reachable region (combat
      reaches post-defeat states the parser BFS cannot), so coverage does not transfer.
    - enumerateRpgActions (src/rpg/runner.ts) returns the FULL parser action set
      (enumerateActions) PLUS one `attack_<enemy.id>` per living enemy in the room — an
      id family the parser enumerator never mints. Two collision surfaces, neither checked:
        * the inherited parser templates (`go_<dir>`, `examine_<oid>`, ...) — two exits
          sharing a direction mint a duplicate `go_<dir>` the static DUPLICATE_ID validator
          (rooms/objects/npcs only) cannot see;
        * `attack_<enemy.id>` — the parser validator dup-checks room/object/npc ids and the
          RPG validator adds enemy room/death_ending checks but NO enemy-id uniqueness check,
          so two enemies sharing an id in one room mint two identical `attack_<id>` options
          the static layer is blind to.
    - enumerateRpgActions builds each option through the resolvable-only `option()` path, so
      "every offered action RESOLVES" is true by construction (vacuous). Uniqueness is the
      orthogonal, uncovered property.
  (CYOA needs no dynamic analogue: its menu ids ARE the scene's declared choice ids, which
  cyoa_validator already dup-checks per scene, and the runtime menu is a condition-filtered
  SUBSET of those statically-unique ids — unique by construction. PARSER and RPG are the two
  modes whose enumerators mint ids the static checks cannot see.)
fix: >
  Test-only (§15 lock-the-finding). New tests/regression/rpg_action_id_unique.test.ts runs
  the shared exhaustive concrete BFS (tests/regression/support/exhaustive_endings.ts) under
  the SAME best/worst-roll bracket the every-ending / variant-liveness RPG proofs use
  (exhaustiveEndingsMulti over two rule sets forcing the player's best vs worst rolls,
  bug_0124/0147) with the bug_0146 LIVENESS action policy (step every action except DROP/
  CLOSE and the pure-observation verbs — visits read-flag and post-combat states too). At
  EVERY distinct reachable non-terminal state it calls the engine's own enumerateRpgActions
  and asserts its option ids are pairwise distinct. The menu inspected at each state is
  independent of which actions the BFS steps and of the roll regime (enumerateRpgActions is
  rng-independent), so the bracket only widens the set of menus examined — strictly more
  thorough. No content/engine/validator/schema change, NO helper change (reuses the
  behaviour-preserving `explore` param bug_0145/0146 added).
within_bar: >
  Regression test ONLY. No pack edited; no validator/schema/engine/helper change; NO hash
  pin moved (sunken_barrow 7791fc14…, cold_forge 8590fefd…, all 9 packs validate 0/0,
  content_hashes unchanged). Deterministic, no LLM-judge, NO API key. Sound: every state
  visited is a real legal playthrough on a legal die face, the menu is the engine's own
  enumerateRpgActions output, the search FAILS on cappedOut (never truncates silently), and
  terminal states (no menu) are skipped. The best/worst bracket reaches every routing-
  relevant state soundly under the new readsHpInCondition guard (no route gates on a raw HP
  value the extremes skip — both shipped packs pass). Anti-vacuity guards assert real menus
  were inspected (statesChecked > 0, actionsSeen > statesChecked) so the pass cannot be vacuous.
