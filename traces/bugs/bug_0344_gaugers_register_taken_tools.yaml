id: bug_0344
pack: gaugers_register_v1
title: "weighing room still placed taken stave and crowbar at starting positions"
severity: minor
scene: weighing_room
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the marked stave or crowbar in the weighing room, LOOK still said
  the stave hung on its peg and the crowbar leaned against the south wall.
  Dropping those tools after taking them could also let the room fall back to the
  original starting-position prose.

root_cause: >
  The weighing room had only a static base description. The two takeable tools
  did not leave durable pickup state that room prose could read, so the starting
  placement sentences stayed active after TAKE.

fix: >
  Taking the marked stave now sets `marked_stave_taken`, and taking the crowbar
  now sets `crowbar_taken`. The weighing room has ordered variants for stave-only,
  crowbar-only, and both-taken states, keeping the original peg and wall positions
  empty even if the tools are later dropped. Score, exits, endings, and win
  conditions are unchanged.

tests: tests/regression/gaugers_register_reactive_taken_items.test.ts
