id: bug_0403
pack: bellmans_round_v1
title: "early constable report named Gant before investigation"
severity: medium
scene: wool_lane
reported_by: blind_playtest_20260621T062443Z_bellmans_round_seed7

symptom: >
  A blind playtester reported to the constable immediately from the opening
  scene. The `ending_reported` epilogue still said the bellman reported "a
  drover named Gant who had cause to carry a grudge," even though no scene had
  introduced Gant or the wool-weight dispute on that route. The same report
  action also remained available beside the stronger direct-naming action once
  the full evidence gate was satisfied.

root_cause: >
  `ending_reported` had one static text for every low-confidence report route,
  regardless of which facts the player had discovered. The weak report choice
  also had no condition retiring it after `name_to_constable` became available.

fix: >
  The base low-confidence report now states only opening-scene facts and no named
  suspect. A Gant-specific ending variant fires only after documentary evidence
  introduces him, and `report_what_you_saw` is hidden once the player has the
  cloak-pin, witness account, and ledger evidence needed to name Gant directly.

tests: tests/regression/bellmans_round_constable_report_truth.test.ts

verification:
  - npm test -- --run tests/regression/bellmans_round_constable_report_truth.test.ts
  - npm run validate -- content/cyoa/pack/bellmans_round.yaml

trace_repin: >
  None. The change updates pack content and adds a regression test; there is no
  committed Bellman's Round replay trace hash to repin.
