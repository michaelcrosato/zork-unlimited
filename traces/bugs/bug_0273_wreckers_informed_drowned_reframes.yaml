id: bug_0273
title: "wreckers_light's ending_drowned was the one non-gated ending the knows_truth reactive-epilogue device skipped — the KNOWING climb over the rail read identically to the ignorant one"
kind: content_fix
mode: cyoa/reactive-prose
severity: enhancement
layer: content/reactive-epilogue
artifact:
  source:
    - content/cyoa/pack/wreckers_light.yaml
  test:
    - tests/regression/wreckers_informed_drowned_reframes.test.ts

summary: >
  wreckers_light's whole "truth" mechanism is that reading the keeper's journal (knows_truth)
  reframes the SAME deliberate act in the epilogue — the act done in ignorance vs the same act
  done KNOWING the foundering ship is the Mourning Star, carrying the man who ran the keeper's
  son onto these rocks. ending_saved reframes ("you saved her KNOWING whose hand is at the
  wheel"); ending_wrecker reframes ("you tell yourself it was justice"); ending_mercy reframes
  ("he sees that you already know"). ending_drowned — climb over the gallery rail into the sea —
  was the one remaining ending: it is NOT gated on knows_truth, so it has both an ignorant climb
  (enter -> out_gallery -> climb_to_wreck) AND a knowing one (take the key, read the journal,
  return to the hub, climb anyway: enter -> hear_keeper -> search_keeper -> go_down ->
  unlock_chest -> read_journal -> back_up -> out_gallery -> climb_to_wreck), yet only the
  ignorant text existed. The death read identically whether or not you had just read whose ship
  is groping for the dark coast you are about to leave unlit.

root_cause: >
  An incomplete reactive-epilogue device, not a runtime defect — the exact same class as
  bug_0272 (tithe_barn's ending_fall) and bug_0271 (dead_reckoning's deck hub): a reactive beat
  the authoring promised across its endings but did not extend to the one non-gated terminal
  that also has both an informed and an uninformed path. The 2026-06-05 mandated blind pass
  (wreckers_light, seed 3; fresh MCP-only general-purpose subagent, no content/src/ui/tests
  access; report ai-runs/2026-06-05T06-04-01-004Z/playtest.md) came back STRONG and CLEAN —
  clarity 5/5, enjoyment 5/5, all four narrative endings reached (saved/wrecker/mercy) plus the
  ending_drowned death, mechanically flawless, ZERO bugs — and praised the reactive Gallery /
  Lantern Room / epilogue rewrites under knows_truth. It did not single out the drowning,
  because a death epilogue the player reaches once reads fine in isolation; the gap is only
  visible against the device's own symmetry (saved + wrecker + mercy reframe; the drowning,
  equally reachable both informed and ignorant, did not). Surfaced because the deterministic
  assessor is SATURATED (all 17 packs blind-clean; the ranked list is 0.5-floor blind stubs) and
  the no-new-packs directive (2026-06-04) points the lever at content DEPTH on existing packs —
  so the cycle closed this missing reactive beat rather than churn clean content.

fix: >
  ONE content edit, content/cyoa/pack/wreckers_light.yaml: add a `variants: [{ when: [{ has_flag:
  knows_truth }], text: ... }]` block to ending_drowned, ABOVE the existing base `text`, with a
  leading design comment. First-match-wins, so the informed climb renders the reframed death
  (you go over the rail knowing whose bell tolls in the dark, the lamp stays unlit, and the
  Mourning Star drowns with you — "the rocks do not trouble to tell them apart") and the
  uninformed climb still renders the base. Both paths are genuinely reachable, so the base is no
  dead fallback and both land on the same endingId — the same cosmetic-reframe-never-reroute
  shape as ending_saved/ending_wrecker/ending_mercy. No flag, route, choice, quest_stage, gate,
  scoring, or schema change; no new scene or ending; the death stays equally telegraphed.

witness: >
  THE TEETH, verified out of band (non-vacuity): with the 4 new cases GREEN against the real
  pack, neutering the new variant's guard (`when: has_flag: knows_truth` -> `has_flag:
  never_set_sentinel`, a flag never set) turned exactly 2 of the 4 RED — the informed climb fell
  back to the base text, so both the "variant is live + supersedes base" assertion and the
  non-vacuity (two distinct renders) assertion failed; the two uninformed-base cases stayed
  GREEN. Restoring the guard returned the suite to 4/4 GREEN with only the intended +21-line
  addition (git diff --stat). Markers are layer-unique single lines: "you go down knowing whose
  bell still tolls" (variant only), "the white water is not cold for long" (base only).

verification: >
  validate_story(content/cyoa/pack/wreckers_light.yaml) -> ok:true, 0 findings (knows_truth
  variant on a reachable-both-ways ending raises no dead-fallback / unreachable-variant warning —
  the exact saved/wrecker/mercy shape the validator already accepts). npx vitest run
  tests/regression/wreckers_informed_drowned_reframes.test.ts -> 4 GREEN. npm run health -> GREEN
  (exit 0); net test count ROSE by exactly the 4 new cases. The pack's prose changed but NO pack
  was added or removed -> the discovered-pack set is unchanged, so bug_0194 scorecard freshness
  pin stays green (no regen needed). No src/ byte, no validator/engine/schema/generator change,
  no trace-hash re-pin, no scorecard/corpus/manifest change -> the existing wreckers_light
  branching / signpost (bug_0257) suites stay GREEN (the new variant touches none of their
  markers).

scope_honesty: >
  A genuine content-DEPTH improvement (completes the reactive-epilogue device on its last
  non-gated ending), NOT a discovered live defect and NOT a structural/soundness change. Pure
  pack edit + additive regression test. The blind pass found zero bugs; this closes a
  symmetry/depth gap the pass could pass over. No new pack (honours the 2026-06-04 no-new-packs
  directive). No engine/validator/generator/scorecard/corpus byte changed.

files_changed:
  - content/cyoa/pack/wreckers_light.yaml (knows_truth variant added to ending_drowned)
  - tests/regression/wreckers_informed_drowned_reframes.test.ts (NEW)
  - traces/bugs/bug_0273_wreckers_informed_drowned_reframes.yaml (NEW, this file)

regression: >
  The contract IS the regression: it fails loudly if the informed drowning ever stops reframing
  (variant dropped or its guard broken), if the base fallback stops covering the uninformed
  climb, or if either climb is rerouted off ending_drowned. On a deliberate redesign of the
  drowning epilogue, re-derive these contracts from the new prose — never relax the assertions
  to pass.
