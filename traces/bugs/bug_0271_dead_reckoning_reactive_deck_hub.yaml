id: bug_0271
title: "Content polish: Dead Reckoning's deck hub now reframes by accumulated knowledge (knows_course / knows_pilot) on return between investigations, instead of repeating one immutable 'gone looking, nothing decided yet' line however much the player has learned."
kind: content_fix
mode: cyoa
pack: content/cyoa/pack/dead_reckoning.yaml
# Pure content_fix — no engine/schema/validator change. Reactive scene `variants` (first-match-wins,
# §7.3) already power this pack's chest, hold and cask; this applies the SAME device to the one scene
# that lacked it. dead_reckoning carries NO pinned content hash (only watchtower_road is pinned) and
# the discovered pack set is unchanged (an existing pack edited, none added) — no freshness pin
# (the bug_0194 scorecard pin no longer exists; see testing-two-modes) and no hash is touched.

summary: >
  The mandated blind pass this cycle (Dead Reckoning, cyoa, seed 11 —
  ai-runs/2026-06-05T05-20-47-339Z/playtest.md) returned clarity 5/5, enjoyment 5/5, mechanics
  flawless across three divergent runs reaching ending_landfall / ending_jonah / ending_irons, with
  NO true bug. Its one concrete friction finding (§4): the deck HUB the player returns to between
  side-rooms printed one identical `adrift` variant line ("...gone looking already... what you do
  with it is still, wholly, to be done") whether the player had learned nothing or had both read
  Hale's log (knows_course) AND heard the girl out (knows_pilot). The chest, hold and cask all
  reframe by what is known; the hub between them did not — "a small missed beat of reactivity".

root_cause: >
  Not a defect: the engine has carried reactive scene `variants` from the start, and dead_reckoning
  already uses them on chest (both/pistol/course), hold (pilot) and cask (both/course/pilot). The
  deck simply carried a SINGLE `adrift` variant with no flag layer, so every return to the hub during
  deliberation re-printed the same knowledge-blind deliberation line. The two-axis-knowledge promise
  the pack's header sells ("a 2x2 of knowledge over the finale") was honoured at the cask but the hub
  you cross between learning the two truths stayed flat.

fix: >
  Content only — replace the deck's lone `adrift` variant with FOUR, most-specific first
  (first-match-wins; cyoa_variant_shadowing): (1) adrift ∧ knows_course ∧ knows_pilot — you carry
  both truths back to the hub; (2) adrift ∧ knows_course — Hale's reckoning in your head; (3) adrift
  ∧ knows_pilot — you have heard the girl out; (4) the bare adrift base (unchanged text), the "gone
  looking, learned nothing yet" line. Each `when` ALSO keeps the quest_stage:adrift gate, so the
  whole knowledge-reactive block stays the SAME transient window as before (tide_mill `begun`
  discipline): entering the cask advances the quest to at_the_cask and the hub drops past every
  variant to the base text. The pistol is deliberately NOT read at the hub — exactly as the cask's
  own variants turn only on the two TRUTHS (has_pistol is acknowledged in the chest prose and the
  irons ending), keeping hub and cask to one two-axis device. No choice/next/ending keys off any
  quest_stage or these flags, so routing, the five endings' reachability and the two-axis branching
  are all unchanged; only the hub's narration deepens. Every variant's `when` is reachable at stage
  EXACTLY adrift (leave a side-room carrying that subset of flags before touching the cask), so the
  reactive-variant liveness oracle (bug_0145) and the dead-content guards (UNREACHABLE_VARIANT /
  UNSATISFIABLE_CONDITION) pass, and most-specific-first ordering means none shadows the next.

regression_test: tests/regression/dead_reckoning_reactive_deck_hub.test.ts
# Locks the real pack on the actual buildObservation surface at the start state a live player stands
# in: (1) hub after reading the log only → speaks the knows_course framing ("Hale's last reckoning is
# in your head") and NOT the bare "gone looking... wholly, to be done" line; (2) hub after hearing the
# girl only → the knows_pilot framing ("marsh-town child who has read the inshore water"); (3) hub
# after both → the synthesis framing naming course AND pilot; (4) hub after entering a side-room and
# leaving WITHOUT learning anything → still the bare adrift base line; (5) all four still say "shared
# five ways" (the bug_0254 consistency guard); (6) the shipped pack validates error-free. The
# cyoa_metamorphic_relabel suite also auto-exercises the new variants' when-flags on the
# contamination twin (their relabel must keep the reached-census isomorphic).

verify:
  - "validate content/cyoa/pack/dead_reckoning.yaml → Result: OK (0 error, 0 warning)"
  - "MCP/observation replay (seed 1): to_chest+read_log+leave_chest → knows_course hub; to_hold+speak_girl+leave_hold → knows_pilot hub; both → synthesis hub; to_chest+leave_chest (no read) → bare adrift hub"
  - "npx vitest run tests/regression/dead_reckoning_reactive_deck_hub.test.ts → all passed"
  - "npm run health → green (verify:integrity + typecheck + lint + format + tests + validate)"
