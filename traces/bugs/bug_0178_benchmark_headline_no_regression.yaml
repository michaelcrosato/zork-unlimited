problem: >
  bug_0177 pinned the headline summary for SELF-CONSISTENCY only — that summary.score equals an
  independent re-mean of the rows, and that the curated baseline is > 0. That guard is blind to the
  two failure modes that actually matter for a benchmark, both of which leave it GREEN:
  (1) COLLAPSE — an engine/validator/generator/content regression that breaks the deterministic
  bot's progress so the headline craters toward ~0; the self-consistency test still passes because a
  cratered number still "equals the mean of the rows" and is still > 0. (2) INFLATION of the
  held-out split — the contamination-free corpus drifting into packs the greedy, no-planning bot
  trivially completes (a generator "deepening" that drops gating), so the held-out score climbs
  toward or past the curated baseline. bug_0177 states the property — "the held-out being a DISTINCT,
  lower number is exactly the contamination-free signal" — but nothing enforced it. This is the
  score-level twin of the DGM "swap in a degraded eval distribution" launder the verifier-integrity
  guard fights at the hash level ([[verifier-assertion-guard]], arXiv 2510.14253).

what:
  - >
    NEW tests/regression/benchmark_headline_no_regression.test.ts — the ENFORCED-bar realisation of
    the "a score regression becomes a guarded signal" lever bug_0177 named for src/afk/assessor.ts.
    Implemented as a red-going test rather than the assessor's advisory ranking, the stronger reading
    of "the automated verification is the bar" (docs/blind_playtest_protocol.md). Builds the scorecard
    deterministically at the documented runs=12 reading (curated 49.1%, held-out 33.5%) and asserts
    WIDE bands that catch a real regression, not benign drift.
  - >
    Bands, each mapped to a concrete failure the self-consistency test cannot see. curated carries a
    FLOOR only (>= 0.40; the bot improving must never fail). held-out carries a two-sided BAND
    ([0.25, 0.45]: collapse below, difficulty-destroyed above). A run-count-robust RELATIVE invariant
    pins bug_0177's stated property directly: held_out.score < curated.score with a MATERIAL gap
    (>= 0.05; the gap holds ~15pts across runs 8/12/50), so held-out drifting up toward curated fires
    even within its absolute band. Plus the two-split shape (curated before held-out) and non-vacuity
    (packs > 0 per split).
  - >
    Refreshed the long-stale committed sample scorecard (traces/benchmark/scorecard.json + .md), frozen
    since bug_0142 (~35 cycles): it carried 27 curated-only rows with NO held-out split (bug_0165) and
    NO headline (bug_0177) — actively misrepresenting what `npm run benchmark` reports today. Regenerated
    at its existing runs=50 default to 66 rows (10 curated + 12 held-out packs x 3 cells) plus the
    "## Headline" table (curated 47.7%, held-out 31.7% at runs=50). NON-load-bearing (no test reads it;
    only bin/benchmark.ts writes it), so zero verification risk — a surfaced, deterministic refresh, not
    a re-pinned check.

guard:
  test: tests/regression/benchmark_headline_no_regression.test.ts
  pins: >
    (1) exactly the two splits present, curated before held-out; (2) curated.score >= 0.40 (collapse
    floor; no ceiling, so improvement never fails) and packs > 0; (3) held_out.score in [0.25, 0.45]
    (collapse floor + difficulty-destroyed ceiling) and packs > 0; (4) held_out.score < curated.score
    with curated - held_out >= 0.05 (the run-count-robust "distinct lower contamination-free number"
    invariant). Bands are wide by design: they fail on a real regression, pass on benign content drift.

verification:
