id: bug_0463_aleconners_empty_finding_table_hint
title: "Ale-Conner's Seal signposts the empty finding table gate"
pack: content/cyoa/pack/aleconners_seal.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T203629Z_aleconners_seal_seed7.md
severity: S1
symptom: >
  A blind playtest still found the finding table poorly signposted before the
  first evidence note. The scene text said the table waited behind the stall,
  but the real table action was hidden until some note existed, making the
  affordance feel like it disappeared.
root_cause: >
  Previous polish correctly gated the actual finding table until evidence exists,
  but the starting stall had no visible no-evidence affordance explaining that
  gate. Players could read "the finding table waits" and then see only complaint,
  seal, and brew-house actions.
fix: >
  Add a no-evidence clerk hint at the assay stall. It loops back to the stall
  without score, route, ending, or evidence-state changes, and names the first
  productive evidence sources before the true finding-table review appears.
tests:
  - tests/regression/aleconners_seal_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/aleconners_seal_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/aleconners_seal.yaml
  - npm run health
