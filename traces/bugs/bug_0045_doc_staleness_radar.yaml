    DELIBERATE across bug_0019/0022/0032/0040/0042/0043. clockwork is blind-verified PRISTINE on its 6th
    independent pass (seeds 101/314/91/211/103/271); no NEW actionable content defect.
  rotated_playtest: >
    Per blind_playtest_protocol.md's "rotate the seed and rotate the pack", ran a SECOND blind playtest on
    the least-recently full-blind-quality-tested pack, the rpg The Cold Forge (cold_forge.yaml), seed 73 +
