deferred:
  - >
    The radar scans a curated CURRENT-system doc set (AGENTS.md, README.md, AI_AGENT_PROMPT.md, docs/** minus
    ROADMAP.md). A future cycle could (a) extend it to detect stale REFERENCES IN CODE COMMENTS the same way,
    or (b) add a complementary check for docs referencing retired CONCEPTS (the "§14 ceremony" the charter
    retired) — a fuzzier, lower-precision signal best left to an LLM-judge, not this deterministic detector.
  - >
    clockwork_heist remains cosmetically open only on adjudicated-deliberate design-taste notes (the strongbox
    shortcut bypasses the vault climax; the "time running short" copy over-promises a timeout) — not-a-defect
    since bug_0022/0032/0040/0042/0043.
  - >
    cold_forge's "the cold keeps the sentinel weak / waiting won't make it worse" reassurance (stated in the
    room, the inscription, and the spirit) reads to a fresh player as a tell for a re-kindling/timer mechanic
    that doesn't exist; the lore already closes that door ("this forge-fire is long dead and will not kindle"),
    so it is internally consistent and was NOT changed this cycle — a future cycle could trim the triple
    reassurance if it already edits those rooms. Keep rotating the blind playtest seed/pack — sunken_barrow is
