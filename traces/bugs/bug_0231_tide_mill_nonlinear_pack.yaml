what_shipped: >
  The project's 16th pack and 5th PARSER pack — The Tide-Mill (content/parser/pack/tide_mill.yaml),
  and the FIRST parser pack whose win path is NON-LINEAR. Every prior parser pack (sealed_crypt,
  alchemists_tower, friars_postern, lamplighters_round) is a LINEAR CHAIN (read clue → A → B → C →
  fork) — exactly the structure the standing blind-pass note flags. Here you are the miller's hand
  at a tide-mill on a falling tide, and a fishing boat is caught above the weir with the water
  dropping out from under it. The great sea-gate must be wound up to let the boat down before it
  grounds — but the gate is driven off the mill-wheel, and the wheel will not turn until BOTH of
  two SEPARATE, ORDER-INDEPENDENT faults are put right: cut the choked head-race clear with the
  billhook (sluice_clear, +10) AND free the dropped brake-pawl with the crow-bar (pawl_free, +10).
  Neither depends on the other; do them in any order. Only with BOTH flags set does `wind sea-gate
  winch with crank-handle` resolve (+20, the climax — opens the way down to the staith → ending_saved,
  the win). The climax is gated by a true dependency DAG, not a chain — the breadth contribution.
  Two BAD forks, deliberately using DIFFERENT mechanisms from lamplighters' one-store-key-opens-all,
  so the pack is not a re-skin: GREED (ending_thief, non-death) is a KEY-FREE take_effects end_game
  (bug_0107) — POCKETING the miller's coin-bag in the counting-nook is the choice itself, the boat
  left to break; DEATH (ending_drowned, the failure pole) is `lever flood-hatch with crow-bar` —
  the same tool that frees the pawl, turned to the panicked shortcut, drops you into the wheel-pit.
  The death is twice-telegraphed (the millboard AND the hatch examine both say the staging is rotten
  and the pit is straight under it), per the §8.7 / bug_0123 "never an ambush" discipline; it is the
  pack's only death ending, reached only by end_game, so WIN_IS_DEATH cannot fire and ending_saved
  stays the sole winnable ending. Score economy max 45 (5 board + 10 sluice + 10 pawl + 20 gate);
  no score rides either bad fork.

repro: >
  Win (order-independent — both orderings reach ending_saved at 45/45):
    read millboard; go north; take crank-handle; go east; take billhook; take crow-bar; go west;
    [ go west; cut head-race with billhook; go east; free brake-pawl with crow-bar ]  # OR pawl-first
    wind sea-gate winch with crank-handle; go down  → ending_saved, score 45.
  Gating witness: after only ONE of {cut sluice, free pawl}, `use_crank_handle_on_sea_winch` is not
  legal (the wheel has no drive) and `go_down` is barred.
  Greed: go east; take coin-bag → ending_thief (non-death, score 0, gate never wound).
  Death: go north; go east; take crow-bar; go west; go west; lever flood-hatch with crow-bar →
  ending_drowned (a DEATH, score 0, staith never reached).

verification: >
  npm run health GREEN. New pack validates clean (parser, 0/0). Auto-discovered parser suites cover
  it the moment it ships (all three endings reachable; no soft-lock pocket; score economy reachable-max
  == declared 45; score peaks before the locomotion win; action-id uniqueness; variant liveness;
  death/non-death ending render; metamorphic id-invariance). The pack-SPECIFIC NON-LINEARITY is locked
  by tests/regression/tide_mill_nonlinear.test.ts (11 cases on the real engine: both flags gate the
  +20; either ordering wins at 45/45; one-shot milestones; greed/death forks; single-death; the two
