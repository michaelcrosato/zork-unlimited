  - >
    No combat reward / scoring: max_score is 0 and stays 0 through a kill and a
    win (report §5, item 3) — wire Stage-3 scoring like sealed_crypt (bug_0013).
  - >
    Auto-win on entering the relic chamber with no "take the circlet" agency
    (report §5) and no opening quest/objective line (report §3) — framing polish.
regression_test: tests/regression/rpg_skillcheck_retires.test.ts
