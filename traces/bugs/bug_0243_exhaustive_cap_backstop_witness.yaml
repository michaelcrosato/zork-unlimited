id: bug_0243
title: "Absolute witness that the exhaustive solver's MAX_STATES cap-out backstop FIRES — the unwitnessed keystone the ~30-caller structural-proof family trusts to fail loud at scale"
kind: verification_oracle
mode: meta/tooling
severity: enhancement
layer: verification/exhaustive-solver-backstop
artifact:
  source:
    - tests/regression/support/exhaustive_endings.ts
  test:
    - tests/regression/exhaustive_endings_cap_backstop.test.ts

summary: >
  The whole structural-proof family rests on one shared safety contract in the mode-agnostic exhaustive solver
  (tests/regression/support/exhaustive_endings.ts): "the search FAILS on `cappedOut`, so it can never silently pass by
  truncating an unexplored region." ~30 call sites — every-ending-reachable (CYOA/parser/RPG), variant-liveness,
  score-economy soundness, action-id uniqueness, the metamorphic relabel/observation-stream oracles, no-dead-pocket, and
  the generator suites — each assert `expect(cappedOut).toBe(false)`, trusting the helper to flip `cappedOut: true` the
  instant a search exceeds `maxStates` (the 200k backstop). That FLIP was itself never witnessed. Every shipped/generated
  pack settles far below the cap, so a refactor that broke the cap check (`seen.size > maxStates` inverted, the early
  `return` dropped, the field hardwired false) would leave all ~30 suites GREEN while the verification-at-scale backstop
  went silently dead. This cycle pins the flip with the SoundnessBench absolute-witness discipline (parity with bug_0227's
  meta-verifier negative corpus, bug_0228's RNG known-answer vector, bug_0230/0240's canonicalizer contract).

root_cause: >
  Not a defect in the solver and NOT a discovered live bug — a verification-DEPTH gap. The cap-out is correct today; what
  was missing is any test that exercises it. The backstop is precisely the mechanism the next-phase roadmap names as the
  #1 risk for the open world ("an open world will exceed exhaustive BFS, so verification must go modular ... while staying
  seeded/deterministic" — exceeding the cap must fail LOUD, never PASS on a partial graph). A silently-broken cap would
  convert that loud failure into a false PASS: a truncated search reporting an unreachable ending as "reached set
  complete," an unproven liveness/score bound trusted as proven. Triggered by the deterministic content assessor running
  SATURATED (all 17 packs blind-clean; this cycle's mandated blind pass on sunken_barrow came back clean — clarity 5/5,
  enjoyment 4/5, both endings reached, zero findings), so the lever rotated to this verified-OPEN structural asymmetry
  rather than churn a clean, floor-balanced pack or mint a new one (paused per the no-new-content-packs directive).

witness: >
  Two-sided, through the REAL `exhaustiveEndings` (never a reimplementation) over a synthetic `Rules` — a finite linear
  chain of BOUND+1 (=501) non-terminal states ending at `deep_end`, plus an unbounded variant:
    - SMALL cap (50) over the 502-state space  -> cappedOut=true, states in (50, 52] (stops PROMPTLY at the cap, not after
      grinding all 502), and reached does NOT contain `deep_end` (the capped result is genuinely INCOMPLETE — the exact
      reason a caller must FAIL on cappedOut rather than trust `reached`).
    - GENEROUS cap (100k) over the SAME space   -> cappedOut=false, states=502, reached={deep_end} (full exploration).
    - UNBOUNDED (ever-incrementing var, infinitely many fingerprints) under cap 50 -> cappedOut=true, no ending, states
      <= 52 (the header's documented "a future unbounded-var pack trips it" scenario; without the cap the BFS never
      returns).
  THE TEETH, verified out of band (non-vacuity): commenting out the `if (seen.size > maxStates) return {... cappedOut:
  true}` line turned the bounded small-cap run into a full, COMPLETING search — flipping cappedOut to false (the EXCEEDS
  assertion went RED), inflating states to the whole space, and surfacing the missed `deep_end` (the INCOMPLETE assertion
  went RED): two independent reds, run cleanly (no hang) because the space is bounded. The GENEROUS (cappedOut=false)
  assertion correctly STAYED GREEN under that perturbation — proving the two sides are independent and neither passes
  vacuously (a hardwired-true cappedOut would instead redden the GENEROUS side). Restoring via `git checkout` returned the
  helper byte-identical (git diff --stat empty) and the suite to 4/4 GREEN.

fix: >
  One new regression test file, tests/regression/exhaustive_endings_cap_backstop.test.ts (4 cases), importing the REAL
  `exhaustiveEndings` from tests/regression/support/exhaustive_endings.ts and driving it over a purpose-built synthetic
  `Rules`. Freezes that (a) a search exceeding maxStates reports cappedOut=true and stops within a state or two of the cap,
  (b) such a capped result is genuinely incomplete (misses a reachable ending), (c) a generous cap over the same space
  exhausts it (cappedOut=false, every ending reached), and (d) the cap trips even on a genuinely non-terminating search.

scope_honesty: >
  This is the absolute-contract WITNESS for a solver backstop that is already correct today (parity with
  bug_0182/0218/0227/0228/0230/0240) — NOT a discovered live defect, NOT a soundness exploit, and NOT a behaviour change.
  Pure test addition: NO change to tests/regression/support/exhaustive_endings.ts or any source byte, NO engine/validator/
  schema/generator change, NO pack YAML, NO trace hash re-pin, NO scorecard byte, NO corpus/manifest change.

verification: >
  npx vitest run tests/regression/exhaustive_endings_cap_backstop.test.ts -> 4 GREEN. Teeth confirmed out of band (cap
  check commented out -> 2 bounded cases RED, generous-cap case stays GREEN; helper git-restored byte-identical). npm run
  health -> GREEN (exit 0); net test count ROSE by exactly the 4 new cases. No source/script/validator/schema/generator/
  engine change, no pack YAML, no scorecard byte, no corpus/manifest -> bug_0194 scorecard freshness pin stays green, no
  regen; verify:integrity has no VERIFIER_TOUCHED / GUARD_WEAKENED / HASH_PIN regression (the new test file is not
  protected; the shared helper is byte-unchanged).

files_changed:
  - tests/regression/exhaustive_endings_cap_backstop.test.ts (NEW, +4 cases)
  - traces/bugs/bug_0243_exhaustive_cap_backstop_witness.yaml (NEW, this file)

regression: >
  The witness IS the regression: it fails loudly if a future change to the exhaustive solver ever stops the cap from
  firing, or fires it but no longer truncates promptly, or breaks the completeness of a generous-cap run — exactly the
  changes that would silently convert the ~30 structural proofs' loud cap-out failure into a false PASS on a partial
  graph. On a deliberate solver change (e.g. raising the cap, or replacing the linear cap with a modular per-region bound
  for the open world), re-derive these witnesses against the new behaviour — never relax them to pass. Purely additive
  (1 new test file, 1 new bug artifact); the shared helper is byte-unchanged.
