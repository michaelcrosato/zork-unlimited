id: bug_0300
title: "Laboratory room mentions black phial after it has been taken"
pack: alchemists_tower_v1
class: reactive-description-blindness
severity: cosmetic
status: fixed

description: >
  All three laboratory room text states (base, herb_added, antidote_brewed) included
  "a black phial sits apart on the bench" regardless of whether the player had taken
  the phial. A player who pocketed the phial and then re-entered or re-examined the
  laboratory would see the phial still described as sitting on the bench — prose
  contradicting observable inventory state. Surfaced in blind playtest (seed 7,
  2026-06-08T08-08-25-240Z).

reproduction: >
  1. new_game alchemists_tower_v1, seed 7.
  2. Navigate to the laboratory (great_hall → north).
  3. take_black_phial.
  4. Observe room — description reads "a black phial sits apart on the bench"
     despite phial being in inventory.

fix: >
  Each brew-state variant gained a has_item:black_phial companion (first-match-wins,
  listed above its plain counterpart) that omits the phial line. The base description
  gained a standalone has_item:black_phial variant. Pure content; no flag/score/exit/
  gating/ending change.

affected_scenes:
  - laboratory

regression_test: tests/regression/alchemists_lab_phial_taken_reactive.test.ts
