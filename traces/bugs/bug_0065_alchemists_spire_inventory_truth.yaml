bug_id: bug_0065
pack_id: alchemists_tower_v1
seed: 31
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T17-49-25-714Z/playtest.md
  finding: >
    The mandatory cycle playtest target (the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist) blind-tested clean — clarity 5/5, enjoyment 4/5, no new
    actionable finding (its one open opportunity was already closed by bug_0064, which an
    independent fresh seed-31 run re-confirmed). The cycle's improvement therefore pivoted
    to a never-blind-tested pack. Two parser packs were blind-tested in parallel (seed 31):
    The Sealed Crypt came back functionally clean, but The Alchemist's Tower surfaced a
    concrete stale-text bug (report §5): a player who climbs to the spire WITHOUT the
    finished antidote (the tester arrived holding only the black phial) is still told
    "The pale antidote in your hand is no use until you give it to her" — prose asserting
    an item they do not hold.
failure:
  type: stale_scene_text_missing_reactive_variant
  where:
    - content:content/parser/pack/alchemists_tower.yaml
  description: >
    The `spire` ROOM description and the `master` OBJECT examine were both hardcoded to
    assert the player was carrying the finished antidote:
      - spire: "The pale antidote in your hand is no use until you give it to her."
      - master: "...but her eyes find the pale vial in your hand and hold on it."
    The laboratory→spire stair is unconditional, so a player can climb to the spire
    carrying the black phial, the raw uncut herb, or nothing at all. In every such state
    the prose lied about the player's inventory — the same stale-text class bug_0012 fixed
    for this pack's rooms and bug_0024 fixed for its objects, except the spire/master pair
    had never opted into the reactive `variants` feature.
fix:
  layer: content
  summary: >
    Content-only application of the existing reactive `variants` feature (RoomSchema /
    ObjectSchema variants, read by the observation builder and the LOOK render site) — no
    engine change. Both the `spire` room and the `master` object gain a single variant
    gated on `has_item: antidote`. The base text now states the goal without claiming the
    cure is in hand ("Whatever medicine might break her fever, you are not carrying it
    yet" / "her fever-bright eyes search you for the cure you have not yet brought her")
    and names no recipe, since a player may have skipped the optional library (the
    bug_0052 leak lesson). The "in your hand / give it to her" prose fires only when the
    antidote is actually held. After the cure is administered the antidote is consumed and
    the game ends (cure_administered → checkWin → ending_cured), so only these two states
    are observable.
  reachable_endings_changed: false  # text-only; ending_cured / ending_poisoned both intact
  content_hash_changed: true        # alchemists_tower is NOT hash-pinned in any test (cf. bug_0012/0052/0057); new `variants` on spire room + master object move the content hash, no re-pin needed
  regression_test: tests/regression/alchemists_spire_inventory_truth.test.ts
verified_live: >
    Through the running MCP server over the reloaded pack (seed 31): climbing
    courtyard→great_hall→laboratory, taking the black phial, then going up to the spire
    renders the spire as "Whatever medicine might break her fever, you are not carrying it
    yet" (no antidote claim), and examining the master narrates "her fever-bright eyes
    search you for the cure you have not yet brought her" (no vial-in-hand claim). The
    regression test additionally confirms that the canonical brew route, which arrives at
    the spire actually holding the antidote, flips both back to the original "pale antidote
    in your hand ... give it to her" / "eyes find the pale vial in your hand" prose, and
    still reaches ending_cured at full score (35/35). validate_story is green (0 findings).
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the multi-step brew/key chain (a standing
    heuristic-planner limit documented since bug_0008), so the blind LLM playtest remains
    the load-bearing quality signal. This was the first blind playtest of this parser pack
    since its reactive-text family (bug_0012/0023/0024/0033/0052/0057) landed; seed 31
    rated it clarity 4/5, enjoyment 3/5, mechanically clean, and named exactly this one
    defect.
