id: bug_0462_watchtower_checkpoint_warden_identification
title: "Watchtower Road checkpoint gives west-first wardens a fair evidence hint"
pack: content/cyoa/pack/watchtower_road.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T202329Z_watchtower_road_seed7.md
severity: S2
symptom: >
  A blind west-first playthrough followed the hermit's clue north to the guarded
  checkpoint without papers. Although the player character is a road warden, the
  checkpoint offered only bluster into a death ending or a silent retreat. The
  route felt like an unfair trap rather than a clear prompt to collect evidence.
root_cause: >
  The checkpoint modeled document presentation and brute force, but not the role
  stated in pack metadata. A no-paper warden had no in-character way to ask what
  the checkpoint required, so the scene failed to signpost that proof from the
  watchtower is the productive next step.
fix: >
  Add an identify_as_warden choice for players without the sealed letter. The
  sergeant acknowledges the badge, refuses passage on title alone, and points the
  player back toward papers or proof from the watchtower before returning them to
  the north road. Existing show_papers, retreat, and force-through outcomes remain.
tests:
  - tests/regression/watchtower_checkpoint_warden_identification.test.ts
verification:
  - npm test -- --run tests/regression/watchtower_checkpoint_warden_identification.test.ts
  - npm run validate -- content/cyoa/pack/watchtower_road.yaml
  - npm run health
