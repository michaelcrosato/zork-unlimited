pack_id: watchtower_road_v1
content_hash: 95cf36659af3fc6edf5e9b8952f6eff19a0ba46679819267dcad28976d50264e  # re-pinned by bug_0098 (lit-beacon raised_alarm now fires reactive ending variants; was bug_0062's 4c971d43…)
seed: 7
initial_state: start
# Surfaced by a BLIND MCP playtester subagent (no access to source/content) playing
# The Watchtower Road end to end — see docs/blind_playtest_protocol.md.
findings:
  - id: stale_cart_text
    where: scene:abandoned_cart
    severity: low
    description: >
      Scene text named the brass lantern and sealed letter as lying in the cart;
      after taking them the static prose still claimed they were there.
    fix: reword the description neutrally; item names live in the choice text.
  - id: stale_gate_text
    where: scene:cellar_door
    severity: low
    description: >
      Scene text said "You will need a light to go down" even after the lantern
      was lit and the descend option had appeared.
    fix: drop the persistent line; move the hint into the light_lantern choice.
  - id: duplicate_journal
    where: scene:cellar
    severity: medium
    description: >
      An on_enter add_journal ("The cellar smells of pitch and old smoke.") fired
      on every entry, stacking duplicate journal lines on revisit. The same
      class affected hidden_cache and hermit_about_letter.
    fix: >
      Move ambiance prose into the static scene text and remove the per-entry
      on_enter add_journal (discovery flags stay in on_enter; they are idempotent).
  - id: ledger_not_carried
    where: [scene:hidden_cache, ending:ending_truth]
    severity: medium
    description: >
      Both endings referenced "the ledger" as evidence, but it was never added to
      inventory — only a flag was set, so the player visibly left it behind.
    fix: >
      add_item ledger when the player reads it (gated by not_item), and soften the
      ending text to reference the evidence generally so all truth-paths are consistent.
failure:
  type: design_polish
  description: >
    No engine fault or determinism break — content/cosmetic flaws a first-time
    player notices. Caught by the playtester step of the loop (§12.4-5), not the
    validator (which checks solvability, not narrative freshness).
fix:
  layer: content        # one of: content | engine_rule | validator | test | hint_text | quest_structure
  summary: >
    Reworded two stale scene descriptions, moved cellar/cache ambiance from
    per-entry on_enter journals into static scene text, made the ledger a real
    carried item, and softened ending_truth to be path-agnostic.
regression_test: tests/regression/watchtower_blind_fixes.test.ts

# A second blind run (same protocol) confirmed duplicate_journal and
# ledger_not_carried are gone, and refined two originals + raised structural ones.
second_pass:
  confirmed_fixed: [duplicate_journal, ledger_not_carried]
  refined:
    - where: scene:cellar_door
      description: removed the lingering "total darkness" descriptor that read stale once the lantern was lit.
    - where: scene:abandoned_cart
      description: removed "a few small things were missed in the rush", which still implied leftover loot after taking the items.
    - where: scene:cellar
      description: >
        the described "gap in the wall" was only actionable if you'd inspected the
        crossroads earlier (search_cache was gated on found_bootprints) — removed
        the gate so the visible passage is always usable.
    - where: scene:decision_point
      description: reworded text that implied you'd already succeeded ("you have what you came for") so it no longer mis-signals a win when you lack evidence.

# Third pass — the two structural findings, now RESOLVED (regression-locked in
# tests/regression/watchtower_blind_fixes.test.ts, describe "bug_0002 deferred").
structural_resolved:
  - where: [scene:decision_point, scene:road_north, scene:checkpoint]
    was: a circular region a player could orbit with no state change.
    fix: >
      turn_back at decision_point is now gated on not_flag learned_truth — once you
      hold proof you must commit (expose / slip away), so the prepared player has no
      dithering loop; the unprepared player keeps a signposted back-path to go find
      proof, with slip_away always available as a clean exit.
  - where: scene:confront_smuggler
    was: without learned_truth the only option was a no-op "back off" — the reveal had no payoff.
    fix: >
      added press_bluff (gated not_flag learned_truth) → ending_captured: pressing
      the sergeant with a sealed letter and no proof gets you seized — a real
      consequence. With proof, reveal_evidence pays off into the win path; back_off
      is reframed as a purposeful retreat to gather proof. No node is a dead-end now.
