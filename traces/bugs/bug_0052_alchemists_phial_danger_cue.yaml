  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T14-47-28-763Z/playtest.md                 # clockwork_heist (mandated target) — no new defect, see below
  rotated_report: ai-runs/2026-06-01T14-47-28-763Z/playtest_alchemists_tower.md # The Alchemist's Tower, seed 67 — this fix's source
  mandated_result: >
    The mandated blind playtest (clockwork_heist, seed 53) was clockwork's 9th independent blind pass:
    all four endings reached, clarity 5/5, enjoyment 4/5, mechanically flawless (0 rejected actions,
    no loops, no soft-locks). Its only §4 notes — the narrative-only "time is running short" pressure
    and the guard-rounds clue reading as a special crossing — are the long-adjudicated-DELIBERATE
    escapable-deadline tuning (bug_0019/0040/0042/0043): the fast route's no-bite IS the reward for
    efficient play, the careful route's tick>=4 patrol payoff is shipped and regression-locked, and the
    ledger journal is load-bearing prose the vault_door / ending_patrol callbacks quote verbatim. No NEW
    actionable clockwork defect. Per blind_playtest_protocol.md's "rotate the seed and rotate the pack"
    (the same move bug_0047 made), the improvement was sourced from a rotated playtest of the
    least-recently full-blind-quality-tested pack, The Alchemist's Tower (parser).
  rotated_result: >
    The Alchemist's Tower, seed 67: WON ending_cured 35/35 on the intended brew route; reached the death
    branch ending_poisoned on a separate run; clarity 5/5, enjoyment 3/5; zero rejected commands, no
    loops, no soft-locks; room/object text stayed in sync with every state change (herb bed, strongbox
    lifecycle, cellar hatch, cauldron). One concrete actionable finding (below), plus the same
    climactic-agency note alchemists shares with sunken_barrow (no explicit "administer"/"take" verb;
    the win fires on room entry — the documented parser-runner room-entry-only win limitation, deferred).
  finding: >
    Laboratory / black phial (rotated report §4 + §5): the lethal black phial can be taken and drunk to
    ending_poisoned with ZERO in-place warning by a player who skips the optional Library — the only
    caution lives in the spellbook recipe in a room they never entered, so the death reads as "arbitrary"
    rather than earned. Compounding it, the phial's base examine text — "A black glass phial of oily
    liquid. The recipe warned against it." — referenced a recipe that a library-skipper had not read (a
    quiet contradiction for that player). Verified live from the engine (MCP, seed 67) before fixing:
    a Library-skip route (courtyard -> great_hall -> laboratory) lets you take + drink the phial straight
    to death, and examining it cited a recipe never read.
  also_reported_design_note: >
    The same report flagged that the spire's "where the cure must be administered" promises a deliberate
    final action, but the win fires automatically on entering the spire while carrying the antidote — no
    explicit "administer"/"give" command. This is the SAME climactic-agency gap sunken_barrow has with its
    auto-taken circlet (bug_0047 deferred note): the parser runner evaluates win_conditions ONLY in
    onEnter (src/parser/runner.ts, documented "a win that must fire without a move would need a post-action
    hook; out of scope for v1"). A clean explicit-claim beat therefore needs an ENGINE capability
    (post-action win evaluation, or on_take effects, or a TAKE/CLAIM interaction verb) — a focused engine
    cycle, not a content-only quick win. Not chased this cycle; logged for a dedicated cycle.
root_cause: >
  The black_phial object's `description` hard-coded a recipe-dependent warning with no reactive `variant`,
  so (a) the cue assumed a fact (the recipe was read) that need not hold, and (b) a library-skipper got no
  intrinsic, in-place danger signal. The reactive-OBJECT-text feature (bug_0023, applied to the cauldron
  in bug_0039 and the strongbox in bug_0033) was simply never applied to this object.
improvement:
  layer: content
  content:
    - content/parser/pack/alchemists_tower.yaml: >
        black_phial's base `description` rewritten to an INTRINSIC sensory dread that does NOT assume the
        recipe ("A black glass phial of oily liquid that seems to drink the light. An acrid reek bleeds
        from under its wax-sealed stopper and stings the back of your throat — whatever this is, it was
        never brewed to be drunk."), plus ONE reactive `variant` when [{ has_flag: read_recipe }] restoring
        the sharper named callback ("The recipe was plain about it: this is no medicine but death — do not
        drink it."). read_recipe is the flag the spellbook READ sets (first match wins; exactly one
        variant). Examine-only: no flag/item/score/exit/interaction/gating/reachable-ending change — the
        drink interaction and ending_poisoned are untouched, so the death stays exactly as reachable.
verification:
