  - tests/regression/alchemists_cauldron_reactive_brew.test.ts      # UPDATED: its incidental variant-less control object was the black phial, which now has a variant; repointed to the still-variant-less `herb` (the backward-compat check is preserved, not weakened)
notes:
  test_update: >
    bug_0039's regression used the black phial as a convenient variant-less control to prove the
    backward-compat invariant (an object with no `variants` renders its static description and an absent
    field stays absent). Giving the phial a variant invalidated that incidental choice, NOT the invariant;
    the assertion is repointed to the `herb` object (genuinely variant-less) so the same guarantee still
    holds. No check was deleted or weakened; the change is surfaced here and in the test's comment.
  verifier_integrity: >
