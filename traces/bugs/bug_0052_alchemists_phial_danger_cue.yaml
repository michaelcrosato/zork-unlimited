  - npm run validate -- content/parser/pack/alchemists_tower.yaml   # OK 0/0 (the variant carries no effects; reachability/scoring unanalyzed)
  - npm run health                                                  # exit 0 (verify:integrity static + typecheck + ESLint + Prettier + tests + every pack validate + watchtower coverage)
locked_by:
