# Surfaced during the mandated blind-playtest cycle on tide_mill (seed 11 blind pass came back
# strong — clarity 5/5, enjoyment 4/5, all three endings [saved 45/45 / thief / drowned], ZERO
# hard mechanical bugs; see ai-runs/2026-06-05T02-07-52-466Z/playtest.md). The tester's §4/§5
# friction: the storm-lantern's "steady" use "was never needed … a first-time player may waste a
# turn or two probing it." The tester's d20 roll SUCCEEDED, so it never saw the on_failure prose —
# reading that prose revealed it actively reinforced the impression the beat was a prerequisite.
# This is the SAME class as bug_0266 (lamplighters_round), found on the sibling pack last cycle.
findings:
  - id: nerve_failure_prose_implies_a_gate
    where: object:tide_lantern (skill_check on_failure)
    severity: low
    description: >
      The OPTIONAL "nerve" steadiness skill-check on the storm-lantern is 100% CONVERGENT: its
      only flag `nerve_held` is read by nothing but its own one-shot `not_flag` guard, so it gates
      no exit, win, score, or reactive variant (the non-linearity proof, all-endings reachability,
      liveness BFS, and score-economy proofs all hold without it; both puzzle orders reach
      ending_saved at the full 45/45). But its `on_failure` narration ended "...Best stand a moment
      and gather yourself BEFORE you take up the night's work in earnest," which told a player who
      MISSED the roll (range 4–23 vs DC 12, ~40% miss) to steady up before doing anything else —
      falsely implying the steadied lantern was a prerequisite for the night's work (cut the race,
      free the pawl, wind the gate). A player rolling low repeatedly could believe they were
      blocked from the actual goal and burn turns on a beat that gates nothing. A narrative-honesty
      / signposting flaw, not a mechanical one — the beat really is optional, but the failure text
      said otherwise.
    fix: >
      Rewrite the on_failure prose to drop the false-gate clause and state plainly the work goes on
      regardless: the lantern "is lit and burning and will see you about the mill well enough — the
      wheel still wants its two faults put right and the gate winding before the tide is wholly out,
      and that work waits on no man's grip. Take it up when you will, and steady the light again if
      it eases you." The beat stays optional, retryable-on-failure, one-shot-on-success; no
      flag/var/score/exit/ending change.
failure:
  type: design_polish
  description: >
    No engine fault or determinism break — misleading narration on an optional convergent beat
    (the §8.7 "never an ambush" / narrative-honesty class, here a SKILL-CHECK failure line rather
    than a death telegraph; identical to bug_0266 on lamplighters_round). Caught by reasoning over
    the blind tester's "was it mandatory?" friction note and reading the on_failure prose the
    (successful) roll never surfaced — not by the validator, which checks solvability/liveness, not
    narrative clarity. The fix alters only displayed text on the failure branch; it changes no
    state, so every structural proof re-derives byte-identical and all three endings stay reachable.
fix:
  layer: hint_text       # one of: content | engine_rule | validator | test | hint_text | quest_structure
  summary: >
    tide_lantern's nerve on_failure narration no longer ends "...before you take up the night's
    work in earnest" (which read as a gate); it now signals the work continues regardless of the
    roll ("lit and burning … that work waits on no man's grip"), so a player who keeps missing the
    optional check is not misled into thinking they are blocked from the actual job.
