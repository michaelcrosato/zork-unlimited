id: bug_0434
title: Friars' Postern awarded max score before the honest escape
pack: content/parser/pack/friars_postern.yaml
reported_by: blind_playtest_20260622T092214Z_friars_postern_seed7
severity: high
symptom: >
  A fresh blind player learned the postern route, then unlocked the debtors'
  poor-fund and reached ending_thief with 35/35. The score peaked during the
  old debtor conversation, before the moral choice between honest escape and
  theft, so the bad ending looked mechanically perfect.
root_cause: >
  The final 20-point milestone was attached to the take_pipe dialogue node that
  teaches the latch trick. That state still leaves the alms-box theft available
  to any player holding the turnkey's key-ring, and even opening the postern did
  not require the player to leave through it.
fix: >
  Moved the final 20-point award from the latch-telling dialogue node to
  night_street on_enter. The honest route still reaches 35/35, while every
  poor-fund theft route remains below max score.
tests:
  - tests/regression/friars_postern_honest_escape_score.test.ts
verification:
  - npm test -- --run tests/regression/friars_postern_honest_escape_score.test.ts tests/regression/friars_postern_dialogue_key.test.ts tests/regression/friars_postern_press_stone_action.test.ts tests/regression/friars_chapel_postern_premature_open.test.ts tests/regression/friars_postern_gallery_pipe_reactive.test.ts tests/regression/friars_postern_heft_telegraph.test.ts tests/regression/friars_thief_ending_consistent.test.ts
  - npm run validate -- content/parser/pack/friars_postern.yaml
