id: bug_0459_tidewaiters_informed_report_gate
title: "Tidewaiter's Watch only offers the alderman report after the buried query is known"
pack: content/cyoa/pack/tidewaiters_watch.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T194420Z_tidewaiters_watch_seed7.md
severity: S2
symptom: >
  A blind playtest found that file_report still appeared after only the manifest
  discrepancy was discovered, before the player could visit the port office and
  learn that prior Sister Moon concerns had been referred to the alderman and
  buried. A methodical player could therefore take the 20/50 report ending
  without a fair warning that the reporting channel itself was compromised.
root_cause: >
  bug_0405 correctly stopped the report from appearing at the opening and split
  the ending prose by knowledge state, but the action gate still required only
  found_discrepancy. That let the partial ending appear before the player had
  access to the decisive context that makes filing through the alderman a risky
  compromise.
fix: >
  Gate file_report on both found_discrepancy and found_priors, and change the
  action label to name the buried alderman query. The report branch remains
  available, but only as an informed compromise.
tests:
  - tests/regression/tidewaiters_watch_report_truth.test.ts
verification:
  - npm test -- --run tests/regression/tidewaiters_watch_report_truth.test.ts
  - npm run validate -- content/cyoa/pack/tidewaiters_watch.yaml
  - npm run health
