bug_id: bug_0053
pack_id: clockwork_heist_v1
seed: 211
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T15-05-47-942Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester reached all four endings
    (Truth x2 epilogue variants, Rich, Caught) across four runs (seed 211), rating it
    clarity 5/5, enjoyment 4/5, mechanically flawless — zero rejected actions, no
    loops, no soft-locks, no bugs; verdict "polished and ships-ready". Its one
    actionable finding NOT already closed by the recent clockwork polish family
    (bug_0019/0040/0042/0043/0046/0051) is report §4 friction #2: the steward's
    ledger — the heist's load-bearing timing clue — has a value that is "subtle"; a
    first-timer "might over- or under-value it." The study presented the ledger as
    ambient furniture, so a player could leave the study having skipped its whole
    point without ever knowing the open ledger holds the watchman's rounds.
failure:
  type: load_bearing_clue_illegible_at_decision
  where:
    - content:content/cyoa/pack/clockwork_heist.yaml
  description: >
    The study scene text read "Ledgers, a cold lamp, and a brass wall-plate engraved:
    'The vault yields only to a steady hand — never to force.'" The only signposted
    feature, the brass wall-plate, speaks to the LOCK (telegraphing the Caught trap
    and the need for a pick), not the watch. The watchman's rounds — the thing reading
    the open ledger actually reveals (and the gate bug_0040 made load-bearing: a
    reader keeps the safe on-the-hour crossing, a non-reader gets only the blind
    gamble) — were invisible until AFTER the player committed to "Read the open
    ledger", a bare choice that promised nothing. So the clue's value could not be
    weighed at the point of decision, and the gallery's later callback "the hourly
    patrol the steward's ledger warned of" referred to a warning the ledger never
    actually voiced on-screen.
fix:
  layer: content
  summary: >
    Legibility-only edit to the `study` scene. The scene text now singles out the one
    OPEN ledger on the desk and names what its last page records — "the household's
    hours: when the staff retire, and when the watch walks its rounds" — and the
    `read_ledger` choice text changes from "Read the open ledger." to "Read the open
    ledger's account of the watch's rounds." This gives the load-bearing clue an
    honest pull a first-timer can weigh before reading, and makes the gallery's
    existing "the steward's ledger warned of" callback literally true. NO
    flag/tick/route/gating/reachable-ending change: the read_ledger effect (set
    read_ledger + the actionable "now that you know his rounds, you could time a
    crossing" journal) and the on-the-hour safe-crossing gate (bug_0019/0040) and the
    timed-crossing payoff prose (bug_0042) are all untouched.
  reachable_endings_changed: false  # still rich/truth/caught/patrol; all routes intact
  content_hash_changed: true        # clockwork pack edited; clockwork is unpinned in tests (only watchtower_road is pinned). 7e489e9f7ff66230f5b417c8fb4ca83d92017ef30d312e01f865793f3a4ec771 -> 98fd1a83b0b4a0e0232d9663be3ff781d39c45f273a9ad3e92c9d8990ad83d87
  regression_test: tests/regression/clockwork_ledger_pull_legibility.test.ts
verified_live: >
    Through the engine over the compiled pack (seed 211), building observations the
    way the MCP server does (buildObservation). On reaching the study the scene text
    now matches /one ledger lies open/i and names the watch's rounds; the read choice
    text matches /watch|rounds/i. The payoff is unchanged: the thorough read-ledger
    route arrives at the gallery on the hour (tick 4) with read_ledger set, the
    rounds journal present, approach_vault offered and the blind gamble gated out;
    the same route skipping the ledger loses approach_vault and gets only
    cross_to_vault_blind. All four endings still fire (rich/truth/caught/patrol).
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest remains the load-bearing
    quality signal; seed 211 rated the pack shippable and this fix closes its one
    remaining actionable finding (the ledger's illegible value), continuing the
    clockwork polish family without touching its tuning.
