id: bug_0379
pack: dyers_weight_v1
title: "back-passage ending denied a completed second acid test"
severity: moderate
scene: back_passage
reported_by: blind_playtest_20260620T121703Z_dyers_weight_seed7

symptom: >
  A player could complete the raw chalk test and the vat acid test, then explore
  south into the back passage and receive ending_abandoned text saying the second
  acid test was incomplete. The ending contradicted the proved_adulteration flag
  and the player's just-completed investigation.

root_cause: >
  ending_abandoned used one static failure epilogue for both early abandonment
  and post-proof abandonment. It did not vary on the completed-proof state.

fix: >
  Added a reactive ending variant keyed to proved_adulteration. Early abandonment
  still says the proof is incomplete; post-proof abandonment now says the proof
  was completed but never filed before the Deputy Warden.

tests: tests/regression/dyers_weight_abandoned_ending_reactive.test.ts
