id: bug_0310
title: "midnight_edition: composing_room door_barred variant names Garrow before letter is read"
pack: midnight_edition_v1
class: reactive-description-blindness
severity: minor
found_by: blind_playtest_seed7_2026-06-08T10-38-36-377Z
playtest_report: ai-runs/2026-06-08T10-38-36-377Z/playtest.md

symptom: >
  After visiting the alley door and barring it WITHOUT reading the letter, the
  composing_room hub variant for `door_barred` (no knowledge flag) says "the alley
  door is barred now on the men you found waiting there — Garrow's, by the hammers
  they carried." The player-character has not read the letter and has no in-fiction
  basis for knowing the men work for Garrow. The alley_door base text (no quest stage
  set) correctly calls them "Hired men" — the hub's door_barred-only variant leaks
  the name Garrow a step early.

root_cause: >
  The composing_room `door_barred`-only variant (fires when door_barred is set but
  neither read_letter nor knows_proof is set) was authored with the same "Garrow's"
  attribution as the read_letter+door_barred and knows_proof+door_barred variants above
  it. Those two are correct (the letter was read → name known). The no-knowledge variant
  should match the alley_door base text's "hired men" framing instead.

fix: >
  Changed "Garrow's, by the hammers they carried" to "hired men, by the hammers they
  carried" in the composing_room door_barred-only variant. The two more-specific variants
  (read_letter+door_barred and knows_proof+door_barred) above it in first-match-wins
  order retain "Garrow's" correctly — those fire only after the letter is read.

regression_test: tests/regression/midnight_edition_garrow_name_door_barred.test.ts
