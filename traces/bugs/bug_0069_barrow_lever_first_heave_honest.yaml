evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T18-34-30-790Z/playtest.md   # clockwork_heist (mandated, seed 53) — no new defect; AND the sunken_barrow rotation (seed 13) that sourced this fix
  mandated_result: >
    The mandated blind playtest (clockwork_heist, seed 53) was clockwork's ~21st independent blind pass:
    all four endings, clarity 5/5, enjoyment 4/5, mechanically flawless, zero rejected actions/loops/
    soft-locks. It independently re-verified the bug_0061–0068 deadline/legibility arc (ledger-read vs
    ledger-skipped gallery prose, force-door alarm, foyer panel). No NEW actionable clockwork defect —
    consistent with the prior ~20 clean passes; clockwork stays deprioritized. Per blind_playtest_protocol's
    "rotate the seed and rotate the pack" and the standing next-focus across the last several cycles
    ("rotate onto the RPG packs sunken_barrow and cold_forge"), the improvement was sourced from a rotated
    blind pass of the least-recently-quality-tested pack, The Sunken Barrow (rpg).
  rotated_result: >
    The Sunken Barrow, seed 13 (+seed 7 gating probe): WON ending_victory 50/50; clarity 5/5, enjoyment
    3/5; zero rejected actions, no loops, no soft-locks; missing-iron-bar case gated gracefully and
    recoverable. One concrete actionable finding (below), plus the standing brevity/linearity note
    (needs a content_new cycle, not chased) and an unverifiable-failure-branch observation (the player
    rolled a bare success and never saw a failure — confirmed graceful/retryable at source via bug_0027).
  finding: >
    Slab Passage (rotated report §5 #1): examining the as-yet-unsolved slab read "Wedge the bar beneath
    the lip and it can be levered — NOT BY ONE HEROIC EFFORT, but by setting your feet and heaving AGAIN
    AND AGAIN until the old stone gives." But the lever is a single seeded skill check (d20 + might[3] vs
    DC 12) that succeeds ~60% on the FIRST use. So the prose flatly PROMISED an iterative grind that, for
    a first-roll winner (the seed-13 player), never happened — and it contradicted the on_success line
    "you heave — and the slab grinds aside" (a single heave). The playtester: "the flavor over-promises."
root_cause: >
  The base description was authored under bug_0027 to fight a WORSE failure mode (a blind player, seed 88,
  failed twice, read "strong enough / real might" as a fixed strength threshold, hunted a non-existent
  strength item, and quit a winnable game), so it deliberately reframed the puzzle as repeatable
  PERSISTENCE — "heaving again and again until the old stone gives." That signal is load-bearing, but the
  chosen wording over-corrected into a flat promise that it ALWAYS takes many heaves, which is false on the
  common (~60%) first-try path and clashes with the single-heave on_success narration.
improvement:
  layer: content
  content:
    - content/rpg/quests/sunken_barrow.yaml: >
        stone_slab base `description` reworded from "…not by one heroic effort, but by setting your feet and
        heaving again and again until the old stone gives" to "…set your stubborn weight to it: it may give
        on the first heave or take several, but leverage — not raw strength — is what works the old stone
        loose." Now true on BOTH paths (first-roll success AND a retried grind) and consistent with the
        single-heave on_success line, while STRENGTHENING bug_0027's two signals: persistence ("or take
        several", "stubborn") and anti-strength-threshold ("leverage — not raw strength"). Base examine only:
        no flag/item/score/exit/interaction/gating/DC/skill/reachable-ending change; the slab_moved reactive
        variant (bug_0047), the one-shot retire (bug_0015), the on_failure retry guidance (bug_0027), and the
        seeded DC-12 might check are all untouched.
