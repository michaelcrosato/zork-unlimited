id: bug_0420
title: Night Dispensary did not signpost partial watch reports versus the full case
pack: content/cyoa/pack/night_dispensary.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  The blind playtest reached valid 40/50 endings but had little in-world signal
  about which evidence remained or why a fuller investigation could still matter
  before sending for the watch or naming Cole directly.
root_cause: >
  The counter prose reacted to isolated clues, but it did not distinguish the
  sufficient-but-partial report state from the stronger confirmed-death and
  confrontation-ready states. The watch action also sounded final without saying
  it used the evidence gathered so far.
fix: >
  Added more specific counter variants for report-ready and confrontation-ready
  states, and changed the watch-report label to say it uses the evidence gathered
  so far. No gates, scoring, endings, or route topology changed.
tests:
  - tests/regression/night_dispensary_case_completeness.test.ts
verification:
  - npm test -- --run tests/regression/night_dispensary_case_completeness.test.ts
  - npm run validate -- content/cyoa/pack/night_dispensary.yaml
