id: bug_0427
title: Assayer's Mark hid its corruption branch behind TAKE seal
pack: content/parser/pack/assayers_mark.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: medium
symptom: >
  The blind playtest called the master's seal a signposted moral choice but
  expected a USE/corruption payoff after taking it. In the pack, TAKE was itself
  the hidden bad-ending trigger, which made a normal pickup verb carry a surprising
  approve-the-batch consequence.
root_cause: >
  master_seal was takeable and used take_effects to press the seal and end the
  game. That overloaded parser TAKE semantics instead of exposing the intended
  moral action as a verb-named command.
fix: >
  Converted the corruption branch to an explicit target-only USE interaction with
  command_verb: press, so the offered command is "press master's seal" and "take
  master's seal" is no longer listed. The suppressed ending and normal win route
  are unchanged.
tests:
  - tests/regression/assayers_seal_press_branch.test.ts
verification:
  - npm test -- --run tests/regression/assayers_seal_press_branch.test.ts
  - npm run validate -- content/parser/pack/assayers_mark.yaml
