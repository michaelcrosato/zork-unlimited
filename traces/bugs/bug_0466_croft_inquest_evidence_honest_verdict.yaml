id: bug_0466_croft_inquest_evidence_honest_verdict
title: "Croft Inquest verdict prose only names evidence in the record"
pack: content/cyoa/pack/croft_inquest.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T210812Z_croft_inquest_seed7.md
severity: S2
symptom: >
  A blind playtest flagged that the inquest table could assume a fuller record
  than the player had actually made on early or partial routes. The existing
  rushed base text was already neutral, but the pressed-widow variant could name
  Jack Finch before his account was heard, and the felony ending could name
  Stott's note or the debt ledger on valid felony routes that skipped those
  supporting papers.
root_cause: >
  The felony verdict gate intentionally requires wound, scene, and apprentice
  evidence, while the physician note and debt ledger are supporting proof for
  the strongest score route. The prose did not distinguish those record states:
  one inquest variant and the default committed ending described the full record
  unconditionally.
fix: >
  Split the pressed-widow inquest text so Jack Finch is named only after his
  account is in the record, and add an alternate committed-felony ending for
  routes missing the physician note or debt ledger. Verdict gates, score awards,
  routes, and endings remain unchanged.
tests:
  - tests/regression/croft_inquest_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/croft_inquest_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/croft_inquest.yaml
  - npm run health
