bug_id: bug_0092
pack_id: null   # engine/validator soundness fix; not specific to one pack
seed: 13
evidence:
  source: blind_playtest + validator_audit
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-02T00-03-55-507Z/playtest.md
  finding: >
    This cycle ROTATED the mandated blind pass off the content-complete clockwork_heist
    (the assessor's rank-1, ~27 consecutive clean passes) onto the least-attended pack:
    RPG mode (cold_forge / sunken_barrow) had NEVER had a blind LLM combat playtest, and
    the standing next-focus #3 + the project memory both call to rotate the pass there.
    A fresh general-purpose MCP-only subagent (no source access) played cold_forge twice
    (seeds 13 & 7): both runs reached the victory ending at 50/50 — once optimally, once
    deliberately under-armed (no spirit buff, no plate) — found ZERO functional bugs, ZERO
    soft-locks, and rated it clarity 5/5 / enjoyment 4/5. Its one note (the sentinel is
    beatable even under-armed, so the telegraphed prep is mechanically optional) is a soft
    balance/tuning observation, not a defect — the same author-intentional "careful play is
    safe" stance the clockwork bug_0061..0084 arc already settled. With the blind target
    proven clean and the content-polish backlog recorded exhausted, I pursued last cycle's
    (bug_0091) queued next-focus #1 verbatim: "EXCLUDE [unsatisfiable win_conditions] (and
    unfireable CYOA deadlines) from the soft-lock escape graph so a real SOFTLOCK behind a
    dead terminal is no longer masked (the unsoundness bug_0087/0091 only surface, not yet fix)."
failure:
  type: validator_unsound_softlock_graph
  where:
    - engine:src/validate/parser_validator.ts
    - engine:src/validate/rpg_validator.ts   # delegates to validateParser, so inherits the fix
    - engine:src/validate/cyoa_validator.ts
  description: >
    Both the parser/RPG and CYOA validators verify "every reachable scene/room can still
    reach a win/ending" by building an escape graph and checking reverse-reachability of the
    terminals. Both polluted that graph with PROVABLY-DEAD terminals, so a region whose ONLY
    way out was a dead terminal read as escapable when it is in fact soft-locked:
      (1) parser/RPG: `winRooms` (the soft-lock escape set) was populated from EVERY
          win_condition's `visited` room — even when the win's `conditions` are internally
          contradictory (UNSATISFIABLE_CONDITION, bug_0091) and can therefore never fire. The
          in-code comment at the win-condition guard already admitted this: "a `visited` room
          inside such a never-firing win is still added to `winRooms` above as a real escape
          target, so an unsatisfiable win could mask a true SOFTLOCK."
      (2) CYOA: a scene that writes a deadline-watched var got a structural escape edge to
          `meta.deadline.ending` even when the deadline can PROVABLY never fire
          (DEADLINE_UNFIREABLE, bug_0087). The comment at checkDeadlineFirability already
          admitted this: "a latent unsoundness for the soft-lock graph ... that edge is a
          phantom: the graph would count a scene as escapable via a deadline that never triggers."
    bug_0087/0091 only SURFACED these dead terminals (a warning); they still polluted the
    escape graph, so a true SOFTLOCK gated behind one was silently swallowed — the worst class
    of validator miss, since the whole point of the soft-lock check is to catch exactly that.
fix:
  layer: validator
  summary: >
    Exclude provably-dead terminals from the soft-lock escape graph in both validators (the
    separate UNSATISFIABLE_CONDITION / DEADLINE_UNFIREABLE warning still names the dead terminal
    so the author can fix or remove it):
      - parser_validator.ts: when building `winRooms`, skip the `visited`-room contribution of a
        win_condition whose `conditions` are isUnsatisfiable(whenProfile(...)) (the existing
        bug_0085/0086 machinery, already in this file). The independent ENDING_UNDECLARED
        reference check on the win still runs.
      - cyoa_validator.ts: make checkDeadlineFirability RETURN whether the deadline is provably
        unfireable; hoist that boolean and gate the deadline escape edge in the successors loop
        on `!deadlineUnfireable`.
    Conditional & sound: when the SAME terminal is satisfiable / fireable it remains a real escape
    edge and no spurious SOFTLOCK appears. No schema, runner, or content change — the change only
    removes phantom edges that a clean pack never has, so shipped packs are unaffected.
  reachable_endings_changed: false
  content_hash_changed: false        # no content pack edited
  regression_test: tests/regression/softlock_dead_terminal.test.ts
verified_live: >
    Bug-first (proven by stashing the two source edits and re-running): WITHOUT the fix, a parser
    pack whose only escape from a one-way trap wing is an internally-contradictory win_condition is
    NOT flagged SOFTLOCK (masked); a CYOA pack whose only escape from a self-looping scene is an
    unfireable deadline is likewise NOT flagged. WITH the fix both are flagged SOFTLOCK (alongside
    the pre-existing UNSATISFIABLE_CONDITION / DEADLINE_UNFIREABLE warning). Soundness / no false
    positive: making the same win satisfiable, or the same deadline fireable, restores the escape
    edge and yields NO SOFTLOCK either way. The shipped packs (clockwork, watchtower, sealed_crypt,
    alchemists_tower, and the RPG packs via delegation) gain NO new SOFTLOCK — they have no dead
    terminal to begin with. `npm run health` exit 0; all content hashes unchanged.
note: >
    This closes the soft-lock-graph half of the global-terminal family. bug_0087/0089/0090/0091
    built the static detection of dead terminals (a deadline / win_condition that can never fire,
    or fires at start); this is the first cycle to act on that detection inside the soundness graph
    itself — converting "we noticed a dead terminal" into "we no longer let a dead terminal hide a
    real soft-lock." Same stance as the rest of the family: only a PROVABLY dead terminal is
    excluded (isUnsatisfiable / the two sound DEADLINE_UNFIREABLE grounds), so the change removes
    only phantom edges, never a real one.
