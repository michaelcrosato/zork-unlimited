bug_id: bug_0241
pack_id: sealed_crypt_v1
seed: 11                          # this cycle's blind-playtest seed; the regression drives seed 11
type: content_fix                 # iron_key examine prose only — no engine/validator/schema/flag/item/score/exit/gating change
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-04T16-53-45-442Z/playtest.md   # The Sealed Crypt, seed 11 — this fix's source
  result: >
    Mandated blind pass ran on sealed_crypt (assessor rank-1). A fresh MCP-only blind
    playtester (seed 11) reached all three endings — ending_victory 35/35, ending_doom
    (death), ending_plunder (non-death) — rating clarity 5/5, enjoyment 4/5; zero
    rejected actions, no loops, no soft-locks; gating clean both directions and the
    5/10/20 score economy summing to exactly 35 on the intended path.
  finding: >
    Report §4/§5: once the player holds the iron key, the self-targeted USE action
    surfaces as the bare command "grip iron key" (id `use_iron_key`, USE iron_key on
    iron_key). It reads as vestigial/meaningless pre-commitment — "gripping a key"
    accomplishes nothing obvious, and the player cannot predict its effect before
    triggering it, so it "looked like it might do something" and "invites a wasted,
    confusing action." It is in fact the deliberate, OFF-critical-path nerve
    skill-check beat (the Stage-4 skill_check standardized into this parser pack),
    but nothing told the player that before they committed. This nit has now recurred
    across multiple blind passes (cf. the iron-key tension beat across seeds).
root_cause: >
  The controlled command parser (src/parser/command_map.ts) only accepts `<verb>
  <noun>` or `<verb> <noun> <prep> <noun>`, and the offered command must stay
  typeable, so the self-USE label is constrained to "grip iron key" — a richer,
  sentence-like label can be legible OR typeable, not both (schema.ts deliberately
  forbids a command_template on a self-USE for exactly this reason). The real gap is
  therefore MISSING PRE-COMMITMENT CONTEXT: the iron key's examine description named
  only its lock-fitting purpose ("fit for a great iron lock"), never the optional
  steady-your-hand impulse the `grip` beat acts on, so a curious player who examined
  the key got no signal that the action was an intentional, clued tension moment.
improvement:
  layer: content
  content:
    - content/parser/pack/sealed_crypt.yaml: >
        iron_key.description gains a second sentence telegraphing the OPTIONAL nerve
        beat — "The cold of it climbs your wrist; whatever you mean to turn it on
        down here, you might grip it a moment first and steady your hand before you
        do." Names the impulse the self-USE `grip iron key` acts on, so the action
        reads as a clued tension moment rather than a broken/vestigial one. Pure
        prose: gates nothing, changes no flag/item/score/exit/win/reactive-variant,
        so every structural proof and the 35-point economy stay byte-identical.
verification:
  - mcp validate_pack content/parser/pack/sealed_crypt.yaml       # ok, 0 findings (sealed_crypt is unpinned — no content-hash to re-pin; only watchtower_road is pinned)
  - npm run health                                                # exit 0 (verify:integrity static + typecheck + ESLint + Prettier + tests + every pack validate + watchtower coverage + playtest record)
locked_by:
  - tests/regression/sealed_crypt_grip_telegraph.test.ts          # 3 cases: examine telegraphs "steady your hand"/"grip it" (and keeps "great iron lock"); the telegraph matches a real offered action (`use_iron_key` / "grip iron key"); the grip beat gates nothing — exercising it mid-run, the full route still wins ending_victory at 35/35
notes:
  verifier_integrity: >
    No check was weakened, disabled, or re-pinned. sealed_crypt carries no pinned
    content hash (only watchtower_road is pinned in tests/unit/rpg_validator.test.ts),
    so this surfaced content change pins nothing. The regression test is additive and
    value-pinning (asserts the new prose AND the unchanged win/score), not a count or
    matcher-strength launder. The nerve skill_check is unchanged and remains CONVERGENT
    (gates no exit/ending/score/variant), as the iron_key comment block documents.
