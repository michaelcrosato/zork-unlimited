id: bug_0363
title: Surveyor's Round stale office prose and under-signposted steadiness check
severity: content
status: fixed
root_cause: >
  A fresh MCP blind playtest found that Carrick's office could still say the
  surveyor had yet to measure whether the declaration was honest after the
  player had already collected physical measurement evidence. The same report
  found the survey quest stage was reset on every office return, and the final
  concealment-report steadiness check was mechanically visible but not prepared
  in the fiction.
fix: >
  Add reactive office prose for partial measurement states, remove the
  unconditional office-entry quest-stage reset, advance the survey stage on
  evidence and report actions, hide declared-figure acceptance once contrary
  evidence exists, add a cellar variant for testing wort before measuring tuns,
  and reword the full concealment state/action to foreshadow the steadiness
  check while keeping both roll branches convergent.
files_changed:
  - content/cyoa/pack/excise_surveyors_round.yaml
regression_test:
  - tests/regression/excise_surveyors_round_blind_polish.test.ts
