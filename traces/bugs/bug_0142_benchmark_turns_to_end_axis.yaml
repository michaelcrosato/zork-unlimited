evidence:
  source: blind_playtest + ULTRAPLAN
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T17-10-27-653Z/playtest.md   # alchemists_tower seed 71 (the cycle's mandated, correctly-rotated target)
  finding: >
    The mandated blind pass on The Alchemist's Tower (parser, seed 71 — the
    least-recently blind-played pack per the rotation, last attended pre-sweep)
    reached all THREE declared endings (cure / poison / betrayal) and rated the pack
    clarity 5/5, enjoyment 4/5, ZERO bugs — content is blind-clean. So there was NO
    actionable content defect this cycle: per [[content-polish-backlog-exhausted]] /
    [[verifier-assertion-guard]] the deterministic assessor is collapsed to the 0.5
    floor with every self-extinguishing structural lever disarmed. The highest-value
    on-plan move is the benchmark axis the last several cycles' next-focus named as
    #2 / "the strongest remaining candidate": turns-to-end, which pairs with the
    hide_graph spatial axis (bug_0137/0138).
root_cause: >
  The scorecard measured WHAT the deterministic bot reached (completion rate, ending
  coverage, scene coverage) but never HOW DIRECTLY it got there. Two routes that both
  reach an ending at the same coverage are indistinguishable on the scorecard even if
  one takes 4 actions and the other 40. With no path-length axis, the benchmark could
  not express efficiency, and the hide_graph spatial difficulty had only ONE signal
  (the scene-coverage drop) — turns-to-end is its natural second signal (a graph-blind
  agent wanders more before it finds a win room).
fix: >
  Engine/benchmark, trust-but-verify (deterministic; no clock/RNG/network; no
  LLM-judge; NO API key). (1) Both run_playtest summaries (summarizeCyoa and
  summarizeParserLike in src/mcp/tools.ts) now accumulate, over runs that REACH an
  ending, the action count (path.length - 1) and return mean_turns_to_end — the mean
  rounded to 1 decimal via a shared meanTurns() helper, 0 when no run completed.
  Crucially it counts COMPLETED runs only, so timed-out (max_steps) runs do not
  inflate it. (2) src/afk/benchmark.ts adds mean_turns_to_end to BenchmarkRow, populates
  it from the playtest summary, and renders a "Turns→end" markdown column that shows a
  "—" dash (not a misleading "0.0") for 0%-completion rows. The markdown intro documents
  the axis honestly: the baseline coverage bot completes 0% of the parser/RPG PUZZLE
  packs (it can't plan multi-step solves), so the shown→hidden turns-to-end PAIRING only
  populates as more capable agent rows are added — the column reads "—" for those baseline
  spatial rows today, while every completing CYOA/random row carries a real efficiency
  number (e.g. watchtower coverage 18.5 vs random 6.7; wreckers coverage 4.1 vs random 8.4
  at 50 runs/cell).
within_bar: >
  Additive engine/benchmark feature. The observation/aggregate is not part of the state
  hash, so determinism, replay, and every trace's expected_final_hash are unchanged; the
  scorecard remains byte-identical run-to-run (the determinism test still passes). No
  content/pack edited; no validator/schema change; NO hash pin moved. run_playtest gains
  one additive field — no test asserted its exact object shape, and the field is surfaced
  (deliberately strengthened, not weakened) in the scorecard unit test. The committed
  scorecard (traces/benchmark/scorecard.{md,json}) was regenerated to show the new column.
  Typecheck + lint + format clean; the full pre-existing suite passes unchanged, plus the
  new cases below.
regression_test: tests/regression/benchmark_turns_to_end_axis.test.ts
test_cases:
  - "mean_turns_to_end is a positive mean (>= 1, <= max_steps) on a pack the coverage bot completes"
  - "mean_turns_to_end is exactly 0 when the bot never reaches an ending (the rendered dash)"
  - "mean_turns_to_end is deterministic — same pack + runs ⇒ identical mean"
  - "mean_turns_to_end counts only COMPLETED runs — it stays 0, not 80, when every run times out"
  - "mean_turns_to_end is graph-agnostic for CYOA (no room graph), like every other CYOA metric"
unit_test_strengthened: tests/unit/benchmark.test.ts   # every row's turns-to-end is well-formed (>=1 when completed, ==0 otherwise); CYOA hidden==shown; markdown has a Turns→end column + a dash for 0%-completion rows
