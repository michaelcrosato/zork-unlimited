id: bug_0215
title: "Extended the PER-STEP metamorphic observation-stream oracle to the RPG mode — COMPLETES the CYOA->parser->rpg trilogy bug_0214 named as next-focus #1"
kind: verification_oracle # metamorphic / isomorphism oracle, additive; the RPG companion to bug_0213 (CYOA) + bug_0214 (parser), and the per-step deepening of the bug_0212 RPG census
mode: rpg
# Informational. NO src/ change, NO content change, NO hash re-pin, NO protected file
# touched. ONE new test file that reuses the existing relabel_rpg.ts + relabel_parser.ts +
# exhaustive_endings.ts (stateKey) support and the production buildRpgObservation /
# buildRpgRules / enumerateRpgActions. verify:integrity stays EXIT 0 with no
