summary: >
  A GAP in the verification net, not a defect in shipped behaviour. The bug_0212 RPG
  metamorphic census proves an RPG pack and its identifier-relabeled twin are isomorphic on
  three TERMINAL/AGGREGATE artefacts: the best/worst-roll ending-reachability census, the
  distinct-state COUNT, and the validateRpg finding-code multiset. Those are end-of-run
  summaries. They would still pass if the engine emitted subtly DIFFERENT player-facing
  OBSERVATIONS along the way — a room's description, the enumerated commands, the surfaced
  flags/vars/inventory, the blocked-exit hints, and the RPG-only surfaces the census never
  inspects at all: the ENEMIES standing here (id, name, and the live combat HP that ticks
  down a fight) and the player's STATS (hp/attack/defense) — as long as the same endings
  stayed reachable and the state graph kept the same size. bug_0215 closes that gap for RPG
  with a PER-STEP witness: every observation across the bracketed reachable graph must be
  identical (modulo the bijection) on the twin, completing the CYOA (bug_0213) -> parser
  (bug_0214) -> rpg per-step observation-stream trilogy.

