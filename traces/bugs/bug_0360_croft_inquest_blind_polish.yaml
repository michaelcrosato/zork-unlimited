id: bug_0360
title: Croft Inquest blind polish for widow contradiction and Finch roll fairness
severity: content
status: fixed
root_cause: >
  A fresh MCP blind playtest found The Croft Inquest clear and mechanically
  strong, but flagged that Alice Croft's false stair-fall account was proven
  false without the inquest explicitly reckoning with it. The same report also
  identified Jack Finch's composure check as a fairness risk that needed direct
  verification on the failure branch because his testimony names Merton.
fix: >
  Add an optional, unscored Alice confrontation once the widow's account and the
  blood-location evidence both exist, plus inquest-table variants that explain
  why her story cannot govern the finding. Add regression coverage proving the
  confrontation is discoverable, the inquest acknowledges both pressed and
  unpressed contradiction states, Finch's failed composure branch still supports
  the felony verdict, and the maximum-score route remains 50/50.
files_changed:
  - content/cyoa/pack/croft_inquest.yaml
regression_test:
  - tests/regression/croft_inquest_blind_polish.test.ts
