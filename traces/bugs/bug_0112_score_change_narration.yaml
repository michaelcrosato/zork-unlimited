id: bug_0112
title: "A score change now narrates itself — the Zork '[Your score has gone up by N points…]' line"
kind: engine_rule
mode: parser
severity: enhancement
pack: content/parser/pack/sealed_crypt.yaml

summary: >
  Milestone score awards incremented the conventional `score` var silently. The
  player saw the HUD number jump (5 → 15 → 35) with no in-prose explanation of WHY,
  and no signal that a +5 bonus had even been earned or missed — the award surfaced
  only as a structured `state_change` inc_var event, never as text a player reads.
  bug_0112 adds the missing player-facing narrator: every `score` change now emits
  the classic interactive-fiction line "[Your score has gone up by N points; it is
  now M of T.]".

blind_playtest:
  run: ai-runs/2026-06-02T09-21-43-791Z/playtest.md
  pack: content/parser/pack/sealed_crypt.yaml
  seed: 7
  result: "WON ending_victory 35/35 and explored ending_plunder 10/35; clarity 5/5, enjoyment 4/5; ZERO functional bugs"
  the_finding: >
    Report §4/§5 (the lone concrete, actionable finding): "Score legibility — the HUD
    shows score/35 but never tells the player *why* numbers jumped or that the headstone
    is a missable bonus. A win at 35 vs. 30 is invisible to a first-timer mid-game."

the_fix: >
  This completes the infrastructure bug_0060 deliberately built: bug_0060 added a signed
  `delta` to score inc_var/dec_var events "so a transcript narrator could surface 'points
  just earned'" — but no narrator existed. bug_0112 supplies it.
    • A new content-free engine hook `Rules.decorateEvents(events) -> GameEvent[]`
      (src/core/engine.ts), run LAST in makeStep against the step's full event list. It
      appends player-facing narration only; it never mutates state, so determinism and
      the state hash are untouched. CYOA omits it (no decoration).
    • `scoreChangeNarrations(events, maxScore)` (src/parser/runner.ts) is the narrator:
      for each `score`-var inc_var/dec_var event with a non-zero delta it emits one line —
      "gone up"/"gone down", singular/plural "point(s)", and the running total "M of T".
      Guards: max_score 0 (CYOA / untracked) → silent; delta 0 (a guardFinite-rejected
      change) → silent; non-`score` vars ignored.
    • Both the parser runner and the rpg runner supply the hook (the rpg layer awards
      `score` too, e.g. claiming the relic), so the feedback is uniform across modes.

why_within_the_bar: >
  The §3 content-free engine invariant is preserved: makeStep never inspects which var is
  "score" — that knowledge lives entirely in the content layer (parser/runner.ts, where
  SCORE_VAR already lives) that supplies the hook. Engine CHROME, derived generically from
  the score var + meta.max_score, exactly like the observation's existing "Final score:
  X of Y." ending closure — no per-pack authoring. Additive and non-destructive: the
  structured inc_var event is unchanged and still rides alongside the new narration, so the
  bug_0060 delta consumers are untouched. No pack content changed — sealed_crypt's bytes
  (and every pack's) are identical, so no content hash moves. Determinism holds (same-seed
  runs produce identical events) and the state hash is unaffected (decoration appends
  narration only). No SOFTLOCK/route/score/ending change.

verification:
  command: npm run health
  regression_test: tests/regression/score_change_narration.test.ts
  cases:
    - "helper: +N → 'gone up by N points; it is now M of T'; singular 'point' for 1; negative delta → 'gone down'"
    - "helper guards: delta 0 → silent (no phantom +0); max_score 0 → silent; non-`score` var ignored; multiple changes → one line each"
    - "end-to-end: each Sealed Crypt milestone (read +5, well +10, gate +20) emits exactly one score line at the right running total, with the inc_var event still alongside"
    - "a non-scoring step (plain movement) emits no score line"
    - "determinism: two same-seed runs produce identical events; the final state hash is unchanged by decoration"

content_hash:
  pack: content/parser/pack/sealed_crypt.yaml
  before: "(unchanged — engine-only fix; no pack content edited)"
  after: "(unchanged)"
  note: >
    No pack content changed. sealed_crypt is not a hash-pinned file in any case
    (cf. bug_0105 note), but more to the point this is a pure engine/runner change —
    every pack's bytes are byte-identical before and after.

notes: >
  First use of the new `decorateEvents` engine hook. It is a general seam for engine
  chrome derived from a step's events; today it carries score feedback, and it composes
  cleanly with any future per-turn derived narration without further engine changes.
