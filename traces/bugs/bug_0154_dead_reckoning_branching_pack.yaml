design:
  thesis: >
    A becalmed merchantman, the captain dead, the water cask near dry, and the mate (you) holding
    the only key. A moral fork like white_stag/wreckers_light, but DELIBERATELY two-axis: where
    those turn on a SINGLE hidden truth, this offers TWO independent investigations — the captain's
    log (knows_course: land two days east if the men hold the course and the water lasts) and the
    stowaway's identity (knows_pilot: she is a coaster's daughter who can read the inshore current,
    whom the thirst-mad crew want drowned as a Jonah) — learnable in EITHER order, which combine
    into a 2x2 of knowledge over one climactic decision at the cask. Knowledge never adds routes,
    it REFRAMES them (the paired-epilogue device): knows_pilot UNLOCKS trust_pilot (the surest
    ending — a payoff for going below, cf. white_stag's offering); knows_course fires reactive
    endingText on holdfast/adrift/landfall; knows_pilot fires it on the jonah ending. Dramatic
    irony: the crew's "obvious" remedy (drown the Jonah to free the wind) kills the only navigator
    aboard, while the harder mercies (hold the course, trust the girl) buy the landfall.
  endings:
    - id: ending_holdfast
      reach: "deck -> cask -> ration"
      note: "discipline; base text = a blind even share, knows_course variant = a course you READ"
    - id: ending_landfall
      reach: "deck -> hold(speak_girl) -> deck -> cask -> trust_pilot"
      note: "GATED on knows_pilot — the surest ending; knows_course variant = knew AND trusted"
    - id: ending_jonah
      reach: "deck -> cask -> give_jonah"
      note: "the dark choice; base = ignorant superstition, knows_pilot variant = knowing murder of the pilot"
    - id: ending_adrift
      reach: "deck -> cask -> seize"
      note: "greed; base = self-damning hoard, knows_course variant = hoarding over a landfall you KNEW"

