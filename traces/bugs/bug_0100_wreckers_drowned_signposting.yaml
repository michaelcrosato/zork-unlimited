bug_id: bug_0100
pack_id: wreckers_light_v1
seed: 7
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T01-45-25-898Z/playtest.md   # wreckers_light, seed 7
  finding: >
    The assessor's rank-1 mandated target was The Clockwork Heist for the ~26th straight
    cycle, but it is content-complete (bug_0079→0085, ~24 clean blind passes). Per the
    protocol's "rotate the seed and the pack" clause and project memory (rotate the
    mandated pass onto the least-attended pack), the pass rotated onto wreckers_light —
    the NEWEST pack (shipped bug_0099, the branching/reactive enjoyment lever) and the
    ONLY pack that had never received a dedicated blind LLM pass (zero mentions across all
    prior ai-runs). A fresh source-blind MCP-only subagent (seed 7) played 4 routes to all
    FOUR endings (saved/wrecker/mercy/drowned), rated it clarity 5/5, enjoyment 4/5, found
    ZERO functional bugs (no rejected actions, loops, or broken state; reactive scene text
    and gating all verified), and surfaced ONE design flaw (§5).
failure:
  type: signposting_design_flaw
  scene: gallery
  description: >
    The Storm Gallery's only death route, the `climb_to_wreck` choice, read as an
    "unsignposted instant-death trap." Its label — "Climb down the cliff toward the rocks
    now" — read as PURPOSEFUL exploration (heading toward the rocks/wreck to do something),
    so a curious player who clicked it drowned instantly with no warning that descending
    was lethal rather than exploratory. The instant fail thus landed as a punish for
    curiosity rather than a fate the player elects. This missed the pack's own
    deliberate-terminal discipline: the tend_keeper comment states terminal beats must be
    "Deliberate and terminal ... never an accidental dead end," and the gallery prose
    (the "sickening drop," the "sea exploding white on the rocks") was carrying the whole
    warning while the CHOICE LABEL — the thing the player actually commits to — did not.
fix:
  layer: content   # honest choice-text reframing (the clockwork bug_0046 dumbwaiter pattern)
  pack: content/cyoa/pack/wreckers_light.yaml
  summary: >
    Reframed the `climb_to_wreck` choice label so the descent foreshadows its own
    lethality, making the death a CHOSEN fate. Old: "Climb down the cliff toward the rocks
    now." New: "Climb over the rail and down the storm-slick rungs into the breaking sea
    below." The label now names the perilous descent (over the rail, storm-slick rungs)
    and its outcome (into the breaking sea) — consistent with the gallery prose's drop and
    white water and with the ending_drowned epilogue's "a dozen rungs down the cliff ...
    the white water is not cold for long." Honest choice-text reframe ONLY (mirrors
    clockwork's bug_0046 dumbwaiter honest-framing fix): SAME choice id, SAME ending_drowned
    target, NO conditions added (the death is not newly gated — it is the SAME chosen act,
    now legible), no flag/var/route/ending change. The pack's design comment is updated to
    record why.
  reachable_endings_changed: false   # same four endings; climb still reaches ending_drowned
  content_hash_changed: true         # text-only reframe; wreckers_light is NOT a HASH_PIN_FILE, no test pins it
  new_pack_hash: 365ff4991ed65a784e322e9e470f124e39ce6530f0a3c6c9b9ee47451d3dbbec
  regression_test: tests/regression/wreckers_light_drowned_signposting.test.ts
verified_live: >
    Live through the MCP server (new_game seed 7 → enter → out_gallery → climb_to_wreck):
    the gallery now offers "Climb over the rail and down the storm-slick rungs into the
    breaking sea below", and choosing it fires ending_drowned ("The Sea Takes You") exactly
    as before. validate_story reports 0 errors / 0 warnings. The branching test
    (wreckers_light_branching.test.ts) — which exercises this exact climb_to_wreck route in
    its DROWNED fixture — still passes unchanged, confirming the route/ending are untouched.
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the multi-step arm-then-choose routes (a
    standing heuristic-planner limit), so the blind LLM playtest is the load-bearing quality
    signal — here the FIRST dedicated blind pass on the newest pack (seed 7), clean at
    clarity 5/5, enjoyment 4/5 with this one signposting flaw, now fixed. clockwork (the
    nominal mandated target) remains verified-clean and was rotated off as over-fitted.
