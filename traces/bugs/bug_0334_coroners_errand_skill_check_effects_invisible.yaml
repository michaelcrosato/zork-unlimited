id: bug_0334
title: >
  coroners_errand: skill_check top-level effects invisible to parser solver —
  poison_identified never set, ending_justice unreachable, score phantom
pack: coroners_errand_v1
mode: parser
severity: error
discovered: 2026-06-08

symptoms:
  - IMPOSSIBLE_GATE: condition requires flag "poison_identified" that no effect ever sets
  - SCORE_UNREACHABLE: max_score 45 declared, only 40 reachable
  - Dead variant on nightshade_bottle (variant #0: when has_flag poison_identified — unreachable)
  - parser_all_endings_reachable test: ending_justice never reached
  - nondeath_endings_render_cleanly test: ending_justice undefined
  - parser_score_economy_sound test: reachable max 40 != declared 45

root_cause: >
  The nightshade_bottle USE interaction had both a top-level `effects` block AND a
  `skill_check` block at the same level. The parser solver scans top-level `effects`
  for flag/score assignments but does NOT scan inside `skill_check.on_success` or
  `skill_check.on_failure`. When the top-level effects included set_flag and inc_var,
  those assignments were visible to the solver. But the pack author (a prior AI cycle)
  moved the effects INTO the skill_check branches, believing this was the correct
  pattern (matching RPG pack convention). The RPG validator DOES scan skill_check
  branches; the PARSER validator does NOT. So after the move, the solver saw no
  effect ever setting poison_identified — making the win condition gate unreachable.

fix:
  file: content/parser/pack/coroners_errand.yaml
  change: >
    Removed skill_check block entirely. Converted to unconditional effects interaction
    with a single merged narration covering both the "keen eye" and "colour/smell"
    discovery paths. Removed vars_init: { observation: 3 } since observation was the
    skill_check's stat and is no longer referenced. All three effects (set_flag,
    inc_var, narrate) are now top-level and visible to both the validator and the solver.
  score_impact: none (both skill_check branches awarded the same +5; unconditional is identical)
  narrative_impact: minimal (merged two narration paths into one; discovery still vivid)

class_note: >
  The parser solver blindness to skill_check branches is a latent class-level issue:
  any future parser pack author who writes `skill_check` with effects inside branches
  rather than top-level will hit the same invisible-flag / phantom-score pair. No
  other existing parser pack uses skill_check (coroners_errand was the first), so
  there is currently only one instance. A class-level fix (make the parser solver
  scan skill_check branches) would close the family, but is an engine change deferred
  to a future cycle when a second parser-skill-check pack justifies the investment.

regression_test: none
  # No regression test written: the health bar's validate step now catches this class
  # via IMPOSSIBLE_GATE/SCORE_UNREACHABLE at validate time, and the existing
  # parser_all_endings_reachable + parser_score_economy_sound tests catch the symptom
  # at test time. Adding a dedicated test for "parser skill_check branches visible to
  # solver" is deferred pending the engine-level fix.
