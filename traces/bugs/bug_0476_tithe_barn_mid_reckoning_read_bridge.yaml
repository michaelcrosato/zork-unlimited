id: bug_0476_tithe_barn_mid_reckoning_read_bridge
title: "Tithe-Barn mid-reckoning ledger route lacked a prose bridge"
pack: content/cyoa/pack/tithe_barn.yaml
reported_by: blind_playtest_20260622T230748Z_tithe_barn_seed7
severity: low
symptom: >
  A blind player could face the thief, step back to the barn, read the steward's
  book, and return with the public-justice option correctly unlocked. Mechanically
  this was sound, but the prose made the thief feel frozen while the player wandered
  away to read.
root_cause: >
  The combined `knows_truth` + `faced_thief` granary-floor variant remembered both
  facts, but it did not acknowledge the pause created by returning from the reckoning
  to the steward's table.
fix: >
  Reworded that combined reactive variant so it explicitly notes that stepping back
  to the steward's table has not erased the encounter. Route topology, flags, gates,
  and endings are unchanged.
tests:
  - tests/regression/tithe_barn_mid_reckoning_read_bridge.test.ts
verification:
  - npm test -- --run tests/regression/tithe_barn_mid_reckoning_read_bridge.test.ts
  - npm run validate -- content/cyoa/pack/tithe_barn.yaml
