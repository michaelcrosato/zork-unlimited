id: bug_0482
title: Cellarman's Dark let the cash-box theft read like perfect completion
pack: content/parser/pack/cellarmans_dark.yaml
reported_by: blind playtest 2026-06-23 seed 7
severity: medium
symptom: >
  The blind playtest read the cellarman's note as a task list because it said
  "DEED-BOX AND CASH IN THE VAULT." A player who took the deed-box and then the
  cash-box reached the theft ending with the same 35/35 score as the honest
  recovered route, making the bad fork look mechanically indistinguishable from
  success.
root_cause: >
  The note grouped the cash with the deed-box instead of separating goal from
  temptation, and the cash-box take_effects ended the game without changing score.
  Once the player had already taken the deed-box, the score remained at the
  declared maximum through the absconded ending.
fix: >
  Reworded the note so the deed-box is the errand and the cash-box is explicitly
  the master's till-float, not the player's errand. Taking the cash-box now applies
  a small score penalty before ending the game, so every theft route reports below
  the perfect 35/35 while the honest recovered route remains full score.
tests:
  - tests/regression/cellarmans_cash_box_moral_score.test.ts
verification:
  - npm test -- --run tests/regression/cellarmans_cash_box_moral_score.test.ts
  - npm run validate -- content/parser/pack/cellarmans_dark.yaml
