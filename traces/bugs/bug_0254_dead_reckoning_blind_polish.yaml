id: bug_0254
title: "Dead-Reckoning blind-pass (seed 5): the opening deck scene's water-scarcity line read 'shared four ways, let alone five' — the bare 'four ways' has no referent yet on the literally-first observation a player sees, so the deliberate sacrifice-is-futile foreshadowing read oddly on first pass"
kind: content_fix
mode: cyoa
pack: content/cyoa/pack/dead_reckoning.yaml
# Informational. No pinned hash is touched: the change is a one-line prose edit to the
# deck (start) scene's base text in dead_reckoning.yaml plus a new pack-specific regression.
# The auto-discovered generic CYOA bar (all-endings reachability, no soft-lock, action-id
# uniqueness, variant liveness) re-derives clean over the edited pack; every ending stays
# reachable and the two-axis knowledge branching (dead_reckoning_branching.test.ts) is
# unchanged — the edit touches narration only, no flag/choice/next/ending key moves.

summary: >
  The mandated blind pass this cycle (Dead Reckoning, CYOA, seed 5) returned clarity 5/5,
  enjoyment 4/5, mechanics flawless: a fresh MCP-only playtester reached five distinct
  endings (landfall / holdfast / jonah / irons, plus seize left unplayed) with zero rejected
  actions, loops, or broken state, and confirmed the reactive Chest/Cask prose re-renders to
  match accumulated knowledge. Its one concrete, actionable finding was a first-pass clarity
  blemish on the very first observation: the deck scene's base text read
  "The water will not last another two days shared four ways, let alone five." The intent is a
  deliberate sacrifice-is-futile seed — even FOUR ways (the girl already over the side) won't
  buy two days, let alone the present five — but at that point nothing has introduced the idea
  of putting anyone over, so the bare "four ways" has no referent and reads oddly. The
  playtester noted only the opening uses "four ways"; every later scene says "five ways".

root_cause: >
  Authoring compression. The "four ways, let alone five" construction front-loads the
  hypothetical (four) ahead of the present reality (five) and leaves the "four" unattributed,
  so the careful-reader foreshadowing (sacrificing the Jonah is futile) had to be reverse-
  engineered by the reader on the very first beat. Not a state/winnability defect — purely the
  legibility of the opening narration.

fix: >
  Reworded the deck base line to lead with the present reality and ground the hypothetical in
  the crew's Jonah-reckoning that immediately precedes it:
  "The water will not last another two days shared five ways — nor four, the way the hands have
  begun to reckon it." This keeps the futility seed (won't last at five, nor at four) but now
  attributes "four" to the hands already counting the water as if the girl were gone — which the
  prior sentence set up ("the men have started, low and certain, to call the Jonah") — and the
  word "reckon" echoes the title. Pure prose/content: no new mechanic, no flag/exit/choice/
  ending/score change; every ending stays reachable and the two-axis branching is unchanged.

regression_test: tests/regression/dead_reckoning_blind_polish.test.ts
# describe "bug_0254": pins, on the REAL buildObservation surface at the start state a live
# player stands in — the deck opening (1) leads with "five ways", (2) no longer carries the
# bare "four ways, let alone five" construction, and (3) grounds the hypothetical four-ways in
# the hands' reckoning. Also asserts the existing adrift variant still says "five ways".

