id: bug_0400
pack: collectors_warrant_v1
title: "strong-room key was visible instead of hidden inside the salt measure"
severity: medium
scene: salt_store
reported_by: blind_playtest_20260621T054644Z_collectors_warrant_seed7

symptom: >
  A blind playtester read the duty ledger clue saying the strong-room key was kept
  in the salt-measure, then found the key exposed as a normal top-level object in
  the salt-store. The player could take it without opening or otherwise using the
  gallon copper, so the clue described a small search puzzle that the mechanics did
  not actually require.

root_cause: >
  `strong_key` was listed directly in `salt_store.objects` beside `salt_measure`.
  The measure's inspect text narrated the hidden key, but the engine had no state
  relationship between that clue object and the key's visibility.

fix: >
  The salt-store now exposes only `salt_measure`. The gallon copper is an openable
  container with `strong_key` in its contents, so the key is not visible or takeable
  until the player opens the measure. The measure's examine text now tells the
  player to open it, and reactive variants describe the opened and emptied states.
  The score economy and route structure are unchanged: taking the key still awards
  +15 and the quiet recovery route still reaches 40/40.

tests: tests/regression/collectors_warrant_key_inside_measure.test.ts

verification:
  - npm test -- --run tests/regression/collectors_warrant_key_inside_measure.test.ts
  - npm run validate -- content/parser/pack/collectors_warrant.yaml

trace_repin: >
  None. The change updates pack content and adds a regression test; there is no
  committed Collector's Warrant replay trace hash to repin.
