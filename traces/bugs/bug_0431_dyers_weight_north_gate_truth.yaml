id: bug_0431
title: Dyer's Weight north gate hint claimed untaken cakes
pack: content/parser/pack/dyers_weight.yaml
reported_by: blind_playtest_20260620T121703Z_dyers_weight_seed7
severity: low
symptom: >
  The blocked north door message said "You have a cake from the rack" even at
  the opening, before the player had taken any indigo cakes. The same static
  hint could also mislead after the vat proof was complete but the cakes were
  still missing.
root_cause: >
  The north exit has two conditions but only one authored locked_msg. That
  message was written for the missing-proof case and made a false inventory
  claim when any other requirement was missing.
fix: >
  Reworded the locked_msg to truthfully name both requirements without claiming
  which evidence the player already has.
tests:
  - tests/regression/dyers_weight_north_gate_truth.test.ts
verification:
  - npm test -- --run tests/regression/dyers_weight_north_gate_truth.test.ts
  - npm run validate -- content/parser/pack/dyers_weight.yaml
