finding: >
  The AFK assessor (src/afk/assessor.ts) had no live cross-category lever after bug_0032. Its repo
  detector only checked "does an ESLint config EXIST?" — disarmed since bug_0031 shipped
  eslint.config.js. But bug_0031 scoped that gate to src/bin/scripts/agents and explicitly excluded
  tests/ and ui/ "to keep that cycle bounded". Those dirs hold real first-party .ts/.tsx with no
  lint/format gate, so a whole class of issues there is invisible to the loop — and the assessor
  could not see the gap, so it kept reporting the repo as having no high-impact lever (only 0.5
  pack reviews). The evaluator was blind to genuine work, the dual of the bug_0032 false positive.
improvement:
  layer: engine    # the AFK assessor / loop brain (src/afk/assessor.ts) — NO content/YAML edited
  change: >
    Added a deterministic lint-COVERAGE detector to the repo section. It runs only when an ESLint
    config exists (the bug_0031 success state) and emits a `repo-lint-coverage` candidate listing
    every first-party code dir (LINT_DIRS = src/bin/scripts/agents/tests/ui) that (1) exists and
    holds lintable .ts/.tsx (dirHasLintableTs — walks the dir, skips node_modules/dist/coverage and
    .d.ts) yet (2) is NOT under the gate (eslintCovers — true iff a `files:` glob names the dir AND
    no `ignores:` glob excludes it; parses the flat-config text, same lightweight style as the
    existing TODO/marker scan). impact = 1 + uncovered-dir count (capped 5), effort L, repo weight
    0.6. eslintCovers is exported + pure for unit testing.
  effect_on_ranking: >
    The assessor now surfaces "Extend ESLint/Prettier coverage to 2 first-party code dir(s) outside
    the lint gate (tests, ui)" at score 0.6 as the honest rank-1 lever — ABOVE the uniform 0.5
    blind-playtest reviews (a real cross-category signal beats re-reviewing an already-pristine
    pack). It DISARMS automatically the moment a future cycle adds tests/ + ui/ to the ESLint
    `files` globs and drops them from `ignores` (proven by the eslintCovers DISARM test case).
    ai-loop.ts is unaffected: playtestTarget() falls back to the main story for an engine/repo top,
    and the mandatory blind playtest still runs every cycle regardless of the top candidate.
