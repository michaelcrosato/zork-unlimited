id: bug_0472_fisherman_direct_finding_no_lottery
title: "Fisherman's direct finding has no capstone lottery"
pack: content/cyoa/pack/fishermans_privilege.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T221301Z_fishermans_privilege_seed7.md
severity: S2
symptom: >
  A blind playtester read the final direct ruling as a d20 steadiness check with
  a 35% chance of failure that did not improve with investigation completeness.
  Even though both branches converged mechanically, the roll presentation made
  a fully supported legal finding feel arbitrary.
root_cause: >
  The direct ruling used a convergent skill_check as a tension beat. The engine
  truth was non-punitive, but the player-facing action label and roll annotation
  still advertised a chance gate at the capstone.
fix: >
  Convert rule_illegal into a plain evidence-gated choice. It keeps the same
  prerequisites, ending, quest stage, and 20-point award, but removes the
  unmodifiable steadiness stat and final roll branch.
tests:
  - tests/regression/fishermans_privilege_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/fishermans_privilege_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/fishermans_privilege.yaml
  - npm run health
