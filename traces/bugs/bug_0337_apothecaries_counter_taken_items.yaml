id: bug_0337
pack: apothecaries_standard_v1
title: "shop counter still placed taken vial and drawstick at their starting spots"
severity: minor
scene: shop_counter
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the suspect laudanum vial and/or the glass drawstick from the shop
  counter, LOOK still used the base counter description. That prose said the amber
  bottle "has been set apart" near the till and that the testing drawer "holds the
  glass drawstick", contradicting the player's inventory.

root_cause: >
  The room had only a generic `proved_substitution` variant. It did not read
  `has_item: suspect_vial` or `has_item: glass_drawstick`, so the first-match room
  description path had no state-specific prose for the observable post-TAKE states.

fix: >
  Added ordered shop-counter variants for suspect-vial held, drawstick held,
  both-held, and comparison-complete-with-held-evidence states. Pure prose/content
  change: no exits, effects, score, or win conditions changed.

tests: tests/regression/apothecaries_counter_reactive_items.test.ts
