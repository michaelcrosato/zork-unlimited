bug_id: bug_0016
pack_id: sunken_barrow_v1
seed: 43
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T07-23-12-130Z/playtest.md
  finding: >
    Playtest target rotated (per the standing "keep rotating" guidance — watchtower
    is heavily polished bug_0002–0007) onto the RPG pack The Sunken Barrow to cash in
    the long-deferred backlog item logged across bug_0011/bug_0015: no combat reward /
    scoring. A fresh, MCP-only blind playtester (seed 43; seed 7 probe) solved the
    barrow to ending_victory and probed the no-bar gate, rating it clarity 4/5,
    enjoyment 3/5. Its #1 concrete finding, hit TWICE (report §4 and §5): the score
    stays 0 for the entire game, including the victory screen, despite an RPG that
    surfaces a `score` field and a relic-grab finale. The playtester called it a
    "missing reward hook" / "vestigial field" that "undercuts the payoff" and makes
    "the victory feel slightly unrewarded."
failure:
  type: dead_score_field
  where:
    - content:content/rpg/pack/sunken_barrow.yaml
    - validator:src/validate/parser_validator.ts
    - validator:src/validate/rpg_validator.ts
  description: >
    The Stage-3 score system (ParserMetaSchema.max_score, the conventional `score`
    var surfaced by buildParserObservation, inc_var awards, the validator's
    SCORE_UNREACHABLE check) already exists and is used by parser packs
    (alchemists_tower, sealed_crypt bug_0013). The Sunken Barrow had meta.max_score: 0
    and no inc_var award, so the score the observation reports never moved off 0 — a
    present-but-unused feedback system reading as broken/placeholder.

    A latent gap blocked simply opting an RPG pack in: the SCORE_UNREACHABLE upper
    bound is computed inside validateParser from allEffects(pack), which scans only
    room on_enter, object-interaction `effects`, and npc dialogue effects. It does
    NOT scan the RPG-only award branches — enemy `on_defeat` and skill-check
    `on_success`/`on_failure`. So an RPG pack that scores a fight or a skill check
    (the natural milestones) would have those points omitted from the bound and be
    FALSE-flagged SCORE_UNREACHABLE. (Confirmed live: the stale MCP server, running
    the pre-fix validator, reported "max_score is 50 but at most 25 point(s) can ever
    be awarded" — counting only the relic-chamber on_enter +25, blind to the +10
    on_defeat and +15 on_success.)
fix:
  layers: [content, validator]
  summary: >
    Wire Stage-3 scoring into the barrow, mirroring sealed_crypt (bug_0013), with the
    one validator-correctness fix the RPG layer needs.
      - CONTENT: meta.max_score: 0 → 50 plus three one-time milestone awards on the
        real beats — +10 in barrow_wight on_defeat (slay the guard-wight), +15 in the
        stone_slab skill_check on_success (lever the slab), +25 in relic_chamber
        on_enter (claim the circlet). Each milestone fires exactly once: the wight
        dies once; the lever retires after success (the bug_0015 gate + engine
        guard); the relic chamber's win ends the game on entry, so on_enter cannot
        re-fire. The intended path accrues 0 → 10 → 25 → 50 = max_score; the score
        cannot be farmed.
      - VALIDATOR (generic, RPG-wide): ValidateParserOptions gains optional
        `extraScoreAwards?: number`, folded into the SCORE_UNREACHABLE upper bound;
        validateRpg sums the inc_var-score awards in its RPG runtime branches
        (rpgRuntimeEffects = enemy on_defeat + skill_check on_success/on_failure) and
        passes them in. These award sites are genuinely reachable — combat
        winnability (COMBAT_UNWINNABLE) and skill-check passability
        (SKILL_CHECK_IMPOSSIBLE) are already guarded — so counting them SHARPENS the
        conservative bound (it can only raise totalAwards), never weakens a check.
        Default 0, so every non-RPG validation is byte-identical.
    No flags' meaning, items, exits, gating, or reachable endings change — only the
    `score` var now accrues. Verified live through the engine source path (seed 1
    victory route): score 0 → 10 (wight) → 25 (slab) → 50 (relic) → ending_victory at
    50/50.
  reachable_endings_changed: false
  content_hash_changed: true   # sunken_barrow yaml genuinely changed (max_score + three inc_var awards)
  content_hash_before: 018c6df54ecca1833422ec9fd9c2abbddd98542ace886df60fbe6bad9791dbb0
  content_hash_after: ba69fcdd664c4a1042aa65841eec6ac4313a3471a3f414a3af7df0f4b2c2e81f
  repin: >
    Deliberate, surfaced re-pin (NOT a weakening): traces/rpg/barrow_victory.json
    content_hash updated 018c6df5… → ba69fcdd…. UNLIKE the bug_0011 text-only
    variants, scoring genuinely changes game state (the `score` var accrues), so the
    victory's expected_final_hash also changed 007fdea0… → 871ddf3e… — the canonical
    victory now ends with score 50 in state. The trace still asserts the exact
    deterministic victory replay (rpg_barrow_trace.test.ts green). No test source
    pins this pack's hash (only watchtower_road is pinned).
deferred:
