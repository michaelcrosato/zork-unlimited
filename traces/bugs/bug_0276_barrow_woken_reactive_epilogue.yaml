id: bug_0276
title: "The Sunken Barrow's doom ending presumed the shade was heard — reactive epilogue (spends the bug_0275 parser/RPG ending-variant surface)"
kind: content
mode: rpg/reactive-prose
severity: polish
layer: content/reactive-epilogue
artifact:
  source:
    - content/rpg/quests/sunken_barrow.yaml
    - traces/rpg/barrow_victory.json
  test:
    - tests/regression/rpg_barrow_woken_reactive_epilogue.test.ts
    - tests/regression/rpg_variant_liveness.test.ts

summary: >
  ending_woken — prising the Barrow-Lord's sealed sarcophagus, the doom fork the shade warns
  against — closed with "and the shade's last counsel rings true after all: the land was the
  better for his sleeping." That line presumes the player HEARD the shade's warning, yet the
  doom fork is reachable with the `heard_lord_lore` flag UNSET: the reaver's shade is an optional
  side beat (bug_0075), and a player can go straight north to the wight, lever the slab, and prise
  the coffin having never spoken a word to it. A fresh source-blind MCP playtester (seeds 11 & 5,
  ai-runs/2026-06-05T07-11-45-654Z/playtest.md, clarity 5/5 enjoyment 4/5, ZERO mechanical bugs)
  reached ending_woken on exactly that shade-skipping run (seed 5) and flagged the closing line as
  a narrative non-sequitur: "I never spoke to the shade, yet the ending says its last counsel rings
  true." The §5 examine hedges ("the shade's warning — if you stopped to hear it"), but the ending
  itself did not.

root_cause: >
  The reactive-ending-blindness class (bug_0272/0275): a terminal reachable on BOTH an informed
  (heard_lord_lore) and an uninformed path, but whose single fixed `text` presumes the informed
  one. The static solver proves ending_woken reachable and the pack winnable, so it never flags a
  presumptive epilogue — only a reasoning player who reached the doom on the uninformed path feels
  the non-sequitur. Until bug_0275 the fix was impossible on RPG (ParserEndingSchema, shared by
  parser+RPG, had no `variants`); bug_0275 built that surface and first used it on cold_forge. This
  cycle spends it on the sibling defect the very next blind pass surfaced.

fix: >
  CONTENT (content/rpg/quests/sunken_barrow.yaml): ending_woken gets a `variants` block (the bug_0275
  parser/RPG ending-variant surface, first-match-wins). The base `text` drops the shade callback so
  it reads true for a player who never met the shade ("and some instinct older than reason tells you
  the land was the better for his sleeping"); a `when: [ has_flag: heard_lord_lore ]` variant ABOVE
  the base keeps the original callback ("the shade's last counsel rings true after all") for the
  player who DID hear the warning and prised the coffin anyway. Both paths stay reachable (the
  under-armed straight-to-the-fight route never sets heard_lord_lore; the shade-warded route does),
  same ending id, cosmetic reframe only. No flag/score/quest/exit/win-condition/reachable-ending
  change. ending_woken is not on the canonical victory trace, so that trace's state-based
  expected_final_hash is unchanged; only the pack content_hash shifts (re-pinned in
  traces/rpg/barrow_victory.json: 32c55798… → d2343930…).

witness: >
  TEETH against the real RPG runner + observation (tests/regression/rpg_barrow_woken_reactive_epilogue):
  the INFORMED route (seed 1: ward + ask_lord → heard_lord_lore, then prise) lands ending_woken with
  the reframed callback in BOTH the structured ending.text and the player-facing description; the
  UNINFORMED route (seed 5: shade never met, prise) lands the SAME endingId with the base text and
  NOT the shade callback — pinning the non-sequitur gone. A third case asserts both paths are death
  endings topping out at 25/50 (the doom fork stays incomplete, bug_0107). The auto-discovered RPG
  variant-liveness proof (rpg_variant_liveness) now auto-declares ending_woken's new variant and
  proves it is the first match in a reachable terminal under the best/worst-roll bracket, so a dead
  variant would fail LOUD there too.

verification: >
  validate(content/rpg/quests/sunken_barrow.yaml) -> ok, 0 findings. npx vitest run on the new lock
  (3), rpg_variant_liveness, rpg_validator, stage4_barrow acceptance (content-hash recomputed live
  from the pack, replays to the unchanged state hash), rpg_all_endings_reachable -> all GREEN.
  npm run health -> GREEN (exit 0); net test count ROSE by exactly the 3 new cases. No pack
  added/removed -> discovered-pack set unchanged, so the bug_0194 scorecard freshness pin stays
  green (no regen). Only sunken_barrow's content_hash shifted (one deliberate re-pin in the
  canonical victory trace); all other content-hash/trace pins untouched.

scope_honesty: >
  A real blind-found content polish (a presumptive epilogue on the uninformed path), fixed by
  spending the bug_0275 reactive-ending surface — NOT an engine/soundness change and NOT a new pack
  (honors the 2026-06-04 no-new-packs directive). Cosmetic reframe: gating, scoring, reachable
  endings, and the canonical victory all untouched. One deliberate, surfaced content-hash re-pin.

files_changed:
  - content/rpg/quests/sunken_barrow.yaml (ending_woken gains a heard_lord_lore variant; base text de-presumes the shade)
  - traces/rpg/barrow_victory.json (content_hash re-pinned 32c55798… → d2343930…)
  - tests/regression/rpg_barrow_woken_reactive_epilogue.test.ts (NEW)
  - traces/bugs/bug_0276_barrow_woken_reactive_epilogue.yaml (NEW, this file)

regression: >
  The contracts ARE the regression: they fail loudly if ending_woken stops reframing under
  heard_lord_lore, if the base fallback re-acquires the shade callback (the non-sequitur returns),
  if either route reroutes off ending_woken, or if the new ending variant ever goes dead (liveness
  proof). On a deliberate epilogue redesign, re-derive the contracts from the new prose — never
  relax the assertions to pass.
