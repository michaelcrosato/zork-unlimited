id: bug_0369
title: Prior's Cellar gate resets quest progress
severity: content
status: fixed
root_cause: >
  A fresh blind playtest found that the Priory Gate acted as the navigation hub
  but still fired `set_quest_stage: arrived` on every entry. Returning from the
  ledger or cellar therefore overwrote `truth_known`, making quest progress
  oscillate instead of advance.
fix: >
  Remove the hub's on-enter quest-stage write. The ledger and cellar still set
  `the_priory` to `truth_known`, and returning to the gate no longer clobbers it.
files_changed:
  - content/cyoa/pack/priors_cellar.yaml
regression_test:
  - tests/regression/priors_cellar_quest_stage_monotonic.test.ts
