id: bug_0286
title: "clockwork_heist: crawlspace describes strongbox as 'locked fast' even when player holds lockpicks"
pack_id: clockwork_heist_v1
severity: content
class: reactive-description-blindness
where: [content:content/cyoa/pack/clockwork_heist.yaml]

summary: >
  The crawlspace scene's ticks>=4 and ticks>=2 variants described the strongbox as
  "its lid locked fast" regardless of whether the player held the lockpick. After
  fetching the pick and returning, available_actions correctly showed open_strongbox
  instead of study_strongbox, but the scene text still said the box was "locked fast"
  — a direct contradiction of the player's agency. Same class as bug_0282 (watchtower
  mossy_brook stale camp text), bug_0283 (tower_top brazier without lantern),
  bug_0284 (midnight_edition alley_door names Garrow before letter read).

discovery:
  method: blind_playtest
  seed: 42
  report: ai-runs/2026-06-08T04-38-51-995Z/playtest.md
  tester_quote: >
    "On both visits (with and without lockpicks) the scene text read identically:
    'a forgotten iron strongbox, its lid locked fast.' After fetching the pick,
    the available action changed to open_strongbox, but the description still
    called the box 'locked fast' — an immersion break where text contradicted agency."

fix:
  layer: content
  description: >
    Crawlspace gains has_item:lockpick variants for each tick tier (ticks>=4,
    ticks>=2, and base/low ticks), placed above their no-pick counterparts
    (first-match-wins, higher threshold first). The pick-aware text replaces
    "its lid locked fast" with "its lock rusted, but no match for the picks in
    your pocket now" (ticked variants) or "rusted but yielding, the picks in your
    pocket exactly what this wants" (base). The hidden-letter framing ("a sealed
    letter in the steward's own hand") is preserved in all variants. No-pick text
    unchanged. No choice/flag/route/ending/score change — prose only.
  content_hash_changed: true  # clockwork_heist yaml: unpinned in tests

regression_test: tests/regression/clockwork_crawlspace_stale_lock_text.test.ts

related:
  - bug_0282  # watchtower mossy_brook stale camp text (same class)
  - bug_0283  # watchtower tower_top brazier without lantern (same class)
  - bug_0284  # midnight_edition alley_door names Garrow pre-letter (same class)
  - bug_0022  # crawlspace lockpick gate (established the pick-gating structure)
