evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T13-52-40-224Z/playtest.md            # clockwork_heist (mandated target) — no new defect, see below
  rotated_report: ai-runs/2026-06-01T13-52-40-224Z/playtest_sunken_barrow.md  # The Sunken Barrow, seed 59 — this fix's source
  mandated_result: >
    The mandated blind playtest (clockwork_heist, seed 137) was clockwork's 8th independent blind pass:
    all four endings, clarity 5/5, enjoyment 4/5, mechanically flawless. Its only §4/§5 notes — the
    narrative-only "clock is ticking" pressure and the two contradictory letter setups collapsing to
    one ending_truth — are the long-adjudicated-DELIBERATE escapable-deadline / no-soft-lock invariant
    (bug_0019/0040/0042/0043) and the deliberately paired-but-distinct letter framing (bug_0041, whose
    ending text is in fact path-agnostic). No NEW actionable content defect on clockwork. Per
    blind_playtest_protocol.md's "rotate the seed and rotate the pack" and the standing next-focus
    since bug_0042/0046, the improvement was sourced from a rotated playtest of the least-recently
    full-blind-quality-tested pack, The Sunken Barrow (rpg).
  rotated_result: >
    The Sunken Barrow, seed 59 (+seed 7 skip/recovery run): WON ending_victory 50/50 both routes;
    clarity 5/5, enjoyment 3/5; zero rejected actions, no loops, no soft-locks; the missing-iron-bar
    case is gated gracefully (the USE action is omitted without the bar, recovery via backtracking
    works). One concrete actionable finding (below) plus the known-deferred auto-take-of-circlet design
    note (the opening-objective beat, bug_0037; not chased).
  finding: >
    Slab Passage (rotated report §5): after successfully levering the slab, the room description
    correctly updates to "Levered aside now … it has bared a stair," but `look at stone slab` still
    returns the PRE-MOVE object text "Wedge the bar beneath the lip and it can be levered … heaving
    again and again until the old stone gives." This instructs the player to lever a slab that is
    already open — a direct contradiction with the just-solved puzzle and the room text. Same stale-
    state class as bug_0007/0010/0028/0039/0044. Verified live from the engine (MCP, seed 59) before
    fixing: examine pre-lever = base text; examine post-lever = same stale base text; room = moved text.
  also_reported_design_note: >
    The same report flagged that the circlet is "auto-taken" on entering the relic chamber (the win and
    score fire on the MOVE, with no explicit `take circlet`). This is a known, deferred design choice —
    the opening objective / climactic-grab beat tracked since bug_0015/0027/0030 and partly addressed by
    bug_0037's opening-room objective rewrite. Not a stale-text contradiction; not chased this cycle.
root_cause: >
  The stone_slab object's `description` hard-codes the unsolved-puzzle instruction with no reactive
  `variant`, so the examine cannot react when the slab is levered — unlike the slab_passage ROOM, which
  already flips on the `slab_moved` quest stage (bug_0011). The reactive-OBJECT-text feature
  (bug_0023, applied to alchemists' cauldron in bug_0039 and sealed_crypt's bell_tower in bug_0044) was
  simply never applied to this object.
improvement:
  layer: content
  content:
    - content/rpg/pack/sunken_barrow.yaml: >
        stone_slab gains ONE reactive `variant`, when [{ quest_stage: { quest: barrow, stage: slab_moved } }]
        → "The great slab is levered aside now, dragged half off the bed where it lay flush with the
        floor; its iron-gripped lip juts at an angle and a stair drops away beneath it into the dark of
        the earth." Gated on the SAME slab_moved quest stage the room variant uses (first match wins;
        there is exactly one variant). Examine-only: no flag/item/score/exit/interaction/gating/
        reachable-ending change. The lever's one-shot retire (bug_0015) and the seeded might check
        (bug_0027, DC 12 unchanged) are untouched.
