id: bug_0414
title: Examiner's Commission partial registry text implied a complete evidence map
pack: content/cyoa/pack/examiners_commission.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  After the first clue, the registry hub said the examiner's notes had begun to
  separate material proof, witness records, correspondence, solicitor evidence,
  and Henry Alderton's own account. On a one-clue route, most of those categories
  had not been investigated yet, so the hub prose implied a broader record than
  the player had actually made.
root_cause: >
  The generic partial-record variant tried to summarize the pack's full evidence
  taxonomy, but it fired after any single evidence flag. That made the earliest
  partial state sound more complete than it was.
fix: >
  Reworded the partial registry variant to say the notes hold at least one
  ground of suspicion and that the record is only as broad as the completed
  inquiries. The complete-record variant remains the only hub text that names
  every evidence category.
tests:
  - tests/regression/examiners_commission_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/examiners_commission_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/examiners_commission.yaml
