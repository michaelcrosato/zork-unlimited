id: bug_0236
title: "Author revise-loop aborts the whole authoring run on the first off-shape model reply — completeJson throws (extractJson failure OR strict-schema parse) straight out of runAdaptLoop, with no retry and no revise feedback"
kind: engine_fix
mode: agents/authoring
severity: defect
layer: agents/authoring (author → validate → revise loop)
artifact:
  source:
    - agents/authoring/adapter.ts
  test:
    - tests/regression/adapter_revise_loop_resilience.test.ts

summary: >
  runAdaptLoop (agents/authoring/adapter.ts) is the mode-agnostic author → validate → revise loop behind
  runAdapter / runParserAdapter / runRpgAdapter. Its only model call, provider.completeJson(...), does
  `schema.parse(extractJson(text))` and THROWS on both failure modes: extractJson throws when no balanced
  JSON can be pulled from the reply (prose, code fences, truncation), and the `.strict()` adapter OUTPUT
  schema (AdapterOutputSchema / ParserAdapterOutputSchema / RpgAdapterOutputSchema, all `.strict()`) throws
  a ZodError on any extra key or off shape. The call sat OUTSIDE any try/catch, so a single off-shape reply
  propagated straight out of the loop — aborting the entire authoring run on the offending round, with a
  raw unattributed error, zero retries, and none of the revise machinery the loop exists to provide.

root_cause: >
  The revise loop only ever fed back DETERMINISTIC-VALIDATOR errors (report.findings) — it implicitly assumed
  every round yields a parseable, schema-valid pack and only the game-logic validation could fail. That holds
  for the deterministic MockAuthorProvider (it always returns canned schema-valid JSON), which is the only
  provider exercised in tests/CI, so the gap was invisible to the whole suite. But a LIVE frontier model — the
  keystone keyed real-model author→play→fix→lock run (ultraplan true-goal pivot) — routinely returns prose
  preambles, code fences, or an extra explanatory key, any of which makes completeJson throw. The first such
  reply killed the run instead of being treated as a (recoverable) bad round.

fix: >
  Wrap the completeJson call in runAdaptLoop in try/catch. A thrown completion is now treated as a NON-GREEN
  round, not a fatal crash: it is converted into an ADAPTER_OUTPUT_UNPARSEABLE error finding (carrying the
  underlying parse-error message) that is fed into prior_errors for the next prompt — so the model can revise
  toward valid output exactly as it does for a validator error — and the loop continues. Only if EVERY round
  fails to even parse (last stays null) does the loop throw, and then with an attributable aggregated message
  (`Adapter produced no schema-valid output for "<schema>" in N round(s). Last parse error: …`) rather than a
  non-null-assertion lie (`return last!`) that would surface downstream as a TypeError on `.pack`. Behaviour
  on the mock path is unchanged (it never throws), so all existing authoring tests stay green.

regression_guard: >
  tests/regression/adapter_revise_loop_resilience.test.ts wraps MockAuthorProvider in a FlakyAuthorProvider
  that throws on its first N adapter calls. (1) A TRANSIENT bad reply (throwFirst=1) self-heals: runAdapter no
  longer rejects, converges to a validateCyoa-green pack in exactly two adapter calls, AND the round-2 prompt
  is asserted to contain "ADAPTER_OUTPUT_UNPARSEABLE" (non-vacuous: proves the throw became revise feedback).
  (2) A PERSISTENT bad backend (throwFirst=99) rejects with /no schema-valid output/ only after the full
  4-round budget (adapterCalls===4), proving the loop retried rather than bailing on round 1. (3) maxRounds is
  honoured (maxRounds:2 ⇒ rejects with /2 round\(s\)/ after exactly 2 calls). All three FAIL against the
  pre-fix loop (the round-1 throw escapes).

status: fixed
date: 2026-06-04
