id: bug_0475_priors_cellar_infirmary_payoff
title: "Prior's Cellar left the infirmary victim clue unresolved"
pack: content/cyoa/pack/priors_cellar.yaml
reported_by: blind_playtest_20260622T225344Z_priors_cellar_seed7
severity: medium
symptom: >
  Aldric said an earlier complaining pilgrim was moved to the infirmary and did
  not return. A blind player reasonably treated that as a major clue or visitable
  location, but the adventure had no infirmary room and the cellar cache did not
  explicitly identify the missing pilgrim's effects.
root_cause: >
  The infirmary line was atmospheric testimony, while the cellar evidence used
  generic pilgrim effects. Nothing joined the two beats, so the clue appeared to
  point nowhere even though the investigation route was otherwise sound.
fix: >
  Kept the route topology unchanged and made the existing cellar cache pay off
  Aldric's clue: Aldric now remembers the victim's ring and Arden kin, and the
  cache identifies an infirmary-tied satchel with those effects.
tests:
  - tests/regression/priors_cellar_infirmary_payoff.test.ts
verification:
  - npm test -- --run tests/regression/priors_cellar_infirmary_payoff.test.ts
  - npm run validate -- content/cyoa/pack/priors_cellar.yaml
