id: bug_0446_dawn_beacon_cresset_retry_legible
title: "Dawn Beacon cresset retries are easier and explicitly recoverable"
pack: content/rpg/pack/dawn_beacon.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T163600Z_dawn_beacon_seed7.md
severity: S1
symptom: >
  The final toppled-cresset might check sat at DC 12 with no stat boost path.
  A player who rolled several failures right before the ending could read the
  sequence as arbitrary finish-line churn rather than an intended retry loop.
root_cause: >
  The cresset action was mechanically recoverable, but the late-game DC left a
  sizable failure streak risk and the stage/failure prose did not make repeated
  heaves feel like expected progress.
fix: >
  Lowered the cresset check to DC 10, strengthened the beacon-stage description
  to say the player may heave again until the pivot catches, and rewrote the
  failure narration to show partial movement plus an explicit retry cue.
tests:
  - tests/regression/dawn_beacon_cresset_retry_legible.test.ts
verification:
  - npm test -- --run tests/regression/dawn_beacon_cresset_retry_legible.test.ts tests/regression/dawn_beacon_explicit_light_act.test.ts tests/regression/dawn_beacon_reactive_cresset_name.test.ts
  - npm run validate -- content/rpg/pack/dawn_beacon.yaml
  - npm run health
