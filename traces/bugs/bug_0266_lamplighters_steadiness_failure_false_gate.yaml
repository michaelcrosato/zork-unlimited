# Surfaced during the mandated blind-playtest cycle on lamplighters_round (seed 11 blind pass
# came back strong — clarity 5/5, enjoyment 4/5, all three endings [guided/thief/caught],
# ZERO hard mechanical bugs; see ai-runs/2026-06-05T01-52-41-919Z/playtest.md). The tester's
# one real friction (§4): "it wasn't obvious whether steadying the flame was mandatory before
# striking the lamp." The tester's d20 roll SUCCEEDED, so it never saw the on_failure prose —
# reading that prose revealed it actively reinforced the false impression the tester named.
findings:
  - id: steadiness_failure_prose_implies_a_gate
    where: object:horn_windscreen (skill_check on_failure)
    severity: low
    description: >
      The OPTIONAL steadiness skill-check on the horn windscreen is 100% CONVERGENT: its only
      flag `steadied_the_flame` is read by nothing but its own one-shot `not_flag` guard, so it
      gates no exit, win, score, or reactive variant (the exhaustive solver, liveness BFS, and
      score-economy proofs all hold without it; the win route never touches it). But its
      `on_failure` narration ended "...try the screen to it again before you trust it to
      anything," which told a player who MISSED the roll (range 4–23 vs DC 12, ~40% miss) to
      keep retrying before doing anything else — falsely implying the steadied flame was a
      prerequisite for the rest of the round. A player rolling low repeatedly could believe they
      were blocked from lighting the great lamp (the actual goal) and burn turns on a beat that
      gates nothing. This is a narrative-honesty / signposting flaw, not a mechanical one — the
      beat really is optional, but the failure text said otherwise.
    fix: >
      Rewrite the on_failure prose to drop the false-gate clause and state plainly that the
      round goes on regardless: the carried flame "is not going out tonight, screen or no, and
      there is still the great lamp up at the staith-head to draw oil for and light." The beat
      stays optional, retryable-on-failure, and one-shot-on-success; no flag/var/score/exit/
      ending change.
failure:
  type: design_polish
  description: >
    No engine fault or determinism break — misleading narration on an optional convergent beat
    (the §8.7 "never an ambush" / narrative-honesty class, here applied to a SKILL-CHECK failure
    line rather than a death telegraph). Caught by reasoning over the blind tester's "was it
    mandatory?" friction note and reading the on_failure prose the (successful) roll never
    surfaced — not by the validator, which checks solvability/liveness, not narrative clarity.
    The fix alters only displayed text on the failure branch; it changes no state, so every
    structural proof re-derives byte-identical and all three endings stay reachable.
fix:
  layer: hint_text       # one of: content | engine_rule | validator | test | hint_text | quest_structure
  summary: >
    horn_windscreen's steadiness on_failure narration no longer ends "...before you trust it to
    anything" (which read as a gate); it now signals the round continues regardless of the roll
    ("not going out tonight, screen or no ... still the great lamp ... to light"), so a player
    who keeps missing the optional check is not misled into thinking they are blocked.
