id: bug_0279
title: "friars_postern's death ending presumed the wall scratches had been read (reactive-ending-blindness class)"
kind: content
mode: parser/reactive-prose
severity: polish
layer: content/reactive-epilogue
artifact:
  source:
    - content/parser/pack/friars_postern.yaml
  test:
    - tests/regression/friars_postern_gate_reactive_epilogue.test.ts
    - tests/regression/parser_variant_liveness.test.ts

summary: >
  ending_taken ("What Waited at the Gate") closed with "You trusted the gate the scratches told
  you not to trust." That line presumes the player READ the cell's wall-scratches (read_clue set),
  yet the death fork is reachable with read_clue UNSET: a player who goes straight to the turnkey's
  lodge, takes the key-ring, and unlocks the night-gate without ever visiting the wall-scratches
  reaches the same ending. A fresh source-blind MCP playtester (seed 3,
  ai-runs/2026-06-08T01-41-59-556Z/playtest.md, clarity 5/5, enjoyment 4/5, zero mechanical bugs)
  took exactly that route in Playthrough 2 and flagged: "the ending accuses the player of ignoring
  advice they never received — a meaningful immersion break at the worst possible moment."

root_cause: >
  The reactive-ending-blindness class (bug_0272/0276): a terminal (ending_taken) reachable on BOTH
  an informed path (read_clue set) and an uninformed path (read_clue unset), whose single fixed
  `text` presumed the informed one. The same class was fixed on tithe_barn's ending_fall (bug_0272),
  wreckers_light's ending_drowned (bug_0273), cold_forge's both endings (bug_0275), and barrow's
  ending_woken (bug_0276). The ending_thief on this very pack was fixed for a different flag
  (knows_postern) as bug_0186; ending_taken had the same class against read_clue.

fix: >
  ending_taken gains a `variants: [{ when: [{ has_flag: read_clue }], text: ... }]` block above its
  base text (first-match-wins). The read_clue variant keeps the ironic callback ("the scratches told
  you not to trust") for a player who DID read the warning and trusted the gate anyway; the base text
  drops the scratches reference for the player who never saw it. Both routes are genuinely reachable,
  so the base is no dead fallback. Same ending id in both cases — cosmetic reframe, never a reroute.
  No flag, score, exit, win, death, or schema change.

evidence: >
  tests/regression/friars_postern_gate_reactive_epilogue.test.ts (5 cases): (1) ending_taken
  reachable without scratches; (2) reachable after scratches; (3) unread path → base text, NOT the
  scratches callback; (4) read path → variant text WITH the scratches callback; (5) both land on
  ending_taken with distinct rendered text. Variant-liveness oracle (parser_variant_liveness.test.ts)
  auto-declares the new variant and confirms it fires on a reachable terminal state. npm run health
  EXIT 0; validate_story(friars_postern) 0 findings; all 17 packs clean.

lineage:
