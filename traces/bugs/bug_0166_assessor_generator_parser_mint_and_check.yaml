    clean pack.

what:
  - >
    src/afk/assessor.ts — generatorParserDriftCandidate(checks): a PURE verdict over this cycle's
    minted-and-validated generated parser packs (the THIRD twin of generatorDriftCandidate /
    generatorRpgDriftCandidate). Returns null on a clean sweep (the verifier held — the healthy
    state, which correctly does NOT mask the 0.5 saturation floor); returns a high-priority engine
    candidate (impact 5 / effort M / score 2.0, target src/gen/parser_generator.ts) IFF any minted
    pack carries ANY finding (error OR warning — the same zero-findings bar the curated parser packs
    and parser_generator.test.ts clear, which INCLUDES the parser-only obtainability fixpoint /
    soft-lock / WIN_FIRES_AT_START / SCORE_UNREACHABLE checks), naming the offending seed + finding
    codes.
  - >
    src/afk/assessor.ts — assess() now ALSO mints a WINDOW of GEN_EVAL_CHECK_COUNT (4) fresh parser
    packs each run at the SAME advancing seed base the CYOA and RPG levers use (base =
    generatedEvalSeedBase * GEN_EVAL_CHECK_COUNT, sourced from the tracked AI_LOOP_STATE.md — no
    clock/RNG), validates each with the production validateParser, and pushes
    generatorParserDriftCandidate(...) when non-null. All three levers SHARE the advancing base but
    draw from INDEPENDENT generators (generateCyoaPack / generateRpgPack / generateParserPack), so
    each confronts its own never-frozen distribution; within each generator the per-cycle windows are
    disjoint. assess() stays deterministic for a given repo snapshot.

why: >
  Parser owns the STRICTEST validator in the suite — the obtainability fixpoint, soft-lock detection,
  the WIN_FIRES_AT_START stability proof, and the SCORE_UNREACHABLE economy check (~1200 lines).
  Until now those ran against GENERATED parser content only via the static 24-seed unit test
  (parser_generator.test.ts) and the 4-seed sealed corpus (bug_0163) — never against the per-cycle
  MOVING window the CYOA (bug_0158) and RPG (bug_0162) levers already give. That left parser one mode
  short of the never-frozen-target property the frozen-verifier literature wants (arXiv 2510.14253;
  the assessor's own 0.5-floor collapse, [[verifier-assertion-guard]]). bug_0164 made parser minting
  reachable; this slice makes it LIVE — the assessor now provably exercises validateParser
  (obtainability + soft-lock + score included) against fresh, never-seen parser packs EVERY cycle.
  When the parser generator and verifier ever diverge (an unclean/unsolvable/score-unreachable
  emitted shape, or a verifier gap the fresh distribution surfaces) the lever raises a high-priority
  fix; while they agree it is silent and self-extinguishing, exactly like its CYOA and RPG twins. The
  per-cycle moving-target property now holds for ALL THREE modes, not two.

verification:
  - "npm run health EXIT 0 — additive: one new pure function + one assess() block + one new import pair + a regression test; no test deleted/disabled, no hash pin moved, no guard weakening (verify-integrity.ts untouched), no content/engine/validator/schema change beyond the assessor."
  - "tests/regression/assessor_generator_parser_mint_and_check.test.ts: generatorParserDriftCandidate clean⇒null / dirty⇒engine candidate proven against the REAL validateParser (a max_score bumped +50 above the reachable award sum trips the parser SCORE_UNREACHABLE; the clean control is not blamed); the real repo raises NO generator-parser-drift candidate AND the current parser window is non-vacuously clean (the green is real, the obtainability/soft-lock/SCORE checks genuinely held on seeds past 0); assess() determinism preserved."

next_suggested_focus: >
  The generator program now has ALL THREE modes live as self-renewing eval signals (CYOA bug_0158 +
  RPG bug_0162 + parser bug_0166), exercising the full validator suite — including the strictest
  parser obtainability/soft-lock proofs and the richest RPG combat/score checks — against a moving
  target every cycle. The "protect generators" branch is now exhausted on the assessor side; the
  remaining levers shift to (a) DEEPEN the generators so each mint stresses MORE of the validator: the
  CYOA generator is the shallowest (single truth flag / single gate — it cannot emit the two-axis 2x2
  moral fork the hand-authored dead_reckoning frontier has), the parser generator is a fixed 3-room
  spine with one key/one gate (a second lock tier or multi-room obtainability chain would exercise the
  fixpoint deeper), and the RPG generator could grow multiple enemies / a combat_guaranteed fairness
  variant; each deepening needs a generator_version bump + corpus re-seal; and (b) HARDEN the trust
  boundary — add src/gen/*_generator.ts and bin/seal-corpus.ts to PROTECTED_FILES
  (scripts/verify-integrity.ts:43), bug_0164's named deferred item (c), so a silent source weakening
  of a generator trips the integrity guard, not just the output gates. The keyed real-model
  author→play→fix→lock run remains the highest-value move overall but stays gated on owner API-key
  authorization ([[ultraplan-true-goal-pivot]]). Blind-pass rotation: tithe_barn is now
  most-recently blind-played; per [[assessor-blind-pass-rotation]] the least-recently blind-played
  pack remains clockwork_heist (CYOA, last dedicated pass bug_0153) — rotate the next mandated pass
  there.
