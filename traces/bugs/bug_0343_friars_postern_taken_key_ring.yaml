id: bug_0343
pack: friars_postern_v1
title: "turnkey lodge still showed the taken key-ring on its peg"
severity: minor
scene: lodge
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the turnkey's key-ring in the lodge, LOOK still said a peg behind
  the turnkey held his key-ring. Dropping the ring after taking it could also
  leave the room prose describing the original peg placement rather than the
  already-disturbed scene.

root_cause: >
  The lodge had only a static base description. The key-ring was takeable, but
  taking it did not leave any durable state that room prose could read, so the
  starting-position sentence stayed active after TAKE.

fix: >
  Taking the key-ring now sets `key_ring_taken`, and the lodge has a room
  variant keyed to that durable flag. The variant keeps the peg bare even if the
  player later drops the ring somewhere. Pure prose/state-tracking change: no
  exits, score, endings, or win conditions changed.

tests: tests/regression/friars_postern_reactive_taken_items.test.ts
