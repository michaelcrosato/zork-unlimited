root_cause: >
  A gap in the structural-verification net, not a content defect. The MCP/UI layer resolves a
  player's chosen action by a FIRST-MATCH id lookup (src/mcp/tools.ts actionForId:
  `available_actions.find((a) => a.id === id)`). If an observation ever offered two options with
  the same `id`, the SECOND would be permanently UNSELECTABLE — picking it silently yields the
  first — a phantom menu entry. bug_0151 (parser) + bug_0152 (RPG) proved this can never happen
  for the four parser/RPG packs via a RUNTIME proof over the exhaustive BFS, but the CYOA leg was
  closed only by a PROSE "unique by construction" argument: a CYOA observation's action ids ARE
  the scene's declared choice ids (src/cyoa/observation.ts buildObservation:
  `available = scene.choices.filter(cond).map((c) => ({ id: c.id, text: c.text }))`),
  cyoa_validator already dup-checks choice ids WITHIN each scene (DUPLICATE_ID, cyoa_validator.ts
  dupCheck over `scene.choices.map((c) => c.id)`), and a condition-filtered SUBSET of
  statically-unique ids is unique. That argument is sound TODAY but rests on an UNTESTED
  COUPLING: that buildObservation never injects an action id beyond one scene's declared choices
  (no synthetic/global "restart"/meta option, no cross-scene merge). Nothing enforces it. A
  future change to observation.ts that injected such an id could collide with a scene's own
  choice id, and NO static check would catch it — cyoa_validator only ever inspects the STATIC
  per-scene choices, never the RUNTIME observation menu the player picks from. Same class
  bug_0151/0152 close for parser/RPG (the static validators check declared ids, never the
  runtime-enumerated menu); the difference is only that the CYOA menu MERELY reflects the choices
  today rather than minting new ids — and "merely reflects" is itself the invariant worth locking.
fix: >
  Test-only (§15 lock-the-finding). New tests/regression/cyoa_action_id_unique.test.ts runs the
  shared exhaustive concrete BFS (tests/regression/support/exhaustive_endings.ts — the bug_0121
  solver, also backing bug_0145 variant-liveness) over every auto-discovered CYOA pack. CYOA's
  only action is CHOOSE, so the default progress-action policy explores the COMPLETE reachable
  region (no liveness/roll widening needed, unlike parser/RPG). At EVERY distinct reachable
  non-terminal state it calls the engine's own buildObservation and asserts the available_actions
  ids are pairwise distinct — exactly the menu the MCP/UI resolves a pick against. Converts the
  bug_0152 by-construction argument into a direct runtime assertion against the observation
  builder, so the trilogy is now a uniform RUNTIME proof in all three modes. No content/engine/
  validator/schema change, NO helper change.
within_bar: >
  Regression test ONLY. No pack edited; no validator/schema/engine/helper change; NO hash pin
  moved (all 9 packs validate 0/0, content_hashes unchanged). Deterministic, no LLM-judge, NO API
  key. Sound: every state visited is a real legal CYOA playthrough, the menu is the engine's own
  buildObservation output, the search FAILS on cappedOut (never truncates silently), and terminal
  states (no menu) are skipped. Anti-vacuity guards assert real menus were inspected
  (statesChecked > 0, actionsSeen > statesChecked) so the pass cannot be vacuous. The negative
  control compiles a pack with two same-id choices in one scene (compilePack runs only the Zod
  schema; the structural DUPLICATE_ID check is the SEPARATE cyoa_validator bar step), so the
  runtime menu carries a duplicate the compile step does not reject — the same class a future
  synthetic-action injection would create, which no static check sees.
