id: bug_0449_powder_mill_rafe_dialogue
title: "Powder Mill Surety gives Rafe a professional dialogue path"
pack: content/rpg/pack/powder_mill_surety.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T172215Z_powder_mill_surety_seed7.md
severity: S2
symptom: >
  Rafe was described as a named watcher enforcing the miller's rules, but the gate
  walk exposed only attack_rafe. A city ordnance surveyor could not show authority,
  explain the danger, or otherwise address the only person in the scene.
root_cause: >
  The pack modeled Rafe solely as an RPG enemy, not as an NPC. The combat fallback
  was mechanically reachable, but the expected social affordance for a motivated
  human gatekeeper was missing.
fix: >
  Added Rafe as a normal dialogue NPC on the gate walk while preserving the enemy
  fallback. The player can show the powder-office counter-mark, explain the
  fuse-chart hazard after learning it, and get explicit confirmation that making
  the live tray safe remains the professional way past him.
tests:
  - tests/regression/powder_mill_rafe_dialogue.test.ts
verification:
  - npm test -- --run tests/regression/powder_mill_rafe_dialogue.test.ts tests/regression/powder_mill_route_specific_ending.test.ts
  - npm run validate -- content/rpg/pack/powder_mill_surety.yaml
  - npm run health
