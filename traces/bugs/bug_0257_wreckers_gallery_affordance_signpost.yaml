bug_id: bug_0257
pack_id: wreckers_light_v1
seed: 7
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-04T22-58-44-750Z/playtest.md   # wreckers_light, seeds 7/23/41
  finding: >
    The harness's rank-1 mandated target this cycle was wreckers_light (a least-recently
    blind-played CYOA; the recent rotation window covered wolf_winter/white_stag/
    clockwork_heist/midnight_edition/tide_mill/... but not this pack). A fresh source-blind
    MCP-only subagent played three routes (seeds 7/23/41) plus a seed-7 verification run,
    reached three of the four endings (saved/mercy/drowned) and the reactive mercy variant,
    rated it clarity 5/5, enjoyment 5/5, and found ZERO functional bugs (no rejected
    actions, loops, or broken state; reactive scene text and gating all verified). It
    surfaced ONE design flaw (§4/§5).
failure:
  type: signposting_design_flaw
  scene: gallery
  description: >
    The Storm Gallery's base prose vividly describes the wreckers' trick — a low lantern
    on a "rusted bracket" that apes a safe harbor riding-light and walks a blind ship onto
    the teeth — strongly implying an interactive false-light option. The pack DOES implement
    that option: the `hang_false_light` choice → `ending_wrecker` ("The False Light").
    But that choice is gated on carrying BOTH `lamp_oil` and `striker`
    (conditions: [{ has_item: lamp_oil }, { has_item: striker }]). A player who reaches the
    gallery without both tools — exactly the blind tester's path on the seed-23 run, and
    the most natural first visit — never sees the choice, leaving only the deliberate
    death-climb (`climb_to_wreck`) and the retreat. The BASE gallery text (the tool-less,
    no-truth state) wrote the wrecker's promise without telling the player it requires the
    cask + flint, so the elaborate setup read as "a Chekhov's gun that's actually a
    trapdoor": vivid affordance, then an unsignposted death. Notably the existing
    `truth_known` empty-hands variant ALREADY signposts the requirement ("the rail gives
    you nothing without the cask below and the keeper's flint in hand") — the base text was
    the lone surface that did not, an inconsistency that left the affordance illegible on
    the most common path.
fix:
  layer: content   # reactive-prose signpost only; honours the deliberate gating + the death-climb
  pack: content/cyoa/pack/wreckers_light.yaml
  summary: >
    The base gallery text now signposts the tool requirement, parallel to the existing
    `truth_known` empty-hands variant. Appended after the wreckers'-trick description:
    "But the bracket stands cold and empty, and a lamp unlit lures no one — to work that
    trick you would need the cask of oil below and the keeper's flint both in hand." The
    affordance is now legible to a tool-less player: the wreck is a real, GATED option
    (retreat → gather oil + striker → return to hang the false light), so the gallery's
    death-climb reads as an informed elect rather than a curiosity trap, and the
    `ending_wrecker` route the prose promises is now discoverable. PURE prose: no
    choice/condition/flag/quest_stage/route/ending change — `hang_false_light` is still
    gated exactly as before on lamp_oil + striker, and `climb_to_wreck` still reaches
    ending_drowned unconditionally.
  reachable_endings_changed: false   # same four endings; gating and routing untouched
  content_hash_changed: true         # text-only signpost; wreckers_light is NOT a HASH_PIN_FILE, no test pins its hash
  regression_test: tests/regression/wreckers_light_gallery_affordance.test.ts
verified_live: >
    validate_story reports 0 errors / 0 warnings. Replayed via the runner: at the gallery
    with no tools the base text now contains the "cask of oil below and the keeper's flint
    both in hand" signpost while still offering only climb_to_wreck + back_in; arming with
    oil + striker still surfaces hang_false_light → ending_wrecker; the death-climb still
    reaches ending_drowned. The existing branching and decision-point-truth tests (which
    exercise the armed-greed and armed-vengeance gallery variants and the wrecker route)
    pass unchanged, confirming the gated paths are untouched.
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the multi-step arm-then-choose routes (a
    standing heuristic-planner limit), so the blind LLM playtest is the load-bearing quality
    signal. Here the blind pass on wreckers_light came back clarity 5/5, enjoyment 5/5 with
    this single signposting flaw, now fixed content-only.
