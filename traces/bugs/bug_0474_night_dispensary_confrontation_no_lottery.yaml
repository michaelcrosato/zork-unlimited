id: bug_0474_night_dispensary_confrontation_no_lottery
title: "Night Dispensary confrontation has no capstone lottery"
pack: content/cyoa/pack/night_dispensary.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T223659Z_night_dispensary_seed7.md
severity: S2
symptom: >
  A blind playtester reached the named accusation after gathering every clue
  and saw a d20 + composure check at the climax. Because composure never changes,
  the action looked like a 35% chance that complete investigation could still
  fail arbitrarily.
root_cause: >
  The confrontation used a convergent skill_check as a tension beat. Both
  branches already awarded the same score and ending, but the player-facing roll
  still advertised false risk at the capstone.
fix: >
  Convert speak_the_name into a plain evidence-gated choice with the same
  prerequisites, journal payoff, 20-point award, and Named ending. Remove the
  unused composure stat from this pack.
tests:
  - tests/regression/night_dispensary_case_completeness.test.ts
verification:
  - npm test -- --run tests/regression/night_dispensary_case_completeness.test.ts
  - npm run validate -- content/cyoa/pack/night_dispensary.yaml
  - npm run health
