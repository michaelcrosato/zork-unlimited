id: bug_0376
pack: cellarmans_dark_v1
title: "oil-store flame warning described a danger the pack did not enforce"
severity: medium
scene: oil_store
reported_by: blind_playtest_20260620T113147Z_cellarmans_dark_seed7

symptom: >
  The cellarman's note and oil-store warning board said "NO NAKED FLAME", which
  made a careful player expect that lighting the lamp inside the oil-store would
  be dangerous. The engine allows that action safely; the lethal act is opening
  the cracked spirit-cask while the lamp is burning.

root_cause: >
  The warning prose named the broad presence of flame near the cask, while the
  authored mechanics only punish drawing the loose bung and releasing the fumes
  under flame. The warning was therefore stricter than the actual rule.

fix: >
  Reworded the cellarman's note, lit oil-store board, and lit spirit-cask examine
  text to warn against drawing/opening the cracked bung under flame. Lighting the
  lamp in the oil-store remains safe; opening the cask under flame still reaches
  ending_ignited.

tests: tests/regression/cellarmans_warning_consequence_sync.test.ts
