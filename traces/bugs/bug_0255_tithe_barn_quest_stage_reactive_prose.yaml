regression: >
  The contract IS the regression: it fails loudly if the granary_floor reactive-prose
  temporal exclusivity ever drifts — a reordered variant array, a dropped truth_read clobber
  that lets watch_begun persist alongside knows_truth, or a base text that leaks onto the
  first look. On a deliberate change to the hub's reactive layering, the operator must
  re-derive these contracts from the new design — never relax the assertions to pass. Purely
  additive (2 new files); no source/script/validator/schema/generator/engine change, no pack
  YAML, no scorecard byte, no corpus/manifest.
