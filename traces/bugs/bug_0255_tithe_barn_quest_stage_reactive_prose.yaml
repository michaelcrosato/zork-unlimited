id: bug_0255
title: "Absolute-witness coverage for tithe_barn's the_barn quest-stage reactive-prose temporal-exclusivity on the granary_floor hub — the watch_begun→truth_read clobber the YAML promises but no test enforced"
kind: verification_oracle
mode: cyoa/content-invariant
severity: enhancement
layer: verification/reactive-prose-liveness
artifact:
  source:
    - content/cyoa/pack/tithe_barn.yaml
  test:
    - tests/regression/tithe_barn_quest_stage_reactive_prose.test.ts

summary: >
  tithe_barn.yaml carries ~40 lines of design commentary promising a precise, load-bearing
  invariant on the barn-interior hub `granary_floor`: two reactive prose layers that are
  TEMPORALLY MUTUALLY EXCLUSIVE so neither suppresses the other (the bug_0145/0146
  "provably-reachable-as-displayed-text" liveness discipline). Layer (1) — quest `the_barn`
  at stage `watch_begun`, set on the go_in CHOICE and read on granary_floor (which has no
  on_enter to reset it) — is the window after you have gone in but before you have read the
  book, and must show on the very FIRST look inside the barn. Layer (2) — `knows_truth`,
  fired by reading the steward's book — reframes the barn once you know the lie; the SAME
  decipher effect advances the quest to `truth_read`, which CLOBBERS `watch_begun` so layer
  (1) goes false the instant layer (2) becomes true, and the two never co-render. The
  existing tithe_barn_branching.test.ts (bug_0136) locks the four-ending structure, the
  knows_truth gate on open_doors, and the knows_truth reckoning/epilogue variants — but says
  NOTHING about the quest-stage hub prose. This cycle freezes that contract.

root_cause: >
  NOT a discovered defect and NOT a live bug — a verification-DEPTH gap, the same
  SoundnessBench absolute-witness discipline as bug_0230/0240 (canonicalize special-value
  contract) and bug_0182/0218/0227 (negative corpus): the behaviour is correct today; what
  was missing was any test pinning it. A future edit that broke the temporal exclusivity —
  reordering the granary_floor variants, dropping the `truth_read` clobber so `watch_begun`
  persisted ALONGSIDE the knows_truth layer, or leaving the base text showing on the first
  look — would pass every existing test while regressing exactly the reactive rewrite the
  2026-06-04 blind playtester (seed 11) singled out as "a highlight". Surfaced because the
  deterministic content assessor is SATURATED (all 17 packs blind-clean; this cycle's
  mandated blind pass on tithe_barn came back 5/5 clarity, 4/5 enjoyment, four endings
  reached, zero defects) and the named "last small key-free lever" (canonicalize
  non-JSON-safe value pin) was already CLOSED by bug_0230/0240/0247 — so the lever rotated to
  this verified-OPEN coverage gap rather than churn clean content.

witness: >
  THE TEETH, verified out of band (non-vacuity): with the test passing 3/3 against the real
  pack, removing the `set_quest_stage: { quest: the_barn, stage: truth_read }` line from the
  decipher effect (so `watch_begun` is never clobbered) turned 2 of the 3 tests RED — after
  reading the book the hub kept rendering the `watch_begun` layer ("you are in it now")
  instead of the `knows_truth` layer, so both the temporal-exclusivity assertion
  (not-contains watch_begun after reading) and the non-vacuity matrix failed. Restoring the
  pack byte-for-byte (cp from backup; git diff empty) returned the suite to 3/3 GREEN. The
  three discriminators are single-line, layer-UNIQUE markers — "frozen mid-reach" (base
  only, the unreached authored fallback), "you are in it now" (watch_begun only), "the way
  you did an hour ago" (knows_truth only).

fix: >
  ONE new regression file, tests/regression/tithe_barn_quest_stage_reactive_prose.test.ts,
  driving the REAL CYOA runner/engine/observation (loadPackFile + indexPack + buildRules +
  makeStep + buildObservation — never a reimplementation) and freezing three contracts:
  (1) LIVENESS — the first look inside the barn (route [go_in]) renders the watch_begun
  layer, superseding the base (contains "you are in it now"; NOT "frozen mid-reach"; NOT the
  knows_truth marker); (2) TEMPORAL EXCLUSIVITY — back at the hub after reading the book
  (route [go_in, read_book, decipher, leave_book]) only the knows_truth layer renders
  (contains "the way you did an hour ago"; NOT "you are in it now" — truth_read clobbered
  watch_begun; NOT the base); (3) NON-VACUITY — the two windows are distinct renders and each
  shows exactly ONE layer (the mutual-exclusivity matrix). No engine/validator/schema/
  generator change, no pack YAML change, no trace-hash re-pin, no scorecard byte, no
  corpus/manifest change.

scope_honesty: >
  Absolute-contract WITNESS for behaviour that is already correct today (parity with
  bug_0230/0240/0182/0218/0227) — NOT a discovered live defect and NOT a content edit. Pure
  test addition. The blind playtest this cycle (ai-runs/2026-06-04T22-23-03-878Z/playtest.md,
  tithe_barn, seed 11) found zero bugs (clarity 5/5, enjoyment 4/5, all four endings reached,
  mechanics flawless) and explicitly praised the reactive granary-floor rewrite — this pins
  the very mechanism it relied on. NO change to any src/ byte, NO pack YAML, NO scorecard,
  NO corpus/manifest. content/cyoa/pack/tithe_barn.yaml verified byte-identical (git diff
  empty) after the teeth check.

verification: >
  npx vitest run tests/regression/tithe_barn_quest_stage_reactive_prose.test.ts -> 3 GREEN.
  Non-vacuity confirmed (see witness; pack restored byte-identical, git diff empty).
  npm run health -> GREEN (exit 0); net test count ROSE by exactly the 3 new cases. No pack
  content changed -> bug_0194 scorecard freshness pin stays green, no regen needed. The new
  test file is not protected, and no source byte changed -> verify:integrity clean (no
  VERIFIER_TOUCHED / GUARD_WEAKENED / HASH_PIN / assertion-count regression).

