id: bug_0307
title: "friars_postern: gallery tells player to fetch the pipe they already hold"
pack: friars_postern_v1
class: reactive-description-blindness
severity: moderate
found_by: blind_playtest
playtest_report: ai-runs/2026-06-08T09-44-25-112Z/playtest.md

symptom: >
  In the gallery, the `told_of_way` quest-stage variant read "her price comes first,
  and the snores … are the surest road to her pipe" even when the player was already
  carrying the clay_pipe.  A player who visits the lodge before the commons (cell →
  gallery → lodge → take pipe → gallery → commons → learn postern → gallery) crosses
  the gallery at the `told_of_way` stage while holding the pipe — the navigation hint
  is factually false and tells them to do something they have already done.

root_cause: >
  The gallery's single `told_of_way` variant did not account for `has_item:clay_pipe`.
  First-match-wins means a more specific condition ordered above it would fire instead,
  but no such variant existed.

fix: >
  Added a new `told_of_way + has_item:clay_pipe` variant ordered ABOVE the existing
  `told_of_way` variant in friars_postern.yaml.  The new variant reads "her pipe is
  already in your hands; nothing left now but to bring it to the commons and coax the
  latch's trick from her."  The old `told_of_way` variant (no pipe) is unchanged.
  Pure prose: no flag, score, exit, or ending change.

regression_test: tests/regression/friars_postern_gallery_pipe_reactive.test.ts
