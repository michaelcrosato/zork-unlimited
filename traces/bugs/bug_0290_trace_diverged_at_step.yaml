bug_id: bug_0290
component: engine/trace   # a reserved-but-unpopulated field in the replay subsystem, not a content/pack defect
# Surfaced by ultraplan re-aim cycle #16: record.ts already computed a stepHashes
# array (one hash per action, post-state) and discarded it — it was local to
# runActions and never attached to the returned Trace object. replay.ts had the
# ReplayResult.divergedAtStep field declared as optional but set it to undefined
# unconditionally; the step-by-step comparison helper firstDivergentStep existed but
# its result was silently dropped. The net effect: a trace replay could report THAT
# it diverged (via expected_final_hash mismatch) but never WHERE — the first
# divergent action index was computed and thrown away. Bug_0290 closes this gap by
# (a) attaching per_step_hashes to the Trace object in recordTrace, and (b)
# populating divergedAtStep in replayTrace from the per-step comparison result.
class: soundness/observability
title: >
  replayTrace always returned divergedAtStep: undefined — the per-step divergence
  index was computed by firstDivergentStep (replay.ts) and discarded; record.ts
  also discarded stepHashes instead of attaching them to the Trace object. A replay
  that diverged reported "hash_ok: false" with no localization of the offending step.
findings:
  - id: diverged_at_step_always_undefined
    where: src/trace/record.ts recordTrace return (per_step_hashes not attached); src/trace/replay.ts replayTrace (divergedAtStep unconditionally undefined)
    severity: low   # latent: the replay harness produced less-informative output but
                    # never crashed; all existing hash checks were unaffected.
    description: >
      record.ts: runActions() computed a `hashes: string[]` array (one hashState
      per step) but the recordTrace function did not include it in the returned Trace
      object. Consequently every recorded Trace lacked `per_step_hashes` (the Trace
      type declared it optional, so this was schema-valid but informationally empty).

      replay.ts: the firstDivergentStep helper was defined and called inside
      replayTrace, but its result was not propagated to the returned ReplayResult —
      divergedAtStep was always undefined regardless of whether the trace carried a
      per-step baseline. The inspect_trace MCP tool already surfaced divergedAtStep
      as diverged_at_step in its response object, so the plumbing was in place; the
      only gap was that the value flowing through was always undefined.

      The practical consequence: a benchmark harness or debugger calling inspect_trace
      on a failing trace received "hash_ok: false" with diverged_at_step: null and no
      indication of which action first caused the engine to diverge. ULTRAPLAN-2026-06-02
      §2 called this "regression reports *that* it diverged, not *where*" and listed
      populating divergedAtStep as a Day-horizon prerequisite for a credible benchmark
      harness (lines 136–143).
    fix: >
      record.ts: attached per_step_hashes: run.hashes to the object returned by
      recordTrace — a one-line additive change; the Trace type already declared the
      field as optional `per_step_hashes?: string[]`.

      replay.ts: the firstDivergentStep helper result is now propagated: when
      trace.per_step_hashes is present, idx !== -1 causes divergedAtStep to be set to
      that index, and the ReplayResult spreads { divergedAtStep } into the returned
      object via stepField. v1 traces (no per_step_hashes) are unaffected — the
      guard `if (trace.per_step_hashes !== undefined)` skips comparison entirely,
      preserving full backward compatibility.

      inspect_trace (src/mcp/tools.ts): the diverged_at_step field in the MCP
      response already read `replay.divergedAtStep ?? null` — no change required
      once replay.ts correctly populates the value.

      No schema changes, no engine changes, no pack content changes.
soundness_argument: >
  The fix is strictly additive: per_step_hashes is an OPTIONAL field on Trace (it
  was already declared; the change merely populates it). divergedAtStep was an
  OPTIONAL field on ReplayResult (it was already declared; the change merely
  populates it for v2 traces). Backward compatibility is preserved by the explicit
  `if (trace.per_step_hashes !== undefined)` guard — v1 traces (lacking the field)
  replay identically to before, divergedAtStep stays undefined, ok reflects only the
  final-hash comparison. No existing test is weakened: the change causes cases that
  previously returned undefined to now return the correct 0-based index, which is
  strictly more information. The dedicated regression (tests/regression/
  trace_diverged_at_step.test.ts) proves:
    (1) faithful replays still produce divergedAtStep === undefined;
    (2) corrupting baseline[N] yields divergedAtStep === N;
    (3) first-divergence semantics hold (min index, not last);
    (4) inspect_trace surfaces diverged_at_step: N (not null);
    (5) non-vacuity: returning undefined would fail cases 2 and 3.
  The shipped-packs-stay-green invariant is unaffected (no content changed). The
  unit tests in tests/unit/save_trace.test.ts already exercised the round-trip
  contract; the regression adds the five-case structural lock at the §15 tier.
failure:
  type: latent_observability_gap
  description: >
    replayTrace always returned { divergedAtStep: undefined } regardless of whether
    the trace carried per_step_hashes and regardless of whether a per-step divergence
    existed. The inspect_trace MCP tool consequently always reported
    diverged_at_step: null, making it impossible to localize the first divergent
    action programmatically. The final-hash check remained sound, but a mid-trace
    divergence that self-corrected at the final hash (a transient engine perturbation)
    would have been invisible at both levels.
regression_test: tests/regression/trace_diverged_at_step.test.ts
