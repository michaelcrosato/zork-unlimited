bug_id: bug_0023
pack_id: cold_forge_v1            # the demonstrating pack; the FIX is a generic engine feature (all parser + RPG packs)
seed: 1
type: engine_feature             # generic, pack-agnostic capability under trust-but-verify (no §14 gate)
evidence:
  source: blind_playtest + standing_backlog
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T08-53-07-908Z/playtest.md   # clockwork_heist seed 97 — the cycle's mandated target
  mandated_result: >
    PRISTINE for the seventh straight cycle: a fresh MCP-only playtester reached all
    five endings (Truth via vault AND via the crawlspace strongbox, Rich, Caught,
    Caught on the Hour), rated clarity 5/5 / enjoyment 4/5, hit zero rejected actions,
    no loops, no broken state. Its only two notes were NOT concrete defects: (a) a
    stylistic residual of the already-applied bug_0017 path-agnostic ending text, and
    (b) a legibility uncertainty about whether reading the ledger grants a safe
    crossing — the mechanic IS present and correct (bug_0019 any_of gate; locked by
    clockwork_guard_patrol_deadline.test.ts), the player just never read it. Clockwork
    is polished past diminishing returns (bug_0008/0017/0018/0019/0020/0022 + this run).
  rotation_rationale: >
    Per the protocol's "you MAY pick a different candidate if your judgement and the
    playtest say it's higher value" and the standing bug_0020/bug_0022 guidance
    ("per-pack polish has reached deep diminishing returns ... strongly consider ...
    the reactive-object engine feature"), this cycle closes the generic engine feature
    the bug_0021 artifact EXPLICITLY deferred for "its own cycle".
  finding: >
    RoomSchema gained reactive `variants` (bug_0010/bug_0011) so a room can narrate
    state it changed, but the OBJECT examine path ("look at <thing>" → LOOK target)
    still fell back to the static `description`. So in The Cold Forge, after the slag
    grate is levered open (quest_stage forge/grate_open) the ROOM correctly reads
    "stands open" yet examining the grate ITSELF still said "welded shut by cooled
    slag" — a direct on-screen contradiction of both the room and the player's own
    levering action ("the grate heaves up off its seat. The way down is open."). The
    same static-examine gap also affects alchemists_tower's strongbox (reads as a
    box with a brass lock after it has been unlocked and emptied), so this is a
    cross-pack capability, not a one-pack patch.
improvement:
  layer: engine + content    # generic engine feature + one content demonstration
  engine:
    - src/parser/schema.ts: >
        Added ObjectVariantSchema (the object analogue of RoomVariantSchema:
        { when: Condition[] (min 1), text }) and ObjectSchema.variants, declared
        `.optional()` NOT `.default([])` so a variant-less object stays absent in the
        compiled pack ⇒ every pack that doesn't use it compiles byte-identically and
        keeps its content hash (the bug_0010 backward-compat rule; mirrors
        RoomSchema.variants / skill_check / dialogue-topic conditions).
    - src/parser/model.ts: >
        Added pure helper objectDescription(object, state) mirroring roomDescription:
        the first variant whose `when` all hold (declared order, first-match-wins),
        else the base `description`.
    - src/parser/legal_actions.ts: >
        The single LOOK render site (resolveParserAction LOOK→target, line ~63) now
        narrates objectDescription(o, state) instead of o.description. The RPG runner
        reuses resolveParserAction (src/rpg/runner.ts), so the feature reaches BOTH
        parser and RPG packs from this one site.
    - validator: >
        NO change. Object variants carry only `text`, no effects, so allEffects(pack)
        — and every reachability / item-grant / SCORE_UNREACHABLE bound built on it —
        is unchanged. The feature cannot affect any validator verdict.
  content:
    - content/rpg/pack/cold_forge.yaml: >
        stone_grate gains a `variants` entry gated on quest_stage forge/grate_open,
        reading "The great hearth-grate, levered up off its lip and standing open ...
        below it a low way drops down into the warmth." Examine-only: no flag / item /
        score / exit / interaction / gating change.
