  finding: >
    cold_forge report §2/§5 ("Minor double narration", Outer Forge): talking to the lantern-spirit
    rendered its greeting malformed — `lantern-spirit: "The flame leans toward you. "A warm thing…""` —
    a stray speaker label wrapping prose that already contained third-person stage narration ("The
    flame leans toward you") AND its own literal quote marks, producing nested/doubled quotes and a
    gesture mis-attributed as the spirit's spoken words. The same defect sat on all four spirit nodes
    (spirit_root/sentinel/heart/forge), i.e. on the greeting and every counsel topic — including the
    +2-attack advice that bug_0070's whole cue points the player toward.
root_cause: >
  The RPG runner reuses the parser dialogue path, which renders every line as
  `${npc.name}: "${npc_text}"` (src/parser/legal_actions.ts:166,195). That wrapper supplies the speaker
  and the surrounding quotes, so the established pure-speech convention (sealed_crypt: npc_text is bare
  spoken words, no quotes, no narration) requires npc_text to be the NPC's words ONLY. The cold_forge
  lantern-spirit was the lone violator: its four npc_text nodes embedded third-person flame-gestures
  and literal `"` characters, so wrapping them doubled the quotes and spoke the stage directions.
improvement:
  layer: content
  content:
    - content/rpg/pack/cold_forge.yaml: >
        Rewrote the four lantern-spirit npc_text nodes (spirit_root, spirit_sentinel, spirit_heart,
        spirit_forge) as pure spoken words — stripped the third-person flame-gestures ("The flame leans
        toward you", "The flame gutters/dips/steadies") and every interior quote mark — so the engine's
        `lantern-spirit: "<words>"` wrapper now renders cleanly. All substance preserved: the sentinel
        counsel (incl. "as slow now as it will ever be" / "rise twice", asserted by bug_0029's
        cold_forge_sentinel_warmup_fiction test), the iron-bar/slag-grate route clue, the relight
        foreclosure + Ember-Heart re-point (bug_0059), and the +2-warmth framing. Added an anchoring
        comment at the dialogue node documenting the pure-speech convention. No stat/attack/defense/DC/
        flag/effect/exit/combat/score/ending change; the +2 buff stays optional and one-shot, the fight
        is the identical static encounter, and the buffed route still wins 50/50.
