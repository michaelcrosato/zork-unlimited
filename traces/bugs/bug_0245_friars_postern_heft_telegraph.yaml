bug_id: bug_0245
pack_id: friars_postern_v1
seed: 13                          # this cycle's blind-playtest seed; the regression drives seed 13
type: content_fix                 # gate_key examine prose only — no engine/validator/schema/flag/item/score/exit/gating change
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-04T18-34-59-982Z/playtest.md   # The Friars' Postern, seed 13 — this fix's source
  result: >
    Mandated blind pass ran on friars_postern (assessor rank-1). A fresh MCP-only blind
    playtester (seed 13) reached all three endings — ending_free 35/35, ending_taken
    (death, gate trap), ending_thief (non-death greed/alms-box) — rating clarity 5/5,
    enjoyment 4/5; zero rejected actions, no loops, no soft-locks; the postern correctly
    knowledge-gated both directions and the 5/10/20 score economy summing to exactly 35.
  finding: >
    Report §4: once the player holds the turnkey's key-ring, the self-targeted USE
    action surfaces as the bare command "heft turnkey's key-ring" (id `use_gate_key`,
    USE gate_key on gate_key). The playtester "never saw it produce output worth
    examining — likely just a flavor/no-op verb. Minor noise in the action list." It is
    in fact the deliberate, OFF-critical-path nerve skill-check beat (the Stage-4
    skill_check standardized into this parser pack, sealed_crypt's `nerve` sibling), but
    nothing told the player that before they committed. This is the identical
    finding-family as bug_0241 (sealed_crypt's `grip iron key`) and the deferred
    alchemists_tower note — the third pack carrying this optional self-USE nerve beat.
root_cause: >
  The controlled command parser (src/parser/command_map.ts) only accepts `<verb>
  <noun>` or `<verb> <noun> <prep> <noun>`, and the offered command must stay typeable,
  so the self-USE label is constrained to "heft turnkey's key-ring" — a richer,
  sentence-like label can be legible OR typeable, not both (schema.ts deliberately
  forbids a command_template on a self-USE for exactly this reason). The real gap is
  therefore MISSING PRE-COMMITMENT CONTEXT: the key-ring's examine description named
  only which locks it fits ("the night-gate, the alms-box … none of them was ever cut
  to let a debtor out"), never the optional steady-your-hand impulse the `heft` beat
  acts on — so a curious player who examined the ring got no signal that the action was
  an intentional, clued tension moment (and the beat's own success/failure narration,
  about mastering "the urge to run for the nearest lock", only lands AFTER committing).
improvement:
  layer: content
  content:
    - content/parser/pack/friars_postern.yaml: >
        gate_key.description gains a closing sentence telegraphing the OPTIONAL nerve
        beat — "The cold weight of it pulls your hand toward the nearest lock; you might
        heft the ring a moment and steady yourself before you trust it with anything
        down here." Names the impulse the self-USE `heft turnkey's key-ring` acts on
        (and echoes the beat's own "urge … for the nearest lock" narration), so the
        action reads as a clued tension moment rather than a broken/vestigial one. Pure
        prose: gates nothing, changes no flag/item/score/exit/win/reactive-variant, so
        every structural proof and the 35-point economy stay byte-identical.
verification:
  - mcp validate_pack content/parser/pack/friars_postern.yaml      # ok, 0 findings (friars_postern is unpinned — no content-hash to re-pin; only watchtower_road is pinned)
  - npm run health                                                 # exit 0 (verify:integrity static + typecheck + ESLint + Prettier + tests + every pack validate + watchtower coverage + playtest record)
locked_by:
  - tests/regression/friars_postern_heft_telegraph.test.ts         # 3 cases: examine telegraphs "heft the ring"/"steady yourself" (and keeps "let a debtor out"); the telegraph matches a real offered action (`use_gate_key` / "heft turnkey's key-ring"); the heft beat gates nothing — exercising it mid-run, the full route still wins ending_free at 35/35 with the key-ring never consumed
scope: >
  Generalizes the bug_0241 discipline: any parser/RPG pack carrying an OFF-critical-path
  self-USE skill_check beat (sealed_crypt grip, this heft, the alchemists_tower grip
  note) should telegraph the impulse in the relevant examine description, so the beat
  reads as an intentional clued tension moment, not a vestigial no-op verb.
notes:
