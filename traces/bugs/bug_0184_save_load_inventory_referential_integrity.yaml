id: bug_0184
title: "Complete the §16 load REFERENTIAL gate — a loaded state's inventory items must name symbols the pack can produce (the third rendered-symbol field, after bug_0183's current/endingId)"
kind: engine
mode: meta
severity: enhancement
layer: persistence/load-integrity

artifact:
  source: src/mcp/tools.ts
  test: tests/regression/save_load_referential_integrity.test.ts

summary: >
  bug_0183 closed the referential half of the §16 "integrity at load" promise for the two
  highest-impact fields — a loaded `state.current` must name a real location and `state.endingId`
  a declared ending — via `assertLoadedStateRefs` (src/mcp/tools.ts) at the startSession
  load-path chokepoint. But `inventory` is the THIRD referential field the engine renders: a
  phantom item id surfaces verbatim in the parser observation (`inventory: [...]`) and in the
  INVENTORY narration ("You are carrying: <phantom>", legal_actions.ts), so a forged-but-finite
  save (valid structure, correct contentHash + mode — bug_0181's GameStateSchema waves it through
  since the id is a valid string) could show the player a symbol the pack never declares. This
  cycle extends `assertLoadedStateRefs` to also REJECT (never coerce) a loaded inventory item that
  is not in the pack's legitimate item namespace.

root_cause: >
  Not a defect in any one pack — the same single unguarded load entry point bug_0181/bug_0183
  named, one rendered field short of complete. bug_0183 covered `current` (the field the whole
  observation loop renders from) and `endingId` (the outcome a forged save can fabricate) but left
  `inventory` — also rendered to the player verbatim — un-gated. The fix's correctness rests on the
  valid item set being PROVABLY COMPLETE so the gate can NEVER false-reject a legitimate save: an id
  can enter `inventory` ONLY via a parser/RPG `TAKE` (which legal_actions.ts only allows for a
  DECLARED object) or an `add_item` effect (any mode, incl. a start-room on_enter grant). Therefore
  `declared objects ∪ every add_item target reachable in the pack` is exactly the set any real
  playthrough could ever hold. CYOA has no object namespace, so its legitimate items are the
  add_item targets alone.

witness: >
  A forged save with `inventory = ["no_such_item"]` loads cleanly through bug_0181's finiteness
  gate (the id is a valid string) AND past bug_0183's current/endingId gate (those fields are
  untouched), and the engine then renders the phantom item to the player. The suite plants the
  construction-known-bad saves load_game MUST now reject — a parser phantom item and a CYOA phantom
  item, both "unknown item" — extending the SoundnessBench (arXiv:2412.03154) REJECTION-DIRECTION
  oracle from current/endingId to inventory. The GREEN false-rejection guard is the acceptance
  direction: a parser save holding a legitimately TAKEN declared object (chosen dynamically from the
  live legal-action set, so the guard survives pack edits) still round-trips byte-identically — the
  proof the complete-namespace claim holds in practice, not just on paper.

fix: >
  src/mcp/tools.ts: ADD a top-level `collectAddItemTargets(node, acc)` — a mode-agnostic recursive
  walk of the compiled pack that gathers every string-valued `add_item` effect target. In
  `assertLoadedStateRefs`, seed the valid-item set with those targets, then (parser/RPG only) fold in
  `index.objects.keys()`; throw SaveIntegrityError ("unknown item") on any `state.inventory` id not
  in that set. `index.pack` is the union-common property, so the walk works for all three modes. The
  existing current/endingId gates, the `if (state !== undefined)` guard (fresh init still trusted +
  byte-unchanged), and the imports are untouched. EXTEND tests/regression/
  save_load_referential_integrity.test.ts (+3 cases): 2 forged-inventory rejections + 1 GREEN
  taken-item round-trip. NO edit to save_load.ts, conditions.ts, effects.ts, state.ts, any
  validator, any matcher, any MIN_* floor, GEN_EVAL_CHECK_COUNT, the generator, the corpus, or the
  scorecard.

verification: >
  npx vitest run tests/regression/save_load_referential_integrity.test.ts -> 8 GREEN (was 5).
  npm run health -> GREEN. src/mcp/tools.ts is NOT in PROTECTED_FILES (scripts/verify-integrity.ts),
  so verify:integrity surfaces no VERIFIER_TOUCHED. No floor/matcher/schema change; net test-case
  count RISES by 3. No content/state changed, so every valid save still round-trips byte-identically
  — no HASH_PIN/curated re-pin, no generator_version bump, no corpus re-seal; the held_out_corpus and
  determinism property tests stay green unchanged.

blind_playtest: >
  Mandated blind pass ran on `alchemists_tower` (parser, seed 11) — clean, clarity 5/5, enjoyment
  4/5, all three endings (cure/poison/betrayal) reached, ZERO bugs; the only ceiling noted was
  brevity. No content fix indicated, so this cycle spent the saturated-content signal on the
  structural load-integrity gap, completing the bug_0183 referential arc.

regression: >
  The new suite IS the regression: the two rejection cases fail loudly if the inventory gate is ever
  removed or weakened (a forged phantom-item save would then render an undeclared symbol to the
  player). The GREEN taken-item case is the false-rejection guard — it fails loudly if the valid set
  ever drops `index.objects` or the add_item targets (real saves would be wrongly rejected). No
  pinned hash changes (no content/state changed).
