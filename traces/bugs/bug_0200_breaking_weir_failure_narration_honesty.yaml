id: bug_0200
title: "The Breaking Weir — storm-walk FAILURE narration over-claimed a 'never clipped' line the player did clip"
kind: content_fix
mode: rpg
pack: content/rpg/pack/breaking_weir.yaml
# Informational. No test pins breaking_weir's content_hash, so nothing was forced; this
# content edit moves the pack hash, and the regression pins the BEHAVIOUR (narration-vs-state
# honesty + the lethal nerve mechanic), not the bytes. The SYMMETRIC SUCCESS-path instance of
# this exact flaw was fixed last cycle (bug_0197); this closes the failure-path twin.

summary: >
  The mandated blind pass this cycle (The Breaking Weir, RPG, seed 13 — the assessor's rank-1
  and freshest pack) returned clarity 5/5, enjoyment 4/5, a WON run (50/50, ending_held) and a
  DEATH run (10/50, ending_swept on a natural-1 nerve roll), ZERO mechanical bugs. Its one
  concrete finding was a narration-vs-state honesty flaw on the storm-walk's lethal nerve check:
  the on_failure narrate read "The snap-line was never clipped right in your haste; the run-wire
  whips past your grasping hand" — implying the line was never/badly clipped. But the crossing is
  reached ONLY via the USE action "rig storm-walk with life-line": the life-line must be HELD and
  is clipped on by the player's own choice. The prose claimed a botched/skipped clip the action
  set never exposed, and contradicted its own failure journal (which correctly attributes the
  death to nerve breaking: "your nerve broke at the wrong instant; a slipped foot").

root_cause: >
  Same class as bug_0197 (which fixed the SUCCESS-path "going low and steady the way Pell told
  you" on an un-counselled run): the storm-walk's two narration branches were written to a mental
  model with a distinct "clip carelessly" choice, but the pack exposes exactly one forward action
  ("rig {target} with {item}", life_line on walk_span) — the player always clips on. Per Pell's own
  counsel the line keeps you ON the walk and a steady NERVE keeps you upright; the death is the
  nerve failing, not the clip. bug_0197 corrected the success twin and left the failure narrate.

fix: >
  Content-only, no engine change. The storm-walk on_failure narrate is rewritten so the death
  flows from NERVE failing — consistent with both the chosen action (the player clips on) and the
  failure journal: "You clip the life-line to the run-wire and step out — but your nerve fails you,
  and you go too high and too quick instead of low and steady. Halfway across a foot skates on the
  slick planking and the flood takes your legs from under you; you grab for the wire and miss, and
  as the race wrenches you off the boards the snap is torn loose behind you. The cold black water
  folds over your head and carries you down under the weir." Lethality stays coherent (the violence
  of the fall tears the snap loose) and the on_failure end_game ending_swept is unchanged.

out_of_band_teeth: >
  The regression (breaking_weir_skill_chain.test.ts, new it-block) reads the REAL pack's nerve
  skill_check on_failure effects and asserts the joined narrate text (a) is non-empty, (b) does NOT
  contain "never clipped" (the contradiction), and (c) DOES mention "nerve" (the honest cause).
  Reverting the content edit fails the assertion, so it is a behavioural witness, not a vacuous
  green. The existing prepared/unprepared worst-roll lethality assertions (driving the REAL
  resolveSkillCheck) are untouched and stay green — this change is failure-narration text only.

regression_test: tests/regression/breaking_weir_skill_chain.test.ts

verification: >
  npm run health green (verify:integrity + lint + tests + validate + playtest). breaking_weir
  validate_story stays 0 errors / 0 warnings; the auto-discovered RPG suites (all-endings
  reachability for ending_held + ending_swept, no soft-lock, score economy max==50, action-id
  uniqueness, variant liveness) stay green — text-only change, no structural change.

files_changed:
  - content/rpg/pack/breaking_weir.yaml  # storm-walk on_failure narrate: nerve-failing death, not a 'never clipped' line
  - tests/regression/breaking_weir_skill_chain.test.ts  # new honesty assertion on the failure narration
