id: bug_0161
title: "The Alchemist's Tower casket betrayal can still be triggered accidentally — the SPIRE ROOM view now telegraphs it, closing the gap bug_0123 left on the object examine"
kind: content_fix
mode: parser
severity: polish
pack: content/parser/pack/alchemists_tower.yaml

summary: >
  bug_0114 made the spire a real, non-death moral fork (GIVE the antidote → ending_cured,
  the win; UNLOCK the silver casket → ending_betrayal, terminal greed that forecloses the
  cure), and bug_0123 put a "this is a one-way betrayal, not a free bonus" telegraph on the
  casket OBJECT's own examine. But that telegraph lives only on the object: a player who
  never EXAMINES the casket — and instead acts on the SPIRE ROOM description, which mentioned
  the casket neutrally ("its clasp cut for an iron key") — sees no warning before unlocking
  it. So the ambush bug_0123 set out to fix recurs for the room-view player.

blind_playtest:
  run: ai-runs/2026-06-03T09-26-03-752Z/playtest.md
  pack: content/parser/pack/alchemists_tower.yaml
  seed: 23
  result: "Reached ALL THREE endings (ending_betrayal 5/40, ending_cured 40/40, ending_poisoned death); clarity 5/5, enjoyment 4/5; ZERO mechanical bugs"
  the_finding: >
    §4-5 (the one substantive friction, hit in Run 1): reaching the spire holding the iron
    key but no cure yet, the tester unlocked the casket "treating it as an ordinary container
    to investigate — the same verb that was safe on the strongbox" and instantly fired
    ending_betrayal "with no in-the-moment cue that unlocking it is a choice to abandon the
    patient." The "cut for an iron key" framing in the ROOM text "actively invites trying the
    key you're already holding," and the terminal warning bug_0123 added lived in an object
    examine they never ran — so it "reads more like 'I examined the wrong object and lost'
    than 'I chose greed.'" This is the same accidental-betrayal friction seed 19 (bug_0123)
    reported, now shown to survive on the room-view path.

the_fix: >
  Carry the casket's terminal/greed telegraph up to the SPIRE ROOM description (both the base
  and the has_item:antidote variant), so the warning reaches the player at the actual decision
  point — the room view they unlock from — not only in an optional object examine. Base text
  now adds: "to set iron to that clasp is to turn from her pallet to her coffer — a thing
  chosen once and not undone, her treasure bought against her cure." The antidote-bearer
  variant adds: "to crack it now, with her cure in your hand, would be to choose the Work over
  the maker and leave her to the fever — a thing chosen once and not undone." This makes the
  betrayal a DELIBERATE choice without an engine confirmation prompt (which would break the
  Sierra genre this pack emulates; the death/betrayal endings stay recoverable via load §8.7).

why_within_the_bar: >
  Text-only. No flag/item/score/exit/key/gating/ending change. The casket still fires
  ending_betrayal ONLY via its unlock_effects end_game (bug_0114); the canonical cure still
  wins ending_cured 40/40 (max_score stays 40; bug_0104 score-coincides-with-win intact). The
  bug_0065 spire-inventory-truth anchors are preserved VERBATIM: the base still says "you are
  not carrying it yet" and never claims an "antidote in your hand"; the variant still says
  "pale antidote in your hand is no use until you give it to her" — so that regression stays
  green. The bug_0123 casket-OBJECT examine telegraph is untouched (it still complements this
  for the player who does examine). Validator stays green (verified 0 findings).

verification:
  command: npm run health
  regression_test: tests/regression/alchemists_spire_casket_room_telegraph.test.ts
  cases:
    - "WITHOUT the cure, the spire ROOM description telegraphs the casket as terminal ('chosen once' / 'not undone') AND a betrayal (turn from her pallet to her coffer / treasure against her cure), while preserving the bug_0065 anchor ('you are not carrying it yet'; no 'antidote in your hand' leak)"
    - "WITH the cure, the room description telegraphs the moral fork AND keeps the bug_0065 'pale antidote in your hand is no use until you give it to her' anchor"
    - "unlocking the casket still ends in ending_betrayal (non-death), master never cured"
    - "the canonical solve still wins ending_cured 40/40"
    - "the pack validates clean (0 findings)"

