notes: >
  The completion of bug_0123: that fix telegraphed the casket on its OBJECT examine; this one
  closes the room-view path the seed-23 blind tester actually took, so the betrayal fork is
  legible as a CHOICE from wherever the player decides to use the key. Both endings stay
  exactly as reachable; only the spire room prose changes.
