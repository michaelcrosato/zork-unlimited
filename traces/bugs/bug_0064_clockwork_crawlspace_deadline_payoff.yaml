bug_id: bug_0064
pack_id: clockwork_heist_v1
seed: 47
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T17-35-11-427Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack The
    Clockwork Heist. A fresh, MCP-only blind playtester reached all four reachable
    endings across four runs (seed 47) — Truth (hidden copy), Rich, Caught, Caught on
    the Hour — rating it clarity 5/5, enjoyment 4/5, mechanically flawless (zero
    rejected actions, no loops, no soft-locks, no functional bugs; verdict "a real
    player would finish satisfied"). Its one actionable opportunity not already closed
    by the clockwork polish family (bug_0019/0040/0042/0043/0046/0051/0053/0058/0061/0063)
    is report §4 + §6: "the ticking clock and hourly watch — the game's best system — is
    completely bypassable via the strongbox route, so a player who beelines the hidden
    letter may never discover it... the two halves feel tonally disconnected."
failure:
  type: stale_scene_text_missing_reactive_variant
  where:
    - content:content/cyoa/pack/clockwork_heist.yaml
  description: >
    The clockwork-deadline arc (bug_0019/0040/0042/0043) made the gallery, the vault
    door, and the loot room all reactively feel the hour as `ticks` climbed, but the
    `crawlspace` scene — the hidden strongbox route to ending_truth, reached behind the
    great clock's pendulum — was the one beat that never acknowledged the clock. Its
    text was a single still description at every tick count, so a player who explored the
    manor's upstairs rooms and then crawled back to crack the box read the same timeless
    prose the rest of the manor had been drumming a deadline against. The headline
    tension mechanic was wholly absent from the truth route's payoff scene.
fix:
  layer: content
  summary: >
    Content-only application of the existing CYOA `variants` reactive-text feature, the
    same mechanism and exact treatment as bug_0043's loot room — no engine change. The
    `crawlspace` scene gains TWO variants (first-match-wins, higher threshold first):
      - ticks >= 4 (the hour): the great clock's chime rolls down through the manor's
        gears and reaches the passage, and a slow tread answers beyond the wall along the
        vault's far side — crack the box and crawl clear;
      - ticks >= 2 (tension band): the great clock grinds toward the hour, its working
        carried down through the manor's gears even here — be gone before the chime wakes
        the house.
    The clock is named only by the manor-wide motif (the thousand gears, the chime),
    never by a watchman or brass plate the crawler may not have seen (bug_0058 leak
    lesson). The base `text` is UNCHANGED, so the bug_0017 framing it carries ("sealed
    letter", no "that same") stays byte-identical and the pure-foyer beeliner (who never
    stirs the gallery, ticks < 2) still reads the still base text — the quiet earned by
    slipping past the gallery entirely. No choice, effect, flag, item, exit, gating, or
    reachable ending changes.
  reachable_endings_changed: false  # text-only; rich / truth(x2) / caught / patrol all intact
  content_hash_changed: true        # clockwork is unpinned in unit tests (only watchtower_road is pinned). cf7036b384e97505ee786fbed5ea582097ae085d5f305eaac5ac07c8e2f7775a -> ff0ada19cce4224bf8065e7bc5d811065a9a6a11689e2b2dba1681df077c2a25
  regression_test: tests/regression/clockwork_crawlspace_deadline_payoff.test.ts
verified_live: >
    Through the engine path the regression drives (loadPackFile / initStateForPack /
    makeStep / buildObservation) and the running MCP server over the reloaded pack
    (seed 47). Opening the panel, fetching the pick, then climbing to the gallery and
    back before re-entering the crawlspace renders the deadline prose: at ticks 2-3 the
    "great clock grinds toward the hour ... before the chime wakes the sleeping house"
    tension text, at ticks >= 4 the "hour has come round at last ... a slow tread answers
    it" on-the-hour text. The pure-foyer beeliner reaches the strongbox at ticks 1 and
    reads the unchanged still base text, then opens the box to ending_truth. validate_story
    is green (0/0) and all four endings still fire.
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest remains the load-bearing quality
    signal; seed 47 rated the pack shippable (clarity 5/5) and this fix closes its one
    remaining actionable opportunity (the crawlspace truth route never felt the clock),
    completing the clockwork deadline family (gallery -> vault door -> loot room ->
    crawlspace) without touching its tuning.
