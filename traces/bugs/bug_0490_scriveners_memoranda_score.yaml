id: bug_0490
title: "Scrivener's Proof overpaid deed pickup and did not score Bassett's memoranda"
pack: content/parser/pack/scriveners_proof.yaml
reported_by: blind_playtest_20260623T022054Z_scriveners_proof_seed7
severity: medium
symptom: >
  A blind player received 20 of 45 points just for taking the disputed deed in
  the starting room, while reading Bassett's bound memoranda, the strongest
  narrative proof of motive and timing, awarded no score.
root_cause: >
  The original score economy treated possession of the disputed deed as the main
  proof beat and left the private memoranda as unscored flavor, even though the
  memoranda explicitly names the insertion plan and Pryor's illiteracy.
fix: >
  Reduced the disputed deed pickup from 20 to 10 points and added a one-shot
  10-point READ interaction to the private memoranda. The max score remains 45,
  but the full-score route now rewards finding Bassett's timeline as well as the
  forensic comparison.
tests:
  - tests/regression/scriveners_score_pacing.test.ts
  - tests/regression/scriveners_compare_signpost.test.ts
  - tests/regression/scriveners_copy_press_one_shot.test.ts
  - tests/regression/scriveners_proof_reactive_taken_items.test.ts
verification:
  - npm test -- --run tests/regression/scriveners_score_pacing.test.ts tests/regression/scriveners_compare_signpost.test.ts tests/regression/scriveners_copy_press_one_shot.test.ts tests/regression/scriveners_proof_reactive_taken_items.test.ts
  - npm run validate -- content/parser/pack/scriveners_proof.yaml
