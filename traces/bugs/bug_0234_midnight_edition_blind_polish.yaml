id: bug_0234
title: "Midnight-Edition blind-pass (seed 4): the Composing Room hub carried only a read_letter variant, so after the player opened the safe and READ the report it still called that report a thing that 'would make it true or break it' (i.e. still locked, unread); plus a 'fl-bed' → 'flat-bed' typo in the Press Floor base text"
kind: content_fix
mode: cyoa
pack: content/cyoa/pack/midnight_edition.yaml
# Informational. No pinned hash is touched: the change is local to two scenes in
# midnight_edition.yaml (the composing_room hub variants + the press_floor base text) plus a
# new pack-specific regression. The auto-discovered generic CYOA bar (all-endings reachability,
# no soft-lock, action-id uniqueness, variant liveness) re-derives clean over the edited pack;
# every ending stays reachable and the diligence-fork thesis (midnight_edition_branching.test.ts)
# is unchanged.

summary: >
  The mandated blind pass this cycle (The Midnight Edition, CYOA, seed 4) returned clarity 5/5,
  enjoyment 4/5, mechanics flawless: all four declared endings (vindicated / libel / spiked /
  silenced) reached cleanly with zero rejected actions, loops, or broken state, and the
  knows_proof-keyed press-floor fork confirmed working. Its two actionable findings were both
  narration-vs-state honesty blemishes (neither affecting winnability):
  (1) PRIMARY — STALE HUB. The Composing Room carried only a read_letter reactive variant, whose
  text calls the suppressed safe report a thing that "would make it true or break it". After the
  player prises the desk, opens the safe and READS the report (knows_proof set), that same hub
  variant still rendered — so the hub kept describing the proof as locked away and unread when the
  player was already carrying it.
  (2) SECONDARY — TYPO. The Press Floor base description read "the great fl-bed press"; the two
  reactive variants spelled "flat-bed" correctly, only the no-letter base text carried the slip.

root_cause: >
  The composing_room had a single reactive variant keyed on read_letter. variant selection is
  first-match-wins over the declared list, and read_letter remains set for the rest of the game,
  so once knows_proof was also true there was no more-specific variant to win — the read_letter
  text (written for "letter read, safe not yet opened") rendered for every later visit to the hub,
  asserting the proof was still unread. Same class as bug_0232 (tide_mill): an intermediate
  reactive state fell through to a description written for an earlier state. The typo was a plain
  authoring slip in the press_floor base text only.

fix: >
  Added a most-specific knows_proof variant to the composing_room, declared FIRST so first-match-wins
  resolves it ahead of the read_letter variant once the report is read. It narrates the proof in hand
  ("read and proven, Garrow's own initials on it") and reframes the decision ("The question is no
  longer whether it is true — it is which page you set"), so the hub never again calls the read report
  unread. Also corrected "fl-bed" → "flat-bed" in the press_floor base text. Pure prose/content: no new
  mechanic, no flag/exit/ending/score change; every ending stays reachable and the diligence fork is
  unchanged.

regression_test: tests/regression/midnight_edition_blind_polish.test.ts
# describe "bug_0234": pins, on the REAL buildObservation surface — (1) the read_letter-only hub
# still carries the "would make it true or break it" witness; (2) after the full verify chain
# (knows_proof) the hub DROPS that claim and reads "read and proven" + "which page you set";
# (3) the press_floor base text reads "flat-bed press" and not "fl-bed".

verify:
  - "validate_story content/cyoa/pack/midnight_edition.yaml → ok, 0 findings"
  - "npm run health → green (verify:integrity + lint + tests + validate + playtest)"
