bug_id: bug_0084
pack_id: clockwork_heist_v1
seed: 31
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T22-19-03-485Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack The
    Clockwork Heist. A fresh, MCP-only blind playtester (seed 31) reached ALL FIVE
    endings across five runs — Truth, Rich, Caught, Caught on the Hour, The Hour Turns —
    rated it clarity 5/5, enjoyment 4/5, mechanically flawless (zero rejected actions, no
    loops, no soft-locks; verdict "a real player finishes satisfied"). Its strongest
    actionable finding (§5.1): "stale deadline text in the Kitchen at high ticks." At
    ticks 8-9 the foyer and gallery correctly read "waking in earnest ... only a few beats
    left," but stepping into the Kitchen at ticks 9 reverted to the much milder "the
    sleeping house has begun to stir" — "the same line shown at ticks 5" — so the kitchen's
    own prose contradicted how late it actually was. (Confirmed live, MCP seed 31: the
    kitchen rendered byte-identical ticks>=4 text at ticks 5 and ticks 9.)
failure:
  type: deadline_warning_prose_plateau
  where:
    - content:content/cyoa/pack/clockwork_heist.yaml
  description: >
    bug_0082 added a ticks>=7 escalation tier to the FOYER and GALLERY — the two hubs a
    lingering player re-reads on every loop — and argued that covered "every tick-accruing
    loop." That is true for warning VISIBILITY but false for IN-ROOM continuity: the
    kitchen and the study are themselves tick-charging rooms a circling player stands in
    at ticks 7-9, yet their own reactive prose still topped out at the ticks>=4 "the hour
    has come round" tier. So a player standing in the kitchen (or study) at ticks 9 saw a
    description milder than the foyer/gallery they had just left, breaking the mounting
    dread the rest of the manor builds toward the ticks>=10 ending_overstayed.
fix:
  layer: content
  summary: >
    Content-only: extend bug_0082's ticks>=7 escalation tier to the two remaining
    tick-charging rooms — the KITCHEN (composed with the existing lockpick-present /
    lockpick-taken pairing, two new variants) and the STUDY (one new variant) — completing
    the escalation arc across every tick-source room (the gallery was already done by
    bug_0082; the foyer, a non-tick hub, too). Both escalate from their ticks>=4 tier
    toward the ticks>=10 ending's whole-house waking ("waking in earnest", "only a few
    beats left", "the whole house stands fully awake"). New variants sit above the ticks>=4
    tier (first-match-wins, higher threshold first).
  constraints_preserved: >
    The KITCHEN keeps the bug_0072 / bug_0058 constraint — the clock is named ONLY by the
    manor-wide motif (the clock's working carried through the walls, the chime) and the
    house overhead, NEVER the watchman, ledger, or plate (a downstairs-only visitor may
    have met none of them). The STUDY keeps the bug_0068 constraint — named by the gears /
    chime and the VISIBLE open ledger page the base text already describes; naming "the
    watch" is sound there (the open page logs its rounds, and saw_plate is set on entry),
    exactly as the ticks>=4 study variant already does. The load-bearing read_ledger clue
    and saw_plate flag are untouched. No choice/effect/flag/item/exit/tick/gating/ending
    change, so the bug_0019/0040/0066/0067/0072/0068 tuning is preserved.
  reachable_endings_changed: false  # text-only; rich / truth(x2) / caught / patrol / overstayed all still fire
  content_hash_changed: true        # clockwork is unpinned (only watchtower_road is pinned). 761f303046fd109fa9267197c46a71a7846ff23dd9c723376c804b2876d9ad3d -> 65cd79a6eb3cbe5411aed9a56536f77a47be2b53559854b9ba9d8a5cce56ee14
  regression_test: tests/regression/clockwork_kitchen_study_escalation.test.ts
verified_live: >
    Through the engine over the compiled pack (MCP, seed 31): the study at ticks 3 still
    renders the ticks>=2 tier and at ticks 5 the ticks>=4 hour tier byte-for-byte; at
    ticks 7 the study now renders the new escalation ("waking in earnest ... Only a few
    beats left ... no still room left"); the gallery at ticks 8 renders the bug_0082
    escalation; the kitchen at ticks 9 now renders the new escalation (pick-present
    wording, no watchman/ledger/plate leak) instead of the old "begun to stir" line; and
    circling on to ticks 10 still ends at ending_overstayed ("The Hour Turns"). The
    bug_0072 kitchen (ticks 4-6) and bug_0068 study (ticks 4-6) tiers still fire unchanged
    below the new threshold.
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the multi-step routes or deliberately
    dawdle to the deadline, so the blind LLM playtest remains the load-bearing quality
    signal. Seed 31 rated the pack shippable; this closes its strongest actionable finding
    by making the kitchen's (and its twin the study's) own prose escalate in lockstep with
    the foyer/gallery, so the late-game deadline reads as one coherent mounting climax in
    every room a lingering thief can stand in — finishing the arc bug_0079 opened and
    bug_0082 began.
