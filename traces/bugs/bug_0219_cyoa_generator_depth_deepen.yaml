id: bug_0219
title: "The CYOA generator was the last one stuck at a shallow tier — parser and RPG both reached v3 (a depth-3 obtainability fixpoint) while CYOA's best-act gate stayed depth-1 (learn the ally ⇒ the best act appears immediately). The lone v2 of the three; a real depth/version asymmetry."
kind: generator_deepen # mirror the CLOSED parser (bug_0199) + RPG (bug_0168-0174) generator-deepen arcs on the last un-deepened generator
mode: cyoa
# Additive only. Deepens the emitted shape (one interposed gated scene + one depth tier on the
# personal-axis gate), bumps CYOA_GENERATOR_VERSION 2->3, re-seals the held-out corpus and rebuilds
# the scorecard via the sanctioned CLIs, and co-ships a validator-INDEPENDENT depth oracle. No check
# weakened: no MIN_* floor / GEN_EVAL_CHECK_COUNT / SATURATION_FLOOR lowered, no matcher relaxed, no
# test skipped, no PROTECTED_FILES / HASH_PIN_FILES shrunk. corpus/manifest.json +
# src/gen/cyoa_generator.ts are PROTECTED, so editing them behind the version bump surfaces only a
# NON-BLOCKING VERIFIER_TOUCHED warning (the precedented re-seal path, bug_0167/0176/0199) — no
# AI_LOOP_ALLOW_VERIFIER_EDITS needed. scorecard.{json,md} are in neither HASH_PIN_FILES nor
# PROTECTED_FILES (bug_0194 used the freshness TEST instead).

summary: >
  The procedural CYOA generator (src/gen/cyoa_generator.ts) was the shallowest of the three. The
  parser generator went v1->v3 (bug_0168/0199) and the RPG generator v1->v3 (bug_0168-0174), each to
  a depth-3 obtainability fixpoint with a co-shipped validator-independent depth oracle; the CYOA
  generator got the v2 two-axis 2x2 deepen (bug_0169) and STOPPED at CYOA_GENERATOR_VERSION = 2 — its
  best-act gate was depth-1: hearing the ally out (one investigation) made the `best` act appear at
  the hub on the next observation. So CYOA was both a named version asymmetry (the lone v2) and the
  one generator whose held-out packs pinned the coverage bot's scene-coverage at a constant 100% (only
  three directly-hub-reachable scenes), making that score dimension carry zero discriminative signal.

root_cause: >
  generateCyoaPack emitted three scenes (hub + two one-step investigation side-trips, clue_way and
  clue_ally) and gated the `best` finale act directly on the personal-axis flag `knows_ally`. A
  single mandatory state-flip (set knows_ally) stood between the pristine hub and the best ending —
  depth-1. There was no interposed scene, so a capable agent had no multi-step plan to recover, and
  the floor coverage bot trivially visited all three scenes (scene cov = 1.0 on every held-out CYOA
  pack).

fix: >
  Deepened the PERSONAL axis's gate from depth-1 to depth-3 by interposing a FOURTH scene — the
  `reckoning` — and a new `resolved` flag. The hub gains a `go_reckon` choice (gated on knows_ally,
  retiring once resolved) leading to the reckoning; the reckoning's `commit` choice is the SOLE setter
  of `resolved`; the `best` act now gates on `resolved`, not on knows_ally directly. The best-ending
  obtainability chain is now three ordered, individually load-bearing state-flips across a new scene:
  learn_ally => go_reckon => commit => best. Crucially this PRESERVES the v2 two-axis independence the
  generator's shape rests on — the SITUATIONAL axis (knows_way) still never gates `best` (the reckoning
  is gated on knows_ally only; knows_way still only REFRAMES, here also reframing the reckoning's text)
  — so the deeper gate buys real solver-work without collapsing the 2x2. Bumped CYOA_GENERATOR_VERSION
  2->3, re-sealed corpus/cyoa/gen_{0..3}_v1.yaml + corpus/manifest.json, and rebuilt the scorecard.

independent_oracle: >
  tests/regression/cyoa_generator_depth_floor.test.ts — the CYOA analogue of the parser depth-floor
  oracle. It recomputes depth from EMITTED CONTENT by CHOICE-KNOCKOUT (never trusting the version stamp
  or the validator): for each of the three chain choices (learn_ally, go_reckon, commit), removing just
  that action via the shared exhaustive solver's `explore` filter makes ending_best UNREACHABLE while
  the always-available acts (hold, dark) stay reachable — three load-bearing ordered flips = depth-3.
  Both directions pinned: HARDER (≥3 tiers) AND still SOLVABLE (every declared ending reached,
  cappedOut=false) across the 12-seed window.

honest_scope: >
  This is STRUCTURAL hardening of the fresh eval distribution (the generator's stated purpose: a
  strictly-harder, never-frozen target for a CAPABLE agent), plus closing a real version/depth
  asymmetry (CYOA was the lone v2). The HEADLINE/per-mode Score is UNCHANGED: it is read off the
  coverage strategy with the graph shown, and the CYOA coverage bot still reaches the gated reckoning
  scene (CYOA actions are always listed, unlike parser/RPG spatial navigation), so completion (4-6%),
  ending coverage and coverage-strategy scene cov (100%) are unmoved — the per-mode CYOA
  curated->held-out gap stays 68.0% vs 58.6%. So this deepen does NOT close that gap, and a capable-
  agent benchmark would have to confirm the added difficulty. The scorecard is NOT byte-identical,
  though: the rebuilt per-pack rows show two real depth signals — turns-to-end on the coverage
  strategy ROSE (e.g. 2.3->3.0, 3.0->4.0: the deeper best path costs steps) and RANDOM-strategy scene
  coverage DROPPED 100%->75% (the random bot does not always reach the gated reckoning, so for that
  strategy the scene-coverage dimension became a LIVE signal). The standing per-mode CYOA gap is a
  distribution-SHAPE artifact (the generator emits only the hard two-axis shape, ~0.58; curated CYOA
  also includes bot-completable linear packs up to 0.92), NOT a depth gap — recorded so future cycles
  do not re-chase "deepen CYOA to close the gap" via the floor coverage bot.

verification: >
  npm run health GREEN. validateCyoa clean (0 findings) across the 24-seed window; exhaustive solver
  reaches every declared ending with no cap-out; the depth-floor knockout oracle confirms the depth-3
  chain; the negative-corpus + assessor-mint + held-out-corpus-sealed + manifest-protected tests stay
  green on the re-sealed corpus; benchmark_scorecard_fresh re-passes (scorecard rebuilt at runs=50
  via `npm run benchmark -- --runs 50 --out traces/benchmark/scorecard`; headline Score unchanged,
  per-pack turns-to-end + random scene-cov rows updated).

