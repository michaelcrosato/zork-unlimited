failure:
  type: not_a_defect_coverage_gap
  description: >
    The CYOA ending RENDER — what a player who reaches a declared CYOA ending is actually
    SHOWN — had no absolute systematic lock, COMPLETING a gap bug_0221/0223 closed for the
    other two modes but explicitly EXCLUDED for CYOA ("out of scope by construction").
    Three layers touch CYOA endings, and none locks the player-facing render:
      - cyoa_all_endings_reachable.test.ts (bug_0121) proves every declared ending is
        route-reachable, but over an ABSTRACT BFS on GameState that "never renders an
        observation" — it never builds what the player is SHOWN at the end.
      - cyoa_metamorphic_observation_stream.test.ts proves the CYOA render is
        RELABEL-INVARIANT (original congruent to id-relabeled twin) — a RELATIVE
        isomorphism, not an absolute contract: a renderer that showed the stale SCENE
        title (the scene the player chose FROM) instead of the ending title at every
        ending would still be twin-isomorphic and pass.
      - NO test in the suite builds the CYOA observation builder (src/cyoa/observation.ts,
        imported as buildObservation) on a terminal state at all — it was exercised only on
        interior scenes by the metamorphic stream, never asserted absolutely at an ending.
    So the CYOA ending render — the last thing a CYOA player ever sees — was exercised only
    IMPLICITLY by the blind playtests, never systematically asserted. The render path is
    sound; this only closes the missing systematic lock around it, uniformly and for every
    future CYOA pack. With this, the absolute ending-render oracle is CLOSED across all
    THREE modes (parser/RPG death bug_0221 + parser/RPG non-death bug_0223 + CYOA bug_0224).
fix:
  layer: test   # pure test addition; no content, engine, validator, or hash change
  summary: >
    Add tests/regression/cyoa_endings_render_cleanly.test.ts, the CYOA leg of the
    ending-render oracle. For each shipped CYOA pack (auto-discovered from content/cyoa/pack,
    so a new pack is covered the moment it ships — the bug_0096 bar) it collects the declared
    endings, runs the shared exhaustive solver (support/exhaustive_endings.ts) — CYOA is fully
    deterministic so a single rule set suffices — with an onState hook capturing the first
    terminal WITNESS state for each declared ending, then builds the real player-facing
    buildObservation (CyoaObservation) on that witness and asserts a clean render:
    obs.ended == true, obs.ending_id == the ending id, obs.available_actions == [] (a terminal
    sink), obs.scene_id == the ending id (the engine gotos the ending node before ending — the
    bug_0012 checkWin-goto contract), obs.title == the ending's OWN title (NOT a stale scene
    title — the strongest tooth, the CYOA analogue of bug_0221's "stale room name" check), and
    obs.text == a DECLARED epilogue of that ending (its base text or, for an ending with
    reactive variants, the first whose `when` holds) AND == what the canonical endingText
    resolver returns for the witness. CYOA carries no `death` flag and no "Final score" closure
    (no CYOA score economy), so those parser/RPG checks are correctly absent. A declared ending
    never witnessed FAILS loudly (severed route); a discovery guard asserts >= 20 declared CYOA
    endings (25 across the 6 shipped packs) so a broken glob fails rather than going vacuous.
  teeth_verified: >
    Confirmed the oracle catches a real render regression: temporarily disabling the ending
    lookup in src/cyoa/observation.ts's textFor (so a reached ending renders the stale
    {title: id, text: ""} fallback instead of the ending's title/epilogue) fails 6 of the 7
    tests (all 6 pack tests; only the discovery guard survives); reverted byte-identically.
    All 25 declared CYOA endings are witnessed by concrete deterministic play (none missing,
    none capped).
locked_by:
  - tests/regression/cyoa_endings_render_cleanly.test.ts
