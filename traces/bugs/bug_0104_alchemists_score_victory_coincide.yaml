  - max_score is 40; standing at the spire pre-cure the score is 35 (< max, the regression — it used to EQUAL max); the cure awards +5 and lands the win at exactly 40/40; the cure interaction carries inc_var score by 5; the pack validates green
  - vitest (updated): alchemists_administer_cure_agency.test.ts (pre-cure score now asserted < max == max-5; the win-at-full-score case still passes, max is now 40); alchemists_use_command_verbs.test.ts (win route now 40/40 via pack.meta.max_score); stage3_alchemist.test.ts (stale "35/35" comment corrected)
  - npm run health   # see locked_by / notes
