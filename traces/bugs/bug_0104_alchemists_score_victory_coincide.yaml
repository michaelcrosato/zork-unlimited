bug_id: bug_0104
pack_id: alchemists_tower_v1
seed: 89                           # this cycle's rotated blind-playtest seed; the regression drives seed 1 (deterministic canonical route)
type: content_fix                  # one +5 score award on the existing cure interaction + a max_score bump — no engine/validator/schema/flag/item/exit/gating/reachable-ending change
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T07-40-46-287Z/playtest.md   # rotated onto alchemists_tower — this fix's source
  mandated_result: >
    Fresh general-purpose MCP-only subagent, no source access, seed 89: WON ending_cured 35/35 on the
    intended brew route; reached ending_poisoned on the trap route (drink the black phial); edge-probed
    gating (pour never offered before the herb is steeped). Clarity 5/5, enjoyment 4/5; zero rejected
    commands, no loops, no soft-locks; room/object text stayed in sync with every state change. ZERO
    functional bugs. ONE concrete actionable finding, raised in BOTH report §4 and §5 (below).
  finding: >
    Laboratory / Spire (report §4 + §5): "The score hits the maximum 35/35 when you brew the antidote — one
    full step before the game actually ends (giving it to the master). A score-watching player might think
    they've finished and stop, or be briefly confused that max score doesn't equal game over. A perfect-
    score-yet-unfinished state is slightly odd." The tester's explicit suggestion: "award the final points on
    administering the cure so score and victory coincide."
root_cause: >
  The score chain awarded 5 (read recipe) + 10 (steep herb) + 20 (decant antidote) = 35 = the old max_score,
  ALL of it before the spire. The bug_0057 climax — the deliberate USE-antidote-on-master cure, the literal
  point of the pack and the act the win condition turns on — awarded NOTHING, so the perfect score was
  reached one full action before the win and the most important act in the pack was the one unscored move.
improvement:
  layer: content   # score balance — one added inc_var on an existing interaction + a max_score bump
  content:
    - content/parser/pack/alchemists_tower.yaml: >
        (1) meta.max_score raised 35 → 40. (2) The master's USE-antidote-on-master interaction (the bug_0057
        deliberate cure, the win act) gains a final `inc_var { name: score, by: 5 }` alongside its existing
        set_flag cure_administered / remove_item antidote / narrate effects. The brew now tops out at 35/40,
        and the perfect 40/40 is reached ONLY on the cure — score and victory coincide. Every prior award
        (5/10/20) is unchanged; no flag/item/exit/gating/interaction-shape/reachable-ending change, no new
        action, no route change. Design comments added on meta and the interaction.
