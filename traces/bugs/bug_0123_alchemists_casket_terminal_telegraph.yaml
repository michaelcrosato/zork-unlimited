notes: >
  The complement to bug_0114: that fix ADDED the moral fork; this one makes the fork
  legible as a CHOICE rather than an ambush, addressing the only friction the latest blind
  pass actually experienced. Both endings stay exactly as reachable; only the casket's base
  examine prose changes.
