id: bug_0467_dead_reckoning_one_shot_cask_retreat
title: "Dead Reckoning cask retreat is a one-shot hesitation beat"
pack: content/cyoa/pack/dead_reckoning.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T212015Z_dead_reckoning_seed7.md
severity: S1
symptom: >
  A blind playtester noticed that the player could choose back_deck from the cask,
  return to the deck, go back to the cask, and repeat that no-progress loop forever.
  The deck text after the first retreat even said the player could not step back
  again, but the cask action list still allowed it.
root_cause: >
  back_deck was pure navigation. It advanced the quest stage to at_the_cask through
  the cask scene's on_enter effect, but it did not set any state of its own, so no
  condition could retire it on the next cask visit.
fix: >
  Make back_deck set cask_retreat_taken and gate itself on not_flag
  cask_retreat_taken. The first retreat remains available as a hesitation beat; on
  the next cask visit the player must choose one of the substantive finale acts.
tests:
  - tests/regression/dead_reckoning_back_deck_reactive.test.ts
verification:
  - npm test -- --run tests/regression/dead_reckoning_back_deck_reactive.test.ts
  - npm run validate -- content/cyoa/pack/dead_reckoning.yaml
  - npm run health
