id: bug_0244
title: "IMPOSSIBLE_QUEST_STAGE — backfill the IMPOSSIBLE_GATE static-reachability family to the quest_stage condition kind in validateCyoa + validateParser (the precondition for modular/open-world reachability)"
kind: verification_oracle
mode: cyoa+parser
severity: enhancement
layer: validate/cyoa+parser-soundness
artifact:
  source:
    - src/validate/cyoa_validator.ts
    - src/validate/parser_validator.ts
    - src/validate/rpg_validator.ts
  test:
    - tests/regression/cyoa_validator_negative_corpus.test.ts
    - tests/regression/parser_validator_negative_corpus.test.ts

summary: >
  The static IMPOSSIBLE_GATE reachability family — which proves every flag / item / var gate is SETTABLE
  before a choice/exit/win can require it — silently EXCLUDED an entire condition kind: quest_stage.
  quest_stage is a first-class shared DSL condition (src/core/conditions.ts) and set_quest_stage a
  first-class effect (src/core/effects.ts), used across 16 of the 17 packs (~86 conditions / ~67 writes),
  yet neither content validator's write-collector or required-collector covered it: a choice/exit/win gated
  on a (quest, stage) pair that no set_quest_stage ever writes passed static validation silently — the exact
  dead-gate class IMPOSSIBLE_GATE/ITEM_UNOBTAINABLE/KEY_UNOBTAINABLE already close for the other condition
  kinds. quest_stage (Stage-4 DSL) was added after those checks and never backfilled. This cycle adds a NEW
  finding code IMPOSSIBLE_QUEST_STAGE (severity error) to BOTH validators, mirroring IMPOSSIBLE_GATE for the
  quest_stage kind, plus a rejection-direction witness in BOTH negative-corpus suites (the SoundnessBench
  lineage of bug_0182 RPG + bug_0218 CYOA/parser + bug_0227 meta-verifier).

root_cause: >
  Coverage asymmetry, NOT a live content defect: all 17 shipped packs DO write every stage they gate on
  (npm run health stays green). CYOA's collectWrites scanned set_flag/add_item/set_var/inc_var/dec_var only
  (no set_quest_stage) and collectRequired walked has_flag/not_flag/has_item/not_item/var_gte/var_eq/all_of
  only (no quest_stage); its feasibility loop had flag/item/var branches but no quest-stage analog. Parser's
  checkConds ran flagReqs->IMPOSSIBLE_GATE and itemReqs->ITEM_REQUIRED_UNOBTAINABLE with no questStageReqs
  counterpart, and its settable set was built from set_flag/unlock_exit only. Soundness is even cleaner than
  the flag case: questStage initializes to {} in src/core/state.ts and there is NO quest_init / initial-stage
  declaration anywhere in schema or any pack — a quest's stage is undefined until a set_quest_stage fires —
  so EVERY satisfiable quest_stage gate must have a matching set_quest_stage write, and the write-set needs
  NO init seeding (unlike flags, which seed flags_init). Combined with the conservative AND-context walk
  (descend only top-level + all_of; skip any_of/none_of), the check is sound with zero false positives on
  healthy content.

mechanism: >
  Pure static analysis over already-parsed packs — NO runtime/schema/engine change. A composite key joins
  quest+stage with a NUL separator (`${quest}\0${stage}`) that cannot occur in an id, so (q1,"ab") and
  (q1a,"b") never collide. CYOA: collectWrites adds a setQuestStages: Set<string> from set_quest_stage at
  the SAME sites it already scans (scene.on_enter + choice.effects); collectRequired adds a reqQuestStages:
  Set<string> in its top-level + all_of walk; the feasibility loop (after the var branch) errors
  IMPOSSIBLE_QUEST_STAGE for any req.reqQuestStages not in writes.setQuestStages. Parser: a
  settableQuestStages set is built next to the settable-flags block by iterating allEffects(pack); a new
  questStageReqs(conds) helper mirrors flagReqs (top-level + all_of); checkConds gains a third loop erroring
  IMPOSSIBLE_QUEST_STAGE for any required (quest, stage) not settable. checkConds already runs over every
  exit, interaction, and win condition. SOUNDNESS for the RPG layer: validateRpg reuses validateParser, and
  RPG packs write set_quest_stage through branches the parser scan never walks (enemy on_defeat,
  skill_check on_success/on_failure — e.g. the RPG generator levers a seal open to stage way/open on a
  skill check). So validateParser gained an additive extraSettableQuestStages?: string[] option (mirroring
  extraSettableFlags) that seeds settableQuestStages, and validateRpg now collects set_quest_stage keys from
  rpgRuntimeEffects(pack) into it — otherwise the new check FALSE-POSITIVES on every RPG pack whose stage is
  set by a combat/skill mechanic. Without this, the parser scan's allEffects (which omits skill_check/combat
  effect lists) under-collects the RPG write-set; the fix completes the write-set, it does NOT weaken the
  check.

witness: >
  THE TEETH, verified out of band (non-vacuity, reverted byte-identically): (i) in each negative fixture,
  temporarily ADDING the matching set_quest_stage write made the new REJECTS IMPOSSIBLE_QUEST_STAGE case go
  RED (the finding disappears), proving the check keys on the actual write, not the mere presence of a gate;
  (ii) temporarily renaming a stage in one set_quest_stage in a REAL pack
  (content/cyoa/pack/clockwork_heist.yaml) so its gate no longer matched turned npm run health RED with
  IMPOSSIBLE_QUEST_STAGE, proving the check runs over real shipped content; both experiments were then
  discarded (git diff content/ empty, validators byte-unchanged). The differential anchor in each corpus
  proves IMPOSSIBLE_QUEST_STAGE is ABSENT on the green base (the CYOA/parser generators emit no quest_stage)
  until the single mutation introduces it.

fix: >
  ADDITIVE only. CYOA (src/validate/cyoa_validator.ts): a questStageKey helper; setQuestStages added to the
  Writes type + collectWrites scan; reqQuestStages added to the Required type + collectRequired walk; one new
  feasibility loop pushing err("IMPOSSIBLE_QUEST_STAGE", ...). Parser (src/validate/parser_validator.ts): a
  questStageKey helper + questStageReqs walk mirroring flagReqs; a settableQuestStages set beside the
  settable-flags block; a third loop in checkConds pushing err("IMPOSSIBLE_QUEST_STAGE", ...). Both negative
  corpora gain ONE CASES entry { code: "IMPOSSIBLE_QUEST_STAGE", ... } that pushes a quest_stage gate
  referencing a (quest, stage) pair no set_quest_stage writes onto a reachable choice (CYOA hub `hold`
  choice) / win condition (parser win_conditions[0]); the existing differential-anchor and non-degeneracy
  `it`s pick the new case up automatically. The conservative AND-context walk is preserved (no any_of/none_of
  descent). NO schema change, NO effect/engine runtime change, NO existing finding code altered, NO
  MIN_*/PROTECTED/HASH_PIN touched, NO content pack added, NO pack hash / scorecard / corpus seal moved, NO
  scripts/verify-integrity.ts edit.

scope_honesty: >
  This is the rejection-direction WITNESS + reachability coverage for a condition kind the IMPOSSIBLE_GATE
  family never covered (parity with bug_0182/0218/0227) — NOT a discovered live content defect (all 17
  shipped packs write every stage they gate on, confirmed by health staying green) and NOT an engine/schema
  change. Had health flagged a real pack, that would be a genuine latent dead quest-stage gate to REPORT,
  never to silence. Motivation: quest stages are the per-region progress boundary that open-world / modular
  compositional verification will key on, so making every stage gate statically reachable in O(effects) — no
  state-space expansion — is the precondition for lifting reachability to world scale.

verification: >
  npx vitest run tests/regression/cyoa_validator_negative_corpus.test.ts
  tests/regression/parser_validator_negative_corpus.test.ts -> all GREEN, both new REJECTS
  IMPOSSIBLE_QUEST_STAGE cases passing (CYOA now 5 cases + anchor + non-degenerate; parser now 10 cases +
  anchor + non-degenerate). Non-vacuity teeth confirmed (see witness), both reverted byte-identically. npm
  run health -> GREEN (exit 0), all 17 packs still validate clean, net test count ROSE. npm run
  verify:integrity -> exit 0, NO VERIFIER_TOUCHED / GUARD_WEAKENED / PROTECTED_DELETED / TEST-ASSERTION-STRONG
  count regression. git status shows ONLY the two validator sources, the two test files, and this artifact.
  No MIN_*/GEN_EVAL_CHECK_COUNT/SATURATION_FLOOR change, no matcher relaxed, no test skipped/deleted.

files_changed:
  - src/validate/cyoa_validator.ts
  - src/validate/parser_validator.ts
  - src/validate/rpg_validator.ts (additive extraSettableQuestStages wiring — RPG soundness)
  - tests/regression/cyoa_validator_negative_corpus.test.ts
