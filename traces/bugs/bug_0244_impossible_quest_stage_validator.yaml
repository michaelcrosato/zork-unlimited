regression: >
  The two new corpus cases ARE the regression: each fails loudly if the IMPOSSIBLE_QUEST_STAGE branch is ever
  removed or weakened (the validator would then accept a pack with a dead quest-stage gate). The differential
  anchor doubles as a false-rejection guard. No source/validator soundness was weakened; no schema/engine
  change, no pack YAML, no corpus/manifest.json, no scorecard byte, no scripts/verify-integrity.ts change —
  purely additive.
