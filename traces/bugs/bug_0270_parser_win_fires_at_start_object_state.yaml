# This cycle's mandated blind playtest (general-purpose subagent, MCP-only, no content/src/ui/tests
# access; seed 11; report ai-runs/2026-06-05T02-51-13-360Z/playtest.md) ran on white_stag and came
# back STRONG and CLEAN — clarity 5/5, enjoyment 4/5, all 4 reachable endings (offering, lost-death,
# quarry, thaw), mechanically flawless, the knows_truth knowledge gate and reactive prose verified,
# NO bugs and no content fix warranted. With the content verified clean, this cycle closed the
# deferred STRUCTURAL lever the prior cycle flagged: the WIN_FIRES_AT_START object-state stability
# sibling.
findings:
  - id: win_fires_at_start_blind_to_object_open_unlock_state
    where: validator:src/validate/parser_validator.ts (winStaysTrueForever / collectFalsifiers)
    severity: low
    description: >
      WIN_FIRES_AT_START flags a win_condition that already holds in the engine's own initial state
      AND can never be falsified (so it ends the game at turn 1 on the player's first action, the
      §8.4.5 checkWin running post-action only). Its un-falsifiability proof, winStaysTrueForever,
      handled flags, items, sign-significant var bounds, and `visited`, but BAILED to "escapable"
      on any `is_open`/`is_unlocked` atom (the catch-all `else stable = false`). That was a false
      NEGATIVE: a win gating on object state that already holds at start — e.g. a start-room
      `on_enter` that opens or unlocks the gated object — slipped through unflagged even though it
      genuinely fires at turn 1. The symmetric flag/item/var degeneracies were caught; object state
      was the one monotone-stable class left unanalysed.
    fix: >
      winStaysTrueForever now reasons about both object-state atoms instead of bailing:
        - `is_open` is treated as MONOTONE-stable unconditionally. The closed effect DSL has NO
          object-CLOSE effect (only `open_object`, which sets open=true), and the CLOSE verb is
          unresolvable (resolveParserAction has no CLOSE case, so it is never enumerated or
          applied). Nothing can shut an opened object, so an `is_open` win that holds at start can
          never be falsified.
        - `is_unlocked` is stable iff nothing can relock the object. collectFalsifiers gained a
          `relockedObjects` set populated from every `set_object_locked: { locked: true }` (the
          sole falsifier; UNLOCK and set_object_locked:false only help). An `is_unlocked` win is
          flagged when no relock targets the object, NOT flagged when one does.
      Sound and conservative as before: the at-start gate is still the engine's own evalConditions
      over the engine's own initial state, and the proof is still a flat AND of monotone-stable
      atoms — any_of/none_of, not_visited, quest_stage, a relockable is_unlocked, or a
      combat-volatile var still bail to falsifiable (no false positives). No shipped pack is newly
      flagged (none has a win that holds at start). No schema/effect/runner/determinism change; the
      validator only DETECTS more, never alters play, so every pack's content hash and traces are
      byte-identical.
failure:
  type: validator_completeness_gap
  description: >
    No engine fault or determinism break — a soundness oracle (WIN_FIRES_AT_START) that was
    incomplete on one atom class. It detected fewer degenerate packs than it could prove, never
    wrong ones. Closing it makes the "win fires at turn 1" guard symmetric across all monotone-
    stable condition kinds (flags, items, var bounds, visited, and now object open/unlock state).
regression_test: tests/regression/parser_win_fires_at_start.test.ts
notes: >
  General lesson: when a stability proof enumerates condition kinds and bails on the rest, the
  bailed kinds are silent false-negative surface. Object open-state turned out fully monotone
  (no close exists in the closed DSL — verify that assumption holds if a CLOSE effect is ever
  added under the §14 gate; the new is_open branch and its comment are the place to revisit) and
  unlock-state monotone-unless-relocked, so both became provable with a single falsifier set
  addition. Locked by four new cases in the canonical test file: is_open flagged when opened at
  start / not flagged when not opened; is_unlocked flagged with no relock / not flagged when a
  set_object_locked:true can relock it.
