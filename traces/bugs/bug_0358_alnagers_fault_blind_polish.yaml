id: bug_0358
title: Alnager's Fault blind polish for state honesty and route signposting
severity: content
status: fixed
root_cause: >
  A fresh MCP blind playtest found the pack mechanically sound but flagged
  player-facing state honesty gaps. The corruption ending could claim the officer
  knew the ell-rod result before the player had measured the cloth, the dismissal
  ending did not distinguish ignorant dismissal from knowingly passing proven
  fraud, and the Guild referral route could appear without the hall prose making
  the newly supported route explicit.
fix: >
  Add a no-measurement corruption epilogue variant, add an informed-dismissal
  epilogue variant once measurement and seal evidence are known, and add a
  higher-specificity Cloth Hall variant that names the register, Ned, and seal
  evidence as enough to refer the matter to the Guild court. Pin the intended
  condemnation skill check as a non-blocking tension beat across seeds.
files_changed:
  - content/cyoa/pack/alnagers_fault.yaml
regression_test:
  - tests/regression/alnagers_fault_blind_polish.test.ts
