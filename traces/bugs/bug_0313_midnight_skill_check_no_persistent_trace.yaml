id: bug_0313
pack: midnight_edition_v1
scene: alley_door
class: reactive-description-blindness
severity: minor
title: >
  alley_door barred-state variant did not distinguish skill-check attempt from plain bar_door
description: >
  The alley_door barred-state variant ("the heavy bar is across it now, dropped hard into its
  brackets where you slammed it") fired identically whether the player used the dramatic
  steady_and_bar skill check (latch already lifting, nerve under pressure) or the plain bar_door
  choice (deliberate, uncontested). Both choices set only door_barred, so on re-entry the scene
  had no way to reflect how the bar was actually secured. The skill check left no persistent
  prose trace beyond a journal entry that is invisible on scene re-entry.

  Blind playtest (seed 7, ai-runs/2026-06-08T11-14-59-656Z/playtest.md §5) surfaced this: with a
  natural 20 rolled, the failure path was not observable, and the playtester noted the skill check
  was "entirely cosmetic" since both outcomes (and plain bar_door) produced identical subsequent
  scene text. Same reactive-description-blindness class as bug_0305 (sealed_crypt grip beat with
  no reader in crypt description).

fix: >
  Added nerve_check_attempted flag to BOTH on_success and on_failure of steady_and_bar (preserving
  the convergence invariant — stateKey(success) == stateKey(failure) — that the single-rules CYOA
  exhaustive proofs depend on). Added new alley_door variant ordered before plain {door_barred}:
  fires when {door_barred AND nerve_check_attempted} and describes the bar as "thrown into its
  brackets with the latch already moving in the frame when you got it home" — accurate for both
  success (dropped clean under pressure) and failure (wrestled home against the lifting latch).
  The plain {door_barred} variant now fires only for bar_door (no skill check attempted). Pure
  prose — no score, route, ending, or choice condition change.

regression_test: tests/regression/midnight_edition_skill_check_reactive.test.ts
fixed_in_commit: pending
