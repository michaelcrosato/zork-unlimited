bug_id: bug_0259
pack_id: cold_forge_v1
seed: 11
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-04T23-33-49-294Z/playtest.md   # cold_forge, seed 11 (prepared win + reckless death)
  finding: >
    The harness's rank-1 mandated target this cycle was cold_forge (the coverage bot
    leaves 3 rooms unvisited / 0 of 2 endings — a multi-step RPG it cannot plan, so the
    blind LLM pass is the load-bearing quality signal). A fresh source-blind MCP-only
    subagent played two routes (prepared victory: ending_victory 50/50; reckless death:
    ending_fallen 0/50), rated it clarity 5/5, enjoyment 4/5, and found ZERO functional
    bugs — no rejected actions, loops, broken or contradictory text; flags, quest stages,
    score economy, exit gating, combat/might-check math all verified correct. It surfaced
    two friction notes (§4); one (the take-then-don two-step on the plate) is ALREADY
    signposted by the bug_0118 reactive Bellows Walk nudge (the tester donned the plate
    and so never triggered it). The other was the remaining unaddressed friction (below).
failure:
  type: signposting_design_flaw
  scene: forge_heart
  description: >
    The iron pry-bar (in the Outer Forge, by the cold trough) is needed to lever the
    slag-choked grate in the Forge Heart. A player can descend to the Forge Heart having
    skipped the bar, find the grate sealed, and have to backtrack — but with no in-room
    reminder of WHERE the bar is. The `down` exit's `locked_msg` ("The slag grate is
    sealed fast. It must be levered aside first.") is a STATIC string that cannot
    reference inventory, so it can neither name the bar's location nor distinguish a
    bar-less player from a prepared one. The lantern-spirit's heart-counsel does name the
    bar ("by the trough"), but a player who skipped that dialogue, or simply forgot, hits
    a soft dead-end feel: the room knows the grate needs a lever, but never points back to
    the one tool that fits.
fix:
  layer: content   # reactive-prose signpost only; honours the existing gating + score economy
  pack: content/rpg/pack/cold_forge.yaml
  summary: >
    A reactive Forge Heart room `variant` now carries the cue the static locked_msg
    cannot: when the pry-bar is NOT in hand and the grate is not yet open, the room reads
    "...you carry nothing strong enough to set against it. There was a stout iron pry-bar
    by the cold trough back in the outer forge." It is declared AFTER the existing
    `grate_open` variant (so the open prose always wins once the grate is levered — first
    matching variant in declared order wins, src/parser/model.ts roomDescription), and the
    pry-bar is never consumed (the USE-on-grate interaction has no remove_item), so once
    the bar is taken this nudge can never re-fire. A prepared player (bar in hand) still
    reads the base prose ("made to be levered by bar and brawn"). PURE prose: no
    object/exit/flag/quest_stage/score(50)/ending change — the grate skill_check (might vs
    12) and the +15 award are untouched, and the down exit stays gated on the grate_open
    quest stage exactly as before.
  reachable_endings_changed: false   # same two endings; gating, scoring, and routing untouched
  content_hash_changed: true         # text-only signpost; cold_forge is NOT a HASH_PIN_FILE, no test pins its hash
  regression_test: tests/regression/cold_forge_grate_bar_cue.test.ts
verified_live: >
    validate_pack reports 0 errors. Replayed via the runner: arriving at the Forge Heart
    with no bar reads the cue (points back to the cold trough) and NOT the base "by bar and
    brawn" prose; arriving with the bar reads the base prose and no cue; with the grate
    open the open variant wins even while the bar is held. The existing cold_forge
    regression suite (grate journal, grate-failure recoverability, stale-prybar prose,
    unworn-plate nudge, score summary, reactive descriptions) passes unchanged, confirming
    the lever puzzle, score economy, and other reactive prose are untouched.
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the dialogue-buff + loot-the-plate + lever
    + descend route (a standing heuristic-planner limit; it leaves 3 rooms unvisited and
    reaches 0 endings), so the blind LLM playtest is the load-bearing quality signal. Here
    the blind pass on cold_forge came back clarity 5/5, enjoyment 4/5 with this single
    remaining signposting friction, now fixed content-only.
