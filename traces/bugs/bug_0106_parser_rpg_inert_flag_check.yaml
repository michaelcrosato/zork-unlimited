bug_id: bug_0106
pack_id: n/a   # validator capability (cross-pack), not a single-pack content bug
seed: 7
evidence:
  source: blind_playtest + structural follow-on
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T08-06-40-885Z/playtest.md   # cold_forge, seed 7
  finding: >
    The assessor's rank-1 mandated target this cycle was cold_forge (rpg). A fresh,
    source-blind, MCP-only general-purpose subagent (seed 7) played the optimal route to
    ending_victory (50/50) and an under-armed stress route, rated it clarity 5/5,
    enjoyment 4/5, and found ZERO functional bugs — no rejected actions, loops, soft-locks,
    or stale prose (the pack's reactive seams from bug_0023/0094 all held). Its one
    substantive note was a BALANCE observation about the Bellows Walk fight (the cold-iron
    plate's +2 defense feels small; even fully geared you finish near 2 HP on seed 7). That
    combat was DELIBERATELY retuned only last cycle (bug_0101) to make the prepared player a
    real, winnable gamble — the spirit's +2 attack is the decisive lever, the plate optional
    grace — so re-tuning it would churn against a fresh, intentional design decision, and the
    playtest itself called the pack content-complete. The cycle's improvement therefore
    follows the documented #1 next step from last cycle (bug_0104): port the new INERT_FLAG
    soundness check from the CYOA validator to the parser + RPG validators, which had no such
    check though their packs also use flags.
failure:
  type: missing_soundness_check
  scope: src/validate/parser_validator.ts  (and so src/validate/rpg_validator.ts, which delegates to it)
  description: >
    The CYOA validator gained an INERT_FLAG check in bug_0104 (a flag written by a `set_flag`
    effect or declared in flags_init that no condition anywhere reads is dead bookkeeping — a
    no-op write a blind playtester cannot audit from inside the game). The parser validator
    had already received the rest of that soundness family (UNREACHABLE_VARIANT shadowing +
    UNSATISFIABLE_CONDITION — bug_0091) but NOT the flag-side check, and the RPG validator
    inherits its flag coverage from the parser one. So a parser/RPG pack could accumulate an
    inert flag — including an enemy `defeat_flag` no room variant or exit ever reads — and
    nothing would surface it. This was the one remaining gap in porting the family across all
    three validators.
fix:
  layer: validator   # trust-but-verify: changed the validator freely, added a regression test
  summary: >
    Added the INERT_FLAG check to validateParser. It collects every flag the pack WRITES —
    `set_flag` across room on_enter, object interactions, object unlock_effects, and NPC
    dialogue nodes; flags_init; and (via the existing `extraSettableFlags` option the RPG
    validator already fills) enemy `defeat_flag` + on_defeat / skill-check `set_flag` — and
    every flag it READS (a new `collectFlagReads` mirroring the CYOA one: has_flag/not_flag,
    descending all_of/any_of/none_of, across exit/interaction/win conditions, room & object
    variant `when`s, and dialogue-topic gates). A written flag with no reader is warned, never
    errored (an inert flag is a no-op, never a soft-lock). Sound — no false positives: a flag
    read only via not_flag (the one-shot dialogue/interaction idiom these packs lean on heavily)
    or only inside a disjunction still counts as read.
  audit_result: >
    Auditing the four shipped parser/RPG packs found ZERO inert flags — unlike the CYOA audit
    (which scrubbed four). Every set_flag/defeat_flag is read: alchemists_tower and sealed_crypt
    read all of theirs (catacombs_open / rope_attached_to_well via has_flag, the heard_*_rumor /
    read_* via not_flag to retire one-shot topics); cold_forge reads plate_donned (variant +
    interaction), sentinel_stilled (room variant + exit), and the heard_* via not_flag;
    sunken_barrow reads wight_slain and its heard_* the same way. So NO content changed and NO
    content hash moved — the check is purely an enforced bar against future inert flags.
verification:
  - "npm run health: green (verify:integrity + typecheck + lint + format:check + tests + validate + playtest)"
  - "all four parser/rpg packs validate 0 error / 0 warning (no false positives)"
  - "tests/regression/parser_inert_flag.test.ts: 7 cases pass"
  - "no content pack edited; no content_hash re-pinned (audit found nothing to scrub)"
