bug_id: bug_0019
pack_id: clockwork_heist_v1
seed: 61
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T07-53-15-619Z/playtest.md
  finding: >
    Playtest target rotated onto the assessor's rank-2 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester reached all three
    endings, rating it clarity 4/5, enjoyment 4/5, mechanically clean (no rejected
    actions, no loops, no soft-locks). Its #1 concrete design flaw (report §5,
    item 1), and the single most-repeatedly-logged standing gap across the
    bug_0008 / bug_0017 / bug_0018 next-focus notes: the Steward's Study ledger
    clue reads "a guard walks the gallery on the hour", but NOTHING uses it — no
    turn/time counter, no time pressure, no visible vars. The playtester paced the
    gallery and lingered; the guard never appeared on any route. "A Chekhov's gun
    that points nowhere and implies a stealth/timing mechanic that doesn't exist."
    Its verdict: "giving the guard an actual consequence ... would take this from
    good to genuinely tight."
failure:
  type: dangling_clue_no_payoff
  where: [content:content/cyoa/pack/clockwork_heist.yaml]
  description: >
    The study's read_ledger choice set a flag and journalled "a guard who walks
    the gallery on the hour", but no mechanic ever consumed it: the pack had no
    time/turn counter, the gallery never changed, and a player could dawdle
    forever with no consequence. The clue promised a stealth/timing system the
    game did not have — a player-facing broken promise, flagged by three prior
    blind playtests.
fix:
  layer: content
  summary: >
    Wired a content-only time-pressure deadline that makes the clue pay off — no
    engine change, since the core inc_var / var_gte / var_lte DSL already exists.
    (1) meta.vars_init seeds `ticks: 0`. (2) The upstairs rooms (kitchen, gallery,
    study) inc_var ticks by 1 on_enter, so moving through the manor advances the
    clock; the ground-floor foyer is safe and does not tick, and in-room
    self-goto actions (inspect_clock, take_pick, read_ledger) do NOT re-tick
    because the engine fires on_enter only on a genuine location change. (3) The
    gallery (`landing`) gains reactive `variants` (bug_0018 feature): building
    tension at ticks >= 4, the watchman's patrol at ticks >= 6. (4) On the hour
    (ticks >= 6) the safe crossing `approach_vault` is gated
    `any_of: [var_lte ticks 5, has_flag read_ledger]` — so it stays available
    before the hour OR once you've read the ledger and know the guard's rounds
    (the payoff for the clue) — while a clearly-labelled gamble
    `cross_to_vault_blind` (var_gte ticks 6 + not_flag read_ledger) appears and
    leads to a new ending, `ending_patrol` ("Caught on the Hour"). The safe
    `enter_study` / `back_down` exits always remain, so there is never a
    soft-lock; the gamble is an informed risk (the prose shows the patrol), not a
    gotcha. The read_ledger journal now states the mechanical payoff outright.
  reachable_endings_changed: true   # NEW ending_patrol added (3 -> 4 endings); the original three are unchanged
  content_hash_changed: true        # clockwork_heist yaml: 587116384afa... -> 6c8e8e4583d003c1b8a629bef5be8ca31343203850caedb496fecfbc901d1698 (unpinned; only watchtower_road is pinned in tests)
regression_test: tests/regression/clockwork_guard_patrol_deadline.test.ts
verified_live: >
  Through the MCP tools (seed 61; content-only change, so the live MCP server is
  authoritative). ticks surfaces in observation.vars and increments only on
  room-to-room moves (read_ledger's self-goto left ticks at 2). The gallery base
  text holds at ticks 1-3, shows the "running short" tension at ticks 4-5, and
  the "watchman's lantern now sweeps the gallery" patrol at ticks 6+. At ticks 7
  with no ledger read, approach_vault was gated out, cross_to_vault_blind was
  offered, and enter_study / back_down remained; taking the gamble reached
  ending_patrol. At ticks 7 WITH the ledger read, approach_vault (safe crossing)
  was still offered and cross_to_vault_blind was absent — the clue's payoff.
playtest_coverage:
  note: >
    run_playtest is net-neutral on the coverage strategy (ended 99 / unfinished 1,
    ending_truth 98 / ending_caught 1, vault unvisited — byte-identical to the
    committed pack; the lone study<->landing max_steps oscillation is the coverage
    heuristic's pre-existing planning limit, documented since bug_0008, NOT
    introduced here). The random strategy now reaches all FOUR endings
    (ending_caught 37, ending_truth 43, ending_patrol 16, ending_rich 4) with zero
    suspicious paths, confirming the new deadline ending is genuinely reachable
    while the vault endings remain reachable.
