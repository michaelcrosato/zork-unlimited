id: bug_0374
title: "apothecaries_standard: counter claimed the north door was clear while still blocked"
pack: content/parser/pack/apothecaries_standard.yaml
detected_by: blind_playtest_20260620T105659Z_apothecaries_standard_seed7
severity: moderate

description: >
  After proving the substitution at the shop counter, the room prose changed to
  say "the door north stands clear", but the actual north exit was still gated on
  taking the sealed sample vials from the dispensary. The structured observation
  still surfaced north as a blocked exit, so a player could read the room as open
  and then immediately receive a contradictory blocking message.

reproduction:
  - take_glass_drawstick
  - use_glass_drawstick_on_suspect_vial
  - use_glass_drawstick_on_dispensatory

fix:
  type: content
  change: >
    Split the comparison-complete shop-counter variants into samples-missing and
    samples-secured states. The room now says the sealed sample vials are still
    needed until the north exit is actually legal, and only says the door stands
    clear once both exit conditions hold. The locked-exit hint was also made
    state-agnostic so it remains true before and after the comparison step.
  files_changed:
    - content/parser/pack/apothecaries_standard.yaml

regression_test: tests/regression/apothecaries_counter_exit_sync.test.ts
