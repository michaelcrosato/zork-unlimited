  - "all four parser/rpg scoring packs validate 0 error / 0 warning (no false positives; sunken_barrow's has_item win not flagged)"
  - "tests/regression/parser_score_peaks_before_win.test.ts: 11 cases pass (6 prior + 5 new has_item cases)"
  - "no content pack edited; no content_hash re-pinned (audit found nothing to fix)"
