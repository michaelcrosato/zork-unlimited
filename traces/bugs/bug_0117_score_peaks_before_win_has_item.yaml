bug_id: bug_0117
pack_id: n/a   # validator capability (cross-pack), not a single-pack content bug
seed: 29
evidence:
  source: blind_playtest + structural follow-on
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T10-59-04-756Z/playtest.md   # sealed_crypt, seed 29
  finding: >
    The mandated blind pass ran on sealed_crypt (parser, seed 29 — a fresh seed; recent passes
    used 7/53). A fresh, source-blind, MCP-only general-purpose subagent played two routes: WON
    ending_victory 35/35 (the honest route) and reached ending_plunder 10/35 (the bug_0105 moral
    fork). It rated the pack clarity 5/5, enjoyment 4/5, and found ZERO functional bugs — no
    rejected actions, loops, soft-locks, or stale prose; reactive room/object text, the key
    dependency chain, scoring, and both endings stayed in sync; determinism held. Its one
    substantive observation was the score-peaks shape: "score hit 35/35 before the game ended …
    reads as intentional rather than a 'perfect-score-yet-stuck' trap … because the only remaining
    action (step north) is obvious and prompted." That CONFIRMS the bug_0116 design call to exclude
    `visited` wins (a navigation denouement rightly awards nothing) — but it also drew attention to
    the boundary of the bug_0116 check, which fires only on a `has_flag` win. The structural
    follow-on: a `has_item` win turns on the same kind of deliberate climactic ACT (CLAIM the relic)
    as a `has_flag` win (SET the flag), distinct from `visited` locomotion — so the bug_0104
    "perfect score yet unfinished" guarantee should cover it too.
failure:
  type: missing_quality_check
  scope: src/validate/parser_validator.ts  (and so src/validate/rpg_validator.ts, which delegates to it)
  description: >
    bug_0116 added SCORE_PEAKS_BEFORE_WIN, but only for a SINGLE win_condition that requires a
    `has_flag` F: it warns when max_score is reachable by awards none co-located with a setter of F.
    It deliberately excluded `visited` wins (locomotion — a denouement step rightly awards nothing,
    confirmed by the seed-29 blind pass) AND, less deliberately, `has_item` wins. But a `has_item: I`
    win turns on the player CLAIMING item I — taking the winning relic is a chosen climactic act,
    structurally the alchemists cure / the sunken_barrow circlet's +25 take_effects, NOT mere
    locomotion. Under bug_0116 a future pack could award its full max_score on side content and hand
    the winning relic over an UNSCORED claim, recreating the exact bug_0104 "perfect score yet
    unfinished" smell that the check exists to catch — with the check blind to it because the win
    turns on a has_item rather than a has_flag.
fix:
  layer: validator   # trust-but-verify: changed the validator freely, extended the regression test
  summary: >
    Widened SCORE_PEAKS_BEFORE_WIN from `has_flag` to also cover `has_item`. Added a `requiredItems`
    helper (the has_item twin of requiredFlags — items a conjunctive condition array GUARANTEES held,
    top-level or in all_of; any_of/none_of opaque/skipped). Refactored the score-reachability math
    into a shared `scoreWithout(winActLists)` helper: the perfect score reachable WITHOUT the
    win-trigger act is init + every award not co-located with a list in that set. For a required
    item I, the "granting acts" are object I's `take_effects` (taking I is what grants it) plus any
    effect list with `add_item: I`; if max_score is reachable without all of them, warn. The flag
    path is unchanged in behaviour (now expressed via the same shared helper). `visited` is still
    NOT a climactic act and never drives a finding.
  soundness: >
    Still fires only when ALL conditions hold — detects fewer cases, never wrong ones; a WARNING,
    never an error. A purely IMPLICIT take (a takeable item with NO take_effects and no add_item)
    has no scriptable act list to attach score to, so — like an unsettable flag — it is left to
    WIN_UNREACHABLE and NOT flagged (the `granters.size === 0` continue, mirroring the flag guard).
    Excluding EVERY granting list (even a scored one) only LOWERS the without-act total, so the bar
    errs toward NOT warning. List exclusion is by REFERENCE identity, so each declared act list is
    matched exactly. The single-win guard and the any_of/none_of opacity are unchanged.
  audit_result: >
    Re-auditing the four shipped scoring packs found ZERO findings, and no content changed (no hash
    moved). The only has_item-winning pack is sunken_barrow (`visited: relic_chamber` +
    `has_item: circlet`): its circlet's take_effects award +25 (the deliberate CLAIM, bug_0107), so
    the score reachable WITHOUT claiming the circlet is 15 (might-check) + 10 = 25 < max_score 50 —
    NO warning. sealed_crypt / cold_forge win on `visited` (no required has_flag/has_item), and
    alchemists' cure carries +5. The has_item smell (a scored relic whose claim is unscored while
    max is reached first) is proven flaggable by the new synthetic bug-first cases.
