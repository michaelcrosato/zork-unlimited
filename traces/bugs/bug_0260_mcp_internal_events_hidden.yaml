bug_id: bug_0260
pack_id: sunken_barrow_v1   # surfaced here, but the defect is engine/MCP-wide (all modes)
seed: 13
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-04T23-46-24-371Z/playtest.md   # sunken_barrow, seed 13 (prepared win + transgression death)
  finding: >
    The harness's rank-1 mandated target this cycle was sunken_barrow (the coverage bot
    leaves 3 rooms unvisited / 0 of 3 endings — a multi-step RPG it cannot plan, so the
    blind LLM pass is the load-bearing quality signal). A fresh source-blind MCP-only
    subagent played two divergent routes (the wise/warded victory: ending_victory 50/50;
    the skip-the-ward + prise-the-sarcophagus route: ending_woken death, 25/50), rated it
    clarity 5/5, enjoyment 4/5, and found ZERO content bugs — no rejected actions, loops,
    or stale/contradictory text; combat math, score economy, quest stages, exit gating,
    dialogue one-shot retire, and the retryable might-check all verified correct. The pack
    is content-clean. The one actionable observation was engine-level (§4): "the internal
    `__dlg_*` and `__enemy_hp_*` vars surface in the raw state/events ... visible in the
    observation."
failure:
  type: internal_state_leak
  layer: engine_mcp
  surface: [step_action.events, get_transcript.turns[].events]
  description: >
    Some engine effects write `__`-prefixed vars that exist only to DRIVE mechanics,
    never to be read by the player: the per-enemy HP tracker `__enemy_hp_<id>`
    (src/rpg/schema.ts enemyHpVar, written every combat round by resolveAttack via
    `set_var`) and the dialogue-progress cursor `__dlg_<npc>` (src/parser/model.ts dlgVar,
    written on TALK / topic-goto). The observation builders ALREADY hide these from
    `state.flags` / `state.vars` (src/{cyoa,parser}/observation.ts filter `__`-prefixed
    keys), and get_transcript's `summary.flags` filters them too — but the raw `events`
    array returned by `step_action`, and the per-turn `events` recorded in the transcript
    that `get_transcript` returns, still surfaced them as `set_var` state_change events.
    So a source-blind MCP-only player saw machine bookkeeping — `state_change set_var
    __enemy_hp_barrow_wight = 14`, `set_var __dlg_reaver_shade = 1` — scroll past in the
    event stream the observation otherwise keeps clean. Cosmetic (no wrong game state),
    but an inconsistency in the player-facing presentation discipline the rest of the
    observation layer enforces.
fix:
  layer: engine_mcp   # display-only filter at the player boundary; no state/effect/determinism change
  file: src/mcp/tools.ts
  summary: >
    Added `playerVisibleEvents(events)`: drops `state_change` events whose `flag`/`name`
    starts with `__`, mirroring the `__`-prefix discipline observation.ts already applies
    to state.flags/state.vars. Applied at BOTH player-facing event surfaces — the
    `step_action` return `events`, and the per-turn `events` mapped out of
    `get_transcript`'s turns. The legible combat/dialogue NARRATION events ("You strike …
    it has N HP left", the dialogue node text) are NOT `__`-prefixed and are untouched, so
    the player loses no information — only the redundant raw machine event is hidden. The
    rejected-action synthetic event is not a state_change and is unaffected.
  not_changed: >
    DISPLAY ONLY. The engine's effects, the applied GameState, the per-step
    `result.events` (kept complete for tests / traces / debugging), and `hashState` are
    all unchanged, so determinism (§8.5) and save/trace integrity (§8.7/§16) hold — the
    canonical traces' state-based final hashes are untouched. `get_state` is left
    deliberately UNFILTERED: it is the inspection/debug window (not in the blind-player
    toolset, which is new_game/step_action/get_observation/get_transcript), and keeping it
    raw is what lets the regression test prove the internal write genuinely happened while
    the event stream omits it.
  reachable_endings_changed: false
  content_hash_changed: false   # no pack content edited; no hash pin touched
  regression_test: tests/regression/mcp_internal_events_hidden.test.ts
verified_live: >
    The new regression test drives the REAL MCP tool API (createToolApi) on sunken_barrow:
    a combat round and a dialogue TALK each (1) emit no `__`-prefixed state_change in the
    step_action events or the get_transcript turns, (2) are proven non-vacuous — the raw
    get_state shows `__enemy_hp_barrow_wight` / `__dlg_reaver_shade` were genuinely
    written, and (3) still carry the legible "strike" narration. Confirmed the guard FAILS
    with the filter removed (both cases) and PASSES with it. `npm run health` green.
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the warded-combat + lever + claim route (a
    standing heuristic-planner limit; it leaves 3 rooms unvisited and reaches 0 endings),
    so the blind LLM playtest is the load-bearing quality signal. The blind pass came back
    clarity 5/5, enjoyment 4/5 with no content flaw; this engine-level event-stream leak
    was its single actionable finding, now fixed display-only with a regression guard.
