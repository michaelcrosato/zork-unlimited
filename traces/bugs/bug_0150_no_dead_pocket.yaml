  finding: >
    The mandated blind pass on The Sunken Barrow (RPG, seed 59 — the assessor's rank-1
    target) played THREE routes to all three declared endings (victory 50/50; death-by-wight
    0/50; the foreshadowed "you woke the Lord" bad ending 25/50) and rated the pack clarity
