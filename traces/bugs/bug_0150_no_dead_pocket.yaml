    [[content-polish-backlog-exhausted]]. It specifically noted the slab might-check retry
    loop "has no HP cost and is safe to repeat" and that all three endings "fire cleanly with
    empty action lists" — i.e. it probed for, and did not find, a place play can get stuck.
    That observation is exactly the property no machine check yet PROVES. With content
    blind-exhausted, the assessor collapsed to the 0.5 floor, and the keystone (a real
    frontier model) deferred for want of a provider key (docs/ULTRAPLAN-2026-06-02.md), the
    cycle's lever is a key-free §15 structural guarantee closing a genuine gap.
root_cause: >
  A gap in the structural-verification net, not a content defect. The corpus proves
  exhaustively that every declared ENDING is reachable FROM START
  (cyoa/parser/rpg_all_endings_reachable, bug_0121/0122/0124), every reactive VARIANT is
  live (bug_0145/0146/0147) and the SCORE economy is sound (bug_0148/0149) — but NOTHING
  proves that every reachable INTERIOR state can still reach an ending. The ending census is
  a statement about the START state only: a pack can have every declared ending reachable by
  some route AND still contain a reachable SOFT-LOCK POCKET — a region a legal progress move
  drops you into and from which no ending is reachable at all. The ending proof passes (the
  endings fire via OTHER routes) while a player who took the wrong door is permanently stuck.
  That is the single worst structural defect in an adventure, and the ending proof is blind
  to it. The static SOFTLOCK validator approximates it on the condition graph but has KNOWN
  false negatives: bug_0092 found a real soft-lock MASKED because a provably-dead terminal
  (an unsatisfiable win / an unfireable deadline) was counted as a live escape edge.
fix: >
  Test-only at the content/engine layer plus ONE backward-compatible extension to the shared
  exhaustive-BFS seam (support/exhaustive_endings.ts): a new optional `onEdge(fromKey,toKey)`
  hook in SearchOpts that surfaces every transition the search produces (including edges into
  already-seen states — the joins a backward fixpoint needs). When omitted the BFS is
  byte-for-byte the original, so every existing caller (the 8 ending/variant/score suites, 44
  tests) is unchanged and green. The new regression (no_dead_pocket.test.ts) drives the BFS
  over the PROGRESS-action policy (the exact region the ending proofs certify), reconstructs
  the reachable transition graph via onEdge, runs a backward-liveness fixpoint (seed LIVE with
  every terminal, propagate over reverse edges), and asserts every reachable state is LIVE —
  a reachable non-live state is a soft-lock pocket. Mode-agnostic: CYOA/parser drive one
  deterministic rule set, RPG drives the best/worst-roll bracket (exhaustiveEndingsMulti,
  bug_0124) guarded — as in the RPG ending proof — by asserting no condition gates on a raw
  HP var. No content/engine/validator/schema change; NO hash pin moved.
within_bar: >
  Regression test + a backward-compatible optional helper hook (onEdge), added the same way
  bug_0145/0146 added onState/SearchOpts to this seam; the default path is unchanged and all
  44 pre-existing consumer tests stay green. No pack edited; no validator/schema/engine
  change; NO hash pin moved (all 9 packs validate 0/0, content_hashes unchanged).
  Deterministic, no LLM-judge, NO API key. Sound & honestly scoped: the proof covers the
  PROGRESS-action region (skip the reversible DROP/CLOSE and the pure-observation verbs) —
  the same policy the ending proofs use — so it proves a player using progress moves can
  never strand themselves out of reach of every ending; it does NOT claim DROP/CLOSE cannot
  self-strand (no shipped route gates on a drop, the helper's MONOTONE-RESTRICTION note, and
  dropping a needed key is self-inflicted). PASS is sound: CYOA/parser are exact; for RPG the
  best/worst bracket reaches every routing-relevant outcome (monotone in the roll) so a state
  LIVE under the bracketed edges is LIVE under some real play and a state dead under BOTH
  extremes is genuinely dead. A cap-out makes the graph partial -> the test FAILS, never a
  silent pass.
