notes: >
  The DYNAMIC ground-truth complement to the STATIC SOFTLOCK validator — the same
  static->dynamic relationship as bug_0146 vs static parser_variant_shadowing and bug_0148
  vs static SCORE_PEAKS_BEFORE_WIN. Where the static check approximates soft-lock freedom on
  the condition graph (and can miss one behind a dead terminal, bug_0092), this walks the
  engine's own legal transitions, so a dead terminal never appears as an escape and a masked
  pocket would surface directly. Completes a fourth exhaustive structural axis over the
  shared BFS: endings-reachable (bug_0121/0122/0124), variant-liveness (bug_0145/0146/0147),
  score-economy (bug_0148/0149), and now no-dead-pocket (this). See [[cyoa-exhaustive-solver]].
