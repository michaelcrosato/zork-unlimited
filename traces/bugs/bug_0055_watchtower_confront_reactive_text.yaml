bug_id: bug_0055
pack_id: watchtower_road_v1
seed: 19
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T15-33-04-222Z/playtest.md
  finding: >
    The mandated playtest target this cycle was the assessor's rank-1 candidate, the
    CYOA pack The Clockwork Heist (seed 23, 9th independent blind pass): a fresh,
    MCP-only blind playtester reached all four endings, rated it clarity 5/5,
    enjoyment 4/5, mechanically flawless, and surfaced no NEW actionable defect (its
    two §4/§5 notes were misreads of long-adjudicated-DELIBERATE design — the
    ticks>=4 ledger gate and the enter_panel re-entry). Per the protocol's "you MAY
    pick a different candidate if your judgement and the playtest say it's higher
    value" + "rotate the pack", the improvement rotated to fresh blind passes on the
    two least-recently quality-tested packs (cold_forge seed 41, watchtower_road seed
    19). The watchtower run (3 runs, 3 endings, clarity 5/5, enjoyment 4/5) raised
    the one concrete actionable finding this cycle: the sealed letter "is presented
    like meaningful evidence but never visibly pays off at the checkpoint." Tracing
    the flow, the letter DOES pay off (checkpoint `show_papers` is gated on it); the
    real defect it exposed is a self-contradicting scene text on the no-proof branch
    of `confront_smuggler`.
failure:
  type: contradictory_scene_text_vs_choice
  where:
    - content:content/cyoa/pack/watchtower_road.yaml#confront_smuggler
  description: >
    `confront_smuggler` had a single static scene text: "The sergeant's face goes
    white as he reads his own name. His hand drifts toward his sword..." — a damning
    reveal. But this scene is reached by presenting the sealed letter (`show_papers`,
    gated has_item sealed_letter) regardless of whether the player has corroborated
    the truth, and it offers TWO mutually exclusive forward choices:
    `reveal_evidence` (gated has_flag learned_truth) and `press_bluff` (gated
    not_flag learned_truth). A player who took the letter on the east route but
    learned nothing (no cellar barrels/ledger, no hermit) lands here with
    learned_truth unset, so their only forward move is `press_bluff`: "Press him,
    though the letter's still sealed and you can prove nothing." The static text had
    already narrated the sergeant reading his own name — you cannot both have him
    read his name AND have nothing to prove. This is residual from bug_0002's
    structural_resolved pass, which added the press_bluff no-proof branch but left
    the scene text presuming the damning reveal.
fix:
  layer: content
  summary: >
    Reactive-text-only edit to `confront_smuggler`. The base text is kept as the
    learned_truth payoff but made route-neutral ("The sergeant reads, and his face
    goes white as he finds his own name") so it holds whether the seal was opened by
    the hermit (seal_broken) or the sergeant opens the still-sealed letter on the
    cellar/ledger route. A new variant (when not_flag learned_truth) covers the
    bluffer: "The sergeant turns the wax-sealed letter over... The seal is unbroken,
    and you've no idea what it says... Handing a stranger's sealed letter to the very
    man it might name is no kind of proof..." — which the following `press_bluff`
    choice now reads true against. No flag/route/choice/ending change.
  reachable_endings_changed: false  # still truth/escape/captured; all routes intact
  content_hash_changed: true        # watchtower_road edited; canonical pin lives in
                                    # traces/bugs/bug_0002 (a HASH_PIN_FILE), re-pinned
                                    # deliberately alongside this content change.
                                    # 4188f7de58079146e00af8c5505094df19540af9d137a3736e26332d197820f0
                                    # -> 3947f07bb7d8e898b6bf17ce2db6352652ae0171810a705937cea2c95bb428cd
  regression_test: tests/regression/watchtower_confront_reactive_text.test.ts
verified_live: >
    Through the engine over the compiled pack, building observations the way the MCP
    server does (buildObservation). No-proof route (letter, no cellar/hermit) reaches
    confront_smuggler with learned_truth unset; the rendered scene text now matches
    /unbroken/ + /no kind of proof/ and NOT /his own name/, offers press_bluff (not
    reveal_evidence), and pressing still ends in ending_captured. With-proof route
    (letter + cellar ledger) reaches confront_smuggler with learned_truth set; text
    matches /his own name/ and NOT /unbroken/, offers reveal_evidence (not
    press_bluff), and reveal_evidence -> expose_the_plot still wins ending_truth.
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the multi-step letter/proof routes (a
    standing heuristic-planner limit since bug_0008); the blind LLM playtest remains
    the load-bearing quality signal. Clockwork (this cycle's mandated target, seed
    23) is shippable at a 9th clean blind pass; cold_forge (seed 41) and watchtower
    (seed 19) both rated 5/5 clarity. This fix closes watchtower's one actionable
    finding without touching its routes, flags, or endings.
