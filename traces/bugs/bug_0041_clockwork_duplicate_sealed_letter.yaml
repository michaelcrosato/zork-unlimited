bug_id: bug_0041
pack_id: clockwork_heist_v1
seed: 314
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T12-27-24-550Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester reached all four
    endings across four runs, rating it clarity 5/5, enjoyment 4/5, mechanically
    flawless. Its one concrete world-consistency finding (report §4 + §5): the
    crawlspace strongbox and the vault each held "a single sealed letter, addressed
    to no one," and both yield ending_truth — so a player who finds the crawlspace
    first and then takes the vault route sees what reads as TWO literal copies of
    the same one-of-a-kind item ("initially made the player think there were two
    letters to track"). This corroborates the same note raised independently last
    cycle (seed 101, bug_0040 deferred next-focus (a)).
failure:
  type: duplicate_unique_macguffin_text
  where: [content:content/cyoa/pack/clockwork_heist.yaml]
  description: >
    The "truth" letter is meant to be the unique MacGuffin — the steward's
    confession — reachable by two routes (the vault take_letter, and the crawlspace
    open_strongbox). Both scene descriptions introduced it with the identical
    phrasing "a single sealed letter, addressed to no one" and both grant the same
    `letter` item / `has_letter` flag / ending_truth. A player who saw both scenes
    read it as two physical copies of a one-of-a-kind object — a world-consistency
    double-take. (Not a reachability/gating bug: both routes correctly reach the
    intended ending; purely a prose-coherence flaw.)
fix:
  layer: content
  summary: >
    Text-only differentiation so the two letters read as a deliberately-PAIRED set
    rather than a copy-paste duplicate, with no engine/validator/flag/item/exit/
    gating/reachable-ending change. (1) The vault letter is now framed as the
    DISPLAYED copy — "laid out in plain sight, as though its writer meant whoever
    cracked the vault to find it here among the gold." (2) The crawlspace strongbox
    letter is now framed as the HIDDEN copy in the steward's own hand — "not laid
    out for show like a thing meant to be found, but hidden away here in the dark,
    apart from the gold, where he meant no eye ever to fall on it." Each scene
    describes ITS OWN letter on its own terms (the crawlspace text does not presume
    the player ever saw the vault, preserving the bug_0017/0025 stands-alone
    discipline), so anyone who sees both now reads them as the steward's two copies
    — the fair copy set out with the fortune and the private copy hidden behind the
    clock — both carrying the same confession the shared ending_truth narrates.
  reachable_endings_changed: false  # still rich/truth/caught/patrol; both truth routes intact
  content_hash_changed: true        # clockwork_heist yaml prose edited; clockwork is unpinned (only watchtower_road is pinned in tests)
regression_test: tests/regression/clockwork_duplicate_sealed_letter.test.ts
verified_live: >
  Through the MCP tools (seed 314). The crawlspace scene renders the new hidden-copy
  prose (folded inside the strongbox, in the steward's own hand, hidden in the dark
  apart from the gold); the vault scene renders the new displayed-copy prose (laid
  out in plain sight on the velvet cushion among the gold). Both still introduce a
  sealed letter the player can take, and both routes still reach ending_truth.
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest is the load-bearing quality
    signal here and surfaced this finding twice across cycles (seeds 101, 314).
