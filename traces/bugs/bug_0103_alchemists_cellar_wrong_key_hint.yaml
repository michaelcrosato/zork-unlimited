failure:
  type: signposting_friction
  scene: great_hall
  object: cellar_door
  description: >
    In the Great Hall, before obtaining the iron key, the cellar hatch is described only
    as a "great iron lock" with no unlock action and no hint that the brass key won't fit.
    On the canonical route the player has JUST taken the brass key in the garden (the room
    immediately before the Great Hall), so they arrive carrying a key and "wonder why they
    can't even try the key they have." The hatch's examine carried no signal that this lock
    needs a DIFFERENT (iron) key — light friction that resolves only once the iron key turns
    up in the study strongbox. The brass key's own description already says it was "sized
    for a strongbox", so the wrong-key relationship was authored but never surfaced AT the
    hatch where the confusion happens.
fix:
  layer: content   # reactive examine variant — the pack's established bug_0033/0073 discipline
  pack: content/parser/pack/alchemists_tower.yaml
  summary: >
    Added one reactive examine `variant` to the cellar_door object, gated on
    has_item brass_key AND not_item iron_key: "A bolted floor hatch with a great iron lock
    — a heavy, iron-mouthed thing far too big for the little brass key you carry, which was
    cut for some smaller box. A lock this size will yield only to a key of iron to match
    it." This disambiguates the WRONG key (the brass key is too small, cut for the
    strongbox) and FORESHADOWS the iron key without naming where it is, mirroring the
    strongbox's own wrong-key discipline. Gated on has_item brass_key so it never fires for
    a player who has not been to the garden (the bug_0052 leak lesson); the not_item
    iron_key guard means it stops the moment the player holds the matching key (the
    accurate base "great iron lock" — still locked — returns). Listed AFTER the
    is_unlocked variant, so once the hatch is sprung the unbolted text wins (first match
    wins). Examine-only: no flag/item/score/exit/route/gating/ending change; the down exit
    still gates on is_unlocked and the canonical solve is untouched.
  reachable_endings_changed: false   # same two endings (ending_cured, ending_poisoned); same routes
  content_hash_changed: true         # examine-text-only; alchemists_tower is NOT a HASH_PIN_FILE, no test pins it
  new_pack_hash: 12f6429b0101d7857b7dd0c24decd282c663092f60c8b811cbcfa47e7ddecce8
  regression_test: tests/regression/alchemists_cellar_wrong_key_hint.test.ts
verified_live: >
    Live through the MCP server (new_game seed 53 → go_east → take_brass_key → go_west →
    go_north → examine_cellar_door): the hatch now reads "A bolted floor hatch with a great
    iron lock — a heavy, iron-mouthed thing far too big for the little brass key you carry,
    which was cut for some smaller box. A lock this size will yield only to a key of iron to
    match it." validate_pack reports 0 findings. The new regression test confirms the base
    text returns for a player without the brass key (no leak) and the moment the iron key is
    in hand (not_item guard), the sprung variant wins once unlocked, and the canonical brew
    route still reaches ending_cured at full score (35/35).
