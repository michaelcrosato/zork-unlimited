bug_id: bug_0054
pack_id: sealed_crypt_v1
seed: 29                          # this cycle's rotated blind-playtest seed; the regression drives seed 29
type: content_fix                 # reactive room text + USE narration only — no engine/validator/schema/flag/item/score/exit/gating change
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T15-18-32-296Z/playtest.md   # clockwork_heist (assessor rank-1 mandated target) — pristine, see below
  rotated_result: >
    ROTATED the actual improvement off the assessor's rank-1 clockwork_heist. The mandated blind
    playtest (clockwork, seed 53) reached all four endings (rich / caught / truth ×2 reactive
    epilogues), clarity 5/5 / enjoyment 4/5, zero bugs — every prior fix (bug_0019/0040/0041/0042/
    0043/0046/0051/0053) confirmed holding on this independent pass; its only two notes (the dumbwaiter
    has no mechanical payoff; the ledger is a safety-net not a hard gate) were each explicitly flagged
    "not a bug / reasonable design" by the playtester, and nudging that tuned tick/watchman/ledger
    machinery on the strength of two non-defects is net-negative risk. Per blind_playtest_protocol.md's
    "rotate the seed and rotate the pack," ran two fresh parallel blind passes on the least-recently
    full-quality-tested packs: The Sealed Crypt (parser, seed 29) and The Cold Forge (rpg, seed 29).
    Both WON, both clarity 5/5, zero rejected actions / loops / soft-locks, gating clean both
    directions. The strongest concrete, player-facing finding across the three packs is the Sealed
    Crypt one below.
  finding: >
    Crypt (sealed_crypt report §5): using the iron key on the catacombs gate awards the final +20
    (score reads "35 of 35" = max_score), but the WIN only fires on ENTERING the catacombs
    (win_conditions: visited catacombs). With the old open-gate text ("…swung inward on darkness. The
    stair climbs back up.") and the old unlock narration ("The catacombs gate swings inward."), a
    first-time player who sees max score and an "unlocked" gate could read the puzzle as solved and
    climb back UP the stair — stopping one step short of ending_victory. The score cap and the ending
    trigger are decoupled and nothing signposted the last move north through the open gate. (The
    protocol's "an ending you can't find" watch-item.)
  cold_forge_secondary: >
    The parallel Cold Forge pass (seed 29) WON 50/50 (ending "Keeper of the Ember"), clarity 5/5,
    no bugs. Its only notes were design observations, not defects: (1) the sentinel lore ("wakes to
    heat, sleeps in cold") is pure flavor because the dead forge can never be relit, so there is no
    wrong-way to test it; (2) a momentary prose-vs-exits read at Bellows Walk where prose names "the
    only way east" while the east exit is the standard locked-exit-until-the-sentinel-dies pattern
    (the combat IS the forward action). Both are the established locked-door idiom / intentional
    flavor, not stale-state contradictions; deferred, not fixed.
root_cause: >
  crypt.description's catacombs_open variant described the open gate but did not name the remaining
  forward move, and crypt_gate's USE narration ended at "swings inward" — neither pointed the player
  north through the gate. Because the climactic +20 lands one step before the win, a player optimizing
  on the score readout had no in-world prompt that one move remained.
improvement:
  layer: content   # hint_text / legibility — no flag/score/exit/gating/reachable-ending change
  content:
    - content/parser/pack/sealed_crypt.yaml: >
        Two prose-only edits. (1) crypt's catacombs_open `variant` now ends "…— and through it, north,
        run the catacombs you came so far to find. The stair climbs back up." (2) crypt_gate's USE
        `narrate` now ends "…the catacombs you came so far to find — one step through the open gate and
        your journey is done." Both name the final `go_north` move explicitly. No flag/item/score/exit/
        gating/reachable-ending change; the route still wins ending_victory at 35/35 on `go_north`.
