id: bug_0206
title: "blocked_exits hint never reached the human-facing renderers (CLI bins + Web UI)"
severity: minor
class: ui
status: fixed
discovered_by: blind_playtest
discovered_in:
  - "ai-runs/2026-06-03T21-25-39-871Z/playtest.md (lamplighters_round, parser, seed 7 — blocked_exits prominent live)"
  - "bug_0201 cycle next-focus (2): named the UI + play-bins as the remaining surfaces that should render blocked_exits"

summary: >
  bug_0201 added a `blocked_exits` hint to the STRUCTURED observation (the MCP/agent
  surface), closing the "a barred way reads as a non-existent one" friction for the
  agent. But the three HUMAN renderers ignored the new field, so a human player still
  hit the original friction. At the lamplighters staith-head a CLI/UI player saw
  "Exits: south" with no cue that a `down` way to the lost child on the strand exists
  and is barred until the great lamp is lit; at lamp_walk, no cue that the excise-store
  `east` is barred until the door is opened.

root_cause: >
  Three render-only sites consumed `exits` but not `blocked_exits`:
  bin/parser_play.ts render() listed only open `Exits:`; bin/rpg_play.ts render() did
  the same (and its on-attempt message is a flat generic, with no locked_msg); and
  ui/src/engine.ts view() built `facts` with `exit: <dir>` entries but no blocked cue.
  The data was present on the observation (and on RpgObservation, which inherits it via
  the Omit + ...base spread) — only the human formatters dropped it.

fix: >
  Additive, render-only — no engine/observation/state change. Each human surface now
  emits each blocked exit's direction + authored message: the two play-bins push a
  `Blocked (<dir>): <message>` line after `Exits:`; the UI view() adds
  `blocked: <dir> — <message>` facts to the parser and RPG branches. How to clear the
  exit stays hidden (it is never a selectable command/choice), exactly as on the agent
  surface. The play-bins also gained an `import.meta.url === pathToFileURL(argv[1])`
  entry guard (the src/ai-loop.ts idiom) and an `export` on render(), so the pure
  formatter is unit-testable without running main() on import.

regression_test: tests/regression/blocked_exit_hints_human_surfaces.test.ts
notes: >
  No content edit, no hash re-pin, no verifier edit, no protected file touched. Game
  outcomes, the exhaustive solvers, and the coverage bot are unaffected (they read
  available_actions / the structured observation, not these renderers). Closes the
  bug_0201 arc: the blocked-exit hint now reaches every surface — agent, CLI, and UI.
