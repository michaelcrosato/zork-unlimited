bug_id: bug_0017
pack_id: clockwork_heist_v1
seed: 37
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T07-35-13-159Z/playtest.md
  finding: >
    Playtest target rotated off the heavily-polished watchtower_road (bug_0002-0007)
    onto the assessor's rank-2 candidate, clockwork_heist_v1 — last blind-played at
    bug_0008 and carrying a logged backlog of path-presumptive text. A fresh,
    MCP-only blind playtester (seed 37) reached all three endings cleanly (Truth via
    the crawlspace, Rich and Caught via the vault) with zero rejected actions, no
    loops, no soft-locks. Its top friction (report §4 + §5) confirmed the bug_0008
    deferred items: the "Truth" thread was written assuming the player had already
    walked the vault route, so it read as a contradiction on the crawlspace route —
    the very route a curious player hits first by examining the clock.
failure:
  type: path_presumptive_text
  where: [scene:crawlspace, ending:ending_truth]
  description: >
    Two narration lines presumed a vault visit that the Truth player may never make.
    (1) crawlspace first-visit text: "...a forgotten strongbox — and inside it, that
    same sealed letter." The crawlspace is only ever reached BEFORE / INSTEAD of the
    vault (taking the letter or grabbing the gold inside the vault ends the game on
    that choice, so there is no vault->crawlspace route), meaning the player has
    NEVER seen the letter when this text renders — "that same" is always wrong.
    (2) ending_truth: "You leave the gold and take the truth." presumed the player
    stood in the vault and saw the gold, false on the crawlspace route where no gold
    is ever encountered. Both endings/scenes were mechanically correct; only the
    prose was route-blind.
fix:
  layer: content
  summary: >
    Made the Truth thread path-agnostic (same class as watchtower bug_0006/bug_0007).
    (1) crawlspace text reworded "that same sealed letter" -> "a single sealed letter,
    addressed to no one" (matching the vault's own description of the letter), so it
    introduces the letter cleanly whether or not the player ever saw the vault.
    (2) ending_truth reworded "You leave the gold and take the truth" -> "There was
    gold enough in this house to vanish on, but you leave it untouched and carry the
    truth out instead." The gold is now framed as a property of the manor (true on
    every route) rather than something the player physically stood over, so the line
    reads truthfully on both the crawlspace route and the vault take-letter route.
    No flags / items / choices / gating / reachable endings change — text only.
  reachable_endings_changed: false
  content_hash_before: 79dead145bee8ac72df040fe68d6fdc801a39bbdf66be9476e4c2c08b8f08f29
  content_hash_after: 1b121b1a67e3b7aee6d1cd53c10964f5de9b5eb8184eccfdfe74a9dfdf46b27a
deferred:
  - >
    The Steward's Study ledger clue ("a guard who walks the gallery on the hour")
    sets read_ledger but pays off nowhere — there is no turn/time counter, so the
    guard never appears. Either wire a time-pressure mechanic or reframe the clue
    as pure atmosphere; out of scope for a one-line text fix.
  - >
    Stale room text in The Cold Kitchen — after take_pick the scene still reads "a
    servant has left a slim roll of lockpicks." CYOA scenes have no reactive-text
    `variants` feature (that lives on the parser/RPG RoomSchema, bug_0010), so this
    needs an engine feature, not a content edit.
  - >
    Structural: examining the clock first fast-tracks the richest ending in four
    clicks, bypassing the clue -> tool -> vault puzzle. A design choice (gate the
    crawlspace behind the vault, or accept it as a valid shortcut), not a defect.
regression_test: tests/regression/clockwork_truth_path_coherence.test.ts
