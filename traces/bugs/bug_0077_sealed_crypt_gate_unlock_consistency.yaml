deferred:
  - >
    Rope/well verb mismatch (Old Well): the prose and the sexton both prime "tie the rope to the iron
    ring", but only `use coil of rope on old well` is offered. This is a DIFFERENT feature than
    bug_0074's self-USE command_verb — item-on-target USEs have a natural preposition and word order
    that vary by verb ("tie rope TO well" vs "pry slab WITH bar"), so generalizing command_verb to
    item-on-target needs its own design (liberal two-noun parse + a per-interaction phrasing). Defer
    to a dedicated cycle.
