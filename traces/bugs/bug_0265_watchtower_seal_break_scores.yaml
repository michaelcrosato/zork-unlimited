id: bug_0265
title: "Content/balance polish: The Watchtower Road's western 'learn the truth' beat now scores. show_letter (the hermit breaking the seal and naming the checkpoint man) awarded 0 points while the mechanically-equivalent eastern evidence trail paid +20; it now grants +5 and max_score lifts 45 → 50. Motivated by this cycle's mandated blind pass."
kind: content_fix
mode: cyoa
pack: content/cyoa/pack/watchtower_road.yaml
# Scoring-only content_fix — no engine/schema/validator change. watchtower_road IS the one
# hash-pinned CYOA pack (tests/unit/rpg_validator.test.ts), so the content edit moves its
# compiled content hash; re-pinned DELIBERATELY (d3090c6586… → f1d127c8ce…) with a documented
# note, surfaced not laundered. The discovered pack set is unchanged (an existing pack edited,
# none added) so the scorecard freshness pin (bug_0194) is untouched, and the benchmark bot
# never plans these puzzles, so no scorecard regen is forced.

summary: >
  The mandated blind pass this cycle (The Watchtower Road, cyoa, seed 7 —
  ai-runs/2026-06-05T01-31-00-798Z/playtest.md) returned clarity 5/5, enjoyment 4/5, mechanics
  flawless: three distinct endings reached across four runs (truth/escape/captured), zero rejected
  actions, zero loops, no stale or contradictory text, NO hard bug. Its primary friction finding
  (§4/§5): the two convergent "learn the truth" routes are NOT scored symmetrically. The eastern
  evidence trail (examine_barrels +10, take_ledger +10) pays +20, but the western route's key
  discovery — show_letter, where the hermit breaks the sealed letter and NAMES the man at the
  checkpoint — paid 0. A west-leaning player who learned the truth that way reached the win feeling
  under-rewarded for the same investigative beat.

root_cause: >
  Not an engine defect: CYOA scoring is first-class and the pack's six awards were each sound,
  one-shot, and summed to max_score 45 (the cyoa_score_economy_sound proof was green). It was a
  CONTENT/balance gap — show_letter set learned_truth + seal_broken (a genuine investigative
  milestone, arguably the single most pointed clue since it names the culprit) but carried no
  inc_var, so the western "learn the truth" beat was the one corroborating discovery in the pack
  that scored nothing, while its eastern counterparts scored +10 each.

fix: >
  Scoring only — add `effects: [{ inc_var: { name: score, by: 5 } }]` to the show_letter choice and
  lift meta.max_score 45 → 50. The +5 is one-shot via show_letter's existing
  `not_flag: seal_broken` guard (hermit_about_letter's on_enter sets seal_broken on arrival, so the
  choice retires after firing — the same one-shot shape as ask_about_tower / heard_hermit_lore). The
  award rides the seal_broken flag dimension that already partitioned the state space, so NO new
  states are created (watchtower stays ~142k states under the score-economy BFS). All seven awards
  combine on one connected best path — inspect_ground(+5), take_letter(+5), examine_barrels(+10),
  take_ledger(+10), ask_about_tower(+5), show_letter(+5), expose_the_plot(+10) = 50 — because
  show_letter and ask_about_tower key off seal_broken / heard_hermit_lore (not learned_truth), so
  both remain collectible AFTER the eastern barrel/ledger awards set learned_truth. Reachable max ==
  50 == declared stays proven exhaustively by cyoa_score_economy_sound; no route, gate, ending, or
  scene prose changed (the no-hermit / no-letter player is unaffected, capping at 40 as before).

regression_test: tests/regression/watchtower_letter_scores.test.ts
# Locks the real pack on the actual CHOOSE engine path: (1) show_letter awards exactly +5 and sets
# seal_broken + learned_truth; (2) it is one-shot — once the seal is broken, show_letter is no longer
# offered and the score does not climb on return to the conversation; (3) the lifted ceiling is real —
# one connected best path collects all seven awards for exactly 50 at ending_truth, and meta.max_score
# == 50; (4) the no-hermit eastern-only win still tops out at 40 (the change adds points only on the
# western beat). The existing watchtower_letter_signposting / _proof_coherence / _self_affordance
# suites (flag-based, not score) and the auto-discovering cyoa_score_economy_sound proof also stay green.

