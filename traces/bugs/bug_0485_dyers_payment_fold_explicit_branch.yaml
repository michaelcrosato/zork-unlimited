id: bug_0485
title: Dyer's Weight hid its bribe branch behind TAKE payment fold
pack: content/parser/pack/dyers_weight.yaml
reported_by: blind_playtest_20260623T010905Z_dyers_weight_seed7
severity: medium
symptom: >
  The blind playtest treated the payment fold as possible evidence and took it
  while exploring the store room, immediately ending the run as bought. The
  fold's prose warned that it was a bribe, but the visible command was still the
  ordinary inventory action "take payment fold."
root_cause: >
  payment_fold used takeable/take_effects to trigger the bought ending,
  overloading parser TAKE semantics with a deliberate accept-the-bribe choice.
fix: >
  Converted the branch to an explicit target-only USE interaction with
  command_verb: pocket, so the offered command is "pocket payment fold" and no
  take-fold action appears. The bad ending and full-score seizure route are
  unchanged.
tests:
  - tests/regression/dyers_payment_fold_explicit_branch.test.ts
verification:
  - npm test -- --run tests/regression/dyers_payment_fold_explicit_branch.test.ts
  - npm run validate -- content/parser/pack/dyers_weight.yaml
