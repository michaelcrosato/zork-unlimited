id: bug_0365
title: Fire Office Examiner treats Varley's contradictory claim as non-load-bearing
severity: content
status: fixed
root_cause: >
  A fresh MCP blind playtest found that the warehouse hub could say both
  witnesses had been attended to while Varley's own interview remained available,
  making the investigation look complete too early. The same report found that
  Varley's oral claim contradicted the written goods list but received no score
  and was not required for the final criminal referral.
fix: >
  Make Varley's oral loss list a scored evidence beat, require it for criminal
  referral, update warehouse hub variants to distinguish the cook/yard-man
  witnesses from the claimant, add evidence-aware submission-desk prose, raise
  max_score to the new reachable total, and include Varley's oral mismatch in
  the prosecution ending.
files_changed:
  - content/cyoa/pack/fire_office_examiner.yaml
regression_test:
  - tests/regression/fire_office_examiner_blind_polish.test.ts
