bug_id: bug_0072
pack_id: clockwork_heist_v1
seed: 59
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T19-16-05-165Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack The
    Clockwork Heist. A fresh, MCP-only blind playtester reached all FOUR endings across
    four runs (seed 59) — The Truth (hidden copy), Rich, Caught (forced door), Caught on
    the Hour — rating it clarity 5/5, enjoyment 4/5, mechanically flawless (zero rejected
    actions, no loops, no soft-locks, no functional bugs). Its one actionable design note
    not already closed by the clockwork polish family
    (bug_0019/0040/0042/0043/0046/0051/0053/0058/0061/0063/0064/0066/0067/0068) is report
    §5: "In Run 2, after the chime had already struck and the patrol was active upstairs,
    the Cold Kitchen text was unchanged and gave no hint the clock had advanced. Every
    other room reacts to the clock; the kitchen does not ... the one spot that feels
    clock-blind."
failure:
  type: stale_scene_text_missing_reactive_variant
  where:
    - content:content/cyoa/pack/clockwork_heist.yaml
  description: >
    The clockwork-deadline arc (bug_0019/0040/0042/0043) made the gallery, the vault door,
    and the loot room reactively feel the hour as `ticks` climbed; bug_0064 extended it to
    the crawlspace and bug_0068 to the study. But the `kitchen` — which CHARGES a tick on
    entry, exactly like the gallery and study — was still clock-silent: it carried only a
    lockpick-taken variant and no tick-reactive prose. bug_0068 even mislabelled the study
    the "LAST" tick-charging room the clock never touched, overlooking the kitchen. A
    player returning to the kitchen with the hour already struck and the patrol walking
    upstairs saw the same banked-hearth text as on a fresh arrival, the one room that did
    not feel the deadline the rest of the manor drums up.
fix:
  layer: content
  summary: >
    Content-only application of the existing CYOA `variants` reactive-text feature, the
    same mechanism and treatment as bug_0043's loot room / bug_0064's crawlspace /
    bug_0068's study — no engine change. The `kitchen` scene's single lockpick-taken
    variant is replaced by a tick-tiered set, COMPOSED with the lockpick-taken state the
    way the foyer pairs `found_passage` with each tick tier (first-match-wins, higher
    threshold first):
      - ticks >= 4, pick taken / pick present: the hour has come round; the great clock's
        chime rolls through the manor's gears and reaches even this cold kitchen, and
        overhead the sleeping house has begun to stir;
      - ticks >= 2, pick taken / pick present: even down here the great clock's working
        carries through the walls, grinding toward the hour — a sleeping house keeps its
        peace only until the chime;
      - low tick, pick taken: the unchanged prior wording.
    The clock is named ONLY by the manor-wide motif (the gears carrying through the walls,
    the chime) — never by the watchman, ledger, or brass plate (the bug_0058 leak lesson),
    since a player can stand in this downstairs service room having met none of them; and
    the >= 4 line speaks of the house overhead stirring, not of a guard at the kitchen (he
    walks only the gallery). The base `text` (pick present, low tick) is UNCHANGED and
    remains the schema fallback for the first arrival at ticks 1. No choice, effect, flag,
    item, exit, tick, gating, or reachable ending changes.
  reachable_endings_changed: false  # text-only; rich / truth(x2) / caught / patrol all intact
  content_hash_changed: true        # clockwork is unpinned in unit tests (only watchtower_road is pinned). 643c524583d6b90696f596b7bf34f18f99de801a6f33fc72a70643c239d78da2 -> 97c7f1624b080af5fff8212e3d6ca371e49582701dd691204832116417012f91
  regression_test: tests/regression/clockwork_kitchen_deadline_payoff.test.ts
verified_live: >
    Through the engine path the regression drives (loadPackFile / initStateForPack /
    makeStep / buildObservation). The first kitchen visit (foyer -> kitchens, ticks 1, no
    pick) renders the unchanged base text with no clock prose; taking the pick at ticks 1
    swaps to the pick-taken wording, still clock-silent; a no-pick revisit at ticks 2-3
    shows the grinding/tension prose with the lockpicks still present; a no-pick revisit at
    the hour (ticks >= 4) shows the chime prose; and the pick-held revisits show the same
    two tiers with the pick-taken wording. No variant leaks the watchman/guard/ledger/plate.
    validate_story is green and all four reachable endings still fire.
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest remains the load-bearing quality
    signal; seed 59 rated the pack shippable (clarity 5/5) and this fix closes its one
    remaining actionable design note, completing the clockwork deadline family across
    EVERY tick-charging room (kitchen -> gallery -> study) and every traversal scene
    (gallery -> vault door -> loot room -> crawlspace -> study -> kitchen) without
    touching its tuning.
