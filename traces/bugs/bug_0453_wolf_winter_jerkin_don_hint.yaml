id: bug_0453_wolf_winter_jerkin_don_hint
title: "Wolf Winter jerkin pickup warns that it must be donned"
pack: content/rpg/pack/wolf_winter.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T182608Z_wolf_winter_seed7.md
severity: S1
symptom: >
  The day-book told players to pull on the byre-jerkin, but taking it from the
  store produced only generic pickup feedback. A player could carry the jerkin
  north without realizing the separate don action was still required for the
  defense bonus.
root_cause: >
  The byre_jerkin object set its taken flag on pickup but did not narrate that it
  was carried rather than worn, and the store's reactive prose only removed the
  peg-hung object instead of pointing at the unworn state.
fix: >
  Added pickup narration, carried-but-unworn store prose, and a carried object
  examine variant that all tell the player the jerkin is not yet on their back
  and should be dragged on before going north.
tests:
  - tests/regression/wolf_winter_reactive_taken_items.test.ts
verification:
  - npm test -- --run tests/regression/wolf_winter_reactive_taken_items.test.ts tests/regression/wolf_winter_prep_carries_score.test.ts
  - npm run validate -- content/rpg/pack/wolf_winter.yaml
  - npm run health
