bug_id: bug_0051
pack_id: clockwork_heist_v1
seed: 137
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T14-36-30-776Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester reached all three endings
    (Truth, Rich, Caught) across four runs (seed 137), rating it clarity 5/5,
    enjoyment 4/5, mechanically flawless — zero rejected actions, no loops, no
    soft-locks, no bugs. Its one concrete, repeatedly-flagged finding (report §1/§5):
    the two letters that reach the Truth ending are set up as near-opposites — the
    vault copy "laid out in plain sight, as though its writer meant whoever cracked
    the vault to find it", the crawlspace copy "hidden away here in the dark... where
    he meant no eye ever to fall on it" — yet both "resolve to the *identical* 'The
    Truth' ending text." A player who notices the plain-sight-vs-hidden contrast gets
    no payoff for it, and the shared epilogue "pulls against whichever framing they
    just read."
failure:
  type: shared_epilogue_contradicts_route
  where:
    - content:content/cyoa/pack/clockwork_heist.yaml
    - engine:src/cyoa/schema.ts
    - engine:src/cyoa/runner.ts
    - engine:src/cyoa/observation.ts
  description: >
    `ending_truth` had a single static `text`. Both the vault `take_letter` route and
    the crawlspace `open_strongbox` route funneled into it, so the one epilogue
    described "the steward's confession" generically while the two pickup scenes had
    framed the letter in opposite terms (displayed-for-the-finder vs hidden-from-all).
    bug_0041 established the two letters as the steward's paired copies, but that
    pairing was only honoured at PICKUP — the payoff (the ending) still flattened both
    routes into one text, so the contradiction the playtester felt survived to the
    last screen. CYOA scenes already supported reactive `variants`; endings did not.
fix:
  layer: engine+content
  summary: >
    Engine: endings gained the same reactive `variants` capability scenes have.
    `EndingSchema.variants` is `.optional()` (so endings that don't use it compile
    byte-identically — same hash-stability rule as `SceneSchema.variants`, bug_0010);
    `runner.ts` gains `endingText(ending, state)` mirroring `sceneText`; `textFor` in
    `observation.ts` now resolves an ending's epilogue through it (the frozen
    end-state makes it pure). Content: the vault `take_letter` route sets
    `letter_displayed`, the crawlspace `open_strongbox` route sets `letter_hidden`,
    and `ending_truth` carries two variants — the displayed copy "left lying open...
    for the thief good enough to crack his lock" and the hidden copy "hid in the dark
    behind the vault, where he meant no eye to fall" — each reconciling its own
    pickup framing. The original route-neutral epilogue is retained as the base `text`
    fallback, preserving the bug_0017/0025/0030 invariants (no presumed gold
    encounter; truth-over-riches moral). No route/tick/flag-gate/reachable-ending
    change: gold->rich, force->caught, both letters->truth, watchman/ledger tuning
    (bug_0019/0040/0042/0043) untouched.
  reachable_endings_changed: false  # still rich/truth/caught/patrol; all routes intact
  content_hash_changed: true        # clockwork pack edited; clockwork is unpinned in tests (only watchtower_road is pinned). 5479c562a4101e02975048c05257fb348351e4cf55c3f6192c58823fb529e213 -> 7e489e9f7ff66230f5b417c8fb4ca83d92017ef30d312e01f865793f3a4ec771
  engine_change: >
    Endings are now state-reactive (endingText). Generic capability, not
    clockwork-specific; any pack's converging ending can acknowledge its route.
  regression_test: tests/regression/clockwork_truth_ending_reactive_letter.test.ts
verified_live: >
    Through the engine over the compiled pack (seed 137), building the final
    observation exactly as the MCP server does (buildObservation -> textFor ->
    endingText). The vault take-letter route's epilogue now reads the displayed-copy
    text ("lying open... meant to be found") and sets letter_displayed; the crawlspace
    strongbox route reads the hidden-copy text ("hid in the dark... no eye") and sets
    letter_hidden; the two epilogues genuinely differ; base + both variants all keep
    "the steward's confession" and "worth more than escaping rich" and presume no gold
    encounter; gold->rich, force->caught, both letter routes->truth unchanged. (The
    long-running MCP server process in-session still held the pre-change schema and so
    could not load the new key without a restart; the engine path it serves is the one
    the regression test drives.)
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest is the load-bearing quality
    signal here; this cycle (seed 137) it rated the pack shippable, and this fix closes
    its single concrete finding, the last of the recent clockwork polish family
    (bug_0042/0043/0046).
