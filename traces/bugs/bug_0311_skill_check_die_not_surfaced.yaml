id: bug_0311
title: "Skill-check observation missing die type — low-stat checks appear impossible"
layer: engine/observation
severity: low
pack: midnight_edition_v1
playtest_seed: 7
playtest_report: ai-runs/2026-06-08T10-49-23-392Z/playtest.md

symptom: >
  The `available_actions` skill_check annotation surfaced `{ skill, difficulty }` only.
  A playtester seeing `nerve: 3` in `state.vars` and `skill_check: { skill: "nerve",
  difficulty: 12 }` in the action list inferred a flat 3-vs-12 comparison (impossible),
  not the true d20+3 vs 12 roll (60% success on 9+). The same confusion pattern
  previously hit sunken_barrow (bug_0141, post-roll narration) and clockwork_heist
  (bug_0269, pre-roll legibility). This is the pre-roll companion to bug_0141.

root_cause: >
  `buildObservation` (CYOA) and `enumerateActions` (parser/RPG) surfaced only
  `skill` + `difficulty` with no die-type indicator. Without `die: "d20"` the
  annotation cannot be read as "d20+stat vs difficulty" — it reads as "stat vs
  difficulty", making any check where stat < difficulty look structurally impossible
  to pass regardless of the d20 roll.

fix: >
  Added `die: "d20"` to the `skill_check` annotation in `buildObservation`
  (`src/cyoa/observation.ts`) and the `ParserActionOption` shape + its assignment
  in `src/parser/legal_actions.ts`. The field propagates to parser/RPG observations
  automatically (both pass through from `enumerateActions`). Type declarations in
  `src/parser/observation.ts` and `src/rpg/observation.ts` updated to match.
  Metamorphic stream tests updated to pass through the label-invariant `die` field.
  No state hash, routing, scoring, or ending is touched — observation-only.

regression_test: tests/regression/midnight_edition_steady_and_bar_die_legible.test.ts

related:
  - bug_0141  # post-roll d20 label in resolveSkillCheck narration (sunken_barrow)
  - bug_0269  # CYOA skill_check pre-roll annotation added (clockwork_heist)
  - bug_0274  # parser/RPG skill_check pre-roll annotation added (sealed_crypt)
