bug_id: bug_0011
pack_id: sunken_barrow_v1
seed: 11
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T06-31-55-193Z/playtest.md
  finding: >
    Playtest target rotated onto the LAST genuinely UNVERIFIED pack, the RPG pack
    The Sunken Barrow. The deterministic coverage bot is stuck at the entrance
    (0/60 ended; only barrow_mouth/entry_hall/guard_crypt visited, never the slab
    or relic chamber) because it cannot solve the seeded fight + the seeded might
    check, so the pack's quality had never been confirmed by actual play. A fresh,
    MCP-only blind playtester solved it to ending_victory and probed the no-iron-bar
    failure gate, rating it clarity 4/5, enjoyment 3/5 — confirming the pack is
    genuinely solvable, fair, and bug-light. Its top concrete finding (report §5),
    hit TWICE and matching the same class fixed for the parser pack in bug_0010:
    room descriptions are static and contradict state the player just changed.
      (1) Guard Crypt: after the barrow-wight is slain (flag wight_slain; the
          on_defeat journal says "the cold lifts from the east arch" and the east
          exit opens), the room still reads "An archway east is choked with the
          cold the thing gives off."
      (2) Slab Passage: after a successful might check levers the slab aside
          (quest_stage barrow/slab_moved; narration "the slab grinds aside, baring
          a stair down"; the down exit opens), the room still reads "a great stone
          slab set flush with the floor."
failure:
  type: stale_room_text
  where: [content:content/rpg/quests/sunken_barrow.yaml]
  description: >
    Two rooms whose state the player changes (a slain wight clearing the cold
    arch; a levered slab baring the stair) kept narrating the pre-change world —
    a player-facing contradiction the blind playtester called the pack's "most
    noticeable cracks." This is NOT an engine gap: the generic reactive-room
    feature already exists (added in bug_0010 — RoomSchema.variants + the pure
    roomDescription helper, routed through both the observation builder and the
    LOOK action). The barrow pack simply had not opted into it.
fix:
  layer: content
  summary: >
    Pure content fix — apply the existing reactive-room `variants` feature to the
    two stale rooms in content/rpg/quests/sunken_barrow.yaml:
      - guard_crypt gains a variant `when: [{ has_flag: wight_slain }]` whose text
        narrates the niche's risen tenant crumbled to grave-dust and the cold
        lifted from the east arch (now open).
      - slab_passage gains a variant `when: [{ quest_stage: { quest: barrow,
        stage: slab_moved } }]` whose text narrates the slab levered aside, baring
        the stair down.
    No flags, items, exits, gating, or reachable endings change — only the
    narrated room text now reacts to state. Verified live via the MCP tools (seed
    11): both variants flip at the right moment and ending_victory still fires.
  reachable_endings_changed: false
  content_hash_changed: true   # sunken_barrow yaml genuinely changed (added two variants)
  content_hash_before: 39f9551e9ca1decd5cbd6ba92ef1b5fe4664f9e07b2500664f07d8ac8ff4add9
  content_hash_after: ca34eeb606051cb97f81917360322322aad818f1c1e6a88964043635f67d00b4
  repin: >
    Deliberate, surfaced re-pin (not a weakening): traces/rpg/barrow_victory.json
    content_hash updated 39f9551e… → ca34eeb6…. The trace's expected_final_hash is
    UNCHANGED because variants alter only narrated text, never game state — the
    Stage-4 victory replays to the identical final hash, confirmed green by
    tests/regression/rpg_barrow_trace.test.ts.
regression_test: tests/regression/rpg_reactive_room_text.test.ts
