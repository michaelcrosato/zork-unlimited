  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T14-47-19-549Z/playtest.md   # alchemists_tower, seed 73
  finding: >
    The mandated rank-1 blind pass this cycle (alchemists_tower, seed 73) came back
