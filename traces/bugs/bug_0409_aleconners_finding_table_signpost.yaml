id: bug_0409
pack: aleconners_seal_v1
title: "Finding table signpost implied the case was already supportable"
severity: low
scene: assay_stall
reported_by: blind_playtest_20260621T185915Z_aleconners_seal_seed7

symptom: >
  A blind playtester interpreted the finding table as available too early and
  potentially exploitable. The mechanics were safe — the table is hidden before
  any evidence and condemnation is still gated on the full evidence chain — but
  the opening line said the table waited "once your notes can support a finding",
  which made a single-note visit sound more conclusive than it is.

root_cause: >
  The table intentionally supports partial review states: with one fragment the
  player can only pass the seal or return, and with the false-seal plus taste
  evidence they can order a retest. The assay-stall copy described the table as
  if its appearance meant the notes already supported a finished finding.

fix: >
  Reword the stall signpost and table choice as a review of what the current
  notes can support. No route, score, ending, or condition changes; the existing
  partial and full-finding gates remain intact.

tests: tests/regression/aleconners_seal_blind_polish.test.ts

verification:
  - npm test -- --run tests/regression/aleconners_seal_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/aleconners_seal.yaml

trace_repin: >
  None. This is a prose-only content signpost change with regression coverage;
  no committed replay trace hash is repinned.
