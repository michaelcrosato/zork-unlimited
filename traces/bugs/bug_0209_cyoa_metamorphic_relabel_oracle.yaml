id: bug_0209
title: "No oracle proved the id-driven engine's behaviour is INVARIANT under identifier renaming — every structural oracle ran on the literal shipped packs; added a metamorphic contamination-robustness oracle for CYOA"
kind: verification_oracle # new oracle CLASS (metamorphic / isomorphism), additive
mode: cyoa
# Informational. NO src/ change, NO content change, NO hash re-pin, NO protected file
# touched. Two new test-support/test files + this artifact only — verify:integrity stays
# EXIT 0 with no VERIFIER_TOUCHED / GUARD_WEAKENED / HASH_PIN. No pack content_hash,
# scorecard byte, or corpus seal moves.

summary: >
  A GAP in the verification net, not a defect in shipped behaviour. Every existing
  structural oracle (cyoa/parser/rpg all-endings-reachable, variant-liveness,
  score-economy, no-dead-pocket) runs on the LITERAL shipped packs. None of them prove
  the assumption underneath all of them AND underneath the benchmark's contamination
  story: that a pack's behaviour is invariant under a consistent renaming of its
  identifiers — i.e. that the content-free engine (src/core/engine.ts) is genuinely
  id-driven and never special-cases a literal id string. bug_0209 adds the first
  METAMORPHIC oracle to close that gap, for the CYOA mode.

context: >
  This is the deferred key-free "metamorphic relabel / IPT oracle" lever named in the
  bug_0208 ULTRAPLAN synthesis (docs/CURRENT_PLAN.md "Deferred to next cycle" #3) and in
  bug_0208's next-focus. Content is saturated/blind-clean (this cycle's mandated blind
  pass on clockwork_heist, seed 13, reached 5 endings at clarity 5/5, enjoyment 4/5, ZERO
  bugs — ai-runs/2026-06-03T22-12-16-837Z/playtest.md), so the cycle spent its lever on a
  structural oracle, not on churning a clean pack ([[content-polish-backlog-exhausted]]).

mechanism: >
  tests/regression/support/relabel_cyoa.ts — relabelCyoaPack(pack) walks the pack with a
  TYPED traversal over the closed Condition/Effect DSLs and the CYOA schema, rewriting
  every IDENTIFIER (scene/ending/choice ids, flags, vars, items, objects, quest/stage
  names, the pack id, vars_init keys) to an opaque mx_<n> token via one memoized
  bijection, while leaving every PROSE field (titles, scene/ending/variant text, narrate,
  add_journal) byte-identical. A reference and its definition share the same old string,
  so the same bijection maps both consistently: the twin is a valid pack describing the
  SAME game with DIFFERENT names. The walk is typed (not a generic deep substitution) so
  a prose value that happens to equal an id can never be wrongly rewritten and a prose
  field can never be corrupted; relabeler completeness is in turn self-checked by the
  oracle's assertions (a missed id site leaves a dangling reference that breaks the twin).

oracle: >
  tests/regression/cyoa_metamorphic_relabel.test.ts — for each shipped CYOA pack it
  computes three ground-truth artefacts on the original (exhaustive ending-reachability
  census via the shared support/exhaustive_endings.ts BFS; distinct-state count;
  validator finding-code multiset), builds the relabeled twin, recomputes the same three,
  and asserts the metamorphic relation: (1) the twin's reached-ending set equals the
  original's mapped through the bijection (and 1b: no original ending id survives — the
  ids really changed); (2) the distinct-state counts are EQUAL (a true graph isomorphism
  explores exactly as many states); (3) the validator finding-code multiset is identical
  (validation output is id-invariant). NON-VACUITY is asserted explicitly: the map is
  non-empty and no id maps to itself, and the twin re-parses against the .strict() schema.

value: >
  Two payoffs. (a) Soundness witness for the whole id-driven design: if a future
  engine/runner change ever made behaviour depend on a literal id (a hash of an id
  leaking into routing, a scene id special-cased), every literal-pack oracle would still
  pass while THIS one diverged — a loud signal nothing else gives. (b) Contamination-
  robustness witness for the benchmark ([[ultraplan-true-goal-pivot]]): because a pack
  mechanically relabels into a surface-different but structurally identical twin, a model
  that "solved" the original by memorising its id strings gains nothing on the twin, so
  the eval measures structure-following, not string recall. The relabeler is also the core
  primitive for cheaply evolving the eval distribution ([[fresh-pack-generator]]).

scope: >
  CYOA only this cycle (choice-only action space, fully deterministic, cheap to exhaust —
  the same scope boundary the bug_0121 reachability oracle drew before its parser/rpg
  extensions). Parser (also deterministic) is the natural next extension; RPG's seeded
  rolls would need the best/worst-roll bracket the rpg reachability oracle already uses.

out_of_band_teeth: >
  Genuine behavioural witness, not vacuous green. Temporarily breaking the relabeler at a
  LOAD-BEARING id site — making relabelChoice keep the OLD `next` (a dangling transition
  target) — fails all 6 CYOA packs (reached-set and state-count diverge); restoring it
  returns 7/7 green. (A first witness attempt on the `goto` EFFECT was a no-op because
  CYOA packs never author a raw goto — the runner synthesises it from `next` — so the
  witness was re-aimed at `next`, the site CYOA transitions actually use.)

regression_test: tests/regression/cyoa_metamorphic_relabel.test.ts

verification: >
  npx vitest run tests/regression/cyoa_metamorphic_relabel.test.ts → 7 passed (1 discovery
  guard + 6 packs). Non-vacuity confirmed by the broken-`next` witness above. npm run
  health GREEN (EXIT 0): verify:integrity OK (no GUARD_WEAKENED / VERIFIER_TOUCHED /
  HASH_PIN / PROTECTED — only new test + support + trace), typecheck/lint/prettier clean,
  full suite green (+1 file / +7 cases), all 15 packs validate 0/0, coverage playtest ✓.
  No pack hash, scorecard byte, or corpus seal moved.

files_changed:
  - tests/regression/support/relabel_cyoa.ts                 # typed metamorphic relabeler for CYOA packs (new)
  - tests/regression/cyoa_metamorphic_relabel.test.ts        # the contamination-robustness oracle (new)
  - traces/bugs/bug_0209_cyoa_metamorphic_relabel_oracle.yaml
