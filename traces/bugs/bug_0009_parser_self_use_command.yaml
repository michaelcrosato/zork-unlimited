bug_id: bug_0009
pack_id: alchemists_tower_v1
seed: 13
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T06-09-34-002Z/playtest.md
  finding: >
    Playtest target rotated off the heavily-polished cyoa packs (watchtower
    bug_0002-0007, clockwork bug_0008) onto a genuinely UNVERIFIED target: the two
    parser packs are unsolved by the deterministic coverage bot (0/60 ended), so
    their quality had never been confirmed by play. A fresh, MCP-only blind
    playtester solved The Alchemist's Tower to full score (35/35) and reached the
    clued death ending (recoverable via save/load), rating it clarity 4/5,
    enjoyment 3/5. Its sharpest finding (report §5, scene laboratory / black_phial):
    after taking the black phial, the only action that consumes it rendered as the
    command "use black phial on black phial" (id use_black_phial_on_black_phial) —
    a USE whose item AND target are the same object. It reads like an authoring
    bug, and it contradicts the recipe's own warning, which says "Do not DRINK
    it" while the matching action said "use X on X".
failure:
  type: nonsensical_action_label
  where: [engine:src/parser/legal_actions.ts, engine:src/parser/command_map.ts]
  description: >
    The legal-action generator rendered every USE interaction as
    `use <item> on <target>`, with no special case for a self-targeted USE
    (item === target) — the legitimate "consume this thing" pattern (drink the
    phial, eat the bread). So the black phial's self-consumption surfaced as the
    redundant, illegible "use black phial on black phial". The human command parser
    had the mirror gap: it only accepted `use <x> on <y>`, so the bare, natural
    "use black phial" was rejected with "Use what on what?". The action was always
    mechanically correct (it fired ending_poisoned); only its surface text was wrong.
fix:
  layer: engine
  summary: >
    Generic, pack-agnostic engine fix. (1) src/parser/legal_actions.ts: a USE
    interaction whose item === target is now surfaced as id `use_<obj>` with
    command "use <obj>" instead of "use <obj> on <obj>". (2) src/parser/command_map.ts:
    the human `use` verb now accepts a bare "use <obj>" as a self-targeted USE, but
    ONLY when the object actually carries a self-interaction (checked via
    useInteraction) — so a non-self-use item like the crypt's rope still asks for a
    target and behaviour is unchanged for every other USE in every pack. No content
    pack was edited, so no content hash changed and no re-pin was needed. The only
    other touched test is tests/acceptance/stage3_alchemist.test.ts, whose death-path
    step id was updated use_black_phial_on_black_phial -> use_black_phial (a
    deliberate, surfaced flow update, not a weakening).
  reachable_endings_changed: false
  content_hash_changed: false
regression_test: tests/regression/parser_self_use_command.test.ts
