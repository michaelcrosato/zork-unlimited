id: bug_0180
title: "Pin the barrow's headline claim — The Sunken Barrow shade's +3 ward is MECHANICALLY load-bearing — with a SAME-STEP (PRNG-clean) concrete-play witness"
kind: test
mode: meta
severity: enhancement
layer: verification
artifact:
  source: content/rpg/quests/sunken_barrow.yaml
  test: tests/regression/rpg_barrow_ward_load_bearing.test.ts

summary: >
  bug_0102 retuned The Sunken Barrow's wight (hp22/atk5/def2) so the reaver-shade's ward DECIDES the
  wight fight, and bug_0113 raised the ward +2→+3 (defense 2→5) so prepared play reliably survives. Those
  claims are already pinned by concrete play — rpg_barrow_wight_prep_matters.test.ts (under-armed FULL
  ROUTE dies / warded FULL ROUTE wins, seed 2) and rpg_barrow_ward_reliable_survival.test.ts (40-seed
  reliability stats + a SAME-STEP isolation of the MARGINAL +1, def5 vs def4, seed 6). This cycle's
  mandated blind playtest (ai-runs/2026-06-03T14-16-58-318Z/playtest.md, seed 3, clarity 5/5, enjoyment
  4/5, zero bugs) re-raised the standing theme directly — the tester ran the warded-vs-unwarded
  comparison and noted "the unwarded wight fight is winnable [on this seed], so the warding is a
  strong-but-optional advantage." The load-bearing-ness of that optional ward is exactly the property
  worth a PRNG-clean witness, and this brings the barrow to verification parity with the sibling pack
  (bug_0179 did the same for The Cold Forge's founder's plate).

root_cause: >
  Not a defect — a verification-depth gap, the exact apples-to-oranges weakness bug_0179 identified and
  closed for cold_forge. The barrow's HEADLINE claim (bug_0102 — "preparation decides the fight", the
  death→victory flip) is proven only by comparing the UNDER-ARMED route to the WARDED route, which take
  DIFFERENT numbers of steps (the warded route detours west + runs the shade dialogue). The engine PRNG
  is (seed, step)-keyed (src/rpg/combat.ts), so the two routes draw DIFFERENT fight rolls — the flip is
  real but confounded by RNG, not isolated to the +3. The only existing SAME-STEP isolation
  (reliable_survival) covers the MARGINAL +1 (def4→def5), never the FULL +3 ward (def2→def5) the headline
  rests on. So a regression that re-softened the wight or weakened the ward's `inc_var: defense` could
  shift the comparison's outcome via the route's different rolls and still read plausibly green.

fix: >
  NEW tests/regression/rpg_barrow_ward_load_bearing.test.ts (4 cases) — a SAME-STEP concrete-play
  witness, the barrow counterpart to cold_forge_plate_load_bearing.test.ts (bug_0179). (1) the pack still
  validates green. (2) FAITHFUL LINKAGE: asking the shade's wight topic raises defense 2→5 (+3) and sets
  heard_warding by real play. (3) THE FULL WARD FLIPS A LETHAL FIGHT: at seed 2, from the identical
  under-armed pre-fight state (def2, full HP, AT the guard crypt — a fixed step), the UNWARDED copy is
  killed (ending_fallen) while the WARDED copy (def 5) — same step, same step-keyed d6 rolls, ONLY the +3
  defense differs — survives (wight_slain, hp>0). (4) THE CUSHION IS REAL: across seeds where both copies
  win (1,3,5,6,7,13,16,19), the warded player ends with STRICTLY MORE HP than the unwarded one. No change
  to content, engine, validator, schema, or any source — purely a regression test + this artifact.

witness: >
  Soundness rests on isolating the +3 ward from PRNG noise. The engine PRNG is (seed, step)-keyed and the
  warded route takes a side-detour (extra steps), so playing the warded vs under-armed routes would draw
  DIFFERENT fight rolls — apples-to-oranges. So the test fights two copies of ONE under-armed pre-fight
  state at the IDENTICAL step (the copy-mutate pattern of bug_0113 case 3 / bug_0179 case 3), differing
  ONLY in defense (2 vs 5, heard_warding set); both draw the same step-keyed stream. Per-round wight
  damage max(1, d6 + 5 - playerDef) is monotone DECREASING in the player's defense, so the def-5 copy can
  only ever take ≤ damage per round — a death→survival flip is therefore purely the +3 ward, never a
  lucky-roll artefact. The pack's own ward→+3 linkage is pinned separately by real play (case 2), so the
  two halves witness "the full ward is load-bearing" without mutating away the mechanic under test. Probe
  data over seeds 1-40 (deterministic committed PRNG, throwaway): from the under-armed guard-crypt step
  the ward FLIPS death→life at seeds 2, 8, 9, 10, 11, 12, 14, 15 (among others); on the both-win seeds
  the warded copy ALWAYS ends with strictly more HP (the cushion never violates) — consistent with
  bug_0102/0113's "decisive but not guaranteed" (the pack does not set combat_guaranteed; ~12% of warded
  seeds still lose by design, recoverable via save §8.7).

regression: >
  The new suite IS the regression: it fails loudly if a future retune re-softens the wight so the
  under-armed copy survives seed 2 (case 3), drops or shrinks the shade's `inc_var: defense` so the ward
  no longer reaches def5 (case 2) or no longer flips the fight (case 3), or lets the +3 be swallowed by
  the min-1 floor so the HP cushion vanishes (case 4) — the precise "preparation is cosmetic" defect
  bug_0102 was created to kill, here proven on identical rolls rather than a route-confounded comparison.
  No pinned hash changes (no content/state changed); the canonical barrow_victory trace is untouched.
