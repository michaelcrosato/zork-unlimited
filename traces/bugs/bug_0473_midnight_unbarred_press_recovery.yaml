id: bug_0473_midnight_unbarred_press_recovery
title: "Midnight Edition points unbarred proof-holders back to the alley"
pack: content/cyoa/pack/midnight_edition.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T222718Z_midnight_edition_seed7.md
severity: S1
symptom: >
  A blind playtester reached the press floor with the inspector's report proven
  but the alley door unbarred. The winning print option correctly disappeared,
  but the remaining actions did not explicitly tell the player how to recover.
root_cause: >
  The press-floor prose hinted at the unresolved alley threat, but the action
  list only offered spiking the story or a generic return to the composing room.
fix: >
  Add a proof-only, unbarred-only press-floor action that sends the player
  directly back toward barring the alley door first. Once the door is barred,
  the recovery action retires and the existing verified print action appears.
tests:
  - tests/regression/midnight_edition_branching.test.ts
verification:
  - npm test -- --run tests/regression/midnight_edition_branching.test.ts
  - npm run validate -- content/cyoa/pack/midnight_edition.yaml
  - npm run health
