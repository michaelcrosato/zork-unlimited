bug_id: bug_0061
pack_id: clockwork_heist_v1
seed: 17
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T17-02-59-454Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack The
    Clockwork Heist. A fresh, MCP-only blind playtester reached ALL FIVE endings across
    five runs (seed 17) — Truth x2 epilogue variants, Rich, Caught, Caught-on-the-Hour —
    rating it clarity 5/5, enjoyment 4/5, mechanically flawless (zero rejected actions,
    no loops, no soft-locks, no functional bugs; verdict "a real player finishes
    satisfied"). Its one actionable finding not already closed by the clockwork polish
    family (bug_0019/0040/0042/0043/0046/0051/0053/0058) is report §4/§5 #2: the
    deadline language oversells a timeout that does not exist. The foyer and gallery
    ticks>=2 variants said "your time in the manor is running short", which reads as a
    GLOBAL run-out-of-time loss; but the engine enforces no such timeout — the clock's
    only mechanical bite is the watchman it wakes onto the gallery at the hour
    (ticks>=4). The urgency text "writes a check the mechanics don't cash."
failure:
  type: urgency_text_oversells_unenforced_deadline
  where:
    - content:content/cyoa/pack/clockwork_heist.yaml
  description: >
    Two scene variants — foyer (ticks>=2) and landing/gallery (ticks>=2) — both ended on
    "...you sense your time in the manor is running short" / "your time in the manor is
    running short." That phrasing promises a countdown to a loss that never fires: there
    is no tick-limit ending, and the foyer is deliberately safe ground that does not even
    advance ticks. The real and only consequence of the climbing clock is the watchman's
    hourly patrol of the GALLERY (gated at ticks>=4 via `landing`'s cross_to_vault_blind
    vs approach_vault), which the ticks>=4 variants already narrate. So the ticks>=2
    foreshadow named a phantom global deadline rather than the concrete house-waking
    threat the mechanics actually deliver.
fix:
  layer: content
  summary: >
    Legibility/honesty-only edit to two reactive variants; no logic touched. The foyer
    ticks>=2 line now reads "...vast as a coffin — and a sleeping house keeps its peace
    only until the chime. Best be done upstairs before the hour stirs the manor awake."
    The gallery ticks>=2 line now reads "...grinds toward the hour, and you sense this
    long gallery will be no place to be caught standing when it chimes." Both repoint the
    urgency at the clock's real consequence — the house/watchman waking at the hour —
    instead of an unenforced global timeout. Kept atmospheric: no specific unseen clue
    (e.g. the steward's ledger or brass plate) is quoted at ticks>=2, honouring the
    bug_0058 plate-leak lesson, since these variants can fire before the player has
    visited the study; the ticks>=4 foyer/gallery variants already name the watchman
    outright, so the tick-2 foreshadow is consistent escalation. NO flag/tick/route/
    gating/reachable-ending change: the watchman tuning (bug_0019/0040/0042/0043) and the
    five endings are untouched.
  reachable_endings_changed: false  # still rich / truth(x2) / caught / patrol; all routes intact
  content_hash_changed: true        # clockwork is unpinned in unit tests (only watchtower_road is pinned). 82491f3f1938e64761329803ea701ba3eb7a9c4b5da3b408431399929f425296 -> 0b576c29d9780ab33747c8d531f90608786c015e97aa7985351538d88bffe24f
  regression_test: tests/regression/clockwork_deadline_honest_text.test.ts
verified_live: >
    Through the engine over the compiled pack (seed 17), building observations the way
    the MCP server does (buildObservation). At the foyer with ticks=2 (kitchens →
    dumbwaiter → back_down) the scene text no longer matches /time in the manor is running
    short/ and now names the chime/house-waking; at the gallery with ticks=2 (kitchens →
    dumbwaiter) it no longer matches that phrase and names the gallery being no place to
    stand at the chime. Both still surface the deadline (the variant still fires at tick 2)
    and stay distinct from the ticks>=4 patrol prose. All five endings still fire
    (rich/truth-displayed/truth-hidden/caught/patrol).
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest remains the load-bearing quality
    signal; seed 17 rated the pack shippable and this fix closes its one remaining
    actionable finding (the deadline language oversells an unenforced timeout), continuing
    the clockwork polish family without touching its tuning.
