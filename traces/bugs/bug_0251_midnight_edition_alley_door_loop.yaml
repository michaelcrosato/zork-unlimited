# Surfaced by the mandated blind playtest this cycle (ai-runs/2026-06-04T20-32-41-164Z/
# playtest.md, seed 53). midnight_edition came back STRONG — clarity 5/5, enjoyment 4/5, all
# five endings reached, scoring 0→35 sound, the diligence fork tight — but the blind player
# found one REAL mechanical defect at the alley_door scene and two softer polish notes. This
# fixes the mechanical one (the no-progress loop) and the stale-hub-text it dragged in; the
# other two notes (the alley subplot is decoupled from the main stakes by design; the
# ending_death flag framing) are deliberate authorial choices left as-is, recorded in
# AI_LOOP_STATE.md.
findings:
  - id: alley_door_is_a_byte_identical_no_progress_loop
    where: scene:alley_door
    severity: low
    description: >
      Both ways of barring the inking-room door — the plain `bar_door` ("Drop the bar across
      the door and step back inside.") and the `steady_and_bar` nerve check — set NO flag and
      route back to composing_room. Re-entering the alley therefore re-rendered the scene
      BYTE-IDENTICAL ("One of them tries the latch as you watch."), re-offered all three of the
      same actions, and let the player re-bar the very same door indefinitely; the menace never
      resolved. A blind playtester hit exactly this: "Alley is a no-progress loop … after
      barring the door I returned and the alley scene was byte-identical … you can re-bar the
      same door indefinitely." Worse, with door-barred state never recorded, returning to the
      composing room re-showed its OPENING prose — "boots on the cobbles that do not sound like
      printers going home" — describing Garrow's wrecking crew as an unknown, unaddressed
      background threat AFTER the player had gone out, seen the four men with hammers, and
      barred the door against them. That hub text is the same stale-on-re-entry / bug_0232
      narrative-freshness class as bug_0248 (watchtower on_the_trail), bug_0249 (lamplighters
      dry font), bug_0250 (breaking_weir lodge).
    fix: >
      Record the barred door in a new MONOTONIC flag, `door_barred`, set identically by
      `bar_door` AND by BOTH branches (on_success / on_failure) of the convergent `steady_and_bar`
      check — so the check stays exactly convergent (both branches still reach composing_room
      with IDENTICAL vars/flags/quest; only the append-only, fingerprint-excluded journal
      narration differs). Three consequences keyed off door_barred:
        (1) a most-specific alley_door variant (placed first) describes the door as already
            barred and the men still outside but held off — no more byte-identical re-render;
        (2) the two bar choices are gated `not_flag: door_barred` (you cannot re-bar a barred
            door) and a plain `back_inside` return appears, so the scene RESOLVES instead of
            looping, while the rash `confront_men` pole stays open (you may still go out);
        (3) a composing_room variant (ordered below the knows_proof / read_letter variants, so
            it fires only in the barred-but-letter-unread case those two don't cover) replaces
            the naive "boots … do not sound like printers" hub prose with text that names the
            barred door and the now-known wrecking crew.
      Reactive TEXT + flow ONLY: door_barred gates NO choice the coverage bot needs for
      completion, opens/closes NO ending, rides NO score award, and never advances the_edition.
      All five endings stay reachable (ending_silenced via the still-ungated confront_men), and
      the EXACT max_score=35 best path is untouched (it never visits the alley).
failure:
  type: design_polish
  description: >
    No engine fault or determinism break. A genuine no-progress LOOP (the kind run_playtest's
    soft-lock heuristic guards against) plus the bug_0232 stale-hub-text it caused. The
    coverage bot misses it because it does not judge whether re-entering a scene says something
    new, and the score/ending exhaustive proofs were untouched by the orphaned alley thread.
    Caught by the mandated blind playtest.
regression_test: tests/regression/midnight_edition_alley_door_loop.test.ts
notes: >
  The two softer playtest notes are deliberate and NOT bugs: (a) the alley subplot is a
  decorative cul-de-sac decoupled from the main print-line stakes — an intentional optional
  pole, not a thread the main path must cash; (b) ending_libel is death:true ("death of the
  cause") while ending_silenced is death:false ("you are a long while mending" — the player
  survives) — a defensible framing the header comment establishes on purpose. Left as authored.
