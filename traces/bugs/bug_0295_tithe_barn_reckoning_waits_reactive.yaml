regression: tests/regression/tithe_barn_reckoning_waits_reactive.test.ts

summary: >
  The reckoning scene's knows_truth variant opened "The thief straightens against the
  sacks, past running, and meets your eye..." — a description that reads naturally for a
  first approach but gives no signal that the woman held still while the watchman walked
  away mid-confrontation to read the ledger (the back_to_floor → read_book → face_thief
  path). The implicit time-pause was unacknowledged.

fix: >
  First sentence of the knows_truth variant changed to "She has not moved; she straightens
  against the sacks to meet your eye, past running…" Works for both the direct informed
  approach (read first, face after) and the mid-confrontation book-detour (face → back →
  read → face again). Prose-only; no flag/route/choice/ending change.

evidence:
  playtest_report: ai-runs/2026-06-08T07-01-32-096Z/playtest.md
  quote: >
    "A curious player might wonder why the thief just waits patiently while the watchman
    ambles back to read a ledger. The game doesn't acknowledge this pause."
