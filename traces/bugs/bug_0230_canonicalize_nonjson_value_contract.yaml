id: bug_0230
title: "Absolute contract pin for the canonicalizer on non-JSON-safe values (undefined/function/NaN/±Infinity/BigInt) — the determinism-keystone leg bug_0228 named as the last open small key-free lever, with the untrusted-Infinity load-integrity witness"
kind: verification_oracle
mode: meta/tooling
severity: enhancement
layer: verification/determinism-keystone
artifact:
  source:
    - src/core/hash.ts
  test:
    - tests/regression/canonicalize_nonjson_value_contract.test.ts

summary: >
  hashState — the save-integrity / trace-replay / scorecard determinism keystone — rests entirely on
  canonicalize(value) = JSON.stringify(sortDeep(value)) (src/core/hash.ts, spec §8.6). The only existing canonicalize
  coverage (tests/unit/hash_rng.test.ts) pins ONLY the JSON-safe happy path: key-order insensitivity, array-order
  sensitivity, recursive sort, shortHash slicing. It says NOTHING about the values JSON.stringify treats specially —
  undefined, functions, NaN/±Infinity, BigInt — yet those are exactly the values that decide whether two distinct-looking
  GameStates COLLIDE to one hash or the canonicalizer THROWS. This cycle freezes that contract: the non-JSON-safe-value
  leg of the same SoundnessBench absolute-witness discipline bug_0228 brought to the RNG (known-answer vector) and
  bug_0182/0218/0227 brought to the content validators + meta-verifier guard (negative corpus). Named explicitly as the
  last open small key-free lever in bug_0228's next-focus (2) and bug_0227's next-focus (4).

root_cause: >
  Not a defect in canonicalize and NOT a discovered live bug — a verification-DEPTH asymmetry. canonicalize is correct
  today; the gap is that the only thing pinned was its JSON-safe behaviour, never its behaviour on the special values.
  This is load-bearing on the untrusted-input boundary: traces/bug_0190_infinity.json loads vars.hp = 1e999 (= Infinity)
  straight off disk into a GameState that gets hashed (the bug_0181/0190 load-integrity arc), and a non-finite numeric
  var silently collapses to the same hash as null. A future change to the canonicalizer — a replacer that preserves
  Infinity, BigInt support, a uniform-null serializer — would silently shift the digest of states that hash a special
  value while every existing canonicalize test stayed GREEN, invalidating dependent trace hashes with no attributable
  cause. Triggered by the deterministic content assessor running SATURATED (all 15 packs blind-clean; this cycle's
  mandated blind pass on watchtower_road came back clean 5/5 clarity, its one lead — the climb_stairs route — resolved
  to a NON-defect: a fully-wired beacon/raised_alarm consequence layer, not filler), so the lever rotated to this
  verified-OPEN structural asymmetry rather than churn the repo's single hash-pinned pack.

witness: >
  THE TEETH, verified out of band (non-vacuity): with the test passing 10/10 against the real module, perturbing
  canonicalize to preserve non-finite numbers as strings (a JSON.stringify replacer instead of the default null
  collapse) turned 4 of the 10 tests RED — the "non-finite -> null" string contract, the object NaN->null+sort case,
  the array positional-null case, AND the untrusted-Infinity load-integrity collapse witness
  (hashState({vars:{hp:Infinity}}) === hashState({vars:{hp:null}})). Restoring the file from git
  (git checkout -- src/core/hash.ts; git diff empty) returned the suite to 10/10 GREEN. Each pinned contract is a
  genuine, attributable witness — a change to the canonicalizer fails HERE, at the keystone, not as a downstream
  trace-replay cascade.

fix: >
  ONE new regression file, tests/regression/canonicalize_nonjson_value_contract.test.ts, importing the REAL
  canonicalize/hashState from src/core/hash.js (never a reimplementation) and freezing the contract on the special
  values: a non-serializable TOP-LEVEL value (undefined / a function) yields the bare value undefined (NOT a string);
  non-finite numbers serialize to the string "null"; BigInt is NOT canonicalizable and throws TypeError (top-level and
  as an object value — the canonicalizer is not total, so a BigInt var would crash the hash); object keys with
  undefined/function values are DROPPED entirely while keys stay recursively sorted ({b:NaN,a:1} -> '{"a":1,"b":null}');
  array holes become POSITIONAL null with length preserved ([NaN,Infinity] -> '[null,null]'); the object-drop vs
  array-null collapse modes are asserted DISTINCT (non-vacuity, catches a future uniform-null serializer). Plus the
  load-integrity witness block: hashState collapses Infinity/-Infinity/NaN vars to the same digest as null (the
  bug_0190 hp:1e999 case) but does NOT swallow finite values (0/1 hash differently — non-vacuity), and a
  non-serializable top-level value hashes the empty string's SHA-256 (e3b0c442..., a fixed portable KAT).

scope_honesty: >
  This is the absolute-contract WITNESS for a canonicalizer that is already correct today (parity with
  bug_0182/0218/0227/0228) — NOT a discovered live defect, NOT a soundness exploit, and NOT a claim that the
  Infinity->null collapse is wrong (it is the deliberate JSON contract; numeric-range VALIDATORS, not the hash, reject
  bad states). Pure test addition: NO change to src/core/hash.ts or any other source byte, NO engine/validator/schema/
  generator change, NO pack YAML, NO trace hash re-pin, NO scorecard byte, NO corpus/manifest change. Every frozen
  vector/contract was generated FROM the live implementation and verified against the real module before committing.

verification: >
  npx vitest run tests/regression/canonicalize_nonjson_value_contract.test.ts -> 10 GREEN (7 canonicalize contract
  cases + 3 hashState load-integrity witness cases). Non-vacuity confirmed (see witness; src/core/hash.ts restored
  byte-identical, git diff empty). npm run health -> GREEN (exit 0), net test count ROSE by exactly the 10 new cases.
  npm run verify:integrity -> exit 0, NO VERIFIER_TOUCHED / GUARD_WEAKENED / HASH_PIN / assertion-count regression (the
  new file is not protected; src/core/hash.ts byte-unchanged). No pack content changed -> bug_0194 scorecard freshness
  pin stays green, no regen.

files_changed:
  - tests/regression/canonicalize_nonjson_value_contract.test.ts (NEW)
  - traces/bugs/bug_0230_canonicalize_nonjson_value_contract.yaml (NEW, this file)

regression: >
  The contract IS the regression: it fails loudly if the canonicalizer's treatment of any special value ever drifts (a
  replacer preserving Infinity, BigInt support, a uniform-null collapse, dropping the recursive sort) — exactly the
  change that would silently shift the digest of every state hashing a special value (incl. an untrusted Infinity var
  loaded off disk) while every JSON-safe canonicalize test stayed green. On a deliberate canonicalizer change, the
  operator must re-derive these contracts AND re-pin every dependent trace expected_final_hash — never relax the
  assertion to pass. No source/script/validator/schema/generator/engine change, no pack YAML, no scorecard byte, no
  corpus/manifest, no src/core/hash.ts change — purely additive (2 new files).
