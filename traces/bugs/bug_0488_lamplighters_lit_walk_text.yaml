id: bug_0488
title: "Lamplighter's Round lamp-walk still called the great lamp wholly out after lighting"
pack: content/parser/pack/lamplighters_round.yaml
reported_by: blind_playtest_20260623T015117Z_lamplighters_round_seed7
severity: minor
symptom: >
  A blind MCP playtest lit the great Staith-Head lamp, returned to the Lamp-Walk,
  and still saw the hub description say the greatest lamp north was "wholly out"
  and "a black shape against a blacker river." That contradicted the lamp_lit flag,
  the 35/35 score state, and the newly opened path down to the child.
root_cause: >
  The Lamp-Walk had a reactive variant for store_open, but no more specific
  variant for the later lamp_lit state. Because store_open remains true after
  lighting, the open-store text continued to win and preserved the stale unlit
  prose.
fix: >
  Added a lamp_lit plus store_open Lamp-Walk variant before the generic
  store_open variant. The new text keeps the open-store affordance while naming
  the great lamp as burning gold through the fog.
tests:
  - tests/regression/lamplighters_stale_room_descriptions.test.ts
verification:
  - npm test -- --run tests/regression/lamplighters_stale_room_descriptions.test.ts
  - npm run validate -- content/parser/pack/lamplighters_round.yaml
