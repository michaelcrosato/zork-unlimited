bug_id: bug_0480
pack_id: apothecaries_standard_v1
seed: 7
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: blind-tester/reports/20260622T235932Z_apothecaries_standard_seed7.md
  finding: >
    The mandated blind pass found Apothecaries' Standard mechanically clean and
    rated clarity 5/5, enjoyment 4/5, but flagged the optional drain-cock skill
    check as the one design concern with opaque risk/reward. The visible command
    read "check glass drawstick on drain cock", and the room did not explain why
    a player would roll steadiness or what failure could cost.
failure:
  type: optional_skill_check_context_gap
  scene: dispensary
  description: >
    The drain-cock check is deliberately convergent and off the critical path, but
    its previous presentation made it look like a black-box mechanic. The command
    word order emphasized the tool rather than the target, and the dispensary prose
    did not tell the player that the check was a batch-recency inspection with only
    a harmless small-spill failure.
fix:
  layer: content
  pack: content/parser/pack/apothecaries_standard.yaml
  summary: >
    Added dispensary variants for the state where the player carries the glass
    drawstick and has not yet checked the drain cock. The prose now frames the
    check as dating the batch's last decanting and says a slip would spill only a
    few sweet drops. Added a command_template so the action displays as "check
    drain cock with glass drawstick" instead of the vague reversed phrasing. The
    skill check, outcomes, score, routes, endings, and gates are unchanged.
  reachable_endings_changed: false
  content_hash_changed: true
  new_pack_hash: 16a786d7bc60b22068a9a71fe37b6271a24034e8c9665912a98c98740a1e588c
  regression_test: tests/regression/apothecaries_drain_cock_check_context.test.ts
verified_live: >
  Focused regression coverage passed: apothecaries_drain_cock_check_context,
  apothecaries_counter_exit_sync, apothecaries_back_passage_complete_variant, and
  apothecaries_counter_reactive_items ran 17 assertions green. Pack validation
  reports OK with 0 errors and 0 warnings for content/parser/pack/apothecaries_standard.yaml.
playtest_coverage:
  note: >
    This is a polish fix from a clean blind run. The optional skill check remains
    convergent and non-scoring; the change only makes its purpose and downside
    legible before the player chooses it.
