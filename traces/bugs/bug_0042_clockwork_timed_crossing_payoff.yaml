bug_id: bug_0042
pack_id: clockwork_heist_v1
seed: 91
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T12-36-56-864Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester reached all four endings
    across four runs (seed 91), rating it clarity 5/5, enjoyment 4/5, mechanically
    flawless — zero rejected actions, no loops, no soft-locks, no bugs. Its one
    substantive friction (report §4): "the repeated 'time is running short' warnings
    may slightly over-promise a ticking-clock threat that a careful player never
    feels — the only time-gated danger is the guard, which is itself gated behind
    the gallery." In other words, the deadline's payoff is silent for the player who
    plays it right.
failure:
  type: silent_payoff_beat
  where: [content:content/cyoa/pack/clockwork_heist.yaml]
  description: >
    The steward's ledger is the heist's signature clue: reading it promises "a guard
    who walks the gallery on the hour... now that you know his rounds, you could time
    a crossing he'd never catch" (study / read_ledger). Mechanically that pays off —
    on the hour (ticks >= 4) a ledger reader keeps the safe `approach_vault` crossing
    while a no-ledger player gets only the blind gamble (bug_0019 / bug_0040). But the
    safe crossing itself was a SILENT non-event: `approach_vault` routed straight to
    `vault_door`, whose base text ("The vault's clockwork lock ticks under your
    fingers...") never acknowledged that the player had just threaded a live patrol
    using stolen knowledge. The heist's tensest, most skillful moment — sneaking past
    the watchman exactly as the ledger swore — read as an ordinary stroll, so the
    clock the prose keeps drumming up never lands for the player who earned its payoff.
    (Not a reachability/gating bug: every route and ending is unchanged; purely a
    missing-payoff prose flaw.)
fix:
  layer: content
  summary: >
    Additive reactive-text only, using the pack's existing CYOA `variants` feature
    (same mechanism as the foyer/kitchen/gallery clock prose). `vault_door` gains one
    variant, `when: [var_gte ticks 4, has_flag read_ledger]`, that narrates the timed
    crossing before the lock-picking line: "You wait, pressed to the automata, until
    the watchman's lantern sweeps to the gallery's far end — then cross in its wake
    and crouch at the vault while his tread recedes, just as the ledger swore you
    could." The condition fires EXACTLY when the player has just timed the patrolled
    crossing: by construction `vault_door` is only reachable at ticks >= 4 via the
    ledger-gated `approach_vault` (a no-ledger player past the hour gets the blind
    gamble -> ending_patrol, never this door), so the beat shows only to the player
    who pulled it off and never to a pre-hour crosser (who sees the calm base text).
    No choice, effect, flag, item, exit, gating, or reachable ending changes — the
    no-soft-lock / escapable-deadline invariants bug_0019 and bug_0040 deliberately
    locked are untouched.
  reachable_endings_changed: false  # still rich/truth/caught/patrol; all routes intact
  content_hash_changed: true        # clockwork_heist yaml prose edited; clockwork is unpinned (only watchtower_road is pinned in tests)
  also_touched:
    - tests/regression/cyoa_reactive_scene_text.test.ts  # bug_0018 used vault_door as its variant-less control; vault_door now has a variant, so the control is repointed to the still-variant-free `crawlspace`. The test's intent (a variant-less scene returns base text byte-identically) is preserved, not weakened.
regression_test: tests/regression/clockwork_timed_crossing_payoff.test.ts
verified_live: >
  Through the engine over the compiled pack (seed 91). A ledger reader who arrives at
  the vault door on the hour (the thorough kitchen-pick / study-ledger route, ticks 4,
  patrol active) sees the new timed-crossing prose; a pre-hour crosser (straight-shot
  rich route, ticks 2) and a reader who crosses before the hour see the calm base
  text; the no-ledger player never reaches the door at the hour at all. All four
  endings still fire and the bug_0008 lockpick-less nudge is unaffected.
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest is the load-bearing quality
    signal here and has surfaced the silent-deadline nuance across cycles (this cycle
    seed 91; the same family of "the clock never bites careful play" notes drove
    bug_0019 and bug_0040).
