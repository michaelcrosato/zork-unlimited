  seed: 31
  result: >
    A second fresh source-blind MCP-only subagent reached all FOUR declared endings (doors /
    fall / bounty / mercy), rated clarity 5/5, enjoyment 5/5, ZERO bugs — "genuinely excellent
    short literary CYOA... every ending morally distinct and well-earned." Confirmed the
    state-aware granary_floor + reckoning reframes (knows_truth adds the reframe prose AND
    unlocks open_doors), the gated doors ending, the telegraphed loft-death, clean flag/journal
    persistence, and that private mercy and public liberation do NOT converge. Hits the
    wreckers_light 5/5 bar — the white_stag 4/5 gap this pack was built to close.

design:
  thesis: >
    A moral fork, not a lock-and-key chain — the OBVIOUS, sanctioned goal is the dark one.
    You are the night watch the lord pays to guard his full grain-barn in a famine; the law
    makes a thief at it a hanging matter and the lord pays silver for one brought in, and you
    are as hungry as the town. To take the caught thief is the easy, legible choice; the depth
    is the player who looks at what they are guarding. The hidden "truth" (the steward's open
    account-book proving the barn is held full to rot to keep the price climbing, on the lord's
    sealed order) is the wreckers_light/white_stag device: reading it sets knows_truth, which
    fires reactive endingText variants on the bounty and the mercy AND unlocks throwing the
    doors — the gated "best" ending. The dramatic irony: the sanctioned act (keep the law)
    guards a lie, while the lawless act (open the doors) is the just one.
  why_distinct_from_white_stag: >
    white_stag's two mercy outcomes converge (spare on instinct vs spare knowing — the stag
    lives either way). Here the private mercy (ending_mercy: one family eats, the barn stays
    locked on the rest) and the public liberation (ending_doors: the whole town eats, the
    hoarding breaks, you are named outlaw) are GENUINELY DISTINCT stances with distinct
    outcomes — the FOUR-distinct-stances structure that earns wreckers_light its 5/5.
  endings:
    - id: ending_bounty
      reach: "watch_post -> granary_floor -> reckoning -> take_her"
      note: "betrayal; base text = a man keeping the law, knows_truth variant = a knowing betrayal over a read lie"
    - id: ending_mercy
      reach: "watch_post -> granary_floor -> reckoning -> let_her_go"
      note: "private mercy; base text vs a knows_truth 'saved the one you could see' haunted half-measure"
    - id: ending_doors
      reach: "watch_post -> granary_floor -> ledger(decipher) -> granary_floor -> reckoning -> open_doors"
      note: "GATED on knows_truth — public justice; the whole town fed, the hoarding broken, you outlawed"
    - id: ending_fall
      reach: "watch_post -> granary_floor -> climb_loft"
      note: "greed-death; the base granary_floor text telegraphs the loft ladder 'grey and soft with rot'"

