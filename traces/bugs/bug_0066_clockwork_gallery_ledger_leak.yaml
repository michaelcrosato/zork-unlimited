bug_id: bug_0066
pack_id: clockwork_heist_v1
seed: 23
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T18-05-10-202Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester reached all four endings
    (Truth x2 epilogue variants, Rich, Caught, Caught-on-the-Hour) across five runs
    (seed 23), rating it clarity 5/5, enjoyment 4/5, mechanically flawless — zero
    rejected actions, no loops, no soft-locks. Its one concrete, not-already-closed
    finding (report §5): on the "Caught on the Hour" route (Run 4) the player paces up
    to the hour without ever reading the ledger, yet the live gallery scene text at the
    hour says "the hourly patrol the steward's ledger warned of." Naming the ledger to a
    player who never read it attributes foreknowledge they don't have — the same class
    of leak as the bug_0058 brass-plate echo, in a pack whose every other reactive line
    is gated on what the player actually knows.
failure:
  type: scene_text_references_unseen_clue
  where:
    - content:content/cyoa/pack/clockwork_heist.yaml
  description: >
    The `landing` (gallery) scene's at-the-hour variant (`var_gte: ticks 4`) said "the
    hourly patrol the steward's ledger warned of" UNCONDITIONALLY. But the gallery is
    reachable at the hour with `read_ledger` unset — a player can burn ticks pacing up
    the grand stair and back without entering the study at all (the only tick sources are
    kitchen/landing/study). The `cross_to_vault_blind` choice exists precisely for that
    no-ledger-at-the-hour player (`var_gte: ticks 4` AND `not_flag: read_ledger`), so the
    line reliably fires for players who never read — and may never have seen — the ledger
    it names, presuming a foreknowledge they don't have.
fix:
  layer: content
  summary: >
    Route-aware legibility fix, mirroring the bug_0058 plate-leak philosophy and the
    pack's existing variant discipline. The `landing` `ticks>=4` variant is split on
    `read_ledger` (first-match-wins, higher specificity first): (1) `ticks>=4` AND
    `has_flag: read_ledger` keeps the existing ledger callback ("the hourly patrol the
    steward's ledger warned of") — the payoff for the study clue, pre-seeded by the
    read_ledger journal line and matched by the safe `approach_vault` crossing; (2) a new
    `ticks>=4` (ledger-naive) variant for the non-reader simply shows the watchman's
    lantern sweeping the gallery at the chime, with no claim of prior warning — matched by
    the `cross_to_vault_blind` gamble that is the only crossing offered to that player. The
    `ticks>=2` and base cases are untouched. The death-screen `ending_patrol` text ("if
    only you had stopped to read it") is left as-is: it is only reachable via
    `cross_to_vault_blind` (not_flag read_ledger) and reads correctly as a post-hoc lesson
    revealing what the player missed (the playtester agreed). NO flag/tick/route/gating/
    reachable-ending change; the choice gates already mirror the new prose split.
  reachable_endings_changed: false
  content_hash_changed: true        # clockwork is unpinned in unit tests (only watchtower_road is pinned). ff0ada19cce4224bf8065e7bc5d811065a9a6a11689e2b2dba1681df077c2a25 -> f8f2bbdd38374d042a46d05a2dc8165392ea9348b7899e21df8a798a6100d499
  regression_test: tests/regression/clockwork_gallery_ledger_leak.test.ts
verified_live: >
    Through the engine over the compiled pack (seed 23), building observations the way the
    MCP server does (buildObservation). No-ledger route to the hour (climb_stairs/back_down
    paced to ticks 4, read_ledger unset): gallery text matches /watchman/ but NOT /ledger/,
    and the offered crossing is cross_to_vault_blind (not approach_vault). Ledger route at
    the hour (kitchen pick, study, read_ledger, leave_study, ticks 4): gallery text still
    matches "the steward's ledger warned of", and the offered crossing is approach_vault
    (safe). All four endings (rich/truth/caught/patrol) still fire.
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest remains the load-bearing quality
    signal; seed 23 rated the pack shippable (clarity 5/5, enjoyment 4/5) and this fix
    closes its one remaining concrete continuity finding, continuing the clockwork polish
    family without touching any tuning.
