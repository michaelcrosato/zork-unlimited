id: bug_0220
title: "Lamplighter death fork was unsound: the round-lantern was merely takeable (bug_0216), so a player carrying NO flame could still force the spirit-cask and die to prose presupposing a flame on their belt — made the lantern a new HELD (always-carried, never-dropped) object so the carried-flame premise is true on every path"
kind: engine_rule
mode: parser
pack: content/parser/pack/lamplighters_round.yaml
# A small, additive engine primitive plus a one-pack content edit. The primitive: an object may be
# `held: true` — seeded into the starting inventory and refused by DROP, so the player carries it
# the whole game. `held` is `.optional()` in the schema (absent stays absent), so EVERY existing
# pack compiles byte-identically and keeps its content hash; only lamplighters_round gains the flag.
# Pinned artifacts touched, both on purpose: (1) lamplighters' own content hash (recomputed at load,
# pinned nowhere); (2) the benchmark scorecard (traces/benchmark/scorecard.{json,md}) — a live
# rebuild of the heuristic bot, whose seeded trajectory on this pack shifts when the lantern's
# take/drop actions disappear and it starts in hand, so the freshness pin (bug_0194) is regenerated
# this same cycle (npm run benchmark --runs 50 --out traces/benchmark/scorecard). Only the random-
# strategy lamplighters row changed (scene_coverage 0.833 → 0.667); the headline curated coverage
# score is unchanged (0.366). The auto-discovered generic parser bar (all-endings reachability, no
# soft-lock, score-economy max==35, action-id uniqueness, variant liveness, metamorphic relabel +
# observation-stream isomorphism) re-derives clean over the edited pack; max_score stays 35.

summary: >
  This cycle's mandated blind pass (The Lamplighter's Round, parser, seed 7) again returned clarity
  5/5, enjoyment 4/5, mechanics flawless across all three endings — but it flagged a real soundness
  seam in the death fork it could not fully diagnose blind: forcing the spirit-cask fired the DEATH
  (ending_caught) "even without the lit lantern being explicitly lit … the round-lantern is treated
  as always-lit." A direct engine replay confirmed the worse case: run to the cask carrying ONLY the
  brass-key and store-key — the round-lantern left on its hook at river_stair, never taken — and
  `unlock sealed spirit-cask with store-key` STILL ends the game with ending_caught, whose every
  line presupposes a flame the player demonstrably is not carrying: "the rock-spirit's reek rolls up
  … straight into the little flame burning honest on your belt", "sealed … against exactly the flame
  you carried in to it", "You were the naked light." Inventory at death: [brass_key, store_key]. No
  flame on any belt.

root_cause: >
  bug_0216 made the round-lantern a TAKEABLE object so the carried open flame could be examined. But
  "takeable" is also "leave-able": the player can decline to take it, or drop it, and nothing binds
  it to them. Meanwhile the death is the engine's first-class UNLOCK firing unlock_effects:
  [end_game: ending_caught], keyed only on store_key (legal_actions.ts case UNLOCK hardcodes the
  condition to the lock's key_id and appends unlock_effects unconditionally). So the lethal outcome
  and all its prose assume a carried flame, while the flame is an OPTIONAL item — and a sealed
  naphtha cask cracked with no open flame near it would not even take fire. The death was unsound,
  not merely mis-narrated. bug_0216's artifact named this exact gap (`why_not_gate_the_death_on_
  holding_it`) and deferred it for want of an engine seam; this fixes it.

fix: >
  Two parts.
  (1) ENGINE — a new object primitive `held` (src/parser/schema.ts, model.ts, legal_actions.ts):
      • schema: `held: z.boolean().optional()` on ObjectSchema; superRefine rejects `held + takeable`
        (a carried object cannot also be picked up). Optional, so absent ⇒ compiled pack unchanged.
      • init: initStateForParserPack seeds every `held` object id into the starting inventory, in
        pack order, deterministically.
      • DROP: the resolver refuses to drop a held object, so DROP is never offered for it.
      • validator: HELD_ALSO_PLACED errors if a held object is ALSO listed in a room or container
        (two homes — inventory wins, the placed copy is dead; an authoring slip).
  (2) CONTENT — lamplighters_round.yaml: round_lantern becomes `held: true` (no longer takeable),
      removed from river_stair.objects; river_stair's description reframes the lantern as already at
      the lighter's belt ("burns low at your belt as it has all the round … a lighter cannot work a
      river fog without it"). Now the lamplighter carries the lit lantern from turn 0 and can never
      set it down — exactly the fiction the warnings always asserted ("the open flame you carry the
      whole night round and never put out", "a lamplighter is never without one"). The death is
      therefore sound on EVERY path that reaches it, the lantern stays examinable anywhere (always in
      hand, incl. at the three-way fork), and it still gates nothing: the win never needs it, the
      three routes are unchanged, max_score stays 35.

regression_test: tests/regression/lamplighters_round_fork.test.ts
# The bug_0216 block is rewritten as bug_0216 → bug_0220: round_lantern is held (not takeable),
# carried from the VERY FIRST turn (examinable at t=0, never offered to take, never droppable),
# still in hand and examinable at the three-way fork with no extra step, and — the soundness
# witness — forcing the spirit-cask on the MINIMAL route (no take step) kills you with the lantern
# provably in inventory and the narration naming the "flame … on your belt". All three endings stay
# reachable and unchanged. Plus generic-primitive locks in tests/unit/parser_validator.test.ts:
# content/broken-fixtures/parser_held_takeable.yaml (schema rejects held+takeable) and
# parser_held_also_placed.yaml (validator emits HELD_ALSO_PLACED). relabel_parser.ts carries `held`
# so the metamorphic twin stays isomorphic.

