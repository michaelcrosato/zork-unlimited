bug_id: bug_0119
pack_id: sunken_barrow_v1
seed: 7
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-02T11-22-38-112Z/playtest.md
  finding: >
    Mandated blind pass of The Sunken Barrow on the warded route (seed 7). A fresh,
    MCP-only blind playtester took the shade's +3 ward, fought the wight, WON, and
    rated the pack clarity 5/5, enjoyment 4/5 with NO hard bugs — but flagged one real
    friction (§4/§5): mid-fight at 8 HP versus a 12-HP wight "the deterministic math
    looked like a guaranteed loss, and I retreated thinking I was under-prepared,"
    saved only by a high variance roll. It then named the underlying risk: there is no
    heal/rest mechanic anywhere, so "a cautious player could reasonably conclude the
    encounter is unwinnable and quit" — backing out of the fight to look for healing or
    gear that does not exist. Docked the marquee fight to enjoyment 4/5 on exactly this.
failure:
  type: legibility_gap_player_may_abandon_winnable_fight
  where:
    - content:content/rpg/pack/sunken_barrow.yaml
  description: >
    This is the SAME failure mode as bug_0027 (a player quits a winnable game hunting
    for a missing item the pack never has), here on the wight rather than the slab. The
    fight is deliberately a narrow, tense, RNG-swingy gamble — bug_0102 gave it real
    teeth and bug_0113 tuned the warded route to a reliable ~88% win with a real HP
    cushion, both verified live over seeds 1-40. That balance is intended and is NOT
    the defect. The defect is legibility: the shade's counsel teaches the ward but
    never tells the player the ward is ALL the aid the barrow gives, so a prepared
    player who hits the designed mid-fight scare can rationally break off to seek the
    "more preparation" the game seems to imply exists, find nothing (no balm, no second
    weapon, no stat item — `might`/`attack` are fixed, the only buff is the one ward),
    and abandon a fight they were favoured to win. Pure mis-signal, not balance.
fix:
  layers: [content, hint_text]
  summary: >
    Apply the pack's standing honesty discipline (bug_0027/0029/0069) to the shade's
    spoken ward counsel. The ask_wight npc_text now adds, after the existing ward
    instruction, that there is no balm in the barrow, no second blade, no charm laid by
    — this ward is the whole of the help to be found; that the grim mid-fight moment
    "is the wight's way of wearing a man down, not the truth of the odds"; and to set
    your feet and keep striking rather than step back to seek aid that is not here
    (which "you only come again to the same fight, no fresher than you left it"). So the
    prepared player who hits the scare reads "press on", not "go find the gear you're
    missing". The under-armed player who skips the shade never hears this and stays in
    bug_0102's intended lethal gamble.
    PURE spoken npc_text: no flag / var / journal / score / topic / ending / DC / stat /
    enemy change. The +3 ward (defense 2->5), its one-shot retire, the lore topic, and
    the canonical victory trace's recorded JOURNAL text are all untouched.
  reachable_endings_changed: false
  content_hash_changed: true   # sunken_barrow yaml text genuinely changed (one npc_text rewrite)
  content_hash_before: 80ab4154a3bca527cac673ac3e35740688e8e81fda14fd30fe644a8d7eacaad4
  content_hash_after: 7546c419122ed8348ddac8ed43f4ffca440710312445be7598cfccadd1a5af45
  repin: >
    Deliberate, surfaced re-pin (NOT a weakening): traces/rpg/barrow_victory.json
    content_hash updated 80ab4154... -> 7546c419.... The trace's expected_final_hash is
    UNCHANGED (aa5f8649...): only spoken npc_text changed — narration, not state — so
    the canonical seed-1 warded victory replays to the identical final state hash
    (verified live; rpg_barrow_trace.test.ts green). This is the legitimate
    snapshot-update workflow (HASH_PIN_REPINNED, accompanied by a real content change),
    not an unaccompanied launder. No test SOURCE pins this pack's hash (only
    watchtower_road is pinned).
