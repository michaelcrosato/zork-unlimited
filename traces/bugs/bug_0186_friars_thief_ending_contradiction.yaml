id: bug_0186
title: "friars_postern: ending_thief epilogue contradicts the rob-after-learning state (blind playtest finding)"
kind: content_fix
mode: parser
severity: minor
pack: content/parser/pack/friars_postern.yaml
content_hash: 12e4da8a224335eb568e24a6227b29fe82f7152943bb2e84a4c360dddfacb275

summary: >
  The mandated blind pass this cycle ran on friars_postern (the 11th pack, shipped last cycle by
  bug_0185), parser, seed 11. The tester reached all three endings and rated it clarity 5/5,
  enjoyment 4/5, ZERO mechanical bugs — but flagged one concrete stale/contradictory-text flaw in
  the ending_thief ("The Poor-Fund") epilogue. The alms-box that fires ending_thief is reachable
  from BOTH states: rob it WITHOUT ever talking to the old woman, or rob it AFTER she has already
  told you the postern's trick (knows_postern set, postern open). The epilogue, however, was authored
  only for the first case and unconditionally asserted "The old woman never told you the postern's
  trick, and now she never will." On the rob-after-learning route the blind tester actually took,
  that line is false — she HAD told them, and the postern stood open one room away.

reproduction:
  pack: content/parser/pack/friars_postern.yaml
  route: "read clue -> lodge(take pipe + key-ring) -> commons: talk, ask_escape, ask_give_pipe (knows_postern set) -> chapel -> unlock_alms_box"
  observed: "ending_thief epilogue reads 'The old woman never told you the postern's trick, and now she never will' — but knows_postern is true on this route."
  expected: "the epilogue is true regardless of whether the postern was learned before the theft."

fix:
  layer: content
  change: >
    Rewrote the ending_thief epilogue (content/parser/pack/friars_postern.yaml) to drop the false
    universal claim and instead name the honest way out only as the thing the thief TURNED FROM —
    "Whatever honest way out of this house there was, you have turned your back on it for this" —
    which holds whether or not the postern was learned first. The mid-theft unlock_narrate ("the long
    honest way out: none of it matters now") was already true in both states and is unchanged. No
    engine/validator/schema change (endings render endingDef.text directly — no variant support — so a
    state-true single text is the correct minimal fix, not new engine surface).

within_the_bar: >
  Content-only edit to one ending's prose. validate_story stays 0/0. No production hash is asserted by
  any test for this pack (only watchtower_road pins a content_hash in test files); the informational
  content_hash in bug_0185's artifact was deliberately re-pinned (563ffba3… -> 12e4da8a…) to match.
  The bug_0185 regression (friars_postern_dialogue_key.test.ts) still passes unchanged — it asserts the
  ending_thief ID/score/non-death, never its epilogue text.

locked_by:
  test: tests/regression/friars_thief_ending_consistent.test.ts
  asserts:
    - "ending_thief is reachable BOTH with and without knows_postern set (the two rob routes)"
    - "the ending_thief epilogue no longer asserts the old woman never told the postern's trick"
    - "the epilogue still reads as the greed/poor-fund ending (names the poor-fund and the turning-from)"

verify: "npm run health EXIT 0"
