id: bug_0105
title: "The Sealed Crypt gains a climactic moral fork — the iron key opens the gate OR the founder's coffin"
kind: content_new
mode: parser
severity: enhancement
pack: content/parser/pack/sealed_crypt.yaml

summary: >
  Every blind playtest of The Sealed Crypt rated clarity 5/5 but enjoyment 3/5, and
  the single repeated knock was linearity: one lock-and-key chain, no real choices,
  a single ending. Across the whole loop the linear parser packs cap at enjoyment 3
  while the branching packs (clockwork_heist, wreckers_light) rate 4–5, and the
  standing top content next-focus was to retrofit a branch onto a linear pack like
  this one. bug_0105 does exactly that with a CONTENT-ONLY climactic moral fork.

blind_playtest:
  run: ai-runs/2026-06-02T07-50-34-062Z/playtest.md
  pack: content/parser/pack/sealed_crypt.yaml
  seed: 53
  result: "WON ending_victory 35/35; clarity 5/5, enjoyment 3/5; ZERO functional bugs"
  the_knock: >
    "Short and entirely linear with a single ending; the puzzle never branches or
    surprises … its only real limitation is scope — it leaves you wanting more
    breadth (branching, a second puzzle, or a meaningful choice), which is why
    enjoyment sits at 3 despite flawless execution."

the_fix: >
  The founder's own coffin (founders_coffin) now sits in the crypt under an iron
  clasp keyed — like the catacombs gate — to the iron key the player already
  carries. The iron key becomes a FORK, not just a key, giving the headstone's
  "THE CRYPT YIELDS ONLY TO IRON" a darker second reading:
    • UNLOCK the catacombs gate  → press on → ending_victory  (the UNCHANGED win)
    • UNLOCK the founder's coffin → take its silver reliquary → ending_plunder
  Both fire through the engine's first-class UNLOCK (the bug_0077 path the gate
  already uses): the coffin carries unlock_narrate + unlock_effects [end_game:
  ending_plunder]. Because plunder fires by end_game, the two endings are mutually
  exclusive — a genuine terminal choice, not a detour (the sunken_barrow ending_woken
  shape). ending_plunder is NON-death (the player chooses greed, they do not die).

why_within_the_bar: >
  Content-only, no engine/validator/schema change. The VICTORY route is byte-identical:
  the coffin adds no inc_var (meta.max_score stays 35) and no exit/flag/gating to the
  win path, so every prior route/score test is unaffected (sealed_crypt_scoring,
  ending_score_summary, parser_acceptance, sealed_crypt_final_step_legibility all pass
  unchanged). The validator stays green: END_GAME_UNDECLARED is satisfied (ending_plunder
  declared); WIN_IS_DEATH cannot fire (no win_condition resolves to plunder, and
  ending_victory is non-death); NO_WINNABLE_ENDING cannot fire (ending_victory remains).
  No new exit means no SOFTLOCK risk.

verification:
  command: npm run health
  regression_test: tests/regression/sealed_crypt_plunder_fork.test.ts
  cases:
    - "the fork is real: at the crypt with the iron key, BOTH unlock_crypt_gate and unlock_founders_coffin are legal in the same state"
    - "unlocking the coffin ends in ending_plunder (non-death), never reaches the catacombs, distinct from ending_victory; narration names the silver/reliquary"
    - "ending_plunder is non-death and reached ONLY by end_game; ending_victory stays the sole winnable win"
    - "the coffin needs the iron key — reaching the crypt without it offers examine but not unlock"
    - "the canonical victory route still wins ending_victory 35/35 (no regression)"
    - "the pack validates clean (no SOFTLOCK / END_GAME_UNDECLARED / WIN_IS_DEATH)"

content_hash:
  pack: content/parser/pack/sealed_crypt.yaml
  before: "(unpinned — sealed_crypt's hash is not pinned by any test or trace; only watchtower_road is)"
  after: 0ff57a59f6d9070b95dbeb7b0c7262138ff5d5a353d0904d2e2a5a4219e6b6c5
  note: >
    Deliberate, surfaced sealed_crypt content-hash change. sealed_crypt is NOT a
    protected file and NO test pins its content hash (confirmed; cf. bug_0034/0044/
    0054/0077 which all recorded the same), so the hash moves with nothing to re-pin.

notes: >
  This is the first branch retrofitted onto a previously-linear parser pack. It
  attacks the one enjoyment knock every blind report on this pack raised, using only
  proven mechanics (first-class UNLOCK + end_game), and keeps the canonical win and
  all its tests byte-identical.
