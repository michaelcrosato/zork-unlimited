bug_id: bug_0261
pack_id: alchemists_tower_v1
seed: 47                          # this cycle's blind-playtest seed; the regression drives seed 47
type: content_fix                 # pure content/legibility port (examine telegraph + reuse of the existing `in_room` predicate); no engine/validator/schema change, no flag/item/score/exit/ending/variant change to the structural proofs
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-05T00-03-26-064Z/playtest.md   # The Alchemist's Tower, seed 47 — this fix's source
  result: >
    Mandated blind pass ran on alchemists_tower (assessor rank-1). A fresh MCP-only blind
    playtester (seed 47) reached all three endings across three playthroughs —
    ending_cured 40/40 (win), ending_poisoned (death, drink the black phial), and
    ending_betrayal (non-death, 30/40, crack the silver casket) — rating clarity 5/5,
    enjoyment 4/5; "mechanically flawless," zero rejected actions, no loops, no
    stale/contradictory text; flags, quest stages (cure_known -> herb_steeped ->
    antidote_ready), the 5/10/20/5 score economy summing to exactly 40, lock/key chain,
    container open, and the USE-on-target brew steps all correct. Content was CLEAN.
  finding: >
    Report §4/§5: the optional self-USE steadiness beat ("grip iron key", id
    `use_iron_key`, USE iron_key on iron_key — the Stage-4 skill_check) reads as an
    unfired Chekhov's gun. It "presents a mysterious self-targeting USE the moment you
    pick up the iron key, with no in-world prompt for why," promises a payoff
    ("whatever you turn it on down here, you will turn it steady") that never lands, and
    — being a USE on a CARRIED item — trails the player through every room the key is
    held in (study, cellar, laboratory, spire), "setup with no payoff." Identical
    finding-family to sealed_crypt's bug_0241 (vestigial-looking grip) + bug_0258
    (grip leaked into every room).
root_cause: >
  The `steadiness` skill_check is DELIBERATELY CONVERGENT — it gates no exit, ending,
  score, win, or reactive variant on either roll outcome (the RPG-mechanic
  standardization beat for this parser pack; the convergent-check trick keeps the
  single-rules exhaustive proofs sound). So there genuinely IS no mechanical payoff by
  design, and the player rightly couldn't find one. Two legibility gaps made it read as
  a bug rather than an intentional character beat: (1) the iron key's examine was bare
  ("A heavy iron key, black with age."), giving no pre-commitment context for `grip iron
  key`; and (2) the beat was gated only by `not_flag: steadied_at_the_iron`, so the
  carried-item self-USE surfaced in every room rather than the one room its "before you
  set this key to any lock down here" fiction belongs to.
improvement:
  layer: content
  content:
    - content/parser/pack/alchemists_tower.yaml: >
        (1) iron_key description rewritten to telegraph the optional beat — "fit for a
        great iron lock … before you set it to anything down here, you might grip it a
        moment and steady your hand first" — so `grip iron key` reads as an intentional,
        clued tension moment (the bug_0241 leg). (2) the grip interaction conditions gain
        `{ in_room: great_hall }` alongside the existing `{ not_flag: steadied_at_the_iron }`,
        so the beat offers ONLY in the Great Hall — where the iron key's first real lock,
        the cellar hatch's great iron lock, stands; the "down here" the narration names;
        and the room every cure route crosses holding the key (the bug_0258 leg). The
        `in_room` predicate already exists (added by bug_0258); this reuses it, no engine
        change. Still optional and CONVERGENT: gates no exit, ending, score, win, or
        reactive variant on either roll outcome, so every structural proof and the
        40-point economy stay byte-identical — only WHERE the optional beat appears (and
        the examine prose) changed.
verification:
  - validate_story content/parser/pack/alchemists_tower.yaml         # ok:true, 0 findings
  - npm run health                                                   # exit 0 (verify:integrity static + typecheck + ESLint + Prettier + tests + every pack validate + watchtower coverage + playtest record)
  - probe (seed 47): examine telegraphs "steady your hand"/"grip it"; grip ABSENT in study (key taken) and cellar, PRESENT in great_hall; full cure route still wins ending_cured 40/40 with the grip exercised
locked_by:
  - tests/regression/alchemists_grip_room_gated.test.ts             # 3 cases: examine telegraphs the steady-your-hand/grip beat (keeps "great iron lock"); grip absent in study + cellar and present in great_hall; cosmetic — exercising the grip, the cure route still wins ending_cured 40/40
notes:
  verifier_integrity: >
    No check was weakened, disabled, or re-pinned. No engine/validator/schema touched —
    the `in_room` predicate was already shipped by bug_0258 (the relabel metamorphic
    oracles' room-id rewrite arm already covers it). alchemists_tower carries no pinned
    content hash (only watchtower_road is pinned in tests/unit/rpg_validator.test.ts), so
    this surfaced content change re-pins nothing. The steadiness skill_check is unchanged
    and remains CONVERGENT (gates no exit/ending/score/win/variant) — only its room of
    availability narrowed and its examine prose telegraphs it.
