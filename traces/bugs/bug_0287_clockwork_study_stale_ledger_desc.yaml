id: bug_0287
title: "clockwork_heist: study scene uses 'take what this page can tell you' / 'read a stolen page' even after read_ledger is set"
pack_id: clockwork_heist_v1
severity: content
class: reactive-description-blindness
where: [content:content/cyoa/pack/clockwork_heist.yaml]

summary: >
  The study scene's ticks>=2 variant closed with "take what this page can tell you
  and be gone before it strikes" and the ticks>=7 variant closed with "there is no
  still room left in which to read a stolen page" — both phrases presuppose the
  player has NOT yet read the steward's ledger. After taking the `read_ledger` action
  (setting has_flag: read_ledger), the player who returns to the study (e.g. on a
  high-ticks circuit, or after reading and immediately revisiting) still sees prose
  directing them to read a page they already read. Same class as bug_0282 (watchtower
  mossy_brook stale camp text), bug_0283 (tower_top brazier without lantern),
  bug_0284 (midnight_edition alley_door names Garrow before letter read),
  bug_0286 (crawlspace strongbox "locked fast" with picks in hand).

discovery:
  method: blind_playtest_analysis
  seed: 42
  report: ai-runs/2026-06-08T04-52-05-586Z/playtest.md
  note: >
    The blind playtester (seed 42) returned STRONG (clarity 5/5, enjoyment 4/5) with
    no mechanical bugs. Post-playtest structural review of the pack identified the
    reactive-description-blindness gap in the study ticks>=2 and ticks>=7 variants.
    The ticks>=4 variant ("the watch has begun to walk the gallery") is state-neutral
    and does not need a read_ledger companion — it describes observable facts rather
    than directing the player to read.

fix:
  layer: content
  description: >
    Added read_ledger companion variants to the two affected tick tiers, placed ABOVE
    their plain counterparts (first-match-wins, higher threshold first):
      - ticks>=7 AND has_flag:read_ledger: replaces "in which to read a stolen page"
        with "its last page already turned; you have what the schedule could give you"
        + "There is nothing left in this still room for you; only a few beats before
        there are no still rooms left."
      - ticks>=2 AND has_flag:read_ledger: replaces "take what this page can tell you
        and be gone before it strikes" with "its last page already turned; the schedule
        it kept is yours now. Through the wall the great clock grinds toward the hour —
        you know what the chime wakes, so be gone before it rings."
    The ticks>=4 variant is unchanged (no stale language for either player state).
    The base text is unchanged. No choice/flag/effect/item/exit/gating/ending change —
    prose only. The load-bearing read_ledger clue and saw_plate flag are untouched.
  content_hash_changed: true  # clockwork_heist yaml: unpinned in tests

regression_test: tests/regression/clockwork_study_read_ledger_reactive.test.ts

related:
  - bug_0282  # watchtower mossy_brook stale camp text (same class)
  - bug_0283  # watchtower tower_top brazier without lantern (same class)
  - bug_0284  # midnight_edition alley_door names Garrow pre-letter (same class)
  - bug_0286  # clockwork crawlspace strongbox "locked fast" with picks (same pack, same class)
  - bug_0068  # clockwork study clock-deadline prose (established study variant structure)
  - bug_0084  # clockwork study ticks>=7 escalation (added the affected ticks>=7 tier)
