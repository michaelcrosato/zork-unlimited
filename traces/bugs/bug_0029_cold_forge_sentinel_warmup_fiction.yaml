bug_id: bug_0029
pack_id: cold_forge_v1
seed: 31
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T09-54-41-679Z/playtest.md
  finding: >
    Playtest target ROTATED (per the protocol's "rotate the seed and ... rotate the
    pack" and the standing "keep rotating" guidance) off the ~ten-times-pristine
    clockwork_heist onto the assessor's own "quality unverified" candidate, the RPG
    The Cold Forge — a pack that had never had a full blind QUALITY playtest (only an
    engine-demo touch in bug_0023), and whose coverage bot ends 0/100, reaches 3/5
    rooms (never ember_chamber / forge_heart), and loops on bellows_walk / forge_steps.
    A fresh, MCP-only blind playtester (seed 31, full route; seed 7, no-buff probe)
    WON at ending_victory 50/50, found NO mechanical bugs (no rejected actions, no
    broken/stale state, no loops), and rated clarity 5/5, enjoyment 3/5. Its one
    on-screen legibility finding (report §4 + §5, scenes Bellows Walk + the
    inscription): the sentinel's "wakes to heat / sleeps in cold" inscription plus its
    "cold now but grinding slowly to life as you enter" room framing strongly imply a
    TIME / TEMPERATURE mechanic — that dawdling lets the sentinel warm up and grow
    stronger — but no such mechanic exists; the fight is a static 16-HP encounter
    regardless of timing. "The flavor over-promises a system that isn't there."
    (The report's other two findings — the infinitely-retryable might-check and the
    light-weight NPC buff — are BALANCE wrinkles, deliberately NOT chased: the
    "set-your-feet, try again" retryable-check framing is exactly what bug_0027
    EMBRACED for the sunken_barrow slab, and touching DCs/buffs would risk the
    combat-winnability / death-ending proofs locked by cold_forge_pack.test.ts.)
failure:
  type: misleading_mechanic_fiction
  where:
    - content:content/rpg/quests/cold_forge.yaml
  description: >
    Four sentinel-prose sites framed the cold as a COUNTDOWN the player must race
    rather than a settled, permanent advantage: (1) the bellows_walk room read "cold
    now but grinding slowly to life as you enter" (an ongoing process => "hurry");
    (2) the inscription read_text "THE SENTINEL WAKES TO HEAT AND SLEEPS IN COLD"
    (implies dawdling -> it heats -> strengthens); (3) the enemy description "grinding
    to cold life" (process verb); (4) the lantern-spirit's counsel "it wakes to heat
    and slows in the cold, and the hall is bitter cold NOW" (present-tense "now" reads
    as a window closing). There is no temperature var, no time/turn pressure, and no
    effect that strengthens the sentinel — `attack`/`hp`/`defense` are fixed. So a
    sensible player who reads the foreshadowing rushes, or worse infers the fight is
    about to get harder, when in fact the cold is a constant. The defect is LEGIBILITY,
    not balance: nothing about the fight is wrong; the prose mis-signals that a
    nonexistent clock is ticking.
fix:
  layers: [content]
  summary: >
    Reframe the four sentinel-prose sites, CONTENT-only (no engine/validator/stat/
    effect/DC change — the fight stays the identical static 16-HP encounter the
    cold_forge_pack.test.ts proofs require), so the cold reads as a SETTLED, PERMANENT
    advantage and the warm-up clock is denied outright:
      - bellows_walk room: "cold now but grinding slowly to life as you enter" ->
        "The dead hall holds no fire to rouse it; the deep cold keeps it slow and
        stiff ... It will be no swifter than it is now."
      - inscription read_text: adds "; AND THIS FORGE-FIRE IS LONG DEAD AND WILL NOT
        KINDLE. SO IT SLEEPS, AND STRUCK TRUE IN THE CHILL IT WILL NOT RISE AGAIN." —
        the "wakes to heat" lore is preserved but the dead, unkindle-able fire makes
        clear no heat is coming.
      - enemy description: "grinding to cold life" -> "holding a slow, cold half-life
        ... the chill keeps it as stiff and clumsy as it will ever be".
      - spirit_sentinel npc_text: now states "this hall has been bitter cold for an
        age and will never be warm again. Do not fear that waiting makes it worse: it
        is as slow now as it will ever be." — the bug_0027-style direct denial of the
        false inference.
    No flags / items / vars / stats / exits / quest gating / scoring / reachable
    endings change. The grate examine reactive variant (bug_0023) is untouched.
  reachable_endings_changed: false
  content_hash_changed: true   # cold_forge yaml prose genuinely changed (four narration rewrites)
  content_hash_before: c8ac35e220c9d88cc64962bcd7eb7d0700b68d231e2215d79329f1837e0f5e54
  content_hash_after: 1f32aaf2718342b1d655271b66f83244b2105d94d65aad515473956c1e216917
  repin: >
    No test SOURCE pins this pack's hash (only watchtower_road is pinned), and no
    cold_forge trace file exists under traces/rpg, so NO re-pin was needed — the hash
    change is recorded here in the artifact only. The bug_0023 / bug_0026 regression
    tests that exercise cold_forge assert mechanics + the stone_grate OBJECT examine
    text ("welded shut" -> "standing open") and the score tally, none of which this
    prose-only change touches.
deferred:
  - >
    Balance, report §5: the Forge Heart might-check (DC 12, d20+might 3) is a
    consequence-free ~20%/try reroll loop, and the lantern-spirit's +2 attack buff
    barely changes the winnable fight. Left alone deliberately — the retryable-check
    framing matches bug_0027's accepted design, and re-tuning DCs/buffs would risk the
    combat-winnability and death-ending proofs in cold_forge_pack.test.ts. Revisit
    only if a future playtest reports the loop as a genuine abandonment risk.
regression_test: tests/regression/cold_forge_sentinel_warmup_fiction.test.ts
