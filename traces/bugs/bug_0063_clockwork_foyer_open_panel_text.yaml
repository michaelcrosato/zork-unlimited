bug_id: bug_0063
pack_id: clockwork_heist_v1
seed: 29
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T17-25-58-433Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack The
    Clockwork Heist. A fresh, MCP-only blind playtester reached all three distinct
    endings across four runs (seed 29) — Truth (both epilogue variants), Rich, Caught —
    rating it clarity 5/5, enjoyment 4/5, mechanically flawless (zero rejected actions,
    no loops, no soft-locks, no functional bugs; verdict "a real player would finish
    satisfied"). Its one actionable finding not already closed by the clockwork polish
    family (bug_0019/0040/0042/0043/0046/0051/0053/0058/0061) is report §4 + §5: after
    examining the clock and prying the panel, "the foyer scene text never changes — it
    still describes the clock vast as a coffin with no mention of the now-open panel
    behind it," a stale-room-description nit.
failure:
  type: stale_scene_text_missing_reactive_variant
  where:
    - content:content/cyoa/pack/clockwork_heist.yaml
  description: >
    The foyer's `pry_panel` choice sets `found_passage` and opens the crawlspace behind
    the great clock's pendulum, but the foyer's reactive text (bug_0020 tick tiers,
    refined by bug_0061) never reflected it: at every tick count the room still narrated
    the clock as a sealed wall "vast as a coffin," contradicting the passage the player
    had just pried open and crawled. The gap is also a legibility one — once
    `found_passage` is set but the player holds no lockpick, the foyer's `enter_panel`
    re-entry choice is HIDDEN (it gates on the pick the strongbox needs), so the only
    on-screen trace that the crawlspace exists to return to was a journal line; the
    crawlspace's own no-pick nudge (`study_strongbox`) sends the player back here to "go
    find the tool," but the foyer gave them nothing to see.
fix:
  layer: content
  summary: >
    Content-only application of the existing CYOA `variants` reactive-text feature
    (bug_0018) to the foyer — no engine change. The foyer gains a `found_passage`-paired
    variant at each tick tier (var_gte ticks 4 + found_passage, var_gte ticks 2 +
    found_passage, and a base-tick found_passage variant), each listed immediately above
    its non-panel sibling so first-match-wins picks the panel-aware text whenever the
    passage is open. Each panel variant appends an acknowledgment that "the panel you
    pried loose still [stands open / is open behind its pendulum / gapes] on the dark
    crawlspace," woven into the existing tier prose so the clock's escalation (tension at
    ticks>=2, the watchman at ticks>=4) is preserved. The non-panel tiers are untouched,
    so a player who never pries the panel sees exactly the bug_0020/bug_0061 text. The
    foyer remains safe ground (never advances ticks) and its choices are unchanged.
  reachable_endings_changed: false  # text-only; rich / truth(x2) / caught / patrol all intact
  content_hash_changed: true        # clockwork is unpinned in unit tests (only watchtower_road is pinned). 0b576c29d9780ab33747c8d531f90608786c015e97aa7985351538d88bffe24f -> cf7036b384e97505ee786fbed5ea582097ae085d5f305eaac5ac07c8e2f7775a
  regression_test: tests/regression/clockwork_foyer_open_panel_text.test.ts
verified_live: >
    Through the running MCP server over the reloaded pack (seed 29) and the engine path
    the regression drives (loadPackFile / initStateForPack / makeStep / buildObservation).
    inspect_clock -> pry_panel -> back_crawl returns to the foyer at ticks 0 and the scene
    text now reads "...vast as a coffin — and behind its pendulum the panel you pried
    loose still stands open on the dark crawlspace," with the `enter_panel` choice still
    correctly hidden (no lockpick held). Climbing up and oscillating study<->gallery to
    ticks 3 then retreating shows the panel acknowledgment alongside the "grinds toward
    the hour" tension; to ticks 5 then retreating shows it alongside the on-the-hour
    watchman cue. A no-pry retreat to ticks 5 still reads the bug_0061 text with no
    crawlspace mention (no leak). validate_story is green and all four endings still fire.
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest remains the load-bearing quality
    signal; seed 29 rated the pack shippable (clarity 5/5) and this fix closes its one
    remaining actionable finding (the foyer never acknowledged the opened panel),
    continuing the clockwork polish family without touching its tuning.
