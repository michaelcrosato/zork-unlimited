id: bug_0235
title: "AFK assessor blind-pass RECENCY ROTATION went blind again — the attendance parser's capture class excluded the backtick, so the log's bold+backticked `Mandated blind pass ran on \\`pack\\`` entries were invisible; the just-played pack looked never-attended and was re-nominated FIRST (midnight_edition ranked #1 the cycle after it was played)"
kind: engine_fix
mode: meta/tooling
severity: defect
layer: afk/assessor (blind-pass recency rotation)
artifact:
  source:
    - src/afk/assessor.ts
  test:
    - tests/regression/assessor_blind_pass_rotation.test.ts

summary: >
  The deterministic assessor rotates the mandated blind playtest onto the LEAST-recently-attended pack by
  parsing AI_LOOP_STATE.md for each pack's most-recent "Mandated blind pass ran on <pack>" mention
  (parseAttendanceOffsets, src/afk/assessor.ts). The log is newest-first, so a smaller char-offset = more
  recent; a pack with NO parsed mention gets MIN_SAFE_INTEGER and sorts FIRST ("never-attended first").
  This cycle the harness ranked "blind-playtest midnight_edition" as candidate #1 — the day AFTER
  midnight_edition was blind-played (bug_0234) — and tide_mill #2 (played the two cycles before that). The
  rotation was nominating the MOST-recently-played packs, the exact lock-in it exists to cure.

root_cause: >
  Markdown-wrapper blindness — the SAME failure CLASS as bug_0128 (parser blind to the log's real format),
  recurred through a new surface. The regex captured the pack token with the class [A-Za-z0-9_./-], but the
  log writes the pack bold+backticked: `- **Mandated blind pass ran on \`midnight_edition\`** (cyoa, seed 4)
  — …`. After "ran on " and the space, the next character is a backtick, which is NOT in the capture class,
  so the regex match FAILED at that position and the whole entry produced no capture. Every recent
  attendance entry (all backtick-wrapped) was therefore invisible. The parser still saw OLD non-backtick
  prose and legacy "Mandatory LLM playtest target this cycle: <path>" headers, so the map was non-empty but
  MISSING exactly the recent packs — which then resolved to undefined ⇒ MIN_SAFE_INTEGER ⇒ ranked first.
  Empirically confirmed against the live log: midnight_edition / tide_mill / lamplighters_round all parsed
  as INVISIBLE pre-fix; clockwork_heist (an older, non-recent backtick run also reachable via legacy
  markers) parsed fine — so the bug specifically blinded the ROTATION to its own most recent decisions.

  Why the existing bug_0128 real-repo guard did not catch it: that test guards
  `if (topOff !== undefined && …)` and SKIPS its assertions when the top nominee has no parsed offset —
  which is precisely the state the bug induces (the just-played pack is invisible ⇒ topOff undefined). The
  bug hid inside the vacuous-skip of the very test meant to catch it; and every synthetic fixture used
  UN-wrapped prose ("ran on sunken_barrow (…)"), never the backtick form the real log uses.

fix: >
  One-token regex widening in parseAttendanceOffsets: insert an optional leading-wrapper run `[\`*]*` between
  the `\s+` and the capture group, so a leading backtick/asterisk run is skipped before the bare stem is
  captured. The capture class is unchanged, so it still STOPS at the CLOSING backtick (a backtick is not in
  the class) — the bare stem is recovered with no trailing tick to strip. Unwrapped prose and path/legacy
  forms are unaffected because `[\`*]*` matches zero. No change to the ordering, scoring, sort direction, or
  any other byte; purely restores the recency signal the rotation already consumes.

witness: >
  Out-of-band teeth, verified against the LIVE AI_LOOP_STATE.md before/after:
  PRE-FIX  — parseAttendanceOffsets(log).has("midnight_edition") === false (also tide_mill, lamplighters_round);
             the live assessor's #1 playtest nominee was midnight_edition (just played).
  POST-FIX — midnight_edition @ offset 561 (top of file = most recent), tide_mill @ 4061, lamplighters_round
             @ 12997; the live assessor's playtest order is now clockwork_heist > white_stag > dead_reckoning
             > tithe_barn > wolf_winter > … (genuinely least-recently-played first), and midnight_edition /
             tide_mill have dropped off the top. The new bug_0235 tests fail on the pre-fix class (the first
             asserts offsets.has("midnight_edition") for the backtick fixture; the second asserts a fresh
             backtick pack sorts LAST, not first) and pass post-fix.

regression_test: tests/regression/assessor_blind_pass_rotation.test.ts
# Adds a "bug_0235" describe block: (1) the bold+backticked `Mandated blind pass ran on \`midnight_edition\``
# format is parsed (offsets.has true) and the topmost entry carries the smallest offset; (2) a freshly-attended
# backtick pack sorts LAST, never first (white_stag, never mentioned, sorts first); (3) on the real repo the
# single most-recent "ran on \`X\`" mention (computed dynamically — no hardcoded stem) is parsed AND is not the
# assessor's top playtest nominee. The bug_0128 cases are retained unchanged.

scope_honesty: >
  Pure tooling fix in the deterministic assessor's recency parser. NO engine/runtime/validator/schema/
  generator change, NO pack YAML, NO hash re-pin, NO scorecard byte, NO corpus/manifest change. The assessor
  is advisory (it ranks the next-best improvement); the fix corrects WHICH pack the rotation surfaces, not
  any game behaviour. bug_0194 scorecard freshness pin unaffected (no pack content changed). The new test file
  is not protected; assessor.ts is not a verifier — verify:integrity sees no VERIFIER_TOUCHED / GUARD_WEAKENED.

verification: >
  npx vitest run tests/regression/assessor_blind_pass_rotation.test.ts → 7 GREEN (4 bug_0128 + 3 bug_0235).
  Live assessor rotation re-ordered correctly (clockwork_heist first, the least-recently-played; the pack this
  cycle's manual rotation independently chose — the fixed assessor and the correct manual choice now agree).
  npm run health → GREEN.

files_changed:
  - src/afk/assessor.ts (parseAttendanceOffsets regex + doc comment)
  - tests/regression/assessor_blind_pass_rotation.test.ts (new bug_0235 describe block)
  - traces/bugs/bug_0235_assessor_rotation_backtick_blind.yaml (NEW, this file)
