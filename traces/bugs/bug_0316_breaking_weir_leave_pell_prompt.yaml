id: bug_0316
pack: breaking_weir_v1
title: "leave_pell dialogue topic prompt implies automatic tool pickup"
class: dialogue-prompt-misleads-on-action
severity: minor
status: fixed
found_by: blind_playtest
playtest_report: ai-runs/2026-06-08T11-51-58-454Z/playtest.md

description: >
  The `leave_pell` dialogue topic in the Keeper's Lodge had the prompt
  "Take up the tools and go to the weir." When rendered in the dialogue action
  list, this reads as an instruction that will equip the weir-iron and life-line
  — it does neither. It only ends the conversation and returns to the room, after
  which the player must separately take both items. The phrase "Take up the tools"
  implies automatic item transfer that the engine does not perform.

  Compare wolf_winter's leave convention: "Leave old Cade and hold the byre." —
  clearly a farewell, no implication of automatic state change.

scene: keeper_lodge (dialogue)
object_id: leave_pell (topic in pell_root)

fix:
  type: content
  layer: dialogue_topic_prompt
  change: >
    Prompt changed from "Take up the tools and go to the weir."
    to "Leave old Pell and hold the weir." — mirrors wolf_winter convention,
    honest (ends dialogue only), conveys mission intent without implying
    tool pickup.
  files_changed:
    - content/rpg/pack/breaking_weir.yaml
  no_change: flags, scores, conditions, exits, endings, routes

regression_test: tests/regression/breaking_weir_leave_pell_prompt.test.ts
