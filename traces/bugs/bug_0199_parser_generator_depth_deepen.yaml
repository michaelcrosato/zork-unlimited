id: bug_0199
title: "The PARSER generator stopped at a single v2 lock tier while the RPG generator went to v3 — generated parser packs were structurally shallower than the hand-authored ones, and bug_0198's mode-matched benchmark caught it as an INVERTED held-out gap (the held-out split read bot-EASIER than curated)"
kind: generator_deepen # mirror the CLOSED RPG generator-deepen arc (bug_0168-0174) on the last un-deepened generator
mode: parser
# Additive only. Deepens the emitted shape (one more lock tier + one gated room), bumps
# PARSER_GENERATOR_VERSION 2->3, re-seals the held-out corpus and rebuilds the scorecard via the
# sanctioned CLIs, and co-ships a validator-INDEPENDENT depth oracle. No check weakened: no MIN_*
# floor / GEN_EVAL_CHECK_COUNT / SATURATION_FLOOR lowered, no matcher relaxed, no test skipped, no
# PROTECTED_FILES / HASH_PIN_FILES shrunk. corpus/manifest.json + src/gen/parser_generator.ts are
# PROTECTED, so editing them behind the version bump surfaces only a NON-BLOCKING VERIFIER_TOUCHED
# warning (the precedented RPG-arc re-seal path, bug_0167/0176) — no AI_LOOP_ALLOW_VERIFIER_EDITS
# needed. scorecard.{json,md} are in neither HASH_PIN_FILES nor PROTECTED_FILES (bug_0194 used the
# freshness TEST instead), so the rebuilt bytes re-pass benchmark_scorecard_fresh.

summary: >
  The procedural PARSER generator (src/gen/parser_generator.ts) minted packs the deterministic
  coverage bot found EASIER than the hand-authored parser packs: bug_0198's mode-matched benchmark
  measured the parser curated->held-out gap as INVERTED (-0.058 — held-out 22.2% vs curated 16.4%),
  the textbook "environment too easy / spec too weak" reward-hacking signal (EvilGenie,
  arXiv:2511.21654). The cause was structural and named: the RPG generator already went v1->v3 with a
  full deepen + validator-soundness + independent-cross-check arc, but the parser generator got a
  single v2 tier (bug_0168) and STOPPED at PARSER_GENERATOR_VERSION = 2 — a fixed entrance/hub/goal
  spine with a depth-2 key chain. So the strictest validator in the suite was exercised against
  generated content shallower than the curated content it was meant to hold the bar against.

root_cause: >
  generateParserPack emitted a 3-room spine (entrance -> hub -> goal) with a depth-2 obtainability
  chain: a lesser key in an unlocked entrance coffer opens a locked hub strongbox holding the great
  key that opens the goal gate (win) and a telegraphed hazard (death). Two lock tiers, two non-win
  rooms. The held-out corpus is sealed from this generator, so the benchmark's contamination-free
  split inherited the shallow shape and the coverage bot's random strategy could complete it (26%)
  and reach high scene coverage — reading bot-easier than the richer authored packs.

fix: >
  Deepened the emitted shape to depth-3 across FOUR rooms (entrance -> hub -> inner -> goal), mirroring
  the RPG v2->v3 step. A THIRD lock tier: lesser key (entrance coffer, unlocked) -> opens the hub
  strongbox (locked) holding a MIDDLE key -> opens a new inner-room inner_chest (locked) holding the
  GREAT key -> opens the goal gate AND the telegraphed hazard. Each tier adds one new container + one
  new key noun per theme (all *Name/*Alias kept mutually distinct, no AMBIGUOUS_ALIAS), one new one-shot
  +5 milestone on the inner-chest unlock (max_score 15 -> 20, every award still gated/non-farmable), and
  the strongbox unlock now ALSO sets a HUB_OPEN flag the hub->inner exit reads — so the deep cell is
  reachable only AFTER tier-2 is solved, never by free locomotion (both south returns stay ungated, so
  no carried quest key is ever stranded: SOFTLOCK_QUEST_ITEM stays clean). Bumped
  PARSER_GENERATOR_VERSION 2 -> 3, kept the function PURE (no Date/Math.random) with its trailing
  ParserPackSchema.parse self-check, re-sealed the held-out corpus (npm run corpus:seal), and rebuilt
  the benchmark scorecard at runs=50 (npm run benchmark -- --runs 50 --out traces/benchmark/scorecard).

out_of_band_teeth: >
  The new tests/regression/parser_generator_depth_floor.test.ts is a validator-INDEPENDENT depth oracle
  (the DGM lesson, arXiv:2505.22954: never trust a generator-stamped depth field — recompute it). For a
  fixed 12-seed window it pins BOTH directions (EvilGenie setter-solver feasibility): HARDER — >=3
  DISTINCT load-bearing tiers proven by TIER-KNOCKOUT (remove the lesser/middle/great key TAKE via the
  solver's `explore` filter and assert the win becomes unreachable), plus a pinned solver-work floor;
  and still SOLVABLE — both endings reachable via the bug_0121/0122 exhaustive solver, cappedOut=false.
  It also runs a KNOWN-SHALLOW NEGATIVE CORPUS (SoundnessBench / bug_0182): three forged packs that keep
  all 3 keys (red against the naive #keys x #locks tally) but each BYPASS one tier — a free great key
  (middle tier decorative), a gate re-keyed to the middle key (great tier decorative), and a pre-set
  HUB_OPEN + unlocked inner chest (lesser + middle tiers decorative) — and asserts the oracle REJECTS
  each (depth < 3). WITNESS confirmed genuine: against the PRE-CHANGE v2 generator the >=3-tier
  assertion FAILS on every seed (v2 has only 2 tiers, no middle_key / inner room). The rebuilt scorecard
  shows the parser held-out score DROPPING 22.2% -> 16.7% (toward/below curated 16.4%, the inverted gap
  closing on the SAME coverage bot), the per-pack scene coverage dropping 66.7% -> 50.0%, and random
  completion dropping 26% -> 0%.

regression_test: tests/regression/parser_generator_depth_floor.test.ts

verification: >
  npx tsc --noEmit clean. The new parser_generator_depth_floor.test.ts (16 cases) + the updated
  parser_generator_two_tier_chain.test.ts (now 3 tiers asserted, version === 3) +
  tests/unit/parser_generator.test.ts (max_score 20) + tests/unit/mcp_generate_parser_pack.test.ts
  (4-room / 9-object / max_score 20 / HUB_OPEN-gated deep cell) all GREEN. held_out_corpus_sealed and
  the benchmark suite (scorecard_fresh byte-pin, mode_matched_contamination, held_out_split,
  headline_no_regression — cross-mode gap restored ABOVE MIN_SPLIT_GAP) all GREEN. npm run health
  GREEN (EXIT 0). npm run verify:integrity EXIT 0 with ONLY the expected non-blocking VERIFIER_TOUCHED
  warnings for the PROTECTED generator + manifest re-seal behind the version bump — NO GUARD_WEAKENED /
  PROTECTED_DELETED / HASH_PIN_UNACCOMPANIED / TEST/ASSERTION/STRONG count regression. No floor lowered,
  no matcher relaxed, no test skipped/deleted. No AI_LOOP_ALLOW_VERIFIER_EDITS needed.
