what:
  - >
    src/afk/benchmark.ts — added a per-split headline AGGREGATE to the Scorecard. The benchmark
    thesis (ULTRAPLAN 2026-06-02, restated in the file docstring) names "a single, comparable NUMBER
    per (pack, agent)" as the precondition for a benchmark and calls the held-out rows "the
    contamination-free signal the benchmark ultimately reports" — yet buildScorecard only ever emitted
    ~30 per-row cells. To get the figure the thesis says the benchmark reports, a reader had to average
    the table by hand, and the held-out headline was never stated at all.
  - >
    New BenchmarkSummary type + Scorecard.summary[]: one entry per split (curated before held-out),
    each aggregating ONLY the PRIMARY baseline cell (coverage / graph shown — random is graph-agnostic
    noise, hidden is the auxiliary spatial axis, so neither is the figure a model is primarily compared
    against). score = mean over the split's packs of each pack's own equal-weight mean of
    (completion_rate, ending_coverage, scene_coverage); mean_turns_to_end is excluded (an
    un-normalised efficiency axis, not a 0-1 progress fraction). renderMarkdown now prints a "## Headline"
    table (curated 49.1%, held-out 33.5% at runs=12) above the renamed "## Per-pack rows" table.
  - >
    Purely additive: BenchmarkRow is byte-unchanged, so every existing row pin holds. The two tests that
    counted markdown "| "-rows globally (tests/unit/benchmark.test.ts, benchmark_held_out_split.test.ts)
    were scoped to the per-pack section — made MORE precise (they no longer miscount the new summary
    table), not weakened. Determinism preserved (no clock/RNG); the existing byte-identical-scorecard
    pin covers the new field for free.

guard:
  test: tests/regression/benchmark_headline_score.test.ts
  pins: >
    (1) one summary per present split, curated before held-out, each tagged with the primary cell;
    (2) score == independently-recomputed mean over the split's primary-cell rows of each row's mean
    fraction (the anti-vacuity oracle, recomputed without the production code path), plus the three
    component means; (3) score is a well-formed 0-1 fraction and the curated baseline is > 0 (genuinely
    played, not a stubbed constant); (4) the score EXCLUDES the auxiliary random/hidden cells (it must
    not equal the all-cell mean when they differ); (5) renderMarkdown carries a Headline table with each
    split's bold percent score; (6) a custom cell set without the primary cell yields an empty summary
    while the per-row table stays authoritative.

verification:
  health: green
  tests: 1301 passed (207 files); benchmark suite 18 passed
  notes: >
    No hash re-pin, no test disabled or weakened, no check routed around. The two row-count assertions
    were tightened (scoped to ## Per-pack rows), not loosened.

next_focus: >
  The benchmark now reports a single comparable number per split. The standing keystone (see
  [[ultraplan-true-goal-pivot]]) is unchanged: run the loop ONCE against a real frontier-model author
  so the held-out score is populated for a row OTHER than the deterministic bot — that is the first
  genuinely contamination-free datapoint the headline exists to report. Lighter structural levers
  remaining: a held-out vs curated DELTA line (does the bot do better on packs it could plausibly have
  trained on?), and surfacing the headline in src/afk/assessor.ts so a score regression becomes a
  ranked improvement candidate.
