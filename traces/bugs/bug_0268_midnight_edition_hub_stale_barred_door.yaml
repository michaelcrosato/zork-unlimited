bug_id: bug_0268
pack_id: midnight_edition_v1
seed: 5
initial_state: composing_room
# Surfaced by the mandated blind playtest this cycle (general-purpose subagent, MCP-only, no
# content/src/ui/tests access; seed 5; report ai-runs/2026-06-05T02-20-58-902Z/playtest.md).
# The pack came back STRONG — clarity 5/5, enjoyment 5/5, 4 of 5 endings, score economy exact
# (35/35), mechanically flawless — with ONE concrete §5 finding: stale hub prose after barring
# the alley door and THEN reading the letter. The tester's run 4 (alley → steady_and_bar →
# composing → read letter) caught it: the room said the door "is barred now" immediately after
# barring, then reverted to the generic "stands shut on the boots that keep pacing the cobbles
# beyond it" on the next action, with door_barred still set.
findings:
  - id: composing_room_reverts_to_open_door_prose_when_barred_and_knowledge_flag_set
    where: scene:composing_room
    severity: low
    description: >
      The composing_room hub has reactive variants on three orthogonal-ish axes: knows_proof,
      read_letter, and door_barred. door_barred is ORTHOGONAL to the read_letter/knows_proof
      knowledge axis — you can bar the alley door before OR after reading the letter / proving
      the story. But the barred-door variant was placed LAST and, being first-match-wins, only
      fired when NEITHER knowledge flag was set. So once the player had barred the door and then
      read the letter (or gone on to prove the story), the read_letter / knows_proof variant won
      and STILL called the alley door one that merely "stands shut on the boots that keep pacing
      the cobbles beyond it" — as though the player had never been out, seen Garrow's wrecking
      crew, and dropped the bar. door_barred set but the prose ignores it: the stale-on-state-
      change contradiction of the bug_0232 / bug_0248-0250 / bug_0251 class. (bug_0251 had already
      fixed the barred-AND-no-knowledge-flag hub case; this is the same defect on the barred-AND-
      knowledge-flag combinations it did not cover.)
    fix: >
      Add door_barred twins for the knows_proof and read_letter hub forms, ordered BEFORE their
      open-door counterparts (most-specific-first, first-match-wins): {knows_proof∧barred} ▸
      {knows_proof} ▸ {read_letter∧barred} ▸ {read_letter} ▸ {barred alone} ▸ base. Each twin keeps
      its knowledge flavour (the report "would make it true or break it" / the proven report "you
      carry now") AND names the barred door against the men "you found there." door_barred is
      monotonic (never cleared), so no form ever regresses to an earlier one. Reactive TEXT ONLY —
      no flag/var/score/choice/next/ending/quest change; all four endings stay reachable and the
      max_score=35 verified-print path is byte-identical. validate_story green; verified live via
      MCP (bar → read letter now retains the "barred now on the men you found there" clause).
failure:
  type: design_polish
  description: >
    No engine fault or determinism break — stale-on-state-change reactive scene text (the
    bug_0232 narrative-freshness discipline). The defect is purely cosmetic (door_barred is
    correctly set in state; only the hub prose lagged), caught by a fresh blind playtest the
    coverage bot's structural metrics cannot see — exactly the value of the §12.4 blind step.
regression_test: tests/regression/midnight_edition_hub_barred_door.test.ts
notes: >
  Pairs with bug_0251 (the alley_door loop + barred-AND-unread hub case) to make the composing_room
  hub's door-state prose robust across the FULL cross-product of {none, read_letter, knows_proof} ×
  {open, barred}. General lesson when a scene reacts to two orthogonal monotonic axes: every cell of
  the cross-product needs a form, ordered most-specific-first — a single-axis variant placed last
  silently shadows the other axis once its sibling flag is set.
