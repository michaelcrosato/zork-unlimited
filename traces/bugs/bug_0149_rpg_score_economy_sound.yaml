  - "sunken_barrow: reachable max score == declared max_score (50), search not capped"
  - "FAILS on a planted OVERFLOW pack (read +20 + take +15 = 35 > declared 30) — the solver would NOT catch this bounded over-award"
  - "FAILS on a planted PHANTOM-POINTS pack (only 20 reachable, max_score declares 50)"
  - "CREDITS a +10 award reachable ONLY by winning a fight (best regime wins / worst regime dies at 0) — the best-roll regime is load-bearing for the score economy"
  - "the on_failure-award guard BITES on a score award in a skill-check on_failure, and does NOT trip on either shipped pack (whose on_failure only narrates)"
