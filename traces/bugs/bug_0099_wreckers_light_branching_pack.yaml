bug_id: bug_0099
pack_id: wreckers_light_v1
seed: 71
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T01-16-27-596Z/playtest.md   # sealed_crypt, seed 67
  new_pack_report: ai-runs/2026-06-02T01-16-27-596Z/playtest.md   # see "new pack" run below
  finding: >
    The assessor's rank-1 mandated target was The Clockwork Heist for the ~Nth straight
    cycle, but it has had ~30 consecutive clean blind passes. Per the protocol's "rotate
    the seed and the pack" and project memory (rotate onto the least-attended pack), the
    mandated pass rotated onto the OLDEST blind target among the six, sealed_crypt (parser,
    seed 67; last truly targeted at bug_0090, older than alchemists/cold_forge/sunken_barrow/
    watchtower). The fresh source-blind MCP-only subagent solved it 35/35, rated it clarity
    5/5 enjoyment 3/5, and found ZERO functional bugs — its ~3rd straight clean pass. Its
    substantive note was the SAME signal every blind report across the six packs keeps
    raising: "short and entirely linear with a single ending; the puzzle never branches or
    surprises ... replay value is essentially nil." The linear, single-ending packs
    (sealed_crypt 3/5, alchemists_tower 3/5) consistently rate BELOW the branching
    clockwork_heist (4–5/5). The content-polish backlog is blind-exhausted (project memory);
    the highest-value move per the standing next-focus is structural / content_new.
failure:
  type: not_a_defect_content_new
  description: >
    This cycle ships a NEW pack rather than re-polishing a clean one. The pack is authored
    expressly to attack the recurring enjoyment knock: a branching CYOA whose heart is a
    MORAL fork, not a lock-and-key chain, with four meaningfully-distinct endings reachable
    by genuinely different routes.
fix:
  layer: content_new
  pack: content/cyoa/pack/wreckers_light.yaml
  summary: >
    The Wrecker's Light — a storm night at a dark lighthouse with a ship foundering on the
    rocks below and the old keeper collapsed at the foot of the stair. The thesis is that
    the SAME two tools (lamp_oil from the store, the keeper's striker from the mantel) arm
    BOTH the honest act and its dark mirror, so it is WHERE you carry them that decides the
    night: up the ladder to the great lamp relights it and steers the ship clear
    (ending_saved); out to the gallery they hang a false low light that walks her onto the
    reef to plunder (ending_wrecker); staying at the dying keeper's side instead loses the
    ship but saves a life (ending_mercy); scrambling down to the rocks too soon drowns you
    (ending_drowned, an informed risk telegraphed by the gallery prose). A hidden truth
    REFRAMES rather than adds a route: behind the keeper's iron key, the oil store's
    sea-chest holds his journal naming the foundering ship as the revenue cutter Mourning
    Star — the vessel that drove his own son onto these rocks, her master now at the wheel.
    Reading it sets `knows_truth`, which fires reactive endingText variants (declared-order
    first-match-wins, the clockwork ending_truth device, bug_0051) on the save, wreck AND
    mercy endings: saving her becomes mercy past justice, wrecking her becomes vengeance
    rather than greed, and mercy CONFIRMS the grief instead of re-revealing it. The goal is
    legible from the first beat (the keeper rasps that the lamp must burn or the ship is
    lost, and points at the oil and the flame), so the darkness is a turn the player takes,
    never a gotcha. No deadline (branching, not a timer, is the feature). Validates 0/0.
  new_pack_blind_playtest:
    target: content/cyoa/pack/wreckers_light.yaml
    seed: 71
    result: >
      Fresh source-blind MCP-only subagent, 5 sessions covering all FOUR endings plus the
      informed/uninformed reactive variants. Clarity 5/5, enjoyment 5/5 (the project's
      highest), ZERO functional bugs, no loops, no rejected actions, no broken state;
      reactive scene text (bare mantel after taking the striker, dipped cask after filling,
      gaping chest after unlocking) and gating all verified consistent with state.
    finding_acted_on: >
      The tester flagged ONE polish gap: ending_mercy used identical text whether or not
      knows_truth was set, so an informed player who had read the journal saw the keeper
      "tell you ... about the Mourning Star" as a fresh reveal. Fixed by adding a
      knows_truth-aware mercy variant (the keeper "sees that you already know ... He does
      not have to tell it"), matching the reactive discipline the save/wreck endings use.
  reachable_endings_changed: true   # NEW pack: four new endings (saved/wrecker/mercy/drowned)
  content_hash_changed: true        # NEW pack file; not a HASH_PIN_FILE, no re-pin needed
  new_pack_hash: 9302ddbe40485251bf4c0bfd37577e735ba6453622c644264d19a44990a5309f
  wired_into_bar: >
    Added to the `health` validate chain in package.json; the discovery-based guard
    tests/regression/all_packs_validated_by_bar.test.ts (bug_0096) now auto-covers it and
    would FAIL if it were not validating clean or not in the health chain.
  regression_test: tests/regression/wreckers_light_branching.test.ts
verified_live: >
    Through the engine over the compiled pack, building observations the way the MCP server
    does (buildObservation → ending_id / endingText). All four endings reachable and
    distinct; the moral fork is real (identical oil+striker prefix reaches ending_saved via
    the lantern and ending_wrecker via the gallery); knows_truth fires a reactive variant on
    the save, wreck and mercy endings while the uninformed route renders the base text; and
    the truth variant is cosmetic — informed and uninformed routes converge on the same
    endingId for each ending, so the journal changes prose, not which ending you reach.
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the multi-step arm-then-choose routes (a
    standing heuristic-planner limit), so the blind LLM playtest is the load-bearing quality
    signal — here run on the NEW pack itself (seed 71) and clean at 5/5/5/5. This cycle grows
    the game (the standing content_new next-focus) with the highest-rated pack to date, and
    directly answers the linearity/single-ending enjoyment knock every prior blind report
    raised; clockwork (the nominal mandated target) remains verified-clean.
