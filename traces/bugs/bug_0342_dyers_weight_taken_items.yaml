id: bug_0342
pack: dyers_weight_v1
title: "dye house still placed taken cakes and tongs at starting positions"
severity: minor
scene: dye_house
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the finished indigo cakes or copper tongs, LOOK in the dye
  house still said the cakes were on the curing rack and the tongs hung by the
  vat. The proved-adulteration variant also kept placing the cakes on the rack
  after the player could already be holding them.

root_cause: >
  The dye house had only a generic `proved_adulteration` room variant. It did
  not read the durable held-item states for the takeable evidence cake or the
  copper tongs, so ordinary post-TAKE looks fell back to starting-position prose.

fix: >
  Added ordered dye-house room variants for held cakes, held tongs, both held,
  and the corresponding proved-adulteration states. Pure prose/content change:
  no exits, effects, score, or win conditions changed.

tests: tests/regression/dyers_weight_reactive_taken_items.test.ts
