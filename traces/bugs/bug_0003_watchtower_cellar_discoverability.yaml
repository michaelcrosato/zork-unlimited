bug_id: bug_0003
pack_id: watchtower_road_v1
seed: 13
evidence:
  source: mcp_tool_api_playtest
  command: >
    node --import tsx --input-type=module -e 'import { createToolApi } from
    "./src/mcp/tools.ts"; const api=createToolApi({root:process.cwd()});
    console.log(JSON.stringify(api.run_playtest({story_path:
    "content/cyoa/pack/watchtower_road.yaml", runs:100, strategy:"coverage",
    max_steps:80}),null,2));'
  finding: >
    Coverage visited cellar_door but never reached cellar or hidden_cache. The
    suspicious samples repeatedly alternated tower_base -> abandoned_cart after
    the cart was exhausted, because search_rubble remained an always-available
    investigative action.
failure:
  type: discoverability_loop
  where: [scene:tower_base, scene:abandoned_cart, scene:cellar_door]
  description: >
    The cellar was visible and reachable in prose, but the automated coverage
    strategy preferred the stale "Search the overturned cart" action over
    returning outside with the lantern. This made cellar discovery brittle and
    kept the truth route under-exercised.
fix:
  layer: quest_structure
  summary: >
    Hide search_rubble once both cart items are carried, and make the lantern
    journal explicitly point to the cellar stair. The cart also offers a direct
    "carry the lantern out to the cellar stair" follow-up once the lantern is
    carried. The cart remains searchable until both useful items are collected;
    after that, players are pushed toward unexplored tower/cellar exits instead
    of a spent search loop. The hidden cache entry is also hidden after the
    ledger is collected, so the newly discoverable cellar route flows back out
    instead of bouncing between cellar and cache; the cellar descent is likewise
    hidden after the ledger is carried so the cleared route exits to the tower
    exterior.
regression_test: tests/regression/watchtower_cellar_discoverability.test.ts
