bug_id: bug_0252
component: verification   # a soundness-lock gap + stale proof comment, not a content/pack defect
# Surfaced during the blind-playtest cycle on clockwork_heist (seed 3 blind pass came back
# clean — clarity 5/5, enjoyment 4/5, four endings, ZERO mechanical bugs; see
# ai-runs/2026-06-04T20-49-21-107Z/playtest.md). The playtester's one novel, non-clock
# finding was that the `guile` stat is displayed all game but its single skill-checked
# choice (slip_out_quiet) was never naturally encountered and appears to do nothing.
# Following that thread into the verification layer exposed a LATENT SOUNDNESS GAP around
# exactly that skill-check mechanic — found by reading the proofs, then confirming the claim
# they rest on was untested.
findings:
  - id: convergent_skill_check_invariant_unlocked
    where: tests/regression/cyoa_score_economy_sound.test.ts + cyoa_all_endings_reachable.test.ts
    severity: low   # latent: no current unsoundness; a guard the proofs silently assumed was missing
    description: >
      The CYOA every-ending-reachable and score-economy proofs both run a SINGLE-rules
      breadth-first search whose soundness rests on determinism (support/exhaustive_endings.ts
      property #1: same state+action ⇒ same result ⇒ one step per (state,action) explores every
      transition). A `skill_check` breaks raw determinism — it draws a seeded d20 via
      resolveSkillCheck/rngForStep, so one (state,action) can resolve two ways. THREE scored
      shipped packs carry a skill_check (clockwork_heist slip_out_quiet, watchtower_road, and
      midnight_edition), so the single-rules BFS already runs over packs with a seeded roll. It
      stays sound ONLY because every such check is CONVERGENT: on_success and on_failure `goto`
      the same scene and touch no flag/var/tick/quest/ending, so both die outcomes produce the
      SAME stateKey the BFS dedupes on, and the roll the search happens to draw is irrelevant.
      That convergence is the entire load-bearing assumption — and nothing tested it. Worse, the
      score-economy proof's header ASSERTED THE OPPOSITE: "The scored CYOA packs carry no
      skill_check, so play is fully deterministic" — factually false (all three scored packs do).
      The only skill-check test (cyoa_skill_check_capability) proves a DIVERGENT synthetic check
      routes to two different endings — the opposite shape — so a future edit that diverged a
      shipped branch (a flag/score/tick on one side, or a different destination) would NOT fail
      anywhere: the single-rules BFS would silently explore just the seed's branch and could miss
      a state, leaving an UNSOUND proof that still passes green.
    fix: >
      (1) Add tests/regression/cyoa_convergent_skill_check_sound.test.ts: for every shipped CYOA
      pack, for every skill-checked choice, reach a state offering it (via the pack's own BFS),
      step it under a forced max roll (20 → success) and a forced min roll (1 → failure) from the
      SAME pre-state, and assert the two result states share an identical stateKey (the BFS
      fingerprint) while their narration DIFFERS (non-vacuity: the roll genuinely diverged, yet
      the states converge). A corpus guard requires ≥1 shipped skill_check so the suite can't pass
      vacuously. Auto-discovers content/cyoa/pack, so a new pack with a skill_check is covered on
      ship. (2) Correct the now-false determinism claim in cyoa_score_economy_sound.test.ts and
      add the matching note to cyoa_all_endings_reachable.test.ts, both pointing at the new lock.
      No content/pack change — every pack compiles byte-identically (no hash moves).
failure:
  type: latent_soundness_gap
  description: >
    A load-bearing invariant (CYOA skill checks are convergent) that two single-rules exhaustive
    proofs silently depend on had no regression lock, and one proof's own comment denied the
    invariant was even relevant. A future divergence would have made those proofs unsound while
    they continued to report green.
regression_test: tests/regression/cyoa_convergent_skill_check_sound.test.ts
