id: bug_0315
title: "The Breaking Weir — pell_weir speech has no cross-reference to the flood-book"
pack: content/rpg/quests/breaking_weir.yaml
class: content / signposting gap
severity: minor
discovered_by: blind_playtest (seed 7, 2026-06-08T11-40-56-741Z)

symptom: >
  A player who talks to Pell first (ask_weir) receives the full three-obstacle plan verbally
  but is never told that the same information is written in the flood-book on the table.
  The flood-book awards +5 score for reading (the §17 intro clue), but without a nudge from
  Pell's speech the reward is invisible to the majority of players who ask Pell before
  examining the room objects. The book itself cross-references Pell ("DO NOT SET FOOT ON
  THAT WALK TILL PELL HAS TOLD YOU HOW A MAN CROSSES IT"), so the loop runs only one way:
  book → Pell, but not Pell → book.

root_cause: >
  The pell_weir dialogue node's npc_text contained no mention of the flood-book, even though
  the book's read_text is explicitly Pell's written plan. The bidirectional cross-reference
  was missing.

fix: >
  Added one sentence to the end of pell_weir npc_text: "I had it all written in the
  flood-book on the table there — the last entries, the same steps in my own hand — if you
  want it to go by." Pure prose — no flag, score, condition, gate, or ending changed.

regression_test: tests/regression/breaking_weir_pell_flood_book_crossref.test.ts
