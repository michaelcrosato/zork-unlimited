id: bug_0368
title: Night Dispensary immediate sale lacks consequence
severity: content
status: fixed
root_cause: >
  A fresh blind playtest found that selling the arsenic immediately reached the
  morally central bad ending, but the base ending text closed flatly with Cole
  leaving and the sale recorded. With no gathered evidence, the variant system
  fell through to text that did not show any aftermath or moral weight.
fix: >
  Strengthen the base `ending_sold` text so an immediate sale still follows the
  poison toward Wick Lane and makes the lawful ledger entry feel consequential.
  Preserve the existing partial-knowledge and full-knowledge variants as distinct
  sharper readings of the same sale.
files_changed:
  - content/cyoa/pack/night_dispensary.yaml
regression_test:
  - tests/regression/night_dispensary_sale_consequence.test.ts
