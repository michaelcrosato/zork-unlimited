id: bug_0302
title: "Lamplighter's Round: three rooms had stale descriptions after state changes"
pack: content/parser/pack/lamplighters_round.yaml
scenes: [river_stair, watch_box, lamp_walk]
category: reactive_description_blindness
severity: minor
found_by: blind_playtest
seed: 7
date: 2026-06-08

description: >
  A fresh blind MCP playtest (seed 7) found three rooms whose prose descriptions
  did not update after state-changing actions — same reactive-description-blindness
  class as bug_0282/0283/0287/0288.

  (1) river_stair: after taking the tinderbox and brass tally-key, the room prose
  still read "a tinderbox lies on the sill... a small brass tally-key hangs on a
  nail beside it" even though both items were in inventory.

  (2) watch_box: after unlocking and opening the wall-cupboard and taking the
  store-key from it, the description still read "A wall-cupboard hangs by the door,
  its little lock shaped for a tally-key" — no acknowledgment it was open/empty.

  (3) lamp_walk (most jarring): after unlocking the excise-store door (which set
  has_flag:store_open and opened the east exit), the description still said "The
  excise store stands shut to the east behind a stout barred door" — directly
  contradicting the newly available east exit. The system supports conditional text
  (harbour_head updates correctly after oil is poured), it was just not applied here.

fix: >
  Added variants: blocks to all three rooms (description: remains the fallback):
    • river_stair: when[has_item:tinderbox + has_item:brass_key + has_item:horn_windscreen]
      → "the sill...is bare now"; when[has_item:tinderbox + has_item:brass_key]
      → "only the loose horn windscreen leans forgotten against it still."
    • watch_box: when[has_item:store_key] → "The wall-cupboard hangs open and empty
      by the door." (store_key in inventory implies cupboard was opened and emptied)
    • lamp_walk: when[has_flag:store_open] → "The excise store stands open to the east"
  All three are cosmetic only — no flag/choice/exit/ending/score change. Convergent.

regression_test: tests/regression/lamplighters_stale_room_descriptions.test.ts
