id: bug_0436
title: Lamplighter's strongbox theft branch committed on unlock instead of taking silver
pack: content/parser/pack/lamplighters_round.yaml
reported_by: blind_playtest_20260622T095352Z_lamplighters_round_seed7
severity: medium
symptom: >
  A fresh blind player found the excise strongbox unfair: it looked like another
  lock for the same store-key, but unlocking it immediately ended the game as a
  thief. A curious parser player could trigger the moral-failure ending before
  seeing the silver or making an explicit take-it decision.
root_cause: >
  The greed fork was implemented as unlock_effects on excise_box. That made the
  first safe-looking parser verb, UNLOCK, both reveal and commit the theft,
  unlike the prose and tests that described the branch as taking the Crown's
  seized silver.
fix: >
  Made the strongbox a normal locked openable container. Unlocking and opening it
  now expose seized_silver with warning prose, and only taking seized_silver
  triggers ending_thief.
tests:
  - tests/regression/lamplighters_round_fork.test.ts
verification:
  - npm test -- --run tests/regression/lamplighters_round_fork.test.ts tests/regression/lamplighters_windscreen_one_shot.test.ts tests/regression/lamplighters_stale_room_descriptions.test.ts
  - npm run validate -- content/parser/pack/lamplighters_round.yaml
