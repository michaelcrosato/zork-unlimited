id: bug_0417
title: Fire Office full-evidence payment option still claimed the record was inconclusive
pack: content/cyoa/pack/fire_office_examiner.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  After the player assembled the complete fraud chain, the submission desk still
  offered "Recommend payment -- the evidence is inconclusive." That label made
  an intentionally bad professional recommendation sound like a neutral reading
  of the file.
root_cause: >
  The approval terminal was a single ungated choice, so it used the same
  evidence-inconclusive wording for no-evidence, partial-evidence, and
  full-evidence states.
fix: >
  Kept the bad-ending route available, but split the completed-file approval
  into its own state-gated choice that says payment is being recommended
  despite the completed fraud evidence. Added a full-chain approval ending
  variant that acknowledges the recommendation contradicts the examiner's own
  file.
tests:
  - tests/regression/fire_office_examiner_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/fire_office_examiner_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/fire_office_examiner.yaml
