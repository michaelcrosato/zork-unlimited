id: bug_0304
pack: sealed_crypt_v1
title: "grip iron key" skill-check action persists after a failed attempt
class: orphaned-action-post-attempt
severity: moderate
found_by: blind_playtest (seed 7, 2026-06-08T09-03-51-333Z)

description: |
  The optional `grip iron key` nerve beat (USE iron_key on iron_key) stayed in the
  crypt's action list indefinitely after a failed d20 roll. On SUCCESS the
  `steeled_at_the_iron` flag is set, retiring the action via its `not_flag` condition.
  On FAILURE no flag was set, so the condition remained satisfied and the action
  reappeared on every subsequent visit to the crypt. The failure narration's closing
  line ("Better to gather yourself before you set this key to anything down here")
  read as a retry invitation, but nerve=3 and DC=12 are both fixed — re-trying produces
  an identical roll with no mechanical change. Same class as bug_0303 (windscreen
  failure path in lamplighters_round).

root_cause: |
  The interaction had conditions: [{ not_flag: steeled_at_the_iron }, { in_room: crypt }].
  On success, set_flag: steeled_at_the_iron retires the condition. On failure, no flag
  was set, so the condition stayed satisfied and the action re-offered on every crypt visit.

fix: |
  Added { not_flag: attempted_the_iron } as third condition (alongside the existing
  not_flag: steeled_at_the_iron and in_room: crypt). Added set_flag: attempted_the_iron
  as the first effect of on_failure. Updated the failure narration to remove the
  retry invitation ("Better to gather yourself before you set this key to anything
  down here" → "The three iron locks will have what nerve you carry."). The beat is
  now one-shot on either outcome — success retires via steeled_at_the_iron, failure
  retires via attempted_the_iron. The beat remains optional and convergent: it gates
  no exit, ending, score, or variant on either outcome; the 35-point economy and every
  reachable ending are byte-identical.

regression_test: tests/regression/sealed_crypt_grip_one_shot.test.ts
