id: bug_0378
pack: coroners_errand_v1
title: "physician's black bag was foregrounded but not addressable"
severity: minor
scene: study
reported_by: blind_playtest_20260620T120449Z_coroners_errand_seed7

symptom: >
  The study description called out a physician's black bag by the door as a
  suspicious clue, but the bag was not listed in the room's objects and could not
  be examined. A player following the prose would try "examine bag" and receive
  no useful interaction.

root_cause: >
  The bag was authored only as room-description scenery even though the prose made
  it a concrete noun with investigative weight.

fix: >
  Added the physician's black bag as non-takeable, examinable study scenery. Its
  description discharges the clue by explaining that the bag is ordinary and that
  the household medicine chest remains the relevant evidence source. Score, exits,
  evidence flags, and endings are unchanged.

tests: tests/regression/coroners_errand_physician_bag_addressable.test.ts
