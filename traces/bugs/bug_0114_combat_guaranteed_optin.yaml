bug_id: bug_0114
pack_id: null   # validator/engine change — no single pack; guards all RPG packs
seed: 53
type: validator   # opt-in verifier strengthening under trust-but-verify (AGENTS.md)
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T10-03-51-892Z/playtest.md   # watchtower_road seed 53
  finding: >
    This cycle's mandated blind pass was watchtower_road (seed 53). A fresh source-blind
    MCP-only subagent reached all three endings, found ZERO functional bugs, and rated it
    clarity 4/5 / enjoyment 4/5 — its only note (the sealed letter's "break open and read"
    hint) was already cashed last cycle (bug_0108) and the phrase idiomatically points at
    the hermit, so rewording it a 2nd consecutive cycle would be content churn. The pack
    is blind-clean across seeds 7/19/53. More broadly, the content AND structure layers
    have converged: every parser pack is now branched (wreckers_light/bug_0099,
    alchemists_tower/bug_0111, sealed_crypt/bug_0105) and the dormant-boss lever shipped
    (bug_0083). With no content fix warranted, the cycle's value is the standing,
    documented next-step from bug_0113.
recurring_signal: >
    Every RPG blind pass (cold_forge seeds 7/31, sunken_barrow) raises the SAME note:
    combat damage RNG can fell a CORRECTLY-prepared player on bad rolls, with no way to
    restore HP — "a fully-prepared player who gets unlucky has no recourse." That is TRUE
    and, for the shipped packs, INTENTIONAL (bug_0101/0102 made preparation a real,
    winnable gamble, honestly prosed). bug_0113 made the winnability proof's CONTRACT
    honest about this (it is a best-case lower bound, not a worst-case guarantee) and
    named the sound next-shape: let a pack DECLARE its fights fair and have the bar prove
    it. This bug builds that.
failure:
  type: unverifiable_fairness_promise
  where:
    - src/validate/rpg_validator.ts   # combat-winnability proof had only the lower bound
    - src/rpg/schema.ts               # RPG meta had no fairness opt-in
  description: >
    Before this change there was no way for a pack to assert "this fight is fair, not a
    gamble" and have it CHECKED. The default proof (COMBAT_UNWINNABLE) is a deliberately
    conservative best-case lower bound: it forbids only a TRULY impossible fight and
    PERMITS a luck-dependent gamble. That is correct for the gamble packs, but it left the
    fairness of a fight that WANTS to be fair an unverifiable hope — exactly the property
    every RPG playtester intuits is missing. "Combat is fair" was undeclarable and
    unaudited.
fix:
  layer: validator + schema   # trust-but-verify; the automated bar is strengthened
  summary: >
    Added an OPT-IN combat fairness guarantee. (1) Schema: a new optional RPG-meta field
    `combat_guaranteed?: boolean` (RpgMetaSchema = ParserMetaSchema + the field), declared
    `.optional()` so an absent field stays absent in the compiled pack — every existing
    RPG pack compiles byte-identically and NO content hash moves. (2) Validator: when
    `meta.combat_guaranteed` is true, each fight must additionally clear the UPPER bound —
    best reachable stats but the player's WORST rolls (player min damage d6=1, enemy max
    damage d6=6). This is the exact mirror of the existing best-case math with the rolls
    flipped: min player damage MAXIMISES rounds-to-kill, so the enemy retaliates the MOST
    times (worstRoundsToKill - 1, player still striking first), each for the MOST it can
    deal — the provable maximum total damage any roll sequence can inflict. If that still
    drops a best-prepared player (maxDamageTaken >= reachable HP), the promise is false and
    `COMBAT_NOT_GUARANTEED` errors; otherwise the player survives on EVERY sequence, so the
    guarantee is sound. The runtime model (src/rpg/combat.ts) matches the bound exactly:
    damage = max(1, d6 + atk - def), player strikes first, enemy retaliates only on rounds
    it survives.
  soundness: >
    Strictly additive and opt-in. Packs that do NOT set the flag are completely unaffected
    — the shipped gamble packs (cold_forge, sunken_barrow) stay unflagged, so bug_0113's
    pinned "a gamble is permitted, not flagged" semantics hold. The new ERROR is a SEPARATE
    code (COMBAT_NOT_GUARANTEED), never the COMBAT_UNWINNABLE lower-bound. No current pack
    opts in, so this is a future-guarding bar exactly like bug_0110's down-only var-gate
    check: it has teeth the moment any pack declares a fight fair.
  reachable_endings_changed: false
  content_hash_changed: false   # optional absent field; no pack edited. No HASH_PIN re-pin.
  regression_test: tests/regression/rpg_combat_guaranteed_optin.test.ts
verified_live: >
    Through compileRpgPack + validateRpg: the exact stats bug_0113 showed are best-case
    winnable but worst-case lethal (hp20/atk6/def4 vs brute hp18/atk7/def2) draw NO finding
    without the flag, and COMBAT_NOT_GUARANTEED WITH it (worst case 9*3=27 >= 20). A
    genuinely fair fight (hp50/atk6/def12 → worst case 1*3=3 < 50) is clean under the flag.
    The `>=` boundary holds (HP 27 flagged, HP 28 clear). The shipped cold_forge pack
    (loadRpgPackFile) has combat_guaranteed undefined and draws no COMBAT_NOT_GUARANTEED.
next_focus: >
    (1) The opt-in now EXISTS; a future RPG pack designed as a fair fight can adopt
    `combat_guaranteed: true` and have the bar enforce it (the shipped packs intentionally
    stay gambles). (2) The genuine player-experience gap the testers keep naming — an
    unlucky prepared player dies with no HP RECOVERY (only retreat, which neither RPG room
    heals) — remains a CONTENT/engine lever if a future pack wants a healing affordance or
    a "fair" tuning; YAGNI until a pack wants it. (3) Keep ROTATING the blind pass onto
    least-attended packs (watchtower now freshly attended at seed 53). All packs remain
    content-complete, blind-clean, and at rest.
