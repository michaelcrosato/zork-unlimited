id: bug_0157
title: "generate_pack MCP tool + new_game(generate_seed) — expose the procedural generator through the agent surface"
kind: engine
mode: cyoa
severity: enhancement
layer: mcp
artifact:
  source: src/mcp/tools.ts
  also: src/mcp/server.ts
  test: tests/unit/mcp_generate_pack.test.ts

summary: >
  The mandated blind pass this cycle (wreckers_light, seed 29) re-confirmed content is blind-clean:
  clarity 5/5, enjoyment 5/5, ZERO mechanical bugs across all FOUR declared endings (saved / wrecker /
  mercy / drowned), with the reactive prose (bare mantel, gallery rewrite, knows_truth lantern reframe)
  and inventory-gating all confirmed working. Per [[content-polish-backlog-exhausted]] its only note —
  deliberate vignette brevity — is a breadth brief, not a polish edit to a clean pack. The standing
  product lever (docs/CURRENT_PLAN.md + [[fresh-pack-generator]]) is the fresh-pack GENERATOR, whose
  first slice (the pure minting core) landed bug_0156. bug_0157 lands the NEXT named slice: expose that
  generator through the MCP surface so a never-authored pack can be minted, validated, AND PLAYED.

mandated_blind_playtest:
  run: ai-runs/2026-06-03T07-17-46-701Z/playtest.md
  pack: content/cyoa/pack/wreckers_light.yaml
  seed: 29
  result: "reached ending_saved, ending_wrecker, ending_mercy, ending_drowned; clarity 5/5, enjoyment 5/5; ZERO bugs; reactive prose + inventory gating (hang_false_light only with oil+striker) confirmed live"
  triage: >
    No actionable content defect — wreckers_light is blind-clean and its inventory-reactive gating and
    knows_truth reframing were confirmed working, not bugs. The two soft notes (the iron key 'guards the
    lamp' framing actually opening the sea-chest; read_journal gating no ending) the tester itself judged
    thematically intentional and reasonable for agency. Rather than manufacture an edit to a clean pack
    or author a redundant CYOA #11, the cycle advanced the plan's named next lever: the generator's MCP
    slice. The brevity/vignette note is the same brief bug_0156 already answered (the generator emits the
    signature gated-fork shape at scale).

what:
  - >
    src/mcp/tools.ts — generate_pack(seed): a PURE, read-only handler that MINTS a fresh CYOA pack via
    generateCyoaPack(seed) and validates it with the SAME production validateCyoa gate the curated packs
    clear (zero findings of ANY severity), returning { ok, mode, pack_id, content_hash, seed, meta,
    scene_count, ending_count, report }. The content_hash is exactly hashState(pack), so the reported
    hash never drifts from the compiled pack. Writes nothing to disk.
  - >
    src/mcp/tools.ts — new_game now accepts an optional generate_seed: when present it mints the pack
    IN-MEMORY via requireGeneratedPlayable(seed) (refusing to play unless validateCyoa is clean) instead
    of loading from pack_path, so a never-authored pack is playable through the exact MCP surface the
    blind playtester uses. The in-memory CompiledPack is { pack, contentHash: hashState(pack) } — byte-
    identical to what compilePack produces from the same pack's YAML — so NO file is written and the
    server keeps its read-only / least-privilege stance (§16). generate_seed (theme/structure) and the
    runtime seed are independent. new_game with neither pack_path nor generate_seed throws clearly.
  - >
    src/mcp/server.ts — registers the generate_pack tool and adds the optional generate_seed input to
    new_game (pack_path made optional), with descriptions guiding the mint-then-play flow.

why: >
  Every structural proof in the suite runs only against a FIXED ten-pack set; a frozen eval set is the
  condition under which a self-improving agent's verifier becomes memorisable rather than a moving target
  (arXiv 2510.14253; [[verifier-assertion-guard]]). bug_0156 built the minting core but left it test-only.
  Exposing it through MCP is the first deferred slice the generator's own docstring + docs/CURRENT_PLAN.md
  name: it lets the agent/loop (and a future assessor mint-and-play lever) confront a fresh, never-seen
  pack held to the identical shipped bar — the credible demonstration that the verifier faces a moving
  target. Key-free, no outbound model call, no new write capability.

scope_deliberately_excluded: >
  Still NEXT, kept out so this stays one focused, green-bar change (docs/CURRENT_PLAN.md rejected/next):
  an assessor lever that mints-and-plays a fresh pack each cycle, persistence of a held-out corpus, and
  mode-widening (parser/RPG generators). Generated packs remain in-memory only — never written under
  content/cyoa/pack — so they incur no blind-playtest obligation and never pollute the curated showcase.

regression:
  test: tests/unit/mcp_generate_pack.test.ts
  guards: >
    Locks the MCP path to the shipped bar: generate_pack must report a minted pack validator-clean with
    the schema-stamped id/hash; determinism must carry through the tool (same seed ⇒ identical hash+meta);
    distinct themes must differ; a spread of seeds must all validate clean; and new_game(generate_seed)
    must genuinely PLAY a minted pack through the live engine, with the truth gate load-bearing on that
    surface (act_on_truth absent at the pristine hub, present only after the investigation sets the flag,
    ending at ending_truth) and an un-gated stance reaching its own ending. new_game with neither input
    must error.

