id: bug_0468_examiners_deposition_fail_converges
title: "Examiner's Commission deposition failure remains a tension beat"
pack: content/cyoa/pack/examiners_commission.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T213030Z_examiners_commission_seed7.md
severity: S1
symptom: >
  A blind playtester passed Henry Alderton's composure check and flagged the
  unobserved failure branch as the only serious design risk: if a failed roll
  withheld heard_henry_discrepancy, the criminal-trial ending would be randomly
  blocked after an otherwise complete investigation.
root_cause: >
  The content was authored to make both skill-check branches convergent, but the
  pack-specific regression suite only exercised the seeded success route. That
  left the non-blocking contract vulnerable to future accidental drift.
fix: >
  Added a forced-failure regression using the CYOA runner's deterministic RNG seam.
  It proves the failure branch still sets heard_henry_discrepancy, awards the same
  evidence score, keeps refer_to_trial available, and reaches ending_trial at 50/50.
tests:
  - tests/regression/examiners_commission_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/examiners_commission_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/examiners_commission.yaml
  - npm run health
