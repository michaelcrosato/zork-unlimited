id: bug_0192
title: "MCP authoring asymmetry — the parser generator had no generate_parser_pack tool / new_game(generate_parser_seed) seam, so an agent could mint+play fresh CYOA and RPG packs but never a fresh PARSER pack"
kind: engine_fix # MCP-surface feature addition (the generator-program twin of bug_0157/bug_0160)
mode: parser
# Informational. No pack content changed, so nothing re-pins. verify:integrity stays green
# with no AI_LOOP_ALLOW_VERIFIER_EDITS.

summary: >
  The "evolve the eval distribution" generator program exposes each procedural generator through the
  agent-facing MCP surface as a generate_* tool + a new_game generate_*_seed branch: CYOA shipped as
  generate_pack (bug_0157), RPG as generate_rpg_pack (bug_0160). The PARSER generator
  (src/gen/parser_generator.ts, generateParserPack) was the third leg — already minted internally by
  the AFK assessor (src/afk/assessor.ts:843) — but had NO MCP tool and NO new_game seam. So through the
  MCP boundary an agent could mint, validate, and PLAY a fresh, never-authored CYOA pack and a fresh RPG
  pack, but could not do the same for a fresh PARSER pack: the parser-only verifier surfaces (depth-2
  obtainability / soft-lock, the moral same-key fork) only ever faced the FROZEN hand-authored parser
  packs (alchemists_tower, friars_postern, sealed_crypt), never a moving target.

root_cause: >
  src/mcp/tools.ts defined requireGeneratedPlayable (CYOA) and requireGeneratedRpgPlayable (RPG) and the
  generate_pack / generate_rpg_pack tool methods, plus the generate_seed / generate_rpg_seed branches in
  new_game, but never the parser twins. src/mcp/server.ts registered the two tools and their new_game
  params but not a parser equivalent. The parser generator + validateParser gate already existed and were
  proven (parser_generator.test.ts, the assessor mint window); only the MCP wiring was missing.

fix: >
  Additive symmetry, no check weakened, no generator_version bump, no corpus re-seal, no verifier edit.
  (1) src/mcp/tools.ts: import generateParserPack + the ParserPack type; add requireGeneratedParserPlayable(seed)
  mirroring the RPG twin — mints via generateParserPack, refuses to play unless validateParser is clean,
  returns { mode:"parser", compiled:{ pack, contentHash: hashState(pack) } } (byte-identical to a YAML-loaded
  pack; nothing written to disk, §16). (2) Add the generate_parser_pack tool method (mint + validateParser,
  reporting id/hash/seed/meta + room_count/object_count/ending_count + report), and a generate_parser_seed
  branch in new_game (after generate_rpg_seed); the no-source error message now names generate_parser_seed.
  (3) src/mcp/server.ts: register generate_parser_pack and add the generate_parser_seed param to new_game.

out_of_band_teeth: >
  tests/unit/mcp_generate_parser_pack.test.ts holds the MCP path to the SAME bar as the RPG twin's test:
  generate_parser_pack mints a validateParser-clean pack (zero findings of any severity) with the schema-
  stamped id genpar_0_v1, the reported content_hash byte-equal to hashState(generateParserPack(0)), and the
  correct shape counts (3 rooms / 7 objects / 2 endings, max_score 15); determinism through the tool (same
  seed => identical hash + meta); distinct seeds => distinct packs; clean across a seed spread. The live
  surface is exercised through new_game(generate_parser_seed): a session starts in-memory with no file on
  disk, and the flag-gated exit is load-bearing — from the hub the way ON (north, to the goal) is ABSENT
  while the gate stands locked though the way back (south) is open, the depth-2 chain the parser validator
  proves obtainable. The no-source guard now asserts the error names generate_parser_seed.

regression_test: tests/unit/mcp_generate_parser_pack.test.ts

verification: >
  npx vitest run tests/unit/mcp_generate_parser_pack.test.ts green (7 tests). npx tsc --noEmit clean.
  npm run health green (verify:integrity + lint + prettier + typecheck + all tests + all pack validates +
  coverage playtest). verify:integrity green with NO AI_LOOP_ALLOW_VERIFIER_EDITS (no protected/hash-pinned
  file changed, no floor lowered, no matcher relaxed).

files_changed:
  - src/mcp/tools.ts                # import generateParserPack + ParserPack; requireGeneratedParserPlayable; generate_parser_pack method; new_game generate_parser_seed branch
  - src/mcp/server.ts               # register generate_parser_pack tool; add generate_parser_seed param to new_game
  - tests/unit/mcp_generate_parser_pack.test.ts
  - traces/bugs/bug_0192_mcp_generate_parser_pack_symmetry.yaml
