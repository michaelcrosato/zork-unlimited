bug_id: bug_0104
pack_id: n/a   # validator capability (cross-pack), not a single-pack content bug
seed: 23
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T07-27-13-080Z/playtest.md   # wreckers_light, seed 23
  finding: >
    The assessor's rank-1 mandated target this cycle was wreckers_light (its first dedicated
    pass was last cycle, bug_0100, seed 7). Per the protocol's "rotate the seed" clause and
    project memory, the pass ran on a NEW seed (23) to avoid re-fitting. A fresh source-blind
    MCP-only subagent played 4 routes to ALL FOUR endings (saved / wrecker / mercy / drowned),
    rated it clarity 5/5, enjoyment 5/5, and found ZERO functional bugs — the pack is
    blind-clean across two seeds. The ONE recurring signal it surfaced was NOT a content
    defect but a validator gap (report §4/§5): the playtester could not tell whether the
    knows_truth flag was inert ("worth an author check") because that question — does a flag
    that is SET ever get READ? — is invisible from inside the game. (knows_truth IS in fact
    consumed by the save/wreck/mercy ending variants; the worry was the general class.) Since
    the pack itself needs no fix, the cycle's improvement is the structural lever that turns
    that manual worry into the enforced bar.
failure:
  type: missing_soundness_check
  scope: src/validate/cyoa_validator.ts
  description: >
    The CYOA validator's soundness family caught silently-dead CONTENT (UNREACHABLE_VARIANT
    bug_0085, UNSATISFIABLE_CONDITION bug_0086) and a never-firing MECHANIC (DEADLINE_UNFIREABLE),
    but had no check for dead STATE: a flag written by a `set_flag` effect (or declared in
    flags_init) that no condition anywhere ever reads. Such a write is a no-op the player can
    never observe and a blind playtester can never audit. Auditing the three shipped cyoa packs
    revealed FOUR such inert flags that had accumulated as vestigial "player-went-here" /
    redundant bookkeeping:
      - clockwork_heist: vault_open  (set on pick_lock; the `next: vault` edge already carries it)
      - clockwork_heist: has_letter  (set on both letter routes; redundant with the `letter`
                                      item + the letter_displayed/letter_hidden flags the truth
                                      ending actually reads — bug_0051)
      - watchtower_road: saw_watchtower (set on go_east; the scene transition is the state)
      - watchtower_road: met_hermit     (set on talk_hermit; the scene transition is the state)
    None of the four had any reader (has_flag/not_flag) anywhere, and no test asserted them.
fix:
  layer: validator   # trust-but-verify: changed the validator freely, added a regression test
  summary: >
    (1) Added an INERT_FLAG check (warning, like its soundness-family siblings) to
    validateCyoa: for every flag in (set_flag writers ∪ flags_init) that appears in NO
    condition read (has_flag/not_flag, descending all_of/any_of/none_of across all choice
    conditions, scene/ending variant `when`s, and the deadline `when`), emit a warning. New
    helper collectFlagReads gathers the consumer set. Sound — no false positives: a flag is
    flagged ONLY when it has provably zero readers across the whole pack (a flag consulted
    only via not_flag, or only inside a disjunction, is correctly NOT flagged). Advisory
    warning, never error: an inert flag is a no-op, never a soft-lock.
    (2) Scrubbed the four vestigial flags the new check surfaced (5 set_flag lines removed:
    2 in watchtower_road, 3 in clockwork_heist), so the shipped packs validate 0/0 again. Each
    removal is a pure gameplay no-op — the routes, gates, variants, endings, and journals are
    unchanged, since nothing read these flags.
  files:
    - src/validate/cyoa_validator.ts
    - content/cyoa/pack/clockwork_heist.yaml
    - content/cyoa/pack/watchtower_road.yaml
  reachable_endings_changed: false   # every pack's routes/endings identical; the flags were unread
  content_hash_changed: true         # clockwork + watchtower effect-only no-op edits; NOT HASH_PIN_FILEs, no test pins them
  new_pack_hashes:
    clockwork_heist: d59303e9d314c23c53f860f36cc5a50a765be8453645f182abf4221d26efe077
    watchtower_road: f6b64fd996b722769b9d7559a53523ec7289fcd17207dacc401e444536d70120
    wreckers_light: 365ff4991ed65a784e322e9e470f124e39ce6530f0a3c6c9b9ee47451d3dbbec   # untouched this cycle
  regression_test: tests/regression/cyoa_inert_flag.test.ts
verified_live: >
    npx tsx bin/validate.ts on all three cyoa packs reports Result: OK (0 error, 0 warning).
    The new regression test confirms: the three shipped packs are NOT flagged (the scrub held);
    a flag set but never read IS flagged (warning severity, names the flag); a flag read only
    via not_flag is NOT flagged; a flag read only inside an any_of is NOT flagged; a flag read
    by an ending variant `when` is NOT flagged; an unread flags_init flag IS flagged. The
    clockwork truth-ending letter tests (reactive-letter, duplicate-sealed-letter) and the
    watchtower hermit-lore test all pass unchanged, confirming the removed flags were inert.
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan multi-step puzzles, so the blind LLM pass is the
    load-bearing quality signal; here it was clean (wreckers_light, seed 23, clarity 5/5,
    enjoyment 5/5) and its one recurring observation — "is this flag inert?" — drove a
    cross-pack validator improvement rather than a single content patch.
