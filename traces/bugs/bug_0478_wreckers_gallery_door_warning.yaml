bug_id: bug_0478
pack_id: wreckers_light_v1
seed: 7
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: blind-tester/reports/20260622T233228Z_wreckers_light_seed7.md
  finding: >
    The mandated blind pass found Wrecker's Light mechanically clean and rated it
    clarity 5/5 and enjoyment 5/5, but raised one remaining friction point: the Storm
    Gallery is reachable immediately from the first hub, so a curious player can step
    outside and reach the lethal rung choice before engaging the keeper, key, journal,
    or central moral setup. The existing bug_0100 fix already makes the actual
    `climb_to_wreck` choice honest once the player is on the gallery; this finding was
    the smaller upstream warning gap in the watch-room doorway text.
failure:
  type: upstream_signposting_gap
  scene: watch_room
  description: >
    The watch room described "a low door lets out onto the storm gallery and the
    rocks," which made `out_gallery` read like ordinary exploration from the hub. Since
    `out_gallery` is intentionally ungated and available before any story interaction,
    the room text should warn that the door opens straight onto an exposed storm-facing
    drop before the player chooses to step through it.
fix:
  layer: content
  pack: content/cyoa/pack/wreckers_light.yaml
  summary: >
    Reframed the watch-room low-door sentence, in both the base text and the
    striker-held variant, so it now says the door shudders against the storm and opens
    straight onto the exposed gallery and rocks below. This is text-only signposting:
    `out_gallery` remains available from the first watch-room read, still has no
    conditions, and still routes to the same Storm Gallery scene.
  reachable_endings_changed: false
  content_hash_changed: true
  new_pack_hash: 132fa87e7d971d486e5ed0c099969edc5920883ec2e39a3cf739d129817d3f55
  regression_test: tests/regression/wreckers_light_gallery_door_warning.test.ts
verified_live: >
  Focused regression coverage passes: wreckers_light_gallery_door_warning,
  wreckers_light_drowned_signposting, and wreckers_light_branching ran 13 assertions
  green. Pack validation reports OK with 0 errors and 0 warnings for
  content/cyoa/pack/wreckers_light.yaml.
playtest_coverage:
  note: >
    The blind tester did not find a mechanical failure; this is a polish fix that keeps
    the route topology unchanged while reducing the chance that first-click exploration
    reaches the death scene before the player has read the moral premise.
