id: bug_0377
pack: chandlers_lot_v1
title: "guildhall hint ambiguously asked for the chandler's own book"
severity: minor
scene: counting_room
reported_by: blind_playtest_20260620T114448Z_chandlers_lot_seed7

symptom: >
  The blocked guildhall exit said Guildhall needed "the chandler's own book."
  Both the public tallow ledger and the private adulteration book are plausibly
  the chandler's books, but only the adulteration book is takeable and required
  for the north exit.

root_cause: >
  The hint used a thematic phrase instead of the pack's concrete evidence name.
  That made the public ledger read like a possible required item even though it is
  only a comparison source.

fix: >
  Reworded the guildhall blocker, the post-proof counting-room text, and the
  guildhall arrival text to name the private adulteration book explicitly. The
  proof chain, score economy, exits, and endings are unchanged.

tests: tests/regression/chandlers_guildhall_book_clarity.test.ts
