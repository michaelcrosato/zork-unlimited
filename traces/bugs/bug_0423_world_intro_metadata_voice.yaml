id: bug_0423
title: World intro line read as leaked metadata instead of opening prose
pack: content/cyoa/pack/white_stag.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  The White Stag blind playtest reported that the opening text began with
  "From Charterhaven: ..." and read like framing metadata rather than authored
  narrative prose.
root_cause: >
  The shared world-intro renderer surfaced meta.world details with a labeled
  "From <hub>:" prefix and a semicolon-heavy assignment sentence. That preserved
  the information contract but made the first player-facing paragraph look like
  scaffolding.
fix: >
  Reworded the shared opening world assignment as prose while retaining the hub,
  district, role, connection, and quest hook. Added a regression against the
  White Stag opening to prevent the metadata label from returning.
tests:
  - tests/regression/world_intro_player_voice.test.ts
verification:
  - npm test -- --run tests/regression/world_intro_player_voice.test.ts
  - npm run validate -- content/cyoa/pack/white_stag.yaml
