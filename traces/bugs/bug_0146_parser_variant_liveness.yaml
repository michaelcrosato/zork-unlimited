  - "alchemists_tower: every declared room/object variant is the first match in some viewing state (search not capped)"
  - "sealed_crypt: every declared room/object variant is the first match in some viewing state (search not capped)"
  - "FAILS on a planted dead variant (a room variant guarded on flags no path sets) — the negative control"
  - "CREDITS a variant only reachable by stepping READ, and a READ-excluded control FAILS to credit it — proving stepping READ is load-bearing (the bug_0145 caveat)"
notes: >
