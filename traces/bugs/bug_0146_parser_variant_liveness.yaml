root_cause: >
  A gap in the structural-verification net, not a content defect — the PARSER half of
  the "dead reactive prose" class bug_0145 closed for CYOA. The class has two causes
  and, for parser, only one was machine-checked:
    (1) SHADOWING (bug_0091, parser_variant_shadowing): a later room/object variant
        whose `when` is PROVABLY ENTAILED by an earlier sibling's can never be the first
        match. Caught statically — but soundly partial: it reasons only over pure
        conjunctions of literals/var-bounds, never over the pack's actual gating.
    (2) UNREACHABLE GUARD (this bug): a room/object variant whose `when` no reachable
        state at its viewing context can satisfy — a flag set only on a branch that
        never returns, a var threshold the gating never reaches, a forbidden flag pair.
        Not shadowed; its guard is simply unreachable, so its text is dead and no blind
        playtest is GUARANTEED to surface it (the prose just never appears).
  bug_0146's own next-focus flagged the precondition: the parser exhaustive BFS skips
  reversible/observation actions, so a parser liveness proof "must first confirm no
  variant guard turns on a BFS-skipped action's effect before reusing the onState hook."
  It does: alchemists_tower's spellbook READ sets `read_recipe`, and two variants
  (cauldron, black_phial) gate on that flag — yet READ is in the reachability search's
  skipped set. A naive port of bug_0145 would FALSELY call those two variants dead.
fix: >
  Test-only (§15 lock-the-finding) + a backward-compatible test-support param. (a) The
  shared exhaustive BFS (tests/regression/support/exhaustive_endings.ts) gains two
  OPTIONAL knobs — `explore` (the action policy) and `key` (the dedupe fingerprint) —
  both defaulting to the existing reachability behaviour, so every current caller
  (cyoa/parser/rpg all-endings-reachable, cyoa_variant_liveness) is byte-for-byte
  unchanged and stays green. (b) A new regression (parser_variant_liveness.test.ts)
  drives the BFS with a LIVENESS action policy that steps every action EXCEPT the ones
  that provably cannot gate a variant — LOOK/INVENTORY/INSPECT (narrate-only or never
  legal), CLOSE (no resolver case), and DROP (see the DROP boundary) — and so DOES step
  READ. At each reachable state it records the first-match room variant (current room)
  and each PRESENT object's first-match variant (visible-or-held — examinable here),
  computed with the engine's own evalConditions semantics, and asserts every declared
  variant of every auto-discovered parser pack is displayed somewhere. No
  content/engine/validator/schema change.
within_bar: >
  Regression test only, plus two optional, behaviour-preserving params on a TEST-support
  helper. No pack edited; no validator/schema/engine change; NO hash pin moved (all 9
  packs validate 0/0, content_hashes unchanged). Deterministic, no LLM-judge, NO API key.
  Sound by construction: the search FAILS on cappedOut (never truncates silently), and a
  variant is credited only when it is the first match AND its subject (room/object) is in
  view in a genuinely-reachable state. The only error direction is a conservative FALSE
  ALARM, never a silent pass of dead prose.
  DROP boundary (documented, fails LOUD not silent): DROP is the one skipped action that
  still mutates state, skipped because (1) stepping it blows the 200k cap on both shipped
  packs (inventory-subset x drop-location explosion; ~6k/~10k states without it), and
  (2) its only variant-OBSERVABLE effect is `not_item: X` — its `place_object` sets the
  object's room, which NO condition in the closed DSL reads (conditions.ts has only
  is_open/is_unlocked for object state). The residual gap — a variant satisfiable ONLY by
  taking X then dropping it — is an anti-pattern no shipped variant uses (every shipped
  `not_item` variant is satisfiable on the natural pre-acquisition/post-consumption
  route, all found live), and would surface as a LOUD failure to investigate, never a
  silent pass.
