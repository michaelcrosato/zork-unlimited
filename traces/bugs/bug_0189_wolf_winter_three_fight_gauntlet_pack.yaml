design:
  thesis: >
    A killing winter has driven a wolf-pack down out of the high wood onto a lone hill-steading, and three of
    them have come over the broken paling at the byre where the last of the cattle — the family's whole winter —
    are penned. You are the steading's hunter, the only one awake. Read the day-book (+5), heed old Cade the
    houndsman (+2 attack, where a wolf's rush leaves its throat open) AND pull on the padded byre-jerkin from
    the store (+2 defense), then hold the byre's one corridor: put down the yearling at the paling, the
    flank-wolf at the door, and the grey leader deep in the byre, and reach the cattle as the pack breaks at
    dawn (the locomotion win, +15).
  mechanic_axis: >
    A THREE-FIGHT guaranteed gauntlet — the deepening bug_0187 named. The Dawn Beacon is the only other
    combat_guaranteed pack and it runs TWO fights; no curated pack drove the cumulative-HP bound
    (COMBAT_GAUNTLET_NOT_GUARANTEED, bug_0172) over three. The cumulative bound is an order-independent
    OVER-approximation of worst total damage (sum of each fight's worst-case maxDamageTaken), so a third
    fight makes the surface strictly harder to satisfy: one more term to sum against the same reachable-HP
    budget. The fiction earns the guarantee the same way the Beacon's does — skill and prep decide, not luck
    (a properly speared-and-padded hunter who reads the rush is not pulled down) — so Cade can make a true
    promise the gamble packs' hedging never could.
  combat_math: >
    Best reachable stats = init (hp30/atk5/def3) + Cade's +2 attack counsel + the byre-jerkin's +2 defense =
    atk7/def5/hp30. Wolves are def2, atk 4/5/6, hp 11/12/13. Per-fight worst-case (player min roll, enemy
    max roll): yearling -> 2 rounds, 5 damage; flank-wolf -> 2 rounds, 6 damage; grey leader -> 3 rounds,
    14 damage. Each < 30 (COMBAT_NOT_GUARANTEED clears) and cumulative 5+6+14 = 25 < 30
    (COMBAT_GAUNTLET_NOT_GUARANTEED clears) with margin. Distinctively (the three-fight property): BOTH
    buffs are load-bearing on the CUMULATIVE bound SPECIFICALLY and NEITHER on any single fight — drop the
    jerkin (def5->3) and per-fight rises to 7/8/18 (each STILL < 30) but cumulative 33 >= 30; drop the
    counsel (atk7->5) and per-fight rises to 10/12/21 (each STILL < 30) but cumulative 43 >= 30. Each prep
    is required by the SEQUENCE, not by any fight in isolation. base-stat play (no prep) on worst rolls dies,
    so the death ending stays genuinely reachable — the guarantee covers only the BEST-prepared hunter (bug_0114).
  endings:
    - id: ending_held
      reach: "(prepared) read day-book +5 -> don jerkin (+2 def) -> hear counsel (+2 atk) -> down yearling +10 -> down flank-wolf +10 -> down grey leader +10 -> reach cattle +15 = 50/50"
      note: "the sole win; visited: cattle_stand (locomotion win, like the Beacon's crown / cold_forge's ember chamber); SCORE_PEAKS does not fire on a navigation win"
    - id: ending_pulled_down
      reach: "(under-armed) skip the jerkin and/or counsel, take worst rolls -> pulled down by a wolf over the gauntlet"
      note: "DEATH (all three wolves' death_ending); recoverable via load (§8.7); not a win_condition"

