id: bug_0440_tide_mill_fraud_resolution
title: "Tide Mill win ending resolves the fraud investigation"
pack: content/parser/pack/tide_mill.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T110051Z_tide_mill_seed7.md
severity: S2
symptom: >
  The pack's metadata and opening frame ask the player to trace a mill fraud, but the
  honest win ending only rescued the caught boat and never stated what the investigation
  proved.
root_cause: >
  The content resolved the maintenance emergency mechanically while leaving the stated
  Charterhaven fraud brief out of the final payoff.
fix: >
  Expanded ending_saved with a concise report line naming the fraud: a wheel made to fail
  through the dropped pawl and choked race, shifting toll and blame with the tide.
tests:
  - tests/regression/tide_mill_fraud_resolution.test.ts
verification:
  - npm test -- --run tests/regression/tide_mill_fraud_resolution.test.ts tests/regression/tide_mill_nonlinear.test.ts tests/regression/tide_mill_blind_polish.test.ts
  - npm run validate -- content/parser/pack/tide_mill.yaml
  - npm run health
