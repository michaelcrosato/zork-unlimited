id: bug_0484
title: Coroner's Errand medicine chest pointed at an already-examined bottle
pack: content/parser/pack/coroners_errand.yaml
reported_by: blind playtest 2026-06-23 seed 7
severity: low
symptom: >
  The blind playtest examined the dark bottle before formally examining the
  medicine chest. The chest narration then told the player to use the commission
  on the displaced bottle, even though that formal bottle examination had already
  happened.
root_cause: >
  The medicine chest narration assumed a single order: chest first, bottle second.
  The pack correctly allows either order, but its prose used a forward instruction
  instead of an order-neutral explanation of what the displaced bottle means.
fix: >
  Reworded the medicine chest formal-examination narration so it identifies the
  displaced bottle without issuing a command. Added a poison_identified chest
  variant that acknowledges when the bottle has already been documented.
tests:
  - tests/regression/coroners_medicine_chest_order.test.ts
verification:
  - npm test -- --run tests/regression/coroners_medicine_chest_order.test.ts
  - npm run validate -- content/parser/pack/coroners_errand.yaml
