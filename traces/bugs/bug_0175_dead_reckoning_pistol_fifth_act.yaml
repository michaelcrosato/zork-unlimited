    ending_irons: rule the boat by lethal force. This is the investigate-to-unlock symmetry of
    trust_pilot (the choice is ABSENT until the pistol is taken, PRESENT after).
  fifth_stance: >
    ending_irons "Under the Gun" — survival bought with FEAR, thematically distinct from
    holdfast's peace-by-fairness and adrift's greed, never converging on either (a fifth, distinct
    endingId). It fires a knows_course reactive variant (a TRUE course enforced at pistol-point vs
    a blind gamble held the same way), matching the pack's paired-epilogue discipline.
  honesty: >
    The chest prose is kept honest about what it still holds: new has_pistol text variants
    (both-flags FIRST so a single-flag variant never shadows it — cyoa_variant_shadowing) so the
    "cased pistol" line never dangles after the gun is taken.

