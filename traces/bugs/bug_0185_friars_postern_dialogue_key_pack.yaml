design:
  thesis: >
    A debtors' gaol the night before the watch comes. The two existing parser packs each carry an NPC,
    but in both the talk is an OPTIONAL clue source (sealed_crypt's sexton only hints at puzzles you can
    also solve by poking the world). Here the talk is LOAD-BEARING and INVERTS the genre reflex: the one
    way out — the friars' walled-up postern behind the chapel font — can be learned ONLY from the old
    debtor in the commons, and the flag her telling sets (knows_postern) is the SOLE key to the escape
    exit; no item opens it. Meanwhile the OBVIOUS physical key (the drunk turnkey's free-hanging ring)
    opens only ruin: the barred night-gate where the watch already waits (a DEATH, ending_taken) and the
    inmates' pooled alms-box (rob your fellow wretches and bolt, a non-death greed ending, ending_thief).
    That is the sealed_crypt bug_0105 "one key, two locks" device, here a key with two BAD locks, while
    FREEDOM costs no key — only trust: fetch the woman's confiscated pipe and be TOLD the latch's trick.
  mechanic_axis: >
    Dialogue-as-key. The new axis verified clean against the validator + solver: a dialogue NODE's
    set_flag is counted as settable (parser_validator allEffects scans npc.dialogue.nodes), so a flag
    set ONLY in conversation legally satisfies an exit gate (IMPOSSIBLE_GATE silent); the flag is read by
    the chapel postern exit (has_flag) and by the one-shot topic guards (not_flag), so it is not INERT;
    and the exhaustive solver steps TALK + ASK (progress actions), so the dialogue-gated ending_free is
    PROVED reachable, not assumed. The +20 climax rides the take_pipe LEARNING node, so the perfect score
    (35) coincides with knowing the way out, one act before the visited win — the accepted sealed_crypt
    denouement shape (SCORE_PEAKS does not fire on a locomotion win).
  endings:
    - id: ending_free
      reach: "read clue -> lodge(take pipe) -> commons: talk, ask_escape (+10), ask_give_pipe (+20) -> chapel -> go_north"
      note: "the sole win; turns on knows_postern, set only by the conversation; 35/35"
    - id: ending_thief
      reach: "lodge(take gate_key) -> chapel -> unlock_alms_box"
      note: "non-death greed; the turnkey's ring robs the inmates' poor-fund and bolts; score 0"
    - id: ending_taken
      reach: "lodge(take gate_key) -> gatehouse -> unlock_iron_gate"
      note: "DEATH; the watch waits beyond the barred gate the wall-scratches warned against; recoverable via load; score 0"

