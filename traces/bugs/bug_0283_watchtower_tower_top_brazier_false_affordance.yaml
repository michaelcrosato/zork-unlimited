id: bug_0283
title: "watchtower_road tower_top: brazier text creates false affordance without lantern"
pack: watchtower_road_v1
scene: tower_top
class: reactive-description-blindness
severity: content
discovered_by: blind_playtest
playtest_report: ai-runs/2026-06-08T04-04-29-865Z/playtest.md
seed: 42

description: |
  The tower_top scene's base text reads "A cold brazier waits, begging for a flame"
  regardless of whether the player holds the lantern. The `light_beacon` choice is
  correctly gated on `has_item: lantern`, so a player without the lantern sees scene
  prose that implies an available interaction that does not appear in available_actions.

  This is the reactive-description-blindness class: scene text implies a mechanic the
  player cannot currently access — the same class as bug_0120 (tower_top post-lighting
  stale text), bug_0134 (hermit_talk re-greeting), and bug_0282 (mossy_brook stale camp).

  A blind playtester (seed 42) climbing the tower before finding the lantern noted:
  "the scene is describing an interactable object the player cannot interact with.
  On first visit the player may try to work out how to light the brazier before
  realizing there is no option."

reproduction: |
  1. new_game(watchtower_road_v1, seed=42)
  2. go_east → approach_base → climb_stairs → continue_up
  3. Observe tower_top text: "A cold brazier waits, begging for a flame"
  4. Observe available_actions: no light_beacon (lantern not in inventory)
  → Base text implies affordance; action is absent.

fix: |
  Added a `not_item: lantern` variant to tower_top, ordered after `raised_alarm` and
  before the base text (first-match-wins). When the player lacks the lantern and has not
  yet lit the beacon, the neutral form renders: "A cold iron brazier stands at the
  parapet's edge, dark and empty." The "begging for a flame" base now only renders when
  the lantern is in inventory and the alarm has not been raised — exactly the right
  moment for that invitation.

  Variant ordering:
    1. raised_alarm  → blazing beacon (existing, bug_0120)
    2. not_item: lantern → neutral "dark and empty" (new, bug_0283)
    3. base → "begging for a flame" (lantern-holder pre-lighting)

locked_by:
  - tests/regression/watchtower_tower_top_brazier_affordance.test.ts

siblings:
