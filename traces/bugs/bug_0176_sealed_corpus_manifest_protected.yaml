what:
  - >
    scripts/verify-integrity.ts — added corpus/manifest.json to PROTECTED_FILES. The manifest is the
    OUTPUT of bin/seal-corpus.ts (itself protected since bug_0167) and the committed pin the
    contamination-free benchmark rests on (bug_0163/bug_0165): each entry fixes a generated pack
    content_hash + generator_version for a frozen seed window, defining the held-out split
    src/afk/benchmark.ts scores against. The generators that MINT it were already guarded, but the
    manifest itself sat OUTSIDE the guard — so a manual re-seal that rewrites these hashes WITHOUT a
    generator change (the launder that swaps in a degraded eval distribution and re-pins to make
    held_out_corpus_sealed go green) would slip past the drift check unseen. Adding the entry is pure
    TIGHTENING of the guard surface (never a GUARD_WEAKENED): deleting the manifest is now a hard
    PROTECTED_DELETED error, re-sealing it surfaces a non-blocking VERIFIER_TOUCHED warning for review
    (a deliberate deepen cycle behind a generator_version bump, which also re-seals, stays legal — just
    visibly), and dropping it back out of PROTECTED_FILES is itself the DGM "edit-the-checker" launder
    (GUARD_WEAKENED). The protecting comment is kept free of apostrophes/quotes/brackets so
    parseGuardConstants still extracts the full literal (locked by the live-constants round-trip in
    tests/unit/verifier_integrity.test.ts).
  - >
    tests/regression/sealed_corpus_manifest_protected.test.ts (+6 cases) — exercises the REAL pure
    detectors on the REAL PROTECTED_FILES list: the manifest is in PROTECTED_FILES and exists on disk;
    the real runStatic raises no PROTECTED_MISSING for it; classifyDrift treats a manifest DELETION as
    a hard PROTECTED_DELETED error and a manifest RE-SEAL as a non-blocking VERIFIER_TOUCHED warning
    (so deepen-and-reseal cycles stay legal); and detectGuardWeakening fires GUARD_WEAKENED if a future
    cycle removes it from the protected list. Mirrors bug_0167's generator_program_protected pattern.

why: >
  Trust-but-verify (AGENTS.md): under full agent trust the dominant failure mode is reward-hacking —
  silently weakening the very assets that establish correctness (EvilGenie arXiv:2511.21654; DGM
  "edit-the-checker" arXiv:2505.22954; agentic-self-learning arXiv:2510.14253, cited in this repo).
  The guard already protects the engine, validators, persistence, determinism property tests, the
  generator program (bug_0167), and itself. The sealed corpus manifest was the LAST load-bearing
  committed verification artifact left outside it: the benchmark thesis rests on the held-out split
  being a never-frozen, honestly-sealed distribution, and a silent re-pin of corpus/manifest.json is
  precisely the move that would launder a degraded distribution into it. held_out_corpus_sealed.test.ts
  proves the pins still re-mint deterministically; this guard now makes any change to the pins
  themselves visible and effortful, and their deletion a hard error.

verification: >
  npm run health EXIT 0 — 206 test files, 1295 tests pass (up from 205/1289; +1 file, +6 cases).
  verify:integrity static OK 0/0; drift vs HEAD OK with exactly 1 expected VERIFIER_TOUCHED warning
  (scripts/verify-integrity.ts is itself a PROTECTED file) — NO GUARD_WEAKENED (adding a PROTECTED_FILES
  entry strengthens the surface), NO PROTECTED_DELETED, no MIN_* floor change, no matcher relaxed, net
  test count ROSE. No source/validator/engine/schema/generator/corpus change beyond the guard edit; the
  manifest itself is byte-unchanged this cycle (no re-seal); no curated content touched (10 packs
  validate 0/0); no curated hash re-pin. Locked by tests/regression/sealed_corpus_manifest_protected.test.ts.
