id: bug_0179
title: "Pin the third, unguarded tier of bug_0101's claim — The Cold Forge founder's plate (+2 defense) is MECHANICALLY load-bearing, by concrete play"
kind: test
mode: meta
severity: enhancement
layer: verification
artifact:
  source: content/rpg/pack/cold_forge.yaml
  test: tests/regression/cold_forge_plate_load_bearing.test.ts

summary: >
  bug_0101 retuned The Cold Forge's slag sentinel (hp18/atk7) so PREPARATION decides the fight, and the
  pack documents THREE tiers (cold_forge.yaml enemy block): under-armed atk4/def2 is "lethal more often
  than not"; the spirit's +2 attack (atk6/def2) is "the decisive survival lever (~45%→~90%)"; the
  founder's plate on top (atk6/def4) "makes it a near-certain win with a comfortable HP cushion". Two of
  those tiers are pinned by concrete play (cold_forge_sentinel_prep_matters.test.ts, bug_0101:
  under-armed→ending_fallen at seed 1; +2 attack→ending_victory at seed 1). The PLATE tier was verified
  only by a throwaway 40-seed probe (__probe.ts, since deleted) and is otherwise pinned only for its
  ROOM-TEXT nudge (cold_forge_unworn_plate_nudge.test.ts, bug_0118) — nothing locked that the +2 defense
  actually BLUNTS the sentinel's blows in the real fight. This cycle's mandated blind playtest
  (ai-runs/2026-06-03T14-01-18-745Z/playtest.md, seed 7, clarity 5/5, enjoyment 4/5, zero bugs)
  re-raised the standing theme — "preparation shifts the odds heavily but isn't strictly required" — so
  the load-bearing-ness of the optional armour is exactly the property worth a durable witness.

root_cause: >
  Not a defect — a verification-depth gap. A regression that re-softened the sentinel, dropped the
  plate's `inc_var: defense`, or otherwise made the plate cosmetic again (the precise bug bug_0101 was
  created to kill — "preparation was cosmetic") would pass every existing check green: the best-case
  winnability validator only errors if even the LUCKIEST run loses (bug_0113 semantics), and
  all-endings-reachable only proves the death ending is reachable somehow. The plate's mechanical
  contribution had no oracle.

fix: >
  NEW tests/regression/cold_forge_plate_load_bearing.test.ts (4 cases) — a concrete-play witness, the
  curated-pack counterpart to the generator's load-bearing-buff witness
  (rpg_generator_cumulative_survival.test.ts, bug_0174). (1) the pack still validates green. (2) FAITHFUL
  LINKAGE: donning the plate raises defense 2→4 by real play (sets plate_donned + inc_var defense). (3)
  THE PLATE FLIPS A LETHAL FIGHT: at seed 4, from the identical +2-attack pre-fight state (atk6/def2,
  full HP, fixed step), the UNPLATED copy is killed (ending_fallen) while the PLATED copy (def 4) — same
  step, same step-keyed d6 rolls, ONLY the +2 defense differs — survives (sentinel_stilled, hp>0). (4)
  THE CUSHION IS REAL: across seeds where both copies win (0,1,2,3,7), the plated player ends with
  STRICTLY MORE HP than the unplated one. No change to content, engine, validator, schema, or any
  source — purely a regression test + this artifact.

witness: >
  Soundness rests on isolating the +2 defense from PRNG noise. The engine PRNG is (seed, step)-keyed
  (src/rpg/combat.ts) and the plate route takes a side-detour (extra steps), so playing the plate vs
  no-plate routes would draw DIFFERENT fight rolls — apples-to-oranges. So the test fights two copies of
  ONE +2-attack pre-fight state at the IDENTICAL step (the bug_0118-case-5 copy-mutate pattern),
  differing ONLY in defense; both draw the same step-keyed stream. Per-round damage max(1, d6+7-def) is
  monotone DECREASING in defense, so the def-4 copy can only ever take ≤ damage per round — never a
  lucky-roll artefact. The pack's own plate→+2 linkage is pinned separately by real play (case 2), so
  the two halves witness "the plate is load-bearing" without mutating away the mechanic under test.
  Probe data over seeds 0–50 (deterministic committed PRNG): the plate ALWAYS ends with strictly more HP
  (a consistent +2–4 cushion) and FLIPS death→life at seeds 4, 22, 26, 32, 36, 44, 45, 48, 50; both die
  only at seeds 25 and 40 — consistent with "near-certain", not guaranteed (the pack does not set
  combat_guaranteed).

regression: >
  The new suite IS the regression: it fails loudly if a future retune makes the plate cosmetic (case 3
  flip would no longer flip, case 4 cushion would vanish), if donning the plate stops raising defense
  (case 2), or if the pack falls out of the validator bar (case 1). It complements — without duplicating
  — bug_0101 (the under-armed/+2-attack tiers) and bug_0118 (the plate's room-text nudge).

curated_impact: >
  None to content. The test reads the shipped cold_forge.yaml through the production engine; it touches
  no curated content bytes, no committed corpus, no protected file, no pinned hash. cold_forge does not
  set combat_guaranteed (single-enemy, deliberately a gamble), so it is correctly out of scope of the
  generator's combat_guaranteed witnesses — this is its dedicated curated counterpart.

verification: >
  npm run health green. verify:integrity static OK; additive — a new regression test + this bug
  artifact, no test deleted/disabled, no MIN_* / floor change, no matcher relaxed, no hash re-pin, net
  test count rose. No source/engine/validator/schema/content behavior change.
