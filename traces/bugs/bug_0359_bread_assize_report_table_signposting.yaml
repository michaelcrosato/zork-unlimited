id: bug_0359
title: Bread Assize report-table signposting for partial evidence states
severity: content
status: fixed
root_cause: >
  A fresh MCP blind playtest found The Bread Assize mechanically sound but
  under-informative at the report table. A player who weighed the loaves before
  reading the assize table saw no fine verdict and no explanation, and players
  with partial evidence learned the full suspension threshold only after taking
  the lesser fine ending.
fix: >
  Add reactive report-table prose that distinguishes full proof, fine-ready but
  incomplete proof, short-weight evidence without the legal assize table, and
  fragmentary evidence. Add market-hall and bakehouse reactive prose so the
  investigation visibly changes after key findings, without changing verdict
  gates or score. Pin the blind-playtest states in regression coverage.
files_changed:
  - content/cyoa/pack/bread_assize.yaml
regression_test:
  - tests/regression/bread_assize_blind_polish.test.ts
