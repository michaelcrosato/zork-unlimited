id: bug_0373
title: "alchemists_tower: quest promised a both-path the spire fork does not provide"
pack: content/parser/pack/alchemists_tower.yaml
detected_by: blind_playtest_20260620T072822Z_alchemists_tower_seed7
severity: moderate

description: >
  The fresh blind playtest won ending_cured at 40/40 but flagged a narrative
  contract bug: the world quest told the player to "brew the antidote and expose
  the tower", while the implemented spire climax is deliberately mutually
  exclusive. Giving the antidote ends the game in ending_cured; opening the silver
  casket exposes/takes the Great Work and ends the game in ending_betrayal. The
  old quest copy promised a combined objective and made the win feel incomplete.

reproduction:
  cure_route:
    - go_west
    - read_spellbook
    - go_east
    - go_east
    - take_herb
    - take_brass_key
    - go_west
    - go_north
    - go_up
    - unlock_strongbox
    - open_strongbox
    - take_iron_key
    - go_down
    - unlock_cellar_door
    - go_down
    - take_water_vial
    - go_up
    - go_north
    - use_herb_on_cauldron
    - use_water_vial_on_cauldron
    - go_up
    - use_antidote_on_master

fix:
  type: content
  change: >
    Reframed the world quest as a choice between curing the alchemist and exposing
    her Great Work, then changed the cure ending to acknowledge the maker-over-Work
    decision and leave Charterhaven's reckoning for the living master. No room
    graph, object, action id, condition, effect, score, route, or ending id changed.
  files_changed:
    - content/parser/pack/alchemists_tower.yaml

regression_test: tests/regression/alchemists_quest_framing.test.ts
