bug_id: bug_0222
pack_id: sunken_barrow_v1
seed: 7
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-04T01-48-35-512Z/playtest.md
  finding: >
    Fresh MCP-only, source-blind playtest of The Sunken Barrow (seed 7 prepared victory
    50/50, seed 3 coffin-doom death, seed 1 combat death-pole probe) came back clean and
    strong — clarity 5/5, enjoyment 4/5, all reachable endings hit, zero mechanical
    defects, zero rejected actions / loops / stale text. Its one actionable finding,
    raised twice (§4a and §5): the reaver's shade warns the barrow-wight's touch makes
    "the strength runs out of your arm," but no attack debuff ever fires — the tester's
    attack stat stayed 4 throughout the fight. The line "is flavor rather than a real
    mechanic, which a careful player might expect to bite … it slightly over-promises a
    mechanic."
failure:
  type: prose_over_promise
  where:
    - content:content/rpg/quests/sunken_barrow.yaml  # npcs[reaver_shade].dialogue.shade_wight
  description: >
    The shade's wight-counsel promised a STRENGTH/ATTACK drain ("the strength runs out of
    your arm") that the engine never cashes: barrow_wight has no effect that reduces the
    player's attack — its blows only deal HP damage. This is the SAME honesty defect this
    pack fights wherever a line writes a contract the engine never cashes (bug_0027/0029/
    0069 over-sold the slab grind, bug_0095 the sarcophagus examine promising the slab's
    skill_check, bug_0119/0132 the ward counsel over-promising the warded odds). Harmless
    in play (no soft-lock, no unfairness) but it mis-describes the combat a careful player
    reasons over.
fix:
  layers: [content]
  summary: >
    Pure CONTENT fix (no engine / validator / schema / stat / DC / ending change): the
    shade_wight npc_text clause "the cold goes into you and the strength runs out of your
    arm, and that is how it wore me down in the end" becomes "the grave-cold bites deep
    and wears you down, blow on blow, and that is how it bested me in the end." This keeps
    the line's load-bearing job — naming the cold blows that wear you down, motivating the
    +3-defense ward ("the cold will bite the less") — but frames it as the HP-sapping the
    wight ACTUALLY deals, dropping the false attack-drain. The honest reword (not a new
    mechanic) is the correct fix because the promised mechanic genuinely does not exist;
    adding a real attack-drain would invalidate the pack's carefully tuned combat balance
    (bug_0102/0113: 43% under-armed vs 88% warded) and is out of scope for a focused
    content cycle. The ward is still +3, one-shot, journalled; the wight keeps bug_0102's
    hp22/atk5/def2; player attack is untouched in combat; all three endings and the +50
    score path are unchanged.
  reachable_endings_changed: false
  content_hash_changed: true   # sunken_barrow yaml spoken text genuinely changed
  content_hash_before: f24f792c87f6f922a4c54f2fe353bfe1977fd51ea9cd36ad89215a3c171ce94a
  content_hash_after: 32c55798c1cff5c4e259fe518f110da61744b0ae3dad16f2be481bed897ec0e0
  repin: >
    Deliberate, surfaced re-pin (NOT a weakening): traces/rpg/barrow_victory.json
    content_hash updated f24f792c... -> 32c55798.... The trace's expected_final_hash is
    UNCHANGED — the edit is spoken npc_text carrying NO state effects, so the seed-1
    canonical victory replays to the identical final state hash (rpg_barrow_trace.test.ts
    green on BOTH assertions, verified live). This is the legitimate snapshot-update
    workflow the verify:integrity drift gate classifies as a HASH_PIN re-pin accompanied
    by a real content change, not the unaccompanied launder pattern. No test SOURCE pins
    this pack's hash. The historical content_hash_after in bug_0170 is a frozen record of
    that earlier edit and is intentionally left unchanged.
regression_test: tests/regression/rpg_barrow_wight_counsel_no_attack_drain.test.ts
