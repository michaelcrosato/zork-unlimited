bug_id: bug_0127
pack_id: watchtower_road_v1
seed: 12
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T13-20-51-530Z/playtest.md   # watchtower_road, seeds 31/77/12
  finding: >
    The assessor's mandated target this cycle was watchtower_road. A fresh source-blind
    MCP-only subagent played 3 routes (seeds 31/77/12) to ending_truth and ending_captured,
    rated the pack clarity 5/5, enjoyment 4/5, ZERO functional bugs. Its one actionable
    finding, raised independently in BOTH §4 and §5: the sealed letter's pickup journal
    "heavily implies it can be read/opened ('a knowing eye could break open and read'), but
    on the east-only route I never found an action to do so ... the hint over-promises ...
    or it's a dangling clue." On the take-letter -> tower -> checkpoint route the player
    keeps hunting for a way to crack the seal themselves and never finds one.
failure:
  type: hint_over_promises_self_affordance
  scene: [abandoned_cart]
  description: >
    bug_0108 rewrote take_letter's pickup journal to foreshadow the letter's two real uses —
    papers a checkpoint guard demands (show_papers) and a seal "a knowing eye" can break
    (the hermit's show_letter, which sets learned_truth + seal_broken). But "a knowing eye
    could break open and read" still reads as a description of the PLAYER's own capability:
    a fresh blind player who took the letter and went east (tower/beacon/checkpoint, never
    west to the hermit) parsed it as "I could break this open" and searched for a non-existent
    self-action. There is no self-break action by design — only the hermit ("a knowing eye",
    west) breaks the seal; an unread letter is explicitly NOT proof at the checkpoint
    (confront_smuggler's not_flag:learned_truth variant: "The seal is unbroken, and you've no
    idea what it says"). So the hint pointed the east-only player at an affordance their route
    cannot reach, presenting as their own when it belongs to someone else.
fix:
  layer: hint_text   # honesty discipline (bug_0027/0119): don't promise an affordance the player can't reach as written
  pack: content/cyoa/pack/watchtower_road.yaml
  summary: >
    One-line journal edit on take_letter. "...or that a knowing eye could break open and read"
    becomes "...or that the right pair of eyes — not your own; the seal is set too hard for
    that — could break open and read." The em-dash aside disclaims the self-action (you cannot
    crack the seal yourself) and reframes the knowing eye as SOMEONE ELSE the player must find,
    which is exactly the hermit. bug_0108's two-use foreshadow is preserved verbatim in
    structure: "papers a checkpoint guard would demand to see" (show_papers) AND "break open
    and read" (the hermit's show_letter).
  reachable_endings_changed: false   # signposting only; no choice/flag/route/ending touched
  content_hash_changed: true         # one journal string changed
  old_pack_hash: cd749bd5dd9c7c456f6b539989496ad0171734c4538fbb1dad1a802bc27e3698   # bug_0120
  new_pack_hash: f989028090c8dd6aa2ba27e54cd400b3ae970d53b579840fdfd2beadd044b33a
  repinned:                          # watchtower_road's hash is pinned in two HASH_PIN_FILES; re-pinned deliberately (HASH_PIN_REPINNED, accompanied by this content change)
    - tests/unit/rpg_validator.test.ts
    - traces/bugs/bug_0002_watchtower_blind_polish.yaml
  regression_test: tests/regression/watchtower_letter_self_affordance.test.ts
verified_live: >
    load_pack reports ok / 0 findings; new hash f989028…. The new regression test passes: the
    take_letter journal entry still foreshadows BOTH uses (matches /papers|checkpoint/i and
    /break|read|seal/i, bug_0108 intact) AND now disclaims the self-affordance (names "not your
    own" / "the right pair of eyes", and no longer the bare ambiguous "a knowing eye"); the
    foreshadowed hermit break-the-seal use still works (show_letter sets seal_broken +
    learned_truth) and the checkpoint show_papers use is unchanged. bug_0108's
    watchtower_letter_signposting.test.ts passes unchanged.
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the multi-step letter/checkpoint route, so the
    blind LLM playtest is the load-bearing quality signal — here a fresh 3-seed pass, clean at
    clarity 5/5, enjoyment 4/5 with this one hint-over-promise legibility gap, now closed. This
    is the direct descendant of bug_0108 (same journal line) re-opened by new blind evidence
    that its wording still read as a self-action.
