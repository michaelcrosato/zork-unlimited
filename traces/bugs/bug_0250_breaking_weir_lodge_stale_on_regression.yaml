# Surfaced NOT by a blind playtest but by a STATIC AUDIT of the bug_0248 / bug_0249
# stale-text-on-quest-regression class. The mandated blind pass this cycle ran on the
# parser pack tide_mill (seed 29) and came back clean — clarity 5/5, enjoyment 4/5, all
# four endings, ZERO mechanical bugs (ai-runs/2026-06-04T20-07-43-979Z/playtest.md). With
# content clean, the cycle pursued the twice-confirmed "monotonic-quest-stage" lever named
# in the bug_0248/0249 next-focus. A prototype validator (a reactive variant gated SOLELY on
# a quest_stage that an on_enter re-seats to a different stage) flagged FOUR shipped packs:
# dead_reckoning, white_stag, friars_postern (all deliberate, SAFE transient windows whose
# fallback BASE text stays true after the regression — so a blanket validator over-flags
# them) and breaking_weir (a GENUINE latent landmine). The validator is therefore NOT sound
# to ship; but the audit it powered found this real defect.
findings:
  - id: keeper_lodge_reverts_to_too_high_base_at_weir_held
    where: room:keeper_lodge
    severity: low
    description: >
      The keeper_lodge ("The Keeper's Lodge") calmed-water reactive variant — "the river's
      voice outside has changed, the rising roar gone over to a steadier, falling note now
      that the relief-race is carrying the worst of it off" — was gated on
      `quest_stage: the_weir == race_running`. A quest stage is NON-monotonic: valley_held
      (the win room, reached by going north from race_house) has on_enter
      `set_quest_stage the_weir = weir_held`, so once the player reaches it the stage moves
      OFF race_running. At weir_held the variant stops matching and the lodge reverts to its
      BASE description — "the river is loud and wrong outside — too high, too fast" — which
      flatly CONTRADICTS a world where the flood has already been diverted down the relief-
      race. Same stale-on-regression class as bug_0248 (watchtower on_the_trail), bug_0249
      (lamplighters dry font), bug_0120, bug_0134. The pack's own design comment even noted
      it "Keys off the stage, not the flag" — the author knew, but never saw the contradiction
      because today it is unreachable only by COINCIDENCE: the `visited: valley_held` win
      ends the game the instant weir_held is set, so the lodge is never re-observed at that
      stage. It is one non-terminal edit to valley_held away from a live contradiction, and
      keeper_lodge was already the ODD ROOM OUT — its sibling reactive rooms key on monotonic
      flags (weir_head on `rack_freed`, race_house on `race_open`), only the lodge used the
      fragile quest_stage.
    fix: >
      Re-key the lodge variant onto the MONOTONIC, never-unset `race_open` flag — set in the
      SAME race_winch on_success that sets `race_running` and never cleared — bringing it into
      line with the pack's own weir_head/race_house pattern and the bug_0249 discipline
      ("flags survive a stage regression; quest stages do not"). On every state reachable AT
      the lodge, `race_open` ⟺ `the_weir == race_running`, so play is byte-identical, but the
      calmed-water prose can never revert to the contradictory base. Reactive TEXT ONLY — no
      flag/var/score/exit/ending change; the win (ending_held, visited valley_held, max_score
      50) and the death fork (ending_swept) stay reachable. `the_weir == race_running` is now
      read by no condition (pure progress marker), so no IMPOSSIBLE_QUEST_STAGE finding.
failure:
  type: design_polish
  description: >
    No engine fault or determinism break — stale-on-regression reactive room text (the
    bug_0120 / bug_0134 / bug_0248 / bug_0249 narrative-freshness class). The defect is
    masked in normal play only by the coincidence that the win ends the game before the
    regressed stage can be observed; the fix removes that dependence so the prose is robust by
    construction. Caught by a static audit of quest_stage-gated variants + reading the pack's
    own (self-incriminating) design comment, NOT by the validator (which checks
    solvability/liveness, not narrative freshness — and a blanket validator over this pattern
    false-positives the deliberate transient-window packs).
regression_test: tests/regression/breaking_weir_lodge_calmed_variant.test.ts
notes: >
  Validator status: a sound automatic check for this class is NOT achievable without false
  positives — it cannot distinguish a deliberate transient window whose fallback base text
  stays true (dead_reckoning `adrift`, tide_mill `begun`, white_stag/friars windows) from a
  genuine contradiction (this bug, bug_0249). The lever remains manual: audit every reactive
  variant gated solely on a regressable quest_stage and confirm the fallback base text does
  not contradict any persistent world change reachable at that location.
