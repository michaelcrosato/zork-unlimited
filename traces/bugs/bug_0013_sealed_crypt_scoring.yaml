bug_id: bug_0013
pack_id: sealed_crypt_v1
seed: 73
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T06-51-15-149Z/playtest.md
  finding: >
    Playtest target rotated off the heavily-polished watchtower_road (bug_0002–0007)
    onto The Sealed Crypt to cash in a standing deferred finding logged across
    bug_0010 / bug_0012: the sexton dialogue topic-menu re-ask AND the unimplemented
    score field. A fresh, MCP-only blind playtester (seed 73) solved the crypt to
    ending_victory, rating it clarity 4/5, enjoyment 3/5, and surfaced two concrete
    flaws (report §5):
      (1) SCORE NEVER MOVES: `score` is 0 at start and still 0 at ending_victory
          despite solving every puzzle — the score field reads as dead weight /
          an unused placeholder system.
      (2) DIALOGUE TOPIC TOGGLE: the sexton's "crypt" and "well" topics never
          exhaust; asking one always re-offers the other, looping the identical
          lines forever. (Deferred — fixing it cleanly needs a new engine field
          `conditions` on dialogue topics plus validator non-termination handling;
          out of scope for this cycle's one focused change. Logged for a future
          cycle.)
    This cycle fixes finding (1).
failure:
  type: dead_score_system
  where: [content:content/parser/pack/sealed_crypt.yaml]
  description: >
    The pack declared meta.max_score: 0 (the schema default, meaning "no scoring")
    and carried no inc_var awards, so the `score` var the observation always
    surfaces (src/parser/observation.ts: score = state.vars[SCORE_VAR] ?? 0) sat at
    0 from the start room through the victory ending. Stage-3 scoring is a built,
    validator-checked engine feature (ParserMetaSchema.max_score, the conventional
    `score` var, inc_var awards, the SCORE_UNREACHABLE check) already used by
    alchemists_tower; this pack simply never opted in, so a present feedback channel
    rendered a permanent, meaningless 0.
fix:
  layer: content
  summary: >
    Pure content opt-in to the existing Stage-3 scoring feature — no engine change.
    content/parser/pack/sealed_crypt.yaml: meta.max_score set to 35, plus three
    one-time gated milestone awards mirroring alchemists_tower's 5/10/20 shape:
      +5  reading the headstone clue   — a new READ interaction on `headstone`
          (read_text preserved), gated `not_flag read_headstone`, sets read_headstone;
      +10 solving the well             — added to the existing USE rope→old_well
          interaction (already gated not_flag rope_attached_to_well);
      +20 unlocking the catacombs gate — added to the existing USE iron_key→crypt_gate
          interaction (already gated not_flag catacombs_open).
    Each award rides a condition that flips on first use, so the score cannot be
    farmed by repeating an action, and the intended solution path reaches the full
    35 (verified live via the MCP tools, seed 73: 0→5→15→35, ending_victory at 35).
    No flags' meaning, items, exits, gating, or reachable endings change — only the
    score var now accrues. The validator's SCORE_UNREACHABLE check passes
    (total awardable = 35 == max_score).
  reachable_endings_changed: false
  content_hash_changed: true   # sealed_crypt yaml (unpinned — only watchtower_road is pinned; recorded for the record)
regression_test: tests/regression/sealed_crypt_scoring.test.ts
deferred_findings:
  - >
    Sexton dialogue topic-menu re-ask (finding 2 above): "crypt" and "well" toggle
    forever instead of exhausting. Clean fix needs a `conditions` field on
    DialogueTopicSchema (filter topics in enumerateActions + guard the ASK
    resolution) AND validator awareness that a gated topic must not make a node
    non-terminating (cf. broken-fixtures/parser_dialogue_nonterminating.yaml). A
    generic, reusable engine feature — worth a dedicated cycle.
