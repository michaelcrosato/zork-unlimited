bug_id: bug_0330
pack: wreckers_light_v1
scene: oil_store
title: "Oil store chest gives no hint when player lacks the key"
severity: minor
class: discoverability_gap
found_by: blind_playtest
playtest_report: ai-runs/2026-06-08T16-39-13-594Z/playtest.md

description: >
  If the player takes the striker before hearing the keeper (skipping hear_keeper),
  then descends to the oil store, the sea-chest appears locked with no visible action
  suggesting where the key might be. The keeper holds the key — described as "white-
  knuckled" in hear_keeper's journal text — but if the player never triggered that
  choice, there is no hint in the oil store pointing back to the keeper's closed fist.
  Available actions with no key: take_oil + back_up only. The chest just sits locked.

fix: >
  Added try_lock choice to oil_store (conditions: not_item keeper_key, not_flag
  chest_open). On activation narrates: "The hasp holds fast — iron through and through,
  and not your hand that will force it. A keeper would keep such a key close; the old
  man at the stove had something white-knuckled in his fist when he fell." Routes back
  to oil_store. No flag/score/route/ending change — pure discoverability hint.

regression_test: tests/regression/wreckers_light_oil_store_key_hint.test.ts
