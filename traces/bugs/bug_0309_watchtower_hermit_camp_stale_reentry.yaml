id: bug_0309
title: "watchtower_road: hermit_camp outer scene keeps first-meeting text after speaking with the hermit"
pack: watchtower_road_v1
class: reactive-description-blindness
severity: minor
found_by: blind_playtest_seed7_2026-06-08T10-25-38-070Z
playtest_report: ai-runs/2026-06-08T10-25-38-070Z/playtest.md

symptom: >
  Returning to hermit_camp after a full conversation (heard_hermit_lore set) or after
  the sealed letter was read (seal_broken set) still shows "He watches you with pale,
  unsurprised eyes" — first-meeting framing as if the player and the hermit have never
  spoken. hermit_talk already has a reactive re-entry variant (bug_0134) and mossy_brook
  mirrors it (bug_0282); hermit_camp (the outer scene) was the missed member of the trio.

root_cause: >
  hermit_camp had no `variants:` block. The scene text is static; first-match-wins
  evaluation never fired a reactive variant because none existed.

fix: >
  Added a `variants:` block to hermit_camp with one entry guarded on
  any_of[heard_hermit_lore, seal_broken] — identical to the guard on hermit_talk
  (bug_0134) and mossy_brook (bug_0282). The variant text reads "no stranger to him
  now." Reactive text only — no choice/flag/route/ending change. Base text unchanged
  for a first-time visitor.

regression_test: tests/regression/watchtower_hermit_camp_reentry.test.ts
