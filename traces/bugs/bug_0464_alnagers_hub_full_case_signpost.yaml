id: bug_0464_alnagers_hub_full_case_signpost
title: "Alnager's Fault hub reflects complete evidence and signposts wax comparison"
pack: content/cyoa/pack/alnagers_fault.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T204745Z_alnagers_fault_seed7.md
severity: S1
symptom: >
  A blind playtest found that the Cloth Hall kept repeating its mid-case
  register/Ned/seal variant after the player had measured the cloth and compared
  the wax outside. That made the case feel less complete on return. The same
  mid-case prose and a generic Drapers' Row label also made the wax comparison
  easy to miss before resolving the dispute.
root_cause: >
  The highest-specificity Cloth Hall variant covered the systemic-referral
  evidence, but there was no fuller variant for the six-clue state. First-match
  variant selection therefore kept showing "you have enough to refer" even after
  the player had gathered the physical measurement and wax-comparison proof.
fix: >
  Add a six-evidence Cloth Hall variant that names both supported judgements as
  complete, extend the referral-ready prose to point to the still-available wax
  comparison, and relabel Drapers' Row as an evidence comparison rather than
  generic scenery. No gates, score awards, endings, or skill-check outcomes
  change.
tests:
  - tests/regression/alnagers_fault_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/alnagers_fault_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/alnagers_fault.yaml
  - npm run health
