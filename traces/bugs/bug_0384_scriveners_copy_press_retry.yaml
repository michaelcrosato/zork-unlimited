id: bug_0384
pack: scriveners_proof_v1
title: "copy-press check looked like a repeatable dead mechanic after failure"
severity: moderate
scene: deed_room
reported_by: blind_playtest_20260620T135212Z_scriveners_proof_seed7

symptom: >
  A blind playtest failed the penknife-on-copy-press skill check and saw the same
  action remain available with no state change. Because the beat carried no score,
  gate, or ending consequence, it read like an unfinished or dead-end mechanic
  rather than an optional moment of tension.

root_cause: >
  The copy-press interaction set press_checked only on success. Failure narrated a
  dropped wax fragment but did not retire the beat or explain that the real proof
  still lived in the deed, magnifier, and enrolled copy.

fix: >
  The failure branch now sets press_checked too, making the optional check one-shot
  on either branch. Its failure narration explicitly redirects the player toward
  the document evidence path, while the normal 45/45 solve remains unchanged.

tests: tests/regression/scriveners_copy_press_one_shot.test.ts
