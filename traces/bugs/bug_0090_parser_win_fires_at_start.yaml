bug_id: bug_0090
pack_id: null   # engine/validator soundness guard; not specific to one pack
seed: 7
evidence:
  source: blind_playtest + validator_audit
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T23-33-30-413Z/playtest.md
  finding: >
    This cycle's mandated blind pass was ROTATED off the over-fitted clockwork_heist (the
    assessor's rank-1, but ~26 consecutive clean passes and content-complete) onto the
    least-attended pack — the parser pack The Sealed Crypt, which had never had a blind LLM
    playtest in this loop's history (seeds 7 / 19, fresh MCP-only source-blind subagent). It
    won at a perfect 35/35, reached ending_victory, found ZERO functional bugs, and rated the
    pack clarity 5/5 / enjoyment 3/5 (the only knock being scope: a short, linear, single-ending
    lock-and-key puzzle). With the blind target proven clean and the standing memory recording
    the content-polish backlog as exhausted, I pursued last cycle's queued next-focus #4 — a
    "parser/RPG deadline-analog audit": do those modes' global-terminal mechanic carry the same
    firability / fires-at-start degeneracies the CYOA validator now brackets (bug_0087 +
    bug_0089)? They do. The parser/RPG analogue of CYOA's `meta.deadline` is `win_conditions`
    (a list of {conditions, ending} evaluated by the same §8.4.5 checkWin); its fires-at-start
    end was unguarded.
failure:
  type: validator_missing_check_unplayable_pack
  where:
    - engine:src/validate/parser_validator.ts
    - engine:src/validate/rpg_validator.ts
  description: >
    The parser validator already guards a win_condition that can NEVER fire (IMPOSSIBLE_GATE — a
    required flag no effect sets; ITEM_REQUIRED_UNOBTAINABLE — a required item never obtainable;
    WIN_UNREACHABLE — a required room unreachable). But the SYMMETRIC OPPOSITE went unchecked: a
    win_condition whose conditions ALREADY HOLD in the initial state and can never be falsified.
    The engine's §8.4.5 checkWin runs against the POST-action state (src/core/engine.ts:
    `if (rules.checkWin && !next.ended)`), NOT at game start — new_game/start_game returns the
    opening observation without a win check, and initState marks the start room visited. So such a
    win does not trigger on the opening screen — it fires on the player's VERY FIRST action,
    whatever they choose (move/look/take), sending them straight to win_condition.ending. No room
    past the start is ever played and the goal is granted for nothing: the pack is unplayable. Yet
    every existing check passes — the static reachability/soft-lock graph never simulates the turn-1
    fire, so it sees the win ending "reachable" and reports nothing. A maintainer hits this with a
    win condition like `{ visited: <start_room> }` (true the instant the game opens), a flag that
    sits in flags_init, or a numeric bound already met by vars_init (e.g. `score >= 0`). Because the
    win is the pack's CENTRAL terminal — every parser/RPG pack has one, unlike the optional CYOA
    deadline — this footgun is more reachable than the deadline's. It bricks the pack, so it is an
    ERROR (mirrors START_MISSING / the CYOA DEADLINE_FIRES_AT_START "the game would end immediately").
fix:
  layer: validator
  summary: >
    Add checkWinFiresAtStart(pack, extraFalsifierEffects, volatileVars, findings), called at the
    end of validateParser (after the Stage-3 win/score checks). The initial state is the engine's
    own initStateForParserPack(index, 0) (base init + start room on_enter applied + start room
    marked visited) and is evaluated by the engine's own evalConditions — zero divergence from
    runtime. For each win_condition: ground (a) its conditions hold in that initial state, AND
    ground (b) they can never be falsified by any pack effect. (b) is proven by winStaysTrueForever
    — a flat conjunction (top-level list + all_of) of monotone-stable atoms: has_flag not cleared,
    not_flag not set, has_item not removed, not_item not added, var_gte whose var never drops below
    the floor, var_lte whose var never rises above the ceil, var_eq whose var never changes, visited
    (monotone). Var arithmetic is sign-significant (effects.ts allows a negative `by`) — the shared
    collectFalsifiers records the literal `by`/`value` and varNeverDrops/Rises/Changes inspect it.
    Any any_of/none_of or unanalysed condition (not_visited, is_open, is_unlocked, quest_stage) bails
    to false (treat as falsifiable), so the check NEVER claims un-falsifiability it cannot prove.
    Both grounds true -> ERROR WIN_FIRES_AT_START. The machinery mirrors the CYOA validator's
    collectFalsifiers / deadlineStaysTrueForever (bug_0089), reused here for win_conditions.
    RPG soundness: the RPG validator (which delegates fully to validateParser) injects (i) its
    declared runtime effects — enemy on_defeat + skill_check on_success/on_failure — as extra
    falsifiers, and (ii) the combat-volatile vars (player hp/attack/defense + every enemyHpVar),
    because combat mutates HP via a DYNAMIC set_var (rpg/combat.ts) the static scan never sees; a
    win condition on a volatile var bails to falsifiable, so combat can never make us wrongly claim
    a fire-at-start. Two new ValidateParserOptions (extraFalsifierEffects, extraVolatileVars) default
    empty, so Stage-2 parser behaviour is byte-identical. No schema, runner, or content change.
  reachable_endings_changed: false
  content_hash_changed: false        # no content pack edited
  regression_test: tests/regression/parser_win_fires_at_start.test.ts
  unit_tests:
    - tests/unit/parser_validator.test.ts   # new negative fixture row: parser_win_fires_at_start.yaml -> WIN_FIRES_AT_START
  fixtures:
    - content/broken-fixtures/parser_win_fires_at_start.yaml
verified_live: >
    Bug-first: a synthetic parser pack whose win is `{ visited: <start_room> }` yields
    WIN_FIRES_AT_START (error), as does a win on a monotone-increasing var already at its bound.
    Soundness/no-false-positive: a win on a var true at init but escapable (a dec_var can push it
    below the bound) is NOT flagged; a win not met at init (a room not yet visited) is NOT flagged;
    in RPG a win on the combat-volatile `hp` var true at init is NOT flagged (HP can drop in
    combat), while the SAME shape in a pure parser pack — where that var is inert — IS flagged.
    All four health-gated packs (sealed_crypt, alchemists_tower, sunken_barrow, cold_forge) plus
    the validator's own shipped-pack tests validate with 0 WIN_FIRES_AT_START and stay green; no
    content pack edited, all content hashes unchanged. `npm run health` exit 0.
note: >
    Soundness over coverage, same stance as bug_0085/0086/0087/0089: only flags a win whose
    on-every-path turn-1 fire is PROVABLE — true at the engine's real initial state AND a flat
    conjunction of monotone-stable atoms over a complete falsifier set (declared parser effects +
    injected RPG runtime effects, with combat-volatile vars treated as falsifiable). It detects
    fewer cases, never wrong ones. This closes the parser/RPG half of the §8.4.5 global-terminal
    audit: bug_0087/bug_0089 bracketed the CYOA deadline on both degenerate ends; the existing
    IMPOSSIBLE_GATE/ITEM_REQUIRED_UNOBTAINABLE/WIN_UNREACHABLE checks plus this new
    WIN_FIRES_AT_START now bracket parser/RPG win_conditions the same way.
