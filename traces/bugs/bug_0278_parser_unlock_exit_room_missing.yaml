bug_id: bug_0278
component: verification   # a missing reference-integrity check in the validator, not a content/pack defect
# Surfaced by ultraplan re-aim cycle #14: the collectRoomRefs function (added by bug_0277)
# collected room IDs from condition sites (visited/not_visited/in_room) and two effect
# sites (goto, place_object.room), but its comment called those "the only two room-id-
# bearing effects" — this was wrong. unlock_exit: { from, to } (effects.ts:31) carries
# two room IDs, and neither from nor to was validated against roomIds. A typo'd
# unlock_exit.from or .to silently writes an unreachable exit-flag key
# (__exit:phantom->real instead of __exit:real->real), making the unlock a permanent
# no-op with no existing oracle catching it. Bug_0277 sealed conditions + goto/place_object;
# bug_0278 seals unlock_exit.from/.to — together these cover every room-id-bearing
# construct in the pack schema, completing intra-frame room-reference integrity.
class: soundness/validator
title: >
  validateParser did not check unlock_exit.from/.to against roomIds — a typo'd room id
  silently writes an unreachable exit-flag key (__exit:phantom->real), making the unlock
  a permanent silent no-op that no existing oracle catches. collectRoomRefs comment
  incorrectly called goto/place_object.room "the only two room-id-bearing effects".
findings:
  - id: unlock_exit_room_missing_unwitnessed
    where: src/validate/parser_validator.ts validateParser body (no UNLOCK_EXIT_ROOM_MISSING emit block; collectRoomRefs comment wrong)
    severity: low   # latent: all 5 unlock_exit uses across 3 shipped packs use valid declared room ids, 0 dangling
    description: >
      The collectRoomRefs function (added by bug_0277) collected room IDs from condition
      sites (visited/not_visited/in_room) and two effect sites (goto, place_object.room),
      but neither unlock_exit.from nor unlock_exit.to was ever added to the refs set or
      individually validated. The comment at the effect-side loop explicitly stated these
      were "the only two room-id-bearing effects" — this was wrong. unlock_exit: { from:
      z.string().min(1), to: z.string().min(1) } (effects.ts:31) carries two room IDs
      that are semantically load-bearing: the engine computes the exit-flag key as
      __exit:FROM->TO (src/core/effects.ts exitFlag). If either room id is absent from
      pack.rooms, the written flag key can never match any exit's conditions check (which
      uses the same exitFlag formula keyed on DECLARED room ids), making the unlock a
      permanent silent no-op — harder to diagnose than a dead gate because the effect
      APPEARS to fire (no exception is thrown). 5 unlock_exit uses exist across 3 shipped
      packs (tide_mill: 1, lamplighters_round: 2, sealed_crypt: 2), all using valid
      declared room IDs — the gap was latent but undetected for any future authored or
      generated pack with a typo'd room id.
    fix: >
      Added a dedicated UNLOCK_EXIT_ROOM_MISSING emit block in validateParser, placed
      immediately after the UNRESOLVED_ROOM_REFERENCE emit block. Scans allEffects(pack)
      for unlock_exit effects and checks both from and to against roomIds, emitting
      err("UNLOCK_EXIT_ROOM_MISSING", ..., ["room:"+id]) for each dangling side — one code
      for both sides, the side distinction lives in the message only. Added
      UNLOCK_EXIT_ROOM_MISSING to the bail-early guard (alongside EXIT_TARGET_MISSING and
      START_MISSING) because a dangling unlock_exit room id corrupts the settable-flags
      set the graph analysis uses (exitFlag writes an unreachable key). Updated the
      collectRoomRefs comment to accurately reflect that unlock_exit.from/.to are handled
      in the dedicated UNLOCK_EXIT_ROOM_MISSING block. Added a broken fixture
      (content/broken-fixtures/parser_unlock_exit_room_missing.yaml), registered it in
      the unit test VALIDATOR_FIXTURES array, added the UNLOCK_EXIT_ROOM_MISSING case to
      the negative corpus, and added the dedicated §15 regression test. RPG is covered
      for free: rpg_validator.ts delegates to validateParser — no rpg_validator.ts edit.
soundness_argument: >
  This seals intra-frame room-reference integrity across ALL room-id-bearing effects,
  completing the assume-guarantee ladder toward the deferred world-frame manifest. Bug_0277
  sealed conditions (visited/not_visited/in_room) and the goto/place_object.room effects;
  bug_0278 seals unlock_exit.from/.to — together these cover every room-id-bearing
  construct in the pack schema. Error severity is sound: a dangling unlock_exit room id is
  a structural defect (a permanent silent no-op, never a deliberate transient), identical
  class to EXIT_TARGET_MISSING. Adding UNLOCK_EXIT_ROOM_MISSING to the bail-early guard is
  sound for the same reason EXIT_TARGET_MISSING bails: a dangling unlock_exit room id
  corrupts the settable-flags set (exitFlag adds an unreachable flag key) used by the
  graph analysis, so bailing before that analysis is correct. The check keys STRICTLY on
  roomIds membership (same Set as all other room-id checks), so it cannot false-positive on
  a declared room and tempt a weakening of a real pack to silence it. Purely ADDITIVE (a
  new error code) — no existing matcher weakened; verify:integrity's count/floor guards
  remain the bar and stay green. The dedicated regression proves the check FIRES on dangling
  from (case b), dangling to (case c), both dangling (case e), and proves NON-VACUITY (case
  d: correct ids clear it) — the same SoundnessBench discipline (arXiv:2412.03154) the
  INERT_OBJECT_STATE / negative corpora (bug_0182/0218/0253/0262/0277) use. The
  shipped-packs-stay-green invariant (auto-discover + iterate every parser + RPG pack, assert
  zero UNLOCK_EXIT_ROOM_MISSING) pins that no real pack emits the new code (verified: 5
  unlock_exit uses, 0 dangling), preventing a vacuous always-fire implementation.
failure:
  type: latent_soundness_gap
  description: >
    validateParser checked roomIds membership at start_room, exit.to, npc.room, and
    (post-bug_0277) at condition/goto/place_object.room sites — but never at
    unlock_exit.from or unlock_exit.to. A typo'd unlock_exit room id would write an
    unreachable exit-flag key and silently validate GREEN, a permanent no-op unlock that
    no existing oracle (SOFTLOCK, BFS solver, metamorphic relabel) catches.
regression_test: tests/regression/parser_unlock_exit_room_missing.test.ts
