id: bug_0113
title: "The RPG combat-winnability proof's contract is now honest — best-case lower bound, not a worst-case-roll survival guarantee"
kind: validator
mode: rpg
severity: correctness
pack: (none — verifier-only; no content pack edited)

summary: >
  The RPG validator's combat-winnability proof (COMBAT_UNWINNABLE) is a deliberately
  CONSERVATIVE check: it credits the player's BEST reachable stats and the LUCKIEST
  rolls (player max damage d6=6, enemy min damage d6=1) and errors only when even that
  best case loses — so only a TRULY impossible fight is flagged. But the proof's
  docstring (src/validate/rpg_validator.ts:10-12) and a variable name
  (`worstCaseDamageTaken`, with the comment "vs. worst-case enemy damage") MIS-stated
  this as a survival guarantee against "worst-case-for-them rolls." The documented
  contract was strictly STRONGER than what the code computes: it implied a green
  validator guarantees a fully-prepared player cannot lose to bad luck. It does not —
  and that false guarantee is exactly the intuition every blind RPG playtester keeps
  voicing. bug_0113 makes the contract match the code (docstring + variable rename +
  accurate error-message figure), with no change to the conservative ERROR logic.

blind_playtest:
  run: ai-runs/2026-06-02T09-35-33-314Z/playtest.md
  pack: content/rpg/pack/cold_forge.yaml
  seed: 31
  result: "VICTORY ending_victory 50/50 (full prep, finished ~4 HP) + DEATH ending_fallen 0/50 (under-armed); clarity 5/5, enjoyment 4/5; ZERO functional bugs"
  the_finding: >
    Report §4/§5/§6 (raised three ways): combat damage RNG can fell a CORRECTLY-PREPARED
    player on bad rolls (the buffed run finished at ~4 HP), and there is no way to restore
    HP — "a fully-prepped player who gets unlucky has no recourse." This is the SAME note
    every prior cold_forge/sunken_barrow pass raised. It is TRUE and INTENTIONAL (the
    bug_0101/0102 retune deliberately made preparation a real, winnable gamble, with honest
    prose — "a lethal gamble", never "you are guaranteed to win"), so it is NOT a content
    defect to fix. The generalizable lesson points instead at the verifier: its stated
    contract dishonestly implied luck-loss could not happen.

decision_no_content_churn: >
  cold_forge is blind-clean (clarity 5/5, enjoyment 4/5, both endings, zero functional
  bugs); content backlog remains exhausted. Re-tuning the slag sentinel would regress the
  fresh, intentional bug_0101 decision (the prior cold_forge cycle, bug_0106, faced the
  identical balance note and correctly declined to churn it). So the cycle's improvement is
  in the verifier, not the pack.

the_fix: >
  src/validate/rpg_validator.ts only:
    • Docstring (lines 10-12): rewritten to state the proof proves winnability on the
      player's BEST reachable stats and the LUCKIEST rolls — a conservative lower bound that
      errors only on a fight impossible even then — and to state explicitly that a
      deliberately luck-dependent fight a prepared player can still LOSE is PERMITTED, not
      flagged.
    • The misnamed `worstCaseDamageTaken` → `minDamageTaken` (it is the LEAST damage any run
      can inflict: enemy min roll × the rounds the enemy survives the luckiest player), with
      the inline comment corrected to describe luckiest-roll semantics. The error-message
      figure now reads `minDamageTaken`.
  No logic change: the threshold (`minDamageTaken >= playerHp`), the `statCeiling`
  best-reachable crediting (bug_0097), and the ERROR text ("cannot be beaten even with
  best-case rolls") are untouched. The error message was already correct; only the docstring
  and the variable lied.

why_within_the_bar: >
  Pure verifier documentation/naming correctness — no schema, runner, engine, or content
  change, so no pack's bytes move and no content hash re-pins. In a project whose entire
  thesis is "trust, but verify; the verifier is the bar," a verifier that mis-states its own
  guarantee is itself an integrity defect: an author trusting "worst-case rolls must not kill
  the player" would wrongly believe a green run forbids a luck-loss. Making it honest also
  forecloses a tempting WRONG "fix": turning the check into an actual worst-case-roll test
  would FALSE-POSITIVE both shipped RPG packs (cold_forge atk6/def4 and sunken_barrow
  atk4/def4 both LOSE on worst-case rolls by design), breaking the 0-warning bar against
  deliberate, honestly-telegraphed design. The pinning test below locks that out.

verification:
  command: npm run health
  regression_test: tests/regression/rpg_combat_winnability_semantics.test.ts
  cases:
    - "a fight best-case winnable but worst-case lethal (brute hp18/atk7/def2 vs player hp20/atk6/def4 — cold_forge's reachable stats) is NOT flagged COMBAT_UNWINNABLE"
    - "a fight impossible even on the luckiest rolls (frail player hp4/atk0/def0) IS flagged COMBAT_UNWINNABLE — the conservative error still fires"
    - "the >= boundary holds: minDamageTaken == HP flags (the final surviving-round blow lands before the kill); HP+1 clears it"
    - "(existing) bug_0097 suite still green — best-reachable-buff crediting removes its false positive, soundness preserved"

content_hash:
  note: >
    No pack content changed — every pack's bytes are byte-identical before and after.
    cold_forge is not a hash-pinned file (only watchtower_road is), and in any case this
    is a verifier-only change.

notes: >
  Companion next-step (deferred, audit value first): the genuine player-experience gap the
  testers keep naming — an unlucky PREPARED player dies with no way to RECOVER HP (only to
  retreat, which both RPG rooms allow but which does not heal) — could be addressed by an
  OPT-IN strong guarantee: a pack that declares its fight "fair" (e.g. meta.combat_guaranteed)
  would get a worst-case-roll proof, while the gamble packs stay unflagged. Not built this
  cycle (no pack needs it yet; YAGNI), but it is the sound shape if a future "fair fight" pack
  wants the stronger bar.
