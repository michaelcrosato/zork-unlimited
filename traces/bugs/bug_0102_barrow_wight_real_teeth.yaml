bug_id: bug_0102
pack_id: sunken_barrow_v1
seed: 37
type: content_fix          # combat-balance retune (three enemy stats); the bug_0097 "gear up first" design enabled
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_target: clockwork_heist_v1     # the assessor's rank-1 nomination, ~30th time
  mandated_report: ai-runs/2026-06-02T02-14-47-663Z/playtest.md
  rotation_rationale: >
    Per the protocol's "rotate the seed and rotate the pack" guidance and the project
    memory (rotate the mandated pass onto the least-attended pack), the blind pass was
    ROTATED off the ~30x-blind-clean clockwork_heist onto sunken_barrow — the least-recently
    attended pack by blind-pass recency (last at bug_0095; clockwork bug_0097, watchtower
    bug_0098, sealed/wreckers bug_0099/0100, cold_forge bug_0101). This also directly
    served the bug_0101 #1 next-focus (apply the proven "make prep matter" pattern to
    sunken_barrow's cosmetic +2 ward). Fresh general-purpose MCP-only subagent, seed 37,
    no source access; ran the brief's explicit prepared-vs-under-armed comparison.
  finding: >
    The shade's +2-defense ward is mechanically near-irrelevant: careful play is trivially
    safe. The seed-37 tester (§4/§5) ran both routes and found the old hp12/atk3/def1 wight
    "dies in 2 rounds either way" — warded it hit for 3, under-armed for 4 — so the ward
    "saved a single HP" (finished 17/20 warded vs 16/20 under-armed). The preparation was
    "mechanically genuine but the fight is so short and tilted you win trivially at near-full
    HP regardless." It also flagged a second Chekhov's gun: the shade's "the strength runs
    out of your arm" chill-drain has no live mechanic (it is the reaver's account of his own
    defeat, backstory not a player stat-drain). This is the SAME "telegraphed prep is
    cosmetic / careful play is trivially safe" note both RPG packs keep raising (bug_0095,
    cold_forge bug_0092 -> 0101), deferred pending author intent — and under the full-trust
    model the agent IS the author.
improvement:
  layer: content        # three enemy stats only — no prose/flag/score/ending/exit/effect change
  content:
    - content/rpg/pack/sunken_barrow.yaml: >
        Retuned the barrow_wight from hp12/atk3/def1 to hp22/atk5/def2 (the bug_0101 move
        applied to this pack's cosmetic lever). Combat is one ATTACK = one round: player
        deals d6+atk(4)-def2, the wight (if it survives) deals d6+5-playerDef (min 1). The
        two-stat lift (more HP -> longer fight; +2 attack -> harder blows) makes the +2 ward
        compound over several rounds instead of shaving one HP; defense 1->2 also slows the
        player's own blade (d6+2, not d6+3) so the fight has rounds to matter. Verified live
        over seeds 1-40 on the REAL canonical route (__probe2.ts, the exact action sequence
        the trace records): UNDER-ARMED (def2) now loses on a majority of seeds (wins 17/40 ~
        43%, survivors scrape through at ~4 HP of 20) so the shade's cold-blow danger is
        honest; the WARD (def4) is the decisive survival lever (wins 28/40 ~70% — a likely-
        dead gamble becomes a clear favourite); 15 seeds are clean "prep decides it" cases
        (under-armed dies, the same seed warded reaches ending_victory). Updated the header,
        the reaver_rest, and the reaver_shade design comments to read true to the new balance.
  re_recorded_trace:
    - traces/rpg/barrow_victory.json: >
        The canonical victory trace formerly ran the under-armed route with exactly 2 ATTACK
        actions — structurally impossible against a 22-HP wight (2 hits cap at 16 damage), so
        the trace had to be re-recorded regardless. Per bug_0101's "switch helpers to the
        canonical buffed route," it now runs the intended PREPARED (warded) path through the
        reaver's shade at seed 1: ending_victory, score 50/50, finishing at 9 HP with
        defense 4 (the ward visibly applied). Re-recorded via recordTrace over the freshly
        compiled pack. content_hash 952216... -> 54712ef3...; expected_final_hash
        e6de3a9c... -> e55b00eb... — both deliberate, surfaced re-pins accompanying the
        content change (HASH_PIN_FILE drift, the allowed-warning case).
  why_within_the_bar: >
    The RPG validator's COMBAT_UNWINNABLE proof was widened in bug_0097 to credit the
    player's BEST REACHABLE stats (init + the reachable +2 shade ward = def4), precisely to
    permit a sound "gear up first" design. With hp22/atk5/def2: bestPlayerDmg =
    max(1,6+4-2)=8, roundsToKill = ceil(22/8)=3, minEnemyDmg = max(1,1+5-4)=2,
    worstCaseDamageTaken = 2*(3-1)=4 < 20 reachable HP => provably winnable. sunken_barrow
    stays a clean 0-finding pack while base-stat play is a lethal gamble the bar never
    required to be safe — the second pack to exercise the bug_0097 widening (after cold_forge).
  invariants:
    - The retuned pack validates green under the full RPG validator (no COMBAT_UNWINNABLE).
    - The wight carries hp22/atk5/def2.
    - Real failure state: an under-armed thief (base defense 2, skips the shade) at seed 2 is
      killed and fires the declared death ending ending_fallen (death: true).
    - Prep decides it: at the SAME seed 2, the ONLY change being the shade's +2-defense ward,
      the fight flips from death to a full ending_victory 50/50.
    - No prose/flag/score(50)/win/ending/exit/effect change — only the three enemy stats; the
      bug_0016 scoring, bug_0027/0069 lever-legibility, bug_0056 claim-relic-agency, bug_0075
      reaver-shade, bug_0083 woken-fork, and bug_0095 sarcophagus-examine proofs all still hold.
re_pins:
  - traces/rpg/barrow_victory.json: >
      content_hash and expected_final_hash both re-recorded against the retuned pack and the
      new canonical warded route (see re_recorded_trace). A surfaced, deliberate change
      accompanying a content edit (HASH_PIN_FILE), not a weakening.
  - tests/regression/rpg_scoring.test.ts: >
      Its seed-1 helper hard-coded exactly 2 ATTACK actions to fell the old hp12 wight;
      replaced with a loop ATTACK until wight_slain (seed 1 survives under-armed). The score
      milestones (0->10->25->50) are independent of the round count and are unchanged.
  - tests/regression/ending_score_summary.test.ts: >
      Same fixed-2-attacks seed-1 helper; replaced with loop-until-wight_slain. The
      Final-score-tally assertion is unchanged.
  - tests/regression/rpg_barrow_lever_legibility.test.ts: >
      The first-lever-FAILS demonstration used seed 2, which now dies under-armed; swapped to
      seed 3 (survives under-armed AND first lever fails). The on_failure narration is
      seed-independent; the seed-1 first-lever-success case is unchanged.
  - tests/regression/rpg_barrow_lever_first_heave_honest.test.ts: >
      Same seed-2 -> seed-3 swap for the first-lever-FAILS case, for the same reason.
locked_by:
  - tests/regression/rpg_barrow_wight_prep_matters.test.ts
