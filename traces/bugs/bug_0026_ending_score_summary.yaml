bug_id: bug_0026
pack_id: sealed_crypt_v1          # the demonstrating pack; the FIX is a generic engine feature (all scoring parser + RPG packs)
seed: 7
type: engine_feature             # generic, pack-agnostic capability under trust-but-verify (no §14 gate)
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T09-19-40-916Z/playtest.md
  rotation_rationale: >
    The assessor's rank-1 target was clockwork_heist_v1, but it has been blind-playtested
    PRISTINE for nine straight cycles (bug_0008/0017/0018/0019/0020/0022/0023/0024/0025).
    Per the protocol's "you MAY pick a different candidate if your judgement and the
    playtest say it's higher value" and blind_playtest_protocol.md's explicit "rotate
    the seed and ... rotate the pack", the mandatory playtest was rotated to the most
    under-verified playable pack — sealed_crypt_v1, whose multi-step lock-and-key chain
    the deterministic coverage bot cannot solve (7/10 rooms left unvisited), last given a
    focused blind read around bug_0013. This maximizes value-of-information.
  mandated_result: >
    A fresh general-purpose subagent (MCP-only, no source access) solved The Sealed Crypt
    to ending_victory on the first attempt: clarity 5/5, enjoyment 3/5, zero rejected
    actions, no loops, no broken/stale state, all 10 rooms visited, full sexton dialogue
    exhausted. Two findings, one re-examined away and one genuine:
  finding_dismissed: >
    The playtester saw running scores 5 -> 15 -> 35 and suspected inc_var behaved like
    `set`. Verified against the pack: the authored `by` values are 5, 10, 20 (headstone,
    rope-tie, gate), so additive increments give exactly 0->5->15->35. The score IS
    correct and additive; the playtester misread the running totals as deltas. No engine
    fix warranted — chasing it would have been a phantom.
  finding: >
    GENUINE (report sec.5): "No closure / score summary at the win." ending_victory is a
    single line with no final-score tally, even though a scoring system exists
    (meta.max_score 35). The player accrues points the whole game and the run ends without
    ever being told what they scored. Enjoyment was docked partly for "a score ... never
    shown to the player." This is NOT specific to sealed_crypt — every scoring pack has
    the same gap (sealed_crypt 35, sunken_barrow 50, cold_forge 50, alchemists_tower 35),
    so the fix is a generic engine/UX capability, not a one-pack content patch.
improvement:
  layer: engine    # generic, pack-agnostic — no YAML edited, no content hash changed
  engine:
    - src/parser/observation.ts: >
        (1) ParserObservation gains a `max_score: number` field (the denominator,
        previously absent from the observation), populated from index.pack.meta.max_score
        (default 0). (2) When the game is ended AND max_score > 0, the player-facing
        `description` now appends "\n\nFinal score: X of Y." where X is the ACTUAL accrued
        score (state.vars.score) and Y is max_score — so a partial-credit win reads
        honestly (e.g. "30 of 35"), never a hardcoded max. The canonical `ending.text`
        field (and every pack YAML) stay PURE: only the rendered `description` carries the
        tally, so all renderers (the CLI play bins which print obs.description, the MCP
        observation JSON the playtester reads, the UI) surface closure with zero per-pack
        content change. Packs with no score (max_score 0) are untouched; the CYOA packs use
        a separate observation entirely and are unaffected.
    - src/rpg/observation.ts: >
        NO change needed. RpgObservation is Omit<ParserObservation, "mode" |
        "available_actions"> spread over buildParserObservation's result, so it inherits
        both the new `max_score` field and the tally-appended `description` from the one
        parser site — the feature reaches RPG packs for free.
    - validator: >
        NO change. Observation rendering carries no effects and cannot affect any
        reachability / score / soft-lock bound — no validator verdict can shift.
verification:
  lint: green (tsc --noEmit)
  validate: green (0 errors, 0 warnings) — all packs
  content_hash_changes: none   # engine-only; no pack YAML edited, so no pack hash moves and no re-pin needed
  health: exit 0 (verify:integrity OK, format:check + lint + all tests + every pack validate + watchtower coverage)
  reachable_endings_unchanged: true   # render-only change; no flag/item/exit/gating/ending touched
verified_live: >
  Through the engine render path the regression exercises (buildParserObservation /
  buildRpgObservation over initStateForParserPack/initStateForRpgPack + makeStep — the
  same path the MCP server and CLI bins use): sealed_crypt's full route ends at
  ending_victory with description containing "Final score: 35 of 35." while ending.text
  stays pure; a headstone-skipping route wins at 30/35 and reads "Final score: 30 of 35."
  (proving the tally tracks real score, not the max); mid-game no tally shows but
  max_score is already surfaced; sunken_barrow's seed-1 victory inherits the tally as
  "Final score: 50 of 50." via buildRpgObservation.
regression_test: tests/regression/ending_score_summary.test.ts   # 4 cases: (1) sealed_crypt full route → "35 of 35." appended, max_score surfaced, ending.text pure; (2) partial-credit win → "30 of 35." (tally tracks real score, not max); (3) mid-game → no tally but max_score surfaced; (4) RPG inheritance → sunken_barrow victory "50 of 50." via buildRpgObservation, ending.text pure.
closes_deferred: []
deferred:
  - The repo/ESLint + Prettier tooling gap (lint is still just tsc — the assessor's standing rank-3 repo candidate); now the strongest remaining lever since every pack is blind-verified and per-pack content polish is at deep diminishing returns, but budget a full cycle as it is "repo/L" and unbounded.
  - Optional polish on the ending tally itself (e.g. a classic-IF rank/"in N turns" line) if a future playtest asks for richer denouement — deliberately kept minimal here.
