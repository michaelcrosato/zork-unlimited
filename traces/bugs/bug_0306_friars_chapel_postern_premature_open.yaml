id: bug_0306
title: "friars_postern — chapel and font describe the postern as already open before player acts"
pack: content/parser/pack/friars_postern.yaml
severity: moderate
class: premature-past-tense-description
discovered_by: blind_playtest_seed_7
playtest_report: ai-runs/2026-06-08T09-33-59-299Z/playtest.md

symptom: >
  The chapel's `knows_postern` variant read "the third stone above its base, pressed
  slow as the old woman said, has swung the friars' postern inward on a breath of night
  air" upon entry — past-tense, implying the player had already pressed the stone. No
  "press stone" action was ever offered; the postern appeared to open itself automatically
  the moment the player arrived. The font variant had the same issue: "Pressed slow, it
  has worked the friars' postern open into the dark beyond." The old woman's precise latch
  instructions ("third stone up from the floor, press slow and even") felt like decoration
  rather than a puzzle to execute — the earned "aha" moment was absent.

root_cause: >
  The room and font variants were written as if the player had already pressed the stone,
  but the north exit is gated on `knows_postern` alone (knowledge = key, no separate press
  action exists). Entering the chapel with knows_postern causes the description to claim
  the stone was pressed, even though no action produced that state.

fix:
  type: content
  files:
    - content/parser/pack/friars_postern.yaml
  description: >
    Pure prose change to both `knows_postern` variants.
    Chapel variant: "has swung the friars' postern inward on a breath of night air"
    → "stands a little proud of its fellows, waiting for a slow hand." Describes the
    stone as visible and ready to press rather than already pressed.
    Font variant: "Pressed slow, it has worked the friars' postern open into the dark
    beyond" → "Pressed slow, as she promised, it will swing the postern open into the
    dark beyond." Conditional framing — the stone is identified and described, but
    the pressing hasn't happened yet.
    No flag, exit condition, score, or ending changed.

regression_test: tests/regression/friars_chapel_postern_premature_open.test.ts
