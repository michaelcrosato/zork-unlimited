id: bug_0428
title: Cellarman's Dark kept putting the oil jar back on the shelf
pack: content/parser/pack/cellarmans_dark.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  The blind playtest noticed that the oil-store description kept saying something
  on the low shelf was right to hand after the player had already taken the oil
  jar. After filling the lamp, the consumed jar could also reappear as a visible
  room object on re-entry.
root_cause: >
  oil_store had no taken-item variant for the dark room text, and the fill-lamp
  interaction used remove_item on oil_jar. In the current object-location model,
  remove_item removes the jar from inventory but leaves its static home in the
  oil-store, making it visible again.
fix: >
  Added dark and lit oil-store variants for the taken/filled jar state, made the
  oil jar's examine text react after lamp_oiled, and kept the emptied jar in
  inventory after filling the lamp so it cannot snap back to the shelf.
tests:
  - tests/regression/cellarmans_oil_store_jar_state.test.ts
verification:
  - npm test -- --run tests/regression/cellarmans_oil_store_jar_state.test.ts
  - npm run validate -- content/parser/pack/cellarmans_dark.yaml
