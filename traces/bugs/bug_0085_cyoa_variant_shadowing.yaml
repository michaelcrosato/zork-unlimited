bug_id: bug_0085
pack_id: null   # engine/validator soundness guard; not specific to one pack
seed: 7
evidence:
  source: blind_playtest + validator_audit
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T22-31-58-309Z/playtest.md
  finding: >
    This cycle's mandated blind playtest of The Clockwork Heist (seed 7, fresh MCP-only
    subagent) reached all five endings, rated the pack clarity 5/5 / enjoyment 4/5, and
    found NO functional bugs — every "finding" was a deliberate, heavily-tested tuning
    decision (the deadline is intentionally generous; the ticks>=7 escalation prose was
    just built across bug_0082/0084 to fill the 7-9 band before the ticks>=10 ending, so
    tightening the deadline would make that fresh, fully-tested escalation arc dead
    content and break ~5 test files). With the target pack proven sound, I audited the
    reactive-variant machinery the whole pack leans on and found a class of authoring
    error the validator did not guard: the clockwork pack's own comments repeat the
    invariant "higher threshold first, first match wins" ~10 times, hand-ordering every
    reactive scene/ending so a more-general variant never precedes a more-specific one.
    Nothing checked it.
failure:
  type: validator_missing_check_dead_content
  where:
    - engine:src/validate/cyoa_validator.ts
  description: >
    A scene's / ending's `variants` are evaluated first-match-wins (src/cyoa/runner.ts
    sceneText/endingText): the first variant whose `when` holds is displayed, else the
    base `text`. So if a LATER variant's `when` is entailed by an EARLIER sibling's
    `when` — i.e. whenever the later holds, the earlier also holds — the earlier always
    wins and the later can NEVER be the first match. Its authored text is dead content
    that no playthrough can ever surface. The validator checked reference integrity,
    reachability, soft-locks, dead-ends, feasibility and contradiction, but had no notion
    of variant ordering at all: a maintainer appending a new reactive tier in the wrong
    position, or duplicating a `when`, would ship silently-unreachable prose. The blind
    playtest is a weak backstop for this — a shadowed variant simply never appears, so
    its absence reads as normal. The shipped packs avoid it only by hand-ordering and
    repeated prose reminders, which is exactly the kind of invariant a validator should
    own.
fix:
  layer: validator
  summary: >
    Add a sound, conservative `checkVariantShadowing` over each scene's and ending's
    `variants`. Build a `WhenProfile` per variant — the positive/negative atoms it pins
    (flags, items, visited, is_open/is_unlocked, quest_stage) and the strongest var
    bounds it implies (var_gte → lower, var_lte → upper, var_eq → both) — flattening
    top-level `all_of`. A `when` containing `any_of`/`none_of` (a disjunction we cannot
    reason about) is marked OPAQUE and never participates in a proof. `entails(j, i)` is
    true iff every atom/bound of the earlier `i` is guaranteed by the later `j` (so
    j ⟹ i). For each later variant j, if any earlier i has entails(j, i), emit a WARNING
    UNREACHABLE_VARIANT (severity matches the sibling reachability findings
    UNREACHABLE_SCENE / DUPLICATE_ENDING; the game still runs, the variant is just dead).
    No schema, runner, or content change.
  reachable_endings_changed: false
  content_hash_changed: false        # no content pack edited
  regression_test: tests/regression/cyoa_variant_shadowing.test.ts
  unit_tests:
    - tests/unit/cyoa_validator.test.ts   # new negative fixture: unreachable_variant.yaml -> UNREACHABLE_VARIANT
  fixtures:
    - content/broken-fixtures/unreachable_variant.yaml
verified_live: >
    Bug-first: a synthetic pack with `ticks>=2` listed before `ticks>=5` (and a
    flag-superset, and a duplicate `when`, and a shadowed ending variant) now yields
    UNREACHABLE_VARIANT; correctly-ordered (specific-first), incomparable (distinct
    flags), and opaque-disjunction siblings do NOT (soundness — no false positives). The
    two shipped reactive packs (clockwork_heist: 8 variant blocks; watchtower_road: 1)
    produce ZERO UNREACHABLE_VARIANT findings and stay green — their intentional high→low
    ordering passes because a higher-threshold variant does not entail a
    lower-threshold-plus-extra-flag one. `npm run health` green.
note: >
    Soundness over coverage: the check proves shadowing only over a pure conjunction of
    literals/var-bounds and bails (no finding) on any disjunction, so it can miss a
    shadow covered by the UNION of several earlier variants but never falsely flags a
    reachable one. It turns a prose-enforced authoring rule ("higher threshold first")
    into a machine-checked invariant for every current and future reactive pack.
