bug_id: bug_0007
pack_id: watchtower_road_v1
seed: 55
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T05-51-01-531Z/playtest.md
  finding: >
    A fresh, MCP-only blind playtester (clarity 5/5, enjoyment 4/5, all four
    endings/branches reached) surfaced two coupled flaws at the hidden_cache scene,
    the first of which was also logged as the bug_0006 deferred next-focus (a):
      (1) Stale room text after taking the ledger (report §5, "Stale scene text
          after taking the ledger") — take_ledger routed back to hidden_cache
          (next: hidden_cache), so after pocketing the ledger the scene re-rendered
          "A ledger lies forgotten in the dust..." with only "Slip back out"
          available: the item is in inventory but the room still describes it as
          present. Same class as the bug_0002 stale cart/cellar-door text.
      (2) Presumptive description (report §5; bug_0006 deferred (a)) — the cache
          text read "...a seal you recognize from the letter," which presumes the
          player took the sealed letter. On the cellar-only route (lantern → cellar
          → ledger) the player never sees the letter, so the line asserts a
          recognition the player never earned.
failure:
  type: stale_room_text_and_presumptive_description
  where: [scene:hidden_cache]
  description: >
    Taking the ledger left the player standing in a scene that still narrated the
    ledger as un-taken, and the cache description presumed knowledge of the letter
    that the dominant cellar route never provides.
fix:
  layer: content
  summary: >
    (1) take_ledger.next is now `cellar` instead of `hidden_cache`. After pocketing
    the ledger the player exits cleanly to the cellar (where search_cache is gated
    on not_item ledger and examine_barrels on not_flag learned_truth, leaving only
    climb_out) — mirroring the bug_0003 "exits cleanly" design — so the stale
    "ledger lies forgotten" text is never re-rendered. The cache is also unreachable
    again afterward (search_cache requires not_item ledger), so the stale view is
    fully eliminated, not merely skipped once. (2) The cache description is reworded
    path-agnostic: "a wax seal pressed into the cover" replaces "a seal you
    recognize from the letter," so it reads truthfully whether or not the player
    ever took the letter. No flags, items, gating, or reachable endings change.
regression_test: tests/regression/watchtower_cache_stale_ledger.test.ts
