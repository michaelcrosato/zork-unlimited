id: bug_0173
title: "Re-tune the RPG generator's two-fight gauntlet to SOUNDLY set meta.combat_guaranteed — the bug_0172 named next-focus turning the cumulative-HP check into a per-mint GREEN obligation"
kind: engine
mode: meta
severity: enhancement
layer: generator
artifact:
  source: src/gen/rpg_generator.ts
  test: tests/regression/rpg_generator_guaranteed_gauntlet.test.ts

summary: >
  bug_0171 deepened the RPG generator to a two-fight gauntlet but left it an UNDECLARED gamble: each fight
  was winnable on best reachable stats, yet the then per-fight combat_guaranteed upper bound (bug_0114)
  could not see cumulative HP drain across the sequence, so the generator deliberately left the flag UNSET
  ("two guaranteed fights could still drain a best-prepared player on worst cumulative rolls"). bug_0172
  closed that validator blind spot by adding COMBAT_GAUNTLET_NOT_GUARANTEED (sums every enemy's worst-case
  maxDamageTaken; fires when the running total >= playerHp), but that hardest check ran ONLY against frozen
  witness packs in rpg_combat_guaranteed_optin.test.ts — never against the per-cycle MOVING distribution.
  bug_0172's own "next suggested focus" named this exact slice: "re-tune the RPG generator so its two-fight
  gauntlet SOUNDLY sets meta.combat_guaranteed: true (behind a generator_version bump + corpus re-seal),
  making every RPG mint exercise the new cumulative upper bound as a GREEN case." v3 re-tunes the two
  enemies so a FULLY-PREPARED descent survives BOTH fights on EVERY roll AND cumulatively, sets
  meta.combat_guaranteed: true, and bumps RPG_GENERATOR_VERSION 2 -> 3 with a corpus re-seal — so the
  validator's hardest check is now a per-mint obligation, not a frozen target.

root_cause: >
  Not a defect — a deliberate eval-distribution deepening (docs/CURRENT_PLAN.md / [[fresh-pack-generator]]).
  The generator's combat-soundness coverage was a FROZEN target: the cumulative-HP gauntlet bound
  (bug_0172) had no GREEN exemplar in the moving mint window, so a regression in it would only be caught by
  static witness packs, not by the per-cycle distribution the contamination-free-benchmark thesis rests on
  (the never-frozen-target property; arXiv 2510.14253, [[verifier-assertion-guard]]).

fix: >
  In src/gen/rpg_generator.ts: (1) RPG_GENERATOR_VERSION 2 -> 3; (2) add `combat_guaranteed: true` to
  meta; (3) re-tune the two enemies so a fully-prepared player (the OPTIONAL spirit +2 attack and cell
  ward +2 defense ⇒ best reachable atk6/def4, hp20) survives the whole gauntlet on every roll AND
  cumulatively. foe (gallery sentinel): hp 12->6, attack 5->1, defense 2->4. warden (span guardian):
  hp 18->9, attack 7->2, defense 2->4. The enemies keep their escalation (warden bigger HP + higher
  attack) and the high defense is what keeps an UNDER-prepared player's fight a real, lethal gamble. No
  change to combat.ts, the validator, the schema, the score economy, the room/ending shape, or the
  three-ending census. Corpus re-sealed (npm run corpus:seal): the 4 held-out RPG packs (genrpg_0..3)
  re-stamped to generator_version 3 with new content hashes; the cyoa/parser corpus entries are
  byte-unchanged (rpg-only change). The generator edit surfaces an EXPECTED, non-blocking VERIFIER_TOUCHED
  drift warning (src/gen/rpg_generator.ts is in PROTECTED_FILES, bug_0167) — the sanctioned deepen
  workflow, not a GUARD_WEAKENED.

witness: >
  Against the live max(1, d6 + atk - def) math (player strikes first; enemy retaliates only on rounds it
  survives, worstRoundsToKill - 1). PREPARED player atk6/def4, hp20 (the validator's best-reachable bound):
  foe (hp6/atk1/def4) worst case — player dmg max(1,1+6-4)=3 → rounds ceil(6/3)=2; max enemy dmg
  max(1,6+1-4)=3 → maxDamageTaken 3*(2-1)=3. warden (hp9/atk2/def4) worst case — player dmg 3 → rounds
  ceil(9/3)=3; max enemy dmg max(1,6+2-4)=4 → maxDamageTaken 4*(3-1)=8. Per fight 3<20 and 8<20 (no
  COMBAT_NOT_GUARANTEED); cumulative 3+8 = 11 < 20 (no COMBAT_GAUNTLET_NOT_GUARANTEED) ⇒ the guarantee is
  SOUND and GREEN. Lower bound (best rolls): foe minDamageTaken 0, warden 1 — not COMBAT_UNWINNABLE.
  UNPREPARED player atk4/def2 (skips both buffs): foe worst — player dmg max(1,1+4-4)=1 → 6 rounds, blow
  max(1,6+1-2)=5 → up to 25 ≥ 20 ⇒ ending_fallen_sentinel reachable; warden worst after a best-roll pass
  through the sentinel — player dmg 1 → 9 rounds, blow max(1,6+2-2)=6 → up to 48 ⇒ ending_fallen_guardian
  reachable. So preparation is a guaranteed-sufficient strategy while both deaths stay reachable for the
  unprepared (the 3-ending census holds).

regression: >
  NEW tests/regression/rpg_generator_guaranteed_gauntlet.test.ts (12 seeds) pins, across the emitted
  distribution: (1) every mint sets meta.combat_guaranteed === true; (2) validateRpg emits NONE of
  COMBAT_UNWINNABLE / COMBAT_NOT_GUARANTEED / COMBAT_GAUNTLET_NOT_GUARANTEED on the real pack (the
  guarantee is GREEN); (3) NON-VACUITY / load-bearing — bumping ONLY the span guardian's attack to 7
  (its worst-case maxDamageTaken 9*2=18 < 20, each fight still passing ALONE) makes the JOINT worst-case
  3+18=21 >= 20 trip COMBAT_GAUNTLET_NOT_GUARANTEED and NOT the per-fight codes, proving the green is the
  cumulative bound actually holding; (4) the promise is CONDITIONAL ON PREPARATION — the shared
  best/worst-roll bracket still reaches all three endings (victory + both keeper deaths), so the guarantee
  did not neuter the gamble. tests/unit/rpg_generator.test.ts (24 seeds, validateRpg-clean + 3-ending
  census) and tests/regression/rpg_generator_two_fight_gauntlet.test.ts (the v2 SHAPE guard, version pin
  relaxed to >= 2 since the two-fight structure is preserved across the v3 stat re-tune) stay green.

curated_impact: >
  No curated content touched: the two hand-authored RPG packs (cold_forge, sunken_barrow) are UNCHANGED
  and still validate 0/0; neither sets combat_guaranteed, so the cumulative check stays dormant on them
  and tests/unit/rpg_validator.test.ts has no pinned-hash re-pin. tests/unit/mcp_generate_rpg_pack.test.ts
  needs no edit (room 7 / enemy 2 / ending 3 / max_score 40-80 / vars_init hp20/atk4/def2 / base-attack-4
  -> counsel-6 all unchanged; its content_hash assertion recomputes from the live generator). The corpus
  hash change is a deliberate, surfaced re-seal behind a generator_version bump (held_out_corpus_sealed.
  test.ts version-match + re-mint-determinism stays green), not a weakened check.

verification: >
  npm run health EXIT 0 — 204 test files, 1273 tests pass (up from 203/1261; +1 file, +12 cases).
  verify:integrity static OK (0/0); the rpg_generator.ts edit surfaces an EXPECTED non-blocking
  VERIFIER_TOUCHED (PROTECTED_FILES, the sanctioned deepen workflow), NO GUARD_WEAKENED, no MIN_* /
  GEN_EVAL_CHECK_COUNT floor change, no matcher relaxed, net test count rose. Re-seal is deterministic
  (a second seal produced no further diff).
