id: bug_0340
pack: chandlers_lot_v1
title: "chandler rooms still placed taken tools and book at starting positions"
severity: minor
scene: counting_room / dipping_floor / wax_loft
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the inspector's lantern, wick gauge, snuffing shears, or
  adulteration book, LOOK still used room prose that placed those objects at
  their original peg, nail, trough, or chest positions. The proved wax-loft
  variant also described the adulteration book as if it still belonged on the
  chest after the player had to hold it to stamp the proof.

root_cause: >
  The pack's room descriptions named takeable evidence tools directly, but the
  existing variants only reacted to proof flags such as `fraud_proved`,
  `short_wicks`, and `dreg_core`. There were no room variants keyed to the
  durable held-item states for the inspection tools or book.

fix: >
  Added ordered room variants for the held lantern, dipping-floor tool states,
  the held adulteration-book state, and the proof-stamped loft state. Pure
  prose/content change: no exits, effects, score, or win conditions changed.

tests: tests/regression/chandlers_lot_reactive_taken_items.test.ts
