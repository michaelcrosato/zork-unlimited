id: bug_0216
title: "Lamplighter blind-pass: the carried open flame (the round-lantern) was un-examinable — instantiated it as a takeable, examinable object so the player can look at the very thing the rock-spirit warning is about"
kind: content_fix
mode: parser
pack: content/parser/pack/lamplighters_round.yaml
# Informational. No pinned hash is touched by the pack edit itself: the change adds one object
# (round_lantern) + a sill mention in river_stair, local to lamplighters_round.yaml and its
# pack-specific regression test. The auto-discovered generic parser bar (all-endings
# reachability, no soft-lock, score-economy max==35, action-id uniqueness, variant liveness)
# re-derives clean over the edited pack; max_score stays 35. BUT the benchmark scorecard
# (traces/benchmark/scorecard.{json,md}) is a live rebuild of the heuristic bot over the packs,
# and the new lantern actions change the bot's seeded trajectory on this pack — so the freshness
# pin (bug_0194) is deliberately regenerated this same cycle (npm run benchmark --runs 50 --out
# traces/benchmark/scorecard), exactly the documented "any pack content change → regen the card"
# workflow. The regen is the only pinned artifact touched, and it is touched on purpose.

summary: >
  The mandated blind pass this cycle (The Lamplighter's Round, parser, seed 7 — the assessor's
  recency-blind rank-1) returned clarity 5/5, enjoyment 4/5, mechanics flawless: a WON 35/35 run
  plus the DEATH (ending_caught) and GREED (ending_thief) forks, all three reached cleanly with
  zero rejected actions, zero loops, zero parse failures, and zero bugs. Its ONE actionable
  finding (raised twice — friction point #4 and design-nit #5) was a flavor-vs-mechanics seam at
  the heart of the death fork: the spirit-cask is lethal because "the lit round-lantern on your
  belt" is an ever-present open flame near the impounded naphtha — but that lantern was never an
  inventory item nor an examinable object. It lived only in room and dialogue prose, so a careful
  player who wanted to confirm "I am carrying a naked flame" — the whole premise of the warning —
  had nothing to look at. The tester noted it is "slightly implicit that you yourself are the open
  flame near the spirit-cask."

root_cause: >
  The round-lantern was pure narration: river_stair's description and the spirit_cask / notice /
  watchman warnings all reference it, but no object with id round_lantern existed, so the legal
  set never contained an examine (or take) affordance for it. The danger's mechanism was told,
  never shown as a thing the player holds.

fix: >
  Instantiate `round_lantern` as the lighter's third tool on the river-stair sill, beside the
  takeable tinderbox and tally-key:
    • takeable: true (so once carried it is examinable ANYWHERE the player goes — crucially in the
      excise store, holding the store-key, in the instant before the three-way fork);
    • NOT quest_critical, and referenced by no exit / win / interaction condition and by no key_id —
      it gates nothing, so it adds no soft-lock surface and is not required to win;
    • its examine spells out the carried naked flame and ties it explicitly to the rock-spirit
      warning ("a yard of naked flame is a yard of naked flame… the very thing the night-notice
      warns you to keep well off the red-stencilled rock-spirit").
  river_stair's description is reframed so the lantern reads as kit to take up for the round rather
  than already-in-hand scenery. No route, score, ending, or gate changes: the win never needs the
  lantern, and the death still fires on forcing the spirit-cask regardless of whether it is held
  (the engine's first-class UNLOCK keys only on store_key) — so the fix is purely additive
  affordance, turning a told warning into a thing the player can look at.

why_not_gate_the_death_on_holding_it: >
  The honest "drop the flame → be safe" mechanic would require gating the spirit_cask death on
  has_item round_lantern, but the engine's first-class UNLOCK hardcodes its condition to the lock's
  key_id (legal_actions.ts, case UNLOCK) and ignores object-level conditions on unlock_effects, so
  that gate is not expressible without an engine change — out of scope for a small, verified content
  cycle. The lantern's examine is written to frame the flame as intrinsic (carried the whole round,
  never put out), so it makes NO false promise that setting it aside would make the cask safe.

regression_test: tests/regression/lamplighters_round_fork.test.ts
# New describe block (bug_0216): round_lantern exists / is takeable / not quest_critical / gates
# nothing; its examine names the flame and the rock-spirit; it can be taken at the start and
# examined at the excise-store fork with the store-key in hand; and carrying it leaves all three
# endings reachable and unchanged (win 35/35, thief, death). The pre-existing bug_0205/0210 fork
# cases are untouched and still green (the lantern is optional kit).

