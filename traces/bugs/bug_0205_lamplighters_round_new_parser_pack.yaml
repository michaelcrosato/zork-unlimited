summary: >
  The mandated blind pass this cycle (The Breaking Weir, RPG, seed 5 — the assessor's recency-blind
  rank-1 and freshest pack) returned clarity 5/5, enjoyment 4/5, mechanics flawless, ZERO bugs across
  a WON 50/50 prepared run and a DIED 10/50 un-counselled run that exercised the death pole honestly.
  That is the THIRD consecutive blind-clean pass on breaking_weir; its content AND verification are
  saturated (breaking_weir_skill_chain / _gamble_legible / _blind_polish all locked), and the
  assessor's whole ranked list is fourteen identical 0.5-floor blind-playtest stubs — the documented
  saturation signal ([[content-polish-backlog-exhausted]]). The blind report's only standing note was
  the brevity/linearity ceiling ("a short, near-linear three-obstacle gauntlet… more polished set-piece
  than a deep RPG"), which the loop memory says to spend as the brief for the NEXT net-new pack rather
  than churn a clean one. So this cycle deviated from "polish breaking_weir a 4th time" to the named
  BREADTH lever.

what_shipped: >
  The project's 15th pack and 4th PARSER pack — The Lamplighter's Round
  (content/parser/pack/lamplighters_round.yaml). Parser was the under-represented mode (3 vs 6 cyoa /
  5 rpg) AND the mode the benchmark gap-analysis (bug_0198) flagged as the thinnest / most-inverted
  CURATED witness, so a new hand-authored parser pack strengthens exactly the set the headline composite
  most needs. You are the harbour lamplighter on a fog-bound night round; the great staith-head lamp is
  out and a child is lost on the dark strand with the tide making. The puzzle chain is deliberately
  LONGER than the curated norm (answering the brevity brief) — brass tally-key → watch-house cupboard →
  excise store-key → barred store door (+10) → oil-cask → carry the oil → light the great lamp with the
  tinderbox (+20) → the lit strand → guide the child up (ending_guided). Five gated milestones, not three.

structure: >
  Modelled on sealed_crypt's validated parser structure (rooms, a READ clue source, an NPC with gated
  retiring rumour topics, locked-container/key chains, first-class UNLOCK with unlock_effects, a
  visited-based locomotion win that keeps the validator's soft-lock guard live). Its climax is the
  sealed_crypt THREE-WAY moral fork (bug_0105/0130) transposed to the EXCISE-KEEPER'S KEY: everything
  impounded in the store answers to the one store-key, which reads three ways —
    - the oil-cask         → draw the oil, light the lamp, guide the child → ending_guided (the win, 35/35)
    - the excise strongbox → take the Crown's seized silver and slip away → ending_thief (greed; terminal)
    - the sealed spirit-cask → force the impounded naphtha by your lit lantern → ending_caught (a DEATH)
  ending_caught is the failure pole, reached by end_game in unlock_effects (the bound_tomb path),
  telegraphed three times over (the night-notice, the cask's own red-stencil warning, and the watchman)
  so it is never an ambush (§8.7 / bug_0123). No score rides either fork (the score-economy
  bracket-completeness rule). Score 5+10+20 = 35, the curated parser milestone economy sealed_crypt shares.

verification: >
  validate_story → 0 errors / 0 warnings. A full live MCP playthrough drove the win path end-to-end to
  ending_guided at 35/35 (confirming UNLOCK-with-key, container open/take, the custom `light … with …`
  verb, lamp_lit unlocking the down-exit, reactive room text, and the locomotion win). Wired into the
  `health` validate chain (required by all_packs_validated_by_bar.test.ts) and the benchmark scorecard
  regenerated at runs=50 (required by benchmark_scorecard_fresh.test.ts). The auto-discovered parser
  suites prove the generic structure (all-three-endings reachability, no soft-lock, score economy max==35,
  action-id uniqueness, variant liveness); npm run health green.

out_of_band_teeth: >
  The regression (lamplighters_round_fork.test.ts) drives the REAL engine (enumerateActions + makeStep)
  and pins the pack-specific claims: the fork is genuinely THREE-way in one state (oil-cask, strongbox AND
  spirit-cask all unlockable with the store-key); the win reaches ending_guided at 35/35 and lighting
  opens the strand; the silver fires ending_thief (non-death, lamp left dark); the spirit-cask fires
  ending_caught (death, strand never reached, narration names the rock-spirit + flame); ending_caught is
  the ONLY death and both forks are end_game-only with ending_guided the sole winnable; the lamp
  HARD-requires the oil (un-lightable dry) and CONSUMES it (one-shot +20, no farming); and the death is
  telegraphed off-stage in the notice, the cask examine, and the watchman's dialogue. Reverting any of
  these behaviours fails an assertion.

next_focus: >
  First blind LLM playtest of The Lamplighter's Round next cycle (it ships validate-clean and
  win-path-verified, but the EXPERIENCE — signposting, the legibility of the three-way fork, whether the
  oil-as-shared-resource greed read lands — wants a fresh isolated blind pass; the curated-pack pattern is
  ship → blind-play → fix one finding, cf. friars_postern bug_0185→0186). Rotate the standing blind pass off
  breaking_weir (now 3x clean) per [[assessor-blind-pass-rotation]].

regression_test: tests/regression/lamplighters_round_fork.test.ts

