bug_id: bug_0101
pack_id: cold_forge_v1
seed: 23
type: content_fix          # combat-balance retune (two enemy stats); the bug_0097 "gear up first" design enabled
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_target: clockwork_heist_v1     # the assessor's rank-1 nomination, ~30th time
  mandated_report: ai-runs/2026-06-02T01-55-43-557Z/playtest.md
  rotation_rationale: >
    Per the protocol's "rotate the seed and rotate the pack" guidance and the project
    memory (rotate the mandated pass onto the least-attended pack), the blind pass was
    ROTATED off the ~30x-blind-clean clockwork_heist onto cold_forge — the least-recently
    attended pack by blind-pass recency (last at bug_0092; alchemists bug_0093, sunken
    bug_0095, watchtower bug_0098, sealed/wreckers bug_0099/0100). Fresh general-purpose
    MCP-only subagent, seed 23, no source access; two contrasting runs (fully prepared
    and deliberately under-armed) both reached ending_victory 50/50.
  finding: >
    The pack has NO real failure state and its preparation arc is cosmetic. The seed-23
    tester (§4/§5) won an UNDER-ARMED run with 9 HP to spare, found the sentinel "dies in
    exactly 3 hits whether I had attack 4 or attack 6" (so the lantern-spirit's +2-attack
    counsel "felt pointless"), and flagged the room's own warning — "better not to meet it
    under-armed — face it with every edge you can bring to bear" — as text that "writes a
    check the mechanics don't cash." Root cause: the old hp16/atk4 sentinel was too soft
    for a 20-HP player; base attack already cleared 16 HP in ~3 rounds, so neither the +2
    attack nor the +2 defense changed the outcome. The same "prep is cosmetic / careful
    play is trivially safe" note recurs across both RPG packs (sunken_barrow bug_0095) and
    has been queued as a deferred next-focus since bug_0092.
improvement:
  layer: content        # two enemy stats only — no prose/flag/score/ending/exit/effect change
  content:
    - content/rpg/pack/cold_forge.yaml: >
        Retuned the slag_sentinel from hp16/atk4 to hp18/atk7 (defense unchanged at 2).
        Combat is one ATTACK = one round: player deals d6+atk-2, the sentinel (if it
        survives) deals d6+7-def (min 1). Verified live over seeds 1-40 (__probe.ts):
        UNDER-ARMED (atk4/def2) now loses on a majority of seeds (seeds 1,2,4,9,10,12,13,
        14,17,18,20,23,24,25,27 of 1-30 are lethal) so the warning is honest; the SPIRIT'S
        +2 ATTACK (atk6/def2, on the mandatory Outer-Forge path) is the decisive survival
        lever, lifting the win rate ~45%->~90%; the FOUNDER'S PLATE (+2 defense) on top is
        a near-certain win with a comfortable HP cushion (atk6/def4 won every seed tested).
        Updated the header + founder_cell design comments that called the fight "winnable
        from base stats" / the plate "optional grace" to reflect the new balance honestly.
  why_within_the_bar: >
    The RPG validator's COMBAT_UNWINNABLE proof was widened in bug_0097 to credit the
    player's BEST REACHABLE stats (init + every reachable +attack/+defense buff =
    atk6/def4), precisely to permit a sound "gear up first" design. With hp18/atk7:
    bestPlayerDmg = max(1,6+6-2)=10, roundsToKill = ceil(18/10)=2, minEnemyDmg =
    max(1,1+7-4)=4, worstCaseDamageTaken = 4*(2-1)=4 < 20 reachable HP => provably
    winnable. cold_forge stays a clean 0-finding pack. This is the first pack to actually
    exercise the bug_0097 widening: base-stat play is a lethal gamble the bar never
    required to be safe.
  invariants:
    - The retuned pack validates green under the full RPG validator (no COMBAT_UNWINNABLE).
    - The sentinel carries hp18/atk7/def2.
    - Real failure state: an under-armed thief (base attack 4) at seed 1 is killed and
      fires the declared death ending ending_fallen (death: true).
    - Prep decides it: at the SAME seed 1, the ONLY change being the spirit's +2 attack,
      the fight flips from death to a full ending_victory 50/50.
    - No prose/flag/score(50)/win/ending/exit/effect change — only the two enemy stats; the
      bug_0070 prose-cue, bug_0048 grate journal, bug_0076 plate beat, and the seed-2
      under-armed-death (bug_0021) proofs all still hold.
re_pins:
  - tests/regression/cold_forge_sentinel_threat_telegraph.test.ts: >
      The bug_0070 lock asserted the sentinel stats were UNTOUCHED (hp16/atk4/def2),
      since that cycle's fix was content-only and the fight was then winnable from base
      stats. bug_0101 deliberately overturns that premise — the prose cue bug_0070 added
      is now backed by real teeth. Re-pinned the stat assertion to hp18/atk7/def2; the
      buffed seed-1 victory and the "no false hard requirement" prose guards are unchanged.
      A surfaced, deliberate value change accompanying a content edit, not a weakening.
  - tests/regression/cold_forge_grate_journal.test.ts: >
      Its atForgeHeart() helper reached the grate UNDER-ARMED at seed 1, which is now
      lethal; switched it to the canonical spirit-buffed route so the grate-journal
      assertions still run. The test's concern (grate journaling) is unchanged.
locked_by:
  - tests/regression/cold_forge_sentinel_prep_matters.test.ts
