id: bug_0203
title: "alchemists_tower — two death endings broke the in-fiction tone with an engine-instruction meta line '(Load a saved game to try again.)'"
kind: content_fix
mode: parser
pack: content/parser/pack/alchemists_tower.yaml
# Informational. No test pins alchemists_tower's content_hash, so nothing was forced; this
# content edit moves the pack hash, and the regression pins rendered BEHAVIOUR (ending prose
# carries no engine-instruction meta line), not the bytes.

summary: >
  The mandated blind pass this cycle (alchemists_tower, parser, seed 19 — the most-overdue
  PARSER rotation target, last dedicated pass bug_0185; deviated from the harness recency-blind
  rank-1 breaking_weir, blind-played 3 of the last 6 cycles, per the rotation discipline)
  reached all three endings (ending_cured WIN 40/40, ending_betrayal 0/40, ending_poisoned
  DEATH 0/40), rated the pack clarity 5/5 / enjoyment 4/5 with ZERO mechanical bugs. Its one
  concrete finding: the "Poisoned" death ending text ended with "(Load a saved game to try
  again.)" — a meta, engine-flavoured instruction jarring against the in-fiction tone of the
  pack's other endings.

root_cause: >
  Two of the pack's four endings — both DEATH endings, ending_poisoned (drink the black phial
  yourself) and ending_master_poisoned (dose the master with the wrong vial) — closed their
  prose with the parenthetical "(Load a saved game to try again.)". These two strings were the
  ONLY ending texts in the entire parser/RPG corpus carrying such an engine-instruction line,
  and they were the odd ones out WITHIN their own pack: ending_cured and ending_betrayal both
  close with the project's in-fiction `*** ... ***` tag ("*** You have won. ***" / "*** You
  have taken the Great Work. ***"), and the other tagged parser packs (sealed_crypt,
  friars_postern) tag their death endings too. Loadability is an engine capability the player
  always has (§8.7), so the prose never needed to instruct it.

fix: >
  Content-only, no engine change. Dropped the "(Load a saved game to try again.)" meta from both
  death endings and closed them with the pack's in-fiction tag instead: ending_poisoned now ends
  "...the long sickness it was brewed for is yours now, and quick. *** You have died. ***" (the
  sealed_crypt poison-death convention); ending_master_poisoned now ends "...and ended her at the
  last. *** You have failed her. ***". The endings stay exactly as reachable — death flags, ids,
  score (0), and the ending_cured win-condition are all untouched; only the prose changed.

out_of_band_teeth: >
  The regression (alchemists_death_ending_meta_free.test.ts) loads the REAL parser+RPG packs by
  discovery and asserts the corpus invariant the fix establishes — NO declared ending text in any
  parser/RPG pack carries an engine-instruction meta line (the /load a saved game|\(\s*load\b/i
  phrasing) — so a re-introduction in ANY pack is caught, not just this one. A second case pins
  alchemists_tower's two death endings specifically as meta-free AND now carrying the in-fiction
  `*** ... ***` tag their sibling endings already used (exact closing tags asserted). Reverting
  either content edit re-introduces the meta line and turns the corpus case RED — a behavioural
  witness on rendered ending text, not a byte-pin. (Note: the `*** ... ***` tag is NOT universal
  across packs — cold_forge / sunken_barrow use no tag — so the corpus invariant is the
  meta-instruction guard, while the tag assertion is scoped to this pack's own convention.)

regression_test: tests/regression/alchemists_death_ending_meta_free.test.ts

verification: >
  npm run health green (verify:integrity + lint + tests + validate + playtest). alchemists_tower
  validate_story stays 0 errors / 0 warnings; the auto-discovered parser suites (all-endings
  reachability for ending_cured/ending_poisoned/ending_master_poisoned/ending_betrayal, no
  soft-lock, score economy max==40, action-id uniqueness) stay green — text-only change, no
  structural change. The per-pack alchemists suites (phial danger cue, wrong-vial branch, etc.)
  assert on endingId/death/score/reachability, not ending prose, so they are unaffected.

files_changed:
  - content/parser/pack/alchemists_tower.yaml  # ending_poisoned + ending_master_poisoned: meta line -> in-fiction *** ... *** tag
  - tests/regression/alchemists_death_ending_meta_free.test.ts  # new corpus meta-free guard + alchemists death-tag assertion
