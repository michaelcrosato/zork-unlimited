id: bug_0471_fire_office_submission_affordances
title: "Fire Office submission affordances stay honest"
pack: content/cyoa/pack/fire_office_examiner.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T220255Z_fire_office_examiner_seed7.md
severity: S1
symptom: >
  A blind playtester found that the burned warehouse offered report filing on
  first arrival with no evidence, the submission desk invited a return even
  after the full file was complete, exhausted evidence rooms stayed clickable,
  and the full-file payment label announced the completed fraud evidence before
  the player chose it.
root_cause: >
  Submission and navigation choices were mostly ungated. Evidence collection
  retired local clue actions, but the parent warehouse links and desk return
  did not distinguish useful investigation from exhausted loops.
fix: >
  Gate report filing until at least one finding exists, retire the burn, yard,
  and cook side-room links after their findings are collected, hide the desk
  return once all seven evidence flags are present, and make the full-file
  payment label neutral until the consequence is chosen.
tests:
  - tests/regression/fire_office_examiner_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/fire_office_examiner_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/fire_office_examiner.yaml
  - npm run health
