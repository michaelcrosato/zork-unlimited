bug_id: bug_0073
pack_id: alchemists_tower_v1
seed: 9                            # the cycle's blind-playtest seed for alchemists; the regression drives seed 1 for the win route
type: content_fix                 # re-models one object onto an existing engine verb; no engine change
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T19-26-44-561Z/playtest.md   # mandated target was clockwork_heist (seed 113) — blind-verified PRISTINE, clarity 5/5, enjoyment 5/5, zero findings
  mandated_result: >
    The assessor's rank-1 mandated target, clockwork_heist (seed 113), came back PRISTINE for
    the Nth straight cycle: all four endings reached, clarity 5/5, enjoyment 5/5, zero actionable
    findings — the pack has been micro-tuned across bug_0019–bug_0072 and forcing another edit
    there is over-fitting with regression risk and no player-facing gain. Per the protocol's
    explicit "rotate the pack" and the cycle charter ("you MAY pick a different candidate if your
    judgement and the playtest say it's higher value"), this cycle ALSO blind-playtested the two
    least-recently-attended packs — the parser packs sealed_crypt (seed 5) and alchemists_tower
    (seed 9) — to find genuine work. Both rated bug-free, clarity 5/5. The single strongest
    CONCRETE finding across all three playtests was alchemists_tower's split unlock grammar.
  finding: >
    Great Hall / Cluttered Study: "the strongbox uses an UNLOCK … with brass key verb, while the
    cellar hatch (also a key+lock) uses USE iron key on cellar hatch. Both work and both read
    fine; just two different verbs for the same conceptual action." (seed-9 report §4; the same
    inconsistency the seed-51 bug_0033 playtest had glanced at as flavour.) A first-time parser
    player learns "unlock X with Y" at the study strongbox, then meets a different grammar at the
    structurally identical cellar hatch — minor friction, and a data-model inconsistency (a
    bespoke USE interaction + a `cellar_unlocked` flag where the engine's first-class lock
    mechanism, used by the strongbox, already does the job).
root_cause: >
  The cellar hatch was authored as a plain object with a hand-written `USE iron_key on cellar_door`
  interaction that set a `cellar_unlocked` flag (and a now-vestigial `unlock_exit`, never consulted
  because the down exit gated on the flag, not the canonical exit-flag). The study strongbox, by
  contrast, is a first-class locked object (`locked` + `key_id`) opened by the engine's built-in
  UNLOCK verb (src/parser/legal_actions.ts enumerates `unlock <obj> with <key>` for any present,
  locked object that names an obtainable key_id). So one key+lock used the engine verb and the
  other used a bespoke USE — the same act, two grammars.
improvement:
  layer: content
  content:
    - content/parser/pack/alchemists_tower.yaml: >
        cellar_door: removed the bespoke USE interaction (and the `cellar_unlocked` flag /
        vestigial unlock_exit) and modelled the hatch with the engine lock mechanism — `locked: true`
        + `key_id: iron_key` — so the player opens it with the same `unlock cellar hatch with iron
        key` (UNLOCK) verb the strongbox uses. Added a reactive examine `variant`
        (`is_unlocked: cellar_door`) so the hatch stops reading "bolted" once its lock is sprung,
        matching the pack's reactive-examine discipline (cf. bug_0033). Great Hall: the down exit
        and the "thrown open" reactive room variant now gate on `is_unlocked: cellar_door` (the
        runtime unlocked state the engine UNLOCK sets) instead of the retired flag — the vivid
        open-state room prose is preserved; only the momentary action line changes from the bespoke
        "The iron key throws the bolt…" to the engine's plain "You unlock the cellar hatch", which
        is exactly what the strongbox already prints. No route/score/gating/reachable-ending change.
verification:
  typecheck: green (tsc --noEmit)
  validate: green (0 errors, 0 warnings) — alchemists_tower under the full parser validator
  content_hash: 4db3e868cc8298a85487cd4df1765d472578c9eefba6a0fb85b501701a164689   # was 88cbad736b28e2e1e6a1b5efff5d2cc93a1b8c0d2dd2ba715c8d24a821b1749f; surfaced, not laundered. Unpinned (only watchtower_road is pinned in tests).
  health: exit 0 (verify:integrity + typecheck + ESLint + Prettier check + tests + every pack validate + watchtower coverage)
  reachable_endings_unchanged: [ending_cured, ending_poisoned]   # the canonical brew route still reaches ending_cured at 35/35 through the new unlock step
  validator_safe: >
    Reachability BFS ignores exit conditions (sound for "unreachable"), so the cellar stays
    reachable. The gate-feasibility pass (checkConds) only inspects flag/item requirements; an
    `is_unlocked` condition is an unrecognized kind and is over-approximated as feasible — it
    cannot cause a false failure. The locked-object check confirms key_id `iron_key` is defined and
    obtainable (it is, from the strongbox). Variant `when` clauses are never analyzed.
verified_live: >
  Through the engine render/action path (initStateForParserPack / enumerateActions / makeStep /
  buildParserObservation — the MCP server's path): in the Great Hall holding the iron key the only
  way through the hatch is the UNLOCK action `unlock_cellar_door` (command "unlock cellar hatch with
  iron key", action type UNLOCK), the old `use_iron_key_on_cellar_door` no longer exists, and the
  strongbox's `unlock_strongbox` shares the identical UNLOCK grammar; before unlocking there is no
  go_down and the hall/hatch read "bolted"; after unlocking objectState.cellar_door.locked === false,
  the hall reads "thrown open", the hatch examine reads "unbolted … sprung", and go_down reaches the
  cellar; the full seed-1 route still wins ending_cured at 35/35.
regression_test: tests/regression/alchemists_cellar_unlock_consistency.test.ts   # 4 cases: (1) hatch opened by the engine UNLOCK action, not a USE interaction, old action id gone; (2) strongbox + hatch share the same UNLOCK type and "unlock … with …" grammar; (3) cellar gated on is_unlocked, prose flips, no stale "bolted" text, objectState records the unlock; (4) full route still reaches ending_cured 35/35.
test_updates:
  - 9 alchemist/parser test files (acceptance/stage3_alchemist + 7 regression + parser_self_use_command):
      mechanical rename of the cellar-unlock step `use_iron_key_on_cellar_door` → `unlock_cellar_door`
      in their solution sequences (the action id changed because the verb did). No assertions weakened.
  - tests/regression/alchemists_reactive_room_text.test.ts: >
      the Great Hall case asserted `flags["cellar_unlocked"] === true` after the unlock; that flag is
      retired, so it now asserts the equivalent runtime state `objectState["cellar_door"].locked ===
      false`. The prose assertions (bolted → thrown open) are unchanged. A surfaced equivalence, not a
      weakening.
