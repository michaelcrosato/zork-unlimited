    generateRpgPack), so each confronts its own never-frozen distribution; within each generator the
    per-cycle windows are disjoint. assess() stays deterministic for a given repo snapshot.

why: >
  The richest verifier surfaces in the suite are the RPG-only proofs — COMBAT winnability (the
  bug_0097/0113/0114 best/worst-roll bound) and SCORE-ECONOMY soundness (declared max_score ==
  reachable award sum, folding in combat/skill awards the parser scan can't see). Until now those
  ran ONLY against the two FROZEN hand-authored RPG packs (sunken_barrow, cold_forge) — exactly the
  memorisable-target condition the frozen-verifier literature warns against (arXiv 2510.14253; the
  assessor's own 0.5-floor collapse, [[verifier-assertion-guard]]). bug_0159/0160 made RPG minting
  reachable; this slice makes it LIVE — the assessor now provably exercises validateRpg (combat +
  score included) against fresh, never-seen RPG packs EVERY cycle. When the RPG generator and
  verifier ever diverge (an unclean/unwinnable/score-unreachable emitted shape, or a verifier gap the
  fresh distribution surfaces) the lever raises a high-priority fix; while they agree it is silent and
  self-extinguishing, exactly like its CYOA twin and the eslint-coverage / doc-staleness levers.

