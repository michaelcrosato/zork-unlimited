id: bug_0405
pack: tidewaiters_watch_v1
title: "Irregularity report was available before the player knew the irregularity"
severity: medium
scene: ship_side
reported_by: blind_playtest_20260621T064930Z_tidewaiters_watch_seed7

symptom: >
  The opening gangway offered file_report immediately. Its ending asserted a
  specific documentary mismatch ("seventy-two declared, eighty billed") and
  always claimed the player knew about the alderman's prior buried query, even if
  neither the manifest nor the harbour register had been checked.

root_cause: >
  file_report had no evidence condition, and ending_reported used one static
  epilogue for both a narrow discrepancy report and a record-aware report. The
  content therefore routed players to knowledge-specific prose without proving
  that knowledge in state.

fix: >
  Gate file_report on found_discrepancy, the flag set by comparing the manifest
  against the bill of lading. Split ending_reported with a found_priors variant
  so only players who checked the harbour register see the alderman-specific
  paragraph.

tests: tests/regression/tidewaiters_watch_report_truth.test.ts

verification:
  - npm test -- --run tests/regression/tidewaiters_watch_report_truth.test.ts
  - npm run validate -- content/cyoa/pack/tidewaiters_watch.yaml

trace_repin: >
  None. The change updates pack content and adds a regression test; there is no
  committed Tidewaiter's Watch replay trace hash to repin.
