finding: >
  ui/ holds first-party React/Vite TypeScript (App.tsx, engine.ts, packs.ts, main.tsx + vite.config.ts)
  with NO static-analysis gate. bug_0031 wired ESLint+Prettier but listed "ui/**" under `ignores` and
  scoped `files` to src/bin/scripts/agents (later +tests/ in bug_0036); the lint/format npm scripts
  never named `ui`. So a whole class of issues in the UI — unused vars, unsafe `any`, and especially
  React hooks misuse (conditional/looped hooks, stale effect deps) — was invisible to `npm run health`.
  The code was authored cleanly (engine.ts even carries an `eslint-disable-next-line` for its one
  deliberate `any`), but nothing ENFORCED that; a future UI edit could regress unnoticed.
improvement:
  layer: repo      # eslint.config.js + package.json + one new devDependency. NO content/YAML/engine edited.
  change: >
    (1) Installed eslint-plugin-react-hooks@^7.1.1 as a devDependency — the one React linter that
    supports ESLint 10 (peer ^10.0.0). The broader eslint-plugin-react still caps its peer at ESLint 9.7,
    so it cannot be installed here; the canonical two hooks rules ship now and the Compiler/JSX layer is
    deferred to a future cycle when upstream supports ESLint 10. (2) eslint.config.js: dropped "ui/**"
    from `ignores` (added "ui/dist/**" so the build output stays out — it carries no lintable .ts),
    and added a `{ files: ["ui/**/*.{ts,tsx}"] }` block registering the react-hooks plugin with
    react-hooks/rules-of-hooks=error + react-hooks/exhaustive-deps=warn, plus the same no-unused-vars
    policy as first-party code. We pin those two rules explicitly rather than spreading the plugin's
    `recommended` preset, which under ESLint 10 bundles the opinionated React-Compiler ruleset
    (purity/immutability/set-state-in-render/...). `no-undef` is off under typescript-eslint, so browser
    globals need no `globals` entry. (3) package.json: lint/format:check/format scripts now include `ui`,
    so the gate actually RUNS (a config-only change the npm scripts never invoke would be a no-op).
    No ui/ source needed fixing — it already passes clean; Prettier already reported it conformant.
  effect_on_ranking: >
    The assessor's repo-lint-coverage detector DISARMS for ui/ (eslintCovers(text,"ui") flips to true).
    ui/ was the last uncovered first-party dir, so the candidate now VANISHES entirely — every
    first-party code dir is gated. The radar correctly goes silent: it fired while real uncovered code
    existed and stops once the work is done. The assessor falls back to the uniform 0.5 blind-playtest
    reviews as its honest top (no high-impact lever remains; the repo is genuinely healthy).
