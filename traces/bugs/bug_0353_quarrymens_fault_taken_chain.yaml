id: bug_0353
pack: quarrymens_fault_v1
title: "quarry yard still placed taken survey chain on the stone block"
severity: minor
scene: quarry_yard
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the survey chain from the quarry yard, LOOK still said the chain
  lay coiled on the stone block. Dropping the chain after first pickup could also
  let the room fall back to its starting-position prose.

root_cause: >
  The survey chain did not leave durable pickup state that room prose could read.
  Inventory alone was not enough because the chain can be dropped after first
  pickup.

fix: >
  Taking the survey chain now sets `survey_chain_taken`. The quarry yard has a
  corresponding variant that keeps the stone block empty after first pickup,
  including after a later drop. Score, exits, enemies, endings, and win
  conditions are unchanged.

tests: tests/regression/quarrymens_fault_reactive_taken_items.test.ts
