bug_id: bug_0046
pack_id: clockwork_heist_v1
seed: 101
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T13-42-28-631Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester reached all three endings
    (Truth, Rich, Caught) across four runs (seed 101), rating it clarity 5/5,
    enjoyment 4/5, mechanically flawless — zero rejected actions, no loops, no
    soft-locks, no bugs. Its one concrete soft spot (report §4/§5): the `dumbwaiter`
    choice "is framed like a clever stealth bypass but is mechanically identical to
    the stairs (and even costs a tick) ... a curious player will try it expecting an
    alternate/safer route and get nothing different." The playtester suggested either
    giving it a real stealth advantage or reframing it.
failure:
  type: over_promising_prose_no_payoff
  where: [content:content/cyoa/pack/clockwork_heist.yaml]
  description: >
    The kitchen's `dumbwaiter` choice ("Ride the dumbwaiter up to the gallery.")
    routes kitchen -> landing — the exact same patrolled gallery the grand stair
    (`climb_stairs`) reaches, charging the same gallery tick. Its phrasing implied a
    clever/sneaky alternate route, but it delivers nothing mechanically distinct, so
    the most heist-flavored option in the pack reads as a let-down. Not a
    reachability/gating bug: every route, tick, flag, and ending is unchanged; purely
    a prose over-promise on a choice that has no special payoff.
fix:
  layer: content
  summary: >
    Honest-reframing only. The chosen fix is to stop the prose over-promising, NOT to
    add a real stealth bypass: a route that actually skipped the watchman would
    duplicate the load-bearing ledger clue, which bug_0040 deliberately tuned to be
    the ONLY safe late (ticks >= 4) gallery crossing — a second safe route would undo
    that design intent. So the `dumbwaiter` choice text becomes "Take the servants'
    dumbwaiter straight up to the gallery." and gains a `narrate` effect that names it
    the cramped servants' lift: a quieter, more direct way up from the kitchens that
    "leaves you no closer to the vault than the open steps would." The choice still
    routes to `landing`; no tick/flag/item/exit/gating/reachable-ending change —
    grab_gold still ends at ending_rich, take_letter at ending_truth, force_door at
    ending_caught, and the watchman/ledger tuning (bug_0019/0040/0042/0043) is intact.
  reachable_endings_changed: false  # still rich/truth/caught/patrol; all routes intact
  content_hash_changed: true        # clockwork prose edited; clockwork is unpinned in tests (only watchtower_road is pinned). 080e8005f155ebd818fdd4d86700813599df9c9589dc45f84b0a4a149aff7d18 -> 5479c562a4101e02975048c05257fb348351e4cf55c3f6192c58823fb529e213
  regression_test: tests/regression/clockwork_dumbwaiter_honest_framing.test.ts
verified_live: >
  Through the engine over the compiled pack (seed 101). Taking the dumbwaiter from
  the kitchen now emits the honest servants'-lift narration ("no closer to the vault")
  and still lands at `landing`; arriving via the dumbwaiter vs. doubling back to the
  grand stair leaves identical state (scene `landing`, ticks 2), proving it is not a
  mechanical bypass. gold->rich and letter->truth still fire via the dumbwaiter route,
  force->caught via the stair, and the crawlspace truth route (which never uses the
  dumbwaiter) is unaffected.
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest is the load-bearing quality
    signal here; this cycle (seed 101) it rated the pack shippable with this single
    cosmetic soft spot, the last open finding from the recent clockwork polish family
    (bug_0042/0043/0044).
