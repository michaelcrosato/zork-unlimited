id: bug_0297
title: "White Stag tarn scene: knows_truth+at_bay compound gap — no variant covers both"
severity: content
pack: white_stag_v1
scene: tarn
class: reactive-description-blindness
discovered: "blind playtest seed 7, ai-runs/2026-06-08T07-22-13-606Z/playtest.md §5 (session 6)"
description: >
  When both knows_truth (stone read) and quest_stage:at_bay (been to bluff, came back) are set,
  the tarn scene showed only the knows_truth variant ("stone behind you says / stone keeps its
  old vow at the bank"), which doesn't acknowledge the player's hesitation at bowshot. The
  at_bay-only variant correctly acknowledged the bluff-and-back but said the stone was "unread" —
  wrong when knows_truth is set. Neither existing variant handled the intersection.
route_to_trigger:
  - go_on          # → tarn
  - read_stone     # → shrine
  - decipher       # sets knows_truth, stays shrine
  - leave_stone    # → tarn
  - take_shore     # sets quest_stage:at_bay, → bluff
  - back_to_tarn   # → tarn (knows_truth=true, at_bay=true)
fix: >
  Added compound variant gated on [has_flag:knows_truth, quest_stage:{quest:the_hunt,stage:at_bay}]
  placed above the existing knows_truth and at_bay variants (first-match-wins). New text
  acknowledges both the stone's truth and the bluff hesitation. No flag/choice/route/ending change.
regression_test: tests/regression/white_stag_tarn_at_bay_informed.test.ts
lineage: SoundnessBench reactive-description-blindness class (sibling of bug_0282-0292)
