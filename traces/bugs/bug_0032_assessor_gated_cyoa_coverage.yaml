  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T10-31-33-025Z/playtest.md
  playtest_rationale: >
    The mandatory cycle playtest ran on the assessor's rank-1 target, clockwork_heist_v1
    (CYOA, seed 163, fresh general-purpose subagent, MCP-only, no source access). ~13th
    straight STRONG run: all three endings across four routes (Truth via vault AND via the
    crawlspace strongbox, Caught, Rich), clarity 5/5, enjoyment 4/5, zero rejected actions,
    no loops, no broken state. Its two findings were BOTH previously surfaced and adjudicated:
    (a) the "ticks countdown bluff" — DELIBERATE per bug_0019/0025/0030 (the patrol DOES fire
    at ticks>=6 -> ending_patrol; reading the ledger grants the safe crossing; an efficient
    player keeps ticks low, and tightening would punish efficient play); (b) the duplicated-
    letter continuity quirk — cosmetic, logged since bug_0022/0023. No NEW actionable on-screen
    defect. Clockwork is polished past diminishing returns.
  decision_rationale: >
    Per the protocol's "you MAY pick a different candidate if your judgement and the playtest
    say it's higher value." The playtest re-confirmed there is no clockwork content defect to
    fix — yet the assessor has ranked clockwork_heist the #1 improvement EVERY cycle for ~13
    cycles ("3 unreached ending(s), 1 unvisited location(s)", score 2.0). That recommendation
    is a FALSE POSITIVE: the deterministic coverage bot reaches only 1/4 of clockwork's endings
    because the other three sit behind PLANNING (the lockpick chain for ending_rich/ending_truth;
    a deliberate ledger-skip for ending_patrol) — every one of which the blind LLM playtest
    reaches each cycle. The loop's own brain was lying to it. Fixing the evaluator's honesty is
    higher value than a ~13th clockwork micro-note, and it is the documented next lever (bug_0031
    deferred: "the assessor now has NO non-content lever left ... restore the cross-category
    radar"). It is also the trust-but-verify keystone applied to the loop itself.
finding: >
  The assessor (src/afk/assessor.ts) treated the planning-free coverage bot's reach as a
  trustworthy oracle for ALL CYOA packs (`botCoverageIsMeaningful = s.mode === "cyoa"`), on the
  documented assumption that "a no-planning bot can legitimately reach every node" in CYOA.
  clockwork_heist_v1 DISPROVES that assumption: it is a GATED CYOA — choices carry item/flag/var
  preconditions (lockpick gates the vault + crawlspace strongbox; read_ledger / ticks gate the
  safe vault crossing) — so the greedy, no-lookahead bot cannot gather a prerequisite and return
  to satisfy a gate. Its 1/4-endings coverage is a PLANNING limit, identical in kind to the
  parser/RPG puzzle packs the assessor ALREADY (correctly, lines 144-153) refuses to drive
  content_fix from. The result: a phantom impact-4 / score-2.0 content_fix ("3 unreached
  ending(s)") ranked #1 every cycle, asserting defects that do not exist.
improvement:
  layer: engine    # the AFK assessor / loop brain (src/afk/assessor.ts) — NO content/YAML edited
  change: >
    Generalized the dividing line from the MODE LABEL to PLANNING-GATING. Added a pure,
    exported predicate cyoaPackIsGated(pack): true iff any choice carries a precondition
    (a non-empty `conditions` array). botCoverageIsMeaningful is now
    `s.mode === "cyoa" && !isPlanningGatedCyoa(root, s.path)`. So:
      - GATED CYOA (clockwork, watchtower): bot-coverage is NOT a content_fix signal; an unreached
        ending/scene becomes a LOW-priority blind-playtest review (impact 1, score 0.5, "review
        prompt, not a known flaw") — exactly the parser/RPG treatment, the fair judge being the
        mandatory blind LLM playtest + validator warnings.
      - UNGATED / PURE-BRANCHING CYOA (no choice conditions anywhere): UNCHANGED — the bot can
        reach every node, so a coverage gap stays a real high-impact content_fix signal.
    Validator-warning-driven fixes are untouched (those are real, not coverage-derived).
  effect_on_ranking: >
    clockwork_heist: was rank-1 "Improve ... 3 unreached ending(s)" score 2.0  ->  now a
    "Blind-playtest ... quality is unverified" review score 0.5. watchtower_road: was rank-2
    score 1.5  ->  review score 0.5. All six packs are now uniformly honest 0.5 blind-playtest
    reviews — the TRUE state of the repo (every pack blind-verified; standing work is to keep
    rotating playtests, which is what the loop does). The assessor no longer asserts phantom
    unreached-ending defects. (top is still clockwork by deterministic id tiebreak, but now
    correctly framed as a review, so playtestTarget()/ai-loop.ts behavior is unaffected.)
