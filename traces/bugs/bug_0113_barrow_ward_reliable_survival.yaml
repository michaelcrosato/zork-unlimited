bug_id: bug_0113
pack_id: sunken_barrow_v1
seed: 11
type: content_fix          # combat-balance retune (one number: the shade ward +2 -> +3)
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_target: sunken_barrow_v1        # the assessor's rank-1 nomination this cycle
  mandated_report: ai-runs/2026-06-02T09-48-19-753Z/playtest.md
  rotation_rationale: >
    The assessor's rank-1 was sunken_barrow itself (the coverage bot stalls at the wight
    and can't solve the pack, so its quality is "unverified" by the heuristic). Fresh
    general-purpose MCP-only source-blind subagent, seed 11, no source access; ran the
    brief's explicit prepared-vs-under-armed comparison across 3 playthroughs and reached
    all three endings (victory, fallen, woken).
  finding: >
    Clarity 5/5, enjoyment 4/5, ZERO functional bugs. The one substantive, twice-raised
    finding (report §4 AND §5) is the COMBAT MARGIN on the prepared route: even with the
    recommended preparation (the shade's ward, defense 4) the tester won at exactly 3 HP on
    two separate seeded runs and flagged the marquee fight as razor-thin — "an unlucky early
    run of high wight rolls can kill a fully-prepared, 'correct play' player … the fight
    outcome leans on luck more than tactics — there's no heal, no consumable, only attack or
    flee." This is the complementary edge to bug_0102: that cycle made the wight lethal so
    prep would DECIDE the fight (under-armed ~43% win), but at the +2 ward the prepared route
    won only ~70% of seeds, so a third of correct-play runs DIED. Prep decided the fight but
    did not make doing everything right reliably survivable. The tester's verdict: "Tightening
    that margin would take it from a good short pack to an excellent one."
improvement:
  layer: content        # one number (the shade's defense ward) + its journal/comment text — no wight/prose/flag/score/ending/exit change
  content:
    - content/rpg/quests/sunken_barrow.yaml: >
        Raised the reaver-shade's ward inc_var defense by 2 -> by 3 (defense 2 -> 5), and ONLY
        the ward; the wight (hp22/atk5/def2) is untouched, so the under-armed gamble stays
        exactly the bug_0102 ~43% lethal one and the prep gap WIDENS (43% vs 88%). Combat is
        one ATTACK = one round: the wight deals d6+5-playerDef (min 1), so +1 defense shaves a
        point off every blow over the ~4-round fight. Verified live over seeds 1-40 on the
        REAL routes (__probe3.ts, the exact in-game action sequences, with step-faithful ward
        modelling): WARDED 28/40 -> 35/40 (~70% -> ~88%), avg survivor HP 5.4 -> 7.5, the
        <=3-HP nail-biters more than halved (10 -> 6); UNDER-ARMED unchanged at 17/40 (~43%).
        Still no guaranteed win (~12% of warded seeds lose, recoverable via save §8.7), so the
        pack keeps the tension its "careful play isn't free" identity demands. Updated the
        journal line "(+2 defense)" -> "(+3 defense)" and the reaver_shade + barrow_wight
        design comments to read true to the new balance.
  re_recorded_trace:
    - traces/rpg/barrow_victory.json: >
        The canonical victory trace runs the warded route (bug_0102), so the +1 defense
        changes the player's HP trajectory through the fight and thus the final state hash.
        The ACTION SEQUENCE is unchanged (attacks-to-kill depends on player attack vs enemy
        defense, both untouched, so the wight still falls in the same number of rounds). Only
        the two hash fields were re-recorded by replaying the unchanged action list against the
        updated pack: content_hash c187324c... -> 80ab4154...; expected_final_hash e55b00eb...
        -> aa5f8649... — both deliberate, surfaced re-pins accompanying the content change
        (HASH_PIN_FILE drift, the allowed-warning case). Seed 1 still reaches ending_victory
        50/50 (now with a larger HP cushion).
  why_within_the_bar: >
    The RPG validator's COMBAT_UNWINNABLE proof credits the player's BEST REACHABLE stats
    (init + the reachable ward). Raising the ward only INCREASES reachable defense (now def5),
    so the fight is strictly MORE provably winnable than before: bestPlayerDmg = max(1,6+4-2)=8
    (defense-independent), roundsToKill = ceil(22/8)=3, worst wight blow now d6+5-5 = max(1,6) =
    6 < 20 reachable HP. sunken_barrow stays a clean 0-finding pack. A bigger ward can only
    REMOVE the (already-absent) unwinnable risk, never add one. The death endings stay
    reachable (under-armed is still a lethal gamble), so the game's failure states are intact.
  invariants:
    - The ward is +3: ask_wight raises defense 2 -> 5 once and journals "+3 defense".
    - The pack validates green under the full RPG validator (no COMBAT_UNWINNABLE).
    - Reliable AND decisive over seeds 1-40 on the real routes: prepared wins a strong majority
      (>=33/40) AND at least twice as often as under-armed (which stays <=20/40) — correct play
      reliably survives while prep stays the decisive lever bug_0102 made it.
    - The +1 is load-bearing: at seed 6 the warded route (def5) wins ending_victory 50/50, but
      the SAME seeded route with defense forced to 4 (the old +2 ward) is killed -> ending_fallen.
    - The wight is UNCHANGED (hp22/atk5/def2); no prose/flag/score(50)/win/ending/exit/effect
      change beyond the single ward value, so the bug_0016 scoring, bug_0027/0069 lever-
      legibility, bug_0056 claim-relic-agency, bug_0075 reaver-shade, bug_0083 woken-fork,
      bug_0095 sarcophagus-examine, and bug_0102 prep-decides proofs all still hold.
re_pins:
  - traces/rpg/barrow_victory.json: >
      content_hash and expected_final_hash both re-recorded against the +3-ward pack along the
      unchanged warded action sequence (see re_recorded_trace). A surfaced, deliberate change
      accompanying a content edit (HASH_PIN_FILE), not a weakening; the replay tests
      (rpg_barrow_trace, stage4_barrow) re-pin automatically by reading the trace.
  - tests/regression/rpg_barrow_reaver_shade.test.ts: >
      The ward assertions encoded the OLD +2 value: defense 2->4 and journal "+2 defense";
      re-pointed to defense 2->5 and "+3 defense". Every other guard (one-shot retire, lore
      topic, no-score, optionality, full 50/50 canonical win) is unchanged.
  - tests/regression/rpg_barrow_wight_prep_matters.test.ts: >
      Case (4)'s post-ward assertion expect(defense).toBe(4) re-pointed to toBe(5); the bug_0102
      "prep decides it" property (seed-2 under-armed dies, warded wins 50/50) is unchanged
      (warded seed 2 wins at +3 too, with more HP).
locked_by:
  - tests/regression/rpg_barrow_ward_reliable_survival.test.ts
