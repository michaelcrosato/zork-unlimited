id: bug_0326
pack: clockwork_heist_v1
scene: crawlspace
choice: study_strongbox
class: signposting_gap
severity: minor
summary: >
  The crawlspace no-pick bounce-back narrated "Better search the manor for it before you
  crawl back here" — a generic search prompt that sent first-time crawlspace players
  straight to the kitchen and back, skipping the steward's study entirely. A player who
  followed that natural route scored 20/45 at ending_truth (confession haul only), even
  though the same ending is achievable at 30/45 by also reading the ledger (+10 intel).
  The 20/45 score for a complete, satisfying narrative ending felt like a penalty rather
  than earned texture.

  The design intends the crawlspace truth route to max at 30 (ledger + confession, no
  vault feat) — "earned texture: slipping past the vault costs you its points." But the
  bounce-back gave no hint that the study was worth visiting on this route, so the 30
  was unreachable in practice for players who beeline kitchen→crawlspace.

  Surfaced by a blind MCP playtest (seed 7, ai-runs/2026-06-08T15-44-14-673Z/playtest.md),
  Bug 1.

fix: >
  Changed the study_strongbox narrate text to name both destinations:
  "Better search the manor for it: the kitchens are off the foyer below, and the
  steward's study waits up the stair." A crawlspace-first player now sees an explicit
  prompt to visit the study before returning, making the intended 30/45 naturally
  reachable. Pure prose — no flag, score, choice, routing, or ending change.

regression: tests/regression/clockwork_crawlspace_study_signpost.test.ts
