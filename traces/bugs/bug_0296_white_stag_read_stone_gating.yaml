id: bug_0296
title: "white_stag tarn shows read_stone choice after knows_truth is set"
pack: white_stag_v1
severity: minor
class: stale-choice-clutter
discovered_by: blind_playtest
playtest_report: ai-runs/2026-06-08T07-12-31-913Z/playtest.md

description: >
  The tarn scene offered `read_stone` as an available action even after
  `knows_truth` was set. `decipher` (the only meaningful action in shrine)
  was already gated on `not_flag: knows_truth`, making the ungated `read_stone`
  inconsistent. A player who returned to the tarn after reading the stone would
  see `read_stone` in the action list; clicking it routed to shrine which handled
  re-reading gracefully ("kneeling here a second time does not unsay it"), but
  surfacing the action was mild clutter and created an inconsistency between
  the gating of `read_stone` and `decipher`.

fix: >
  Added `conditions: [{ not_flag: knows_truth }]` to the `read_stone` choice
  in tarn, mirroring the gate already on `decipher`. The shrine's `knows_truth`
  variant remains live — reachable via the decipher → next: shrine re-render
  path (decipher sets knows_truth then returns to shrine, which renders the
  variant). No routing, scoring, or ending change.

regression_test: tests/regression/white_stag_read_stone_gating.test.ts
