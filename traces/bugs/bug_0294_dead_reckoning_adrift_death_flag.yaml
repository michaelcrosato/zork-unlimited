id: bug_0294
title: dead_reckoning ending_adrift missing death: true
class: content_fix
severity: data_integrity
pack: content/cyoa/pack/dead_reckoning.yaml
discovered_by: blind_playtest
playtest_report: ai-runs/2026-06-08T06-52-40-980Z/playtest.md
seed: 7
cycle: 2026-06-08T06-52-40-980Z

symptom: >
  ending_adrift (the "seize" path — keep the cask for yourself, let the crew
  fend) reported ending_death: false in buildObservation, despite both prose
  variants unambiguously describing universal death at sea:
    base: "the Marigold is only a thing the slack current pushes about, with
           whatever is left aboard her past caring which way."
    knows_course: "The boat drifts where the dead current leaves it."
  Any client gating restart prompts, leaderboard treatment, or analytics on
  the ending_death flag would misclassify this as a survival/neutral outcome.

root_cause: >
  dead_reckoning.yaml's ending_adrift block lacked `death: true`.
  buildObservation resolves ending_death via
    index.pack.endings.find(e => e.id === state.endingId)?.death ?? false
  so the absence of the field defaults to false.

fix: >
  Added `death: true` immediately after `id: ending_adrift` in the endings
  list of content/cyoa/pack/dead_reckoning.yaml.
  No prose, flag, score, choice, route, or other ending change.

test: tests/regression/dead_reckoning_adrift_death_flag.test.ts

