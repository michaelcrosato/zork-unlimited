bug_id: bug_0082
pack_id: clockwork_heist_v1
seed: 13
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T21-46-13-894Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester (seed 13) reached ALL
    endings across five runs — Truth x2 epilogue variants, Rich, Caught, Caught on
    the Hour — rated it clarity 5/5, enjoyment 4/5, mechanically flawless (zero
    rejected actions, no loops, no soft-locks, no functional bugs; verdict "a real
    player finishes satisfied"). Its strongest actionable finding (§5): "the deadline
    has partial teeth." The player pushed ticks to 6 pacing in circles and saw the
    warning prose "plateau after the chime at tick 4 and stop escalating," while the
    repeated "be gone before it strikes" urgency keeps promising a consequence — so
    the prose "overpromises relative to what the clock mechanically enforces ... a
    player can't tell how close the real deadline is." (Confirmed live, MCP seed 13:
    the gallery showed byte-identical ticks>=4 text at ticks 5, 7, and 9, then
    ending_overstayed fired abruptly at tick 10 with nothing between.)
failure:
  type: deadline_warning_prose_plateau
  where:
    - content:content/cyoa/pack/clockwork_heist.yaml
  description: >
    bug_0079 gave the namesake clock real teeth (meta.deadline: linger to ticks>=10
    and ending_overstayed fires), but every room's reactive prose topped out at the
    ticks>=4 "the hour has come round" tier. A lingering player therefore saw the SAME
    chime line from tick 4 through tick 9 and then died at tick 10 with no mounting
    dread — the deadline was, in experience, an unsignposted gotcha despite all the
    urgency text, and the tick-10 ending's own escalation ("the watchman's tread no
    longer alone but answered now by others", "lamps flaring along the landings") had
    nothing leading up to it.
fix:
  layer: content
  summary: >
    Content-only: add a ticks>=7 escalation tier (the deadline's missing middle) to
    the two scenes that cover every tick-accruing loop a lingering player can take —
    the FOYER (the namesake-clock hub and the only entrance to the kitchen tick-source)
    and the GALLERY/landing (the patrolled danger room and the only entrance to the
    study tick-source). Both tiers escalate from the lone watchman of the hour toward
    the ticks>=10 ending's whole-house waking: the watchman's tread "no longer walks
    alone", lamps moving on the landings, "only a few beats left" before the manor
    stands fully awake. New variants sit above the ticks>=4 tier (first-match-wins,
    higher threshold first) and reuse the established pairings: the foyer's
    found_passage pairing, and the gallery's read_ledger split kept EXACTLY as at
    ticks>=4 (the reader keeps the ledger callback and the solved time-it-in-his-wake
    framing with no "right under his beam"; the non-reader keeps the "right under his
    beam" gamble and is never told of a ledger he didn't read). No choice/flag/tick/
    gate/ending change; the foyer never advances ticks and both scenes' choices are
    untouched, so the bug_0019/0040/0066/0067 tuning is preserved.
  why_these_two_scenes: >
    ticks advance only upstairs (kitchen, gallery, study). The kitchen's only entrance
    is the foyer (foyer->kitchens), and the study's only entrance is the gallery, so a
    player climbing toward tick 10 necessarily re-reads either the foyer or the gallery
    on every loop. Escalating both guarantees the warning is seen, without touching the
    quiet stealth route (a pure-foyer/crawlspace beeliner stays at low ticks and never
    sees — or is threatened by — the clock, which is correct).
  reachable_endings_changed: false  # text-only; rich / truth(x2) / caught / patrol / overstayed all still fire
  content_hash_changed: true        # clockwork is unpinned (only watchtower_road is pinned). c00e8ea3d8dfcb1f6a1431e9205196b3fd12f02a2f52aaf9e6bfd5c8ef354a33 -> 761f303046fd109fa9267197c46a71a7846ff23dd9c723376c804b2876d9ad3d
  regression_test: tests/regression/clockwork_deadline_escalation.test.ts
verified_live: >
    Through the engine over the compiled pack (MCP, seed 13): at ticks 4-6 the foyer
    and gallery still render their bug_0079-era chime/patrol text byte-for-byte
    (identical state hashes); at ticks 7-9 both now render the new escalation tier (the
    house rousing in earnest, watchman no longer alone, a few beats left); the gallery
    non-reader keeps "right under his beam" and never names the ledger and keeps its
    cross_to_vault_blind + safe exits; a ticks-7 dawdle is still playable (the
    escalation does NOT end the game early); and circling on to ticks 10 still ends at
    ending_overstayed ("The Hour Turns"). The existing bug_0020 FOYER_T7 invariant
    holds — the new foyer tier still carries a "watchman's tread" on-the-hour cue.
playtest_coverage:
  note: >
    The deterministic coverage bot cannot plan the multi-step routes or deliberately
    dawdle to the deadline, so the blind LLM playtest remains the load-bearing quality
    signal. Seed 13 rated the pack shippable; this closes its strongest actionable
    finding by turning the silent tick-10 deadline into a signposted, mounting-dread
    climax — making the urgency prose honest about a consequence the engine really
    enforces (bug_0079) instead of letting it plateau into a bluff.
