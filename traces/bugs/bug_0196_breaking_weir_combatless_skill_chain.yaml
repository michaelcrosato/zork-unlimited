scorecard_regen: >
  Adding the 14th pack makes the bug_0194 freshness pin (benchmark_scorecard_fresh.test.ts) RED until
  the committed scorecard is rebuilt — exactly its intended behaviour ("a pack added without
  regenerating the card fails here"). Regenerated via `npm run benchmark -- --runs 50 --out
  traces/benchmark/scorecard`. The deterministic coverage bot cannot plan the multi-step skill-check
  solution (as for every parser/RPG puzzle pack), so breaking_weir's curated row reads low (completion
  0%, ending 0%, partial scene coverage) and nudges the curated headline down slightly while staying
  well above the no-regression floor and preserving the curated>held-out gap (bug_0178).
