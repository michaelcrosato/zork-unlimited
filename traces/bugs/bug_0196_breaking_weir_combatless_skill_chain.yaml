design:
  thesis: >
    A week of storm-rain has the river in spate and the great weir above the valley is choking
    — head-rack jammed with drift, relief-race seized shut — and if the water tops the weir
    before dawn the sleeping valley drowns. The old weir-keeper, Pell, is down with a broken leg
    and cannot work it himself, but he knows the weir to the inch. Read his flood-book (+5),
    heed his counsel on the one place that kills — the storm-walk across the spillway (+5 nerve)
    — take his weir-iron and life-line, and work the weir in order: free the choked head-rack
    (craft), cross the awash storm-walk (nerve), heave open the seized relief-race winch (might),
    and reach the valley-rim with the weir held (the locomotion win, +15).
  mechanic_axis: >
    A NON-COMBAT skill-check CHAIN — the untried RPG axis. `enemies: []`, no ATTACK, no fight; the
    whole spine is three seeded d20 + skill checks (craft / nerve / might), each gating a flag that
    opens the next stretch of weir (the sunken_barrow tool-on-target skill_check shape, generalised
    to a full chain). RPG mode is detected by the PRESENCE of the `enemies` key (src/mcp/types.ts),
    so an empty enemy set runs as RPG and the combat-winnability / gauntlet bounds simply have
    nothing to prove — only the skill-check passability bound (each DC <= 20 + best reachable skill)
    and the parser-layer soundness apply. This exercises the RPG validator and the exhaustive
    ending/liveness/score solvers on a pack with zero combat — coverage no curated pack had.
  prep_vs_gamble: >
    The prep-vs-gamble identity (bug_0114), transposed from combat to a skill check. The storm-walk
    is the ONE lethal obstacle (DC-9 nerve crossing; on_failure ends the game at ending_swept). Base
    nerve 3: the worst roll fails (1 + 3 = 4 < 9), so an under-prepared crossing is a genuine ~25%
    gamble and the death is reachable for the rash. Pell's +5 counsel lifts nerve to 8: the WORST
    roll still passes (1 + 8 = 9 >= 9), so heeding him makes the killing walk safe — the +5 is
    load-bearing, not decorative, exactly as the prose promises (and honest per bug_0132: he says
    heeding him makes it safe, not that the walk is harmless). The two MECHANICAL checks (rack/craft,
    winch/might) are deliberately NON-lethal and RETRYABLE (failure reads as repeatable progress per
    bug_0027 — no missing-tool / strength-wall over-promise), so persistence always clears them and a
    player can never be hard-locked out of the valley; only the walk can kill.
  honesty: >
    Both the flood-book and Pell name the storm-walk as the one killer and point at Pell's counsel as
    what makes it safe, so a crossing made cold is an INFORMED gamble, never a gotcha (bug_0027/0029
    discipline). The skill-check narration is transparent ("nerve check: d20 X + N = total vs 9").
  score_economy: >
    5 (flood-book) + 10 (rack) + 10 (walk) + 10 (winch) + 15 (valley-rim capstone) = 50, the curated
    RPG milestone economy (same 5+10+10+10+15 shape as wolf_winter). Each award is one-shot (gated
    none_of its success flag; the read retires on read_marks; the capstone rides the game-ending
    navigation win). NO score on any skill check's on_failure (the rpg_score_economy_sound
    bracket-completeness rule). The +15 rides reaching the rim, so max 50 coincides with the win and
    SCORE_PEAKS_BEFORE_WIN does not fire on a navigation win (bug_0116).
  endings:
    - id: ending_held
      reach: "(prepared) read flood-book +5 -> hear Pell's walk-counsel (+5 nerve) -> take weir-iron + life-line -> free head-rack +10 -> cross storm-walk +10 -> heave relief-race +10 -> reach valley-rim +15 = 50/50"
      note: "the sole win; visited: valley_held (locomotion win, like wolf_winter's cattle / the Beacon's crown); SCORE_PEAKS does not fire on a navigation win"
    - id: ending_swept
      reach: "(rash) cross the storm-walk under-prepared (base nerve 3) and fail the d20+nerve-vs-9 roll -> the race takes you"
      note: "death: true; reachable by worst-roll play, recoverable from an earlier save (§8.7); the prep-vs-gamble stake"

