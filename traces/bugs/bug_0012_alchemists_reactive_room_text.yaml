bug_id: bug_0012
pack_id: alchemists_tower_v1
seed: 29
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T06-40-31-269Z/playtest.md
  finding: >
    Playtest target rotated onto the parser pack The Alchemist's Tower (already
    blind-verified once in bug_0009). A fresh, MCP-only blind playtester solved it
    to ending_cured and probed the foreshadowed poison death (ending_poisoned),
    rating it clarity 4/5, enjoyment 4/5 — confirming the pack is solvable, fair,
    and mechanically clean. Its top concrete finding (report §5), the same class
    fixed for sealed_crypt in bug_0010 and sunken_barrow in bug_0011, was that FOUR
    rooms keep narrating the world as it was BEFORE the player changed it. The
    visible_objects list and available_actions update correctly; only the room body
    prose lies:
      (1) Overgrown Garden: "a pale medicinal herb still grows by the wall, and
          something brass glints in the soil" AFTER the herb and the brass key are
          taken.
      (2) Cluttered Study: "A locked iron strongbox sits on the desk" AFTER the box
          is unlocked and emptied.
      (3) Great Hall: "A bolted cellar hatch is set in the floor" AFTER the iron key
          throws the bolt and the down exit opens.
      (4) Cold Cellar: "A vial of clear spring water rests in a rack" AFTER the vial
          is taken.
    (The playtester also worried the +5/+10/+20 score awards didn't sum to the 35
    shown; on re-check they accumulate correctly to 35 = max_score — a misread, not
    a defect.)
failure:
  type: stale_room_text
  where: [content:content/parser/pack/alchemists_tower.yaml]
  description: >
    Four rooms whose state the player changes (an emptied herb bed and soil; an
    unlocked strongbox; a thrown cellar bolt; an emptied water rack) kept narrating
    the pre-change world — a player-facing contradiction a re-looking player would
    hit. This is NOT an engine gap: the generic reactive-room feature already exists
    (added in bug_0010 — RoomSchema.variants + the pure roomDescription helper,
    routed through both the observation builder and the LOOK action). This pack had
    simply not opted into it. This was the standing deferred next-focus item logged
    in bug_0009 §5(a) and bug_0010/bug_0011 next-focus notes.
fix:
  layer: content
  summary: >
    Pure content fix — apply the existing reactive-room `variants` feature to the
    four stale rooms in content/parser/pack/alchemists_tower.yaml:
      - garden gains three variants over the two takeable things: herb-gone (taken
        OR steeped: any_of [has_item herb, has_flag herb_added]) and brass-gone
        (has_item brass_key — the key is never consumed, so holding it is a durable
        "taken" signal). The three live combinations (herb-gone/brass-present,
        herb-present/brass-gone, both-gone) each get truthful bare-bed prose;
      - great_hall gains a variant `when: [{ has_flag: cellar_unlocked }]` (the
        hatch reads thrown open rather than bolted);
      - study gains a variant `when: [{ has_item: iron_key }]` (holding the iron key
        means the strongbox has been unlocked and emptied, so it reads open/empty);
      - cellar gains a variant `when: [{ any_of: [{ has_item: water_vial },
        { has_flag: antidote_brewed }] }]` (the rack reads empty once the vial is
        taken or poured into the brew).
    No flags, items, exits, gating, or reachable endings change — only the narrated
    room text now reacts to state. Verified live via the MCP/engine tools (seed 29):
    all four rooms flip at the right moment and ending_cured still fires.
  reachable_endings_changed: false
  content_hash_changed: true   # alchemists_tower yaml genuinely changed (added variants)
  content_hash_before: d689ff3d262f18db4fb108b5b93edbbca719e9e591b6cf350f2a63c27fd00489
  content_hash_after: 8302bfdfd0e9ee57426d278730bf9782989120de1396a8b6d313ee71a802cb60
  repin: >
    No re-pin needed. No test pins the alchemists_tower content hash: the Stage-3
    acceptance test (tests/acceptance/stage3_alchemist.test.ts) reads the compiled
    contentHash dynamically for its save/load roundtrip, and the parser/rpg validator
    unit tests only assert it validates green (no hash literal). Only watchtower_road
    carries a pinned hash. The before/after hashes above are recorded for the record.
regression_test: tests/regression/alchemists_reactive_room_text.test.ts
