bug_id: bug_0292
component: content   # reactive-description-blindness in clockwork_heist gallery scene
# Surfaced by blind MCP playtester (seed 7): the `landing` (gallery) scene's ticks>=2
# variant said "you sense this long gallery will be no place to be caught standing when
# it chimes" on a path that never read the steward's ledger. "Caught standing" implies
# the chime triggers the guard's patrol — knowledge earned only by reading the ledger
# in the steward's study. A player who goes foyer→stair→vault (skipping the study)
# reaches the gallery at ticks=2 before reading anything, yet the prose attributed
# guard-schedule awareness they hadn't earned.
#
# Same reactive-description-blindness class as bug_0282/0283/0284/0286/0287/0288:
# scene prose presupposes flag-gated knowledge without the corresponding flag check.
# All prior instances were fixed by adding a companion variant gated on the relevant
# flag. This is the same pattern applied to the ticks>=2 gallery tier.
#
# Note: the ticks>=4 and ticks>=7 gallery variants were ALREADY split on `read_ledger`
# (bug_0066/0067 and bug_0082) because they explicitly named "the steward's ledger".
# The ticks>=2 variant used "you sense" (softer) but "caught standing" still implies
# guard knowledge. The fix extends the existing split pattern down to ticks>=2.
#
# Fix (content, pure): the ticks>=2 variant is split on `has_flag: read_ledger`.
#   - Ledger-reader keeps "no place to be caught standing when it chimes" (earned inference).
#   - No-ledger player gets neutral "sleeping house keeps its peace only until the chime"
#     (foyer-register urgency — same clock tension, no imputed knowledge).
# No choice/flag/tick/route/gating/ending/score change.
#
# Two pre-existing tests updated (non-weakening: anchors shifted to match new text):
#   - clockwork_gallery_entry_path_invariant.test.ts: CHIME_WARNING → CLOCK_WARNING
#     (/grinds toward the hour/ present in both split variants; invariant still locked)
#   - clockwork_deadline_honest_text.test.ts: updated gallery assertions to new no-ledger text
# New regression test: tests/regression/clockwork_gallery_ticks2_ledger_reactive.test.ts (4 cases)
