regression: >
  The contracts ARE the regression: they fail loudly if either cold_forge ending stops reframing
  (variant dropped or its knows_founder guard broken), if the base fallback stops covering the
  uninformed route, if either route reroutes off its endingId, if the new validator guards stop
  biting, or if a future ending variant is dead (liveness proofs). On a deliberate epilogue
  redesign, re-derive the contracts from the new prose — never relax the assertions to pass.
