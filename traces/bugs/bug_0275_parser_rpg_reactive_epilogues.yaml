id: bug_0275
title: "Parser/RPG endings could not reframe by the route just played — reactive epilogues were CYOA-only; ported to parser/RPG and used to reward The Cold Forge's founder arc"
kind: engine
mode: parser+rpg/reactive-prose
severity: enhancement
layer: schema + model + observation + validator + content/reactive-epilogue
artifact:
  source:
    - src/parser/schema.ts
    - src/parser/model.ts
    - src/parser/observation.ts
    - src/validate/parser_validator.ts
    - content/rpg/quests/cold_forge.yaml
  test:
    - tests/regression/cold_forge_reactive_epilogue.test.ts
    - tests/regression/parser_variant_liveness.test.ts
    - tests/regression/rpg_variant_liveness.test.ts
    - tests/regression/support/relabel_parser.ts

summary: >
  CYOA endings have carried reactive `variants` (EndingSchema.variants, first-match-wins) since
  bug_0145 — an ending two routes converge on can acknowledge HOW the player got there. Parser
  and RPG endings could NOT: ParserEndingSchema (shared by both modes) had only id/title/text/
  death, so every parser/RPG terminal printed one fixed epilogue regardless of the route just
  played. This asymmetry is why every recent reactive-ending fix (bug_0271/0272/0273) was
  CYOA-only. A fresh source-blind MCP playtester of The Cold Forge (RPG; seeds 17 & 3,
  ai-runs/2026-06-05T06-39-54-147Z/playtest.md, clarity 5/5 enjoyment 4/5, ZERO bugs) named the
  exact gap from inside the game: "a thorough player gets no payoff for exploring the dialogue
  and the west cell" — hearing the lantern-spirit's tale of the forge's last master, finding his
  cell, reading his epitaph, then carrying out his Ember-Heart all ended on the SAME epilogue as
  a rusher who skipped every word of it. The pack's whole optional second branch — and its
  emotional point, that you are completing the dead master's last work (fulfilling the plea cut
  into his stone, "Carry the Heart out, and the forge is not wholly dead") — was invisible at the
  one moment it should land.

root_cause: >
  A capability gap, not a runtime defect: the reactive-prose device was complete on rooms
  (RoomVariantSchema), objects (ObjectVariantSchema), and NPC dialogue (DialogueNodeVariantSchema)
  for parser/RPG, and on scenes AND endings for CYOA — but endings for parser/RPG were the one
  variant-bearing surface never built. The static solver proves the pack winnable and the endings
  reachable, so it never flags a missing reactive beat; only a reasoning player who explored the
  optional arc and then read the epilogue could feel the flatness. Surfaced now because the
  deterministic assessor is SATURATED (all 17 packs blind-clean; the ranked list is 0.5-floor
  blind stubs) and the no-new-packs directive (2026-06-04) points the lever at ENGINE depth on
  existing content — so the cycle closed the capability gap and spent it, rather than churning.

fix: >
  ENGINE (completes the reactive-prose trilogy across all 3 modes):
  (1) schema — ParserEndingVariantSchema { when: Condition[].min(1), text } + `variants` optional
      on ParserEndingSchema, mirroring RoomVariantSchema EXACTLY (.optional() not .default([]) so
      every pack without it compiles byte-identically and keeps its content hash).
  (2) model — endingText(ending, state): first reactive variant whose `when` holds, else base
      `text` (the terminal-state analogue of roomDescription/objectDescription; pure).
  (3) observation — buildParserObservation resolves the epilogue once via endingText and uses it
      for BOTH the player-facing `description` (then appends the Final-score tally as before) and
      the structured `ending.text` block (kept pure of the tally). RPG inherits it free
      (buildRpgObservation wraps buildParserObservation). CLI bins render only `ending_id`, so no
      other render path exists; the UI reads the observation.
  (4) validator — endings now run the same two dead-content guards as room/object variants
      (UNREACHABLE_VARIANT shadowing + UNSATISFIABLE_CONDITION), and ending-variant `when`s join
      the collectFlagReads / collectObjectStateReads walks so an ending-only flag/state read is
      not mis-flagged inert.
  CONTENT (content/rpg/quests/cold_forge.yaml): both endings get a `variants` block gated on a
  `knows_founder` predicate — any_of[ visited: founder_cell, has_flag: heard_founder ] — ABOVE
  the base text. ending_victory reframes to name the last master and the legacy carried out;
  ending_fallen reframes to a death that joins him in the cold he too came to understand. Honors
  the reactive-ending-blindness class: BOTH non-gated terminals (each reachable on an informed
  AND an uninformed path) reframe, so neither reads identically informed vs ignorant. Prose-only:
  no score/flag/quest/exit/gate change — prep stays about survival, not points (the pack's design).

witness: >
  TEETH on the engine + content, out of band (non-vacuity): the new lock test goes 8/8 GREEN
  against the real pack across 5 distinct epilogue routes (win/death x known/unknown founder, plus
  the heard_founder-only leg with the cell never entered) — proving BOTH variant legs live and the
  base fallback covering both uninformed paths, all landing on the same endingId (cosmetic reframe,
  never reroute). The validator negative control plants a shadowed and an unsatisfiable ending
  variant and asserts UNREACHABLE_VARIANT / UNSATISFIABLE_CONDITION fire — so the new validator
  code bites, not just compiles. The two auto-discovered variant-liveness proofs (parser + RPG)
  now credit ending variants at terminal states and DECLARE cold_forge's two ending variants — both
  proven first-match in a reachable terminal by the exhaustive solver (best/worst-roll bracket for
  RPG), so a dead ending variant would fail LOUD there too. The relabel metamorphic oracle
  (bug_0211/0212) relabels ending-variant `when`s, so the id-twin stays isomorphic (census +
  validator finding codes unchanged).

verification: >
  npm run typecheck -> clean. validate(content/rpg/quests/cold_forge.yaml) -> ok, 0 findings (the
  knows_founder variants on reachable-both-ways endings raise no dead-fallback / unreachable-variant
  warning). npx vitest run on cold_forge_reactive_epilogue (8) + parser/rpg/cyoa variant-liveness
  (25) + relabel/metamorphic + cold_forge suite -> all GREEN. npm run health -> GREEN (exit 0); net
  test count ROSE by exactly the new cases. No pack added/removed -> the discovered-pack set is
  unchanged, so the bug_0194 scorecard freshness pin stays green (no regen). Every pack WITHOUT
  ending variants compiles byte-identically (.optional() field) -> all existing content-hash pins
  and trace hashes stay green, no re-pin.

scope_honesty: >
  A genuine ENGINE-DEPTH improvement (a new reactive surface for two modes) plus the content edit
  that spends it — NOT a discovered live defect and NOT a soundness fix. The blind pass found zero
  bugs; this closes a capability + symmetry gap it named from inside the game. Backward-compatible
  by construction (optional schema field, additive validator/liveness/relabel coverage). No new
  pack (honors the 2026-06-04 no-new-packs directive). No generator/scorecard/corpus/manifest byte
  changed; no hash re-pin.

