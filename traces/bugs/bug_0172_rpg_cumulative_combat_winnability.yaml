id: bug_0172
title: "Make validateRpg's opt-in combat_guaranteed bound CUMULATIVE-HP-aware across a gauntlet — the bug_0171 named validator-deepening check"
kind: engine
mode: meta
severity: enhancement
layer: validator
artifact:
  source: src/validate/rpg_validator.ts
  test: tests/regression/rpg_combat_guaranteed_optin.test.ts

summary: >
  validateRpg proved combat winnability PER-FIGHT, each against the player's FULL reachable HP: a lower
  COMBAT_UNWINNABLE bound (best-case rolls) and, when a pack opts in with meta.combat_guaranteed, an upper
  COMBAT_NOT_GUARANTEED bound (worst-case rolls, maxDamageTaken = maxEnemyDmg * (worstRoundsToKill - 1)).
  Neither threaded HP CUMULATIVELY across sequential fights, so two fights that each clear the upper
  bound alone could still JOINTLY fell a best-prepared player on worst cumulative rolls — a live
  soundness blind spot in the opt-in fairness PROMISE. bug_0171 (the just-shipped two-fight RPG gauntlet)
  relies on this hole staying open: its docstring says two "guaranteed" fights "could still drain a
  best-prepared player on worst cumulative rolls," so it deliberately leaves combat_guaranteed UNSET.
  bug_0171's own "next suggested focus" named this exact check as the genuinely-next-harder validator
  deepening: "make validateRpg's combat bound CUMULATIVE across multiple fights." This adds a new
  COMBAT_GAUNTLET_NOT_GUARANTEED error that sums every enemy's existing worst-case maxDamageTaken and
  fires, AFTER the per-enemy loop, when the running total >= playerHp — turning "every guaranteed-fair
  RPG must prove its fights JOINTLY survivable, not just individually" into a declared, audited, SOUND
  property. Purely additive: the per-fight lower (COMBAT_UNWINNABLE) and upper (COMBAT_NOT_GUARANTEED)
  findings are byte-for-byte unchanged.

root_cause: >
  The opt-in upper bound (src/validate/rpg_validator.ts, the per-enemy combat_guaranteed block) checked
  each enemy's worst-case maxDamageTaken against the player's full reachable HP in isolation. A safety
  PROMISE ("these fights are fair, not a gamble") must hold across the WHOLE sequence, but the loop never
  carried HP from one fight to the next, so a gauntlet whose individual fights each clear the bound could
  still kill a best-prepared player over the combined sequence and pass validation.

fix: >
  In validateRpg, declare `let cumulativeWorstDamage = 0;` before the `for (const enemy of pack.enemies)`
  loop. Inside the existing `if (pack.meta.combat_guaranteed)` block, after maxDamageTaken is computed,
  add `cumulativeWorstDamage += maxDamageTaken;` (the per-fight COMBAT_NOT_GUARANTEED finding is left
  untouched). After the per-enemy loop closes, add:
  `if (pack.meta.combat_guaranteed && cumulativeWorstDamage >= playerHp)` →
  `findings.push(err("COMBAT_GAUNTLET_NOT_GUARANTEED", <message naming cumulativeWorstDamage vs playerHp
  and stating the promise is broken across the gauntlet even though each fight passes alone>,
  ["meta:combat_guaranteed"]));`.
  CRITICAL direction: the cumulative term is tied to the UPPER / guarantee bound ONLY. It is an
  order-independent OVER-approximation (sums every enemy's worst case, ignores fight order and
  optional/mutually-exclusive enemies) — correct-conservative for a SAFETY promise because it can only
  REFUSE an unsafe guarantee, never falsely grant one. A code comment states it must NOT be moved or
  "tightened" into the lower COMBAT_UNWINNABLE bound: that bound is a route-EXISTENCE proof (some roll
  sequence wins), and summing it would forbid a legitimate gamble gauntlet a lucky player CAN clear —
  i.e. it would be UNSOUND. combat.ts, the generator, generator_version, the corpus, and the scorecard
  are untouched. No MIN_* floor, GEN_EVAL_CHECK_COUNT, PROTECTED_FILES/HASH_PIN_FILES entry, or matcher
  is lowered or relaxed — this is a pure ADD of a stronger error.

witness: >
  Against the live max(1, d6 + atk - def) math (player strikes first; enemy retaliates only on rounds it
  survives, worstRoundsToKill - 1): player hp20/atk6/def4, two sequential gated enemies each
  hp13/atk5/def2. Per fight, worst case: player dmg max(1,1+6-2)=5 → rounds ceil(13/5)=3; max enemy dmg
  max(1,6+5-4)=7 → maxDamageTaken = 7*(3-1) = 14 < 20 (each fight passes the per-fight bound). Best case:
  player dmg max(1,6+6-2)=10 → rounds ceil(13/10)=2; min enemy dmg max(1,1+5-4)=2 → minDamageTaken = 2 <
  20 (not COMBAT_UNWINNABLE). Cumulative: 14 + 14 = 28 >= 20 → the joint guarantee is false →
  COMBAT_GAUNTLET_NOT_GUARANTEED fires.

regression: >
  tests/regression/rpg_combat_guaranteed_optin.test.ts gains a new "bug_0172 — cumulative-HP-aware
  gauntlet guarantee" describe block (all bug_0114 tests unchanged and green); every expected number is
  recomputed against the live max(1, d6 ± …) math. It pins: (1) the WITNESS two-enemy guaranteed pack —
  per-fight 14<20 each clean, but cumulative 28>=20 trips COMBAT_GAUNTLET_NOT_GUARANTEED; (1b) the same
  stats WITHOUT the opt-in flag trip nothing (guarantee-direction-only); (2) a genuinely fair two-fight
  guaranteed gauntlet (player hp50/atk6/def12, two enemies hp12/atk5/def2 → each maxDamageTaken 2,
  cumulative 4<50) trips NEITHER code; (3) single-fight MONOTONICITY — for a single-enemy pack the
  cumulative sum equals the single per-fight term, so the new code fires IFF COMBAT_NOT_GUARANTEED fires
  (brute hp18/atk7/def2: player hp20/atk6/def4 → 27>=20 both fire; player hp50/atk6/def12 → 3<50 neither),
  which is why curated single-enemy cold_forge/sunken_barrow are unaffected; (4) the `>=` boundary — two
  enemies each contributing 14, cumulative 28: HP 28 (28>=28) fires, HP 29 (28<29) clean, with per-fight
  14 below both HPs to isolate the new check.

curated_impact: >
  The two curated RPG packs (cold_forge, sunken_barrow) are SINGLE-enemy, so cumulativeWorstDamage equals
  the existing single per-fight term and their verdicts are provably unchanged — no curated content edit
  and no tests/unit/rpg_validator.test.ts pinned-hash re-pin. The committed held-out corpus generator
  does NOT set combat_guaranteed, so no minted pack's verdict changes: no generator_version bump and no
  corpus re-seal (held_out_corpus_sealed.test.ts stays green).

verification: >
  npx vitest run tests/regression/rpg_combat_guaranteed_optin.test.ts tests/unit/rpg_validator.test.ts
  green; npm run health EXIT 0. src/validate/rpg_validator.ts is a PROTECTED file, so verify:integrity
  surfaces an EXPECTED, non-blocking VERIFIER_TOUCHED for it — this is a STRENGTHENING (a pure additive
  stronger error), NOT a GUARD_WEAKENED; no floor/matcher is lowered. Net regression test-case count
  rose (new cases added, none deleted/disabled), so the guard's count-regression checks stay satisfied.
