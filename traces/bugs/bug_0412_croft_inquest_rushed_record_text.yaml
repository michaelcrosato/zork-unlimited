id: bug_0412
pack: croft_inquest_v1
title: "Rushed inquest claimed a completed investigation"
severity: medium
scene: inquest_table
reported_by: blind_playtest_20260621T193837Z_croft_inquest_seed7

symptom: >
  A blind playtester convened the inquest immediately and saw base inquest prose
  saying the coroner had examined the body, seen the scene, read the evidence,
  and heard the witnesses. In that route none of those investigative steps had
  happened, so the scene asserted an unearned record before offering only the
  natural-causes verdict and the return-for-more-time escape.

root_cause: >
  The inquest table's base text was written for an investigated path and rendered
  unconditionally whenever no more-specific reactive variant matched. The rushed
  state has no evidence flags, so it fell through to prose that described work
  the player had not done.

fix: >
  Rewrite the base inquest text as neutral record framing: the finding must rest
  on the record actually made, and a thin record can be deferred for more time.
  Existing evidence-aware variants still handle the widow contradiction states.
  Verdict gates, score awards, routes, and endings are unchanged.

tests: tests/regression/croft_inquest_blind_polish.test.ts

verification:
  - npm test -- --run tests/regression/croft_inquest_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/croft_inquest.yaml

trace_repin: >
  None. This is a prose-only reactive-state honesty fix with regression coverage;
  no committed replay trace hash is repinned.
