id: bug_0210
title: "Lamplighter blind-pass: the climax pour was invisible — staged it as the genuine two-beat the prose promises (pour the font, then strike the light)"
kind: content_fix
mode: parser
pack: content/parser/pack/lamplighters_round.yaml
# Informational. No pinned hash is touched: the change is local to one object (harbour_lamp) in
# lamplighters_round.yaml and its pack-specific regression test. The auto-discovered generic
# parser bar (all-endings reachability, no soft-lock, score-economy max==35, action-id
# uniqueness, variant liveness) re-derives clean over the edited pack; max_score stays 35.

summary: >
  The mandated blind pass this cycle (The Lamplighter's Round, parser, seed 7 — the assessor's
  recency-blind rank-1) returned clarity 5/5, enjoyment 4/5, mechanics flawless: a WON 35/35 run
  plus the DEATH (ending_caught) and GREED (ending_thief) forks, all three reached cleanly with
  zero rejected actions, zero loops, zero parse failures. Its ONE actionable finding was a
  prose/affordance mismatch at the climax: both the night-notice and the lamp's own examine order
  the player to "POUR THE FONT AND STRIKE THE LIGHT" — two beats — but the only lamp verb the
  parser offered was `light great harbour-lamp with tinderbox`, which silently poured the carried
  flask for you. A first-time player carrying the oil who tried to pour it first had no surfaced
  way to do so, and the offered single verb contradicted the twice-stated two-step procedure.

root_cause: >
  The climax was authored as ONE folded interaction: `USE tinderbox ON harbour_lamp`, gated on
  has_item whale_oil, whose effects both consumed the oil (remove_item) and lit the lamp (+20).
  The pour was real in the narration ("You tip the whole flask into the deep brass font…") but had
  no verb of its own, so the legal-action set never contained a pour affordance. The instruction
  was two-beat; the mechanics were one-beat.

fix: >
  Split the climax into the two-beat the prose has promised all along, on the harbour_lamp object:
    1. NEW `USE whale_oil ON harbour_lamp` (command_verb `pour`, template "pour {item} into
       {target}") — HARD-requires the carried oil (has_item whale_oil, auto-added by the USE
       grammar), CONSUMES it (remove_item), sets a new flag font_filled, awards NO score, and is
       one-shot (gated not_flag font_filled; the spent oil cannot re-pour).
    2. The existing `USE tinderbox ON harbour_lamp` (command_verb `light`) now gates on
       has_flag font_filled instead of has_item whale_oil — a DRY font is un-lightable — keeps the
       +20 and the unlock_exit to the_strand, and no longer touches the oil (the pour already
       spent it). Still one-shot (not_flag lamp_lit).
  A new font_filled lamp variant ("its deep brass font brimming with whale-oil now… it wants only
  a flame") gives the intermediate state its own legible look. The oil remains the hard
  precondition for the whole climax (no oil → no pour → a dry font → strand barred); the +20 still
  rides a single one-time gated step; max_score stays 35; no score rides the pour, so the chain
  still cannot be farmed.

telegraph_preserved: >
  The notice ("POUR THE FONT AND STRIKE THE LIGHT") and the lamp examine ("pour in lamp-oil and
  strike a flame to the wick") now MATCH the offered verbs exactly — the finding is resolved by
  making the game deliver the stated procedure, not by rewording the prose down to one beat.

regression_test: tests/regression/lamplighters_round_fork.test.ts
# Updated deliberately: the win route now pours (use_whale_oil_on_harbour_lamp) before striking
# (use_tinderbox_on_harbour_lamp); the HARD-requires-oil case now asserts NEITHER pour nor light
# is offered with a dry font; and a NEW case pins the full two-beat — pour fills the font / spends
# the oil / scores 0 / retires and unlocks the light, then light scores the +20 with no oil in
# hand and retires (no farming).

verify:
  - "validate_story content/parser/pack/lamplighters_round.yaml → ok, max_score 35"
  - "npm run health → green (verify:integrity + lint + tests + validate + playtest)"
