id: bug_0433
title: Dyer's Weight hid the raw-cask prerequisite for the vat acid test
pack: content/parser/pack/dyers_weight.yaml
reported_by: blind_playtest_20260622T085751Z_dyers_weight_seed7
severity: high
symptom: >
  A fresh blind player carried the acid vial back to the dye vat, examined the
  vat, and concluded the required vat-test action was missing. The interaction
  was intentionally gated behind the raw chalk-cask test, but the visible hints
  did not explain that prerequisite.
root_cause: >
  The two-stage acid topology required found_chalk_stock before the vat pour, but
  the north-door blocked hint and vat examination text told the player only to
  test the vat directly, not to test the white casks first.
fix: >
  Reworded the north-door hint to describe the full two-stage acid proof and
  added a reactive vat description, shown while carrying the acid vial before
  found_chalk_stock, that tells the player to test the store-room casks first.
  Also corrected the post-vat room prose so the north door is not called clear
  until the player has taken the cakes.
tests:
  - tests/regression/dyers_weight_two_stage_acid_signpost.test.ts
verification:
  - npm test -- --run tests/regression/dyers_weight_two_stage_acid_signpost.test.ts
  - npm run validate -- content/parser/pack/dyers_weight.yaml
