id: bug_0352
pack: printers_night_v1
title: "print shop rooms still placed taken lantern and schedule at their starts"
severity: minor
scene: shop_floor, composing_room
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the dark lantern from the shop floor, LOOK still said the lantern
  sat on the counter near the door. After taking Fen's schedule from the composing
  room, LOOK still said the schedule was pinned to the board above the bench.
  Dropping either item after first pickup could also let the room fall back to its
  starting-position prose.

root_cause: >
  The dark lantern and proof schedule did not leave durable pickup state that room
  prose could read. Inventory alone was not enough because either item can be
  dropped after first pickup.

fix: >
  Taking the dark lantern now sets `dark_lantern_taken`, and taking Fen's schedule
  now sets `proof_schedule_taken`. The shop floor and composing room have
  corresponding variants that keep the counter and schedule board empty after
  first pickup, including after later drops. The mission-done shop-floor variant
  was also adjusted so it no longer claims the counter remains exactly as found.
  Score, exits, enemies, endings, and win conditions are unchanged.

tests: tests/regression/printers_night_reactive_taken_items.test.ts
