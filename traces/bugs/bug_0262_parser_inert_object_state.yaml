bug_id: bug_0262
component: verification   # a missing liveness-direction warning in validateParser, not a content/pack defect
# Surfaced by ultraplan re-aim cycle #12: the static-feasibility (SAFETY) family in the
# parser validator covers flags (IMPOSSIBLE_GATE), items (ITEM_REQUIRED_UNOBTAINABLE),
# quest-stages (IMPOSSIBLE_QUEST_STAGE, bug_0244), and — as of bug_0253 — object-state
# (IMPOSSIBLE_OBJECT_STATE). But the LIVENESS direction was sealed only for flags
# (INERT_FLAG, bug_0106). Object-state was the last condition kind with a feasibility
# witness but NO liveness witness: an AUTHORED open/unlock write that nothing ever reads
# validated GREEN. Object-state is a runtime-readable per-object progress boundary; the
# assume-guarantee composition literature requires each local boundary be sealed on BOTH
# the safety and the liveness edge before it can be a sound exported guarantee predicate at
# a future world-frame region edge — so sealing this liveness edge is a precondition for the
# deferred world-frame manifest, not a detour.
class: missing_liveness_direction_warning
title: >
  validateParser had no liveness dual of IMPOSSIBLE_OBJECT_STATE — an AUTHORED
  open_object / set_object_locked(locked:false) effect whose written is_open / is_unlocked
  state NO condition ever reads was accepted as live, a no-op write (dead bookkeeping).
findings:
  - id: parser_inert_object_state_unwitnessed
    where: src/validate/parser_validator.ts validateParser body (after the INERT_FLAG block)
    severity: low   # latent: no shipped pack authors open_object / set_object_locked, so none trips it
    description: >
      The INERT_FLAG check (bug_0106) flags a flag written by set_flag / flags_init / a
      combat-or-skill mechanic that no condition ever reads. Object-state had no analogue.
      An object opened by an authored open_object effect (conditions.ts: is_open ⇒
      objectState[id].open === true) or unlocked by an authored set_object_locked(locked:
      false) effect (is_unlocked ⇒ objectState[id].locked === false), but whose matching
      state no condition anywhere consults, is dead bookkeeping — the write changes nothing
      the game reads. No shipped pack does this today (grep -rn "open_object\|
      set_object_locked" content/ hits ONLY content/engine_contract.yaml lines 63-64, the
      effect-name registry — ZERO parser or RPG packs author these effects; alchemists_tower
      only READS is_open / is_unlocked via the built-in OPEN/UNLOCK verbs), so the gap was a
      present-but-untested checker surface: a future authored or generated pack with such a
      no-op write would have validated GREEN and shipped dead bookkeeping a blind playtester
      cannot judge from inside the game.
    fix: >
      (1) Add a FRESH read-walker collectObjectStateReads(pack) directly after
      collectFlagReads, returning { open: Set<string>; unlocked: Set<string> }. Mirror
      collectFlagReads EXACTLY — the same walkAll over rooms+variant-when+exit conditions,
      objects+variant-when+interaction conditions, win_conditions, and NPC dialogue
      nodes+variant-when+topic conditions — collecting is_open→open / is_unlocked→unlocked,
      DESCENDING all_of/any_of/none_of (a read inside ANY connective, even a disjunction,
      counts as consumed). Do NOT reuse objectStateReqs (all_of-only, the conservative
      AND-context feasibility helper): it would UNDER-count reads, producing false-positive
      INERT warnings on disjunction-guarded reads. (2) In the validator body, immediately
      after the INERT_FLAG block, iterate allEffects(pack) and build writtenOpen (the id of
      every open_object effect) and writtenUnlocked (the id of every set_object_locked effect
      whose locked === false). (3) For each id in writtenOpen not in reads.open, push
      warn("INERT_OBJECT_STATE", <is_open message>, ["object:"+id]); symmetrically for
      writtenUnlocked not in reads.unlocked with an is_unlocked message. One code, the
      open-vs-unlocked distinction in the message string only. Severity is `warning`.
soundness_argument: >
  The load-bearing soundness boundary is the DUAL of the bug_0253 subtlety. Feasibility
  (IMPOSSIBLE_OBJECT_STATE) OVER-approximates settability — its openableObjects /
  unlockableObjects sets fold in the built-in OPEN/UNLOCK verb settability (openable===true,
  keyed unlock) so it never false-rejects a settable gate. Liveness (INERT_OBJECT_STATE)
  must do the OPPOSITE: key the write-set STRICTLY on AUTHORED effects (open_object /
  set_object_locked(locked:false) from allEffects), NEVER on openableObjects /
  unlockableObjects — folding those in would false-warn on every openable scenery object and
  on alchemists_tower's built-in keyed-UNLOCK objects, turning npm run health RED. This
  exactly mirrors INERT_FLAG, which keys on the authored set_flag / flags_init write, never
  on a hypothetical reachability source. The read-set descends all three connectives (unlike
  the all_of-only objectStateReqs), so a disjunction-guarded read is correctly counted as a
  reader and never false-warned. Severity is `warning`, never `error`: an inert open/unlock
  is a no-op, not a soft-lock, so it must not falsely red a future legitimate pack (the
  INERT_FLAG contract). The check is purely ADDITIVE (a new warning code) so it weakens no
  existing matcher; verify:integrity's count/floor guards remain the bar and stay green. The
  dedicated regression proves the LIVENESS direction (an inert authored write MUST warn) AND
  non-vacuity (adding an is_open reader to the open_object mutant clears the warning — proving
  the check keys on the genuine write/read SLACK, not the effect's mere presence), the same
  SoundnessBench discipline (arXiv:2412.03154) INERT_FLAG and the negative corpora
  (bug_0182/0218/0244/0253) use. The shipped-packs-stay-green invariant (auto-discover +
  iterate every parser + RPG pack, assert zero INERT_OBJECT_STATE) pins that no real pack
  emits the new code, preventing a vacuous always-fire implementation; the authored-writes-
  only boundary keeps it from false-positiving and tempting a weakening of a real pack to
  silence it. This SEALS the object-state local boundary on BOTH edges — feasibility
  (bug_0253) + liveness (bug_0262) — a precondition for a future sound exported guarantee
  predicate at a world-frame region edge.
failure:
  type: latent_soundness_gap
  description: >
    The liveness family's last unsealed condition kind (object-state) had no inert-write
    witness; an authored open/unlock write that no condition reads validated GREEN.
regression_test: tests/regression/parser_inert_object_state.test.ts
