id: bug_0357
title: Ale-Conner's Seal finding table opens before evidence is signposted
severity: content
status: fixed
root_cause: >
  A fresh MCP blind playtest found the verdict table available immediately and
  under-explained in partial-evidence states. The mechanically correct gates on
  order_retest and condemn_batch prevented a false full win, but the player-facing
  flow still invited hasty or confused verdict attempts before the investigation
  had established what each outcome meant.
fix: >
  Gate the finding table until at least one evidence flag exists, add reactive
  finding-table prose for fragmentary, retest-ready, and full-chain states, clarify
  the return action, add brew-house reactive prose once Sabel's tally and well
  evidence are exposed, and update cellar/well-yard prose after their evidence is
  found.
files_changed:
  - content/cyoa/pack/aleconners_seal.yaml
regression_test:
  - tests/regression/aleconners_seal_blind_polish.test.ts
