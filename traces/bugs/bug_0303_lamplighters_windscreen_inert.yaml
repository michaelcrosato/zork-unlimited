id: bug_0303
pack: lamplighters_round_v1
title: Horn windscreen skill-check action persists after a failed attempt
class: orphaned-action-post-attempt
severity: moderate
found_by: blind_playtest (seed 7, 2026-06-08T08-49-42-327Z)

description: |
  The horn windscreen's "steady horn windscreen" skill-check action appeared in every
  action list throughout the entire game once the windscreen was picked up, including
  indoor rooms (watch_box, excise_store) where wind is not present. More critically,
  the action only retired on SUCCESS (via the `steadied_the_flame` flag) — a player
  who tried and failed the d20+steadiness roll continued to see the action in every
  subsequent scene with no way to dismiss it. Items with skill-check annotations
  create a strong expectation of mechanical relevance; an inert persistent action
  wastes player attention and signals broken design.

root_cause: |
  The interaction had `conditions: [{ not_flag: steadied_the_flame }]`. On success,
  `set_flag: steadied_the_flame` retires the condition. On failure, no flag was set,
  so the condition remained satisfied and the action reappeared in every subsequent
  scene. The on_failure narration even invited retry ("you can set your feet and try
  the screen again"), compounding the expectation mismatch.

fix: |
  Added `{ not_flag: attempted_windscreen }` to conditions (alongside the existing
  not_flag: steadied_the_flame). Added `set_flag: attempted_windscreen` as the first
  effect of on_failure. Updated failure narration to remove the "try again" invitation
  since the beat is now one-shot on either outcome. The windscreen remains optional,
  non-quest-critical, and convergent — both flags gate only this single interaction.

regression_test: tests/regression/lamplighters_windscreen_one_shot.test.ts
