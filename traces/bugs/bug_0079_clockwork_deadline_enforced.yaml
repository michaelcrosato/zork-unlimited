bug_id: bug_0079
pack_id: clockwork_heist_v1
seed: 7
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T21-00-24-111Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester (seed 7) reached ALL FOUR
    endings across four runs — Truth x2 epilogue variants, Rich, Caught — rated it
    clarity 5/5, enjoyment 4/5, mechanically flawless (zero rejected actions, no loops,
    no soft-locks, no functional bugs; verdict "a real player finishes satisfied"). Its
    one actionable finding, raised independently in THREE sections (§4, §5, §6): the
    ticking clock is the LOUDEST mechanic in the pack ("be gone before the chime", "no
    place to be caught standing when it chimes") yet `ticks` is never enforced — "looks
    like a timer but isn't ... ran 6+ ticks with no penalty," "a Chekhov's gun that
    never fires." The player's own suggestion: "enforce a tick budget OR soften the
    hurry language." bug_0061 already took the soften/honesty path (point the urgency at
    the house/watchman waking at the hour, not a phantom global timeout); a fresh
    first-time player still reads the prose as a promise the engine never kept.
failure:
  type: namesake_deadline_mechanic_unenforced
  where:
    - engine:src/cyoa/runner.ts
    - engine:src/cyoa/schema.ts
    - engine:src/validate/cyoa_validator.ts
    - content:content/cyoa/pack/clockwork_heist.yaml
  description: >
    The clock built enormous textual urgency across nearly every room but had only ONE
    mechanical bite — the watchman who wakes onto the GALLERY at the hour (ticks>=4),
    catching a no-ledger player who crosses blind (cross_to_vault_blind -> ending_patrol,
    bug_0019/0040). Everywhere else — foyer, kitchen, study, vault door, crawlspace,
    loot room — the "hurry before the chime" prose had no consequence: a player could
    linger indefinitely. The engine had no notion of a time/deadline LOSS that turns on
    an accumulating var rather than on a single choice's `next`; bug_0061 noted exactly
    this ("the engine enforces no such timeout") and chose to reword the text instead of
    adding the mechanic, because a content cycle could not safely add an engine feature.
fix:
  layer: engine_rule
  summary: >
    Adds a general, OPT-IN engine deadline, then applies it to the pack. (1) Schema: a
    new optional `meta.deadline = { when: Condition[], ending: id }` (src/cyoa/schema.ts),
    `.optional()` so packs that don't declare one compile byte-identically (same rule as
    SceneSchema/EndingSchema variants). (2) Runner: the CYOA `Rules` now implements the
    engine's §8.4.5 `checkWin` hook (src/cyoa/runner.ts) — after any action's effects
    (and any on_enter), while the game has NOT already ended, if `deadline.when` holds it
    ends the game at `deadline.ending` via goto+end_game (the goto repoints `current` so
    the observation renders the ending's epilogue, not the scene beneath it). Because the
    engine only calls checkWin when `!next.ended`, a choice that fires its own end_game
    (rich/truth/caught/patrol) never collides with the deadline. (3) Validator: a deadline
    ending is reached without any choice `next`/`goto`, so the reachability/soft-lock
    graph is taught the edge — a scene whose on_enter advances a var the deadline watches
    gets a structural edge to the deadline ending — and the deadline ref is checked
    (REF_UNRESOLVED if missing, new DEADLINE_NOT_TERMINAL if it points at a non-terminal).
    (4) Content: clockwork sets `deadline: { when: [{ var_gte: { name: ticks, value: 10 } }],
    ending: ending_overstayed }` and adds the `ending_overstayed` ("The Hour Turns") loss.
  tuning: >
    Budget tuned GENEROUS so it never punishes honest play, only aimless circling. Verified
    live (MCP, seed 7): the efficient vault route is ~4 ticks; a maximally thorough
    first-timer (explore upstairs, poke the vault before finding the pick, backtrack for
    it, return) WINS at ticks 6; and the existing clockwork_guard_patrol_deadline suite
    deliberately drives legitimate dawdle routes to ticks 7 at the gallery and treats them
    as still-playable. ticks advance only upstairs (kitchen/gallery/study), so this is a
    clock, not a global move counter — the crawlspace/foyer stealth route stays at low
    ticks and is never threatened (it slips past the clock, which is correct). Reaching 10
    requires genuine wandering of the patrolled upstairs, the dawdling the prose has always
    warned against. This honours bug_0061's lesson (the urgency text already points at the
    house/watchman waking) by giving that warning a real, if distant, consequence instead
    of leaving it a bluff — without reversing the careful "honest text" work or punishing
    the thorough exploration the same playtest asked for MORE of.
  reachable_endings_changed: true   # adds ending_overstayed (5th ending: rich / truth(x2) / caught / patrol / overstayed)
  content_hash_changed: true        # clockwork is unpinned (only watchtower_road is pinned). 97c7f1624b080af5fff8212e3d6ca371e49582701dd691204832116417012f91 -> c00e8ea3d8dfcb1f6a1431e9205196b3fd12f02a2f52aaf9e6bfd5c8ef354a33
  regression_test: tests/regression/clockwork_deadline_enforced.test.ts
  unit_tests:
    - tests/unit/cyoa_runner.test.ts   # general engine deadline: fires on `when`, renders epilogue, never pre-empts a self-ending choice
    - tests/unit/cyoa_validator.test.ts # deadline ending reachable; REF_UNRESOLVED / DEADLINE_NOT_TERMINAL bite
verified_live: >
    Through the engine over the compiled pack (seed 7), the way the MCP server builds
    observations: the maximally-thorough vault route still reaches ending_rich at ticks 6;
    a ticks-7 dawdle is still playable at the gallery (deadline does NOT fire early);
    aimless study<->gallery circling to ticks 10 ends at ending_overstayed with the "The
    Hour Turns" epilogue and no available actions; and all four prior endings
    (rich / truth / caught / patrol) still fire. `npm run validate` on the pack: OK,
    0 errors, 0 warnings (ending_overstayed is reachable; deadline ref resolves).
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes (a standing heuristic-planner limit since bug_0008) and likewise will not
    deliberately dawdle to the deadline — the blind LLM playtest remains the load-bearing
    quality signal. Seed 7 rated the pack shippable; this closes its one actionable
    finding by making the namesake mechanic real, delivered as a reusable engine feature
    (any pack can now declare a `meta.deadline`) rather than a one-off content hack.
