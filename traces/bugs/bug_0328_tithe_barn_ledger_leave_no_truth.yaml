id: bug_0328
title: "tithe_barn: leave_book before decipher silently skips knows_truth flag"
pack: content/cyoa/pack/tithe_barn.yaml
detected_by: blind_playtest_2026-06-08T16-18-46-254Z
severity: moderate

description: >
  The ledger scene shows the full damning revelation (clerk's hand, lord's sealed
  order, grain held to rot for price) in its base text. The `decipher` action
  ("Read on, week by week, to the foot of the page") was the sole setter of
  `knows_truth`. A player who read the scene text and then chose `leave_book`
  ("Set the book down and turn back to the barn") exited without the flag.
  Consequence: (1) `open_doors` never appeared at the reckoning (gated on
  knows_truth), silently locking out the pack's best ending; (2) ending_bounty
  and ending_mercy rendered base text rather than the reactive "KNOWING" variants;
  (3) the reckoning scene showed the ignorant variant rather than the truth-framed
  one. The player had visually received the entire revelation but the game treated
  them as uninformed, with no indication.

reproduction:
  - go_in
  - read_book       # reveals full damning text in scene
  - leave_book      # exits without decipher → knows_truth NOT set (pre-fix)
  - face_thief      # reckoning: open_doors absent; base text only

fix:
  type: content
  change: >
    Added effects to `leave_book` in the `ledger` scene:
      - set_flag: knows_truth
      - set_quest_stage: { quest: the_barn, stage: truth_read }
    No add_journal (decipher path retains the journal entry; these effects are
    no-ops on second visit when knows_truth is already set).
  files_changed:
    - content/cyoa/pack/tithe_barn.yaml

regression_test: tests/regression/tithe_barn_ledger_leave_sets_truth.test.ts
