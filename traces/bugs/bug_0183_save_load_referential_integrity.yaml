id: bug_0183
title: "Close the §16 load REFERENTIAL hole — a loaded state's current/endingId must name symbols that exist in the pack (the pack-aware complement to bug_0181's finiteness gate)"
kind: engine
mode: meta
severity: enhancement
layer: persistence/load-integrity
artifact:
  source: src/mcp/tools.ts
  test: tests/regression/save_load_referential_integrity.test.ts

summary: >
  bug_0181 closed the FINITENESS/STRUCTURE half of the §16 "integrity at load" promise: load()
  (src/persist/save_load.ts) now rejects a forged save whose GameState is malformed or non-finite.
  But load() holds only the content HASH, not the pack, so it can only check WHETHER a state is
  well-formed — never WHETHER its symbols actually EXIST. A forged-but-finite save (valid structure,
  correct contentHash + mode) could still set `state.current` to a phantom room/scene or
  `state.endingId` to a fabricated ending: both are valid STRINGS, so bug_0181's GameStateSchema
  waves them through, and tools.ts `load_game` then fed `bundle.state` straight into
  `startSession(...)` -> engine with NO referential check. This cycle adds `assertLoadedStateRefs`
  (src/mcp/tools.ts) at `startSession` — the one chokepoint that has BOTH the loaded state and the
  pack index — guarded on the PROVIDED-state (load) path only. A loaded `current` that is not a
  known location, or a non-null `endingId` that is not a known ending, is now a hard
  SaveIntegrityError. The gate REJECTS, never coerces; a fresh init state (state === undefined) is
  trusted and skipped, so new_game is byte-unchanged.

root_cause: >
  Not a defect in any one pack — the referential half of the same single unguarded entry point
  bug_0181 named. The load->replay->play path is exactly where the contamination-free benchmark's
  credibility rests (ULTRAPLAN §16); bug_0181 sealed finiteness there but left reference open. The
  layering is deliberate: load() (no pack) owns finiteness/structure; the pack-aware tools.ts layer
  (which builds the mode index) owns reference. `current` is the field the entire observation/action
  loop renders from — a phantom value puts the engine in a location that does not exist; `endingId`
  is the outcome a forged save can fabricate to CLAIM an ending the pack never declares.

witness: >
  THE HEADLINE HOLE: a forged save with `current` = a phantom id loads cleanly through bug_0181's
  finiteness gate (the id is a valid string) and the engine then builds the whole game from a
  room/scene that does not exist. The new suite plants the construction-known-bad saves load_game
  MUST reject: a CYOA phantom `current` scene ("unknown scene"), a parser phantom `current` room
  ("unknown room"), and a parser fabricated `endingId` ("unknown ending"). This is the SoundnessBench
  (arXiv:2412.03154) REJECTION-DIRECTION oracle carried from finiteness (bug_0181) to REFERENCE: the
  checker is credibly sound only if it rejects instances known-bad BY CONSTRUCTION, not merely
  accepts the ones it is fed. The two GREEN false-rejection guards are the acceptance direction — a
  clean mid-game CYOA save still round-trips, AND an ENDED CYOA save whose `current`/`endingId` is a
  TERMINAL id (ending_escape, NOT a scene — CYOA ends via goto+end_game, cyoa/runner.ts) still loads.
  That ended-save case is precisely why the gate folds `terminalIds` into the valid-location set; a
  naive "current must be a scene" check would falsely reject every ended CYOA save.

fix: >
  src/mcp/tools.ts: ADD a top-level `assertLoadedStateRefs(mode, index, state)`. CYOA valid
  locations = scenes.keys() UNION terminalIds, valid endings = terminalIds (an ended CYOA save's
  current/endingId is a terminal id). Parser/RPG valid locations = rooms.keys(), valid endings =
  pack.endings ids (end_game keeps the player in a room, so current is always a room). Throw
  SaveIntegrityError on an unknown `current` or a non-null unknown `endingId`. CALL it inside
  startSession AFTER `const st = state ?? initStateFor(...)`, guarded `if (state !== undefined)` so
  only the untrusted load-path state is validated and fresh init is byte-unchanged. Imports added:
  SaveIntegrityError (from persist/save_load), type CyoaIndex (cyoa/runner), type ParserIndex
  (parser/model). NEW tests/regression/save_load_referential_integrity.test.ts (5 cases): 3
  forged-reference rejections + 2 GREEN round-trips. NO edit to save_load.ts, conditions.ts,
  effects.ts, state.ts, any validator, any matcher, any MIN_* floor, GEN_EVAL_CHECK_COUNT, the
  generator, the corpus, or the scorecard.

verification: >
  npx vitest run tests/regression/save_load_referential_integrity.test.ts -> 5 GREEN. npm run health
  -> GREEN. src/mcp/tools.ts is NOT in PROTECTED_FILES (scripts/verify-integrity.ts), so
  verify:integrity surfaces no VERIFIER_TOUCHED. No floor/matcher/schema change; net test-case count
  RISES by 5. No content/state changed, so every valid save still round-trips byte-identically — no
  HASH_PIN/curated re-pin, no generator_version bump, no corpus re-seal; the held_out_corpus and
  determinism property tests stay green unchanged.

blind_playtest: >
  Mandated blind pass ran on `alchemists_tower` (parser, seeds 73/99/7) — clean, clarity 5/5,
  enjoyment 4/5, all three endings (cure/poison/betrayal) reached, ZERO bugs. No content fix
  indicated, so this cycle spent the saturated-content signal on the structural load-integrity gap.

regression: >
  The new suite IS the regression: the three rejection cases fail loudly if the referential gate is
  ever removed or weakened (a forged phantom-location / fabricated-ending save would then flow into
  the engine). The two GREEN cases are the false-rejection guard — the ENDED-CYOA case fails loudly
  if the `terminalIds` fold is ever dropped (real ended saves would be wrongly rejected). No pinned
  hash changes (no content/state changed).
