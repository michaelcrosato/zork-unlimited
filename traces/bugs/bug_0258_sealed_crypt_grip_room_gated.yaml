bug_id: bug_0258
pack_id: sealed_crypt_v1
seed: 43                          # this cycle's blind-playtest seed; the regression drives seed 43
type: content_fix                 # + a small additive engine primitive (new `in_room` condition); no validator/schema weakening, no flag/item/score/exit/gating change to the pack's structural proofs
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-04T23-11-54-566Z/playtest.md   # The Sealed Crypt, seed 43 — this fix's source
  result: >
    Mandated blind pass ran on sealed_crypt (assessor rank-1). A fresh MCP-only blind
    playtester (seed 43) reached all three endings across three playthroughs —
    ending_victory 35/35, ending_plunder (non-death, 10/35), ending_doom (death,
    10/35) — rating clarity 5/5, enjoyment 4/5; "mechanically flawless," zero rejected
    actions, no loops, no stale/contradictory text; flags, quest stages
    (clue_read -> well_opened -> gate_open), the 5/10/20 score economy summing to
    exactly 35, exit unlocks, rope consumption and lock toggles all correct.
  finding: >
    Report §4/§5: the optional self-USE nerve beat ("grip iron key", id `use_iron_key`,
    USE iron_key on iron_key — the Stage-4 skill_check) is a USE on a CARRIED item, so
    it "follows the player into every room for the rest of the game once the key is
    held," surfacing at the Bottom of the Well, the graveyard, the yard, the forest
    path — "reads slightly oddly on the action list outside the well/crypt … a small
    wart … the persistent self-use entry." Its own fiction ("steel yourself before the
    three iron locks") only makes sense where the three iron locks stand: the crypt.
root_cause: >
  The beat was gated only by `not_flag: steeled_at_the_iron` (its one-shot retire), with
  no way to restrict WHERE it offers. The condition DSL (src/core/conditions.ts) had
  `visited` (have you EVER been in room X) but no predicate for the player's CURRENT
  location, so a carried-item self-USE could not be confined to the room its fiction
  belongs to — it surfaced everywhere the item was held.
improvement:
  layer: engine + content
  engine:
    - src/core/conditions.ts: >
        New condition `in_room: <room_id>` — the non-monotone dual of `visited`
        (`state.current === id`). `visited` is sticky once true ("ever been there");
        `in_room` asks "are you here RIGHT NOW". Added to ConditionSchema (strict, min(1)),
        the Condition union, and evalCondition. Pure predicate over GameState, no new
        state field. The validator's condition walks (winStaysTrueForever, whenProfile,
        the feasibility checkConds extractors) treat the new kind via their existing
        conservative `else` fallthroughs — non-monotone / opaque / ignored — so no new
        finding and no unsound assumption (it detects fewer cases, never wrong ones).
  content:
    - content/parser/pack/sealed_crypt.yaml: >
        iron_key grip interaction conditions gain `{ in_room: crypt }` alongside the
        existing `{ not_flag: steeled_at_the_iron }`. The beat now offers ONLY in the
        crypt, exactly the "down here" the iron key's examine already names and the only
        room holding the three iron locks. Still optional and CONVERGENT: gates no exit,
        ending, score, or reactive variant on either roll outcome, so every structural
        proof and the 35-point economy stay byte-identical — it only narrows WHERE the
        optional beat appears.
verification:
  - npm run validate -- content/parser/pack/sealed_crypt.yaml      # OK, 0 error(s), 0 warning(s)
  - npm run health                                                 # exit 0 (verify:integrity static + typecheck + ESLint + Prettier + tests + every pack validate + watchtower coverage + playtest record)
  - probe: grip ABSENT at well_bottom/old_well/graveyard/chapel_yard, PRESENT in crypt (seed 43)
locked_by:
  - tests/regression/sealed_crypt_grip_room_gated.test.ts          # 3 cases: grip absent in every non-crypt room the key is carried through; grip appears on descent into the crypt; `in_room` reads CURRENT room and diverges from sticky `visited`
  - tests/regression/sealed_crypt_grip_telegraph.test.ts           # updated (bug_0241): grip's telegraph + cosmetic-and-still-wins assertions now exercise the beat IN THE CRYPT (the relocated offer point), still winning ending_victory 35/35
  - tests/unit/conditions.test.ts                                  # `in_room` evaluator (current vs visited) + schema accept/reject ("" rejected)
notes:
  verifier_integrity: >
    No check was weakened, disabled, or re-pinned. The new `in_room` is purely additive
    to the closed condition DSL; the relabel metamorphic oracles (relabel_parser.ts,
    relabel_cyoa.ts) gained the matching room-id rewrite arm (their `never`-exhaustive
    switch forced it at compile time), so the id-invariance proof still holds on the twin
    with the new condition. sealed_crypt carries no pinned content hash (only
    watchtower_road is pinned), so this surfaced change re-pins nothing. The nerve
    skill_check is unchanged and remains CONVERGENT (gates no exit/ending/score/variant) —
    only its room of availability narrowed.
