id: bug_0413
title: Dead Reckoning Jonah ending surfaced as a neutral survival result
pack: content/cyoa/pack/dead_reckoning.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  The blind player reached ending_jonah by giving the stowaway to the sea and saw
  ending_death: false, even though the epilogue presents the act as a failed,
  morally ruinous outcome: the child is drowned, the wind does not come, and the
  remaining crew survives broken and guilty.
root_cause: >
  ending_jonah had no death/failure marker. CYOA observations default absent
  death to false, so tooling could not distinguish the pack's capitulation ending
  from its successful survival endings without reading prose.
fix: >
  Marked ending_jonah with death: true and updated the old adrift regression so it
  no longer preserves the stale false classification.
tests:
  - tests/regression/dead_reckoning_jonah_failure_flag.test.ts
  - tests/regression/dead_reckoning_adrift_death_flag.test.ts
verification:
  - npm test -- --run tests/regression/dead_reckoning_jonah_failure_flag.test.ts tests/regression/dead_reckoning_adrift_death_flag.test.ts
  - npm run validate -- content/cyoa/pack/dead_reckoning.yaml
