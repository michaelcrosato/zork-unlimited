id: bug_0190
title: "Trace-load integrity gate — replay_trace/inspect_trace fed an untrusted on-disk GameState with no finiteness/structural/referential gate (the trace twin of bug_0181–0184)"
kind: engine_fix
mode: cyoa # boundary fix is mode-agnostic; the rejection oracle exercises a CYOA pack (watchtower_road)
pack: content/cyoa/pack/watchtower_road.yaml
# Informational. No pack content changed, so nothing re-pins. Only watchtower_road's
# content_hash is pinned anywhere, and it is untouched — verify:integrity stays green
# with no AI_LOOP_ALLOW_VERIFIER_EDITS.

summary: >
  This is the trace-load mirror of the SAVE-load integrity arc (bug_0181 finiteness/structural,
  bug_0183 phantom current/endingId, bug_0184 phantom inventory). The MCP debugging entry points
  replay_trace (src/mcp/tools.ts) and inspect_trace each JSON.parse(readFileSync(trace_path)) an
  UNTRUSTED on-disk trace and feed trace.initial_state RAW into the engine: replay_trace -> replayTrace
  -> runActions(rules, trace.initial_state, ...) (src/trace/replay.ts:45); inspect_trace runs its OWN
  per-step loop from `let state = trace.initial_state` AND calls diagnose(rules, trace.initial_state,
  trace.actions). Each handler's content-hash check guards WHICH pack the trace was recorded against —
  NOT WHETHER the state is well-formed — so a forged trace carrying the CORRECT content_hash and a
  poisoned initial_state passed straight through to the engine.

root_cause: >
  Trace.initial_state (src/trace/record.ts) is a bare TS `GameState` with NO TraceSchema / Zod anywhere,
  and the load-integrity gates that the save boundary already shipped were never wired to the trace
  boundary. The content-hash equality check at each handler is a pack-identity check, not a state
  well-formedness check. So the same three sub-holes the save arc named were reachable through a trace
  file: (a) finiteness — initial_state.vars carrying 1e999 parses to Infinity and, left unguarded, flows
  into conditions.ts:75 var_gte making every var_gte gate always-true; (b) referential current — a phantom
  initial_state.current renders the replay/inspect from a scene the pack never declares (the bug_0183 hole);
  (c) referential endingId — a fabricated initial_state.endingId claims an ending the pack never declares.

fix: >
  REUSE the two already-proven save gates — no new schema, no check weakened, no generator_version bump,
  no corpus re-seal. (1) Lift the private GameStateSchema in src/persist/save_load.ts into an exported thin
  helper assertWellFormedState(state): GameState that runs the SAME safeParse-without-substitution path
  load() uses and throws SaveIntegrityError on failure (load() itself is left unchanged, so a valid save's
  bytes/hash stay byte-identical and every save test stays green). (2) In src/mcp/tools.ts, after the
  content-hash check passes and BEFORE any engine call, call assertWellFormedState(trace.initial_state)
  then the existing pack-aware assertLoadedStateRefs(mode, indexFor(mode, compiled.pack),
  trace.initial_state) in BOTH replay_trace and inspect_trace. Order: well-formed (cheap, structural) FIRST,
  then referential (needs the pack index). The gate sits at the untrusted-FILE boundary ONLY — NOT inside
  replayTrace/runActions/diagnose, which legitimately replay TRUSTED in-memory freshly-recorded traces.

out_of_band_teeth: >
  The new test plants three known-bad-by-construction forged traces the gate MUST reject — vars->Infinity
  (1e999 spliced into the serialized JSON), phantom initial_state.current ("no_such_room", /unknown scene/),
  phantom initial_state.endingId ("ending_phantom", /unknown ending/) — and asserts BOTH replay_trace AND
  inspect_trace throw SaveIntegrityError for each. With the two-line gate reverted in both handlers, the
  poisoned state reaches the engine and replay/inspect return WITHOUT throwing, so every WITNESS FAILS
  pre-change (genuine witnesses, not vacuous greens). Two GREEN false-rejection guards prove a clean
  fresh-init recorded trace AND a legitimately mid-game CYOA trace (current = a real reached scene,
  endingId null) still replay + inspect unchanged — the gate never false-rejects a state a real recording
  could carry.

regression_test: tests/regression/trace_load_integrity.test.ts

verification: >
  npx vitest run tests/regression/trace_load_integrity.test.ts green. The save+trace neighborhood
  (save_integrity_adversarial, save_load_referential_integrity, save_trace, inspect_trace_divergence,
  rpg_barrow_trace) stays green — proving the schema lift and the gate broke nothing. tsc --noEmit clean.
  npm run health green (verify:integrity + lint + prettier + typecheck + all tests + all pack validates +
  coverage playtest). verify:integrity green with NO AI_LOOP_ALLOW_VERIFIER_EDITS (no protected/hash-pinned
  file changed, no floor lowered, no matcher relaxed).

files_changed:
  - src/persist/save_load.ts        # export assertWellFormedState (lifts the private GameStateSchema; load() unchanged)
  - src/mcp/tools.ts                # import it; two-line gate in replay_trace + inspect_trace, at the file boundary
  - tests/regression/trace_load_integrity.test.ts
  - traces/bugs/bug_0190_trace_load_integrity.yaml
