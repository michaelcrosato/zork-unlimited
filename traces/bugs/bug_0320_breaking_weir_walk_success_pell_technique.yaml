id: bug_0320
title: "breaking_weir storm-walk success narrate claims Pell's technique on uncounselled path"
pack: content/rpg/pack/breaking_weir.yaml
severity: moderate
class: reactive-description-blindness
found_by: blind_playtest_seed_7_cycle_2026-06-08T12-59-01-300Z

symptom: >
  The storm-walk skill-check success narrate opened "go out low, hands on the wire, feet
  feeling the slick boards under the sheeting water" — precisely Pell's taught technique
  (bug_0197 removed the explicit "the way Pell told you" attribution but left the
  technique language). The journal said "Clipped to the run-wire and going low and steady"
  ("low and steady" is Pell's exact phrasing). A player who skipped Pell's advice saw their
  character execute the expert technique they were never shown.

root_cause: >
  The success effects are shared across both the counselled path (heard_walk set, nerve 8,
  guaranteed pass) and the uncounselled path (heard_walk unset, nerve 3, ~75% pass). After
  bug_0197 dropped the "Pell told you" attribution, the residual technique language
  ("going low and steady", "feet feeling the slick boards") still implied Pell's method
  was known rather than discovered. Same reactive-description-blindness class as
  bug_0282/0283/0287/0305/0313: a flag-dependent state is visible in the fiction but the
  prose does not reflect it.

fix: >
  Prose-only; single interaction, no structural change. Journal changed to "Clipped to the
  run-wire, you cross the awash spillway-walk and come off the far side with the race
  grasping at your heels." (removes "and going low and steady"). Narrate opening changed
  from "go out low, hands on the wire, feet feeling the slick boards" to "go out onto the
  slick boards. The race claws at your shins and tries to hurry you; you find yourself lower
  than you expected to be, hands tight on the wire, and that is what saves you." The phrase
  "you find yourself lower than you expected to be" is honest on both paths — deliberate for
  the counselled player, instinctively discovered for the gambler — without claiming which.

regression_test: tests/regression/breaking_weir_walk_success_neutral.test.ts
