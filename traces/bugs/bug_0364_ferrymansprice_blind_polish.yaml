id: bug_0364
title: Ferryman's Price stale evidence prose and missing lease-notice item
severity: content
status: fixed
root_cause: >
  A fresh MCP blind playtest found that the ferryman's hut and boat inspection
  repeated pre-discovery prose after the player had questioned the ferryman or
  documented the bloodstain. The same report found an evidence inconsistency:
  the player could carry the travel receipt but not the lease notice that
  explains the murder's motive.
fix: >
  Make the lease notice a carried item when read, hide the willow cache only
  once both documents are held, add reactive hut and boat-inspection prose, make
  the midstream accusation label name the actual evidence, and split testimony
  ending prose so drag marks are mentioned only when the player inspected them.
files_changed:
  - content/cyoa/pack/ferrymansprice.yaml
regression_test:
  - tests/regression/ferrymansprice_blind_polish.test.ts
