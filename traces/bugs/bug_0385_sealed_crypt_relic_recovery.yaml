id: bug_0385
pack: sealed_crypt_v1
title: "sealed crypt victory fired before the promised relic recovery"
severity: moderate
scene: catacombs
reported_by: blind_playtest_20260620T140450Z_sealed_crypt_seed7

symptom: >
  The pack's quest text promised that the player would recover the sealed crypt
  relic, but the victory fired as soon as the player walked through the unlocked
  gate into the catacombs. No relic was visible, taken, or named as an inventory
  recovery, so the ending felt hollow despite a mechanically clean solve.

root_cause: >
  The win condition was `visited: catacombs`, and the +20 capstone score was attached
  to unlocking the gate. The final room was only destination prose, not an actionable
  recovery beat, so the stated quest and the actual win trigger diverged.

fix: >
  The catacombs now contain a takeable sealed crypt relic. Entering the room does not
  end the game; taking the relic awards the old +20 capstone and satisfies the
  `has_item: sealed_relic` win condition. Gate unlock still opens the route and
  signposts the relic, but no longer maxes the score.

tests: tests/regression/sealed_crypt_relic_recovery.test.ts
