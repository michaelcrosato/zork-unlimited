bug_id: bug_0122
pack_id: ALL_PARSER   # alchemists_tower_v1, sealed_crypt_v1
seed: 7
evidence:
  source: blind_playtest + structural_gap_analysis
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T12-07-20-072Z/playtest.md   # wreckers_light, seed 88
  finding: >
    The mandated rank-1 target this cycle, The Wrecker's Light (a NEW seed 88 — the fourth
    dedicated blind pass, after seeds 7/23/42), came back clean again: a fresh source-blind
    MCP-only subagent reached ALL FOUR endings, rated it clarity 5/5 enjoyment 5/5, ZERO
    functional defects. Content is blind-exhausted across every pack (project memory:
    content-polish-backlog-exhausted), and the assessor's entire rank-list remains six
    identical "blind-playtest pack X — the coverage bot can't solve its puzzles, so quality
    is unverified" items. That recurring "unverified" complaint is the real, structural
    signal — and bug_0121 closed it for CYOA with an exhaustive concrete solver while
    explicitly naming the parser/RPG modes "the natural next extension". This cycle does the
    PARSER half.
failure:
  type: not_a_defect_structural_verification
  description: >
    The parser puzzle packs (sealed_crypt, alchemists_tower) are exactly the packs that are
    perpetually "unverified", for the same two-part gap bug_0121 identified for CYOA:
      - The parser validator's reachability check is (like CYOA's) a conservative STATIC
        approximation — sound for "this IS unreachable" but not a proof that a declared
        ending IS reachable, since it abstracts away precise gating (item consumption,
        is_unlocked chains, mutually-exclusive flags, visited arithmetic).
      - `npm run health`'s only DYNAMIC playthrough runs on a single CYOA pack
        (watchtower_road) via the heuristic coverage bot, which by the assessor's standing
        note "can't solve the puzzles" — it never touches a parser pack at all. Every parser
        pack's dynamic solvability rested on scattered per-bug golden routes; no single
        guarantee asserted "this pack is winnable to EVERY declared ending."
fix:
  layer: test   # structural verification; pure test addition + shared-helper extract, no production code touched
  summary: >
    Extend bug_0121's exhaustive concrete solver to the PARSER mode. The mode-agnostic BFS
    was extracted to tests/regression/support/exhaustive_endings.ts (shared by the CYOA and
    parser suites): from each reachable state it steps the engine's own legal action set
    (rules.legalActions, the ground-truth legality set makeStep validates against) and
    dedupes on a TOTAL state fingerprint, asserting the set of endings ACTUALLY reached by
    play equals the set declared in pack.endings. A declared-but-unreachable ending fails; a
    reached-but-undeclared ending fails; a route-severing regression fails; a cap-out fails
    (never a silent pass). Parser packs are auto-discovered from content/parser/pack, so a
    new parser pack is covered the moment it ships (the health-covers-all-packs bar,
    bug_0096).
  two_changes_for_the_larger_action_space:
    - >
      FINGERPRINT completed. The CYOA fingerprint (current|flags|inventory|vars) was
      insufficient for parser, which gates transitions on `visited` (win_conditions like
      {visited: catacombs}) and on `objectState` (an opened/unlocked container is a
      genuinely different state). stateKey now also includes visited, objectState
      (open/locked/contents/location per object), questStage, and ended/endingId — every
      field a Condition/Effect can read — while still EXCLUDING step (a monotonic counter
      whose inclusion would defeat all dedupe; it affects nothing in the deterministic
      CYOA/parser modes) and journal (append-only narration no condition reads). Without
      visited+objectState the BFS collapsed distinct states and reached ZERO parser endings.
    - >
      MONOTONE ACTION RESTRICTION. The parser verb×object space is dominated by REVERSIBLE
      world edits (DROP undoes TAKE, CLOSE undoes OPEN) and pure OBSERVATIONS
      (LOOK/INVENTORY/READ/INSPECT) that explode the state count — an item dropped in each
      room, every inventory subset — without ever being NEEDED to reach an ending (a full
      unrestricted exhaust of alchemists_tower blew past 200k states WITHOUT even finding the
      win). The search steps only "progress" actions, skipping those six verb types. This is
      SOUND for a reachability proof because restricting the action set is monotone: any
      ending still reached is reached by a real, legal playthrough using a SUBSET of the
      game's actions, hence genuinely reachable in the full game. A restriction can only HIDE
      an ending that truly needs a dropped/closed item — which surfaces as a declared ending
      going unreached, i.e. a LOUD failure, never a silent pass. Verified safe: both shipped
      parser packs gate every transition (win_conditions / exits / interactions) on
      has_item / visited / flags / is_unlocked; `not_item` and drop appear ONLY in reactive
      prose `when:` variants, never on a route. The filter is a no-op for CYOA (CHOOSE only),
      so the CYOA census stays COMPLETE and bug_0121's guarantee is unchanged.
  regression_test: tests/regression/parser_all_endings_reachable.test.ts
  shared_helper: tests/regression/support/exhaustive_endings.ts
  scope: >
    CYOA (bug_0121) + parser (this bug) — both fully deterministic. RPG remains the last
    extension: its seeded combat/skill rolls are keyed on state.step, so a single fingerprint
    can transition many ways and a pure-fingerprint BFS cannot soundly exhaust it. RPG
    winnability stays proven by the dedicated combat-bound checks (COMBAT_UNWINNABLE /
    COMBAT_NOT_GUARANTEED, src/validate/rpg_validator.ts, bug_0113/0114).
  reachable_endings_changed: false   # proves existing reachability; changes no content
  content_hash_changed: false        # no pack edited
verified_live: >
  Ran the exhaustive solver (seed 7, 200k-state cap) over all shipped parser packs:
    - sealed_crypt:     4568 states, reaches BOTH declared endings (ending_victory via the
      catacombs route, ending_plunder via the founder's coffin).
    - alchemists_tower: 2905 states, reaches ALL FOUR declared endings (ending_cured the
      brew-and-administer win, ending_poisoned self-drink, ending_master_poisoned the
      bug_0111 wrong-vial branch, ending_betrayal). A naive UNRESTRICTED exhaust of this
      pack capped out at 200k+ states (17s) WITHOUT finding ending_cured — confirming the
      progress-action restriction is what makes the deep win reachable in-budget.
  Both searches exhausted well under the cap; missing-ending set empty, undeclared-ending
  set empty for both. The CYOA suite (bug_0121) stays green on the shared helper
  (wreckers_light 441 / clockwork_heist 1967 / watchtower_road 82622 states, all endings).
playtest_coverage:
  note: >
    This converts the perpetual "parser puzzle packs unverified because the heuristic coverage
    bot can't solve them" status into a green, deterministic, sound reachability guarantee in
    the test bar — the automated dynamic check the manual blind playtests have stood in for. A
    new parser pack is auto-covered the moment it ships (directory discovery), matching the
    health-covers-all-packs bar (bug_0096). Five of seven shipped packs (3 CYOA + 2 parser)
    now have an exhaustive every-declared-ending-reachable proof; the two RPG packs are
    covered by the combat-winnability proofs instead. The wreckers_light blind pass this
    cycle remains verified-clean; this cycle's improvement is the structural pivot the
    exhausted content backlog calls for.
