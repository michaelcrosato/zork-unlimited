id: bug_0232
title: "Tide-Mill blind-pass (seed 23): the Wheel-Room base text named BOTH faults as still wrong and only the gate_up variant existed, so the room contradicted each solved sub-puzzle until the gate was wound — added intermediate reactive variants (+ a cleared head-race name override) so the room reads consistently after every fix"
kind: content_fix
mode: parser
pack: content/parser/pack/tide_mill.yaml
# Informational. No pinned hash is touched: the change is local to two objects in
# tide_mill.yaml (the wheel_room room variants + the choked_sluice cleared-variant name)
# plus a new pack-specific regression. The auto-discovered generic parser bar (all-endings
# reachability, no soft-lock, score-economy max==45, action-id uniqueness, variant liveness)
# re-derives clean over the edited pack; max_score stays 45 and every ending stays reachable.

summary: >
  The mandated blind pass this cycle (The Tide-Mill, parser, seed 23) returned clarity 5/5,
  enjoyment 4/5, mechanics flawless: a WON 45/45 run plus both the GREED (ending_thief) and
  DEATH (ending_drowned) forks, all three reached cleanly with zero rejected actions, loops,
  or parse failures. Its PRIMARY actionable finding was a narration-vs-state honesty flaw in
  the Wheel-Room: the base description names BOTH faults as still wrong ("its brake-pawl is
  dropped and locked into the gear, and the race that should drive it runs choked and slack"),
  but the pack carried only a gate_up variant — so after freeing the pawl AND/OR clearing the
  head-race, the Wheel-Room kept asserting the very faults the player had just put right, up
  until the gate was wound. A player reading room text rather than the journal could think
  their fixes had not taken. The SECONDARY finding (same class): the cleared head-race object
  kept its "choked head-race" NAME in visible_objects + the enumerated examine command after
  it was cut, though its examine TEXT and the room prose updated correctly.

root_cause: >
  The Wheel-Room's only reactive variant keyed on gate_up (the climax, both faults fixed AND
  the gate wound). The two intermediate states — pawl_free alone, sluice_clear alone, or both
  set but gate not yet wound — fell through to the base description, which is written for the
  all-wrong start state and states both faults as current. roomDescription picks the first
  variant whose `when` all hold (declared order), so with no intermediate variants those three
  states rendered the stale base text. Separately, the choked_sluice object had a sluice_clear
  examine-TEXT variant but no `name` override, so objectName (bug_0188 asymmetry) kept returning
  the base "choked head-race" after the choke was cut.

fix: >
  Added three intermediate reactive variants to the wheel_room, declared MOST-specific first so
  first-match-wins resolves correctly: gate_up (unchanged climax) → sluice_clear AND pawl_free
  (both faults put right, wheel driving the gear, gate not yet wound) → pawl_free only (pawl
  freed, race still honestly choked) → sluice_clear only (race freed, pawl still honestly
  locked). Each names exactly what is now true and what still remains, so the room never
  contradicts a sub-puzzle the player has solved nor prematurely claims one they have not. Also
  added a `name: "head-race"` override to the choked_sluice sluice_clear variant so the cleared
  object drops "choked" from its label to match its own variant text and the room prose. Pure
  prose/content: no new mechanic, no score/flag/exit/ending change; the +10/+10/+20 still ride
  their one-shot gated steps, max_score stays 45, and every ending stays reachable and unchanged.

regression_test: tests/regression/tide_mill_blind_polish.test.ts
# describe "bug_0232": pins, on the REAL buildParserObservation surfaces — (1) base Wheel-Room
# still names both faults (witness); (2) pawl-only drops the pawl-locked claim, keeps the race
# choked; (3) sluice-only drops the race-choked claim, keeps the pawl locked; (4) both-fixed
# asserts NEITHER fault and reads "ready" but NOT yet "wound up"; (5) gate_up climax variant
# still wins as most-specific; (6) the cleared head-race object NAME drops "choked".

verify:
  - "validate_story content/parser/pack/tide_mill.yaml → ok, max_score 45, 0 findings"
  - "npm run health → green (verify:integrity + lint + tests + validate + playtest)"
