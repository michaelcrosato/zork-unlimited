id: bug_0421
title: Prior's Cellar kept showing first-arrival and picked-up-object prose
pack: content/cyoa/pack/priors_cellar.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  The blind playtest found that returning to the gate repeated the arrival line,
  the cloister still showed Emric sweeping after Vespers had emptied it, and the
  study/scriptorium continued to describe the key and ledger after the player
  had taken them.
root_cause: >
  Several CYOA scenes used only base text even though the relevant state flags
  were already available: visited rooms for gate re-entry, prior_at_vespers for
  the cloister, has_cellar_key for the study, and has_ledger for the scriptorium.
fix: >
  Added first-match reactive scene variants for those state changes. The patch is
  text-only and leaves choices, flags, score awards, endings, and route topology
  unchanged.
tests:
  - tests/regression/priors_cellar_stale_scene_text.test.ts
verification:
  - npm test -- --run tests/regression/priors_cellar_stale_scene_text.test.ts
  - npm run validate -- content/cyoa/pack/priors_cellar.yaml
