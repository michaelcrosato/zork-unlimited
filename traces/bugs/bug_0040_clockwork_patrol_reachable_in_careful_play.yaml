bug_id: bug_0040
pack_id: clockwork_heist_v1
seed: 101
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T12-11-45-401Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester reached all four
    endings across six runs, rating it clarity 5/5, enjoyment 4/5, mechanically
    flawless (no rejected actions, no loops, no soft-locks). Its single headline
    design finding — repeated in report §4, §5, and the verdict — was that the
    pack's cleverest system, the ledger-gated watchman crossing added in bug_0019,
    is BURIED: "the guard never appears on a direct route... its payoff is only
    discoverable by dawdling," so a careful, efficient player reads the ledger
    clue as dead flavor and never experiences the timing/stealth layer. The
    playtester's recommendation: "surface the time/guard tension a little earlier
    so the ledger's value is felt on a first, careful playthrough."
failure:
  type: clue_payoff_unreachable_in_normal_play
  where: [content:content/cyoa/pack/clockwork_heist.yaml]
  description: >
    bug_0019 wired a real time-pressure deadline but tuned the watchman's patrol
    to ticks >= 6 (gallery tension at >= 4). The tick economy makes a thorough
    truth-via-vault route — kitchen for the pick (1), gallery (2), study to read
    the ledger (3), back to the gallery to cross (4) — arrive at only ~tick 4, two
    ticks short of the patrol. So the ledger's promised payoff ("time a crossing
    he'd never catch") never cashed in normal play: a player met the guard only by
    deliberately wasting ~6 ticks oscillating rooms. The mechanic was reachable
    but effectively invisible to anyone playing well.
fix:
  layer: content
  summary: >
    Content-only retune of the existing deadline (no engine change, no new scene,
    no new flag/item; same inc_var / var_gte / var_lte DSL). Lowered the bands so
    the hour falls right on the thorough vault route's natural arrival:
    (1) gallery (`landing`) variants — tension now ticks >= 2 (was 4), watchman's
    patrol now ticks >= 4 (was 6); (2) the safe `approach_vault` crossing gated
    `any_of: [var_lte ticks 3, has_flag read_ledger]` (was var_lte ticks 5); (3)
    the gamble `cross_to_vault_blind` now `var_gte ticks 4 + not_flag read_ledger`
    (was ticks 6); (4) the foyer's mirroring variants (bug_0020) tracked down to
    >= 2 / >= 4. Net effect: a player who reads the ledger meets the patrol at the
    very crossing they were heading to and crosses safely on his rounds (the clue
    pays off, felt, on a first careful playthrough); a player who visits the study
    but skips the ledger, or who dawdles, hits the same hour and faces the labelled
    gamble or must retreat to read it. The straight-shot routes (pick -> vault at
    ticks <= 2, the no-tick crawlspace truth route) stay safely under the hour, so
    nothing becomes a gotcha and no route soft-locks (study/foyer exits always
    remain).
  reachable_endings_changed: false  # still rich/truth/caught/patrol; only the tick thresholds moved
  content_hash_changed: true        # clockwork_heist yaml retuned; clockwork is unpinned (only watchtower_road is pinned in tests)
  prior_tests_retuned:
    - tests/regression/clockwork_guard_patrol_deadline.test.ts  # bug_0019: tension prose sample moved from ticks 5 -> ticks 3 (the band boundary shifted); all bug_0019 invariants still asserted and hold
    - tests/regression/clockwork_foyer_reactive_text.test.ts    # bug_0020: tension prose sample moved from ticks 5 -> ticks 3; hour-variant threshold assertion 6 -> 4
regression_test: tests/regression/clockwork_patrol_reachable_in_careful_play.test.ts
verified_live: >
  Through the MCP tools (seed 101). The thorough route kitchens -> take_pick ->
  dumbwaiter -> enter_study -> read_ledger -> leave_study lands at the gallery on
  ticks 4 with the watchman's-patrol prose showing AND approach_vault offered
  (read_ledger gates it in) while cross_to_vault_blind is absent — the ledger pays
  off exactly at the natural crossing. The gallery already showed the "running
  short" tension on first arrival at tick 2. run_playtest random (100 runs) now
  reaches all four endings (caught 48, patrol 36, truth 11, rich 4) with every
  scene visited; the lone max_steps sample is the coverage/random walker's
  pre-existing oscillation, not a new flaw.
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the pick -> read -> cross
    chain (1 ended / 99 max_steps, study<->landing oscillation) — a standing
    heuristic-planner limit documented since bug_0008, not a discoverability
    regression. The blind LLM playtest is the load-bearing quality signal here and
    confirmed the fix surfaces the mechanic for a careful first-time player.
