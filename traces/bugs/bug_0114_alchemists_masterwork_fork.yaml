id: bug_0114
title: "The Alchemist's Tower gains a non-death moral fork — the iron key opens the cellar OR the master's Great Work"
kind: content_new
mode: parser
severity: enhancement
pack: content/parser/pack/alchemists_tower.yaml

summary: >
  bug_0111 made the spire a decision, but BOTH its branches are deaths (drink the
  black phial yourself → ending_poisoned; dose the master with it →
  ending_master_poisoned), so the pack still had exactly ONE satisfying outcome.
  Every blind playtest keeps rating it clarity 5/5 but enjoyment 3–4/5 on the same
  "short and fully linear … no real choice or misdirection beyond the obvious poison
  trap" knock. Across the loop the linear parser packs cap at enjoyment 3–4 while the
  branching packs (clockwork_heist, wreckers_light) and the now-branched sealed_crypt
  (bug_0105: 3→4) rate higher. alchemists_tower was the last linear pack without a
  real, non-death choice. bug_0114 adds one — the proven bug_0099/bug_0105 lever.

blind_playtest:
  run: ai-runs/2026-06-02T10-21-17-693Z/playtest.md
  pack: content/parser/pack/alchemists_tower.yaml
  seed: 41
  result: "WON ending_cured 40/40; reached ending_poisoned; clarity 5/5, enjoyment 3/5; ZERO functional bugs"
  the_knock: >
    "Competent and coherent but short and very linear; the puzzle solves itself once
    you read two descriptions, with no real choice or misdirection beyond the obvious
    poison trap … 40 points across roughly a dozen meaningful actions makes this more
    of a guided vignette than a puzzle with branching; not a bug, but it caps replay
    value."

the_fix: >
  The iron key the player already carries (it opened the cellar hatch) becomes a FORK,
  exactly the sealed_crypt bug_0105 device — one key, two locks. A locked silver casket
  holding the alchemist's Great Work now sits at the master's deathbed in the spire,
  keyed to that same iron:
    • GIVE the antidote to the master → ending_cured     (the UNCHANGED altruistic win)
    • UNLOCK the silver casket        → ending_betrayal   (greed; terminal, NON-death)
  The casket carries unlock_narrate + unlock_effects [end_game: ending_betrayal] via the
  engine's first-class UNLOCK (the bug_0077 path the cellar hatch + strongbox already
  use). Because it fires by end_game, the two outcomes are MUTUALLY EXCLUSIVE — a genuine
  terminal choice, not a detour. The casket has a reactive examine variant (the bug_0052/
  0065 leak discipline): the base text never assumes the antidote (the spire stair is
  unconditional and the iron key can be carried up without brewing); the has_item:antidote
  variant sharpens the moral weight ("to crack it now, with her cure already in your hand,
  is to choose the Work over the maker"). The spire room description telegraphs the casket.

why_within_the_bar: >
  Content-only, no engine/validator/schema change. The VICTORY route is byte-identical:
  the casket adds no inc_var (meta.max_score stays 40, so the perfect score still coincides
  with the cure per bug_0104) and no exit/flag/gating to the win path, so every prior
  route/score test is unaffected (alchemists_score_victory_coincide, administer_cure_agency,
  master_wrong_vial_branch, use_command_verbs, spire_inventory_truth, etc.). The validator
  stays green (verified 0/0): END_GAME_UNDECLARED satisfied (ending_betrayal declared);
  WIN_IS_DEATH cannot fire (no win_condition resolves to betrayal, ending_cured non-death);
  NO_WINNABLE_ENDING cannot fire (ending_cured remains the sole non-death win); the casket
  adds no exit, so no SOFTLOCK risk. ending_betrayal is NON-death — the player chooses greed
  and survives, only the master dies (recoverable-irrelevant: it is a deliberate alternate
  outcome, not a fail state).

verification:
  command: npm run health
  regression_test: tests/regression/alchemists_masterwork_fork.test.ts
  cases:
    - "the fork is real: at the spire after brewing, holding the iron key, BOTH use_antidote_on_master and unlock_silver_casket are legal in the same state"
    - "unlocking the casket ends in ending_betrayal (non-death), master never cured (cure_administered false), narration names the Great Work"
    - "ending_betrayal is non-death and reached ONLY by end_game; ending_cured stays the sole winnable win; NO_WINNABLE_ENDING intact"
    - "the casket needs the iron key — reaching the spire without it offers examine but not unlock"
    - "the casket examine is reactive — antidote bearer sees 'choose the Work over the maker'; the key-only greed route sees the base text"
    - "the victory route is unchanged — the canonical solve still wins ending_cured 40/40"
    - "the pack validates clean (no SOFTLOCK / END_GAME_UNDECLARED / WIN_IS_DEATH / NO_WINNABLE_ENDING)"

content_hash:
  pack: content/parser/pack/alchemists_tower.yaml
  before: "(unpinned — alchemists_tower's hash is not pinned by any test or trace; only watchtower_road is)"
