  note: >
    Deliberate, surfaced alchemists_tower content-hash change. alchemists_tower is NOT a
    protected file and NO test pins its content hash (confirmed; cf. bug_0093/0103/0104/0111
    which all recorded the same), so the hash moves with nothing to re-pin.

notes: >
  The second linear parser pack to receive a non-death moral fork (after sealed_crypt
  bug_0105). It attacks the one enjoyment knock every blind report on this pack raised,
  reuses only proven mechanics (first-class UNLOCK + end_game + reactive examine), and
  keeps the canonical cure win and all its tests byte-identical. With this, every linear
  pack in the loop now offers a real, non-death choice at its climax.
