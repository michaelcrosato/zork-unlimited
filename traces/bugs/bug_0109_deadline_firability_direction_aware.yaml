evidence:
  source: blind_playtest + validator_audit
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-02T08-47-43-611Z/playtest.md
  finding: >
    This cycle's mandated blind pass on the assessor's rank-1 target, The Clockwork Heist
    (seed 5, fresh MCP-only source-blind subagent), reached all four endings (Truth ×2 prose
    variants, Rich, Caught), found ZERO mechanical bugs, and rated the pack clarity 5/5 /
    enjoyment 4/5 — the ~26th clean pass on this over-fitted target, confirming the content
    backlog remains exhausted (standing memory: content-polish-backlog-exhausted). The
    playtester's one substantive note (§4) was about the namesake clock: it actively tried and
    could NOT find a tick threshold that fires a bad ending, concluding "the looming-clock
    tension is atmospheric flavor rather than a live mechanic ... the prose slightly oversells a
    constraint that isn't enforced." (The deadline DOES exist at ticks>=10 -> ending_overstayed;
    it is tuned generous on purpose, so the tester simply never lingered that long — not a
    defect.) Rather than churn the pack's prose for the Nth time, I took the GENERALIZABLE
    lesson — "a declared deadline can read as toothless / be a Chekhov's gun" — and audited the
    validator's deadline-firability machinery (bug_0087), finding a real soundness gap.
failure:
  type: validator_incomplete_check_dead_mechanic
  where:
    - engine:src/validate/cyoa_validator.ts
  description: >
    bug_0087 added checkDeadlineFirability to flag a meta.deadline that can PROVABLY never fire
    (a Chekhov's gun + a latent soft-lock-graph unsoundness, since the graph treats the deadline
    ending as a real escape edge from any scene that writes a watched var). But its var test was
    COARSE: for a `var_gte: {value: V}` bound needing a raise above init, it only checked
    `writes.writtenVars.has(name)` — "is the var written at ALL?" — ignoring direction. A var
    that IS written but only ever DROPS (every write a dec_var, an inc_var with by<=0, or a
    set_var that lands BELOW V) starts below V and can never reach it: the deadline is exactly as
    dead as if the var were never written, yet the coarse test passed it. Shippable by a
    maintainer who, say, makes a "doom"/"alarm" counter that only ever counts DOWN toward a
    `>= N` deadline, or sets it to a value short of the bound — the urgency prose then writes a
    check the engine never cashes (the precise sin the blind playtester described), and the
    soft-lock graph keeps the phantom escape edge.
fix:
  layer: validator
  summary: >
    Make the `var_gte` firability test DIRECTION-AWARE. Reuse the directional VarWrite data
    (kind + signed amount) that collectFalsifiers already builds — computed ONCE in the
    meta.deadline block and shared by both checkDeadlineFirability and checkDeadlineFiresAtStart
    (which previously recomputed collectFalsifiers internally). New helper
    `varCanReachGte(value, writes)`: a bound is reachable only if some write can actually raise
    the var there — a positive inc_var (repeatable round a loop, so it accumulates) or a set_var
    landing at/above the bound; decrements, no-op/negative incs, and sub-bound sets never get
    there. In checkDeadlineFirability the `var_gte && value>init` branch now flags
    DEADLINE_UNFIREABLE unless varCanReachGte holds. The `var_eq` branch is LEFT on the coarse
    "is it ever written?" test — an inc/dec/set could land on an `==` value, so a written var is
    not provably dead (soundness: only flag the provably impossible). No schema, runner, engine,
    or content change; strictly strengthens an existing WARNING, never weakens a check.
  reachable_endings_changed: false
  content_hash_changed: false        # no content pack edited
  regression_test: tests/regression/cyoa_deadline_unfireable.test.ts
  unit_tests: []                      # covered by the regression file's bug_0109 describe block
  fixtures: []                        # synthetic inline packs in the regression test
verified_live: >
    Bug-first: a synthetic pack whose deadline fires at doom>=5 (init 0) while doom is driven
    ONLY by dec_var (counts down) now yields DEADLINE_UNFIREABLE; so does one driven only by a
    sub-bound set_var (set doom 2). Soundness controls: a positive inc_var (doom +1) and a
    set_var at/above the bound (set doom 7) do NOT trip it. The shipped clockwork pack
    (deadline ticks>=10, fed by inc_var ticks by:1) still produces ZERO DEADLINE_UNFIREABLE and
    the bug_0087 suite (every original ground) stays green. `npm run health` exit 0; 759 tests
    pass (140 files; +4 regression cases); verify:integrity OK; typecheck/lint/format:check
    clean; all seven health-gated packs validate 0/0; all content hashes unchanged.
note: >
    Soundness over coverage, same stance as bug_0085/0086/0087: only flags a deadline whose
    firing is PROVABLY impossible. The direction check covers the common monotone case
    (inc/dec/set magnitude vs the bound) but still does not reason about overshooting an `==`
    target via a step size, nor about var_lte bounds (collectRequired does not treat var_lte as
    a hard requirement — a documented limitation). Together with bug_0079/0080 (deadline made
    real + reachability seen through choice effects) and bug_0087 (initial firability), the
    namesake deadline mechanic is now machine-checked against the full common family of
    "declared but silently dead" timers.
