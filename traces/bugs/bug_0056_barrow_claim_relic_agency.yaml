  rotated_result: >
    Per blind_playtest_protocol.md's "rotate the seed and rotate the pack" and "you MAY pick a higher-
    value candidate," ran a fresh parallel blind pass on The Sunken Barrow (rpg, seed 71) — directly
    relevant to the climactic-agency engine gap flagged as the highest-value next move across
    bug_0047/0052/0054. It surfaced the cycle's one concrete, player-facing finding (below).
  finding: >
    Sunken Barrow (report §5, climactic moment): the win fired on a MOVE with no deliberate take. The
    turn the game ended, the tester selected `go_down` from Slab Passage; that single MOVE into
    relic_chamber emitted the move, the journal line, +score AND `ending_victory` in the same frame. The
    result observation showed the circlet sitting in visible_objects with available_actions:[] and
    ended=true — the tester NEVER got to choose "take circlet," yet the epilogue narrated "You lift the
    circlet from its plinth," an act they never performed. The chamber's whole reason to exist (the goal
    item) was presented and resolved at once, so the climax was narrated AT the player instead of earned
    by a final grab. Verdict: "would finish successful but slightly underwhelmed."
root_cause: >
  The parser and RPG runners evaluated win_conditions ONLY inside `onEnter` — fired on a room
  transition (src/parser/runner.ts header: a win that must fire without a move was "out of scope for
  v1"). So a win that should turn on a deliberate non-move action (claiming the relic, administering a
  cure) could only ever fire on bare room entry. sunken_barrow's win was `{ visited: relic_chamber }`,
  so descending the stair WAS the win — the takeable circlet was decorative. This is the engine flavour
  of the family flagged by bug_0047 (auto-taken circlet) and bug_0054 (sealed_crypt's decoupled +20).
improvement:
  layer: engine + content
  engine:
    - src/core/engine.ts: >
        Added a backward-compatible post-action win hook (§8.4.5). After an action's effects and any
        onEnter, if the game has NOT already ended, the rule set's optional `checkWin(state)` may append
        an end_game. So a win can fire on a TAKE/USE with no move. Skipped once ended, so an onEnter or
        effect-level end_game never double-fires. Runners whose wins only fire on entry omit checkWin
        (CYOA) and are byte-identical.
    - src/core/engine.ts (Rules type): added the optional `checkWin?(state): Effect[]` member, documented
        as complementary to onEnter (reach-the-room wins) vs checkWin (act-in-the-room wins).
    - src/parser/runner.ts: implemented checkWin via the existing winningEnding predicate; header note
        updated (the "out of scope for v1" limitation is resolved).
    - src/rpg/runner.ts: implemented checkWin identically (the RPG runner has its own buildRpgRules).
  content:
    - content/rpg/quests/sunken_barrow.yaml: >
        win_conditions.claim_relic now requires BOTH `{ visited: relic_chamber }` AND
        `{ has_item: circlet }` (implicit all_of). Entering the chamber no longer wins (you do not hold
        the crown yet) — the room shows the circlet on its plinth and offers "take circlet"; the win
        fires on that TAKE via the engine hook. `{ visited: relic_chamber }` is KEPT deliberately: it is
        the only `visited` term in any win, and the parser validator derives its SOFTLOCK guard (every
        reachable room can still reach a win) from `visited` win-rooms — dropping it would silently
        disable that check. The ending_victory epilogue was reworded to follow the deliberate TAKE
        ("The cold crown is yours…") instead of re-describing lifting it from the plinth. The relic
        chamber's on_enter +25 (chamber-reached milestone) is unchanged; max score is in hand as the
        player makes the final grab. No flag/exit/reachable-ending/score-total change.
