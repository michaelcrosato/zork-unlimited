id: bug_0361
title: Dead Reckoning deck prose implies an unheard girl has already been engaged
severity: content
status: fixed
root_cause: >
  A fresh MCP blind playtest found a state-honesty mismatch after the player read
  Hale's log and took the pistol before visiting the hold. The course-known deck
  variants said the girl waited to learn what the player meant to do, implying a
  relationship and expectation that only exists after the player has heard her out.
fix: >
  Reword the course-known/no-pilot deck variants to describe the stowaway as still
  unheard by the player and only named by the crew's fear. Keep the stronger waiting
  language on the pilot-known variants where the player has actually spoken with her.
files_changed:
  - content/cyoa/pack/dead_reckoning.yaml
regression_test:
  - tests/regression/dead_reckoning_unheard_girl_state.test.ts
