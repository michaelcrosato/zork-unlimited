id: bug_0284
title: "midnight_edition alley_door: base text names Garrow before player has read the letter"
pack: midnight_edition_v1
scene: alley_door
class: reactive-description-blindness
severity: content
discovered_by: blind_playtest
playtest_report: ai-runs/2026-06-08T04-18-18-429Z/playtest.md
seed: 42

description: |
  The alley_door scene's base text reads "Garrow's yard-men, and not a printer's tool
  among the hammers and the wrecking-bar" — naming the antagonist and attributing the
  hired men to him — even when the player has not yet read the letter that introduces
  Garrow. The composing_room opening mentions only anonymous "boots on the cobbles that
  do not sound like printers going home." Reading the letter (which sets quest stage
  story_in_hand) is what establishes Garrow's name and motive.

  The four quest_stage variants (story_in_hand / proof_sought / proof_found / door_barred)
  all correctly name Garrow because they fire only after read_letter has been chosen.
  The base text — firing when no quest stage is set — is the one form reachable without
  prior context.

  Same reactive-description-blindness class as bug_0120/0134/0282/0283: scene text
  presumes knowledge the player has not yet acquired.

reproduction: |
  1. new_game(midnight_edition_v1, seed=42)
  2. go_alley (before read_letter)
  3. Observe alley_door text: "Garrow's yard-men, and not a printer's tool…"
  4. Player has not yet encountered the name Garrow.
  → Base text leaks the antagonist's identity before any in-game introduction.

fix: |
  Changed "Garrow's yard-men" to "Hired men" in the alley_door base text only.
  All four quest_stage variants (story_in_hand / proof_sought / proof_found) and the
  door_barred variant are unchanged — they correctly name Garrow since they fire only
  post-letter-read. The base text now uses neutral attribution that matches the
  composing_room's anonymous framing of the men at the door.

  Added an inline comment above the base text explaining the constraint.

locked_by:
