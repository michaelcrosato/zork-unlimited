id: bug_0470_ferryman_crossed_evidence_honesty
title: "Ferryman walk-away ending stays evidence-honest"
pack: content/cyoa/pack/ferrymansprice.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T214948Z_ferrymansprice_seed7.md
severity: S2
symptom: >
  A blind playtester reached the walk-away ending after reading only the lease
  notice, but the ending claimed the player knew "everything": the receipt, the
  blood in the wood, and the ferryman's denial in the hut.
root_cause: >
  The ending variant was gated only on knows_truth, a flag set by the lease
  notice. That flag records motive knowledge, not the full evidence chain.
fix: >
  Split the walk-away ending into ordered evidence-specific variants. The full
  account requires the receipt, lease notice, bloodstain, and hut denial; partial
  paper evidence names only the papers; lease-only knowledge now avoids naming
  undiscovered clue categories.
tests:
  - tests/regression/ferrymansprice_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/ferrymansprice_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/ferrymansprice.yaml
  - npm run health
