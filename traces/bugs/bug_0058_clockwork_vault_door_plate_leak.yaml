bug_id: bug_0058
pack_id: clockwork_heist_v1
seed: 53
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T16-23-20-676Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester reached all four endings
    (Truth x2 epilogue variants, Rich, Caught) across four runs (seed 53), rating it
    clarity 5/5, enjoyment 4/5, mechanically flawless — zero rejected actions, no
    loops, no soft-locks. Its one concrete, not-already-closed finding (report §5,
    "Minor narrative leak, vault_door"): on the route that climbs the grand stair
    straight to the vault without ever entering the study (climb_stairs ->
    approach_vault, Run 3), the vault-door scene text "echoes" the steward's brass
    plate — "The brass plate's warning echoes: force will not open this" — even
    though that plate hangs in the study and the player has never read it. The
    pack's prose is otherwise scrupulously route-aware (the ledger-gated variants),
    so this lone unconditional brass-plate reference is an out-of-character leak.
failure:
  type: scene_text_references_unseen_clue
  where:
    - content:content/cyoa/pack/clockwork_heist.yaml
  description: >
    The `vault_door` base scene text and the `study_lock` no-pick nudge narration
    both quoted the steward's brass wall-plate ("force will not open this" / "the
    brass plate's warning rings true"). The brass plate is part of the `study`
    scene's text, seen only on entering that room. Both vault-door references fire on
    routes that never pass through the study (foyer -> climb_stairs -> landing ->
    approach_vault / study_lock), so the prose attributed to the player a warning they
    had not read — a continuity leak in a pack whose every other reactive line is
    gated on what the player actually knows (read_ledger, letter_displayed, etc.).
fix:
  layer: content
  summary: >
    Route-aware legibility fix, mirroring the pack's existing variant philosophy.
    (1) `study.on_enter` now sets a new flag `saw_plate` — entering the study is when
    the thief reads the brass plate. (2) `vault_door` base text is rewritten PLATE-NAIVE:
    it telegraphs pick-don't-force from the lock's own "patient, fastidious" feel,
    quoting no plate. A new variant gated on `has_flag: saw_plate` restores the
    brass-plate echo for players who visited the study; it sits below the existing
    ticks>=4 + read_ledger patrol variant (first-match-wins) and above the base, so a
    study-visitor before the hour still gets the plate line, the patrol case is
    unchanged (read_ledger implies a study visit), and only the no-study route gets the
    naive text. (3) The `study_lock` narration drops "the brass plate's warning rings
    true" for "you can feel it in the mechanism" — it can fire on a no-study route, so
    it now learns "force won't open it" from the lock itself; tool/instrument/steady-hand
    wording (asserted by bug_0008's test) is preserved. NO flag-gate/tick/route/
    reachable-ending change beyond the additive `saw_plate` flag; all four endings
    (rich/truth/caught/patrol) still fire.
  reachable_endings_changed: false
  content_hash_changed: true        # clockwork is unpinned in unit tests (only watchtower_road is pinned). 98fd1a83b0b4a0e0232d9663be3ff781d39c45f273a9ad3e92c9d8990ad83d87 -> 82491f3f1938e64761329803ea701ba3eb7a9c4b5da3b408431399929f425296
  regression_test: tests/regression/clockwork_vault_door_plate_leak.test.ts
verified_live: >
    Through the engine over the compiled pack (seed 53), building observations the way
    the MCP server does (buildObservation). No-study route (climb_stairs ->
    approach_vault): vault-door text matches NEITHER /brass plate/ NOR the patrol prose
    — the plate-naive base. Study route before the hour (climb_stairs -> enter_study ->
    leave_study -> approach_vault, ticks 3, saw_plate set, read_ledger unset): the
    saw_plate variant fires (text matches /brass plate/, not the patrol prose). Careful
    ledger route at the hour (ticks 4 + read_ledger): the patrol crossing variant still
    fires (matches "pressed to the automata" + the plate). study_lock narration on a
    no-study route no longer matches /brass plate/ and still routes to the gallery.
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest remains the load-bearing quality
    signal; seed 53 rated the pack shippable (clarity 5/5, enjoyment 4/5) and this fix
    closes its one remaining concrete continuity finding, continuing the clockwork
    polish family without touching any tuning.
