id: bug_0163
title: "Held-out corpus persistence — seal the throwaway in-memory generator windows into a committed, content-hash-sealed held-out split with a standing re-mint-and-verify gate"
kind: invariant_lock
mode: cyoa+rpg
severity: enhancement
layer: test
artifact:
  source: bin/seal-corpus.ts
  corpus: corpus/manifest.json
  test: tests/regression/held_out_corpus_sealed.test.ts

summary: >
  The procedural generators (src/gen/{cyoa,rpg}_generator.ts, bug_0156→0162) already mint fresh,
  schema-valid, validator-clean packs the assessor checks every cycle — but every minted pack was
  minted-and-DISCARDED in memory. So the contamination defense the whole benchmark thesis rests on
  (a moving, never-frozen eval distribution) had NO committed, reproducible artifact: nothing on
  disk, no chain-of-custody, nothing the future scorecard or a keyed real-model run could anchor to.
  This lands the #1 deferred slice named by docs/ULTRAPLAN-2026-06-02.md and the prior CURRENT_PLAN:
  PERSISTENCE. It converts a FIXED seed window (CYOA [0,1,2,3], RPG [0,1,2,3]) into a committed,
  content-hash-sealed held-out split under a NEW top-level corpus/ dir, plus a standing regression
  gate that re-mints and re-verifies every entry. Key-free, offline, wall-clock-free: the hashState
  seal IS the reproducibility proof (§8.5/§8.6); the git commit timestamp (post the relevant model
  cutoffs) supplies the contamination chain-of-custody.

mandated_blind_playtest:
  rotation_note: >
    Per [[assessor-blind-pass-rotation]] / [[content-polish-backlog-exhausted]] the least-recently
    blind-played pack is clockwork_heist (CYOA, last dedicated pass bug_0153). This cycle is a
    structural/breadth slice (persistence), not a content fix; the rotation pass remains owed on
    clockwork_heist for the next content-touching cycle. No content/engine/validator/schema changed.

root_cause: >
  The generator program shipped both modes as LIVE assessor levers (CYOA bug_0158, RPG bug_0162) but
  deliberately kept persistence out of those slices to stay one-focused (every generator file's own
  header names "persistence of a held-out corpus" as explicitly deferred-next). There was no
  writeFileSync/mkdir in src/gen/ or the assessor mint path: the eval distribution existed only as an
  in-memory window the assessor mints and throws away each cycle. A benchmark whose held-out set is
  never committed cannot be defended as uncontaminated — the missing piece was the on-disk substrate.

what:
  - >
    src/gen/cyoa_generator.ts + src/gen/rpg_generator.ts — ADDITIVE EXPORTS ONLY: `export const
    CYOA_GENERATOR_VERSION = 1` / `RPG_GENERATOR_VERSION = 1`. These do NOT change any emitted pack
    byte (every seed-pinned generator unit test and the corpus hashes are unchanged); they are
    recorded in the manifest only, so a FUTURE generator change is a loud, diagnosable manifest
    mismatch ("generator changed", a deliberate version bump) rather than silent corpus rot vs a
    tampered content hash. src/gen/* are NOT in PROTECTED_FILES, so the additive export does not trip
    verify-integrity.
  - >
    bin/seal-corpus.ts — NEW CLI (mirrors bin/benchmark.ts style; #!/usr/bin/env -S npx tsx). For each
    FIXED, hard-coded seed (CYOA [0,1,2,3], RPG [0,1,2,3] — NOT read from AI_LOOP_STATE.md, so the
    corpus is a stable committed snapshot, not a moving window): generateCyoaPack/generateRpgPack,
    then validateCyoa/validateRpg — THROW if any finding (refuses to seal a dirty corpus). Writes each
    pack as YAML (yaml stringify) to corpus/{cyoa,rpg}/<pack_id>.yaml, and a deterministic, key-sorted
    corpus/manifest.json of {mode,seed,pack_id,generator_version,content_hash} where content_hash =
    hashState(pack) (the SAME hash the MCP generate_pack/generate_rpg_pack tools emit).
  - >
    corpus/ — NEW committed deliverable: corpus/cyoa/gen_{0..3}_v1.yaml, corpus/rpg/genrpg_{0..3}_v1.yaml,
    corpus/manifest.json (8 entries). Lives under the NEW top-level corpus/ dir, NEVER under
    content/{cyoa,parser,rpg}/pack — so all_packs_validated_by_bar.test.ts's discovery still returns
    EXACTLY the 10 curated packs and no blind-playtest obligation is added.
  - >
    tests/regression/held_out_corpus_sealed.test.ts — NEW standing gate (mirrors
    all_packs_validated_by_bar.test.ts's discovery/zero-error pattern). For EVERY manifest entry it
    asserts: (1) re-mint determinism (re-mint from seed ⇒ hashState == recorded content_hash); (2)
    generator_version == live CYOA/RPG_GENERATOR_VERSION; (3) YAML round-trip stability (parse the
    committed YAML, re-hash, == content_hash); (4) production-bar clean (validateCyoa/validateRpg ⇒
    zero findings); (5) manifest entry count == seeded window size. +9 test cases.
  - >
    package.json — add `"corpus:seal": "npx tsx bin/seal-corpus.ts"`. The VERIFY is the regression
    test itself, already picked up by the tests/regression/ glob under `npm test` ⇒ `npm run health`;
    no redundant health step added.

fix: >
  The throwaway in-memory mint windows are now a committed, content-hash-sealed held-out corpus with a
  standing re-mint-and-verify regression gate wired into npm run health. The corpus STRENGTHENS the
  bar (a tamper/determinism + zero-findings check tied to the production validators) and never weakens
  one. generator_version makes the natural NEXT cycle (deepen the generators) honest: a hash mismatch
  becomes diagnosable as "generator changed" (a version bump + re-seal) vs "corpus tampered".

regression:
  test: tests/regression/held_out_corpus_sealed.test.ts
  asserts: >
    Every corpus/manifest.json entry re-mints to a byte-identical content_hash, its committed YAML
    round-trips to that hash, its generator_version matches the live constant, and validateCyoa/
    validateRpg returns zero findings; the manifest entry count equals the 4+4 seeded window.

verification:
  - "npm run health EXIT 0 — additive: two new exports + one CLI + one committed corpus + one
    regression test + one npm script; no test deleted/disabled, no hash pin moved, no guard weakening
    (verify-integrity.ts untouched), no content/engine/validator/schema/assessor change. Net test
    count RISES (+9), so the guard's count-regression checks stay satisfied."
  - "npm run verify:integrity GREEN, no GUARD_WEAKENED / protected-deletion finding (generators get an
    additive export only; src/gen/* are not in PROTECTED_FILES)."
  - "all_packs_validated_by_bar.test.ts STILL PASSES — discovery returns EXACTLY the 10 curated packs
    (proof corpus/ did not pollute content/*/pack)."
  - "Re-running `npm run corpus:seal` a second time produces a byte-identical corpus/ tree and
    manifest.json (git diff empty) — proves end-to-end determinism."

next_suggested_focus: >
  The held-out corpus now EXISTS on disk (committed, content-hash-sealed, re-mint-verified). The
  natural follow-ups, in order: (a) DEEPEN the generators (multiple enemies / combat_guaranteed
  fairness / deeper maps for RPG; deeper graphs / vars / multi-axis knowledge for CYOA) so each mint
  stresses MORE of the validator — now safe to do behind a generator_version bump + re-seal; (b) wire
  corpus/ into the benchmark scorecard (buildScorecard plays only curated disk YAML today — the
  thesis bridge, meaningless until now, sensible next that the corpus is real); (c) a parser generator
  to complete the mode trilogy; (d) add generators / GEN_EVAL_CHECK_COUNT to PROTECTED_FILES as a
  separate trust-boundary hardening cycle. The keyed real-model author→play→fix→lock run remains the
  highest-value move overall but stays gated on owner API-key authorization. Blind-pass rotation: the
  least-recently blind-played pack remains clockwork_heist (CYOA, last dedicated pass bug_0153) —
  rotate the next mandated content pass there.
