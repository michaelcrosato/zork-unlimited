id: bug_0416
title: Ferryman's Price willow cache still showed removed documents
pack: content/cyoa/pack/ferrymansprice.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  After the player took both the travel receipt and the lease notice from the
  willow bundle, the cache scene still described both documents as sitting in
  the pack. Returning through the leave action therefore contradicted the
  inventory and the investigation's central evidence trail.
root_cause: >
  willows_cache had no reactive scene variants. The receipt and lease choices
  correctly retired and added inventory, but the base cache description was
  reused regardless of which documents had already been removed.
fix: >
  Added state-specific willows_cache variants for receipt-only, lease-only, and
  both-documents-removed states so the bundle text remains synchronized with
  the player's evidence.
tests:
  - tests/regression/ferrymansprice_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/ferrymansprice_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/ferrymansprice.yaml
