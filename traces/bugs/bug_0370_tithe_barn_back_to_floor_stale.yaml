id: bug_0370
title: "tithe_barn: back_to_floor reset barn text after confronting thief"
pack: content/cyoa/pack/tithe_barn.yaml
detected_by: blind_playtest_20260620T064505Z_tithe_barn_seed7
severity: moderate

description: >
  After go_in -> face_thief -> back_to_floor, granary_floor rendered the same
  first-look prose used before the confrontation: the thief was "frozen against
  the far sacks" and waiting "to see what kind of man the lord has set on them."
  That contradicted the immediately preceding reckoning scene, where the woman
  had already met the player eye-to-eye and said, "Do what he pays you for."

reproduction:
  - go_in
  - face_thief
  - back_to_floor

fix:
  type: content
  change: >
    The face_thief choice now sets a pure reactive-prose flag, faced_thief.
    granary_floor has ordered variants for faced_thief alone and for the combined
    faced_thief + knows_truth state, so returning from reckoning remembers that
    she has spoken while preserving the existing truth-gated public-justice route.
  files_changed:
    - content/cyoa/pack/tithe_barn.yaml

regression_test: tests/regression/tithe_barn_back_to_floor_reactive.test.ts
