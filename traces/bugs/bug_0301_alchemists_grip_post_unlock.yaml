id: bug_0301
title: "Alchemist's Tower: grip iron key persists in Great Hall after cellar unlocked"
pack: content/parser/pack/alchemists_tower.yaml
scene: great_hall
category: orphaned_action
severity: minor
found_by: blind_playtest
seed: 7
date: 2026-06-08

description: >
  After the player uses the iron key to unlock the cellar hatch (unlock_cellar_door
  in the Great Hall), the `grip iron key / use_iron_key` steadiness beat (the
  optional skill_check tension moment added by bug_0261) continued to appear in the
  available_actions list in the Great Hall. The beat's narration — "before you set
  this key to anything down here" — is past-tense once the hatch is open: the player
  has already set the key to the one iron lock in the hall. Bug_0261 gated the beat
  to { in_room: great_hall } so it stopped trailing the player into other rooms, but
  did not retire it when the beat's own moment was over.

fix: >
  Added { none_of: [{ is_unlocked: cellar_door }] } as a third condition on the
  iron_key USE interaction (the grip beat). The condition uses the DSL's universal
  negation (`none_of`) to express "cellar_door is NOT yet unlocked" — no new flags,
  no changes to cellar_door. The beat now appears only in the Great Hall when the
  hatch is still locked (the moment the narration describes) and disappears once the
  hatch is open. Still fully convergent: gates nothing structural on either roll
  outcome; every ending, the 40-point economy, and every structural proof are
  byte-identical.

regression_test: tests/regression/alchemists_grip_post_unlock_retired.test.ts
