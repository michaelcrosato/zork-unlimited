  finding: >
    The cycle's mandated blind pass rotated OFF the assessor's rank-1 target (the CYOA
    pack The Clockwork Heist — ~20 consecutive pristine blind passes, over-fitted across
    bug_0019–bug_0072; project memory: "content-polish backlog exhausted, pivot to
    structural") and onto the LEAST-attended pack in the library: The Sunken Barrow,
    which had ZERO bug artifacts, no NPC, and the most linear arc. A fresh MCP-only
    playtester (seed 31) reached ending_victory at 50/50, found ZERO defects, and rated
    it clarity 5/5 but enjoyment 3/5. Its single, repeated note — the same one every
    prior barrow playtester has landed — is BREVITY + LINEARITY: "there's exactly one
    path and one meaningful choice (grab the bar) … Mechanically it is rock-solid; I'd
    ship it as-is and only wish it were longer." It also rated the lone fight a real
    "even-ish trade … I finished at 11 HP", i.e. NOT toothless.
improvement:
  layer: content   # purely additive; nothing on the existing critical path changes
  what: >
    Gave the barrow its FIRST NPC and a real optional beat — the reaver's shade. Added
    a new side cell (reaver_rest) reached by a new `west` exit off the Entry Hall, met
    BEFORE the wight, housing the lingering shade of a prior grave-robber the wight
    killed. The shade offers one-shot, conditional, MECHANICAL counsel mirroring the
    cold_forge lantern-spirit shape (bug_0021/bug_0014) the barrow itself never received:
      (a) ask_wight → a +2-DEFENSE ward (the barrow's distinct boon; cold_forge's is +2
          attack) — set_flag heard_warding, inc_var defense by 2, journalled; the topic
          then retires (one-shot, can't be farmed);
      (b) ask_lord → lore about the Barrow-Lord and the circlet (the crown is old and
          cold, not cursed; the niche-wight was his sworn guard) — deepens the world,
          one-shot, journalled;
      (c) leave_shade → ungated `end: true`, so the root stays TERMINATING (a gated-only
          node would trip DIALOGUE_NONTERMINATING).
  honest_not_oversold: >
    Per the barrow's honesty discipline (bug_0027/0029/0069) the shade does NOT over-sell
    the danger or promise a mechanic that does not exist. The seed-31 player rated the
    wight a genuine even trade, so easing its cold blows (+2 defense) genuinely matters —
    yet the shade says plainly the ward "will not swing your blade for you, but the cold
    will bite the less". The wight stays winnable AND lethal from base stats; the ward is
    optional grace, not a requirement.
  preserves_critical_path: >
    Nothing on the existing path changes — rooms (combat/lever/relic), the milestone
    scoring (still 50), the win (claim on TAKE circlet), and every existing barrow
    regression stay green. The shade is a pure detour; the canonical victory route skips
    it entirely.
