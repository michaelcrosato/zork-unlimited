id: bug_0441_weighmasters_documented_gate
title: "Weighmaster documented ending requires the receipt's two figures"
pack: content/parser/pack/weighmasters_round.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T145515Z_weighmasters_round_seed7.md
severity: S2
symptom: >
  Taking Cope's hidden ledger set fraud_proved and opened the north exit even if the
  player skipped the false-scale and true-scale measurements, while the documented ending
  claimed the receipt carried both figures.
root_cause: >
  The market-yard exit was gated only on deputy_receipt plus fraud_proved, but the ending
  text also depended on weighed_false and weighed_true being true.
fix: >
  Added weighed_false and weighed_true to the north exit conditions, and updated the
  locked message/comments to tell the player the receipt needs both figures.
tests:
  - tests/regression/weighmasters_round_documented_gate.test.ts
verification:
  - npm test -- --run tests/regression/weighmasters_round_documented_gate.test.ts tests/regression/weighmasters_round_floorboard_payoff.test.ts tests/regression/weighmasters_round_reactive_taken_items.test.ts
  - npm run validate -- content/parser/pack/weighmasters_round.yaml
  - npm run health
