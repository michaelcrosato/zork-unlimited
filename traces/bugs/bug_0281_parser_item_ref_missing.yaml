bug_id: bug_0281
component: verification   # a missing reference-integrity check in the validator, not a content/pack defect
# Surfaced by ultraplan re-aim cycle #15: allEffects already iterates add_item targets
# (line 486, for the obtainability fixpoint) and remove_item targets (line 491), but only
# into the `granted` / `removed` sets — neither was cross-checked against objById. A
# typo'd `add_item: "lantren"` silently inserts a phantom string into inventory with no
# description, no interaction entries, and a nonsense label; a typo'd `remove_item: "lantren"`
# silently no-ops, leaving puzzle state wrong. No existing check catches either case:
# ITEM_REQUIRED_UNOBTAINABLE only fires on has_item gates whose item cannot be obtained —
# it does NOT check that the item is a declared object id. Bug_0277 sealed room-ref
# conditions + goto/place_object.room; bug_0278 sealed unlock_exit.from/.to; bug_0281 seals
# add_item/remove_item item refs — together these cover all three reference families,
# completing intra-frame reference integrity.
class: soundness/validator
title: >
  validateParser did not check add_item/remove_item effect targets against pack.objects —
  a typo'd item id silently inserts a phantom inventory entry or silently no-ops a removal,
  leaving puzzle state wrong with no existing oracle catching it.
findings:
  - id: item_ref_missing_unwitnessed
    where: src/validate/parser_validator.ts validateParser body (no ITEM_REF_MISSING emit block; allEffects used for obtainability but not for item-ref integrity)
    severity: low   # latent: 0 dangling item refs in all 17 shipped packs, gap is undetected for future authored/generated packs
    description: >
      allEffects(pack) was already used at lines 486/491 of validateParser to collect
      add_item and remove_item targets into the `granted` and `removed` sets for the
      obtainability fixpoint — but neither set was ever cross-checked against objById (the
      Map<string, ParserObject> built from pack.objects at line 111). A typo'd `add_item:
      "lantren"` would silently insert the phantom string "lantren" into the player's
      inventory at runtime: the engine's applyEffect receives the id, calls
      state.inventory.add("lantren"), and the string persists in inventory with no object
      description, no interaction entries, and a nonsense label. A typo'd `remove_item:
      "lantren"` would silently no-op: state.inventory.delete("lantren") removes nothing,
      the puzzle state is wrong, and no error is reported. ITEM_REQUIRED_UNOBTAINABLE (the
      liveness check) only fires on has_item gates whose item cannot be obtained — it does
      NOT require that the item id exists as a declared object. Zero dangling item refs
      exist across all 17 shipped packs (confirmed by scan) — the gap was latent but
      undetected for any future authored or generated pack with a typo'd item id.
    fix: >
      Added a dedicated ITEM_REF_MISSING emit block in validateParser, placed immediately
      before the AMBIGUOUS_ALIAS block (after UNLOCK_EXIT_ROOM_MISSING). Iterates
      allEffects(pack), extracts the item id from any add_item or remove_item effect, and
      checks it against objById — emitting err("ITEM_REF_MISSING", ..., ["object:"+itemId])
      for each dangling id. Added ITEM_REF_MISSING to the bail-early guard (alongside
      EXIT_TARGET_MISSING, START_MISSING, and UNLOCK_EXIT_ROOM_MISSING) because a dangling
      item id could corrupt the obtainability fixpoint that uses objById. Added a broken
      fixture (content/broken-fixtures/parser_item_ref_missing.yaml), registered it in the
      unit test VALIDATOR_FIXTURES array, added the ITEM_REF_MISSING case to the negative
      corpus, and added the dedicated §15 regression test. RPG is covered for free:
      rpg_validator.ts delegates to validateParser — no rpg_validator.ts edit.
soundness_argument: >
  This seals intra-frame item-reference integrity, completing the assume-guarantee ladder
  toward the deferred world-frame manifest. Bug_0277 sealed room-ref conditions and the
  goto/place_object.room effects; bug_0278 sealed unlock_exit.from/.to room refs; bug_0281
  seals add_item/remove_item item refs — together these cover all three reference families
  (room refs, unlock_exit room refs, item refs) in the pack schema. Error severity is sound:
  a dangling item id is a structural defect (a phantom inventory entry or a silent no-op
  removal, never a deliberate transient), identical class to EXIT_TARGET_MISSING. Adding
  ITEM_REF_MISSING to the bail-early guard is sound: a dangling item id in an add_item
  effect could corrupt the obtainability fixpoint (which builds a `granted` set from
  add_item targets, then checks that set against objById in liveness analysis). The check
  keys STRICTLY on objById membership (the same Map as all other object-id checks), so it
  cannot false-positive on a declared object and tempt a weakening of a real pack to
  silence it. Purely ADDITIVE (a new error code) — no existing matcher weakened;
  verify:integrity's count/floor guards remain the bar and stay green. The dedicated
  regression proves the check FIRES on a dangling add_item (case b), a dangling remove_item
  (case c), both dangling in the same pack (case e), and proves NON-VACUITY (case d:
  correct id clears it) — the same SoundnessBench discipline (arXiv:2412.03154) the
  INERT_OBJECT_STATE / negative corpora (bug_0182/0218/0253/0262/0277/0278) use. The
  shipped-packs-stay-green invariant (auto-discover + iterate every parser + RPG pack,
  assert zero ITEM_REF_MISSING) pins that no real pack emits the new code (verified: 0
  dangling item refs), preventing a vacuous always-fire implementation.
failure:
  type: latent_soundness_gap
  description: >
    validateParser checked objById membership for object references in room.objects
    (ROOM_OBJECT_MISSING) and container.contents (CONTAINER_CONTENT_MISSING), but never
    for add_item or remove_item effect targets. A typo'd item id would silently pass all
    validation and produce a phantom inventory entry or a silent no-op removal at runtime,
    with no existing oracle (SOFTLOCK, BFS solver, ITEM_REQUIRED_UNOBTAINABLE,
    metamorphic relabel) catching it.
regression_test: tests/regression/parser_item_ref_missing.test.ts
