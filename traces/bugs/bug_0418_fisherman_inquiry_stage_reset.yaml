id: bug_0418
title: Fisherman's Privilege reset inquiry progress on every office return
pack: content/cyoa/pack/fishermans_privilege.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  The blind playtest observed that entering the magistrate's office repeatedly
  fired set_quest_stage(the_inquiry, complaint_received), so questStage never
  advanced even after the clerk confirmed the licence, read the exemption rule,
  heard witnesses, and inspected the muster.
root_cause: >
  The hub scene used an unconditional on_enter quest-stage write for the initial
  complaint state. Because every spoke route returns through the same hub, that
  write clobbered any later progress marker.
fix: >
  Removed the unconditional hub-stage reset and moved the_inquiry stage writes
  onto the actual evidence and resolution actions, so the progress marker follows
  the latest substantive record added to the file.
tests:
  - tests/regression/fishermans_privilege_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/fishermans_privilege_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/fishermans_privilege.yaml
