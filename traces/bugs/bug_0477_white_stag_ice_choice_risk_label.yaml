id: bug_0477_white_stag_ice_choice_risk_label
title: "White Stag ice crossing could read as a safe communion path"
pack: content/cyoa/pack/white_stag.yaml
reported_by: blind_playtest_20260622T232108Z_white_stag_seed7
severity: low
symptom: >
  The tarn prose fairly warned that the ice was rotten, but the stag's mystical
  framing could make the crossing feel like an invitation to approach or commune
  with it rather than a lethal physical shortcut.
root_cause: >
  The action label said to chance the ice toward the stag, but it did not put the
  physical risk first strongly enough to counterbalance the otherworldly stag prose.
fix: >
  Reworded the `cross_ice` label to "Risk the rotten ice itself and cross straight
  toward the stag." Route topology, flags, quest stages, and the death ending are
  unchanged.
tests:
  - tests/regression/white_stag_ice_choice_risk_label.test.ts
verification:
  - npm test -- --run tests/regression/white_stag_ice_choice_risk_label.test.ts
  - npm run validate -- content/cyoa/pack/white_stag.yaml
