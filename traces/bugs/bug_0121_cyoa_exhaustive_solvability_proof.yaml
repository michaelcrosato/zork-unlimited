bug_id: bug_0121
pack_id: ALL_CYOA   # clockwork_heist_v1, watchtower_road_v1, wreckers_light_v1
seed: 7
evidence:
  source: blind_playtest + structural_gap_analysis
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T11-46-12-813Z/playtest.md   # clockwork_heist, seed 23
  second_report: (in-session general-purpose blind pass)          # sealed_crypt, seed 19
  finding: >
    The assessor's entire rank-list this cycle was six identical "blind-playtest pack X —
    the coverage bot can't solve its puzzles, so quality is unverified" items at 0.5 value.
    The mandated rank-1 target, The Clockwork Heist (seed 23), came back clean for the ~Nth
    straight cycle: a fresh source-blind MCP-only subagent reached ALL FOUR endings, rated
    it clarity 5/5 enjoyment 4/5, ZERO functional blockers; both "design flaws" it raised
    (ledger gates nothing / ticks cosmetic) are false positives already implemented AND
    test-locked (clockwork_guard_patrol_deadline, clockwork_patrol_reachable_in_careful_play,
    clockwork_deadline_enforced) — the tester simply took fast clean routes that, by design,
    never meet the generously-tuned teeth. A second blind pass rotated onto the least-attended
    pack, sealed_crypt (parser, seed 19): also solved 35/35, clarity 5/5, ZERO bugs. Content
    is blind-exhausted (project memory: content-polish-backlog-exhausted). The recurring
    "coverage bot can't solve it -> unverified" complaint is the real, structural signal.
failure:
  type: not_a_defect_structural_verification
  description: >
    The reason every puzzle pack is perpetually "unverified" is a genuine gap in the bar,
    not a content defect:
      - The CYOA validator's ENDING_UNREACHABLE is, by its own header (src/validate/
        cyoa_validator.ts:6), a "documented, conservative approximation" over an OVER-
        approximated abstract scene graph. It is sound for "this IS unreachable" but is
        NOT a proof that a declared ending IS reachable — it abstracts away precise gating
        (item consumption, var thresholds, mutually-exclusive flags, deadline arithmetic),
        so an ending can pass the static check yet be dynamically unreachable.
      - `npm run health` runs a DYNAMIC playthrough on only ONE of seven packs
        (watchtower_road, via the random/heuristic coverage bot), and that bot — by the
        assessor's standing note — cannot solve the puzzles, so it reaches only a subset of
        endings (e.g. it never finds clockwork's deadline ending_overstayed or ending_patrol).
        Every other pack's dynamic solvability rested on scattered, incidental per-bug golden
        routes; no single guarantee asserted "this pack is winnable to EVERY declared ending."
fix:
  layer: test   # structural verification; pure test addition, no production code touched
  summary: >
    Add an exhaustive CONCRETE solver that proves dynamic solvability as ground truth,
    closing both gaps. For every shipped CYOA pack (auto-discovered from content/cyoa/pack)
    it runs a breadth-first search over the engine's own legal action space —
    buildObservation's available choices fed back through makeStep, including the
    meta.deadline checkWin — keyed on the full game state (current scene, true flags,
    inventory, every numeric var), and asserts the set of endings ACTUALLY reached by play
    equals the set declared. A declared-but-unreachable ending (dead content the static
    approximation may miss) fails; a reached-but-undeclared ending (dangling end target)
    fails; and a future regression that severs any route fails. The search is bounded by a
    200k-state safety cap and the test FAILS if the cap is hit, so it can never silently
    pass by truncating an unexplored region — sound by construction.
  regression_test: tests/regression/cyoa_all_endings_reachable.test.ts
  scope: >
    CYOA only this cycle (choice-only action space, finite and cheap to exhaust). The
    parser/RPG modes, whose action space is verb x object, are the natural next extension.
  reachable_endings_changed: false   # proves existing reachability; changes no content
  content_hash_changed: false        # no pack edited
verified_live: >
  Ran the exhaustive solver over all three shipped CYOA packs (seed 7):
    - clockwork_heist: 822 distinct states, reaches ALL 5 declared endings, including
      ending_overstayed (the ticks>=10 deadline) and ending_patrol — the very endings the
      random coverage bot cannot plan to.
    - watchtower_road: 1930 states, all 3 endings (truth / escape / captured).
    - wreckers_light: 127 states, all 4 endings (saved / wrecker / mercy / drowned).
  Every search exhausted well under the cap; missing-ending set empty for all three.
playtest_coverage:
  note: >
    This converts the perpetual "puzzle packs unverified because the heuristic coverage bot
    can't solve them" status into a green, deterministic, exhaustive guarantee in the test
    bar — the automated dynamic check the manual blind playtests have been standing in for.
    A new CYOA pack is auto-covered the moment it ships (directory discovery), matching the
    health-covers-all-packs bar (bug_0096). Both packs blind-tested this cycle remain
    verified-clean; this cycle's improvement is the structural pivot the exhausted content
    backlog calls for.
