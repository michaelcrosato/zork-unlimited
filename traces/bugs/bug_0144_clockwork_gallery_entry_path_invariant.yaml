evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T17-36-51-091Z/playtest.md   # clockwork_heist seed 23 (the cycle's mandated, correctly-rotated target — least-recently blind-played at bug_0135)
  finding: >
    The mandated blind pass on The Clockwork Heist (CYOA, seed 23 — the
    least-recently blind-played pack per [[assessor-blind-pass-rotation]], last
    attended at bug_0135 seed 5) reached THREE declared endings (rich / truth /
    caught; truth in both letter-variant prose forms) and rated the pack clarity
    5/5, enjoyment 4/5, ZERO true bugs. Its two §4/§5 notes are the standing
    clockwork "cosmetic clock" false-positive class (see [[cyoa-exhaustive-solver]]
    / [[content-polish-backlog-exhausted]]):
      (1) "the ticks/chime urgency writes a check the mechanics don't cash on a fast
          route" — INTENDED: meta.deadline fires ending_overstayed at ticks>=10,
          tuned GENEROUS on purpose (bug_0079, test-locked by
          clockwork_deadline_enforced) so it never punishes honest play (~4–6 ticks)
          and only bites aimless circling; the patrol's real bite is the on-the-hour
          blind crossing (cross_to_vault_blind -> ending_patrol), which a fast route
          simply avoids.
      (2) "the gallery shows different text depending on entry path (dumbwaiter vs
          grand stairs)" — EMPIRICALLY FALSE. Verified live via MCP (sessions 5/6/7,
          seed 23): the `landing` scene text is a pure function of `ticks`/flags, not
          of the entry choice. Reaching the gallery at ticks 2 via the grand STAIRS
          (kitchens -> back_foyer -> climb_stairs) yields byte-identical scene text to
          reaching it at ticks 2 via the DUMBWAITER (kitchens -> dumbwaiter) — both
          show the ticks>=2 "no place to be caught standing when it chimes" warning;
          reaching it at ticks 1 via the stairs shows the bare base text with no such
          warning. The tester's two runs merely correlated the dumbwaiter with a
          higher tick count, and the dumbwaiter's "cramped servants' lift / complaining
          rope" flavor is a transient `narration` EVENT for that one step, never part
          of the gallery's persistent scene description.
root_cause: >
  No defect. The recurring blind-tester misread ("same scene, two descriptions by
  entry path") arises because the gallery (`landing`) advances `ticks` on entry and
  renders a tick-gated reactive variant, so two visits at different tick counts read
  differently — which a player can mistake for entry-path-dependence, especially when
  the dumbwaiter also emits its own one-shot lift narration on the same step. The
  reactive prose is correct and entry-path-invariant; what was missing was a lock that
  pins this invariant so the false positive is retired and a genuine future regression
  (making landing's scene text depend on the entry choice, e.g. by folding the
  dumbwaiter's narration into the room description) is caught.
fix: >
  Test-only (§15 lock-the-finding). Adds a regression that pins the `landing` scene
  text as a pure function of state: identical via stairs vs dumbwaiter at equal ticks,
  tick-gated (bare base at ticks 1, the chime warning at ticks 2), and never carrying
  the dumbwaiter's lift flavor in its persistent scene text (that flavor stays a
  transient narration event of the dumbwaiter step). No content/engine/validator/schema
  change.
within_bar: >
  Regression test only. No pack edited; no validator/schema/engine change; NO hash pin
  moved (clockwork_heist content_hash unchanged). Deterministic, no LLM-judge, NO API
  key. The full pre-existing suite passes unchanged, plus the new cases below.
regression_test: tests/regression/clockwork_gallery_entry_path_invariant.test.ts
test_cases:
  - "landing scene text is byte-identical via the grand stairs vs the dumbwaiter at the same ticks (2), and both carry the ticks>=2 chime warning"
  - "the gallery variant is tick-gated, not path-gated: at ticks 1 (stairs) the bare base text shows with no chime warning; at ticks 2 the warning appears"
  - "the dumbwaiter's 'cramped servants' lift / complaining rope' flavor is a transient narration EVENT of that step, never part of landing's persistent scene text"
