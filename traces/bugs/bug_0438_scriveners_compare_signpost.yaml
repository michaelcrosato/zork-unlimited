id: bug_0438
title: Scrivener's Proof hid the magnifier prerequisite for comparison
pack: content/parser/pack/scriveners_proof.yaml
reported_by: blind_playtest_20260622T103426Z_scriveners_proof_seed7
severity: medium
symptom: >
  A blind player read the enrolled copy, saw the wording discrepancy, and
  reasonably expected the side-by-side compare action to be available. The action
  remained hidden until the separate magnifier discovery, but the enrolled-copy
  read and blocked north exit did not say that the magnifier was the missing
  prerequisite.
root_cause: >
  The proof chain intentionally required an epistemic step before comparison:
  magnifier evidence establishes that the six words were inserted later, while
  the enrolled copy establishes that the court roll lacks them. The content
  enforced that chain mechanically but did not surface it at the two stall points.
fix: >
  Added explicit signposting to the enrolled-copy read text, the deed-room
  reactive description after reading the copy, and the blocked north-exit message.
  The compare action is still gated on found_interlineation, preserving the
  original score economy and proof route, but the player now knows to use the
  magnifier before trying to leave or compare.
tests:
  - tests/regression/scriveners_compare_signpost.test.ts
verification:
  - npm test -- --run tests/regression/scriveners_compare_signpost.test.ts tests/regression/scriveners_copy_press_one_shot.test.ts tests/regression/scriveners_proof_reactive_taken_items.test.ts
  - npm run validate -- content/parser/pack/scriveners_proof.yaml
