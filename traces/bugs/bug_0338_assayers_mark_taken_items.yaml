id: bug_0338
pack: assayers_mark_v1
title: "assay rooms still placed taken evidence at starting positions"
severity: minor
scene: assay_hall / record_room
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the silver plate or aqua fortis in the assay hall, LOOK still used
  base prose saying the plate waited at the centre of the bench and the acid vial
  sat in its wooden stand. After taking Fitch's commission paper in the record
  room, LOOK still said the commission papers were in the open box.

root_cause: >
  The room descriptions named takeable evidence in fixed starting positions. The
  assay hall had only a completed-assay variant keyed to `proved_debased`, and the
  record room had no variant reading `has_item: commission_paper`, so ordinary
  post-TAKE states fell back to stale base text.

fix: >
  Added ordered room variants for silver-plate held, aqua-fortis held, both assay
  items held, completed assay with held evidence, and commission-paper held states.
  Pure prose/content change: no exits, effects, score, or win conditions changed.

tests: tests/regression/assayers_mark_reactive_taken_items.test.ts
