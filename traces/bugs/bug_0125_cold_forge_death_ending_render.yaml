bug_id: bug_0125
pack_id: cold_forge_v1
seed: 11   # mandated blind playtest; the regression itself pins seed 1 (deterministic under-armed death)
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T13-02-56-343Z/playtest.md   # cold_forge, seed 11
  finding: >
    The mandated rank-1 target this cycle, The Cold Forge (RPG, seed 11), came back
    clean: a fresh source-blind MCP-only subagent reached ending_victory on both a
    prepared and a deliberately under-armed run (seed 11's combat variance was kind —
    the reckless run survived at exactly 1 HP), rated it clarity 5/5 enjoyment 4/5,
    ZERO mechanical defects. Its one concrete, actionable §5 note: because even the
    reckless run survived, it "can't confirm the death-ending text (ending_fallen)
    fires cleanly from actual play — only that the death:false victory does."
failure:
  type: not_a_defect_coverage_gap
  description: >
    The death ending (ending_fallen, "Cold on the Cinders") is well covered for
    REACHABILITY and for the internal end-state, but NOT for what the player actually
    SEES at the moment of death:
      - bug_0124's exhaustive solver proves ending_fallen is route-reachable (abstract
        BFS over best/worst dice brackets), but never renders an observation.
      - cold_forge_sentinel_prep_matters.test.ts case (3) drives an under-armed thief
        to death and asserts state.endingId === "ending_fallen" + the pack's
        endings[fallen].death boolean — but it inspects the GameState, not the
        player-facing observation. It never builds buildParserObservation at the death
        moment, so nothing locks that the player is shown the death ending's TITLE and
        TEXT, nor the score-closure tally the renderer appends.
    So the exact thing the blind playtester could not confirm — that the death ending
    renders cleanly to a player — was the one untested seam. The render path itself is
    sound (src/parser/observation.ts: title = endingDef.title, description = ending
    text + "Final score: X of Y." when max_score > 0, regardless of death); this bug
    only closes the missing lock around it.
fix:
  layer: test   # pure test addition; no content, engine, validator, or hash change
  summary: >
    Add cold_forge_death_ending_render.test.ts: drive the under-armed seed-1 route to
    the slag sentinel's killing blow, build the player-facing parser observation at the
    ended state, and assert the death ending renders cleanly —
      - observation.ended === true, ending_id === "ending_fallen";
      - observation.ending === { id: ending_fallen, title: "Cold on the Cinders",
        text: <pack text>, death: true };
      - observation.title (rendered) === "Cold on the Cinders" (player sees the death
        title, not the room name);
      - observation.description carries the death ending text AND the score-closure
        tally "Final score: 0 of 50." (an under-armed death scores nothing — no
        milestone fired — so the dying player still gets honest closure);
      - the death route is genuinely fatal: no sentinel_stilled flag, no +15 award.
    Complements prep_matters case (3) (internal end-state) and bug_0124 (abstract
    reachability) with the rendered-experience layer the blind pass asked for.
verification:
  regression_test: tests/regression/cold_forge_death_ending_render.test.ts
  health: npm run health   # must stay green; no content hash moves (no pack edit)
