id: bug_0425
title: Alchemist's Tower optional iron-key skill beat still read as unexplained
pack: content/parser/pack/alchemists_tower.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  The blind playtest again called out the optional Great Hall `use_iron_key`
  skill-check action. Even after earlier context fixes, the listed command "grip
  iron key" still read like a dangling or vestigial mechanic.
root_cause: >
  The beat is intentionally convergent and optional, but the visible custom verb
  emphasized handling the object rather than the in-fiction purpose: steadying
  the player's hand before using the key on the tower's iron locks.
fix: >
  Changed the interaction's custom command verb from "grip" to "steady", so the
  action lists and parses as "steady iron key" while preserving the stable
  `use_iron_key` id, skill check, effects, routing, score, flags, and endings.
tests:
  - tests/regression/alchemists_steady_key_command.test.ts
verification:
  - npm test -- --run tests/regression/alchemists_steady_key_command.test.ts
  - npm run validate -- content/parser/pack/alchemists_tower.yaml
