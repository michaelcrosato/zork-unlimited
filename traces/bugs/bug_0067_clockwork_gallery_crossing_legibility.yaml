bug_id: bug_0067
pack_id: clockwork_heist_v1
seed: 73
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T18-13-44-027Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester reached all three terminal
    families (Truth, Rich, Caught) plus the graceful pick-less recovery across four runs
    (seed 73), rating it clarity 5/5, enjoyment 4/5, mechanically flawless — zero rejected
    actions, no loops, no soft-locks. Its one concrete, not-already-closed finding
    (report §4/§5): after reading the ledger, the gallery's at-the-hour scene text still
    framed the long crossing as running "right under his beam." Because the actual safety
    is flag-gated on read_ledger, the careful player read this as a live timing puzzle and
    over-dodged a threat the ledger had already solved — the prose was out of sync with the
    safe crossing it was offering.
failure:
  type: scene_text_contradicts_offered_action
  where:
    - content:content/cyoa/pack/clockwork_heist.yaml
  description: >
    The `landing` (gallery) scene's `ticks>=4` + `has_flag: read_ledger` variant (added by
    bug_0066) kept the danger framing "The long crossing to the vault runs right under his
    beam" — identical in tone to the non-reader's `ticks>=4` variant. But for the reader,
    the offered crossing is `approach_vault`, which is SAFE: it is the payoff for reading
    the ledger (the watchman's rounds are known) and the vault-door beat then rewards it
    with "you wait, pressed to the automata... then cross in its wake... just as the ledger
    swore you could." So the gallery prose promised live danger while the mechanics
    delivered a solved, timed crossing, making the careful player hesitate and over-dodge.
fix:
  layer: content
  summary: >
    Route-aware legibility fix, continuing the bug_0058/bug_0066 discipline. The reader's
    `landing` `ticks>=4` + `read_ledger` variant is reframed from danger to informed
    confidence: it keeps the watchman and the "the hourly patrol the steward's ledger
    warned of" callback, but replaces "The long crossing to the vault runs right under his
    beam" with the reader knowing his rounds by heart — reading the swing of the lantern,
    picking the moment it turns away, and crossing in his wake "just as the ledger swore
    you could," matching both the safe `approach_vault` choice and the existing vault-door
    payoff. The non-reader's `ticks>=4` variant is UNTOUCHED and keeps "right under his
    beam" — for that player the offered crossing is `cross_to_vault_blind` → ending_patrol,
    a real gamble the danger framing honestly promises. The `ticks>=2` and base cases are
    untouched. NO flag/tick/route/gating/reachable-ending change; the choice gates already
    mirror the reader/non-reader split.
  reachable_endings_changed: false
  content_hash_changed: true        # clockwork is unpinned in unit tests (only watchtower_road is pinned). f8f2bbdd38374d042a46d05a2dc8165392ea9348b7899e21df8a798a6100d499 -> fa5cd967481d48f07f1b91b22ce36a9fbdca8994bd3171591cdd3852bdda6c6f
  regression_test: tests/regression/clockwork_gallery_crossing_legibility.test.ts
verified_live: >
    Through the engine over the compiled pack (seed 73), building observations the way the
    MCP server does (buildObservation). Ledger route at the hour (kitchen pick, study,
    read_ledger, leave_study, ticks 4): gallery text matches /watchman/ and "the steward's
    ledger warned of", does NOT match /right under his beam/, DOES match the timed-crossing
    confidence ("his rounds by heart" / "in his wake" / "just as the ledger swore"), and the
    offered crossing is approach_vault (safe), not cross_to_vault_blind. No-ledger route to
    the hour (climb_stairs/back_down paced to ticks 4): gallery text still matches /watchman/
    and /right under his beam/, never names the ledger, and offers cross_to_vault_blind. All
    four endings (rich/truth/caught/patrol) still fire.
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter routes
    — a standing heuristic-planner limit documented since bug_0008, not a discoverability
    regression. The blind LLM playtest remains the load-bearing quality signal; seed 73 rated
    the pack shippable (clarity 5/5, enjoyment 4/5) and this fix closes its one remaining
    concrete legibility finding, continuing the clockwork polish family without touching any
    tuning.
