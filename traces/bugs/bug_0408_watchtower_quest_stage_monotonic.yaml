id: bug_0408
pack: watchtower_road_v1
title: "Watchtower hub loop regressed the investigation quest stage"
severity: medium
scene: forest_crossroads
reported_by: blind_playtest_20260621T183910Z_watchtower_road_seed11

symptom: >
  A blind playtester found that after the player had discovered the truth, looping
  back through the forest crossroads made the quest tracker read like the opening
  state again. The route and flags still worked, but the `the_road` quest stage
  no longer reflected the player's actual progress.

root_cause: >
  The crossroads hub wrote `the_road=setting_out` on every entry, and the `go_east`
  choice wrote `the_road=on_the_trail` every time the player left for the tower.
  Both stages are early investigation flavor, so they clobbered the later
  `truth_known` milestone whenever the player returned through the hub.

fix: >
  Remove the transient early quest-stage writes from the crossroads and eastbound
  choice. The watchtower first-arrival prose now keys directly on the durable
  `learned_truth` flag, while the evidence beats remain the only writers of the
  meaningful `truth_known` quest stage.

tests: tests/regression/watchtower_trail_variant_stale_reentry.test.ts

verification:
  - npm test -- --run tests/regression/watchtower_trail_variant_stale_reentry.test.ts
  - npm run validate -- content/cyoa/pack/watchtower_road.yaml

trace_repin: >
  None. The change updates content state-tracking behavior and its regression
  coverage; no committed replay trace hash is repinned.
