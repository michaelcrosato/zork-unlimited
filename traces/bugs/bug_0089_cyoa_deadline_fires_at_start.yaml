    deadline "feels cosmetic" — efficient/careful play never lingers to the ticks>=10
    overstay. I verified live (driving study<->gallery to ticks 10) that ending_overstayed
    DOES fire cleanly, so the deadline has real teeth; the note is a discoverability
    observation about an author-intentional "careful play is safe" tuning, not a defect, and
    is not worth relitigating after the bug_0061->0084 arc. With the over-fitted clockwork
    target proven sound again and the standing memory recording the content-polish backlog as
    exhausted, I audited the deadline machinery the playtester's note centred on and found the
    soundness sibling that bug_0087 (DEADLINE_UNFIREABLE) left open at the opposite extreme.
failure:
  type: validator_missing_check_unplayable_pack
  where:
    - engine:src/validate/cyoa_validator.ts
  description: >
    bug_0087 added checkDeadlineFirability: a `meta.deadline` whose `when` can PROVABLY never
    hold is flagged DEADLINE_UNFIREABLE (a dead urgency mechanic + a phantom escape edge in the
    soft-lock graph). But the SYMMETRIC OPPOSITE went unchecked: a deadline whose `when` ALREADY
    HOLDS in the initial state and can never be falsified. The engine's §8.4.5 checkWin runs
    against the POST-action state (src/core/engine.ts: `if (rules.checkWin && !next.ended)`),
    NOT at game start (new_game returns the initial observation without a win check). So such a
    deadline does not end the game on the opening screen — it ends it on the player's VERY FIRST
    action, whatever they choose, sending them straight to deadline.ending. No scene past the
    start is ever reachable in play: the pack is unplayable. Yet every existing check passes — the
    reachability/soft-lock graph is static (it never simulates the turn-1 fire), so it sees the
    deadline ending and the normal endings all "reachable", and the blind playtester would simply
    report "every choice instantly ends the game" without the engine flagging anything. A
    maintainer hits this by fat-fingering the threshold to/below the watched var's init value
    (e.g. `ticks >= 0` with `vars_init.ticks: 0`), forgetting to raise vars_init back down, or
    gating the deadline on a flag that is set in flags_init. This is strictly WORSE than
    DEADLINE_UNFIREABLE (which leaves the game fully completable) — it bricks the pack — so it is
    an ERROR, mirroring START_NOT_SCENE ("the game would end immediately").
fix:
  layer: validator
  summary: >
    Add checkDeadlineFiresAtStart(when, initial, pack, findings), called inside the existing
    meta.deadline block right after checkDeadlineFirability. The initial state is the engine's
    own initStateForPack(index, 0) (base init + start scene on_enter applied) and is evaluated by
    the engine's own evalConditions — zero divergence from runtime. Ground: (a) `when` holds in
    that initial state, AND (b) `when` can never be falsified by any pack effect. (b) is proven by
    deadlineStaysTrueForever: a flat conjunction (top-level list + all_of) of monotone-stable
    atoms — has_flag not cleared, not_flag not set, has_item not removed, not_item not added,
    var_gte whose var never drops below the floor, var_lte whose var never rises above the ceil,
    var_eq whose var never changes, visited (monotone). Var arithmetic is sign-significant
    (effects.ts allows a negative `by`, so an inc_var can decrement) — collectFalsifiers records
    the literal `by`/`value`, and varNeverDrops/Rises/Changes inspect it. Any any_of/none_of or
    unanalysed condition (not_visited, object/quest state) bails to false (treat as falsifiable),
    so the check NEVER claims un-falsifiability it cannot prove. Both grounds true -> ERROR
    DEADLINE_FIRES_AT_START. No schema, runner, or content change.
  reachable_endings_changed: false
  content_hash_changed: false        # no content pack edited
  regression_test: tests/regression/cyoa_deadline_fires_at_start.test.ts
  unit_tests:
    - tests/unit/cyoa_validator.test.ts   # new negative fixture row: deadline_fires_at_start.yaml -> DEADLINE_FIRES_AT_START
  fixtures:
    - content/broken-fixtures/deadline_fires_at_start.yaml
verified_live: >
    Bug-first: a synthetic pack whose deadline fires at `ticks>=0` with `ticks` init 0 and only
    ever inc'd by +1 yields DEADLINE_FIRES_AT_START (error). Soundness/no-false-positive: a deadline
    `ticks>=5` (threshold above init) is NOT flagged; a `ticks>=0` deadline whose scene can
    `dec_var ticks` (escapable on the first move) is NOT flagged; a `has_flag doomed` deadline with
    `doomed` in flags_init but cleared by a choice is NOT flagged. The shipped clockwork pack
    (deadline `ticks>=10`, init 0, foyer start advances no ticks) is NOT flagged and stays green;
    watchtower has no deadline. I also confirmed live that clockwork's deadline genuinely fires at
    ticks 10 (ending_overstayed), so the new guard does not touch a real, well-tuned deadline.
    `npm run health` exit 0; full suite green (+6 regression cases +1 unit fixture row); typecheck/
    lint/format clean; all health-gated packs validate 0 errors; all content hashes unchanged.
note: >
    Soundness over coverage, same stance as bug_0085/0086/0087: only flags a deadline whose
    on-every-path turn-1 fire is PROVABLE — true at the engine's real initial state AND a flat
    conjunction of monotone-stable atoms. It cannot prove a fire-at-start that depends on a
    disjunction's semantics or on a var the player must lower to escape and never can; it detects
    fewer cases, never wrong ones. Together, bug_0087 (deadline that can NEVER fire) and bug_0089
    (deadline that ALWAYS fires at start) bracket the meta.deadline mechanic on both sides: between
    them the validator now rejects both degenerate tunings of the §8.4.5 global terminal.
