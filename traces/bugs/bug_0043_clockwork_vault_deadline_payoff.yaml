bug_id: bug_0043
pack_id: clockwork_heist_v1
seed: 91
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T12-51-55-985Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack
    The Clockwork Heist. A fresh, MCP-only blind playtester reached all five endings
    across four runs (seed 91), rating it clarity 5/5, enjoyment 4/5, mechanically
    flawless — zero rejected actions, no loops, no soft-locks, no bugs. Its one
    substantive soft spot (report §5/§6): "the headline timed-crossing setpiece is
    avoidable, and a player who beelines may never see it... worth considering
    whether the patrol should be guaranteed at least once on the vault route." The
    watchman walks only at the hour (ticks >= 4); an efficient thief reaches the
    vault at ticks 2 and never meets him, so the deadline the rest of the manor's
    prose keeps drumming up is wholly absent from the heist's most obvious route.
failure:
  type: silent_deadline_on_headline_route
  where: [content:content/cyoa/pack/clockwork_heist.yaml]
  description: >
    The clock/watchman is the pack's signature mechanic (bug_0019/0040/0042 built it
    up across cycles), but it lives entirely in the gallery crossing. The `vault`
    loot room — where the central gold-vs-truth choice is actually made — had no
    reactive text and never acknowledged the clock at all. A thief who beelines for
    the gold (kitchen for the pick, dumbwaiter to the gallery, cross before the hour,
    pick the lock) stands in the loot room at ticks 2 in total clock-silence, makes
    the game's defining choice, and escapes rich without the marquee deadline ever
    bearing on the route most players take first. Not a reachability/gating bug:
    every route and ending is unchanged; purely a missing-tension prose gap on the
    one major route the clock never touched.
fix:
  layer: content
  summary: >
    Additive reactive-text only, using the pack's existing CYOA `variants` feature
    (same mechanism as the foyer/gallery/vault_door clock prose). The `vault` scene —
    previously variant-free — gains TWO variants (first-match-wins, higher threshold
    first):
      - when [var_gte ticks 4]: the careful ledger-reader (the ONLY player who can be
        inside the vault at/after the hour — by construction `vault_door` is reachable
        at ticks >= 4 only via the ledger-gated `approach_vault`) feels the watchman
        patrolling the single way out, framed around the rounds the ledger gave them
        ("you came in behind his lantern, and the ledger swears you can go back out
        the same way"), so the room never lies about the clean getaway they earned;
      - when [var_gte ticks 2]: the fast/normal thief (every gold-route player is at
        ticks >= 2 — the lockpick costs a kitchen tick, the crossing a landing tick)
        is told the clock grinds toward the hour and to be gone before the chime sets
        the watchman walking.
    The base `text` is UNCHANGED, so the bug_0041 paired-letter framing it carries
    ("in plain sight ... among the gold", asserted on `.text` by that regression)
    stays byte-identical, and a fresh (ticks 0) state still renders the base verbatim.
    No choice, effect, flag, item, exit, gating, or reachable ending changes —
    `grab_gold` still ends at `ending_rich` and `take_letter` at `ending_truth`, so
    the no-soft-lock / escapable-deadline invariants bug_0019/0040 locked are intact.
  reachable_endings_changed: false  # still rich/truth/caught/patrol; all routes intact
  content_hash_changed: true        # clockwork_heist yaml prose edited; clockwork is unpinned (only watchtower_road is pinned in tests). New hash 080e8005f155ebd818fdd4d86700813599df9c9589dc45f84b0a4a149aff7d18
regression_test: tests/regression/clockwork_vault_deadline_payoff.test.ts
verified_live: >
  Through the engine over the compiled pack (seed 91). A fast pre-hour thief at the
  vault (ticks 2) now sees the running-short clock prose and not the watchman beat; a
  ledger reader who arrives on the hour (ticks 4, provably read_ledger) sees the
  watchman-beyond-the-door beat and not the running-short variant; a fresh ticks-0
  state renders the unchanged base text. All endings still fire on both the fast and
  careful routes (gold->rich, letter->truth), force->caught, blind-crossing->patrol,
  and the crawlspace truth route (which never enters the vault) is unaffected.
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest is the load-bearing quality
    signal here; this cycle (seed 91) it rated the pack shippable with this single
    soft spot, continuing the "the clock never bites the easy route" family of notes
    that drove bug_0019, bug_0040, and bug_0042.
