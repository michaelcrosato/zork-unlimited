id: bug_0461_clockwork_truth_score_alignment
title: "Clockwork Heist truth ending no longer scores as a poor solve"
pack: content/cyoa/pack/clockwork_heist.yaml
reported_by: blind-playtest
report: blind-tester/reports/20260622T200812Z_clockwork_heist_seed7.md
severity: S2
symptom: >
  A blind playtest reached ending_truth through the crawlspace at 20/45 while the
  epilogue said some things are worth more than escaping rich. The player read that
  as a direct contradiction: the story rewarded the moral ending, but the score
  system told them the same ending was a poor solve compared with the 45/45 rich
  vault route.
root_cause: >
  Clockwork Heist's score economy treated the crawlspace confession as a low-value
  shortcut. Earlier fixes nudged players toward the study and vault, but the
  player-facing scoreboard still judged a complete truth ending by vault-job
  thoroughness rather than by whether the story's moral objective was satisfied.
fix: >
  Make the hidden-confession crawlspace ending a score capstone. The no-ledger
  strongbox action now awards 45 points; a read-ledger companion action awards the
  remaining 35 points so ledger+crawlspace also ends at 45/45 without overflowing.
  Vault truth and rich vault endings remain 45/45.
tests:
  - tests/regression/clockwork_truth_score_alignment.test.ts
  - tests/regression/clockwork_crawlspace_study_signpost.test.ts
verification:
  - npm test -- --run tests/regression/clockwork_truth_score_alignment.test.ts tests/regression/clockwork_crawlspace_study_signpost.test.ts
  - npm run validate -- content/cyoa/pack/clockwork_heist.yaml
  - npm run health
