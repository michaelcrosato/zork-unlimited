id: bug_0336
title: TARGET_PER_MODE ceiling re-saturation trap
severity: structural
status: fixed
root_cause: >
  TARGET_PER_MODE was raised in bug_0335 to match the exact current pack count
  ({cyoa:12, parser:10, rpg:10}), leaving zero headroom. The content_new gate
  (if (have < target)) never fires when have == target, silencing all content_new
  candidates and returning the loop to the 0.5 floor immediately.
fix: >
  Raised TARGET_PER_MODE to {cyoa:20, parser:16, rpg:16} — approximately 8 packs
  of headroom per mode based on ~10 packs authored per content_new run (re-aim #20).
  Prevents re-saturation for multiple subsequent cycles.
files_changed:
  - src/afk/assessor.ts:68
regression_test: none_needed  # No test pins the exact numbers; behavior verified by health
