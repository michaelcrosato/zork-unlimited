  - npx vitest run tests/regression/gallowmere_starting_knife_truth.test.ts tests/regression/gallowmere_blind_side_tactic.test.ts tests/regression/gallowmere_peat_sign_kill_site_hint.test.ts
  - npm run crawl:smoke
  - npm run blind
  - npm run health
