evidence:
  source: blind_playtest + structural_gap_analysis
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-02T12-44-46-086Z/playtest.md   # sealed_crypt, seed 7
  finding: >
    The mandated rank-1 target this cycle, The Sealed Crypt (parser, seed 7), came back
