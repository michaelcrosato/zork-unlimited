id: bug_0430
title: Coroner's Errand foregrounded a wet page that could not be read
pack: content/parser/pack/coroners_errand.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: medium
symptom: >
  The blind playtest repeatedly noticed the wet page under Calloway's hand, which
  the room and body prose framed as significant, but there was no READ or TAKE
  action for it. The writing desk only repeated a route reminder.
root_cause: >
  The page was authored as atmospheric support for the body examination but not
  exposed as readable desk content, creating a prominent object with no payoff.
fix: >
  Added a READ interaction on the writing desk/page that explains the unfinished
  memorandum, records a wet_page_read flag, and does not affect score, gates, or
  the canonical justice route.
tests:
  - tests/regression/coroners_wet_page_readable.test.ts
verification:
  - npm test -- --run tests/regression/coroners_wet_page_readable.test.ts
  - npm run validate -- content/parser/pack/coroners_errand.yaml
