id: bug_0327
pack: dead_reckoning_v1
scene: deck
class: reactive_description_blindness
severity: minor
summary: >
  The deck hub had variants for quest_stage `adrift` (between first side-room and cask)
  but none for quest_stage `at_the_cask`. When the player chose `back_deck` to retreat
  from the cask, the deck scene rendered the zero-quest-stage base text — the same
  opening text seen on the very first turn, with no acknowledgment that the player had
  just faced Tarrant, the crew, and the decision. All other state transitions in the
  pack are tracked and surfaced; this gap broke the fiction of a world that knows what
  you've done.

  Surfaced by a blind MCP playtest (seed 7, ai-runs/2026-06-08T16-05-59-495Z/playtest.md),
  Bug 1.

fix: >
  Added four variants gated on quest_stage `at_the_cask` to the deck scene, placed before
  the existing `adrift` variants (first-match-wins; stages are mutually exclusive so no
  shadowing). The four cover the same 2x2 of knowledge as the adrift window: both flags,
  course only, pilot only, bare. Each variant opens "You stepped back from the cask…"
  and is colored by what the player learned before retreating. The base text now fires
  only when quest is unset (first turn, before any move). No flag, score, choice, or
  ending change.

regression: tests/regression/dead_reckoning_back_deck_reactive.test.ts
