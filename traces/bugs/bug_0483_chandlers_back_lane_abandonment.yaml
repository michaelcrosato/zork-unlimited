id: bug_0483
title: Chandler's Lot made the back lane look like unused exploratory scenery
pack: content/parser/pack/chandlers_lot.yaml
reported_by: blind playtest 2026-06-23 seed 7
severity: low
symptom: >
  The blind playtest saw the south exit from the counting room but never needed it.
  Because the room only said the back lane "runs south," the exit looked like a
  dangling exploratory affordance rather than a deliberate branch that abandons
  the inspection and reaches ending_unproved.
root_cause: >
  The abandonment route was implemented as an ordinary room exit with no warning
  in the counting-room prose. After fraud_proved, the same exit also remained
  available even though the player already had full scored proof, allowing a
  full-score state to walk into the unregistered bad ending.
fix: >
  Reworded the counting-room and back-lane prose so the south route explicitly
  means leaving the inspection unregistered. Gated the south exit off once
  fraud_proved is set and added a blocked-exit hint that sends the player north
  to register the stamped proof at guildhall.
tests:
  - tests/regression/chandlers_back_lane_abandonment.test.ts
verification:
  - npm test -- --run tests/regression/chandlers_back_lane_abandonment.test.ts
  - npm run validate -- content/parser/pack/chandlers_lot.yaml
