root_cause: >
  ARCHITECTURAL, and called out by name in bug_0024: the reactive-`variants` system evaluates
  `when` through the PURE condition DSL (src/core/conditions.ts), which had NO predicate for a
  container's runtime open/locked state. So every prior reactive fix (bug_0012 room, bug_0023/0024
  object examine) leaned on a `has_item iron_key` PROXY that flips only on EMPTYING, leaving the
  lockbox lifecycle locked → unlocked → opened → emptied with a stale "locked" middle. The
  capability to react to the actual unlock/open transitions simply did not exist in the DSL.
improvement:
  layer: engine + content
  engine:
    - src/core/conditions.ts: >
        Added two pure, closed-DSL runtime object-state predicates — `{ is_open: <id> }`
        (true iff GameState.objectState[id].open === true) and `{ is_unlocked: <id> }` (true iff
        objectState[id].locked === false, i.e. the lock was cleared at runtime). Both default
        false until the relevant effect (open_object / set_object_locked) fires, so they let a
        reactive room/object variant track a container's full lifecycle DIRECTLY instead of via a
        contained-item proxy. Schema (ConditionSchema union) + Condition type + evalCondition
        branch, mirroring the existing predicate shape. Pure over GameState — no index/pack needed.
  content:
    - content/parser/pack/alchemists_tower.yaml: >
        Study room: added an `is_unlocked: strongbox` variant ("The iron strongbox sits unlocked
        on the desk, its brass lock sprung") ABOVE the existing has_item:iron_key emptied variant
        (first-match-wins keeps emptied primary). Strongbox examine: added `is_open` (opened, key
        still inside) and `is_unlocked` (unlocked, lid shut) variants ahead of the emptied one, so
        the examine tracks the whole lifecycle. Variant-only: no flag/item/score/exit/interaction/
        gating/reachable-ending change.
