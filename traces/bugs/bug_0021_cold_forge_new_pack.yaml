  content_hash: e5e280296d6dfdfd229a191ecb009ed7a7f18f0e242b2e56c1b9dced11b81a63  # unpinned (only watchtower_road is pinned in tests)
  blind_playtest_new_pack: clarity 5/5, enjoyment 4/5, no functional bugs, victory on both routes (seed 5)
  reachable_endings: [ending_victory, ending_fallen]
  score_full_route: 0 -> 15 (sentinel) -> 30 (grate) -> 50 (Ember-Heart) at ending_victory
health_wiring:
  - package.json "health": added `npm run validate -- content/rpg/quests/cold_forge.yaml` so the new pack is re-validated every cycle (mirrors how sunken_barrow is gated; not coverage-gated, since the deterministic bot cannot solve seeded combat + skill check + dialogue, the same known limit as the barrow)
regression_test: tests/regression/cold_forge_pack.test.ts  # 4 cases: validates green; buffed seed-1 route → ending_victory 50/50 + attack 4→6; the +2 topic is one-shot (retires, cannot be farmed); no-buff seed-2 fight kills the player → ending_fallen (combat teeth + death ending reachable)
deferred:
  - reactive OBJECT descriptions — after the grate is levered open its OBJECT name/examine still reads "slag grate" (the ROOM text reacts via variants, but object descriptions are static). A generic engine feature for its own cycle, not specific to this pack.
  - route-flat scoring (both routes score 50) — a deliberate route-agnostic milestone design matching barrow/sealed_crypt; flagged by the playtester as a (minor) replay-incentive nit, not a defect.
verified_live: >
  Through the engine source path the regression test exercises (initStateForRpgPack /
  enumerateRpgActions / makeStep / buildParserObservation — the same path the MCP
  server uses) AND an independent MCP-only blind playtest (seed 5). The buffed
  canonical route (seed 1) reaches ending_victory at 50/50 with attack raised 4->6 by
  the spirit; the ask_sentinel topic retires after one telling; the no-buff fight at
  seed 2 kills the player and fires ending_fallen.
