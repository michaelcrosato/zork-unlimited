id: bug_0486
title: Friars' Postern hid its core wall clue behind READ-only scratches
pack: content/parser/pack/friars_postern.yaml
reported_by: blind_playtest_20260623T012742Z_friars_postern_seed7
severity: medium
symptom: >
  The blind playtest noted that both LOOK and READ were legal on the scratched
  wall message, but READ carried the route clue while LOOK appeared to be only a
  generic description. A player using LOOK as their first inspection verb could
  conclude the scratches were just flavor and miss the core setup.
root_cause: >
  wall_scratches put the actionable instruction only in read_text, while the
  object description rendered by LOOK said only that lines were gouged in the
  wall.
fix: >
  Mirrored the actionable scratched-message clue into the LOOK description, while
  preserving READ as the scored formal reading action. LOOK-first players now see
  the old-woman, pipe, turnkey's nook, and gate warning route without changing the
  score economy.
tests:
  - tests/regression/friars_wall_scratches_look_clue.test.ts
verification:
  - npm test -- --run tests/regression/friars_wall_scratches_look_clue.test.ts
  - npm run validate -- content/parser/pack/friars_postern.yaml
