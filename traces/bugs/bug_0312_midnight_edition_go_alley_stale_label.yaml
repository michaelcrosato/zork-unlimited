id: bug_0312
title: "midnight_edition: composing_room 'go_alley' action label stays 'boots on the cobbles' after door is barred"
pack: midnight_edition_v1
class: reactive-description-blindness (action-label variant)
severity: minor
found_by: blind_playtest_seed7_2026-06-08T11-05-07-298Z
playtest_report: ai-runs/2026-06-08T11-05-07-298Z/playtest.md

symptom: >
  After barring the alley door (door_barred set), the composing_room still listed
  "Go to the alley door and the boots on the cobbles." as an available action. The
  scene text correctly updated to say "the alley door is barred fast" (via the
  variants introduced by bug_0268 / bug_0310), but the action label was static and
  contradicted the scene prose — implying the threat was still live and the door open.
  Same reactive-description-blindness class as bugs 0282-0288/0309/0310, but
  applied to a choice label rather than a room description text.

root_cause: >
  The composing_room `go_alley` choice had no condition — its label
  "Go to the alley door and the boots on the cobbles." never changed. The CYOA schema
  does not support per-variant choice text, so a second conditional choice is the
  correct pattern.

fix: >
  Added condition `[{ not_flag: door_barred }]` to the existing `go_alley` choice
  (keeps the atmospheric "boots on the cobbles" label in the tension state, before
  barring). Added a new `go_alley_barred` choice gated `[{ has_flag: door_barred }]`
  with label "Return to the barred alley door." — same `next: alley_door` destination.
  No effect on any flag, score, quest stage, or ending. The alley scene already gates
  bar_door/steady_and_bar off once door_barred is set, and confront_men remains
  available on either route.

regression_test: tests/regression/midnight_edition_go_alley_stale_label.test.ts
