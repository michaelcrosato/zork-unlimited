id: bug_0331
pack: alchemists_tower_v1
title: "iron key take has no cold/grip context — steadiness beat unexplained"
severity: minor
scene: great_hall
reported_by: blind_playtest_seed_7_2026-06-08
prior_instance: bug_0261 (seed 47 — same class, earlier stage)

symptom: >
  The optional "grip iron key" steadiness beat (use_iron_key in the Great Hall)
  appeared in the available_actions list without any context for players who took
  the iron key without examining it. The beat's setup ("the cold of it climbs your
  wrist; before you set it to anything down here, you might grip it a moment and
  steady your hand first") lives in the iron key's EXAMINE description, which is
  only shown on explicit EXAMINE — not on TAKE. Two consecutive blind playtesters
  (seed 47 → bug_0261; seed 7 → this bug) flagged the action as "unexplained noise"
  or "a vestigial design stub" for the same reason: they took the key without
  examining it and reached the Great Hall with no context for why "grip iron key"
  was being offered.

root_cause: >
  The iron key's TAKE action shows only the engine's default "You take the iron key."
  line. The atmospheric context that primes the steadiness beat lives exclusively in
  the object's `description` field, shown only on EXAMINE. Players who skip EXAMINE
  (reasonable in a timed puzzle push) never see the cold-climbs-your-wrist framing
  before the action appears.

fix: >
  Added `take_effects: [{ narrate: "The iron is old and heavy in your hand, colder
  than it should be — the cold of it climbing straight up your wrist." }]` to the
  iron_key object. Fires on the first-class TAKE immediately after "You take the iron
  key." — one-shot by nature (once held, TAKE no longer resolves). Pure prose: no
  flag, score, route, or ending change. The steadiness beat, convergence proofs, and
  40-point economy stay byte-identical.

tests: tests/regression/alchemists_iron_key_take_narrate.test.ts
