id: bug_0226
title: "The Dawn Beacon blind-pass: the climax fired on bare room entry — climbing `up` to the crown auto-lit the beacon (+15 on the room on_enter) and ended the game, with no light verb to perform, though the orders-board and watchman both say plainly 'LIGHT THE BEACON'. Reshaped to the deliberate light act (the sunken_barrow visited+has-act win): an explicit `light beacon with flint` carries the +15 and fires the win."
kind: content_fix
mode: rpg
pack: content/rpg/pack/dawn_beacon.yaml
# Content reshape of ONE pack's climax. Adds two crown objects (beacon_fire + flint), moves
# the +15 capstone off beacon_crown.on_enter onto the new light interaction, and adds a
# `has_flag: beacon_lit` term to the (kept) `visited: beacon_crown` win. No change to the
# discovered pack set, to combat tuning, to the score TOTAL (still 5+10+10+10+15 = 50), or to
# any pinned hash — so NO scorecard regen is required. The auto-discovered RPG bar re-derives
# clean over the edited pack (all-endings-reachable, reactive-variant liveness, score-economy
# max==50, combat_guaranteed UPPER + cumulative bounds, SCORE_PEAKS_BEFORE_WIN).

summary: >
  The mandated blind pass this cycle (The Dawn Beacon, rpg, seeds 7/23 — the most-overdue
  dedicated-blind target per [[assessor-blind-pass-rotation]], rotated off the assessor's
  recency-blind rank-1 lamplighters_round, which had been blind-played 6 cycles ago and is
  the single most over-represented pack in the recent ~20-pass history at 4x) returned
  clarity 5/5, enjoyment 4/5, mechanics flawless: a prepared 50/50 win (seed 7) and an
  unprepared 45/50 win (seed 23), both reaching ending_lit cleanly with zero rejected
  actions / loops / broken state, and confirming live the load-bearing prep economy (the
  watchman's +2 attack + the garrison mail's +2 defense as the combat_guaranteed safety, the
  retryable non-lethal might check, the chained exit gates, deterministic milestone scoring).
  Its one concrete friction finding: at the Crown of the Tower there was no explicit "light
  the beacon" verb — simply moving `up` auto-lit it (the +15 lived on beacon_crown.on_enter)
  and ended the game the same frame, so a player carrying flint and expecting a deliberate
  "strike the light" act found the climax narrated AT them by the act of arriving.

root_cause: >
  The original design made beacon_crown a pure LOCOMOTION win (`visited: beacon_crown`) with
  the +15 capstone on the room's on_enter and the lighting only narrated — chosen so
  SCORE_PEAKS_BEFORE_WIN (which exempts navigation wins, bug_0116) would not fire on a
  score-at-the-end pack. But that exemption is exactly what let the climax fire on bare
  entry. This is the identical smell sunken_barrow's seed-71 blind pass surfaced (bug_0107):
  the goal was presented AND resolved in the same frame, the epilogue narrating an act the
  player never performed. dawn_beacon's own prose argued against the auto-fire all along —
  the orders-board ("LIGHT THE BEACON") and the watchman ("Right it, climb to the crown, and
  light it") both promise a deliberate light verb the game never delivered.

fix: >
  Mirror sunken_barrow's claim_relic treatment exactly, turned from a TAKE onto a LIGHT:
    • beacon_crown gains two objects — `beacon_fire` (the laid pitch-pine fire-bed,
      takeable:false) and `flint` (the watch's striker, laid ready in the bed, takeable). The
      crown description is reworded to present the laid fire and the flint as "wanting only a
      struck spark", and the on_enter (+15 + auto-light journal) is REMOVED.
    • beacon_fire carries the explicit climactic act: a USE flint interaction with
      command_verb `light` + command_template "light {target} with {item}", so the offered
      command reads "light beacon with flint" (bug_0078). It is one-shot (not_flag
      beacon_lit), HARD-requires the flint in hand (the USE-offer rule), and its effects set
      beacon_lit, award the +15 capstone (moved here off the room), and narrate the blaze.
    • The win now turns on BOTH `{ visited: beacon_crown }` AND `{ has_flag: beacon_lit }`
      (implicit all_of). The `visited` term is KEPT so the parser validator still derives its
      soft-lock guard from a real win-room; the `has_flag` term means bare entry no longer
      wins. The engine's post-action checkWin (bug_0056) fires the win the same frame the
      flint lands. No lit `variant` is declared for the crown/beacon (the win ends the game on
      the same action, so a beacon_lit variant would be unreachable text under the
      reactive-variant liveness oracle, bug_0145 — the ending prose carries the blaze).
  Net: the deliberate "light the beacon" verb the prose promised is now real; the score TOTAL
  is unchanged (5+10+10+10+15 = 50), reached only WITH the light act; SCORE_PEAKS_BEFORE_WIN
  now ACTIVELY proves the capstone rides the win act (35 reachable without it < 50), where the
  old locomotion win was merely exempt.

regression_test: tests/regression/dawn_beacon_explicit_light_act.test.ts
# Drives the fully-prepared route (seed-robust: mail + counsel make combat_guaranteed hold on
# every roll) to the crown, then asserts: (a) the win keeps BOTH visited + has_flag terms;
# (b) climbing up does NOT end (score 35 < 50, beacon unlit, NO light command offered until
# the flint is held, but the flint is takeable); (c) with the flint held the crown offers
# exactly "light beacon with flint"; (d) lighting sets beacon_lit, awards the final +15, and
# ends ending_lit at the full 50 with exactly one ending event; (e) the pack validates green.

verify:
  - "validate_story content/rpg/pack/dawn_beacon.yaml -> ok, max_score 50, 0 findings"
  - "npx vitest run tests/regression/dawn_beacon_explicit_light_act.test.ts -> 5 passed"
  - "rpg_all_endings_reachable + rpg_score_economy_sound + rpg_combat_guaranteed_optin + parser_score_peaks_before_win + rpg_variant_liveness + rpg_metamorphic_observation_stream -> all green"
  - "npm run health -> green (verify:integrity + typecheck + lint + format + tests + validate + playtest)"
