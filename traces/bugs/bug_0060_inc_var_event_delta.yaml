  rotated_result: >
    Per blind_playtest_protocol.md's "rotate the seed and rotate the pack" and "you MAY pick a higher-
    value candidate," ran a fresh blind pass on The Sealed Crypt (parser, seed 13) — the least-recently-
    exercised pack (untouched by the bug_0055-0059 sweep) and the assessor's rank-4 candidate. It
    surfaced the cycle's one concrete, cross-cutting engine finding (below).
  finding: >
    Sealed Crypt (report §5, rooms graveyard/old_well/crypt): the score state_change events were
    ambiguous. The tester solved the crypt twice and saw the IDENTICAL rope-use milestone (USE rope on
    old_well, a fixed +10) report `value:15` in the run that had read the +5 headstone first and
    `value:10` in the run that skipped it; the gate likewise showed value:35 vs value:30. The event's
    `value` is the var's RUNNING TOTAL, and there was no field for the increment, so "points just earned"
    could not be recovered from the event alone — "A UI that read `value` as 'points just earned' would
    mislead." Verdict otherwise bug-free and satisfying; this is the only engine-level item flagged.
root_cause: >
  src/core/effects.ts emitted inc_var/dec_var state_change events with only `value: next` (the resulting
  cumulative total). set_var also uses `value`, but there it IS the whole value being set, so the field's
  meaning silently differs across effects: for set_var `value` is the new value, for inc/dec it is the
  post-increment total with the increment itself unrecorded. Any consumer that wants the delta (a UI
  surfacing "+10", a transcript narrator, the AI experience log) had to diff against a prior total it may
  not have retained — and at two different running totals the same award looks like two different events.
improvement:
  layer: engine
  engine:
    - src/core/effects.ts: >
        inc_var and dec_var state_change events now carry a signed `delta` beside `value`: `+by` for
        inc_var, `-by` for dec_var. `value` is UNCHANGED (still the resulting total, consistent with
        set_var's "the var's new value"), so the change is purely additive. The delta makes "the change
        just applied" readable directly off the event regardless of the running total. set_var is left
        as-is (its `value` is already the complete new value; no delta is meaningful).
  why_additive: >
    GameEvent's `state_change` variant is `{ type, effect, [k]: unknown }` — extra keys are already part
    of the contract, so adding `delta` needs no type change and breaks no consumer. The observation's
    `score` reads state.vars (not events), so player-facing score is untouched; only the event payload
    gains information.
