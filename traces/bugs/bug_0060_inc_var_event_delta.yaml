evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  mandated_report: ai-runs/2026-06-01T16-49-53-395Z/playtest.md   # clockwork_heist (assessor rank-1 mandated) — verified-clean, see below
  mandated_result: >
    The mandated blind playtest (clockwork_heist, assessor rank-1, seed 23) reached FIVE endings
    (Rich, Caught, Caught-on-the-Hour, Truth ×2 reactive epilogues), clarity 5/5 / enjoyment 5/5, zero
