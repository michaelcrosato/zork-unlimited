id: bug_0194
title: "The committed benchmark scorecard silently rotted — it read 10 packs / 47.7% curated while a fresh runs=50 rebuild reads 13 packs / 40.0% curated (3 packs and 7.7 points stale)"
kind: verification_fix # the deferred-#1 lever: a freshness pin on the last unguarded committed benchmark artifact
mode: all
# Refreshes a generated artifact (traces/benchmark/scorecard.{json,md}) and adds a behavioral
# freshness guard. The artifact is NOT in HASH_PIN_FILES/PROTECTED_FILES, so nothing re-pins and
# verify:integrity stays green with NO AI_LOOP_ALLOW_VERIFIER_EDITS.

summary: >
  traces/benchmark/scorecard.{json,md} is the project's headline objective signal (ULTRAPLAN
  2026-06-02): one comparable row per (pack, strategy), curated vs the contamination-free held-out
  split. But it is a GENERATED file committed to disk and NOTHING forced it to track reality — so it
  silently rotted. At the time of this fix the committed card still read "10 packs" with a curated
  headline of 47.7%, while a fresh runs=50 rebuild reads "13 packs" / 40.0%: dawn_beacon (bug_0187),
  friars_postern (bug_0185) and wolf_winter (bug_0189) had each SHIPPED — wired into health, validated,
  blind-played — without anyone regenerating the scorecard. The published headline score was stale by
  7.7 points and three whole packs, and nothing in the bar caught it. This is the deferred-#1 lever
  named across many cycles' next-focus: pin the last unguarded committed benchmark artifact.

root_cause: >
  The scorecard is written by `npm run benchmark -- --runs 50 --out traces/benchmark/scorecard`, a manual
  step nobody re-ran when a pack shipped. buildScorecard discovers packs live (list_stories + the sealed
  corpus), so a rebuild always reflects the current pack set — but the COMMITTED bytes were a frozen snapshot
  from before three packs existed. No test rebuilt-and-compared, and the artifact was in neither
  HASH_PIN_FILES nor PROTECTED_FILES, so the drift was completely invisible.

fix: >
  (1) Regenerated the committed artifact at runs=50 via the canonical bin/benchmark.ts --out path, so the
  published card now reflects all 13 curated packs (curated headline 47.7% -> 40.0%, the true current score).
  (2) Added tests/regression/benchmark_scorecard_fresh.test.ts: a freshness pin that reconstructs the card
  through the EXACT serialization bin/benchmark.ts uses (renderJson(card)+"\n" / renderMarkdown(card)+"\n"),
  rebuilding at the runs count the committed JSON itself declares (runs_per_cell), and asserts the committed
  bytes are byte-identical. buildScorecard is fully byte-deterministic (the bot is seeded; the only header
  field is the constant `generated_by` string — no clock/RNG; verified by two independent rebuilds diffing
  identical and by the absence of any absolute path / timestamp in the JSON), so this is a sound, non-flaky
  guard. Chose a behavioral test over adding the artifact to HASH_PIN_FILES: the test is a STRONGER guard (a
  hard RED on any divergence vs HASH_PIN_FILES' "surfaced-for-review" warning) and needs NO verifier edit and
  NO AI_LOOP_ALLOW_VERIFIER_EDITS override (adding the artifact to HASH_PIN_FILES while regenerating it in the
  same cycle, with no content/ change, would trip HASH_PIN_UNACCOMPANIED).

out_of_band_teeth: >
  tests/regression/benchmark_scorecard_fresh.test.ts (5 cases): runs_per_cell is a positive integer; the
  rebuild scores >= 13 curated packs AND every rebuilt curated pack_id appears verbatim in the committed JSON
  (the missing-pack drift this very bug was — pinned directly); committed scorecard.json byte-identical to a
  fresh rebuild; committed scorecard.md byte-identical to a fresh rebuild; the rebuild's exact curated headline
  percentage appears verbatim in the committed md (no stale number). Genuine witness: restoring the pre-fix
  (stale) committed scorecard.{json,md} from git and re-running makes 4 of the 5 cases FAIL (only the
  runs_per_cell positivity check survives, since the stale card was also runs=50); the refreshed artifact makes
  all 5 pass. Not vacuous green.

regression_test: tests/regression/benchmark_scorecard_fresh.test.ts

verification: >
  npx vitest run tests/regression/benchmark_scorecard_fresh.test.ts green (5 tests); witness-revert confirmed
  4/5 fail on the stale artifact. npm run health green (verify:integrity + typecheck + lint + prettier + all
  tests + all 13 pack validates + coverage playtest). verify:integrity green with NO AI_LOOP_ALLOW_VERIFIER_EDITS
  (scorecard.{json,md} are in neither HASH_PIN_FILES nor PROTECTED_FILES; no floor lowered, no matcher relaxed).
  Mandated blind pass this cycle ran on tithe_barn (CYOA, seed 11): clarity 5/5, enjoyment 5/5, all five endings
  reached, zero bugs — clean, the saturation signal spent structurally rather than on churning a clean pack.

files_changed:
  - traces/benchmark/scorecard.json   # regenerated at runs=50 (10 -> 13 packs; headline 47.7% -> 40.0%)
  - traces/benchmark/scorecard.md     # regenerated at runs=50
  - tests/regression/benchmark_scorecard_fresh.test.ts
  - traces/bugs/bug_0194_scorecard_freshness_pin.yaml
