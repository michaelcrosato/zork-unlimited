id: bug_0381
pack: gaugers_register_v1
title: "bribe purse warning made evidence-taking look like the right move"
severity: minor
scene: weighing_room
reported_by: blind_playtest_20260620T125229Z_gaugers_register_seed7

symptom: >
  The bribe purse was a takeable object whose TAKE action immediately ended the
  game at ending_bribed. Its examine text warned only that it was "not safe to
  leave behind; not safe to take," which could read like a dilemma where taking
  the purse preserved evidence rather than accepting a bribe.

root_cause: >
  The evidence and the money were bundled into one object affordance. The loose
  leaf was described in EXAMINE text, but the pack did not provide a harmless
  READ action for that evidence, and the warning did not clearly distinguish
  reading/citing the leaf from pocketing the purse.

fix: >
  The purse now has read_text for the loose-leaf evidence. EXAMINE says the leaf
  is evidence and the purse is bait, while TAKE remains the deliberate act of
  pocketing the money and still reaches ending_bribed.

tests: tests/regression/gaugers_register_bribe_purse_telegraph.test.ts
