id: bug_0415
title: Surveyor's Round yard text ignored a found tally when tubs were unmeasured
pack: content/cyoa/pack/excise_surveyors_round.yaml
reported_by: blind playtest 2026-06-22 seed 7
severity: low
symptom: >
  The blind playtest noted stale yard-outbuilding prose after discoveries. The
  pack already had reactive text for measured tubs and for the complete
  tubs-plus-tally record, but if the player examined the roof beam first, the
  scene fell back to the initial hay-store description and did not acknowledge
  that the XIV-style tally had already been found.
root_cause: >
  yard_outbuildings had variants for found_vessels and for found_vessels plus
  found_tally, but no found_tally-only variant.
fix: >
  Added a found_tally-only yard variant that names the fourteen-batch beam mark
  and tells the player the tubs still need measuring before their capacity is
  part of the record.
tests:
  - tests/regression/excise_surveyors_round_blind_polish.test.ts
verification:
  - npm test -- --run tests/regression/excise_surveyors_round_blind_polish.test.ts
  - npm run validate -- content/cyoa/pack/excise_surveyors_round.yaml
