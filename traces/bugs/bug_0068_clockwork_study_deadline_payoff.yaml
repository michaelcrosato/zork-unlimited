bug_id: bug_0068
pack_id: clockwork_heist_v1
seed: 91
evidence:
  source: blind_playtest
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T18-21-12-052Z/playtest.md
  finding: >
    Playtest target this cycle was the assessor's rank-1 candidate, the CYOA pack The
    Clockwork Heist. A fresh, MCP-only blind playtester reached three distinct endings
    across three runs (seeds 91/73) — The Truth (hidden copy), Rich, Caught on the Hour —
    rating it clarity 5/5, enjoyment 4/5, mechanically flawless (zero rejected actions,
    no loops, no soft-locks, no functional bugs; verdict "a confident pass"). Its one
    actionable friction point not already closed by the clockwork polish family
    (bug_0019/0040/0042/0043/0046/0051/0053/0058/0061/0063/0064/0066/0067) is report §4:
    "the exact period of the 'hour' isn't spelled out ... the foreshadowing ('grinds
    toward the hour') is good, but a player can't tell how close the hour is; it lands
    more as atmosphere than a solvable timing puzzle."
failure:
  type: stale_scene_text_missing_reactive_variant
  where:
    - content:content/cyoa/pack/clockwork_heist.yaml
  description: >
    The clockwork-deadline arc (bug_0019/0040/0042/0043) made the gallery, the vault
    door, and the loot room reactively feel the hour as `ticks` climbed, and bug_0064
    extended that to the crawlspace — but the `study` scene was the LAST upstairs
    (tick-charging) room the clock never touched. That is the very room where the player
    reads the steward's ledger and learns the watch walks "on the hour", so a clock-silent
    study told the player WHAT the deadline is without ever letting them feel HOW CLOSE it
    is. The hour's approach therefore read as atmosphere rather than a legible, timeable
    beat at exactly the moment the clue was delivered.
fix:
  layer: content
  summary: >
    Content-only application of the existing CYOA `variants` reactive-text feature, the
    same mechanism and exact treatment as bug_0043's loot room and bug_0064's crawlspace —
    no engine change. The `study` scene gains TWO variants (first-match-wins, higher
    threshold first):
      - ticks >= 4 (the hour): the great clock's chime rolls up through the manor's gears
        into the still room, and beyond the door the watch has begun to walk the gallery —
        tying the just-read ledger page to the live patrol;
      - ticks >= 2 (tension band): the great clock grinds toward that very hour, a sleeping
        house keeps its peace only until the chime, so take what the page can tell you and
        be gone before it strikes.
    The clock is named only by the manor-wide motif (the gears, the chime) and the VISIBLE
    open ledger page the base text already describes — never by foreknowledge the entrant
    lacks (the bug_0058 leak lesson), so the >=4 variant is sound for the no-ledger player
    who can also stand here past the hour (gallery -> enter_study). Because every study
    entry costs a tick via a tick-charging landing, a live study visit is always ticks>=2,
    so the variants cover all real play; the base `text` is UNCHANGED and remains the
    schema fallback. No choice, effect, flag, item, exit, gating, or reachable ending
    changes.
  reachable_endings_changed: false  # text-only; rich / truth(x2) / caught / patrol all intact
  content_hash_changed: true        # clockwork is unpinned in unit tests (only watchtower_road is pinned). fa5cd967481d48f07f1b91b22ce36a9fbdca8994bd3171591cdd3852bdda6c6f -> 643c524583d6b90696f596b7bf34f18f99de801a6f33fc72a70643c239d78da2
  regression_test: tests/regression/clockwork_study_deadline_payoff.test.ts
verified_live: >
    Through the engine path the regression drives (loadPackFile / initStateForPack /
    makeStep / buildObservation) and the running MCP server over the reloaded pack
    (seed 91). Climbing to the gallery and into the study renders the deadline prose at
    ticks 2 ("the great clock grinds toward that very hour ... before it strikes"); leaving
    and re-entering to reach ticks 4 renders the on-the-hour prose ("the hour that page
    names has come round at last ... the watch has begun to walk the gallery"), and that
    chimed variant fired with read_ledger UNSET — confirming the no-foreknowledge wording.
    validate_story is green (0/0) and all reachable endings still fire.
playtest_coverage:
  note: >
    The deterministic coverage bot still cannot plan the multi-step pick/ledger/letter
    routes — a standing heuristic-planner limit documented since bug_0008, not a
    discoverability regression. The blind LLM playtest remains the load-bearing quality
    signal; seed 91 rated the pack shippable (clarity 5/5) and this fix closes its one
    remaining actionable friction point (the study delivered the deadline clue without
    letting the player feel the deadline), completing the clockwork deadline family across
    every traversal scene (gallery -> vault door -> loot room -> crawlspace -> study)
    without touching its tuning.
