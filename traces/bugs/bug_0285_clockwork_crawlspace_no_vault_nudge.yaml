id: bug_0285
title: "clockwork_heist: crawlspace shortcut ending_truth has no nudge toward the vault"
pack_id: clockwork_heist_v1
severity: content
class: incomplete-path-nudge
where: [content:content/cyoa/pack/clockwork_heist.yaml]

summary: >
  The letter_hidden variant of ending_truth (reached via the crawlspace shortcut,
  scoring 20/45) gave no hint that the vault above was never explored. A player who
  finds the shortcut first reaches a complete, satisfying ending but has no signal
  that a fuller vault route exists — they may close the game at 20/45 thinking they
  saw everything.

discovery:
  method: blind_playtest
  seed: 42
  report: ai-runs/2026-06-08T04-28-37-948Z/playtest.md
  tester_quote: >
    "The only meaningful design risk is that the crawlspace shortcut can end a run
    prematurely at 20/45 with no nudge to keep exploring — a player who finds that
    path first may close the game thinking they've seen everything."

fix:
  layer: content
  description: >
    Added one sentence to the letter_hidden variant in ending_truth: "The vault above
    stays cold and locked; his other copy still waits inside it, where he left it for
    whoever cracked the front door." Plants curiosity without penalizing the crawlspace
    player. Pure additive prose — no flag/route/ending/score change.
  content_hash_changed: true  # clockwork_heist yaml: unpinned in tests

regression_test: tests/regression/clockwork_crawlspace_vault_nudge.test.ts

related:
  - bug_0051  # reactive ending_truth variants (letter_hidden vs letter_displayed)
  - bug_0022  # crawlspace lockpick gate
