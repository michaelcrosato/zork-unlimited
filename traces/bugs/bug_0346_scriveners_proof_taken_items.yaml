id: bug_0346
pack: scriveners_proof_v1
title: "office and study still placed taken deed, penknife, and magnifier at starting positions"
severity: minor
scene: front_office / private_study
reported_by: afk_stale_reactive_room_item_audit_2026-06-19

symptom: >
  After taking the disputed deed in the front office, LOOK still said the deed
  lay folded in the open deed box. After taking the penknife, LOOK still said it
  rested against the inkwell. After taking the magnifier in Bassett's private
  study, LOOK still said the writing case held the glass. Dropping these items
  after taking them could also let the rooms fall back to starting-position
  prose.

root_cause: >
  The affected rooms had static base descriptions, and the portable evidence
  and tools did not all leave durable pickup state that room prose could read.
  Inventory alone was not enough because the player can drop an item after
  taking it.

fix: >
  Taking the disputed deed now also sets `disputed_deed_taken`, taking the
  penknife sets `penknife_taken`, and taking the magnifier sets
  `magnifier_taken`. The front office has ordered variants for deed-only,
  penknife-only, and both-taken states, and the private study has a
  magnifier-taken variant, so the deed box, inkwell tray, and writing-case recess
  stay empty after first pickup. Score, exits, endings, and win conditions are
  unchanged.

tests: tests/regression/scriveners_proof_reactive_taken_items.test.ts
