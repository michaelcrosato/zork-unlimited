bug_id: bug_0028
pack_id: sunken_barrow_v1
seed: 13
evidence:
  source: blind_playtest + live_mcp_repro
  protocol: docs/blind_playtest_protocol.md
  report: ai-runs/2026-06-01T09-45-58-246Z/playtest.md
  finding: >
    Playtest target rotated (per the protocol's "rotate the seed and ... rotate the
    pack" + the standing "keep rotating" guidance) off the now ten-times-pristine
    clockwork_heist onto the weakest-scoring pack, the RPG The Sunken Barrow, seed 13.
    The fresh MCP-only blind playtester came back clean this run (clarity 5/5,
    enjoyment 3/5; bug_0027/0026/0023 all confirmed fixed in play, no soft-locks, no
    rejected actions) — but it took the iron bar and immediately moved on, so it never
    re-looked at the Entry Hall WHILE HOLDING the bar and did not re-trigger the
    standing deferred stale-prose defect. I reproduced that defect LIVE via the MCP
    tools (new_game seed 13 -> go down -> take iron bar): visible_objects emptied and
    the bar entered inventory, yet the room `description` still read "A rusted iron bar
    lies among fallen rubble" — narrating an item that is no longer on the floor. This
    is bug_0027 deferred[0] (also bug_0015 deferred[0]).
failure:
  type: stale_room_text
  where:
    - content:content/rpg/pack/sunken_barrow.yaml
  description: >
    The Entry Hall room had a single static `description` that hard-codes the iron bar
    "lies among fallen rubble". The bar is takeable; once taken the engine removes it
    from the room's visible_objects (correct) but the room prose is unconditional, so
    on any re-look / re-entry while the player holds the bar the description contradicts
    both the empty floor and the player's own TAKE action. This is the same
    stale-room-text class fixed for guard_crypt and slab_passage in bug_0011 (and for
    the parser/alchemists rooms in bug_0010/bug_0012); the Entry Hall was simply never
    given a reactive variant.
fix:
  layers: [content]
  summary: >
    Pure CONTENT fix (no engine/validator/schema change — the reactive room `variants`
    feature already exists, bug_0010/bug_0011): add one variant to entry_hall, gated on
    `has_item: iron_bar`, whose text drops the "lies among fallen rubble" clause and
    instead reads "The rubble is scuffed bare where the rusted iron bar lay until you
    took it up." Gating on has_item is the durable proxy for "the bar is no longer on
    this floor" — the closed condition DSL (src/core/conditions.ts) has no
    object-in-room predicate, so this mirrors guard_crypt's wight_slain variant and
    bug_0024's has_item proxy. Verified LIVE that dropping the bar back in the Entry
    Hall flips has_item false and restores the base text (the bar IS present again),
    so the prose stays consistent with visible_objects in both states. No flags / items
    / exits / quest gating / scoring / reachable endings change.
  reachable_endings_changed: false
  content_hash_changed: true   # sunken_barrow yaml text genuinely changed (one room variant added)
  content_hash_before: 4e185710daae1ba34062f62968f432f1378158dc93212a23be57d178875dd4f5
  content_hash_after: e88bc2c096e1e8ab4c425d2c25682bef5e959158a116b0131c739f9709df6844
  repin: >
    Deliberate, surfaced re-pin (NOT a weakening): traces/rpg/barrow_victory.json
    content_hash updated 4e185710... -> e88bc2c0.... The trace's expected_final_hash is
    UNCHANGED — the new variant carries NO effects (text-only), so the seed-1 canonical
    victory replays to the identical final state hash (rpg_barrow_trace.test.ts green).
    This is the legitimate snapshot-update workflow the verifier-integrity drift gate
    classifies as HASH_PIN_REPINNED (a warning accompanied by a real content change),
    not the unaccompanied launder pattern. No test SOURCE pins this pack's hash (only
    watchtower_road is pinned).
deferred:
  - >
    No opening objective line (bug_0027 deferred[1]; bug_0015 deferred[2]): the goal
    (the Barrow-Lord's circlet) is only revealed in the final room; a one-line framing
    in barrow_mouth would orient a first-timer. Left for a future cycle.
  - >
    Scope, not quality (blind playtest §6, repeated note): the barrow is a tidy ~10-step
    vertical slice with one combat and one skill check, both low-stakes. Not a defect;
    a content-expansion call, out of scope for a focused fix cycle.
regression_test: tests/regression/rpg_barrow_entry_hall_stale_bar.test.ts
