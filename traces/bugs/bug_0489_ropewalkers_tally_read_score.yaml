id: bug_0489
title: "Ropewalker's Twist awarded the foreman's tally proof on TAKE instead of READ"
pack: content/parser/pack/ropewalkers_twist.yaml
reported_by: blind_playtest_20260623T020425Z_ropewalkers_twist_seed7
severity: medium
symptom: >
  The blind player found the main narrative payoff by reading the foreman's
  tally, but the action awarded no points. The later TAKE action awarded the
  entire 20-point proof score, making the largest score jump feel attached to
  inventory handling instead of discovery.
root_cause: >
  The pack used foremans_tally.take_effects to set fraud_proved and award the
  score. That made the largest reward fire on possession rather than on the
  player reading and understanding the incriminating private page.
fix: >
  Moved the 20-point award and fraud_proved flag to a one-shot READ interaction
  on the foreman's tally. TAKE still marks the case registerable for the generic
  reachability solver and guildhall submission, but it no longer awards points;
  the score now follows the discovery moment.
tests:
  - tests/regression/ropewalkers_twist_marking_knife_signpost.test.ts
verification:
  - npm test -- --run tests/regression/ropewalkers_twist_marking_knife_signpost.test.ts
  - npm run validate -- content/parser/pack/ropewalkers_twist.yaml
