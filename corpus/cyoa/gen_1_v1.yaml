meta:
  id: gen_1_v1
  title: "Lighthouse: A Two-Truth Fork"
  start: hub
  vars_init: {}
  flags_init: []
scenes:
  - id: hub
    title: the cold lamp-room
    text: "You stand in a wreckers' coast where a false light is paid to draw ships
      onto the reef: the cold lamp-room, the unlit lens, a storm-bound ship
      standing in toward the rocks. the keeper's logbook lies left open beside
      the dead wick, and the keeper's mute boy is crouched in the lamp-room
      shadow, watching you. What kind of person are you, here, tonight?"
    variants:
      - when:
          - all_of:
              - has_flag: knows_way
              - has_flag: knows_ally
        text: "You stand in a wreckers' coast where a false light is paid to draw ships
          onto the reef, and you can no longer pretend not to know. You have
          read the keeper's logbook and you have heard the keeper's mute boy
          out: you know there is a way through this for everyone, and you know
          whose hands could take it. the cold lamp-room, the unlit lens, a
          storm-bound ship standing in toward the rocks."
      - when:
          - has_flag: knows_way
        text: "You stand in a wreckers' coast where a false light is paid to draw ships
          onto the reef, and the keeper's logbook has changed what you see: the
          true channel is marked plain and still passable: the wreck is no
          accident of weather but a trade, and a single honest light would clear
          the ship. the cold lamp-room, the unlit lens, a storm-bound ship
          standing in toward the rocks."
      - when:
          - has_flag: knows_ally
        text: "You stand in a wreckers' coast where a false light is paid to draw ships
          onto the reef, and you cannot now look at the keeper's mute boy the
          way the others do: he has run this lens since he could climb the stair
          and can lay the true beam on the channel by feel in the dark — the one
          hand aboard who can save the ship. the cold lamp-room, the unlit lens,
          a storm-bound ship standing in toward the rocks."
    on_enter: []
    is_ending: false
    choices:
      - id: learn_way
        text: Read the keeper's logbook, left open beside the dead wick.
        conditions:
          - not_flag: knows_way
        effects: []
        next: clue_way
      - id: learn_ally
        text: Hear out the keeper's mute boy.
        conditions:
          - not_flag: knows_ally
        effects: []
        next: clue_ally
      - id: hold
        text: Light nothing, and ride the storm out behind a barred door.
        conditions: []
        effects: []
        next: ending_hold
      - id: best
        text: Put the boy at the lens and let him lay the true beam on the channel.
        conditions:
          - has_flag: knows_ally
        effects: []
        next: ending_best
      - id: dark
        text: Light the false beacon the wreckers paid for and take the fee.
        conditions: []
        effects: []
        next: ending_dark
      - id: greed
        text: Strip the lamp-room of its oil and brass and be gone before dawn.
        conditions: []
        effects: []
        next: ending_greed
  - id: clue_way
    title: Keeper'S Logbook
    text: "You take up the keeper's logbook left open beside the dead wick and read
      it through. It is plain enough: the true channel is marked plain and still
      passable: the wreck is no accident of weather but a trade, and a single
      honest light would clear the ship."
    on_enter: []
    is_ending: false
    choices:
      - id: learn
        text: Take in what it means, and turn back.
        conditions:
          - not_flag: knows_way
        effects:
          - set_flag: knows_way
          - add_journal: "the keeper's logbook: the true channel is marked plain and still
              passable: the wreck is no accident of weather but a trade, and a
              single honest light would clear the ship. The crisis has a way
              through it that you can no longer un-know."
        next: hub
      - id: back
        text: Set it down and go back without reading.
        conditions: []
        effects: []
        next: hub
  - id: clue_ally
    title: Keeper'S Mute Boy
    text: "You hear the keeper's mute boy out where they are crouched in the
      lamp-room shadow, watching you. The truth of it is not what the others
      have decided: he has run this lens since he could climb the stair and can
      lay the true beam on the channel by feel in the dark — the one hand aboard
      who can save the ship."
    on_enter: []
    is_ending: false
    choices:
      - id: learn
        text: Believe them, and turn back.
        conditions:
          - not_flag: knows_ally
        effects:
          - set_flag: knows_ally
          - add_journal: "the keeper's mute boy: he has run this lens since he could climb
              the stair and can lay the true beam on the channel by feel in the
              dark — the one hand aboard who can save the ship. The one the
              others would throw away is the one who could mend it."
        next: hub
      - id: back
        text: Say nothing, and go back.
        conditions: []
        effects: []
        next: hub
endings:
  - id: ending_hold
    title: Hold the Line
    text: You choose discipline in a wreckers' coast where a false light is paid to
      draw ships onto the reef. Light nothing, and ride the storm out behind a
      barred door. What follows is a ship left to grope by in the dark, neither
      lured nor guided.
    variants:
      - when:
          - has_flag: knows_way
        text: "You choose discipline, but not in ignorance: you kept clear of it knowing
          one true light would have cleared her — clean hands bought by doing
          nothing while you could have done right."
  - id: ending_best
    title: The Surest Hand
    text: Because you learned who they truly are, you can do the one thing the rest
      would not. Put the boy at the lens and let him lay the true beam on the
      channel. What follows is a ship brought safe to harbour by the surest hand
      on the coast.
    variants:
      - when:
          - has_flag: knows_way
        text: "You knew the way out and you knew whose hands could take it: you knew the
          channel was passable AND whose hands could thread it, and you gave him
          the light — the wreckers' trade ended on a single honest beam."
  - id: ending_dark
    title: The Sanctioned Wrong
    text: You take the act everyone around you is urging. Light the false beacon the
      wreckers paid for and take the fee. What follows is a ship broken on the
      reef and silver cold in your hand.
    variants:
      - when:
          - has_flag: knows_ally
        text: "You had heard them out, so this is no superstition but a thing done with
          open eyes: you knew the boy could have laid her safe through, and you
          lit the lie over him for the fee anyway."
  - id: ending_greed
    title: Take Yours and Go
    text: You decide the whole of it is none of yours to mend. Strip the lamp-room
      of its oil and brass and be gone before dawn. What follows is a heavy pack
      and a tower left as dark as you found it.
    variants:
      - when:
          - has_flag: knows_way
        text: "You knew there was a way through for everyone, and you took only your
          own: you knew the true channel and the boy who could light it, and you
          carried off the very oil that would have saved her."
