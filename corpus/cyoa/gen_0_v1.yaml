meta:
  id: gen_0_v1
  title: "Barn: A Two-Truth Reckoning"
  start: hub
  vars_init: {}
  flags_init: []
scenes:
  - id: hub
    title: the dark barn
    text: "You stand in a lord's locked grain-barn standing full over a starving
      town: the dark barn, the caught thief pinned against the grain-sacks, the
      only door at your back. the steward's account-book lies open on the table
      by the door, and the caught thief is pinned in the dark, willing to talk
      if you will hear her. What kind of person are you, here, tonight?"
    variants:
      - when:
          - all_of:
              - has_flag: knows_way
              - has_flag: knows_ally
        text: "You stand in a lord's locked grain-barn standing full over a starving
          town, and you can no longer pretend not to know. You have read the
          steward's account-book and you have heard the caught thief out: you
          know there is a way through this for everyone, and you know whose
          hands could take it. the dark barn, the caught thief pinned against
          the grain-sacks, the only door at your back."
      - when:
          - has_flag: knows_way
        text: "You stand in a lord's locked grain-barn standing full over a starving
          town, and the steward's account-book has changed what you see: the
          dearth is made, not fallen: the barn is full and the lord means to
          sell high while the town goes hungry — relief is one unbarred door
          away. the dark barn, the caught thief pinned against the grain-sacks,
          the only door at your back."
      - when:
          - has_flag: knows_ally
        text: "You stand in a lord's locked grain-barn standing full over a starving
          town, and you cannot now look at the caught thief the way the others
          do: she is the miller's daughter, who knows every family's need and
          could share the grain out fairly — a feeding, not a riot. the dark
          barn, the caught thief pinned against the grain-sacks, the only door
          at your back."
    on_enter: []
    is_ending: false
    choices:
      - id: learn_way
        text: Read the steward's account-book, open on the table by the door.
        conditions:
          - not_flag: knows_way
        effects: []
        next: clue_way
      - id: learn_ally
        text: Hear out the caught thief.
        conditions:
          - not_flag: knows_ally
        effects: []
        next: clue_ally
      - id: go_reckon
        text: Step apart and reckon with what the caught thief has told you.
        conditions:
          - has_flag: knows_ally
          - not_flag: resolved
        effects: []
        next: reckoning
      - id: hold
        text: Bar the door again and hold the peace until the magistrate rides in.
        conditions: []
        effects: []
        next: ending_hold
      - id: best
        text: Give the thief the keys and let her share the grain out as only she knows
          how.
        conditions:
          - has_flag: resolved
        effects: []
        next: ending_best
      - id: dark
        text: Hand the thief to the lord's men for the standing bounty.
        conditions: []
        effects: []
        next: ending_dark
      - id: greed
        text: Take what grain you can carry and slip out before either side decides.
        conditions: []
        effects: []
        next: ending_greed
  - id: clue_way
    title: Steward'S Account-Book
    text: "You take up the steward's account-book open on the table by the door and
      read it through. It is plain enough: the dearth is made, not fallen: the
      barn is full and the lord means to sell high while the town goes hungry —
      relief is one unbarred door away."
    on_enter: []
    is_ending: false
    choices:
      - id: learn
        text: Take in what it means, and turn back.
        conditions:
          - not_flag: knows_way
        effects:
          - set_flag: knows_way
          - add_journal: "the steward's account-book: the dearth is made, not fallen: the
              barn is full and the lord means to sell high while the town goes
              hungry — relief is one unbarred door away. The crisis has a way
              through it that you can no longer un-know."
        next: hub
      - id: back
        text: Set it down and go back without reading.
        conditions: []
        effects: []
        next: hub
  - id: clue_ally
    title: Caught Thief
    text: "You hear the caught thief out where they are pinned in the dark, willing
      to talk if you will hear her. The truth of it is not what the others have
      decided: she is the miller's daughter, who knows every family's need and
      could share the grain out fairly — a feeding, not a riot."
    on_enter: []
    is_ending: false
    choices:
      - id: learn
        text: Believe them, and turn back.
        conditions:
          - not_flag: knows_ally
        effects:
          - set_flag: knows_ally
          - add_journal: "the caught thief: she is the miller's daughter, who knows every
              family's need and could share the grain out fairly — a feeding,
              not a riot. The one the others would throw away is the one who
              could mend it."
        next: hub
      - id: back
        text: Say nothing, and go back.
        conditions: []
        effects: []
        next: hub
  - id: reckoning
    title: The Reckoning
    text: "You step apart from the press of it to reckon with what hearing the
      caught thief out has laid on you: she is the miller's daughter, who knows
      every family's need and could share the grain out fairly — a feeding, not
      a riot. Knowing that, there is one course the rest would never take — but
      it asks you to commit to it, with open eyes, before you turn back to act."
    variants:
      - when:
          - has_flag: knows_way
        text: "You step apart to reckon with it, and you can no longer pretend the
          crisis is what it seemed: the dearth is made, not fallen: the barn is
          full and the lord means to sell high while the town goes hungry —
          relief is one unbarred door away. Knowing the way through AND whose
          hands can take it, the course is plain — but it asks you to commit to
          it, with open eyes, before you turn back."
    on_enter: []
    is_ending: false
    choices:
      - id: commit
        text: "Resolve it: when you turn back, you will give the thief the keys and let
          her share the grain out as only she knows how."
        conditions:
          - not_flag: resolved
        effects:
          - set_flag: resolved
          - add_journal: "The reckoning is made: Give the thief the keys and let her share
              the grain out as only she knows how. — the course the rest would
              not take, chosen with open eyes."
        next: hub
      - id: back
        text: Turn back without resolving anything yet.
        conditions: []
        effects: []
        next: hub
endings:
  - id: ending_hold
    title: Hold the Line
    text: You choose discipline in a lord's locked grain-barn standing full over a
      starving town. Bar the door again and hold the peace until the magistrate
      rides in. What follows is an orderly hunger and the law's slow, late
      mercy.
    variants:
      - when:
          - has_flag: knows_way
        text: "You choose discipline, but not in ignorance: you held the line knowing
          the barn was full by design — order kept, but kept over a lie you now
          help carry."
  - id: ending_best
    title: The Surest Hand
    text: Because you learned who they truly are, you can do the one thing the rest
      would not. Give the thief the keys and let her share the grain out as only
      she knows how. What follows is a town fed without a riot, by the one hand
      that knew each door that needed it.
    variants:
      - when:
          - has_flag: knows_way
        text: "You knew the way out and you knew whose hands could take it: you knew the
          dearth was a lie AND who could undo it, and you put the full barn in
          the right hands — the cleanest justice the night could hold."
  - id: ending_dark
    title: The Sanctioned Wrong
    text: You take the act everyone around you is urging. Hand the thief to the
      lord's men for the standing bounty. What follows is a hanging on the green
      and your silver counted out.
    variants:
      - when:
          - has_flag: knows_ally
        text: "You had heard them out, so this is no superstition but a thing done with
          open eyes: you had heard her out and knew she was the one soul who
          could have fed them all, and you sold her for coin regardless."
  - id: ending_greed
    title: Take Yours and Go
    text: You decide the whole of it is none of yours to mend. Take what grain you
      can carry and slip out before either side decides. What follows is a full
      sack and a conscience you take care not to examine.
    variants:
      - when:
          - has_flag: knows_way
        text: "You knew there was a way through for everyone, and you took only your
          own: you knew the barn was full and an open door would have saved the
          town, and you took your sack and left it barred behind you."
