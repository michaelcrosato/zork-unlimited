meta:
  id: gen_2_v1
  title: "Tithe: A Two-Truth Fork"
  start: hub
  vars_init: {}
  flags_init: []
scenes:
  - id: hub
    title: the locked gatehouse
    text: "You stand in a plague village the manor has quietly sealed from within:
      the locked gatehouse, the sick on one side and the open road on the other.
      the bailiff's sealed order lies nailed inside the gate-ward's box, and the
      herb-wife they have blamed is shut in the gate-ward's lean-to, called the
      one who brought the curse. What kind of person are you, here, tonight?"
    variants:
      - when:
          - all_of:
              - has_flag: knows_way
              - has_flag: knows_ally
        text: "You stand in a plague village the manor has quietly sealed from within,
          and you can no longer pretend not to know. You have read the bailiff's
          sealed order and you have heard the herb-wife they have blamed out:
          you know there is a way through this for everyone, and you know whose
          hands could take it. the locked gatehouse, the sick on one side and
          the open road on the other."
      - when:
          - has_flag: knows_way
        text: "You stand in a plague village the manor has quietly sealed from within,
          and the bailiff's sealed order has changed what you see: the contagion
          has all but burned out and the manor knows it — the gate is kept shut
          not to hold sickness but to hide a debt the dead can no longer claim.
          the locked gatehouse, the sick on one side and the open road on the
          other."
      - when:
          - has_flag: knows_ally
        text: "You stand in a plague village the manor has quietly sealed from within,
          and you cannot now look at the herb-wife they have blamed the way the
          others do: she has nursed the sick through and knows exactly who may
          safely pass and who must wait — the one judgement that could open the
          gate without spreading death. the locked gatehouse, the sick on one
          side and the open road on the other."
    on_enter: []
    is_ending: false
    choices:
      - id: learn_way
        text: Read the bailiff's sealed order, nailed inside the gate-ward's box.
        conditions:
          - not_flag: knows_way
        effects: []
        next: clue_way
      - id: learn_ally
        text: Hear out the herb-wife they have blamed.
        conditions:
          - not_flag: knows_ally
        effects: []
        next: clue_ally
      - id: hold
        text: Keep the gate sealed as the order commands and wait for the fever to pass.
        conditions: []
        effects: []
        next: ending_hold
      - id: best
        text: Hand the herb-wife the gate-key and let her pass out whoever she judges
          clear.
        conditions:
          - has_flag: knows_ally
        effects: []
        next: ending_best
      - id: dark
        text: Give the herb-wife to the villagers as the witch they want burned.
        conditions: []
        effects: []
        next: ending_dark
  - id: clue_way
    title: Bailiff'S Sealed Order
    text: "You take up the bailiff's sealed order nailed inside the gate-ward's box
      and read it through. It is plain enough: the contagion has all but burned
      out and the manor knows it — the gate is kept shut not to hold sickness
      but to hide a debt the dead can no longer claim."
    on_enter: []
    is_ending: false
    choices:
      - id: learn
        text: Take in what it means, and turn back.
        conditions:
          - not_flag: knows_way
        effects:
          - set_flag: knows_way
          - add_journal: "the bailiff's sealed order: the contagion has all but burned out
              and the manor knows it — the gate is kept shut not to hold
              sickness but to hide a debt the dead can no longer claim. The
              crisis has a way through it that you can no longer un-know."
        next: hub
      - id: back
        text: Set it down and go back without reading.
        conditions: []
        effects: []
        next: hub
  - id: clue_ally
    title: Herb-Wife They Have Blamed
    text: "You hear the herb-wife they have blamed out where they are shut in the
      gate-ward's lean-to, called the one who brought the curse. The truth of it
      is not what the others have decided: she has nursed the sick through and
      knows exactly who may safely pass and who must wait — the one judgement
      that could open the gate without spreading death."
    on_enter: []
    is_ending: false
    choices:
      - id: learn
        text: Believe them, and turn back.
        conditions:
          - not_flag: knows_ally
        effects:
          - set_flag: knows_ally
          - add_journal: "the herb-wife they have blamed: she has nursed the sick through
              and knows exactly who may safely pass and who must wait — the one
              judgement that could open the gate without spreading death. The
              one the others would throw away is the one who could mend it."
        next: hub
      - id: back
        text: Say nothing, and go back.
        conditions: []
        effects: []
        next: hub
endings:
  - id: ending_hold
    title: Hold the Line
    text: You choose discipline in a plague village the manor has quietly sealed
      from within. Keep the gate sealed as the order commands and wait for the
      fever to pass. What follows is the sickness held and the village left to
      burn itself slowly out.
    variants:
      - when:
          - has_flag: knows_way
        text: "You choose discipline, but not in ignorance: you held the seal knowing
          the fever was already spent — obedience kept over a lie meant only to
          bury a debt."
  - id: ending_best
    title: The Surest Hand
    text: Because you learned who they truly are, you can do the one thing the rest
      would not. Hand the herb-wife the gate-key and let her pass out whoever
      she judges clear. What follows is the well led safely out and the sick
      still tended, by the one who knew which was which.
    variants:
      - when:
          - has_flag: knows_way
        text: "You knew the way out and you knew whose hands could take it: you knew the
          danger was past AND whose judgement could be trusted, and you opened
          the gate by her word — mercy without a single new death."
  - id: ending_dark
    title: The Sanctioned Wrong
    text: You take the act everyone around you is urging. Give the herb-wife to the
      villagers as the witch they want burned. What follows is a fire at the
      gate and a fear that buys you a night's quiet.
    variants:
      - when:
          - has_flag: knows_ally
        text: "You had heard them out, so this is no superstition but a thing done with
          open eyes: you knew she was the one healer who could have freed them
          safely, and you fed her to their fear to be rid of the choice."
