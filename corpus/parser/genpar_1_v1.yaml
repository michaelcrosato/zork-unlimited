meta:
  id: genpar_1_v1
  title: The Wreckers' Light
  start_room: entrance
  vars_init: {}
  flags_init: []
  max_score: 20
rooms:
  - id: entrance
    name: "The Wreckers' Light: Threshold"
    description: a storm-bound lighthouse on a wreckers' coast. Spray bursts over
      the rocks at the tower's foot; a tide-board is bolted by the inner door. A
      oil-locker stands beside the threshold. The way on lies north into the
      dark.
    objects:
      - clue
      - coffer
    exits:
      - direction: north
        to: hub
        conditions: []
    on_enter: []
  - id: hub
    name: The Inner Chamber
    description: The lamp-room is cold and dark, the great lens unlit; a old keeper
      hunches by the dead wick. A keeper's sea-chest stands here, and beyond it
      a low passage is barred until the strongbox gives. The threshold is back
      to the south.
    variants:
      - when:
          - has_flag: hub_open
        text: The lamp-room is cold and dark, the great lens unlit; a old keeper hunches
          by the dead wick. The keeper's sea-chest stands open by the wall, and
          the low passage north into the deep cell lies clear. The threshold is
          back to the south.
    objects:
      - strongbox
    exits:
      - direction: south
        to: entrance
        conditions: []
      - direction: north
        to: inner
        conditions:
          - has_flag: hub_open
        locked_msg: The passage deeper in is barred until the keeper's sea-chest is opened.
    on_enter: []
  - id: inner
    name: The Deep Cell
    description: A cramped service-gallery rings the lens-housing, a watch-locker
      bolted under the trimming-bench. A watch-locker stands here. To the north,
      the lamp-room hatch bars the way on, and apart from it the signal-rocket
      waits. The chamber is back to the south.
    variants:
      - when:
          - has_flag: gate_open
        text: A cramped service-gallery rings the lens-housing, a watch-locker bolted
          under the trimming-bench. The lamp-room hatch stands open now, and
          through it, north, lies the beacon stage. The watch-locker stands open
          by the wall, and apart from it the signal-rocket waits still. The
          chamber is back to the south.
    objects:
      - inner_chest
      - gate
      - hazard
    exits:
      - direction: south
        to: hub
        conditions: []
      - direction: north
        to: goal
        conditions:
          - has_flag: gate_open
        locked_msg: The lamp-room hatch is locked fast; it will not yield without its key.
    on_enter: []
  - id: goal
    name: The Last Chamber
    description: Past the hatch the true channel-beacon waits, trimmed and ready to
      light the ship clear of the reef. The way back is south.
    objects: []
    exits:
      - direction: south
        to: inner
        conditions: []
    on_enter: []
objects:
  - id: clue
    name: tide-board
    aliases:
      - board
      - clue
    description: A slate tide-board, a keeper's hand chalked across it.
    takeable: false
    quest_critical: false
    read_text: "Chalked plain: 'THE OIL-LOCKER KEEPS THE LOCKER KEY; IT OPENS THE
      SEA-CHEST, THE SEA-CHEST GIVES THE WATCH KEY, AND THE WATCH KEY OPENS THE
      WATCH-LOCKER WHERE THE BRASS KEY THAT LIFTS THE HATCH IS KEPT.'"
    container: false
    openable: false
    locked: false
    contents: []
    interactions:
      - verb: READ
        target: clue
        conditions:
          - not_flag: read_clue
        effects:
          - set_flag: read_clue
          - inc_var:
              name: score
              by: 5
  - id: coffer
    name: oil-locker
    aliases:
      - locker
    description: A squat iron oil-locker; a stubby key rattles loose inside.
    takeable: false
    quest_critical: false
    container: true
    openable: true
    locked: false
    contents:
      - lesser_key
    interactions: []
  - id: lesser_key
    name: locker key
    aliases:
      - lockerkey
    description: A stubby key from the oil-locker — no good on the hatch, but it
      throws a sea-chest's lock.
    takeable: true
    quest_critical: true
    container: false
    openable: false
    locked: false
    contents: []
    interactions: []
  - id: strongbox
    name: keeper's sea-chest
    aliases:
      - seachest
    description: A banded sea-chest under the bench, its lock cut for a small key; a
      watch key lies within.
    takeable: false
    quest_critical: false
    container: true
    openable: true
    locked: true
    key_id: lesser_key
    unlock_effects:
      - set_flag: hub_open
      - inc_var:
          name: score
          by: 5
    contents:
      - middle_key
    interactions: []
  - id: middle_key
    name: watch key
    aliases:
      - watchkey
    description: A worn watch key from the sea-chest — no good on the hatch, but it
      opens the watch-locker.
    takeable: true
    quest_critical: true
    container: false
    openable: false
    locked: false
    contents: []
    interactions: []
  - id: inner_chest
    name: watch-locker
    aliases:
      - watchlocker
    description: A bolted watch-locker under the trimming-bench, its lock cut for a
      small key; the brass hatch-key lies within.
    takeable: false
    quest_critical: false
    container: true
    openable: true
    locked: true
    key_id: middle_key
    unlock_effects:
      - inc_var:
          name: score
          by: 5
    contents:
      - key
    interactions: []
  - id: key
    name: brass key
    aliases:
      - key
    description: A salt-greened brass key, fit for a heavy hatch-lock.
    takeable: true
    quest_critical: true
    container: false
    openable: false
    locked: false
    contents: []
    interactions: []
  - id: gate
    name: lamp-room hatch
    aliases:
      - hatch
      - door
    description: A bolted hatch leads up north to the lamp stage. Its lock is
      plainly shaped for a brass key.
    takeable: false
    quest_critical: false
    container: false
    openable: false
    locked: true
    key_id: key
    unlock_narrate: The brass key bites and the hatch lifts on its hinges — above,
      north, the true beacon waits to be lit.
    unlock_effects:
      - set_flag: gate_open
      - inc_var:
          name: score
          by: 5
    contents: []
    interactions: []
  - id: hazard
    name: signal-rocket
    aliases:
      - rocket
    description: A wreckers' signal-rocket sits primed in a cradle, its firing-lock
      keyed like the hatch. Loose it and the false light flares — but the powder
      is rotten and packed wrong, and the man who lit the last one is a stain on
      the wall. This is a one-way mistake.
    takeable: false
    quest_critical: false
    container: false
    openable: false
    locked: true
    key_id: key
    unlock_narrate: The key turns the firing-lock and the rotten charge goes all at
      once, not up the flue but out into the room. There is a white roar and
      then nothing at all.
    unlock_effects:
      - end_game: ending_doom
    contents: []
    interactions: []
npcs:
  - id: guide
    name: the old keeper
    description: A salt-cured old keeper, hands shaking, eyes on the dark sea.
    room: hub
    dialogue:
      root: greet
      nodes:
        - id: greet
          npc_text: You'll have come for the light, then. They always do.
          effects: []
          topics:
            - id: hint
              prompt: Ask the way on
              goto: tell
              end: false
            - id: bye
              prompt: Say goodbye
              end: true
        - id: tell
          npc_text: Find the locker key in the oil-locker; it opens my sea-chest, the
            watch key inside opens the watch-locker in the gallery beyond, and
            the brass key kept in there lifts the hatch.
          effects: []
          topics:
            - id: bye
              prompt: Say goodbye
              end: true
win_conditions:
  - id: reach_goal
    conditions:
      - visited: goal
    ending: ending_win
endings:
  - id: ending_win
    title: The True Light
    text: The hatch lifts and you set the beacon burning down the true channel. Out
      on the black water a ship's lamp answers and stands off the reef. *** You
      have won. ***
    death: false
  - id: ending_doom
    title: The Rotten Charge
    text: You reached for the wreckers' trade and it took you the way it took the
      last keeper — all at once, in a white roar. The reef keeps its ships and
      its fools alike. *** You have died. ***
    death: true
