# Dependency gates (plan §7.2): alerts + weekly update PRs. Action-tag rolls
# (including the SHA-pinned claude-code-action) flow through here for review.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
