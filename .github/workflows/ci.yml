name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Tests (unit + property)
        run: npm test
      - name: Replay round-trips a hand-written trace (Stage 0 acceptance)
        run: npm run replay
