name: CI

# Trust, but verify (see AGENTS.md): the agent has free rein over game code, but
# these checks are the BAR — they block a red push/PR. Verification is the agent's
# own instrument for knowing a change is correct, not a human gate.

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege CI token: this workflow only READS the repo (checkout, install,
# build, test, validate) and never writes — so drop the default broad GITHUB_TOKEN
# scope to read-only (supply-chain hardening; no behavioural change to the checks).
permissions:
  contents: read

# Don't pile up redundant runs: a newer commit on the same ref cancels the older,
# still-running CI for that ref (the AFK loop can push frequently).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verifier integrity (don't route around the verifier)
        run: npm run verify:integrity
      - name: Typecheck
        run: npm run typecheck
      - name: Lint (ESLint)
        run: npm run lint
      - name: Format check (Prettier)
        run: npm run format:check
      - name: Tests (unit + property + determinism)
        run: npm test
      - name: Health (validate + playtest across packs)
        run: npm run health
      # The web UI (Stage 5) is a separate package under ui/ that bundles the headless
      # engine (ui/src imports ../src, which pulls root deps like zod/yaml — installed
      # by `npm ci` above). CI previously never touched it, so it could rot green: a
      # break in ui/ or in an engine API the UI consumes would pass CI unnoticed. The
      # vite build resolves every import and fails on real breakage — the meaningful
      # gate (vite/esbuild does not typecheck cross-package, so a naive UI tsc would
      # false-positive on the engine's node: imports under the browser tsconfig).
      - name: Install UI deps
        run: npm --prefix ui ci
      - name: Build UI (catch UI rot)
        run: npm run ui:build
