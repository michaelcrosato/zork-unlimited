name: CI (advisory)

# Full-trust model (see AGENTS.md): these checks are ADVISORY signals, not gates.
# Every step is continue-on-error, so the workflow never blocks a push or PR — the
# coding agent decides what "working" means. Use the output as feedback if helpful.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck (advisory)
        continue-on-error: true
        run: npm run lint
      - name: Tests (advisory)
        continue-on-error: true
        run: npm test
      - name: Health (advisory)
        continue-on-error: true
        run: npm run health
