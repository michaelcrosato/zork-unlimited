name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Tests (unit + property)
        run: npm test
      - name: Replay round-trips a hand-written trace (Stage 0 acceptance)
        run: npm run replay
      - name: Content pack validates green (Stage 1 acceptance)
        run: npm run validate -- content/cyoa/pack/watchtower_road.yaml
      - name: A pack can be played to an ending via the CLI (Stage 1 acceptance)
        run: npm run play -- content/cyoa/pack/watchtower_road.yaml --choices go_west,ford_brook,cross_north,slip_into_woods,slip_away
      - name: AI playtester roster runs (mock agents, no keys)
        run: npm run playtest -- content/cyoa/pack/watchtower_road.yaml
      - name: Parser pack validates green (Stage 2 acceptance #1)
        run: npm run validate -- content/parser/pack/sealed_crypt.yaml
      - name: A human can complete the parser game via the controlled CLI (Stage 2 acceptance #2)
        run: npm run play:parser -- content/parser/pack/sealed_crypt.yaml --commands "go north; up; take rope; down; west; north; open coffer; take brass key; south; east; east; use rope on old well; down; unlock chest with brass key; open chest; take iron key; up; west; north; down; use iron key on gate; north"
      - name: The §12.8 persona roster runs against the parser pack (Stage 2 acceptance #4)
        run: npm run playtest:parser -- content/parser/pack/sealed_crypt.yaml
      - name: AI authoring pipeline writes a green pack from a premise (§12.1-3)
        run: npm run author -- "A keeper must relight a dead lighthouse before a ship wrecks."
      - name: Stage 3 Sierra-Quest pack validates green (score + death aware)
        run: npm run validate -- content/parser/pack/alchemists_tower.yaml
      - name: Stage 3 pack is completable at full score via the CLI parser
        run: npm run play:parser -- content/parser/pack/alchemists_tower.yaml --commands "west; read book; east; east; take herb; take brass; west; north; up; unlock strongbox with brass key; open strongbox; take iron key; down; use iron key on hatch; down; take vial; up; north; use herb on cauldron; use vial on cauldron; up"
      - name: The persona roster runs against the Stage 3 pack
        run: npm run playtest:parser -- content/parser/pack/alchemists_tower.yaml
