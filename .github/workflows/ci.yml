name: CI

# Trust, but verify (see AGENTS.md): the agent has free rein over game code, but
# these checks are the BAR — they block a red push/PR. Verification is the agent's
# own instrument for knowing a change is correct, not a human gate.

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege CI token: this workflow only READS the repo (checkout, install,
# build, test, validate) and never writes — so drop the default broad GITHUB_TOKEN
# scope to read-only (supply-chain hardening; no behavioural change to the checks).
permissions:
  contents: read

# Don't pile up redundant runs: a newer commit on the same ref cancels the older,
# still-running CI for that ref (the AFK loop can push frequently).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verifier integrity (don't route around the verifier)
        run: npm run verify:integrity
      - name: Typecheck
        run: npm run typecheck
      - name: Lint (ESLint)
        run: npm run lint
      - name: Format check (Prettier)
        run: npm run format:check
      # Root tests SSR-load UI modules through the real Vite config, so its
      # package-local React/Vite dependencies must exist before `npm test`.
      - name: Install UI deps
        run: npm --prefix ui ci
      - name: Tests (unit + property + determinism)
        run: npm test
      # The granular steps above are exactly `npm run health` minus pack
      # validation, so only the validate step remains — running health here
      # would double-execute the entire pipeline (~2x CI time, doubled flake
      # surface, zero added signal).
      - name: Validate every shipped quest
        run: npm run validate
      # The web UI is a separate package under ui/ that bundles the headless
      # engine (ui/src imports ../src, which pulls root deps like zod/yaml —
      # installed by `npm ci` above). The vite build resolves every import and
      # fails on real breakage; the tsc step catches the type-level drift the
      # build can't (esbuild strips types without checking — exactly how six
      # real App.tsx type errors against a changed engine API shipped green
      # before this gate existed).
      - name: Typecheck UI
        run: npx tsc -p ui/tsconfig.json --noEmit
      - name: Build UI (catch UI rot)
        run: npm run ui:build

  crawl-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Mechanical crawl gate (all quests + overworld, deterministic seeds)
        run: npm run crawl:smoke
