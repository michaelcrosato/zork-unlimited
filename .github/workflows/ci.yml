name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Tests (unit + property)
        run: npm test
      - name: Replay round-trips a hand-written trace (Stage 0 acceptance)
        run: npm run replay
      - name: Content pack validates green (Stage 1 acceptance)
        run: npm run validate -- content/cyoa/pack/watchtower_road.yaml
      - name: A pack can be played to an ending via the CLI (Stage 1 acceptance)
        run: npm run play -- content/cyoa/pack/watchtower_road.yaml --choices go_west,ford_brook,cross_north,slip_into_woods,slip_away
      - name: AI playtester roster runs (mock agents, no keys)
        run: npm run playtest -- content/cyoa/pack/watchtower_road.yaml
