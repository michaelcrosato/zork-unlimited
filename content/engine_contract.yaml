# THE ENGINE CONTRACT (spec §11) — what the WRITER agent is given before drafting.
#
# A compact, machine-readable statement of what the engine can and cannot do, so a
# story stays loosely inside the engine's reach without forcing prose into rigid
# schema form. The ADAPTER then classifies every beat against `adaptation_labels`
# (§11); anything labelled `requires_engine_extension` triggers the §14 gate.
engine_capabilities:
  structure:
    - scenes
    - rooms
    - exits
    - choices
    - flags
    - numeric_vars
    - inventory
    - npc_dialogue
    - simple_puzzles
    - cutscenes
    - score          # Stage 3: a numeric var, awarded via inc_var
    - death_endings  # Stage 3: terminal non-win endings, recoverable via load
    - skill_checks # Stage 4: seeded d20 + skill var vs difficulty on an interaction; base effects fire first, then on_success/on_failure
    - quest_stages # Stage 4: named quest progression (set_quest_stage effect + quest_stage condition)
    - stats_and_combat # Stage 4: hp/attack/defense vars + seeded turn-based enemies (RPG packs)

  supported_actions:
    - look
    - move
    - take
    - drop
    - use_item_on_target
    - talk
    - ask_about_topic
    - give_item_to_npc
    - open
    - close
    - unlock
    - read
    - inspect

  # The closed condition/effect vocabulary content may use (§7.1, §16). Content can
  # never introduce new kinds — only the engine, through the §14 gate.
  conditions:
    - has_flag
    - not_flag
    - has_item
    - not_item
    - visited
    - not_visited
    - in_room # "are you here RIGHT NOW" (visited is monotone; this is not)
    - is_open # object opened and still standing open (CLOSE can shut it again)
    - is_unlocked # lock currently open (set_object_locked can re-lock)
    - quest_stage # quest is at the named stage (written by set_quest_stage)
    - var_gte
    - var_lte
    - var_eq
    - all_of
    - any_of
    - none_of
  effects:
    - set_flag
    - clear_flag
    - add_item
    - remove_item
    - set_var
    - inc_var        # scoring uses inc_var on the score var
    - dec_var
    - add_journal
    - goto
    - unlock_exit
    - open_object
    - close_object # inverse of open_object (first-class CLOSE verb)
    - set_object_locked
    - place_object
    - set_quest_stage # advance a named quest to a named stage
    - narrate
    - end_game       # win or death endings

  unsupported_in_v1:
    - real_time_combat
    - stealth_simulation
    - physics
    - companion_ai
    - complex_emotional_relationship_systems
    - arbitrary_crafting
    - free_form_spellcasting

  allowed_workarounds:
    - cutscene
    - narrative_summary
    - branching_choice
    - scripted_event
    - future_mechanic_flag   # mark a desired mechanic for a later stage

# Every beat the writer produces is classified by the adapter as exactly one of:
adaptation_labels:
  - fully_supported
  - supported_with_minor_rewrite
  - requires_cutscene
  - requires_engine_extension     # triggers the §14 gate
  - too_expensive_for_prototype   # deferred
