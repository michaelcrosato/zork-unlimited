# The Advocate's Case — a Stage 4 (Hero's-Quest) pack (spec §13).
#
# The game's TENTH RPG pack — and the FIRST to introduce `rhetoric`, a formal
# argumentative stat measuring the ability to construct a legal argument from
# documentary evidence, cite precedent in the correct sequence, and speak before
# a tribunal in a way that compels a decision. No prior RPG pack uses a
# formal-argumentation stat: the nine predecessors use physical or craft vars
# (might, craft, nerve, tracking, lore) or social command (authority, cunning)
# or clinical observation (physick). Rhetoric is distinct from authority (which
# carries weight because of who you ARE — formal institutional rank) and from
# cunning (which dismantles a deception from the inside by turning the deceiver's
# method against him): rhetoric makes the ARGUMENT itself irresistible — its force
# comes from precedent, sequence, and the weight of a correct legal position stated
# plainly in front of someone who must rule on it.
#
# A cloth-weaver named Marta Holm is having her year's best bolts impounded by Oswin,
# the Weavers' Guild warden, who claims she is selling without a guild license. But
# Marta holds a Royal Charter exemption granted to her late husband Walter for Crown
# service in 1671 — valid, inheritable, registered at the town's charter office, and
# legally binding. Oswin knows the exemption exists; he is betting that no one can
# produce the documentation and argue it coherently before the alderman's deputy
# leaves at noon. The player is a travelling scrivener who arrived at the stall as
# the impound notice was placed and has the training to help.
#
# TWO RESOLUTION PATHS (fourth in the RPG corpus after factors_mark, falconers_ransom,
# tanners_fever):
#   RHETORIC (primary, full score): read charter_roll (+5, the exemption confirmed),
#   take and read town_register (+10, +3 rhetoric: official registration confirms it
#   is heritable and requires no guild license), take and read prior_convictions (+10,
#   +3 rhetoric: the guild lost three similar cases in this district, two signed by
#   Oswin himself). Then USE prior_convictions ON case_record at aldermans_antechamber
#   — rhetoric DC 12. Success: case dismissed, Oswin overruled; Craf steps aside.
#   COMBAT (fallback, partial score): skip the evidence or fail the check — Craf must
#   be fought in the antechamber to force passage. Combat path caps at 40/50.
#
#   market_stall (start; Oswin NPC; charter_roll +5 read, takeable)
#   │  E → charter_office (town_register: +10 read, +3 rhetoric)
#   │  W → guild_records  (prior_convictions: +10 read, +3 rhetoric)
#   │  N → aldermans_antechamber (Craf enemy; case_record skill_check; N gated on
#   │         oswin_overruled OR craf_defeated)
#   └─────── aldermans_antechamber: N → market_square (WIN +15)
#
# Score (max 50, the 5+10+10+10+15 shape):
#   +5  READ charter_roll        — exemption confirmed (one-shot: not_flag charter_read)
#   +10 READ town_register       — official registration (+3 rhetoric; one-shot: has_item + not_flag register_read)
#   +10 READ prior_convictions   — guild precedent (+3 rhetoric; one-shot: has_item + not_flag priors_read)
#   +10 rhetoric check success   — USE prior_convictions ON case_record, DC 12 (one-shot: not_flag appeal_attempted)
#   +15 market_square on_enter   — WIN (locomotion win)
#
# Rhetoric stat calibration (skill checks use d20, combat uses d6):
#   Base rhetoric 3: d20+3 >= 12 → d20 >= 9 → 12/20 = 60% (significant gamble).
#   After register (+3): rhetoric 6, d20 >= 6 → 15/20 = 75%.
#   After priors (+3): rhetoric 9, d20 >= 3 → 18/20 = 90% (near-certain).
#   The pack's honest answer: gather both documents before you argue.
#
# Combat death check (no combat_guaranteed):
#   Player base hp 20 / atk 4 / def 2. Craf: hp 12 / atk 5 / def 2.
#   Worst player dmg per round (d6 min=1): 1+4-2 = 3. Rounds to kill Craf: ceil(12/3) = 4.
#   Worst Craf dmg per round (d6 max=6): 6+5-2 = 9. Over 3 rounds (before kill): 27.
#   27 > 20 HP — Craf CAN kill on worst dice. ending_expelled (death) is reachable.
#   No combat_guaranteed. The pack's answer to the combat threat is the rhetoric path.

meta:
  id: advocates_case_v1
  title: "The Advocate's Case"
  start_room: market_stall
  # `rhetoric` (3 base): formal argumentative ability — constructing a legal position
  # from documentary evidence, citing precedent in order, and speaking before a tribunal
  # with enough clarity and sequence to compel a ruling. New to the corpus — no prior RPG
  # pack uses a formal-argumentation stat. Used in the confrontation skill_check
  # (USE prior_convictions ON case_record, DC 12): base 3 → d20>=9 (60% gamble); with
  # register (+3) → rhetoric 6, d20>=6 (75%); with both preps → rhetoric 9, d20>=3
  # (~90% near-certain). Rhetoric does not boost combat stats.
  vars_init: { hp: 20, attack: 4, defense: 2, rhetoric: 3 }
  flags_init: []
  max_score: 50

rooms:
  - id: market_stall
    name: "Marta's Stall"
    description: >
      A cloth-seller's stall on the high street: two trestle tables spread with
      bolts of good wool broadcloth — russet, tawny, and a dark blue that catches
      the morning light. The bolts have been roped together and tagged with an
      impound notice, the guild warden's seal plain on the paper. Marta Holm stands
      behind the table with the careful stillness of someone who knows she is right
      and is not yet certain it matters. Oswin, the Weavers' Guild warden, occupies
      the street-side of the stall — compact, unhurried, a man at his leisure.
      The charter roll lies on the near table where Marta set it. The charter
      office lies east along the street; the guild records hall is west; the
      alderman's administrative building is north.
    # Reactive: once the appeal is upheld, the stall reads as resolved.
    variants:
      - when: [{ has_flag: oswin_overruled }]
        text: >
          Marta's stall, the impound notice already gone from the bolts. Marta is
          stacking the broadcloth back in order with the methodical care of someone
          who is not yet ready to believe the morning has turned out this way. Oswin
          has not returned to the stall. The charter office is east; the guild
          records hall is west; the alderman's building is north.
    objects: [charter_roll]
    exits:
      - { direction: east, to: charter_office }
      - { direction: west, to: guild_records }
      - { direction: north, to: aldermans_antechamber }

  - id: charter_office
    name: "The Charter Office"
    description: >
      A small room off the Guildhall passage — one clerk, one window, and a wall
      of bound registers going back forty years. The clerk on duty knows this room
      the way a carpenter knows his bench: everything is where it was placed and
      everything has a reason. The town's charter register lies open on the counter,
      its spine worn flat from being consulted. The market stall is back west.
    # Reactive: once the register has been taken, the counter reads as cleared.
    variants:
      - when: [{ has_flag: register_read }]
        text: >
          The charter office. The register is in your hands — the relevant entry
          already read, the clerk already satisfied that you are not going to damage
          the binding. The market stall is back west.
    objects: [town_register]
    exits:
      - { direction: west, to: market_stall }

  - id: guild_records
    name: "The Guild Records Room"
    description: >
      The Weavers' Guild hall's side room, kept locked on most days but standing
      open for the warden's use on market morning. Shelves of conviction ledgers and
      impound records line the west wall — every action the guild has taken in this
      district for the past thirty years, bound and filed. The relevant volume is
      not hard to find: it is the one with the most recent dates and the most
      frequently handled spine. The market stall is back east.
    # Reactive: once the conviction records have been taken, the room reads as done.
    variants:
      - when: [{ has_flag: priors_read }]
        text: >
          The guild records room. The conviction ledger is with you — three prior
          cases read, Oswin's signature on two of the loss entries. The market stall
          is back east.
    objects: [prior_convictions]
    exits:
      - { direction: east, to: market_stall }

  - id: aldermans_antechamber
    name: "The Alderman's Antechamber"
    description: >
      The waiting room outside the alderman's hearing hall — a bench along one wall,
      a case slate on the clerk's table, and the north door to the hall itself.
      Craf — Oswin's hired man — stands in the doorway with the settled patience of
      someone who has been given one instruction and has not been given a second one.
      He is not from the guildhall; he is from wherever Oswin found him. The slate
      on the clerk's table carries Marta Holm's case, waiting for disposition. The
      market stall is back south.
    # Two variants: rhetoric path (oswin_overruled) and combat path (craf_defeated).
    variants:
      - when: [{ has_flag: oswin_overruled }]
        text: >
          The alderman's antechamber. The case slate has been struck through —
          'exemption confirmed, impound discharged, warden's notice void.' Craf
          stepped back from the door when the deputy signed it; he has gone back
          to wherever Oswin sent him from. The hearing hall is north; the market
          stall is south.
      - when: [{ has_flag: craf_defeated }]
        text: >
          The alderman's antechamber, Craf down across the doorway. The hearing
          hall is north; the market stall is south.
    objects: [case_record]
    exits:
      - { direction: south, to: market_stall }
      - direction: north
        to: market_square
        conditions: [{ any_of: [{ has_flag: oswin_overruled }, { has_flag: craf_defeated }] }]
        locked_msg: >
          Craf fills the doorway. The hearing hall — and the square beyond — is on
          the other side, and he is not moving until the case is settled or someone
          moves him.

  - id: market_square
    name: "The Market Square"
    description: >
      The high street opens into the market square north of the alderman's building,
      the full run of it loud with the ordinary business of a market morning. Behind
      you the hearing hall door stands open; Marta's stall is visible at the south
      end of the street, her bolts already being re-spread on the tables. The
      impound notice is gone. The road is clear.
    # Locomotion win (+15 capstone): reaches the full 50 on first entry and fires
    # end_game simultaneously. SCORE_PEAKS_BEFORE_WIN does not fire on a navigation win
    # (bug_0116): the +15 is the last award and the win fires in the same step.
    on_enter:
      - set_quest_stage: { quest: weavers_appeal, stage: market_clear }
      - add_journal: >
          The appeal was heard and the exemption stands. Marta's goods are hers.
          Oswin's impound has no further basis and he knows it.
      - inc_var: { name: score, by: 15 }
    exits:
      - { direction: south, to: aldermans_antechamber }

objects:
  - id: charter_roll
    name: "charter roll"
    aliases: [charter, roll, exemption, exemption roll, royal charter, warrant, document, papers, marta's charter, exemption document, cloth exemption, charter document, rolled charter, charter paper]
    description: >
      A tight roll of vellum in a sleeve of oiled cloth — Marta's Royal Charter
      exemption, the wax seal of the Crown still intact at the tie. She set it on
      the table when Oswin arrived; he has not touched it.
    # Reactive: once read, the roll shows as already examined.
    variants:
      - when: [{ has_flag: charter_read }]
        text: >
          The charter roll, already read — Royal Warrant, Walter Holm, 1671,
          exemption granted to his heirs in perpetuity. The wax seal is genuine.
          What you need now is the registered copy.
    takeable: true
    read_text: >
      'By the authority of the Crown, to Walter Holm of this town, in recognition
      of service rendered: exemption from guild licensing requirements for lawful
      trade in woollen cloth, heritable by his lawful heirs in perpetuity, registered
      at the town charter office in the year 1671.' The seal is genuine — the Crown
      stamp not reproduced in any guild instrument. Marta is Walter's daughter. The
      exemption is hers. The question is whether you can put that answer in front of
      someone who can act on it before noon.
    interactions:
      # First read: +5 score (the foundation — the exemption confirmed in your own hands).
      # One-shot: gated on not_flag charter_read; retired on first READ.
      - verb: READ
        target: charter_roll
        conditions: [{ not_flag: charter_read }]
        effects:
          - set_flag: charter_read
          - set_quest_stage: { quest: weavers_appeal, stage: charter_read }
          - inc_var: { name: score, by: 5 }
          - add_journal: >
              The charter roll: Royal Warrant to Walter Holm, 1671. Exemption from guild
              licensing, heritable in perpetuity, Crown seal genuine. Marta is his heir.
              The exemption is hers — but Oswin is betting no one can argue it fast enough.
              The town charter office holds the registered copy. (+5)
          - narrate: >
              The vellum is worn soft from being unrolled before — Marta has read this
              document many times. The text is plain: Royal Warrant, 1671, Walter Holm,
              exemption from guild licensing for lawful woollen trade, heritable to his
              heirs in perpetuity, registered at the town charter office. The Crown seal
              at the foot is genuine — not a copy, not a guild instrument. Oswin has not
              touched this roll because he knows what is in it. His bet is that a document
              alone is not an argument, and that you cannot make one fast enough to matter.

  - id: town_register
    name: "town register"
    aliases: [register, charter register, town record, charter record, charter book, registration, registry, official record, official register, registered copy, town charter book, clerk's register]
    description: >
      A heavy bound volume in faded brown leather — the town's official charter
      register, open to the relevant page. The entry for Walter Holm's exemption
      is in clear, formal copyist's hand: date, description, beneficiary, scope,
      and the critical phrase at the end of the second line.
    # Reactive: once read, the register shows as already studied.
    variants:
      - when: [{ has_flag: register_read }]
        text: >
          The town register, already read — Walter Holm, registered 1671, exemption
          heritable to his lawful heirs, no guild license required. The clerk has
          made a note of your name. What the charter says and what the register
          confirms are the same thing.
    takeable: true
    read_text: >
      The entry is on the third page of the 1671 register: 'Walter Holm, licensed
      cloth-trader, exemption from Weavers' Guild membership requirement. Authority:
      Royal Warrant (Crown seal affixed to original, verified by this office). Scope:
      lawful woollen trade in this town. Inheritable to lawful heirs without further
      application. No guild license required for exempt household.' The date and the
      copyist's signature are both clear. There is no ambiguity in the phrasing.
      Oswin has seen this entry. He is relying on no one else seeing it today.
    interactions:
      # Close study of the register: +10 score and +3 rhetoric (you now have the
      # registered phrasing to cite precisely under pressure). One-shot: gated on
      # has_item AND not_flag register_read; retired after first scored read.
      - verb: READ
        target: town_register
        conditions: [{ all_of: [{ has_item: town_register }, { not_flag: register_read }] }]
        effects:
          - set_flag: register_read
          - inc_var: { name: rhetoric, by: 3 }
          - inc_var: { name: score, by: 10 }
          - set_quest_stage: { quest: weavers_appeal, stage: register_confirmed }
          - add_journal: >
              Town register, 1671 entry: 'heritable to lawful heirs without further
              application, no guild license required.' Official copyist's hand, dated
              and signed. This is the registered version of what the charter says —
              the authority the alderman's office would accept. (+3 rhetoric, +10)
          - narrate: >
              The phrase is there in clear formal hand: 'heritable to lawful heirs
              without further application, no guild license required.' This is not
              interpretation — it is the registered text. Oswin impounded Marta's goods
              under a rule the official record explicitly exempts her from. The exemption
              is registered, the scope is exact, the inheritance is unconditional. You
              close the register with a clean sense of where the argument begins.

  - id: prior_convictions
    name: "guild conviction records"
    aliases: [convictions, priors, prior cases, guild records, conviction ledger, guild ledger, precedents, case records, prior convictions, warden records, guild cases, case book, conviction book, guild conviction book, guild precedent records]
    description: >
      A bound ledger from the guild records shelves — this district's log of past
      impound actions and their dispositions, including cases the guild lost. Three
      entries near the back are marked 'discharged' in a different hand from the
      original warden's entry. The dates and circumstances are legible.
    # Reactive: once read, the ledger shows as already studied.
    variants:
      - when: [{ has_flag: priors_read }]
        text: >
          The conviction ledger, already read — three discharged cases in this
          district, all citing valid charter exemptions as sufficient discharge.
          Two of the loss entries carry Oswin's own signature as the filing warden.
          He knows the precedent. He filed the impound anyway.
    takeable: true
    read_text: >
      Three entries marked 'discharged by order of the alderman's deputy, charter
      exemption sufficient discharge of impound.' The first is from 1683 — a linen
      merchant, Royal Warrant exemption, impound voided. The second and third are
      from 1689 and 1691 — both cloth traders, both with registered heritable
      exemptions, both impounds dismissed. Each of the three loss entries carries
      a warden's filing signature. The second and third are Oswin's. He has lost
      this argument before, in this district, under the same rule, twice. He did
      not file this impound because he thought he would win. He filed it because
      he thought no one would argue back in time.
    interactions:
      # Close study of the conviction ledger: +10 score and +3 rhetoric (you now
      # have the specific precedent cases to name, including Oswin's own signatures).
      # One-shot: gated on has_item AND not_flag priors_read; retired after first read.
      - verb: READ
        target: prior_convictions
        conditions: [{ all_of: [{ has_item: prior_convictions }, { not_flag: priors_read }] }]
        effects:
          - set_flag: priors_read
          - inc_var: { name: rhetoric, by: 3 }
          - inc_var: { name: score, by: 10 }
          - set_quest_stage: { quest: weavers_appeal, stage: precedents_found }
          - add_journal: >
              Guild conviction ledger: three prior discharged impounds in this district,
              all citing charter exemption as sufficient discharge. Oswin signed the 1689
              and 1691 loss entries himself. He has lost this argument before under the
              same rule. He filed anyway, betting on speed. (+3 rhetoric, +10)
          - narrate: >
              The 1689 entry is in Oswin's own hand for the original impound, and in
              the alderman's deputy's hand for the discharge. 'Charter exemption
              sufficient discharge of the guild warden's impound action. Case closed.'
              The 1691 entry is the same — Oswin filing, deputy discharging, same
              language. He knows this argument. He has been on the losing side of it.
              What you have now is the sequence: the exemption's text, the registered
              confirmation, and the precedent in Oswin's own district. Put those in order
              in front of the deputy and the outcome has already happened twice before.

  - id: case_record
    name: "case record"
    aliases: [record, case, hearing, case slate, slate, hearing record, impound record, alderman's record, case notes, formal record, disposition record, alderman record, case disposition, holm case, marta's case]
    description: >
      The case slate on the clerk's table: 'Holm, Marta — impound notice filed by
      Warden Oswin under Guild Schedule, Article Fourteen. Goods held. Hearing:
      this session.' The alderman's deputy is in the hall; the case is waiting for
      a party to make the argument. The slate and its stylus are there to be used.
    takeable: false
    read_text: >
      'Holm, Marta — impound. Warden: Oswin (Weavers' Guild). Article: Schedule
      Fourteen, unlicensed sale. Goods: twelve bolts broadcloth, held. Claimant
      response: pending.' The 'pending' is the gap. The case is open; the argument
      has not been made yet. The deputy is in the hall and will hear whoever comes
      through the door with something to say.
    interactions:
      # The confrontation: USE prior_convictions ON case_record — present the full
      # argument to the case record (and the deputy beyond the door): the exemption's
      # text, the registered confirmation, and the guild's own precedent. Rhetoric DC 12.
      # One-shot (appeal_attempted set on BOTH branches).
      # The player should have read all three documents first to raise rhetoric to 9
      # (near-certain) — base 3 is a 60% gamble.
      - verb: USE
        item: prior_convictions
        target: case_record
        command_verb: present
        command_template: "present {item} with {target}"
        conditions: [{ not_flag: appeal_attempted }]
        skill_check:
          skill: rhetoric
          difficulty: 12
          on_success:
            - set_flag: appeal_attempted
            - set_flag: oswin_overruled
            - inc_var: { name: score, by: 10 }
            - set_quest_stage: { quest: weavers_appeal, stage: case_dismissed }
            - add_journal: >
                Appeal made and accepted: exemption text, registered confirmation,
                guild's own two prior discharges in Oswin's name. The deputy struck
                the case through on the spot. Impound voided. Craf has no instruction
                left to enforce. (+10)
            - narrate: >
                You lay it out in the correct order — the charter's text first (the
                authority), the town register's entry second (the registration in
                official hand), and the guild's own conviction ledger last (Oswin's
                signature on both prior losses, same rule, same district, same result).
                You say all of it in one even sequence, without pause, giving no gap
                for interruption, because the argument does not need a gap — it is
                already finished before the last line. The deputy listens. He reads
                the register entry. He reads the ledger. He picks up the stylus and
                draws a line through 'pending' on the case slate and writes 'discharged,
                charter exemption confirmed.' He does not look at Craf. Craf steps back
                from the door without being told, because there is nothing left to
                enforce and Craf is not the kind of man who stands in a doorway for
                his own reasons.
          on_failure:
            - set_flag: appeal_attempted
            - add_journal: >
                The argument did not carry — the sequence broke, the precedent came
                in the wrong order, and the deputy asked for the registered copy before
                you had named it. He has adjourned without ruling. Craf has not moved.
            - narrate: >
                The argument comes out in the wrong order — the precedent before the
                registered entry, the entry before the charter text has been clearly
                established, and the deputy raises a hand before you reach the third
                point. He wants the registered copy cited before the precedent; the
                precedent requires the registration to have weight; the registration
                requires the original to be in evidence. You have all of it but you
                have not said it in the right sequence, and a man who hears arguments
                for a living knows the difference between an argument and a list of
                documents. He closes the slate. 'Come back when you have the sequence.'
                Craf has not moved from the door.

npcs:
  - id: oswin
    name: "Warden Oswin"
    description: >
      The Weavers' Guild warden for this district — a compact man in a good guild
      coat, not unkind in expression but entirely without doubt. He has filed this
      kind of notice before. He will wait as long as he needs to.
    room: market_stall
    dialogue:
      root: oswin_root
      nodes:
        - id: oswin_root
          npc_text: >
            Your goods are impounded under Guild Schedule, Article Fourteen —
            unlicensed sale at a licensed market. You may contest the notice at
            the alderman's office. In the meantime, the bolts stay roped.
          # Return variants (bug_0322/0325 pattern): short acknowledgment on re-entry
          # so the full opening speech does not re-fire on every visit.
          variants:
            - when: [{ has_flag: oswin_overruled }]
              text: >
                Oswin is no longer at the stall. He left when the deputy struck
                the case through.
            - when: [{ has_flag: appeal_attempted }]
              text: >
                The matter is with the alderman's deputy. I have nothing to add.
            - when: [{ any_of: [{ has_flag: asked_charter }, { has_flag: asked_article }] }]
              text: >
                I have told you what applies. The charter office is east if you
                believe you have documentation.
          topics:
            - id: ask_charter
              prompt: "Point out that Marta holds a Royal Charter exemption."
              conditions: [{ not_flag: asked_charter }]
              goto: oswin_charter
            - id: ask_article
              prompt: "Ask which Article Fourteen covers and what exceptions apply."
              conditions: [{ not_flag: asked_article }]
              goto: oswin_article
            - id: leave_oswin
              prompt: "Step away."
              end: true
        - id: oswin_charter
          npc_text: >
            A charter exemption requires verification by the alderman's office
            before it can be applied against a guild action. If Marta Holm has
            documentation she believes is relevant, she may bring it to the
            hearing. The impound stands until the deputy rules on it.
          effects:
            - set_flag: asked_charter
            - add_journal: >
                Oswin acknowledged the charter but says it needs alderman's
                verification before it can discharge the impound. He is right
                that the hearing is the right venue — which means the argument
                has to be made there, not here.
          topics:
            - id: charter_back
              prompt: "Walk away."
              goto: oswin_root
        - id: oswin_article
          npc_text: >
            Article Fourteen covers unlicensed sale at licensed markets — any
            goods sold without a current guild membership or an alderman-verified
            exemption on file. The exemptions are documented at the charter office
            if they exist. I suggest you check there before noon.
          effects:
            - set_flag: asked_article
            - add_journal: >
                Article Fourteen: unlicensed sale at licensed markets. Exemptions
                must be alderman-verified. Oswin has just told me exactly where to go
                and what to bring. The charter office is east; the hearing is north.
          topics:
            - id: article_back
              prompt: "Say nothing more."
              goto: oswin_root

enemies:
  - id: craf
    name: "Craf"
    description: >
      Oswin's hired man — broad-shouldered, economical in his stillness, the kind
      of person who is employed for his ability to fill a doorway and not move. He
      is not from the guild; he will not be moved by argument. He has been given
      one instruction and is waiting for a second one.
    room: aldermans_antechamber
    hp: 12
    attack: 5
    defense: 2
    defeat_flag: craf_defeated
    death_ending: ending_expelled
    on_defeat:
      - set_quest_stage: { quest: weavers_appeal, stage: craf_down }
      - add_journal: >
          Craf is down in the antechamber doorway. The market square is open to
          the north. The manner of leaving will be on record but the door is clear.

win_conditions:
  # Locomotion win: reaching market_square — accessible via the rhetoric path
  # (oswin_overruled unlocks the aldermans_antechamber north exit) OR the combat path
  # (craf_defeated unlocks it). The +15 capstone fires on market_square's on_enter
  # in the same step as the win. SCORE_PEAKS_BEFORE_WIN does not fire on a navigation
  # win (bug_0116).
  - id: square_reached
    conditions: [{ visited: market_square }]
    ending: ending_exempted

endings:
  - id: ending_exempted
    title: "The Charter Upheld"
    # Reactive: rhetoric-path epilogue names the deputy's ruling and Oswin's position.
    # Base text covers the combat path. The test reaches this ending via Craf combat;
    # base text must be variant-free on that route (oswin_overruled not set => no variant fires).
    variants:
      - when: [{ has_flag: oswin_overruled }]
        text: >
          The market square is busy with the ordinary business of a late-morning market.
          Behind you the hearing hall door is open, the case slate visible through it —
          Marta Holm's case crossed through in the deputy's hand, 'discharged, charter
          exemption confirmed.' Oswin is somewhere in the guild hall explaining to someone
          why the impound will not be entered in the district record as a successful action.
          He has explained this before, in 1689 and in 1691. He will file again next market
          day, against someone who does not have a travelling scrivener at the stall when
          the notice goes up. Today was not that day. *** You have won. ***
    text: >
      The market square opens north of the alderman's building, loud with the full run
      of market morning. Craf is still in the antechamber behind you; he will be on his
      feet before the hour. But the door is open and Marta's bolts are hers again —
      you did not leave the hearing hall quietly, but you left it. The difference
      between a scene and a precedent is that someone has to stand in the right place
      at the right moment, and today that was you. *** You have won. ***

  - id: ending_expelled
    title: "Expelled from the Market"
    text: >
      Craf gets his weight into you before you reach the doorway, and after that
      the choice is no longer yours. Oswin arrives in the antechamber with the
      measured expression of a man who had anticipated this outcome and is not
      surprised by it. The deputy notes the disturbance in the hearing record.
      Marta's bolts remain impounded; Oswin's notice stands. The charter roll
      stays on the table at the stall, unargued, until market day ends and Marta
      takes it home again. *** You have fallen. ***
    death: true
