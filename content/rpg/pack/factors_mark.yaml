# The Factor's Mark — a Stage 4 (Hero's-Quest) pack (spec §13).
#
# The game's SEVENTH RPG pack — and the FIRST to introduce `authority`, a social/
# command stat measuring official bearing, institutional command, and the ability to
# make a formal argument carry weight under pressure. No prior RPG pack uses a social
# stat: all six predecessors use physical or craft vars (might, tracking, lore, nerve)
# or the standard combat pair. Here authority is the PRIMARY resolution lever — this is
# a bureaucratic ambush, not a hunt or a haunting, and the right tool is calling out a
# corrupt official in front of a witness, not a blade.
#
# Factor Harwick has impounded your merchant's passage-seal at the Saltmere waystation
# on invented contraband grounds — standard extortion, a form he can write on anyone.
# His enforcement man Breckel holds the north gate. You need the seal and the road.
#
# TWO RESOLUTION PATHS (a first in the RPG corpus — prior packs resolve via a single
# primary mechanic with optional preparation):
#   SOCIAL (primary, full score): gather evidence (read the factor's ledger for the
#   systematic overcharges, +3 authority) and a witness (Silas the drover's testimony,
#   +3 authority), then USE the ledger AGAINST the impound notice to make the public
#   confrontation. Authority DC 11 vs authority 3 base (6 with ledger evidence, 9 with
#   both). Success: Harwick folds, gate open, Breckel stands aside — never fought.
#   COMBAT (fallback, partial score): skip the social path or fail the check — Breckel
#   must be fought to pass. He CAN kill a base-stat player on worst dice (no
#   combat_guaranteed). The brute path caps at 40/50; the social path reaches 50.
#
#   waystation_yard (start, seal_notice object, Harwick NPC)
#   │  E → weighing_room (factor_ledger: +10 read, +3 authority)
#   │  W → drover_stall (Silas NPC: +10 testimony, +3 authority)
#   │  N → gate_arch (Breckel enemy; N gated on factor_shamed OR breckel_defeated)
#   └─────── gate_arch: N (factor_shamed OR breckel_defeated) → toll_road (WIN +15)
#
# Score (max 50, the 5+10+10+10+15 shape):
#   +5  READ seal_notice   — impound notice in waystation_yard (one-shot: not_flag notice_read)
#   +10 READ factor_ledger — close reading of the toll register (+3 authority; one-shot: not_flag ledger_studied)
#   +10 Silas testimony    — witnessed account (+3 authority; one-shot: not_flag heard_silas)
#   +10 authority check success — USE ledger ON seal_notice, DC 11 (one-shot: not_flag confrontation_attempted)
#   +15 toll_road on_enter — WIN (locomotion win, coincides with game end)
#   Breckel on_defeat: +0  — combat path is valid but sub-optimal; brute-force is its own cost.
#
# Combat death check (no combat_guaranteed):
#   Player base hp 20 / atk 4 / def 2. Breckel hp 14 / atk 5 / def 1.
#   Worst player dmg per round: 1+4-1 = 4. Rounds to kill Breckel: ceil(14/4) = 4.
#   Worst Breckel dmg per round: 6+5-2 = 9. Total over 3 rounds: 27 > 20 HP.
#   Breckel CAN kill on worst dice. ending_impounded (death) is reachable. No
#   combat_guaranteed flag — the pack's honest survival path is social, not combat prep.
#   Breckel telegraphed in room prose (never an ambush, bug_0123). A fall is
#   save-recoverable (§8.7).

meta:
  id: factors_mark_v1
  title: "The Factor's Mark"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Waystation Yard"
    quest: "break the factor's extortion mark"
    role: "drovers' advocate"
    connection: "Charterhaven's road trade passes through the factor's yard, where a false mark can tax every drove."
  start_room: waystation_yard
  # `authority` (3 base): projects official bearing, institutional command, the
  # ability to make a formal argument stick in front of a witness. New to the corpus —
  # no prior RPG pack uses a social stat. Used in the confrontation skill_check
  # (USE factor_ledger ON seal_notice, DC 11): base 3 → d20>=8 (65% gamble); with
  # ledger evidence (+3) → d20>=5 (80%); with both preps → d20>=2 (~95% near-certain).
  # Authority does NOT boost combat stats — it is the wrong tool for a fight.
  vars_init: { hp: 20, attack: 4, defense: 2, authority: 3 }
  flags_init: []
  # No combat_guaranteed: Breckel on worst dice kills a base-stat player (27 > 20 HP).
  # The pack's answer to the combat threat is to take the social path, not to buff for
  # the fight. See the enemies block for the math.
  max_score: 50

rooms:
  - id: waystation_yard
    name: "The Waystation Yard"
    description: >
      A stone waystation yard on the Saltmere Road, the late afternoon cold coming off
      the river. Factor Harwick stands at the gatehouse steps with your merchant's
      passage-seal in his hand — he has called it contraband, which it is not, and is
      waiting to see what you will do about it. His impound notice is tacked to the
      gatehouse board. The weighing room is to the east, a drover's stall runs off
      to the west, and Breckel stands silent by the north gate.
    # Reactive: once factor_shamed the yard reads as resolved.
    variants:
      - when: [{ has_flag: factor_shamed }]
        text: >
          The Saltmere waystation yard. Harwick has gone inside; he has nothing
          more to arrange at the steps today. Breckel has stepped back from the
          north gate, and the road opens ahead. The weighing room is to the east
          and the drover's stall to the west.
    objects: [seal_notice]
    exits:
      - { direction: east, to: weighing_room }
      - { direction: west, to: drover_stall }
      - { direction: north, to: gate_arch }

  - id: weighing_room
    name: "The Weighing Room"
    description: >
      A low stone room smelling of old wax and river-damp, stacked with impound
      ledgers and sealed manifests. On the work-bench lies Harwick's toll register —
      the official record of every impound at this waystation, in his own hand.
      The yard is back to the west.
    # Reactive: once the ledger is taken the bench reads as cleared.
    variants:
      - when: [{ has_item: factor_ledger }]
        text: >
          The weighing room, the work-bench cleared where the register lay — you
          have it now. The yard is back to the west.
    objects: [factor_ledger]
    exits:
      - { direction: west, to: waystation_yard }

  - id: drover_stall
    name: "The Drover's Stall"
    description: >
      A covered stall at the west side of the yard where a gray-muzzled drover sits
      on a crate, waiting. He has been here three hours and he knows exactly what
      Harwick is doing — he watched it done to the last merchant through. The yard
      is back to the east.
    # Reactive: once Silas has given testimony the stall reads as already visited.
    variants:
      - when: [{ has_flag: heard_silas }]
        text: >
          The drover's stall. Silas sits on his crate, his account already given.
          He will back the numbers if you call them out in the yard — that is all
          a witness needs to do. The yard is back to the east.
    exits:
      - { direction: east, to: waystation_yard }

  - id: gate_arch
    name: "The Gate Arch"
    description: >
      The gate arch through the waystation's north wall. Breckel fills most of it —
      a large, patient man with a truncheon at his belt and nothing to prove. He will
      not move until Factor Harwick tells him to, and Harwick has not told him to yet.
      The waystation yard is back to the south.
    # Two variants: social victory (factor_shamed) and combat victory (breckel_defeated).
    # Most-specific first: breckel_defeated with factor_shamed is the combat path even
    # if factor_shamed was somehow also set (not achievable in normal play, but safe).
    variants:
      - when: [{ has_flag: factor_shamed }]
        text: >
          The gate arch, the door standing open now. Breckel has stepped back from the
          passage — no one told him to hold it any longer, and he is not the kind of man
          who stays in a doorway for his own reasons. The toll road opens north; the
          waystation yard is back to the south.
      - when: [{ has_flag: breckel_defeated }]
        text: >
          The gate arch, Breckel down across the passage. The toll road opens north;
          the waystation yard is back to the south.
    exits:
      - { direction: south, to: waystation_yard }
      - direction: north
        to: toll_road
        conditions: [{ any_of: [{ has_flag: factor_shamed }, { has_flag: breckel_defeated }] }]
        locked_msg: >
          Breckel has not moved from the arch. The toll road is blocked while he
          stands here — get past him or get Harwick to call him off.

  - id: toll_road
    name: "The Toll Road North"
    description: >
      The Saltmere Road opens north past the waystation gate, the river running cold
      to the west and the first town lights beginning to show ahead in the afternoon
      grey. The waystation falls behind you. The passage-seal is yours again, the road
      is clear, and whatever Harwick tells the next inquiry about why he released it
      will be his own concern to manage. The gate arch is back to the south.
    # The locomotion win (+15 capstone): reaches the full 50 on first entry and fires
    # end_game simultaneously. SCORE_PEAKS_BEFORE_WIN does not fire on a navigation win
    # (bug_0116): the +15 is the last award and the win fires in the same step.
    on_enter:
      - set_quest_stage: { quest: saltmere_crossing, stage: crossing_made }
      - add_journal: >
          The Saltmere gate is behind you. The road north is open. Harwick's scheme —
          and Silas' word, if it is ever needed — will stay at the waystation.
      - inc_var: { name: score, by: 15 }
    exits:
      - { direction: south, to: gate_arch }

objects:
  - id: seal_notice
    name: "impound notice"
    aliases: [notice, seal, impound, papers, board, gatehouse board, notice board, official notice, passage seal, impound notice]
    description: >
      Harwick's impound notice, tacked to the board at the gatehouse steps. Official
      in form, vague in substance — the kind of paperwork that costs nothing to write
      and everything to argue against without evidence.
    # Reactive: once the notice is read, the board shows as already studied.
    variants:
      - when: [{ has_flag: notice_read }]
        text: >
          The impound notice, already read — 'contraband suspicion, pending inspection,'
          article nine, Harwick's seal. No specific goods named. The toll register in
          your hands, when you have it, makes the counterargument the notice cannot.
    takeable: false
    read_text: >
      'Contraband suspicion, article nine, pending inspection. Sealed subject to factor's
      clearance.' Harwick's seal below. Article nine covers unlicensed goods — but your
      manifest is fully licensed, and the notice names no specific article from it. The
      form is official. The charge is invented.
    interactions:
      # First-read: +5 score (the opening discovery — understanding the charge).
      # One-shot: gated on not_flag notice_read, retired on first READ.
      - verb: READ
        target: seal_notice
        conditions: [{ not_flag: notice_read }]
        effects:
          - set_flag: notice_read
          - set_quest_stage: { quest: saltmere_crossing, stage: charge_read }
          - inc_var: { name: score, by: 5 }
          - add_journal: >
              The impound notice: 'contraband suspicion, article nine' — but article nine
              covers unlicensed goods and your manifest is fully licensed. No specific
              article is named. Harwick has written a form without a basis and is waiting
              to see if you know it.
          - narrate: >
              The notice reads 'contraband suspicion, article nine, pending inspection'
              in Harwick's careful hand — but article nine of the district schedule covers
              unlicensed goods, and your manifest is fully licensed on its face. He has
              not named a specific article because there is not one. The form carries
              official weight; the charge beneath it is invented. Knowing that is useful.
              Proving it is something else.
      # The confrontation: USE factor_ledger ON seal_notice presents the evidence
      # against the charge — a formal public challenge in Harwick's own yard.
      # Skill check: authority DC 11. One-shot (confrontation_attempted on BOTH branches).
      # On success: factor_shamed set; on failure: Breckel must be dealt with instead.
      # command_verb: present (not in BUILTIN_VERBS); command_template passes both placeholders.
      - verb: USE
        item: factor_ledger
        target: seal_notice
        command_verb: present
        command_template: "present {item} against {target}"
        conditions: [{ not_flag: confrontation_attempted }]
        skill_check:
          skill: authority
          difficulty: 11
          on_success:
            - set_flag: confrontation_attempted
            - set_flag: factor_shamed
            - inc_var: { name: score, by: 10 }
            - set_quest_stage: { quest: saltmere_crossing, stage: factor_shamed }
            - add_journal: >
                Harwick's scheme called out in front of Silas: the register's columns
                against his own impound notice. He folded. Passage-seal returned;
                gate open. (+10)
            - narrate: >
                You open the register to the inspection-fee column and read the numbers
                aloud beside Harwick's own impound notice — flat, steady, with Silas
                ten paces off where he can hear every word. Harwick holds the argument
                for perhaps two seconds. Then he looks at the column, looks at you, looks
                at Silas, and whatever calculation runs behind his eyes completes itself.
                He holds out the passage-seal without speaking. It is over before Breckel
                has time to make up his mind about anything.
          on_failure:
            - set_flag: confrontation_attempted
            - add_journal: >
                The confrontation failed: Harwick conceded a 'clerical error' and moved
                the register before Silas could read it. He is better at this than you.
                The seal stays in his coat. Breckel has not moved.
            - narrate: >
                The argument does not land. Harwick takes the register, turns it to the
                correction column, and concedes a 'clerical error' with the polished calm
                of a man who has done this before — moving it before Silas can lean in
                close enough to read the numbers. He is better at this than you are.
                The seal stays in his coat and Breckel has not been stood down. The north
                gate stays closed.

  - id: factor_ledger
    name: "factor's ledger"
    aliases: [ledger, register, toll register, book, record, accounts, tally, factor ledger, toll ledger, harwick ledger, register book]
    description: >
      Harwick's official toll register — a fat volume in cracked leather, its columns
      dense with dates, goods descriptions, and fees collected. The numbers in the
      'fee collected' column do not match the posted rate on the gatehouse wall.
    # Reactive: once the ledger is studied closely the description acknowledges it.
    variants:
      - when: [{ has_flag: ledger_studied }]
        text: >
          The toll register, already read through — the overcharges are clear in the
          columns, three times the posted rate on every impound this season, under a
          'seal inspection fee' the district schedule has no entry for. The numbers
          are in your head; Harwick's hand throughout.
    read_text: >
      Fee levied: 2s. Seal fee: 1s. Posted rate: 1s. Three times the posted rate on
      every impound this season, under a 'seal inspection fee' the gatehouse schedule
      does not list. Eight merchants in three months, each one charged alike. The hand
      is Harwick's own throughout — not an error. A routine.
    takeable: true
    interactions:
      # Close reading of the register: +10 score and +3 authority (you now have
      # the specific numbers needed to call Harwick out). One-shot: gated on
      # has_item (ledger in hand) AND not_flag ledger_studied; retired after first read.
      # On subsequent READs, the read_text shows instead.
      - verb: READ
        target: factor_ledger
        conditions: [{ all_of: [{ has_item: factor_ledger }, { not_flag: ledger_studied }] }]
        effects:
          - set_flag: ledger_studied
          - inc_var: { name: authority, by: 3 }
          - inc_var: { name: score, by: 10 }
          - set_quest_stage: { quest: saltmere_crossing, stage: evidence_found }
          - add_journal: >
              The register: eight impounds this season, every one triple-charged under
              a 'seal inspection fee' the posted schedule has no entry for. Harwick's
              hand throughout. A pattern — and a pattern is evidence. (+3 authority, +10)
          - narrate: >
              The numbers come clear as you work through the columns — the same overage,
              the same invented inspection line, eight times over, in the same hand all
              the way through. This is not error. You close the register with a cold
              certainty: there are enough columns here to stand Harwick down in front of
              a witness, if you can find one and hold your nerve when you use them.

npcs:
  - id: harwick
    name: "Factor Harwick"
    description: >
      Factor Harwick: a neat, middle-aged man in a good coat, not unkind in manner but
      with the cultivated patience of someone who has held leverage long enough to stop
      worrying about the inconvenience it causes other people.
    room: waystation_yard
    dialogue:
      root: harwick_root
      nodes:
        - id: harwick_root
          npc_text: >
            Your manifest lists goods not on the licensed schedule. I am holding the
            seal pending inspection. These things take time. I suggest you wait.
          # Return variants (bug_0322/0325 pattern): short acknowledgment on re-entry
          # so the full opening speech does not re-fire on every visit.
          variants:
            - when: [{ has_flag: factor_shamed }]
              text: >
                Harwick does not look up from his papers. He has nothing further to say
                to you today.
            - when: [{ has_flag: confrontation_attempted }]
              text: >
                The correction is already entered. Good afternoon.
            - when: [{ any_of: [{ has_flag: asked_contraband }, { has_flag: demanded_seal }] }]
              text: >
                I have nothing to add to what I have already told you.
          topics:
            - id: ask_contraband
              prompt: "Ask what contraband he found in the manifest."
              conditions: [{ not_flag: asked_contraband }]
              goto: harwick_contraband
            - id: demand_seal_back
              prompt: "Demand the return of your passage-seal."
              conditions: [{ not_flag: demanded_seal }]
              goto: harwick_demand
            - id: leave_harwick
              prompt: "Step away."
              end: true
        - id: harwick_contraband
          npc_text: >
            I will need to cross-reference the manifest against the district schedule
            at the next inspection cycle. The inspection is underway. These things
            take time.
          effects:
            - set_flag: asked_contraband
          topics:
            - id: contraband_back
              prompt: "Walk away."
              goto: harwick_root
        - id: harwick_demand
          npc_text: >
            You are welcome to file a complaint with the district collector. The nearest
            office is in Saltmere town, eight miles north — which you cannot reach
            without a cleared seal. In the meantime, I suggest patience.
          effects:
            - set_flag: demanded_seal
            - add_journal: >
                Harwick's deflection: file a complaint in Saltmere, which he controls
                access to. The circularity is the point. Evidence is the only lever that
                moves him — and a witness to make it public is what gives evidence teeth.
          topics:
            - id: demand_back
              prompt: "Walk away."
              goto: harwick_root

  - id: silas
    name: "Silas"
    description: >
      A gray-muzzled drover in a patched coat, sitting on a crate in the western stall
      with the expression of a man measuring exactly how much trouble getting involved is
      worth to him. He has been waiting three hours; he has reached a conclusion.
    room: drover_stall
    dialogue:
      root: silas_root
      nodes:
        - id: silas_root
          npc_text: >
            Three hours I've been sitting here on a manifest that Harwick pulled on the
            same pretext. The man before me cleared his seal in twenty minutes — after
            a private conversation at the gatehouse steps that I wasn't meant to see.
            The fee on that wall is the licensed rate. What's in his ledger is not.
          # Return variant: once testimony given, Silas has done his part.
          variants:
            - when: [{ has_flag: heard_silas }]
              text: >
                I told you what I know. Call it out loud in that yard and I will back
                the numbers. That is all a witness needs to do.
          topics:
            - id: ask_testimony
              prompt: "Ask Silas to stand as witness when you confront Harwick."
              conditions: [{ not_flag: heard_silas }]
              goto: silas_testimony
            - id: ask_private
              prompt: "Ask about the private conversation Silas saw."
              conditions: [{ not_flag: heard_bribe_detail }]
              goto: silas_private
            - id: leave_silas
              prompt: "Thank him and step out."
              end: true
        - id: silas_testimony
          npc_text: >
            I'll stand in the yard, yes. Not out of love for the law — I just want my
            cattle through before dark. But a witness in the yard is a witness in the
            record, and Harwick knows it. Show him the register columns with me ten
            paces off and I will back your account of what they say. That is all a
            witness does, and it is enough to change the calculation for him.
          effects:
            - set_flag: heard_silas
            - inc_var: { name: authority, by: 3 }
            - inc_var: { name: score, by: 10 }
            - set_quest_stage: { quest: saltmere_crossing, stage: witness_secured }
            - add_journal: >
                Silas will stand as witness in the yard. A named witness changes the
                calculation for Harwick: public exposure is a different problem than
                a private complaint. (+3 authority, +10)
          topics:
            - id: testimony_back
              prompt: "Thank him."
              goto: silas_root
        - id: silas_private
          npc_text: >
            The merchant slid something across at the base of the steps — I was too
            far off to see the amount, but close enough to see the hand. Harwick took
            it and the man's seal cleared in twenty minutes. So there's your inspection
            standard: it moves exactly as fast as the fee does.
          effects:
            - set_flag: heard_bribe_detail
            - add_journal: >
                Silas watched a merchant bribe Harwick directly. The 'inspection fee'
                is just the asking price — in writing or in coin, whichever the merchant
                chooses. The pattern is deliberate.
          topics:
            - id: private_back
              prompt: "Nod. That explains the register."
              goto: silas_root

enemies:
  # Breckel — the gate-arch enforcer and the combat-path obstacle. Combat is the
  # fallback when the social path is skipped or the authority check fails; it is not
  # the designed resolution and rewards no score — the brute-path cost is correct. No
  # preparation in this pack buffs the fight (authority is the social lever, not a
  # combat stat), so a player who prepares for the social path and fails the check
  # enters combat at base stats. That is honest: the wrong tool, applied too hard,
  # has a price.
  #
  # Death check (no combat_guaranteed): Breckel hp 14 / atk 5 / def 1.
  #   Worst player dmg: 1+4-1 = 4 per round. Rounds to kill: ceil(14/4) = 4.
  #   Worst Breckel dmg: 6+5-2 = 9 per round. Total over 3 rounds (before kill): 27.
  #   27 > 20 HP — Breckel CAN kill on worst dice. ending_impounded is reachable.
  #   Breckel is telegraphed in waystation_yard and gate_arch prose (bug_0123: no
  #   ambush). A fall is save-recoverable (§8.7).
  - id: breckel
    name: "Breckel"
    description: >
      Harwick's man — large, patient, economical in how he uses his body. Not a brute;
      a professional. He has stood in enough doorways that nothing a merchant can say
      surprises him, and he will not move unless Factor Harwick tells him to or the
      alternative is worse.
    room: gate_arch
    hp: 14
    attack: 5
    defense: 1
    defeat_flag: breckel_defeated
    death_ending: ending_impounded
    on_defeat:
      - set_quest_stage: { quest: saltmere_crossing, stage: breckel_down }
      - add_journal: >
          Breckel is down in the arch. The gate is open. It is not the clean
          resolution — but it is a resolution.

win_conditions:
  # Locomotion win: reaching toll_road — accessible via the social path (factor_shamed
  # unlocks the gate_arch north exit) OR the combat path (breckel_defeated unlocks it).
  # The +15 capstone fires on toll_road's on_enter in the same step as the win.
  # SCORE_PEAKS_BEFORE_WIN does not fire on a navigation win (bug_0116).
  - id: road_cleared
    conditions: [{ visited: toll_road }]
    ending: ending_cleared

endings:
  - id: ending_cleared
    title: "The Road North"
    # Reactive: social-path epilogue is richer (Harwick's calculation, Silas at the steps).
    # Base text covers the combat path. The test reaches this ending via Breckel combat;
    # base text must be variant-free on that route (factor_shamed not set => no variant fires).
    variants:
      - when: [{ has_flag: factor_shamed }]
        text: >
          The Saltmere Road opens north past the waystation gate, the river cold to
          the west and the town lights ahead in the afternoon grey. Behind you Harwick
          is already calculating who he can afford to blame for a clerical error in
          the toll register, and Silas is clearing his own manifest with the deputy
          who quietly replaced Harwick at the gatehouse steps. The passage-seal is
          yours again and the road is clear — and a factor's scheme, once called out
          in front of a witness, tends to attract considerably more official scrutiny
          than a private complaint ever could. *** You have won. ***
    text: >
      The Saltmere Road opens north past the waystation gate, the river cold to
      the west and the town lights ahead in the afternoon grey. You did not leave
      the waystation quietly, and there will be a report. But the road is open and
      the passage-seal is yours, and the difference between a report and a case is
      that someone has to press the case — and Factor Harwick is not having a good
      afternoon. *** You have won. ***

  - id: ending_impounded
    title: "Held at the Waystation"
    text: >
      Breckel gets his weight on you before you can clear the passage, and after that
      it is simply a matter of time. Harwick calls it assault on an officer of the toll —
      a charge that will keep you at the waystation long after the light has gone out of
      this particular afternoon. The passage-seal stays in his coat. *** You have fallen. ***
    death: true
