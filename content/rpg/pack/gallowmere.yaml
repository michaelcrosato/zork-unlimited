# The Gallowmere — a Stage 4 (Hero's-Quest) pack (spec §13, §14 gate).
#
# The game's SIXTH RPG pack. It introduces TWO new skill vars — `tracking`
# (reading spoor and sign on the ground) and `lore` (moorland animal-behaviour and
# wind-reading) — as the pack's primary skill axes, and becomes the FIRST curated
# pack to combine `combat_guaranteed: true` with a LETHAL one-shot skill check in
# the same narrative. None of the five prior packs use both simultaneously:
#   - dawn_beacon / wolf_winter: combat_guaranteed + non-lethal skill checks only
#   - breaking_weir: lethal skill check (nerve, DC 9) + NO combat at all
# Here BOTH are load-bearing and orthogonal: tracking the kill-site gives +2 attack
# (makes the combat guaranteed); heeding Hedrick's lore counsel gives +5 lore (makes
# the lethal DC-9 wind-check pass on worst roll). Skip either prep and you carry the
# cost into the relevant danger; skip both and the moor takes you.
#
# The fiction earns both guarantees the same way prior packs earn theirs (bug_0027/
# 0029/0069/0114): not blind luck but skill and preparation decide the hunt. The
# Gallowmere sow — a great old grey tusker, yellow-tusked, heavy in the shoulder —
# has killed a shepherd on the high moor. You are the huntsman hired to take her
# before nightfall. Hedrick Cradoc, the dead shepherd's son, keeps his father's
# tracking-log and knows the moor better than anyone living; he can tell you how the
# sow charges (opens the attack angle, +2 attack once applied at the kill-site) and,
# more critically, how to read the wind-stone at the Gallowmere Gully before entering
# — because a sow this old always charges from upwind, and a hunter who misreads the
# gully entrance is gored before she sees the blade (+5 lore so the DC-9 wind check
# passes on worst roll). The combat_guaranteed flag is spoken aloud by Hedrick and
# proved by the validator; the lethal check is telegraphed by the log, Hedrick, and
# the room prose, never an ambush (bug_0123).
#
#   moor_edge ─ W ─ shepherd_bothy (Hedrick NPC; shepherd_log +5)
#   (start; hunting_knife)
#   │ N
#   moor_trail ─ E ─ kill_site (spoor_ground; tracking check → found_kill, +2 atk, +10)
#   │ N
#   moor_gully (wind_stone; LETHAL lore check DC9 → +2 def, +10; death: ending_gored)
#   │ N* (gated on read_wind)
#   moor_hollow (the Gallowmere sow — FIGHT; death_ending: ending_taken)
#   │ N* (gated on sow_slain)
#   moor_ridge (WIN +15, locomotion win)
#   (* each gated on prior beat)
#
# Score (max 50, the 5+10+10+10+15 milestone shape the corpus shares): read the
# shepherd's log (+5, §17 clue naming the sow's lair, wind-stone, and charge angle),
# pass the tracking check at the kill-site (+10, one-shot on_success, gated none_of
# found_kill), pass the lore check at the gully (+10, one-shot on_success, gated
# none_of read_wind — scored ONLY on survival, never on the death branch per the
# score-economy bracket rule), put the sow down (+10, on_defeat), and reach the ridge
# with the Gallowmere behind you (+15, locomotion win). The perfect 50 coincides with
# the ridge, never before; SCORE_PEAKS_BEFORE_WIN does not fire on a navigation win
# (bug_0116).
#
# Combat-guaranteed proof (best reachable: atk6/def4/hp24 — tracking +2 atk AND lore
# check +2 def AND base hp):
#   - sow (hp15/atk5/def2): worst player dmg 1+6-2 = 5, so 3 rounds to kill;
#     worst incoming 6+5-4 = 7, over the 2 rounds the sow survives = 14.
#   - 14 < 24 HP, margin 10 — clears COMBAT_NOT_GUARANTEED.
# Without tracking (atk4/def4/hp24): worst dmg 1+4-2 = 3, 5 rounds to kill;
# worst incoming 7 × 4 surviving rounds = 28 > 24 → sow CAN kill on worst dice,
# gamble stays live for the un-tracked hunter.
# Heeding Hedrick (lore=8, DC=9): 1+8=9>=9, worst-roll guaranteed safe.
# Without counsel (lore=3, DC=9): d20>=6 required (~75%), real lethal gamble.
# Note: every hunter who reaches the fight has def4 (the lore check is the gully gate;
# its on_success awards +2 def; no one enters moor_hollow without it). The un-tracked
# gamble is atk4/def4, not atk4/def2. Sow hp=15 (not 12) is chosen so that worst-dice
# atk4/def4/hp24 dies (28>24), while atk6/def4/hp24 still survives (14<24).

meta:
  id: gallowmere_v1
  title: "The Gallowmere"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Gallowmere Moor"
    quest: "cross the moor and answer its gallows claim"
    role: "moor traveller"
    connection: "Gallowmere is Charterhaven's feared outer road, where old sentences still decide who reaches the city."
  start_room: moor_edge
  # Two new skill vars alongside the standard combat pair and hp:
  # `tracking`: reading spoor, hoof-sign, and ground evidence.
  # `lore`: moorland animal behaviour, wind-reading, hunter's knowledge.
  # hp 24 is tuned for the combat_guaranteed margin (14 worst-case < 24).
  vars_init: { hp: 24, attack: 4, defense: 2, tracking: 3, lore: 3 }
  flags_init: []
  # With both preps (tracking +2 atk at kill_site, lore +2 def at wind_stone) best
  # reachable = atk6/def4/hp24; sow worst-case damage = 14 < 24 HP. Proved above.
  combat_guaranteed: true
  max_score: 50

rooms:
  - id: moor_edge
    name: "The Moor's Edge"
    description: >
      A grey afternoon on the high moor, the heather rolling north-west toward the
      Gallowmere — the boggy hollow where Hedrick says the great sow lairs and where
      they found his father's body this morning. Your hunting-knife is at your belt;
      it is your first and best tool out here. A shepherd's bothy squats dark and
      low to the west; the moor path climbs north toward the Gallowmere.
    # Reactive: once the hunting_knife is taken the belt-reference reads true.
    variants:
      - when: [{ has_item: hunting_knife }]
        text: >
          A grey afternoon on the high moor, the heather rolling north-west toward
          the Gallowmere — the boggy hollow where Hedrick says the great sow lairs
          and where they found his father's body this morning. A shepherd's bothy
          squats dark and low to the west; the moor path climbs north toward the
          Gallowmere.
    objects: [hunting_knife]
    exits:
      - { direction: west, to: shepherd_bothy }
      - { direction: north, to: moor_trail }

  - id: shepherd_bothy
    name: "The Shepherd's Bothy"
    description: >
      A low stone hut smelling of cold ash and old wool. Hedrick Cradoc — young,
      red-eyed, the shepherd's only son — sits on a stool by the dead hearth. His
      father's tracking-log lies open on the work-bench: years of spoor notes and
      drift-marks for every herd and predator on this moor, the last entries all
      about the Gallowmere sow. The moor is back through the door to the east.
    # Reactive: once the log is read, the bench reads as already studied.
    variants:
      - when: [{ has_flag: read_log }]
        text: >
          The shepherd's bothy. Hedrick sits by the cold hearth, quiet now you
          have read his father's log. The log lies on the work-bench, its pages
          turned. The moor is back to the east.
    objects: [shepherd_log]
    exits:
      - { direction: east, to: moor_edge }

  - id: moor_trail
    name: "The Moor Trail"
    description: >
      A faint trod across the heather, the ground soft and black underfoot. Something
      large passed here recently — the spoor still dimpling the wet peat northward.
      A wide patch of churned ground lies to the east, dark and heavy with old blood:
      the kill-site where the shepherd fell. The path climbs north into the gully.
    objects: [peat_sign]
    exits:
      - { direction: south, to: moor_edge }
      - { direction: east, to: kill_site }
      - { direction: north, to: moor_gully }

  - id: kill_site
    name: "The Kill Site"
    description: >
      The place where old Cradoc fell. The heather is broken and black with old
      blood, and the hoof-prints of the Gallowmere sow press deep in the peat all
      around — big prints, the hind pair far wider-spaced than the fore, the charging
      signature of a sow coming in fast. Your hunting-knife will let you read the
      angle if you work the ground carefully. The moor trail is back to the west.
    # Reactive: once the site is read, the ground no longer invites close reading.
    variants:
      - when: [{ has_flag: found_kill }]
        text: >
          The kill site, already read — hoof angle and charge line noted, the sow's
          attack pivot clear in your mind. The moor trail is back to the west.
    objects: [spoor_ground]
    exits:
      - { direction: west, to: moor_trail }

  - id: moor_gully
    name: "The Moor Gully"
    description: >
      A dip in the moor where the black water stands all winter — the Gallowmere
      proper. The ground narrows between two tall peat-hags, and a single old
      standing stone tilts at the western lip: the wind-stone, pitted on its east
      face and smooth on the west, marking exactly which way the wind runs through
      the cut. The sow's lair is in the hollow to the north; the trail runs back
      south. A hunter who does not read the wind-stone first is giving the sow the
      upwind quarter — Hedrick's father's last mistake.
    # Reactive: once wind is read, the gully looks passable.
    variants:
      - when: [{ has_flag: read_wind }]
        text: >
          The Gallowmere Gully, the wind-quarter set and your angle confirmed — the
          hollow is to the north and you are coming in right-handed, nothing for
          the sow to smell ahead of you. The trail runs back south.
      # Legibility for a player who arrives without the knife (cannot attempt the check).
      - when: [{ not_item: hunting_knife }]
        text: >
          A dip in the moor where the black water stands all winter — the Gallowmere
          proper. The ground narrows between two tall peat-hags, and a single old
          standing stone tilts at the western lip: the wind-stone, marking the wind's
          run through the cut. The sow's lair is north; the trail is south. Your
          hunting-knife is back at the moor's edge — without it you cannot take the
          stone's measure.
    objects: [wind_stone]
    exits:
      - { direction: south, to: moor_trail }
      - direction: north
        to: moor_hollow
        conditions: [{ has_flag: read_wind }]
        locked_msg: >
          You cannot enter the Gallowmere hollow without reading the wind first.
          A sow this wise always comes from upwind, and going in blind is giving
          her the kill. Use your hunting-knife on the wind-stone to take its
          measure before you step past the cut.

  - id: moor_hollow
    name: "The Gallowmere Hollow"
    description: >
      A shallow bowl of black peat and broken reed, ringed by taller hags. It
      smells of old musk and blood. The Gallowmere sow is here — a great grey
      animal, heavy across the shoulders, her tusks yellowed and her eyes small
      and still. She has seen you come in from the right quarter and she knows it.
      The gully is back to the south.
    # Reactive: once the sow is down the hollow opens north.
    variants:
      - when: [{ has_flag: sow_slain }]
        text: >
          The Gallowmere hollow, the great sow down in the reed-bed, her flanks
          gone still. The moor lifts north to the ridge; the gully is back to
          the south.
    exits:
      - { direction: south, to: moor_gully }
      - direction: north
        to: moor_ridge
        conditions: [{ has_flag: sow_slain }]
        locked_msg: >
          The Gallowmere sow stands between you and the ridge; she will not
          let you pass until one of you is down.

  - id: moor_ridge
    name: "The Moor Ridge"
    description: >
      The high ground above the Gallowmere, the last of the grey light spreading
      across the valley below. The sow is down in the hollow at your back. The
      shepherds who winter on this ground are safe, and old Cradoc's boy will
      have something to put in the log beside his father's last entry.
    # Locomotion win: score fires on entry, quest stage closes.
    on_enter:
      - set_quest_stage: { quest: gallowmere_hunt, stage: hunt_done }
      - add_journal: >
          The Gallowmere sow is down. The high moor is quiet. Below, the valley
          lies safe and the shepherds will not lose another to her this winter.
      - inc_var: { name: score, by: 15 }
    exits:
      - { direction: south, to: moor_hollow }

objects:
  - id: hunting_knife
    name: "hunting-knife"
    aliases: [knife, blade, edge, hunting blade, hunter's knife, huntsman's knife, hunting knife]
    description: >
      A well-kept hunting-knife, the blade honed to a working edge. You have carried
      it long enough that the grip has worn to your hand's shape. It will serve for
      reading stone and reading ground, and for worse business at close quarters.
    takeable: true

  - id: shepherd_log
    name: "shepherd's log"
    aliases: [log, ledger, journal, book, notes, tracking log, cradoc's log, shepherd log]
    description: >
      A thick working log in Cradoc's close hand: years of spoor notes, kill-counts,
      and range maps for the high flocks. The last pages are all Gallowmere sow — a
      lifetime of knowledge about this moor distilled into one old man's careful
      script.
    # read_text is shown when the player READs the object; the interactions block
    # fires the one-shot flag-and-score effect on the first READ.
    read_text: >
      The last entries read: 'SOW AT GALLOWMERE HOLLOW. ALWAYS COMES FROM UPWIND —
      EAST OF NORTH THROUGH THE CUT. WIND-STONE AT THE GULLY-LIP MARKS THE RUN
      EXACTLY: READ IT BEFORE YOU GO IN OR SHE HAS YOU BEFORE YOU SEE HER. THE
      KILL-SITE TELLS THE CHARGE ANGLE — HOOF WIDER ON THE RIGHT IN THE RUN-UP,
      PIVOTS THE LEFT TUSK UP. READ THE GROUND AND READ THE WIND AND SHE IS JUST A
      VERY LARGE PIG. — CRADOC, LAST AUTUMN.'
    takeable: false
    interactions:
      - verb: READ
        target: shepherd_log
        conditions: [{ not_flag: read_log }]
        effects:
          - set_flag: read_log
          - set_quest_stage: { quest: gallowmere_hunt, stage: log_read }
          - inc_var: { name: score, by: 5 }
          - add_journal: >
              Cradoc's log, last entry: the sow comes from upwind, always east-of-north
              through the cut — read the wind-stone at the gully lip before you go in,
              and read the kill-site for the charge angle. Know both and she is beatable.

  - id: peat_sign
    name: "peat sign"
    aliases: [sign, peat, trod, passage, hoofmarks, hoof marks, peat marks]
    description: >
      Large hoofprints in the wet peat, still dimpling fresh — the sow's passage north
      into the gully, probably this morning. Broad-spaced hinds. She was moving fast,
      but the useful reading is not on this trod; the charge angle will be clearer at
      the churned kill-site to the east, before you commit yourself to the gully.
    takeable: false

  - id: spoor_ground
    name: "kill-site ground"
    aliases: [ground, spoor, tracks, blood, marks, trail, kill, hoof, hoofprints, prints, site, kill site, kill-site]
    description: >
      The churned peat and broken heather where Cradoc fell. The blood is dark and
      crusted now, but the hoof-prints are clear in the soft ground — big prints, the
      sow coming in fast from the east. Your hunting-knife will let you read the charge
      angle off the strike-marks if you take your time with it.
    # Reactive: once read, the ground shows as already worked.
    variants:
      - when: [{ has_flag: found_kill }]
        text: >
          The kill-site, already read — right tusk on the pivot, coming in low from
          the east. You know the angle now.
    takeable: false
    interactions:
      # Tracking skill check (the §13 RPG mechanic). Tool-on-target USE: the hunter reads
      # the ground by setting the blade-edge as a pointer and working the hoof-strike
      # geometry backward to the charge line. RETRYABLE and NON-LETHAL: on a failed roll
      # the sign is unclear but not gone — work it again. One-shot award: gated none_of
      # found_kill so the +10 cannot be farmed by re-reading an already-read site.
      # DC 10 vs tracking 3: d20>=7 required (~70% per try), retryable, always eventually
      # passable — honest work, never a hard block (bug_0027 honesty discipline). No score
      # on the failure branch (score-economy bracket rule, rpg_score_economy_sound.test.ts).
      - verb: USE
        item: hunting_knife
        target: spoor_ground
        command_verb: track
        command_template: "track {target} with {item}"
        conditions: [{ none_of: [{ has_flag: found_kill }] }]
        skill_check:
          skill: tracking
          difficulty: 10
          on_success:
            - set_flag: found_kill
            - set_quest_stage: { quest: gallowmere_hunt, stage: kill_read }
            - inc_var: { name: attack, by: 2 }
            - inc_var: { name: score, by: 10 }
            - add_journal: >
                Kill-site read: the sow pivots right on the charge, rolling the left tusk
                up. You know exactly which angle to take her from — the attack opens up
                from her blind side. (+2 attack)
            - narrate: >
                You set the blade-edge against the deepest print and work backward along
                the run: hind-prints wide and forward-heavy, the left-hoof strike harder.
                She pivots right on the kill, rolling the left tusk up. You know the
                angle. A dagger of clarity opens in your chest — you did not have that
                a minute ago.
          on_failure:
            - narrate: >
                The ground tells you something but not enough — there are too many
                overlaid prints where she milled after the kill, and the clean charge-line
                is not out of it yet. The evidence is here. Work it again from the
                heaviest prints.

  - id: wind_stone
    name: "wind-stone"
    aliases: [stone, standing stone, old stone, pitted stone, wind stone, windstone, marker, standing]
    description: >
      A shoulder-high standing stone at the gully's lip, pitted to a rough face on
      its east side and smooth on the west — worn that way by the wind pouring out
      of the cut for more winters than anyone has counted. The pitted face is the
      receiving side: the wind runs north-east through this cut. Read it with your
      blade before you go into the hollow and you will know exactly which quarter to
      enter from so the sow has nothing to smell.
    # Reactive: once wind is read, the stone shows as already worked.
    variants:
      - when: [{ has_flag: read_wind }]
        text: >
          The wind-stone, already read — north-east wind through the cut, the sow
          upwind to the north-east of the hollow. You entered from the south-west
          and held the weather-gauge, and she had nothing to smell until you were
          already moving.
    takeable: false
    interactions:
      # Lore skill check — the ONE LETHAL obstacle (the pack's single one-shot death gate,
      # the breaking_weir storm-walk shape applied to a hunting context). Tool-on-target
      # USE: the hunting-knife must be held to attempt the reading (you hold the flat of
      # the blade into the wind and match it to the stone's weathering). NON-retryable:
      # on_failure ends the game (ending_gored) — misread the wind, the sow circles
      # downwind, she is on you from behind a peat-hag before you have your knife up. A
      # final fatal fall cannot be retried (bug_0027 honesty: the failure narrate explains
      # the consequence and the prose telegraphs it clearly ahead of time). DC 9 vs lore:
      # base lore 3 needs d20>=6 (~75%, real gamble); Hedrick's counsel (+5 lore) lifts
      # lore to 8 so the WORST roll passes (1+8=9>=9) — heeding Hedrick makes the reading
      # safe, exactly the load-bearing prep the prose promises. One-shot award: gated
      # none_of read_wind; no score on the fatal branch (score-economy bracket rule). The
      # +2 defense on success is also what makes the combat_guaranteed bound hold: every
      # hunter who reaches the fight has def4 (this check is the gate; you cannot enter
      # moor_hollow without read_wind, and read_wind is set only on success, which also
      # grants +2 def). Telegraphed by the log, by Hedrick, and by the room prose
      # (bug_0123: never an ambush).
      - verb: USE
        item: hunting_knife
        target: wind_stone
        command_verb: gauge
        command_template: "gauge {target} with {item}"
        conditions: [{ none_of: [{ has_flag: read_wind }] }]
        skill_check:
          skill: lore
          difficulty: 9
          on_success:
            - set_flag: read_wind
            - set_quest_stage: { quest: gallowmere_hunt, stage: wind_read }
            - inc_var: { name: defense, by: 2 }
            - inc_var: { name: score, by: 10 }
            - add_journal: >
                Wind-stone read: north-east wind through the cut, sow upwind to the
                north-east. Entered from the south-west with the weather-gauge behind
                you; she cannot smell you coming. (+2 defense)
            - narrate: >
                You hold the flat of the blade into the air and feel the pull of it,
                then set the edge to the stone's pitted face — the weathering reads
                north-east, and Hedrick's telling clicks into place all at once. You
                know the quarter. You angle in from the south-west, the wind behind you,
                your approach invisible on the air. The sow is north of the hag and she
                does not know you are coming.
          on_failure:
            - end_game: ending_gored

npcs:
  - id: hedrick
    name: "Hedrick"
    description: "Hedrick Cradoc, the dead shepherd's son — young, quiet, red-eyed, his father gone this morning. He sat up all night reading the log before he sent for you."
    room: shepherd_bothy
    dialogue:
      root: hedrick_root
      nodes:
        - id: hedrick_root
          npc_text: >
            You are the huntsman they sent for. Good. My father's log is on the
            bench — he spent forty winters on this moor and wrote down everything
            he knew. Ask what you need to know.
          # bug_0325/0322 pattern: short variant on return after any topic heard,
          # so the full greeting does not re-fire on every return from a topic node.
          variants:
            - when:
                - any_of:
                    - { has_flag: heard_lore_counsel }
                    - { has_flag: heard_father }
              text: "What else do you need from me?"
          topics:
            - id: ask_sow
              prompt: "Ask Hedrick how the sow hunts."
              conditions: [{ not_flag: heard_lore_counsel }]
              goto: hedrick_sow
            - id: ask_father
              prompt: "Ask Hedrick about his father."
              conditions: [{ not_flag: heard_father }]
              goto: hedrick_father
            - id: leave_hedrick
              prompt: "Thank him and step out."
              end: true
        - id: hedrick_sow
          npc_text: >
            She comes from upwind. Always — my father wrote it a dozen times. She
            holds the weather-gauge better than most dogs and she runs the gully
            knowing the wind will carry your smell to her before you see her. There
            is a standing stone at the gully lip, north face pitted by the east wind.
            Read it with your blade before you step past the cut: it tells you exactly
            where she waits and exactly how to enter so she has nothing on the air.
            Get your angle right and she is just a very large pig. Go in wrong and she
            is on you from behind a peat-hag before your knife is up. Heed the stone.
          effects:
            - set_flag: heard_lore_counsel
            - inc_var: { name: lore, by: 5 }
            - add_journal: >
                Hedrick: the sow holds the upwind quarter always. Read the wind-stone at
                the gully lip with your blade — get the angle right and enter from the
                lee side, and she cannot smell you coming. (+5 lore)
          topics:
            - id: hedrick_sow_back
              prompt: "Nod, and ask something else."
              goto: hedrick_root
        - id: hedrick_father
          npc_text: >
            He was careful. Forty years on this moor and never badly hurt, and then
            one morning in a hurry. I think he went in wrong-handed — he knew the
            stone perfectly well and I think he was hurrying, the way you do when
            you are sure you already know the answer. The log says everything he
            knew. I hope you read it slower than he did.
          effects:
            - set_flag: heard_father
            - add_journal: >
                Hedrick thinks his father went in too fast and misjudged the wind-quarter.
                The log is the preparation; the stone is the discipline that matters
                in the moment.
          topics:
            - id: hedrick_father_back
              prompt: "Nod. You will read careful."
              goto: hedrick_root

enemies:
  # The Gallowmere sow — the pack's single combat, the fair one-fight guaranteed proof.
  # Combat is one ATTACK = one round: player deals d6+attack-enemy.defense (min 1),
  # and the enemy, if it survives, deals d6+enemy.attack-playerDef (min 1). Player
  # strikes first each round.
  #
  # Tuned so the fully-prepared hunter (best reachable: atk6/def4/hp24 — tracking
  # check +2 atk, lore-check +2 def, base hp) survives on the WORST rolls:
  #   - sow (hp15/atk5/def2): worst player dmg 1+6-2=5, so 3 rounds to kill;
  #     worst incoming 6+5-4=7, over the 2 rounds the sow survives = 14.
  #   - 14 < 24 HP — clears COMBAT_NOT_GUARANTEED with margin 10.
  # Without tracking (atk4/def4/hp24): worst dmg 1+4-2=3, 5 rounds to kill;
  # worst incoming 7 × 4 surviving rounds = 28 > 24 → sow CAN fell the hunter
  # on worst dice, so the death ending ending_taken is reachable (gamble stays live,
  # by design). Sow hp=15 chosen so both inequalities hold: 14<24 (guaranteed) and
  # 28>24 (gamble reachable). hp=12 was insufficient: worst-dice atk4/def4/hp24
  # still survives 21<24 — ending_taken would be unreachable.
  # Note: def4 is guaranteed for ALL fighters (lore check awards +2 def on success;
  # moor_gully's north exit is gated on read_wind which sets only on success).
  # The un-tracked gamble is atk4/def4/hp24, never atk4/def2/hp24.
  # Both enemies telegraphed in room prose; a fall is save-recoverable (§8.7).
  - id: gallowmere_sow
    name: "Gallowmere sow"
    description: >
      A great grey sow, heavy in the shoulder and long in the tusk — old, and well
      past the age of caution. She has killed before and she is neither afraid nor
      hurrying. She is simply waiting for you to give her the upwind quarter.
    room: moor_hollow
    hp: 15
    attack: 5
    defense: 2
    defeat_flag: sow_slain
    death_ending: ending_taken
    on_defeat:
      - add_journal: >
          The Gallowmere sow is down in the reed-bed, her flanks still and her
          long grey sides no longer moving. The moor is quiet.
      - inc_var: { name: score, by: 10 }

win_conditions:
  # Locomotion win: reaching moor_ridge after the sow is down (the north exit from
  # moor_hollow is gated on sow_slain, so the ridge is only accessible via the hunt).
  # The on_enter inc_var +15 fires in the same frame; SCORE_PEAKS_BEFORE_WIN is exempt
  # for navigation wins (bug_0116). The full 50 coincides with stepping onto the ridge.
  - id: hunt_won
    conditions: [{ visited: moor_ridge }]
    ending: ending_hunt_won

endings:
  - id: ending_hunt_won
    title: "The Gallowmere Taken"
    text: >
      The moor ridge, and the grey light going out across the valley below. You came
      up out of the Gallowmere with the sow behind you in the reed-bed and the
      shepherds safe below, and old Cradoc's boy can write the last line in his
      father's log — the long tally closed. You walk down into the last of the light
      carrying something that is not quite pride and not quite rest, but is close to
      both. *** You have won. ***

  - id: ending_gored
    title: "The Moor's Keeping"
    text: >
      You misjudged the wind. The Gallowmere sow was on you from the north-east
      hag before your knife came up — faster than you expected, from the quarter
      you had not covered. The gully is a long way from the valley road. Old
      Cradoc's log will have a second entry before the year is out, in Hedrick's
      hand this time. *** You have fallen. ***
    death: true

  - id: ending_taken
    title: "The Old Tusker Won"
    text: >
      The sow was stronger than you were ready for. She went down hard, but she
      went down on top of you, and the weight of her finished what the tusks began.
      The Gallowmere hollow is quiet by nightfall. They will not find you until
      the spring thaw. *** You have fallen. ***
    death: true
