# The Sunken Barrow — a Stage 4 (Hero's-Quest) pack (spec §13, §14 gate).
#
# Demonstrates the gated RPG mechanics over the same deterministic core:
#   - character stats as numeric vars (hp / attack / defense / might)
#   - one turn-based, seeded fight (the barrow-wight) gating a flag
#   - one seeded skill check (might) gating a quest stage
#   - a death ending recoverable via an earlier save (§8.7)
# Every fight/check is replayable because its randomness flows through the seeded
# PRNG (§8.5). The pack passes the full parser validator AND the RPG checks.

meta:
  id: sunken_barrow_v1
  title: "The Sunken Barrow"
  start_room: barrow_mouth
  vars_init: { hp: 20, attack: 4, defense: 2, might: 3 }
  flags_init: []
  # Stage-3 scoring: points are awarded once at each of the three beats that mark
  # real progress through the barrow — slaying the guard-wight that bars the way
  # (+10), levering the great slab aside with iron and might (+15), and CLAIMING the
  # crown (+25). Each award rides a milestone that only fires once (the wight dies
  # once; the lever retires after success, bug_0015; the circlet's take_effects fire on
  # the single pickup, which also ends the game — bug_0107), so the score cannot be
  # farmed and the intended path reaches the full 50. The final +25 deliberately rides
  # the CLAIM — taking the circlet from its plinth (win_conditions, bug_0056) — not bare
  # chamber entry: that is what keeps max score from being in hand BEFORE the final
  # crown-vs-coffin choice, so the irreversible doom fork (prising the sarcophagus,
  # ending_woken, without ever taking the crown) tops out at 25/50 while only the true
  # victory reaches 50 (bug_0107, a blind-playtest finding). The conventional `score`
  # var accrues via inc_var; the RPG validator folds the combat/skill-check awards into
  # the SCORE_UNREACHABLE upper bound, so the declared max is genuinely reachable.
  max_score: 50

rooms:
  - id: barrow_mouth
    name: "Barrow Mouth"
    description: >
      A low arch of turf-bound stone opens into the hillside — the Sunken Barrow,
      where the old songs lay the Barrow-Lord to rest with his pale circlet still
      on his brow. That crown is what you came down out of the daylight to take.
      Cold air sighs up from the dark, and the only way to it is down.
    exits:
      - { direction: down, to: entry_hall }

  - id: entry_hall
    name: "Entry Hall"
    description: >
      A hall of fitted slabs. A rusted iron bar lies among fallen rubble, and a
      passage runs north into deeper dark. A low breach gapes west into a cramped
      side cell, and steps climb back up to the light.
    # Reactive room text (bug_0011 shape): once the bar is in hand the rubble is
    # bare, so the room must stop narrating the bar as still lying there. Gated on
    # `has_item: iron_bar` — the closed condition DSL has no object-in-room
    # predicate, so the player holding the bar is the durable proxy for "no longer
    # on the floor" (mirrors guard_crypt's wight_slain variant and bug_0024's
    # has_item proxy). The bar is the only takeable object here and you take it to
    # solve the slab; if it is dropped back in this room has_item flips false and
    # the base text — bar in the rubble — reads true again, matching visible_objects.
    variants:
      - when: [ { has_item: iron_bar } ]
        text: >
          A hall of fitted slabs. The rubble is scuffed bare where the rusted iron
          bar lay until you took it up. A passage runs north into deeper dark, a low
          breach gapes west into a cramped side cell, and steps climb back up to the
          light.
    objects: [iron_bar]
    exits:
      - { direction: up, to: barrow_mouth }
      - { direction: north, to: guard_crypt }
      - { direction: west, to: reaver_rest }

  # Optional side beat (content_new, bug_0075). The pack's standing critique across
  # every blind pass is brevity + linearity — "exactly one path and one meaningful
  # choice", enjoyment 3/5 (ai-runs/.../playtest.md, seed 31). cold_forge was authored
  # to answer that critique with a TALKING NPC the barrow itself never received; this
  # retrofits the barrow with its own — an optional detour off the Entry Hall, met
  # BEFORE the wight, so its counsel is a real choice the player makes ahead of the
  # fight. It changes nothing on the existing critical path (rooms/combat/lever/score/
  # win all untouched). Since bug_0102 made the wight a genuine lethal gamble under-armed
  # and the shade's +2-defense ward the decisive survival lever, the canonical victory
  # trace now runs THROUGH this detour (the intended prepared path), per bug_0101's
  # "switch helpers to the canonical buffed route."
  - id: reaver_rest
    name: "The Reaver's Rest"
    description: >
      A cramped side cell, little more than a fault in the rock. Propped against the
      far wall are the bones of some long-dead grave-robber who came down for the
      same cold crown you seek and never climbed back to the light. A thin grey shade
      still clings to them — watchful, with no warmth left in it, and no malice either.
    exits:
      - { direction: east, to: entry_hall }

  - id: guard_crypt
    name: "Guard Crypt"
    description: >
      Niches line the walls, each holding the dust of a forgotten guard. One
      niche is empty — and something has climbed out of it. An archway east is
      choked with the cold the thing gives off.
    variants:
      - when: [ { has_flag: wight_slain } ]
        text: >
          Niches line the walls, each holding the dust of a forgotten guard. One
          niche stands empty, its risen tenant crumbled to grave-dust across the
          floor. The cold has lifted from the archway east, and the dark beyond
          it lies open.
    exits:
      - { direction: south, to: entry_hall }
      - direction: east
        to: slab_passage
        conditions: [ { has_flag: wight_slain } ]
        locked_msg: "The barrow-wight bars the way; you cannot pass while it stands."

  - id: slab_passage
    name: "Slab Passage"
    description: >
      The passage ends at a great stone slab set flush with the floor, its edge
      gripped by a worn iron lip — made to be levered, by someone strong enough.
    variants:
      - when: [ { quest_stage: { quest: barrow, stage: slab_moved } } ]
        text: >
          The passage ends where the great stone slab once lay flush with the
          floor. Levered aside now, it has bared a stair that drops down into the
          dark of the earth.
    objects: [stone_slab]
    exits:
      - { direction: west, to: guard_crypt }
      - direction: down
        to: relic_chamber
        conditions: [ { quest_stage: { quest: barrow, stage: slab_moved } } ]
        locked_msg: "The slab is shut fast. It must be levered aside first."

  - id: relic_chamber
    name: "Relic Chamber"
    # The Barrow-Lord himself now lies here, in a sealed sarcophagus — closing the
    # continuity wobble a blind playtester (seed 7) flagged: the barrow_mouth intro
    # sings of the crown "still on his brow", yet the chamber showed only a plinth
    # with no Lord present. The circlet is now described as lifted from his brow to
    # the plinth for the burying, so the song and the scene agree. More importantly
    # the chamber telegraphs the warned-against danger IN SCENE (the heavy, wrong air
    # over the sealed lid), so prising it is an INFORMED choice even for a player who
    # skipped the shade — never a gotcha (the pack's bug_0027/0029 discipline). The
    # safe, obvious act — take the crown and climb out — is still front and centre
    # (bug_0083).
    description: >
      Below the slab, a small vaulted chamber. A great sarcophagus of black stone
      stands sealed at its heart — the Barrow-Lord himself, laid to his long rest
      within. Before it, on a low plinth, rests his pale circlet, lifted from his
      brow and set out at the burying; it glows faintly with its own cold light. The
      crown is yours for the taking, and the stair climbs back to the light behind
      you. The sealed lid is another matter: the air over it lies heavy and wrong,
      and every instinct you own says to let what sleeps beneath it sleep on.
    objects: [circlet, sarcophagus]
    # bug_0107: the +25 final-beat award no longer rides this on_enter. A blind
    # playtester (seed 23/7, ai-runs/2026-06-02T08-19-08-656Z/playtest.md §4/§5) flagged
    # that arriving in the chamber pushed the score to the full 50/50 BEFORE the final
    # crown-vs-coffin choice — so the irreversible DOOM ending (prising the sarcophagus,
    # ending_woken) also read "Final score: 50 of 50," the same tally as the true
    # victory, undercutting score as a signal of having won. The award now fires on the
    # deliberate CLAIM (the circlet's take_effects below), so the doom fork tops out at
    # 25/50 (incomplete) and only taking the crown reaches 50. The chamber-reached
    # journal stays — reaching the chamber is still a logged beat — but it no longer
    # carries points.
    on_enter:
      - add_journal: "You have reached the relic chamber."
    exits:
      - { direction: up, to: slab_passage }

objects:
  - id: iron_bar
    name: "iron bar"
    aliases: [bar, lever, iron]
    description: "A rusted but sound iron bar, the length of your arm. A lever, if you have the strength."
    takeable: true

  - id: stone_slab
    name: "stone slab"
    aliases: [slab, stone]
    # Base (unsolved) examine. bug_0069: the prior wording ("not by one heroic
    # effort, but ... heaving again and again until the old stone gives") flatly
    # PROMISED an iterative grind, but the lever is a single seeded d20+might vs 12
    # that succeeds ~60% on the FIRST use — so a first-roll winner (blind seed 13)
    # found the prose over-sold a grind that never happened, and it contradicted the
    # on_success "you heave — and the slab grinds aside" (one heave). The reword reads
    # true on BOTH paths — it may give on the first heave or take several — while
    # keeping bug_0027's load-bearing signal that PERSISTENCE (not more muscle or a
    # missing tool) is the path, so a player who DOES fail still reads "keep at it".
    description: "A great floor slab with an iron-gripped lip. Wedge the bar beneath the lip and set your stubborn weight to it: it may give on the first heave or take several, but leverage — not raw strength — is what works the old stone loose."
    # Reactive examine (bug_0023/0039/0044 shape): once the slab is levered aside the
    # examine must stop telling the player to wedge the bar and heave — that contradicts
    # the room, which already flips to "Levered aside now ... a stair" on slab_moved. A
    # blind playtester (seed 59) hit exactly this: after solving the lever puzzle, `look
    # at stone slab` still read "Wedge the bar beneath the lip and it can be levered",
    # instructing them to lever an already-open slab. Gated on the same slab_moved quest
    # stage the room variant uses (first match wins; there is only one). Examine-only:
    # no flag/item/score/exit/interaction/gating change, so the lever puzzle, the
    # one-shot retire (bug_0015), and the win remain untouched.
    variants:
      - when: [ { quest_stage: { quest: barrow, stage: slab_moved } } ]
        text: "The great slab is levered aside now, dragged half off the bed where it lay flush with the floor; its iron-gripped lip juts at an angle and a stair drops away beneath it into the dark of the earth."
    takeable: false
    interactions:
      - verb: USE
        item: iron_bar
        target: stone_slab
        # The prose insistently primes "lever" (the bar is "a lever", the slab is
        # "made to be levered ... leverage is what works it loose", and a blind
        # playtester at seed 7 flagged that the offered command nonetheless read
        # "use iron bar on stone slab"). So the natural command is "lever stone slab
        # with iron bar" via a per-interaction command_verb + command_template
        # (bug_0078, generalizing bug_0074's self-USE command_verb to item-on-target).
        # The id stays `use_iron_bar_on_stone_slab`; "use iron bar on stone slab"
        # still parses; the skill_check below is untouched.
        command_verb: lever
        command_template: "lever {target} with {item}"
        # The lever is a one-shot puzzle: once the slab is moved the check
        # retires, so re-using the bar can never re-roll and narrate the slab
        # "does not give" while the stair stands open behind it.
        conditions: [ { none_of: [ { quest_stage: { quest: barrow, stage: slab_moved } } ] } ]
        skill_check:
          skill: might
          difficulty: 12
          on_success:
            - set_quest_stage: { quest: barrow, stage: slab_moved }
            - inc_var: { name: score, by: 15 }
            - narrate: "Tendons cracking, you heave — and the slab grinds aside, baring a stair down."
          on_failure:
            # bug_0027: the failure feedback must read as REPEATABLE PROGRESS, not a
            # fixed strength threshold — a blind playtester (seed 88) failed twice,
            # inferred from the "strong enough"/"real might" framing that a missing
            # strength item was needed, searched the whole map, found none, and quit a
            # winnable game. might is fixed (no item raises it); the check is a flat,
            # penalty-free, infinitely-retryable d20+might vs 12 (~60%/try). So the
            # narration now signals the slab IS shifting and that persistence — not
            # more muscle or a hidden tool — is the path.
            - narrate: "The bar bites and the slab grinds a hand's breadth — then grates back into its bed. It IS shifting; you simply haven't caught it at the right moment yet. No greater strength or hidden tool is wanting here — only leverage and a stubborn back. Reset your feet on the iron lip and heave again; keep at it and the stone will come."

  - id: circlet
    name: "Barrow-Lord's circlet"
    aliases: [circlet, relic, crown]
    description: "A circlet of pale metal, cold and faintly luminous."
    takeable: true
    # The final +25 beat (bug_0107): awarded on the deliberate CLAIM, not on chamber
    # entry. take_effects fire right after the pickup and one-shot intrinsically (once
    # held the circlet isn't takeable-visible, and the TAKE also satisfies claim_relic →
    # ending_victory, so the game ends and it can't re-fire). Moving the award here is
    # what makes the doom fork (prising the sarcophagus without ever taking the crown)
    # read 25/50 while only the true victory reaches the full 50.
    take_effects:
      - inc_var: { name: score, by: 25 }

  # The Barrow-Lord's sealed sarcophagus — the thing the shade warns of (bug_0083).
  # A blind playtester (seed 7) named the pack's biggest design gap: the shade's
  # gravest line, "do not think to wake what sleeps beneath the slab", framed the
  # descent as a real moral choice — heed it and take only the crown, or wake the
  # Barrow-Lord — yet the warning pointed at NOTHING (no Lord present, no action to
  # wake him, no consequence). A Chekhov's gun that never fires. This object cashes
  # it: prising the sealed lid is the warned-against act, and it is real and
  # terminal. It is the SAME tool-and-back motif as the slab (the iron bar, "prise"
  # echoing "lever"), and the player always holds the bar here (the slab cannot be
  # levered without it, bug_0069), so the choice is always offered. The examine
  # repeats the warning so the act is informed, not a gotcha.
  #
  # The examine no longer says prising "would want the iron bar and a stubborn back,
  # THE SAME AS THE SLAB DID" (bug_0095). A fresh blind playtester (seed 5, ai-runs/
  # 2026-06-02T00-34-06-096Z/playtest.md §4/§5) flagged that line as an examine/action
  # mismatch: it explicitly promised the SLAB's mechanic — a might `skill_check` that
  # "may give on the first heave or take several" — but the prise interaction below
  # carries NO skill_check; it fires `end_game: ending_woken` instantly on the first
  # use. Text writing a check the engine never cashes is exactly the over-promise this
  # pack's honesty discipline fights (bug_0027/0029/0069, the slab's own bug_0069
  # reword). The line still names the iron bar (it IS required — `item: iron_bar`
  # below) but now reads true to the terminal act: NOT the slab's patient, repeatable
  # leverage puzzle, but one decisive, irrevocable wrench. No flag/score/item/exit/
  # interaction/gating/reachable-ending change — examine-only, the doom fork and the
  # peaceful victory are untouched.
  - id: sarcophagus
    name: "sealed sarcophagus"
    aliases: [sarcophagus, coffin, lid, casket, sepulchre]
    description: "A great lidded coffin of black stone, its seams run with lead and old wax. The Barrow-Lord lies within, and the shade's warning — if you stopped to hear it — was plain: do not think to wake what sleeps here. The iron bar would set to the leaded seams readily enough — but this is no patient slab to be worked loose by degrees: one wrench of the lid and the deed is done, past all undoing. Far better to take the cold crown from its plinth and climb back to the light."
    takeable: false
    interactions:
      # The warned-against act. Terminal (end_game), so it can fire only once and
      # needs no retire-condition. command_verb/template give it the natural phrasing
      # the prose primes ("prise the sealed sarcophagus with the iron bar"), echoing
      # the slab's "lever ... with the iron bar" (bug_0078). No flag/score/win-condition
      # change: the peaceful take-the-crown victory (claim_relic → ending_victory) and
      # the +50 score are untouched; this only adds the doom fork the warning promised.
      - verb: USE
        item: iron_bar
        target: sarcophagus
        command_verb: prise
        command_template: "prise {target} with {item}"
        effects:
          - add_journal: "You set the iron bar to the leaded seams and, against every warning, prise the Barrow-Lord from his rest."
          - end_game: ending_woken

npcs:
  # The reaver's shade (content_new, bug_0075): the barrow's first NPC, mirroring the
  # cold_forge lantern-spirit's proven shape — one-shot, conditional, MECHANICAL
  # counsel, never a dead-payload rumor flag. Each info topic retires once told (gated
  # on its own flag), so the +2-defense ward can be claimed only once and the node
  # cannot loop; the ungated `leave_shade` keeps the root TERMINATING (a gated-only
  # node would trip DIALOGUE_NONTERMINATING, cf. cold_forge bug_0014).
  #
  # The ward is HONEST and DECISIVE, not a toothless gift (bug_0102): against the
  # retuned wight (hp22/atk5/def2) it is the difference between a losing gamble and a
  # clear favourite — under-armed the fight is lethal on a majority of seeds (~43%
  # win). This is the cold-blow danger the shade names finally cashed: easing those
  # blows genuinely decides the fight, where a fresh blind pass (seed 37,
  # ai-runs/2026-06-02T02-14-47-663Z) had found the OLD soft wight died in two rounds
  # warded or not, the ward shaving a single HP. The fight stays winnable — and now
  # truly lethal — from base stats (the death ending stays reachable).
  #
  # bug_0113 — the ward is +3 (was +2), so PREPARED play RELIABLY survives. A fresh
  # bug_0119 — the ward counsel now also tells the player the ward is ALL the aid the
  # barrow gives and the close fight is won by pressing on, not by retreating to look for
  # more. A fresh blind pass on the warded route (seed 7, ai-runs/2026-06-02T11-22-38-112Z/
  # playtest.md §4/§5) won but hit "a genuine scare ... I retreated thinking I was under-
  # prepared," and warned that with no heal/rest mechanic "a cautious player could
  # reasonably conclude the encounter is unwinnable and quit" — searching for healing or
  # gear that does not exist. That is exactly the bug_0027 failure mode (a player quits a
  # winnable game hunting for a missing item the pack never has), here on the wight rather
  # than the slab. The fix is the same honesty discipline applied to the shade's spoken
  # counsel: it now says plainly there is no balm, no second blade, no charm to find — the
  # ward is the whole of the help, the grim mid-fight moment is the wight's way of wearing
  # you down (not the true odds), and breaking off only returns you to the same fight no
  # fresher. Pure spoken npc_text — no flag/var/journal/score/ending/topic change, so the
  # ward (+3), the one-shot retire, the canonical trace's recorded journal, and its final
  # state hash are all untouched (only the pack content_hash shifts, re-pinned in
  # traces/rpg/barrow_victory.json). The under-armed player who skips the shade never hears
  # it and stays in bug_0102's intended lethal gamble.
  #
  # A prior blind pass on the warded route (seed 11, ai-runs/2026-06-02T09-48-19-753Z/playtest.md
  # §4/§5) won twice but finished at exactly 3 HP both times and flagged the marquee
  # fight as razor-thin: "an unlucky early run of high wight rolls can kill a fully-
  # prepared, 'correct play' player … no recovery beyond fleeing." At +2 the warded
  # route won only ~70% of seeds and a third of correct-play runs DIED — the prep
  # decided the fight (bug_0102) but did not make it safe to do everything right.
  # Raising the ward +2→+3 lifts the warded route to a reliable ~88% win with a real
  # HP cushion (avg survivor HP 5.4→7.5, the ≤3-HP nail-biters more than halved),
  # verified live over seeds 1-40 on the REAL routes (__probe3.ts) — WITHOUT touching
  # the wight, so under-armed stays exactly the ~43% lethal gamble bug_0102 made it
  # and the prep gap WIDENS (43% vs 88%). It is still no guaranteed win (~12% of
  # warded seeds lose, recoverable via save §8.7), so the pack keeps the tension its
  # "careful play isn't free" identity demands. Per the pack's honesty discipline
  # (bug_0027/0029/0069) the shade does NOT over-sell the danger: it says plainly the
  # ward "will not swing your blade for you". Every npc_text is PURE SPOKEN words — the
  # engine renders `reaver's shade: "<words>"`, so the nodes carry no quote marks and no
  # third-person stage narration (the sealed_crypt / cold_forge convention, bug_0071).
  - id: reaver_shade
    name: "reaver's shade"
    description: "The thin grey shade of a grave-robber who came down for the crown and stayed — tired past fear and past malice, with nothing left but memory."
    room: reaver_rest
    dialogue:
      root: shade_root
      nodes:
        - id: shade_root
          npc_text: >
            Another one, come down for the cold crown. I came for it too, once, and
            got no farther than the wight's hall. Ask, if you will — I have had long
            years down here with nothing to do but remember.
          topics:
            - id: ask_wight
              prompt: "Ask how the barrow-wight bested him."
              conditions: [ { not_flag: heard_warding } ]
              goto: shade_wight
            - id: ask_lord
              prompt: "Ask about the Barrow-Lord and his crown."
              conditions: [ { not_flag: heard_lord_lore } ]
              goto: shade_lord
            - id: leave_shade
              prompt: "Leave the shade to its bones."
              end: true
        - id: shade_wight
          npc_text: >
            The wight? It is slow, and you are quick — you can best it where I could
            not. But mind its hands: where they touch, the cold goes into you and the
            strength runs out of your arm, and that is how it wore me down in the end.
            Here — take the trick I learned too late: keep your guard close and let the
            chill slide off the iron, not into you. It will not swing your blade for
            you, but the cold will bite the less. And do not break off to hunt for more
            than this: there is no balm in the barrow, no second blade, no charm laid
            by for the next fool — this ward is the whole of the help you will find, and
            it is help enough. There will come a moment in the cold of it when the fight
            looks lost; that is the wight's way of wearing a man down, not the truth of
            the odds. Set your feet and keep striking. Step back to seek aid that is not
            here and you only come again to the same fight, no fresher than you left it.
          effects:
            - set_flag: heard_warding
            - inc_var: { name: defense, by: 3 }
            - add_journal: "The reaver's shade teaches you to turn the wight's chill on your guard — its cold blows will bite the less now (+3 defense)."
          topics:
            - id: wight_back
              prompt: "Nod, and ask something else."
              goto: shade_root
        - id: shade_lord
          npc_text: >
            The Barrow-Lord? A king of these hills before ever the songs were written,
            laid down here with his pale circlet so the land above would keep its luck.
            The crown is no cursed thing — only old, and cold, and his. The wight in the
            empty niche was his sworn guard in life, set to bar the way to him, and it
            keeps that watch still, long after it has forgotten why. Take the crown, if
            that is what you came for. Only do not think to wake what sleeps beneath the
            slab; the Lord is long past waking, and the land is the better for it.
          effects:
            - set_flag: heard_lord_lore
            - add_journal: "The shade names the circlet the Barrow-Lord's own — old and cold, not cursed; the niche-wight was his sworn guard, keeping its watch long after forgetting why."
          topics:
            - id: lord_back
              prompt: "Thank the shade, and ask something else."
              goto: shade_root

enemies:
  # bug_0102 — the shade's +2-defense ward finally MATTERS (the bug_0101 "make the
  # telegraphed prep decisive" move, applied to this pack's cosmetic lever). A fresh
  # blind playtester ran the explicit prepared-vs-under-armed comparison (seed 37,
  # ai-runs/2026-06-02T02-14-47-663Z/playtest.md §5) and found the old hp12/atk3/def1
  # wight "dies in 2 rounds either way": warded it hit for 3, under-armed for 4 — the
  # ward "saved a single HP" (finished 17/20 vs 16/20), so the prep was "mechanically
  # genuine but the fight is so short and tilted you win trivially at near-full HP
  # regardless." The same "careful play is trivially safe / the telegraphed ward is
  # cosmetic" note both RPG packs kept raising (sunken_barrow bug_0095, cold_forge
  # bug_0092→0101), deferred pending author intent — and under the full-trust model the
  # agent IS the author. Retuned hp12/atk3/def1 → hp22/atk5/def2: the two-stat lift
  # (longer fight + harder blows) that makes the +2 ward compound over several rounds
  # instead of shaving one HP. Verified live over seeds 1-40 on the REAL canonical
  # route (__probe2.ts, throwaway, the exact action sequence the trace records, not an
  # abstract sweep): UNDER-ARMED (def2) now LOSES on a majority of seeds (wins 17/40 ≈
  # 43%, and the survivors scrape through at ~4 HP of 20 — the cold-blow danger the
  # shade names is finally real), while the shade's ward is the DECISIVE survival lever
  # (a likely-dead gamble becomes a clear favourite), exactly the buff the seed-37 tester
  # called one-HP-cosmetic. (bug_0113 later raised that ward +2→+3 so prepared play
  # RELIABLY survives, lifting the warded route ~70%→~88% with a real HP cushion while
  # leaving this wight — and so the under-armed gamble — untouched; numbers in the npc
  # block above.) Still provably winnable from best-reachable stats (the bug_0097 proof,
  # which credits the reachable ward — now +3, def5): bestPlayerDmg=8 (atk4 vs def2),
  # roundsToKill=ceil(22/8)=3, worst wight blow d6+5−5 ≤ 6 < 20 reachable HP, so the
  # validator still proves the fight winnable. The death ending stays reachable and the
  # canonical victory trace now runs the warded route (the intended prepared path), per
  # bug_0101's "switch helpers to the canonical buffed route." Defense 1→2 also slows
  # the player's own blade (atk4 vs def2 = d6+2, not d6+3), lengthening the fight so the
  # ward has rounds to matter; prose/flags/score/endings/exits untouched.
  - id: barrow_wight
    name: "barrow-wight"
    description: "A grave-cold figure of dried sinew and malice, risen from an empty niche."
    room: guard_crypt
    hp: 22
    attack: 5
    defense: 2
    defeat_flag: wight_slain
    death_ending: ending_fallen
    on_defeat:
      - add_journal: "The barrow-wight crumbles; the cold lifts from the east arch."
      - inc_var: { name: score, by: 10 }

win_conditions:
  # The win fires on the deliberate CLAIM, not on bare room entry. A blind
  # playtester (seed 71) reached the relic chamber and the game ended the instant
  # they walked in: the circlet sat in visible_objects with no actions, and the
  # ending narrated "You lift the circlet from its plinth" — an act they never
  # performed. The whole reason the chamber exists (the goal item) was presented
  # and resolved in the same frame, so the climax was narrated AT the player
  # instead of earned by a final grab. Adding `has_item: circlet` to the win means
  # entering the chamber no longer wins (you don't hold the crown yet) — the room
  # shows it on its plinth and offers "take circlet", and the win fires on that
  # TAKE via the engine's post-action checkWin hook (src/core/engine.ts §8.4.5).
  # `visited: relic_chamber` is KEPT deliberately: it is the only `visited` term in
  # any win, and the parser validator derives its soft-lock guard (every reachable
  # room can still reach a win) from `visited` win-rooms — dropping it would
  # silently disable that check. Both conditions must hold (implicit all_of).
  - id: claim_relic
    conditions: [ { visited: relic_chamber }, { has_item: circlet } ]
    ending: ending_victory

endings:
    # Epilogue follows the deliberate TAKE (which narrates "You take the
    # Barrow-Lord's circlet."), so it no longer re-describes lifting it from the
    # plinth — it carries the consequence of the claim the player just made.
  - id: ending_victory
    title: "Lord of the Barrow"
    text: "The cold crown is yours, its pale light steady in your hands. The barrow yields its lord, and the light comes up the stair with you."
    death: false
  - id: ending_fallen
    title: "Another Niche Filled"
    text: "The cold closes over you. In time, something else will climb from the niche where you fell."
    death: true
    # The doom fork (bug_0083): reached by prising the Barrow-Lord's sealed
    # sarcophagus — the act the shade warns against. Distinct in cause from
    # ending_fallen (dying to the guard-wight): here you survive the barrow only to
    # undo the very thing the shade begged you leave alone. A death ending (death:
    # true), so it is recoverable from an earlier save (§8.7) like ending_fallen, and
    # the non-death win (ending_victory) remains, so the game is still winnable.
  - id: ending_woken
    title: "What Sleeps Beneath"
    text: "The lead seams split and the great lid grinds back, and the cold that breathes up out of the dark is older than the wight's, older than the songs — older than the hills that hide this barrow. The Barrow-Lord opens his eyes. You came down for a crown and woke its keeper, and the shade's last counsel rings true after all: the land was the better for his sleeping. There is no climbing back to the light now. Whatever rises from this coffin, the country above will learn its name again before the season turns."
    death: true
