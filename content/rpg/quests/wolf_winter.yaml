# The Wolf-Winter — a Stage 4 (Hero's-Quest) pack (spec §13, §14 gate).
#
# The game's FOURTH RPG pack, and the SECOND to set `meta.combat_guaranteed: true`
# (after The Dawn Beacon, bug_0187). Where the Beacon is a TWO-fight guaranteed
# gauntlet, this is a THREE-fight one — the first curated pack to stress the
# cumulative-HP gauntlet bound (`COMBAT_GAUNTLET_NOT_GUARANTEED`, bug_0172) across
# three sequential fights. The cumulative bound is the distinctive RPG guarantee
# surface: each fight can clear the per-fight upper bound alone yet the sequence
# still fell a prepared player on worst cumulative rolls, and a third fight makes
# that surface strictly harder to satisfy. Here BOTH prep buffs are load-bearing on
# the cumulative bound specifically — drop either and the gauntlet stops being
# jointly survivable while every single fight still passes in isolation (see the
# enemies block and tests/regression/wolf_winter_three_fight_gauntlet.test.ts).
#
# The fiction earns the mechanic the same way the Beacon does: not luck but skill
# and preparation decide the fights, so the promise can be honest. A killing winter
# has driven a wolf-pack down out of the high wood onto a lone steading, and three of
# them have come over the broken paling at the byre where the last of the cattle —
# the family's whole winter — are penned. You arrive as Albany's relief rider with the
# relief packet's ash spear already in hand; the old houndsman by the byre door can no
# longer hold a weapon himself. He has run wolves off this steading for forty winters and there is nothing
# about how a wolf comes in that he does not know; heed him (where the rush leaves the throat open,
# +2 attack) AND pull on the padded byre-jerkin from the store (a wolf's teeth ring off
# the layered hide, +2 defense) and he can make a true promise: "speared right and
# padded, lad, no wolf in that pack will pull you down." That promise is the
# combat_guaranteed flag spoken aloud, honest because the validator proves it — atk7,
# def5, hp30, the player's WORST rolls, and the three of them still cannot bring you
# down across the whole night. Skip the prep and it is a real gamble again: under-armed
# and unlucky the pack pulls you under the byre door (the death ending stays reachable),
# the guarantee covering only the BEST-prepared hunter, exactly as bug_0114 defines it.
#
#   steading_yard ─N─ byre_yard (houndsman; day-book +5)
#   (start)            │ W: store (padded byre-jerkin, +2 defense)
#                      │      │ U: fodder_loft ── one-way tactical drop ───────┐
#                      │ N: paling_gap (the yearling wolf — FIGHT 1)           │
#                           │ N*: byre_door (the flank-wolf — FIGHT 2) ◀──────┘
#                                │ N*: byre_mouth (the grey leader — FIGHT 3)
#                                     │ N*: cattle_stand (the pack breaks at dawn — WIN, +15)
#   (* each gated on the prior wolf being put down)
#
# Score (max 60): read the day-book the houndsman keeps (+5, the §17 clue that names the
# pack and points at the jerkin and his counsel), HEED old Cade's counsel (+5) and DON the
# byre-jerkin (+5) — the two load-bearing prep acts the day-book and Cade both press —, put
# down each of the three wolves (+10 each), and reach the cattle with the pack broken
# (+15 — the locomotion win, like cold_forge's ember chamber and the Beacon's crown). The
# perfect 60 coincides with reaching the safe cattle, never before; SCORE_PEAKS_BEFORE_WIN
# does not fire on a navigation win (bug_0116).
#
# bug_0239 — the prep acts now SCORE (+5 each), deliberately breaking from the 50-point
# milestone economy the other curated RPG packs share. A 2026-06-04 blind playtest found
# the prepared and reckless lines scored almost the same (50 vs 45 — only the day-book's
# +5 apart): preparation bought an HP cushion but almost no SCORE, so the diligence old
# Cade's promise sells, and the whole fiction of heeding-and-arming, carried no score
# signal. Tying +5 to each of the two prep flags (heard_counsel, jerkin_donned) aligns the
# score economy with the "do both" advice: the prepared hunter scores the full 60, the
# reckless rush still wins but tops out at 45 (a real 15-point diligence gap), and the
# bug_0114 fairness guarantee, the cumulative-gauntlet combat tuning, and the death ending
# are all BYTE-UNCHANGED (the awards add score only, never a stat or combat consequence).

meta:
  id: wolf_winter_v1
  title: "The Wolf-Winter"
  start_room: steading_yard
  vars_init: { hp: 30, attack: 5, defense: 3, fieldcraft: 0, repair: 0, streetwise: 0, mediation: 0, cattle_alarm: 0, pack_drive: 0, drive_kit_charges: 0 }
  flags_init: []
  # The opt-in fairness promise (bug_0114). With this set the validator proves the
  # per-fight UPPER bound for every wolf AND the cumulative-HP bound across the whole
  # three-fight gauntlet (bug_0172): with the hunter's BEST reachable stats (init + the
  # houndsman's +2 attack + the byre-jerkin's +2 defense = atk7/def5/hp30) but the
  # WORST rolls, total damage across all three fights must stay below reachable HP.
  # The conservative validator still admits an abstract best-stat state with neither
  # lesson flag and therefore a standard leader line: 5 + 9 + 14 = 28 < 30. The
  # concrete runtime proof drives the six original fully-prepared sequence pairs, the
  # earned brace-stake route, and the loft/saved-guard route on worst rolls; maximum
  # live damage remains 24.
  # See the enemies block.
  # Base-stat play (no counsel, no jerkin) can still die.
  combat_guaranteed: true
  # The economy: 5 + 5 + 5 + 10 + 10 + 10 + 15 = 60 (bug_0239 — the two prep acts now
  # score +5 each; see the header). Each award rides a beat that fires ONCE (the read
  # retires on read_tally; the counsel on heard_counsel; the don on jerkin_donned; each
  # wolf dies once; the cattle is the game-ending win), so the score cannot be farmed and
  # the fully-prepared path reaches exactly 60 (rpg_score_economy_sound proves it).
  max_score: 60

# The same public pressure grammar can be reused by any RPG pack. Wolf-Winter's
# lure route raises cattle alarm only at authored commitments; it is not an
# invisible turn clock. A clean three-beat diversion ends at 3 (restless), while
# a fouled opening reaches 4 (breaking) and carries a visible cattle loss into
# the ending and Albany campaign state.
pressure_tracks:
  - id: cattle_alarm
    title: "Cattle alarm"
    var: cattle_alarm
    bands:
      - min: 0
        label: "Steady"
        description: "The herd remains together; no animals are outside the count."
      - min: 2
        label: "Restless"
        description: "The herd is strained but remains below the loss threshold."
      - min: 4
        label: "Breaking"
        description: "The herd's formation is broken; animals are missing from the count."
  - id: pack_drive
    title: "Pack drive"
    var: pack_drive
    bands:
      - min: 0
        label: "Unraised"
        description: "No signal drive is moving the wolves; signal pressure has not been raised."
      - min: 1
        label: "Moving"
        description: "The first signal has turned the pack along the outside line; one threshold beat remains before the byre crisis."
      - min: 2
        label: "Crisis"
        description: "Signal pressure is at crisis; the next unresolved drive commitment cannot be delayed, or its chosen evacuation line remains to be finished."
      - min: 6
        label: "Cleared"
        description: "The chosen evacuation line has separated the living pack from people and cattle; its wound, herd loss, or spent reserve is now fixed."

rooms:
  - id: steading_yard
    name: "The Steading Yard"
    description: >
      The Albany winter-relief packet brought you down the hill road to a steading on a
      killing winter night, its hunting-spear already in your fist. Wolves sing closer
      in the high wood; cattle bawl behind the broken paling. The byre-yard lies north:
      hold the cattle till dawn.
    # The yard re-describes itself once visit history proves the player reached the byre.
    # This is reactive prose only — no synthetic watch flag or repeated on-enter event is
    # needed. A separate byre_held variant is unnecessary: the locomotion win still waits at
    # cattle_stand, so even a legal last backtrack has one task left at the byre — returning
    # north to the whole cattle.
    variants:
      - when: [{ visited: byre_yard }]
        text: >
          The steading yard, the Albany route tag tucked cold under your coat and the
          relief spear in your fist. The watch is taken up now, and whatever remains
          of the night must be settled at the byre. Its yard lies through the gate to
          the north.
      - when: [{ has_flag: june_pike_present }, { not_visited: byre_yard }]
        text: >
          The Albany packet brought you and Road Warden June Pike down the hill road.
          June checks her cattle rope, then takes the lower stock path: cattle-first
          authority, no place on the wolf line, and no agreement after first blood.
          The byre-yard lies north; hold the cattle till dawn.
    exits:
      - { direction: north, to: byre_yard }

  - id: byre_yard
    name: "The Byre-Yard"
    description: >
      The cattle-byre yard. Old Cade props its door, too stiff for a spear, and turns his
      lantern on the day-book: its last wolf-count is worth reading before you leave the
      yard. Store-shed west. North, a young wolf is through the broken paling; gate south.
    objects: [day_book, relief_protocol_docket, drive_signal_rope_kit]
    # Progress variants are ordered from the deepest completed fight back to the opening
    # clue state. Re-entering this hub must describe the wolves actually left alive; visit
    # history alone handles the steading-yard watch prose without emitting repeat state.
    variants:
      - when:
          - { has_flag: strategy_drive_committed }
          - { not_visited: paling_gap }
        text: >
          The drive is irreversible. Take Cade's two-charge rig, then go north. Reading,
          preparation, and donning store gear had to happen before commitment. The moving
          herd forfeits outer defense and retreat; this strategy cannot switch to lure or combat.
      - when:
          - { has_flag: relief_protocol_prepared }
          - { has_flag: yearling_redirected_with_split_guard }
          - { not_flag: relief_protocol_attempted }
          - { not_flag: yearling_down }
          - { not_flag: flank_redirected }
        text: >
          The rail recovery sent the yearling alive into the high wood, but the cattle
          still hammer the slats. Cade holds Jamie's sealed docket beside the herd tally.
          Call its named sequence here before carrying the feed west through the store
          and up to the loft; it is one-use.
      - when:
          - { has_flag: strategy_lure_committed }
          - any_of:
              - { has_flag: yearling_down }
              - { has_flag: yearling_redirected }
          - { not_flag: flank_redirected }
        text: >
          The first lure beat is settled. Cade points west through the store, then up to
          the loft for the second cast. The yard's north gate is not the feed line.
      - when: [{ has_flag: leader_down }]
        text: >
          The trampled yard before the cattle-byre. Old Cade waits beside the day-book
          and open store-shed. North, all three wolves lie dead from broken paling to
          back wall; beyond the grey leader, the cattle stand whole. The yard gate is south.
      - when: [{ has_flag: flank_wolf_down }]
        text: >
          The trampled yard before the cattle-byre. Old Cade waits beside the day-book;
          the store-shed is west. North, the yearling lies dead at the broken paling and
          the flank-wolf across the byre threshold. The grey leader still waits deeper in.
          The yard gate is south.
      - when: [{ has_flag: yearling_down }]
        text: >
          The trampled yard before the cattle-byre. Old Cade waits beside the day-book;
          the store-shed is west. North, the yearling lies dead in the broken paling, but
          the flank-wolf holds the byre door and the grey leader waits deeper in. The yard
          gate is south.
      - when: [{ has_flag: read_tally }]
        text: >
          The trampled byre-yard. Old Cade waits by the day-book where you checked its
          last wolf-count; the open store-shed is west. North, the young wolf is through
          the broken paling, with two wolves deeper by the cattle. The gate is south.
    exits:
      - direction: south
        to: steading_yard
        conditions: [{ not_flag: strategy_drive_committed }]
        locked_msg: "The committed living drive starts now: with Cade's finite rig, go north. The outer yard does not reopen, and this line cannot switch to combat."
      - direction: west
        to: store
        conditions: [{ not_flag: strategy_drive_committed }]
        locked_msg: "Store preparation had to be finished before commitment. The living drive now runs north with Cade's finite rig; the store does not reopen, and the strategy cannot change."
      - direction: north
        to: paling_gap
        conditions:
          - any_of:
              - all_of:
                  - { not_flag: strategy_lure_committed }
                  - { not_flag: strategy_drive_committed }
              - all_of:
                  - { has_flag: strategy_drive_committed }
                  - any_of:
                      - { has_item: drive_signal_rope_kit }
                      - { has_flag: drive_reserve_spent }
              - all_of:
                  - { has_item: winter_feed_sack }
                  - { not_flag: yearling_down }
                  - { not_flag: yearling_redirected }
              - { has_flag: flank_redirected }
        locked_msg: "Take the plan's finite resource: Cade's feed for lure, or two-charge rig for drive. After the lure's first beat, continue west through the store and up to the loft."

  - id: store
    name: "The Store-Shed"
    description: >
      A low shed off the byre-yard, hung with harness and winter gear. The padded
      byre-jerkin waits on a peg: hide and wool meant to turn horns, hooves, or teeth.
      A ladder climbs toward broken loft boards a bound cross-piece could bridge; yard east.
    variants:
      - when: [{ has_item: winter_feed_sack }]
        text: >
          The winter-feed peg is bare. Cade's finite oat-and-tallow sack rides with you:
          enough to lay one downwind trail past all three wolves, not enough to restart
          a fouled trail. The padded jerkin and loft ladder remain here; yard east.
      - when:
          - { has_flag: strategy_lure_committed }
          - { not_item: winter_feed_sack }
          - { not_flag: pack_diverted }
        text: >
          The padded byre-jerkin waits on its peg beside Cade's last winter-feed sack.
          His nonlethal plan spends those oats and tallow drawing the wolves out through
          the broken paling. Take the finite feed before entering the breach. Loft ladder
          up; yard east.
      - when: [{ has_item: byre_jerkin }, { none_of: [{ has_flag: jerkin_donned }] }]
        text: >
          The peg by the door is bare where the steading's padded byre-jerkin hung. Its
          hide is in your hands, not yet on your back: carried hide will not turn teeth.
          Don it. Loft ladder up; yard east.
      - when:
          - { has_flag: jamie_market_testimony_certified }
          - { not_item: split_rail_guard }
          - { not_flag: flank_wolf_down }
        text: >
          Jamie's certified testimony marks the feed-hauler's crawlboard above this
          ladder: eaves-beam to low hatch. It needs no bound rail, but the yearling must
          fall before you leave the yard exposed. Taking it commits east behind the
          flank-wolf. Yard east.
      - when: [{ has_flag: byre_jerkin_taken }]
        text: >
          A low store-shed off the byre-yard, hung with harness and winter gear. The peg
          by the door is bare where the steading's padded byre-jerkin hung before you took
          it down. The loft ladder rises above; the byre-yard is east.
    objects: [byre_jerkin, winter_feed_sack]
    exits:
      - { direction: east, to: byre_yard }
      - direction: up
        to: fodder_loft
        conditions:
          - any_of:
              - { has_flag: yearling_down }
              - { has_flag: yearling_redirected }
          - any_of:
              - { has_item: split_rail_guard }
              - { has_flag: jamie_market_testimony_certified }
              - { has_flag: strategy_lure_committed }
          - { not_flag: flank_wolf_down }
          - { not_flag: flank_redirected }
        locked_msg: "Before the flank-wolf falls, settle the yearling. Then follow a crawlboard in your packet, or bind a frost-split rail over the broken boards and leave the sound rail wedged."

  - id: fodder_loft
    name: "The Fodder-Loft"
    description: >
      Your bound rail bridges broken boards under the byre eaves. Beyond it, a low hatch
      overlooks the flank-wolf circling the door-post. You reclaim the one-use guard and
      haul the ladder after you; this recovery route now commits east through the hatch.
    variants:
      - when: [{ has_flag: strategy_lure_committed }, { has_item: winter_feed_sack }]
        text: >
          You cross the feed-hauler's crawlboard with Cade's oat-and-tallow sack.
          Below, the flank-wolf circles away from the low hatch. Cast the second
          measure through it before the committed drop east; the hauled ladder
          leaves no retreat.
      - when:
          - { has_flag: jamie_market_testimony_certified }
          - { not_item: split_rail_guard }
        text: >
          Jamie's testimony was exact: the narrow feed-hauler's crawlboard reaches this
          low fodder hatch. You haul the ladder after crossing. With no bound guard, the
          route commits east to a fast drop behind the flank-wolf below.
    objects: [loft_hatch]
    exits:
      - direction: east
        to: byre_door
        conditions:
          - any_of:
              - { not_flag: strategy_lure_committed }
              - { has_flag: flank_redirected }
        locked_msg: "The hauled ladder leaves no retreat. Complete the committed second feed cast through the low hatch before dropping east."

  - id: paling_gap
    name: "The Broken Paling"
    description: >
      A young wolf holds the broken paling, low and hungry—the first of the pack through.
      Its shoulders bunch for a straight rush: set the Albany spear, then drive on the
      shaft. A stout rail has fallen clear into the snow at your feet; wedge it across
      the gap. The byre-yard is south.
    objects:
      [
        paling_rail,
        downwind_feed_line,
        drover_route_marks,
        drive_breach_signal,
        drive_hurdle_recovery,
      ]
    # Reactive prose keeps the lure recovery plus every combat rail state legible.
    # A committed feed line returns through the yard and loft for its second cast;
    # ordinary combat states retain the ground road north after the yearling falls.
    variants:
      - when:
          - { has_flag: strategy_drive_committed }
          - { has_flag: drive_yearling_turned }
          - { has_flag: drive_opening_fouled }
        text: >
          The failed shutter call cannot be repeated. You recovered without blood by
          dropping the loose hurdle behind the yearling; it runs alive along Cade's
          outside lane. One charge remains in the signal-and-rope kit. Carry that line
          north to the byre door; the yard is south.
      - when:
          - { has_flag: strategy_drive_committed }
          - { has_flag: drive_yearling_turned }
        text: >
          The yearling runs alive ahead of the shutter signal along Cade's outside lane.
          The first of two kit charges is spent. Carry the remaining rope-and-bell line
          north to turn the flank-wolf at the byre door; the yard is south.
      - when:
          - { has_flag: strategy_drive_committed }
          - { has_flag: drive_opening_fouled }
          - { not_flag: drive_yearling_turned }
          - { not_flag: yearling_down }
        text: >
          The one permitted shutter call folded against the wall. It cannot be tried
          again. The hard commitment has no spear switch: drop the loose hurdle behind the
          yearling for the noisier living recovery. The second kit charge remains; yard south.
      - when:
          - { has_flag: strategy_drive_committed }
          - { not_flag: drive_opening_fouled }
          - { not_flag: drive_yearling_turned }
        text: >
          Drive committed. Fire the rig's shutter once to turn the yearling outside. A miss
          is final: drop the loose hurdle for the sole nonlethal recovery. The moving herd
          leaves no combat switch. The byre door lies north; the yard south is closed.
      - when:
          - { has_flag: strategy_lure_committed }
          - { has_flag: yearling_redirected }
          - { not_flag: flank_redirected }
        text: >
          The yearling is alive beyond the breach, following Cade's scent into the high
          wood. The ground line north stays shut until the second cast. Return south to
          the yard, west into the store, then up to the loft.
      - when:
          - { has_flag: strategy_lure_committed }
          - { has_flag: yearling_down }
          - { not_flag: flank_redirected }
        text: >
          The yearling lies dead after the fouled cast. The remaining feed must reach the
          flank-wolf from above; ground north is not this plan. Return south to the yard,
          west into the store, then up to the loft.
      - when: [{ has_flag: yearling_redirected }]
        text: >
          The yearling is alive beyond the broken paling, nose down on Cade's
          oat-and-tallow trail into the high wood. Its tracks turn away from the byre.
          The route north is clear; the yard is south, and the fallen rail remains here.
      - when:
          - { has_flag: drover_route_prepared }
          - { has_flag: lure_trail_fouled }
          - { not_flag: drover_route_attempted }
          - { not_flag: yearling_down }
          - { not_flag: yearling_redirected }
        text: >
          The first cast fouled, but Emery's packet marks one snowed drover cut above
          the churned feed. Run that one-use route now to peel the yearling across the
          high-wood scent—or leave it unused and recover with the rail or spear.
      - when:
          - { has_flag: lure_trail_fouled }
          - { not_flag: yearling_down }
        text: >
          The first feed cast fouled in the breach. The yearling still stands and the
          herd's alarm is rising. There is no second sack or retry: bind a failed rail
          into a guard and pen the wolf onto the scent, or fight it and carry the lure
          plan deeper.
      - when:
          - { has_flag: yearling_down }
          - { has_flag: leader_turned_over_crossbrace }
        text: >
          The broken paling holds only a canted rail now: you wrenched its brace-stake
          free at the byre door, carried it north, and spent it turning the grey leader.
          The young wolf lies dead in the snow; the byre runs north and the yard is south.
      - when:
          - { has_flag: yearling_down }
          - { has_item: saved_brace_stake }
        text: >
          The young wolf lies dead at the broken paling. The rail rests canted where you
          wrenched out its brace-stake after the guarded funnel; that hardwood stake rides
          in your hands now. The byre runs north and the yard is south.
      - when:
          - { has_flag: yearling_down }
          - { has_flag: leader_split_guard_set }
        text: >
          The young wolf lies dead beside the empty rail-bed. You carried the bound
          splinters past the flank-wolf and spent them against the grey leader at the
          back wall. The byre runs north; the yard is south.
      - when: [{ has_flag: yearling_down }, { has_flag: breach_braced }]
        text: >
          The yearling lies dead in the snow at the broken paling, the rail wedged hard
          across the breach. The half-shut gap forces what follows singly and slow—the
          guarded funnel Cade promised. The byre runs north; the yard is south.
      - when:
          - { has_flag: yearling_down }
          - { has_flag: flank_hooked_over_guard }
        text: >
          The broken paling: the young wolf lies dead and the rail-bed is empty. You
          carried the split lengths north as a bound guard, but they broke with the
          flank-wolf at the byre door; no guard remains. The byre runs north; the yard is south.
      - when:
          - { has_flag: yearling_down }
          - { has_item: split_rail_guard }
        text: >
          The gap in the broken paling, the young wolf dead in its snow and the split
          rail bound into the guard in your hands. Spend it on the flank-wolf's turn, or
          take another opening and save it for the heavier wolf. The byre runs north.
      - when:
          - { has_flag: yearling_down }
          - { has_flag: hayden_frost_report_certified }
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
          - { not_item: split_rail_guard }
        text: >
          The yearling lies dead beside the failed rail. Hayden's report names a matching
          frost-jammed brace at the byre door. Leave the lengths unbound and the bare spear
          can trip it; binding a guard commits away from that line. Byre north—choose first.
      - when:
          - { has_flag: yearling_down }
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
        text: >
          The gap in the broken paling, the young wolf dead in its snow and the failed
          rail split where the frozen ground turned it. The breach cannot be funnelled,
          but the joined lengths can still be bound into a carried guard. Use the rail
          again before you go north to the byre door.
      - when: [{ has_flag: yearling_down }]
        text: >
          The gap in the broken paling, the young wolf dead in the snow of it now and the
          breach held. The byre runs on north past the door; the byre-yard is back to the
          south.
      - when: [{ has_flag: yearling_spear_driven }]
        text: >
          The yearling is alive but driven sideways against the broken paling by the
          second spear stroke. Its rush is spent and its shoulder is open; if it still
          stands, one last thrust will finish what the set spear began.
      - when: [{ has_flag: yearling_spear_set }, { has_flag: breach_braced }]
        text: >
          The gap is half-shut by the wedged rail, and the yearling recoils alive from
          the Albany spear you planted in its rush. Snow packs the spear-butt and the
          wolf cannot turn aside. Drive the set point through while its weight is still
          committed along the shaft.
      - when:
          - { has_flag: yearling_spear_set }
          - { has_item: split_rail_guard }
        text: >
          The yearling recoils alive from the Albany spear you set against its rush.
          The failed rail is bound across your spear now; drive the set point through
          this wolf, then carry that splinter guard to the byre door.
      - when:
          - { has_flag: yearling_spear_set }
          - { has_flag: hayden_frost_report_certified }
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
          - { not_item: split_rail_guard }
        text: >
          The yearling recoils alive. Hayden's report marks the same frost-load at the
          byre jamb: leave the rail here to keep the spear bare, or bind a guard and commit
          away. Finish the yearling, then choose what travels north.
      - when:
          - { has_flag: yearling_spear_set }
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
        text: >
          The yearling recoils alive from the Albany spear you set against its rush.
          Beside it the rail lies split but joined: use it again to bind a carried guard,
          and drive the set spear through the wolf before its rush can gather again.
      - when: [{ has_flag: yearling_spear_set }]
        text: >
          The young wolf recoils alive in the breach, checked by the Albany spear you
          set against its first rush. Drive the set point through before it can gather
          a second rush; the byre-yard is back to the south.
      - when: [{ has_flag: breach_braced }]
        text: >
          The fallen rail is wedged hard across it: the broken paling is half-shut. The
          yearling still holds the narrowed gap, snarling, but must rush singly and slow.
          Set the spear against it; the yard is south.
      - when: [{ has_item: split_rail_guard }]
        text: >
          The young wolf still holds the broken paling. The rail did not brace the gap,
          but its joined lengths ride in your hands, lashed across the spear as a rough
          guard for the byre door. The yearling's low rush still wants the spear set against it.
      - when:
          - { has_flag: hayden_frost_report_certified }
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
          - { not_item: split_rail_guard }
        text: >
          The young wolf holds the paling beside the split rail. Hayden's report marks a
          frost-jammed brace north: leave the rail unbound for the bare-spear trip, or bind
          a carried guard and commit away. First set the spear against this rush.
      - when: [{ has_flag: rail_split }, { not_flag: split_rail_guard_made }]
        text: >
          The young wolf still holds the broken paling, and the rail you tried to set
          lies split but joined in the snow. There will be no guarded funnel, but use the
          rail again and you can bind a carried splinter guard for the byre door.
    exits:
      - direction: south
        to: byre_yard
        conditions: [{ not_flag: strategy_drive_committed }]
        locked_msg: "Complete the paling beat, then take the living yearling north. The hard strategy commitment does not reopen the yard or switch to combat."
      - direction: north
        to: byre_door
        conditions:
          - any_of:
              - { has_flag: yearling_down }
              - { has_flag: yearling_redirected }
              - { has_flag: drive_yearling_turned }
          - any_of:
              - { not_flag: strategy_lure_committed }
              - { has_flag: flank_redirected }
        locked_msg: "Settle the yearling first. On the feed plan, the ground way north then stays shut until the loft cast. Return south to the yard, west into the store, then up."

  - id: byre_door
    name: "The Byre Door"
    description: >
      A flank-wolf circles at the byre door. A prepared rail can guard or funnel; Cade's
      lesson offers a riskier wheel. Without either, only a plain spear exchange remains.
      The committed loft route drops from overhead if chosen. Cattle north; paling south.
    objects: [drive_threshold_line]
    variants:
      - when:
          - { has_flag: strategy_drive_committed }
          - { has_flag: drive_flank_turned }
        text: >
          The flank-wolf runs alive ahead of the rope-and-bell cast, joining the yearling
          on the outside lane. Both finite kit charges are gone, though the spent rig is
          still recoverable. Pack-drive pressure has reached the byre crisis north; the
          broken paling is south.
      - when:
          - { has_flag: strategy_drive_committed }
          - { has_flag: drive_yearling_turned }
          - { not_flag: drive_flank_turned }
          - { not_flag: flank_wolf_down }
        text: >
          The flank-wolf circles between the driven yearling and the byre. Cast the kit's
          last rope-and-bell charge across its turn. That second distinct signal will move
          both living wolves to the byre mouth and force the evacuation priority there.
          The paling is south.
      - when: [{ has_flag: flank_redirected }]
        text: >
          The flank-wolf is alive in the high wood, following the feed cast from the
          loft after the yearling's trail. The byre threshold is empty now. Deep north,
          the grey leader still stands between the scent line and the herd; paling south.
      - when:
          - { has_flag: flank_wolf_down }
          - { has_flag: leader_split_guard_set }
        text: >
          The flank-wolf lies across the threshold where an open line beat its turn.
          You carried the bound split rail past it; that guard is gone north and spent
          under the grey leader. The byre is north; the paling is south.
      - when:
          - { has_flag: flank_wolf_down }
          - { has_flag: leader_turned_over_crossbrace }
        text: >
          The flank-wolf lies across the threshold where you traded the quick pin for
          the paling's brace-stake. That stake is gone north and spent against the grey
          leader. The byre runs north; the canted paling is south.
      - when:
          - { has_flag: flank_wolf_down }
          - { has_item: saved_brace_stake }
        text: >
          The flank-wolf lies across the threshold. You gave up the decisive pin to
          wrench the paling's brace-stake free, and the hardwood length rides against
          your spear now. The dark byre is north; the canted paling is south.
      - when:
          - { has_flag: flank_wolf_down }
          - { has_flag: flank_fallen_brace_driven }
        text: >
          The flank-wolf lies beneath the frost-jammed door-brace. Hayden's report let
          you trip that dead weight across its turn, then drive the fallen timber home
          with the bare spear. The split paling remains unbound to the south; the byre
          runs north.
      - when:
          - { has_flag: flank_wolf_down }
          - { has_flag: flank_frost_brace_tripped }
        text: >
          The flank-wolf lies beneath the door-brace Hayden's frost report taught you to
          trip. The bare spear and falling timber ended its turn in one violent opening;
          the split paling remains unbound to the south, and the byre runs north.
      - when:
          - { has_flag: flank_wolf_down }
          - { has_flag: flank_dropped_from_loft }
          - { has_flag: jamie_market_testimony_certified }
          - { not_item: split_rail_guard }
        text: >
          The flank-wolf lies below the open loft-hatch, beaten by the drop Jamie's
          certified feed-hauler's crawlboard put behind its circle. You brought no split-rail
          guard over the eaves. The byre runs north; the paling is south.
      - when:
          - { has_flag: flank_wolf_down }
          - { has_flag: flank_dropped_from_loft }
          - { has_item: split_rail_guard }
        text: >
          The flank-wolf lies below the open loft-hatch, beaten by the drop behind its
          circle and the finishing spear-thrust. The saved split-rail guard remains in
          your hands. The byre runs north; the paling is south.
      - when:
          - { has_flag: flank_wolf_down }
          - { has_item: split_rail_guard }
        text: >
          The flank-wolf lies across the threshold, beaten without spending the bound
          split rail. That rough guard remains in your hands for the grey leader deeper
          north. The paling is south; the loft-hatch hangs overhead.
      - when: [{ has_flag: flank_wolf_down }, { has_flag: flank_pinned_at_rail }]
        text: >
          The flank-wolf lies pinned across the byre threshold where the braced funnel
          held it for the finishing thrust. The byre runs north into the dark; the
          wedged paling is back to the south.
      - when: [{ has_flag: flank_wolf_down }, { has_flag: flank_turned_through_return }]
        text: >
          The flank-wolf lies twisted across the byre threshold, beaten by the return
          stroke after your off-side wheel. The byre runs north into the dark; the
          paling is back to the south.
      - when: [{ has_flag: flank_wolf_down }, { has_flag: flank_hooked_over_guard }]
        text: >
          The flank-wolf lies across the byre threshold amid the splinters of the
          recovered rail guard. You hooked the spear over that breaking cross-piece
          and finished the turn. The byre runs north; the paling is south.
      - when: [{ has_flag: flank_wolf_down }]
        text: >
          The mouth of the cattle-byre, the flank-wolf down and still across the
          threshold. The byre runs back north into the dark; the paling is back to the south.
      - when: [{ has_flag: flank_pinned_at_rail }]
        text: >
          The flank-wolf is alive but pinned hard against the wedged rail by your second
          thrust. Its circle and guarded return are spent; if it still stands, its open
          shoulder wants one last thrust. The dark byre is north; the paling is south.
      - when: [{ has_flag: flank_hooked_over_guard }]
        text: >
          The flank-wolf is alive beyond the broken splinter guard, checked by the hook
          you drove over it. The rough cross-piece has done its work; finish what remains
          before going north. The paling is south.
      - when:
          - { has_flag: flank_brace_stake_saved }
          - { has_item: saved_brace_stake }
        text: >
          The flank-wolf is alive but checked at the threshold. Your stroke was less
          decisive because you wrenched the brace-stake free behind the guard; the saved
          hardwood is in your hands for later, and a plain thrust can finish the wolf now.
      - when: [{ has_flag: flank_funneled }]
        text: >
          The flank-wolf is alive at the byre door but trapped on the guarded line
          you chose. Pin it at the rail for the decisive stroke now, or wrench the
          brace-stake free behind your guard: a less decisive stroke here, but a portable
          cross-piece for whatever waits deeper in the byre.
      - when: [{ has_flag: flank_offside_cut }]
        text: >
          The flank-wolf is alive at the byre door, checked hard by the off-side cut
          you wheeled into. Turn through the returning stroke now, before its jaws close
          on the open guard.
      - when: [{ has_flag: flank_splinter_guarded }]
        text: >
          The flank-wolf is alive at the byre door with its first turn caught on the
          carried splinter guard. Hook the Albany spear over that cross-piece and drive
          through before the rawhide gives way.
      - when: [{ has_flag: flank_frost_brace_tripped }]
        text: >
          The flank-wolf is alive but checked beneath the frost-jammed door-brace you
          tripped across its turn. Hayden's opening is spent but the fallen timber still
          pins its line: drive that brace through with the bare spear before it twists free.
      - when: [{ has_flag: flank_dropped_from_loft }]
        text: >
          The flank-wolf is alive but wrong-footed below the hatch where you dropped
          behind its circle. The landing left your guard open; finish with the spear
          before it can wheel and make you pay for the height you spent.
      - when:
          - { visited: fodder_loft }
          - { has_flag: jamie_market_testimony_certified }
          - { not_item: split_rail_guard }
        text: >
          Jamie's certified feed-hauler's crawlboard put you at the low hatch behind the
          flank-wolf with no bound guard in hand. Drive from that fast, open drop now;
          taking the eaves committed you away from every ground opening.
      - when:
          - { visited: fodder_loft }
          - { has_item: split_rail_guard }
        text: >
          You committed to the loft road and dropped behind the flank-wolf. Drive from
          that fast, open angle now; the ground openings are behind you, but the bound
          rail stays unspent for the grey leader if this risk carries through.
      - when:
          - { has_flag: hayden_frost_report_certified }
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
          - { not_item: split_rail_guard }
          - { none_of: [{ visited: fodder_loft }] }
        text: >
          The flank-wolf circles beneath the frost-jammed brace Hayden marked. Leaving the
          rail unbound kept the spear bare: trip the brace across its turn, then drive
          through the fallen timber if it lives. Other earned ground openings remain;
          cattle wait north.
      - when: [{ has_flag: breach_braced }, { has_flag: heard_counsel }]
        text: >
          The flank-wolf circles at the byre door. The braced breach can hold it in a
          guarded funnel, while Cade's off-side lesson offers a faster wheel into its
          cut at the cost of your guard. Choose the opening line; behind it the byre
          runs north.
      - when: [{ has_item: split_rail_guard }, { has_flag: heard_counsel }]
        text: >
          The flank-wolf circles at the byre door. Spend the bound rail catching its
          first turn, or take Cade's riskier off-side wheel and save the one-use guard
          for the heavier wolf. The byre is north; the paling is south.
      - when: [{ has_item: split_rail_guard }]
        text: >
          The flank-wolf circles at the byre door. The breach is still open, but the
          bound split-rail guard rides across your spear. Catch the first turn on those
          splinters and make a guarded line here. The paling is south.
      - when: [{ has_flag: breach_braced }]
        text: >
          The flank-wolf circles at the byre door, but the rail behind it has narrowed
          the field. Hold it in that guarded funnel with the Albany spear before the
          fight becomes a plain exchange. The paling is south; the dark byre is north.
      - when: [{ has_flag: heard_counsel }]
        text: >
          The flank-wolf circles for the off side Cade named. You can wheel into that
          cut for a fast opening and risk your guard before the fight settles into a
          plain spear exchange. The paling is south; the dark byre is north.
    exits:
      - direction: south
        to: paling_gap
        conditions: [{ not_flag: strategy_drive_committed }]
        locked_msg: "Cast the last signal, then carry the living pack north. The hard commitment does not reopen the paling or switch to combat."
      - direction: north
        to: byre_mouth
        conditions:
          - any_of:
              - { has_flag: flank_wolf_down }
              - { has_flag: flank_redirected }
              - { has_flag: drive_flank_turned }
          - any_of:
              - all_of:
                  - { not_flag: strategy_drive_committed }
              - { not_flag: june_blood_condition_broken }
              - all_of:
                  - { has_flag: yearling_down }
                  - { has_flag: flank_wolf_down }
        locked_msg: "Finish the threshold: fight or redirect the flank on other routes; on the drive, cast the last rope-bell and carry the living pack north. No mid-line switch."

  - id: byre_mouth
    name: "Deep in the Byre"
    description: >
      The old grey leader waits between you and the bellowing cattle in the byre's dark
      heart, shaping a practiced feint. Cade may have taught you to hold or close; a
      saved guard offers another catch. Without either, only plain spear work remains.
      The door is south.
    objects:
      [
        inner_cattle_gate,
        outer_scent_gate,
        cattle_crisis_priority,
        person_crisis_priority,
        reserve_crisis_priority,
        cattle_first_evacuation,
        person_first_evacuation,
        reserve_spent_evacuation,
      ]
    variants:
      - when: [{ has_flag: drive_courier_wounded }]
        text: >
          You chose cattle first and took the iron gate across your shoulder. The wound is
          real; the herd remains whole. Only the cattle-first lower-lane evacuation is legal
          now—finish it before the driven pack folds back.
      - when: [{ has_flag: drive_cattle_lost }]
        text: >
          You chose the person line. Cade and any rider have a clear passage, while two
          cattle are already lost down the lower pasture. Only the person-first cross-yard
          evacuation remains legal now.
      - when: [{ has_flag: drive_reserve_spent }]
        text: >
          You chose to spend Albany's remaining rig. Its rope and copper signal housing
          are cut into a final anchor. Only the reserve-spent smoke-lane evacuation remains
          legal now.
      - when:
          - { has_flag: strategy_drive_committed }
          - { has_flag: drive_flank_turned }
          - none_of:
              - { has_flag: drive_courier_wounded }
              - { has_flag: drive_cattle_lost }
              - { has_flag: drive_reserve_spent }
        text: >
          Pack drive is at Crisis: choose once. Cattle first saves the whole herd and returns
          the rig, but gives you an untreated gate wound (-6 HP). People first saves everyone
          and returns the rig, but loses two cattle. Reserve consumes the rig to save people
          and herd unwounded.
      - when: [{ has_flag: leader_redirected }]
        text: >
          The grey leader is alive beyond the broken paling, following the last feed
          cast and the two younger wolves into the high wood. The route to the cattle is
          open north. Behind you, the empty threshold runs south to the spent scent line.
      - when:
          - { has_flag: june_pike_present }
          - { has_flag: strategy_lure_committed }
          - { has_flag: lure_trail_fouled }
          - { has_flag: yearling_redirected }
          - { has_flag: flank_redirected }
          - { not_flag: june_blood_condition_broken }
          - { not_flag: june_cattle_line_taken }
        text: >
          The old grey leader waits between you and the bellowing cattle. June Pike
          reaches the inner rail from the lower stock path. The failed lure left the
          herd pressing; speak to her before the last cast if her cattle-first authority
          still matters. The byre door is south.
      - when:
          - { has_flag: leader_down }
          - { has_item: split_rail_guard }
        text: >
          The grey leader lies dead among the straw. The split-rail guard carried past
          her is still across your spear. At the cattle one stride north, bar their inner
          gate with it, or carry it into dawn for the broken paling. The door is south.
      - when:
          - { has_flag: leader_down }
          - { has_item: saved_brace_stake }
        text: >
          The grey leader lies dead among the straw. The brace-stake won at the door
          remains unbroken in your hand. At the cattle one stride north, bar their inner
          gate with it, or carry it into dawn for the broken paling. The door is south.
      - when:
          - { has_flag: leader_down }
          - { has_flag: leader_split_guard_set }
        text: >
          The grey leader lies dead where the split-rail guard saved at the door caught
          her heavier rush. Bound wood and rawhide are spent under her in the straw; the
          whole cattle wait one stride north. The door is south.
      - when:
          - { has_flag: leader_down }
          - { has_flag: leader_turned_over_crossbrace }
        text: >
          The grey leader lies dead among the straw where you turned spear and body over
          the saved brace-stake. The hardwood cross-piece split in that final leverage;
          beyond her the cattle stand whole, one stride north. The door is south.
      - when: [{ has_flag: leader_down }, { has_flag: leader_true_rush_taken }]
        text: >
          The grey leader lies dead among the straw where her true rush finally met
          your held spear and its answering thrust. Beyond her the cattle stand whole;
          a last stride north reaches them. The door is south.
      - when: [{ has_flag: leader_down }, { has_flag: leader_driven_before_recovery }]
        text: >
          The grey leader lies dead among the straw, denied the instant she needed to
          recover from the feint you closed through. Beyond her the cattle stand whole;
          a last stride north reaches them. The door is south.
      - when: [{ has_flag: leader_down }]
        text: >
          The dark heart of the byre. The grey leader lies dead among the trampled straw,
          and beyond her the cattle have gone quiet, unhurt against the far wall. A last
          stride takes you north to stand among them. The door is back to the south.
      - when: [{ has_flag: leader_turned_over_crossbrace }]
        text: >
          The grey leader is alive but thrown off her feet where you turned her over the
          saved crossbrace. The stake has split and is spent; finish her before she rises.
      - when:
          - { has_flag: leader_stake_crossbraced }
          - { has_item: saved_brace_stake }
        text: >
          The grey leader is alive but checked on the hardwood brace-stake you set across
          the Albany spear. The crossbrace is committed under her weight: turn the spear
          over it now, before she can slip free of the square guard.
      - when: [{ has_flag: leader_split_guard_set }]
        text: >
          The grey leader is alive but caught across the split-rail guard you saved from
          the door. The rawhide has parted and the guard is spent; finish her with the
          spear before she pulls free of the collapsing wood.
      - when: [{ has_flag: leader_true_rush_taken }]
        text: >
          The grey leader is alive but committed past her true rush, checked by the
          answering spear stroke. Her patience and weight are spent; if she still
          stands, finish her before she finds another lie.
      - when: [{ has_flag: leader_waited_out }]
        text: >
          The grey leader is alive among the straw, but her patient lie has spent
          itself against the spear point you refused to move. Her true rush is coming
          now: take it on the held line and answer before she can recoil.
      - when: [{ has_flag: leader_closed_on }]
        text: >
          The grey leader is alive among the straw, driven back by the violent close
          you made before her feint was ready. Drive again before she can recover; the
          first commitment has not finished the line yet.
      - when:
          - { has_item: split_rail_guard }
          - { has_flag: heard_plan }
          - { has_flag: heard_counsel }
        text: >
          The grey leader waits between you and the cattle. You saved the bound rail at
          the door, so it can catch this heavier rush; Cade's patient wait and violent
          close remain. Spending any opening commits its answering stroke.
      - when: [{ has_item: split_rail_guard }, { has_flag: heard_plan }]
        text: >
          The grey leader waits between you and the cattle. Set the split-rail guard you
          saved at the door across this heavier rush, or hold through the feint as Cade
          planned. Either opening commits its own next stroke.
      - when: [{ has_item: split_rail_guard }, { has_flag: heard_counsel }]
        text: >
          The grey leader waits between you and the cattle. The split-rail guard saved
          at the door offers a crosswise catch; Cade's lesson offers the violent close.
          Either opening commits its own next stroke.
      - when: [{ has_item: split_rail_guard }]
        text: >
          The grey leader waits between you and the cattle. You carried the bound split
          rail past the flank-wolf; set it across the spear against this heavier rush,
          then be ready to turn her over the breaking wood.
      - when:
          - { has_item: saved_brace_stake }
          - { has_flag: heard_plan }
          - { has_flag: heard_counsel }
        text: >
          The grey leader waits between you and the cattle. You can hold through her feint,
          close before it forms, or set the saved paling-stake across the spear and meet
          her behind that square crossbrace. Each opening commits to its own next stroke.
      - when:
          - { has_item: saved_brace_stake }
          - { has_flag: heard_plan }
        text: >
          The grey leader waits between you and the cattle. Cade's patient line can let
          the feint spend itself, while the saved paling-stake can crossbrace the spear
          into a squarer guard. Either opening demands its answering stroke.
      - when:
          - { has_item: saved_brace_stake }
          - { has_flag: heard_counsel }
        text: >
          The grey leader waits between you and the cattle. You can close through the
          feint as Cade taught, or set the saved paling-stake across the spear for a
          guarded crossbrace. Either opening commits you to its own follow-through.
      - when: [{ has_item: saved_brace_stake }]
        text: >
          The grey leader waits between you and the cattle. The hardwood stake saved at
          the door fits crosswise against the spear: set that crossbrace against her
          patience, then be ready to turn the committed line over.
      - when: [{ has_flag: heard_plan }, { has_flag: heard_counsel }]
        text: >
          The grey leader waits between you and the cattle. Hold the spear point and wait
          out her feint, then take the true rush; or close before the lie forms, then drive
          before she recovers. Each opening commits you to its own follow-through. The
          door is south.
      - when: [{ has_flag: heard_plan }]
        text: >
          The grey leader waits between you and the cattle. Cade's corridor plan says
          to hold the spear point, keep the square guard, and make her patience break;
          then take the true rush on that line. The door is south.
      - when: [{ has_flag: heard_counsel }]
        text: >
          The grey leader waits between you and the cattle. Cade's fighting lesson says
          to close before her feint is finished — a brutal opening that gives up the
          guard, then demands a second drive before she recovers.
          The door is south.
    exits:
      - direction: south
        to: byre_door
        conditions: [{ not_flag: strategy_drive_committed }]
        locked_msg: "At the byre crisis, choose one irreversible protection priority and finish its sole evacuation. The committed drive cannot retreat or switch strategies."
      - direction: north
        to: cattle_stand
        conditions:
          - any_of:
              - { has_flag: leader_down }
              - { has_flag: leader_redirected }
        locked_msg: "The grey leader still stands between you and the cattle; defeat her, complete Cade's outer scent line, or finish the committed drive-and-evacuation line before passing."

  - id: cattle_stand
    name: "Among the Cattle"
    description: >
      Grey dawn finds you among the cattle left inside the byre. The last wolf no longer
      blocks this penned end; the exact count of cattle and wolves belongs to the
      ending Cade will carry back to Albany. The byre's dark heart lies south.
    # The locomotion win (visited: cattle_stand), like the Beacon's crown and cold_forge's
    # ember chamber: the +15 capstone rides reaching the safe cattle with all three wolves
    # down (the chained exit gates), so the full 60 coincides with the byre being held,
    # never before. SCORE_PEAKS_BEFORE_WIN does not fire on a navigation win (bug_0116).
    on_enter:
      - add_journal: "The pack has broken from the byre. Grey dawn reveals the herd and the cost of the line that held it."
      - inc_var: { name: score, by: 15 }
    exits:
      - { direction: south, to: byre_mouth }

objects:
  # The Albany relief spear is real runtime gear, not prose-only equipment. Earlier
  # blind passes repeatedly opened INVENTORY after the yard said it was "already in
  # your fist" and found nothing, a small contradiction that weakened trust in every
  # later preparation choice. `held: true` puts it in the fresh inventory and also
  # makes it non-droppable: base attack 5 already includes the weapon, so this object
  # adds no permanent stat and leaves the combat-guarantee math unchanged. The three
  # enemies' opening maneuvers require it explicitly.
  - id: relief_spear
    name: "Albany relief spear"
    aliases: [spear, hunting-spear, hunting spear, relief spear, ash spear, ash-shafted spear]
    description: >
      The ash-shafted hunting-spear issued with Albany's winter-relief packet, its
      road-warden tag still tied below the head. It is already in your hands and is
      the weapon represented by your base attack — not another thing to find before
      the byre can be held.
    variants:
      - when: [{ has_flag: leader_true_rush_taken }]
        text: >
          The Albany relief spear, dark with straw and the grey leader's blood after
          you held through the feint and took her true rush on the answering point.
      - when: [{ has_flag: leader_driven_before_recovery }]
        text: >
          The Albany relief spear, dark with straw and the grey leader's blood after
          your close became a second drive before she could recover.
      - when:
          - any_of:
              - { has_flag: leader_waited_out }
              - { has_flag: leader_closed_on }
        text: >
          The Albany relief spear, dark with straw and the grey leader's blood now;
          its road-warden tag still holds below the head.
      - when: [{ has_flag: flank_pinned_at_rail }]
        text: >
          The Albany relief spear, scored where its second thrust pinned the flank-wolf
          against the braced rail and finished the guarded funnel.
      - when: [{ has_flag: flank_turned_through_return }]
        text: >
          The Albany relief spear, scored where your off-side cut turned through the
          returning stroke and carried the flank-wolf past you.
      - when: [{ has_flag: flank_hooked_over_guard }]
        text: >
          The Albany relief spear, rawhide still clinging below the head where you
          hooked it over the recovered splinter guard as that cross-piece broke.
      - when:
          - any_of:
              - { has_flag: flank_funneled }
              - { has_flag: flank_offside_cut }
        text: >
          The Albany relief spear, scored along the shaft where the flank-wolf met
          your chosen line at the byre door.
      - when: [{ has_flag: yearling_spear_driven }]
        text: >
          The Albany relief spear, its butt packed with paling-snow and its head marked
          by the second drive that followed the yearling's checked rush.
      - when: [{ has_flag: yearling_spear_set }]
        text: >
          The Albany relief spear, its butt packed with paling-snow where you set it
          against the yearling's first rush.
    held: true

  # The drive family owns one origin-honest quest-local resource. Cade issues it only
  # after a separate explanation and commitment. Its two charges are consumed by two
  # different spatial actions; there is no store pickup or invisible refill. The spent
  # rope and signal housing remain recoverable unless the crisis priority sacrifices them.
  - id: drive_signal_rope_kit
    name: "Cade's two-charge signal-and-rope rig"
    aliases: [signal rig, drive kit, signal kit, rope kit, cattle signal rig]
    description: >
      Cade's shutter charge, copper bell, and cattle rope. Exactly two uses: signal at the
      broken paling, then rope-bell at the byre door. No restock tonight. After both uses,
      the rig still returns unless you sacrifice it at the crisis.
    variants:
      - when:
          - any_of:
              - { has_flag: drive_courier_wounded }
              - { has_flag: drive_cattle_lost }
        text: >
          Cade's signal-and-rope rig with both finite charges spent. The chosen cattle-
          or person-first line preserves the housing, rope, and bell for return to Albany;
          that irreversible priority has closed the option to sacrifice it tonight.
      - when: [{ var_lte: { name: drive_kit_charges, value: 0 } }]
        text: >
          Cade's signal-and-rope rig with both charges spent. Its rope, bell, and copper
          housing remain sound enough to return to Albany—or to sacrifice as the final
          byre anchor if that is the crisis priority.
      - when: [{ var_lte: { name: drive_kit_charges, value: 1 } }]
        text: >
          Cade's signal-and-rope rig with one finite charge left: the rope-and-bell cast
          at the byre door. The shutter signal cannot be fired again.
    visible_when:
      - { has_flag: strategy_drive_committed }
      - { not_visited: paling_gap }
    takeable: true
    droppable: false
    take_effects:
      - add_journal: "You take Cade's finite signal-and-rope rig. It has exactly two charges and no restock: broken paling, then byre door."

  - id: drive_breach_signal
    name: "drive shutter signal"
    aliases: [shutter signal, paling signal, first drive, drive signal]
    description: >
      A hinged feed shutter above the broken paling. Cade's first rig charge can snap it
      once behind the yearling, turning the wolf onto the outside ash lane while the herd
      begins to move. A folded call cannot be fired again tonight.
    variants:
      - when: [{ has_flag: drive_opening_fouled }]
        text: >
          The feed shutter hangs folded against the byre wall after its single spent call.
          That first rig charge is gone and there is no retry tonight. Drop the loose hurdle
          for the committed living recovery; the moving herd leaves no combat switch.
    visible_when:
      - { has_flag: strategy_drive_committed }
      - { has_flag: drive_combat_withheld }
      - { not_flag: drive_yearling_turned }
      - { not_flag: yearling_down }
    interactions:
      - verb: USE
        item: drive_signal_rope_kit
        target: drive_breach_signal
        command_verb: fire
        command_template: "fire {target} with {item}"
        conditions:
          - { has_item: drive_signal_rope_kit }
          - { has_flag: strategy_drive_committed }
          - { has_flag: drive_combat_withheld }
          - { var_gte: { name: drive_kit_charges, value: 2 } }
          - { not_flag: drive_opening_fouled }
          - { not_flag: june_blood_condition_broken }
          - { not_flag: yearling_down }
          - { not_flag: drive_yearling_turned }
        effects:
          - dec_var: { name: drive_kit_charges, by: 1 }
          - inc_var: { name: pack_drive, by: 1 }
        skill_check:
          skill: fieldcraft
          difficulty: 12
          on_success:
            - set_flag: drive_yearling_turned
            - set_quest_stage: { quest: the_watch, stage: breach_redirected }
            - add_journal: "The one-shot shutter signal turns the yearling alive. Pack drive rises to Moving; one kit charge remains for the byre door."
            - narrate: >
                Wind carries the copper click past the wolf. You fire the shutter behind
                it; wood cracks once. The yearling runs onto Cade's ash-marked outside lane
                as the first cattle move. One charge remains, for the door; this call
                cannot repeat.
          on_failure:
            - set_flag: drive_opening_fouled
            - inc_var: { name: pack_drive, by: 1 }
            - inc_var: { name: cattle_alarm, by: 1 }
            - add_journal: "First shutter call folds. No retry: pack drive reaches Crisis early, cattle alarm +1; continue by loose hurdle."
            - narrate: >
                Wind throws the shutter's crack against the wall. The yearling checks but
                does not turn; the herd hears it. That charge is gone, with no retry. Drop
                the hurdle behind the wolf for the sole nonlethal recovery. Cattle are
                moving; there is no switch to spear combat.

  - id: drive_hurdle_recovery
    name: "loose drive hurdle"
    aliases: [loose hurdle, hurdle recovery, side hurdle, recovery gate]
    description: >
      A loose livestock hurdle above the yearling's outside shoulder. After a folded
      shutter call it can be dropped once behind the wolf, closing the inward turn without
      striking it. The recovery is louder, but spends no second signal charge.
    visible_when:
      - { has_flag: strategy_drive_committed }
      - { has_flag: drive_combat_withheld }
      - { has_flag: drive_opening_fouled }
      - { not_flag: drive_yearling_turned }
      - { not_flag: yearling_down }
    interactions:
      - verb: USE
        target: drive_hurdle_recovery
        command_verb: release
        conditions:
          - { has_flag: strategy_drive_committed }
          - { has_flag: drive_combat_withheld }
          - { has_flag: drive_opening_fouled }
          - { not_flag: drive_yearling_turned }
          - { not_flag: yearling_down }
          - { not_flag: june_blood_condition_broken }
        effects:
          - set_flag: drive_yearling_turned
          - set_quest_stage: { quest: the_watch, stage: breach_redirected }
          - add_journal: "You drop the loose hurdle once instead of rerolling. The yearling leaves alive on the noisier line; one signal charge remains."
          - narrate: >
              You pull the pin. The loose hurdle falls behind the yearling, not on it,
              closing its turn toward the cattle. The wolf takes the open lane alive. This
              cannot clean the failed call, but advances the drive without spending the
              last rope-bell charge.

  - id: drive_threshold_line
    name: "byre rope-and-bell line"
    aliases: [threshold line, bell line, second drive, flank drive, rope cast]
    description: >
      Cade's second signal point crosses the flank-wolf's turn at the byre door. Casting
      the rig's last charged rope and bell here draws the living wolf after the yearling
      and moves the pack pressure into the herd's path. There is no third charge.
    visible_when:
      - { has_flag: strategy_drive_committed }
      - { has_flag: drive_combat_withheld }
      - { has_flag: drive_yearling_turned }
      - { not_flag: drive_flank_turned }
      - { not_flag: flank_wolf_down }
    interactions:
      - verb: USE
        item: drive_signal_rope_kit
        target: drive_threshold_line
        command_verb: cast
        command_template: "cast {target} with {item}"
        conditions:
          - { has_item: drive_signal_rope_kit }
          - { has_flag: strategy_drive_committed }
          - { has_flag: drive_combat_withheld }
          - { has_flag: drive_yearling_turned }
          - { var_gte: { name: drive_kit_charges, value: 1 } }
          - { not_flag: drive_flank_turned }
          - { not_flag: flank_wolf_down }
          - { not_flag: june_blood_condition_broken }
        effects:
          - dec_var: { name: drive_kit_charges, by: 1 }
          - inc_var: { name: pack_drive, by: 1 }
          - set_flag: drive_flank_turned
          - set_quest_stage: { quest: the_watch, stage: threshold_redirected }
          - add_journal: "The second and final charge turns the flank alive. Pack drive reaches Crisis; choose a protection priority at the byre mouth."
          - narrate: >
              You cast the rope past the flank-wolf and ring its bell beyond the door-post.
              It turns after the yearling. The herd moves too; old grey begins folding both
              lines together. Both charges are spent. Crisis waits at the byre mouth.

  # Three simultaneous crisis targets need distinct object ids so the legal action list
  # exposes three genuine choices, not one overloaded USE id. June, when imported, must
  # first exercise her cattle authority; solo play reaches the same menu directly.
  - id: cattle_crisis_priority
    name: "cattle-first crisis priority"
    aliases: [protect cattle, cattle first, hold herd, take iron]
    description: >
      Keep every animal together by taking the swinging iron gate across your own shoulder.
      The herd will remain whole, but the wound remains through the evacuation.
    visible_when:
      - { has_flag: strategy_drive_committed }
      - { has_flag: drive_flank_turned }
      - none_of:
          - { has_flag: drive_courier_wounded }
          - { has_flag: drive_cattle_lost }
          - { has_flag: drive_reserve_spent }
    interactions:
      - verb: USE
        target: cattle_crisis_priority
        command_verb: choose
        conditions:
          - { has_flag: strategy_drive_committed }
          - { has_flag: drive_flank_turned }
          - { var_gte: { name: pack_drive, value: 2 } }
          - none_of:
              - { has_flag: drive_courier_wounded }
              - { has_flag: drive_cattle_lost }
              - { has_flag: drive_reserve_spent }
          - any_of:
              - { not_flag: june_pike_present }
              - { has_flag: june_blood_condition_broken }
              - { has_flag: june_drive_cattle_line_taken }
        blocked_hint:
          visible_when:
            - { has_flag: june_pike_present }
            - { not_flag: june_blood_condition_broken }
            - { not_flag: june_drive_cattle_line_taken }
          reason: "June has reached the lower swing-gate under cattle-first authority. Hear her independent decision before choosing the front-line priority."
        effects:
          - set_flag: drive_courier_wounded
          - dec_var: { name: hp, by: 6 }
          - add_journal: "Crisis—cattle: herd whole; courier suffers a persistent gate wound (-6 HP). Only cattle-first evacuation remains."
          - narrate: >
              You shoulder the iron swing-gate before it strikes the lead cattle. The bar
              catches bone, but every cow stays on the marked lane. Your arm does not come
              back clean. The choice cannot be undone; finish the sole cattle-first
              evacuation wounded.

  - id: person_crisis_priority
    name: "person-first crisis priority"
    aliases: [protect cade, protect person, people first, clear riders]
    description: >
      Clear Cade and every rider out of the pack's fold. The human line will be safe, but
      two cattle will break down the lower pasture before the herd can close.
    visible_when:
      - { has_flag: strategy_drive_committed }
      - { has_flag: drive_flank_turned }
      - none_of:
          - { has_flag: drive_courier_wounded }
          - { has_flag: drive_cattle_lost }
          - { has_flag: drive_reserve_spent }
    interactions:
      - verb: USE
        target: person_crisis_priority
        command_verb: choose
        conditions:
          - { has_flag: strategy_drive_committed }
          - { has_flag: drive_flank_turned }
          - { var_gte: { name: pack_drive, value: 2 } }
          - none_of:
              - { has_flag: drive_courier_wounded }
              - { has_flag: drive_cattle_lost }
              - { has_flag: drive_reserve_spent }
          - any_of:
              - { not_flag: june_pike_present }
              - { has_flag: june_blood_condition_broken }
              - { has_flag: june_drive_cattle_line_taken }
        blocked_hint:
          visible_when:
            - { has_flag: june_pike_present }
            - { not_flag: june_blood_condition_broken }
            - { not_flag: june_drive_cattle_line_taken }
          reason: "June has reached the lower swing-gate under cattle-first authority. Hear her independent decision before choosing the front-line priority."
        effects:
          - set_flag: drive_cattle_lost
          - inc_var: { name: cattle_alarm, by: 4 }
          - add_journal: "Crisis—people: every rider clears; two cattle are lost. Only person-first evacuation remains."
          - narrate: >
              You cut across the pack's fold and hold the human passage until Cade and
              every rider are clear. Hooves split behind you. Two cattle take the lower
              pasture before the gate can close. The people are safe and that loss is now
              real. Finish the person-first evacuation you made legal.

  - id: reserve_crisis_priority
    name: "relief-reserve crisis priority"
    aliases: [spend reserve, sacrifice rig, relief reserve, use kit]
    description: >
      Cut apart Albany's spent signal-and-rope rig and leave it as a final lane anchor.
      People and cattle can both clear, but the finite quest resource will not return.
    visible_when:
      - { has_flag: strategy_drive_committed }
      - { has_flag: drive_flank_turned }
      - none_of:
          - { has_flag: drive_courier_wounded }
          - { has_flag: drive_cattle_lost }
          - { has_flag: drive_reserve_spent }
    interactions:
      - verb: USE
        target: reserve_crisis_priority
        command_verb: choose
        conditions:
          - { has_item: drive_signal_rope_kit }
          - { has_flag: strategy_drive_committed }
          - { has_flag: drive_flank_turned }
          - { var_lte: { name: drive_kit_charges, value: 0 } }
          - { var_gte: { name: pack_drive, value: 2 } }
          - none_of:
              - { has_flag: drive_courier_wounded }
              - { has_flag: drive_cattle_lost }
              - { has_flag: drive_reserve_spent }
          - any_of:
              - { not_flag: june_pike_present }
              - { has_flag: june_blood_condition_broken }
              - { has_flag: june_drive_cattle_line_taken }
        blocked_hint:
          visible_when:
            - { has_flag: june_pike_present }
            - { not_flag: june_blood_condition_broken }
            - { not_flag: june_drive_cattle_line_taken }
          reason: "June has reached the lower swing-gate under cattle-first authority. Hear her independent decision before choosing the front-line priority."
        effects:
          - remove_item: drive_signal_rope_kit
          - set_flag: drive_reserve_spent
          - add_journal: "Crisis—reserve: the rig becomes the final anchor and is lost. Only reserve-spent evacuation remains."
          - narrate: >
              You cut Cade's cattle rope into two anchors and hammer the copper signal
              housing between them. The improvised lane buys space for people and herd
              together, but Albany's rig is gone. This cannot be recovered. Finish the
              reserve-spent evacuation its sacrifice opened.

  # Each irreversible priority exposes exactly one distinct final action. The three
  # actions converge spatially only after recording different wounds, cattle, or resource
  # state; their ordered win conditions preserve those differences as ending identities.
  - id: cattle_first_evacuation
    name: "cattle-first lower-lane evacuation"
    aliases: [lower lane, cattle evacuation, move whole herd]
    description: "The only remaining line after taking the gate wound: move the whole herd down the lower lane while the living pack breaks toward the ash wood."
    visible_when: [{ has_flag: drive_courier_wounded }]
    interactions:
      - verb: USE
        target: cattle_first_evacuation
        command_verb: finish
        conditions:
          - { has_flag: drive_courier_wounded }
        effects:
          - set_var: { name: pack_drive, value: 6 }
          - inc_var: { name: score, by: 20 }
          - set_quest_stage: { quest: the_watch, stage: byre_redirected }
          - add_journal: "Cattle line done: all people and three wolves clear; herd whole, wound persists. Outer steading defense is abandoned."
          - narrate: "You hold the wounded shoulder against the closing gate until Cade, every rider, and the last cow clear. Old grey follows the younger wolves out along the ash lane; no spear draws blood. The steading's outer line is left behind to make that separation possible."
          - goto: cattle_stand

  - id: person_first_evacuation
    name: "person-first cross-yard evacuation"
    aliases: [person evacuation, cross-yard line, clear cade]
    description: "The only remaining line after clearing the people: close the cross-yard passage behind Cade and accept the two cattle already lost below it."
    visible_when: [{ has_flag: drive_cattle_lost }]
    interactions:
      - verb: USE
        target: person_first_evacuation
        command_verb: finish
        conditions:
          - { has_flag: drive_cattle_lost }
        effects:
          - set_var: { name: pack_drive, value: 6 }
          - inc_var: { name: score, by: 20 }
          - set_quest_stage: { quest: the_watch, stage: byre_redirected }
          - add_journal: "People line done: all people and three wolves clear; two cattle stay lost. Outer steading defense is abandoned."
          - narrate: "You slam the cross-yard passage behind Cade and let old grey follow the younger wolves out. Every person is clear. Two cattle do not return to the count, and the outer steading line is left behind."
          - goto: cattle_stand

  - id: reserve_spent_evacuation
    name: "reserve-spent smoke-lane evacuation"
    aliases: [smoke lane, reserve evacuation, anchor lane]
    description: "The only remaining line after sacrificing the rig: use its cut anchors to separate the living pack from the moving herd, then leave the resource behind."
    visible_when: [{ has_flag: drive_reserve_spent }]
    interactions:
      - verb: USE
        target: reserve_spent_evacuation
        command_verb: finish
        conditions:
          - { has_flag: drive_reserve_spent }
          - { not_item: drive_signal_rope_kit }
        effects:
          - set_var: { name: pack_drive, value: 6 }
          - inc_var: { name: score, by: 20 }
          - set_quest_stage: { quest: the_watch, stage: byre_redirected }
          - add_journal: "Reserve line done: all people, whole herd, and three wolves clear; rig gone. Outer steading defense is abandoned."
          - narrate: "You pull the cut anchors apart. Cade, every rider, and the whole herd clear opposite old grey and her pack. Copper and rope stay buried, and the outer steading line is left behind."
          - goto: cattle_stand

  # Cade owns one finite noncombat resource. Accepting his plan before entering the
  # breach commits the feed-and-hounds strategy; once the player has seen the first
  # wolf, Cade will not offer the steading's last feed as a retroactive accessory.
  # The same sack must survive through the loft and leader beats, so a fouled opening
  # cannot be reset by returning to the store for invisible replacement bait.
  - id: winter_feed_sack
    name: "Cade's winter-feed sack"
    aliases: [feed, feed sack, winter feed, oats, tallow, bait, lure]
    description: >
      Cade's last small sack of oats rubbed with rendered tallow. It can carry one
      continuous downwind trail from the broken paling, through the loft hatch, and
      out beyond the byre. Spending it on the wolves leaves no feed reserve to try the
      same plan again tonight.
    visible_when:
      - { has_flag: strategy_lure_committed }
      - { not_visited: paling_gap }
    takeable: true
    droppable: false
    take_effects:
      - add_journal: "You take Cade's finite feed. It must carry one trail through all three encounters; a fouled cast cannot be restocked."

  # The first noncombat execution beat. Everyone can attempt the public Cade-taught
  # route after committing the sack; an imported Fieldcraft rank makes the opening
  # more reliable without class-locking it. Failure permanently changes pressure
  # and legal recovery.
  - id: downwind_feed_line
    name: "downwind feed line"
    aliases: [feed line, scent line, trail, downwind trail, breach trail]
    description: >
      Cade's route begins where the broken paling opens downwind. Cast the finite feed
      cleanly across the yearling's nose and into the high wood, then carry the same
      line over the loft and past the leader. A bad first cast raises the herd's alarm
      and cannot be rolled again.
    visible_when: [{ has_flag: strategy_lure_committed }]
    variants:
      - when: [{ has_flag: yearling_redirected }]
        text: "The clean oat-and-tallow line runs through the broken paling into the high wood; the living yearling's tracks follow it away from the byre."
      - when: [{ has_flag: yearling_down }]
        text: "The first cast fouled here and the yearling lies dead. The remaining feed line continues toward the loft and the two wolves deeper in the byre."
      - when:
          - { has_flag: lure_trail_fouled }
          - { not_flag: yearling_down }
        text: "Oats and tallow smear the churned snow where the first cast fouled. There is no second sack; a bound split rail can pen the yearling onto what remains, or combat can clear the breach."
    interactions:
      - verb: USE
        item: winter_feed_sack
        target: downwind_feed_line
        command_verb: lay
        command_template: "lay {target} with {item}"
        conditions:
          - { has_item: winter_feed_sack }
          - { has_flag: strategy_lure_committed }
          - { not_flag: lure_trail_fouled }
          - { not_flag: yearling_down }
          - { not_flag: yearling_redirected }
        effects:
          - inc_var: { name: cattle_alarm, by: 1 }
        skill_check:
          skill: fieldcraft
          difficulty: 12
          on_success:
            - set_flag: yearling_redirected
            - inc_var: { name: score, by: 10 }
            - set_quest_stage: { quest: the_watch, stage: breach_redirected }
            - add_journal: "The first feed cast runs clean through the paling. The living yearling follows it into the high wood; cattle alarm rises by 1."
            - narrate: >
                You wait for the wind to flatten the steam from the yearling's muzzle,
                then cast oats and tallow across its nose and beyond the gap. Hunger turns
                the low head. The wolf slips out alive after the scent while the herd
                shifts once behind the slats.
          on_failure:
            - set_flag: lure_trail_fouled
            - inc_var: { name: cattle_alarm, by: 1 }
            - add_journal: "The first cast fouls. No retry: cattle alarm rises by 2; bind a split rail to redirect the yearling or fight it."
            - narrate: >
                Wind folds the first cast back into the churned snow. The yearling smells
                it but does not leave, and the cattle hammer the inner slats. The finite
                feed is committed: bind a failed rail to force the wolf onto the remaining
                scent, or clear this one fight and carry the lure deeper.
      - verb: USE
        item: split_rail_guard
        target: downwind_feed_line
        command_verb: pen
        command_template: "pen {target} with {item}"
        conditions:
          - { has_item: split_rail_guard }
          - { has_flag: lure_trail_fouled }
          - { not_flag: yearling_down }
          - { not_flag: yearling_redirected }
        effects:
          - remove_item: split_rail_guard
          - set_flag: yearling_redirected
          - set_flag: yearling_redirected_with_split_guard
          - inc_var: { name: score, by: 10 }
          - set_quest_stage: { quest: the_watch, stage: breach_redirected }
          - add_journal: "You spend the split-rail guard to pen the yearling onto the scent. It leaves alive; that wood cannot guard a later fight."
          - narrate: >
              You drive bound splinters into the breach without striking the wolf. The
              yearling can turn only toward the remaining tallow and bolts through alive.
              The recovery saves the lure but spends wood that might have guarded a later
              jaw or barred the cattle gate.

  # Emery's preparation is a one-shot recovery, not a second lure roll. It exists only
  # after the public first cast has failed. Failure adds pressure and retires the route
  # while the existing split-rail and combat recoveries remain legal.
  - id: drover_route_marks
    name: "Emery's drover-route marks"
    aliases: [drover route, route marks, service cut, drover cut, emery's route]
    description: >
      Three charcoal cuts on the relief packet match a snowed livestock service path
      above the breach. It can turn one fouled yearling toward the high-wood scent, but
      crossing the herd's sightline badly will make the cattle press harder.
    visible_when:
      - { has_flag: drover_route_prepared }
      - { has_flag: lure_trail_fouled }
      - { not_flag: drover_route_attempted }
      - { not_flag: yearling_down }
      - { not_flag: yearling_redirected }
    interactions:
      - verb: USE
        target: drover_route_marks
        command_verb: run
        conditions:
          - { has_flag: drover_route_prepared }
          - { has_flag: lure_trail_fouled }
          - { not_flag: drover_route_attempted }
          - { not_flag: yearling_down }
          - { not_flag: yearling_redirected }
        effects:
          - set_flag: drover_route_attempted
        skill_check:
          skill: streetwise
          difficulty: 12
          on_success:
            - set_flag: yearling_redirected
            - dec_var: { name: cattle_alarm, by: 1 }
            - inc_var: { name: score, by: 10 }
            - set_quest_stage: { quest: the_watch, stage: breach_redirected }
            - add_journal: "You run Emery's one-use drover cut. The yearling leaves alive and cattle alarm falls by 1."
            - narrate: >
                You read the half-buried fence corners as an old service lane, step wide
                of the herd's sightline, and slap the packet against the far post. The
                yearling turns onto the high-wood scent. Cade answers with one low call;
                hooves ease back from the slats as the cattle alarm falls.
          on_failure:
            - inc_var: { name: cattle_alarm, by: 1 }
            - add_journal: "Emery's drover cut crosses the herd's sightline. Alarm rises by 1; the route is spent, but rail or spear recovery remains."
            - narrate: >
                You mistake charcoal for a gate. The yearling wheels across the cattle's
                sightline and stops in the breach; the herd surges harder. Emery's route
                is spent. Bind a failed rail onto the remaining scent or fight the wolf,
                then carry the lure deeper.

  # Jamie's protocol waits for the specific public rail recovery: the first cast fouled,
  # the ordinary wedge split, and its bound guard was spent redirecting the yearling.
  # Mediation changes visible pressure once and never blocks the committed loft route.
  - id: relief_protocol_docket
    name: "Jamie's sealed relief protocol"
    aliases: [relief protocol, protocol, sealed docket, jamie's protocol, herd calls]
    description: >
      A witnessed order of names, head-counts, and low yard calls for Cade to answer in
      sequence. It applies only after a rough rail recovery has sent the yearling alive
      away from the breach, while the cattle can still be brought back off the slats.
    visible_when:
      - { has_flag: relief_protocol_prepared }
      - { has_flag: yearling_redirected_with_split_guard }
      - { not_flag: relief_protocol_attempted }
      - { not_flag: yearling_down }
      - { not_flag: flank_redirected }
    interactions:
      - verb: USE
        target: relief_protocol_docket
        command_verb: call
        conditions:
          - { has_flag: relief_protocol_prepared }
          - { has_flag: yearling_redirected_with_split_guard }
          - { not_flag: relief_protocol_attempted }
          - { not_flag: yearling_down }
          - { not_flag: flank_wolf_down }
          - { not_flag: flank_redirected }
        effects:
          - set_flag: relief_protocol_attempted
        skill_check:
          skill: mediation
          difficulty: 12
          on_success:
            - dec_var: { name: cattle_alarm, by: 1 }
            - add_journal: "You and Cade complete Jamie's witnessed relief calls in order. Cattle alarm falls by 1 before the loft cast."
            - narrate: >
                You name each missing delivery, Cade answers with its accustomed yard
                call, and neither of you talks over the other. The familiar cadence
                reaches the herd through the slats. Heads turn from the breach and the
                cattle alarm falls before you carry the feed line upstairs.
          on_failure:
            - inc_var: { name: cattle_alarm, by: 1 }
            - add_journal: "Your relief calls cross Cade's count and cattle alarm rises by 1. The protocol is spent; the loft route remains open."
            - narrate: >
                You call the tally before Cade has closed the missing name. Two commands
                cross in the yard; the herd answers the sharper voice and strikes the
                slats again. Jamie's protocol is spent, but nothing has changed the
                committed route west through the store and up to the loft.

  # A spatial tactic rather than another inventory buff. The store signposts this hatch
  # immediately, but the loft route opens only after the yearling is down. Entering that
  # one-way room is the approach commitment, recorded by ordinary visit history instead
  # of a redundant sticky flag; it never changes stats, score, or required locomotion.
  - id: loft_hatch
    name: "low wolf-hatch"
    aliases: [hatch, wolf hatch, loft hatch, drop, door-post]
    description: >
      A low fodder hatch above the byre door. The flank-wolf circles the post below
      without looking up. The hauled store ladder lies behind you across the hay; east
      through this hatch is the committed drop, with no safe climb back during the fight.
    interactions:
      - verb: USE
        item: winter_feed_sack
        target: loft_hatch
        command_verb: cast
        command_template: "cast {item} through {target}"
        conditions:
          - { has_item: winter_feed_sack }
          - { has_flag: strategy_lure_committed }
          - any_of:
              - { has_flag: yearling_down }
              - { has_flag: yearling_redirected }
          - { not_flag: flank_wolf_down }
          - { not_flag: flank_redirected }
        effects:
          - set_flag: flank_redirected
          - inc_var: { name: cattle_alarm, by: 1 }
          - inc_var: { name: score, by: 10 }
          - set_quest_stage: { quest: the_watch, stage: threshold_redirected }
          - add_journal: "You cast the second feed measure from the loft. The living flank-wolf follows the trail out; cattle alarm rises by 1."
          - narrate: >
              You cast the second measure beyond the circling wolf instead of dropping
              on its back. Tallow strikes the first trail below. The flank-wolf checks,
              follows that scent through the paling, and leaves the threshold empty
              while the herd presses harder against the slats.

  - id: outer_scent_gate
    name: "outer scent gate"
    aliases: [outer line, scent gate, final trail, last feed, leader trail]
    description: >
      The final downwind opening beside the inner cattle pen. Casting the rest of Cade's
      feed through it commits the whole sack and gives the grey leader a living pack to
      follow. The herd's current alarm decides whether every cow remains together.
    visible_when: [{ has_flag: strategy_lure_committed }]
    variants:
      - when: [{ has_flag: pack_diverted }, { has_flag: yearling_down }]
        text: "The spent line runs beyond the paling. The yearling is dead; the other two wolves followed the feed alive into the high wood."
      - when: [{ has_flag: pack_diverted }, { not_flag: yearling_down }]
        text: "The spent outer scent line runs beyond the paling. All three wolves are alive in the high wood; the feed sack is empty."
    interactions:
      - verb: USE
        item: winter_feed_sack
        target: outer_scent_gate
        command_verb: cast
        command_template: "cast {item} through {target}"
        conditions:
          - { has_item: winter_feed_sack }
          - { has_flag: strategy_lure_committed }
          - any_of:
              - { has_flag: flank_wolf_down }
              - { has_flag: flank_redirected }
          - { not_flag: leader_down }
          - { not_flag: leader_redirected }
          # If June's disclosed cattle-first condition has actually triggered,
          # her independent refusal/action must resolve before the player can
          # silently finish the same pressure line without her.
          - any_of:
              - { not_flag: june_pike_present }
              - { not_flag: lure_trail_fouled }
              - { has_flag: june_blood_condition_broken }
              - { has_flag: june_cattle_line_taken }
        blocked_hint:
          visible_when:
            - { has_flag: june_pike_present }
            - { has_flag: lure_trail_fouled }
            - { has_flag: yearling_redirected }
            - { has_flag: flank_redirected }
            - { not_flag: june_blood_condition_broken }
            - { not_flag: june_cattle_line_taken }
          reason: "June has reached the pressing cattle under the authority you granted. Speak to her before committing the last scent cast."
        effects:
          - remove_item: winter_feed_sack
          - set_flag: leader_redirected
          - set_flag: pack_diverted
          - inc_var: { name: cattle_alarm, by: 1 }
          - inc_var: { name: score, by: 10 }
          - set_quest_stage: { quest: the_watch, stage: byre_redirected }
          - add_journal: "You spend the last feed. The leader follows it alive; cattle alarm rises by 1 and decides whether the herd holds."
          - narrate: >
              You throw the last oats through the outer gap, dragging tallow clear of the
              cattle. The old leader hears a wolf outside, chooses that trail over the
              herd, and slips after it alive. Behind you, hooves strike the slats at the
              pressure your choices built.

  # A terminal post-hunt resource choice. Spending either saved cross-piece moves
  # straight into cattle_stand, whose existing on_enter awards the capstone and ends the
  # quest; there is no new backtrackable flag lattice. Walking north instead retains the
  # wood for daylight repair at the broken paling.
  - id: inner_cattle_gate
    name: "inner cattle-gate"
    aliases: [inner gate, cattle gate, gate, slatted gate, iron loops]
    description: >
      The low slatted gate at the cattle pen. Its iron loops will take either cross-piece
      saved from the fighting; without sound wood in hand, it is only the last gate to pass.
    visible_when: [{ has_flag: leader_down }]
    interactions:
      - verb: USE
        item: split_rail_guard
        target: inner_cattle_gate
        command_verb: bar
        command_template: "bar {target} with {item}"
        conditions: [{ has_flag: leader_down }]
        effects:
          - remove_item: split_rail_guard
          - set_flag: cattle_gate_barred_with_split_guard
          - add_journal: "The split-rail guard now bars the inner cattle-gate; saved wood holds one last line around the herd."
          - narrate: >
              You lash the bound split rail across the inner cattle-gate. What could have
              guarded your spear now bars a second rush; rawhide draws tight between the
              posts. Behind it the herd settles, and you step among them while broken
              paling wood holds one last line.
          - goto: cattle_stand
      - verb: USE
        item: saved_brace_stake
        target: inner_cattle_gate
        command_verb: bar
        command_template: "bar {target} with {item}"
        conditions: [{ has_flag: leader_down }]
        effects:
          - remove_item: saved_brace_stake
          - set_flag: cattle_gate_barred_with_brace_stake
          - add_journal: "The saved brace-stake now bars the inner cattle-gate; spared wood holds one last line around the herd."
          - narrate: >
              You drop the saved brace-stake through the inner cattle-gate's iron loops.
              The hardwood spared at the door locks the slats against a second rush.
              Behind it the herd settles, and you step among them with that choice standing
              against the dark byre.
          - goto: cattle_stand

  - id: day_book
    name: "day-book"
    aliases: [book, daybook, tally, log, journal, nail, notice]
    description: "The steading's day-book on its nail by the byre door, the last days' entries scrawled in the houndsman's hard hand."
    read_text: >
      Last tally: 'THREE AT THE PALING; OLD GREY LEADS. Albany rider has spear ALREADY.
      Cade's knack and the byre-JERKIN kept one watchman standing; another trusted spear
      alone and bled. Heed Cade; don the JERKIN—both. Do less and you gamble the byre on
      night's luck. Hold till dawn.'
    interactions:
      - verb: READ
        target: day_book
        conditions:
          - { not_flag: read_tally }
          - { not_flag: strategy_drive_committed }
        effects:
          - set_flag: read_tally
          - inc_var: { name: score, by: 5 }

  - id: byre_jerkin
    name: "padded byre-jerkin"
    aliases: [jerkin, padding, jacket, hide, leathers, coat]
    description: "The steading's padded byre-jerkin — layered hide and stuffed wool, heavy and stiff, the kind of armour a wolf's teeth catch and tear at without ever reaching the man inside."
    # Reactive examine (bug_0023): once pulled on it is gear you wear, not a loose jerkin
    # on a peg to consider (its self-USE "don" interaction has retired behind jerkin_donned).
    variants:
      - when: [{ has_flag: jerkin_donned }]
        text: "The padded byre-jerkin, pulled on now over your own coat; its layered hide sits stiff and heavy between you and the next set of teeth."
      - when: [{ has_item: byre_jerkin }, { none_of: [{ has_flag: jerkin_donned }] }]
        text: "The padded byre-jerkin is bunched in your hands, layered hide still useless until you drag it on over your coat."
    takeable: true
    # Once Albany's rider claims this quest gear, it stays with him. In particular,
    # DROP must never let a donned jerkin leave inventory while its +2 defense and
    # `jerkin_donned` state remain active.
    droppable: false
    take_effects:
      - set_flag: byre_jerkin_taken
      - narrate: >
          You have the padded byre-jerkin in your hands, but not yet on your back.
          Drag it on before you go north; carried hide will not turn teeth.
    interactions:
      # Self-USE = "wear this thing" (cold_forge plate / dawn_beacon mail, bug_0074).
      # command_verb: don makes the offered and typed verb match the prose. One-shot
      # (gated none_of jerkin_donned) so the +2 cannot be farmed. The +2 defense is half
      # of the houndsman's promised safety; with his +2-attack counsel it is exactly what
      # carries the cumulative gauntlet bound GREEN for the fully-prepared hunter.
      - verb: USE
        item: byre_jerkin
        target: byre_jerkin
        command_verb: don
        conditions:
          - { none_of: [{ has_flag: jerkin_donned }] }
          - { not_flag: strategy_drive_committed }
        effects:
          - set_flag: jerkin_donned
          - inc_var: { name: defense, by: 2 }
          # The diligence award (bug_0239): donning the jerkin is the other prep act the
          # day-book presses, so it scores +5. One-shot — gated behind jerkin_donned (the
          # don interaction retires once worn), so the +5 cannot be farmed.
          - inc_var: { name: score, by: 5 }
          - add_journal: "You pull on the padded byre-jerkin. Its hide takes the teeth before they reach you (+2 defense)."
          - narrate: "You drag the padded byre-jerkin on over your coat. It is stiff and weighs on the shoulders, but the layered hide sits steady between you and the next set of teeth — half of old Cade's promise, the padded half."

  # The one skill_check this pack carries — added so the RPG mode is uniform (every
  # curated RPG pack now has at least one §13 check). It is a defence skill check, the
  # breaking_weir tool-on-target shape: wedge a fallen paling-rail back across the breach
  # to shore the line. It remains OPTIONAL — no exit, win or ending turns on its flag —
  # but it is no longer decorative: success unlocks the guarded funnel sequence against
  # the flank-wolf. The frozen timber gives ONE honest wedge attempt. `rail_attempted` is
  # set before the d20 branch; failure sets `rail_split` and exposes a second, deterministic
  # target-only USE with the SAME stable `use_paling_rail` id. Binding the joined lengths
  # makes real, non-droppable `split_rail_guard` gear and a distinct recovered flank line;
  # leaving them unbound preserves Hayden's imported frost-jamb line. Neither choice
  # rerolls or counterfeits the stronger braced-funnel success.
  #   - skill: defense (the only fitting reachable stat — vars_init.defense 3, +2 from the
  #     byre-jerkin = ceiling 5; shoring a defensive line is defence work, not the spear-arm).
  #   - difficulty 11: passable on a MID roll at BASE defence (d20 + 3 ≥ 11 needs a roll of
  #     8, ~65%) and easier once the jerkin is on (d20 + 5, roll of 6). Well under the
  #     SKILL_CHECK_IMPOSSIBLE ceiling 20 + 5 = 25, so the check always reads as winnable.
  #   - on_success: breach_braced + journal + narration, NO persistent stat or score change.
  #     The flag drives reactive prose and the flank-wolf's `funnel_thrust` maneuver, but no
  #     exit/win/ending. Temporary maneuver defense never changes the pack's stored stats.
  #   - on_failure: the rail splits. The guarded funnel is lost, but the explicitly
  #     signposted choice either salvages a weaker carried guard or, with Hayden's report,
  #     keeps the spear bare for a high-variance door-brace line.
  - id: paling_rail
    name: "fallen paling-rail"
    aliases: [rail, paling-rail, post, stake, timber, bar]
    description: "A stout length of the broken paling, splintered off at one end but seasoned and sound — the kind of heavy timber a man could wedge across a gap to half-shut it, so what comes through must come singly."
    # The rail is real scenery while loose, split, or wedged into the breach. Once the
    # split lengths become carried gear, the sticky made flag retires this world object;
    # the room text narrates the empty bed and later spent guard without leaving a stale
    # examine affordance behind.
    visible_when: [{ not_flag: split_rail_guard_made }]
    variants:
      - when: [{ has_flag: leader_turned_over_crossbrace }]
        name: "spent paling brace"
        text: "The paling-rail rests canted in the breach, its brace-stake gone north and split under the grey leader when you turned her over the crossbraced spear."
      - when: [{ has_item: saved_brace_stake }]
        name: "canted paling-rail"
        text: "The paling-rail rests canted after you wrenched out its hardwood brace-stake at the byre door. The saved stake rides against your spear now."
      - when:
          - { has_flag: works_fortification_splice_needed }
          - { has_flag: rail_split }
        name: "marked split paling-rail"
        text: >
          Reese's first measured set split the frozen rail, but ink still joins the
          marked splice across both lengths. Cold-set it now without another roll. The
          hammering will restore the half-shut breach and raise cattle alarm by 1.
      - when: [{ has_flag: breach_braced }]
        name: "braced paling-rail"
        text: "The fallen paling-rail, wedged hard across the breach now and stamped home — the gap half-shut, so what comes through the paling must come singly and slow."
      - when:
          - { has_flag: hayden_frost_report_certified }
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
          - { not_item: split_rail_guard }
        name: "split paling-rail"
        text: >
          The failed rail lies split but joined. Bind it across the spear for a carried
          guard, or leave it here: Hayden's certified report says the same frost-load has
          jammed a brace at the byre door, and only a bare spear can trip that line.
          Binding the guard commits away from it.
      - when: [{ has_flag: rail_split }, { not_flag: split_rail_guard_made }]
        name: "split paling-rail"
        text: >
          The paling-rail lies split at its splintered end where the frozen ground
          refused it. It cannot brace the gap, but the two joined lengths are still sound
          enough to bind across the spear as a splinter guard. Use the rail again to lash
          that recovery together before you go north.
    interactions:
      # Reese's allocation replaces the public wedge with one Repair check. A miss keeps
      # the honest split-rail consequence, then exposes a deterministic cold-set recovery
      # instead of a retry or the public carried-guard branch.
      - verb: USE
        target: paling_rail
        command_verb: set
        conditions:
          - { has_flag: works_fortification_prepared }
          - { not_flag: rail_attempted }
          - { not_flag: breach_braced }
          - any_of:
              - { not_flag: strategy_lure_committed }
              - { has_flag: lure_trail_fouled }
          - any_of:
              - { not_flag: strategy_drive_committed }
              - { has_flag: june_blood_condition_broken }
        effects:
          - set_flag: rail_attempted
        skill_check:
          skill: repair
          difficulty: 12
          on_success:
            - set_flag: breach_braced
            - add_journal: "Reese's measured cold-set seats cleanly. The half-shut breach is braced without raising cattle alarm."
            - narrate: >
                You match Reese's three packet marks to grain, frost line, and post,
                then drive the rail in that order. The timber seats on the first set.
                The breach stands half-shut before the herd can answer the hammer.
          on_failure:
            - set_flag: rail_split
            - set_flag: works_fortification_splice_needed
            - add_journal: "The first works set splits the frozen rail. Reese's marked splice remains as a deterministic cold-set recovery."
            - narrate: >
                The first measured blow finds hidden frost and splits the rail along its
                joined grain. Reese marked this failure too: overlap the inked lengths
                and cold-set the splice. It will hold, but the extra hammering will carry
                into the byre.
      # Target-only USE: the rail is visible scenery already lying in the breach, so
      # "wedge rail" means lifting and setting it in place without a TAKE/drop cycle.
      # This prevents a wedged or split rail from being immediately re-taken into the
      # inventory. `rail_attempted` retires the wedge after either branch, while
      # breach_braced records success and unlocks the later funnel sequence.
      - verb: USE
        target: paling_rail
        command_verb: wedge
        conditions:
          - { not_flag: works_fortification_prepared }
          - { not_flag: rail_attempted }
          - { not_flag: breach_braced }
          - any_of:
              - { not_flag: strategy_lure_committed }
              - { has_flag: lure_trail_fouled }
          - any_of:
              - { not_flag: strategy_drive_committed }
              - { has_flag: june_blood_condition_broken }
        effects:
          - set_flag: rail_attempted
        skill_check:
          skill: defense
          difficulty: 11
          on_success:
            - set_flag: breach_braced
            - add_journal: "You wedge the rail across the breach; the half-shut gap forces each wolf through singly and slow."
            - narrate: "You heft the rail and drive its splintered end down hard into the trampled snow, then lever the length of it up across the breach and set your shoulder to it till it bites. The gap is half-shut now — no wolf will come through it but singly, and none of them fast."
          on_failure:
            - set_flag: rail_split
            - add_journal: "Frozen ground splits the rail. The funnel is lost; its joined lengths remain unbound until you choose whether to make a guard."
            - narrate: "Frozen ground kicks the splintered end aside with a crack. The rail splits but holds together. The guarded funnel is lost; the joined lengths can still make a rough spear-guard, but binding them commits the spear to that recovery. Decide at the rail before going north."
      - verb: USE
        target: paling_rail
        command_verb: splice
        conditions:
          - { has_flag: works_fortification_prepared }
          - { has_flag: works_fortification_splice_needed }
          - { has_flag: rail_split }
          - { not_flag: breach_braced }
        effects:
          - clear_flag: rail_split
          - clear_flag: works_fortification_splice_needed
          - set_flag: breach_braced
          - inc_var: { name: cattle_alarm, by: 1 }
          - add_journal: "You overlap Reese's marked splice and cold-set the rail. The breach is braced; extra hammering raises cattle alarm by 1."
          - narrate: >
              You overlap the inked lengths, turn the split against the post, and hammer
              the cold splice until both halves bite. The half-shut breach is restored.
              Behind it the herd answers every blow, and cattle alarm rises by 1.
      # Recoverable failure: target-only again, therefore the stable action id remains
      # `use_paling_rail`. Mutually exclusive with the initial wedge and with itself.
      - verb: USE
        target: paling_rail
        command_verb: bind
        conditions:
          - { not_flag: works_fortification_prepared }
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
          - { not_item: split_rail_guard }
        effects:
          - add_item: split_rail_guard
          - set_flag: split_rail_guard_made
          - add_journal: "You bind split rail across the spear, committing away from any bare-spear line. It can catch the flank-wolf at the door."
          - narrate: "You overlap the split rail and cinch both lengths across the Albany spear. This shorter guard must travel in your hands, but gives the next wolf wood to bite before you. The spear is no longer bare for another opening."

  - id: split_rail_guard
    name: "bound split-rail guard"
    aliases: [split rail guard, splinter guard, bound rail, cross-guard, cross guard]
    description: >
      Two joined lengths of the failed paling-rail, bound across the Albany spear with
      rawhide. Spend it catching the flank-wolf at the door, or beat that wolf by another
      line and save the one-use guard for the grey leader's heavier rush.
    # Real recovered gear, but never loose loot: the maneuver that commits it at either
    # later encounter consumes it exactly once.
    droppable: false

  - id: saved_brace_stake
    name: "saved brace-stake"
    aliases: [brace-stake, brace stake, hardwood stake, crossbrace, cross-brace]
    description: >
      The hardwood brace-stake you wrenched from the paling behind the flank-wolf. It
      rides crosswise in your fist against the spear-shaft: less shelter left at the
      door, but a portable guard stout enough to set against one heavier rush.
    # Earned only by the flank-wolf follow-through and spent only at the leader.
    droppable: false

npcs:
  - id: houndsman
    name: "old Cade the houndsman"
    description: >
      A bent old houndsman in a wolfskin cap, propped in the byre door with a lantern and
      a stick. Too stiff in the hands to hold a spear this winter, but clear-eyed and
      unafraid, and plainly glad Albany's relief rider has reached the door awake.
    room: byre_yard
    # Every npc_text is PURE SPOKEN words (the bug_0071 convention): the engine renders
    # `old Cade the houndsman: "<npc_text>"`. The counsel topic retires once told (gated
    # not_flag heard_counsel) so the +2 attack is one-shot; the ungated `leave` keeps the
    # root TERMINATING (a gated-only node would trip DIALOGUE_NONTERMINATING, bug_0014).
    # bug_0258 — cade_byre signposts the optional wedge before the player reaches
    # the paling. The rail is now visible target-only scenery, so the signpost names
    # the natural one-step act (heft and wedge it) rather than a take/use inventory
    # ceremony. Success creates the guarded flank-wolf opening and can seed the optional
    # brace-stake line remembered at the ending; neither outcome gates victory.
    dialogue:
      root: cade_root
      nodes:
        - id: cade_root
          npc_text: >
            You came from Albany awake—good. Three wolves are through; without these cattle
            we starve. Ask for either lesson—or both before you go: quick spear-hand or
            guarded byre plan. Or hear the one-sack living lure or two-charge signal drive.
          variants:
            - when:
                - { has_flag: strategy_drive_committed }
                - { not_visited: paling_gap }
              text: >
                Your two-charge drive is committed: shutter at the paling, rope-bell at the
                door, then choose what the pack-and-herd crisis exposes. Take no feed; drive
                and lure are separate plans.
            - when:
                - { has_flag: strategy_lure_committed }
                - { visited: paling_gap }
              text: >
                The feed-and-hounds line is in motion now. There is no replacement sack
                and no second primary plan. Finish the line the breach has left you, then
                bring Cade and Albany the exact count—wolves and cattle both.
            - when:
                - { has_flag: strategy_lure_committed }
                - { not_visited: paling_gap }
              text: >
                You committed the one-sack feed-and-hounds line: three downwind casts,
                no clean retry. Earlier combat lessons remain fallbacks, but Cade will
                teach no new primary plan. Take the feed before entering the breach.
            - when: [{ has_flag: heard_counsel }, { has_flag: heard_plan }]
              text: >
                Both lessons are yours. You do not choose a road here: commit to the quick
                or guarded line later, at the wolves, when each opening makes the choice
                real. Leave now and hold the byre.
            - when: [{ has_flag: heard_counsel }, { not_flag: heard_plan }]
              text: >
                You have the quick spear-hand. The guarded byre plan is still yours to
                learn: rail, breach, and patient line. Ask for it—or leave, and commit later
                at the wolves.
            - when: [{ has_flag: heard_plan }, { not_flag: heard_counsel }]
              text: >
                You have the guarded byre plan. The quick spear-hand is still yours to
                learn: set, wheel, and violent close. Ask for it—or leave, and commit later
                at the wolves.
          topics:
            - id: wolves
              aliases: [ask_wolves]
              prompt: "Ask for Cade's quick spear-hand lesson."
              conditions:
                - { not_flag: heard_counsel }
                - { not_flag: strategy_lure_committed }
                - { not_flag: strategy_drive_committed }
              goto: cade_wolves
            - id: byre
              aliases: [ask_byre]
              prompt: "Ask for Cade's guarded byre plan."
              conditions:
                - { not_flag: heard_plan }
                - { not_flag: strategy_lure_committed }
                - { not_flag: strategy_drive_committed }
              goto: cade_byre
            - id: lure
              aliases: [ask_lure, ask_feed, ask_alive]
              prompt: "Ask how Cade's one-sack plan could draw the pack out alive."
              conditions:
                - { not_flag: strategy_lure_committed }
                - { not_flag: strategy_drive_committed }
                - { not_visited: paling_gap }
              goto: cade_lure
            - id: drive
              aliases: [ask_drive, ask_evacuate, ask_signal]
              prompt: "Ask how Cade's signal drive could move the wolves and cattle together."
              conditions:
                - { not_flag: strategy_lure_committed }
                - { not_flag: strategy_drive_committed }
                - { not_visited: paling_gap }
              goto: cade_drive
            - id: leave
              aliases: [leave_cade]
              prompt: "Leave old Cade and hold the byre."
              end: true
        - id: cade_wolves
          # The combat_guaranteed promise spoken aloud — and TRUE, because the validator
          # proves it for the fully-prepared hunter (jerkin + this counsel). It names BOTH
          # halves of the prep plainly, so the player who heeds it is the player the
          # guarantee covers.
          npc_text: >
            Quick lines: set against the young wolf; drive. Wheel into the flank's offside
            cut; turn through. Close on grey's feint: fast, but your guard opens; drive
            before she recovers. Learn this hand and don the byre-jerkin—both—and no wolf
            can pull you down.
          effects:
            - set_flag: heard_counsel
            - inc_var: { name: attack, by: 2 }
            # The diligence award (bug_0239): heeding Cade is one of the two prep acts the
            # day-book presses, so it scores +5. One-shot — gated behind heard_counsel
            # (the topic retires once told), so the +5 cannot be farmed.
            - inc_var: { name: score, by: 5 }
            - add_journal: "Cade's quick/open line: set/drive young wolf; wheel/turn through flank; close/drive old grey. You strike truer (+2 attack)."
          topics:
            - id: byre
              aliases: [ask_byre]
              prompt: "Ask next for Cade's guarded byre plan."
              conditions:
                - { not_flag: heard_plan }
                - { not_flag: strategy_lure_committed }
                - { not_flag: strategy_drive_committed }
              goto: cade_byre
            - id: lure
              aliases: [ask_lure, ask_feed, ask_alive]
              prompt: "Ask how Cade could draw the pack out alive instead."
              conditions:
                - { not_flag: strategy_lure_committed }
                - { not_flag: strategy_drive_committed }
                - { not_visited: paling_gap }
              goto: cade_lure
            - id: drive
              aliases: [ask_drive, ask_evacuate, ask_signal]
              prompt: "Ask how the two-charge signal drive works."
              conditions:
                - { not_flag: strategy_lure_committed }
                - { not_flag: strategy_drive_committed }
                - { not_visited: paling_gap }
              goto: cade_drive
            - id: wolves_back
              prompt: "Nod, and ask something else."
              goto: cade_root
            - id: leave
              aliases: [leave_cade]
              prompt: "Leave old Cade and hold the byre."
              end: true
        - id: cade_byre
          npc_text: >
            Guarded lines: at the fallen rail, wedge it back across to half-shut the
            breach—a guarded funnel. If it splits, bind the lengths across your spear. At
            old grey, wait out her lie, then take the true rush: the patient alternative
            to closing early.
          effects:
            - set_flag: heard_plan
            - add_journal: "Cade's guarded/patient: wedge the fallen rail; if it splits, bind the joined lengths. Wait out grey's feint; take true rush."
          topics:
            - id: wolves
              aliases: [ask_wolves]
              prompt: "Ask next for Cade's quick spear-hand lesson."
              conditions:
                - { not_flag: heard_counsel }
                - { not_flag: strategy_lure_committed }
                - { not_flag: strategy_drive_committed }
              goto: cade_wolves
            - id: lure
              aliases: [ask_lure, ask_feed, ask_alive]
              prompt: "Ask how Cade could draw the pack out alive instead."
              conditions:
                - { not_flag: strategy_lure_committed }
                - { not_flag: strategy_drive_committed }
                - { not_visited: paling_gap }
              goto: cade_lure
            - id: drive
              aliases: [ask_drive, ask_evacuate, ask_signal]
              prompt: "Ask how the two-charge signal drive works."
              conditions:
                - { not_flag: strategy_lure_committed }
                - { not_flag: strategy_drive_committed }
                - { not_visited: paling_gap }
              goto: cade_drive
            - id: byre_back
              prompt: "Thank him, and ask something else."
              goto: cade_root
            - id: leave
              aliases: [leave_cade]
              prompt: "Leave old Cade and hold the byre."
              end: true
        - id: cade_lure
          npc_text: >
            Cade's feed line spends one sack in three casts: paling, loft, then old grey.
            Each raises cattle alarm. Foul the first and there is no retry: bind a split
            rail to turn the yearling, or fight it and carry on. Asking is free; commit
            before the breach.
          topics:
            - id: commit_lure
              aliases: [commit_feed, commit_alive]
              prompt: "Commit to the finite feed-and-hounds line now."
              conditions:
                - { not_visited: paling_gap }
              goto: cade_lure_committed
            - id: lure_back
              prompt: "Decline for now, and ask something else."
              goto: cade_root
            - id: leave
              aliases: [leave_cade]
              prompt: "Leave old Cade without committing the feed."
              end: true
        - id: cade_lure_committed
          npc_text: >
            Committed, then. Take my feed before the breach. Cast first at the paling,
            then return through the yard and store to the loft for the second cast; the
            last line runs past old grey. No replacement sack, and Albany gets the exact
            count.
          effects:
            - set_flag: strategy_lure_committed
            - add_journal: "You commit Cade's finite feed: paling first; then south, west, and up to the loft; outer gate last. No retry after a foul."
          topics:
            - id: wolves
              aliases: [ask_wolves]
              prompt: "Ask next for Cade's quick spear-hand lesson."
              conditions:
                - { not_flag: heard_counsel }
                - { not_flag: strategy_lure_committed }
              goto: cade_wolves
            - id: byre
              aliases: [ask_byre]
              prompt: "Ask next for Cade's guarded byre plan."
              conditions:
                - { not_flag: heard_plan }
                - { not_flag: strategy_lure_committed }
              goto: cade_byre
            - id: lure_back
              prompt: "Repeat the risks, then ask something else."
              goto: cade_root
            - id: leave
              aliases: [leave_cade]
              prompt: "Leave old Cade and choose at the breach."
              end: true
        - id: cade_drive
          npc_text: >
            Read, prepare, and don gear before you commit. Yes starts the cattle immediately.
            Every completion forfeits the steading's outer defense line; no later switch to
            lure or spear combat. Rig: two charges, paling/door. First miss: no retry; drop
            hurdle.
          topics:
            - id: commit_drive
              aliases: [commit_evacuate, commit_signal]
              prompt: "Commit to the finite drive-and-evacuate line now; start the herd, close preparation and retreat, and forfeit the outer steading defense line."
              conditions:
                - { not_visited: paling_gap }
              goto: cade_drive_committed
            - id: drive_back
              prompt: "Decline for now, and ask something else."
              goto: cade_root
            - id: leave
              aliases: [leave_cade]
              prompt: "Leave old Cade without committing the drive."
              end: true
        - id: cade_drive_committed
          npc_text: >
            Committed. Herd moves; outer defense, retreat, and strategy switches close. Take
            the rig: two charges, shutter then bell. A failed first call has no retry—drop
            the hurdle once. At Crisis choose wound, two lost cattle, or the rig.
          effects:
            - set_flag: strategy_drive_committed
            - set_flag: drive_combat_withheld
            - inc_var: { name: drive_kit_charges, by: 2 }
            - add_journal: "Drive committed: herd starts; preparation/retreat close. Outer defense is forfeit. Take two-charge rig; no lure/combat switch."
          topics:
            - id: drive_back
              prompt: "Repeat the route, then ask something else."
              goto: cade_root
            - id: leave
              aliases: [leave_cade]
              prompt: "Leave old Cade and begin the committed drive."
              end: true

  # June is an optional campaign companion, never a direct-start assumption or
  # another combatant. She appears only after the failed lure has been recovered
  # alive through both younger wolves. Speaking to her triggers the independent
  # cattle-first decision Albany disclosed: she refuses the grey-wolf line, takes
  # the herd instead, and retires after changing pressure once.
  - id: june_pike
    name: "Road Warden June Pike"
    description: >
      June Pike stands at the inner rail with her cattle rope looped short. She came
      under cattle-first authority, not as another spear, and the recovered lure has
      kept her blood condition intact this far.
    room: byre_mouth
    conditions:
      - { has_flag: june_pike_present }
      - { has_flag: strategy_lure_committed }
      - { has_flag: lure_trail_fouled }
      - { has_flag: yearling_redirected }
      - { has_flag: flank_redirected }
      - { not_flag: june_blood_condition_broken }
      - { not_flag: june_cattle_line_taken }
    dialogue:
      root: june_cattle_first
      nodes:
        - id: june_cattle_first
          npc_text: >
            No. I will not join the line on old grey. You granted me the cattle call,
            and that failed scent has them on the slats. I take the lower rail now;
            you finish the living route you chose.
          effects:
            - set_flag: june_cattle_line_taken
            - dec_var: { name: cattle_alarm, by: 1 }
            - add_journal: "June refuses the wolf line and takes the lower rail under cattle-first authority. Cattle alarm falls by 1; she leaves the hunt."
          topics:
            - id: acknowledge
              aliases: [leave_june, take_cattle_line]
              prompt: "Acknowledge June's decision and face old grey."
              end: true

  # On the drive family June remains cattle-first rather than becoming a second
  # player-controlled tool. Her separate NPC surface preserves the established lure
  # conversation unchanged. When present she independently takes the lower swing-gate;
  # the crisis menu waits for that decision, but every solo route remains complete.
  - id: june_pike_drive
    name: "Road Warden June Pike"
    description: >
      June Pike reaches the lower swing-gate with her cattle rope already set. She will
      not take over the player's signal line; her Albany authority is cattle-first.
    room: byre_mouth
    conditions:
      - { has_flag: june_pike_present }
      - { has_flag: strategy_drive_committed }
      - { has_flag: drive_flank_turned }
      - none_of:
          - { has_flag: drive_courier_wounded }
          - { has_flag: drive_cattle_lost }
          - { has_flag: drive_reserve_spent }
      - { not_flag: june_blood_condition_broken }
      - { not_flag: june_drive_cattle_line_taken }
    dialogue:
      root: june_drive_cattle_first
      nodes:
        - id: june_drive_cattle_first
          npc_text: >
            I take the lower swing-gate under your cattle-first authority, not command of
            your signals. I can hold the herd's rear. You still choose the front crisis
            cost: your shoulder, two cattle, or Albany's rig.
          effects:
            - set_flag: june_drive_cattle_line_taken
            - add_journal: "June takes the lower cattle gate under her authority. Her promise holds; your front crisis priority remains due."
          topics:
            - id: acknowledge
              aliases: [leave_june, take_cattle_line]
              prompt: "Acknowledge June's cattle line and choose the crisis priority."
              end: true

enemies:
  # The fair three-fight gauntlet (combat_guaranteed). Each available opening
  # MANEUVER replaces ordinary ATTACK; if its target survives, its authored shallow
  # `after` child is the required next beat. Only after that full line (or when no
  # opening was earned) can ATTACK be the fallback. Every beat is a real combat round:
  # the player deals d6 + effective attack -
  # wolf.defense (min 1), and the wolf, if it survives, deals d6 + wolf.attack -
  # effective player defense (min 1). Maneuver bonuses last for that round only;
  # the player always strikes first.
  #
  # Tuned so the fully-prepared hunter (best reachable stats: atk 7 from Cade's counsel,
  # def 5 from the byre-jerkin, hp 30) survives the WHOLE three-fight gauntlet on the
  # WORST rolls — the property combat_guaranteed promises. Complete authored lines are:
  #   - yearling (hp11/atk4/def2): set + drive costs 5.
  #   - flank-wolf (hp12/atk5/def2): funnel + pin 3; funnel + saved stake 7;
  #     off-side + return 9; recovered splinter guard + hook 4; loft drop + finish 5.
  #   - grey leader (hp13/atk6/def2): wait + true rush 4; close + drive 10;
  #     earned stake crossbrace + turn 2; saved split guard + finish 6.
  # The generic validator intentionally does not infer that the flags granting these
  # tactics correlate with the best stat ceilings. Its abstract no-lesson assignment
  # retains the standard leader cost, so the conservative static sum remains
  # 5 + 9 + 14 = 28 < 30. The concrete fully-prepared proof keeps the original six
  # flank/leader route costs at 12/18/18/24/13/19, leaving 18/12/12/6/17/11 HP.
  # The linked saved-stake route costs 5 + 7 + 2 = 14 on all-worst rolls and leaves
  # 16 HP. Saving a split guard through the loft costs 5 + 5 + 6 = 16 and leaves 14;
  # the maximum across every route therefore remains 24 damage.
  # BOTH persistent prep buffs remain load-bearing in concrete worst-roll play:
  # without Cade's attack, the riskiest full line costs 39; without the jerkin,
  # the riskiest costs exactly 30. The tactics therefore preserve Cade's honest
  # "both" promise instead of smuggling safety into a partially prepared route.
  # Skipping the prep makes it a real gamble: under base stats (atk5/def3) and worst
  # rolls the pack pulls the hunter down, so the death ending stays genuinely reachable
  # for the under-armed and unlucky — the guarantee covers only the BEST-prepared hunter
  # (bug_0114). All three wolves are telegraphed in the room prose (never an ambush,
  # bug_0123); a fall is save-recoverable (§8.7).
  - id: yearling_wolf
    name: "yearling wolf"
    description: "A young wolf in the broken paling, all hunger and no caution, hackles up and head low — the first of the pack through the gap."
    room: paling_gap
    conditions:
      - { not_flag: yearling_redirected }
      - { not_flag: drive_yearling_turned }
      - any_of:
          - { not_flag: strategy_lure_committed }
          - { has_flag: lure_trail_fouled }
      - { not_flag: drive_combat_withheld }
    hp: 11
    attack: 4
    defense: 2
    defeat_flag: yearling_down
    death_ending: ending_pulled_down
    # The first fight teaches the two-beat surface with a readable, forgiving set
    # and drive. Neither temporary bonus enters persistent stats or the score economy.
    maneuvers:
      - id: set_spear
        command: "set the Albany relief spear against the yearling's rush"
        conditions: [{ has_item: relief_spear }, { not_flag: strategy_lure_committed }]
        result_flag: yearling_spear_set
        attack_bonus: 2
        defense_bonus: 0
        narration: >
          The yearling bunches exactly as its low head promised. You stamp the
          Albany spear's butt into the trampled snow and let its hunger choose the
          line; when it commits, the iron point is already waiting in its rush.
      - id: drive_set_spear
        command: "drive the set spear through the yearling's committed rush"
        after: set_spear
        conditions: [{ has_item: relief_spear }, { not_flag: strategy_lure_committed }]
        result_flag: yearling_spear_driven
        attack_bonus: 0
        defense_bonus: 1
        narration: >
          The yearling's weight is still committed along the ash shaft. You step in
          behind the set butt, turn the first check into a driving second stroke, and
          keep the hide shoulder between its teeth and your hands.
    on_defeat:
      - add_journal: "You take the yearling on its rush as it commits, and it goes down in the snow of the breach. The byre runs on north."
      - set_flag: june_blood_condition_broken
      - inc_var: { name: score, by: 10 }
      # Milestone: the breach is held (quest the_watch). Progress-tracking only — the way
      # north still gates on the yearling_down FLAG, not on this stage; nothing changes.
      - set_quest_stage: { quest: the_watch, stage: breach_held }
  - id: flank_wolf
    name: "flank-wolf"
    description: "A rangy flank-wolf turned at the byre door, quicker and warier than the yearling, circling for your off side."
    room: byre_door
    conditions:
      - { not_flag: flank_redirected }
      - { not_flag: drive_flank_turned }
      - { not_flag: strategy_lure_committed }
      - { not_flag: drive_combat_withheld }
    hp: 12
    attack: 5
    defense: 2
    defeat_flag: flank_wolf_down
    death_ending: ending_pulled_down
    # The second fight cashes in environmental preparation, recovered failure, Cade's
    # attack lesson, Hayden's certified frost report, or an approach physically earned
    # through the fodder-loft. Each root retires the other roots; the funnel offers
    # reliable pin or riskier stake salvage. The split guard can be spent here, or a
    # loft/off-side line can carry it past this fight for the grey leader. Hayden's
    # high-variance brace line instead requires deliberately leaving that guard unbound.
    maneuvers:
      - id: funnel_thrust
        command: "hold the flank-wolf in the braced breach's funnel"
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { has_flag: breach_braced }
          - { none_of: [{ visited: fodder_loft }] }
        result_flag: flank_funneled
        attack_bonus: -1
        defense_bonus: 3
        narration: >
          You give the flank-wolf no open side at all. The wedged rail narrows its
          circle to one throat; you keep the Albany spear level and make it come
          through the braced funnel where teeth have no room to turn your guard.
      - id: pin_at_rail
        command: "pin the flank-wolf against the braced rail"
        after: funnel_thrust
        conditions: [{ has_item: relief_spear }, { not_flag: strategy_lure_committed }]
        result_flag: flank_pinned_at_rail
        attack_bonus: 1
        defense_bonus: 0
        narration: >
          The guarded thrust has spent the wolf's circle. You slide one hand down the
          ash shaft and drive again, pinning shoulder and hide against the wedged rail
          before it can turn out of the narrowed throat.
      - id: wrench_brace_stake
        command: "wrench the paling's brace-stake free behind the spear guard"
        after: funnel_thrust
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { not_item: saved_brace_stake }
        result_flag: flank_brace_stake_saved
        attack_bonus: 0
        defense_bonus: 2
        resource_effects:
          - add_item: saved_brace_stake
        narration: >
          Instead of spending the opening on the quick pin, you keep the spear square
          and wrench the paling's hardwood brace-stake free behind it. The stroke is
          less decisive now, but the portable cross-piece comes away in your hand for
          the heavier wolf waiting deeper in the byre.
      - id: offside_cut
        command: "wheel into the flank-wolf's off-side cut"
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { has_flag: heard_counsel }
          - { none_of: [{ visited: fodder_loft }] }
        result_flag: flank_offside_cut
        attack_bonus: 3
        defense_bonus: -3
        narration: >
          You show the flank-wolf the off side Cade warned it would seek, then
          wheel into the cut instead of away. The spear comes around hard and fast
          before its jaws can close, though the turn leaves your ribs exposed if
          the first stroke does not finish the work.
      - id: turn_through_return
        command: "turn through the flank-wolf's returning stroke"
        after: offside_cut
        conditions: [{ has_item: relief_spear }, { not_flag: strategy_lure_committed }]
        result_flag: flank_turned_through_return
        attack_bonus: 0
        defense_bonus: 1
        narration: >
          You do not stop at the first wheel. As the flank-wolf snaps back toward the
          offered side, you carry the spear through its return, recover the guard, and
          turn the rangy body across the threshold.
      - id: frost_brace_trip
        command: "trip Hayden's frost-jammed brace across the flank-wolf's turn"
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { has_flag: hayden_frost_report_certified }
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
          - { not_item: split_rail_guard }
          - { none_of: [{ visited: fodder_loft }] }
        result_flag: flank_frost_brace_tripped
        attack_bonus: 4
        defense_bonus: -2
        narration: >
          Hayden's report was right: frost lifts the sill, jamming the hanging brace on
          one iron dog. With the split rail left behind, your bare spear knocks it free.
          Timber falls across the wolf's turn and your point follows hard, but the violent
          opening leaves both hands exposed.
      - id: fallen_brace_drive
        command: "drive Hayden's fallen brace through the checked flank-wolf"
        after: frost_brace_trip
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { has_flag: hayden_frost_report_certified }
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
          - { not_item: split_rail_guard }
          - { none_of: [{ visited: fodder_loft }] }
        result_flag: flank_fallen_brace_driven
        attack_bonus: -1
        defense_bonus: 2
        narration: >
          The frost-jammed brace lies across the wolf's line. You shorten the bare spear,
          set its shaft behind the timber, and drive both forward. The cross-weight costs
          force but closes the turn while the point finishes Hayden's opening.
      - id: drop_from_loft
        command: "drive from the fodder-loft drop behind the flank-wolf"
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { visited: fodder_loft }
        result_flag: flank_dropped_from_loft
        attack_bonus: 2
        defense_bonus: 1
        narration: >
          The flank-wolf is still turning toward the paling when you land behind it.
          You spend the height at once, driving the Albany spear down the line of its
          shoulder before it can put the door-post back between you.
      - id: splinter_guard
        command: "catch the flank-wolf's turn on the bound splinter guard"
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { has_item: split_rail_guard }
          - { none_of: [{ visited: fodder_loft }] }
        result_flag: flank_splinter_guarded
        attack_bonus: 0
        defense_bonus: 2
        narration: >
          The open breach gives the flank-wolf room to turn, but the recovered rail
          travels with you. Its jaws strike the bound splinters instead of your ribs,
          and the rough cross-piece holds just long enough to make a line.
      - id: hook_over_guard
        command: "hook the spear over the breaking splinter guard"
        after: splinter_guard
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { has_item: split_rail_guard }
        result_flag: flank_hooked_over_guard
        attack_bonus: 0
        defense_bonus: 1
        resource_effects:
          - remove_item: split_rail_guard
        narration: >
          The rawhide binding starts to part under the wolf's weight. You hook the
          spear over the breaking guard and drive down its far side, turning a failed
          brace into one last controlled stroke before the cross-piece gives way.
    on_defeat:
      - add_journal: "You put the flank-wolf down across the byre threshold; the dark of the byre runs on north."
      - set_flag: june_blood_condition_broken
      - inc_var: { name: score, by: 10 }
      # Milestone: the threshold is held (quest the_watch). Progress-tracking only — the
      # way north still gates on the flank_wolf_down FLAG, not on this stage.
      - set_quest_stage: { quest: the_watch, stage: threshold_held }
  - id: grey_leader
    name: "grey leader"
    description: "The pack-leader deep in the byre: the old grey bitch, lean and scarred and unhurried, who has killed in byres before and waits for you to be careless."
    room: byre_mouth
    conditions:
      - { not_flag: leader_redirected }
      - { not_flag: drive_flank_turned }
      - { not_flag: strategy_lure_committed }
      - { not_flag: drive_combat_withheld }
    hp: 13
    attack: 6
    defense: 2
    defeat_flag: leader_down
    death_ending: ending_pulled_down
    # The leader cashes out Cade's two answers, the brace-stake earned at the door, or
    # a split guard deliberately carried past the flank-wolf by taking the loft/off-side
    # risk. Every carried guard is consumed on commitment, including an opening kill.
    # Only after an authored child can plain ATTACK return for an underpowered survivor.
    maneuvers:
      - id: crossbrace_saved_stake
        command: "set the saved brace-stake across the spear against the grey leader"
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { has_item: saved_brace_stake }
        result_flag: leader_stake_crossbraced
        attack_bonus: 0
        defense_bonus: 5
        narration: >
          You lay the saved paling-stake across the Albany spear and receive the old
          wolf behind that square hardwood guard. Her patient rush meets two joined
          lines instead of one; the crossbrace holds, but her weight commits it with her.
      - id: turn_over_crossbrace
        command: "turn the grey leader over the committed crossbrace"
        after: crossbrace_saved_stake
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { has_item: saved_brace_stake }
        result_flag: leader_turned_over_crossbrace
        attack_bonus: 1
        defense_bonus: 0
        resource_effects:
          - remove_item: saved_brace_stake
        narration: >
          With the grey leader's weight committed across the hardwood, you turn spear
          and stake together. The crossbrace levers her shoulder into the straw and
          splits under the finishing stroke; the saved piece is spent in the turn.
      - id: set_split_guard
        command: "set the saved split-rail guard across the grey leader's rush"
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { has_item: split_rail_guard }
        result_flag: leader_split_guard_set
        attack_bonus: 2
        defense_bonus: 1
        resource_effects:
          - remove_item: split_rail_guard
        narration: >
          You kept the bound split rail through the fight at the door for this heavier
          rush. Set across the spear, its ragged end catches the old wolf's shoulder
          while your point drives down the other side; rawhide parts under both weights.
      - id: wait_out_feint
        command: "hold the spear point and wait out the grey leader's feint"
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { has_flag: heard_plan }
        result_flag: leader_waited_out
        attack_bonus: 0
        defense_bonus: 3
        narration: >
          You refuse the grey leader's invitation to be careless. The spear point
          stays between you while her shoulders lie twice about the rush; only when
          the real weight comes do you answer, square behind the byre's narrow line.
      - id: take_true_rush
        command: "take the grey leader's true rush on the held spear"
        after: wait_out_feint
        conditions: [{ has_item: relief_spear }, { not_flag: strategy_lure_committed }]
        result_flag: leader_true_rush_taken
        attack_bonus: 1
        defense_bonus: 0
        narration: >
          The lie leaves her shoulders and the true rush finally comes. You keep the
          butt under your heel, take her weight on the line you refused to surrender,
          and answer through the instant when patience becomes commitment.
      - id: close_on_feint
        command: "close before the grey leader can finish her feint"
        conditions:
          - { has_item: relief_spear }
          - { not_flag: strategy_lure_committed }
          - { has_flag: heard_counsel }
        result_flag: leader_closed_on
        attack_bonus: 4
        defense_bonus: -3
        narration: >
          Cade said the old bitch would wait you out, so you deny her the wait.
          You close behind the Albany spear while she is still shaping the feint,
          driving for shoulder and throat with everything committed — a killing
          line if it lands, and no safe guard left if it does not.
      - id: drive_before_recovery
        command: "drive again before the grey leader can recover"
        after: close_on_feint
        conditions: [{ has_item: relief_spear }, { not_flag: strategy_lure_committed }]
        result_flag: leader_driven_before_recovery
        attack_bonus: 0
        defense_bonus: 1
        narration: >
          The first close has broken her shape but not the old wolf. You gather the
          spear under your hands and drive again before her feet can find the straw,
          taking back enough guard to survive the committed line.
    on_defeat:
      - add_journal: "The grey leader falls among the straw; beyond her the cattle stand unhurt."
      - set_flag: june_blood_condition_broken
      - inc_var: { name: score, by: 10 }
      # Milestone: the byre is held (quest the_watch) — the last of the three down. Progress
      # tracking only; the cattle-stand win still gates on the leader_down FLAG, not on this.
      - set_quest_stage: { quest: the_watch, stage: byre_held }

win_conditions:
  # Locomotion win, like the Beacon (visited: beacon_crown) and cold_forge (ember_chamber):
  # reaching the cattle — only possible once all three wolves are down (the chained exit
  # gates) — fires the win via the engine's post-action checkWin. SCORE_PEAKS_BEFORE_WIN
  # does not fire on a navigation win (bug_0116), and the +15 capstone is the accepted
  # denouement-step (sealed_crypt seed 29 / dawn_beacon).
  # Specific terminal consequences precede the generic mission result. All award the
  # same score and remain nondeath; their ids/titles let the overworld completion journal
  # remember whether saved wood barred the herd now or was carried into dawn for repair.
  - id: drive_evacuate_cattle_wounded
    conditions:
      - { visited: cattle_stand }
      - { has_flag: drive_courier_wounded }
      - { not_flag: yearling_down }
      - { not_flag: flank_wolf_down }
      - { not_flag: leader_down }
    ending: ending_drive_cattle_wounded
  - id: drive_evacuate_person_cattle_lost
    conditions:
      - { visited: cattle_stand }
      - { has_flag: drive_cattle_lost }
      - { not_flag: yearling_down }
      - { not_flag: flank_wolf_down }
      - { not_flag: leader_down }
    ending: ending_drive_person_cattle_lost
  - id: drive_evacuate_reserve_spent
    conditions:
      - { visited: cattle_stand }
      - { has_flag: drive_reserve_spent }
      - { not_flag: yearling_down }
      - { not_flag: flank_wolf_down }
      - { not_flag: leader_down }
    ending: ending_drive_reserve_spent
  - id: divert_pack_after_blood
    conditions:
      - { visited: cattle_stand }
      - { has_flag: pack_diverted }
      - { has_flag: yearling_down }
      - { has_flag: flank_redirected }
      - { has_flag: leader_redirected }
      - { not_flag: flank_wolf_down }
      - { not_flag: leader_down }
    ending: ending_pack_diverted_after_blood
  - id: divert_pack_cattle_scattered
    conditions:
      - { visited: cattle_stand }
      - { has_flag: pack_diverted }
      - { has_flag: yearling_redirected }
      - { has_flag: flank_redirected }
      - { has_flag: leader_redirected }
      - { not_flag: yearling_down }
      - { not_flag: flank_wolf_down }
      - { not_flag: leader_down }
      - { var_gte: { name: cattle_alarm, value: 4 } }
    ending: ending_pack_diverted_cattle_scattered
  - id: divert_pack_clean
    conditions:
      - { visited: cattle_stand }
      - { has_flag: pack_diverted }
      - { has_flag: yearling_redirected }
      - { has_flag: flank_redirected }
      - { has_flag: leader_redirected }
      - { not_flag: yearling_down }
      - { not_flag: flank_wolf_down }
      - { not_flag: leader_down }
      - { var_lte: { name: cattle_alarm, value: 3 } }
    ending: ending_pack_diverted
  - id: hold_the_byre_gate_barred_split_guard
    conditions: [{ visited: cattle_stand }, { has_flag: cattle_gate_barred_with_split_guard }]
    ending: ending_held_gate_barred
  - id: hold_the_byre_gate_barred_brace_stake
    conditions: [{ visited: cattle_stand }, { has_flag: cattle_gate_barred_with_brace_stake }]
    ending: ending_held_gate_barred
  - id: hold_the_byre_timber_saved_split_guard
    conditions: [{ visited: cattle_stand }, { has_item: split_rail_guard }]
    ending: ending_held_timber_saved
  - id: hold_the_byre_timber_saved_brace_stake
    conditions: [{ visited: cattle_stand }, { has_item: saved_brace_stake }]
    ending: ending_held_timber_saved
  - id: hold_the_byre
    conditions: [{ visited: cattle_stand }]
    ending: ending_held

endings:
  - id: ending_drive_cattle_wounded
    title: "The Herd Out, Rider Hurt"
    text: >
      Grey dawn: the whole herd is clear and all three wolves alive. You took the iron gate
      across your shoulder; Cade and every rider are clear. The bound wound persists. The
      outer steading defense line was abandoned. Albany receives people safe, whole cattle,
      an injured courier, and the spent rig for repair. *** You have won, wounded. ***
    variants:
      - when: [{ has_flag: june_drive_cattle_line_taken }]
        text: >
          Grey dawn: whole herd clear, all three wolves alive. June Pike independently held
          lower gate under cattle-first authority; you took the front iron across your
          shoulder. Cade and every rider are clear. Her promise holds; your wound and the
          abandoned outer steading line remain. Albany gets both accounts.
          *** You have won, wounded. ***
  - id: ending_drive_person_cattle_lost
    title: "The People Out, Cattle Lost"
    text: >
      Grey dawn finds Cade and every rider clear, and all three wolves alive. The human
      passage cost two cattle down the lower pasture. The spent rig returns, but the herd
      is not whole; the outer steading defense line was abandoned. Albany receives people
      saved and cattle lost. *** You have won, with loss. ***
    variants:
      - when: [{ has_flag: june_drive_cattle_line_taken }]
        text: >
          Grey dawn finds Cade, June Pike, every rider clear, and all three wolves alive.
          June held the lower gate under her authority, but your person-first line still
          lost two cattle below it. Her promise holds; the outer steading defense line was
          abandoned. Albany receives both accounts. *** You have won, with loss. ***
  - id: ending_drive_reserve_spent
    title: "The Steading Evacuated, Reserve Spent"
    text: >
      Grey dawn: people, whole herd, and all three wolves are clear. Cade's signal-and-rope
      rig does not return; its cut rope and housing became the final anchor. Cade and every
      rider are clear. The outer steading defense line was abandoned. Albany receives an
      unwounded courier and exact loss. *** You have won, at the reserve's cost. ***
    variants:
      - when: [{ has_flag: june_drive_cattle_line_taken }]
        text: >
          Grey dawn: people, whole herd, all three wolves alive. June Pike held the lower
          gate under cattle-first authority; you spent the rig. Cade and
          every rider are clear. Her promise holds; Albany's rig is gone and the outer
          steading defense line was abandoned. Albany gets both accounts.
          *** You have won, at the reserve's cost. ***
  - id: ending_pack_diverted_after_blood
    title: "The Pack Broken After Blood"
    text: >
      Grey dawn finds the yearling dead, but the flank-wolf and grey leader alive beyond
      the spent scent line. Two animals are still missing after the fouled opening broke
      the herd. The mixed strategy killed one wolf, saved two, and held most of Cade's
      cattle. Albany gets the full count.
      *** You have won, by a mixed line and with loss. ***
    variants:
      - when: [{ has_flag: june_pike_present }, { has_flag: june_blood_condition_broken }]
        text: >
          Grey dawn finds the yearling dead and the other two wolves alive beyond the
          scent line. First blood ended June Pike's field agreement before the inner
          rail; two cattle are missing, and her separate return names both the broken
          condition and the herd's cost. *** You have won, by a mixed line and with loss. ***
  - id: ending_pack_diverted_cattle_scattered
    title: "The Pack Diverted, Cattle Scattered"
    text: >
      Grey dawn finds every wolf alive and the byre standing, but the fouled first cast
      broke the herd before the leader left. Most cattle are safe; two animals are missing
      down the lower pasture. Cade counts the nonlethal victory and its cost. Albany
      receives both truths.
      *** You have won, with loss. ***
    variants:
      - when: [{ has_flag: june_cattle_line_taken }]
        text: >
          Grey dawn finds every wolf alive. June Pike refused the wolf line and took
          the lower rail, but the herd had already crossed its breaking point; two
          cattle remain missing. Her return supports the living victory without hiding
          its cost. *** You have won, with loss. ***
  - id: ending_pack_diverted
    title: "The Pack Diverted Alive"
    text: >
      Grey dawn finds the cattle whole and all three wolves alive in the high wood.
      Cade's finite winter feed is gone, spent across three committed downwind lines,
      but the herd never crossed its breaking threshold. Cade sees an empty byre, an
      unbloodied spear, and a difficult road Albany can truthfully call held.
      *** You have won. ***
    variants:
      - when: [{ has_flag: june_cattle_line_taken }]
        text: >
          Grey dawn finds every wolf alive and the herd whole. June Pike refused the
          old-grey line, took the lower rail under her cattle-first authority, and held
          the alarm below Breaking while you finished the scent. Albany receives two
          matching accounts. *** You have won. ***
  - id: ending_held_gate_barred
    title: "The Byre Held, Inner Gate Barred"
    text: >
      Grey dawn finds the cattle whole behind a barred inner gate. Wood carried through
      the fighting now holds one last line against the dark byre. Cade sees the choice at
      the slats; the pack is going, and the steading will see spring.
      *** You have won. ***
    variants:
      - when:
          - { has_flag: cattle_gate_barred_with_split_guard }
          - { has_flag: flank_dropped_from_loft }
          - { has_flag: leader_waited_out }
        text: >
          Grey dawn finds the cattle whole behind one last line. You crossed the
          fodder-loft, dropped behind the flank-wolf, then waited out old grey without
          spending the split guard. Now that failed rail bars the inner gate; Cade sees
          both roads in the wood. *** You have won. ***
      - when:
          - { has_flag: cattle_gate_barred_with_split_guard }
          - { has_flag: flank_dropped_from_loft }
          - { has_flag: leader_closed_on }
        text: >
          Grey dawn finds the cattle whole behind one last line. You crossed the
          fodder-loft, dropped behind the flank-wolf, then closed through old grey's feint
          without spending the split guard. Now that failed rail bars the inner gate;
          Cade sees both roads in the wood. *** You have won. ***
      - when:
          - { has_flag: cattle_gate_barred_with_split_guard }
          - { has_flag: leader_waited_out }
        text: >
          Grey dawn finds the cattle whole behind one last line. You waited out old grey,
          then spent the split-rail guard across the inner gate instead of on her. Rawhide
          and broken paling bar the dark byre; Cade sees a failed wedge made useful twice.
          *** You have won. ***
      - when:
          - { has_flag: cattle_gate_barred_with_split_guard }
          - { has_flag: leader_closed_on }
        text: >
          Grey dawn finds the cattle whole behind one last line. You closed through old
          grey's feint, keeping the split-rail guard clear of her teeth; now rawhide and
          broken paling bar the inner gate. Cade sees a failed wedge made useful twice.
          *** You have won. ***
      - when:
          - { has_flag: cattle_gate_barred_with_brace_stake }
          - { has_flag: leader_waited_out }
        text: >
          Grey dawn finds the cattle whole behind one last line. You waited out old grey
          and kept the brace-stake unbroken; now that sound hardwood locks the inner gate
          against the dark byre. Cade sees the choice standing square at the slats.
          *** You have won. ***
      - when:
          - { has_flag: cattle_gate_barred_with_brace_stake }
          - { has_flag: leader_closed_on }
        text: >
          Grey dawn finds the cattle whole behind one last line. You closed through old
          grey's feint and kept the brace-stake unbroken; now that sound hardwood locks the
          inner gate against the dark byre. Cade sees the choice standing square at the
          slats. *** You have won. ***
  - id: ending_held_timber_saved
    title: "The Byre Held, Paling Timber Saved"
    text: >
      Grey dawn finds the cattle whole, with sound paling wood still in your hands. You
      chose another line for old grey and carried this cross-piece through for daylight
      repair at the breach. Cade sees tomorrow's work already saved.
      *** You have won. ***
    variants:
      - when:
          - { has_item: split_rail_guard }
          - { has_flag: flank_dropped_from_loft }
          - { has_flag: leader_waited_out }
        text: >
          Grey dawn finds the cattle whole. You crossed the fodder-loft, dropped behind
          the flank-wolf, then waited out old grey; the split guard still rides across
          your spear for daylight paling repair. Cade sees the open hatch and unspent
          rawhide. *** You have won. ***
      - when:
          - { has_item: split_rail_guard }
          - { has_flag: flank_dropped_from_loft }
          - { has_flag: leader_closed_on }
        text: >
          Grey dawn finds the cattle whole. You crossed the fodder-loft, dropped behind
          the flank-wolf, then closed through old grey's feint; the split guard still
          rides across your spear for daylight paling repair. Cade sees the open hatch
          and unspent rawhide. *** You have won. ***
      - when:
          - { has_item: split_rail_guard }
          - { has_flag: leader_waited_out }
        text: >
          Grey dawn finds the cattle whole, and the bound split rail still rides across
          your spear. You waited out old grey without spending it, preserving a rough guard
          for daylight repair at the broken paling. Cade sees unspent rawhide and
          tomorrow's work. *** You have won. ***
      - when:
          - { has_item: split_rail_guard }
          - { has_flag: leader_closed_on }
        text: >
          Grey dawn finds the cattle whole, and the bound split rail still rides across
          your spear. You closed through old grey's feint without spending it, preserving
          a rough guard for daylight repair at the broken paling. Cade sees unspent rawhide
          and tomorrow's work. *** You have won. ***
      - when:
          - { has_item: saved_brace_stake }
          - { has_flag: leader_waited_out }
        text: >
          Grey dawn finds the cattle whole, and the brace-stake won at the door remains
          unbroken in your hand. You waited out old grey without spending it, preserving
          sound hardwood for daylight repair at the broken paling. Cade sees tomorrow's
          work already saved. *** You have won. ***
      - when:
          - { has_item: saved_brace_stake }
          - { has_flag: leader_closed_on }
        text: >
          Grey dawn finds the cattle whole, and the brace-stake won at the door remains
          unbroken in your hand. You closed through old grey's feint without spending it,
          preserving sound hardwood for daylight repair at the broken paling. Cade sees
          tomorrow's work already saved. *** You have won. ***
  - id: ending_held
    title: "The Byre Held"
    text: >
      Grey dawn finds you among warm, whole cattle; the broken pack is silent in the high
      wood. With only the spear, you held the line between wolves and winter. Cade sees
      you below and knows. The steading faces a hard spring, not its last.
      *** You have won. ***
    variants:
      - when: [{ has_flag: leader_split_guard_set }]
        text: >
          Grey dawn finds the cattle whole. At the door you chose an open stroke and kept
          the failed rail bound across your spear. At the back wall that saved guard
          caught the grey leader's heavier rush and spent itself under the spear. Cade
          sees where the rawhide went. *** You have won. ***
      - when:
          - { has_flag: flank_brace_stake_saved }
          - { has_flag: leader_turned_over_crossbrace }
        text: >
          Grey dawn finds the cattle whole. At the door you traded the quick pin for the
          paling's brace-stake; at the back wall you set that wood across the spear and
          turned the grey leader over it. Cade sees the empty brace and knows why it was
          spent. *** You have won. ***
      - when:
          - { has_flag: flank_pinned_at_rail }
          - { has_flag: leader_true_rush_taken }
        text: >
          Grey dawn finds you among the whole cattle. At the door the braced rail held
          the flank-wolf for your pinning thrust; at the back wall you let the old
          leader's patience break and took her true rush on the spear. The high-wood
          pack is silent and going. Below, Cade reads both guarded lines without being
          told. *** You have won. ***
      - when:
          - { has_flag: flank_pinned_at_rail }
          - { has_flag: leader_driven_before_recovery }
        text: >
          Grey dawn finds you among the whole cattle. The braced rail held the
          flank-wolf for your pinning thrust, while the old leader died under the second
          drive before she could recover from your close. The high-wood pack is silent
          and going. Below, Cade sees the guarded door and the bloodied spear and knows.
          *** You have won. ***
      - when:
          - { has_flag: flank_turned_through_return }
          - { has_flag: leader_true_rush_taken }
        text: >
          Grey dawn finds you among the whole cattle. You beat the flank-wolf by turning
          through its off-side return, then held still enough to take the old leader's
          true rush on the spear. The high-wood pack is silent and going; the byre is
          whole. Below, Cade leans on his stick and needs no telling. *** You have won. ***
      - when:
          - { has_flag: flank_turned_through_return }
          - { has_flag: leader_driven_before_recovery }
        text: >
          Grey dawn finds you among the whole cattle, both violent lines still running
          in your arms: the turn through the flank-wolf's return and the second drive
          before the old leader could recover. The high-wood pack is silent and going;
          the byre is whole. Below, Cade sees the spear and knows. *** You have won. ***
      - when:
          - { has_flag: flank_hooked_over_guard }
          - { has_flag: leader_true_rush_taken }
        text: >
          Grey dawn finds the cattle whole. The failed rail was not wasted: bound
          splinters caught the flank-wolf for your hook. Deeper in, you waited out the old
          leader and took her true rush on the held spear. Cade reads the rawhide. The
          byre is won. *** You have won. ***
      - when:
          - { has_flag: flank_hooked_over_guard }
          - { has_flag: leader_driven_before_recovery }
        text: >
          Grey dawn finds the cattle whole. The failed rail was not wasted: bound
          splinters caught the flank-wolf for your hook. Deeper in, you closed through the
          old leader's feint and drove before she recovered. Cade sees rawhide and blood.
          The byre is won. *** You have won. ***
      - when: [{ has_flag: leader_waited_out }]
        text: >
          Grey dawn warms the whole cattle. You won by the patient line: the old leader's
          feint spent itself against your held spear, and her true rush broke there. Her
          pack is silent in the high wood; the byre will see spring. Cade reads the guarded
          ending. *** You have won. ***
      - when: [{ has_flag: leader_closed_on }]
        text: >
          Grey dawn warms the whole cattle. You won by the close-on-feint line, denying
          the old leader the instant she needed and breaking her pack with her. The byre
          will see spring. Cade sees the bloodied spear and knows. *** You have won. ***
  - id: ending_pulled_down
    title: "Pulled Down"
    text: >
      The wolf's weight bears you down and the rest of the pack is on you before you can
      rise, and the byre goes to them and the cattle with it. Up at the dark house the
      family will wake to an opened byre and a hard, short spring. *** You have fallen. ***
    death: true
