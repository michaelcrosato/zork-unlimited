# The Wolf-Winter — a Stage 4 (Hero's-Quest) pack (spec §13, §14 gate).
#
# The game's FOURTH RPG pack, and the SECOND to set `meta.combat_guaranteed: true`
# (after The Dawn Beacon, bug_0187). Where the Beacon is a TWO-fight guaranteed
# gauntlet, this is a THREE-fight one — the first curated pack to stress the
# cumulative-HP gauntlet bound (`COMBAT_GAUNTLET_NOT_GUARANTEED`, bug_0172) across
# three sequential fights. The cumulative bound is the distinctive RPG guarantee
# surface: each fight can clear the per-fight upper bound alone yet the sequence
# still fell a prepared player on worst cumulative rolls, and a third fight makes
# that surface strictly harder to satisfy. Here BOTH prep buffs are load-bearing on
# the cumulative bound specifically — drop either and the gauntlet stops being
# jointly survivable while every single fight still passes in isolation (see the
# enemies block and tests/regression/wolf_winter_three_fight_gauntlet.test.ts).
#
# The fiction earns the mechanic the same way the Beacon does: not luck but skill
# and preparation decide the fights, so the promise can be honest. A killing winter
# has driven a wolf-pack down out of the high wood onto a lone steading, and three of
# them have come over the broken paling at the byre where the last of the cattle —
# the family's whole winter — are penned. You arrive as Albany's relief rider with the
# relief packet's ash spear already in hand; the old houndsman by the byre door can no
# longer hold a weapon himself. He has run wolves off this steading for forty winters and there is nothing
# about how a wolf comes in that he does not know; heed him (where the rush leaves the throat open,
# +2 attack) AND pull on the padded byre-jerkin from the store (a wolf's teeth ring off
# the layered hide, +2 defense) and he can make a true promise: "speared right and
# padded, lad, no wolf in that pack will pull you down." That promise is the
# combat_guaranteed flag spoken aloud, honest because the validator proves it — atk7,
# def5, hp30, the player's WORST rolls, and the three of them still cannot bring you
# down across the whole night. Skip the prep and it is a real gamble again: under-armed
# and unlucky the pack pulls you under the byre door (the death ending stays reachable),
# the guarantee covering only the BEST-prepared hunter, exactly as bug_0114 defines it.
#
#   steading_yard ─N─ byre_yard (houndsman; day-book +5)
#   (start)            │ W: store (padded byre-jerkin, +2 defense)
#                      │ N: paling_gap (the yearling wolf — FIGHT 1)
#                           │ N*: byre_door (the flank-wolf — FIGHT 2)
#                                │ N*: byre_mouth (the grey leader — FIGHT 3)
#                                     │ N*: cattle_stand (the pack breaks at dawn — WIN, +15)
#   (* each gated on the prior wolf being put down)
#
# Score (max 60): read the day-book the houndsman keeps (+5, the §17 clue that names the
# pack and points at the jerkin and his counsel), HEED old Cade's counsel (+5) and DON the
# byre-jerkin (+5) — the two load-bearing prep acts the day-book and Cade both press —, put
# down each of the three wolves (+10 each), and reach the cattle with the pack broken
# (+15 — the locomotion win, like cold_forge's ember chamber and the Beacon's crown). The
# perfect 60 coincides with reaching the safe cattle, never before; SCORE_PEAKS_BEFORE_WIN
# does not fire on a navigation win (bug_0116).
#
# bug_0239 — the prep acts now SCORE (+5 each), deliberately breaking from the 50-point
# milestone economy the other curated RPG packs share. A 2026-06-04 blind playtest found
# the prepared and reckless lines scored almost the same (50 vs 45 — only the day-book's
# +5 apart): preparation bought an HP cushion but almost no SCORE, so the diligence old
# Cade's promise sells, and the whole fiction of heeding-and-arming, carried no score
# signal. Tying +5 to each of the two prep flags (heard_counsel, jerkin_donned) aligns the
# score economy with the "do both" advice: the prepared hunter scores the full 60, the
# reckless rush still wins but tops out at 45 (a real 15-point diligence gap), and the
# bug_0114 fairness guarantee, the cumulative-gauntlet combat tuning, and the death ending
# are all BYTE-UNCHANGED (the awards add score only, never a stat or combat consequence).

meta:
  id: wolf_winter_v1
  title: "The Wolf-Winter"
  start_room: steading_yard
  vars_init: { hp: 30, attack: 5, defense: 3 }
  flags_init: []
  # The opt-in fairness promise (bug_0114). With this set the validator proves the
  # per-fight UPPER bound for every wolf AND the cumulative-HP bound across the whole
  # three-fight gauntlet (bug_0172): with the hunter's BEST reachable stats (init + the
  # houndsman's +2 attack + the byre-jerkin's +2 defense = atk7/def5/hp30) but the
  # WORST rolls, total damage across all three fights must stay below reachable HP.
  # The conservative validator still admits an abstract best-stat state with neither
  # lesson flag and therefore a standard leader line: 5 + 9 + 14 = 28 < 30. The
  # concrete runtime proof drives all six genuinely fully-prepared sequence pairs on
  # worst rolls; their maximum live damage is 24.
  # See the enemies block.
  # Base-stat play (no counsel, no jerkin) can still die.
  combat_guaranteed: true
  # The economy: 5 + 5 + 5 + 10 + 10 + 10 + 15 = 60 (bug_0239 — the two prep acts now
  # score +5 each; see the header). Each award rides a beat that fires ONCE (the read
  # retires on read_tally; the counsel on heard_counsel; the don on jerkin_donned; each
  # wolf dies once; the cattle is the game-ending win), so the score cannot be farmed and
  # the fully-prepared path reaches exactly 60 (rpg_score_economy_sound proves it).
  max_score: 60

rooms:
  - id: steading_yard
    name: "The Steading Yard"
    description: >
      The Albany winter-relief packet is no longer paper: the hill road has dropped you
      into the yard of a lone steading in the black of a killing winter night. The house
      is shuttered and dark behind you, and the Albany relief hunting-spear issued with the
      packet is already in your fist — the only spear ready on this hill tonight.
      Somewhere up the high wood a pack is singing, close and getting closer,
      and down here the cattle have begun to low and shove in their pen. The byre and
      its yard lie through the gate to the north.
    # The yard re-describes itself once visit history proves the player reached the byre.
    # This is reactive prose only — no synthetic watch flag or repeated on-enter event is
    # needed. A separate byre_held variant is unnecessary: the locomotion win still waits at
    # cattle_stand, so even a legal last backtrack has one task left at the byre — returning
    # north to the whole cattle.
    variants:
      - when: [{ visited: byre_yard }]
        text: >
          The steading yard, the Albany route tag tucked cold under your coat and the
          relief spear in your fist. The watch is taken up now, and whatever remains
          of the night must be settled at the byre. Its yard lies through the gate to
          the north.
    exits:
      - { direction: north, to: byre_yard }

  - id: byre_yard
    name: "The Byre-Yard"
    description: >
      The trampled yard before the cattle-byre. An old houndsman stands propped in the
      byre door with a lantern and a stick, too stiff in the hands to hold a spear but
      square in the doorway all the same. He has turned the lantern toward the weathered
      day-book on its nail by the jamb, as if the last wolf-count written there is worth
      reading before you leave the yard. The store-shed stands open to the west. North,
      past the broken paling, the byre runs back to where the cattle are penned — and the
      first of the wolves is already through the gap. The yard gate is back to the south.
    objects: [day_book]
    # Progress variants are ordered from the deepest completed fight back to the opening
    # clue state. Re-entering this hub must describe the wolves actually left alive; visit
    # history alone handles the steading-yard watch prose without emitting repeat state.
    variants:
      - when: [{ has_flag: leader_down }]
        text: >
          The trampled yard before the cattle-byre. Old Cade waits beside the day-book
          and open store-shed. North, all three wolves lie dead from broken paling to
          back wall; beyond the grey leader, the cattle stand whole. The yard gate is south.
      - when: [{ has_flag: flank_wolf_down }]
        text: >
          The trampled yard before the cattle-byre. Old Cade waits beside the day-book;
          the store-shed is west. North, the yearling lies dead at the broken paling and
          the flank-wolf across the byre threshold. The grey leader still waits deeper in.
          The yard gate is south.
      - when: [{ has_flag: yearling_down }]
        text: >
          The trampled yard before the cattle-byre. Old Cade waits beside the day-book;
          the store-shed is west. North, the yearling lies dead in the broken paling, but
          the flank-wolf holds the byre door and the grey leader waits deeper in. The yard
          gate is south.
      - when: [{ has_flag: read_tally }]
        text: >
          The trampled yard before the cattle-byre. Old Cade stands propped in the byre
          door with his lantern and stick, the weathered day-book open on the nail where
          you checked its last wolf-count. The store-shed stands open to the west. North,
          past the broken paling, the byre runs back to where the cattle are penned —
          and the first of the wolves is already through the gap. The yard gate is back
          to the south.
    exits:
      - { direction: south, to: steading_yard }
      - { direction: west, to: store }
      - { direction: north, to: paling_gap }

  - id: store
    name: "The Store-Shed"
    description: >
      A low store-shed off the byre-yard, hung with harness and winter gear. On a peg by
      the door hangs the steading's padded byre-jerkin — layered hide and stuffed wool,
      the thing the herders pull on to work the horns and hooves of frightened cattle. The
      byre-yard is back to the east.
    variants:
      - when: [{ has_item: byre_jerkin }, { none_of: [{ has_flag: jerkin_donned }] }]
        text: >
          A low store-shed off the byre-yard, hung with harness and winter gear. The peg
          by the door is bare where the steading's padded byre-jerkin hung before you took
          it down. It is in your hands, not yet on your back; drag it on before you go
          north, because carried hide will not turn teeth. The byre-yard is back to the
          east.
      - when: [{ has_flag: byre_jerkin_taken }]
        text: >
          A low store-shed off the byre-yard, hung with harness and winter gear. The peg
          by the door is bare where the steading's padded byre-jerkin hung before you took
          it down. The byre-yard is back to the east.
    objects: [byre_jerkin]
    exits:
      - { direction: east, to: byre_yard }

  - id: paling_gap
    name: "The Broken Paling"
    description: >
      The gap where the wolves have broken the paling-fence to come at the byre. A young
      wolf stands in the breach, all hunger and no caution, hackles up and head low — the
      first of the pack through, and between you and it there is nothing but a spear's
      length of trampled snow. Its shoulders bunch for the straight rush; the Albany
      spear can be set to make that impatience choose the first stroke. One stout rail
      of the broken paling has fallen clear into the snow at your feet, heavy and sound.
      The byre-yard is back to the south.
    objects: [paling_rail]
    # Reactive prose keeps the yearling follow-through and every rail state legible:
    # braced success, split-but-bindable failure, the carried recovered guard, and the
    # empty rail-bed after that guard breaks at the door. The north exit is UNCHANGED —
    # it still rides yearling_down alone. These choices affect later combat lines, never
    # locomotion or an ending.
    variants:
      - when: [{ has_flag: yearling_down }, { has_flag: breach_braced }]
        text: >
          The gap in the broken paling, the young wolf dead in the snow of it now and the
          fallen rail wedged hard across the breach — the gap half-shut, so whatever comes
          behind must come through it singly and slow, the way old Cade swore the byre would
          funnel them. The byre runs on north past the door; the byre-yard is back to the south.
      - when:
          - { has_flag: yearling_down }
          - { has_flag: split_rail_guard_made }
          - { has_flag: flank_wolf_down }
        text: >
          The broken paling: the young wolf lies dead and the rail-bed is empty. You
          carried the split lengths north as a bound guard, but they broke with the
          flank-wolf at the byre door; no guard remains. The byre runs north; the yard is south.
      - when:
          - { has_flag: yearling_down }
          - { has_item: split_rail_guard }
        text: >
          The gap in the broken paling, the young wolf dead in its snow and the split
          rail gone from the breach into the rough guard in your hands. It cannot funnel
          the next wolf, but it can meet the first turn at the byre door. The byre runs north.
      - when:
          - { has_flag: yearling_down }
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
        text: >
          The gap in the broken paling, the young wolf dead in its snow and the failed
          rail split where the frozen ground turned it. The breach cannot be funnelled,
          but the joined lengths can still be bound into a carried guard. Use the rail
          again before you go north to the byre door.
      - when: [{ has_flag: yearling_down }]
        text: >
          The gap in the broken paling, the young wolf dead in the snow of it now and the
          breach held. The byre runs on north past the door; the byre-yard is back to the
          south.
      - when: [{ has_flag: yearling_spear_driven }]
        text: >
          The yearling is alive but driven sideways against the broken paling by the
          second spear stroke. Its rush is spent and its shoulder is open; if it still
          stands, one last thrust will finish what the set spear began.
      - when: [{ has_flag: yearling_spear_set }, { has_flag: breach_braced }]
        text: >
          The gap is half-shut by the wedged rail, and the yearling recoils alive from
          the Albany spear you planted in its rush. Snow packs the spear-butt and the
          wolf cannot turn aside. Drive the set point through while its weight is still
          committed along the shaft.
      - when:
          - { has_flag: yearling_spear_set }
          - { has_item: split_rail_guard }
        text: >
          The yearling recoils alive from the Albany spear you set against its rush.
          The failed rail is bound across your spear now; drive the set point through
          this wolf, then carry that splinter guard to the byre door.
      - when:
          - { has_flag: yearling_spear_set }
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
        text: >
          The yearling recoils alive from the Albany spear you set against its rush.
          Beside it the rail lies split but joined: use it again to bind a carried guard,
          and drive the set spear through the wolf before its rush can gather again.
      - when: [{ has_flag: yearling_spear_set }]
        text: >
          The young wolf recoils alive in the breach, checked by the Albany spear you
          set against its first rush. Drive the set point through before it can gather
          a second rush; the byre-yard is back to the south.
      - when: [{ has_flag: breach_braced }]
        text: >
          The gap in the broken paling, the fallen rail wedged hard across it now and the
          breach half-shut. The young wolf still holds what is left of the gap, hackled and
          snarling, but it can only come at you singly and slow through the narrowed throat,
          the way old Cade swore the byre would funnel them. The byre-yard is back to the south.
      - when: [{ has_item: split_rail_guard }]
        text: >
          The young wolf still holds the broken paling. The rail did not brace the gap,
          but its joined lengths ride in your hands, lashed across the spear as a rough
          guard for the byre door. The yearling's low rush still wants the spear set against it.
      - when: [{ has_flag: rail_split }, { not_flag: split_rail_guard_made }]
        text: >
          The young wolf still holds the broken paling, and the rail you tried to set
          lies split but joined in the snow. There will be no guarded funnel, but use the
          rail again and you can bind a carried splinter guard for the byre door.
    exits:
      - { direction: south, to: byre_yard }
      - direction: north
        to: byre_door
        conditions: [{ has_flag: yearling_down }]
        locked_msg: "The young wolf holds the breach, hackled and snarling; you cannot pass it by while it stands."

  - id: byre_door
    name: "The Byre Door"
    description: >
      The mouth of the cattle-byre proper. A second wolf has slipped the breach and
      turned at the door to face you — a rangy flank-wolf, quicker and warier than the
      yearling, circling for your off side. Without a prepared line this is a plain
      spear fight. Behind it the byre runs back into the dark where the cattle stamp.
      The paling is back to the south.
    variants:
      - when: [{ has_flag: flank_wolf_down }, { has_flag: flank_pinned_at_rail }]
        text: >
          The flank-wolf lies pinned across the byre threshold where the braced funnel
          held it for the finishing thrust. The byre runs north into the dark; the
          wedged paling is back to the south.
      - when: [{ has_flag: flank_wolf_down }, { has_flag: flank_turned_through_return }]
        text: >
          The flank-wolf lies twisted across the byre threshold, beaten by the return
          stroke after your off-side wheel. The byre runs north into the dark; the
          paling is back to the south.
      - when: [{ has_flag: flank_wolf_down }, { has_flag: flank_hooked_over_guard }]
        text: >
          The flank-wolf lies across the byre threshold amid the splinters of the
          recovered rail guard. You hooked the spear over that breaking cross-piece
          and finished the turn. The byre runs north; the paling is south.
      - when: [{ has_flag: flank_wolf_down }]
        text: >
          The mouth of the cattle-byre, the flank-wolf down and still across the
          threshold. The byre runs back north into the dark; the paling is back to the south.
      - when: [{ has_flag: flank_pinned_at_rail }]
        text: >
          The flank-wolf is alive but pinned hard against the wedged rail by your second
          thrust. Its circle and guarded return are spent; if it still stands, its open
          shoulder wants one last thrust. The dark byre is north; the paling is south.
      - when: [{ has_flag: flank_hooked_over_guard }]
        text: >
          The flank-wolf is alive beyond the broken splinter guard, checked by the hook
          you drove over it. The rough cross-piece has done its work; finish what remains
          before going north. The paling is south.
      - when: [{ has_flag: flank_funneled }]
        text: >
          The flank-wolf is alive at the byre door but trapped on the guarded line
          you chose: the braced breach behind it denies the circle, and your spear
          point keeps it in the one narrow throat. Pin it at the rail now, while the
          first thrust still holds its shoulder.
      - when: [{ has_flag: flank_offside_cut }]
        text: >
          The flank-wolf is alive at the byre door, checked hard by the off-side cut
          you wheeled into. Turn through the returning stroke now, before its jaws close
          on the open guard.
      - when: [{ has_flag: flank_splinter_guarded }]
        text: >
          The flank-wolf is alive at the byre door with its first turn caught on the
          carried splinter guard. Hook the Albany spear over that cross-piece and drive
          through before the rawhide gives way.
      - when: [{ has_flag: breach_braced }, { has_flag: heard_counsel }]
        text: >
          The flank-wolf circles at the byre door. The braced breach can hold it in a
          guarded funnel, while Cade's off-side lesson offers a faster wheel into its
          cut at the cost of your guard. Choose the opening line; behind it the byre
          runs north.
      - when: [{ has_item: split_rail_guard }, { has_flag: heard_counsel }]
        text: >
          The flank-wolf circles at the byre door. You chose to bind the split rail
          across the spear, committing both hands to that rough guard rather than Cade's
          free off-side wheel. Catch its first turn on the splinters now. The byre is north.
      - when: [{ has_item: split_rail_guard }]
        text: >
          The flank-wolf circles at the byre door. The breach is still open, but the
          bound split-rail guard rides across your spear. Catch the first turn on those
          splinters and make a guarded line here. The paling is south.
      - when: [{ has_flag: breach_braced }]
        text: >
          The flank-wolf circles at the byre door, but the rail behind it has narrowed
          the field. Hold it in that guarded funnel with the Albany spear before the
          fight becomes a plain exchange. The paling is south; the dark byre is north.
      - when: [{ has_flag: heard_counsel }]
        text: >
          The flank-wolf circles for the off side Cade named. You can wheel into that
          cut for a fast opening and risk your guard before the fight settles into a
          plain spear exchange. The paling is south; the dark byre is north.
    exits:
      - { direction: south, to: paling_gap }
      - direction: north
        to: byre_mouth
        conditions: [{ has_flag: flank_wolf_down }]
        locked_msg: "The flank-wolf still holds the byre door; whatever line you chose must be finished before you can push north."

  - id: byre_mouth
    name: "Deep in the Byre"
    description: >
      The dark heart of the byre, the cattle crowded and bellowing at the far wall. Here
      the pack-leader has come to a stand between you and them — the old grey bitch that
      leads them, lean and scarred and wholly unhurried, who has killed in byres before
      and means to again. She does not rush. She waits for you to be careless. The door is
      back to the south.
    variants:
      - when: [{ has_flag: leader_down }, { has_flag: leader_true_rush_taken }]
        text: >
          The grey leader lies dead among the straw where her true rush finally met
          your held spear and its answering thrust. Beyond her the cattle stand whole;
          a last stride north reaches them. The door is south.
      - when: [{ has_flag: leader_down }, { has_flag: leader_driven_before_recovery }]
        text: >
          The grey leader lies dead among the straw, denied the instant she needed to
          recover from the feint you closed through. Beyond her the cattle stand whole;
          a last stride north reaches them. The door is south.
      - when: [{ has_flag: leader_down }]
        text: >
          The dark heart of the byre. The grey leader lies dead among the trampled straw,
          and beyond her the cattle have gone quiet, unhurt against the far wall. A last
          stride takes you north to stand among them. The door is back to the south.
      - when: [{ has_flag: leader_true_rush_taken }]
        text: >
          The grey leader is alive but committed past her true rush, checked by the
          answering spear stroke. Her patience and weight are spent; if she still
          stands, finish her before she finds another lie.
      - when: [{ has_flag: leader_waited_out }]
        text: >
          The grey leader is alive among the straw, but her patient lie has spent
          itself against the spear point you refused to move. Her true rush is coming
          now: take it on the held line and answer before she can recoil.
      - when: [{ has_flag: leader_closed_on }]
        text: >
          The grey leader is alive among the straw, driven back by the violent close
          you made before her feint was ready. Drive again before she can recover; the
          first commitment has not finished the line yet.
      - when: [{ has_flag: heard_plan }, { has_flag: heard_counsel }]
        text: >
          The grey leader waits between you and the cattle. Cade gave you two honest
          answers to that patience: hold the spear point and let her feint spend itself,
          or close before she can finish it and stake everything on the first stroke.
          Each opening demands its own answering thrust before the fight can settle.
          Choose the full line. The door is south.
      - when: [{ has_flag: heard_plan }]
        text: >
          The grey leader waits between you and the cattle. Cade's corridor plan says
          to hold the spear point, keep the square guard, and make her patience break;
          then take the true rush on that line. The door is south.
      - when: [{ has_flag: heard_counsel }]
        text: >
          The grey leader waits between you and the cattle. Cade's fighting lesson says
          to close before her feint is finished — a brutal opening that gives up the
          guard, then demands a second drive before she recovers.
          The door is south.
    exits:
      - { direction: south, to: byre_door }
      - direction: north
        to: cattle_stand
        conditions: [{ has_flag: leader_down }]
        locked_msg: "The grey leader still stands between you and the cattle; finish the tactical line before you try to pass her."

  - id: cattle_stand
    name: "Among the Cattle"
    description: >
      The penned end of the byre, the cattle warm and whole and pressing close around
      you. Beyond the broken paling the rest of the pack has heard the leader fall and
      gone silent in the high wood, and the first grey of dawn is coming up cold over the
      hill. The byre is held. The dark of the byre is back to the south.
    # The locomotion win (visited: cattle_stand), like the Beacon's crown and cold_forge's
    # ember chamber: the +15 capstone rides reaching the safe cattle with all three wolves
    # down (the chained exit gates), so the full 60 coincides with the byre being held,
    # never before. SCORE_PEAKS_BEFORE_WIN does not fire on a navigation win (bug_0116).
    on_enter:
      - add_journal: "The pack has broken and gone, and the cattle stand whole around you in the first grey light."
      - inc_var: { name: score, by: 15 }
    exits:
      - { direction: south, to: byre_mouth }

objects:
  # The Albany relief spear is real runtime gear, not prose-only equipment. Earlier
  # blind passes repeatedly opened INVENTORY after the yard said it was "already in
  # your fist" and found nothing, a small contradiction that weakened trust in every
  # later preparation choice. `held: true` puts it in the fresh inventory and also
  # makes it non-droppable: base attack 5 already includes the weapon, so this object
  # adds no permanent stat and leaves the combat-guarantee math unchanged. The three
  # enemies' opening maneuvers require it explicitly.
  - id: relief_spear
    name: "Albany relief spear"
    aliases: [spear, hunting-spear, hunting spear, relief spear, ash spear, ash-shafted spear]
    description: >
      The ash-shafted hunting-spear issued with Albany's winter-relief packet, its
      road-warden tag still tied below the head. It is already in your hands and is
      the weapon represented by your base attack — not another thing to find before
      the byre can be held.
    variants:
      - when: [{ has_flag: leader_true_rush_taken }]
        text: >
          The Albany relief spear, dark with straw and the grey leader's blood after
          you held through the feint and took her true rush on the answering point.
      - when: [{ has_flag: leader_driven_before_recovery }]
        text: >
          The Albany relief spear, dark with straw and the grey leader's blood after
          your close became a second drive before she could recover.
      - when:
          - any_of:
              - { has_flag: leader_waited_out }
              - { has_flag: leader_closed_on }
        text: >
          The Albany relief spear, dark with straw and the grey leader's blood now;
          its road-warden tag still holds below the head.
      - when: [{ has_flag: flank_pinned_at_rail }]
        text: >
          The Albany relief spear, scored where its second thrust pinned the flank-wolf
          against the braced rail and finished the guarded funnel.
      - when: [{ has_flag: flank_turned_through_return }]
        text: >
          The Albany relief spear, scored where your off-side cut turned through the
          returning stroke and carried the flank-wolf past you.
      - when: [{ has_flag: flank_hooked_over_guard }]
        text: >
          The Albany relief spear, rawhide still clinging below the head where you
          hooked it over the recovered splinter guard as that cross-piece broke.
      - when:
          - any_of:
              - { has_flag: flank_funneled }
              - { has_flag: flank_offside_cut }
        text: >
          The Albany relief spear, scored along the shaft where the flank-wolf met
          your chosen line at the byre door.
      - when: [{ has_flag: yearling_spear_driven }]
        text: >
          The Albany relief spear, its butt packed with paling-snow and its head marked
          by the second drive that followed the yearling's checked rush.
      - when: [{ has_flag: yearling_spear_set }]
        text: >
          The Albany relief spear, its butt packed with paling-snow where you set it
          against the yearling's first rush.
    held: true

  - id: day_book
    name: "day-book"
    aliases: [book, daybook, tally, log, journal, nail, notice]
    description: "The steading's day-book on its nail by the byre door, the last days' entries scrawled in the houndsman's hard hand."
    read_text: >
      The last entries read: 'SNOW TO THE EAVES, THE HIGH WOOD EMPTY OF DEER. THE PACK
      IS DOWN ON US — THREE BOLD ONES AT THE PALING, THE OLD GREY BITCH LEADING. THE
      HUNTER HAS HIS SPEAR ALREADY; WHAT HE LACKS IS THE KNACK OF IT AND A HIDE TO HIS
      BACK — SO MIND OLD CADE ON HOW A WOLF COMES IN, AND PULL ON THE BYRE-JERKIN FROM
      THE STORE. DO BOTH AND NO WOLF WILL PULL YOU DOWN; DO LESS AND YOU MAY HOLD THE BYRE
      YET, BUT YOU GAMBLE IT ON THE NIGHT'S LUCK. HOLD THE BYRE TILL DAWN. — the byre is the winter.'
    interactions:
      - verb: READ
        target: day_book
        conditions: [{ not_flag: read_tally }]
        effects:
          - set_flag: read_tally
          - inc_var: { name: score, by: 5 }

  - id: byre_jerkin
    name: "padded byre-jerkin"
    aliases: [jerkin, padding, jacket, hide, leathers, coat]
    description: "The steading's padded byre-jerkin — layered hide and stuffed wool, heavy and stiff, the kind of armour a wolf's teeth catch and tear at without ever reaching the man inside."
    # Reactive examine (bug_0023): once pulled on it is gear you wear, not a loose jerkin
    # on a peg to consider (its self-USE "don" interaction has retired behind jerkin_donned).
    variants:
      - when: [{ has_flag: jerkin_donned }]
        text: "The padded byre-jerkin, pulled on now over your own coat; its layered hide sits stiff and heavy between you and the next set of teeth."
      - when: [{ has_item: byre_jerkin }, { none_of: [{ has_flag: jerkin_donned }] }]
        text: "The padded byre-jerkin is bunched in your hands, layered hide still useless until you drag it on over your coat."
    takeable: true
    # Once Albany's rider claims this quest gear, it stays with him. In particular,
    # DROP must never let a donned jerkin leave inventory while its +2 defense and
    # `jerkin_donned` state remain active.
    droppable: false
    take_effects:
      - set_flag: byre_jerkin_taken
      - narrate: >
          You have the padded byre-jerkin in your hands, but not yet on your back.
          Drag it on before you go north; carried hide will not turn teeth.
    interactions:
      # Self-USE = "wear this thing" (cold_forge plate / dawn_beacon mail, bug_0074).
      # command_verb: don makes the offered and typed verb match the prose. One-shot
      # (gated none_of jerkin_donned) so the +2 cannot be farmed. The +2 defense is half
      # of the houndsman's promised safety; with his +2-attack counsel it is exactly what
      # carries the cumulative gauntlet bound GREEN for the fully-prepared hunter.
      - verb: USE
        item: byre_jerkin
        target: byre_jerkin
        command_verb: don
        conditions: [{ none_of: [{ has_flag: jerkin_donned }] }]
        effects:
          - set_flag: jerkin_donned
          - inc_var: { name: defense, by: 2 }
          # The diligence award (bug_0239): donning the jerkin is the other prep act the
          # day-book presses, so it scores +5. One-shot — gated behind jerkin_donned (the
          # don interaction retires once worn), so the +5 cannot be farmed.
          - inc_var: { name: score, by: 5 }
          - add_journal: "You haul the padded byre-jerkin on over your coat; stiff and heavy, but a wolf's teeth will catch in the hide and never reach you (+2 defense)."
          - narrate: "You drag the padded byre-jerkin on over your coat. It is stiff and weighs on the shoulders, but the layered hide sits steady between you and the next set of teeth — half of old Cade's promise, the padded half."

  # The one skill_check this pack carries — added so the RPG mode is uniform (every
  # curated RPG pack now has at least one §13 check). It is a defence skill check, the
  # breaking_weir tool-on-target shape: wedge a fallen paling-rail back across the breach
  # to shore the line. It remains OPTIONAL — no exit, win or ending turns on its flag —
  # but it is no longer decorative: success unlocks the guarded funnel sequence against
  # the flank-wolf. The frozen timber gives ONE honest wedge attempt. `rail_attempted` is
  # set before the d20 branch; failure sets `rail_split` and exposes a second, deterministic
  # target-only USE with the SAME stable `use_paling_rail` id. Binding the joined lengths
  # makes real, non-droppable `split_rail_guard` gear and a distinct recovered flank line;
  # it does not reroll or counterfeit the stronger braced-funnel success.
  #   - skill: defense (the only fitting reachable stat — vars_init.defense 3, +2 from the
  #     byre-jerkin = ceiling 5; shoring a defensive line is defence work, not the spear-arm).
  #   - difficulty 11: passable on a MID roll at BASE defence (d20 + 3 ≥ 11 needs a roll of
  #     8, ~65%) and easier once the jerkin is on (d20 + 5, roll of 6). Well under the
  #     SKILL_CHECK_IMPOSSIBLE ceiling 20 + 5 = 25, so the check always reads as winnable.
  #   - on_success: breach_braced + journal + narration, NO persistent stat or score change.
  #     The flag drives reactive prose and the flank-wolf's `funnel_thrust` maneuver, but no
  #     exit/win/ending. Temporary maneuver defense never changes the pack's stored stats.
  #   - on_failure: the rail splits. The guarded funnel is lost, but the explicitly
  #     signposted bind action salvages a weaker carried guard, turning a bad roll into a
  #     recoverable tactical branch rather than deleting the player's preparation.
  - id: paling_rail
    name: "fallen paling-rail"
    aliases: [rail, paling-rail, post, stake, timber, bar]
    description: "A stout length of the broken paling, splintered off at one end but seasoned and sound — the kind of heavy timber a man could wedge across a gap to half-shut it, so what comes through must come singly."
    # The rail is real scenery while loose, split, or wedged into the breach. Once the
    # split lengths become carried gear, the sticky made flag retires this world object;
    # the room text narrates the empty bed and later spent guard without leaving a stale
    # examine affordance behind.
    visible_when: [{ not_flag: split_rail_guard_made }]
    variants:
      - when: [{ has_flag: breach_braced }]
        name: "braced paling-rail"
        text: "The fallen paling-rail, wedged hard across the breach now and stamped home — the gap half-shut, so what comes through the paling must come singly and slow."
      - when: [{ has_flag: rail_split }, { not_flag: split_rail_guard_made }]
        name: "split paling-rail"
        text: >
          The paling-rail lies split at its splintered end where the frozen ground
          refused it. It cannot brace the gap, but the two joined lengths are still sound
          enough to bind across the spear as a splinter guard. Use the rail again to lash
          that recovery together before you go north.
    interactions:
      # Target-only USE: the rail is visible scenery already lying in the breach, so
      # "wedge rail" means lifting and setting it in place without a TAKE/drop cycle.
      # This prevents a wedged or split rail from being immediately re-taken into the
      # inventory. `rail_attempted` retires the wedge after either branch, while
      # breach_braced records success and unlocks the later funnel sequence.
      - verb: USE
        target: paling_rail
        command_verb: wedge
        conditions:
          - { not_flag: rail_attempted }
          - { not_flag: breach_braced }
        effects:
          - set_flag: rail_attempted
        skill_check:
          skill: defense
          difficulty: 11
          on_success:
            - set_flag: breach_braced
            - add_journal: "You wedge the fallen rail back across the breach and stamp it home; the gap is half-shut now, and what comes through must come singly and slow."
            - narrate: "You heft the rail and drive its splintered end down hard into the trampled snow, then lever the length of it up across the breach and set your shoulder to it till it bites. The gap is half-shut now — no wolf will come through it but singly, and none of them fast."
          on_failure:
            - set_flag: rail_split
            - add_journal: "The frozen ground turns the paling-rail and splits its old end. It cannot brace the breach, but the joined lengths can still be bound into a splinter guard; use the rail again before the byre door."
            - narrate: "You set the rail to the gap and bear down, but the frozen ground turns the splintered end aside with a crack. The timber splits without coming apart. The guarded funnel is lost, but the two joined lengths can still be lashed across the spear as a rough guard — use the rail again if you mean to salvage the line."
      # Recoverable failure: target-only again, therefore the stable action id remains
      # `use_paling_rail`. Mutually exclusive with the initial wedge and with itself.
      - verb: USE
        target: paling_rail
        command_verb: bind
        conditions:
          - { has_flag: rail_split }
          - { not_flag: split_rail_guard_made }
          - { not_item: split_rail_guard }
        effects:
          - add_item: split_rail_guard
          - set_flag: split_rail_guard_made
          - add_journal: "You bind the split paling lengths across the Albany spear into a rough cross-guard. It will not funnel the flank-wolf, but it can catch the first turn at the byre door."
          - narrate: "You tear a rawhide thong from the broken fence, overlap the split rail, and cinch both lengths across the Albany spear. The makeshift guard is shorter than the braced breach and must travel in your hands, but it gives the next wolf something wooden to bite before it reaches you."

  - id: split_rail_guard
    name: "bound split-rail guard"
    aliases: [split rail guard, splinter guard, bound rail, cross-guard, cross guard]
    description: >
      Two joined lengths of the failed paling-rail, bound across the Albany spear with
      rawhide. It cannot half-shut the breach, but it can catch and turn one flank-wolf
      rush at the byre door.
    # Real recovered gear, but never loose loot: the flank-wolf consumes it on defeat.
    droppable: false

npcs:
  - id: houndsman
    name: "old Cade the houndsman"
    description: >
      A bent old houndsman in a wolfskin cap, propped in the byre door with a lantern and
      a stick. Too stiff in the hands to hold a spear this winter, but clear-eyed and
      unafraid, and plainly glad Albany's relief rider has reached the door awake.
    room: byre_yard
    # Every npc_text is PURE SPOKEN words (the bug_0071 convention): the engine renders
    # `old Cade the houndsman: "<npc_text>"`. The counsel topic retires once told (gated
    # not_flag heard_counsel) so the +2 attack is one-shot; the ungated `leave` keeps the
    # root TERMINATING (a gated-only node would trip DIALOGUE_NONTERMINATING, bug_0014).
    # bug_0258 — cade_byre signposts the optional wedge before the player reaches
    # the paling. The rail is now visible target-only scenery, so the signpost names
    # the natural one-step act (heft and wedge it) rather than a take/use inventory
    # ceremony. Success creates the guarded flank-wolf opening; failure retires that
    # opening. No route or ending depends on it.
    dialogue:
      root: cade_root
      nodes:
        - id: cade_root
          npc_text: >
            You came up from Albany awake — good. I cannot hold the door myself this winter, these
            hands are done, but you can, and you must: the byre is the whole winter, lad,
            lose the cattle and we starve before spring. Three of them are through the
            paling already and the old grey bitch leads them. Ask, if you would — I have
            run wolves off this steading forty winters and there's little about them I
            don't know.
          variants:
            - when: [{ any_of: [{ has_flag: heard_counsel }, { has_flag: heard_plan }] }]
              text: >
                Ask what else you need, lad. The wolves will not wait on either of us.
          topics:
            - id: wolves
              aliases: [ask_wolves]
              prompt: "Ask how to fight the wolves and live."
              conditions: [{ not_flag: heard_counsel }]
              goto: cade_wolves
            - id: byre
              aliases: [ask_byre]
              prompt: "Ask how the byre is to be held."
              conditions: [{ not_flag: heard_plan }]
              goto: cade_byre
            - id: leave
              aliases: [leave_cade]
              prompt: "Leave old Cade and hold the byre."
              end: true
        - id: cade_wolves
          # The combat_guaranteed promise spoken aloud — and TRUE, because the validator
          # proves it for the fully-prepared hunter (jerkin + this counsel). It names BOTH
          # halves of the prep plainly, so the player who heeds it is the player the
          # guarantee covers.
          npc_text: >
            A wolf is all rush, lad — it comes in low and fast and throws its weight at
            you, and for that half-breath its throat and shoulder are wide open. Don't
            flinch back. Set the spear against the yearling's straight rush, then drive
            the point again while its weight is still on the shaft. The flank-wolf will
            try your off side: show it the cut, wheel into the opening, and turn through
            the return before its jaws close. But the grey bitch will hang back and shape
            a lie with her shoulders, so close before the feint is finished and drive
            again before she recovers if you mean to be quicker than she is. Do that,
            the way I've shown you, AND pull the
            padded jerkin on out of the store — both, mind, not one — and I'll give you
            a houndsman's word, not a hope: speared right and padded, no wolf in that
            pack will pull you down. Skip either and you're gambling the cattle on a
            bad night.
          effects:
            - set_flag: heard_counsel
            - inc_var: { name: attack, by: 2 }
            # The diligence award (bug_0239): heeding Cade is one of the two prep acts the
            # day-book presses, so it scores +5. One-shot — gated behind heard_counsel
            # (the topic retires once told), so the +5 cannot be farmed.
            - inc_var: { name: score, by: 5 }
            - add_journal: "Old Cade shows you three complete attacking lines: set then drive against the yearling's rush; wheel into the flank-wolf's off-side cut then turn through its return; close on the grey leader's feint then drive before she recovers. You feel you could strike truer now (+2 attack)."
          topics:
            - id: byre
              aliases: [ask_byre]
              prompt: "Ask next how the byre is to be held."
              conditions: [{ not_flag: heard_plan }]
              goto: cade_byre
            - id: wolves_back
              prompt: "Nod, and ask something else."
              goto: cade_root
            - id: leave
              aliases: [leave_cade]
              prompt: "Leave old Cade and hold the byre."
              end: true
        - id: cade_byre
          npc_text: >
            The byre's simple enough: there's the one way in, past the broken paling and
            up through the door to where the beasts are penned at the back, and the wolves
            must come at you one at a time down that throat — they can't flank you in a
            corridor. And mind the paling where they've broken through: one stout rail's
            fallen clear into the snow there. Heft it and wedge it back across the gap,
            stamp it home, and you'll half-shut the breach — the flank-wolf must enter a
            guarded funnel instead of finding your side. If the frozen ground splits the
            end, don't throw the lesson away: bind the joined lengths across your spear
            and carry that rough guard to the door. At the back wall, don't chase the
            grey bitch's first lie; hold the spear point, make her patience break, then
            take her true rush on the line you kept.
            So work forward, paling to door to the cattle. Put down the three that are in
            and the rest of the pack loses its nerve and goes. That's the whole of it.
          effects:
            - set_flag: heard_plan
            - add_journal: "Old Cade says to work the byre's one corridor from paling to back wall. Wedge the fallen rail for a guarded flank-wolf funnel; if it splits, bind the joined lengths across the spear and carry the recovered guard. At the grey leader, wait out the feint and take her true rush on the held line."
          topics:
            - id: wolves
              aliases: [ask_wolves]
              prompt: "Ask next how to fight the wolves and live."
              conditions: [{ not_flag: heard_counsel }]
              goto: cade_wolves
            - id: byre_back
              prompt: "Thank him, and ask something else."
              goto: cade_root
            - id: leave
              aliases: [leave_cade]
              prompt: "Leave old Cade and hold the byre."
              end: true

enemies:
  # The fair three-fight gauntlet (combat_guaranteed). Each available opening
  # MANEUVER replaces ordinary ATTACK; if its target survives, its authored shallow
  # `after` child is the required next beat. Only after that full line (or when no
  # opening was earned) can ATTACK be the fallback. Every beat is a real combat round:
  # the player deals d6 + effective attack -
  # wolf.defense (min 1), and the wolf, if it survives, deals d6 + wolf.attack -
  # effective player defense (min 1). Maneuver bonuses last for that round only;
  # the player always strikes first.
  #
  # Tuned so the fully-prepared hunter (best reachable stats: atk 7 from Cade's counsel,
  # def 5 from the byre-jerkin, hp 30) survives the WHOLE three-fight gauntlet on the
  # WORST rolls — the property combat_guaranteed promises. Complete authored lines are:
  #   - yearling (hp11/atk4/def2): set + drive costs 5.
  #   - flank-wolf (hp12/atk5/def2): funnel + pin 3; off-side + return 9;
  #     recovered splinter guard + hook 4.
  #   - grey leader (hp13/atk6/def2): wait + true rush 4; close + drive 10.
  # The generic validator intentionally does not infer that the flags granting these
  # tactics correlate with the best stat ceilings. Its abstract no-lesson assignment
  # retains the standard leader cost, so the conservative static sum remains
  # 5 + 9 + 14 = 28 < 30. The concrete fully-prepared proof drives all six
  # flank/leader route pairs: total costs 12/18/18/24/13/19, leaving
  # 18/12/12/6/17/11 HP.
  # BOTH persistent prep buffs remain load-bearing in concrete worst-roll play:
  # without Cade's attack, the riskiest full line costs 39; without the jerkin,
  # the riskiest costs exactly 30. The tactics therefore preserve Cade's honest
  # "both" promise instead of smuggling safety into a partially prepared route.
  # Skipping the prep makes it a real gamble: under base stats (atk5/def3) and worst
  # rolls the pack pulls the hunter down, so the death ending stays genuinely reachable
  # for the under-armed and unlucky — the guarantee covers only the BEST-prepared hunter
  # (bug_0114). All three wolves are telegraphed in the room prose (never an ambush,
  # bug_0123); a fall is save-recoverable (§8.7).
  - id: yearling_wolf
    name: "yearling wolf"
    description: "A young wolf in the broken paling, all hunger and no caution, hackles up and head low — the first of the pack through the gap."
    room: paling_gap
    hp: 11
    attack: 4
    defense: 2
    defeat_flag: yearling_down
    death_ending: ending_pulled_down
    # The first fight teaches the two-beat surface with a readable, forgiving set
    # and drive. Neither temporary bonus enters persistent stats or the score economy.
    maneuvers:
      - id: set_spear
        command: "set the Albany relief spear against the yearling's rush"
        conditions: [{ has_item: relief_spear }]
        result_flag: yearling_spear_set
        attack_bonus: 2
        defense_bonus: 0
        narration: >
          The yearling bunches exactly as its low head promised. You stamp the
          Albany spear's butt into the trampled snow and let its hunger choose the
          line; when it commits, the iron point is already waiting in its rush.
      - id: drive_set_spear
        command: "drive the set spear through the yearling's committed rush"
        after: set_spear
        conditions: [{ has_item: relief_spear }]
        result_flag: yearling_spear_driven
        attack_bonus: 0
        defense_bonus: 1
        narration: >
          The yearling's weight is still committed along the ash shaft. You step in
          behind the set butt, turn the first check into a driving second stroke, and
          keep the hide shoulder between its teeth and your hands.
    on_defeat:
      - add_journal: "You take the yearling on its rush as it commits, and it goes down in the snow of the breach. The byre runs on north."
      - inc_var: { name: score, by: 10 }
      # Milestone: the breach is held (quest the_watch). Progress-tracking only — the way
      # north still gates on the yearling_down FLAG, not on this stage; nothing changes.
      - set_quest_stage: { quest: the_watch, stage: breach_held }
  - id: flank_wolf
    name: "flank-wolf"
    description: "A rangy flank-wolf turned at the byre door, quicker and warier than the yearling, circling for your off side."
    room: byre_door
    hp: 12
    attack: 5
    defense: 2
    defeat_flag: flank_wolf_down
    death_ending: ending_pulled_down
    # The second fight cashes in environmental preparation, recovered failure, or
    # Cade's attack lesson. Each root opens one required next stroke and retires the
    # other roots: funnel -> pin, off-side -> return, splinter guard -> hook.
    maneuvers:
      - id: funnel_thrust
        command: "hold the flank-wolf in the braced breach's funnel"
        conditions:
          - { has_item: relief_spear }
          - { has_flag: breach_braced }
        result_flag: flank_funneled
        attack_bonus: -1
        defense_bonus: 3
        narration: >
          You give the flank-wolf no open side at all. The wedged rail narrows its
          circle to one throat; you keep the Albany spear level and make it come
          through the braced funnel where teeth have no room to turn your guard.
      - id: pin_at_rail
        command: "pin the flank-wolf against the braced rail"
        after: funnel_thrust
        conditions: [{ has_item: relief_spear }]
        result_flag: flank_pinned_at_rail
        attack_bonus: 1
        defense_bonus: 0
        narration: >
          The guarded thrust has spent the wolf's circle. You slide one hand down the
          ash shaft and drive again, pinning shoulder and hide against the wedged rail
          before it can turn out of the narrowed throat.
      - id: offside_cut
        command: "wheel into the flank-wolf's off-side cut"
        conditions:
          - { has_item: relief_spear }
          - { has_flag: heard_counsel }
          - { not_item: split_rail_guard }
        result_flag: flank_offside_cut
        attack_bonus: 3
        defense_bonus: -3
        narration: >
          You show the flank-wolf the off side Cade warned it would seek, then
          wheel into the cut instead of away. The spear comes around hard and fast
          before its jaws can close, though the turn leaves your ribs exposed if
          the first stroke does not finish the work.
      - id: turn_through_return
        command: "turn through the flank-wolf's returning stroke"
        after: offside_cut
        conditions: [{ has_item: relief_spear }]
        result_flag: flank_turned_through_return
        attack_bonus: 0
        defense_bonus: 1
        narration: >
          You do not stop at the first wheel. As the flank-wolf snaps back toward the
          offered side, you carry the spear through its return, recover the guard, and
          turn the rangy body across the threshold.
      - id: splinter_guard
        command: "catch the flank-wolf's turn on the bound splinter guard"
        conditions:
          - { has_item: relief_spear }
          - { has_item: split_rail_guard }
        result_flag: flank_splinter_guarded
        attack_bonus: 0
        defense_bonus: 2
        narration: >
          The open breach gives the flank-wolf room to turn, but the recovered rail
          travels with you. Its jaws strike the bound splinters instead of your ribs,
          and the rough cross-piece holds just long enough to make a line.
      - id: hook_over_guard
        command: "hook the spear over the breaking splinter guard"
        after: splinter_guard
        conditions:
          - { has_item: relief_spear }
          - { has_item: split_rail_guard }
        result_flag: flank_hooked_over_guard
        attack_bonus: 0
        defense_bonus: 1
        narration: >
          The rawhide binding starts to part under the wolf's weight. You hook the
          spear over the breaking guard and drive down its far side, turning a failed
          brace into one last controlled stroke before the cross-piece gives way.
    on_defeat:
      - add_journal: "You put the flank-wolf down across the byre threshold; the dark of the byre runs on north."
      - remove_item: split_rail_guard
      - inc_var: { name: score, by: 10 }
      # Milestone: the threshold is held (quest the_watch). Progress-tracking only — the
      # way north still gates on the flank_wolf_down FLAG, not on this stage.
      - set_quest_stage: { quest: the_watch, stage: threshold_held }
  - id: grey_leader
    name: "grey leader"
    description: "The pack-leader deep in the byre: the old grey bitch, lean and scarred and unhurried, who has killed in byres before and waits for you to be careless."
    room: byre_mouth
    hp: 13
    attack: 6
    defense: 2
    defeat_flag: leader_down
    death_ending: ending_pulled_down
    # The leader cashes out Cade's two complete answers. The patient opening must
    # take the true rush; the violent close must drive before recovery. Only after
    # the authored child can plain ATTACK return for an underpowered survivor.
    maneuvers:
      - id: wait_out_feint
        command: "hold the spear point and wait out the grey leader's feint"
        conditions:
          - { has_item: relief_spear }
          - { has_flag: heard_plan }
        result_flag: leader_waited_out
        attack_bonus: 0
        defense_bonus: 3
        narration: >
          You refuse the grey leader's invitation to be careless. The spear point
          stays between you while her shoulders lie twice about the rush; only when
          the real weight comes do you answer, square behind the byre's narrow line.
      - id: take_true_rush
        command: "take the grey leader's true rush on the held spear"
        after: wait_out_feint
        conditions: [{ has_item: relief_spear }]
        result_flag: leader_true_rush_taken
        attack_bonus: 1
        defense_bonus: 0
        narration: >
          The lie leaves her shoulders and the true rush finally comes. You keep the
          butt under your heel, take her weight on the line you refused to surrender,
          and answer through the instant when patience becomes commitment.
      - id: close_on_feint
        command: "close before the grey leader can finish her feint"
        conditions:
          - { has_item: relief_spear }
          - { has_flag: heard_counsel }
        result_flag: leader_closed_on
        attack_bonus: 4
        defense_bonus: -3
        narration: >
          Cade said the old bitch would wait you out, so you deny her the wait.
          You close behind the Albany spear while she is still shaping the feint,
          driving for shoulder and throat with everything committed — a killing
          line if it lands, and no safe guard left if it does not.
      - id: drive_before_recovery
        command: "drive again before the grey leader can recover"
        after: close_on_feint
        conditions: [{ has_item: relief_spear }]
        result_flag: leader_driven_before_recovery
        attack_bonus: 0
        defense_bonus: 1
        narration: >
          The first close has broken her shape but not the old wolf. You gather the
          spear under your hands and drive again before her feet can find the straw,
          taking back enough guard to survive the committed line.
    on_defeat:
      - add_journal: "The grey leader falls among the straw; beyond her the cattle stand unhurt."
      - inc_var: { name: score, by: 10 }
      # Milestone: the byre is held (quest the_watch) — the last of the three down. Progress
      # tracking only; the cattle-stand win still gates on the leader_down FLAG, not on this.
      - set_quest_stage: { quest: the_watch, stage: byre_held }

win_conditions:
  # Locomotion win, like the Beacon (visited: beacon_crown) and cold_forge (ember_chamber):
  # reaching the cattle — only possible once all three wolves are down (the chained exit
  # gates) — fires the win via the engine's post-action checkWin. SCORE_PEAKS_BEFORE_WIN
  # does not fire on a navigation win (bug_0116), and the +15 capstone is the accepted
  # denouement-step (sealed_crypt seed 29 / dawn_beacon).
  - id: hold_the_byre
    conditions: [{ visited: cattle_stand }]
    ending: ending_held

endings:
  - id: ending_held
    title: "The Byre Held"
    text: >
      You stand among the warm and breathing cattle as the grey dawn comes up cold over
      the hill, and out in the high wood the broken pack is silent and going. The byre is
      whole; the winter, that meant to take the steading one cow at a time and then the
      lot of you, will be only a hard one now and not a last one. Old Cade is in the
      byre-yard below, leaning on his stick, and he does not need to be told. *** You have won. ***
    variants:
      - when:
          - { has_flag: flank_pinned_at_rail }
          - { has_flag: leader_true_rush_taken }
        text: >
          Grey dawn finds you among the whole cattle. At the door the braced rail held
          the flank-wolf for your pinning thrust; at the back wall you let the old
          leader's patience break and took her true rush on the spear. The high-wood
          pack is silent and going. Below, Cade reads both guarded lines without being
          told. *** You have won. ***
      - when:
          - { has_flag: flank_pinned_at_rail }
          - { has_flag: leader_driven_before_recovery }
        text: >
          Grey dawn finds you among the whole cattle. The braced rail held the
          flank-wolf for your pinning thrust, while the old leader died under the second
          drive before she could recover from your close. The high-wood pack is silent
          and going. Below, Cade sees the guarded door and the bloodied spear and knows.
          *** You have won. ***
      - when:
          - { has_flag: flank_turned_through_return }
          - { has_flag: leader_true_rush_taken }
        text: >
          Grey dawn finds you among the whole cattle. You beat the flank-wolf by turning
          through its off-side return, then held still enough to take the old leader's
          true rush on the spear. The high-wood pack is silent and going; the byre is
          whole. Below, Cade leans on his stick and needs no telling. *** You have won. ***
      - when:
          - { has_flag: flank_turned_through_return }
          - { has_flag: leader_driven_before_recovery }
        text: >
          Grey dawn finds you among the whole cattle, both violent lines still running
          in your arms: the turn through the flank-wolf's return and the second drive
          before the old leader could recover. The high-wood pack is silent and going;
          the byre is whole. Below, Cade sees the spear and knows. *** You have won. ***
      - when:
          - { has_flag: flank_hooked_over_guard }
          - { has_flag: leader_true_rush_taken }
        text: >
          Grey dawn finds you among the whole cattle. The failed rail was not wasted:
          its bound splinters caught the flank-wolf long enough for your hooking stroke.
          Deeper in, the old leader's patience broke on the true rush you held to meet.
          The high-wood pack is silent and going. Below, Cade reads the salvaged night
          in the rawhide still clinging to the spear. *** You have won. ***
      - when:
          - { has_flag: flank_hooked_over_guard }
          - { has_flag: leader_driven_before_recovery }
        text: >
          Grey dawn finds you among the whole cattle. The failed rail became one good
          splinter guard and a hooking stroke at the door; the old leader gave you no
          such shelter, so you drove again before she recovered from the close. The
          high-wood pack is silent and going. Below, Cade sees rawhide and blood on the
          spear and knows how the byre was held. *** You have won. ***
      - when: [{ has_flag: leader_waited_out }]
        text: >
          You stand among the warm and breathing cattle as grey dawn comes up over
          the hill. The old leader's patience broke against the spear point you held;
          out in the high wood her pack is silent and going. The byre is whole, and
          this will be a hard winter rather than the steading's last. Below, old Cade
          leans on his stick and reads the guarded ending without being told. *** You have won. ***
      - when: [{ has_flag: leader_closed_on }]
        text: >
          You stand among the warm and breathing cattle as grey dawn comes up over
          the hill, the violence of your close on the old leader still running in
          your arms. You denied her the feint and the high-wood pack broke with her;
          the byre is whole, and this will be a hard winter rather than the steading's
          last. Below, old Cade sees the spear and knows. *** You have won. ***
  - id: ending_pulled_down
    title: "Pulled Down"
    text: >
      The wolf's weight bears you down and the rest of the pack is on you before you can
      rise, and the byre goes to them and the cattle with it. Up at the dark house the
      family will wake to an opened byre and a hard, short spring. *** You have fallen. ***
    death: true
