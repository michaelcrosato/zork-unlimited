# The Falconer's Ransom — a Stage 4 (Hero's-Quest) pack (spec §13).
#
# The game's EIGHTH RPG pack — and the FIRST to introduce `cunning`, a social/
# psychological stat measuring quick thinking, misdirection, and the ability to
# spring a trap on a deceiver in the moment he least expects it. No prior RPG pack
# uses an improvisational-deception stat: the seven predecessors use physical or craft
# vars (might, craft, nerve, tracking, lore) or formal institutional command (authority).
# Cunning is different from authority: authority makes a formal argument carry weight
# in front of a witness; cunning makes a deception collapse from the inside by turning
# the deceiver's own method against him, faster than he can adjust.
#
# A guest of the manor, one Aldric of Haverstock, claims your trained hunting tiercel
# "strayed into his mews" three days ago while you were on the hunt and he is nursing
# it at his expense — implying a recovery fee. The bird is yours by the jesses' mark,
# and Aldric has a forged bill of sale ready to produce if pressed. Your task: recover
# the falcon without paying a thief's toll.
#
# TWO RESOLUTION PATHS (second in the RPG corpus after factors_mark):
#   CUNNING (primary, full score): read the jesses (+5, confirms ownership), take and
#   read the gate log (+10, +3 cunning: Aldric's entry has no mews equipment — he could
#   not have housed a falcon for three days), take and read the hidden bill (+10, +3
#   cunning: the forged guild seal has been applied to dry wax, not fresh — it was made
#   for this document after the fact). Then USE hidden_bill ON falcon_jesses in the
#   hawk_yard — cunning DC 12. Success: Aldric shamed and Thorn steps aside; road open.
#   COMBAT (fallback, partial score): skip the evidence or fail the check — Thorn must
#   be fought in the stable_yard to leave. Combat path caps at 40/50.
#
#   hawk_yard (start; Aldric NPC; falcon_jesses +5)
#   │  E → guest_chambers (hidden_bill: +10 read, +3 cunning)
#   │  W → gate_lodge (gate_log: +10 read, +3 cunning)
#   │  N → stable_yard (Thorn enemy; N gated on aldric_shamed OR thorn_defeated)
#   └─────── stable_yard: N (aldric_shamed OR thorn_defeated) → manor_road (WIN +15)
#
# Score (max 50, the 5+10+10+10+15 shape):
#   +5  READ falcon_jesses     — your mark on both cuffs (one-shot: not_flag jesses_read)
#   +10 READ gate_log          — no mews equipment entered (+3 cunning; one-shot: not_flag log_read)
#   +10 READ hidden_bill       — forged guild seal (+3 cunning; one-shot: not_flag bill_read)
#   +10 cunning check success  — USE hidden_bill ON falcon_jesses, DC 12 (retires only on success)
#   +15 manor_road on_enter    — WIN (locomotion win, coincides with game end)
#   Thorn on_defeat: +0        — combat path is valid but sub-optimal; brute-force is its own cost.
#
# Combat death check (no combat_guaranteed):
#   Player base hp 20 / atk 4 / def 2. Thorn hp 12 / atk 5 / def 2.
#   Worst player dmg per round: 1+4-2 = 3. Rounds to kill Thorn: ceil(12/3) = 4.
#   Worst Thorn dmg per round: 6+5-2 = 9. Total over 3 rounds (before kill): 27.
#   27 > 20 HP — Thorn CAN kill on worst dice. ending_held (death) is reachable.
#   No combat_guaranteed flag — the pack's honest survival path is cunning, not combat prep.
#   Thorn telegraphed in hawk_yard description and Aldric's dialogue (bug_0123: never an ambush).

meta:
  id: falconers_ransom_v1
  title: "The Falconer's Ransom"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Hawk Yard"
    quest: "recover the stolen falcon without losing the manor"
    role: "falconer's agent"
    connection: "The hawk yard supplies Charterhaven nobles, turning a forged bill of sale into a public ransom."
  start_room: hawk_yard
  # `cunning` (3 base): quick thinking, misdirection, reading deception, and the
  # ability to spring a trap on a trickster before he can adjust. New to the corpus —
  # no prior RPG pack uses a psychological/improvisational stat. Used in the confrontation
  # skill_check (USE hidden_bill ON falcon_jesses, DC 12): base 3 → d20>=10 (55% gamble);
  # with gate_log (+3) → cunning 6, d20>=7 (70%); with both preps → cunning 9, d20>=4
  # (~85% near-certain). Cunning does NOT boost combat stats — it is the wrong tool for a fight.
  vars_init: { hp: 20, attack: 4, defense: 2, cunning: 3 }
  flags_init: []
  # No combat_guaranteed: Thorn on worst dice kills a base-stat player (27 > 20 HP).
  # The pack's answer to the combat threat is to take the cunning path, not to buff for
  # the fight. See the enemies block for the math.
  max_score: 50

rooms:
  - id: hawk_yard
    name: "The Hawk-Yard"
    description: >
      The manor's hawk-yard: a close stone court between the mews-building and the
      stables, the air carrying the sharp mix of bird and hay that means a working
      mews. Your trained tiercel sits hooded on the block at the centre of the yard,
      the leather jesses on his legs still bearing the marks you put there. Aldric
      of Haverstock stands near the block with the patient stillness of a man who
      has arranged to be found exactly here. Guest chambers open to the east; the gate
      lodge stands to the west; the stable yard lies through the arch to the north.
      Thorn — Aldric's hired man — is visible in the archway.
    # Reactive: once aldric_shamed, the yard reads as resolved.
    variants:
      - when: [{ has_flag: aldric_shamed }]
        text: >
          The hawk-yard. Aldric has stepped back from the block, the calculation behind
          his eyes running to which door he can reach without meeting the gate-keeper.
          Your tiercel sits hooded on the block. Guest chambers are to the east, the gate
          lodge to the west, and the stable yard — and the road — lie through the arch
          to the north.
    objects: [falcon_jesses]
    exits:
      - { direction: east, to: guest_chambers }
      - { direction: west, to: gate_lodge }
      - { direction: north, to: stable_yard }

  - id: guest_chambers
    name: "The Guest Chambers"
    description: >
      A well-appointed chamber in the east wing — better-furnished than a three-night
      road visit warrants. A leather satchel sits open on the travelling chest, its
      contents half-sorted as if something was moved in haste when you were announced.
      A folded document lies half-under the riding gloves at the satchel's lip. The
      hawk-yard is back to the west.
    # Reactive: once the bill is taken, the satchel reads as emptied of interest.
    variants:
      - when: [{ has_flag: bill_read }]
        text: >
          The guest chambers, the satchel still open on the chest. The forged seal's
          tell is fixed in your head now, and the folded document is no longer hidden
          under the riding gloves at the satchel's lip. The hawk-yard is back to the west.
      - when: [{ has_flag: hidden_bill_taken }]
        text: >
          The guest chambers, the satchel still open on the chest and its riding gloves
          disturbed. The folded document is no longer tucked at the satchel's lip. The
          hawk-yard is back to the west.
    objects: [hidden_bill]
    exits:
      - { direction: west, to: hawk_yard }

  - id: gate_lodge
    name: "The Gate Lodge"
    description: >
      The manor's gate lodge, where the porter keeps arrival and equipment records.
      The current month's log lies open on the counter: every guest, every horse, every
      piece of equipment that came through the gate this month, in the porter's steady
      hand. The hawk-yard is back to the east.
    # Reactive: once the log is read, the counter reads as already checked.
    variants:
      - when: [{ has_flag: log_read }]
        text: >
          The gate lodge. The porter's log lies open on the counter, its relevant entry
          already in your head. The hawk-yard is back to the east.
    objects: [gate_log]
    exits:
      - { direction: east, to: hawk_yard }

  - id: stable_yard
    name: "The Stable Yard"
    description: >
      The stable yard behind the mews, the manor's main gate ahead in the north wall.
      Thorn — Aldric's hired man, broad-shouldered, economical in his stillness — stands
      in the gate passage. He is not from the manor. He will not move without a word from
      Aldric, and that word has not come. The hawk-yard is back to the south.
    # Two variants: social path (aldric_shamed) and combat path (thorn_defeated).
    variants:
      - when: [{ has_flag: aldric_shamed }]
        text: >
          The stable yard, the main gate open. Thorn has stepped back from the passage —
          Aldric has nothing left to enforce, and Thorn enforces things rather than
          initiate them. The manor road lies north; the hawk-yard is back to the south.
      - when: [{ has_flag: thorn_defeated }]
        text: >
          The stable yard, Thorn down across the gate passage. The manor road lies north;
          the hawk-yard is back to the south.
    exits:
      - { direction: south, to: hawk_yard }
      - direction: north
        to: manor_road
        conditions: [{ any_of: [{ has_flag: aldric_shamed }, { has_flag: thorn_defeated }] }]
        locked_msg: >
          Thorn has not moved from the gate passage. The road north is blocked while
          he stands here — get past him or get Aldric to call him off.

  - id: manor_road
    name: "The Manor Road"
    description: >
      The road runs north from the manor gate into open country, the late morning light
      level across the fields. Your tiercel rides steady on your wrist, hooded, the
      familiar weight of him settling as you walk. Behind you the gate-keeper watches
      from his lodge with the expression of a man who has seen this pattern before and
      is not sorry to see it end this way. The road is clear.
    # Locomotion win (+15 capstone): reaches the full 50 on first entry and fires
    # end_game simultaneously. SCORE_PEAKS_BEFORE_WIN does not fire on a navigation win
    # (bug_0116): the +15 is the last award and the win fires in the same step.
    on_enter:
      - set_quest_stage: { quest: falcon_recovery, stage: road_clear }
      - add_journal: >
          The falcon is recovered and the manor is behind you. Aldric will have a
          long explanation to give someone about the gate record and the bill.
      - inc_var: { name: score, by: 15 }
    exits:
      - { direction: south, to: stable_yard }

objects:
  - id: falcon_jesses
    name: "falcon's jesses"
    aliases: [jesses, jess, falcon jesses, bird jesses, tiercel jesses, leg straps, leather jesses, bird, falcon, tiercel, hood, hooded bird, hooded tiercel, block]
    description: >
      The leather jesses on the tiercel's legs — a matched pair, your own work, with
      your falconer's mark tooled into the cuff of each: a three-pointed crown, the
      mark registered in the guild book at Carlisle. No one else uses this mark.
      The bird's hood is your work too, the stitching unmistakable to anyone who
      made it.
    # Reactive: once read, the jesses read as already identified.
    variants:
      - when: [{ has_flag: jesses_read }]
        text: >
          The falcon's jesses, already read — your mark on both cuffs, the three-pointed
          crown guild-registered at Carlisle. The bird is yours and you have confirmed it.
    takeable: false
    read_text: >
      A three-pointed crown tooled into the left cuff; the same on the right. Your mark,
      cut by your own swivel-tool, registered in the Carlisle guild book two seasons back.
      This is your bird. The jesses are proof enough for any falconer, and proof enough for
      any court that has time to listen.
    interactions:
      # First-read: +5 score (establishing ownership — the opening position).
      # One-shot: gated on not_flag jesses_read; retired on first READ.
      - verb: READ
        target: falcon_jesses
        conditions: [{ not_flag: jesses_read }]
        effects:
          - set_flag: jesses_read
          - set_quest_stage: { quest: falcon_recovery, stage: ownership_confirmed }
          - inc_var: { name: score, by: 5 }
          - add_journal: >
              The jesses bear your mark — three-pointed crown, both cuffs, Carlisle guild
              registration. The bird is yours. That is the starting position; the question
              is whether a mark is enough against a forged bill. (+5)
          - narrate: >
              The three-pointed crown is on both cuffs, cut by your own swivel-tool — the
              pattern you use and no one else does, in the Carlisle guild book if it ever
              comes to a formal inquiry. This is your bird. Aldric knows it; he is watching
              from the side of the block to see if you will say so aloud, and in front of
              whom. A mark on a jess is real ownership. What he has in his coat — you can
              see the fold of a document there — is the answer he is preparing for it.
      # The confrontation: USE hidden_bill ON falcon_jesses — spring the trap by presenting
      # the forged bill against the jesses in front of Aldric. Cunning DC 12.
      # Retires only on SUCCESS (bug_0456): a bad roll is a public falter, not Aldric
      # deleting the pack's primary social route. Requires the player to have read the
      # bill (and ideally the gate log) first, which raises cunning from base 3 toward
      # the near-certain 9.
      - verb: USE
        item: hidden_bill
        target: falcon_jesses
        command_verb: present
        command_template: "present {item} against {target}"
        conditions: [{ not_flag: confrontation_attempted }]
        skill_check:
          skill: cunning
          difficulty: 12
          on_success:
            - set_flag: confrontation_attempted
            - set_flag: aldric_shamed
            - inc_var: { name: score, by: 10 }
            - set_quest_stage: { quest: falcon_recovery, stage: aldric_shamed }
            - add_journal: >
                Aldric's scheme called out in one breath — forged seal, gate record with
                no mews equipment, the jesses right there on the bird. He had no time to
                choose which lie to stick to. He stepped back from the block. (+10)
            - narrate: >
                You hold the bill open at the seal and read the flaw aloud — the wax
                spread wrong, applied dry rather than fresh, the impression of a seal
                re-used on a document it was not made for — and you say it all at once,
                quickly, in the same even tone a man uses when he already knows the answer
                and is simply giving the other person the last chance to avoid the scene:
                the bill says six weeks, the gate log says no mews equipment, and the jesses
                say this bird was never anybody else's. Aldric's mouth opens. Closes. The
                calculation runs — he can push back on the seal and you name the gate log;
                he can name the gate log and you produce the jesses; he can dispute the
                jesses and you produce all of it together, in the yard, with the gate-keeper
                who is already watching from the lodge window. The scene is not worth the
                bill. He steps away from the block.
          on_failure:
            - narrate: >
                The words do not close around him quickly enough. Aldric smiles as if
                the bill's seal, the gate record, and the jesses are three separate
                inconveniences instead of one trap, and he starts to turn the talk back
                toward recovery fees. But the forged bill is still in your hand, the gate
                log is still yours to name, and the bird's jesses are still on the block
                between you. Thorn watches from the stable yard arch, but the evidence has
                not left the yard. Press the bill against the jesses again before Aldric
                settles the order of the story for you.

  - id: hidden_bill
    name: "bill of sale"
    aliases: [bill, sale, document, paper, papers, forged bill, purchase document, ownership document, satchel document, folded document, folded paper]
    description: >
      A folded bill of sale from the satchel, dated six weeks past: 'One trained tiercel,
      grey, hooded, to Aldric of Haverstock, from a licensed falconer of the Carlisle
      guild.' The Carlisle guild seal is at the foot — but the wax is spread too wide,
      the impression pressed too deep, the tell of a seal applied to dry paper rather
      than to fresh wax at the moment of signing.
    # Reactive: once studied, the bill reads as already identified as forged.
    variants:
      - when: [{ has_flag: bill_read }]
        text: >
          The bill of sale — already read, the forged seal plain to anyone who knows what
          a guild impression looks like when it was applied fresh versus after the fact.
          Aldric paid well for this; not well enough.
    takeable: true
    take_effects:
      - set_flag: hidden_bill_taken
    read_text: >
      The tiercel described is grey, hooded, trained — a match to your bird in every
      particular. But the guild seal is wrong: the wax is too thick, the impression
      pressed too deep, spreading at an angle that happens when a seal is applied to a
      document already dry rather than in the moment of signing. This was not made at the
      time of purchase. Someone made it for this occasion, or Aldric bought it already made.
      There was no licensed sale.
    interactions:
      # Close study of the bill: +10 score and +3 cunning (the forged seal's tell is now
      # in your head — you can name it precisely under pressure). One-shot: gated on
      # has_item AND not_flag bill_read; retired after first scored read.
      - verb: READ
        target: hidden_bill
        conditions: [{ all_of: [{ has_item: hidden_bill }, { not_flag: bill_read }] }]
        effects:
          - set_flag: bill_read
          - inc_var: { name: cunning, by: 3 }
          - inc_var: { name: score, by: 10 }
          - set_quest_stage: { quest: falcon_recovery, stage: forgery_found }
          - add_journal: >
              The bill is forged — the guild seal applied to dry wax, the impression
              spread wrong. Aldric paid for a clean document but it will not hold under
              a slow look from anyone who knows the guild standard. (+3 cunning, +10)
          - narrate: >
              The seal is pressed too deep, the wax spread at the wrong angle — the tell
              of a seal applied to a document already dried, not to fresh wax in the moment
              of signing. Someone made this for Aldric, or he bought it off a scrivener who
              does not scruple over guild impressions. It will pass a quick glance; it will
              not pass a deliberate one. If you can get him talking fast enough in front of
              the gate-keeper, he will not have time to decide which look he is getting.

  - id: gate_log
    name: "gate log"
    aliases: [log, record, porter log, gate record, porter record, arrival log, entry log, gate book, arrivals, equipment record, arrivals record]
    description: >
      The porter's log for the current month: every guest, every horse, every piece of
      equipment brought through the manor gate, in the porter's careful hand. Aldric's
      entry, three days ago, lists his horse, personal luggage, and a hawk-bag — but
      no cadge, no perch, no falcon gauntlet, no feeding equipment. He brought a
      carrying case for a bird he did not yet own.
    # Reactive: once read, the log reads as already studied.
    variants:
      - when: [{ has_flag: log_read }]
        text: >
          The gate log, already read — Aldric's entry shows a hawk-bag on arrival but
          no mews equipment. He had nowhere to house a falcon for three days and nothing
          to feed one with. The 'strayed bird' story requires a mews this record does not
          record him having.
    takeable: true
    read_text: >
      Three days past: horse (grey), personal luggage (two bags), hawk-bag (empty,
      as entered). No cadge, no perch, no gauntlet, no hood, no food-bags. The
      hawk-bag is a carrying case for transport — it means he planned to leave with a
      bird he did not arrive with. A man claiming to have nursed a strayed falcon for
      three days has no equipment to nurse one with. The 'strayed into my mews' account
      is impossible on its face.
    interactions:
      # Close reading of the gate record: +10 score and +3 cunning (you now have the
      # precise column entry to quote under pressure). One-shot: gated on has_item AND
      # not_flag log_read; retired after first scored read.
      - verb: READ
        target: gate_log
        conditions: [{ all_of: [{ has_item: gate_log }, { not_flag: log_read }] }]
        effects:
          - set_flag: log_read
          - inc_var: { name: cunning, by: 3 }
          - inc_var: { name: score, by: 10 }
          - set_quest_stage: { quest: falcon_recovery, stage: record_checked }
          - add_journal: >
              The gate log: Aldric arrived with a hawk-bag but no mews equipment. He
              planned to leave with a bird he could not have housed for three days. The
              'strayed falcon' story cannot be true. (+3 cunning, +10)
          - narrate: >
              The entry is three days old, in the porter's unhurried hand: horse, luggage,
              hawk-bag. No cadge, no perch, no gauntlet, no food-bags. He brought a
              carrying case for a bird he did not have, on a visit that began the day you
              set out on the hunt that pulled you away from the mews. The 'strayed falcon'
              story requires a mews that this record does not show him having. That makes
              the forged bill not just a forgery but a plan — the kind that was ready
              before the bird was taken, not assembled in a hurry afterwards.

npcs:
  - id: aldric
    name: "Aldric"
    description: >
      Aldric of Haverstock: a lean man in good riding clothes, with the measured calm
      of someone who is running a calculation at all times and is rarely behind it.
      He is pleasant in manner, watchful in the eyes, and has done this before.
    room: hawk_yard
    dialogue:
      root: aldric_root
      nodes:
        - id: aldric_root
          npc_text: >
            Your bird flew into my mews three days past while you were out on the
            hunt — I found him tangled in the news-netting and brought him in for
            safekeeping. I have been feeding and tending him at my own expense.
            I am sure we can settle on a fair recovery arrangement.
          # Return variants (bug_0322/0325 pattern): short acknowledgment on re-entry
          # so the full opening speech does not re-fire on every visit.
          variants:
            - when: [{ has_flag: aldric_shamed }]
              text: >
                Aldric does not look up from the middle distance. He has nothing
                further to arrange in the yard today.
            - when: [{ has_flag: confrontation_attempted }]
              text: >
                I believe I have said everything I have to say on this matter.
            - when:
                - any_of:
                    - { has_flag: asked_bill }
                    - { has_flag: asked_jesses }
                    - { has_flag: asked_mews }
              text: >
                I have told you what I know. I suggest you consider the arrangements
                I described.
          topics:
            - id: ask_bill
              prompt: "Ask Aldric for proof of ownership."
              conditions: [{ not_flag: asked_bill }]
              goto: aldric_bill
            - id: ask_jesses
              prompt: "Point out that the jesses bear your mark."
              conditions: [{ not_flag: asked_jesses }]
              goto: aldric_jesses
            - id: ask_mews
              prompt: "Ask where his mews is."
              conditions: [{ not_flag: asked_mews }]
              goto: aldric_mews
            - id: leave_aldric
              prompt: "Step away."
              end: true
        - id: aldric_bill
          npc_text: >
            I have a bill of sale from a licensed falconer of your guild — a grey
            tiercel, trained, purchased six weeks past. The description matches this
            bird in every particular. I would be happy to produce it if the situation
            calls for a formal arrangement.
          effects:
            - set_flag: asked_bill
            - add_journal: >
                Aldric claims a guild bill of sale, six weeks old. He is waiting to see
                if the formality is enough to make you accept his terms and pay.
          topics:
            - id: bill_back
              prompt: "Say nothing and walk away."
              goto: aldric_root
        - id: aldric_jesses
          npc_text: >
            Markings can fade. Markings can be reproduced. I am sure your guild mark
            is distinctive, but without any other documentation, I think a properly
            witnessed bill of sale from a licensed guild member is the relevant
            instrument here. The law is quite clear on what constitutes evidence of
            ownership.
          effects:
            - set_flag: asked_jesses
            - add_journal: >
                Aldric dismissed the jesses — says markings can be copied. He is
                steering hard toward the bill of sale as the only legitimate instrument.
                The bill is the trap and he wants you to walk into it.
          topics:
            - id: jesses_back
              prompt: "Walk away."
              goto: aldric_root
        - id: aldric_mews
          npc_text: >
            I keep a travelling cadge and the necessaries in my saddlebag — a man
            who rides much in hunting country learns to carry what he needs. Your bird
            was well looked after, I assure you.
          effects:
            - set_flag: asked_mews
            - add_journal: >
                Aldric claims a travelling cadge and necessaries in his saddlebag.
                It would be worth checking the gate record to see what he actually
                brought through the gate.
          topics:
            - id: mews_back
              prompt: "Nod and step away."
              goto: aldric_root

enemies:
  # Thorn — the stable-yard enforcer and the combat-path obstacle. Combat is the
  # fallback when the cunning path is skipped or the authority check fails; it is not
  # the designed resolution and rewards no score — the brute-path cost is correct. No
  # preparation in this pack buffs the fight (cunning is the psychological lever, not
  # a combat stat), so a player who prepares for the cunning path and fails the check
  # enters combat at base stats. That is honest: the wrong tool applied too hard
  # has a price.
  #
  # Death check (no combat_guaranteed): Thorn hp 12 / atk 5 / def 2.
  #   Worst player dmg: 1+4-2 = 3 per round. Rounds to kill: ceil(12/3) = 4.
  #   Worst Thorn dmg: 6+5-2 = 9 per round. Total over 3 rounds (before kill): 27.
  #   27 > 20 HP — Thorn CAN kill on worst dice. ending_held is reachable.
  #   Thorn telegraphed in hawk_yard and stable_yard prose (bug_0123: no ambush).
  - id: thorn
    name: "Thorn"
    description: >
      Aldric's hired man — a broad-shouldered fellow with the economy of movement
      of someone who used to work for his living in a harder trade. He will not move
      without a word from Aldric and he will not be moved by argument.
    room: stable_yard
    conditions: [{ not_flag: aldric_shamed }]
    hp: 12
    attack: 5
    defense: 2
    defeat_flag: thorn_defeated
    death_ending: ending_held
    on_defeat:
      - set_quest_stage: { quest: falcon_recovery, stage: thorn_down }
      - add_journal: >
          Thorn is down in the gate passage. The road north is open. The falcon is
          yours but the manner of leaving will be in the gate record.

win_conditions:
  # Locomotion win: reaching manor_road — accessible via the cunning path (aldric_shamed
  # unlocks the stable_yard north exit) OR the combat path (thorn_defeated unlocks it).
  # The +15 capstone fires on manor_road's on_enter in the same step as the win.
  # SCORE_PEAKS_BEFORE_WIN does not fire on a navigation win (bug_0116).
  - id: road_opened
    conditions: [{ visited: manor_road }]
    ending: ending_cleared

endings:
  - id: ending_cleared
    title: "The Road North"
    # Reactive: cunning-path epilogue names Aldric's reckoning.
    # Base text covers the combat path. The test reaches this ending via Thorn combat;
    # base text must be variant-free on that route (aldric_shamed not set => no variant fires).
    variants:
      - when: [{ has_flag: aldric_shamed }]
        text: >
          The manor road runs north into open country, your tiercel steady on your
          wrist. Behind you Aldric is explaining something to the gate-keeper in a tone
          that is running out of plausibility — the arrival log is still open on the
          counter, and the gate-keeper has had three days to form his own opinion of
          the guest in the east wing. Aldric will find another manor, another strayed
          bird, another falconer who does not check the gate record first. It will not
          be yours. *** You have won. ***
    text: >
      The manor road runs north into open country, your tiercel steady on your wrist.
      You did not leave the manor quietly, and Thorn will be on his feet before dark.
      But the road is open and the bird is yours, and the difference between a scene
      and a case is that someone has to press the case — and Aldric is not having a
      good morning. *** You have won. ***

  - id: ending_held
    title: "The Gate Passage"
    text: >
      Thorn gets his weight into you before you clear the gate passage, and after that
      the choice is no longer yours. Aldric steps into the stable yard with a look of
      measured regret and explains to the manor steward that there was a dispute over a
      bird and a man who would not be reasoned with. The tiercel stays on the block.
      *** You have fallen. ***
    death: true
