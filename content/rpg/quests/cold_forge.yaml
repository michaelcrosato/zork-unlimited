# The Cold Forge — a Stage 4 (Hero's-Quest) pack (spec §13, §14 gate).
#
# The game's SECOND RPG pack, authored to broaden the game beyond the lone
# Sunken Barrow. It runs on the same deterministic core and the same gated RPG
# mechanics, but deliberately covers ground the barrow does not and answers the
# barrow's standing playtest critiques:
#   - a TALKING NPC with CONDITIONAL dialogue (bug_0014): the lantern-spirit's
#     counsel is one-shot (each topic retires after it is told) and MECHANICAL —
#     hearing how the sentinel fails grants a one-time +2 attack blessing that
#     genuinely eases the fight (no dead-payload rumor flags).
#   - combat with REAL TEETH (the barrow's fight was judged "toothless"): the
#     slag-sentinel hits hard enough that PREPARATION decides it — under-armed play
#     is a lethal gamble, the lantern-spirit's +2-attack counsel is the survival
#     lever, and the founder's plate is the cushion. The fight stays provably
#     winnable for the validator via the player's BEST REACHABLE stats (the bug_0097
#     proof), and a fall is recoverable via an earlier save (§8.7). (Retuned to
#     genuine teeth in bug_0101 — see the enemy block below.)
#   - an EXPLICIT goal stated in the opening room (the barrow's goal was implicit).
# As in the barrow, the one fight is seeded turn-based combat and the one skill
# check is a seeded might roll, so every encounter is replayable from its trace
# (§8.5). The pack passes the full parser validator AND the RPG checks.

meta:
  id: cold_forge_v1
  title: "The Cold Forge"
  start_room: forge_steps
  vars_init: { hp: 20, attack: 4, defense: 2, might: 3 }
  flags_init: []
  # Stage-3 scoring: points awarded once at each of the three beats that mark real
  # progress — stilling the slag-sentinel that guards the deep forge (+15),
  # levering the slag-choked grate aside with bar and might (+15), and lifting the
  # Ember-Heart from its plinth (+20). Each award rides a milestone that only fires
  # once (the sentinel dies once; the lever retires after success, cf. bug_0015;
  # the ember chamber ends the game on entry), so the score cannot be farmed and
  # the intended path reaches the full 50. The `score` var accrues via inc_var; the
  # RPG validator folds the combat/skill-check awards into the SCORE_UNREACHABLE
  # upper bound, so the declared max is genuinely reachable (cf. bug_0016).
  max_score: 50

rooms:
  - id: forge_steps
    name: "The Forge Steps"
    description: >
      A stair of soot-black stone drops into the mountain's root, toward a cold
      red glow that is not quite firelight. You came down here for one thing: the
      Ember-Heart, the last living coal of the old forge, said to lie at its
      deepest hearth. The only way to it is down.
    exits:
      - { direction: down, to: outer_forge }

  - id: outer_forge
    name: "The Outer Forge"
    description: >
      A vaulted hall of dead anvils and silent bellows, the air gone to a grave
      chill. A wrought inscription is set into one wall. By a cold trough lies a
      stout iron pry-bar, and in a niche a single lantern still burns with a thin
      blue flame that watches you. A low cell stands half-walled to the west, a
      passage runs north into deeper dark, and the steps climb back toward the
      surface.
    # Reactive room text (bug_0023): once the pry-bar has been lifted the hall no
    # longer reads "By a cold trough lies a stout iron pry-bar" — it is gone from
    # visible_objects, so the static line would otherwise contradict the empty trough
    # and the bar now in the player's own hands on every revisit. This was the one
    # tick-blind seam in an otherwise fully-reactive pack: the Founder's Cell (plate
    # taken) and the Bellows Walk (sentinel killed) both update their prose, but the
    # Outer Forge stayed static. A fresh blind playtester (seed 53, ai-runs/
    # 2026-06-02T00-23-22-281Z/playtest.md §5) flagged it as the pack's lone concrete
    # defect ("the one inconsistent room"), independently re-confirming the prior
    # cycle's seed-37 deferral (bug_0088). The variant drops the pry-bar clause and
    # names the trough now bare, mirroring the founder/grate reactive treatment.
    # Content-only: no object/exit/flag/quest/score/ending change; visible_objects
    # already drops the taken bar.
    variants:
      - when: [ { has_item: pry_bar } ]
        text: >
          A vaulted hall of dead anvils and silent bellows, the air gone to a grave
          chill. A wrought inscription is set into one wall. The cold trough stands
          bare now — the stout iron pry-bar that lay beside it is in your own hands.
          In a niche a single lantern still burns with a thin blue flame that watches
          you. A low cell stands half-walled to the west, a passage runs north into
          deeper dark, and the steps climb back toward the surface.
    objects: [inscription, pry_bar]
    exits:
      - { direction: up, to: forge_steps }
      - { direction: west, to: founder_cell }
      - { direction: north, to: bellows_walk }

  # An OPTIONAL side beat (the pack's "real second branch", answering every blind
  # pass's standing note that the forge is bug-free but BRIEF and one-path —
  # enjoyment 3/5). It mirrors the proven barrow reaver-shade shape (bug_0075): a
  # cell reached by a new exit, met BEFORE the fight, that deepens the world (who
  # built the forge, why it died, why the sentinel guards) and offers ONE earned
  # tactical choice — take and don the dead master's cold-iron plate for a one-time
  # +2 DEFENSE that turns the worst of the sentinel's anvil-blows (the seed-1
  # playtester's flagged lethality: an even-ish trade finished at low HP). It is the
  # DEFENSE complement to the lantern-spirit's +2 ATTACK counsel, and like that
  # counsel it is OPTIONAL GRACE, honestly framed (the plate "will not swing your
  # blade for you"): the canonical victory route never comes here, the spirit's +2
  # attack already wins the fight reliably without the plate (combat is d6+atk-def,
  # min 1 — a +2 ward eases but never zeroes the blow), and the +2 retires after one
  # don so it cannot be farmed. With the bug_0101 retune the plate is no longer the
  # difference between a low-HP win and a comfortable one but the difference between a
  # ~90% win and a near-certain one — still optional, now meaningfully so. Purely
  # additive: no existing room/lever/score(50)/win is touched (the bug_0101 stat
  # retune lives in the enemy block, not here).
  - id: founder_cell
    name: "The Founder's Cell"
    description: >
      A narrow cell walled off the outer hall, its doorway half-choked with
      tumbled stone. Here the forge's last master sits against the cold wall where
      he chose to die — armoured still in a suit of cold-iron plate, a smith's
      hammer across his knees, a line of letters cut into the stone above his
      head. The cold kept him whole, as it kept everything down here.
    variants:
      # Reactive room text (bug_0023): once you have lifted the plate the master no
      # longer sits "armoured still" — examining the cell would otherwise contradict
      # the missing plate on his bones and the iron now on your own back.
      - when: [ { has_item: cold_iron_plate } ]
        text: >
          The narrow cell where the forge's last master sits against the cold
          wall, his bones bare now of the plate you carry off, his hammer still
          across his knees and his name still cut in the stone above his head.
    objects: [founder, epitaph, cold_iron_plate, hammer]
    exits:
      - { direction: east, to: outer_forge }

  - id: bellows_walk
    name: "The Bellows Walk"
    description: >
      A long gallery of slack leather bellows and quenched tuyeres. Across the
      only way east stands a man-high figure of fused slag and cinder — a forge
      sentinel. The dead hall holds no fire to rouse it; the deep cold keeps it
      slow and stiff, stirred only enough to stand and bar the passage deeper in.
      It will be no swifter than it is now. Slow is not the same as soft, though:
      it is a man-high weight of fused slag, and the blows it does land fall like
      a dropped anvil. Better not to meet it under-armed — face it with every
      edge you can bring to bear.
    variants:
      - when: [ { has_flag: sentinel_stilled } ]
        text: >
          A long gallery of slack leather bellows and quenched tuyeres. The slag
          sentinel lies broken across the floor, its cinders dark and cooling, and
          the passage east into the deep forge stands open.
      # bug_0118: carried-but-unworn plate is legible at the moment of choice. A
      # blind playtester noted the take-then-don two-step is easy to miss — a hasty
      # player can walk into the fight with the cold-iron plate slung loose at +0
      # defense and no nudge. This variant fires only PRE-combat (sentinel_stilled
      # is checked first, so the broken-sentinel text still wins once it is down)
      # and only when the plate is held but not yet donned, turning the silent gap
      # into an honest prompt to buckle it on before the anvil-weight lands.
      - when:
          - { has_item: cold_iron_plate }
          - { none_of: [ { has_flag: plate_donned } ] }
        text: >
          A long gallery of slack leather bellows and quenched tuyeres. Across the
          only way east stands a man-high figure of fused slag and cinder — a forge
          sentinel. The dead hall holds no fire to rouse it; the deep cold keeps it
          slow and stiff, stirred only enough to stand and bar the passage deeper
          in. It will be no swifter than it is now. Slow is not the same as soft,
          though: it is a man-high weight of fused slag, and the blows it does land
          fall like a dropped anvil. The dead master's cold-iron plate still hangs
          loose and unbuckled at your side — better to don it now than to meet that
          anvil-weight under-armed; face the sentinel with every edge you can bring
          to bear.
    exits:
      - { direction: south, to: outer_forge }
      - direction: east
        to: forge_heart
        conditions: [ { has_flag: sentinel_stilled } ]
        locked_msg: "The slag sentinel grinds across the passage; you cannot pass while it stands."

  - id: forge_heart
    name: "The Forge Heart"
    description: >
      The deep hearth, vast as a chapel and just as cold. Its mouth is a great
      grate of slag-choked iron, sealed by the cooling of ages — but its edge
      carries a worn lip, made to be levered by bar and brawn. Beyond it, you can
      feel the Ember-Heart's faint warmth.
    variants:
      - when: [ { quest_stage: { quest: forge, stage: grate_open } } ]
        text: >
          The deep hearth, vast as a chapel. The great slag grate has been levered
          up off its lip and stands open, baring a low way down into the warmth at
          the forge's very root.
      # bug_0259: arrive-without-the-bar legibility. A fresh source-blind MCP
      # playtester (seed 11, ai-runs/2026-06-04T23-33-49-294Z/playtest.md §4) flagged
      # the one remaining friction in this otherwise blind-clean pack — a player can
      # descend to the Forge Heart having skipped the pry-bar, find the grate sealed,
      # and have to backtrack with no in-room reminder of WHERE the bar is. The static
      # `locked_msg` on the `down` exit cannot reference inventory, so this reactive
      # variant carries the cue: it fires only when the bar is NOT held and the grate
      # is not yet open (the grate_open variant is declared FIRST, so the open prose
      # always wins once it is levered; and the bar is never consumed, so once taken
      # this variant can never fire), pointing the player back to the cold trough in
      # the outer forge — the same place the lantern-spirit's heart-counsel names.
      # Content-only: no object/exit/flag/quest/score/ending change.
      - when: [ { none_of: [ { has_item: pry_bar } ] } ]
        text: >
          The deep hearth, vast as a chapel and just as cold. Its mouth is a great
          grate of slag-choked iron, sealed by the cooling of ages — its edge carries
          a worn lip made to be levered, but you carry nothing strong enough to set
          against it. There was a stout iron pry-bar by the cold trough back in the
          outer forge. Beyond the sealed grate you can feel the Ember-Heart's faint
          warmth.
    objects: [stone_grate]
    exits:
      - { direction: west, to: bellows_walk }
      - direction: down
        to: ember_chamber
        conditions: [ { quest_stage: { quest: forge, stage: grate_open } } ]
        locked_msg: "The slag grate is sealed fast. It must be levered aside first."

  - id: ember_chamber
    name: "The Ember Chamber"
    description: >
      Below the grate, a small round chamber that breathes warmth at last. On a
      plinth of unburnt white stone rests the Ember-Heart: a single coal that
      glows as if newly drawn from the fire, and never dims.
    objects: [ember_heart]
    on_enter:
      - add_journal: "You have reached the Ember-Heart."
      - inc_var: { name: score, by: 20 }
    exits:
      - { direction: up, to: forge_heart }

objects:
  - id: inscription
    name: "wrought inscription"
    aliases: [inscription, wall, words, runes]
    description: "Letters of inlaid brass, cold to the touch."
    takeable: false
    read_text: >
      THE SENTINEL WAKES TO HEAT AND SLEEPS IN COLD; AND THIS FORGE-FIRE IS LONG
      DEAD AND WILL NOT KINDLE. SO IT SLEEPS, AND STRUCK TRUE IN THE CHILL IT WILL
      NOT RISE AGAIN. THE HEART LIES BEHIND THE SLAG, AND ONLY IRON AND A STRONG
      ARM WILL OPEN THE WAY.

  - id: pry_bar
    name: "iron pry-bar"
    aliases: [bar, pry-bar, prybar, lever, iron]
    description: "A stout iron bar the length of your arm, cold but sound — a lever, for an arm strong enough."
    takeable: true

  - id: stone_grate
    name: "slag grate"
    aliases: [grate, slag]
    description: "A great hearth-grate welded shut by cooled slag, with a worn lip at its edge made for a lever."
    # Reactive examine text (bug_0023): once the grate is levered open the slab no
    # longer reads "welded shut" — examining it would otherwise contradict both the
    # room's own reactive prose ("stands open") and the player's levering action.
    variants:
      - when: [ { quest_stage: { quest: forge, stage: grate_open } } ]
        text: "The great hearth-grate, levered up off its lip and standing open on its worn edge; below it a low way drops down into the warmth."
    takeable: false
    interactions:
      - verb: USE
        item: pry_bar
        target: stone_grate
        # The prose primes "lever" (the bar is "a lever", the grate "made for a lever"
        # and "levered up off its lip", the success journal "you lever the slag grate"),
        # yet the offered command read the generic "use iron pry-bar on slag grate". So
        # the natural command is "lever slag grate with iron pry-bar" via a per-interaction
        # command_verb + command_template (bug_0078, generalizing bug_0074's self-USE
        # command_verb to item-on-target). The id stays `use_pry_bar_on_stone_grate`;
        # "use iron pry-bar on slag grate" still parses; the skill_check is untouched.
        command_verb: lever
        command_template: "lever {target} with {item}"
        # One-shot puzzle: once the grate is levered open the check retires, so the
        # bar can never re-roll and narrate "the grate does not give" while the way
        # down already stands open (the bug_0015 retire-after-success pattern).
        conditions: [ { none_of: [ { quest_stage: { quest: forge, stage: grate_open } } ] } ]
        skill_check:
          skill: might
          difficulty: 12
          on_success:
            - set_quest_stage: { quest: forge, stage: grate_open }
            # The grate is the climactic tool-puzzle (+15) and the manor's other two
            # milestones both journal (the sentinel's defeat and reaching the Heart),
            # yet levering it open wrote nothing to the player's log — the lone silent
            # progress beat (blind-playtest finding, bug_0048). The check retires after
            # success (gated none_of grate_open), so this entry fires exactly once.
            - add_journal: "You lever the slag grate up off its lip; the way down into the forge's root stands open."
            - inc_var: { name: score, by: 15 }
            - narrate: "You set the bar to the lip and throw your whole weight on it — slag cracks, iron screams, and the grate heaves up off its seat. The way down is open."
          on_failure:
            - narrate: "The bar bites under the lip and your shoulders strain, but the slag holds and the grate will not lift. Set your feet and try again."

  - id: ember_heart
    name: "Ember-Heart"
    aliases: [ember, heart, coal, relic]
    description: "A single coal that glows with its own unfailing warmth."
    takeable: true

  - id: founder
    name: "dead master"
    aliases: [master, founder, smith, corpse, body, bones]
    description: "An age-dead man in cold-iron plate, sat upright against the wall as though he had only just closed his eyes. The deep cold kept him; the deep cold kept everything."
    # Reactive examine (bug_0023): once his plate is taken he is no longer "in
    # cold-iron plate" — the description must follow the world it describes.
    variants:
      - when: [ { has_item: cold_iron_plate } ]
        text: "The age-dead master, sat bare against the wall now that his plate is on your back, his hammer fallen across his knees and the cold still keeping his bones whole."
    takeable: false

  # The master's forge-hammer. Named twice in the cell's prose (the room
  # description and the founder's own examine variant) but, until now, with no
  # object behind it — a Chekhov's gun a curious player hunts for and finds
  # nothing, the one spot that broke the pack's otherwise-complete "everything
  # named is interactable" promise (a fresh MCP-only blind playtester, seed 37,
  # ai-runs/2026-06-01T23-06-34-239Z/playtest.md §4/§5, flagged it directly;
  # first deferred from the prior cycle's seed-23 pass). Deliberately a FLAVOUR
  # examine, non-takeable: it pays off the curiosity and deepens the founder
  # (his craft, the lifetime at the anvil that the epitaph eulogises) WITHOUT
  # adding a second tactical item to balance — it is a tool for shaping iron,
  # not a weapon, and the prose closes the "why can't I take it" loop honestly
  # (it is his, and it belongs with him). The plate stays the cell's one earned
  # tactical choice (bug_0070's +2-defense grace); this touches no
  # room/combat/score/exit/flag, only adds one inert visible object (bug_0088).
  - id: hammer
    name: "smith's hammer"
    aliases: [hammer, maul, mallet, smithing-hammer, forge-hammer]
    description: >
      The dead master's own forge-hammer, its hickory haft worn smooth to the
      shape of a grip and its face battered bright by a working lifetime against
      the anvil. It is a tool for shaping iron, not for breaking heads, and it
      lies where it should — across the knees of the last hand that ever swung
      it. Leave it to him.
    takeable: false

  - id: epitaph
    name: "cut letters"
    aliases: [letters, epitaph, name, stone, carving]
    description: "A line of letters cut deep into the stone above the dead master, by his own hand or a mourner's."
    takeable: false
    read_text: >
      HERE SITS THE LAST MASTER OF THE COLD FORGE, WHO WHEN THE GREAT FIRE FAILED
      WOULD NOT LET IT DIE ENTIRE. HE BANKED ITS LAST LIVE COAL INTO ONE
      EVERLASTING EMBER, SET THE SLAG SENTINEL TO KEEP IT, AND SEALED HIMSELF IN
      THE COLD THAT HOLDS THE SENTINEL SLEEPING. CARRY THE HEART OUT, AND THE FORGE
      IS NOT WHOLLY DEAD.

  - id: cold_iron_plate
    name: "cold-iron plate"
    aliases: [plate, armour, armor, cold-iron, mail, suit]
    description: "A suit of dark cold-iron plate, dead-cold to the touch and heavier than warm steel, but whole and unrusted — iron the slag sentinel's blows would ring off rather than break."
    # Reactive examine: once buckled on, it is no longer a loose suit to consider but
    # gear you wear (its self-USE "don" interaction has retired behind plate_donned).
    variants:
      - when: [ { has_flag: plate_donned } ]
        text: "The dead master's cold-iron plate, buckled on now over your own gear; its dead weight sits between you and the next blow."
    takeable: true
    take_effects:
      - add_journal: "The cold-iron plate is only weight in your hands until it is buckled on; don it before you face the sentinel."
      - narrate: "The plate is in your hands, but not yet on your body. Don it before the sentinel's anvil-blows find you."
    interactions:
      # Self-USE = "wear this thing". command_verb: don (bug_0074) makes the offered
      # and typed verb match the prose that primes it — you "don" plate, you do not
      # "use" it ("don" is not a builtin parser verb). One-shot: gated none_of
      # plate_donned so the action retires after the first don and the +2 cannot be
      # farmed (mirrors the spirit's one-shot +2-attack counsel and the bug_0015
      # retire-after-success lever). The +2 DEFENSE is the honest, optional
      # complement to that +2 attack — it keeps you on your feet against the
      # sentinel's anvil-blows but does not win the fight for you.
      - verb: USE
        item: cold_iron_plate
        target: cold_iron_plate
        command_verb: don
        conditions: [ { none_of: [ { has_flag: plate_donned } ] } ]
        effects:
          - set_flag: plate_donned
          - inc_var: { name: defense, by: 2 }
          - add_journal: "You buckle the dead master's cold-iron plate over your own gear; it will turn the worst of the sentinel's blows (+2 defense)."
          - narrate: "You strip the plate from the old master with a murmured word and buckle it on. It is dead-cold and heavier than steel, but it sits between you and the next blow — it will not swing your blade for you, but it will keep you standing to swing it yourself."

npcs:
  - id: lantern_spirit
    name: "lantern-spirit"
    description: "A thin blue flame in an old lantern, with the watchful patience of something very old and very tired."
    room: outer_forge
    # Every `npc_text` is PURE SPOKEN words — the engine renders dialogue as
    # `lantern-spirit: "<npc_text>"` (parser legal_actions), so the node must not
    # carry its own quote marks or third-person stage narration ("The flame leans
    # toward you…"). It once did, and a fresh MCP-only blind playtester (seed 23,
    # ai-runs/2026-06-01T18-58-23-751Z) saw the greeting render malformed —
    # `lantern-spirit: "The flame leans toward you. "A warm thing…""` — doubled
    # quotes with stage narration mis-spoken as the spirit's own words. Keep these
    # quote-free and gesture-free; the wrapper supplies the speaker and the quotes
    # (matches the sealed_crypt convention; bug_0071).
    dialogue:
      root: spirit_root
      nodes:
        - id: spirit_root
          npc_text: >
            A warm thing, come down into the cold. Few do. Ask, if you would —
            I have watched this forge die by inches, and I remember everything.
          # bug_0322: on every return from a topic the full first-meeting greeting
          # re-fired ("A warm thing, come down into the cold..."), making the
          # dialogue menu feel mechanical after the first exchange. This variant
          # fires when any topic flag is already set (first-match-wins), showing
          # a short acknowledgment instead. First visit is unchanged (no flags yet).
          # No new flag, no score/route/ending/stat change; prose only.
          variants:
            - when:
                - any_of:
                    - { has_flag: heard_sentinel }
                    - { has_flag: heard_heart }
                    - { has_flag: heard_forge }
                    - { has_flag: heard_founder }
              text: "What else would you know?"
          topics:
            # Each info topic retires once told (gated on its own rumor flag), so
            # the spirit never re-offers the same counsel and the +2 blessing can be
            # claimed only once. The ungated "step away" keeps the node terminating
            # (a gated-only node would be flagged DIALOGUE_NONTERMINATING, bug_0014).
            - id: ask_sentinel
              prompt: "Ask how to beat the slag sentinel."
              conditions: [ { not_flag: heard_sentinel } ]
              goto: spirit_sentinel
            - id: ask_heart
              prompt: "Ask where the Ember-Heart lies."
              conditions: [ { not_flag: heard_heart } ]
              goto: spirit_heart
            # The forge/fire is the room's most tempting question — a curious player,
            # standing in a "forge" full of heat-and-kindling lore, naturally wonders if
            # the dead fire can be relit, yet no such action exists. bug_0029 already
            # killed the sentinel "warm-up clock" over-promise; this is the SEPARATE
            # relight temptation a fresh blind playtester (seed 29) still flagged. A
            # one-shot topic forecloses it outright and re-points at the real goal — the
            # Ember-Heart is a warmth to carry OUT, not a fire to rekindle (bug_0059).
            - id: ask_forge
              prompt: "Ask whether the dead forge could ever be lit again."
              conditions: [ { not_flag: heard_forge } ]
              goto: spirit_forge
            # One-shot lore + signpost (gated heard_founder): names the master who
            # made the Ember-Heart and points at his side-cell to the west, so a
            # curious player can find the optional plate. No stat/balance effect —
            # the +2 defense is EARNED by going there and donning the plate, not by
            # the asking (unlike ask_sentinel, which grants its buff on the telling).
            - id: ask_founder
              prompt: "Ask who else ever came down into the cold."
              conditions: [ { not_flag: heard_founder } ]
              goto: spirit_founder
            - id: leave_spirit
              prompt: "Step away from the lantern."
              end: true
        - id: spirit_sentinel
          npc_text: >
            The sentinel? It is forge-born — it wakes to heat and sleeps in the
            cold, and this hall has been bitter cold for an age and will never be
            warm again. Do not fear that waiting makes it worse: it is as slow now
            as it will ever be. Strike it hard and it will not rise twice. Here —
            take what warmth I can spare; let it ride your arm.
          effects:
            - set_flag: heard_sentinel
            - inc_var: { name: attack, by: 2 }
            - add_journal: "The lantern-spirit's warmth settles into your arm — you feel you could strike harder now (+2 attack)."
          topics:
            - id: sentinel_back
              prompt: "Nod, and ask something else."
              goto: spirit_root
        - id: spirit_heart
          npc_text: >
            The Heart? Past the sentinel, in the deep hearth, sealed behind the
            old slag grate. No flame will melt that grate cold — but its edge has a
            lip, and a strong arm with a good iron bar will lever it up. There is
            such a bar by the trough, if no thief has had it.
          effects:
            - set_flag: heard_heart
            - add_journal: "The spirit says the Ember-Heart lies past the sentinel, behind a slag grate that must be levered open with an iron bar and main strength."
          topics:
            - id: heart_back
              prompt: "Thank it, and ask something else."
              goto: spirit_root
        - id: spirit_forge
          npc_text: >
            Lit again? No — never. The great fire went out an age ago, and there
            is no bellows, no kindling, no craft of mine that will wake it; that
            cold is why the sentinel sleeps, and why a warm thing like you may walk
            these halls at all. Do not spend your strength hunting a flame to
            relight — there is none to find, and none to be made. One living warmth
            is left in all this cold, and you came down for it already: the
            Ember-Heart. Lift it and carry it out into the world above. That is the
            only fire that leaves this place — let the dead forge keep its long dark.
          # One-shot like the other two counsels (gated on heard_forge), and it loops
          # back to spirit_root whose ungated `leave_spirit` keeps the node terminating
          # (a gated-only escape would trip DIALOGUE_NONTERMINATING, bug_0014). No
          # stat/effect/flag-gate beyond its own retire flag, so balance is untouched.
          effects:
            - set_flag: heard_forge
            - add_journal: "The spirit is plain: the dead forge cannot be relit — the Ember-Heart is the one warmth left to carry out, not a fire to rekindle."
          topics:
            - id: forge_back
              prompt: "Nod, and ask something else."
              goto: spirit_root
        - id: spirit_founder
          # Pure spoken words, quote-free and no third-person gesture (bug_0071) —
          # the wrapper renders `lantern-spirit: "<text>"`. One-shot (gated on its
          # own heard_founder), loops back to spirit_root whose ungated leave_spirit
          # keeps the node terminating (a gated-only escape would trip
          # DIALOGUE_NONTERMINATING, bug_0014).
          npc_text: >
            One came before you, an age ago, and he never climbed back out — the
            last master of this forge. When the great fire failed he would not let
            it die whole; he banked its last live coal into the Ember-Heart, set
            the slag sentinel to keep it, and walled himself into the side-cell
            west of here with the cold that holds the sentinel sleeping. His
            cold-iron plate is on him yet, whole and unrusted. He has no use for it
            now, and the sentinel's blows fall like dropped anvils. Take it, if
            your conscience lets you — better his iron on a living back than
            guarding old bones.
          effects:
            - set_flag: heard_founder
            - add_journal: "The spirit speaks of the forge's last master, walled into the side-cell west of the outer hall, dead in cold-iron plate that might yet turn the sentinel's blows."
          topics:
            - id: founder_back
              prompt: "Nod, and ask something else."
              goto: spirit_root

enemies:
  # The fight finally has the TEETH its prose has always promised (bug_0101). Every
  # blind pass of this pack lands the same note — and the seed-23 pass that prompted
  # this one put it plainly: there is "no real failure state", the sentinel "dies in
  # exactly 3 hits whether I had attack 4 or attack 6", and the room's own warning
  # ("better not to meet it under-armed — face it with every edge you can bring to
  # bear") "writes a check the mechanics don't cash." The old hp16/atk4 sentinel was
  # too soft: an under-armed thief strolled through it (the seed-23 tester won with 9
  # HP to spare) and the lantern-spirit's +2-attack counsel changed nothing, because
  # base attack already cleared 16 HP in the same ~3 rounds. So preparation — the
  # whole "ask the spirit, find the plate" arc — was cosmetic.
  #
  # Retuned to hp18/atk7 (defense unchanged). Combat is one ATTACK = one round:
  # player deals d6+atk-2, the sentinel (if it survives) deals d6+7-def (min 1). The
  # numbers now make every tier of preparation MATTER (verified live over seeds 1-40,
  # __probe.ts), turning a guided tour into a real, winnable gamble:
  #   - UNDER-ARMED (atk4/def2): lethal more often than not — it kills the player on a
  #     majority of seeds (seed 1, 2, 4, 9, 10… all fall), so the "don't meet it
  #     under-armed" warning is finally honest, not bluster.
  #   - the SPIRIT'S +2 ATTACK (atk6/def2, on the mandatory Outer-Forge path): the
  #     decisive survival lever — it ends the fight a round sooner, lifting the win
  #     rate from ~45% to ~90%. The buff the seed-23 pass called "pointless" is now
  #     the thing that saves you.
  #   - the FOUNDER'S PLATE (+2 defense) on top: optional grace still — the spirit
  #     route wins reliably without it — but it blunts the anvil-blow to a near-certain
  #     win with a comfortable HP cushion (atk6/def4 wins every seed tested).
  # This is exactly the sound "gear up first" design the bug_0097 winnability proof was
  # widened to permit: it credits the player's BEST REACHABLE stats (init + every
  # reachable +attack/+defense buff = atk6/def4), so the fight is still PROVABLY
  # winnable to the validator (best-case roll: 2 rounds to kill, ≥4 damage taken vs 20
  # reachable HP) and cold_forge stays a clean 0-finding pack — while base-stat play is
  # a genuine, lethal gamble the bar never required to be safe. A fall is still
  # save-recoverable (§8.7); the death ending (ending_fallen) is unchanged.
  - id: slag_sentinel
    name: "slag sentinel"
    description: "A man-high figure of fused slag and dead cinder, holding a slow, cold half-life to bar the deep forge — the chill keeps it as stiff and clumsy as it will ever be."
    room: bellows_walk
    hp: 18
    attack: 7
    defense: 2
    defeat_flag: sentinel_stilled
    death_ending: ending_fallen
    on_defeat:
      - add_journal: "The slag sentinel comes apart in cinders; the way east lies open."
      - inc_var: { name: score, by: 15 }

win_conditions:
  - id: claim_ember
    conditions: [ { visited: ember_chamber } ]
    ending: ending_victory

endings:
  # bug_0275: reactive epilogues — the terminal-state sibling of this pack's already
  # fully-reactive rooms/objects. A fresh blind MCP playtester (cold_forge, seeds 17 &
  # 3, ai-runs/2026-06-05T06-39-54-147Z/playtest.md §5) found the pack bug-free but
  # noted that thorough exploration — hearing the lantern-spirit's tale of the forge's
  # last master, finding his cell, reading his epitaph — earns the SAME epilogue as a
  # rusher who skipped it all: "a thorough player gets no payoff for exploring the
  # dialogue and the west cell." The optional founder arc is the pack's whole second
  # branch, and its emotional point — you are carrying out the dead master's last work,
  # fulfilling the plea cut into his stone ("Carry the Heart out, and the forge is not
  # wholly dead") — was invisible at the one moment it should land. These variants pay
  # the curiosity off: a player who learned the master's story (visited his cell OR
  # heard the spirit name him) gets an ending that knows it, on BOTH the win and the
  # death (the reactive-ending-blindness class — if one terminal reframes by knowledge,
  # every terminal reachable on both an informed and an uninformed path must too). The
  # `knows_founder` predicate fires on either path to the knowledge; the base epilogue
  # stays for the player who skipped both (still reachable — the under-armed straight-to-
  # the-fight route never visits the cell or asks the spirit). No score/flag/quest/exit
  # change: prose-only, and prep stays about survival, not points (the pack's design).
  - id: ending_victory
    title: "Keeper of the Ember"
    variants:
      - when:
          - any_of:
              - { visited: founder_cell }
              - { has_flag: heard_founder }
        text: >
          You lift the Ember-Heart from its plinth and the cold of the dead forge
          breaks before it. You know now whose fire this was — the last master's,
          banked into one everlasting coal and left under guard against exactly this
          hour. Warmth climbs the stair ahead of you, anvil by anvil, and you carry
          his Heart up into the world above: the forge is not wholly dead, and you are
          the hand that kept it so.
    text: >
      You lift the Ember-Heart from its plinth and the cold of the dead forge
      breaks before it. Warmth climbs the stair ahead of you, anvil by anvil, and
      by the time you reach the surface the old forge is breathing again.
    death: false
  - id: ending_fallen
    title: "Cold on the Cinders"
    variants:
      - when:
          - any_of:
              - { visited: founder_cell }
              - { has_flag: heard_founder }
        text: >
          The sentinel's last blow drops you among the dead anvils, and the grave
          chill closes over you. You came to know the last master's story before the
          end — how he too came down into this cold and never climbed back out — and
          now you keep him company in it. The forge keeps its cold, and its Heart, and
          one more set of bones the deep chill will hold whole, a while longer.
    text: >
      The sentinel's last blow drops you among the dead anvils, and the grave
      chill closes over you. Only as the cold takes hold do the forge's warnings
      finish their work: the spirit's borrowed warmth and the dead master's
      cold-iron plate were not ornaments to the tale, but the edges that might
      have kept you standing. The forge keeps its Heart, and waits for a warmer
      hand that comes down armed with every lesson it can find.
    death: true
