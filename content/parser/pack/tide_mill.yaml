# The Tide-Mill — a Zork-style parser pack (Stage 2/3), the project's 16TH pack and
# 5TH PARSER pack. Its breadth contribution is STRUCTURAL, not just another setting:
# it is the FIRST parser pack whose win path is NON-LINEAR. Every existing parser pack
# (sealed_crypt, alchemists_tower, friars_postern, lamplighters_round) is a LINEAR CHAIN
# — read the clue, then do A, then B, then C, then choose a fork. That linearity is the
# one standing note every fresh blind pass on the (otherwise clean) content set keeps
# returning ("the win path is essentially linear once you've read the notice";
# [[content-polish-backlog-exhausted]]). This pack spends that note as its brief: the
# climax is gated by a true dependency DAG, not a chain — TWO INDEPENDENT sub-puzzles
# that can be solved in EITHER ORDER and BOTH gate the finale.
#
# Goal: you are the miller's hand at a tide-mill on a falling tide, and a fishing boat
# is caught above the weir with the water dropping out from under it. The great sea-gate
# must be wound up to let the boat down through before it grounds and breaks — but the
# gate is driven off the mill-wheel, and the wheel will not turn until BOTH of two
# separate faults are put right:
#   • the head-race sluice is choked solid with weed and wrack (cut it clear with the
#     billhook from the tool-shed → sluice_clear, +10), AND
#   • the wheel's brake-pawl is dropped and locked (free it with the crow-bar from the
#     tool-shed → pawl_free, +10).
# Neither depends on the other; do them in any order. Only with BOTH done will the wheel
# bite, and you can wind the sea-gate up (the +20 climax) and go down to the staith to
# wave the boat through (ending_saved, the win).
#
#   counting_nook ─W─ mill_house ─N─ wheel_room ─W─ head_race
#     (the miller's     (start;        (the HUB:        (the choked sluice → +10;
#      night takings →    millboard      brake-pawl → +10; the rotten flood-hatch →
#      ending_thief)      clue, +5)      sea-gate winch;   ending_drowned, a DEATH)
#                                        crank-handle)
#                                          │ E: tool_shed (billhook + crow-bar)
#                                          │ down**: the_staith (WIN, ending_saved)
#
#   (** down to the_staith gated on gate_up — the gate must be wound up first)
#
# The two BAD forks deliberately use DIFFERENT mechanisms from lamplighters_round's
# one-store-key-opens-all device, so the pack does not read as a re-skin:
#   • GREED (ending_thief, non-death): the miller's night takings sit in a coin-bag in
#     the counting-nook. It is a key-free `take_effects` end_game (bug_0107) — the act of
#     POCKETING it walks you off the job a thief, the boat left to break. Telegraphed in
#     its examine (whose money, and that taking it is the choice itself), per the bug_0123
#     "never an ambush" discipline.
#   • DEATH (ending_drowned, the failure pole): the head-race's old flood-hatch is rotten
#     and the wheel-pit drops away below it. The panicked shortcut — lever the hatch by
#     hand to let the water through instead of doing the wheel properly — drops you into
#     the race under the wheel. It is the crow-bar (the very tool you need for the pawl)
#     turned to the wrong use: an item-on-target USE (`lever flood-hatch with crow-bar`),
#     so the thing that frees the wheel is the thing that drowns you if you force the
#     hatch with it. NEVER an ambush (§8.7, bug_0123/0130): the millboard AND the hatch's
#     own examine both say plainly the staging is rotten and the pit is under it.
#     Recoverable via an earlier save (§8.7). Not a win_condition ending, so WIN_IS_DEATH
#     cannot fire and ending_saved stays the sole winnable ending.
#
# Score (max 45): read the millboard (+5, the §17 clue naming the two faults, the tools,
# and the rotten hatch never to force), clear the sluice (+10), free the pawl (+10), and
# wind the sea-gate (+20 — the climax). The two +10 milestones are order-independent; the
# +20 hard-requires BOTH flags. Each rides a one-time gated step (one-shot via its own
# not_flag), so score cannot be farmed, and the honest win path reaches the full 45. No
# score rides the greed or death fork (the bracket-completeness rule the score-economy
# solver proves: reachable max == declared max, and it == the win path's total).

meta:
  id: tide_mill_v1
  title: "The Tide-Mill"
  start_room: mill_house
  flags_init: []
  vars_init: {}
  max_score: 45

rooms:
  - id: mill_house
    name: "The Mill-House"
    description: >
      The floor of the tide-mill, all dust and the smell of old grain and salt. A
      millboard hangs by the door with the standing orders chalked on it. Through the
      north arch the wheel-room stands over the race; a low door east opens on the
      miller's counting-nook. Out beyond the weir, somewhere in the falling dark, a boat
      is caught above the water with the tide going out from under it.
    objects: [millboard]
    exits:
      - { direction: north, to: wheel_room }
      - { direction: east, to: counting_nook }

  - id: counting_nook
    name: "The Counting-Nook"
    description: >
      A cramped nook off the mill-floor where the miller keeps his tallies and his cash.
      A leather coin-bag sits on the desk, heavy with the week's toll-takings, left out
      against the morning's reckoning. The mill-floor is back to the west.
    objects: [coin_bag]
    exits:
      - { direction: west, to: mill_house }

  - id: wheel_room
    name: "The Wheel-Room"
    description: >
      The great undershot wheel stands black and still over the head-race, where it
      should be turning the gear that drives the sea-gate. It will not stir: its
      brake-pawl is dropped and locked into the gear, and the race that should drive it
      runs choked and slack. The iron sea-gate winch stands by the wheel with a socket
      for its crank-handle, and the handle itself hangs on a peg beside it. The head-race
      opens west; the tool-shed is east; the mill-floor is back to the south.
    variants:
      - when: [{ has_flag: gate_up }]
        text: >
          The great wheel turning strong and steady at last, biting the freed race and
          driving the gear with it, and the sea-gate winch wound fully up — the gate
          stands open below and the held water is going down through it in a long brown
          slide. The way down to the staith drops away to the north; the head-race opens
          west, the tool-shed is east, the mill-floor is back to the south.
    objects: [brake_pawl, sea_winch, crank_handle]
    exits:
      - { direction: south, to: mill_house }
      - { direction: west, to: head_race }
      - { direction: east, to: tool_shed }
      - direction: down
        to: the_staith
        conditions: [{ has_flag: gate_up }]
        locked_msg: "The sea-gate is still shut and the staith below is dry mud and dark; you'll not go down to wave the boat through until the gate is wound up and the water back over the ground."

  - id: head_race
    name: "The Head-Race"
    description: >
      The stone channel that should drive the wheel, and it is choked solid — a winter's
      weed and wrack and a drowned bough jammed across it so the water stands slack and
      will not run. At the channel's head an old flood-hatch sags in its frame, its
      staging gone soft and rotten, and below it the wheel-pit drops away black and deep.
      The wheel-room is back to the east.
    variants:
      - when: [{ has_flag: sluice_clear }]
        text: >
          The stone channel running free and full at last, the weed and the drowned bough
          cut away and the water sliding fast and strong down onto the wheel. The old
          flood-hatch still sags rotten in its frame at the head, the wheel-pit black
          below it. The wheel-room is back to the east.
    objects: [choked_sluice, flood_hatch]
    exits:
      - { direction: east, to: wheel_room }

  - id: tool_shed
    name: "The Tool-Shed"
    description: >
      A lean-to of tarred board against the mill's flank, hung with the gear of the
      miller's trade. A long-hafted billhook leans in the corner for cutting weed off the
      race, and a heavy crow-bar hangs on two nails — the bar for shifting a locked pawl
      or a jammed gate. The wheel-room is back to the west.
    objects: [billhook, crow_bar]
    exits:
      - { direction: west, to: wheel_room }

  - id: the_staith
    name: "The Staith, Water Up"
    description: >
      The little staith below the mill, and the held water sliding back over the ground
      where a moment ago was only dark mud. Out above the weir the caught boat lifts on
      the rising flow, finds its keel, and comes down easy through the open sea-gate into
      the deep water, the man at her tiller lifting a hand to you as she passes. The way
      back up to the wheel-room is behind you.
    exits:
      - { direction: up, to: wheel_room }

objects:
  - id: millboard
    name: "millboard"
    aliases: [board, notice, orders, standing orders, chalk, sign]
    description: "A slate millboard by the door, the miller's standing orders chalked on it for whatever hand is on the night."
    read_text: >
      The orders read: 'TO WIND THE SEA-GATE THE WHEEL MUST RUN, AND IT WILL NOT RUN TILL
      BOTH FAULTS ARE PUT RIGHT — CUT THE CHOKED HEAD-RACE CLEAR WITH THE BILLHOOK, AND
      FREE THE DROPPED BRAKE-PAWL WITH THE CROW-BAR (BOTH ARE IN THE TOOL-SHED; EITHER
      MAY BE DONE FIRST). THEN WIND THE GATE UP WITH THE CRANK-HANDLE AND GO DOWN TO THE
      STAITH. AND MIND: NEVER LEVER THE OLD FLOOD-HATCH — THE STAGING IS ROTTEN AND THE
      WHEEL-PIT IS STRAIGHT UNDER IT. THE TAKINGS IN THE NOOK ARE THE MILLER'S, NOT YOURS.'
    interactions:
      - verb: READ
        target: millboard
        conditions: [{ not_flag: read_board }]
        effects:
          - set_flag: read_board
          - inc_var: { name: score, by: 5 }

  - id: coin_bag
    name: "coin-bag"
    aliases: [bag, coin bag, purse, takings, toll, money, silver, cash]
    # The GREED fork (non-death), a KEY-FREE take_effects end_game (bug_0107) — distinct
    # from lamplighters' key-unlock forks. The act of POCKETING the miller's takings is
    # the choice itself: it fires end_game on the TAKE, mutually exclusive with the honest
    # job, and the boat is left to break behind you. Telegraphed in the examine (bug_0123:
    # whose money it is, and that lifting it is the act, not a step toward the gate). Not
    # quest_critical and on no win path; awards no score (max_score stays 45).
    description: >
      A fat leather coin-bag on the counting-desk, the week's toll-takings in it — more
      silver than your wage sees in a season, the miller's money and not a penny of it
      yours. To lift it is to put it in your coat and walk off the mill into the dark, the
      gate unwound and the boat above the weir left to the falling tide; there is no taking
      it and staying an honest hand the same night.
    takeable: true
    take_effects:
      - end_game: ending_thief

  - id: billhook
    name: "billhook"
    aliases: [hook, bill, bill-hook, blade, hedging-hook]
    description: "A long-hafted billhook off the tool-shed wall, the curved blade kept keen for cutting weed and wrack off the race."
    takeable: true
    quest_critical: true

  - id: crow_bar
    name: "crow-bar"
    aliases: [crowbar, bar, crow bar, iron bar, lever, pry-bar, prybar]
    description: >
      A heavy iron crow-bar off the tool-shed nails — the right weight to lever a dropped
      brake-pawl up out of its gear. It would shift the rotten flood-hatch too; but the
      board, and the look of the staging, both say plainly that is the one thing in here
      not to do.
    takeable: true
    quest_critical: true

  - id: crank_handle
    name: "crank-handle"
    aliases: [handle, crank, winding-handle, winch-handle]
    description: "The sea-gate's crank-handle off its peg by the winch — a forged iron crank that drops into the winch-socket to wind the gate, once the wheel is driving the gear."
    takeable: true
    quest_critical: true

  - id: choked_sluice
    name: "choked head-race"
    aliases: [sluice, race, head-race, head race, weed, wrack, bough, channel, choke]
    # Sub-puzzle A (order-independent with the pawl): cut the choke clear with the
    # billhook. One-shot via not_flag sluice_clear; awards +10 and frees the race (the
    # reactive head_race/object variants then read as running water). An item-on-target
    # USE with the natural command_verb `cut` (`cut head-race with billhook`), the
    # bug_0078/0210 phrasing-matches-prose discipline.
    description: >
      The head-race choked solid — a winter's weed and wrack and a drowned bough jammed
      across the channel so the water stands slack and dead and the wheel gets no drive
      from it. The long billhook would cut the whole mess clear if you set it to work.
    variants:
      - when: [{ has_flag: sluice_clear }]
        text: "The head-race running free and full where the choke was cut away, the water sliding fast and strong down onto the wheel."
    interactions:
      - verb: USE
        item: billhook
        target: choked_sluice
        command_verb: cut
        command_template: "cut {target} with {item}"
        conditions: [{ has_item: billhook }, { not_flag: sluice_clear }]
        effects:
          - set_flag: sluice_clear
          - inc_var: { name: score, by: 10 }
          - add_journal: "You cut the weed and the drowned bough clear of the head-race, and the water ran free down onto the wheel."
          - narrate: >
              You set the billhook into the matted weed and the drowned bough and cut and
              haul, cut and haul, until the last of the choke sloughs away downstream — and
              the held water comes through with a rush and slides fast and strong down onto
              the wheel at last. One fault of the two is put right.

  - id: brake_pawl
    name: "brake-pawl"
    aliases: [pawl, brake, catch, dog, ratchet, lock]
    # Sub-puzzle B (order-independent with the sluice): lever the dropped pawl up out of
    # the gear with the crow-bar. One-shot via not_flag pawl_free; awards +10 and unlocks
    # the wheel. An item-on-target USE with command_verb `free` (`free brake-pawl with
    # crow-bar`) — a DIFFERENT natural verb from the death fork's `lever`, so the two
    # crow-bar uses never collide in the parser (customUseByVerb keys on the verb).
    description: >
      The wheel's brake-pawl, a great iron catch dropped down hard into the drive-gear to
      hold the wheel still — and locked there now, gone stiff in its pivot. While it sits
      in the gear the wheel cannot turn. The crow-bar is the weight to lever it back up
      and out.
    variants:
      - when: [{ has_flag: pawl_free }]
        text: "The brake-pawl levered up and clear of the drive-gear and pinned back out of the way; the wheel is free to turn."
    interactions:
      - verb: USE
        item: crow_bar
        target: brake_pawl
        command_verb: free
        command_template: "free {target} with {item}"
        conditions: [{ has_item: crow_bar }, { not_flag: pawl_free }]
        effects:
          - set_flag: pawl_free
          - inc_var: { name: score, by: 10 }
          - add_journal: "You levered the dropped brake-pawl up out of the drive-gear with the crow-bar, and the wheel came free to turn."
          - narrate: >
              You set the crow-bar under the dropped pawl and throw your weight on it, and
              with a screech of cold iron the catch lifts up out of the gear and pins back
              clear. The wheel stands free to turn now. One fault of the two is put right.

  - id: flood_hatch
    name: "flood-hatch"
    aliases: [hatch, flood hatch, floodgate, flood-gate, staging, trap]
    # The DEATH pole (death: true), reached by the panicked shortcut — levering the rotten
    # hatch by hand instead of running the wheel. An item-on-target USE keyed on the
    # crow-bar with command_verb `lever` (DISTINCT from the pawl's `free`, so no parser
    # collision). NEVER an ambush (§8.7, bug_0123/0130): the millboard AND this examine
    # both say plainly the staging is rotten and the wheel-pit is straight under it.
    # Recoverable via load. Awards no score, sets no flag, opens no exit; not a
    # win_condition ending, so WIN_IS_DEATH cannot fire and ending_saved stays sole win.
    description: >
      The old flood-hatch sagging in its frame at the head of the race, meant once to dump
      the held water straight down the wheel-pit in a flood. Its staging is gone soft and
      black with rot, and the pit drops away deep and dark right under where you'd have to
      stand to lever it. The board was plain about this one: it is the quick way to let the
      water through, and the quick way down into the race under the wheel.
    interactions:
      - verb: USE
        item: crow_bar
        target: flood_hatch
        command_verb: lever
        command_template: "lever {target} with {item}"
        conditions: [{ has_item: crow_bar }]
        effects:
          - end_game: ending_drowned

  - id: sea_winch
    name: "sea-gate winch"
    aliases: [winch, gate, sea-gate, sea gate, socket, capstan]
    # The CLIMAX (+20): wind the sea-gate up — but ONLY once BOTH faults are put right.
    # This is the non-linear keystone: an item-on-target USE (`wind sea-gate winch with
    # crank-handle`) HARD-gated on has_flag sluice_clear AND has_flag pawl_free (the two
    # order-independent sub-puzzles), plus not_flag gate_up for one-shot. With either flag
    # missing the wheel has no drive and the crank will not turn, so the interaction does
    # not resolve and the +20 cannot be taken out of order or twice. On success it sets
    # gate_up, awards the +20, and unlocks the down-exit to the staith (the win room).
    description: >
      The iron sea-gate winch beside the wheel, geared off the wheel's own drive so the
      turning wheel does the lifting — set the crank-handle in its socket and wind, and the
      great gate goes up and lets the held water down to the staith. But the crank will not
      turn a tooth while the wheel stands still: the race must run AND the pawl be lifted
      first, both, or there is no drive in the gear to wind against.
    variants:
      - when: [{ has_flag: gate_up }]
        text: "The sea-gate winch wound fully up, the gate standing open below and the held water going down through it in a long brown slide to the staith."
    interactions:
      - verb: USE
        item: crank_handle
        target: sea_winch
        command_verb: wind
        command_template: "wind {target} with {item}"
        conditions:
          - { has_item: crank_handle }
          - { has_flag: sluice_clear }
          - { has_flag: pawl_free }
          - { not_flag: gate_up }
        effects:
          - set_flag: gate_up
          - inc_var: { name: score, by: 20 }
          - unlock_exit: { from: wheel_room, to: the_staith }
          - add_journal: "With the race running and the pawl freed, the wheel drove the gear, and you wound the sea-gate up and let the held water down to the staith."
          - narrate: >
              You drop the crank-handle into the winch-socket and lean on it — and this
              time the gear bites, the freed wheel taking the running water and driving
              the winch round under your hands. Tooth by tooth the great sea-gate lifts,
              and the held water goes down through it in a long brown slide to the staith
              below, where the caught boat will float at last. The way down opens to the
              north.

win_conditions:
  # Locomotion win (sealed_crypt's catacombs / friars_postern's night_street /
  # lamplighters_round's the_strand): reaching the staith fires the win via the engine's
  # post-action checkWin. `visited: the_staith` is KEPT deliberately — the parser
  # validator derives its soft-lock guard from the rooms named in win conditions
  # (alchemists_tower note, bug_0056), and the_staith is reachable only via the `gate_up`
  # down-exit, so the only way to satisfy this is to have wound the gate first (which in
  # turn required BOTH sub-puzzles). SCORE_PEAKS does not fire on a locomotion win.
  - id: reach_staith
    conditions: [{ visited: the_staith }]
    ending: ending_saved

endings:
  - id: ending_saved
    title: "The Boat Comes Down"
    text: >
      The boat comes down easy through the open gate on the rising water, finds the deep
      channel, and slides past the staith with her crew safe aboard — and the man at her
      tiller lifts a hand to you out of the dark before the night takes her downriver. You
      put the faults right and ran the wheel the way the mill was built to be run, and the
      gate held the water for you when it had to. The miller will find his takings where he
      left them, and a hand worth keeping on the night shift. *** You have won. ***
  - id: ending_thief
    title: "The Week's Takings"
    # Non-death greed fork. The player lives and walks free, the week's toll-money in their
    # coat — but the gate unwound and the boat left above the weir. NOT a win_condition
    # ending (fires only on the coin-bag's take_effects end_game), so WIN_IS_DEATH cannot
    # apply and ending_saved stays the sole winnable ending.
    text: >
      The miller's silver is a good cold weight in your coat all the long walk off the mill
      in the dark, and it will keep you a while. But the sea-gate stands unwound behind you
      and the boat is still caught above the weir with the water going out from under her,
      and you have made yourself not to listen for the sound she will make on the stones
      when the last of it goes. Some nights, on the falling tide, you will hear it anyway.
      *** You have taken the takings. ***
  - id: ending_drowned
    title: "Under the Wheel"
    # The DEATH pole (death: true), reached only by levering the rotten flood-hatch with
    # the crow-bar. Recoverable via an earlier save (§8.7). Not a win_condition ending, so
    # WIN_IS_DEATH cannot fire and ending_saved remains the sole winnable ending.
    text: >
      You set the bar to the rotten hatch the way a man does when he is frightened and in
      a hurry, and the soft staging gave all at once under your feet — the board had said
      it would, and the look of it had said it would, and you levered it anyway. The held
      water came through the broken hatch in a black rush and took you down into the
      wheel-pit with it, and the great dark wheel was the last thing over you. They will
      find the boat in the morning, safe enough, grounded and whole on the fallen tide.
      They will be longer finding you. *** You have died. ***
    death: true
