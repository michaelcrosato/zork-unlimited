# The Dyer's Weight — a Zork-style parser pack (Stage 3).
#
# THE TWELFTH PARSER PACK. First pack with a TWO-STAGE ACID TEST topology —
# two USE interactions with the same vial on different targets (raw adulterant
# first, finished product second). First pack where USE triggers an olfactory
# narrate (copper_tongs lifts the cap of the vitriol jar; the searcher smells
# the copperas taint). First pack where the same tool (copper_tongs) serves
# both an investigative interaction and a tension beat.
#
# Prior parser pack evidence modes:
#   scriveners_proof:  COMPARE verb (documentary), magnifier (perception tool)
#   gaugers_register:  SHOW verb (persuasion/NPC), grain measurement
#   weighmasters_round: USE scale (instrumental weight)
#   collectors_warrant: LISTEN (noise detection)
#
# TWO-STAGE ACID TEST — novel evidence topology:
#   Stage 1: USE acid_vial ON chalk_casks (store_room) — raw adulterant test.
#     A drop of aqua regia on the chalk: the powder fizzes (calcium carbonate
#     + nitric acid → CO2). This confirms the white powder IS chalk. Sets
#     found_chalk_stock (+5). command_verb: test.
#   Stage 2: USE acid_vial ON dye_vat (dye_house) — finished product test.
#     Same acid on the vat contents: fizzes again. The product contains chalk.
#     Requires found_chalk_stock (epistemic: you know to test for chalk because
#     stage 1 confirmed the raw material). Sets proved_adulteration (+10).
#     command_verb: pour. Same two-precondition architecture as
#     scriveners_proof's COMPARE (has_item + has_flag): physical possession of
#     the vial + knowledge that chalk fizzes.
#
# OLFACTORY DETECTION — USE copper_tongs ON vitriol_jar: the tongs allow the
# searcher to safely lift the cloth cap of the copperas jar without skin
# contact. Exposing the contents reveals the taint: sulfurous, acidic, the
# signature of iron vitriol (copperas). First parser pack where a USE triggers
# an olfactory narrate (prior USEs: physical action, measurement, documentary
# comparison). The tool enables a sensory act rather than a physical one.
#
# SAME TOOL, TWO USES — copper_tongs:
#   USE copper_tongs ON vitriol_jar → olfactory detection (+5, found_vitriol_taint)
#   USE copper_tongs ON drain_hole  → tension beat (skill_check, CONVERGENT)
# No prior parser pack uses the same item for both a scored interaction and a
# tension beat. The tongs read as the searcher's primary field instrument.
#
# Setting: Southwark, London, 1696. Jonas Meredith runs a dyehouse off the
# main road. A merchant's complaint: 200 lb of "true indigo" cake he bought
# from Meredith cured lighter than stated and bled the wrong colour in water.
# The Dyers' Company has authorised a formal search. The player is the
# Company's sworn searcher.
#
# Map:
#
#   guild_hall (WIN — gated: has_item indigo_cakes AND has_flag proved_adulteration)
#        │ N*
#   dye_house (start; order_ledger; dye_vat; indigo_cakes; copper_tongs)
#        │ E           │ S
#   store_room      back_passage (PARTIAL ending — left without completing proof)
#   (chalk_casks; vitriol_jar; acid_vial; drain_hole; payment_fold)
#
# Score (max 45):
#   +5   READ order_ledger          (dye_house — volume anomaly establishes motive)
#   +5   USE copper_tongs ON vitriol_jar (store_room — olfactory: copperas taint)
#   +5   USE acid_vial ON chalk_casks   (store_room — chalk confirmed with acid test)
#   +10  USE acid_vial ON dye_vat       (dye_house — product confirmed: chalk in vat)
#   +20  TAKE indigo_cakes              (dye_house — evidence secured for the Hall)
#
# Endings (3):
#   ending_seized    — WIN (non-death): guild_hall visited
#   ending_abandoned — PARTIAL (non-death): back_passage visited
#   ending_bought    — BAD (non-death, instant end_game): POCKET payment_fold
#
# Tension beat: USE copper_tongs ON drain_hole (store_room). d20 + steadiness (3)
# vs DC 11. CONVERGENT — gates no score, exit, or ending. One-shot on success;
# failure re-tryable. The scriveners_proof / sealed_crypt shape.
#
# ending_bought telegraphed twice (§17 discipline):
#   source 1: payment_fold description names the heading and amount explicitly
#             ("For the Searcher's Patience", five shillings — clearly a bribe)
#   source 2: READ order_ledger read_text notes a "searcher's relief" payment
#             of twelve shillings over two quarters — prior officers were bought.

meta:
  id: dyers_weight_v1
  title: "The Dyer's Weight"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Dye House Quarter"
    quest: "catch the false dye weight"
    role: "guild investigator"
    connection: "The dye houses color Charterhaven cloth; a corrupt weight stains the whole guild chain."
  start_room: dye_house
  flags_init: []
  vars_init: { steadiness: 3 }
  max_score: 45

rooms:
  - id: dye_house
    name: "The Dye House"
    description: >
      Meredith's dye house: low-ceilinged, the walls stained blue-black to the
      height of a man's shoulder. A wide copper vat dominates the far wall, its
      contents a dull indigo-dark. Beside it, a curing rack holds a dozen
      finished indigo cakes, each stamped with Meredith's mark — round, the
      size of a wheel-cheese. An order ledger sits open on the counting shelf
      above the door. Long copper tongs hang by the vat. The store room lies
      east; the door to the north is shut; the back passage runs south.
    variants:
      - when:
          - has_flag: proved_adulteration
          - has_item: indigo_cakes
          - has_item: copper_tongs
        text: >
          The dye house, the second acid test done. The vat foamed along the
          copper rim where you poured — chalk in the finished product, the same
          reaction as the casks. The curing rack and the hook by the vat are
          bare now; the indigo cakes and copper tongs are with you. The north
          door is clear; the store room lies east.
      - when:
          - has_flag: proved_adulteration
          - has_item: indigo_cakes
        text: >
          The dye house, the second acid test done. The vat foamed along the
          copper rim where you poured — chalk in the finished product, the same
          reaction as the casks. The curing rack is bare where the indigo cakes
          were before you took them; long copper tongs still hang by the vat.
          The north door is clear; the store room lies east.
      - when:
          - has_flag: proved_adulteration
          - has_item: copper_tongs
        text: >
          The dye house, the second acid test done. The vat foamed along the
          copper rim where you poured — chalk in the finished product, the same
          reaction as the casks. The indigo cakes on the rack are the product
          of that vat, and the hook by the vat is bare where the copper tongs
          hung before you took them. The north door still waits on the physical
          evidence: take the cakes from the rack before you report to the
          Company. The store room lies east.
      - when: [{ has_flag: proved_adulteration }]
        text: >
          The dye house, the second acid test done. The vat foamed along the
