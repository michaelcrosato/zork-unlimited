          the door to the north is shut; the back passage runs south.
    objects: [order_ledger, dye_vat, indigo_cakes, copper_tongs]
    exits:
      - direction: north
        to: guild_hall
        conditions: [{ has_item: indigo_cakes }, { has_flag: proved_adulteration }]
        locked_msg: >
          The north door stands shut. The Company will not enter a seizure
          without both a cake from the rack and the two-stage acid proof:
          secure the cakes, take the vial from the store room east, test the
          white casks there first, then pour the vial on the vat.
      - { direction: east, to: store_room }
      - { direction: south, to: back_passage }

  - id: store_room
    name: "The Store Room"
    description: >
      A low-roofed store: sacks of alum along the left wall, a row of sealed
      casks to the right, an iron shelf above a stone drain in the floor. The
      casks are unlabelled, their heads sealed with pine resin. A glazed jar
      stands apart on the shelf, cloth-tied at the cap — it carries a different
      smell than the room itself, something sharper and more acidic. The dye
      house lies west.
    objects: [chalk_casks, vitriol_jar, acid_vial, drain_hole, payment_fold]
    exits:
      - { direction: west, to: dye_house }

  - id: guild_hall
    name: "The Dyers' Company Hall"
    description: >
      The Company Hall on Thames Street: the weighing room already occupied
      when you arrive. You set the indigo cakes and the order ledger before
      the Deputy Warden and lay out the evidence in order — the chalk casks,
      the copperas jar, the two acid tests. The raw chalk fizzes; the vat
      contents fizz. The cakes are heavier than their stated weight. The
      weight is explained.

  - id: back_passage
    name: "The Back Passage"
    description: >
      A covered passage behind the dyehouse row, running toward the alley.
      You stepped out of Meredith's back door and the latch clicked behind
      you. Whatever you have in hand is what you carry to the morning.

objects:
  # ── Dye house ─────────────────────────────────────────────────────────────────
  - id: order_ledger
    name: "order ledger"
    aliases: [ledger, book, orders, records, order book, accounts, order records,
              counting ledger, account book, business ledger, counting book,
              ledger book, accounts ledger, company ledger, the ledger]
    description: >
      The order ledger open on the counting shelf: columns of names, dates,
      weights, and prices. The last quarter shows 200 lb of indigo cake sold
      to four merchants — a volume that would take a vat of Meredith's size
      three full months to produce at standard cure times.
    read_text: >
      The ledger is orderly and precise. Last quarter: 200 lb at twelve pence
      per lb — sound money for true indigo. Cure times beside each batch are
      listed as twelve days; the vat holds 40 lb at most at that cure time.
      Six batches in a quarter is only possible if the cure is shortened, or
      if the cakes are heavier than their true weight. At the foot of the
      accounts, under "quarterly outlay," a line reads: "Searcher's relief —
      6s per quarter, two quarters, 12s total." Meredith has been paying
      someone to look away. He has been doing it long enough to make it a
      line item.
    interactions:
      - verb: READ
        target: order_ledger
        conditions: [{ not_flag: read_ledger }]
        effects:
          - set_flag: read_ledger
          - inc_var: { name: score, by: 5 }

  - id: dye_vat
    name: "dye vat"
    aliases: [vat, copper vat, dye copper, copper, dyeing vat, vat contents,
              copper pot, copper basin, dye pot, indigo vat, vat of dye, the vat,
              copper vessel, large vat, dye vessel]
    description: >
      The wide copper vat, its contents a dark indigo-blue. The surface is
      still and even; the colour looks right at first. The vat is cold —
      no fire in the furnace beneath it — meaning whatever is in it is
      already cured, or was never properly boiled.
    variants:
      - when: [{ has_flag: proved_adulteration }]
        text: >
          The dye vat, the second acid test residue visible along the copper
          rim: a pale dried line where the foaming chalk settled against the
          metal. The chalk in the vat matches the chalk in the casks. The
          finished product is adulterated.
      - when:
          - has_item: acid_vial
          - not_flag: found_chalk_stock
        text: >
          The wide copper vat, its contents a dark indigo-blue. You have the
          Company vial in hand, but a vat reaction will mean little until you
          know how the suspicious white casks behave under the acid. Test the
          casks in the store room east first; then pour the vial on the vat.
    interactions:
      # STAGE 2 — POUR. USE acid_vial ON dye_vat. command_verb: pour produces
      # "pour acid vial on dye vat." Second stage of the two-stage acid test.
      # Requires:
      #   has_item: acid_vial      (physical: you are actually pouring)
      #   has_flag: found_chalk_stock (epistemic: stage 1 confirmed chalk fizzes;
      #                             you know what you are testing for in the vat)
      # Without stage 1, you cannot interpret the vat's reaction. Same two-
      # precondition gate as scriveners_proof's COMPARE.
      - verb: USE
        item: acid_vial
        target: dye_vat
        command_verb: pour
        command_template: "pour {item} on {target}"
        conditions:
          - has_item: acid_vial
          - has_flag: found_chalk_stock
          - not_flag: proved_adulteration
        effects:
          - set_flag: proved_adulteration
          - inc_var: { name: score, by: 10 }
          - narrate: >
              You uncork the acid vial and tip a few drops along the copper
              rim of the vat. The reaction is immediate: the surface fizzes
              where the acid touches, small bubbles breaking along a pale film
              that forms against the copper — the same reaction as the chalk
              casks, the same gas, the same cause. The vat contents have been
              cut with chalk. You have tested the raw material and confirmed
              the fizz; you have tested the finished product and it fizzes
              too. The adulteration is proved in two stages, each one
              confirmation of the other. You recap the vial.

  - id: indigo_cakes
    name: "indigo cakes"
    aliases: [cakes, dye cakes, indigo, finished cakes, stamped cakes, rack cakes,
              cake, indigo cake, finished indigo, dye sample, cake sample, blue cakes,
              stamped indigo, meredith cakes, cured cakes, the cakes, wheel cakes]
    description: >
      A dozen finished indigo cakes on the curing rack, each stamped with
      Meredith's mark and the stated weight — 1 lb each. They are heavier
      than a pound of true indigo should be; you feel it when you lift one.
      The colour looks right on the surface, but a cake broken at the edge
      shows a slight grey-white cast in its interior. Chalk does not take
      indigo colour evenly to the core.
    variants:
      - when: [{ has_flag: proved_adulteration }]
        text: >
          The indigo cakes, the acid test confirmed. The grey-white interior
          of the broken cake is chalk that never fully took the colour. The
          cakes are heavier than true indigo because chalk is heavier than
          indigo. Stamped with Meredith's mark and sold at the true-indigo
          price.
    takeable: true
    take_effects:
      - inc_var: { name: score, by: 20 }

  - id: copper_tongs
    name: "copper tongs"
    aliases: [tongs, copper tool, vat tongs, dye tongs, long tongs, copper handle,
              tool, dyeing tongs, the tongs, rack tongs, copper implement]
    description: >
      Long copper tongs hanging by the vat — used to move cakes during curing
      without skin contact. The tips are stained dark blue. Useful for handling
      items the searcher should not touch directly: a copperas jar, a fouled
      drain grate.
    takeable: true

  # ── Store room ────────────────────────────────────────────────────────────────
  - id: chalk_casks
    name: "chalk casks"
    aliases: [casks, chalk, chalk barrels, white casks, chalk barrel, cask, barrel,
              chalk dust, white powder, sealed casks, sealed barrel, chalk supply,
              chalk stock, adulterant, white substance, the casks, powder casks]
    description: >
      Four small wooden casks along the right wall, sealed with pine resin.
      They are unlabelled. One cask is lighter than the others — recently
      opened and partly used. White powder is visible in the gap where the
      head was reseated.
    interactions:
      # STAGE 1 — ACID TEST on raw material. USE acid_vial ON chalk_casks.
      # command_verb: test produces "test chalk casks with acid vial."
      # A drop of aqua regia on the white powder: fizzes immediately.
      # Calcium carbonate + nitric acid → CO2. Sets found_chalk_stock (+5).
      # This is the epistemic prerequisite for stage 2 (the dye_vat POUR):
      # the searcher now knows chalk fizzes with this acid, and can recognise
      # the same reaction in the vat contents as proof of adulteration.
      - verb: USE
        item: acid_vial
        target: chalk_casks
        command_verb: test
        command_template: "test {target} with {item}"
        conditions:
          - has_item: acid_vial
          - not_flag: found_chalk_stock
        effects:
          - set_flag: found_chalk_stock
          - inc_var: { name: score, by: 5 }
          - narrate: >
              You work the head of the lighter cask loose and tip a single
              drop of the acid onto the white powder inside. The reaction is
              immediate: the powder fizzes, small bubbles forming where the
              acid touches it and releasing a faint sharp smell of gas.
              Calcium carbonate. Chalk. The standard field confirmation: chalk
              reacts with nitric acid to produce carbon dioxide; pure indigo
              does not react at all. The cask contains chalk, and you now
              know exactly what reaction you are looking for in the dye vat.

  - id: vitriol_jar
    name: "vitriol jar"
    aliases: [jar, glazed jar, copperas jar, vitriol, copperas, iron vitriol,
              green vitriol, iron jar, cloth-tied jar, the jar, sharp jar,
              ceramic jar, the copperas, vitriol pot]
    description: >
      A glazed ceramic jar, cloth-tied at the cap. The cloth has darkened
      where a trace of the contents has worked through over time. It is
      lighter than it looks — nearly empty. Do not handle the cap barehanded:
      the copper tongs from the vat would lift it safely.
    interactions:
      # OLFACTORY DETECTION via USE. USE copper_tongs ON vitriol_jar.
      # The tongs lift the cloth cap safely — copperas (iron vitriol) is
      # corrosive; a cautious searcher does not handle the jar barehanded.
      # Exposing the contents reveals the taint: sulfurous, acidic, the
      # signature of iron vitriol. First parser pack where a USE triggers
      # an olfactory narrate (prior USEs: physical action, measurement,
      # documentary comparison). The tool enables a sensory act.
      - verb: USE
        item: copper_tongs
        target: vitriol_jar
        conditions:
          - has_item: copper_tongs
          - not_flag: found_vitriol_taint
        effects:
          - set_flag: found_vitriol_taint
          - inc_var: { name: score, by: 5 }
          - narrate: >
              You use the tongs to lift the cloth cap from the jar — copperas
              will stain and etch bare skin, so you do not touch the jar
              directly. The smell is immediate: sulfurous and sharp, with an
              underlying iron tang. Copperas, also called iron vitriol or
              green vitriol. Used in the dyeing trade to sadden colours, or
              to make a cheap indigo read darker than its true grade. The jar
              is nearly empty; it has been used recently, and in quantity.
              The taint is strong enough that you replace the cap and set the
              jar back before the smell carries further.

  - id: acid_vial
    name: "acid vial"
    aliases: [vial, acid, aqua regia, nitric acid, test vial, glass vial,
              acid bottle, the vial, testing acid, chemical vial, company vial,
              searcher vial, test acid, acid flask]
    description: >
      A small glass vial, stoppered with a wax-sealed cork — aqua regia, the
      standard field test for chalk adulteration. A few drops on a sample
      are enough: chalk reacts to produce visible foaming; pure indigo does
      not. Standard Company issue for a formal search.
    takeable: true

  - id: drain_hole
    name: "drain hole"
    aliases: [drain, stone drain, floor drain, drain channel, drain grate,
              floor hole, drain in floor, the drain, store drain, iron grate,
              grate, floor grate]
    description: >
      A stone drain in the store room floor, fitted with a removable iron
      grate. The grate is fouled with pale sediment packed into the gap
      between the stone and the iron. Chalk does not wash cleanly; it
      settles and dries in a pale crust wherever the rinse water runs.
    interactions:
      # TENSION BEAT — USE copper_tongs ON drain_hole. d20 + steadiness (3)
      # vs DC 11. CONVERGENT — gates no score, exit, or ending. One-shot on
      # success; failure re-tryable. The scriveners_proof / sealed_crypt shape.
      - verb: USE
        item: copper_tongs
        target: drain_hole
        conditions: [{ has_item: copper_tongs }, { not_flag: drain_checked }]
        skill_check:
          skill: steadiness
          difficulty: 11
          on_success:
            - set_flag: drain_checked
            - narrate: >
                You ease the copper tongs under the grate and work it free
                without noise. The sediment beneath is pale where the drain
                channel runs: chalk mixed with rinse water, dried in a thick
                crust along the stone. This is where the mixing runoff drains
                — chalk introduced into the batch and rinsed away before the
                vat is sealed. The crust is fresh enough to crumble cleanly
                when you press the tong tip against it. You set the grate
                back carefully and step away from the drain.
          on_failure:
            - narrate: >
                The tongs slip against the grate and scrape loudly across the
                stone. You freeze. A voice somewhere above the ceiling — then
                silence. You wait a slow count of ten, then breathe out and
                try the grate again with more care.

  - id: payment_fold
    name: "payment fold"
    aliases: [fold, paper, payment, coins, money, bribe, paper fold, folded paper,
              payment paper, searcher payment, coin fold, gratuity, shillings,
              the fold, the payment, silver, coin paper]
    description: >
      A folded paper pinned between the vitriol jar and the back wall of the
      shelf. The heading, in a clear clerk's hand: "For the Searcher's
      Patience." Inside: five shillings in silver — a standard inspection
      fee at roughly three times the going rate. The arrangement is not
      subtle; Meredith has done this before. The ledger confirmed twelve
      shillings across two prior quarters. He leaves the payment in a
      standard place and trusts the searcher to understand. Safe to leave.
      Ruinous to pocket.
    # §17 two-telegraph discipline: the description names the heading, the
    # amount, and the implication (prior quarters, standard place) before
    # POCKET fires end_game. READ order_ledger is the second source: "searcher's
    # relief — 6s per quarter, two quarters, 12s total." Both are visible
    # before the player acts.
    interactions:
      - verb: USE
        target: payment_fold
        command_verb: pocket
        effects:
          - narrate: >
              You pocket the five shillings. The fold goes into your coat and
              the understanding between you and Meredith closes before you cross
              the store room. He was at the dyehouse front the whole time; you
              had not noticed the side door. He gave a nod when you passed the
              dye vat and you found you had nothing to say about the chalk
              casks. The Company warden received your report the following
              morning: the dyehouse was found in good order. The cakes were
              true weight. The searcher's relief payment for the quarter was
              entered in the accounts and the file was closed.
          - end_game: ending_bought

npcs: []

win_conditions:
  - id: evidence_seized
    conditions: [{ visited: guild_hall }]
    ending: ending_seized
  - id: evidence_abandoned
    conditions: [{ visited: back_passage }]
    ending: ending_abandoned

endings:
  - id: ending_seized
    title: "The Weight Proved"
    text: >
      The Deputy Warden of the Dyers' Company took the indigo cakes, noted
      the acid residue on the copper rim of the vat, and examined the order
      ledger in silence. He had the chalk casks brought from the store room
      by midday. Meredith was cited before the Court of the Company the
      following week.
      The charge: adulteration of finished goods, false weight, fraudulent
      sale under the Company seal. The raw chalk fizzes when tested; the vat
      contents fizz with the same acid, the same gas, the same confirmation
      in two stages. The ledger placed 200 lb sold at impossible cure times.
      The court found the weight proved. Meredith's mark was suspended
      pending restitution to the four merchants. The searcher's relief entry
      in the accounts was referred separately for inquiry.
      *** The adulteration proved. ***

  - id: ending_abandoned
    title: "The Back Passage"
    text: >
      You stepped out of Meredith's back door into the passage behind the
      row. Whatever you had gathered — the ledger notes, the smell from the
      vitriol jar, perhaps even a cake from the rack — was not enough to
      bring before the Deputy Warden without the second acid test complete.
      The chalk in the casks is not the product; the product must be tested
      separately. Without the vat confirmed, the complaint remains a
      complaint.
      The Company file was returned to the desk without action. The
      merchant's complaint was noted and deferred. Meredith's mark remained
      in good standing. The searcher's relief payment continued into the
      following quarter.
      *** The proof was not completed. ***
    variants:
      - when: [{ has_flag: proved_adulteration }]
        text: >
          You stepped out of Meredith's back door into the passage behind the
          row. The second acid test was complete: the raw chalk fizzed, the
          vat contents fizzed, and the finished cakes carried the same fraud.
          But proof left in a searcher's pocket is not proof before the Deputy
          Warden. You chose the back passage instead of the Company Hall, and
          no seizure was entered on the record.
          By afternoon the vat was washed, the casks were shifted, and Meredith
          had a clean story ready for anyone who asked late. The merchant's
          complaint was noted and deferred. Meredith's mark remained in good
          standing. The searcher's relief payment continued into the following
          quarter.
          *** The proof was completed, then abandoned. ***

  - id: ending_bought
    title: "For Patience"
    text: >
      Five shillings settled the matter before you left the store room.
      The arrangement ran back at least two quarters; the ledger confirmed
      it as a line item. The payment fold was left in the standard place
      and you understood the rate. The Company warden received a clean
      report. The chalk casks were sealed back; the vitriol jar went back
      to its place on the shelf. The indigo cakes shipped to their buyers
      at twelve pence per lb, and the merchants weighed short and could
      not say why.
      Meredith entered the payment in his accounts under "searcher's
      relief" and closed the quarter. So did you.
      *** You are bought. ***
