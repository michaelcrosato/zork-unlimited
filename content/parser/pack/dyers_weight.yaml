      - when:
          - has_item: indigo_cakes
          - has_item: copper_tongs
        text: >
          Meredith's dye house: low-ceilinged, the walls stained blue-black to
          the height of a man's shoulder. A wide copper vat dominates the far
          wall, its contents a dull indigo-dark. The curing rack and the hook
          by the vat are bare now; the finished indigo cakes and long copper
          tongs are with you. An order ledger sits open on the counting shelf
          above the door. The store room lies east; the door to the north is
          shut; the back passage runs south.
      - when:
          - has_item: indigo_cakes
        text: >
          Meredith's dye house: low-ceilinged, the walls stained blue-black to
          the height of a man's shoulder. A wide copper vat dominates the far
          wall, its contents a dull indigo-dark. The curing rack is bare where
