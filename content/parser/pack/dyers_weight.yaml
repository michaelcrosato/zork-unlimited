      - when:
          - has_item: copper_tongs
        text: >
          Meredith's dye house: low-ceilinged, the walls stained blue-black to
          the height of a man's shoulder. A wide copper vat dominates the far
          wall, its contents a dull indigo-dark. Beside it, a curing rack holds
          a dozen finished indigo cakes, each stamped with Meredith's mark —
          round, the size of a wheel-cheese. An order ledger sits open on the
