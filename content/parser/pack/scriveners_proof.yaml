# The Scrivener's Proof — a Zork-style parser pack (Stage 3).
#
# The ELEVENTH parser pack, the FIRST to use a DOCUMENT COMPARISON VERB, and the
# FIRST to use a MAGNIFYING LENS as an instrument of evidence.
#
# Prior parser packs lock routes with physical keys, noise flags (collectors_warrant),
# or NPC persuasion via evidence presentation (gaugers_register). Here the crime is
# proved by two distinct analytical acts: (1) USE magnifier ON deed — a lens makes
# an interlineation legible that the naked eye cannot distinguish; (2) USE disputed_deed
# ON enrolled_register with `command_verb: compare` — two documents laid side by side,
# the comparison itself is the proof. No prior parser pack has used COMPARE as a
# resolver verb or a lens as an evidence instrument.
#
# The magnifier's role is epistemic: the interlineation IS in the deed without it, but
# the player cannot see it. EXAMINE reveals nothing new; USE magnifier reveals
# everything. This is the first pack where evidence access requires a TOOL — prior
# instruments (stave, grain sample, crowbar, key, warrant) are either weapons or
# takeable evidence items. The magnifier is an instrument of perception.
#
# The COMPARISON verb is novel because it names a two-document analytical act rather
# than a physical manipulation. Prior USE interactions: USE grain ON scale, USE stave ON
# watchman, USE crowbar ON door. This is USE deed ON register with command_verb: compare
# — the verb describes what you are doing with two texts, not a mechanical action.
#
# Setting: Henry Bassett's scrivener's office behind the Strand, London, 1696.
# Bassett, an engrossing clerk, drew up a deed of sale for Thomas Pryor (yeoman farmer).
# After Pryor made his mark, Bassett interlineated six words — "and all closes adjacent
# thereto" — into the boundary clause, transferring land Pryor never agreed to sell to
# the wool merchant who commissioned the deed. The deed was enrolled at common pleas
# before the fraud was noticed. The court's deputy examiner enters after hours to
# compare the disputed deed against the court-enrolled copy.
#
# Map:
#
#   strand_court (WIN — walked out with disputed_deed AND proved_fraud)
#        │ N* (* gated: has_item disputed_deed AND has_flag proved_fraud)
#   front_office (start; client_complaint; disputed_deed; candle_lamp; penknife)
#        │ E           │ S
#   deed_room      night_alley (PARTIAL ending — left without completing proof)
#   (enrolled_register; rolled_deeds; copy_press)
#        │ N
#   private_study (magnifier; bribe_purse; private_memoranda)
#
# Score (max 45):
#   +5   READ client_complaint          (front_office — understands the allegation)
#   +5   READ enrolled_register         (deed_room — the court copy without the added words)
#   +5   USE magnifier ON disputed_deed (found_interlineation — the physical fraud visible)
#   +10  USE disputed_deed ON enrolled_register  (proved_fraud — comparison proves alteration)
#   +20  TAKE disputed_deed             (the document secured as evidence)
#
# Endings (3):
#   ending_filed     — WIN (non-death): deed + proved_fraud → strand_court
#   ending_retreated — PARTIAL (non-death): walked south to night_alley
#   ending_bought    — BAD (non-death, instant end_game): took the bribe purse
#
# Tension beat: USE penknife ON copy_press (deed_room). d20 + steadiness (3) vs DC 11.
# CONVERGENT — gates no exit, score, ending, or variant. One-shot on success (press_checked);
# failure is re-tryable. The sealed_crypt / collectors_warrant / gaugers_register shape.
#
# ending_bought telegraphed twice before TAKE fires end_game (bug_0123 discipline):
#   source 1: bribe_purse description names "For quietness" and lists court officers —
#     the player understands what this is before touching it.
#   source 2: private_memoranda (if read) describes Bassett's payments and fear of
#     exposure — makes the purse's function explicit before the player acts.

meta:
  id: scriveners_proof_v1
  title: "The Scrivener's Proof"
  start_room: front_office
  flags_init: []
  vars_init: { steadiness: 3 }
  max_score: 45

rooms:
  - id: front_office
    name: "The Front Office"
    description: >
      Henry Bassett's front office: a plain room smelling of wax and old paper.
      A writing desk holds the day's correspondence and a candle lamp gone cold.
      The deed box on the corner of the desk stands open — the disputed deed lies
      folded inside it, the thing you came for. A penknife rests against the
      inkwell. The deed room lies east; the street door to the north stands
      shut; the night alley runs south.
    variants:
      - when: [{ has_flag: proved_fraud }]
        text: >
          Bassett's front office, the comparison complete. The disputed deed and
          its enrolled copy: six words not in the original, in a fresher charge
          of the same ink. The deed room is east; the street door north is clear.
          The alley runs south.
    objects: [client_complaint, disputed_deed, candle_lamp, penknife]
    exits:
      - direction: north
        to: strand_court
        conditions: [{ has_item: disputed_deed }, { has_flag: proved_fraud }]
        locked_msg: >
          The street door stands shut. You have what you came for — but without
          the comparison made, it is one parchment against the scrivener's word.
          The enrolled copy is in the deed room east. Compare the two, then walk.
      - { direction: east, to: deed_room }
      - { direction: south, to: night_alley }

  - id: deed_room
    name: "The Deed Room"
    description: >
      A room lined floor-to-ceiling with rolled deeds in pigeon-holes, each
      labelled in a clerk's careful hand. A standing copy-press occupies the
      east wall, its screw-head dark with handling. On the central table: the
      enrolled copy of the disputed deed — the version presented to the court
      and sealed. The front office lies west; a passage north leads to
      Bassett's private study.
    variants:
      - when: [{ has_flag: proved_fraud }]
        text: >
          The deed room, the enrolled copy still open on the table. The
          comparison is done: the enrolled copy has no added words. The front
          office lies west; the private study is north.
    objects: [enrolled_register, rolled_deeds, copy_press]
    exits:
      - { direction: west, to: front_office }
      - { direction: north, to: private_study }

  - id: private_study
    name: "The Private Study"
    description: >
      Bassett's private room: a writing table under the shuttered window, a
      glazed writing case open on its surface — compartments for nibs, ink
      sticks, a short rule, and a fitted recess holding a small magnifying glass.
      A shelf of bound memoranda runs above. A sealed cloth purse sits behind
      the inkwell, heavy for its size. The deed room lies south.
    objects: [magnifier, bribe_purse, private_memoranda]
    exits:
      - { direction: south, to: deed_room }

  - id: strand_court
    name: "The Strand Court"
    description: >
      You step through the street door into the Strand. The morning is
      beginning to lighten behind the rooftops; a night watchman passes across
      the far end of the lane without looking back. You have the disputed deed
      under your arm.

  - id: night_alley
    name: "The Night Alley"
    description: >
      A narrow alley behind the row of offices, the cobbles wet from last
      night's rain. You stepped out of Bassett's front office and the door
      has swung to behind you. Whatever you have in hand is what you carry
      into the morning.

objects:
  # ── Front office ──────────────────────────────────────────────────────────────
  - id: client_complaint
    name: "client's complaint"
    aliases: [complaint, petition, letter, correspondence, papers, day papers, client letter,
              client petition, pryor complaint, pryor letter, written complaint, yeoman complaint]
    description: >
      A written complaint from Thomas Pryor, yeoman: he sold three closes of
      meadow ground to a wool merchant last winter, signed the deed, and later
      discovered that six words — "and all closes adjacent thereto" — appeared
      in the engrossed copy where no such words were in the original agreement.
      The deed was enrolled at common pleas before the fraud was noticed. Pryor
      asks the examiner to compare the enrolled copy against the disputed deed.
    read_text: >
      Pryor's account is exact: the boundary clause should read "to the ditch
      at the east field boundary." The enrolled version he has seen reads "to
      the ditch at the east field boundary and all closes adjacent thereto." Six
      words between two lines of the existing text. Either Pryor agreed to them
      and forgot, or they were inserted after he signed. Pryor's mark is on the
      deed. The question is whether those words were there when he made it.
    interactions:
      - verb: READ
        target: client_complaint
        conditions: [{ not_flag: read_complaint }]
        effects:
          - set_flag: read_complaint
          - inc_var: { name: score, by: 5 }

  - id: disputed_deed
    name: "disputed deed"
    aliases: [deed, parchment, conveyance, sale deed, pryor deed, indenture, disputed conveyance,
              deed of sale, folded deed, deed of sale pryor, engrossed deed, disputed parchment]
    description: >
      A parchment deed of sale in Bassett's engrossing hand, formally laid out.
      The boundary clause reads "to the ditch at the east field boundary and all
      closes adjacent thereto." Bassett's seal is at the foot; Pryor's mark — a
      crossed P — is beside it. By candlelight everything appears regular. To
      see whether those words belong, you need a stronger glass.
    variants:
      - when: [{ has_flag: found_interlineation }]
        text: >
          The disputed deed. Under the magnifier the boundary passage showed it:
          "and all closes adjacent thereto" — six words whose loop-closures are
          slightly tighter than the surrounding text. Later ink, same pen nib.
          The interlineation is real.
    takeable: true
    take_effects:
      - inc_var: { name: score, by: 20 }
    interactions:
      # USE magnifier ON disputed_deed — the lens as evidence instrument.
      # The interaction is defined on the TARGET (disputed_deed) with ITEM (magnifier),
      # following the engine's useInteraction(index, target, item) resolution discipline.
      # No precondition on read_complaint — the magnifier reveals the interlineation on
      # its own; the complaint provides context but need not gate the discovery.
      - verb: USE
        item: magnifier
        target: disputed_deed
        conditions:
          - has_item: magnifier
          - not_flag: found_interlineation
        effects:
          - set_flag: found_interlineation
          - inc_var: { name: score, by: 5 }
          - narrate: >
              You hold the magnifying glass over the boundary clause: "to the
              ditch at the east field boundary and all closes adjacent thereto."
              Through the lens the difference is plain. The words "and all closes
              adjacent thereto" sit between the lines in a formation slightly
              tighter than the text above and below — same pen nib, the ink
              colour matches at a glance, but the loop-closures are smaller and
              the charge of the pen fractionally fresher. These six words were
              written after the surrounding text was dry. Written, that is, after
              Pryor made his mark. The interlineation is real.

  - id: candle_lamp
    name: "candle lamp"
    aliases: [candle, lamp, light, lantern, tallow, desk lamp, candle holder, cold candle]
    description: >
      A candle lamp on the writing desk, the wick cold and the wax pooled and
      set — out for hours. Enough light comes from the street for reading.
      For close examination of letter-forms you need the magnifier.

  - id: penknife
    name: "penknife"
    aliases: [knife, blade, pen knife, quill knife, small knife, pocketknife, pen blade,
              horn knife, horn handle, folding knife, scrivener knife]
    description: >
      A small folding penknife from the inkwell tray — the standard tool for
      trimming quill nibs, cutting ribbon, and similar close work. Sharp at
      the tip, thin enough for detail. The horn handle is scored with use.
    takeable: true

  # ── Deed room ──────────────────────────────────────────────────────────────────
  - id: enrolled_register
    name: "enrolled copy"
    aliases: [register, enrolled deed, court copy, enrolled register, copy, court roll, pleas copy,
              registered deed, court enrolled, enrolled parchment, court record, court document]
    description: >
      The court-enrolled copy of the deed: the version presented to the common
      pleas roll three months ago and sealed by the court clerk. This is the
      authoritative record — whatever it says, the court considers said. If it
      differs from the deed Pryor signed, one of them was altered after the other
      was drawn up.
    read_text: >
      The boundary clause in the enrolled copy reads: "to the ditch at the east
      field boundary." Full stop. No further words. The enrolled clerk's hand
      continues immediately with the habendum clause — no gap, no space where
      six additional words could have sat when the copy was taken. The enrolled
      copy does not have them. The disputed deed does. One of them was altered
      after the other was made.
    interactions:
      - verb: READ
        target: enrolled_register
        conditions: [{ not_flag: read_register }]
        effects:
          - set_flag: read_register
          - inc_var: { name: score, by: 5 }
      # COMPARISON verb — USE disputed_deed ON enrolled_register.
      # `command_verb: compare` produces: "compare disputed deed with enrolled copy"
      # — the first COMPARE verb in the parser corpus. Defined on the TARGET
      # (enrolled_register), item: disputed_deed, following engine discipline.
      # Requires: has_item disputed_deed (physical: you are placing it beside the copy)
      #         + has_flag found_interlineation (epistemic: you know what passage to match).
      # Without knowing about the interlineation, laying two parchments together is
      # merely reading; with it, you know exactly where to look. Both are necessary.
      - verb: USE
        item: disputed_deed
        target: enrolled_register
        command_verb: compare
        command_template: "compare {item} with {target}"
        conditions:
          - has_item: disputed_deed
          - has_flag: found_interlineation
          - not_flag: proved_fraud
        effects:
          - set_flag: proved_fraud
          - inc_var: { name: score, by: 10 }
          - narrate: >
              You lay the disputed deed beside the enrolled copy, boundary clause
              to boundary clause. The enrolled copy reads "to the ditch at the east
              field boundary" — and then the habendum clause immediately, no gap.
              The disputed deed reads "to the ditch at the east field boundary and
              all closes adjacent thereto." Six words that are not in the court roll.
              Six words that transfer every meadow adjacent to Pryor's three closes
              to the merchant — land he did not agree to sell. The magnifier showed
              the interlineation was later; the enrolled copy confirms it was not
              there when the deed was engrossed. You have both documents. The
              comparison is complete.

  - id: rolled_deeds
    name: "rolled deeds"
    aliases: [deeds, rolls, pigeon-holes, files, filing, deed rolls, conveyances, archive,
              shelves, pigeon holes, rolled parchments]
    description: >
      Dozens of rolled parchments in pigeon-holes: deeds of sale, leases,
      indentures of apprenticeship, recognisances — each labelled in the same
      careful clerk's hand. Bassett's practice covers many clients. None of
      the other rolls concern you tonight.

  - id: copy_press
    name: "copy press"
    aliases: [press, screw press, standing press, seal press, copying press, iron press,
              press screw, press bed, copy machine]
    description: >
      A heavy standing press with an iron screw mechanism — used to seal wax
      impressions into document folds or to press a fresh copy flat against the
      original. The screw-head is worn dark with handling. Fresh wax marks ring
      the press-bed; something was sealed here recently, within a day or two.
    interactions:
      # TENSION BEAT — CHECK the copy-press screw with the penknife.
      # d20 + steadiness (3) vs DC 11. CONVERGENT — gates no exit, score, ending,
      # or variant beyond retire flag press_checked. One-shot on success; failure
      # is re-tryable. The sealed_crypt / collectors_warrant shape.
      - verb: USE
        item: penknife
        target: copy_press
        command_verb: check
        conditions: [{ has_item: penknife }, { not_flag: press_checked }]
        skill_check:
          skill: steadiness
          difficulty: 11
          on_success:
            - set_flag: press_checked
            - narrate: >
                You ease the penknife tip into the wax deposit at the press-bed's
                edge and work it free without cracking the piece. Soft at the
                centre — not hours old but days. The press was used recently; the
                impression taken before the ink in the disputed deed could age.
                You set the fragment aside and steady your hand.
          on_failure:
            - narrate: >
                The penknife tip catches in the wax and flicks a small fragment
                loose — it clatters off the press-bed and skitters across the
                floor. You stand still for a count of five. Nothing moves above.
                You breathe out.

  # ── Private study ──────────────────────────────────────────────────────────────
  - id: magnifier
    name: "magnifying glass"
    aliases: [magnifier, lens, glass, loupe, reading glass, convex glass, brass glass,
              magnifying lens, hand lens, glass lens, brass lens]
    description: >
      A small convex lens in a brass ring — a reading glass of the kind used
      by notaries and court examiners to scrutinise documents at close range.
      Fine enough to show letter-form detail invisible to the naked eye: pen
      charge, loop-closure width, ink surface texture.
    takeable: true

  - id: bribe_purse
    name: "sealed purse"
    aliases: [purse, money, coins, bribe, cloth purse, heavy purse, sealed cloth, payment,
              cloth pouch, bribe money, sealed bag]
    description: >
      A sealed cloth purse behind the inkwell, heavy for its size. A fold of
      paper is tucked under the wax seal; it reads "For quietness" at the top
      and lists three names in a careful hand — two of them officers of the
      court of common pleas. Bassett has been paying for silence. This is his
      record of it. Safe to leave behind; catastrophic to be found carrying.
    # Bug_0123 discipline: description names what this is (a bribery record with
    # the names of the men paid) before TAKE fires end_game. Not an ambush.
    takeable: true
    take_effects:
      - narrate: >
          You pocket the purse. The weight of it settles into your coat and you
          understand the mistake immediately. Bassett's cousin came through the
          back passage two minutes later, and the rest resolved the way these
          things always do when the wrong party is holding the record. The deed
          went back into the box. The enrolled copy stayed in the deed room.
          Pryor's complaint went forward without you. Your name is in the list
          on that fold of paper now; it has been for a week, as it turns out.
          Bassett was better prepared than you were.
      - end_game: ending_bought

  - id: private_memoranda
    name: "bound memoranda"
    aliases: [memoranda, memo, notebook, bound book, notes, private notes, study notes,
              bassett notes, bassett book, private book, shelf notes]
    description: >
      A bound notebook from the shelf above the writing table: Bassett's private
      notes on active matters. The last dozen pages concern the Pryor transaction
      — draft language for the boundary clause, a note that "P will not read
      back," and a date three days after the original signing when "alterations
      complete." The dates name him plainly.
    read_text: >
      The entries for the Pryor closes are explicit. The original boundary
      clause was drafted as "to the ditch at the east field boundary." The
      added words were drafted separately, on a page headed "insertion — Pryor
      deed," and dated two days after the signing — before enrollment but after
      Pryor made his mark. The note reads "P illiterate; mark only; will not
      read back the text." Bassett trusted Pryor's illiteracy to hide the
      interlineation. He trusted wrong.
    # Second source for the §17 two-source clue: first source is the enrolled copy
    # comparison; this confirms motive and timeline. No score — corroborating context
    # only, not required for any gate.

npcs: []

win_conditions:
  - id: case_filed
    # strand_court is only reachable via the N exit from front_office, gated on
    # has_item: disputed_deed AND has_flag: proved_fraud (the locomotion win shape).
    conditions: [{ visited: strand_court }]
    ending: ending_filed
  - id: case_abandoned
    # night_alley is reachable via the S exit from front_office, always open.
    # Any visit to night_alley means the player left without completing the proof.
    conditions: [{ visited: night_alley }]
    ending: ending_retreated

endings:
  - id: ending_filed
    title: "The Comparison"
    text: >
      You laid the disputed deed and the enrolled copy before the registrar at
      nine o'clock: the boundary clause of each document, the six words present
      in one and absent from the other, the magnifier's evidence of fresher ink
      in the interlineated passage. The enrolled copy could not lie, and the
      disputed deed could not match it. Bassett's case collapsed on the
      comparison.
      The wool merchant surrendered his claim to Pryor's adjacent closes before
      noon. The deed was cancelled; the interlineation was entered in the court
      record. Bassett was bound over to sessions on a charge of deed forgery.
      His practice did not survive the hearing.
      *** The interlineation proved. ***

  - id: ending_retreated
    title: "The Night Alley"
    text: >
      You stepped out of Bassett's office into the night alley and turned toward
      the Strand. Whatever you had found — the client's complaint, the boundary
      passage, perhaps even the deed itself — was not enough to lay before the
      registrar without the comparison complete. The enrolled copy was still on
      the table in the deed room; the magnifier, perhaps, was still in the
      writing case. The evidence was assembled but not compared; the comparison
      was started but not concluded.
      Pryor's complaint went forward at the morning hearing without the
      interlineation proved. The registrar returned the deed to the pleadings
      without examination. The merchant kept his claim. Bassett kept his
      practice.
      *** The comparison was not completed. ***

  - id: ending_bought
    title: "For Quietness"
    text: >
      The names on that fold of paper — two court officers, one alderman —
      had bought Bassett's peace for six months. They bought yours too, at
      a price you did not set. The deed went back into its box; the enrolled
      copy remained in the deed room; the comparison was never made.
      Pryor held his three signed closes and lost the adjacent land and never
      understood why the examiner who visited that night had filed a report
      that found nothing actionable. The wool merchant paid a sound price for
      all the closes adjacent thereto. Bassett regarded it as a reasonable
      return on an investment in quietness.
      *** You are bought. ***
