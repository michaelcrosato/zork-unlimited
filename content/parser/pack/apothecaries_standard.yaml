# The Apothecary's Standard — a Zork-style parser pack (Stage 3).
#
# THE THIRTEENTH parser pack.
#
# TASTE AS A SENSORY EVIDENCE VERB (first in the parser corpus):
# The glass drawstick (a standard 17th-century apothecary sampling tube) is used to
# transfer a drop of the suspect laudanum to the tongue. The result — sweet, no
# bitterness, no anodyne numbing — is a physical finding. Prior sensory evidence in
# the corpus: dyers_weight introduces olfactory (USE copper_tongs ON vitriol_jar →
# the copperas smell). This pack introduces gustatory: taste as forensic instrument.
# The TASTE interaction (USE glass_drawstick ON suspect_vial, command_verb: taste)
# is the first in the parser corpus to use the gustatory sense as a scored evidence act.
#
# SAME TOOL, TWO USES — glass_drawstick (echoes dyers_weight's copper_tongs pattern):
#   USE glass_drawstick ON suspect_vial (command_verb: taste) → found_wrong_taste
#   USE glass_drawstick ON dispensatory (command_verb: compare) → proved_substitution
# The drawstick is first the instrument of taste (a drop to the tongue), then the
# instrument of comparison (pointed at the pharmacopoeia entry, carrying the result).
# No prior parser pack uses the same tool for both a sensory act and a documentary
# comparison. Prior two-use tools: dyers_weight copper_tongs (olfactory + tension beat).
# Here both uses are scored evidence acts, not one evidence act and one tension beat.
#
# SENSORY → DOCUMENTARY COMPARISON TOPOLOGY (novel):
# Prior COMPARE packs compare two documents (scriveners_proof: deed vs enrolled copy)
# or test a material twice (dyers_weight: acid on chalk stock, then on finished product).
# Here step 1 is a physical-sensory finding (TASTE: sweet, no bitterness, no numbing)
# and step 2 is a documentary validation (COMPARE: taste result against the
# pharmacopoeia's written standard for laudanum). A sensory finding alone cannot prove
# deliberate substitution; the standard alone cannot test this bottle. The combination
# — taste result matches poppy syrup, pharmacopoeia says laudanum must be bitter and
# anodyne — is the proof. Neither step alone sets proved_substitution; both together do.
#
# APOTHECARY FRAUD SETTING (first in the parser corpus):
# No prior parser pack is set in a pharmacy or concerns pharmaceutical compounding.
# Prior fraud types: measurement under-read (gaugers_register), documentary forgery
# (scriveners_proof), chemical adulteration of dye (dyers_weight), grain weight fraud
# (weighmasters_round), warrant theft (collectors_warrant). This is the first pack where
# the crime is MEDICAL SUBSTITUTION: syrupus papaveris (cheap poppy syrup, no alkaloid,
# no analgesia) passed off as laudanum (tinctura opii in vino — opium in wine, effective
# and expensive), at the laudanum price. The Worshipful Society of Apothecaries (chartered
# 1617) held statutory authority to search and seize within seven miles of London. The
# Pharmacopoeia Londinensis was the official compounding standard. Setting: Cheapside,
# London, 1697. The physician's complaint: patients in pain receiving no relief from
# their prescribed laudanum — the preparation is inert.
#
# Map:
#
#   cheapside_lane (WIN — gated: has_item sample_vials AND has_flag proved_substitution)
#        │ N*
#   shop_counter (start; dispensatory; suspect_vial; glass_drawstick; counter_stock)
#        │ E                          │ S
#   dispensary                   back_passage (PARTIAL ending)
#   (poppy_carboy; dispensing_ledger; drain_cock; sample_vials; mortar_pestle)
#        │ N
#   store_loft (raw_poppy; crace_journal; crace_purse — BAD ending)
#
# Score (max 45):
#   +5   READ dispensatory            (shop_counter — London Pharmacopoeia on laudanum)
#   +5   USE glass_drawstick ON suspect_vial  (taste → found_wrong_taste; req. read_dispensatory + has_item drawstick)
#   +10  USE glass_drawstick ON dispensatory  (compare → proved_substitution; req. found_wrong_taste + has_item drawstick)
#   +5   READ dispensing_ledger       (dispensary — price charged vs cost of poppy syrup)
#   +20  TAKE sample_vials            (dispensary — sealed evidence samples for the Society)
#
# Endings (3):
#   ending_presented — WIN (non-death): cheapside_lane visited
#   ending_withdrawn — PARTIAL (non-death): back_passage visited
#   ending_paid      — BAD (non-death, instant end_game): TAKE crace_purse (store_loft)
#
# Tension beat: USE glass_drawstick ON drain_cock (dispensary). d20 + steadiness (3)
# vs DC 11. CONVERGENT — gates no score, exit, ending, or variant. One-shot on
# success (drain_checked); failure re-tryable. The scriveners_proof / dyers_weight shape.
#
# ending_paid telegraphed twice (§17 / bug_0123 discipline):
#   source 1: crace_purse description names the heading and the sum — "For quietness
#             in Society business" — before TAKE fires end_game
#   source 2: READ crace_journal (store_loft) describes prior officers bought and
#             names the amount Crace prepared for this visit

meta:
  id: apothecaries_standard_v1
  title: "The Apothecary's Standard"
  start_room: shop_counter
  flags_init: []
  vars_init: { steadiness: 3 }
  max_score: 45

rooms:
  - id: shop_counter
    name: "The Shop Counter"
    description: >
      Thomas Crace's apothecary shop, shuttered for the evening. The long counter
      holds the day's remaining stock — rows of earthenware jars, rolled plasters,
      and a weighing box. Near the till drawer a single amber bottle has been set
      apart: the suspect laudanum vial, left by the physician who raised the
      complaint. The Pharmacopoeia Londinensis lies open on the reading stand at
      the counter's end; the testing drawer below holds the glass drawstick Crace
      uses for sampling. The dispensary lies east; the shop door north is shut;
      the back passage runs south.
    variants:
      - when: [{ has_flag: proved_substitution }]
        text: >
          The shop counter, the comparison complete. The suspect vial and the
          dispensatory lie open side by side; the pharmacopoeia's taste criteria
          and the vial's result are irreconcilable. The dispensary is east; the
          door north stands clear; the back passage runs south.
    objects: [dispensatory, suspect_vial, glass_drawstick, counter_stock]
    exits:
      - direction: north
        to: cheapside_lane
        conditions: [{ has_item: sample_vials }, { has_flag: proved_substitution }]
        locked_msg: >
          The shop door stands shut. The Society's case is not yet assembled:
          both the comparison result and the sealed sample vials are needed.
          The dispensatory and the suspect vial are here to be compared; the
          sample vials are in the dispensary east.
      - { direction: east, to: dispensary }
      - { direction: south, to: back_passage }

  - id: dispensary
    name: "The Dispensary"
    description: >
      The working dispensary behind the counter: a mortar and pestle on the stone
      bench, a set of balance-weights on a hook, and a long shelf of labelled
      ingredient jars. Three carboys of pale amber liquid stand against the south
      wall, sealed with cloth and wax — poppy syrup, not the true laudanum
      tincture. A decanting funnel and a rack of empty laudanum bottles are
      arranged beside them. A drain-cock projects from the lower bung of the
      nearest carboy. The dispensing ledger lies open on the bench. The shop
      counter is west; the store loft is north.
    variants:
      - when: [{ has_item: sample_vials }]
        text: >
          The dispensary, the sample vials secured. The poppy-syrup carboys still
          stand against the south wall. The shop counter is west; the store loft
          is north.
    objects: [poppy_carboy, dispensing_ledger, drain_cock, sample_vials, mortar_pestle]
    exits:
      - { direction: west, to: shop_counter }
      - { direction: north, to: store_loft }

  - id: store_loft
    name: "The Store Loft"
    description: >
      A low room above the dispensary: sacks of dried material against the far
      wall, a writing shelf with a small lantern, and Crace's private accounts
      in worn leather. A cloth purse sits on the writing shelf between the inkwell
      and the bound journal. The dispensary lies south.
    objects: [raw_poppy, crace_journal, crace_purse]
    exits:
      - { direction: south, to: dispensary }

  - id: cheapside_lane
    name: "Cheapside Lane"
    description: >
      You step through the shop door into Cheapside. The street is quiet at this
      hour, the tallow-lights along the lane guttered or gone. The sealed sample
      vials are in your coat and the comparison is on the record. The Society
      meets at nine o'clock.

  - id: back_passage
    name: "The Back Passage"
    description: >
      A covered passage behind the row of shops, the flagstones wet from the
      evening's rain. You have stepped out of Crace's shop and the door has
      swung to behind you. Whatever evidence you have gathered, or not, is what
      you carry into the morning.

objects:
  # ── Shop counter ─────────────────────────────────────────────────────────────
  - id: dispensatory
    name: "London Pharmacopoeia"
    aliases: [pharmacopoeia, dispensatory, book, formulary, standard, pharmacopeia,
              london pharmacopoeia, london pharmacopeia, compounding standard, apothecary standard,
              reading stand, stand, opened book, open book, reference book, formula book,
              pharmacopoeia londinensis, london dispensatory, pharmacopoeia book]
    description: >
      The Pharmacopoeia Londinensis, open at the entry for Laudanum — Tinctura
      Opii in Vino Hispanico. The entry specifies the identifying properties:
      dark reddish amber; odour characteristic; taste markedly bitter and anodyne —
      a numbing sensation at the tongue-tip that persists for several minutes. No
      honest preparation of laudanum is sweet; no honest preparation fails to
      numb. If a preparation lacks both the bitterness and the anodyne effect,
      it contains no opium.
    read_text: >
      The Society's standard for Laudanum: "Tinctura Opii — prepared from the
      dried exudate of Papaver somniferum in wine of Spain, reduced and strained.
      Identifying marks: colour dark amber tending reddish; odour characteristic,
      heavy; taste bitter and decidedly anodyne, the numbing quality persisting
      at the tip of the tongue for not less than three minutes in a preparation
      of proper strength. A preparation that is sweet and without anodyne effect
      is not laudanum and cannot be sold as laudanum. Syrupus Papaveris — the
      decoction of English poppy heads with sugar — is a distinct preparation,
      lawfully sold under its own name at a proportionate price. It may not be
      passed off as the true tincture."
    interactions:
      - verb: READ
        target: dispensatory
        conditions: [{ not_flag: read_dispensatory }]
        effects:
          - set_flag: read_dispensatory
          - inc_var: { name: score, by: 5 }
      # COMPARE — USE glass_drawstick ON dispensatory.
      # `command_verb: compare` produces "compare glass drawstick with pharmacopoeia."
      # Defined on the TARGET (dispensatory), item: glass_drawstick, per the engine's
      # useInteraction(index, target, item) discipline.
      # The drawstick is the instrument of BOTH sensory acts in this pack — it first
      # carries the taste result (TASTE step) and is then used to compare that result
      # against the written standard (COMPARE step). Same-tool-two-scored-uses pattern;
      # echoes dyers_weight copper_tongs (olfactory + tension beat) but applies both
      # uses to scored evidence acts rather than evidence + tension.
      # Requires: has_item glass_drawstick (the instrument, carrying the taste result)
      #         + has_flag found_wrong_taste (epistemic: a taste result exists to compare)
      # The comparison names the fraud formally: the taste result inverts every criterion
      # the pharmacopoeia names for laudanum. Neither the taste alone nor the standard
      # alone proves substitution; the documented comparison of result-against-criterion does.
      - verb: USE
        item: glass_drawstick
        target: dispensatory
        command_verb: compare
        command_template: "compare {item} with {target}"
        conditions:
          - has_item: glass_drawstick
          - has_flag: found_wrong_taste
          - not_flag: proved_substitution
        effects:
          - set_flag: proved_substitution
          - inc_var: { name: score, by: 10 }
          - narrate: >
              You bring the drawstick to the open pharmacopoeia and read the taste
              criteria against your result. The dispensatory: "taste bitter and
              decidedly anodyne, the numbing quality persisting at the tip of the
              tongue for not less than three minutes." Your result: sweet. No
              bitterness. No numbing, not for an instant. The preparation in the
              suspect vial fails both criteria on the Society's own test. Whatever
              Crace put in his laudanum bottles and sold at a laudanum price, the
              Pharmacopoeia Londinensis says plainly that it is not the true
              tincture.

  - id: suspect_vial
    name: "suspect laudanum vial"
    aliases: [vial, bottle, laudanum, suspect, suspect vial, amber bottle, laudanum vial,
              amber vial, suspect bottle, suspect laudanum, vial of laudanum, laudanum bottle,
              preparation, suspect preparation, crace laudanum, medicine bottle, medicine vial,
              amber preparation, the vial, tinct opii, tinctura opii]
    description: >
      A sealed amber bottle of the kind used for laudanum — glass, with a cork
      and a wax seal stamped with Crace's mark. The label reads "Tinct. Opii"
      in his hand, dated a fortnight ago. The bottle was set aside by the
      physician who raised the complaint: his patients showed no relief from
      their prescribed doses. Unstoppered, the contents are a pale amber,
      lighter in colour than the true tincture should be.
    variants:
      - when: [{ has_flag: found_wrong_taste }]
        text: >
          The suspect vial. You have already tasted it: sweet, no bitterness,
          no anodyne trace at the tongue-tip. Whatever is in this bottle,
          it is not the true tincture of opium.
    takeable: true
    # No score on take — the vial is picked up to carry for the comparison step.
    # TASTE interaction is defined here (on the target), per engine discipline.
    interactions:
      # TASTE — the novel mechanic of this pack.
      # USE glass_drawstick ON suspect_vial (command_verb: taste).
      # First GUSTATORY evidence detection in the parser corpus.
      # Prior sensory evidence acts: dyers_weight olfactory (USE copper_tongs ON vitriol_jar).
      # This adds taste as a new sensory evidence category.
      # Requires: has_item glass_drawstick (the instrument for safe sampling).
      # Does NOT require read_dispensatory: a sworn searcher knows what laudanum must taste
      # like from professional training; reading the pharmacopoeia is contextual enrichment
      # (+5 score), not a gate. The corpus convention (gaugers_register, scriveners_proof)
      # makes READ steps optional score awards, not mandatory route gates — following that
      # convention allows the exhaustive solver (which skips READ actions as pure observation)
      # to find the WIN route without locking it behind a skipped step.
      # One-shot on success (found_wrong_taste retires this interaction).
      - verb: USE
        item: glass_drawstick
        target: suspect_vial
        command_verb: taste
        command_template: "taste {target} with {item}"
        conditions:
          - has_item: glass_drawstick
          - not_flag: found_wrong_taste
        effects:
          - set_flag: found_wrong_taste
          - inc_var: { name: score, by: 5 }
          - narrate: >
              You unstopper the vial, dip the drawstick in, stop the sealed end
              with a fingertip, and transfer a drop to the tongue. The dispensatory
              is clear in your memory: bitter, anodyne, the numbing persisting.
              What you taste is sweet — clean, faintly flowery, the taste of
              English poppies in sugar-water. No bitterness at all. No numbness:
              not after a minute, not after two. You wait the full three minutes
              the pharmacopoeia names and feel nothing. The preparation in this
              bottle is not laudanum. It is poppy syrup — cheap, inert, and sold
              to physicians who trusted the label. You cork the vial and set down
              the drawstick.

  - id: glass_drawstick
    name: "glass drawstick"
    aliases: [drawstick, draw stick, glass tube, sampling tube, glass rod, pipette,
              glass stick, testing stick, draw tube, glass draw stick, glass pipette,
              sampling rod, apothecary tube, tasting stick, glass sampling tube,
              glass sampling rod, coloured glass, sampling glass, test stick]
    description: >
      A slender hollow glass tube, sealed at one end — the standard apothecary
      drawstick for sampling liquid preparations. Dip the open end into the vial,
      stop the sealed end with a fingertip to hold the sample, transfer a drop to
      the tongue. The sealed end carries a red glass bead to mark this as Crace's
      own quality-testing instrument, kept in the counter testing drawer.
    takeable: true

  - id: counter_stock
    name: "counter stock"
    aliases: [stock, jars, preparations, earthenware, jars of medicine, medicine jars,
              shelf stock, rows of jars, apothecary stock, remedies, shelves, counter items,
              plasters, rolled plasters, weighing box, dispensary stock, counter goods,
              shelf medicines, row of jars, earthenware jars, counter medicines, common remedies]
    description: >
      The regular counter stock: rows of earthenware jars of common remedies —
      jalap, rhubarb root, syrup of ipecacuanha — each correctly labelled and
      sealed in the standard way. The weighing box below holds the usual dispensing
      weights. Nothing here concerns the physician's complaint; the suspect vial
      was set aside deliberately.

  # ── Dispensary ──────────────────────────────────────────────────────────────
  - id: poppy_carboy
    name: "poppy syrup carboys"
    aliases: [carboys, carboy, syrup, poppy syrup, syrupus papaveris, poppy carboy, pale amber,
              poppy casks, poppy carboys, funnel, decanting funnel, poppy bottles, empty bottles,
              amber liquid, carboy liquid, south wall, poppy stock, carboy stock, syrup carboy,
              pale liquid, carboys of syrup, three carboys, cloth sealed carboys, wax sealed carboys]
    description: >
      Three large carboys of pale amber liquid against the south wall, each sealed
      with cloth and wax. The labels, hand-written on linen tacked to the vessel,
      read "Syr. Papav." — syrupus papaveris, poppy syrup. Beside them: a decanting
      funnel, a rack of empty laudanum bottles, and a small seal-stamp for pressing
      Crace's mark into fresh wax. This is the raw material. Cheap English-poppy
      decoction with sugar, no alkaloid, no anodyne property. Crace has been
      decanting this into laudanum bottles at a laudanum price.

  - id: dispensing_ledger
    name: "dispensing ledger"
    aliases: [ledger, dispensary ledger, ledger book, accounts, dispensing accounts, pricing ledger,
              dispensing book, record book, dispensing record, crace ledger, price book, price record,
              pricing record, sales ledger, dispensing accounts book, open ledger, bench ledger,
              dispensary accounts, bench book]
    description: >
      Crace's dispensing ledger: the daily record of preparations sold, quantities
      and prices. The last two pages cover the month's laudanum entries — a dozen
      transactions, each at forty pence per dram. A note at the column foot reads:
      "Syr. Papav. @ 4d per pint — standard decant, 2d per dram cost." Two pence
      to make what he sold for forty. The margin is nineteen to one.
    read_text: >
      The laudanum column is uniform: forty pence per fluid dram, marked "Tinct.
      Opii — best quality" against each entry. The cost-note at the foot reads
      "Syr. Papav. @ 4d per pint — standard decant: 2d per dram." Twelve
      transactions in the month: two shillings cost against forty shillings
      revenue, per dram. The substitution is in his own hand, on every page,
      entered as a running note on the cost side and never acknowledged on the
      billing side. One pound eighteen shillings in fraudulent premium, for the
      month. The ledger is dated and signed.
    interactions:
      - verb: READ
        target: dispensing_ledger
        conditions: [{ not_flag: read_ledger }]
        effects:
          - set_flag: read_ledger
          - inc_var: { name: score, by: 5 }

  - id: drain_cock
    name: "drain cock"
    aliases: [drain, cock, drain cock, tap, bung, drain tap, carboy tap, carboy cock,
              lower bung, carboy bung, carboy drain, carboy valve, bung cock, brass tap,
              brass cock, carboy tap, carboy fitting, lower fitting, brass fitting]
    description: >
      A brass drain-cock projecting from the lower bung of the nearest carboy —
      the standard fitting for decanting large batches into smaller bottles.
      The thread-seal shows recent use: the cock was opened within the past day
      or two, the beeswax thread-sealer disturbed and re-set.
    # TENSION BEAT — USE glass_drawstick ON drain_cock (command_verb: check).
    # d20 + steadiness (3) vs DC 11. CONVERGENT — gates no score, exit, ending,
    # or variant. One-shot on success (drain_checked). Failure is re-tryable.
    # The same scriveners_proof / dyers_weight / gaugers_register steadiness shape.
    interactions:
      - verb: USE
        item: glass_drawstick
        target: drain_cock
        command_verb: check
        conditions: [{ has_item: glass_drawstick }, { not_flag: drain_checked }]
        skill_check:
          skill: steadiness
          difficulty: 11
          on_success:
            - set_flag: drain_checked
            - narrate: >
                You ease the drawstick tip into the cock-thread and work it
                gently open: a slow trickle emerges, pale amber, the smell of
                sweet poppy ahead of any trace of wine or resin. The batch was
                decanted within forty-eight hours. Crace ran his last supply of
                fraudulent laudanum not two days ago.
          on_failure:
            - narrate: >
                Your fingers slip on the brass fitting and the cock shifts
                sharply; a small spill runs down the carboy's flank and drips
                onto the floor flags. You steady it closed. A wet patch on the
                stone, nothing more. The smell is sweet — poppies in sugar,
                nothing heavier.

  - id: sample_vials
    name: "sample vials"
    aliases: [samples, vials, evidence vials, sealed vials, sample bottles, glass vials,
              sealed samples, evidence samples, society samples, sealed bottles, sealed evidence,
              sample evidence, evidence bottles, vial rack, sample rack, testing vials,
              society vials, six vials, blank vials, empty vials, labelled vials]
    description: >
      A rack of six sealed glass vials in the dispensary cupboard — the Society's
      standard evidence sample set, each with a blank wax seal and a paper label
      for the searcher's signature and the date of seizure. Filling them from
      the suspect batch and sealing them under your mark will make them admissible
      before the Society's court. These are what you came for.
    takeable: true
    quest_critical: true
    take_effects:
      - inc_var: { name: score, by: 20 }

  - id: mortar_pestle
    name: "mortar and pestle"
    aliases: [mortar, pestle, stone mortar, grinding mortar, apothecary mortar, bench mortar,
              stone pestle, mortar pestle, pestle and mortar, grinding stone, bench mortar,
              stone bowl, grinding bowl]
    description: >
      A heavy stone mortar and pestle on the bench, the bowl stained deep brown
      from years of grinding bark and root. The last residue in the bowl is a
      pale dry powder — ground poppy head material, consistent with preparing a
      bulk decoction from English poppies. No trace of the dark resinous residue
      that remains in a mortar used to work with true opium.

  # ── Store loft ──────────────────────────────────────────────────────────────
  - id: raw_poppy
    name: "dried poppy sacks"
    aliases: [sacks, poppy, raw poppy, dried poppy, poppy sacks, dried sacks, poppy heads,
              raw material, bulk poppy, poppy material, dried heads, english poppy,
              poppy head sacks, sacks of poppy, dried material, sacks against wall]
    description: >
      Bulging sacks of dried English poppy heads — Papaver somniferum, grown
      inland and dried whole. The source material for syrupus papaveris: boiled in
      water with sugar, strained, reduced. Cheap and easily obtained from a domestic
      crop. There is no foreign material in the loft: no imported opium, no Smyrna
      resin, no foreign parchment of provenance. Crace has no laudanum stock
      because he never purchased any.

  - id: crace_journal
    name: "Crace's private journal"
    aliases: [journal, private journal, private accounts, private ledger, crace private,
              crace accounts, leather journal, bound journal, crace journal, private notes,
              crace notes, personal journal, loft journal, loft notes, worn leather,
              bound leather, leather bound, private record, crace record]
    description: >
      A leather-bound private journal on the writing shelf, Crace's personal
      record of his practice. The entries for the past year are candid: two
      search officers had called; one accepted a gift of six shillings and found
      nothing; the second missed the dispensary entirely. Tonight's expected visit
      is noted in the margin for this week.
    read_text: >
      The entry for last autumn: "Soc. officer called — Thurs. eve. Offered
      six shillings; accepted. Found nothing worth reporting. Cost is manageable."
      Two months later: "Second visit — different officer. Counter search only.
      Did not reach dispensary. Lucky. Cannot rely on luck again. Purse prepared
      in loft against next call: twelve shillings. Better than six." In the margin
      for this week, dated two days ago: "Friday expected. Purse on shelf —
      twelve shillings." Your visit. Twelve shillings, ready on the shelf.
      Crace has considered you in advance.
    # Second source for bug_0123 discipline: journal names the purse, the sum,
    # and Crace's intent before the player can take the purse. No score —
    # corroborating context, not a gate.

  - id: crace_purse
    name: "sealed cloth purse"
    aliases: [purse, cloth purse, money, coins, bribe, bribe purse, twelve shillings,
              payment, sealed purse, crace purse, purse of coins, purse of money, cloth pouch,
              loft purse, writing shelf purse, apothecary bribe, bribe money, cloth money]
    description: >
      A sealed cloth purse on the writing shelf between the inkwell and the
      journal — heavy for its size. A paper label is tucked under the wax seal;
      it reads "For quietness in Society business — T.C." and names the sum:
      twelve shillings sterling. Crace left this for whoever came searching.
      His journal makes the arrangement explicit. To take this is to sell the
      Society's warrant for twelve shillings and leave Crace's patients
      without the analgesia they are paying for.
    # Bug_0123 discipline: description names the heading, the sum, and Crace's
    # intent before TAKE fires end_game. Not an ambush.
    takeable: true
    take_effects:
      - narrate: >
          You pocket the purse. The weight of it settles in your coat and the
          meaning of it is plain at once. Crace's journal had named the sum.
          His prior officers had each found nothing worth reporting. Whatever
          the carboys contained; whatever the vial tasted of; whatever the
          dispensatory said — it will not reach the Society's court from you now.
          The sample vials are still in the dispensary cupboard. The dispensing
          ledger is still open on the bench. The poppy-syrup carboys are still
          decanting into laudanum bottles in the back room. Crace's entry for
          this visit will read the same as the others: "For quietness in Society
          business." A manageable cost.
      - end_game: ending_paid

npcs: []

win_conditions:
  - id: case_presented
    # cheapside_lane is only reachable via the gated N exit from shop_counter,
    # which requires has_item: sample_vials AND has_flag: proved_substitution.
    conditions: [{ visited: cheapside_lane }]
    ending: ending_presented
  - id: search_abandoned
    # back_passage is reachable via the S exit from shop_counter, always open.
    conditions: [{ visited: back_passage }]
    ending: ending_withdrawn

endings:
  - id: ending_presented
    title: "The Standard"
    text: >
      You presented the sealed sample vials and the comparison result to the
      Society's court at nine o'clock the following morning: the pharmacopoeia
      entry for laudanum; the vial's taste result — sweet, no bitterness, no
      anodyne effect at any duration; the dispensing ledger's margin note
      naming the substitution's economics. Three exhibits, each supporting the
      others. Crace did not appear. The Society's messenger found his shop
      shuttered and a note on the door forwarding correspondence to a cousin
      in Bristol.
      His dispensing licence was revoked in absentia. The twelve physicians who
      had supplied his patients were formally notified. The Society entered the
      case in its search record as a complete finding — the first of the year.
      *** The substitution proved. ***

  - id: ending_withdrawn
    title: "The Back Passage"
    text: >
      You stepped out of Crace's shop into the back passage and turned toward
      the street. Whatever you had found — the taste result, perhaps, or the
      carboys in the dispensary — you had not assembled the complete chain:
      the comparison against the pharmacopoeia and the sealed sample vials
      both required before the Society's court would act. Without them, the
      finding could not be presented. Crace would know you had been in his
      shop; he would move the carboys and the dispensing ledger before morning,
      and the next searcher would find a tidy operation with correct labels
      and nothing out of place.
      *** The search incomplete. ***

  - id: ending_paid
    title: "For Quietness"
    text: >
      Crace's prior search officers had walked out with something in their coat
      and a report that found nothing actionable. They had both been entered in
      his journal under the same heading: "For quietness in Society business."
      Your entry will read the same. The sample vials are still in the dispensary
      cupboard. The dispensing ledger is still open on the bench. The poppy-syrup
      carboys are still decanting into laudanum bottles in the back room. The
      physicians who trusted Crace's preparations will continue to prescribe them.
      The patients will continue to receive no analgesia. Twelve shillings is a
      manageable cost, as Crace had calculated.
      *** You are bought. ***
