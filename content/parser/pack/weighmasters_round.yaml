# The Weighmaster's Round — a Zork-style parser pack (Stage 3).
#
# The TENTH parser pack, and the FIRST to use DUAL-WEIGHING AS A DOCUMENTARY MECHANIC.
# Prior parser packs use a single instrument as evidence (stave, ledger, warrant) or a
# binary state change (clerk_woken, lamp_lit). Here the player must weigh the SAME grain
# sample on TWO different scales — the rigged public beam in the weighing_room, then
# the honest private balance in the grain_loft — and the COMPARISON between the two
# figures is the crime. Neither figure alone is proof; together they make a case. This
# is the first parser pack where evidence is a NUMBER PAIR derived by using the same
# item on two different objects in sequence, with an explicit dependency (weighed_false
# must precede weighed_true so the receipted figures are meaningful).
#
# Three resolution paths:
#   1. Full chain: accounts (+5) → weigh false (+5) → weigh true (+10) → ledger (+20) →
#      market_yard (WIN 40/40, ending_documented)
#   2. Partial: leave via back_alley (south exit, gated on not fraud_proved) with or
#      without the receipt — testimony not backed by documentary proof (ending_denounced)
#   3. Destruction: smash the rigged public scales with the crowbar instead of documenting
#      them — fires end_game: ending_sabotaged immediately (0)
#
# Setting: Aldis Cope's grain warehouse, market square, 1693. Cope runs a systematic
# short-weight fraud — his public beam balance has a rigged fulcrum that reads one part
# in fourteen under true weight. His private brass-pan balance in the grain loft is the
# honest instrument he checks his own fraud against; his hidden ledger records four years
# of yield from the adjustment. The player is a deputy weighmaster alone before dawn.
#
# Map:
#
#   market_yard (WIN — walk out with deputy_receipt AND fraud_proved)
#        │ N* (* gated: has_item deputy_receipt AND has_flag fraud_proved)
#   counting_house (start; merchant_accounts; deputy_receipt; north_door)
#        │ S** (** gated: not_flag fraud_proved) │ E
#   back_alley (PARTIAL)    warehouse_floor (grain_sacks; grain_sample; warehouse_crowbar)
#                                 │ E              │ N
#                           weighing_room    grain_loft (true_scales; hidden_ledger; loose_board)
#                           (false_scales; standard_weights)
#
# Score (max 40):
#   +5   READ merchant_accounts   (counting_house — the BY COPE'S MEASURE pattern)
#   +5   USE grain_sample ON false_scales   (weighing_room — records the rigged figure)
#   +10  USE grain_sample ON true_scales    (grain_loft — reveals discrepancy; req. weighed_false)
#   +20  TAKE hidden_ledger                 (grain_loft — Cope's own four-year record)
#
# Endings (3):
#   ending_documented — WIN (non-death): receipt + fraud_proved → market_yard
#   ending_denounced  — PARTIAL (non-death): left via back_alley without the ledger
#   ending_sabotaged  — BAD (non-death): smashed the public scales with the crowbar
#
# ending_sabotaged telegraphed twice before triggerable (bug_0123 discipline):
#   source 1: false_scales description — player reads about the rigged fulcrum before
#     the crowbar action is even available (it is a different takeable item)
#   source 2: warehouse_crowbar description — "breaking things that should not be broken"
#     names the consequence before the player can act
#
# Supporting-evidence tension beat: USE warehouse_crowbar ON loose_board
# (command_verb: check) in grain_loft. d20 + steadiness (3) vs DC 11. On success
# it reveals Cope's hidden calibration cache under the badly re-nailed board: lead
# shavings and a spare off-centre fulcrum casting, useful corroboration but not part
# of the required score chain. It gates no exit, score, or ending identity; it only
# gives visible room/object/ending-text payoff. Failure is re-tryable.

meta:
  id: weighmasters_round_v1
  title: "The Weighmaster's Round"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Weighmaster's Counting House"
    quest: "settle the warehouse weight fraud"
    role: "weighmaster"
    connection: "Every warehouse scale in Charterhaven points back to the counting house, where false weight becomes false law."
  start_room: counting_house
  flags_init: []
  vars_init: { steadiness: 3 }
  max_score: 40

rooms:
  - id: counting_house
    name: "The Counting-House"
    description: >
      Aldis Cope's counting-house at the back of the warehouse — a plain room
      smelling of grain dust and tallow. A sloping desk holds the day's accounts,
      open to a recent page. A candle has burned to its holder and gone out.
      The deputy's receipt form lies folded on the corner of the desk. The north
      door leads to the market square; the warehouse floor lies east. A service
      passage behind the desk runs south to the alley.
    variants:
      - when: [{ has_flag: fraud_proved }]
        text: >
          The counting-house, the hidden ledger's proof secured. The desk holds
          the day's accounts. The north door leads to the market square; the
          warehouse floor lies east.
      - when: [{ has_flag: deputy_receipt_taken }]
        text: >
          Aldis Cope's counting-house at the back of the warehouse, still
          smelling of grain dust and tallow. A sloping desk holds the day's
          accounts, open to a recent page. The corner where the deputy's receipt
          form lay is bare now. The north door leads to the market square; the
          warehouse floor lies east. A service passage behind the desk runs
          south to the alley.
    objects: [merchant_accounts, deputy_receipt, north_door]
    exits:
      - { direction: east, to: warehouse_floor }
      - direction: north
        to: market_yard
        conditions: [{ has_item: deputy_receipt }, { has_flag: fraud_proved }]
        locked_msg: >
          The market square waits beyond the north door — but the weighmaster's
          hall needs documentary proof as well as your word. Find the ledger in
          the grain loft, or leave by the south passage with what you have.
      - direction: south
        to: back_alley
        conditions: [{ not_flag: fraud_proved }]
        locked_msg: >
          With the ledger in hand, the south passage is the wrong road.
          The weighmaster's hall is north.

  - id: back_alley
    name: "The Back Alley"
    description: >
      A narrow alley behind the warehouse, the cobbles dark with old rain. You
      came out the service passage and the counting-house door has closed behind
      you. Dawn is an hour off. Whatever you found inside is what you have.

  - id: warehouse_floor
    name: "The Warehouse Floor"
    description: >
      A long room of stone flags and timber baulks, grain sacks stacked in rows
      from floor to beam. A tally board and pallet rack line the east wall beside
      the door to the weighing-room; a measured grain sample waits near the
      marked sacks. A low stair in the north wall leads up to the grain loft
      where Cope keeps private stock. The counting-house lies west.
    variants:
      - when: [{ has_flag: grain_sample_taken }]
        text: >
          A long room of stone flags and timber baulks, grain sacks stacked in
          rows from floor to beam. A tally board and pallet rack line the east
          wall beside the door to the weighing-room; the marked-sack spot where
          the measured grain sample waited is empty now. A low stair in the
          north wall leads up to the grain loft where Cope keeps private stock.
          The counting-house lies west.
    objects: [grain_sacks, grain_sample, warehouse_crowbar]
    exits:
      - { direction: west, to: counting_house }
      - { direction: east, to: weighing_room }
      - { direction: north, to: grain_loft }

  - id: weighing_room
    name: "The Public Weighing-Room"
    description: >
      The merchant's public weighing station, facing the yard. A great oak-beam
      balance stands on a low platform, its pans polished bright for the market.
      Standard weights hang in their rack beside it: dram, ounce, pound, stone.
      The warehouse floor lies west.
    variants:
      - when: [{ has_flag: weighed_false }]
        text: >
          The weighing-room, the beam balance at its last position — one part in
          fourteen off true, by your reading. The warehouse floor lies west.
    objects: [false_scales, standard_weights]
    exits:
      - { direction: west, to: warehouse_floor }

  - id: grain_loft
    name: "The Grain Loft"
    description: >
      A low-ceilinged room above the main floor, private sacks ranked against the
      east wall. A brass-pan balance — smaller than the public one below, and
      unmarked — sits on a counting table beside a plain brown ledger. One
      floorboard near the table springs slightly underfoot: badly re-nailed.
      The warehouse lies south.
    variants:
      - when: [{ has_flag: fraud_proved }, { has_flag: board_checked }]
        text: >
          The grain loft, the hidden ledger in your keeping. The brass-pan
          balance remains on the table, and the loose board near it lies eased
          up now, showing the shallow hiding place beneath: lead shavings, file
          marks, and a spare off-centre fulcrum casting that matches the public
          beam's trick. The warehouse lies south.
      - when: [{ has_flag: board_checked }]
        text: >
          A low-ceilinged room above the main floor, private sacks ranked against
          the east wall. A brass-pan balance sits on a counting table beside a
          plain brown ledger, and the loose board near it lies eased up now,
          showing the shallow hiding place beneath: lead shavings, file marks,
          and a spare off-centre fulcrum casting. The warehouse lies south.
      - when: [{ has_flag: fraud_proved }]
        text: >
          The grain loft, the hidden ledger in your keeping. The brass-pan
          balance remains on the table. The loose board underfoot still springs.
          The warehouse lies south.
    objects: [true_scales, hidden_ledger, loose_board]
    exits:
      - { direction: south, to: warehouse_floor }

  - id: market_yard
    name: "The Market Yard"
    description: >
      The market square before dawn, the cobbles slick with dew. You have the
      deputy's receipt in one coat pocket and Cope's hidden ledger in the other —
      the rigged figure beside the true figure, four years of yield in his own
      hand. The weighmaster's hall opens at six.

objects:
  - id: merchant_accounts
    name: "day's accounts"
    aliases: [accounts, day-book, desk, papers, cope accounts, account book, accounts ledger]
    description: >
      The day's accounts on the sloping desk: names, weights, sums in Cope's
      small careful hand. One column — "BY COPE'S MEASURE" — runs consistently
      higher than any honest stone-weight ought to allow across every entry.
    read_text: >
      The entries for the last market week fill three pages. Each transaction
      records two figures: the farmer's claimed weight and "BY COPE'S MEASURE"
      — the adjusted figure that settles the payment. Cope's measure runs short
      by roughly one part in fourteen across every sale. The pattern is clear
      if you know what to look for. The accounts alone are suggestive; they
      prove nothing without the scales to confirm it.
    interactions:
      - verb: READ
        target: merchant_accounts
        conditions: [{ not_flag: read_accounts }]
        effects:
          - set_flag: read_accounts
          - inc_var: { name: score, by: 5 }

  - id: deputy_receipt
    name: "deputy's receipt"
    aliases: [receipt, form, paper, warrant, deputy receipt, weighmaster receipt, blank form, receipt form]
    description: >
      A blank weighmaster's receipt form — the official document for recording a
      certified weighing. Unsigned and unstamped, but it carries the city seal
      watermark. With your figures on it and a licensed weighmaster's
      countersignature, it becomes legal evidence. Without it you are only a man
      who has been in a merchant's counting-house at night.
    takeable: true
    take_effects:
      - set_flag: deputy_receipt_taken

  - id: north_door
    name: "north door"
    aliases: [door, front door, market door, north passage, front, market square door]
    description: >
      The door to the market square, standing shut. What you carry when you walk
      through it is the whole case. If you are not ready, the south passage leads
      to the back alley.
    interactions:
      - verb: OPEN
        target: north_door
        conditions: [{ not_item: deputy_receipt }]
        effects:
          - narrate: >
              Without the deputy's receipt you have no authority to bring a case
              at all. It is on the corner of the desk.

  - id: grain_sacks
    name: "grain sacks"
    aliases: [sacks, bags, wheat, stacks, rows, hessian, sack, grain sacks, rye sacks]
    description: >
      Rows of heavy hessian sacks, each one tallied and stacked by lot. The grain
      is fine — nothing wrong with what Cope is selling. What is wrong is the
      weight it is sold at.
    interactions:
      - verb: INSPECT
        target: grain_sacks
        effects:
          - narrate: >
              Standard market rye, by the smell — no adulteration. Cope is not
              selling bad grain; he is selling less of it than he claims to.
              That is a different fraud and a harder one to see.

  - id: grain_sample
    name: "grain sample"
    aliases: [sample, handful, grain, measure, rye, corn, handful of grain, measured sample, sample rye, grain sample]
    description: >
      A measured sample of rye from the warehouse floor — exactly one standard
      pound weighed out in your cupped hands by a deputy weighmaster's trained
      instinct. The raw material of the case.
    takeable: true
    take_effects:
      - set_flag: grain_sample_taken

  - id: warehouse_crowbar
    name: "crowbar"
    aliases: [bar, iron bar, lever, crow, pry-bar, pry bar, wrecking bar, pallet bar]
    description: >
      A short iron crowbar from the pallet-shifting rack on the east wall —
      the kind warehouses keep for moving heavy goods, breaking open jammed
      lids, and similar work. Useful for casks and pallets and, if you are
      not careful, for breaking things that should not be broken.
    takeable: true

  - id: false_scales
    name: "beam balance"
    aliases: [scales, balance, beam, weights, platform, pans, oak beam, public scales, false balance, false scales, weighing beam]
    description: >
      The great oak-beam balance on its platform — polished brass pans, a clean
      bearing, a pointer that swings smooth. Or nearly so. The fraud is not in
      the standard weights in the rack; it is in the beam's fulcrum, cast
      slightly off-centre. An honest-looking instrument that reads one part in
      fourteen short on every pound.
    variants:
      - when: [{ has_flag: weighed_false }]
        text: >
          The beam balance, its pans at rest from your last measurement — one
          part in fourteen off true. You have the rigged figure.
    interactions:
      # DUAL-WEIGHING step 1: record the rigged figure.
      - verb: USE
        item: grain_sample
        target: false_scales
        conditions: [{ has_item: grain_sample }, { not_flag: weighed_false }]
        effects:
          - set_flag: weighed_false
          - inc_var: { name: score, by: 5 }
          - narrate: >
              You set the grain sample in the left pan and balance it against the
              standard pound weight. The beam finds equilibrium — by this scale,
              your sample is exactly one pound. But the beam pointer rests
              fractionally past true centre: the fulcrum is off, cast into the
              beam itself, invisible unless you know what to feel for. One part
              in fourteen, light. You record the figure on the receipt. You need
              the honest figure to put beside it. The grain loft is north of the
              warehouse.
      # DESTRUCTION PATH: smash the public scales with the crowbar.
      # Telegraphed twice: false_scales desc (rigged fulcrum named); crowbar desc
      # ("breaking things that should not be broken"). Fires end_game immediately.
      - verb: USE
        item: warehouse_crowbar
        target: false_scales
        conditions: [{ has_item: warehouse_crowbar }]
        effects:
          - narrate: >
              The crowbar goes into the beam's platform casting and you bear down.
              The oak beam cracks off its pivot with a sound like a green branch
              snapping — the pans scatter across the floor, the false fulcrum
              rolling out across the flagstones in plain view. Cope's instrument
              of fraud is broken. There will be no weighing here for some time.
              But there is also no receipt, no ledger, no case — only a deputy
              weighmaster in a merchant's warehouse at night with a crowbar, and
              no story that ends well in a court of record.
          - end_game: ending_sabotaged

  - id: standard_weights
    name: "standard weights"
    aliases: [dram, ounce, pound weight, stone weight, standard, rack, assay weights, weights rack]
    description: >
      The standard weights in their rack — dram, ounce, pound, stone, each one
      stamped with the city assay mark. They are honest. The fraud is in the
      beam's casting, which no one checks.
    interactions:
      - verb: INSPECT
        target: standard_weights
        effects:
          - narrate: >
              Each weight bears the city assay stamp and matches its stated mark.
              A skilled assayer inspects them quarterly. The fraud is not here —
              it is in the fulcrum casting, which nobody checks between commissions.

  - id: true_scales
    name: "brass-pan balance"
    aliases: [brass scales, true scales, private scales, unmarked balance, small balance, brass balance, brass pan, unmarked scales]
    description: >
      A smaller brass-pan balance on the counting table — unmarked, unregistered,
      never certified. Not a market instrument. A personal one, for checking what
      the public scales return against a known-true measure. Cope uses it to
      verify his own fraud.
    variants:
      - when: [{ has_flag: weighed_true }]
        text: >
          The brass-pan balance, still holding the true reading of your sample:
          fifteen sixteenths of what the beam below said. One part in fourteen,
          short. Both figures are on the receipt.
    interactions:
      # DUAL-WEIGHING step 2: compare against true balance.
      # Requires weighed_false first — that is the documented dependency.
      - verb: USE
        item: grain_sample
        target: true_scales
        conditions: [{ has_item: grain_sample }, { has_flag: weighed_false }, { not_flag: weighed_true }]
        effects:
          - set_flag: weighed_true
          - inc_var: { name: score, by: 10 }
          - narrate: >
              You set the same grain sample in the left pan. The brass-pan balance
              — unregistered and scrupulously accurate — gives a different answer:
              fifteen sixteenths of the public scale's reading. You write the
              second figure beside the first on the receipt: "BY COPE'S MEASURE
              — one pound. BY TRUE BALANCE — fifteen sixteenths." One part in
              fourteen short, on every pound, on every market day, for four years.
              The receipt holds both figures now. The ledger on the table may hold
              the rest.

  - id: hidden_ledger
    name: "plain ledger"
    aliases: [plain ledger, brown ledger, book, register, hidden book, cope ledger, plain cover, private ledger, brown cover]
    description: >
      A plain brown cover, no name on the spine. Inside: Cope's own private
      record of the scale adjustment — every market day's yield from the
      short-weight, calculated against the registered public measure. The kind of
      document that men keep because they trust their hiding places.
    read_text: >
      The entries go back four years. Each one records a market week: total weight
      sold, the public-scale figure, the true figure, and the difference — labelled
      "MARGIN (FULCRUM)." The sums are tidy and exact. Cope is a careful man. The
      most recent entry is dated two days ago.
    takeable: true
    take_effects:
      - inc_var: { name: score, by: 20 }
      - set_flag: fraud_proved

  - id: loose_board
    name: "loose floorboard"
    aliases: [board, plank, creak, floorboard, loose plank, spring board, loose board, creaking board]
    description: >
      A floorboard near the counting table, the nail driven home badly — the board
      springs slightly underfoot when you step on it. Someone replaced it in a hurry.
    variants:
      - when: [{ has_flag: board_checked }]
        name: "opened floorboard"
        text: >
          The board lies eased up from the floor now. Under it is a shallow
          hiding place dusted with lead shavings and black file marks, and at
          the back a spare off-centre fulcrum casting: the small, cold duplicate
          of the fraud built into the public beam below.
    interactions:
      # SUPPORTING-EVIDENCE BEAT — CHECK the loose board (OPTIONAL, convergent).
      # USE crowbar to probe the board. d20 + steadiness (3) vs DC 11.
      # Success reveals a calibration cache and makes board_checked a visible
      # evidence flag. It gates no score, exit, or ending identity; FAILURE is
      # re-tryable.
      - verb: USE
        item: warehouse_crowbar
        target: loose_board
        command_verb: check
        conditions: [{ has_item: warehouse_crowbar }, { not_flag: board_checked }]
        skill_check:
          skill: steadiness
          difficulty: 11
          on_success:
            - set_flag: board_checked
            - add_journal: "Under the loose board you found Cope's calibration cache: lead shavings, file marks, and a spare off-centre fulcrum casting for the public beam."
            - narrate: >
                You ease the crowbar under the board's edge and lift without
                splitting the plank. Beneath it is not a trap but a shallow
                hiding place: lead shavings, black file marks, and a spare
                off-centre fulcrum casting wrapped in rag. It is the public
                beam's trick in miniature — the workshop leavings of the fraud,
                hidden under Cope's own table.
          on_failure:
            - narrate: >
                The board shifts under the crowbar's weight and cracks once — a
                sharp sound in the still dark. You stand still for a count of five.
                Nothing moves below, but the edge has not lifted cleanly enough
                to see what is under it. You breathe out; a steadier hand with
                the crowbar could still work the board loose.

npcs: []

win_conditions:
  - id: fraud_documented
    # market_yard is only reachable via the N exit from counting_house, gated on
    # has_item: deputy_receipt AND has_flag: fraud_proved (the locomotion win shape).
    conditions: [{ visited: market_yard }]
    ending: ending_documented
  - id: word_given
    # back_alley is only reachable via the S exit from counting_house, gated on
    # not_flag: fraud_proved. Any visit to back_alley means the player left without
    # the ledger. The ending text covers all sub-cases (with or without the receipt).
    conditions: [{ visited: back_alley }]
    ending: ending_denounced

endings:
  - id: ending_documented
    title: "The Weighmaster's Case"
    text: >
      You walked out of Aldis Cope's counting-house with the deputy's receipt in
      one coat pocket and the hidden ledger in the other: two figures on the
      receipt — the rigged and the true — and four years of yield in the ledger,
      all of it in Cope's own hand.
      The weighmaster's hall opened at six. By seven the guild clerk had the
      relevant pages copied and the city assayer had the beam balance's fulcrum
      on his bench. Cope was summoned at eight. His market licence was suspended
      by noon. The damages from four years of short-weight were still being
      calculated at dusk, but the ledger made them incontestable. Your deputy's
      mark is on the opening page of the case record.
      *** The fraud is documented. ***
    variants:
      - when: [{ has_flag: board_checked }]
        text: >
          You walked out of Aldis Cope's counting-house with the deputy's receipt
          in one coat pocket and the hidden ledger in the other: two figures on
          the receipt — the rigged and the true — and four years of yield in the
          ledger, all of it in Cope's own hand. From the loft you also brought
          the story of the loose board: lead shavings, file marks, and a spare
          off-centre fulcrum casting hidden under Cope's table.
          The weighmaster's hall opened at six. By seven the guild clerk had the
          relevant pages copied and the city assayer had the beam balance's
          fulcrum on his bench. Cope was summoned at eight. His market licence
          was suspended by noon. The damages from four years of short-weight
          were still being calculated at dusk, but the ledger made them
          incontestable — and the cache under the board told the committee the
          false beam was no accident of casting. Your deputy's mark is on the
          opening page of the case record.
          *** The fraud is documented. ***

  - id: ending_denounced
    title: "The Deputy's Word"
    text: >
      You left Cope's warehouse by the back passage, with what you had found and
      nothing more. The weighmaster's hall heard your report: the rigged fulcrum
      in the beam, the pattern in the accounts, one part in fourteen. Without the
      private ledger in Cope's own hand — without the two figures side by side on
      a certified receipt — it was a licensed officer's observation against a
      merchant's public record. The guild committee noted your concern. The scales
      were re-certified by the Collector's assayer and returned within the week.
      Cope's licence was clean. Your name went in the minutes as a matter of record.
      It was the truth. It was not enough.
      *** Your word alone was not sufficient. ***

  - id: ending_sabotaged
    title: "The Broken Beam"
    text: >
      You left Cope's warehouse in the dark and did not go to the weighmaster's
      hall. The beam balance is broken; Cope will commission a new one before his
      next market day, and the new beam will have a new fulcrum, carefully cast.
      The fraud will stop for a season and then run again, because nobody has a
      ledger that says otherwise — and because a deputy weighmaster found in a
      merchant's warehouse at night with a crowbar is not a man who makes a
      credible complaint to anyone.
      The fraud stopped. The fraud continued.
      *** You broke what you could not prove. ***
