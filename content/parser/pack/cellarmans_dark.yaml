# The Cellarman's Dark — a Zork-style parser pack (Stage 2/3).
#
# The sixth parser pack, and the first to treat DARKNESS AS A GAME STATE. Every
# prior parser pack is always-lit: rooms render their full description and full
# action set on every visit. Here the wine_vault is inaccessible without a lit
# lamp, and the oil_store's spirit_cask is invisible in the dark — the player must
# light the old lamp (a two-step chain: find the oil in the dark, fill and light it)
# before the back half of the cellar opens. This is Zork's signature mechanic —
# the unlit cellar, the room you cannot enter without a flame — exercised for the
# first time in this corpus.
#
# Setting: a coaching inn's back cellar on a rainy night. You are the potman. The
# innkeeper is gravely ill upstairs; without the title deeds in the cellar deed-box
# his creditors, not his daughter, take the inn when he dies. Go down, light the
# lamp, find the box, and bring it back before dawn.
#
# Map:
#
#   inn_passage (WIN — walk back in here with the deed-box)
#        │ S*  (* N exit from coal_yard gated on found_deeds)
#   coal_yard (start; coal-hole steps)
#        │ down
#   ale_cellar (hub; cellarman's note +5; lamp; tinderbox)
#        │ E                   │ W*
#   oil_store (always        wine_vault (blocked without lamp;
#    accessible; DARK w/o      deed_box → +20 → WIN;
#    lamp; oil_jar; spirit_cask → death)     cash_box → ending_absconded GREED)
#
#   (* W exit from ale_cellar gated on has_flag: lamp_lit)
#
# Lighting chain:
#   TAKE lamp (ale_cellar) + TAKE tinderbox (ale_cellar) +
#   TAKE oil_jar (oil_store — accessible in the dark by feel) →
#   USE oil_jar ON lamp → lamp_oiled (jar remains with you, now empty) →
#   USE tinderbox ON lamp → lamp_lit (+10) → wine_vault unlocks
#
# Score (max 35):
#   +5  read the cellarman's note    (two-source §17 clue: oil in east store, deed-box
#                                     in vault, do not open the cracked spirit-cask
#                                     under flame)
#   +10 light the lamp               (enabling step — wine_vault opens, spirit_cask visible)
#   +20 take the deed-box            (climax)
#
# Endings (3, per the sealed_crypt three-way discipline):
#   ending_recovered  — WIN (non-death): walk back into the inn with the deed-box
#   ending_absconded  — GREED (non-death): take the innkeeper's brass cash-box
#   ending_ignited    — DEATH: open the cracked spirit-cask with the lamp burning
#
# Both bad forks are telegraphed in place before they can be triggered (bug_0123):
#   • ending_absconded: cash-box examine names the innkeeper's coin and says to
#     take it is to make a different choice than the one you came for.
#   • ending_ignited: note AND oil_store warning board both say not to open the
#     cracked spirit-cask under flame; the spirit_cask examine repeats the
#     smell-warning in the dark AND shows the board explicitly once lit.
#
# The score tops out at 35 on TAKE deed-box, one step before the win — the player
# walks back to coal_yard and north to inn_passage still holding 35/35. This is
# the sealed_crypt / friars_postern shape (SCORE_PEAKS does not fire on a locomotion
# win; the walk home is the denouement).
#
# DARKNESS MECHANICS — note for the engine reader:
#   • oil_store is always accessible (the dark is manageable; the oil_jar is "on the
#     low shelf just inside the door" and takeable without conditions — by feel, as
#     the room text explains). The spirit_cask OPEN interaction requires lamp_lit, so
#     the death pole is entirely invisible until the player can see the warning board.
#   • wine_vault is blocked until lamp_lit (exit condition on the W door in ale_cellar).
#     Objects inside are therefore unreachable without a lit lamp, so neither deed_box
#     nor cash_box can be taken or examined in the dark — no inconsistency possible.
#   • Room variants on oil_store and wine_vault swap in the full lit description;
#     the base description (dark) is live only BEFORE lamp_lit is set, so no variant
#     goes dead (bug_0146 discipline: the base is always valid in its window).

meta:
  id: cellarmans_dark_v1
  title: "The Cellarman's Dark"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Coal Yard Cellar"
    quest: "carry light through the locked cellar"
    role: "cellarman"
    connection: "Charterhaven's cellars bind fuel, drink, and debt under the same streets the courts walk above."
  start_room: coal_yard
  flags_init: []
  # `steadiness` (value 3) — the potman's sure hand, rolled by the OPTIONAL d20
  # TENSION beat: USE lamp CHECK (hold the lamp in the dark and check the wick before
  # filling it). Stage-4 skill_check mechanic standardized into parser mode, exactly
  # the sealed_crypt / friars_postern / lamplighters_round shape. CONVERGENT — gates
  # NOTHING the exhaustive proofs turn on: the wick_checked beat and the FILL + LIGHT
  # beats are separate interactions on the lamp; lamp_lit (the enable flag) is set by
  # LIGHT, not CHECK; the +10 rides lamp_lit; no exit/ending/variant reads wick_checked.
  # On failure the beat is retryable (wick_checked only set on success). The win route,
  # the 35-point economy, and every ending stay reachable byte-for-byte on either outcome.
  vars_init: { steadiness: 3 }
  max_score: 35

rooms:
  - id: coal_yard
    name: "The Coal Yard"
    description: >
      The inn's back yard at night, the cobbles slick with rain. The coal-hole steps
      drop steeply into the dark below; the kitchen passage opens north into the building
      itself. A light burns in an upstairs window — the doctor is still up there with him.
    # Post-deeds variant: the walk home. Closes the arc before the final step north.
    # `found_deeds` is set in deed_box take_effects; this variant is live the moment
    # the player surfaces from the cellar with the box. It cannot go dead (base text is
    # valid before found_deeds; variant replaces it only after — no overlapping window).
    variants:
      - when: [{ has_flag: found_deeds }]
        text: >
          The inn's back yard, wet cobbles under your feet. You came up through the
          coal-hole with the deed-box under your arm, and the kitchen passage stands
          open to the north. The doctor's light is still in the window above. Whatever
          the law says at dawn, the box says something older and plainer.
    exits:
      - { direction: down, to: ale_cellar }
      - direction: north
        to: inn_passage
        conditions: [{ has_flag: found_deeds }]
        locked_msg: >
          You came down here for a reason. The deed-box is somewhere in the cellar —
          leave without it and whatever you came to prevent will happen anyway.

  - id: inn_passage
    name: "The Kitchen Passage"
    description: >
      The inn's kitchen passage, cold stone and a dead range. You set the deed-box
      on the cutting table and let out a long breath. The doctor's feet are still
      above you, the house still alive around the sound of them. There is time — just.

  - id: ale_cellar
    name: "The Ale Cellar"
    description: >
      The inn's main cellar, low and barrel-vaulted. Tuns of ale crowd the walls on
      their racks. A lamp-bracket is bolted to the pillar by the stair; from it hangs
      an oil-lamp, its reservoir bone-dry. A tinderbox sits on the ledge beside the
      bracket. A piece of paper is tacked below it on the post.
      The coal-hole stair runs back up to the yard. An arch to the east opens into
      the oil-store; a heavy door to the west leads to the wine vault.
    # Reactive room text: once lamp/tinderbox are taken, the cellar no longer
    # places them on the bracket/ledge; once lit, it distinguishes the held-light
    # route from the lamp-left-in-bracket route.
    variants:
      - when:
          - has_flag: lamp_lit
          - has_item: lamp
          - has_item: tinderbox
        text: >
          The inn's main cellar, properly lit now by the old lamp in your hand, its
          yellow light throwing shadows up the barrel-vaulted ceiling. Tuns of ale
          line the walls. The bracket on the pillar and the ledge beside it are bare
          now, with the tinderbox also in your kit. The coal-hole stair runs back up
          to the yard. An arch to the east opens into the oil-store; the heavy door
          to the west leads to the wine vault.
      - when:
          - has_flag: lamp_lit
          - has_item: tinderbox
        text: >
          The inn's main cellar, properly lit now by the old lamp on its bracket, its
          yellow light throwing shadows up the barrel-vaulted ceiling. Tuns of ale
          line the walls. The tinderbox is with you now rather than on the ledge. The
          coal-hole stair runs back up to the yard. An arch to the east opens into
          the oil-store; the heavy door to the west leads to the wine vault.
      - when:
          - has_item: lamp
          - has_item: tinderbox
        text: >
          The inn's main cellar, low and barrel-vaulted. Tuns of ale crowd the walls
          on their racks. The lamp-bracket on the pillar and the ledge beside it are
          bare now: the oil-lamp and tinderbox are with you. A piece of paper is
          tacked below the bracket on the post. The coal-hole stair runs back up to
          the yard. An arch to the east opens into the oil-store; a heavy door to the
          west leads to the wine vault.
      - when:
          - has_item: lamp
        text: >
          The inn's main cellar, low and barrel-vaulted. Tuns of ale crowd the walls
          on their racks. The lamp-bracket on the pillar is empty now, the oil-lamp
          with you; the tinderbox still sits on the ledge beside the bracket. A piece
          of paper is tacked below it on the post. The coal-hole stair runs back up
          to the yard. An arch to the east opens into the oil-store; a heavy door to
          the west leads to the wine vault.
      - when:
          - has_item: tinderbox
        text: >
          The inn's main cellar, low and barrel-vaulted. Tuns of ale crowd the walls
          on their racks. A lamp-bracket is bolted to the pillar by the stair; from
          it hangs an oil-lamp, its reservoir bone-dry. The ledge beside the bracket
          is bare where the tinderbox sat. A piece of paper is tacked below it on the
          post. The coal-hole stair runs back up to the yard. An arch to the east
          opens into the oil-store; a heavy door to the west leads to the wine vault.
    objects: [cellarman_note, lamp, tinderbox]
    exits:
      - { direction: up, to: coal_yard }
      - { direction: east, to: oil_store }
      - direction: west
        to: wine_vault
        conditions: [{ has_flag: lamp_lit }]
        locked_msg: >
          The wine vault is that way, but without a lamp you would be groping blind
          among the bottles. Light the lamp first.

  - id: oil_store
    name: "The Oil-Store"
    description: >
      Pitch dark. You move by feel; the shelves are to your left and right, and the
      air is thick with the smell of oil and something sweeter beneath it — something
      you know and do not entirely trust. Something on the low shelf just inside the
      door is right to hand.
    # Lit variant: the warning board and the spirit-cask are revealed. This variant
    # is live ONLY after lamp_lit (base dark description valid before; no dead window).
    # The board text echoes the cellarman's note (two-source §17 clue discipline).
    variants:
      - when: [{ has_flag: lamp_lit }, { has_flag: lamp_oiled }]
        text: >
          A low-ceilinged store, shelves stacked with lamp oil and wicking. At the
          back, pushed against the wall, a cask lists on its side, its bung half-out
          and a sweetish smell seeping out around it. The cellarman's board is nailed
          above it: "OLD SPIRIT — SEAL CRACKED — DO NOT DRAW THE BUNG UNDER FLAME."
          The low shelf just inside the door is bare now; the oil from its jar is in
          the lamp.
      - when: [{ has_flag: lamp_oiled }]
        text: >
          Pitch dark. You move by feel; the shelves are to your left and right, and the
          air is thick with the smell of oil and something sweeter beneath it — something
          you know and do not entirely trust. The low shelf just inside the door is bare
          now; the oil from its jar is in the lamp.
      - when: [{ has_item: oil_jar }]
        text: >
          Pitch dark. You move by feel; the shelves are to your left and right, and the
          air is thick with the smell of oil and something sweeter beneath it — something
          you know and do not entirely trust. The low shelf just inside the door is bare
          now; the oil-jar is with you.
    objects: [oil_jar, spirit_cask]
    exits:
      - { direction: west, to: ale_cellar }

  - id: wine_vault
    name: "The Wine Vault"
    description: >
      A long barrel-vaulted vault, the wine-racks full on either side, the air cool
      and close. At the far end, set on the stone floor, a deed-box of black iron
      stands beside a small cash-box of polished brass.
    variants:
      - when:
          - has_item: deed_box
        text: >
          A long barrel-vaulted vault, the wine-racks full on either side, the air
          cool and close. At the far end, a bare mark on the stone floor shows where
          the deed-box stood before you took it. The small cash-box of polished brass
          remains beside the empty space.
    objects: [deed_box, cash_box]
    exits:
      - { direction: east, to: ale_cellar }

objects:
  - id: cellarman_note
    name: "cellarman's note"
    aliases: [note, paper, notice, post, tacked]
    description: >
      A grubby piece of paper tacked to the post below the lamp bracket.
    read_text: >
      The cellarman's block hand: "LAMP OIL IN THE OIL-STORE (EAST). DEED-BOX AND
      CASH IN THE VAULT (WEST). OLD SPIRIT-CASK AT THE BACK OF THE OIL-STORE —
      SEAL IS CRACKED — DO NOT DRAW THE BUNG UNDER FLAME. DO NOT OPEN UNDER ANY
      CIRCUMSTANCES."
    interactions:
      - verb: READ
        target: cellarman_note
        conditions: [{ not_flag: read_note }]
        effects:
          - set_flag: read_note
          - inc_var: { name: score, by: 5 }

  - id: lamp
    name: "oil lamp"
    aliases: [lamp, lantern, light, oil-lamp]
    description: >
      A serviceable oil-lamp, its reservoir empty. The wick is cut and trimmed — it
      would give a good light if there were oil in it.
    # Post-fill variant: reservoir no longer described as empty.
    # Post-lit variant: it is burning.
    # Both are live only in their window; base is valid before lamp_oiled (bug_0146).
    variants:
      - when: [{ has_flag: lamp_lit }]
        text: >
          The oil-lamp, lit and burning cleanly, throwing a steady yellow light.
      - when: [{ has_flag: lamp_oiled }, { not_flag: lamp_lit }]
        text: >
          The oil-lamp, its reservoir freshly filled. The wick is set and ready;
          it wants nothing but a spark.
    takeable: true
    interactions:
      # TENSION beat — USE lamp ON lamp (command_verb: check): steady the wick in the
      # dark before the real thing. The skill_check is a private dramatic beat, one-shot
      # on success (wick_checked flag retires it). Off the critical path — the FILL and
      # LIGHT beats are separate interactions below that require no prior check — so the
      # 35-point economy and every ending are reachable byte-for-byte on either outcome.
      - verb: USE
        item: lamp
        target: lamp
        command_verb: check
        conditions: [{ not_flag: wick_checked }, { not_flag: lamp_oiled }]
        skill_check:
          skill: steadiness
          difficulty: 12
          on_success:
            - set_flag: wick_checked
            - narrate: >
                You hold the lamp close and run a thumb along the wick — evenly trimmed,
                not charred. Your hands are steady. When the oil is in and the tinder
                catches, it will give a good clean flame.
          on_failure:
            - narrate: >
                You try to gauge the wick by feel in the dark, but your hands won't quite
                stay still. It doesn't matter — when the oil is in, a spark is a spark.
                You'll just have to try it.
      # FILL the lamp: USE oil_jar ON lamp → sets lamp_oiled. The jar remains in
      # inventory as an empty prop so it cannot snap back to the oil-store shelf.
      # Requires the player to be carrying the oil_jar (fetched from oil_store in the dark).
      - verb: USE
        item: oil_jar
        target: lamp
        conditions: [{ has_item: oil_jar }, { not_flag: lamp_oiled }]
        effects:
          - set_flag: lamp_oiled
          - narrate: >
              You fill the reservoir from the oil-jar, a slow clean pour. The wick
              drinks it up; the lamp is full. The jar is empty now, but still in
              your hand. Tinderbox next.
      # LIGHT the lamp: USE tinderbox ON lamp → sets lamp_lit, awards +10.
      # Gated on lamp_oiled (must fill before lighting) and not_flag lamp_lit (one-shot).
      - verb: USE
        item: tinderbox
        target: lamp
        conditions: [{ has_item: tinderbox }, { has_flag: lamp_oiled }, { not_flag: lamp_lit }]
        effects:
          - set_flag: lamp_lit
          - inc_var: { name: score, by: 10 }
          - narrate: >
              You strike the tinder once, twice — and the wick catches, a small tongue
              of flame that settles and grows into a clean steady light. The cellar walls
              come out of the dark around you; the oil-store arch glows amber to the east;
              the wine-vault door is plain to the west. The lamp is lit.

  - id: tinderbox
    name: "tinderbox"
    aliases: [tinder, flint, steel, spark, flintbox]
    description: >
      An old tinderbox of stamped tin — flint, steel, and a square of char-cloth.
      Dry, by the feel of it. Has started a thousand lamps.
    takeable: true

  - id: oil_jar
    name: "oil jar"
    aliases: [jar, oil, flask, clay jar, oil-jar]
    description: >
      A clay oil-jar, heavy and full. Good lamp-oil by the clean smell of it — the kind
      the cellarman always kept on the low shelf where you could find it in the dark.
    variants:
      - when: [{ has_flag: lamp_oiled }]
        text: >
          The clay oil-jar is empty now, its clean lamp-oil poured into the old lamp.
          It is only a jar, but at least it is not pretending to be anything else.
    takeable: true

  - id: spirit_cask
    name: "old cask"
    aliases: [cask, spirit, barrel, bung, spirit-cask, old spirit]
    # Dark-state examine: the player can feel and smell it but cannot see the board.
    # The smell itself is a clue — "something you know and do not trust." The note
    # already warned them; the dark description adds a sensory echo. The OPEN
    # interaction requires lamp_lit, so in the dark the death is completely
    # inaccessible — no ambush possible (bug_0123 discipline).
    description: >
      In the dark you can make out a barrel-shape against the back wall and a bung
      that feels loose. The sweetish smell around it is the kind you know and do not
      trust near any kind of flame.
    # Lit variant: full detail including the warning board.
    # Live only after lamp_lit; base valid before (bug_0146 — the cask is present in
    # both states; only the readable detail changes).
    variants:
      - when: [{ has_flag: lamp_lit }]
        text: >
          A cask pushed against the back wall, its bung cracked and listing to one side.
          The cellarman's board is nailed above it: "OLD SPIRIT — SEAL CRACKED —
          DO NOT DRAW THE BUNG UNDER FLAME." The sweet fumes seep out around the
          bung and sit in the close air of the store.
    # OPEN the cask → DEATH. Only available when lamp_lit — the player can read the
    # warning board and has the cellarman's note; to open it is a deliberate informed
    # choice (bug_0123 never-an-ambush: telegraphed twice before available, once by
    # the note and once by the visible board). Not a win_condition ending, so
    # WIN_IS_DEATH cannot fire; ending_recovered stays the sole winnable ending.
    interactions:
      - verb: USE
        item: tinderbox
        target: spirit_cask
        command_verb: pry
        conditions: [{ has_flag: lamp_lit }, { has_item: tinderbox }]
        effects:
          - narrate: >
              You lever the bung out with the corner of the tinderbox — and the fumes
              catch the lamp's flame in an instant, a sheet of pale fire from floor to
              rafters. The last thing you know is the heat.
          - end_game: ending_ignited

  - id: deed_box
    name: "deed-box"
    aliases: [deeds, deed, iron box, black box, title deeds, deed box]
    description: >
      A deed-box of black iron, cold and heavy. The kind of thing a man keeps the
      title to his life in — and right now it is exactly that.
    takeable: true
    # Climax: +20 on take, set found_deeds so the coal_yard exit north unlocks.
    # `found_deeds` is read ONLY by the coal_yard exit condition and the coal_yard
    # room variant — no other reader, so it is not inert (bug_0146 discipline).
    take_effects:
      - inc_var: { name: score, by: 20 }
      - set_flag: found_deeds

  - id: cash_box
    name: "cash-box"
    aliases: [cash, money, brass box, brass, cashbox, till, float]
    # GREED fork. The box is the innkeeper's working coin; taking it is the choice
    # itself. Examine telegraphs this plainly per the bug_0123 never-an-ambush rule.
    # The end_game fires on take via take_effects, making this mutually exclusive with
    # the win — once you take the cash-box, you are out the coal-hole before anyone
    # knew you were down here, and the deed-box business becomes someone else's.
    description: >
      A small brass cash-box, its lock flimsy. This is the innkeeper's working coin —
      the till-float, a few weeks' takings. It belongs to the man upstairs. To take it
      is to make a different choice than the one you came here to make; there is no
      putting it back, and no honest reason you would.
    takeable: true
    take_effects:
      - end_game: ending_absconded

npcs: []

win_conditions:
  - id: deeds_home
    # `visited: inn_passage` fires when the player walks north from coal_yard, which
    # requires has_flag: found_deeds (the exit condition on that door). So the only
    # way to visit inn_passage is to already have the deed-box. The `visited` check
    # is therefore equivalent to has_flag: found_deeds AND entered the inn — a clean
    # locomotion win (the sealed_crypt / friars_postern shape): the final step is the
    # win, and the walk home is the denouement, not a puzzle.
    conditions: [{ visited: inn_passage }]
    ending: ending_recovered

endings:
  - id: ending_recovered
    title: "The Deed-Box"
    text: >
      You set the deed-box on the cutting table in the kitchen passage and let out
      a long breath. The deed is old and plain and legal — the innkeeper's name on it,
      his father's name before it, back before the creditors were even born. When the
      daughter comes at dawn with her lawyer, she will find the box on the table and
      the law will have to read it for what it is.
      Whatever else is wrong tonight, the inn will stand. *** You have saved the inn. ***
  - id: ending_absconded
    title: "The Till-Float"
    # Text accommodates both routes: taking cash instead of (or after) the deed-box.
    # "Whether the deed-box was under your arm" covers the case where found_deeds was
    # already set; "or still on the vault floor" covers the case where it was not.
    text: >
      You came down here for the deed-box, and the brass cash-box was right there
      beside it — the innkeeper's till-float, a few weeks' takings, the money he was
      going to need. You took it. Whether the deed-box was under your arm at the time
      or still on the vault floor where you left it, you made your choice at the moment
      you reached for the brass. You went out through the coal-hole before anyone knew
      you had been below; the rest sorted itself out the way those things do.
      *** You have taken what wasn't yours. ***
  - id: ending_ignited
    title: "The Sweet Fumes"
    text: >
      The bung came loose and the cellar went pale with fire in a heartbeat. The
      deed-box is still on the floor of the wine vault where it always was; the
      innkeeper never knew you were down here. At dawn his daughter will come with
      a lawyer and find only the smell of old spirit and no deed-box anywhere, and
      the law will have its way with the estate regardless.
      *** You are dead. ***
    death: true
