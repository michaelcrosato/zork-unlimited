# The Coroner's Errand — a Zork-style parser pack (Stage 3).
#
# The EIGHTH parser pack, and the FIRST to build around EVIDENCE GATHERING as
# the core mechanic. Every prior parser pack chains items to unlock rooms (key →
# door; oil → lamp → vault). Here there are NO LOCKED DOORS and NO ITEM CHAINS:
# all five rooms are accessible from the very first turn, and the entire puzzle
# is INVESTIGATIVE — EXAMINE and READ actions gather independent evidence flags,
# and the verdict (USE commission ON writing_desk) fires ending_justice only when
# three critical flags are in hand. No single item unlocks another; no room blocks
# progress; the only gate is KNOWLEDGE.
#
# Setting: 1785, London. A cloth factor named George Calloway has been found dead
# at his writing desk, apparently by his housekeeper. Dr. Edmund Rendell, the
# household physician, was called first and left quickly. The coroner's jury
# convenes at noon; you — the coroner's clerk — have been sent to the house
# to examine the body, take depositions, and prepare a formal account of the
# circumstances before the jury meets. An hour, perhaps less.
#
# Map (all five rooms open from turn 1 — no locked exits anywhere):
#
#   front_hall (start; commission)
#        │ E          │ W          │ N
#   study          parlour     back_passage
#   (body;         (muddy_boots; (medicine_chest;
#    sealed_letter; window_latch) nightshade_bottle)
#    merchants_purse;
#    writing_desk → verdict)
#        │ N
#   library
#   (ledger; draft_contract)
#
# Score (max 45):
#   +5  TAKE commission          front_hall   (the formal instrument)
#   +5  INSPECT body             study        (manner of death — narcotic)
#   +10 TAKE sealed_letter       study        (incriminating letter from Rendell)
#   +5  READ ledger              library      (financial motive: 63 pounds unpaid)
#   +5  INSPECT draft_contract   library      (the unsigned dispensary lease)
#   +5  INSPECT muddy_boots      parlour      (the physician's presence this morning)
#   +5  INSPECT medicine_chest   back_passage (the disrupted pharmacy)
#   +5  INSPECT nightshade_bottle back_passage (murder weapon; skill_check tension beat)
#   = 45
#
# Verdict (go SOUTH from front_hall → jury_room; gated on has_item commission):
#   • All evidence present: ending_justice (WIN) fires on entering jury_room
#   • Insufficient evidence: ending_misadventure fires on entering jury_room
#
# Endings (3):
#   ending_justice      WIN: formal accusation filed; Rendell arrested at the dock.
#   ending_misadventure NON-WIN: incomplete deposition; Rendell goes free.
#   ending_absconded    GREED (non-death): pocket the dead man's purse and leave.
#
# Novel contributions versus prior parser packs:
#   1. NO PHYSICAL GATES — all rooms and all objects accessible from turn 1.
#      The player cannot be locked out of evidence; the only constraint is attention.
#   2. EVIDENCE-FLAGGED VERDICT — ending_justice requires three INDEPENDENT flags,
#      each gathered from a different room. No prior parser pack gates an ending on
#      more than one flag simultaneously (prior packs use one key + one gate or one
#      flag + one locomotion condition). The investigator must range the whole house.
#   3. DEDUCTION AS PAYOFF — the climax is a legal act of reasoning (filing the
#      deposition), not a mechanical action (opening a lock, lighting a lamp, escaping).
#      The puzzle asks "have you understood what happened?" not "do you have the key?"
#
# No skill vars: observation was originally planned as a tension beat on the
# nightshade_bottle examination, but the parser solver does not scan skill_check
# branches for flag effects (bug_0334), so the flag and score were invisible and
# ending_justice unreachable. Simplified to unconditional effects with a single
# narration; the dramatic discovery is unchanged, just deterministic.

meta:
  id: coroners_errand_v1
  title: "The Coroner's Errand"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Coroner's Front Hall"
    quest: "secure the proof before the verdict"
    role: "coroner's officer"
    connection: "Charterhaven assizes rely on coroner errands to turn a death scene into evidence the court can hold."
  start_room: front_hall
  flags_init: []
  max_score: 45

rooms:
  - id: front_hall
    name: "The Front Hall"
    description: >
      A merchant's entrance hall — marble floor, walls hung with prints of foreign
      harbours. The housekeeper has set the coroner's letter of commission on the
      side table by the door. The study opens to the east; the parlour to the west;
      a service passage runs north toward the back of the house. The lane to the
      coroner's office runs south — the jury waits there at noon.
    variants:
      - when: [{ has_item: commission }]
        text: >
          A merchant's entrance hall — marble floor, walls hung with prints of
          foreign harbours. The side table by the door is bare now, the
          coroner's letter of commission safely with you. The study opens to
          the east; the parlour to the west; a service passage runs north
          toward the back of the house. The lane to the coroner's office runs
          south — the jury waits there at noon.
    objects: [commission]
    exits:
      - { direction: east, to: study }
      - { direction: west, to: parlour }
      - { direction: north, to: back_passage }
      - direction: south
        to: jury_room
        conditions: [{ has_item: commission }]
        locked_msg: >
          You need your commission before you can file anything at the coroner's
          office. It is on the side table by the door.

  - id: study
    name: "The Study"
    description: >
      George Calloway sits slumped in his chair behind the writing desk, his head
      lolled to the right, ink still wet on the page he was writing. A physician's
      black bag stands by the door — left in haste, or left deliberately. Beside
      the dead man's hand lies a sealed letter. A small silver-clasped purse sits
      at the edge of the desk. The library door is north; the hall is west.
    variants:
      - when:
          - has_flag: manner_known
          - has_item: sealed_letter
        text: >
          Calloway behind his desk, his lips the pale blue of a narcotic death.
          You know what you are looking at. The physician's bag is still by the
          door, and Rendell's sealed letter is with you now rather than beside
          the dead man's hand. The purse is at the desk edge. The library is
          north; the hall is west.
      - when: [{ has_flag: manner_known }]
        text: >
          Calloway behind his desk, his lips the pale blue of a narcotic death. You
          know what you are looking at. The physician's bag is still by the door; the
          sealed letter lies where you found it beside the dead man's hand. The
          purse is at the desk edge. The library is north; the hall is west.
      - when:
          - has_item: sealed_letter
        text: >
          George Calloway sits slumped in his chair behind the writing desk,
          his head lolled to the right, ink still wet on the page he was
          writing. A physician's black bag stands by the door — left in haste,
          or left deliberately. The place beside the dead man's hand is bare
          where Rendell's sealed letter lay before you took it. A small
          silver-clasped purse sits at the edge of the desk. The library door
          is north; the hall is west.
    objects: [body, physician_bag, sealed_letter, merchants_purse, writing_desk]
    exits:
      - { direction: north, to: library }
      - { direction: west, to: front_hall }

  - id: library
    name: "The Library"
    description: >
      Shelves of trade ledgers and a mahogany writing table. The current-year
      ledger stands open on its stand. A draft agreement lies on the table —
      unsigned, and recently prepared by the look of it.
    objects: [ledger, draft_contract]
    exits:
      - { direction: south, to: study }

  - id: parlour
    name: "The Parlour"
    description: >
      A comfortable front parlour, the curtains half-drawn against the morning
      light. A pair of mud-caked boots stands by the hearth, still damp. They are
      not Calloway's size. The hall is to the east.
    objects: [muddy_boots, window_latch]
    exits:
      - { direction: east, to: front_hall }

  - id: back_passage
    name: "The Back Passage"
    description: >
      A narrow service passage between the kitchen and the back stairs. Calloway
      kept his medicine chest on the shelf here — the physician's authority extended
      even to the domestic pharmacy. The chest stands open, its bottles in their
      usual order, or nearly.
    objects: [medicine_chest, nightshade_bottle]
    exits:
      - { direction: south, to: front_hall }

  - id: jury_room
    name: "The Coroner's Office"
    description: >
      A plain room at the end of the lane — a table, two chairs, and a cold range.
      The coroner sits across from you with a blank deposition form. Whatever you
      have found, this is where you say it.

objects:
  # ── front_hall ──────────────────────────────────────────────────────────────

  - id: commission
    name: "letter of commission"
    aliases: [commission, authority, papers, instrument, note, coroner, warrant]
    description: >
      The coroner's letter, addressed to you in a neat legal hand. It empowers you
      to gather depositions and prepare a formal account of George Calloway's death
      for the jury at noon. USE it ON each piece of evidence to formally examine
      under the authority of the commission. READ documents directly. When your
      evidence is gathered, go south from the front hall to file your deposition.
    takeable: true
    take_effects:
      - inc_var: { name: score, by: 5 }

  # ── study ───────────────────────────────────────────────────────────────────

  - id: body
    name: "Calloway's body"
    aliases: [body, calloway, corpse, dead man, man, victim, face, lips, hands, ink, page]
    description: >
      George Calloway, cloth factor, forty-eight years old. His face has the settled
      look of hours rather than minutes; his lips are pale blue at the margin.
      The ink on the page under his hand is still wet. USE your commission ON the body
      to formally examine it under the coroner's authority.
    variants:
      - when: [{ has_flag: manner_known }]
        text: >
          Calloway — bluish lips, contracted pupils. A powerful narcotic, taken or given.
          The page under his hand is dated this morning; whatever he was writing he did
          not finish.
    interactions:
      - verb: USE
        item: commission
        target: body
        conditions: [{ has_item: commission }, { not_flag: manner_known }]
        effects:
          - set_flag: manner_known
          - inc_var: { name: score, by: 5 }
          - narrate: >
              You lean close under the authority of your commission. The lips are pale blue
              at the margin and the pupils are pinpoint-small — a narcotic, and a powerful
              one. The ink on the page under his hand is still fresh; he was alive and
              writing less than three hours ago. This is not a natural death.

  - id: physician_bag
    name: "physician's black bag"
    aliases:
      [bag, black bag, physician bag, physicians bag, doctor bag, doctor's bag, rendell bag]
    description: >
      Dr. Rendell's visiting bag: buckled shut, wiped clean, and too neatly left by
      the study door. It holds ordinary instruments and folded linen, but no bottle
      loose enough to explain Calloway's death. If Rendell carried poison here, he
      wanted the household medicine chest to take the blame.

  - id: sealed_letter
    name: "sealed letter"
    aliases: [letter, seal, wax, correspondence, envelope, rendell, physician]
    description: >
      A letter sealed with green wax, addressed to Calloway in a physician's careful
      hand. Yesterday's date on the outside. It has not been opened.
    variants:
      - when: [{ has_item: sealed_letter }]
        text: >
          Dr. Edmund Rendell's letter — opened now, and damning. He promises Calloway
          "the swift remedy that will resolve our arrangement permanently" once the
          dispensary lease is signed over. The phrasing is careful. The meaning is not.
    takeable: true
    take_effects:
      - inc_var: { name: score, by: 10 }
    interactions:
      - verb: READ
        target: sealed_letter
        conditions: [{ has_item: sealed_letter }, { not_flag: letter_read }]
        effects:
          - set_flag: letter_read
          - narrate: >
              Dr. Edmund Rendell's hand, yesterday's date: "Dear Calloway — the remedy
              I have prepared will resolve our arrangement permanently once you have
              signed the lease. I will see you administered in proper form at nine.
              Your servant, Rendell." The phrasing is careful. The meaning is plain.

  - id: merchants_purse
    name: "silver-clasped purse"
    aliases: [purse, silver, money, coin, coins, clasp, pouch]
    description: >
      A small purse with a silver clasp, heavy with coin — Calloway's daily purse.
      It belongs to a dead man's estate. To take it is to choose a different errand
      than the one you came to run; there is no honest reason you would, and no
      putting it back once it is gone.
    takeable: true
    take_effects:
      - end_game: ending_absconded

  - id: writing_desk
    name: "writing desk"
    aliases: [desk, table, writing table, surface, inkwell, quill, pen]
    description: >
      Calloway's writing desk — the page he was working on still under his hand,
      the ink not quite dry. When you have gathered your evidence, go south from
      the front hall to file your deposition at the coroner's office.

  # ── library ─────────────────────────────────────────────────────────────────

  - id: ledger
    name: "trade ledger"
    aliases: [ledger, book, accounts, record, trade, register, year, column]
    description: >
      The cloth factor's accounts for the year — clear and professional, until the
      column for Dr. Rendell's account. A debt of sixty-three pounds, eleven months
      outstanding. A note in the margin in Calloway's hand.
    variants:
      - when: [{ has_flag: ledger_read }]
        text: >
          The ledger you read: Rendell's debt sixty-three pounds unpaid eleven months,
          and Calloway's margin note — "must be resolved by quarter or I take it to
          his College." A man's career and livelihood, written in a factor's hand.
    interactions:
      - verb: READ
        target: ledger
        conditions: [{ not_flag: ledger_read }]
        effects:
          - set_flag: ledger_read
          - inc_var: { name: score, by: 5 }
          - narrate: >
              Rendell's account: sixty-three pounds unpaid since last November. A note
              in Calloway's hand beside it: "must be resolved before the quarter, or I
              take the matter to his College." If that letter went to the College of
              Physicians, Rendell was finished. He had eleven months of reason to want
              Calloway silent before the quarter day.

  - id: draft_contract
    name: "draft agreement"
    aliases: [contract, agreement, draft, lease, document, unsigned, dispensary]
    description: >
      A lease for a dispensary on Gracechurch Street — Calloway's building.
      The terms favour the lessor heavily. The lessee's name is blank.
      It is unsigned. READ it.
    variants:
      - when: [{ has_flag: contract_seen }]
        text: >
          The unsigned lease: the dispensary on Gracechurch Street, terms strongly in
          the lessor's favour, lessee's name left blank. Someone needed this property.
    interactions:
      - verb: READ
        target: draft_contract
        conditions: [{ not_flag: contract_seen }]
        effects:
          - set_flag: contract_seen
          - inc_var: { name: score, by: 5 }
          - narrate: >
              A lease for Calloway's dispensary on Gracechurch Street. The rent is
              half the market rate; the terms bind the lessee for seven years; the
              lessee line is blank. The document is freshly prepared. Someone wanted
              this building badly — and Calloway was the man who had to sign.

  # ── parlour ─────────────────────────────────────────────────────────────────

  - id: muddy_boots
    name: "muddy boots"
    aliases: [boots, mud, shoes, footwear, pair, leather]
    description: >
      A pair of stout leather boots by the hearth, the soles caked with fresh street
      mud, still damp. A man's boots, size ten. Not Calloway's build, and not the
      housekeeper's style. USE your commission ON the boots to formally document them.
    variants:
      - when: [{ has_flag: physician_present }]
        text: >
          The boots you documented: a physician's travelling pair, size ten, the mud
          still fresh. Dr. Rendell's — left in his haste to be gone this morning.
    interactions:
      - verb: USE
        item: commission
        target: muddy_boots
        conditions: [{ has_item: commission }, { not_flag: physician_present }]
        effects:
          - set_flag: physician_present
          - inc_var: { name: score, by: 5 }
          - narrate: >
              Under the authority of your commission you formally document the boots.
              Stout leather, size ten, the mud still wet — a morning call, not last
              night's. A physician's cut: built for standing long hours, not for riding.
              Calloway was slight; these are not his. Someone was in this parlour this
              morning and left in too much of a hurry to recover their street boots.
              Dr. Rendell was here.

  - id: window_latch
    name: "window latch"
    aliases: [window, latch, lock, catch, frame, sash, glass, curtains]
    description: >
      The parlour window, the latch firmly seated, the paint-seal at the frame
      unbroken. No one came in or out this way.

  # ── back_passage ─────────────────────────────────────────────────────────────

  - id: medicine_chest
    name: "medicine chest"
    aliases: [chest, medicines, cabinet, shelf, bottles, row, pharmacy, rows]
    description: >
      An apothecary's chest standing open on the passage shelf, the bottles arranged
      by size and use — purgatives, carminatives, the usual household stock. But one
      bottle near the end of the second row sits a finger's width out of alignment,
      its stopper barely seated, its label facing away. USE your commission ON the
      chest to formally examine it, or USE it ON the dark bottle directly.
    variants:
      - when: [{ has_flag: chest_examined }]
        text: >
          The medicine chest — the bottles in their usual rows, except for the dark
          one near the end of the second row, slightly out of place. You have seen
          it now. You know what it means.
    interactions:
      - verb: USE
        item: commission
        target: medicine_chest
        conditions: [{ has_item: commission }, { not_flag: chest_examined }]
        effects:
          - set_flag: chest_examined
          - inc_var: { name: score, by: 5 }
          - narrate: >
              The rows are tidy but not quite right. One bottle near the end of the
              second row is a finger's width out of place, its stopper barely seated,
              its label turned away from you. USE your commission ON it — it is not
              the same as the rest.

  - id: nightshade_bottle
    name: "dark bottle"
    aliases: [bottle, dark, stopper, label, nightshade, poison, tincture, vial, valerian]
    description: >
      A small dark glass bottle, its stopper loose, the label in a physician's careful
      script: "Tincture of Valerian — for sleep." The liquid inside is darker than
      valerian and heavier, and the smell from the loose stopper is not right.
      USE your commission ON the bottle to formally examine it.
    variants:
      - when: [{ has_flag: poison_identified }]
        text: >
          The bottle that held Calloway's death. "Tincture of Valerian" in Rendell's
          hand — but valerian is pale amber and this liquid is near-black, with the
          bitter-sweet smell of belladonna alkaloids. The label is a copy, not an
          apothecary's original print. This was placed here to be taken as the usual
          evening dose.
    interactions:
      # Formal examination of the bottle: unconditional — both flag and score fire
      # deterministically (bug_0334 fix: removed skill_check whose branches were
      # invisible to the parser solver). The discovery is the same whether the
      # clerk's eye is sharp or slow; only the original tension-beat framing changed.
      - verb: USE
        item: commission
        target: nightshade_bottle
        conditions: [{ has_item: commission }, { not_flag: poison_identified }]
        effects:
          - set_flag: poison_identified
          - inc_var: { name: score, by: 5 }
          - narrate: >
              You hold the bottle to the passage window under the authority of your
              commission. The label — "Tincture of Valerian — for sleep" — is in
              Rendell's hand, but the wax at the seal is spread too wide, the
              impression pressed too deep: the tell of a seal applied to dry paper,
              not to fresh wax at the moment of signing. A copy, not a printed
              original. The liquid is near-black; valerian is pale amber. The stopper
              carries the bitter-sweet smell of belladonna alkaloids. Deadly nightshade
              — placed here to be taken as the usual evening dose. The label is a
              forgery and this bottle is the murder weapon.

npcs: []

win_conditions:
  # Full evidence: justice ending fires immediately on entering jury_room with all
  # three key evidence pieces. Checked first — first match wins.
  - id: justice_filed
    conditions:
      - { visited: jury_room }
      - { has_item: commission }
      - { has_item: sealed_letter }
      - { has_flag: physician_present }
      - { has_flag: poison_identified }
    ending: ending_justice
  # Insufficient evidence: misadventure fires as fallback when the player reaches
  # jury_room without all critical evidence (justice_filed did not match).
  - id: misadventure_filed
    conditions:
      - { visited: jury_room }
    ending: ending_misadventure

endings:
  - id: ending_justice
    title: "The Deposition"
    text: >
      The deposition goes to the jury at noon and from there to the magistrate by
      mid-afternoon. Dr. Edmund Rendell is apprehended at the Gravesend docks with a
      coaching bag and a passage booked to Calais under a false name. The forged bottle
      is produced in evidence. The letter is read aloud.
      George Calloway had sixty-three pounds' worth of leverage over the man who killed
      him — and Rendell had eleven months to plan how to use it the other way. You gave
      the jury what it needed.
      *** George Calloway's death is answered for. ***

  - id: ending_misadventure
    title: "The Open Verdict"
    text: >
      You file the commission at the jury at noon. Without the evidence to name a
      culprit — the letter, the boots, the bottle — the jury returns a verdict of
      misadventure: George Calloway died of a sudden illness, cause unknown. It is
      the verdict of men who were not given enough to decide otherwise.
      Dr. Edmund Rendell takes the dispensary lease within the week. The sixty-three
      pounds are struck from the ledger. Whatever he did, it is done now.
      *** The jury returns: misadventure. ***

  - id: ending_absconded
    title: "The Morning's Coin"
    text: >
      Calloway's purse is heavy — a week's coin for a man of his trade. You have it
      now. The commission lies on the side table where you left it; whatever you came
      to do, this is what you did instead. By the time the housekeeper finds you gone
      and the jury waits past noon for a deposition that will not come, you are
      already across the river.
      The housekeeper says there was a clerk here in the morning. No one can say where
      he went.
      *** You took what was not yours. ***
