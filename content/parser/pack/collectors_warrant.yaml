# The Collector's Warrant — a Zork-style parser pack (Stage 3).
#
# The SEVENTH parser pack, and the FIRST to introduce STEALTH AS A GAME MECHANIC.
# Every prior parser pack is noise-indifferent: actions carry consequences (flags,
# score, death), but SOUND is not one of them. Here a sleeping duty-clerk creates a
# STEALTH CONSTRAINT: forcing the strong-room door (USE crowbar ON door) is irreversibly
# "noisy" — the `clerk_woken` flag fires, the front exit seals, and the only way out
# becomes a coal-hatch above the tidal channel. That escape is win-or-death: with the
# warrant in hand the ford is crossable; without it the channel takes you. The quiet
# key path is always available and reaches the same ending at full score (40); the
# noisy path reaches it at 20 or ends in capture/drowning. Both paths are fairly
# presented: the ledger warns explicitly about noise before you can trigger it; the
# coal_hatch description warns about the channel before the hatch is usable.
#
# Setting: a tidal estuary town, 1690s. You are a saltmaker's factor (business agent).
# The King's Collector of Excise has seized your master's salt-grant warrant —
# the document proving his right to the salt-pans — on a pretext of unpaid duties.
# The Collector is away on circuit; his clerk sleeps above. You have until the tide
# turns to recover the warrant and leave no trace.
#
# Map:
#
#   market_lane (WIN — walk out the front with the warrant, clerk still sleeping)
#        │ N* (* gated on has_item: salt_warrant AND not_flag: clerk_woken)
#   duty_room (start; ledger clue; crowbar; coal_hatch; strong_room_door; passage_door)
#        │ E                       │ [OPEN coal_hatch when clerk_woken]
#   salt_store (salt_measure;       River escape path:
#    strong_key; +15 on take)         OPEN coal_hatch + has warrant → ending_recovered
#   (* W from duty_room gated on strong_door_open)               + no warrant  → ending_drowned
#   strong_room (salt_warrant; +20 on take)  │ [OPEN passage_door when clerk_woken]
#                                             → ending_caught
#
# Score (max 40):
#   +5  read the Collector's ledger   (§17 clue: key in measure + warns of noise)
#   +15 take the strong-room key      (found inside the salt_measure in the store)
#   +20 take the salt_warrant          (climax)
#
# Quiet path:  5 + 15 + 20 = 40/40
# Noisy path:   0 +  0 + 20 = 20/40 (crowbar forces door; no key or ledger needed)
#
# Endings (3):
#   ending_recovered — WIN (non-death): escaped with warrant, via front gate (quiet)
#                      OR via tidal ford (noisy + warrant + coal_hatch)
#   ending_caught    — BAD (non-death): opened the passage door to face the watch
#   ending_drowned   — DEATH: opened coal_hatch without the warrant; channel took you
#
# Both bad endings telegraphed before they can be triggered (bug_0123):
#   • ending_drowned: coal_hatch description warns "without knowing the ford, the
#     current takes you" (source 1); ledger read_text notes the tidal channel running
#     below (source 2). The coal_hatch OPEN interactions are gated on has_flag:
#     clerk_woken, which fires only after the noisy door-force is committed.
#   • ending_caught: passage_door OPEN interaction is gated on clerk_woken; the
#     noisy door-force narration names the crisis immediately ("I'll have the watch!"),
#     so the player knows the stakes before any surrender action is available.

meta:
  id: collectors_warrant_v1
  title: "The Collector's Warrant"
  start_room: duty_room
  flags_init: []
  # `steadiness` (3) — the OPTIONAL TENSION BEAT standardized into parser mode:
  # CHECK the crowbar grip (USE crowbar ON crowbar, command_verb: check) before you
  # commit to forcing the door. A d20 + steadiness check (DC 11). CONVERGENT: gates
  # no exit, ending, score, win flag, or variant beyond the retire flag `grip_checked`
  # (which is read only by this interaction's conditions). Both outcomes narrate flavor
  # only; the quiet (key) and noisy (crowbar) paths each remain fully reachable on
  # either roll. Every ending and the 40-point economy stay byte-for-byte identical
  # across both skill-check outcomes.
  # (The sealed_crypt / friars_postern / cellarmans_dark nerve/steadiness-check shape.)
  vars_init: { steadiness: 3 }
  max_score: 40

rooms:
  - id: duty_room
    name: "The Collector's Duty-Room"
    description: >
      A plain room smelling of damp wool and sealing wax. The Collector's table runs
      along the east wall, papers spread across it. A coal-barrel stands in the far
      corner, a length of old rope looped over the iron hoop; a coal-hatch in the
      floor behind it marks the coaling drop above the tidal channel. A heavy iron
      door in the west wall leads to the strong-room. The salt-store opens to the
      east. A passage door in the north wall stands shut; beyond it the lane runs free.
      Somewhere below the planking the tidal channel turns.
    # Post-clerk_woken variant. Live only after clerk_woken; base valid before
    # (bug_0146 discipline: no dead window — base describes room correctly until
    # the crisis, at which point this variant replaces it).
    variants:
      - when: [{ has_flag: clerk_woken }]
        text: >
          The duty-room, and the time is gone. Above you the duty-clerk shouts —
          "Who's there? I'll have the watch on you!" The front passage north is shut
          to you now. The coal-barrel stands in the corner; the rope on its hoop is
          the ford-marker. The coal-hatch in the floor behind the barrel opens above
          the tidal channel. The passage door to the north is your only other way out.
    objects: [collector_ledger, crowbar, coal_hatch, strong_room_door, passage_door]
    exits:
      - { direction: east, to: salt_store }
      - direction: west
        to: strong_room
        conditions: [{ has_flag: strong_door_open }]
        locked_msg: >
          The strong-room door is iron-banded and locked fast. You will need the key
          — or something heavier and louder.
      - direction: north
        to: market_lane
        conditions: [{ has_item: salt_warrant }, { not_flag: clerk_woken }]
        locked_msg: >
          You haven't the warrant yet — or the clerk above has heard you and the front
          passage is shut. The passage door stands between you and the lane.

  - id: salt_store
    name: "The Salt-Store"
    description: >
      A low room packed with measuring vessels and burlap bags, the air thick with
      brine. A row of copper measures hangs on pegs along the wall by size — pint,
      quart, gallon. The heavy gallon copper on the lowest peg looks heavier than it
      should for an empty vessel. The duty-room lies west.
    objects: [salt_measure, strong_key]
    exits:
      - { direction: west, to: duty_room }

  - id: strong_room
    name: "The Strong-Room"
    description: >
      A stone-flagged room, bare except for a shelf of sealed ledgers and a deed-box
      of black iron bolted to the floor. The box stands open — the Collector was in it
      recently. Folded inside a leather envelope on the stone floor beside it is your
      master's salt-grant warrant, his name in a clear formal hand on the outside.
    # Post-take variant. `warrant_taken` is read here — not inert (bug_0146 discipline).
    variants:
      - when: [{ has_flag: warrant_taken }]
        text: >
          The deed-box stands open and empty. Whatever the Collector planned for its
          contents, the contents are gone.
    objects: [salt_warrant]
    exits:
      - { direction: east, to: duty_room }

  - id: market_lane
    name: "Market Lane"
    description: >
      The lane outside the Collector's house, the cobbles wet with the tide-smell.
      You have the warrant under your coat. Behind you the duty-room is dark and
      quiet as it was when you found it. No one saw you. No one will know.

objects:
  - id: collector_ledger
    name: "duty ledger"
    aliases: [ledger, register, book, duty ledger, collector's ledger, table papers]
    description: >
      The Collector's duty-ledger, open to a recent page — confiscated goods and
      assessed duties, names and parishes in a small precise hand.
    # Two §17 clues in read_text: (1) key location in the gallon copper, and
    # (2) explicit noise-consequence warning — "do not force the door" names the
    # consequence before the crowbar option is even available. Bug_0123 discipline.
    read_text: >
      The entries run neatly down the page. One name stands out: your master's, beside
      a sum three times the honest duty owed, marked "FORFEITED — WARRANT SEIZED."
      Below the last entry, in a looser hand, a note to himself: "Strong-room key kept
      in the salt-measure (gallon copper, store). Noise carries straight to the upper
      landing — do not force the door." Below the planking you can hear the tidal
      channel running. You fold the page in your memory and leave it where it lies.
    interactions:
      - verb: READ
        target: collector_ledger
        conditions: [{ not_flag: read_ledger }]
        effects:
          - set_flag: read_ledger
          - inc_var: { name: score, by: 5 }

  - id: crowbar
    name: "crowbar"
    aliases: [bar, iron bar, lever, crow, pry-bar, pry bar]
    description: >
      A short iron crowbar, the kind used for coal-hole covers and stubborn barrel
      hoops. Useful, if you are not concerned about the sound it makes.
    takeable: true
    interactions:
      # TENSION BEAT — CHECK grip on the crowbar (OPTIONAL, convergent). Hold it in
      # both hands in the dark and feel whether your steadiness is with you. The
      # d20 + steadiness skill check (DC 11); retire flag `grip_checked` set only on
      # success (player can retry on failure). Gates NOTHING on the critical path —
      # both the quiet (key) and noisy (crowbar-force) routes remain fully reachable
      # on either roll outcome; no exit, score, ending, or variant reads `grip_checked`
      # beyond this interaction's own conditions. The steadiness var is never incremented.
      - verb: USE
        item: crowbar
        target: crowbar
        command_verb: check
        conditions: [{ not_flag: grip_checked }]
        skill_check:
          skill: steadiness
          difficulty: 11
          on_success:
            - set_flag: grip_checked
            - narrate: >
                You close both hands around the iron and hold it still in the dark.
                Your grip doesn't move. Whatever happens at that door, your hands are
                with you tonight.
          on_failure:
            - narrate: >
                You close your hands around the iron, feel them tremble slightly, and
                breathe out. It does not matter. A crowbar does not care for steadiness;
                it cares only for leverage.

  - id: coal_hatch
    name: "coal hatch"
    aliases: [hatch, coal-hatch, barrel, coal barrel, rope, ford, channel, floor, planking, coal]
    description: >
      A small iron coal-hatch in the planking behind the coal-barrel, its ring
      recessed flush with the boards. It opens above the tidal channel — you can
      hear the water running directly below. The rope on the barrel's iron hoop is
      the ford-marker: the coaling men use it to pull across in the dark. Without it,
      the current takes you.
    # §17 clue source 1 for the DEATH ending. Source 2 is the ledger's read_text
    # (the tidal channel note). Both sources readable before clerk_woken can fire.
    # The USE interactions are gated on has_flag: clerk_woken — no death possible
    # before the crisis is named. Bug_0123 discipline: never an ambush.
    #
    # The item field must reference a TAKEABLE object so the exhaustive solver can
    # enumerate these interactions. salt_warrant (takeable from strong_room) is the
    # "tool" for the win path (you hold the warrant safe under your coat as you cross);
    # crowbar (takeable from duty_room) is the tool for the death path (panic-pry).
    interactions:
      # River escape — WITH warrant (WIN). `item: salt_warrant` is the carried
      # warrant you protect across the ford. Gated on clerk_woken so the quiet-path
      # player never reaches this branch (they use the N exit instead).
      - verb: USE
        item: salt_warrant
        target: coal_hatch
        conditions: [{ has_item: salt_warrant }, { has_flag: clerk_woken }]
        effects:
          - narrate: >
              You tuck the warrant inside your coat, heave the barrel aside, lift the
              iron ring, and drop through the coal-hatch into the mud below. The tidal
              channel runs cold and quick ahead. You know the ford: the rope is still
              tied off on the barrel above. Hand over hand, wading up to your chest in
              the dark water, you pull across and find solid bank on the other side.
              Behind you the Collector's house goes dark again. No one follows.
          - end_game: ending_recovered
      # River escape — WITHOUT warrant (DEATH). `item: crowbar` — the player pries
      # the hatch in panic without what they came for. Two sources warned (coal_hatch
      # description + ledger read_text). Fires only when clerk_woken, so the player
      # knows the crisis before this interaction is available (bug_0123).
      - verb: USE
        item: crowbar
        target: coal_hatch
        conditions: [{ has_item: crowbar }, { has_flag: clerk_woken }, { not_item: salt_warrant }]
        effects:
          - narrate: >
              You pry the hatch open with the crowbar and drop through — but you have
              not the warrant, only panic and a bad angle. The channel below runs fast
              and the mud gives nothing to stand on. The current takes you before your
              feet find any bottom. The tidal race carries you out toward the estuary
              bar; the Collector's house stays dark and quiet above.
          - end_game: ending_drowned

  - id: strong_room_door
    name: "iron door"
    aliases: [iron door, strong door, strong-room door, strong room door, lock, west door]
    description: >
      A heavy iron-banded door set into the west wall. The plate is old and the frame
      has given before — there is a gap at the lock where it was once forced and badly
      re-fitted. One good lever and it would yield again; but the noise would carry
      straight to the upper landing.
    # Post-open variant. `strong_door_open` is read here and by the W exit condition
    # — not inert (bug_0146 discipline).
    variants:
      - when: [{ has_flag: strong_door_open }]
        text: >
          The iron door stands open; the strong-room lies beyond it.
    interactions:
      # INSPECT the door before acting: check the gap at the lock and listen.
      # No skill_check here — that lives on the crowbar. This is pure atmosphere.
      - verb: INSPECT
        target: strong_room_door
        conditions: [{ not_flag: strong_door_open }]
        effects:
          - narrate: >
              The frame has given before; you can see the gap at the lock-plate where
              the iron was once forced and re-fitted badly. A key would turn it without
              announcement. A crowbar would open it in one movement — and the sound
              would go straight to the upper landing.
      # QUIET: USE strong_key ON door — opens without sound.
      - verb: USE
        item: strong_key
        target: strong_room_door
        conditions: [{ has_item: strong_key }, { not_flag: strong_door_open }]
        effects:
          - set_flag: strong_door_open
          - narrate: >
              The key turns in the old lock without catching — one precise movement,
              barely a sound. The iron door swings inward on balanced hinges. The
              strong-room is open.
      # NOISY: USE crowbar ON door — forces it, wakes the clerk.
      # The ledger read_text warned "do not force the door" (source 1 of the two-source
      # §17 telegraph for the stealth consequence). The door's own INSPECT interaction
      # above provides source 2 ("sound would go straight to the upper landing").
      - verb: USE
        item: crowbar
        target: strong_room_door
        conditions: [{ has_item: crowbar }, { not_flag: strong_door_open }]
        effects:
          - set_flag: strong_door_open
          - set_flag: clerk_woken
          - narrate: >
              The crowbar goes into the gap at the lock and you bear down. Iron yields
              with a crack like a pistol-shot in the still house. Upstairs something
              shifts — a chair drags, bare feet hit boards. "Who's there? I'll have
              the watch on you!" The strong-room is open. And so, now, is everything
              else.

  - id: passage_door
    name: "passage door"
    aliases: [door, front, passage, north door, front door, north passage, stair, clerk, upper, watch]
    description: >
      The door to Market Lane, standing closed. In the ordinary course of things you
      would walk straight through it.
    # Post-clerk_woken variant. `clerk_woken` read here — not inert (bug_0146).
    # Live only after clerk_woken; base valid before.
    variants:
      - when: [{ has_flag: clerk_woken }]
        text: >
          The passage door to Market Lane, with the clerk's shouting carrying through
          it from above. The watch will be at the lane end within minutes.
    interactions:
      # SURRENDER — USE crowbar ON passage_door when clerk_woken: forcing the front
      # door out of desperation (the watch hears the second break and takes you).
      # `item: crowbar` is takeable; the solver can enumerate this interaction.
      # The crisis was named in the crowbar narration; no ambush (bug_0123).
      # When clerk_woken is NOT set this interaction never fires — the front is freely
      # available via the N exit conditioned on has_item:salt_warrant.
      - verb: USE
        item: crowbar
        target: passage_door
        conditions: [{ has_item: crowbar }, { has_flag: clerk_woken }]
        effects:
          - end_game: ending_caught

  - id: salt_measure
    name: "salt measure"
    aliases: [measure, copper, gallon, copper measure, gallon copper, vessel]
    description: >
      The heavy gallon copper measure on the lowest peg — tarnished with use, and
      unmistakably heavier than an empty measure should be. Something is in the bottom.
    interactions:
      - verb: INSPECT
        target: salt_measure
        effects:
          - narrate: >
              You tip the copper measure and the bottom reveals itself: a small iron
              key, old and light, sitting under a crust of old salt dust. The Collector
              hid it here himself and recorded the address in his own ledger — as safe
              a place as any, provided no one read his private notes.

  - id: strong_key
    name: "strong-room key"
    aliases: [key, iron key, small key, strong key, strong-room key, warrant key]
    description: >
      A small iron key, light and precisely made. The kind that turns a well-fitted
      lock without announcement.
    takeable: true
    # +15 rides on taking the key — the recovery of the hidden object is the
    # achievement. Items are one-shot takeable; take_effects fire exactly once.
    take_effects:
      - inc_var: { name: score, by: 15 }

  - id: salt_warrant
    name: "salt-grant warrant"
    aliases: [warrant, salt grant, grant, envelope, leather envelope, deed, salt warrant]
    description: >
      Your master's salt-grant warrant — the legal document proving his right to the
      salt-pans, his livelihood, and the livelihoods of every man and family who works
      them. The Collector held it three months. It belongs to your master.
    takeable: true
    take_effects:
      - inc_var: { name: score, by: 20 }
      - set_flag: warrant_taken

npcs: []

win_conditions:
  - id: warrant_home
    # Visiting market_lane requires has_item: salt_warrant AND not_flag: clerk_woken
    # (the duty_room N exit conditions). The coal-hatch route (noisy path + warrant)
    # reaches ending_recovered via end_game directly. Both WIN paths use the same
    # ending_recovered text.
    conditions: [{ visited: market_lane }]
    ending: ending_recovered

endings:
  - id: ending_recovered
    title: "The Warrant"
    text: >
      Whether you walked out the passage door into Market Lane while the duty-clerk
      still slept, or waded the tidal ford up to your chest in the dark with the rope
      as your guide, the result is the same: the salt-grant warrant is under your coat
      and it will be on your master's table before the assize court opens at nine.
      The Collector will find a forced door and an empty deed-box, and the law will
      have to make of that what it can. Your master's pans will stand. The families
      who work them will keep their trade. You did what you came to do.
      *** The warrant is recovered. ***

  - id: ending_caught
    title: "The Watch"
    text: >
      The watch came in through the passage door at a run, and there was nowhere
      left to go. They took your name and whatever you were carrying, warrant or not,
      and the rest sorted itself in the usual way: a hearing at the next assize, a
      justice who owed the Collector a favor, and your master's pans forfeit before
      he knew what had been tried on his behalf.
      You gave it an honest effort. *** You are taken. ***

  - id: ending_drowned
    title: "The Channel"
    text: >
      The tidal channel runs fast and cold at this hour, and you went in without the
      warrant and without enough rope. The current had you before you found any bottom.
      The house above stayed dark and quiet throughout. When the coaling men came at
      dawn and found the hatch open and the barrel shifted, they drew their conclusions
      and mentioned it to no one particular. Your master's hearing went the way the
      Collector always intended. The pans were forfeit by ten o'clock.
      *** You are drowned. ***
    death: true
