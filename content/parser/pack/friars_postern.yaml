# The Friars' Postern — a Sierra-Quest-style parser pack (Stage 3).
#
# The eleventh shipped pack, and the first PARSER pack whose central gate is a
# CONVERSATION, not a lock. The two existing parser packs both carry an NPC, but
# in each the talk is an OPTIONAL clue source (sealed_crypt's sexton, who only
# hints at puzzles you can also solve by poking the world). Here the talk is
# LOAD-BEARING: the one way out of the gaol — the friars' walled-up postern — can
# be learned ONLY from the old debtor, and the flag her telling sets (`knows_postern`)
# is the sole key to the escape exit. No combination of items opens it. This is the
# new breadth axis a blind playtest of the saturated content set kept pointing at
# (alchemists_tower seed 47, this cycle: clarity 5/5, only ceiling "too short / wants
# a fresh mechanic"); the dialogue engine + DIALOGUE_NONTERMINATING / settable-flag
# soundness surfaces now face a pack where conversation is the spine, not a flourish.
#
# The pack inverts the genre's reflex. A debtors' gaol the night before the watch
# comes for you; the turnkey is drunk and his key-ring hangs free in his nook. That
# iron key is the OBVIOUS way out — and it opens only ruin: the barred night-gate
# (the watch waits beyond it: a DEATH, ending_taken) and the inmates' pooled alms-box
# (rob your fellow wretches and bolt: a non-death greed ending, ending_thief — the
# sealed_crypt bug_0105 "one key, two locks" device, here a key with two BAD locks).
# Freedom costs no key at all: you must trust the old woman, fetch her confiscated
# pipe, and be TOLD the trick of the friars' latch. The win route turns on knowledge,
# not iron — so the climactic +20 rides the act of LEARNING (the take_pipe node),
# exactly as sealed_crypt's +20 rides the gate-unlock one step before its visited win.
#
#   cell ─N─ gallery ─W─ commons (old debtor; learn the postern)
#   (start)    │ E: lodge (turnkey's pipe + key-ring)
#   (clue)     │ up: chapel (font, alms-box; postern ─N*─ night_street = WIN)
#              │ down: gatehouse (barred night-gate)
#   (* postern exit gated on knows_postern — learned, never unlocked)
#
# Score (max 35, mirroring sealed_crypt's milestone economy so the curve reads
# familiar): read the previous prisoner's wall-scratches (+5, the §17 clue that names
# the old woman and where her pipe was taken), learn a postern even exists (+10), and
# learn the latch's trick (+20 — the literal key to escape). The perfect 35 lands one
# act before stepping into the street, the intentional denouement a blind playtester
# confirmed reads right for a `visited` win (sealed_crypt seed 29); SCORE_PEAKS does
# not fire on a locomotion win. Both BAD endings are heavily telegraphed in place
# (the gate's examine shows the watch's torches; the box's, your fellow inmates' alms)
# per the bug_0123 "never an ambush" discipline, and both are recoverable via load.

meta:
  id: friars_postern_v1
  title: "The Friars' Postern"
  start_room: cell
  flags_init: []
  vars_init: {}
  max_score: 35

rooms:
  - id: cell
    name: "Debtor's Cell"
    description: >
      A cold stone cell, its door left carelessly off the latch — the turnkey was
      well in his cups at lock-up. Someone before you scratched a message deep into
      the wall by the cot. The gallery lies north through the open door.
    objects: [wall_scratches]
    exits:
      - { direction: north, to: gallery }

  - id: gallery
    name: "The Gallery"
    description: >
      A long vaulted gallery, once a cloister-walk and now a run of barred cells.
      Snores drift from the turnkey's lodge to the east; the debtors' commons opens
      west, a stair climbs up to the old chapel, and steps drop down to the
      night-gate. Your own cell is back to the south.
    exits:
      - { direction: south, to: cell }
      - { direction: west, to: commons }
      - { direction: east, to: lodge }
      - { direction: up, to: chapel }
      - { direction: down, to: gatehouse }

  - id: commons
    name: "Debtors' Commons"
    description: >
      A bare hall where the gaol's debtors wait out their sentences and their lives.
      The fire is long dead, and only one of them is still awake — an old woman on a
      bench by the cold hearth, watching you with bright, unhurried eyes. The gallery
      is back to the east.
    exits:
      - { direction: east, to: gallery }

  - id: lodge
    name: "Turnkey's Lodge"
    description: >
      The turnkey's nook, and the turnkey himself face-down and snoring across the
      table, an empty jug at his elbow. A peg behind him holds his key-ring; his
      shelf of confiscated oddments has been picked over by no one but him. The
      gallery is back to the west.
    objects: [clay_pipe, gate_key]
    exits:
      - { direction: west, to: gallery }

  - id: chapel
    name: "Disused Chapel"
    description: >
      The friars' old chapel, kept now only by the dust. A dry stone font stands
      against the north wall, and beside it the debtors' alms-box is bolted to the
      floor. The stones of the rear wall fit close and blind. The gallery stair
      drops away to the south.
    # Reactive prose (bug_0012 shape). Once the old woman has told you the latch's
    # trick (`knows_postern`), the blind rear wall reads as the open postern and the
    # north exit it gates appears. The base text deliberately gives NOTHING away — a
    # player who has not had the telling sees only close-fit stone (the bug_0052 leak
    # discipline: the way out is knowledge the world does not otherwise hand you).
    variants:
      - when: [{ has_flag: knows_postern }]
        text: >
          The friars' old chapel, kept now only by the dust. The dry stone font
          stands against the north wall — and the third stone above its base, pressed
          slow as the old woman said, has swung the friars' postern inward on a breath
          of night air. The debtors' alms-box is bolted to the floor beside it. The way
          out runs north into the dark; the gallery stair drops away to the south.
    objects: [font, alms_box]
    exits:
      - { direction: south, to: gallery }
      - direction: north
        to: night_street
        # Gated on KNOWLEDGE, not a key: the postern opens only once the old woman has
        # told you its trick (the new dialogue-as-key axis). Hidden from the legal set
        # until then (enumerateActions filters on exit.conditions), so the secret stays
        # secret; the reactive room text above reveals it at the moment it becomes real.
        conditions: [{ has_flag: knows_postern }]
        locked_msg: "The rear wall is close-fit blind stone — if there's a way through here, you don't know it."

  - id: gatehouse
    name: "The Night-Gate"
    description: >
      The foot of the stair ends at the gaol's night-gate: a great barred grille of
      iron, its lock shaped for the turnkey's key. Beyond the bars the yard is dark —
      but not empty. The stair climbs back up to the gallery.
    objects: [iron_gate]
    exits:
      - { direction: up, to: gallery }

  - id: night_street
    name: "The Open Street"
    description: >
      You come out through the postern into a black, rain-slick lane behind the gaol,
      and the wall of the debtors' house falls away behind you into the dark. No bar,
      no bolt, no watch — only the road, and the rest of your life to walk it down.
      *** You are free. ***

objects:
  - id: wall_scratches
    name: "scratched message"
    aliases: [scratches, message, wall, scratching, scratch]
    description: "Lines gouged deep into the cell wall by some hand long gone before yours."
    read_text: >
      The scratches read: 'NO KEY FREES A DEBTOR. THE OLD WOMAN IN THE COMMONS KNOWS
      THE FRIARS' WAY — BUT SHE'LL WANT HER PIPE BACK FIRST. THEY KEEP IT IN THE
      TURNKEY'S NOOK. DO NOT TRUST THE GATE.'
    interactions:
      - verb: READ
        target: wall_scratches
        conditions: [{ not_flag: read_clue }]
        effects:
          - set_flag: read_clue
          - inc_var: { name: score, by: 5 }

  - id: clay_pipe
    name: "clay pipe"
    aliases: [pipe, clay]
    description: >
      A debtor's short clay pipe, the bowl burned dark — confiscated and tossed on the
      turnkey's shelf. It belongs to someone who has badly missed it.
    takeable: true
    # Not quest_critical: it is the TOKEN that buys the telling, not itself the key to
    # the win (knowledge is). The old woman keeps it when you hand it over (the
    # take_pipe node removes it), and the map is strongly connected, so it can be
    # neither lost nor soft-lock the quest — see parser_validator's quest-item guard.

  - id: gate_key
    name: "turnkey's key-ring"
    aliases: [key, ring, keys, keyring, key-ring]
    description: >
      A heavy iron ring of the turnkey's keys, every one of them shaped for a lock that
      keeps a debtor IN — the night-gate, the alms-box. None of them was ever cut to let
      a debtor out.
    takeable: true
    # The genre-reflex red herring: the obvious "way out" is iron, and the iron opens
    # only the death (the watched gate) and the greed (the alms-box). Not quest_critical
    # (the win never needs it), so taking, dropping, or never touching it is all safe.

  - id: font
    name: "stone font"
    aliases: [font, basin, stones, stone]
    description: "A dry baptismal font of grey stone against the chapel's rear wall; the wall-stones behind it fit close and even."
    # Reactive examine (bug_0033 shape), the object twin of the chapel room variant:
    # once the old woman's telling lands (`knows_postern`), examining the font names the
    # proud third stone and the postern it works. The base text leaks nothing (bug_0052).
    variants:
      - when: [{ has_flag: knows_postern }]
        text: >
          A dry stone font against the rear wall — and just as the old woman said, the
          third stone up from its base stands a little proud of its fellows. Pressed
          slow, it has worked the friars' postern open into the dark beyond.

  - id: alms_box
    name: "alms-box"
    aliases: [box, alms, almsbox, poorbox, poor-box]
    # The non-death greed fork (bug_0105 device). Bolted fast and keyed to the SAME
    # turnkey's ring that opens the night-gate — one key, two bad locks. Opening it is a
    # deliberate, telegraphed, one-way choice: it fires end_game (you snatch the coin and
    # bolt), mutually exclusive with the honest escape. Per bug_0123 the examine is no
    # ambush — it names plainly WHOSE pennies these are and that taking them is the act
    # itself, not a step toward freedom. Awards no score (max_score stays 35, so the
    # perfect score still coincides with the honest route), adds no exit/flag to any win.
    description: >
      A small iron alms-box bolted to the chapel floor, its slot worn smooth. This is
      the debtors' own poor-fund — the pennies the inmates pool to buy bread for the
      sick and a coffin for the dead among them, since no one else will. The bolt-lock
      is shaped for the turnkey's ring. To set that key to it is to take the last of
      what the wretches in here have left each other, and run; there is no putting it
      back, and no honest reason you would.
    locked: true
    key_id: gate_key
    unlock_narrate: >
      You set the turnkey's key to the alms-box and tip its slot out into your palm — a
      cold little weight of copper and clipped silver, the sick men's bread and the dead
      men's coffins, all of it. The postern, the old woman, the long honest way out: none
      of it matters now with this in your fist. You go out the way you came in, past the
      snoring turnkey and into the night, a thief of the only people poorer than yourself.
    unlock_effects:
      - end_game: ending_thief

  - id: iron_gate
    name: "barred night-gate"
    aliases: [gate, grille, bars, nightgate, night-gate]
    # The DEATH pole (bug_0130 discipline — genuine stakes, recoverable via load §8.7).
    # The obvious exit, and a trap: the watch is already posted in the dark beyond the
    # bars, waiting for exactly the debtor who runs for the gate the night before the
    # reckoning. Keyed to the turnkey's ring (the wall-scratches warn 'DO NOT TRUST THE
    # GATE'); unlocking it walks you straight into them. Telegraphed in the examine so it
    # is a choice, never an ambush. Awards no score, adds no exit to any win.
    description: >
      A great iron grille barring the gaol's only gate, the lock cut for the turnkey's
      ring. Through the bars the yard looks empty — until a shod foot scrapes stone out
      there in the dark, and a cupped torch flares and is hooded again. The watch is
      already posted, patient, waiting for just such a debtor as you to try the gate. The
      scratches in your cell were plain about this one.
    locked: true
    key_id: gate_key
    unlock_narrate: >
      You turn the turnkey's key in the great lock and swing the grille wide onto the
      yard — and the dark stands up all around you in the shapes of waiting men. A
      lantern is unhooded full in your face. They were posted for this, and you walked
      out into their hands as if the gate had been left open for you. Perhaps it had.
    unlock_effects:
      - end_game: ending_taken

npcs:
  - id: old_debtor
    name: "the old debtor"
    description: >
      A small old woman on the commons bench, twelve years a debtor and bright-eyed
      with it, watching you the way someone watches who has nothing left to lose and
      knows exactly where every stone of the house sits.
    room: commons
    dialogue:
      root: greet
      nodes:
        # Termination: every node offers an UNCONDITIONAL `bye` end-topic, so the player
        # can always leave in every state (DIALOGUE_NONTERMINATING satisfied trivially).
        # The two progress topics are each gated `not_flag <told>` so the telling cannot
        # repeat — the +10 and +20 fire exactly once (the sealed_crypt one-shot idiom),
        # and those not_flag reads are why neither flag is INERT.
        - id: greet
          npc_text: "Another soul the magistrates couldn't squeeze. Sit if you like — dawn's a long way off, and the watch is patient."
          topics:
            - { id: escape, prompt: "Ask if there's any way out of here", goto: about_postern, conditions: [{ not_flag: heard_postern }] }
            - { id: give_pipe, prompt: "Offer her the clay pipe", goto: take_pipe, conditions: [{ has_flag: heard_postern }, { has_item: clay_pipe }, { not_flag: knows_postern }] }
            - { id: about_her, prompt: "Ask how long she's been here", goto: her_story }
            - { id: bye, prompt: "Say nothing more", end: true }
        - id: about_postern
          npc_text: "A way out? ... There's the friars' old postern, walled up behind the chapel font — the brothers slipped through it long before this house was ever a gaol. But my old wits want coaxing, and my throat's dry as a lime-pit. They took my pipe to the turnkey's nook off the gallery. Fetch it back and I'll dredge up the trick of the latch for you."
          effects:
            - set_flag: heard_postern
            - inc_var: { name: score, by: 10 }
          topics:
            - { id: give_pipe, prompt: "Offer her the clay pipe", goto: take_pipe, conditions: [{ has_item: clay_pipe }, { not_flag: knows_postern }] }
            - { id: bye, prompt: "Say nothing more for now", end: true }
        - id: take_pipe
          npc_text: "(She packs the bowl with a stub of tallow and draws on it long and slow, eyes closing.) ... Aye. Behind the font, the third stone up from the floor — press it slow and even and the postern gives inward. Go on with you, and don't wait on me; I've debts in here a postern won't clear, and I'm too old now for night air."
          effects:
            - set_flag: knows_postern
            - inc_var: { name: score, by: 20 }
            - remove_item: clay_pipe
          topics:
            - { id: bye, prompt: "Thank her, and go", end: true }
        - id: her_story
          npc_text: "Twelve years, for a debt of nine shillings — and the interest is the only thing in this house that's ever fed well. I know every stone of the place now. Worth nothing to a magistrate, that. Worth the world, on the right night."
          topics:
            - { id: escape, prompt: "Ask if there's any way out of here", goto: about_postern, conditions: [{ not_flag: heard_postern }] }
            - { id: bye, prompt: "Say nothing more", end: true }

win_conditions:
  - id: through_postern
    # `visited: night_street` (locomotion win, like sealed_crypt's catacombs): the win
    # fires on stepping through the postern via the engine's post-action checkWin. The
    # postern exit is itself gated on `knows_postern`, so the only way to satisfy this is
    # to have had the telling — the conversation is genuinely on the win path.
    conditions: [{ visited: night_street }]
    ending: ending_free

endings:
  - id: ending_free
    title: "The Friars' Way"
    text: >
      No magistrate's key turned for you, and no iron — only an old woman's memory of
      a door the friars made, and a pipe to coax it loose. The postern shut soft behind
      you, the gaol with it, and the wet road took you in. *** You have won. ***
  - id: ending_thief
    title: "The Poor-Fund"
    # Non-death greed fork (bug_0105). The player lives and walks free — but rich on the
    # last pennies of people poorer than themselves. NOT a win_condition ending (fires
    # only by the alms-box's end_game), so WIN_IS_DEATH cannot apply and ending_free
    # stays the sole winnable ending.
    # bug_0186: this ending is reachable from BOTH states — robbing the box with or
    # without having first learned the postern from the old woman. The epilogue must be
    # TRUE in both, so it no longer asserts "she never told you the trick" (false on the
    # rob-after-learning route a blind playtest, seed 11, took); it names the honest way
    # out only as the thing the player turned from, which holds whether or not it was known.
    text: >
      You went out the easy way and the rich way, the wretches' poor-fund cold in your
      fist — the sick men's bread, the dead men's coffins. You will eat well for a while
      on it. Whatever honest way out of this house there was, you have turned your back on
      it for this; and somewhere behind you a sick man waits on bread that isn't coming.
      *** You have taken the poor-fund. ***
  - id: ending_taken
    title: "What Waited at the Gate"
    # The DEATH pole (death: true), reached only by unlocking the watched night-gate.
    # Recoverable via an earlier save (§8.7). Not a win_condition ending, so WIN_IS_DEATH
    # cannot fire and ending_free remains the sole winnable ending.
    text: >
      You trusted the gate the scratches told you not to trust, and the dark beyond the
      bars was full of waiting men. The lantern found your face, and the long patient
      watch closed its hands on you. There will be no second debtors' cell for you now —
      only the deeper kind, and no postern out of that one. *** You have been taken. ***
    death: true
