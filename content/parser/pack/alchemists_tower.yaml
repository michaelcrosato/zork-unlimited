# The Alchemist's Tower — a Sierra-Quest-style parser pack (Stage 3).
#
# Adds, on the same engine: a SCORE (awarded via inc_var on the `score` var), a
# DEATH ending recoverable via load (§8.7), and a multi-step puzzle chain. Goal:
# brew the antidote and carry it to the spire, where the tower's fevered master
# lies — then ADMINISTER it. Two clue sources point the way (§17 rule 1): the
# spellbook recipe and the brewing narration.
#
#   courtyard ─N─ great_hall ─N─ laboratory ─up─ spire (master; WIN: administer antidote)
#      │ W: library (recipe, +5)      │ down*: cellar (water_vial)
#      │ E: garden (herb, brass_key)  │ up: study (strongbox → iron_key)
#   (* cellar door unlocked with the iron key)
#
# Chain: read recipe → herb + brass_key (garden) → unlock strongbox → iron_key →
# unlock cellar → water_vial → brew (herb then water) → antidote → spire → give
# the antidote to the master. The climactic cure is a DELIBERATE act (USE antidote
# on the master), not an auto-completion on room entry: a blind playtester (seed
# 67) reached the spire holding the antidote and the win fired on the bare `go up`,
# the ending narrating "you administer the antidote" — an act they never chose
# (bug_0057, the parser-pack twin of sunken_barrow's bug_0056 claim-the-relic fix).
# The win now turns on the administer interaction's `cure_administered` flag via the
# engine's post-action checkWin hook (§8.4.5); `visited: spire` is KEPT so the
# parser validator's soft-lock guard still derives the spire as a win-room.
# DEATH: drinking the black phial (the recipe warns against it) — then load + retry.

meta:
  id: alchemists_tower_v1
  title: "The Alchemist's Tower"
  start_room: courtyard
  max_score: 35

rooms:
  - id: courtyard
    name: "Tower Courtyard"
    description: >
      A weed-cracked courtyard at the foot of a leaning tower. Doors lead off in
      every direction: the great hall north, a garden east, a library west.
    exits:
      - { direction: north, to: great_hall }
      - { direction: east, to: garden }
      - { direction: west, to: library }

  - id: library
    name: "Dusty Library"
    description: "Shelves of mildewed books. One lectern holds an open spellbook. The courtyard is east."
    objects: [spellbook]
    exits:
      - { direction: east, to: courtyard }

  - id: garden
    name: "Overgrown Garden"
    description: >
      A walled herb garden gone to seed. A pale medicinal herb still grows by the
      wall, and something brass glints in the soil. The courtyard is west.
    # Reactive prose (bug_0012): the bed/soil report what the player has already
    # gathered. herb-gone = taken or steeped (any_of); brass-gone = held (the key
    # is never consumed, so has_item is a durable "taken" signal).
    variants:
      - when:
          - any_of: [{ has_item: herb }, { has_flag: herb_added }]
          - has_item: brass_key
        text: >
          A walled herb garden gone to seed. The herb bed is bare where you cut the
          pale herb, and the scuffed soil no longer hides anything brass. The
          courtyard is west.
      - when:
          - any_of: [{ has_item: herb }, { has_flag: herb_added }]
          - not_item: brass_key
        text: >
          A walled herb garden gone to seed. The herb bed is bare where you cut the
          pale herb, but something brass still glints in the soil. The courtyard is
          west.
      - when:
          - none_of: [{ has_item: herb }, { has_flag: herb_added }]
          - has_item: brass_key
        text: >
          A walled herb garden gone to seed. A pale medicinal herb still grows by
          the wall; the soil is scuffed where you prised something brass free. The
          courtyard is west.
    objects: [herb, brass_key]
    exits:
      - { direction: west, to: courtyard }

  - id: great_hall
    name: "Great Hall"
    description: >
      A vaulted hall. A bolted cellar hatch is set in the floor; a stair winds up
      to a study, and an archway opens north into the laboratory. The courtyard
      is south.
    # Reactive prose (bug_0012): once the cellar hatch is unlocked, it reads as open
    # rather than bolted. bug_0073 retires the `cellar_unlocked` flag in favour of the
    # hatch's own runtime unlocked state (the engine UNLOCK verb now opens it — see the
    # cellar_door object), so this gates on `is_unlocked: cellar_door` instead.
    variants:
      - when: [{ is_unlocked: cellar_door }]
        text: >
          A vaulted hall. The cellar hatch stands thrown open in the floor, a dark
          stair dropping away below; another stair winds up to a study, and an
          archway opens north into the laboratory. The courtyard is south.
    objects: [cellar_door]
    exits:
      - { direction: south, to: courtyard }
      - { direction: up, to: study }
      - { direction: north, to: laboratory }
      - direction: down
        to: cellar
        # bug_0073: gated on the hatch's unlocked state (set by the engine UNLOCK verb),
        # mirroring how the study's iron key is reached behind the strongbox's lock.
        conditions: [{ is_unlocked: cellar_door }]
        locked_msg: "The cellar hatch is bolted with an iron lock."

  - id: study
    name: "Cluttered Study"
    description: "An alchemist's study. A locked iron strongbox sits on the desk. The hall is back down."
    # Reactive prose. The strongbox lifecycle is locked → unlocked → opened → emptied.
    # bug_0012 only reacted to the EMPTIED end (has_item iron_key, the durable proxy),
    # so the unlocked-but-not-yet-emptied window still falsely read "A LOCKED iron
    # strongbox" (blind playtest, this pack). bug_0033 adds the missing middle state
    # via the new `is_unlocked` runtime predicate: once the brass key throws the lock
    # the room stops saying "locked". First match wins, so the emptied variant (both
    # conditions true once the key is taken) is listed FIRST.
    variants:
      - when: [{ has_item: iron_key }]
        text: "An alchemist's study. The iron strongbox sits open and empty on the desk, its brass lock sprung. The hall is back down."
      - when: [{ is_unlocked: strongbox }]
        text: "An alchemist's study. The iron strongbox sits unlocked on the desk, its brass lock sprung. The hall is back down."
    objects: [strongbox]
    exits:
      - { direction: down, to: great_hall }

  - id: cellar
    name: "Cold Cellar"
    description: "A damp store-cellar. A vial of clear spring water rests in a rack. The hatch is back up."
    # Reactive prose (bug_0012): water-gone = taken or poured into the brew (any_of).
    variants:
      - when: [{ any_of: [{ has_item: water_vial }, { has_flag: antidote_brewed }] }]
        text: "A damp store-cellar. The rack stands empty where the vial of spring water rested. The hatch is back up."
    objects: [water_vial]
    exits:
      - { direction: up, to: great_hall }

  - id: laboratory
    name: "The Laboratory"
    description: >
      The alchemist's laboratory. A great cauldron simmers over a low flame, and a
      black phial sits apart on the bench. A stair climbs to the spire; the hall
      is south.
    # Reactive prose (bug_0012): the cauldron clause tracks the brew the player has
    # made — mid-steep green once the herb is in, then drained once the antidote is
    # decanted — instead of forever reading "simmers... waiting" after the brew is
    # done (blind playtest, this pack). The phial clause is brew-independent and
    # stays accurate for the common route that leaves the trap on the bench. First
    # match wins, so the finished (antidote_brewed) state is listed before the
    # mid-steep (herb_added) state. Text-only: no flag/item/score/exit/gating change.
    variants:
      - when: [{ has_flag: antidote_brewed }]
        text: >
          The alchemist's laboratory. The great cauldron has gone still over its
          guttering flame, drained of the antidote you decanted; a black phial sits
          apart on the bench. A stair climbs to the spire; the hall is south.
      - when: [{ has_flag: herb_added }]
        text: >
          The alchemist's laboratory. A great cauldron simmers over a low flame, its
          brew steeped a deep herbal green and waiting for clear water; a black phial
          sits apart on the bench. A stair climbs to the spire; the hall is south.
    objects: [cauldron, black_phial]
    exits:
      - { direction: south, to: great_hall }
      - { direction: up, to: spire }

  - id: spire
    name: "The Spire"
    # Reactive prose (bug_0012 shape). The base description must NOT assume the player
    # is carrying the antidote: the laboratory→spire stair is unconditional, so a player
    # can arrive here holding the black phial, the raw herb, or nothing at all. A blind
    # MCP playtester (seed 31) climbed to the spire carrying only the black phial and was
    # still told "The pale antidote in your hand is no use until you give it to her" —
    # prose asserting an item they did not hold. The "give it to her" prompt is now gated
    # on actually holding the antidote; the base text states the goal without claiming the
    # cure is in hand, and names no recipe (a player may have skipped the optional library
    # — the bug_0052 leak lesson). Text-only: no flag/item/score/exit/gating/ending change;
    # `visited: spire` still fires on entry, so the win condition is untouched (bug_0065).
    description: >
      The tower's top room. On a low pallet beneath the wind-moaning broken glass
      lies the tower's old master, fevered and failing — the patient the whole long
      climb was for. Whatever medicine might break her fever, you are not carrying
      it yet. The laboratory is back down.
    variants:
      - when: [{ has_item: antidote }]
        text: >
          The tower's top room. On a low pallet beneath the wind-moaning broken glass
          lies the tower's old master, fevered and failing — the patient the whole long
          climb was for. The pale antidote in your hand is no use until you give it to
          her. The laboratory is back down.
    objects: [master]
    exits:
      - { direction: down, to: laboratory }

objects:
  - id: spellbook
    name: "open spellbook"
    aliases: [book, spellbook]
    description: "A heavy spellbook, open to a stained recipe page."
    read_text: "The recipe reads: 'The cure is the pale herb steeped in clear water. The BLACK PHIAL is not medicine — it is death. Do not drink it.'"
    interactions:
      - verb: READ
        target: spellbook
        conditions: [{ not_flag: read_recipe }]
        effects:
          - set_flag: read_recipe
          - inc_var: { name: score, by: 5 }

  - id: herb
    name: "pale herb"
    aliases: [herb, leaf]
    description: "A pale, bitter medicinal herb."
    takeable: true
    # An ingredient, consumed by the brew (not quest_critical): its only use makes
    # progress, and it yields the antidote, which IS the durable quest item.

  - id: brass_key
    name: "brass key"
    aliases: [brass]
    description: "A small brass key, sized for a strongbox."
    takeable: true
    quest_critical: true

  - id: strongbox
    name: "iron strongbox"
    aliases: [strongbox, box]
    description: "A squat iron strongbox with a brass lock."
    # Reactive examine. bug_0023/0024 reacted only to the EMPTIED end (has_item
    # iron_key proxy). bug_0033 makes the examine track the full lifecycle with the
    # new runtime object-state predicates: emptied (key taken) → opened-with-key-still-
    # inside (is_open) → unlocked-but-closed (is_unlocked) → base locked box. First
    # match wins, so the variants run most-emptied first (after the key is taken both
    # is_open and is_unlocked are still true, but the has_item variant wins).
    # Examine-only: no flag/item/score/exit/gating change.
    variants:
      - when: [{ has_item: iron_key }]
        text: "The squat iron strongbox sits open and empty, its brass lock sprung and its lid thrown back — nothing left inside but the faint smell of old iron."
      - when: [{ is_open: strongbox }]
        text: "The squat iron strongbox stands open, its brass lock sprung and its lid thrown back; a heavy iron key still rests in the tray inside."
      - when: [{ is_unlocked: strongbox }]
        text: "The squat iron strongbox's brass lock hangs sprung where your key turned it; the lid is shut but free to lift."
    container: true
    openable: true
    locked: true
    key_id: brass_key
    contents: [iron_key]

  - id: iron_key
    name: "iron key"
    aliases: [iron]
    description: "A heavy iron key, black with age."
    takeable: true
    quest_critical: true

  - id: cellar_door
    name: "cellar hatch"
    aliases: [hatch, bolt]
    # bug_0073: the cellar hatch is a key+lock exactly like the study's iron strongbox,
    # yet it was opened by a hand-authored `USE iron key on cellar hatch` interaction
    # while the strongbox uses the engine's first-class `UNLOCK <obj> with <key>` verb
    # (driven by `key_id`). Two independent blind playtesters of this pack flagged the
    # split grammar — two different verbs for the same conceptual act. Modelling the
    # hatch with the same engine lock mechanism (`locked` + `key_id: iron_key`) gives
    # the player ONE uniform unlock grammar and drops both the bespoke interaction and
    # the `cellar_unlocked` flag. The down exit and the Great Hall's reactive prose now
    # gate on the hatch's runtime unlocked state (`is_unlocked: cellar_door`, set by the
    # engine UNLOCK) instead of the retired flag, so the vivid "thrown open" room text is
    # preserved; only the momentary action line becomes the engine's plain "You unlock
    # the cellar hatch", matching the strongbox. A reactive examine variant is added (the
    # pack's established discipline, cf. bug_0033) so the hatch stops reading "bolted"
    # once its lock is sprung. No route/score/reachable-ending change.
    description: "A bolted floor hatch with a great iron lock."
    variants:
      - when: [{ is_unlocked: cellar_door }]
        text: "The floor hatch stands unbolted, its great iron lock sprung; the dark stair drops away into the cellar below."
    locked: true
    key_id: iron_key

  - id: water_vial
    name: "vial of water"
    aliases: [vial, water]
    description: "A stoppered vial of clear spring water."
    takeable: true
    # An ingredient, consumed by the brew (see herb).

  - id: cauldron
    name: "great cauldron"
    aliases: [cauldron, pot]
    description: "A simmering cauldron, waiting for ingredients."
    # Reactive examine (bug_0023): the cauldron stops reading "waiting for ingredients"
    # once the player has put something in it — green mid-steep after the herb, then
    # drained once the antidote is decanted (blind playtest, this pack). Mirrors the
    # room's brew-state variants above. First match wins (finished before mid-steep).
    # Examine-only: no flag/item/score/exit/gating change.
    variants:
      - when: [{ has_flag: antidote_brewed }]
        text: "The great cauldron stands drained and still over its dying flame, the inside faintly green-stained — the pale antidote has been decanted from it."
      - when: [{ has_flag: herb_added }]
        text: "The simmering cauldron holds a deep green steep of the pale herb, waiting for clear water to finish the cure."
    interactions:
      - verb: USE
        item: herb
        target: cauldron
        # The prose primes "steep": the effect narrates "You steep the pale herb in
        # the cauldron", and the cauldron's reactive examine reads "a deep green steep
        # of the pale herb". So the natural command is "steep pale herb in great
        # cauldron", not the generic "use pale herb on great cauldron" — a per-interaction
        # command_verb + command_template (bug_0081, completing the bug_0078 item-on-target
        # arc; alchemists_tower was the lone pack whose item-on-target USEs never got it).
        # The id stays `use_herb_on_cauldron`; "use pale herb on great cauldron" still parses.
        command_verb: steep
        command_template: "steep {item} in {target}"
        conditions: [{ not_flag: herb_added }]
        effects:
          - set_flag: herb_added
          - remove_item: herb
          - inc_var: { name: score, by: 10 }
          - narrate: "You steep the pale herb in the cauldron. The brew turns green."
      - verb: USE
        item: water_vial
        target: cauldron
        # The prose primes "pour": the effect narrates "You pour the clear water in".
        # So the natural command is "pour vial of water into great cauldron", not the
        # generic "use vial of water on great cauldron" (bug_0081, see herb above). The
        # id stays `use_water_vial_on_cauldron`; "use vial of water on great cauldron"
        # still parses.
        command_verb: pour
        command_template: "pour {item} into {target}"
        conditions: [{ has_flag: herb_added }, { not_flag: antidote_brewed }]
        effects:
          - set_flag: antidote_brewed
          - remove_item: water_vial
          - add_item: antidote
          - inc_var: { name: score, by: 20 }
          - narrate: "You pour the clear water in. The brew clarifies into a pale antidote, which you decant."

  - id: black_phial
    name: "black phial"
    aliases: [phial, black]
    # Reactive examine (bug_0023/0033/0039/0044 shape). The lethal trap must telegraph
    # itself IN PLACE: the base description carries an intrinsic, sensory dread that
    # does NOT assume the player read the recipe. A blind playtester (seed 67) reached
    # ending_poisoned having skipped the optional Library and judged the death
    # "arbitrary" — the only warning lived in a room they never entered, and the old
    # base text ("The recipe warned against it") even referenced a recipe they had not
    # read (a quiet contradiction for that player). Now the bottle itself reeks of
    # death for everyone, while a recipe reader gets the sharper, named callback. The
    # `read_recipe` flag is the same one the spellbook READ sets (first match wins;
    # there is exactly one variant). Examine-only: no flag/item/score/exit/interaction/
    # gating change — the drink interaction and ending_poisoned are untouched, so the
    # death stays exactly as reachable as before (bug_0052).
    description: "A black glass phial of oily liquid that seems to drink the light. An acrid reek bleeds from under its wax-sealed stopper and stings the back of your throat — whatever this is, it was never brewed to be drunk."
    variants:
      - when: [{ has_flag: read_recipe }]
        text: "A black glass phial of oily liquid that drinks the light, an acrid reek stinging the back of your throat through its wax-sealed stopper. The recipe was plain about it: this is no medicine but death — do not drink it."
    takeable: true
    interactions:
      # Self-USE = "consume this thing". `command_verb: drink` makes the offered and
      # typed verb match the prose that primes it — the recipe and the phial both say
      # "drink"/"drunk", so the action reads "drink black phial" (and the parser accepts
      # "drink phial"), not the generic "use black phial". Two blind playtesters (seed 13
      # bug_0009, seed 29 bug_0074) flagged the drink-vs-use mismatch. Behaviour is
      # unchanged: still a self-USE firing ending_poisoned; "use black phial" still works.
      - verb: USE
        item: black_phial
        target: black_phial
        command_verb: drink
        effects:
          - narrate: "You unstopper the black phial and drink. Cold spreads through you, and the tower goes dark."
          - end_game: ending_poisoned

  - id: antidote
    name: "antidote"
    aliases: [cure]
    description: "A vial of pale, finished antidote."
    takeable: true
    quest_critical: true

  - id: master
    name: "fevered master"
    aliases: [master, alchemist, figure, patient, woman]
    # The patient who waited at the top of the puzzle chain. Not takeable; her sole
    # role is to be the deliberate TARGET of the cure, so the climax is an act the
    # player CHOOSES (USE antidote on the master), not one the engine performs for
    # them on bare room entry (bug_0057). The interaction sets `cure_administered`
    # (the win flag, checked post-action by the engine's checkWin hook) and consumes
    # the antidote — you poured it into her — so the win no longer needs `has_item:
    # antidote`; it turns on the act, not on merely carrying the vial upstairs.
    # Reactive examine, same fix as the spire room (bug_0065): the base text must not
    # claim "the pale vial in your hand", since the master can be examined by a player
    # who climbed here without the antidote. The vial-in-hand beat is gated on holding
    # the antidote; otherwise she searches you for a cure you have not brought. After the
    # cure is administered the antidote is consumed and the game ends, so only these two
    # states are observable. Examine-only: no flag/item/score/interaction/gating change.
    description: >
      The tower's old master, gaunt and grey on her pallet, the long sickness
      burning the last colour from her face. She is far too weak to speak, and her
      fever-bright eyes search you for the cure you have not yet brought her.
    variants:
      - when: [{ has_item: antidote }]
        text: >
          The tower's old master, gaunt and grey on her pallet, the long sickness
          burning the last colour from her face. She is far too weak to speak — but her
          eyes find the pale vial in your hand and hold on it.
    interactions:
      - verb: USE
        item: antidote
        target: master
        # The climax is giving the cure: the effect narrates raising the master's head
        # and tipping the antidote between her lips, and the win it sets is named
        # `administer_cure`. So the natural command is "give antidote to fevered master",
        # not the generic "use antidote on fevered master" (bug_0081, see herb above).
        # The id stays `use_antidote_on_master`; "use antidote on fevered master" still
        # parses.
        command_verb: give
        command_template: "give {item} to {target}"
        conditions: [{ not_flag: cure_administered }]
        effects:
          - set_flag: cure_administered
          - remove_item: antidote
          - narrate: "You raise the master's head and tip the pale antidote between her cracked lips, a slow and careful measure, until the vial runs empty."

win_conditions:
  - id: administer_cure
    # `visited: spire` is KEPT (not redundant): the parser validator derives its
    # soft-lock guard from the `visited` rooms named in win conditions, so dropping
    # it would silently disable that check (same reasoning as bug_0056). The win now
    # also requires `cure_administered` — set only by USE-antidote-on-master in the
    # spire — so it fires on the deliberate cure via checkWin, never on bare entry.
    conditions: [{ visited: spire }, { has_flag: cure_administered }]
    ending: ending_cured

endings:
  - id: ending_cured
    title: "The Cure"
    # Reworded for bug_0057: the player now performs the administering themselves (the
    # USE-antidote-on-master interaction narrates the act), so the ending carries the
    # AFTERMATH rather than narrating an act the player never chose.
    text: >
      For a long moment nothing — then colour creeps back into the master's face,
      breath by breath, and the long sickness breaks at last. The old alchemist will
      live, and the light of the tower with her. *** You have won. ***
  - id: ending_poisoned
    title: "Poisoned"
    text: >
      The black phial was no medicine. The tower goes dark around you. (Load a
      saved game to try again.)
    death: true
