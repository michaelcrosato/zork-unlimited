# The Alchemist's Tower — a Sierra-Quest-style parser pack (Stage 3).
#
# Adds, on the same engine: a SCORE (awarded via inc_var on the `score` var), a
# DEATH ending recoverable via load (§8.7), and a multi-step puzzle chain. Goal:
# brew the antidote and carry it to the spire, where the tower's fevered master
# lies — then ADMINISTER it. Two clue sources point the way (§17 rule 1): the
# spellbook recipe and the brewing narration.
#
#   courtyard ─N─ great_hall ─N─ laboratory ─up─ spire (master; WIN: administer antidote)
#      │ W: library (recipe, +5)      │ down*: cellar (water_vial)
#      │ E: garden (herb, brass_key)  │ up: study (strongbox → iron_key)
#   (* cellar door unlocked with the iron key)
#
# Chain: read recipe → herb + brass_key (garden) → unlock strongbox → iron_key →
# unlock cellar → water_vial → brew (herb then water) → antidote → spire → give
# the antidote to the master. The climactic cure is a DELIBERATE act (USE antidote
# on the master), not an auto-completion on room entry: a blind playtester (seed
# 67) reached the spire holding the antidote and the win fired on the bare `go up`,
# the ending narrating "you administer the antidote" — an act they never chose
# (bug_0057, the parser-pack twin of sunken_barrow's bug_0056 claim-the-relic fix).
# The win now turns on the administer interaction's `cure_administered` flag via the
# engine's post-action checkWin hook (§8.4.5); `visited: spire` is KEPT so the
# parser validator's soft-lock guard still derives the spire as a win-room.
# DEATH: drinking the black phial (the recipe warns against it) — then load + retry.
# BRANCH (bug_0111): the spire climax is a real decision, not a single act — give the
# master the antidote (WIN) or the black phial (a distinct death, ending_master_poisoned),
# the wrong-fork twin of drinking it yourself. Heavily telegraphed; recoverable via load.
# MORAL FORK (bug_0114): bug_0111's branches are BOTH deaths, so the pack still had exactly
# ONE satisfying outcome — the recurring "no real choice / fully linear" knock every blind
# report raises (this cycle: seed 41, enjoyment 3/5, "the puzzle solves itself … no real
# choice or misdirection beyond the obvious poison trap"). The proven lever (bug_0099's
# branching pack 5/5; bug_0105's sealed_crypt moral fork 3→4) is a NON-DEATH meaningful
# fork, and alchemists_tower was the last linear pack without it. The iron key the player
# already carries (it opened the cellar hatch) now becomes a FORK, exactly the sealed_crypt
# device: beside the master's pallet a locked silver casket holds the alchemist's Great Work,
# keyed to that same iron. CURE her (ending_cured, the canonical altruistic win) — or crack
# the casket and climb away with her masterwork while the fever finishes her (ending_betrayal,
# a non-death greed ending, mutually exclusive with the cure via end_game). The win route is
# byte-identical (the casket adds no score/exit/flag to it; max_score stays 40). Content-only.

meta:
  id: alchemists_tower_v1
  title: "The Alchemist's Tower"
  start_room: courtyard
  # `steadiness` is the skill rolled by the OPTIONAL d20 TENSION beat on the iron key
  # (its USE interaction below) — the Stage-4 skill_check mechanic standardized into this
  # parser puzzle, exactly the proven sealed_crypt shape (nerve 3, DC 12). It is a REAL
  # roll, never a luck-gate: the beat sits OFF the critical path and gates no exit, ending,
  # win, score, or reactive variant, so the exhaustive proofs (every ending reachable; the
  # 40-point economy exact) hold byte-for-byte on EITHER roll outcome — see the iron key.
  vars_init: { steadiness: 3 }
  # bug_0104: max_score raised 35 → 40 so the perfect score coincides with the WIN.
  # The score chain used to top out at 35 (read recipe +5, steep herb +10, decant
  # antidote +20) one full action BEFORE the game ends — the climactic, deliberate
  # cure (give antidote to the master, the bug_0057 act that IS the win) awarded
  # nothing, so a score-watching player hit a "perfect score yet unfinished" state
  # (blind playtest seed 89, this pack). The +5 capstone now lives on the cure act
  # (master's USE-antidote interaction), so 35/40 at the brew and 40/40 only on the
  # cure. Every prior award is unchanged.
  max_score: 40

rooms:
  - id: courtyard
    name: "Tower Courtyard"
    description: >
      A weed-cracked courtyard at the foot of a leaning tower. Doors lead off in
      every direction: the great hall north, a garden east, a library west.
    exits:
      - { direction: north, to: great_hall }
      - { direction: east, to: garden }
      - { direction: west, to: library }

  - id: library
    name: "Dusty Library"
    description: "Shelves of mildewed books. One lectern holds an open spellbook. The courtyard is east."
    # The reactive READ of the quest "the_cure" (bug_0162 — the one quest_stage pack for
    # the parser mode, the lamplighters_round shape). The spellbook's READ interaction sets
    # the quest to `cure_known` (its first stage) in THIS room, and READ does not move the
    # player, so right after the read the player is still standing in the library at exactly
    # that stage and the room re-renders to this variant. The library has NO on_enter, so
    # nothing resets the stage on entry (the bug_0146 dead-variant pitfall (a)); and this is
    # an EARLY stage read in the room where it is set, not a late stage before an unavoidable
    # win (pitfall (b)) — so the variant is route-independently reachable as displayed text.
    # The later stages (`herb_steeped`, `antidote_ready`) supersede `cure_known` once the brew
    # begins, so this text reads only in the window between learning the cure and steeping the
    # herb — exactly when a player lingers over the recipe. TRACKS PROGRESS ONLY: gates no
    # exit/ending/interaction/win, touches no score/flag, changes no existing effect.
    variants:
      - when: [{ quest_stage: { quest: the_cure, stage: cure_known } }]
        text: >
          Shelves of mildewed books, and the open spellbook on its lectern — the stained
          recipe read and held in your head now: the pale herb, the clear water, and the
          black phial that is no medicine. The courtyard is east.
    objects: [spellbook]
    exits:
      - { direction: east, to: courtyard }

  - id: garden
    name: "Overgrown Garden"
    description: >
      A walled herb garden gone to seed. A pale medicinal herb still grows by the
      wall, and something brass glints in the soil. The courtyard is west.
    # Reactive prose (bug_0012): the bed/soil report what the player has already
    # gathered. herb-gone = taken or steeped (any_of); brass-gone = held (the key
    # is never consumed, so has_item is a durable "taken" signal).
    variants:
      - when:
          - any_of: [{ has_item: herb }, { has_flag: herb_added }]
          - has_item: brass_key
        text: >
          A walled herb garden gone to seed. The herb bed is bare where you cut the
          pale herb, and the scuffed soil no longer hides anything brass. The
          courtyard is west.
      - when:
          - any_of: [{ has_item: herb }, { has_flag: herb_added }]
          - not_item: brass_key
        text: >
          A walled herb garden gone to seed. The herb bed is bare where you cut the
          pale herb, but something brass still glints in the soil. The courtyard is
          west.
      - when:
          - none_of: [{ has_item: herb }, { has_flag: herb_added }]
          - has_item: brass_key
        text: >
          A walled herb garden gone to seed. A pale medicinal herb still grows by
          the wall; the soil is scuffed where you prised something brass free. The
          courtyard is west.
    objects: [herb, brass_key]
    exits:
      - { direction: west, to: courtyard }

  - id: great_hall
    name: "Great Hall"
    description: >
      A vaulted hall. A bolted cellar hatch is set in the floor; a stair winds up
      to a study, and an archway opens north into the laboratory. The courtyard
      is south.
    # Reactive prose (bug_0012): once the cellar hatch is unlocked, it reads as open
    # rather than bolted. bug_0073 retires the `cellar_unlocked` flag in favour of the
    # hatch's own runtime unlocked state (the engine UNLOCK verb now opens it — see the
    # cellar_door object), so this gates on `is_unlocked: cellar_door` instead.
    variants:
      - when: [{ is_unlocked: cellar_door }]
        text: >
          A vaulted hall. The cellar hatch stands thrown open in the floor, a dark
          stair dropping away below; another stair winds up to a study, and an
          archway opens north into the laboratory. The courtyard is south.
    objects: [cellar_door]
    exits:
      - { direction: south, to: courtyard }
      - { direction: up, to: study }
      - { direction: north, to: laboratory }
      - direction: down
        to: cellar
        # bug_0073: gated on the hatch's unlocked state (set by the engine UNLOCK verb),
        # mirroring how the study's iron key is reached behind the strongbox's lock.
        conditions: [{ is_unlocked: cellar_door }]
        locked_msg: "The cellar hatch is bolted with an iron lock."

  - id: study
    name: "Cluttered Study"
    description: "An alchemist's study. A locked iron strongbox sits on the desk. The hall is back down."
    # Reactive prose. The strongbox lifecycle is locked → unlocked → opened → emptied.
    # bug_0012 only reacted to the EMPTIED end (has_item iron_key, the durable proxy),
    # so the unlocked-but-not-yet-emptied window still falsely read "A LOCKED iron
    # strongbox" (blind playtest, this pack). bug_0033 adds the missing middle state
    # via the new `is_unlocked` runtime predicate: once the brass key throws the lock
    # the room stops saying "locked". First match wins, so the emptied variant (both
    # conditions true once the key is taken) is listed FIRST.
    variants:
      - when: [{ has_item: iron_key }]
        text: "An alchemist's study. The iron strongbox sits open and empty on the desk, its brass lock sprung. The hall is back down."
      - when: [{ is_unlocked: strongbox }]
        text: "An alchemist's study. The iron strongbox sits unlocked on the desk, its brass lock sprung. The hall is back down."
    objects: [strongbox]
    exits:
      - { direction: down, to: great_hall }

  - id: cellar
    name: "Cold Cellar"
    description: "A damp store-cellar. A vial of clear spring water rests in a rack. The hatch is back up."
    # Reactive prose (bug_0012): water-gone = taken or poured into the brew (any_of).
    variants:
      - when: [{ any_of: [{ has_item: water_vial }, { has_flag: antidote_brewed }] }]
        text: "A damp store-cellar. The rack stands empty where the vial of spring water rested. The hatch is back up."
    objects: [water_vial]
    exits:
      - { direction: up, to: great_hall }

  - id: laboratory
    name: "The Laboratory"
    description: >
      The alchemist's laboratory. A great cauldron simmers over a low flame, and a
      black phial sits apart on the bench. A stair climbs to the spire; the hall
      is south.
    # Reactive prose (bug_0012): the cauldron clause tracks the brew the player has
    # made — mid-steep green once the herb is in, then drained once the antidote is
    # decanted — instead of forever reading "simmers... waiting" after the brew is
    # done (blind playtest, this pack). The phial clause is brew-independent and
    # stays accurate for the common route that leaves the trap on the bench. First
    # match wins, so the finished (antidote_brewed) state is listed before the
    # mid-steep (herb_added) state. Text-only: no flag/item/score/exit/gating change.
    # bug_0300: the phial clause did not react to the player TAKING it — all three
    # room states (base, herb_added, antidote_brewed) still read "a black phial sits
    # apart on the bench" even after pickup. Same reactive-description-blindness class
    # as bug_0012/0282/0283/0287/0288/0289/0292/0298. Fix: each brew state gains a
    # has_item:black_phial companion (listed ABOVE its plain counterpart, first-match-
    # wins) that omits the phial line; the base gains a standalone has_item:black_phial
    # variant above the description fallback. No flag/score/exit/gating/ending change.
    variants:
      - when: [{ has_flag: antidote_brewed }, { has_item: black_phial }]
        text: >
          The alchemist's laboratory. The great cauldron has gone still over its
          guttering flame, drained of the antidote you decanted. A stair climbs
          to the spire; the hall is south.
      - when: [{ has_flag: antidote_brewed }]
        text: >
          The alchemist's laboratory. The great cauldron has gone still over its
          guttering flame, drained of the antidote you decanted; a black phial sits
          apart on the bench. A stair climbs to the spire; the hall is south.
      - when: [{ has_flag: herb_added }, { has_item: black_phial }]
        text: >
          The alchemist's laboratory. A great cauldron simmers over a low flame, its
          brew steeped a deep herbal green and waiting for clear water. A stair climbs
          to the spire; the hall is south.
      - when: [{ has_flag: herb_added }]
        text: >
          The alchemist's laboratory. A great cauldron simmers over a low flame, its
          brew steeped a deep herbal green and waiting for clear water; a black phial
          sits apart on the bench. A stair climbs to the spire; the hall is south.
      - when: [{ has_item: black_phial }]
        text: >
          The alchemist's laboratory. A great cauldron simmers over a low flame. A
          stair climbs to the spire; the hall is south.
    objects: [cauldron, black_phial]
    exits:
      - { direction: south, to: great_hall }
      - { direction: up, to: spire }

  - id: spire
    name: "The Spire"
    # Reactive prose (bug_0012 shape). The base description must NOT assume the player
    # is carrying the antidote: the laboratory→spire stair is unconditional, so a player
    # can arrive here holding the black phial, the raw herb, or nothing at all. A blind
    # MCP playtester (seed 31) climbed to the spire carrying only the black phial and was
    # still told "The pale antidote in your hand is no use until you give it to her" —
    # prose asserting an item they did not hold. The "give it to her" prompt is now gated
    # on actually holding the antidote; the base text states the goal without claiming the
    # cure is in hand, and names no recipe (a player may have skipped the optional library
    # — the bug_0052 leak lesson). Text-only: no flag/item/score/exit/gating/ending change;
    # `visited: spire` still fires on entry, so the win condition is untouched (bug_0065).
    # bug_0161 ROOM-LEVEL terminality telegraph. bug_0123 put the betrayal-fork's
    # "this is a one-way greed choice" warning on the silver casket's OWN examine, but a
    # fresh blind MCP playtester (seed 23, ai-runs/2026-06-03T09-26-03-752Z/playtest.md §4-5)
    # showed that warning is bypassable: reaching the spire with the iron key but no cure
    # yet, they unlocked the casket straight from the ROOM view — "the same verb that was
    # safe on the strongbox" — without ever examining the object, and were railroaded into
    # ending_betrayal. The room text mentioned the casket neutrally ("its clasp cut for an
    # iron key"), which "actively invites trying the key you're already holding," so the
    # only warning lived in an examine they never ran. The fix carries the casket's terminal/
    # greed telegraph up to the SPIRE ROOM description (both states), so the warning reaches
    # the player at the actual decision point. Preserves the bug_0065 anchors verbatim ("you
    # are not carrying it yet" in base; "pale antidote in your hand is no use until you give
    # it to her" in the variant) and the leak discipline (base names no recipe/antidote-in-
    # hand). Text-only: no flag/item/score/exit/key/gating/ending change — the casket's
    # UNLOCK→ending_betrayal and the canonical cure are untouched.
    description: >
      The tower's top room. On a low pallet beneath the wind-moaning broken glass
      lies the tower's old master, fevered and failing — the patient the whole long
      climb was for. A small silver casket rests on a stand at her side, its clasp
      cut for an iron key; but to set iron to that clasp is to turn from her pallet
      to her coffer — a thing chosen once and not undone, her treasure bought against
      her cure. Whatever medicine might break her fever, you are not carrying it yet.
      The laboratory is back down.
    variants:
      - when: [{ has_item: antidote }]
        text: >
          The tower's top room. On a low pallet beneath the wind-moaning broken glass
          lies the tower's old master, fevered and failing — the patient the whole long
          climb was for. A small silver casket rests on a stand at her side, its clasp
          cut for an iron key; to crack it now, with her cure in your hand, would be to
          choose the Work over the maker and leave her to the fever — a thing chosen
          once and not undone. The pale antidote in your hand is no use until you give
          it to her. The laboratory is back down.
    objects: [master, silver_casket]
    exits:
      - { direction: down, to: laboratory }

objects:
  - id: spellbook
    name: "open spellbook"
    aliases: [book, spellbook]
    description: "A heavy spellbook, open to a stained recipe page."
    read_text: "The recipe reads: 'The cure is the pale herb steeped in clear water. The BLACK PHIAL is not medicine — it is death. Do not drink it.'"
    interactions:
      - verb: READ
        target: spellbook
        conditions: [{ not_flag: read_recipe }]
        effects:
          - set_flag: read_recipe
          # bug_0162: stage 1 of quest "the_cure" — the player now KNOWS the cure. Set
          # here (alongside the existing flag/score, the natural recipe milestone) and read
          # by the library room's reactive variant; guarded by `not_flag: read_recipe`, so it
          # fires exactly once and is never reset. Progress-only — gates nothing.
          - set_quest_stage: { quest: the_cure, stage: cure_known }
          - inc_var: { name: score, by: 5 }

  - id: herb
    name: "pale herb"
    aliases: [herb, leaf]
    description: "A pale, bitter medicinal herb."
    takeable: true
    # An ingredient, consumed by the brew (not quest_critical): its only use makes
    # progress, and it yields the antidote, which IS the durable quest item.

  - id: brass_key
    name: "brass key"
    aliases: [brass]
    description: "A small brass key, sized for a strongbox."
    takeable: true
    quest_critical: true

  - id: strongbox
    name: "iron strongbox"
    aliases: [strongbox, box]
    description: "A squat iron strongbox with a brass lock."
    # Reactive examine. bug_0023/0024 reacted only to the EMPTIED end (has_item
    # iron_key proxy). bug_0033 makes the examine track the full lifecycle with the
    # new runtime object-state predicates: emptied (key taken) → opened-with-key-still-
    # inside (is_open) → unlocked-but-closed (is_unlocked) → base locked box. First
    # match wins, so the variants run most-emptied first (after the key is taken both
    # is_open and is_unlocked are still true, but the has_item variant wins).
    # Examine-only: no flag/item/score/exit/gating change.
    variants:
      - when: [{ has_item: iron_key }]
        text: "The squat iron strongbox sits open and empty, its brass lock sprung and its lid thrown back — nothing left inside but the faint smell of old iron."
      - when: [{ is_open: strongbox }]
        text: "The squat iron strongbox stands open, its brass lock sprung and its lid thrown back; a heavy iron key still rests in the tray inside."
      - when: [{ is_unlocked: strongbox }]
        text: "The squat iron strongbox's brass lock hangs sprung where your key turned it; the lid is shut but free to lift."
    container: true
    openable: true
    locked: true
    key_id: brass_key
    contents: [iron_key]

  - id: iron_key
    name: "iron key"
    aliases: [iron]
    # The examine text telegraphs the OPTIONAL steadiness beat below (the self-USE
    # `grip iron key`). bug_0261: a fresh blind MCP playtester (seed 47,
    # ai-runs/2026-06-05T00-03-26-064Z/playtest.md §4-5) rated the pack clarity 5/5 /
    # enjoyment 4/5, won all three endings, found ZERO bugs — but flagged the bare
    # `grip iron key` action as an unfired Chekhov's gun: "a mysterious self-targeting
    # USE the moment you pick up the iron key, with no in-world prompt for why," that
    # then "trails" the player through every room with no payoff (the iron key is a
    # CARRIED item, so the self-USE surfaced everywhere it was held). The same finding-
    # family as sealed_crypt's bug_0241/bug_0258. The controlled parser only accepts
    # `<verb> <noun>`, so the offered command must stay typeable as "grip iron key" —
    # the legibility fix is CONTEXT, not the label: naming the impulse to steady your
    # hand here makes the beat read as an intentional, clued tension moment. Pure prose
    # — gates nothing, changes no flag/score/exit, so every structural proof and the
    # 40-point economy stay byte-identical.
    description: >
      A heavy iron key, black with age — fit for a great iron lock. The cold of it
      climbs your wrist; before you set it to anything down here, you might grip it a
      moment and steady your hand first.
    takeable: true
    quest_critical: true
    # An OPTIONAL `steadiness` TENSION beat — the Stage-4 d20 skill_check standardized into
    # this parser pack, resolved exactly as the RPG runner does: the runner applies
    # on_success/on_failure INSTEAD of this interaction's `effects`, then PREPENDS the roll
    # narration the player sees ("steadiness check: d20 <roll> + 3 = <total> vs 12 —
    # success/failure."). It is a self-USE on the iron key you carry — a private "grip the
    # cold iron and steady your hand" moment before you set this key to anything: fittingly
    # the very key that decides the whole tower (it throws the cellar hatch on the cure
    # route, and it is the casket's clasp on the betrayal route).
    #
    # It is a real roll, NOT a luck-gate, and is deliberately CONVERGENT — it gates NOTHING
    # the structural proofs turn on:
    #   • The iron key's two real acts are SEPARATE first-class UNLOCKs (cellar_door and
    #     silver_casket, each keyed by `key_id: iron_key`); this beat is a distinct USE
    #     iron-key-on-iron-key and touches neither. It sets no win flag, opens no exit,
    #     awards no `score` (the economy is proven exact at 40 — bug_0104), and no `when:`
    #     variant reads its flag — so on EITHER outcome every ending (cured / poisoned /
    #     master_poisoned / betrayal), the win, the exact 40-point economy, and every
    #     reactive variant stay reachable byte-for-byte. The exhaustive concrete BFS that
    #     proves those (cyoa-exhaustive-solver trilogy) explores ONE roll outcome per step;
    #     because nothing downstream reads success-vs-failure, both branches converge.
    #   • difficulty 12 vs d20 + steadiness 3 (range 4–23) is passable on a mid roll (≥ 9,
    #     ~60%) and well under the 23 ceiling — mirrors the proven sunken_barrow / sealed_crypt
    #     DC-12 check, so the roll reads as winnable on a better throw, never impossible.
    #   • One-shot via `not_flag: steadied_at_the_iron`: on SUCCESS the flag retires the beat
    #     (it is read ONLY by this condition — no other reader anywhere, so it cannot re-fire
    #     and re-roll a contradictory line). on FAILURE the flag stays unset, so the beat is
    #     simply RETRYABLE and the player proceeds to the locks regardless. Because the iron
    #     key is never consumed (the two locks UNLOCK it, they do not remove it) and the map
    #     is strongly connected (every region is two-way), the validator's SOFTLOCK_QUEST_ITEM
    #     heuristic — which fires only on a quest_critical item that is consumed-while-needed
    #     OR takeable-into-a-one-way-region — provably cannot trip on this beat: the key stays
    #     in hand for the real choice. (The standalone parser validator does not scan
    #     skill_check branches, so the `set_flag` is invisible to its writtenFlags set and the
    #     flag is not mis-flagged INERT; its `not_flag` read keeps the gate honest — the
    #     identical, shipped sealed_crypt shape.)
    interactions:
      - verb: USE
        item: iron_key
        target: iron_key
        command_verb: grip
        # bug_0261: gated `{ in_room: great_hall }` as well — the blind playtester (seed
        # 47) flagged the self-USE on this CARRIED key trailing them through every room
        # (study, cellar, lab, spire), places its "before you set this key to any lock
        # down here" fiction makes no sense. `in_room` (the non-monotone dual of `visited`)
        # offers the beat ONLY in the Great Hall, where the iron key's first real lock —
        # the cellar hatch's great iron lock — actually stands, exactly the "down here" the
        # narration and the key's examine name, and the room every cure route crosses
        # holding the key. Still optional, still CONVERGENT — it gates no exit, ending,
        # score, or variant on either roll outcome, so every structural proof and the
        # 40-point economy stay byte-identical; it only narrows WHERE the beat appears.
        conditions: [{ not_flag: steadied_at_the_iron }, { in_room: great_hall }]
        skill_check:
          skill: steadiness
          difficulty: 12
          on_success:
            - set_flag: steadied_at_the_iron
            - narrate: "You close your fist on the cold iron and make your hand stop shaking. The tower yields to iron, the recipe all but said — and the iron is in your grip now. Whatever you turn it on down here, you will turn it steady."
          on_failure:
            - narrate: "The old iron is colder than it has any right to be, and your hand will not quite settle around it. Better to gather yourself before you set this key to any lock in the tower."

  - id: cellar_door
    name: "cellar hatch"
    aliases: [hatch, bolt]
    # bug_0073: the cellar hatch is a key+lock exactly like the study's iron strongbox,
    # yet it was opened by a hand-authored `USE iron key on cellar hatch` interaction
    # while the strongbox uses the engine's first-class `UNLOCK <obj> with <key>` verb
    # (driven by `key_id`). Two independent blind playtesters of this pack flagged the
    # split grammar — two different verbs for the same conceptual act. Modelling the
    # hatch with the same engine lock mechanism (`locked` + `key_id: iron_key`) gives
    # the player ONE uniform unlock grammar and drops both the bespoke interaction and
    # the `cellar_unlocked` flag. The down exit and the Great Hall's reactive prose now
    # gate on the hatch's runtime unlocked state (`is_unlocked: cellar_door`, set by the
    # engine UNLOCK) instead of the retired flag, so the vivid "thrown open" room text is
    # preserved; only the momentary action line becomes the engine's plain "You unlock
    # the cellar hatch", matching the strongbox. A reactive examine variant is added (the
    # pack's established discipline, cf. bug_0033) so the hatch stops reading "bolted"
    # once its lock is sprung. No route/score/reachable-ending change.
    #
    # The has_item-brass_key variant is the WRONG-KEY foreshadow (bug_0103). A fresh blind
    # MCP playtester (alchemists_tower seed 53, ai-runs/2026-06-02T02-40-31-708Z/playtest.md
    # §4 — rotated off the over-fitted clockwork_heist onto the least-attended parser pack)
    # won ending_cured 35/35, rated clarity 5/5, and flagged ONE friction: standing in the
    # Great Hall already carrying the brass key (taken in the garden, just before this room
    # on the canonical route) with no iron key yet, the hatch reads only as a "great iron
    # lock" with no unlock action and no hint the brass key won't fit — so a player "wonders
    # why they can't even try the key they have." The fix mirrors the strongbox's WRONG-key
    # discipline (the brass key is described "sized for a strongbox"): a reactive examine
    # variant that, when the player holds the brass key but not yet the iron key, says the
    # iron lock dwarfs the little brass key and wants a key of iron to match — disambiguating
    # the wrong key and FORESHADOWING the iron key (which the study strongbox holds), without
    # naming where it is. Gated on has_item brass_key so it never fires for a player who has
    # not been to the garden (the bug_0052 leak lesson); listed AFTER the is_unlocked variant
    # so once the hatch is sprung the unbolted text wins, and the not_item iron_key guard
    # means it stops firing the moment the player holds the matching key (the base "great iron
    # lock" — accurate, still locked — returns). Examine-only: no flag/item/score/exit/route/
    # gating/ending change; the down exit still gates on is_unlocked and the canonical solve
    # is untouched.
    description: "A bolted floor hatch with a great iron lock."
    variants:
      - when: [{ is_unlocked: cellar_door }]
        text: "The floor hatch stands unbolted, its great iron lock sprung; the dark stair drops away into the cellar below."
      - when: [{ has_item: brass_key }, { not_item: iron_key }]
        text: "A bolted floor hatch with a great iron lock — a heavy, iron-mouthed thing far too big for the little brass key you carry, which was cut for some smaller box. A lock this size will yield only to a key of iron to match it."
    locked: true
    key_id: iron_key

  - id: water_vial
    name: "vial of water"
    aliases: [vial, water]
    description: "A stoppered vial of clear spring water."
    takeable: true
    # An ingredient, consumed by the brew (see herb).

  - id: cauldron
    name: "great cauldron"
    aliases: [cauldron, pot]
    description: "A simmering cauldron, waiting for ingredients."
    # Reactive examine (bug_0023): the cauldron stops reading "waiting for ingredients"
    # once the player has put something in it — green mid-steep after the herb, then
    # drained once the antidote is decanted (blind playtest, this pack). Mirrors the
    # room's brew-state variants above. First match wins (finished before mid-steep).
    # Examine-only: no flag/item/score/exit/gating change.
    #
    # The read_recipe variant is the brew-ORDER legibility fix (bug_0093). A fresh blind
    # playtester (alchemists_tower seeds 11/7/3, ai-runs/2026-06-02T00-13-20-449Z/playtest.md
    # §4 — rotated off the ~27×-blind-clean clockwork_heist onto the least-attended parser
    # pack) rated the pack 5/5 clarity but flagged ONE friction: standing in the lab with
    # the herb but no water yet, the recipe says "the pale herb steeped in clear water" as a
    # single combined state, while the mechanic is two ordered steps (steep herb FIRST, then
    # pour the cellar's clear spring water in). The cauldron's pre-herb examine — the static
    # "waiting for ingredients" — gave no hint of the sequence, so a careful reader couldn't
    # tell whether the cauldron's OWN simmering liquid already counted as the recipe's clear
    # water or whether the cellar vial was still needed. This variant resolves both: it names
    # the cauldron's simmer as NOT the recipe's clear water, and spells out the two-step order.
    # Gated on read_recipe (the flag the spellbook READ sets) so it never quotes a recipe a
    # library-skipper has not read (the bug_0052 leak lesson); the non-reader keeps the
    # intrinsic static base. Listed AFTER the brew-state variants, so once the herb is in,
    # the herb_added text (which already says "waiting for clear water to finish the cure")
    # wins — this only fires in the pre-herb decision moment. First match wins. Examine-only:
    # no flag/item/score/exit/gating/ending change.
    variants:
      - when: [{ has_flag: antidote_brewed }]
        text: "The great cauldron stands drained and still over its dying flame, the inside faintly green-stained — the pale antidote has been decanted from it."
      - when: [{ has_flag: herb_added }]
        text: "The simmering cauldron holds a deep green steep of the pale herb, waiting for clear water to finish the cure."
      - when: [{ has_flag: read_recipe }]
        text: "A great cauldron of plain water simmering over a low flame, empty of any ingredient yet — its own simmer is not the clear water the recipe means. By that recipe the cure is brewed here in two steps: first steep the pale herb in it, then finish the green steep with the clear spring water poured in."
    interactions:
      - verb: USE
        item: herb
        target: cauldron
        # The prose primes "steep": the effect narrates "You steep the pale herb in
        # the cauldron", and the cauldron's reactive examine reads "a deep green steep
        # of the pale herb". So the natural command is "steep pale herb in great
        # cauldron", not the generic "use pale herb on great cauldron" — a per-interaction
        # command_verb + command_template (bug_0081, completing the bug_0078 item-on-target
        # arc; alchemists_tower was the lone pack whose item-on-target USEs never got it).
        # The id stays `use_herb_on_cauldron`; "use pale herb on great cauldron" still parses.
        command_verb: steep
        command_template: "steep {item} in {target}"
        conditions: [{ not_flag: herb_added }]
        effects:
          - set_flag: herb_added
          # bug_0162: stage 2 of quest "the_cure" — the brew is begun. Guarded by
          # `not_flag: herb_added`, so it fires once and supersedes `cure_known`. Progress-only.
          - set_quest_stage: { quest: the_cure, stage: herb_steeped }
          - remove_item: herb
          - inc_var: { name: score, by: 10 }
          - narrate: "You steep the pale herb in the cauldron. The brew turns green."
      - verb: USE
        item: water_vial
        target: cauldron
        # The prose primes "pour": the effect narrates "You pour the clear water in".
        # So the natural command is "pour vial of water into great cauldron", not the
        # generic "use vial of water on great cauldron" (bug_0081, see herb above). The
        # id stays `use_water_vial_on_cauldron`; "use vial of water on great cauldron"
        # still parses.
        command_verb: pour
        command_template: "pour {item} into {target}"
        conditions: [{ has_flag: herb_added }, { not_flag: antidote_brewed }]
        effects:
          - set_flag: antidote_brewed
          # bug_0162: stage 3 (final) of quest "the_cure" — the antidote is in hand, ready to
          # carry to the spire. Guarded by `not_flag: antidote_brewed`, so it fires once and
          # supersedes `herb_steeped`. Progress-only; not read by any variant (the climactic
          # cure is the bug_0057 deliberate act, never gated on quest_stage).
          - set_quest_stage: { quest: the_cure, stage: antidote_ready }
          - remove_item: water_vial
          - add_item: antidote
          - inc_var: { name: score, by: 20 }
          - narrate: "You pour the clear water in. The brew clarifies into a pale antidote, which you decant."

  - id: black_phial
    name: "black phial"
    aliases: [phial, black]
    # Reactive examine (bug_0023/0033/0039/0044 shape). The lethal trap must telegraph
    # itself IN PLACE: the base description carries an intrinsic, sensory dread that
    # does NOT assume the player read the recipe. A blind playtester (seed 67) reached
    # ending_poisoned having skipped the optional Library and judged the death
    # "arbitrary" — the only warning lived in a room they never entered, and the old
    # base text ("The recipe warned against it") even referenced a recipe they had not
    # read (a quiet contradiction for that player). Now the bottle itself reeks of
    # death for everyone, while a recipe reader gets the sharper, named callback. The
    # `read_recipe` flag is the same one the spellbook READ sets (first match wins;
    # there is exactly one variant). Examine-only: no flag/item/score/exit/interaction/
    # gating change — the drink interaction and ending_poisoned are untouched, so the
    # death stays exactly as reachable as before (bug_0052).
    description: "A black glass phial of oily liquid that seems to drink the light. An acrid reek bleeds from under its wax-sealed stopper and stings the back of your throat — whatever this is, it was never brewed to be drunk."
    variants:
      - when: [{ has_flag: read_recipe }]
        text: "A black glass phial of oily liquid that drinks the light, an acrid reek stinging the back of your throat through its wax-sealed stopper. The recipe was plain about it: this is no medicine but death — do not drink it."
    takeable: true
    interactions:
      # Self-USE = "consume this thing". `command_verb: drink` makes the offered and
      # typed verb match the prose that primes it — the recipe and the phial both say
      # "drink"/"drunk", so the action reads "drink black phial" (and the parser accepts
      # "drink phial"), not the generic "use black phial". Two blind playtesters (seed 13
      # bug_0009, seed 29 bug_0074) flagged the drink-vs-use mismatch. Behaviour is
      # unchanged: still a self-USE firing ending_poisoned; "use black phial" still works.
      - verb: USE
        item: black_phial
        target: black_phial
        command_verb: drink
        effects:
          - narrate: "You unstopper the black phial and drink. Cold spreads through you, and the tower goes dark."
          - end_game: ending_poisoned

  - id: antidote
    name: "antidote"
    aliases: [cure]
    description: "A vial of pale, finished antidote."
    takeable: true
    quest_critical: true

  - id: master
    name: "fevered master"
    aliases: [master, alchemist, figure, patient, woman]
    # The patient who waited at the top of the puzzle chain. Not takeable; her sole
    # role is to be the deliberate TARGET of the cure, so the climax is an act the
    # player CHOOSES (USE antidote on the master), not one the engine performs for
    # them on bare room entry (bug_0057). The interaction sets `cure_administered`
    # (the win flag, checked post-action by the engine's checkWin hook) and consumes
    # the antidote — you poured it into her — so the win no longer needs `has_item:
    # antidote`; it turns on the act, not on merely carrying the vial upstairs.
    # Reactive examine, same fix as the spire room (bug_0065): the base text must not
    # claim "the pale vial in your hand", since the master can be examined by a player
    # who climbed here without the antidote. The vial-in-hand beat is gated on holding
    # the antidote; otherwise she searches you for a cure you have not brought. After the
    # cure is administered the antidote is consumed and the game ends, so only these two
    # states are observable. Examine-only: no flag/item/score/interaction/gating change.
    description: >
      The tower's old master, gaunt and grey on her pallet, the long sickness
      burning the last colour from her face. She is far too weak to speak, and her
      fever-bright eyes search you for the cure you have not yet brought her.
    # The bug_0111 BRANCH foreshadow: a player who carries the black phial up to the
    # spire (most leave the trap on the lab bench, but a curious / recipe-skipping
    # player may pocket it) now sees the master visibly recoil from it, telegraphing
    # that giving HER the dark potion is the wrong move before they can make it. Gated
    # has_item: black_phial + not_item: antidote, placed AFTER the antidote variant so
    # the success state wins if both are somehow held; first-match-wins. Examine-only.
    variants:
      - when: [{ has_item: antidote }]
        text: >
          The tower's old master, gaunt and grey on her pallet, the long sickness
          burning the last colour from her face. She is far too weak to speak — but her
          eyes find the pale vial in your hand and hold on it.
      - when: [{ has_item: black_phial }, { not_item: antidote }]
        text: >
          The tower's old master, gaunt and grey on her pallet, the long sickness
          burning the last colour from her face. Her fever-bright eyes catch the black
          phial in your hand and widen, and some last failing instinct in her shrinks
          from the oily dark behind its glass.
    interactions:
      - verb: USE
        item: antidote
        target: master
        # The climax is giving the cure: the effect narrates raising the master's head
        # and tipping the antidote between her lips, and the win it sets is named
        # `administer_cure`. So the natural command is "give antidote to fevered master",
        # not the generic "use antidote on fevered master" (bug_0081, see herb above).
        # The id stays `use_antidote_on_master`; "use antidote on fevered master" still
        # parses.
        command_verb: give
        command_template: "give {item} to {target}"
        conditions: [{ not_flag: cure_administered }]
        # bug_0104: the climactic cure carries the FINAL +5, so the perfect score
        # (40/40) is reached on this act — the win — not one step earlier at the brew
        # (35/40). The whole puzzle chain culminates here; before this fix the bug_0057
        # deliberate-cure act, the literal point of the pack, was the one unscored move.
        effects:
          - set_flag: cure_administered
          - remove_item: antidote
          - inc_var: { name: score, by: 5 }
          - narrate: "You raise the master's head and tip the pale antidote between her cracked lips, a slow and careful measure, until the vial runs empty."
      # The bug_0111 BRANCH: the climax is now a real DECISION — give her the right
      # potion (the antidote, above → the win) or the wrong one. A blind playtester
      # (this cycle, seed 101; the same note recurs from seed 67) flagged that a player
      # who reaches the spire carrying the black phial had NO "give black phial to
      # master" action at all, so the trap only ever punished self-experimentation
      # (drink it yourself), never the more natural mistake of dosing the patient with
      # the wrong vial. This adds that act. It is heavily telegraphed as wrong (the
      # recipe names the phial death; the phial's own examine reeks of it; the master
      # visibly recoils from it via the variant above), so an informed player avoids it
      # and an experimenting one gets a meaningful, Sierra-style consequence recoverable
      # via load (§8.7) — the genre this pack emulates. A deliberate, command-verb
      # `give` act mirroring the antidote interaction's grammar; awards no score (a
      # failure) and sets no flag (no INERT_FLAG); guarded not_flag cure_administered
      # for symmetry though the win ends the game first. Distinct ending in fiction:
      # you kill the patient you climbed to save, not yourself (ending_master_poisoned).
      - verb: USE
        item: black_phial
        target: master
        command_verb: give
        command_template: "give {item} to {target}"
        conditions: [{ not_flag: cure_administered }]
        effects:
          - narrate: "You raise the master's head and tip the black phial between her cracked lips before you think better of it. She stiffens, one shuddering breath — and then the fever, and all the rest, goes still."
          - end_game: ending_master_poisoned

  - id: silver_casket
    name: "silver casket"
    aliases: [casket, coffer, masterwork, work, stone]
    # bug_0114 MORAL FORK: the alchemist's Great Work, locked at her deathbed and keyed
    # to the SAME iron key that opens the cellar hatch (the sealed_crypt bug_0105 device —
    # one key, two locks: the cure path and the greed path). The base description must NOT
    # assume the player holds the antidote (the spire stair is unconditional and the iron
    # key can be carried here without ever brewing — the bug_0052/0065 leak discipline); the
    # has_item:antidote variant sharpens the moral weight for the player who could cure her
    # and chooses the Work instead. Modelled on the engine's first-class UNLOCK + key_id +
    # unlock_effects path (bug_0077), exactly like sealed_crypt's founder's coffin: opening
    # it fires end_game, making it MUTUALLY EXCLUSIVE with the cure — a genuine terminal
    # choice, not a detour. Awards no score (max_score stays 40, so the perfect score still
    # coincides with the cure, bug_0104) and adds no item (the stone is only narrated; the
    # game ends in your hand). Not on the win path — no exit/flag/gating change there.
    #
    # bug_0123 BASE-TEXT terminality telegraph. bug_0114 made this a real moral fork, but for
    # the fork to MEAN something the player must understand they are CHOOSING betrayal — not
    # stumbling into it. A fresh blind MCP playtester (alchemists_tower seed 19,
    # ai-runs/2026-06-02T12-34-33-369Z/playtest.md §5) won all three endings, rated the pack
    # clarity 5/5 / enjoyment 4/5, ZERO bugs — but flagged ONE real friction they actually hit
    # in Run 1: holding the finished cure, they popped the casket "for the last 5 points,"
    # expecting an optional treasure/bonus, and were railroaded into ending_betrayal with no
    # warning. The trap is that the casket's examine framed it as treasure ("the Great Work …
    # worth a hundred towers") with no signal that opening it is terminal and forecloses the
    # cure. The has_item:antidote variant already carries that weight ("to choose the Work over
    # the maker … leave her to the fever"), but a player who examines the casket BEFORE brewing
    # (as the tester did) sees only the BASE text, which read as a free bonus. The fix gives the
    # base text the same terminal/greed telegraph — to set iron to the clasp is to turn from her
    # pallet to her coffer, and the act cannot be undone — so the betrayal is always a deliberate
    # choice, never an ambush. Keeps "masterwork"/"locked away within arm's reach" (the bug_0114
    # base-text regex) and never names where the iron key is nor assumes the antidote (the
    # bug_0052/0065 leak discipline). Text-only: no flag/item/score/exit/key/gating/ending change
    # — the down exit, the casket's UNLOCK→ending_betrayal, and the canonical cure are untouched.
    description: >
      A small silver casket on a stand beside the master's pallet, its lid bound by a
      clasp shaped for an iron key — the very twin of the cellar hatch's. Through the
      seam leaks a hard, steady light, gold and unwavering: the alchemist's masterwork,
      the Great Work of her whole long life, locked away within arm's reach of her
      deathbed. The tower yields to iron, the recipe might as well have said, and so
      would this clasp — but to set the iron key to it is to turn from her pallet to her
      coffer, to answer her dying with your hands full of her treasure and not her cure.
      Lift this lid and there is no closing it after: it is a thing chosen once and for
      good.
    variants:
      - when: [{ has_item: antidote }]
        text: >
          A small silver casket on a stand beside the master's pallet, its lid bound by
          a clasp shaped for an iron key — the twin of the cellar hatch's. Through the
          seam leaks a hard, steady golden light: the alchemist's masterwork, the Great
          Work of her whole life, locked within arm's reach of her deathbed. The tower
          yields to iron, and so would this — but to crack it now, with her cure already
          in your hand, is to choose the Work over the maker and leave her to the fever
          you climbed all this way to break.
    locked: true
    key_id: iron_key
    unlock_narrate: >
      You set the iron key to the casket's clasp, and the lid lifts on the master's
      Great Work: a single stone that holds its own hard golden light, warm as a coal
      that will never cool. Worth a hundred towers — and a thousand lives that are not
      hers. You close your fist around it and start back down the long stair while the
      fever finishes what you would not, the last light of the tower going down the
      steps with you. Some things are worth more than one old woman's breath, you tell
      yourself, all the way down.
    unlock_effects:
      - end_game: ending_betrayal

win_conditions:
  - id: administer_cure
    # `visited: spire` is KEPT (not redundant): the parser validator derives its
    # soft-lock guard from the `visited` rooms named in win conditions, so dropping
    # it would silently disable that check (same reasoning as bug_0056). The win now
    # also requires `cure_administered` — set only by USE-antidote-on-master in the
    # spire — so it fires on the deliberate cure via checkWin, never on bare entry.
    conditions: [{ visited: spire }, { has_flag: cure_administered }]
    ending: ending_cured

endings:
  - id: ending_cured
    title: "The Cure"
    # Reworded for bug_0057: the player now performs the administering themselves (the
    # USE-antidote-on-master interaction narrates the act), so the ending carries the
    # AFTERMATH rather than narrating an act the player never chose.
    text: >
      For a long moment nothing — then colour creeps back into the master's face,
      breath by breath, and the long sickness breaks at last. The old alchemist will
      live, and the light of the tower with her. *** You have won. ***
  - id: ending_poisoned
    title: "Poisoned"
    text: >
      The black phial was no medicine. The tower goes dark around you, and the long
      sickness it was brewed for is yours now, and quick. *** You have died. ***
    death: true
  - id: ending_master_poisoned
    title: "The Wrong Vial"
    # bug_0111: the death branch for dosing the MASTER with the black phial (the trap
    # potion) instead of the antidote — the climax's wrong-fork twin of ending_poisoned
    # (drinking it yourself). A failure ending, recoverable via load (§8.7); distinct in
    # fiction — you kill the patient you climbed to save, not yourself. NO_WINNABLE_ENDING
    # is unaffected (ending_cured is still a non-death win).
    text: >
      The black phial was never medicine. The master's struggle ebbs and stops, and
      the tower's long-failing light goes out for good in your hands. You climbed the
      whole tower to save her, and ended her at the last. *** You have failed her. ***
    death: true
  - id: ending_betrayal
    title: "The Great Work"
    # bug_0114: the NON-DEATH moral fork — the iron key opens the cellar (cure path) OR
    # the master's silver casket (greed path), the sealed_crypt bug_0105 shape. You live;
    # she does not. Not a death ending (the PLAYER survives, walks away rich) and not a win
    # (no win_condition resolves to it; it fires only by the casket's end_game), so
    # NO_WINNABLE_ENDING / WIN_IS_DEATH are unaffected — ending_cured stays the sole
    # non-death win. Mutually exclusive with the cure: opening the casket ends the game.
    text: >
      You came to save the tower's master and climb away instead with the one thing she
      could never remake — her Great Work cold and bright in your fist, her breath
      failing somewhere in the dark behind you. You will be rich past reckoning, and the
      tower's light is yours now, such as it is. Some prices you only learn the size of
      later, on the nights you cannot sleep. *** You have taken the Great Work. ***
