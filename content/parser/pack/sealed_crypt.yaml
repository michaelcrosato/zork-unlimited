# The Sealed Crypt — a Zork-style parser pack (Stage 2).
#
# Goal: reach the catacombs beneath the ruined chapel. The route is a multi-step
# chain — get the rope, open the well, recover two keys from two containers, and
# unlock the catacombs gate. Two in-world clue sources point the way (§17 rule 1):
# the graveyard headstone and the sexton's rumor.
#
# The climax is a MORAL FORK (bug_0105): in the crypt, the iron key opens either
# the catacombs gate (press on → ending_victory, the canonical win) OR the
# founder's own coffin (rob the dead of its silver → ending_plunder). The fork is
# the iron key itself — "THE CRYPT YIELDS ONLY TO IRON" reads two ways.
#
#   forest_path ─N─ chapel_yard ─N─ chapel_nave ─down─ crypt ─N*─ catacombs (WIN)
#                    │ U: bell_tower (rope)                  └ founders_coffin → ending_plunder (iron key)
#                    │ E: old_well ─down*─ well_bottom (oak_chest → iron_key)
#                    │ W: graveyard ─N─ mausoleum (stone_coffer → brass_key)
#   (* = locked exit)

meta:
  id: sealed_crypt_v1
  title: "The Sealed Crypt"
  start_room: forest_path
  flags_init: []
  vars_init: {}
  # Stage-3 scoring: points are awarded once at each of the three milestones that
  # mark real progress — reading the headstone clue (+5), solving the well to raise
  # the keys from the deep (+10), and unlocking the catacombs gate (+20). Each award
  # rides a one-time gated interaction, so the score cannot be farmed by repeating an
  # action, and the intended solution path reaches the full 35.
  max_score: 35

rooms:
  - id: forest_path
    name: "Forest Path"
    description: >
      A muddy track ends at a lych-gate. Beyond it, the burnt shell of a chapel
      hunches against the hills. The way north leads into the yard.
    exits:
      - { direction: north, to: chapel_yard }

  - id: chapel_yard
    name: "Chapel Yard"
    description: >
      Weeds split the flagstones. A bell tower leans overhead to the up; the
      nave gapes to the north. A well sits to the east, a graveyard to the west,
      and the path home runs south.
    exits:
      - { direction: south, to: forest_path }
      - { direction: north, to: chapel_nave }
      - { direction: east, to: old_well }
      - { direction: west, to: graveyard }
      - { direction: up, to: bell_tower }

  - id: bell_tower
    name: "Bell Tower"
    description: >
      The bell is long gone, but its great hemp pull-rope still hangs coiled on
      a peg. Stairs lead back down.
    # Reactive room text (same pattern as old_well/crypt): while the coil is in your
    # hands the peg is bare, so the base "still hangs coiled" line no longer describes
    # a rope the player just pocketed. Keyed on has_item rope (not the well flag) on
    # purpose — `remove_item` at the well (bug_0034) only empties your hands, it does
    # not place the rope anywhere, so the object falls back to its home room and is
    # shown present here again; in that (and the never-taken / dropped-back) state the
    # rope IS visible in this room, so the base text correctly still applies and never
    # contradicts visible_objects. Closes the stale-state class the blind playtest
    # flagged (you take the rope, the room still says it hangs; cf. bug_0007/0039).
    variants:
      - when: [{ has_item: rope }]
        text: >
          The bell is long gone, and the peg where its great hemp pull-rope hung
          is bare now — the coil is in your hands. Stairs lead back down.
    objects: [rope]
    exits:
      - { direction: down, to: chapel_yard }

  - id: old_well
    name: "Old Well"
    description: >
      A moss-covered well stands in the corner of the yard, an iron ring bolted
      to its rim. It is too far to climb down without a rope. The yard is back
      to the west.
    variants:
      - when: [{ has_flag: rope_attached_to_well }]
        text: >
          A moss-covered well stands in the corner of the yard. The hemp rope is
          knotted fast to the iron ring and trails down into the dark — the way
          down is open. The yard is back to the west.
    objects: [old_well]
    exits:
      - { direction: west, to: chapel_yard }
      - direction: down
        to: well_bottom
        conditions: [{ has_flag: rope_attached_to_well }]
        locked_msg: "It's too far to climb down without a rope tied off above."

  - id: well_bottom
    name: "Bottom of the Well"
    description: >
      Cold water laps at a stone ledge. A banded oak chest sits on the dry side.
      The rope trails back up.
    objects: [oak_chest]
    exits:
      - { direction: up, to: old_well }

  - id: graveyard
    name: "Graveyard"
    description: >
      Tilted headstones crowd a yew tree. A worn headstone faces the path. The
      yard is east; a mausoleum stands open to the north.
    objects: [headstone]
    exits:
      - { direction: east, to: chapel_yard }
      - { direction: north, to: mausoleum }

  - id: mausoleum
    name: "Mausoleum"
    description: >
      Marble shelves line a still, dusty room. A small stone coffer rests on a
      plinth. The graveyard is back to the south.
    objects: [stone_coffer]
    exits:
      - { direction: south, to: graveyard }

  - id: chapel_nave
    name: "Chapel Nave"
    description: >
      Charred pews face a collapsed altar. A stair descends into darkness on the
      north side. The sexton lingers among the ruins. The yard is south.
    exits:
      - { direction: south, to: chapel_yard }
      - { direction: down, to: crypt }

  - id: crypt
    name: "Crypt"
    description: >
      Stone sarcophagi crowd a low chamber; one, set apart and greater than the
      rest, is the founder's, its lid bound shut by a heavy iron clasp. To the
      north, an iron catacombs gate bars the way, its lock shaped for a heavy key.
      The stair climbs back up.
    # Once the gate is open the reactive text names the final step explicitly. A
    # fresh blind playtester (seed 29) noted that unlocking the gate awards the last
    # points and the score reads "35 of 35" — yet the win only fires on ENTERING the
    # catacombs (win_conditions: visited catacombs). With the old text ("swung inward
    # on darkness / the stair climbs back up") a first-timer at max score could read
    # the puzzle as solved and climb back out, stopping one step short of the ending.
    # The fix is legibility only: the open-gate text (and the unlock narration below)
    # now point north through the gate as the journey's last move. No flag/score/exit
    # change — the route still wins 35/35 on `go_north` (bug_0054).
    variants:
      - when: [{ has_flag: catacombs_open }]
        text: >
          Stone sarcophagi crowd a low chamber; the founder's, set apart, still
          lies sealed under its iron clasp. To the north, the iron catacombs gate
          stands unlocked and swung inward on darkness — and through it, north, run
          the catacombs you came so far to find. The stair climbs back up.
    objects: [crypt_gate, founders_coffin]
    exits:
      - { direction: up, to: chapel_nave }
      - direction: north
        to: catacombs
        conditions: [{ has_flag: catacombs_open }]
        locked_msg: "The iron gate to the catacombs is locked fast."

  - id: catacombs
    name: "The Catacombs"
    description: >
      Beyond the gate, the catacombs run on into the dark — the resting place you
      came to find. The crypt is behind you to the south.
    exits:
      - { direction: south, to: crypt }

objects:
  - id: rope
    name: "coil of rope"
    aliases: [rope, coil]
    description: "A sturdy coil of hemp rope, strong enough to bear a climber."
    takeable: true
    quest_critical: true

  - id: old_well
    name: "old well"
    aliases: [well, ring]
    description: "Deep, dark, and quiet. An iron ring is bolted to the rim."
    interactions:
      - verb: USE
        item: rope
        target: old_well
        # The room primes "tie": the rope must be "tied off above", knotted to the
        # iron ring. So the natural command is "tie rope to old well", not the generic
        # "use rope on old well" — a per-interaction command_verb + command_template
        # (bug_0078, generalizing bug_0074's self-USE command_verb to item-on-target).
        # The id stays `use_rope_on_old_well`; "use rope on old well" still parses.
        command_verb: tie
        command_template: "tie {item} to {target}"
        conditions: [{ not_flag: rope_attached_to_well }]
        effects:
          - set_flag: rope_attached_to_well
          - unlock_exit: { from: old_well, to: well_bottom }
          - inc_var: { name: score, by: 10 }
          # The rope leaves your hands here: it is knotted fast to the ring and left
          # trailing down the shaft (it stays your way back up). Removing it keeps
          # the fiction honest — you no longer "carry" a coil the well now holds. The
          # well exit stays open by the rope_attached_to_well flag, never by has_item,
          # so the rope is SPENT, not lost (no soft-lock; see parser_validator).
          - remove_item: rope
          - narrate: "You knot the rope fast to the iron ring and pay it out into the dark below. It hangs taut down the shaft now — your way down, and your way back up."

  - id: stone_coffer
    name: "stone coffer"
    aliases: [coffer]
    description: "A small stone coffer, its lid loose."
    container: true
    openable: true
    contents: [brass_key]

  - id: brass_key
    name: "brass key"
    aliases: [brass]
    description: "A small brass key, green with age — the size for a chest lock."
    takeable: true
    quest_critical: true

  - id: oak_chest
    name: "oak chest"
    aliases: [chest, oak]
    description: "A banded oak chest. The lock is a plain brass keyway."
    container: true
    openable: true
    locked: true
    key_id: brass_key
    contents: [iron_key]

  - id: iron_key
    name: "iron key"
    aliases: [iron]
    description: "A heavy iron key, black with age — fit for a great iron lock."
    takeable: true
    quest_critical: true

  - id: headstone
    name: "worn headstone"
    aliases: [headstone, stone, grave]
    description: "A weathered headstone, its epitaph still legible."
    read_text: "Carved deep: 'THE CRYPT YIELDS ONLY TO IRON, DRAWN UP FROM THE DEEP.'"
    interactions:
      - verb: READ
        target: headstone
        conditions: [{ not_flag: read_headstone }]
        effects:
          - set_flag: read_headstone
          - inc_var: { name: score, by: 5 }

  - id: crypt_gate
    name: "iron catacombs gate"
    aliases: [gate, catacombs gate]
    # bug_0077: the gate is a key+lock exactly like the Bottom-of-the-Well oak chest,
    # yet it was opened by a hand-authored `USE iron key on crypt gate` interaction
    # while the chest (one room earlier) uses the engine's first-class `UNLOCK <obj>
    # with <key>` verb (driven by `key_id`). Two blind playtesters (seeds 29, 61) flagged
    # the split grammar — "made more glaring because the very same game demonstrates the
    # correct UNLOCK grammar one room earlier," and the gate's own prose ("its lock shaped
    # for a heavy key") primes UNLOCK, not USE. This is the same defect bug_0073 fixed in
    # alchemists_tower; sealed_crypt was left inconsistent. The reason the gate couldn't
    # already use first-class UNLOCK is that the engine's UNLOCK awarded no score and
    # narrated only "You unlock the X." — so a climactic, +20-point, richly-narrated
    # unlock had to fall back to a bespoke USE. bug_0077 teaches the engine's first-class
    # UNLOCK to carry `unlock_narrate` + `unlock_effects`, so the gate now reads through the
    # SAME `unlock iron catacombs gate with iron key` grammar as the chest while keeping its
    # dramatic line, its +20 score, and the opened-exit. One-shot is intrinsic (once the
    # lock is sprung it is no longer `isLocked`, so UNLOCK can't re-fire) — exactly what the
    # old `not_flag: catacombs_open` guard did. No route/score/reachable-ending change.
    description: "A heavy iron gate. Its great lock is shaped for an iron key."
    locked: true
    key_id: iron_key
    unlock_narrate: "The iron key turns with a groan, and the catacombs gate swings inward on darkness. Beyond it, north, the catacombs you came so far to find — one step through the open gate and your journey is done."
    unlock_effects:
      - set_flag: catacombs_open
      - unlock_exit: { from: crypt, to: catacombs }
      - inc_var: { name: score, by: 20 }

  # bug_0105 — the climactic MORAL FORK (the standing "retrofit a branch onto a
  # linear pack" next-focus; the blind report's only enjoyment knock was a single
  # ending). The founder's own coffin sits in the crypt under an iron clasp keyed,
  # like the gate, to the iron key the player already carries. So the iron key is a
  # FORK, not just a key: the headstone's "THE CRYPT YIELDS ONLY TO IRON" gains a
  # darker second reading. Turn it on the gate and press on to the resting place you
  # came for (ending_victory, the unchanged canonical win); or turn it on the
  # founder's coffin and leave rich, the dead robbed (ending_plunder). The plunder
  # act is terminal (end_game on the first-class UNLOCK, the SAME bug_0077 path the
  # gate uses), so the two endings are mutually exclusive — a genuine choice, not a
  # detour. No flag/score/exit/gating change to the victory route: the coffin adds
  # no inc_var (max_score stays 35) and no exit, so every prior route test is
  # byte-identical. ending_plunder is non-death (you don't die; you choose greed).
  - id: founders_coffin
    name: "founder's coffin"
    aliases: [coffin, founder, founders coffin]
    description: >
      A great stone coffin set apart from the lesser dead, its lid bound by a heavy
      iron clasp. Through a hairline crack the dull gleam of a silver reliquary
      shows within — grave-silver, worth more than the whole burnt chapel above.
      The clasp is shaped for an iron key, the very twin of the gate's: the crypt
      yields to iron, the headstone said, and so would this. To force it is to turn
      the rest you came to find into a robbery.
    locked: true
    key_id: iron_key
    unlock_narrate: >
      You set the iron key to the founder's clasp and his coffin grinds open. The
      silver reliquary is cold and heavy in your hands, worth a year of winters. The
      catacombs can keep their dark now; you have what the living pay for — and you
      climb back toward the light a thief in a holy place, the founder's rest broken
      behind you.
    unlock_effects:
      - end_game: ending_plunder

npcs:
  - id: sexton
    name: "the sexton"
    description: "A stooped old sexton, lantern in hand, watching you sidelong."
    room: chapel_nave
    dialogue:
      root: greet
      nodes:
        # Each info topic is gated on its own "not yet heard" flag, so once the
        # sexton has told a rumour it retires from the menu instead of re-offering
        # forever (the bug_0014 ping-pong fix). The ungated `bye` keeps every node
        # terminating in all states; when both rumours are heard only `bye` remains.
        - id: greet
          npc_text: "Few come willingly to the sealed crypt, traveler."
          topics:
            - { id: crypt, prompt: "Ask about the sealed crypt", goto: about_crypt, conditions: [{ not_flag: heard_crypt_rumor }] }
            - { id: well, prompt: "Ask about the old well", goto: about_well, conditions: [{ not_flag: heard_well_rumor }] }
            - { id: bye, prompt: "Say goodbye", end: true }
        - id: about_crypt
          npc_text: "The catacombs gate answers only to an iron key — and that key was lost down the well, locked in a chest."
          effects: [{ set_flag: heard_crypt_rumor }]
          topics:
            - { id: well, prompt: "Ask about the old well", goto: about_well, conditions: [{ not_flag: heard_well_rumor }] }
            - { id: bye, prompt: "Say goodbye", end: true }
        - id: about_well
          npc_text: "Dry rope hangs in the bell tower. Tie it to the ring and the well will give up its chest."
          effects: [{ set_flag: heard_well_rumor }]
          topics:
            - { id: crypt, prompt: "Ask about the sealed crypt", goto: about_crypt, conditions: [{ not_flag: heard_crypt_rumor }] }
            - { id: bye, prompt: "Say goodbye", end: true }

win_conditions:
  - id: reach_catacombs
    conditions: [{ visited: catacombs }]
    ending: ending_victory

endings:
  - id: ending_victory
    title: "Into the Catacombs"
    text: >
      The gate yields, and the cold breath of the catacombs rolls over you. You
      step through into the dark you came so far to find. *** You have won. ***
  # bug_0105 — the dark mirror of ending_victory, reached by turning the iron key on
  # the founder's coffin instead of the catacombs gate. Non-death: the player is not
  # killed, only damned to a meaner ending of their own choosing. It is NOT a
  # win_condition ending (it fires by end_game from the coffin's unlock_effects), so
  # WIN_IS_DEATH cannot apply and ending_victory remains the only winnable ending.
  - id: ending_plunder
    title: "The Grave-Robber's Wage"
    text: >
      You came seeking the sealed crypt's rest and leave instead with its silver.
      The catacombs stay shut to you now, their dead undisturbed but for one — and
      the founder's reliquary will keep you through many a hard winter, if its
      weight ever lets you sleep easy again. *** You have taken the silver. ***
