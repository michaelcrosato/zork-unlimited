# The Tithe-Barn — a CYOA pack (Stage 1 format).
#
# A famine winter, a lord's full grain-barn, and a thief caught in the dark. Like
# wreckers_light and white_stag the heart of this story is a MORAL FORK, not a
# lock-and-key chain — and the obvious goal is again the DARK one: you are the night
# watch the lord pays to keep his grain, the law makes a thief at it a hanging matter,
# the lord's silver goes to whoever brings one in, and you are as hungry as the town.
# To take her is the easy, sanctioned choice; the depth is the player who looks at what
# they are guarding.
#
# Where white_stag's two mercy outcomes converge (spare on instinct vs spare knowing,
# the stag lives either way), this pack is built for FOUR GENUINELY DISTINCT moral
# STANCES — the edge wreckers_light has and white_stag, at 4/5, lacks:
#
#   * seize the thief and call the lord's men for the bounty → ending_bounty   (betrayal)
#   * stand aside and let her slip out with her one sack      → ending_mercy    (private mercy)
#   * throw the doors wide and call the whole town to the grain → ending_doors  (public justice — GATED)
#   * climb the rotten loft after the older stores            → ending_fall     (greed; the death pole)
#
# The private mercy and the public liberation do NOT converge: one family eats and the
# barn stays locked on the rest; or the whole town eats and the hoarding ends and you
# are named outlaw. That is the distinct fourth stance the lever wants.
#
# A hidden "truth" reframes the choice rather than adding a route, exactly as the
# manor's letter, the keeper's journal, and white_stag's carved stone do: the steward's
# own account-book, left open on the table, sets down in a clerk's neat hand that the
# barn has stood full since autumn — carts of grain turned away to ROT in the low field
# to hold the price up, on the lord's sealed order, until the spring. The town is not
# starving because the harvest failed; it is starving because starving men pay more.
# Reading it sets `knows_truth`, which (a) fires reactive endingText variants on the
# bounty and the mercy (the ignorant act vs the same act done KNOWING the lie), and
# (b) UNLOCKS throwing the doors — the gated "best" ending, reserved for the player who
# read the book (cf. watchtower's proof-gated finale, white_stag's offering). The
# dramatic irony: the sanctioned choice (take the thief, keep the law) guards a lie,
# while the lawless act (open the doors) is the just one. Every terminal beat is the
# player's deliberate turn, telegraphed in plain prose (the loft ladder is "grey and
# soft with rot" before you set a boot to it) — never an ambush, the wreckers_light /
# white_stag / bug_0123 / bug_0130 discipline.

meta:
  id: tithe_barn_v1
  title: "The Tithe-Barn"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "North Tithe Barn"
    quest: "decide whether the lord's hoarded grain stays locked"
    role: "tithe watcher"
    connection: "The tithe barn stores grain and grudges for Charterhaven's parishes, making one ledger a city-wide pressure point."
  start: watch_post
  flags_init: []

scenes:
  - id: watch_post
    title: "The Night Watch"
    text: >
      The lord keeps his tithe-barn at the edge of the starving town, and tonight the
      lord keeps you to watch it. A failed harvest, a hard winter: the town is down to
      boiled leather and bark-bread, and the smell of the full barn carries on the cold
      like a cruelty. The steward read you the law before he went home to his warm bed —
      a thief at the grain is a hanging matter, and the lord pays good silver to the man
      who brings one in. Your own belly is a knot under your ribs. Then, from inside the
      great dark barn, comes a small, careful sound: someone who does not want to be heard.
    choices:
      - id: go_in
        text: "Go in after the sound."
        # First milestone of the night's watch (quest "the_barn", the lamplighters_round /
        # tide_mill progress-tracking shape — bug_0162 in CYOA). Going in BEGINS the watch in
        # earnest: set HERE, on the go-in CHOICE (not on any on_enter), so it fires exactly once
        # as the player commits and never re-sets. set_quest_stage TRACKS PROGRESS ONLY — it
        # gates no choice, next, ending, or flag, and changes no existing effect. The reactive
        # prose that reads this EARLY stage lives in granary_floor below (the hub this choice
        # opens onto), which has no on_enter to reset it; reading the book later advances the
        # quest to `truth_read`, superseding `watch_begun`, so that variant is a transient window
        # and the existing knows_truth prose is untouched (the tide_mill `begun` pattern).
        effects:
          - set_quest_stage: { quest: the_barn, stage: watch_begun }
        next: granary_floor

  - id: granary_floor
    title: "Inside the Barn"
    text: >
      Moonlight falls in bars through the slatted wall onto mountains of sacked grain —
      more than the whole town could eat in a year, going musty in the dark while children
      chew bark outside. Against the far sacks a gaunt figure has frozen mid-reach, a
      half-filled sack at their feet: a thief, cornered, with you between them and the only
      door. They do not run. They only watch you, and wait to see what kind of man the lord
      has set on them. On the steward's table by the door his account-book lies open where
      he left it. And against the wall a ladder climbs to a loft of older stores, its rungs
      grey and soft with rot.
    # Reactive layers on the same hub, first-match-wins, ordered by specificity. (1) If you
    # know the truth AND have already faced the thief, the room must remember both facts:
    # she has spoken, and the ledger has named the lie. (2) If only knows_truth is set, this
    # is the pre-confrontation informed view. (3) If only faced_thief is set, this is the
    # back_to_floor return after the reckoning, so the prose must not reset to "waiting to
    # see" as if she never spoke (bug_0370). (4) Quest "the_barn" at `watch_begun` remains
    # the first-look window after entering but before truth/confrontation.
    variants:
      - when: [{ has_flag: knows_truth }, { has_flag: faced_thief }]
        text: >
          Moonlight falls in bars onto the mountains of sacked grain, and the woman is no longer
          an unknown shape frozen against the far sacks. She has looked you in the eye and told
          you to do what he pays you for. You have read the steward's book too; you know this
          barn has stood full since autumn and fuller, that good grain was carted off to rot in
          the low field to keep the price climbing while the town goes under. The half-filled
          sack waits at her feet. The book lies open on the table where you left it. The rotten
          loft-ladder climbs grey and soft into the dark.
      - when: [{ has_flag: knows_truth }]
        text: >
          Moonlight falls in bars onto the mountains of sacked grain, and you cannot look at
          them now the way you did an hour ago. You have read the steward's book; you know
          this barn has stood full since autumn and fuller, that good grain was carted off to
          rot in the low field to keep the price climbing while the town goes under. The thief
          is still frozen against the far sacks, the half-filled sack at their feet, watching
          you between them and the only door. The book lies open on the table where you left
          it. The rotten loft-ladder climbs grey and soft into the dark.
      - when: [{ has_flag: faced_thief }]
        text: >
          Moonlight falls in bars onto the mountains of sacked grain, and the woman by the far
          sacks is no longer only a cornered shape in the dark. She has spoken now, low and even:
          do what he pays you for. The half-filled sack waits at her feet, and you still stand
          between her and the only door, with the steward's law in your head and the steward's
          open account-book on the table by your hand. The loft-ladder climbs grey and soft
          with rot into the dark.
      - when: [{ quest_stage: { quest: the_barn, stage: watch_begun } }]
        text: >
          Moonlight falls in bars onto the mountains of sacked grain, and you are in it now —
          past the door, the only door, with the thief frozen against the far sacks and the
          half-filled sack at their feet. They do not run. They wait to see what kind of man the
          lord has set on them, and the law the steward read you sits in your head like a stone:
          a thief at the grain is a hanging matter, and the silver goes to the man who brings one
          in. On the table by the door the steward's account-book lies open where he left it. The
          loft-ladder climbs grey and soft with rot into the dark. Whatever you do here, you do.
    choices:
      - id: read_book
        text: "Read the steward's open account-book on the table."
        next: ledger
      - id: face_thief
        text: "Face the cornered thief."
        # Pure reactive-prose state: once she has spoken, returning via back_to_floor must
        # not show the pre-confrontation "waiting to see" barn text again (bug_0370).
        effects:
          - set_flag: faced_thief
        next: reckoning
      - id: climb_loft
        # A CHOSEN, plainly-lethal gamble, not a curiosity trap — the base text already names
        # the ladder "grey and soft with rot," and the label names the gamble outright
        # (white_stag cross_ice / wreckers_light climb_to_wreck discipline: the death
        # foreshadows itself in the choice text). No flag/route change.
        text: "Climb the rotten loft-ladder to the older stores above."
        next: ending_fall

  - id: ledger
    title: "The Steward's Book"
    text: >
      You take up the book and tilt its open pages to the moonlight. It is all set down in a
      clerk's neat hand, week by week: the barn full since the first frost, and fuller — three
      carts of good grain turned away to ROT in the low field rather than be sold cheap, the
      price marked and climbing every week, and across the foot of the page a note in the lord's
      own seal — hold the grain; the dearer the better; not a sack sold before the spring. The
      town is not starving because the harvest failed. It is starving because starving men pay
      more, and the lord can count.
    # Reading sets knows_truth (the pack's only "truth" flag, the wreckers_light/white_stag
    # device). A second visit, already-read, re-shows the page without re-revealing.
    variants:
      - when: [{ has_flag: knows_truth }]
        text: >
          The steward's book still lies open to the same page, the same neat hand, the same
          sealed note at the foot of it: hold the grain, the dearer the better, until the
          spring. Reading it twice does not make it a different thing than it was. The barn is
          full on purpose. The town is hungry on purpose.
    choices:
      - id: decipher
        text: "Read on, week by week, to the foot of the page."
        conditions: [{ not_flag: knows_truth }]
        effects:
          - set_flag: knows_truth
          # Second milestone of quest "the_barn", set in lockstep with the truth-flag it mirrors:
          # reading the book to the foot of the page is the moment the watch turns on its head.
          # `truth_read` supersedes `watch_begun`, retiring the granary_floor `watch_begun` variant
          # exactly as knows_truth lights its own variant there (so the two hub layers never clash).
          # TRACKS PROGRESS ONLY — gates nothing; all gating stays on knows_truth, unchanged.
          - set_quest_stage: { quest: the_barn, stage: truth_read }
          - add_journal: >
              The steward's own book damns him. The barn has stood full since autumn — fuller:
              three carts of grain were turned away to rot in the low field rather than sell
              cheap, on the lord's sealed order to hold the price until the spring. The harvest
              did not fail the town. The lord is starving it on a ledger, because a starving
              man pays more for bread, and there is bread enough in this dark to feed every
              house in the parish twice over.
        next: ledger
      - id: leave_book
        text: "Set the book down and turn back to the barn."
        effects:
          - set_flag: knows_truth
          - set_quest_stage: { quest: the_barn, stage: truth_read }
        next: granary_floor

  - id: reckoning
    title: "The Cornered Thief"
    text: >
      The thief straightens against the sacks, past running, and meets your eye. Up close it
      is a woman with a winter-sharp face, and the half-filled sack at her feet is rye — a
      week of bread, no more. "Go on, then," she says, low and even, not pleading. "Do what
      he pays you for." Behind her the grain goes up into the dark, more than the whole town
      could eat, and the only door is at your back.
    # Knowing the lie colors the moment, not only the epilogue (the wreckers_light gallery /
    # white_stag bluff device): the reckoning reframes when knows_truth.
    variants:
      - when: [{ has_flag: knows_truth }]
        text: >
          She has not moved; she straightens against the sacks to meet your eye, past running
          — a woman with a winter-sharp face, a week of rye in the sack at her feet, no more.
          "Go on, then," she says, low and even. "Do what he pays you for." But you have read
          the book now, and you know the dark behind her is full of bread that was never meant
          to feed anyone, held back to rot for the price of it. She did not steal from a hungry
          lord. She took a week of rye from a year of waste.
    choices:
      - id: take_her
        text: "Seize her and call the lord's men for the bounty."
        # Final milestone of quest "the_barn": committing to a stance at the fork. Each of the
        # three deliberate stances (and only those — `back_to_floor` keeps you turning it over)
        # advances the quest to `stance_taken` as you step into the ending. set_quest_stage is a
        # pure progress marker added ALONGSIDE the existing `next` — it gates nothing, adds no
        # condition, and changes no route; all four endings stay exactly as reachable as before,
        # and the truth-flag gating on `open_doors` is untouched. No variant reads this LATE stage
        # (it is set as you leave for an ending — the bug_0146 late-stage pitfall — so it is the
        # tracked terminus only; the reactive prose reads the EARLY `watch_begun` stage instead).
        effects:
          - set_quest_stage: { quest: the_barn, stage: stance_taken }
        next: ending_bounty
      - id: let_her_go
        text: "Stand aside and let her go with the sack."
        effects:
          - set_quest_stage: { quest: the_barn, stage: stance_taken }
        next: ending_mercy
      - id: open_doors
        # The gated "best" ending — only the player who read the book can throw the barn open
        # to the whole town (proof-gated finale, cf. watchtower / white_stag's offering). The
        # mirror of seizing the one thief: instead of guarding the lie, you break it for
        # everyone, and the distinct fourth moral stance the lever wants.
        text: "Throw the great doors wide and call the whole town to the grain."
        conditions: [{ has_flag: knows_truth }]
        effects:
          - set_quest_stage: { quest: the_barn, stage: stance_taken }
        next: ending_doors
      - id: back_to_floor
        text: "Step back and look again at the dark barn."
        next: granary_floor

endings:
  - id: ending_bounty
    title: "The Lord's Silver"
    # knows_truth reframes the SAME act: the ignorant capture is a man keeping the only law he
    # knows; the knowing capture is done over a lie he has read in plain hand (the paired
    # reactive epilogue device — wreckers_light ending_wrecker, white_stag ending_quarry).
    variants:
      - when: [{ has_flag: knows_truth }]
        text: >
          You take her by the arm — she does not fight it — and you call out the door for the
          lord's men, and you do it KNOWING. Knowing the dark behind her was full of bread left
          to rot for the price of it; knowing she stole a week of rye from a year of waste;
          knowing the law you are keeping was written to keep that dark locked. The silver is
          real and cold in your hand by dawn, and you eat that week, and the week after. They
          hang her on the green when the ground thaws, for a sack of rye, and you stand in the
          crowd because not standing would be noticed. You read the book. You kept the lie
          anyway, and ate while she swung. There is no telling that to yourself afterward that
          makes it sit any easier. You knew. That is the whole of it.
    text: >
      You take her by the arm — she does not fight it — and you call out the door for the lord's
      men, and they come with their lanterns and their rope. The silver is real and cold in your
      hand by dawn, and you eat that week, and the week after. They hang her on the green when
      the ground thaws, for a sack of rye, and you stand in the crowd because not standing would
      be noticed, and you tell yourself you only kept a law a hungry man would have broken. It is
      a long time before you stop seeing her winter-sharp face turn to you in the dark of the
      barn — asking what kind of man the lord had set on her, and getting its answer.

  - id: ending_mercy
    title: "The One Sack"
    # knows_truth reframes mercy from a clean private kindness into a haunted half-measure: you
    # saved the one you could see and locked the door again on all the rest you had just read of.
    # Still good, but not the full act the open doors are — the distinct gradation, not a converge.
    variants:
      - when: [{ has_flag: knows_truth }]
        text: >
          You stand aside from the door. She shoulders the sack and goes past you quick and quiet
          into the dark, and is gone. You report the lock forced and the thief fled, and take the
          steward's curses and your docked pay, and you can pay it. But you read the book before
          you let her go — you know the dark behind you is full of held-back bread, a parish's
          worth and more — and you let her keep her one week of rye and then you locked the door
          again on all the rest of it. You saved the one you could see. You knew about the others,
          and you went home to your bed. Some nights that is mercy. Some nights, the nights you
          cannot sleep, it has another name, and you lie there and hunt for the one that fits.
    text: >
      You stand aside from the door. For a moment she does not believe it; then she shoulders the
      sack and goes past you quick and quiet into the dark, and is gone. You report the lock forced
      and the thief fled, and the steward curses and docks your pay, and that is the price and you
      find you can pay it. Somewhere out in the night one family eats this week that would not have.
      It is a small thing against a hard winter — one sack, one night — and the barn behind you is
      still full and still locked, and the town beyond it still hungry. But the small thing was
      yours to do, and you did it, and you sleep that night better than the lord ever will.

  - id: ending_doors
    title: "The Town at the Grain"
    # The gated finale: only the player who read the book (knows_truth) can reach this. No variant
    # needed — it is unreachable without the truth. The distinct fourth stance: public justice, not
    # private mercy; the whole town fed and the hoarding broken, at the price of your own name.
    text: >
      You do not take her, and you do not stand by while she creeps off with her one sack into the
      dark. You read the lie in the steward's own book, in his own neat hand, and you will not keep
      it one more hour. You throw the great doors wide and stand in them and SHOUT the town awake —
      and they come, in their nightclothes and their hunger, disbelieving and then not: down the
      lane and through the doors and into the grain that the rot in the low field says was always
      going to waste anyway, hauling it out by the armful and the barrowful while the rye-thief
      stands at your shoulder laughing and weeping at once. By the time the lord's men ride down at
      first light there is nothing left to guard and no one to make an example of — only a fed town,
      a barn standing open to the morning, and the steward's book going hand to hand with the whole
      of it set down in his own letters. They will name you outlaw for this. They will not be able
      to name you wrong. You go from the town that morning with the law at your back and the whole
      of it eating behind you, and you find a man can walk a long way on that.

  - id: ending_fall
    death: true
    title: "The Rotten Loft"
    # The death pole — telegraphed (the ladder "grey and soft with rot" in the base text, the gamble
    # named in the choice label). A chosen risk after the older stores, never an ambush.
    #
    # knows_truth reframes the SAME death, completing the pack's reactive-epilogue device on the one
    # non-gated ending it had been missing (the bounty and the mercy already reframe; the doors are
    # gated ON knows_truth so they are ALWAYS the knowing act and need no variant — this closes the
    # set). The informed fall is genuinely reachable (read the book, return to the hub, climb anyway:
    # go_in -> read_book -> decipher -> leave_book -> climb_loft), so the base text below stays
    # reached by the uninformed climb (go_in -> climb_loft) and this variant covers the knowing one —
    # the same first-match-wins, both-reachable shape as ending_bounty/ending_mercy (no dead fallback).
    # The dramatic irony deepens precisely when you KNEW: you read that the loft holds the oldest of a
    # hoard left to rot for the price of it, bread enough for the whole parish, and you climbed after
    # more of it for yourself alone — and that same hoard comes down and buries the one man who read
    # the lie, and the lie goes on. Telegraphed exactly as the base is; no flag/route/quest change.
    variants:
      - when: [{ has_flag: knows_truth }]
        text: >
          You set a boot to the ladder KNOWING — knowing from the steward's own book that the dark
          above you is no hungry man's last store but the oldest of a hoard held back to rot for the
          price of it, bread enough for the whole parish, and you climbing after more of it for
          yourself alone. For three rungs the soft grey wood only gives a little under you, spongy
          and damp in the cold. On the fourth it goes. There is the long splintering give, and then
          the loft floor comes down with it, and a winter's worth of old sacked grain comes down on
          top of that — the very waste you read of in the ledger, come down to bury the one man who
          read it — pinning you into the dark while you breathe the dust of it, and then breathe
          none. They dig you out in the morning when the lord's men come. The grain is barely
          spoiled. They sweep it up and sack it again, every last measure of it, and weigh it, and
          lock the barn, and set a new man to watch it by nightfall. The book lies open on the table
          still, and no one left who knew to read it.
    text: >
      You set a boot to the ladder, and for three rungs the soft grey wood only gives a little under
      you, spongy and damp in the cold. On the fourth it goes. There is the long splintering give,
      and then the loft floor comes down with it, and a winter's worth of old sacked grain comes down
      on top of that — more weight of bread than the whole starving town could carry off in a day,
      pinning you into the dark while you breathe the dust of it, and then breathe none. They dig you
      out in the morning when the lord's men come. The grain is barely spoiled. They sweep it up and
      sack it again, every last measure of it, and weigh it, and lock the barn, and set a new man to
      watch it by nightfall.
