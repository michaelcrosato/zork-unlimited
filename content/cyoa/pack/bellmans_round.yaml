# The Bellman's Round — a CYOA pack (Stage 1 format).
#
# It is just past midnight in a wool-trading market town when the bellman's
# lantern finds Jonas Hale — the wool factor — beaten and purse-cut in a
# doorway on Wool Lane. Hale breathes. No one else is in the lane. The
# bellman has no power of arrest and no obligation to investigate. The
# constable's house is at the far end of town.
#
# Whether you look — and how much — shapes the night you keep.
#
# Novel contributions vs existing CYOA corpus:
#   (1) TOWN BELLMAN — unique player role: the lowest civic authority, a man
#       paid to call the hours and watch for fire. Investigation is voluntary,
#       not the job. The moral question is not what authority compels, but
#       whether you use your presence to matter.
#   (2) OUTDOOR NIGHT TOWN — five exterior locations connected by the round
#       (wool_lane hub, dark_alley, market_cross, counting_house, south_lane);
#       the first CYOA pack to traverse a public outdoor grid rather than
#       a single indoor interior.
#   (3) MULTI-CATEGORY EVIDENCE GATE — the naming terminal requires clues
#       from three distinct evidence categories simultaneously (physical:
#       found_cloak_pin; testimonial: heard_witness; documentary: found_debt);
#       no prior CYOA pack gates a terminal on clues from separate sub-scenes
#       across all three categories.
#   (4) CONVERGENT CONFRONTATION BEAT — the direct-confrontation path
#       (confront_gant, gated on physical + documentary evidence) uses a
#       steadiness tension beat: both skill_check branches award +20 and go
#       to ending_confronted, differing only in how the confrontation reads.
#       Alternative to naming the constable; identical maximum score (50).
#
# Score economy (awards ride one-shot, guarded choices — score cannot be
# farmed past the ceiling, and every award lies on one traversable run):
#   +5  inspect_doorway   — silver cloak-pin (not_flag found_cloak_pin)
#   +5  search_alley      — Gant's complaint letter (not_flag read_dispute)
#   +5  ask_stallkeeper   — witness testimony (not_flag heard_witness)
#   +5  ask_second_vendor — corroborating vendor (not_flag heard_companion)
#   +5  read_ledger       — short-weight record (not_flag found_debt)
#   +5  check_gants_room  — torn coat, fresh blood (not_flag seen_torn_coat)
#   +20 name_to_constable — full case to constable (gate: found_cloak_pin
#                            + heard_witness + found_debt)
#   OR
#   +20 confront_gant     — direct confrontation (gate: found_cloak_pin
#                            + found_debt; convergent steadiness DC 11 beat)
# Best path: all six clues (+30) → name_to_constable (+20) = 50.
# Confrontation path: inspect_doorway (+5) + read_ledger (+5) → confront_gant
#   (+20) + any remaining clues = same ceiling 50.
# Reporting path: all clues (+30) + report_what_you_saw (+10) = 40.

meta:
  id: bellmans_round_v1
  title: "The Bellman's Round"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Wool Lane Watch"
    quest: "name the assailant before dawn"
    role: "town bellman"
    connection: "Charterhaven pays the night bells on the wool road, and Wool Lane is the hub city watch at its poorest edge."
  start: wool_lane
  flags_init: []
  # `steadiness` (init 3) — the stat for the confront_gant TENSION beat
  # (d20 + steadiness vs DC 11). Both branches award +20 to score and
  # goto ending_confronted with end_game — stateKey-convergent (same
  # current, vars, ended/endingId in both outcomes; only add_journal
  # narration differs). Roll 8 + 3 = 11 beats it — a real swing.
  vars_init: { steadiness: 3 }
  max_score: 50

scenes:
  # ── Wool Lane (hub / start) ───────────────────────────────────────────────
  - id: wool_lane
    title: "Wool Lane"
    on_enter:
      - set_quest_stage: { quest: the_round, stage: found_hale }
    # Higher-specificity variants first (all_of before any_of): a player
    # satisfying either proof-state variant also satisfies the broad clue
    # variant, so the proof-state variants must come first.
    variants:
      - when:
          - all_of:
              - { has_flag: found_cloak_pin }
              - { has_flag: found_debt }
              - { has_flag: seen_torn_coat }
        text: >
          Hale is where you left him, breathing with less effort now. The
          silver pin sits in your belt-pouch beside the ledger note, and
          south in Gant's lit room you have seen the torn sleeve, the blood
          at his cuff, and the fat purse at his hand. Whatever proof daylight
          will ask for, the night has a name.
      - when:
          - all_of:
              - { has_flag: found_cloak_pin }
              - { has_flag: heard_witness }
              - { has_flag: found_debt }
        text: >
          Hale is where you left him, breathing with less effort now. The
          silver pin sits in your belt-pouch beside the ledger note and the
          market woman's account. Three different kinds of evidence, all
          pointing the same direction. You know who did this.
      - when:
          - any_of:
              - { has_flag: found_cloak_pin }
              - { has_flag: read_dispute }
              - { has_flag: heard_witness }
              - { has_flag: found_debt }
        text: >
          Hale hasn't moved. The lane is still quiet. Something is
          assembling itself from what you've found — not proof yet, but a
          shape with a name at the centre of it.
    text: >
      The half-hour bell is still fading when your lantern catches the figure
      in the doorway of the wool exchange: Jonas Hale, the factor, down on
      the stones with his purse-string cut. He breathes in shallow pulls.
      His hat is three feet away. There is no one else in the lane.
    choices:
      - id: inspect_doorway
        text: "Kneel and look at the doorway more carefully."
        conditions: [ { not_flag: found_cloak_pin } ]
        effects:
          - set_flag: found_cloak_pin
          - add_journal: "A silver cloak-pin in the gutter beside Hale's outstretched hand — not his; his own pin is still at his throat. This one is cheaper work, the face of a hound pressed flat. Torn from a coat in a struggle."
          - inc_var: { name: score, by: 5 }
        next: wool_lane
      - id: go_to_alley
        text: "Check the alley behind the Exchange."
        next: dark_alley
      - id: go_to_market_cross
        text: "Walk up to the market cross — some vendors trade late."
        next: market_cross
      - id: go_to_counting_house
        text: "Try the door of Hale's counting house."
        next: counting_house
      - id: go_to_south_lane
        text: "Walk south toward the bridge — lodging houses that way."
        next: south_lane
      - id: name_to_constable
        text: "Go directly to the constable with what you have."
        conditions:
          - all_of:
              - { has_flag: found_cloak_pin }
              - { has_flag: heard_witness }
              - { has_flag: found_debt }
        effects:
          - inc_var: { name: score, by: 20 }
        next: ending_named
      - id: confront_gant
        text: "Go to Gant's lodging and put the evidence to him directly."
        conditions:
          - all_of:
              - { has_flag: found_cloak_pin }
              - { has_flag: found_debt }
        # Tension beat: steadiness (init 3) vs DC 11. Both branches award
        # +20 and route to ending_confronted via goto + end_game —
        # stateKey-convergent. Only the add_journal narration differs.
        skill_check:
          skill: steadiness
          difficulty: 11
          on_success:
            - add_journal: "Your voice stays flat. When you name the pin and the ledger entry together, Gant's face does the accounting before his mouth does. He sits down on the step and says nothing more."
            - inc_var: { name: score, by: 20 }
            - goto: ending_confronted
            - end_game: ending_confronted
          on_failure:
            - add_journal: "Your voice catches on the accusation once. Gant sees it. But the pin is in your open hand — small, silver, a hound's face he cannot explain — and he sees that too. He sits down on the step and says nothing more."
            - inc_var: { name: score, by: 20 }
            - goto: ending_confronted
            - end_game: ending_confronted
      - id: report_what_you_saw
        text: "Go to the constable and report what you saw."
        conditions:
          - none_of:
              - all_of:
                  - { has_flag: found_cloak_pin }
                  - { has_flag: heard_witness }
                  - { has_flag: found_debt }
        effects:
          - inc_var: { name: score, by: 10 }
        next: ending_reported
      - id: finish_your_round
        text: "Mark it in your log and call the hour."
        next: ending_silent

  # ── The back alley (east of Exchange) ────────────────────────────────────
  - id: dark_alley
    title: "The Back Alley"
    variants:
      - when: [ { has_flag: read_dispute } ]
        text: >
          The alley is as you left it — mud, the smell of damp wool, the
          crumpled letter already in your pouch.
    text: >
      The service alley behind the wool exchange is unlit and smells of
      wet fleece. Something has been disturbed in the mud near the
      exchange's back door — a confusion of boot-prints, and a pale shape
      half-pushed under the door-scraper.
    choices:
      - id: search_alley
        text: "Retrieve the pale shape from under the door-scraper."
        conditions: [ { not_flag: read_dispute } ]
        effects:
          - set_flag: read_dispute
          - add_journal: "A crumpled letter — Gant's hand, addressed to the guild: a complaint that Hale short-weighted his last wool consignment by eight pounds and refused to correct the scale. The guild stamp at the bottom says the complaint was received and filed. Filed meaning buried."
          - inc_var: { name: score, by: 5 }
        next: dark_alley
      - id: leave_alley
        text: "Return to Wool Lane."
        next: wool_lane

  # ── The market cross (north) ──────────────────────────────────────────────
  - id: market_cross
    title: "The Market Cross"
    # Variant 1 (heard_companion) implies heard_witness, so must come first.
    variants:
      - when: [ { has_flag: heard_companion } ]
        text: >
          The two vendors are still at their lamp. They've said what they
          know and are watching Wool Lane.
      - when: [ { has_flag: heard_witness } ]
        text: >
          The stallkeeper is still at her lamp, arms folded. She nods
          when your lantern comes around the corner.
    text: >
      A lamp burns at the base of the market cross. A linen-goods
      stallkeeper and her neighbour are closing late, bundling cloth. They
      look up when your lantern comes around the corner.
    choices:
      - id: ask_stallkeeper
        text: "Ask the stallkeeper if she saw anything in Wool Lane tonight."
        conditions: [ { not_flag: heard_witness } ]
        effects:
          - set_flag: heard_witness
          - add_journal: "She saw two men come out of the exchange arguing. One was Hale — she knows him by his red cloak. The other was bigger, in a drover's coat, and had a limp on the left. They went round into the back alley together. That was near the half-hour."
          - inc_var: { name: score, by: 5 }
        next: market_cross
      - id: ask_second_vendor
        text: "Ask the neighbour what she saw."
        conditions:
          - all_of:
              - { has_flag: heard_witness }
              - { not_flag: heard_companion }
        effects:
          - set_flag: heard_companion
          - add_journal: "The neighbour saw the same. She adds that the big man was carrying something under his arm when he came back out of the alley alone — bulging, like a stuffed purse. He was moving fast."
          - inc_var: { name: score, by: 5 }
        next: market_cross
      - id: leave_cross
        text: "Return to Wool Lane."
        next: wool_lane

  # ── Hale's counting house (west) ─────────────────────────────────────────
  - id: counting_house
    title: "Hale's Counting House"
    variants:
      - when: [ { has_flag: found_debt } ]
        text: >
          The ledger is open where you left it. The disputed entry is on
          the open page — Gant's consignment, Hale's tally, the red mark
          meaning the complaint was noted and set aside.
    text: >
      The door of Hale's counting house stands unlatched — not usual at
      this hour. Inside, a tallow candle burned down to a stub on the
      desk, still faintly warm. The account ledger is open on the stand.
    choices:
      - id: read_ledger
        text: "Read the open ledger."
        conditions: [ { not_flag: found_debt } ]
        effects:
          - set_flag: found_debt
          - add_journal: "The open page covers the last quarter's consignments. One entry is marked in red: Gant, W. — fleece, eighty-four pounds tallow-weight, certified. Beside it in a different hand: disputed, eighty-four marked, seventy-six actual. The guild complaint cross-referenced in the margin. Gant filed and Hale's count stood."
          - inc_var: { name: score, by: 5 }
        next: counting_house
      - id: leave_counting_house
        text: "Return to Wool Lane."
        next: wool_lane

  # ── South Lane (towards the bridge) ──────────────────────────────────────
  - id: south_lane
    title: "South Lane"
    variants:
      - when: [ { has_flag: seen_torn_coat } ]
        text: >
          Gant's window is still lit. He hasn't moved. You can see the
          torn sleeve where he sits at his table, not drinking, just sitting.
    text: >
      Lodging houses south of the exchange. You know from your rounds that
      Gant the drover keeps a room on the ground floor of the corner house
      — the window with the cracked shutter. It is lit at this hour.
    choices:
      - id: check_gants_room
        text: "Look through the gap in Gant's shutter."
        conditions: [ { not_flag: seen_torn_coat } ]
        effects:
          - set_flag: seen_torn_coat
          - add_journal: "Gant is at the table in his coat — the right sleeve torn at the shoulder, a dark stain at the cuff that is not lamp-shadow. His purse lies beside his hand, bulging. He is staring at the wall and not drinking."
          - inc_var: { name: score, by: 5 }
        next: south_lane
      - id: return_from_south
        text: "Return to Wool Lane."
        next: wool_lane

endings:
  - id: ending_named
    title: "The Name Given"
    text: >
      You knock the constable up before the three o'clock bell and lay the
      evidence on his table: the silver pin, the ledger entry with Gant's name
      in red, and what the stallkeeper saw — a big man with a drover's limp,
      going into the alley with Hale and coming out alone. He listens without
      interrupting, reads the pin's hallmark, and pulls on his coat.

      Gant is taken from his lodging before four. Hale wakes the following
      afternoon and identifies the pin as not his. The quarter sessions hear
      the evidence three weeks later.

      You ring the three o'clock bell over an ordinary town and an ordinary
      night. Later you will not be certain this was your job. It was,
      nonetheless, the work of the night.
  - id: ending_confronted
    title: "By Lantern Light"
    text: >
      Gant opens the door at your knock and does not step back when he
      sees the lantern. You hold the pin up where he can see it clearly and
      name what the ledger says: eight pounds short-weighted, complaint filed,
      complaint set aside. You say the date of the entry and the date of tonight
      and wait.

      He stands in the doorway for a long moment. Then he steps back and
      sits down at his table without a word.

      You send for the constable from the foot of the stairs. Whether justice
      follows in full is not something you will know before dawn. But Gant is
      sitting at his table, the pin is in your hand, and you were here, and
      you looked.
  - id: ending_reported
    title: "Word Left"
    variants:
      - when:
          - any_of:
              - { has_flag: read_dispute }
              - { has_flag: found_debt }
        text: >
          You knock the constable up and give him what you have: a man beaten in
          Wool Lane, a quarrel near the Exchange earlier in the evening, and a
          drover named Gant who had cause to carry a grudge. You name what you
          saw and what you did not look for.

          He takes your name and says he will look into it at first light. You do
          not know how thoroughly. You ring the three o'clock bell and the four
          o'clock bell over a quiet town and tell yourself that is what you are
          paid to do.
    text: >
      You knock the constable up and give him what you have: a man beaten in
      Wool Lane, his purse-string cut, no named assailant, and the fact that
      the lane was empty when your lantern found him. You name what you saw
      and what you did not look for.

      He takes your name and says he will look into it at first light. You do
      not know how thoroughly. You ring the three o'clock bell and the four
      o'clock bell over a quiet town and tell yourself that is what you are
      paid to do.
  - id: ending_silent
    title: "The Hour Called"
    text: >
      You mark it in your log: a man found in Wool Lane, breathing, purse cut,
      no witnesses named. You prop his hat against his chest so it doesn't blow
      away in the night wind. You call the half-hour bell from the cross and
      walk on.

      By morning Hale has been moved to the surgeon's house. You hear later in
      the week that Gant the drover left town. No reason given. You keep your
      round.
