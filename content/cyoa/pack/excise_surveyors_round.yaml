# The Surveyor's Round — a CYOA pack (Stage 1 format).
#
# England, autumn 1695. William III's excise board has posted Ezra Noakes,
# riding surveyor, to survey Carrick's Malthouse in Shafton on a tip from
# an informer: Simon Carrick has declared twelve quarters of malt per batch
# and six batches this quarter, but produces considerably more. You arrive
# with a survey warrant and statutory right of entry to every part of the
# licensed premises.
#
# Novel contributions vs existing CYOA corpus:
#   (1) EXCISE OFFICER ROLE — first production-tax enforcement role in CYOA
#       corpus; distinct from tidewaiter (import customs), alnager (cloth
#       measurement law), magistrate's clerk (judicial inquiry), bellman
#       (voluntary civic watch); excise officer has statutory right of entry
#       to all parts of a licensed premises but cannot compel the occupier's
#       cooperation or assistance beyond permitting access.
#   (2) GRADUATED AUTHORITY / SCOPE CHOICE — first CYOA where the player
#       must decide how far to push lawful authority against physical
#       resistance; Carrick blocks the yard gate and is wrong about his right
#       to do so; the player may invoke the warrant (gaining yard evidence)
#       or withdraw (keeping to the quantitative civil case); withdrawal is
#       not loss — file_measurement_report is a valid professional outcome.
#   (3) MEASUREMENT CONVERGENCE — three independent physical measurements
#       (grain volume in steep, fermenting tun capacity, wort gravity) each
#       imply higher production than declared; together they establish the
#       civil assessment by independent quantitative means rather than by
#       documentary cross-reference or testimonial chain; first CYOA where
#       the primary evidence is numerical measurement.
#   (4) CIVIL ASSESSMENT vs CRIMINAL CONCEALMENT — file_measurement_report
#       (all three measurements + declarations: civil duty-arrears case) and
#       file_concealment_report (+ yard evidence: criminal evasion case); same
#       investigative object, different legal theories and different outcomes
#       for the defendant; both terminals award +20 and reach max score 50.
#
# Score economy (awards one-shot, all guarded):
#   +5  check_declarations — declaration book examined (+not_flag checked_declarations)
#   +5  survey_grain       — grain in steep measured (+not_flag measured_grain)
#   +5  measure_tun        — tun dimensions measured (+not_flag measured_tun)
#   +5  test_wort          — wort gravity tested (+not_flag tested_gravity)
#   +5  count_tubs         — unlicensed tubs counted (+not_flag found_vessels)
#   +5  find_tally         — tally marks read (+not_flag found_tally)
#   +20 file_concealment_report — criminal evasion case (gate: measured_tun +
#                             tested_gravity + measured_grain + checked_declarations
#                             + found_vessels + found_tally; steadiness DC 11
#                             tension beat — both branches +20 →
#                             ending_concealment, convergent)
#   OR
#   +20 file_measurement_report — civil assessment (gate: measured_tun +
#                             tested_gravity + measured_grain + checked_declarations)
#   +10 accept_declared_figures — Carrick's declared figures taken without
#                             independent measurement (gate: checked_declarations
#                             + no contrary survey evidence)
#    +0 leave_without_filing
# Best path: all six clues (+30) + either +20 terminal = 50.

meta:
  id: excise_surveyors_round_v1
  title: "The Surveyor's Round"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Maltsters' Ward"
    quest: "prove the hidden excise fraud"
    role: "excise surveyor"
    connection: "Charterhaven's revenue office sends surveyors into the malt houses that feed the hub city taverns."
  start: maltsters_office
  flags_init: []
  # `steadiness` (init 3) — stat for the file_concealment_report TENSION beat
  # (d20 + steadiness vs DC 11). Both branches award +20 and route to
  # ending_concealment — stateKey-convergent. Roll 8 + 3 = 11 beats DC 11.
  vars_init: { steadiness: 3 }
  max_score: 50

scenes:
  # ── The Maltster's Office (hub / start) ──────────────────────────────────
  - id: maltsters_office
    title: "The Maltster's Office"
    variants:
      - when:
          - all_of:
              - { has_flag: measured_tun }
              - { has_flag: tested_gravity }
              - { has_flag: measured_grain }
              - { has_flag: checked_declarations }
              - { has_flag: found_vessels }
              - { has_flag: found_tally }
        text: >
          You have more than the civil case. The declaration book, three
          independent measurements, three unlicensed tubs behind the hay,
          and XIIII scored into a beam: each item alone could be argued
          away; together they cannot. Carrick is in the doorway. He does
          not speak. Filing the concealment report now means keeping a
          steady hand while he watches you write it.
      - when:
          - all_of:
              - { has_flag: measured_tun }
              - { has_flag: tested_gravity }
              - { has_flag: measured_grain }
              - { has_flag: checked_declarations }
        text: >
          The quantitative case is built. The cistern rod, the tun
          dimensions, the saccharometer — three independent readings, each
          inconsistent with twelve quarters per batch. You could file that
          assessment today and it would stand. Whether to go further into
          the yard is your choice.
      - when:
          - all_of:
              - { has_flag: checked_declarations }
              - any_of:
                  - { has_flag: measured_tun }
                  - { has_flag: tested_gravity }
                  - { has_flag: measured_grain }
                  - { has_flag: found_vessels }
                  - { has_flag: found_tally }
        text: >
          Carrick's declaration is no longer merely untested ink in his own
          hand. Your notes have begun to check it against the premises
          themselves, and the early figures already make a clean acceptance
          impossible. Complete the measurements for a civil assessment, or
          decide whether the warrant should be pressed into the yard.
      - when:
          - any_of:
              - { has_flag: measured_tun }
              - { has_flag: tested_gravity }
              - { has_flag: measured_grain }
              - { has_flag: found_vessels }
              - { has_flag: found_tally }
        text: >
          The survey is no longer only a warrant and a quiet office. Your
          notebook holds physical facts from Carrick's premises, but the
          declaration book still needs to be set beside them before a proper
          assessment can be filed.
      - when: [ { has_flag: checked_declarations } ]
        text: >
          Carrick has declared twelve quarters per batch, six batches this
          quarter, and paid duty on that figure. His numbers sit on the
          page in his own hand. You have yet to measure whether they are
          honest.
    text: >
      Carrick's counting room is at the rear of the malthouse: a low desk,
      a row of ledgers, and a fire banked low against the autumn cold. Simon
      Carrick is a heavy man in his fifties who received your survey warrant
      without expression and said nothing beyond what courtesy required.
      He has left you here with his declaration book and returned to the
      floor. You have the right to examine any part of these premises.
    choices:
      - id: check_declarations
        text: "Examine the excise declaration book."
        conditions: [ { not_flag: checked_declarations } ]
        effects:
          - set_flag: checked_declarations
          - set_quest_stage: { quest: the_survey, stage: declarations_checked }
          - add_journal: "Carrick's declaration for the quarter: six batches of twelve quarters each, total seventy-two quarters. Duty declared and paid on that figure. His equipment — two tuns, a steeping cistern, a kiln — is licensed for up to eighteen quarters per batch. A maltster running at two-thirds of rated capacity in exact half-dozens is either unusually tidy or unusually cautious about what the books show."
          - inc_var: { name: score, by: 5 }
        next: maltsters_office
      - id: go_to_malting_floor
        text: "Go to the malting floor to examine the steeping cistern."
        conditions: [ { not_flag: measured_grain } ]
        next: malting_floor
      - id: go_to_cellar
        text: "Go to the cellar to examine the fermenting tuns."
        conditions:
          - any_of:
              - { not_flag: measured_tun }
              - { not_flag: tested_gravity }
        next: brew_cellar
      - id: go_to_yard_gate
        text: "Go to the yard and outbuildings at the rear of the premises."
        conditions: [ { not_flag: entered_yard } ]
        next: yard_gate
      - id: go_to_yard_outbuildings
        text: "Return to the yard outbuildings."
        conditions:
          - all_of:
              - { has_flag: entered_yard }
              - any_of:
                  - { not_flag: found_vessels }
                  - { not_flag: found_tally }
        next: yard_outbuildings
      - id: file_concealment_report
        text: "Steady yourself and write the deliberate-concealment report for the Commissioners."
        conditions:
          - all_of:
              - { has_flag: measured_tun }
              - { has_flag: tested_gravity }
              - { has_flag: measured_grain }
              - { has_flag: checked_declarations }
              - { has_flag: found_vessels }
              - { has_flag: found_tally }
        # Tension beat: steadiness (init 3) vs DC 11. Both branches award
        # +20 and route to ending_concealment — stateKey-convergent.
        skill_check:
          skill: steadiness
          difficulty: 11
          on_success:
            - add_journal: "You write the finding without hesitation. Three measurements, three unlicensed tubs, fourteen batches scratched in Roman figures on a beam. The Commissioners will decide whether this is criminal concealment or an accounting error they happen to believe. Your report gives them no room to call it the latter."
            - set_quest_stage: { quest: the_survey, stage: concealment_report_filed }
            - inc_var: { name: score, by: 20 }
            - goto: ending_concealment
            - end_game: ending_concealment
          on_failure:
            - add_journal: "Your first line is not entirely smooth — Carrick is a substantial man in this town and the Commissioners are in London, and a riding surveyor's word against a maltster's is not always the heavier side of the scale. But the figures do not lie, and a surveyor's job is to write what the figures say."
            - set_quest_stage: { quest: the_survey, stage: concealment_report_filed }
            - inc_var: { name: score, by: 20 }
            - goto: ending_concealment
            - end_game: ending_concealment
      - id: file_measurement_report
        text: "Write a civil assessment: actual production exceeds declared, duty arrears calculation follows."
        conditions:
          - all_of:
              - { has_flag: measured_tun }
              - { has_flag: tested_gravity }
              - { has_flag: measured_grain }
              - { has_flag: checked_declarations }
        effects:
          - set_quest_stage: { quest: the_survey, stage: measurement_report_filed }
          - inc_var: { name: score, by: 20 }
        next: ending_measured
      - id: accept_declared_figures
        text: "Accept Carrick's declared figures and close the survey without independent measurement."
        conditions:
          - all_of:
              - { has_flag: checked_declarations }
              - none_of:
                  - { has_flag: measured_tun }
                  - { has_flag: tested_gravity }
                  - { has_flag: measured_grain }
                  - { has_flag: found_vessels }
                  - { has_flag: found_tally }
        effects:
          - set_quest_stage: { quest: the_survey, stage: closed_on_declarations }
          - inc_var: { name: score, by: 10 }
        next: ending_accepted
      - id: leave_without_filing
        text: "Leave Carrick's malthouse without making an assessment."
        effects:
          - set_quest_stage: { quest: the_survey, stage: warrant_unexercised }
        next: ending_departed

  # ── The Malting Floor ────────────────────────────────────────────────────
  - id: malting_floor
    title: "The Malting Floor"
    variants:
      - when: [ { has_flag: measured_grain } ]
        text: >
          The steeping cistern holds what it holds. Your rod measure gave
          you eighteen quarters at minimum — fifty percent above what
          Carrick declared.
    text: >
      The malting floor is a long stone room with a shallow steeping
      cistern at the near end and a germination floor of spread grain
      beyond it. The air is thick with the damp-grain smell of an active
      batch. Carrick's foreman gives you a look from the far end of the
      room but does not approach.
    choices:
      - id: survey_grain
        text: "Measure the grain in the steeping cistern with your rod."
        conditions: [ { not_flag: measured_grain } ]
        effects:
          - set_flag: measured_grain
          - set_quest_stage: { quest: the_survey, stage: measurements_underway }
          - add_journal: "The rod reads eighteen quarters in the cistern by volume — a full working batch for equipment of this size. Carrick's declaration says twelve quarters per batch. Either he is making a generous cistern run and under-declaring by a third, or the declaration is simply wrong. The foreman watches you rod the cistern and does not offer a number of his own."
          - inc_var: { name: score, by: 5 }
        next: malting_floor
      - id: leave_malting
        text: "Return to the maltster's office."
        next: maltsters_office

  # ── The Brew Cellar ──────────────────────────────────────────────────────
  - id: brew_cellar
    title: "The Brew Cellar"
    variants:
      - when:
          - all_of:
              - { has_flag: measured_tun }
              - { has_flag: tested_gravity }
        text: >
          You have the tun dimensions and the gravity reading. Between them
          they put Carrick's actual wash volume and working strength well
          above his declared twelve quarters per batch.
      - when: [ { has_flag: measured_tun } ]
        text: >
          The tun measurements are in your notebook. The gravity of the
          wort still wants testing.
      - when: [ { has_flag: tested_gravity } ]
        text: >
          The gravity reading is in your notebook. The tuns themselves still
          want measuring before the cellar can be made part of the assessment.
    text: >
      The cellar is low-ceilinged and smells of fresh wort. Two fermenting
      tuns stand against the far wall, both in active use — foam on the
      surface of each. A measuring dip-rod hangs on a hook by the stair.
    choices:
      - id: measure_tun
        text: "Measure the dimensions of the fermenting tuns."
        conditions: [ { not_flag: measured_tun } ]
        effects:
          - set_flag: measured_tun
          - set_quest_stage: { quest: the_survey, stage: measurements_underway }
          - add_journal: "Each tun measures forty-eight inches across and thirty-two inches deep: a working volume of approximately four hundred gallons per tun, enough to ferment sixteen quarters of malt per run. Two tuns in active use at that capacity hold thirty-two quarters together — against Carrick's declared twelve. The tuns are not fully loaded, but they are working."
          - inc_var: { name: score, by: 5 }
        next: brew_cellar
      - id: test_wort
        text: "Take a sample of wort from the tun and test it with the saccharometer."
        conditions: [ { not_flag: tested_gravity } ]
        effects:
          - set_flag: tested_gravity
          - set_quest_stage: { quest: the_survey, stage: measurements_underway }
          - add_journal: "The saccharometer reads 1.068 at the sample temperature — a full-working-strength wort, consistent with eighteen to twenty quarters of grain per batch. Weak or short-measure malt yields under 1.050. Carrick is not skimping on the grain; he is running honest batches and declaring dishonest quantities."
          - inc_var: { name: score, by: 5 }
        next: brew_cellar
      - id: leave_cellar
        text: "Return to the maltster's office."
        next: maltsters_office

  # ── The Yard Gate (confrontation) ────────────────────────────────────────
  - id: yard_gate
    title: "The Yard Gate"
    text: >
      The gate in the rear wall leads to a yard of outbuildings — a kiln
      shed, a hay store, and a second cellar cut into the slope. Carrick
      steps out of the counting room before you reach the latch. He does
      not raise his voice; he simply stands between you and the gate and
      says the outbuildings are private, family premises, not covered by
      a malthouse survey warrant. He is wrong about that. You know he is
      wrong about that. So does he.
    choices:
      - id: invoke_right
        text: "State the warrant's scope — it covers all appurtenant buildings — and proceed through the gate."
        conditions: [ { not_flag: entered_yard } ]
        effects:
          - set_flag: entered_yard
          - set_quest_stage: { quest: the_survey, stage: yard_entered }
          - add_journal: "You read him the relevant clause. He does not move immediately. You step to the latch. He steps aside — not quickly, and not all the way — and you are through. Whatever is in the yard, Carrick did not want you to see it."
        next: yard_outbuildings
      - id: withdraw_from_yard
        text: "Withdraw — three measurements are enough for a civil assessment."
        effects:
          - set_quest_stage: { quest: the_survey, stage: civil_scope_chosen }
        next: maltsters_office

  # ── The Yard Outbuildings ────────────────────────────────────────────────
  - id: yard_outbuildings
    title: "The Yard Outbuildings"
    variants:
      - when:
          - all_of:
              - { has_flag: found_vessels }
              - { has_flag: found_tally }
        text: >
          The three unlicensed tubs and the tally beam are in your
          notebook. Fourteen batches at eighteen-plus quarters each: the
          full scale of Carrick's production is no longer a matter of
          inference.
      - when: [ { has_flag: found_vessels } ]
        text: >
          Three unlicensed fermenting tubs behind the hay, dry at present.
          The beam above them has not yet been checked.
      - when: [ { has_flag: found_tally } ]
        text: >
          XIIII is cut into the beam above the hidden tubs: fourteen batches,
          against six declared. The tubs beneath still need measuring before
          their capacity can be put into the record.
    text: >
      The first outbuilding is a hay store. Behind the front stack, arranged
      against the back wall, are three large fermenting tubs — the same
      width as the cellar tuns but shorter. They are dry at present. No
      excise licence plates are mounted anywhere on the boards.
    choices:
      - id: count_tubs
        text: "Count and measure the unlicensed fermenting tubs."
        conditions: [ { not_flag: found_vessels } ]
        effects:
          - set_flag: found_vessels
          - set_quest_stage: { quest: the_survey, stage: concealment_evidence_found }
          - add_journal: "Three tubs, each approximately thirty inches across and twenty-four inches deep: working volume around one hundred and fifty gallons each, sufficient to ferment six quarters per tub. None are licensed; none appear in any declaration. The stave joints are still stained at the working level — they have been used recently."
          - inc_var: { name: score, by: 5 }
        next: yard_outbuildings
      - id: find_tally
        text: "Examine the roof beam above the tubs."
        conditions: [ { not_flag: found_tally } ]
        effects:
          - set_flag: found_tally
          - set_quest_stage: { quest: the_survey, stage: concealment_case_built }
          - add_journal: "Cut into the underside of the main beam with the close grain of a blade: Roman figures. You count them twice. XIIII — fourteen batches. Carrick declared six. The difference is eight batches of eighteen-or-more quarters: at least one hundred and forty-four quarters undeclared, at a shilling the quarter. The marks are not recent. They go back at least a season."
          - inc_var: { name: score, by: 5 }
        next: yard_outbuildings
      - id: leave_yard
        text: "Return to the maltster's office."
        next: maltsters_office

endings:
  - id: ending_concealment
    title: "The Concealment Case"
    text: >
      Your report to the Excise Commissioners runs to six pages: the
      declaration book, the rod measure at eighteen quarters, the tun
      dimensions, the saccharometer at 1.068, the three unlicensed tubs
      in the hay store, and XIIII cut into the beam above them. You set
      the figures side by side — declared seventy-two quarters, actual
      production not less than two hundred and fifty by conservative
      estimate — and let the arithmetic make the argument.

      A duty-arrears case settles with a payment and a penalty. A
      concealment case goes before a jury of excise commissioners with
      power to fine, confiscate, and commit. You do not decide which this
      becomes; you write what you found, and the Commissioners decide.
      Carrick's expression, as you sealed the report in his counting room
      and showed yourself out, told you he knew the difference between
      the two.

  - id: ending_measured
    title: "The Assessment"
    text: >
      Your assessment rests on three independent measurements: the rod at
      eighteen quarters in the cistern, the tuns at thirty-two quarters
      working capacity, the saccharometer at 1.068 — all inconsistent
      with a declared twelve quarters per batch. The duty-arrears
      calculation is straightforward arithmetic, and the arithmetic does
      not require the outbuildings to make it.

      Whether Carrick under-declared by design or by a convenient
      rounding habit, your report does not say. You are a surveyor, not a
      magistrate. The figures say what they say, and the Commissioners
      will ask Carrick to say what he has to say in reply. That is the
      proper sequence of things.

  - id: ending_accepted
    title: "Declared and Closed"
    text: >
      You have read the declaration book. Carrick's figures are on the
      page in his own hand and he has signed them. A riding surveyor
      conducting a tip-based visit has some discretion in how thorough a
      survey he chooses to make. You have read the book, found no
      arithmetic error, and closed the survey.

      Whether the measurements would have told a different story is a
      question you have not asked. In six weeks the informer's tip will
      go to another surveyor on the quarterly circuit, and that surveyor
      will be starting from the beginning. The information does not
      expire. The quarter does.

  - id: ending_departed
    title: "Warrant Unexercised"
    text: >
      You fold the survey warrant and leave Carrick's premises without
      making an assessment. There is no formal reason you can give the
      board that would satisfy them; the warrant was valid, the premises
      open to inspection, and the tip credible on its face. You write in
      the circuit log that the survey was inconclusive and hope the
      quarterly superintendent does not press for detail.

      Whatever Carrick produces next quarter, he will produce it without
      your figures in the record. The informer, wherever they are, will
      not know why they heard nothing.
