# The Alnager's Fault — a CYOA pack (Stage 1 format).
#
# The October quarterly alnage has begun in the cloth hall at Fordham.
# You are the deputy alnager — charged with measuring cloth, certifying
# quality, and sealing each bolt that passes. Henry Bassett, cloth merchant,
# steps to the head of the queue with a bolt of grey kersey already bearing
# an alnage seal from the session a fortnight past. Your apprentice Ned
# has hold of the corner of the bolt and is not letting go.
#
# The physical evidence says Bassett committed fraud.
# The written record says the system failed him first.
# Both readings are supported by evidence. Which one you pursue is
# the shape of your judgement — not your honesty.
#
# Novel contributions vs existing CYOA corpus:
#   (1) ALNAGE OFFICE — first player role as cloth-inspection official;
#       distinct from the tidewaiter (commercial cargo), bellman (no
#       authority), and constable (criminal law). The alnager's role is
#       technical trade enforcement grounded in measurement law.
#   (2) AMBIGUOUS WRONGDOER — physical evidence (short measure +
#       seal anomaly) implicates the draper directly; documentary +
#       testimonial evidence implicates prior alnager negligence; both
#       readings are fully supported by the available clues. Player
#       chooses which story to pursue.
#   (3) EVIDENCE-BRANCHING CONVERGENT WINS — condemn_bassett (physical
#       gate) and refer_to_guild (documentary + testimonial gate) both
#       award +20 and reach max score 50; neither is the "right" answer,
#       only the answer the evidence you gathered supports.
#   (4) HISTORICAL TRADE FICTION — alnage (Old French 'aunaige', from
#       'aune', the ell) was a real English trade office; cloth measurement
#       by the brass ell-rod and certification by lead seal are historically
#       accurate 1690s practice. First CYOA pack set inside a trade hall.
#
# Score economy (awards one-shot, all guarded):
#   +5  inspect_cloth    — short breadth found by eye (not_flag found_short)
#   +5  measure_with_rod — brass rod confirms deficiency (not_flag confirmed_measure)
#   +5  examine_seal     — wax anomaly noted (not_flag found_seal_anomaly)
#   +5  consult_register — prior session record has no measurement (not_flag checked_register)
#   +5  question_ned     — substitute alnager used at prior session (not_flag heard_ned)
#   +5  check_comparison — adjacent bolt's wax confirms Bassett's seal is newer (not_flag confirmed_wax)
#   +20 condemn_bassett  — formal condemnation (gate: found_short + confirmed_measure
#                          + found_seal_anomaly; composure DC 11 tension beat)
#   OR
#   +20 refer_to_guild   — referral as systemic fault (gate: checked_register
#                          + heard_ned + found_seal_anomaly)
# Best path: all six clues (+30) + either terminal (+20) = 50.
# Physical path: inspect_cloth + measure_with_rod + examine_seal → condemn (+20) +
#   remaining clues = same ceiling 50.
# Systemic path: examine_seal + consult_register + question_ned → refer (+20) +
#   remaining clues = same ceiling 50.

meta:
  id: alnagers_fault_v1
  title: "The Alnager's Fault"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Fordham Cloth Hall"
    quest: "settle the disputed alnage seal"
    role: "deputy alnager"
    connection: "Charterhaven Guildhall sends its cloth officers through Fordham to keep the Marches trade seal honest."
  start: alnage_hall
  flags_init: []
  # `composure` (init 3) — stat for the condemn_bassett TENSION beat
  # (d20 + composure vs DC 11). Both branches award +20 and route to
  # ending_condemned — stateKey-convergent. Roll 8 + 3 = 11 beats it.
  vars_init: { composure: 3 }
  max_score: 50

scenes:
  # ── The Cloth Hall (hub / start) ─────────────────────────────────────────
  - id: alnage_hall
    title: "The Cloth Hall"
    on_enter:
      - set_quest_stage: { quest: the_alnage, stage: dispute_begun }
    # Higher-specificity variant first — three-evidence state before one-evidence.
    variants:
      - when:
          - all_of:
              - { has_flag: found_short }
              - { has_flag: confirmed_measure }
              - { has_flag: found_seal_anomaly }
        text: >
          The bolt of kersey lies on your table — short by nearly two inches,
          bearing a seal whose wax is a shade too pale for its supposed age.
          You have measured it twice. There is no innocent reading of what
          the cloth says about itself, only the question of who put it
          in front of you.
      - when:
          - all_of:
              - { has_flag: checked_register }
              - { has_flag: heard_ned }
        text: >
          The register is open on the stand. The entry for Bassett's bolt
          last session records no measurement — just the word 'passed' in a
          hand neither you nor Ned recognises. A substitute did the work
          and left no name. This is not Bassett's fault alone, if it is
          his fault at all.
      - when:
          - any_of:
              - { has_flag: found_short }
              - { has_flag: found_seal_anomaly }
              - { has_flag: checked_register }
              - { has_flag: heard_ned }
        text: >
          Bassett stands to the side of your table, hat in hand, watching
          the queue behind him. Something is being decided here that is
          about more than one bolt of cloth, and the hall is quiet enough
          that everyone in it knows it.
    text: >
      The cloth hall smells of damp lanolin and tallow smoke. Your measuring
      table stands at the far end beneath the charter board, the brass ell-rod
      laid across it beside the seal-box and the register. A queue of clothiers
      stretches back to the door, each with a bolt on his shoulder or a cart
      outside.
      Henry Bassett, merchant of this town, has stepped to the head of the
      queue with a bolt of grey kersey — already sealed, he says, at the
      session a fortnight past. Your apprentice Ned has hold of the corner
      of the bolt and is not letting go.
    choices:
      - id: inspect_cloth
        text: "Take the bolt and examine the cloth."
        conditions: [ { not_flag: found_short } ]
        effects:
          - set_flag: found_short
          - add_journal: "The kersey is good weight, well-woven — but the breadth falls short. Not dramatically, not enough to show at a glance, but when you lay the cloth against the table's marked edge the deficit is clear: nearly two inches under the lawful thirty inches. A cloth stamped and sold at standard breadth would measure short in the buyer's hands."
          - inc_var: { name: score, by: 5 }
        next: alnage_hall
      - id: measure_with_rod
        text: "Apply the brass ell-rod and read the breadth."
        conditions:
          - all_of:
              - { has_flag: found_short }
              - { not_flag: confirmed_measure }
        effects:
          - set_flag: confirmed_measure
          - add_journal: "Brass does not lie. The rod says twenty-eight and a half inches — one and a half short of the lawful thirty. This is not variation in the weave or wear at the edge. The cloth was woven this narrow from the beginning."
          - inc_var: { name: score, by: 5 }
        next: alnage_hall
      - id: examine_seal
        text: "Look closely at the alnage seal on the bolt."
        conditions: [ { not_flag: found_seal_anomaly } ]
        effects:
          - set_flag: found_seal_anomaly
          - add_journal: "The stamp impression is correct — the crown-and-rod device, sharp and clean. But the wax is paler than it should be after a fortnight's handling: cream rather than the dark red of aged seal-wax. Either this seal was set very recently, or it was pressed in a different wax batch than the rest of that session's stamps."
          - inc_var: { name: score, by: 5 }
        next: alnage_hall
      - id: go_to_records
        text: "Consult the register in the side room."
        next: hall_records
      - id: go_to_anteroom
        text: "Speak with Ned in the anteroom."
        next: anteroom
      - id: go_to_drapers_row
        text: "Step outside to where the other clothiers are waiting."
        next: drapers_row
      - id: condemn_bassett
        text: "Formally condemn the cloth and record the condemnation."
        conditions:
          - all_of:
              - { has_flag: found_short }
              - { has_flag: confirmed_measure }
              - { has_flag: found_seal_anomaly }
        # Tension beat: composure (init 3) vs DC 11. Both branches award
        # +20 and route to ending_condemned via goto + end_game —
        # stateKey-convergent. Only the add_journal narration differs.
        skill_check:
          skill: composure
          difficulty: 11
          on_success:
            - add_journal: "Your hand is steady as you write the condemnation in the register. Bassett says nothing. The queue watches for a moment and then looks elsewhere."
            - inc_var: { name: score, by: 20 }
            - goto: ending_condemned
            - end_game: ending_condemned
          on_failure:
            - add_journal: "Your voice catches once on the formal words — the hall is watching and you know what this will cost him. But the rod's reading is entered in your hand, and you write the condemnation down anyway."
            - inc_var: { name: score, by: 20 }
            - goto: ending_condemned
            - end_game: ending_condemned
      - id: refer_to_guild
        text: "Refer the matter to the Clothiers' Guild court as a prior alnage fault."
        conditions:
          - all_of:
              - { has_flag: checked_register }
              - { has_flag: heard_ned }
              - { has_flag: found_seal_anomaly }
        effects:
          - inc_var: { name: score, by: 20 }
        next: ending_referred
      - id: accept_consideration
        text: "Accept Bassett's quietly offered coin and pass the cloth."
        effects:
          - inc_var: { name: score, by: 5 }
        next: ending_corrupted
      - id: dismiss_complaint
        text: "Pass the cloth and return the seal. The queue is waiting."
        next: ending_dismissed

  # ── The Records Room ─────────────────────────────────────────────────────
  - id: hall_records
    title: "The Records Room"
    variants:
      - when: [ { has_flag: checked_register } ]
        text: >
          The register lies open to the fortnight-past session. The entry
          for Bassett's kersey sits on the page — no measurement, no
          alnager's initial beside the word 'passed'.
    text: >
      A side room off the main hall, barely large enough to turn around in.
      The register-chest sits under a shuttered window. The current session's
      book lies open on top; the bound record for the session a fortnight
      past is underneath it.
    choices:
      - id: consult_register
        text: "Open the register for the session a fortnight past."
        conditions: [ { not_flag: checked_register } ]
        effects:
          - set_flag: checked_register
          - add_journal: "Bassett's bolt appears in the register: grey kersey, Henry Bassett clothier, entered on the twelfth. The word 'passed' is there in full. But where a measurement should be recorded — breadth in inches, length in ells — there is nothing. Only the word. And the hand is not your predecessor's mark, but someone else's, without an initial or a name beside it."
          - inc_var: { name: score, by: 5 }
        next: hall_records
      - id: leave_records
        text: "Return to the cloth hall."
        next: alnage_hall

  # ── The Anteroom ─────────────────────────────────────────────────────────
  - id: anteroom
    title: "The Anteroom"
    variants:
      - when: [ { has_flag: heard_ned } ]
        text: >
          Ned is still in the anteroom with the seal-box. He has told you
          what he knows, which is not enough to settle anything on its own.
    text: >
      Ned, your apprentice of three years, waits in the anteroom with the
      seal-box and the blank certificates. He is seventeen and knows his
      work. He examined Bassett's seal before he called it out, which is
      why this session has stopped moving.
    choices:
      - id: question_ned
        text: "Ask Ned what he knows of the session a fortnight past."
        conditions: [ { not_flag: heard_ned } ]
        effects:
          - set_flag: heard_ned
          - add_journal: "He wasn't here. He had a fever that week — you sent him home yourself. A mill-yard boy covered the session in his place. Ned knows the boy only by sight: tall, from the Colton mill, name unknown to him. The boy worked one session and was not retained. Ned says there was no complaint reported, but he would not expect a complaint to be reported if the trouble was of a certain kind."
          - inc_var: { name: score, by: 5 }
        next: anteroom
      - id: leave_anteroom
        text: "Return to the cloth hall."
        next: alnage_hall

  # ── Drapers' Row (the yard outside) ──────────────────────────────────────
  - id: drapers_row
    title: "Drapers' Row"
    variants:
      - when: [ { has_flag: confirmed_wax } ]
        text: >
          Robert Tanner's red bolt is still in the queue, its seal dark and
          aged. Bassett's cloth does not come from the same session as that seal.
    text: >
      The cobbled yard outside the hall holds the clothiers' queue: bolts
      propped against the wall, owners standing by. Several bear alnage seals
      from previous sessions — re-presentments for second inspection or
      re-stamping after repair.
    choices:
      - id: check_comparison
        text: "Compare the wax on Bassett's seal with another recent seal."
        conditions: [ { not_flag: confirmed_wax } ]
        effects:
          - set_flag: confirmed_wax
          - add_journal: "Robert Tanner's bolt of red kersey — you know his mark — bears an alnage seal dated the twelfth, the same fortnight-past session as Bassett's. The wax is dark red, almost brown at the edges: two weeks of air and handling. Bassett's seal is cream-pale. Either it was pressed much later than the twelfth, or it was set from a different wax batch — one not in the hall's standing stock."
          - inc_var: { name: score, by: 5 }
        next: drapers_row
      - id: leave_yard
        text: "Return to the cloth hall."
        next: alnage_hall

endings:
  - id: ending_condemned
    title: "The Measurement Stands"
    text: >
      You write the condemnation in the session register in your own hand:
      breadth deficient, seal anomalous, cloth forfeited to the Crown.
      Bassett does not argue. He stands at the edge of the table while you
      seal the bolt with the forfeiture mark and hand it to the hall-keeper.
      The queue moves forward.

      He will be fined at the next guild court — perhaps heavily. He will say
      the seal was genuine, that the session a fortnight past passed his cloth
      fairly, and no one will be able to prove otherwise. What you can say is
      that the cloth is short and the seal is wrong. The measurement stands.
      That is what the law gives you to work with, and you have worked with
      it honestly.
  - id: ending_referred
    title: "The Prior Session's Account"
    text: >
      You write a referral notice in the session register and attach it to
      Bassett's entry from the fortnight past: cloth under-breadth, seal
      undated by measurement, prior session record incomplete, matter referred
      to the Clothiers' Guild court for determination of fault. You return the
      bolt to Bassett with a notice that it may not be sold pending the court's
      finding.

      He reads it twice and does not thank you. He may be guilty. He may be a
      man who presented his cloth in good faith to a substitute he did not know
      was unprepared for the work and paid the price of it. The Guild court will
      determine which. What you have done is refuse to condemn a man for a fault
      that may be the system's, and refuse to decide without the evidence the
      prior session should have left you. The queue moves forward.
  - id: ending_corrupted
    title: "A Consideration Accepted"
    text: >
      The coin is small — not enough to notice in a week's reckoning — and
      Bassett's hand is quick. You pass the cloth. The stamp goes down on a
      bolt that is short by two inches and sealed with wax that is not what
      it claims to be.

      The queue moves forward. The cloth will sell at standard price and
      measure short in the buyer's hands. Someone down the chain will know
      they were cheated, and they will not know by whom. You will ring no
      bell over this. But you know what the rod said.
  - id: ending_dismissed
    title: "The Queue Moving"
    text: >
      You return the seal and tell Ned the complaint is noted for the ordinary
      review. Bassett walks out with his cloth. The session proceeds.

      By the end of the day you have stamped forty-seven bolts. Three had
      minor defects noted and passed over. Bassett's is one of them. The
      register will show nothing unusual. The measurement you did not enter
      will not trouble the record.
