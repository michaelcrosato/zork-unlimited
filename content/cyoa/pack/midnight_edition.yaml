# The Midnight Edition — a CYOA pack (Stage 1 format). The project's 17TH pack and 7TH
# CYOA — shipped as a deliberately BOT-COMPLETABLE curated pack, the move the standing
# CRITICAL WATCH calls for: the curated benchmark floor had thinned to 0.357 (vs the 0.35
# CURATED_FLOOR in benchmark_headline_no_regression), so the next bot-UNSOLVABLE puzzle
# pack would have breached it. A CYOA the planning-free coverage bot can finish (its six
# CYOA siblings average ~0.68 on the coverage strategy) raises the curated mean and WIDENS
# the curated→held-out split gap instead of eroding it — breadth that strengthens, not
# strains, the headline guard. (Setting is wholly new: a Victorian small-town newspaper
# at the lock-up, no overlap with the lighthouse/manor/watchtower/hunt/sea-navigation/
# village packs.)
#
# The heart is a DILIGENCE fork, not a lock-and-key chain and not (like wreckers_light) a
# pure moral mirror: you are the night sub-editor alone in the composing room as the front
# page locks up at dawn. A source's letter on the stone accuses the town's benefactor — the
# mill-owner Garrow — of causing the weir-sluice drowning that killed three of his own men
# and then buying the inquest. The decisive act is the same verb on every route (send the
# page to press, or pull it), but WHAT YOU KNOW WHEN YOU PULL THE LEVER is what the night
# turns on:
#   * verify FIRST — read the letter (→ read_letter), take the spare key from the desk,
#     unlock the editor's safe (→ safe_open), read the suppressed inspector's report
#     inside (→ knows_proof), and bar the alley door against Garrow's wreckers
#     (→ door_barred) — THEN print  → ending_vindicated (the considered win: the
#     truth holds because it is PROVEN, and the press survives long enough to run it)
#   * print on the source's word ALONE, unverified                → ending_libel (a careless
#     ruin: one charge in the letter is wrong, Garrow sues for libel, the paper is broken
#     and an innocent clerk wrongly named — courage without diligence does harm)
#   * pull the story and set the safe column in its place         → ending_spiked (the
#     cowardly/complicit pole: you keep your place and the dead keep theirs, unspoken)
#   * go out to the alley to face Garrow's men at the door        → ending_silenced (the
#     rash pole, plainly telegraphed: they have come with hammers for the press, and for
#     you; you go out anyway and the page never runs)
#
# Why it is genuinely a BENCHMARK pack and not just easy filler: the bot completes (every
# ending is one direct choice from a hub or sub-scene, so completion ≈ 100% like wreckers_
# light / watchtower_road), but the CONSIDERED ending is gated behind a four-step read-and-
# verify chain a greedy, no-planning agent reaches only by covering everything first — the
# spike and libel poles are the trivially-reachable ones, vindicated is the earned one. The
# discrimination is "did the agent do the diligence before the irreversible act", which is
# exactly the reasoning a real model is scored on and the coverage bot has no plan for.
#
# Fair-play discipline (§8.7, bug_0123 "never an ambush"): both bad poles are telegraphed
# before they fire. The letter itself warns one of its charges is unproven and that the
# proof is in Garrow's own suppressed report; the press-floor prose names plainly, when you
# hold only the source's word, that printing now is a gamble on a man's name; and the alley
# scene shows the men and their hammers before the door is opened. Once proof is in hand,
# the press floor also names the remaining physical risk if the door is not barred: the
# story is true, but the men can still break the press before it runs. No route is a
# curiosity trap; each terminal is a turn the PLAYER elects with the cost in front of them.
#
# Structure mirrors wreckers_light's proven, bot-completable skeleton (hub + sub-scenes +
# direct ending links + a read-chain knowledge flag that reframes the climax), reskinned to
# a new setting and a new decision axis (diligence vs courage vs complicity vs rashness).
# Reactive variants keep every scene honest about state it has changed (letter read, safe
# open, proof in hand) — the bug_0232 stale-prose discipline applied from the start.
#
# Quest progression: the same diligence arc is also tracked by ONE core-DSL quest,
# `the_edition` (set_quest_stage / quest_stage, §13), advancing story_in_hand → proof_sought
# → proof_found on the read_letter / open_safe / read_report choices. It is progress-tracking
# ONLY — it gates no choice, next, or ending, and changes no flag — so every ending stays as
# reachable as before. The alley_door scene reads the stage in its variants (that scene has
# no on_enter to clobber it, and is reachable from the hub at any stage), narrating how much
# of the night's work the hammers at the door have come to bury — a non-vacuous read.

meta:
  id: midnight_edition_v1
  title: "The Midnight Edition"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Printers' Ward"
    quest: "decide what truth reaches the street"
    role: "printer's hand"
    connection: "The city's printers carry Charterhaven politics faster than constables can ride, so a midnight sheet can move the world."
  start: composing_room
  flags_init: []
  # A `nerve` skill var (init 3) — the single stat the alley_door TENSION beat below rolls
  # (d20 + nerve vs a fixed difficulty, the shared resolveSkillCheck). It is read ONLY by
  # that one convergent skill check and gates NOTHING else: no choice condition, variant
  # `when`, deadline, or ending consults it, and no effect ever writes it, so it cannot move
  # the score economy or open/close a route. (CYOA skill checks are first-class — same
  # resolver the parser/RPG modes use; mechanic-palette standardization.)
  vars_init: { nerve: 3 }
  # SCORING (§13 Stage 3, CYOA-first-class): the night's diligence is also tracked as a
  # Zork-style score on the conventional `score` var — points for ACCOMPLISHMENT (sourcing,
  # verifying, and printing the proven truth), not moral judgment, which suits this
  # diligence adventure. The runner appends "[Your score has gone up by N points…]"
  # feedback off this ceiling (decorateEvents, shared scoreChangeNarrations chrome); the
  # awards sit on the SAME choices as the existing effects and gate nothing — every choice,
  # next, ending, and the `the_edition` quest stay exactly as reachable as before.
  #
  # SCORE-ECONOMY SOUNDNESS (the exhaustive proof checks this EXACTLY: the max score
  # reachable by any single concrete playthrough must EQUAL max_score). All five awards are
  # collectible TOGETHER on the one best path — the verified-print route — and each is
  # one-shot (it rides a choice whose existing `conditions` already forbid a re-fire, or a
  # choice that ends the game), so no loop can re-farm a point and no other route can exceed
  # the ceiling. The other three endings carry NO awards of their own; the +10 for the
  # verified print is reachable ONLY by the win, so 35 is hit on exactly that path and never
  # surpassed. Best path, traced explicitly (= max_score):
  #   read_letter (+5, story in hand)  → go_office → search_desk (+5, proof sought: key found)
  #   → open_safe (+5, safe open)      → read_report (+10, suppressed proof read, knows_proof)
  #   → leave_office → go_alley → bar_door (door_barred, +0) → go_press
  #   → print_verified (+10, the VERIFIED and secured edition runs — the win)
  #   total 5 + 5 + 5 + 10 + 10 = 35
  max_score: 35

scenes:
  - id: composing_room
    title: "The Composing Room"
    text: >
      Gaslight and the smell of hot metal and oil. The town's one newspaper sleeps around
      you — every page of the morning edition locked up in its forme and waiting, but the
      front page, which is yours to close before the press rolls at dawn. On the imposing
      stone lies a letter that came up the back stairs an hour ago in a workman's hand, and
      it has sat in your chest like a coal ever since. An iron stair climbs north to the
      editor's office, dark and empty at this hour; the press floor drops away below to the
      south; and out past the inking-room a door gives on the alley, where, this last
      half-hour, there have been boots on the cobbles that do not sound like printers going
      home.
    # Reactive prose (most-specific first, first-match-wins): once the proof is in hand the
    # hub must not still call the safe report a thing that "would make it true or break it"
    # (the bug_0232 stale-prose discipline) — that question is settled.
    #
    # door_barred is ORTHOGONAL to the read_letter/knows_proof knowledge axis (you can bar the
    # door before OR after reading the letter / proving the story), so each knowledge level needs
    # a barred-door twin placed BEFORE its open-door form — else, having barred the door and THEN
    # read the letter, the read_letter form below wins and still calls the door one that merely
    # "stands shut on the boots that keep pacing the cobbles," as though you had never been out,
    # seen Garrow's men, and dropped the bar. That stale-on-state-change contradiction (door_barred
    # set but the prose ignores it) is the bug_0232 / bug_0248-0250 class a blind playtest caught
    # here (bug_0268). Pairing order, most-specific first: {knows_proof∧barred} ▸ {knows_proof} ▸
    # {read_letter∧barred} ▸ {read_letter} ▸ {barred alone} ▸ base. door_barred is monotonic
    # (never cleared), so no form ever regresses to an earlier one.
    variants:
      - when: [{ has_flag: knows_proof }, { has_flag: door_barred }]
        text: >
          Gaslight and the smell of hot metal and oil. The morning edition sleeps locked in
          its formes around you, all but the front page that is yours to close before the
          press rolls at dawn. The workman's letter lies open on the imposing stone, and you
          carry now what it only pointed to: the inspector's condemned report, read and
          proven, Garrow's own initials on it. The question is no longer whether it is true —
          it is which page you set. The iron stair climbs north to the rifled office; the
          press floor drops away south to the waiting lever; and out past the inking-room the
          alley door is barred fast on the men you found there — Garrow's, by the hammers they
          carried — who have given up the latch but not the cobbles.
      - when: [{ has_flag: knows_proof }]
        text: >
          Gaslight and the smell of hot metal and oil. The morning edition sleeps locked in
          its formes around you, all but the front page that is yours to close before the
          press rolls at dawn. The workman's letter lies open on the imposing stone, and you
          carry now what it only pointed to: the inspector's condemned report, read and
          proven, Garrow's own initials on it. The question is no longer whether it is true —
          it is which page you set. The iron stair climbs north to the rifled office; the
          press floor drops away south to the waiting lever; and out past the inking-room the
          alley door stands shut on the boots that keep pacing the cobbles beyond it.
      - when: [{ has_flag: read_letter }, { has_flag: door_barred }]
        text: >
          Gaslight and the smell of hot metal and oil. The morning edition sleeps locked in
          its formes around you, all but the front page that is yours to close before the
          press rolls at dawn. The workman's letter lies open on the imposing stone where
          you read it, and it has not got lighter for the reading: somewhere above you, in
          Garrow's own office safe, is the report that would make it true or break it. The
          iron stair climbs north to that office; the press floor drops away south; and out
          past the inking-room the alley door is barred now on the men you found waiting
          there — Garrow's, by the hammers they carried — who have given up the latch but not
          the cobbles.
      - when: [{ has_flag: read_letter }]
        text: >
          Gaslight and the smell of hot metal and oil. The morning edition sleeps locked in
          its formes around you, all but the front page that is yours to close before the
          press rolls at dawn. The workman's letter lies open on the imposing stone where
          you read it, and it has not got lighter for the reading: somewhere above you, in
          Garrow's own office safe, is the report that would make it true or break it. The
          iron stair climbs north to that office; the press floor drops away south; and out
          past the inking-room the alley door stands shut on the boots that keep pacing the
          cobbles beyond it.
      # Barred-but-letter-unread case (the knowledge∧barred twins above win when either flag is
      # also set): once you have been out to the alley, seen Garrow's men, and barred the door,
      # the hub must not still call them merely "boots that do not sound like printers going home"
      # as though their nature were unknown and the door open (the bug_0232 stale-prose discipline,
      # same class as bug_0248/0249/0250). Fires with door_barred and neither knowledge flag set.
      - when: [{ has_flag: door_barred }]
        text: >
          Gaslight and the smell of hot metal and oil. The town's one newspaper sleeps around
          you, the front page still yours to close before the press rolls at dawn, and the
          workman's letter still lies unread on the imposing stone where it came up the back
          stairs an hour ago. The iron stair climbs north to the editor's dark office; the press
          floor drops away south; and out past the inking-room the alley door is barred now on
          the men you found waiting there — hired, by the hammers they carried — who have
          given up the latch but not the cobbles.
    choices:
      - id: read_letter
        text: "Read the letter on the stone."
        conditions: [{ not_flag: read_letter }]
        effects:
          - set_flag: read_letter
          # Score +5: the accusing story is in hand. One-shot — the `not_flag: read_letter`
          # condition above forbids taking this choice twice, so the award can't re-fire.
          - inc_var: { name: score, by: 5 }
          # Quest `the_edition` tracks the diligence arc as progress only (it gates no
          # choice/next/ending and changes no existing flag): the accusing story is now in
          # hand. Stage advances on the open_safe and read_report choices below; read back
          # (never reset) on the alley_door scene's variants, which have no on_enter to
          # clobber it. (Core DSL set_quest_stage / quest_stage, §13.)
          - set_quest_stage: { quest: the_edition, stage: story_in_hand }
          - add_journal: >
              The letter is from a sluice-man at Garrow's mill. He swears the weir-gate that
              drowned three men in the spring was known rotten for a year, that Garrow was
              warned in writing and ran it anyway to save the cost, and that the coroner was
              paid to call it an act of God. But he writes plainly that he cannot prove the
              warning himself — only that the inspector's condemned report exists, and that
              Garrow keeps it locked in the office safe upstairs rather than burn it, the way
              a frightened man keeps the very thing that damns him. The spare key, he says, is
              taped under the lip of the editor's desk drawer.
        next: composing_room
      - id: go_office
        text: "Climb the iron stair to the editor's office."
        next: editors_office
      - id: go_press
        text: "Go down to the press floor and the waiting front page."
        next: press_floor
      - id: go_alley
        text: "Go to the alley door and the boots on the cobbles."
        conditions: [{ not_flag: door_barred }]
        next: alley_door
      # Once the door is barred the "boots on the cobbles" label is stale — the door
      # is barred fast and the player knows it. A separate choice with a state-accurate
      # label is offered instead (same destination; bar choices are gated off at the
      # alley scene, so the player can still confront_men or return via back_inside).
      - id: go_alley_barred
        text: "Return to the barred alley door."
        conditions: [{ has_flag: door_barred }]
        next: alley_door

  - id: editors_office
    title: "The Editor's Office"
    text: >
      The editor's room over the press, all leather and cold pipe-smoke, the great safe
      squatting black in the corner like a thing that knows it is hated. Garrow sits on the
      paper's board and keeps a room here, and keeps that safe, and the desk between you and
      it is a clutter of proofs and bills and a locked shallow drawer.
    variants:
      # Most-specific first (first-match-wins): proof read ⇒ the safe stands open and emptied.
      - when: [{ has_flag: knows_proof }]
        text: >
          The editor's room over the press, leather and cold pipe-smoke. The great safe
          stands open in the corner where you left it, the inspector's report spread on the
          desk under the lamp — condemned, signed, dated a year before the weir took those
          three men, with Garrow's own initials acknowledging it. There is no unreading it
          now. The desk drawer hangs open and empty, the spare key still in its lock.
      - when: [{ has_flag: safe_open }]
        text: >
          The editor's room over the press, leather and cold pipe-smoke. The great safe
          stands open in the corner, its door swung wide on the bundle of papers inside. The
          shallow desk drawer hangs open, the spare key you found taped beneath its lip still
          turned in the safe's lock.
    choices:
      - id: search_desk
        # Gated on read_letter — the letter is what tells you the key is under the drawer
        # lip; without it there is no reason to prise the desk. (Mirrors wreckers_light's
        # met_keeper-gates-search_keeper chain; keeps the proof behind the diligence step.)
        text: "Prise the locked desk drawer and feel under its lip for the key."
        conditions: [{ has_flag: read_letter }, { not_item: safe_key }]
        effects:
          - add_item: safe_key
          # Score +5: the diligence is begun — the proof is sought, the key in hand. One-shot
          # — the `not_item: safe_key` condition above bars retaking it, so it can't re-fire.
          - inc_var: { name: score, by: 5 }
          - add_journal: "A small brass safe-key, taped to the underside of the drawer lip exactly as the letter said. Garrow's own clerk must have hidden it where his master would never stoop to look."
        next: editors_office
      - id: open_safe
        text: "Unlock the great safe with the brass key."
        conditions: [{ has_item: safe_key }, { not_flag: safe_open }]
        effects:
          - set_flag: safe_open
          # Score +5: the safe is open — the suppressed report is within reach. One-shot —
          # the `not_flag: safe_open` condition above bars retaking it, so it can't re-fire.
          - inc_var: { name: score, by: 5 }
          - set_quest_stage: { quest: the_edition, stage: proof_sought }
          - add_journal: "The safe swings open on a bundle of papers tied in pink legal tape — and on top, a government envelope stamped CONDEMNED and INSPECTOR OF WORKS."
        next: editors_office
      - id: read_report
        text: "Read the condemned inspector's report from the safe."
        conditions: [{ has_flag: safe_open }, { not_flag: knows_proof }]
        effects:
          - set_flag: knows_proof
          # Score +10: the heart of the diligence — the suppressed inspector's report is
          # read and the story is PROVEN. One-shot — the `not_flag: knows_proof` condition
          # above bars retaking it, so the award can't re-fire.
          - inc_var: { name: score, by: 10 }
          - set_quest_stage: { quest: the_edition, stage: proof_found }
          - add_journal: >
              The report is everything the sluice-man swore and worse: the weir-gate
              condemned in writing a full year before it failed, the warning served on
              Garrow by name, his own initials in the margin acknowledging receipt — and
              the cost of the repair he refused, noted to the shilling. This is not a
              workman's grievance any more. It is proof, signed and dated by a Crown
              inspector, and no libel suit can touch a word the paper prints if it prints
              THIS beside the story.
        next: editors_office
      - id: leave_office
        text: "Go back down to the composing room."
        next: composing_room

  - id: press_floor
    title: "The Press Floor"
    text: >
      The great flat-bed press fills the floor below, the front-page forme already on it and
      locked but for the lead column, the safe set-matter waiting in the galley alongside —
      a mild notice of the spring's drownings, the coroner's verdict, nothing that would
      cost a sleeping town its benefactor. One column, one pull of the bed-lever, decides
      which of the two the morning carries. The stairs climb back up to the composing room.
    variants:
      # Most-specific first: holding the proof AND barring the door reframes the lever as a
      # sure thing, not a gamble; holding proof without the barred door now names the remaining
      # physical risk from Garrow's men, so the alley threat pays off structurally instead of
      # evaporating once the report is read. Holding only the source's word names plainly that
      # printing now risks a man's name on one unproven charge (the bug_0123 "never an ambush"
      # telegraph in the moment).
      - when: [{ has_flag: knows_proof }, { has_flag: door_barred }]
        text: >
          The flat-bed press fills the floor, the front-page forme locked but for the lead
          column. You carry the inspector's signed report now, and with it the story is not
          an accusation but a proven fact — Garrow cannot sue what a Crown seal already
          condemned. The alley door is barred above you, the men with hammers held out long
          enough for the bed to roll. Set THIS column and pull the lever, and the truth runs
          ten thousand times before he is out of bed, and stands. The safe set-matter — the
          gentle, forgetful notice — waits in the galley beside it for the coward's hand.
          The stairs climb back up to the composing room.
      - when: [{ has_flag: knows_proof }]
        text: >
          The flat-bed press fills the floor, the front-page forme locked but for the lead
          column. You carry the inspector's signed report now, and with it the story is not
          an accusation but a proven fact — Garrow cannot sue what a Crown seal already
          condemned. But the boots above have not been answered; if the alley door is left
          to them, four men with hammers can still stop a true story by breaking the machine
          that must carry it. The stairs climb back up to the composing room, and past it to
          the inking-room door.
      - when: [{ has_flag: read_letter }]
        text: >
          The flat-bed press fills the floor, the front-page forme locked but for the lead
          column. You have the sluice-man's letter and his word — but he wrote himself that
          he cannot prove the warning, and the proof is still in the safe upstairs you have
          not opened. Set this column on his word alone and pull the lever, and you stake the
          paper, and a named man's good name, on a charge you have not seen proved; if one
          line of it is wrong, the wrong falls on the page in your hand. The safe set-matter
          waits in the galley beside it. The stairs climb back up to the composing room.
    choices:
      - id: print_verified
        text: "Set the proven story behind the barred door and pull the bed-lever — run the front page."
        conditions: [{ has_flag: knows_proof }, { has_flag: door_barred }]
        effects:
          # Score +10: the considered win — the VERIFIED edition runs, the truth unbreakable.
          # One-shot — `next` ends the game at ending_vindicated, so the press can't roll
          # twice. This award is reachable ONLY by the win, so the perfect 35 lands exactly
          # here, on the one best path, and no other route can match it.
          - inc_var: { name: score, by: 10 }
        next: ending_vindicated
      - id: print_unverified
        text: "Set the story on the source's word and pull the bed-lever — run it now."
        conditions: [{ not_flag: knows_proof }]
        next: ending_libel
      - id: spike_story
        text: "Pull the story and set the safe notice in its place."
        next: ending_spiked
      - id: secure_alley_first
        text: "Go back through the composing room and bar the alley door first."
        conditions: [{ has_flag: knows_proof }, { not_flag: door_barred }]
        next: alley_door
      - id: leave_press
        text: "Go back up to the composing room."
        next: composing_room

  - id: alley_door
    title: "The Alley Door"
    # Base text fires when no quest stage is set (letter unread) — name Garrow's men only in
    # the quest_stage variants below, which fire only after read_letter sets the stage (bug_0284).
    text: >
      The inking-room door, and beyond its frosted pane the alley — and four shapes in it
      now, close in under the gas-bracket, and the dull gleam of what they carry. Hired men,
      and not a printer's tool among the hammers and the wrecking-bar: they have come for the
      press, to pi the type into the gutter and break the bed before a word of it can run,
      and they will not be gentle with whoever opens to them. One of them tries the latch as
      you watch. The composing room is back behind you.
    # Reactive prose keyed off the `the_edition` quest stage (read-only; gates nothing). The
    # alley scene narrates what the night has already cost you — the further you carried the
    # diligence before the hammers came, the more the men at the door are there to bury. Set
    # only on the read_letter / open_safe / read_report choices; this scene has no on_enter,
    # so the stage cannot be clobbered, and the door is always reachable from the hub at any
    # stage (read the letter, then come to the alley). Latest stage first, first-match-wins.
    #
    # MOST-SPECIFIC of all: once the door is barred (door_barred, set by bar_door or either
    # branch of the steady_and_bar check below), this scene must not re-present the unbarred,
    # latch-being-tried menace byte-for-byte as though nothing had happened — the bug_0250 /
    # bug_0232 stale-on-re-entry class, and the no-progress LOOP a blind playtest hit (you could
    # re-bar the same door forever and the text never changed). With door_barred set, the two
    # bar choices are gated off (you cannot re-bar a barred door) and a plain `back_inside`
    # return appears, so the scene resolves instead of looping; the rash `confront_men` pole
    # stays open (you may still throw the bolt and go out). Placed first ⇒ wins over the
    # quest_stage variants once barred; door_barred is monotonic (never cleared), so no
    # regression. This variant carries no quest-stage flavour by design — the barred door is the
    # salient fact now, at whatever stage you reached it.
    variants:
      # MOST-SPECIFIC barred variant: door_barred AND nerve_check_attempted — fires when the
      # player used the dramatic steady_and_bar skill check (both success and failure set
      # nerve_check_attempted identically, preserving convergence). Placed above the plain
      # door_barred variant so a player who returns to the alley after the skill-check attempt
      # sees prose that acknowledges HOW the bar got home — "thrown into its brackets with the
      # latch already moving" vs. the plain "dropped hard" description below that fires for
      # bar_door. This is the visible persistent trace the playtest found missing (bug_0313 /
      # reactive-description-blindness class: same outcome, different witnessed drama).
      - when: [{ has_flag: door_barred }, { has_flag: nerve_check_attempted }]
        text: >
          The inking-room door — and the heavy bar is across it now, thrown into its brackets
          with the latch already moving in the frame when you got it home. Beyond the frosted
          pane the four shapes are still in the alley under the gas-bracket, the hammers and the
          wrecking-bar still with them; one sets a shoulder to the wood and it shudders and holds.
          They have not gone, and they will not, while there is a press behind you worth the
          breaking. You can leave the door barred and turn back to your work, or throw the bolt
          back even now and go out to them. The composing room is behind you.
      - when: [{ has_flag: door_barred }]
        text: >
          The inking-room door — and the heavy bar is across it now, dropped hard into its
          brackets where you slammed it. Beyond the frosted pane the four shapes are still in the
          alley under the gas-bracket, the hammers and the wrecking-bar still with them; one sets
          a shoulder to the wood and it shudders and holds. They have not gone, and they will not,
          while there is a press behind you worth the breaking. You can leave the door barred and
          turn back to your work, or throw the bolt back even now and go out to them. The
          composing room is behind you.
      - when: [{ quest_stage: { quest: the_edition, stage: proof_found } }]
        text: >
          The inking-room door, and beyond its frosted pane the alley — and four shapes in it
          now, close in under the gas-bracket, and the dull gleam of the hammers and the
          wrecking-bar. Garrow's yard-men, come for the press; and you know now, with the
          inspector's proven report still warm in your hand, exactly what it is they have been
          sent to break before dawn. One of them tries the latch as you watch. The composing
          room and the waiting lever are back behind you.
      - when: [{ quest_stage: { quest: the_edition, stage: proof_sought } }]
        text: >
          The inking-room door, and beyond its frosted pane the alley — and four shapes in it
          now, close in under the gas-bracket, and the dull gleam of what they carry. Garrow's
          yard-men, with hammers and a wrecking-bar and not a printer's tool among them; and
          the safe stands open upstairs at your back, the condemned report half out of its
          bundle, as if they had timed the door to the moment you laid hands on it. One of them
          tries the latch as you watch. The composing room is back behind you.
      - when: [{ quest_stage: { quest: the_edition, stage: story_in_hand } }]
        text: >
          The inking-room door, and beyond its frosted pane the alley — and four shapes in it
          now, close in under the gas-bracket, and the dull gleam of what they carry. Garrow's
          yard-men, come with hammers and a wrecking-bar for the press; and the sluice-man's
          letter still sits on the stone behind you, unproven, the one charge in it Garrow
          would give a great deal to see run before you have found the rest. One of them tries
          the latch as you watch. The composing room is back behind you.
    choices:
      - id: confront_men
        # The rash pole — plainly lethal and plainly elected. The men and the bar are shown
        # before the door is opened; going out is the player's choice, not an ambush.
        text: "Throw the bolt back and go out into the alley to face them."
        next: ending_silenced
      # A d20 TENSION beat (CYOA skill checks are first-class), not a gate: the latch is
      # lifting under a yard-man's hand and you must get the heavy bar across before it gives
      # — steady your nerve and slam it home. This is a CONVERGENT check: on_success (the bar
      # drops clean and true) and on_failure (your hands shake, you fumble it, but it crashes
      # into its bracket in time all the same) BOTH route to the SAME scene, composing_room —
      # exactly where the plain `bar_door` below leads — so the roll never branches the story,
      # blocks the way, ends the game, awards `score`, or advances the_edition. Both branches
      # set the SAME two monotonic flags, door_barred AND nerve_check_attempted — identically —
      # so the convergence is exact (cyoa_convergent_skill_check_sound.test.ts): the only
      # difference between success and failure is the `add_journal` narration (excluded from the
      # BFS stateKey — support/exhaustive_endings.ts). nerve_check_attempted is read ONLY by the
      # alley_door barred+attempted variant (pure prose — no choice condition, score, or route
      # reads it), so both the every-ending-reachable and exact max_score=35 proofs stay sound.
      # It distinguishes "used the dramatic skill-check" from "used plain bar_door" — something
      # plain door_barred cannot do — making the check leave a visible persistent trace in the
      # alley scene on re-entry (bug_0313). door_barred is what kills the no-progress LOOP and
      # feeds the hub barred-door variants. Gated `not_flag: door_barred`: you cannot re-bar a
      # barred door (the loop fix). NO `next` — skill-checked choices route via their branches'
      # goto effects (schema: exactly one of next / skill_check). Difficulty 12 vs d20 + nerve(3)
      # is a true mid-roll swing (beat it on a 9), well under the 20 + 3 ceiling.
      # bug_0419: the action label itself now says "cleanly or shakily" and "fall back
      # inside" so the player can tell the roll changes the manner, not the outcome.
      - id: steady_and_bar
        text: "Steady your nerve and get the bar across, cleanly or shakily, before you fall back inside."
        conditions: [{ not_flag: door_barred }]
        skill_check:
          skill: nerve
          difficulty: 12
          on_success:
            - add_journal: "You take one breath, judge the swing of the heavy bar, and drop it clean into its brackets — the door shudders once under a shoulder from the alley and holds. You step back into the composing room."
            - set_flag: nerve_check_attempted
            - set_flag: door_barred
            - goto: composing_room
          on_failure:
            - add_journal: "Your hands will not quite keep still; the bar skids in your grip and the latch is half-lifted before you wrestle it crashing home — but it holds, and the door bucks and holds, and you back away into the composing room with your heart going like the press."
            - set_flag: nerve_check_attempted
            - set_flag: door_barred
            - goto: composing_room
      # The plain, unrolled way to bar the door (no nerve check). Like both branches of the
      # check above it sets the monotonic door_barred and returns to the composing room; gated
      # not_flag door_barred so it cannot re-fire on an already-barred door.
      - id: bar_door
        text: "Drop the bar across the door and step back inside."
        conditions: [{ not_flag: door_barred }]
        effects:
          - set_flag: door_barred
        next: composing_room
      # Once the door is barred (door_barred), a plain return so the scene resolves instead of
      # forcing the rash confront_men pole — the player may leave the barred door and go back to
      # the night's real work. Gated to appear ONLY in the barred state (the unbarred scene's
      # return IS bar_door, which barring-and-stepping-back already does).
      - id: back_inside
        text: "Leave the door barred and go back up to the composing room."
        conditions: [{ has_flag: door_barred }]
        next: composing_room

endings:
  - id: ending_vindicated
    title: "Proven, and Printed"
    text: >
      You set the column with the inspector's seal in it and throw your weight on the
      bed-lever, and the press takes the page and begins to breathe — once, twice, then the
      long sure roar of ten thousand impressions, the truth multiplying faster than any man
      can buy it back. Above you the barred alley door jumps once under a shoulder and holds,
      and the men outside learn that a wrecking-bar is useless against a story already in
      the street. By the time Garrow's lawyers are awake the edition is on every step and in
      every hand, and there is nothing in it he can sue, because every word stands on a Crown
      inspector's signature he himself acknowledged and could not bring himself to burn. The
      three drowned men get their names said true at last, and the town that loved its
      benefactor learns what the loving cost. You did not just have the courage to print it.
      You did the work to make it unbreakable first — and that is why, this morning, it
      cannot be unsaid.

  - id: ending_libel
    death: true
    title: "The Word Alone"
    text: >
      You set the story on the sluice-man's word and pull the lever, and it runs, and for
      one bright hour you are the bravest pen in the county. Then Garrow's lawyers find the
      one charge the letter got wrong — a name, a date, a clerk accused who only carried the
      orders — and they fall on it and on the paper with everything money can hire. The true
      heart of the thing drowns in the one false limb of it; the retraction runs bigger than
      the story did; the clerk you named is ruined for a thing he did not do, and the paper
      with him, and Garrow walks away the wronged and pitied man. You were right about the
      weir. You will never get a single soul to believe it now. Courage was the cheap half of
      the job, and you spent it without ever paying the dear half, which was to be sure.

  - id: ending_spiked
    title: "The Safe Column"
    text: >
      You lift the story out of the forme and set the gentle notice in its place — the
      coroner's verdict, the act of God, the benefactor's grief at the loss of his good men —
      and you pull the lever and the morning runs smooth and forgetful over the top of three
      graves. Garrow keeps his name and you keep your place, and the letter goes in the stove,
      and the inspector's report stays locked in the dark where it has always been safe. No
      one will ever sue you. No one will ever thank you either, because no one will ever know
      there was anything to thank you for. Some nights, setting other men's small news, you
      will think of the lever you did not pull, and how light it would have been.

  - id: ending_silenced
    title: "Out in the Alley"
    text: >
      You throw the bolt and step out, because some part of you will not be driven in your
      own house — and the alley closes round you in the gaslight, and the wrecking-bar comes
      down before you have got a word out. They go in over you and break the bed and pi the
      type into the running gutter, the front page and the safe page and the whole edition
      with it, and they are gone before the constable they own will trouble to come. The
      morning carries no news at all from this house. Whatever you knew or did not know, whom
      you would have saved or named, it is in the gutter now with the type, and you are a long
      while mending, and the press is longer. Courage in the wrong doorway buys nothing the
      morning can spend.
