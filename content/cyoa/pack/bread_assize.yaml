# The Bread Assize -- a CYOA pack (Stage 1 format).
#
# Charterhaven's market bell is one hour from striking. The poor loaf tables
# have drawn complaints: loaves bearing the alderman's bread seal are light,
# yesterday's dough is being warmed and sold as new, and the baker claims the
# flour factor shorted his sacks. You are the assize clerk sent to weigh the
# loaves, inspect the books, and return a finding before the market opens.
#
# Score economy:
#   +5  read_assize_table   -- lawful penny-loaf weight fixed for the week
#   +5  weigh_market_loaves -- sealed loaves are short by two ounces
#   +5  inspect_oven_marks  -- old loaves were wetted and reheated
#   +5  question_baker      -- baker admits the seal was used before weighing
#   +5  compare_flour_tally -- flour delivery was complete; no shortage defense
#   +5  hear_parish_queue   -- parish tokens show poor loaves diverted to sale
#   +10 fine_on_weight      -- partial professional finding
#   +20 suspend_bread_seal  -- full finding on all six evidence flags
# Best route: collect all six evidence flags, then suspend_bread_seal = 50.

meta:
  id: bread_assize_v1
  title: "The Bread Assize"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Market Parishes"
    quest: "prove the sealed penny loaves are short before market bell"
    role: "assize clerk"
    connection: "Charterhaven's market parishes live by the assize of bread; a false seal turns a civic price into hunger."
  start: market_hall
  vars_init: { composure: 3 }
  flags_init: []
  max_score: 50

scenes:
  - id: market_hall
    title: "The Market Hall"
    variants:
      - when:
          - all_of:
              - has_flag: assize_read
              - has_flag: short_weight
              - has_flag: reheated_loaves
              - has_flag: baker_admitted
              - has_flag: flour_tally_clear
              - has_flag: parish_tokens_traced
        text: >
          The market hall is no longer a place of rumor. The assize table,
          the scale, the bakehouse marks, the baker's own account, the factor's
          tally, and the parish token list now point in one direction. The
          report table is ready.
      - when:
          - all_of:
              - has_flag: assize_read
              - has_flag: short_weight
              - any_of:
                  - not_flag: reheated_loaves
                  - not_flag: baker_admitted
                  - not_flag: flour_tally_clear
                  - not_flag: parish_tokens_traced
        text: >
          The assize table and hall scale have turned rumor into a fineable short
          weight: sixteen ounces required, fourteen ounces found. The report
          table can carry that much now, though a seal suspension still needs the
          rest of the chain from bakehouse, factor, and parish queue.
      - when:
          - all_of:
              - has_flag: short_weight
              - not_flag: assize_read
        text: >
          The hall scale has moved and the sealed loaves sit light in their row,
          but the assize schedule still lies unread beside them. Until the lawful
          penny-loaf weight is on your record, the scale has no legal comparison.
      - when:
          - any_of:
              - has_flag: assize_read
              - has_flag: short_weight
              - has_flag: reheated_loaves
              - has_flag: baker_admitted
              - has_flag: flour_tally_clear
              - has_flag: parish_tokens_traced
        text: >
          The market hall is no longer still. Your notes have begun to gather:
          law, weight, bakehouse practice, account book, and parish queue all wait
          to be made into one finding or sent back for what is missing.
    text: >
      The market hall stands open to the morning: stalls shuttered, scales
      hanging still, the alderman's bread seal locked in its little iron box.
      A row of penny loaves waits on the table beside the assize schedule.
      Bakers are already gathering outside, and the market bell will open
      trade before noon unless your finding stops it.
    choices:
      - id: read_assize_table
        text: "Read the week's assize table for lawful penny-loaf weight."
        conditions: [{ not_flag: assize_read }]
        effects:
          - set_flag: assize_read
          - add_journal: >
              The assize table sets the penny wheaten loaf at sixteen ounces
              for the week, flour price and fuel charge both allowed. Any sealed
              loaf below that weight is not a hard bargain; it is unlawful. (+5)
          - inc_var: { name: score, by: 5 }
        next: market_hall
      - id: weigh_market_loaves
        text: "Weigh the sealed loaves on the hall scale."
        conditions: [{ not_flag: short_weight }]
        effects:
          - set_flag: short_weight
          - add_journal: >
              The first loaf bears the alderman's seal and weighs fourteen
              ounces. The next three are the same. The batch is not uneven; it
              is consistently two ounces short against the lawful table. (+5)
          - inc_var: { name: score, by: 5 }
        next: market_hall
      - id: go_bakehouse
        text: "Inspect the bakehouse before the ovens cool."
        next: bakehouse
      - id: go_factor_book
        text: "Compare the baker's flour account with the factor's book."
        next: factor_book
      - id: go_parish_queue
        text: "Hear the parish queue waiting for poor loaves."
        next: parish_queue
      - id: go_report_table
        text: "Return a finding to the alderman."
        next: report_table

  - id: bakehouse
    title: "The Bakehouse"
    variants:
      - when:
          - all_of:
              - has_flag: reheated_loaves
              - has_flag: baker_admitted
        text: >
          The bakehouse has yielded what it can: damp troughs where old loaves
          were softened for reheating, and the baker's admission that the seal
          touched bread before the weighing was done.
      - when:
          - has_flag: baker_admitted
        text: >
          Heat still hangs under the bakehouse rafters. Abel Crowe no longer
          crowds the sealed baskets; after admitting the seal was struck before
          weighing, he watches the seal-box and chooses each answer with care.
    text: >
      Heat still hangs under the bakehouse rafters. The oven mouth is black
      with last night's firing, the cooling boards are dusted with flour, and
      Abel Crowe the baker stands too close to the sealed baskets as though
      proximity might make them lawful.
    choices:
      - id: inspect_oven_marks
        text: "Inspect the troughs, peels, and oven marks."
        conditions: [{ not_flag: reheated_loaves }]
        effects:
          - set_flag: reheated_loaves
          - add_journal: >
              The troughs are wet but no fresh sponge is rising. The peels are
              dusted with old crust grit, not new flour. Yesterday's loaves
              were wetted, warmed, and sold under today's seal. (+5)
          - inc_var: { name: score, by: 5 }
        next: bakehouse
      - id: question_baker
        text: "Question Abel Crowe on when the bread seal was struck."
        conditions: [{ not_flag: baker_admitted }]
        effects:
          - set_flag: baker_admitted
          - inc_var: { name: score, by: 5 }
        skill_check:
          skill: composure
          difficulty: 11
          on_success:
            - add_journal: >
                You hold the silence after Crowe says the loaves were weighed
                first. He fills it himself: the journeyman struck the seal while
                the bread was still warm, before the hall scale saw it, because
                the morning queue was already forming. The admission fixes the
                false seal to the batch. (+5)
            - goto: bakehouse
          on_failure:
            - add_journal: >
                Crowe blusters through your first question, but the sequence
                still fails. He says the loaves were sealed at the bakehouse,
                then sent to the hall to be weighed. That is enough: the civic
                seal was used before the lawful weight was proven. (+5)
            - goto: bakehouse
      - id: return_from_bakehouse
        text: "Return to the market hall."
        next: market_hall

  - id: factor_book
    title: "The Flour Factor's Book"
    text: >
      The flour factor keeps his account in a narrow booth behind the meal
      sacks. Crowe's defense is simple: his flour was short, his dough suffered,
      and the assize table did not allow for it. The book will either support
      him or take that excuse away.
    choices:
      - id: compare_flour_tally
        text: "Compare Crowe's delivery tally against the factor's ledger."
        conditions: [{ not_flag: flour_tally_clear }]
        effects:
          - set_flag: flour_tally_clear
          - add_journal: >
              The factor's book matches Crowe's own chit: six sacks delivered,
              full weight, no dockage, no damp loss. The shortage did not begin
              at the mill or on the cart; it began after the flour reached the
              bakehouse. (+5)
          - inc_var: { name: score, by: 5 }
        next: factor_book
      - id: return_from_factor
        text: "Return to the market hall."
        next: market_hall

  - id: parish_queue
    title: "The Parish Queue"
    text: >
      Outside the side door, parish beadles hold a list of poor-loaf tokens:
      widows, apprentices, day laborers, and children sent with tin tallies
      from their wards. The queue knows what the market scale does not show:
      who went hungry while sealed loaves reached paying stalls.
    choices:
      - id: hear_parish_queue
        text: "Hear the queue and compare the token list."
        conditions: [{ not_flag: parish_tokens_traced }]
        effects:
          - set_flag: parish_tokens_traced
          - add_journal: >
              Sixteen parish tokens were marked served before the poor-loaf
              basket left Crowe's shop. Only nine names in the queue received
              bread. The missing loaves were not lost; they were diverted to
              the market table and sold under seal. (+5)
          - inc_var: { name: score, by: 5 }
        next: parish_queue
      - id: return_from_queue
        text: "Return to the market hall."
        next: market_hall

  - id: report_table
    title: "The Report Table"
    variants:
      - when:
          - all_of:
              - has_flag: assize_read
              - has_flag: short_weight
              - has_flag: reheated_loaves
              - has_flag: baker_admitted
              - has_flag: flour_tally_clear
              - has_flag: parish_tokens_traced
        text: >
          The alderman waits at the report table with the seal key beside his
          hand. Your notes carry the full chain: lawful weight, short batch, old
          bread reheated, false seal sequence, clear flour delivery, and parish
          tokens diverted. A suspension finding can stand on that record.
      - when:
          - all_of:
              - has_flag: assize_read
              - has_flag: short_weight
              - any_of:
                  - not_flag: reheated_loaves
                  - not_flag: baker_admitted
                  - not_flag: flour_tally_clear
                  - not_flag: parish_tokens_traced
        text: >
          The alderman waits at the report table with the seal key beside his
          hand. The assize table and scale are enough for a short-weight fine,
          but not enough to suspend the seal. For that, the record still needs
          whatever is missing from the bakehouse proof, Crowe's seal sequence,
          the factor ledger, and the parish token trail.
      - when:
          - all_of:
              - has_flag: short_weight
              - not_flag: assize_read
        text: >
          The alderman waits at the report table with the seal key beside his
          hand. The loaves are light on the scale, but the record lacks the
          week's lawful weight from the assize table; without that schedule, the
          ward has no legal comparison for a fine.
      - when:
          - any_of:
              - has_flag: assize_read
              - has_flag: short_weight
              - has_flag: reheated_loaves
              - has_flag: baker_admitted
              - has_flag: flour_tally_clear
              - has_flag: parish_tokens_traced
        text: >
          The alderman waits at the report table with the seal key beside his
          hand. Your notes are still fragments, not a finding. Return to the
          hall and complete the record before choosing more than certification.
    text: >
      The alderman waits at the report table with the seal key beside his
      hand. If you certify the batch, the bell opens the market. If you find
      against it, the loaves are seized and Crowe answers before the ward.
    choices:
      - id: certify_batch
        text: "Certify the batch as lawful and open the market."
        next: ending_certified
      - id: fine_on_weight
        text: "Fine Crowe on the short weight alone."
        conditions:
          - all_of:
              - has_flag: assize_read
              - has_flag: short_weight
        effects:
          - inc_var: { name: score, by: 10 }
        next: ending_fined
      - id: suspend_bread_seal
        text: "Suspend the bread seal and present the full fraud to the ward court."
        conditions:
          - all_of:
              - has_flag: assize_read
              - has_flag: short_weight
              - has_flag: reheated_loaves
              - has_flag: baker_admitted
              - has_flag: flour_tally_clear
              - has_flag: parish_tokens_traced
        effects:
          - inc_var: { name: score, by: 20 }
        next: ending_suspended
      - id: return_to_hall
        text: "Return to the hall and complete the record."
        next: market_hall

endings:
  - id: ending_certified
    title: "The Bell Opens"
    text: >
      You certify the batch and the alderman strikes the bell. The loaves go
      out under seal: short, warmed, and lawful only because no one wrote down
      the contrary. By evening the parish queue is shorter in number and
      sharper in temper. Tomorrow the same seal will be struck again.

  - id: ending_fined
    title: "Short Weight Found"
    text: >
      Your finding is narrow but sound: the sealed penny loaves are two ounces
      short against the week's assize. Crowe pays the ward fine, the batch is
      seized, and the market opens late. The seal survives because your record
      does not yet prove reheating, false sequence, clear flour delivery, and
      parish diversion. It is enough to stop today's fraud, not enough to cut
      out the practice.

  - id: ending_suspended
    title: "The Seal Suspended"
    text: >
      The alderman locks the bread seal in its box and orders Crowe's batch
      seized before the market bell can strike. Your finding is complete:
      lawful weight known, sealed loaves short, old bread reheated, seal struck
      before weighing, flour fully delivered, parish tokens diverted. Crowe
      loses the seal pending ward court, and the poor-loaf basket is filled
      from another baker before noon. The assize has teeth today because every
      link was written down.
