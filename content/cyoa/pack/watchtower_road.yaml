meta:
  id: watchtower_road_v1
  title: "The Watchtower Road"
  start: forest_crossroads
  # `nerve` (value 3) is the d20 skill rolled by the single skill-checked choice in this
  # pack — force_door on ruined_watchtower (below), where the door hanging from one hinge
  # invites a roll to shoulder past it. CYOA skill checks are now first-class (the shared
  # resolveSkillCheck d20 + skill var vs difficulty), but this beat is a TENSION beat, not
  # a gate: its on_success and on_failure both route to the SAME scene (tower_base),
  # differing only in narration (a deft shove vs a fumble that still gets you through), so
  # no route, ending, score award, or reactive variant turns on the outcome. The check
  # therefore changes no state the BFS fingerprints (only the append-only journal differs,
  # which stateKey excludes), so a success and a failure are interchangeable states — the
  # exhaustive every-ending-reachable and score-economy proofs (single deterministic rule
  # set, one seeded roll per step) stay sound: whichever way the seed rolls, the search
  # reaches tower_base all the same. Difficulty 12 is beatable on a mid roll (d20 9 + 3),
  # well under the 20 + 3 = 23 ceiling — a real swing, never luck-gating the story.
  vars_init: { nerve: 3 }
  flags_init: []
  # Stage-3 scoring (CYOA scoring is now first-class, mirroring parser/RPG): points
  # reward the investigation — uncovering the truth, not a moral judgment. Each award
  # rides a one-shot, already-guarded choice so the conventional `score` var can't be
  # farmed past the ceiling, and every award lies on one traversable run, so the
  # best-scoring playthrough reaches the full 50:
  #   +5  inspect_ground   — the bootprints, the first trail east (not_flag found_bootprints)
  #   +5  take_letter      — recovering the sealed papers (not_item sealed_letter)
  #   +10 examine_barrels  — the lamp oil: proof the fire was set (not_flag learned_truth)
  #   +10 take_ledger      — the ledger naming everyone involved (not_item ledger)
  #   +5  ask_about_tower  — the hermit's corroborating account (not_flag heard_hermit_lore)
  #   +5  show_letter      — the hermit breaks the seal, naming the checkpoint man (not_flag seal_broken; bug_0265)
  #   +10 expose_the_plot  — carrying the truth home to the magistrate (ending_truth)
  # bug_0265: show_letter — the western route's key discovery (the hermit reads the letter
  # and names the man at the checkpoint) — previously scored 0 while the mechanically-
  # equivalent eastern discoveries paid +20, so a west-leaning blind playtester (seed 7)
  # reached the win feeling under-rewarded. It now awards +5, restoring parity with the
  # other corroborating clues and lifting the ceiling 45 → 50.
  # Best single path (all seven combine): inspect_ground (+5) → east → cart: take_lantern,
  # take_letter (+5) → cellar: examine_barrels (+10) → hidden_cache: take_ledger (+10) —
  # pry the barrel BEFORE the ledger, since taking the ledger sets learned_truth and
  # retires the barrel choice — → west → hermit: ask_about_tower (+5), show_letter (+5) —
  # both are collectible AFTER learned_truth is set (their guards key off heard_hermit_lore /
  # seal_broken, not learned_truth) — → north → decision_point: expose_the_plot (+10) = 50.
  # No award double-counts (each on a distinct one-shot choice), so the reachable maximum
  # equals max_score exactly (bug_0148-class score-economy soundness, proven exhaustively by
  # cyoa_score_economy_sound). Scoring is silent mechanics — no prose change.
  max_score: 50

scenes:
  # ── The crossroads (start) ──────────────────────────────────────────────
  - id: forest_crossroads
    title: "The Forest Crossroads"
    # Quest "the_road" (the investigation): this START scene's on_enter fires at game
    # start, opening the quest at `setting_out`. It re-fires on every return to the
    # crossroads, harmlessly re-seating that opening stage — no later stage is ever read
    # HERE (the reactive read lives on ruined_watchtower, below), so the revisit reset
    # touches no displayed variant. Tracking only; gates nothing.
    on_enter:
      - set_quest_stage: { quest: the_road, stage: setting_out }
    text: >
      The road splits beneath the black pines. To the east, smoke rises from a
      ruined watchtower. To the west, a brook cuts through the moss.
    choices:
      - id: go_east
        text: "Go east, toward the ruined watchtower."
        # Committing east puts the quest at `on_the_trail` as you LEAVE the crossroads.
        # ruined_watchtower (next) has no on_enter touching the quest, so on arrival the
        # stage is `on_the_trail` and its variant is the first match — provably live
        # (bug_0145): the very first go_east reaches that scene at that stage. Tracking
        # only; the route/next is unchanged.
        effects:
          - set_quest_stage: { quest: the_road, stage: on_the_trail }
        next: ruined_watchtower
      - id: go_west
        text: "Go west, following the brook."
        next: mossy_brook
      - id: inspect_ground
        text: "Inspect the muddy ground."
        conditions: [ { not_flag: found_bootprints } ]
        effects:
          - set_flag: found_bootprints
          - add_journal: "Someone dragged a heavy object east, toward the watchtower."
          # +5 score: the first clue uncovered (the bootprints, the trail east). One-shot —
          # the not_flag found_bootprints guard above retires this choice once it fires.
          - inc_var: { name: score, by: 5 }
        next: forest_crossroads

  # ── Watchtower cluster ───────────────────────────────────────────────────
  - id: ruined_watchtower
    title: "The Ruined Watchtower"
    # Reactive read for quest "the_road" at stage `on_the_trail`, set on the go_east
    # choice that brings you here (forest_crossroads, above). This scene has no on_enter,
    # so on arrival from the crossroads the stage is still `on_the_trail` and this variant
    # is the first match — the safe set-on-the-edge / read-on-the-destination pattern, so
    # it is never dead prose (bug_0145). It colours the prose the first time you turn off
    # the road toward the smoke.
    #
    # bug_0248: the second `not_flag: learned_truth` guard is the staleness fix. An EARLIER
    # comment here claimed a later return "no longer matches" because the quest would by
    # then sit at `truth_known` — but that was WRONG: forest_crossroads' on_enter UNCON-
    # ditionally re-seats the quest to `setting_out` on every revisit, and a subsequent
    # go_east re-advances it to `on_the_trail`, so a player who had already pried the barrels
    # (learned_truth, score on the board) and looped back through the crossroads saw this
    # "the trail you came to follow runs in there" line a SECOND time, as if arriving fresh
    # — the same stale-on-re-entry class as bug_0120 (tower_top brazier) and bug_0134
    # (hermit greeting). Reproduced live via the MCP tools (seed 23): barrels → return_cross-
    # roads → go_east re-showed the variant at learned_truth. Gating the variant on
    # `not_flag: learned_truth` (the pack's established "I already know what's going on"
    # signal — cf. confront_smuggler, decision_point, the ending variants) suppresses it
    # once the truth is out; the un-informed first-timer (no flag) still sees it verbatim.
    # Reactive text only — first-match-wins, no choice/route/ending/gating change.
    variants:
      - when: [ { quest_stage: { quest: the_road, stage: on_the_trail } }, { not_flag: learned_truth } ]
        text: >
          Fire-blackened stone leans against the sky. You've left the crossroads
          behind for the smoke, and up close the ruin tells its own tale: the door
          hangs from one hinge, and a cellar stair curls down into the dark on the
          north side — the trail you came to follow runs in there.
    text: >
      Fire-blackened stone leans against the sky. The door hangs from one hinge,
      and a cellar stair curls down into the dark on the north side.
    choices:
      - id: approach_base
        text: "Step inside, to the tower base."
        next: tower_base
      # A d20 tension beat (CYOA skill checks are first-class): the door hangs from one
      # hinge and won't swing — set your shoulder to it. This is a CONVERGENT check, not a
      # gate: on_success (a clean shove) and on_failure (a graceless tumble) BOTH route to
      # the SAME scene, tower_base — exactly where the plain `approach_base` above leads —
      # so the roll never branches the story, blocks the way, awards score, sets a read
      # flag, or flips an ending; it only colours HOW you got inside. The two branches
      # differ solely in their `add_journal` narration; tower_base has no on_enter, so both
      # outcomes leave identical state (the journal is append-only and excluded from the
      # BFS fingerprint). Hence the exhaustive every-ending-reachable and score-economy
      # proofs stay sound under their single seeded roll per step: success and failure are
      # interchangeable states that both reach tower_base. NO `next` — a skill-checked
      # choice routes via its branches' goto effects (schema: exactly one of next /
      # skill_check). Difficulty 12 vs d20 + nerve(3) is a true mid-roll swing (beat it on
      # a 9), well under the 20 + 3 ceiling. No re-offer guard is needed: both outcomes go
      # to tower_base regardless, so a return-and-retry is harmless and idempotent.
      - id: force_door
        text: "Set your shoulder to the sagging door and force your way in."
        skill_check:
          skill: nerve
          difficulty: 12
          on_success:
            - add_journal: "You judge the hinge, plant your boot, and the door gives at the first clean shove — you step into the tower base."
            - goto: tower_base
          on_failure:
            - add_journal: "The door fights back, the rotten frame snags your sleeve, and you half-fall through in a clatter of splinters — but you're inside the tower base all the same."
            - goto: tower_base
      - id: circle_cellar
        text: "Circle around to the cellar door."
        next: cellar_door
      - id: return_crossroads
        text: "Return to the crossroads."
        next: forest_crossroads

  - id: tower_base
    title: "Tower Base"
    text: >
      Rubble and ash. A staircase spirals upward. Against the far wall lies an
      overturned cart, its contents spilled across the floor.
    choices:
      - id: climb_stairs
        text: "Climb the spiral stairs."
        next: tower_stairs
      - id: search_rubble
        text: "Search the overturned cart."
        conditions: [ { none_of: [ { all_of: [ { has_item: lantern }, { has_item: sealed_letter } ] } ] } ]
        next: abandoned_cart
      - id: leave_base
        text: "Step back outside."
        next: ruined_watchtower

  - id: abandoned_cart
    title: "The Overturned Cart"
    text: >
      A merchant's cart, tipped and looted in a hurry. Spilled straw and split
      crates cover the floor.
    choices:
      - id: take_lantern
        text: "Take the brass lantern."
        conditions: [ { not_item: lantern } ]
        effects: [ { add_item: lantern }, { add_journal: "You pocket a brass lantern — enough light for the cellar stair outside." } ]
        next: abandoned_cart
      - id: take_letter
        text: "Take the sealed letter."
        conditions: [ { not_item: sealed_letter } ]
        # +5 score: recovering the sealed papers — a clue in hand. One-shot — the not_item
        # sealed_letter guard above retires this choice once the letter is taken.
        effects: [ { add_item: sealed_letter }, { add_journal: "A wax-sealed letter, addressed to no one — quality correspondence paper and a hard-pressed seal, not a traveler's permit but the kind of private record that moves between men with something to arrange and someone to pay. The seal is too hard for you to break cleanly, though the right pair of eyes — not your own — could read what is inside; and a checkpoint man who knew what he was looking at would want very much to do so." }, { inc_var: { name: score, by: 5 } } ]
        next: abandoned_cart
      - id: carry_lantern_to_cellar
        text: "Carry the lantern out to the cellar stair."
        conditions: [ { has_item: lantern } ]
        next: cellar_door
      - id: leave_cart
        text: "Leave the cart."
        next: tower_base

  - id: tower_stairs
    title: "Spiral Stairs"
    text: "The stairs groan underfoot. Cold air pours down from above."
    choices:
      - id: continue_up
        text: "Continue to the top."
        next: tower_top
      - id: go_down
        text: "Go back down."
        next: tower_base

  - id: tower_top
    title: "Tower Top"
    # bug_0120: a blind playtester (seed 11, ai-runs/2026-06-02T11-34-06-334Z/playtest.md
    # §5) lit the beacon, returned to the tower top, and found the scene STILL reading "a
    # cold brazier waits, begging for a flame" while RE-OFFERING "Light the signal beacon."
    # The light_beacon choice gated only on carrying the lantern — never on whether the
    # alarm was already raised — so it stayed selectable and repeatable over an already-
    # blazing fire, and the base text contradicted the player's own completed action. Fix:
    # gate light_beacon on not_flag raised_alarm (a one-shot that retires once fired) and
    # add a raised_alarm scene variant so the returning player sees the fire they lit.
    # Reactive text + one-shot gate only — no new flag/route/ending: raised_alarm is still
    # set exactly once on the same first lighting, and the un-alarmed player sees the
    # original base text and the light_beacon choice verbatim (first-match-wins).
    #
    # bug_0283: a blind playtester (seed 42, ai-runs/2026-06-08T04-04-29-865Z/playtest.md
    # §4) climbed the tower before finding the lantern and saw "A cold brazier waits,
    # begging for a flame" — but light_beacon was invisible (gated on has_item: lantern),
    # so the scene described an affordance the player had no way to use. False affordance —
    # same reactive-description-blindness class as bug_0120/bug_0134/bug_0282. Fix: add a
    # not_item: lantern variant (placed BEFORE the base, AFTER the raised_alarm variant)
    # that describes the brazier neutrally when the player has no lantern. The base text
    # ("begging for a flame") only shows when the player carries the lantern but has not yet
    # lit the beacon — exactly the right moment for that invitation.
    variants:
      - when: [ { has_flag: raised_alarm } ]
        text: >
          The ruined parapet opens onto the whole valley, the road running north
          toward the town. In the brazier the beacon you kindled still blazes,
          flinging its light far down the dark — and below, the horn that answered
          it has not yet fallen silent.
      - when: [ { not_item: lantern } ]
        text: >
          The ruined parapet opens onto the whole valley. The road runs north toward
          the town. A cold iron brazier stands at the parapet's edge, dark and empty.
    text: >
      The ruined parapet opens onto the whole valley. The road runs north toward
      the town. A cold brazier waits, begging for a flame.
    choices:
      - id: light_beacon
        text: "Light the signal beacon with your lantern."
        conditions: [ { all_of: [ { has_item: lantern }, { not_flag: raised_alarm } ] } ]
        effects: [ { set_flag: raised_alarm } ]
        next: signal_fire
      - id: survey_road
        text: "Take the road north."
        next: road_north
      - id: descend
        text: "Descend the stairs."
        next: tower_stairs

  - id: signal_fire
    title: "The Signal Fire"
    text: >
      Flame leaps from the brazier and climbs into the dusk. Somewhere below, a
      horn answers. Help — or trouble — is coming.
    choices:
      - id: watch_for_help
        text: "Wait and watch the road."
        next: decision_point
      - id: back_to_top
        text: "Step back from the heat."
        next: tower_top

  # ── Cellar cluster (condition-locked + hidden scene) ──────────────────────
  - id: cellar_door
    title: "The Cellar Door"
    text: >
      A low door, half off its frame, opens on a stair that drops steeply out
      of sight.
    choices:
      - id: light_lantern
        text: "Light the lantern to see your way down."
        conditions: [ { all_of: [ { has_item: lantern }, { not_flag: lantern_lit } ] } ]
        effects: [ { set_flag: lantern_lit }, { narrate: "The wick catches; warm light pushes back the dark." } ]
        next: cellar_door
      - id: descend_cellar
        text: "Descend into the cellar."
        conditions: [ { all_of: [ { has_flag: lantern_lit }, { not_item: ledger } ] } ]
        next: cellar
      - id: peer_into_dark
        text: "Lean in and look down the stair."
        conditions: [ { not_item: lantern } ]
        effects: [ { narrate: "The stair drops into pitch black; cold air and the smell of old pitch rise from below. You'd break your neck going down blind, so you back up the steps — better find a light first." } ]
        next: ruined_watchtower
      - id: cellar_back
        text: "Step back from the door."
        next: ruined_watchtower

  - id: cellar
    title: "The Cellar"
    text: >
      Lantern-light finds rows of barrels — the air thick with pitch and old
      smoke — and behind them, a gap in the wall where the mortar was knocked
      through from inside.
    choices:
      - id: search_cache
        text: "Squeeze through the broken wall."
        conditions: [ { not_item: ledger } ]
        next: hidden_cache
      - id: examine_barrels
        text: "Pry open a barrel."
        conditions: [ { not_flag: learned_truth } ]
        effects:
          - set_flag: learned_truth
          # Quest milestone: learning the truth advances "the_road" to `truth_known`,
          # in lockstep with the existing learned_truth flag. Tracking only; gates nothing.
          - set_quest_stage: { quest: the_road, stage: truth_known }
          - add_journal: "The barrels are full of lamp oil. The fire was set on purpose."
          # +10 score: uncovering the arson (the lamp oil — the fire was set on purpose).
          # One-shot — the not_flag learned_truth guard above retires this choice once it
          # fires; collectible alongside the ledger only by prying the barrel FIRST, since
          # take_ledger also sets learned_truth (the best-path ordering, see meta).
          - inc_var: { name: score, by: 10 }
        next: cellar
      - id: climb_out
        text: "Climb back out."
        next: cellar_door

  - id: hidden_cache
    title: "The Hidden Cache"
    text: >
      A smuggler's hollow, hastily emptied — you've found their hidden cache. A
      ledger lies forgotten in the dust, its pages crammed with names and dates,
      a wax seal pressed into the cover.
    choices:
      - id: take_ledger
        text: "Read and pocket the ledger."
        conditions: [ { not_item: ledger } ]
        effects:
          - add_item: ledger
          - set_flag: learned_truth
          # Quest milestone (mirrors the barrel branch): "the_road" reaches `truth_known`.
          - set_quest_stage: { quest: the_road, stage: truth_known }
          - add_journal: "The ledger names everyone involved. You pocket it."
          # +10 score: recovering the ledger that names everyone involved — the hard
          # evidence. One-shot — the not_item ledger guard above retires this choice once
          # the ledger is pocketed.
          - inc_var: { name: score, by: 10 }
        next: cellar
      - id: leave_cache
        text: "Slip back out."
        next: cellar

  # ── Brook + hermit cluster (the NPC conversation) ─────────────────────────
  - id: mossy_brook
    title: "The Mossy Brook"
    # bug_0282: a blind playtester (seed 7, ai-runs/2026-06-08T03-49-19-615Z/playtest.md §4)
    # visited the hermit's camp, heard the full tale (heard_hermit_lore), had the letter read
    # (seal_broken), and then found the brook scene STILL reading "a thread of smoke marks a
    # small camp downstream" — discovery-framing that presupposes an unexplored mystery.
    # Same reactive-description-blindness class as bug_0134 (hermit_talk re-greeting) and
    # bug_0120 (tower_top brazier). The hermit_talk fix (bug_0134) uses the same two-flag guard
    # any_of[heard_hermit_lore, seal_broken] — mossy_brook now mirrors it: a player who has
    # meaningfully engaged with the hermit (heard the tale OR had the letter read) sees the
    # camp as a known entity rather than an undiscovered mystery.
    variants:
      - when: [ { any_of: [ { has_flag: heard_hermit_lore }, { has_flag: seal_broken } ] } ]
        text: >
          The brook chuckles over stones. Smoke still rises from the hermit's camp
          downstream; the ford runs ahead toward the north road.
    text: >
      The brook chuckles over stones. A thread of smoke marks a small camp
      downstream, and a shallow ford lies just ahead.
    choices:
      - id: ford_brook
        text: "Cross at the ford."
        next: brook_ford
      - id: follow_to_camp
        text: "Follow the smoke to the camp."
        next: hermit_camp
      - id: return_from_brook
        text: "Return to the crossroads."
        next: forest_crossroads

  - id: hermit_camp
    title: "The Hermit's Camp"
    text: >
      A lean-to, a low fire, and an old hermit mending a net. He watches you with
      pale, unsurprised eyes.
    choices:
      - id: talk_hermit
        text: "Approach and speak with him."
        next: hermit_talk
      - id: leave_camp
        text: "Leave the camp."
        next: mossy_brook

  - id: hermit_talk
    title: "The Hermit"
    # bug_0134: a blind playtester (seed 88, ai-runs/2026-06-02T15-08-35-167Z/
    # playtest.md §4) returned to the conversation after the hermit had already told
    # the smuggler's tale (heard_hermit_lore) and/or broken the letter's seal
    # (seal_broken), and met the IDENTICAL cold first-meeting greeting — "You look
    # lost, traveler. Or maybe you found something you weren't meant to." — as if a
    # stranger, contradicting the exchange just had (reproduced live: ask_about_tower
    # → back_from_tower_talk re-shows the stranger greeting). Same stale-on-re-entry
    # class as bug_0120 (tower_top brazier) and confront_smuggler's variants: gate a
    # reactive variant on having already spoken so a returning player sees a hermit
    # who knows them, and re-point him at the goal (north). Reactive text only —
    # first-match-wins, no choice/flag/route/ending change; the un-spoken player sees
    # the original greeting verbatim (first entry has neither flag set).
    variants:
      - when: [ { any_of: [ { has_flag: heard_hermit_lore }, { has_flag: seal_broken } ] } ]
        text: >
          The hermit looks up from his net again. "Still here," he says, not
          unkindly. "I've told you what I know, and the road north is where the
          rest of it waits. Ask what's left to ask, or go and see for yourself."
    text: >
      "You look lost, traveler," the hermit says. "Or maybe you found something
      you weren't meant to."
    choices:
      - id: ask_about_tower
        text: "Ask about the burning tower."
        conditions: [ { not_flag: heard_hermit_lore } ]
        # +5 score: the hermit's corroborating account of the smugglers. One-shot — the
        # not_flag heard_hermit_lore guard above retires this choice, and hermit_about_tower's
        # on_enter sets that flag on arrival, so it cannot re-fire. (Independent of
        # learned_truth, so it stacks with both cellar discoveries on the best path.)
        effects:
          - inc_var: { name: score, by: 5 }
        next: hermit_about_tower
      - id: show_letter
        text: "Show him the sealed letter."
        conditions: [ { all_of: [ { has_item: sealed_letter }, { not_flag: seal_broken } ] } ]
        # +5 score: the hermit breaks the seal and reads — the letter NAMES the man at the
        # checkpoint, the single most pointed piece of evidence on the western route. This
        # was the one investigative discovery that paid nothing: a blind playtester (seed 7,
        # ai-runs/2026-06-05T01-31-00-798Z/playtest.md §4/§5) reached the win via the hermit
        # having learned the truth here yet scored far below the eastern evidence trail
        # (barrels +10, ledger +10), so the mechanically-equivalent western "learn the truth"
        # beat felt unrewarded (bug_0265). Awarding it removes that imbalance and lets the
        # west route corroborate the score. One-shot — the not_flag seal_broken guard above
        # retires this choice, and hermit_about_letter's on_enter sets seal_broken on arrival,
        # so it cannot re-fire (the same one-shot pattern as ask_about_tower / heard_hermit_lore).
        # Independent of learned_truth, so on the best path it stacks AFTER the eastern barrel/
        # ledger awards (which set learned_truth) without retiring either of them.
        effects:
          - inc_var: { name: score, by: 5 }
        next: hermit_about_letter
      - id: say_goodbye
        text: "Say goodbye."
        next: hermit_camp

  - id: hermit_about_tower
    title: "About the Tower"
    text: >
      "Smugglers," he spits. "They kept their oil in that cellar. When the
      watch got close, they burned it all and ran north."
    on_enter:
      - set_flag: heard_hermit_lore
      - add_journal: "The hermit's tale: smugglers stored oil in the tower cellar and burned it to cover their tracks before fleeing north. Hearsay — but it tells you where to look."
    choices:
      - id: back_from_tower_talk
        text: "Return to the conversation."
        next: hermit_talk

  - id: hermit_about_letter
    title: "The Letter"
    text: >
      The hermit breaks the seal and reads. "This names the man at the
      checkpoint. Carry it north and the truth carries with you."
    on_enter:
      - set_flag: learned_truth
      - set_flag: seal_broken
      # Quest milestone (mirrors the cellar branches): "the_road" reaches `truth_known`.
      - set_quest_stage: { quest: the_road, stage: truth_known }
      - add_journal: "The hermit broke the letter's seal: it names the man at the checkpoint. Carry it north — the proof goes with you."
    choices:
      - id: back_from_letter_talk
        text: "Return to the conversation."
        next: hermit_talk

  - id: brook_ford
    title: "The Ford"
    text: "Cold water to the knee, then firm gravel and the north bank."
    choices:
      - id: cross_north
        text: "Take the north road."
        next: road_north
      - id: ford_back
        text: "Wade back."
        next: mossy_brook

  # ── The road north (climax + endings) ─────────────────────────────────────
  - id: road_north
    title: "The North Road"
    text: >
      The road runs straight toward town. A guarded checkpoint blocks the way,
      and the treeline offers a quieter path around it.
    choices:
      - id: approach_checkpoint
        text: "Approach the checkpoint."
        next: checkpoint
      - id: slip_into_woods
        text: "Slip into the woods around it."
        next: decision_point
      - id: road_back_south
        text: "Head back south."
        next: brook_ford

  - id: checkpoint
    title: "The Checkpoint"
    text: >
      A bored sergeant leans on a halberd. "Papers," he says, not really asking.
    choices:
      - id: show_papers
        text: "Present the sealed letter."
        conditions: [ { has_item: sealed_letter } ]
        next: confront_smuggler
      - id: force_through
        text: "Bluster and shove your way through."
        next: ending_captured
      - id: retreat_checkpoint
        text: "Back away slowly."
        next: road_north

  - id: confront_smuggler
    title: "The Sergeant's Face"
    text: >
      The sergeant reads, and his face goes white as he finds his own name. His
      hand drifts toward his sword — but the gate behind him is open, and his men
      are watching to see what you do.
    # A blind playtester (seed 19) reached this scene having taken the sealed
    # letter (east) but learned nothing (no cellar, no hermit), and the scene
    # contradicted itself: the base text narrates the sergeant reading his own
    # name (damning proof), yet the only forward choice there is `press_bluff` —
    # "the letter's still sealed and you can prove nothing." You cannot both read
    # his name AND prove nothing. The base text is the learned_truth payoff (you
    # know what the letter/ledger holds, so handing it over damns him); this
    # variant covers the no-proof player, where the sergeant weighs an unbroken
    # seal he has no reason to open and the bluff that follows reads true. Reactive
    # text only — no flag/route/ending change; both branches' choices are unchanged.
    variants:
      - when: [ { not_flag: learned_truth } ]
        text: >
          The sergeant turns the wax-sealed letter over in his hands. The seal is
          unbroken, and you've no idea what it says — for all either of you knows
          it's a laundry list. Handing a stranger's sealed letter to the very man
          it might name is no kind of proof, and his bored stare says he knows it.
    choices:
      - id: reveal_evidence
        text: "Lay out everything you know — the oil, the names, the seal."
        conditions: [ { has_flag: learned_truth } ]
        next: decision_point
      - id: press_bluff
        text: "Press him, though the letter's still sealed and you can prove nothing."
        conditions: [ { not_flag: learned_truth } ]
        effects: [ { add_journal: "You pushed without proof. The sergeant simply had you seized." } ]
        next: ending_captured
      - id: back_off
        text: "Pocket the letter and slip away to find real proof first."
        conditions: [ { not_flag: learned_truth } ]
        next: road_north
      # bug_0062: the learned_truth player ALREADY has their proof, so the no-proof
      # wording above ("to find real proof first") contradicts their state. Gate that
      # line to the bluffer and give the proof-bearer a coherent retreat: they have
      # what damns him but choose not to force it at the gate.
      - id: hold_off
        text: "Hold your tongue for now — pocket the letter and back away from the gate."
        conditions: [ { has_flag: learned_truth } ]
        next: road_north

  - id: decision_point
    title: "The Edge of Town"
    text: >
      Town lights flicker ahead. The road runs in toward the magistrate's hall;
      the dark runs the other way. The choice is yours.
    choices:
      - id: expose_the_plot
        text: "March in and expose the whole conspiracy."
        conditions: [ { has_flag: learned_truth } ]
        # +10 score: carrying the truth home — the best ending. Terminal (next is an
        # ending), so it fires exactly once and tops out the best-scoring run at 45.
        effects:
          - inc_var: { name: score, by: 10 }
        next: ending_truth
      - id: slip_away
        text: "Slip away into the dark and never look back."
        next: ending_escape
      - id: turn_back
        text: "You've no proof yet — turn back to find some before you act."
        conditions: [ { not_flag: learned_truth } ]
        next: road_north

# The lit signal beacon (`raised_alarm`, set on tower_top → light_beacon) was a
# Chekhov's gun the engine never fired. The signal_fire scene narrates "a horn
# answers. Help — or trouble — is coming," yet `raised_alarm` was set and then
# read NOWHERE: a player who lit the beacon and one who never climbed the tower
# reached the same Edge of Town with identical epilogues, so the dramatic promise
# never materialised. A fresh blind playtester (seed 19, ai-runs/
# 2026-06-02T01-02-26-045Z/playtest.md §1/§5) flagged it directly: the beacon
# "promises a consequence that never materializes differently from the un-alarmed
# path." Rather than defuse the gun (mute the prose, the bug_0061 move when a clock
# had no teeth), this FIRES it: each ending the beacon route can reach now carries a
# reactive `raised_alarm` variant (engine endingText, first-match-wins, the same
# reactive-ending machinery as clockwork's ending_truth, bug_0051) so the watch the
# player summoned actually shows up in the epilogue. No scene/choice/route/gating
# change and no new ending — the base text is the un-alarmed fallback; only the
# beacon-lighter sees a divergent close. raised_alarm co-occurs with all three
# endings (truth: light then expose with proof; escape: light then slip away;
# captured: light, find no proof, turn back and force the gate), so all three get a
# variant, and "help — or trouble —" lands as help (truth), cover (escape), or the
# noose you tightened yourself (captured) (bug_0098).
endings:
  - id: ending_truth
    title: "The Truth, Carried Home"
    variants:
      - when: [ { has_flag: raised_alarm } ]
        text: >
          The beacon you lit still burns on the tower behind you, and the watch it
          called is already converging on the smugglers' cellar by the time you
          reach the magistrate's hall. You lay out everything you uncovered — the
          scheme, the arson, the proof that damns them — and find the reckoning
          half-begun: by morning the conspirators are named and run to ground,
          caught in the open by the very alarm you raised against them.
    text: >
      You lay out everything you uncovered before the magistrate — the
      smugglers' scheme, the arson, and the proof that damns them. By morning
      the conspirators are named, and the watchtower's fire has a reckoning.
  - id: ending_escape
    title: "Into the Dark"
    variants:
      - when: [ { has_flag: raised_alarm } ]
        text: >
          Behind you the beacon still burns, and the horn you woke has drawn the
          watch toward the tower in a scatter of lanterns and shouting. You use the
          confusion for cover, slip past the lights, and take the open road.
          Whatever happened at the tower stays behind you — along with the watch,
          still chasing the alarm you raised and then walked away from — and so does
          the truth.
    text: >
      You slip past the lights and onto the open road. Whatever happened at the
      tower stays behind you — and so does the truth.
  - id: ending_captured
    death: true
    title: "Held at the Gate"
    variants:
      - when: [ { has_flag: raised_alarm } ]
        text: >
          The beacon you lit had already roused the whole watch — horns down the
          valley, lanterns at every post, men awake who should have been asleep.
          There is no slipping a gate you yourself set ringing. The halberd comes
          down across your chest. "Nobody forces this gate," the sergeant says, and
          the cell door closes behind you.
    text: >
      The halberd comes down across your chest. "Nobody forces this gate," the
      sergeant says, and the cell door closes behind you.
