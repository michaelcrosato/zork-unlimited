# The Croft Inquest — a CYOA pack (Stage 1 format).
#
# Stoke Wentworth, November 1693. Edward Croft, a wool factor, is found dead
# in his counting room at first light. His wife says he fell on the stairs
# in the night. The body and the scene say otherwise. You are the parish
# coroner: twelve jurors have been summoned and you must examine the body,
# hear the witnesses, and return a formal finding before nightfall.
#
# Novel contributions vs existing CYOA corpus:
#   (1) CORONER ROLE — first death-investigation role in CYOA corpus; all
#       prior packs concern trade fraud, revenue evasion, impressment,
#       property crime, or arson; the parish coroner holds statutory duty
#       to inquire into violent or sudden deaths, convene a jury, and record
#       a formal inquest finding; his authority is quasi-judicial — to view
#       the body, examine witnesses on oath, and return a verdict — not to
#       arrest or seize goods; distinct from tidewaiter (revenue), alnager
#       (measurement), magistrate's clerk (jurisdictional), fire examiner
#       (private commercial), and excise surveyor (fiscal) by being
#       exclusively concerned with cause of death.
#   (2) PHYSIOLOGICAL EVIDENCE — first CYOA pack where primary physical
#       evidence is anatomical: wound angle, injury pattern inconsistent with
#       stated cause of death, blood location; the body is the artefact; prior
#       packs use burn patterns, char origin, cloth measurements, documentary
#       cross-reference, or wheel-rut tracks; this pack uses a wound on a
#       human body as the central physical clue.
#   (3) INQUEST VERDICT CATEGORIES — "natural causes" / "misadventure" /
#       "open verdict" / "felony" — four legally distinct coroner's findings
#       not present in any prior CYOA pack; the player is not filing a
#       professional recommendation (fire_office) or writing a formal report
#       (fishermans_privilege) but delivering a jury verdict with immediate
#       legal consequence; the vocabulary of the terminal choices is entirely
#       new to the corpus.
#   (4) ACTIVE WITNESS CONFLICT — the widow's account (fell on the stairs)
#       directly contradicts the physical evidence; prior packs present
#       witnesses with incomplete knowledge; this pack's primary lay witness
#       offers a false account (whether by complicity or instruction); a
#       second witness corroborates the physical record against her; the
#       player must weigh two contradictory lay accounts alongside a medical
#       finding.
#   (5) THREE-CATEGORY EVIDENCE CONVERGENCE FOR STRONGEST FINDING — the
#       felony finding requires evidence from three distinct categories that
#       each contribute independently: (a) physiological (wound pattern),
#       (b) scene (blood location — not the stairs), (c) testimonial (witness
#       placing the debtor Merton at the scene + account-book motive);
#       partial convergence supports partial verdicts; full convergence
#       supports criminal referral; this is a genuinely new evidence-chain
#       topology — wound + scene + suspect chain — not previously built in
#       any CYOA pack.
#
# Score economy (all awards one-shot, guarded with not_flag):
#   +5  examine_body — wound pattern inconsistent with fall (not_flag: found_wound_pattern)
#   +5  check_scene  — blood in counting room, not stairs (not_flag: found_stair_scene)
#   +5  read_account_book — overdue bond: £180, D. Merton (not_flag: found_debt_note)
#   +5  hear_physician — Dr. Stott's note: horizontal blow, not fall (not_flag: heard_physician)
#   +5  hear_widow — Alice Croft: fell on stairs (not_flag: heard_widow)
#   +5  hear_apprentice — Jack Finch: Merton left in haste (not_flag: heard_apprentice;
#       composure DC 11 tension beat — both branches award the same flag and score)
#   +20 commit_to_grand_jury — felony finding (gate: found_wound_pattern + found_stair_scene
#       + heard_apprentice)
#   +10 return_open_verdict — open verdict (gate: found_wound_pattern + heard_physician)
#   +5  return_misadventure — misadventure (gate: found_wound_pattern)
#   +0  return_natural_causes — ungated; Merton walks free
# Best single path:
#   croft_house: hear_physician (+5) → body_room: examine_body (+5) →
#   stair_passage: check_scene (+5) → counting_room: read_account_book (+5) →
#   widow_parlour: hear_widow (+5) → apprentice_room: hear_apprentice (+5) →
#   inquest_table: commit_to_grand_jury (+20) = 50.
#   max_score == reachable maximum (score-economy sound).
#
meta:
  id: croft_inquest_v1
  title: "The Croft Inquest"
  start: croft_house
  vars_init: { composure: 3 }
  flags_init: []
  max_score: 50

scenes:
  # ── Starting location: house entrance ─────────────────────────────────────
  - id: croft_house
    title: "Croft's House"
    variants:
      - when:
          - all_of:
              - has_flag: heard_widow
              - has_flag: heard_apprentice
        text: >
          The entrance hall of Croft's house. Both witnesses have been heard;
          the body and the counting room have been examined. The twelve jurors
          are seated in the downstairs hall and the clerk is ready.
    text: >
      The house stands on the market-side of Stoke Wentworth: stone-fronted,
      three storeys, a factor's modest prosperity. Constable Elmswood met you
      at the gate an hour after dawn and has held the premises since. The body
      has been laid in the downstairs parlour. Alice Croft, Edward's wife, is
      in the upper sitting room. Jack Finch, the apprentice who found the
      body, waits in the back kitchen. Dr. Stott of the town attended the
      body before you arrived; his note is on the hall table.
    choices:
      - id: hear_physician
        text: "Read Dr. Stott's note."
        conditions: [ { not_flag: heard_physician } ]
        effects:
          - set_flag: heard_physician
          - add_journal: "Stott's note is three lines and unambiguous: 'The wound to the left temple presents as a horizontal blow delivered from behind and to the left, at standing head-height. The angle and depth are inconsistent with a fall forward onto a stair edge. Death was instantaneous. I am available to give evidence at any hour.'"
          - inc_var: { name: score, by: 5 }
        next: croft_house
      - id: view_body
        text: "View the body in the parlour."
        next: body_room
      - id: examine_stairs
        text: "Check the stair passage before it is disturbed."
        next: stair_passage
      - id: speak_widow
        text: "Speak with Alice Croft upstairs."
        next: widow_parlour
      - id: speak_apprentice
        text: "Find Jack Finch in the back kitchen."
        next: apprentice_room
      - id: convene_inquest
        text: "Convene the inquest — the jurors are waiting."
        next: inquest_table

  # ── Evidence: the body ─────────────────────────────────────────────────────
  - id: body_room
    title: "The Parlour"
    text: >
      Edward Croft lies on the settle, covered with a sheet drawn up by
      Constable Elmswood. He is a man of fifty, broad-shouldered, grey at
      the temples. The sheet has not been touched since Stott's examination.
    choices:
      - id: examine_body
        text: "Examine the body and the wound."
        conditions: [ { not_flag: found_wound_pattern } ]
        effects:
          - set_flag: found_wound_pattern
          - add_journal: "The wound is a single deep contusion on the left temple, the skin broken. The blow came from behind and to the left — the angle only possible if the striker stood behind Croft and swung across their body. There is no bruising to the forehead, no torn skin on the palms or knuckles. No injury of a man who threw his hands out to break a fall. A man who falls forward on stone stairs does not take a single clean blow to the left temple. This wound was made by something held in a hand."
          - inc_var: { name: score, by: 5 }
        next: body_room
      - id: leave_parlour
        text: "Return to the entrance hall."
        next: croft_house

  # ── Evidence: stair passage ────────────────────────────────────────────────
  - id: stair_passage
    title: "The Stair Passage"
    text: >
      A stone-flagged passage connects the front hall to the back kitchen.
      The staircase rises on the left, its lower treads visible from here.
      Constable Elmswood has kept the household back from this part of the
      house since he arrived at dawn.
    choices:
      - id: check_scene
        text: "Examine the stairs and floor for blood."
        conditions: [ { not_flag: found_stair_scene } ]
        effects:
          - set_flag: found_stair_scene
          - add_journal: "There is no blood on the stair treads. None on the flagstones at the stair foot. The blood — a dark pool, already dried — is through the door to the left: the counting room, ten feet from the foot of the stairs. Edward Croft was not on the stairs when he was struck. He was at his desk, and whatever happened in that room, it did not begin or end on the staircase."
          - inc_var: { name: score, by: 5 }
        next: stair_passage
      - id: enter_counting_room
        text: "Open the counting-room door."
        next: counting_room
      - id: return_to_hall
        text: "Return to the entrance hall."
        next: croft_house

  # ── Evidence: counting room ────────────────────────────────────────────────
  - id: counting_room
    title: "The Counting Room"
    text: >
      A small room off the stair passage: a high writing desk, a locked
      chest, a shelf of ledgers in calfskin. The blood pool is here, dried
      on the flagstone beneath the desk. Two chairs have been drawn to either
      side — two men, sitting, talking — and one did not leave in peace.
    choices:
      - id: read_account_book
        text: "Read the open ledger on the desk."
        conditions: [ { not_flag: found_debt_note } ]
        effects:
          - set_flag: found_debt_note
          - add_journal: "The ledger is open to a wool account dated three weeks past: one hundred and eighty pounds, delivered wool clip, buyer D. Merton of Bridge Street. A margin note in Croft's hand reads: 'Payment due Michaelmas — now overdue — to be called in before week's end.' Merton owed Croft £180 and had not paid. Yesterday was the week's end."
          - inc_var: { name: score, by: 5 }
        next: counting_room
      - id: leave_counting_room
        text: "Return to the stair passage."
        next: stair_passage

  # ── Witness: the widow ─────────────────────────────────────────────────────
  - id: widow_parlour
    title: "Alice Croft"
    text: >
      Alice Croft sits by the upper window, composed for a woman who found
      her husband cold at dawn. She is dressed and has plainly thought about
      what she means to say.
    choices:
      - id: hear_widow
        text: "Take her account."
        conditions: [ { not_flag: heard_widow } ]
        effects:
          - set_flag: heard_widow
          - add_journal: "Alice Croft says: there was a visitor in the counting room after supper — she did not see who, only heard voices below. She went to bed at half-past nine and heard nothing in the night. She found her husband at the foot of the stairs this morning, already cold. He must have risen to check the house and lost his footing on the stairs. She is certain of it. She does not mention the name Merton."
          - inc_var: { name: score, by: 5 }
        next: widow_parlour
      - id: leave_widow
        text: "Leave her and go downstairs."
        next: croft_house

  # ── Witness: the apprentice ────────────────────────────────────────────────
  - id: apprentice_room
    title: "Jack Finch"
    # The skill_check is a TENSION BEAT, not a gate: both on_success and on_failure
    # award heard_apprentice and +5 score at choice level (so the validator can see
    # them). On success the apprentice speaks freely; on failure he hesitates — Alice
    # Croft moves overhead — but gives the same account. Route, gating, and score
    # ceiling are identical regardless of the roll (same class as bug_0334 fix).
    text: >
      Jack Finch is seventeen: steady hands, red-rimmed eyes. He has been in
      the house three years and knew the business well. He was the one who
      found the body at dawn and moved it to the parlour before he thought
      to send for the constable.
    choices:
      - id: hear_apprentice
        text: "Take his account of last night."
        conditions: [ { not_flag: heard_apprentice } ]
        effects:
          - set_flag: heard_apprentice
          - inc_var: { name: score, by: 5 }
        skill_check:
          skill: composure
          difficulty: 11
          on_success:
            - add_journal: "Jack Finch speaks without hesitation. Daniel Merton of Bridge Street came after supper; Jack let him in himself and showed him to the counting room. He heard raised voices through the door while he was fetching a candle from the kitchen. When he came back, Merton had gone and the counting-room door was shut. He assumed Mr. Croft had seen the visitor out. He found the body at dawn — on the counting-room floor, not the stairs. He gives this account plainly, as a fact, without embellishment."
            - goto: apprentice_room
          on_failure:
            - add_journal: "Jack Finch glances at the ceiling — Alice Croft moves overhead — and hesitates. But the facts come out, if slowly: Merton came after supper, Jack let him in, he heard raised voices. When he returned with the candle, Merton was gone and the door was shut. He found the body on the counting-room floor at dawn, not the stairs. He does not meet your eyes when he is done, but the account is given and it does not waver."
            - goto: apprentice_room
      - id: leave_apprentice
        text: "Leave him and return to the entrance hall."
        next: croft_house

  # ── Terminal: the inquest ──────────────────────────────────────────────────
  - id: inquest_table
    title: "The Inquest"
    text: >
      Twelve jurors sit in the downstairs hall. Constable Elmswood stands at
      the door. The clerk has his pen ready. You have examined the body, seen
      the scene, read the evidence, and heard the witnesses. The finding you
      return today will determine whether Edward Croft's death ends here as a
      household accident — or whether Daniel Merton's name goes before a
      grand jury.
    choices:
      - id: return_natural_causes
        text: "Return a finding of natural causes — death by misfortune."
        next: ending_natural
      - id: return_misadventure
        text: "Return a finding of misadventure — injury of unclear cause."
        conditions: [ { has_flag: found_wound_pattern } ]
        effects:
          - inc_var: { name: score, by: 5 }
        next: ending_misadventure
      - id: return_open_verdict
        text: "Return an open verdict — violent death, circumstances unresolved."
        conditions:
          - all_of:
              - has_flag: found_wound_pattern
              - has_flag: heard_physician
        effects:
          - inc_var: { name: score, by: 10 }
        next: ending_open
      - id: commit_to_grand_jury
        text: "Return a finding of felony — name Daniel Merton to the grand jury."
        conditions:
          - all_of:
              - has_flag: found_wound_pattern
              - has_flag: found_stair_scene
              - has_flag: heard_apprentice
        effects:
          - inc_var: { name: score, by: 20 }
        next: ending_committed
      - id: return_to_examine
        text: "Ask the constable for more time — there is more to find."
        next: croft_house

endings:
  - id: ending_natural
    title: "Natural Causes"
    text: >
      The clerk writes 'natural causes' in the inquest record and the jurors
      are dismissed before midday. Alice Croft thanks you at the gate.
      Daniel Merton, informed by letter, sends his condolences to the family
      and makes no mention of the overdue bond. The debt is never called in.
      Edward Croft's counting room passes to his son, who finds the ledger
      entry and spends two years in Chancery trying to recover what Merton
      owed. He does not succeed. Somewhere in the town, the man who left by
      the counting-room door in the dark is already sleeping easily.
  - id: ending_misadventure
    title: "Misadventure"
    text: >
      The clerk records a finding of misadventure — injury by accident, cause
      unclear. It is not wrong in every particular; the wound was real and not
      self-inflicted. But the finding names no one, and Daniel Merton walks
      the market street the following week as he always has. Jack Finch, who
      gave you the name, watches from across the street and says nothing. You
      have placed on the record that something was wrong; you could not, with
      what you had gathered, say who made it so.
  - id: ending_open
    title: "Open Verdict"
    text: >
      The clerk records an open verdict: death by violent means, cause
      established, circumstances unresolved. Dr. Stott's finding stands in
      the inquest record — the wound was not a fall injury. The file goes to
      the county court, where it sits available to any magistrate with cause
      to revisit it. You have not named Merton; the evidence, taken in
      isolation, does not reach that far. But you have ensured the medical
      truth survives on the record, and if the right witness comes forward
      later, the foundation is there to build from.
  - id: ending_committed
    title: "Committed for Felony"
    text: >
      The clerk writes Daniel Merton's name in the inquest record. The finding
      goes to the county assizes within the week: that Edward Croft came to
      his death by a felonious blow delivered by person known, and that
      Daniel Merton of Bridge Street is named to answer for it before the
      grand jury. The constable serves the warrant that same afternoon. At
      the trial, Jack Finch's testimony and Dr. Stott's note form the spine
      of the case; the ledger entry proving the unpaid bond stands as the
      stated motive. The jury at assizes deliberates three hours. Merton is
      transported. It is the kind of verdict that takes a complete chain of
      evidence — wound, scene, witness, motive — and the chain held because
      you collected every link before you called for the clerk's pen.
