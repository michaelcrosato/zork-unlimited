# The Clockwork Heist — a CYOA pack (Stage 1 format).
#
# A thief in a clockwork manor. Three endings: escape rich (the loot), get caught
# (force the vault and trip the alarm), or learn the truth (the hidden letter,
# reachable either through the vault or a secret crawlspace behind the great
# clock). The lockpick (found in the kitchen) is the heist's signature item: it
# gates BOTH routes to the truth — the vault's clockwork lock and the crawlspace
# strongbox — so the "truth" always sits behind a picked lock, true to the
# manor's motif ("yields only to a steady hand — never to force"). The crawlspace
# is a hidden scene (found by inspecting the clock) that complements the vault
# rather than pre-empting it: discovering it still sends you through the manor for
# the pick before it pays off, and once found it can be re-entered from the foyer.

meta:
  id: clockwork_heist_v1
  title: "The Clockwork Heist"
  start: foyer
  flags_init: []
  # `ticks` is the clock creeping toward the hour. Moving through the manor's
  # upstairs rooms (kitchen, gallery, study) advances it; the ground-floor foyer
  # is safe ground and does not. On the hour (ticks >= 4) the watchman the
  # steward's ledger warns of begins his patrol of the gallery — see `landing`.
  # The hour is tuned so a thorough vault route (kitchen for the pick, the study
  # for the ledger, then the crossing — about four ticks) arrives just as the
  # patrol begins, so the ledger is load-bearing, not a clue you only meet by
  # dawdling (blind-playtest finding, bug_0040 refining bug_0019).
  vars_init: { ticks: 0 }

scenes:
  - id: foyer
    title: "The Clockwork Foyer"
    text: >
      Moonlight pours through the manor's glass dome onto a thousand turning gears.
      A grand staircase rises into shadow; a low door leads off to the kitchens; and
      the great hall clock ticks against the far wall, vast as a coffin.
    # The namesake clock stands right here, so the foyer feels the same deadline the
    # gallery does — even though this safe ground floor never advances `ticks` itself.
    # Higher threshold first (first match wins), mirroring the gallery's escalation.
    # The ticks>=2 variant once said "your time in the manor is running short" — a blind
    # playtester (seed 17) flagged that this oversells a GLOBAL countdown the engine never
    # enforces (there is no run-out-of-time loss; the clock's only bite is the watchman it
    # wakes onto the gallery at the hour). The line now names that real consequence — the
    # house stirring awake at the chime — instead of an unkept timeout, honest about what
    # the clock actually does. Atmospheric only (no specific unseen clue is quoted, per the
    # bug_0058 plate-leak lesson); the ticks>=4 variant already names the watchman. No
    # flag/tick/route/gating/ending change (bug_0061).
    #
    # Once the panel behind the clock's pendulum is pried open (`found_passage`), the
    # foyer acknowledges the gaping crawlspace — a blind playtester (seed 29) flagged
    # that after prying the panel the room still read as a sealed wall, "vast as a
    # coffin," with no trace of the passage just opened. This is also a legibility
    # beat: a player who found the passage but has no lockpick sees the `enter_panel`
    # choice HIDDEN (it gates on the pick), so without this text the only on-screen
    # trace of the crawlspace is a journal line. The panel-aware variants mirror each
    # tick tier (found_passage paired with each threshold, first-match-wins), so the
    # acknowledgment survives the clock's escalation. Atmospheric/continuity only: no
    # flag/tick/route/gating/ending change, and the non-panel tiers are untouched
    # (bug_0063).
    variants:
      - when: [{ var_gte: { name: ticks, value: 4 } }, { has_flag: found_passage }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens; and
          behind the great clock's pendulum the panel you pried loose still gapes on the
          dark crawlspace. The clock has come round to the hour at last, its slow chime
          rolling through the gears vast as a coffin-lid falling — and somewhere up the
          stair, on the gallery landing, a watchman's tread answers it.
      - when: [{ var_gte: { name: ticks, value: 4 } }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens. The
          great hall clock has come round to the hour at last, its slow chime rolling
          through the gears vast as a coffin-lid falling — and somewhere up the stair, on
          the gallery landing, a watchman's tread answers it.
      - when: [{ var_gte: { name: ticks, value: 2 } }, { has_flag: found_passage }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens; and
          the great hall clock grinds toward the hour against the far wall, the panel you
          pried loose still open behind its pendulum on the dark crawlspace. A sleeping
          house keeps its peace only until the chime — best be done before the hour stirs
          the manor awake.
      - when: [{ var_gte: { name: ticks, value: 2 } }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens; and
          the great hall clock grinds toward the hour against the far wall, vast as a
          coffin — and a sleeping house keeps its peace only until the chime. Best be
          done upstairs before the hour stirs the manor awake.
      - when: [{ has_flag: found_passage }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens; and
          the great hall clock ticks against the far wall, vast as a coffin — and behind
          its pendulum the panel you pried loose still stands open on the dark crawlspace.
    choices:
      - id: inspect_clock
        text: "Examine the great clock."
        conditions: [{ not_flag: saw_clock }]
        effects:
          - set_flag: saw_clock
          - add_journal: "Behind the clock's pendulum runs a faint seam — a hidden panel?"
        next: foyer
      - id: pry_panel
        text: "Pry open the panel behind the clock."
        conditions: [{ has_flag: saw_clock }, { not_flag: found_passage }]
        effects:
          - set_flag: found_passage
          - add_journal: "The panel swings back on a dusty crawlspace."
        next: crawlspace
      - id: enter_panel
        # Re-entry once the panel is open AND you hold the pick the strongbox needs.
        # Gating on the lockpick keeps the crawlspace reachable after you leave to
        # fetch it, while giving a tool-less player no reason (or way) to bounce
        # back into a locked box — the nudge already sent them off to find one.
        text: "Slip back through the open panel behind the clock."
        conditions: [{ has_flag: found_passage }, { has_item: lockpick }]
        next: crawlspace
      - id: climb_stairs
        text: "Climb the grand staircase."
        next: landing
      - id: kitchens
        text: "Slip through the door to the kitchens."
        next: kitchen

  - id: kitchen
    title: "The Cold Kitchen"
    on_enter:
      - inc_var: { name: ticks, by: 1 }
    text: >
      Copper pots hang in rows above a banked hearth. By the dumbwaiter, a servant
      has left a slim roll of lockpicks.
    variants:
      - when: [{ has_item: lockpick }]
        text: >
          Copper pots hang in rows above a banked hearth. By the dumbwaiter, the
          spot where the lockpicks lay is bare — the slim roll is in your pocket now.
    choices:
      - id: take_pick
        text: "Pocket the lockpicks."
        conditions: [{ not_item: lockpick }]
        effects:
          - add_item: lockpick
          - add_journal: "Lockpicks — exactly what a clockwork vault deserves."
        next: kitchen
      - id: dumbwaiter
        # The dumbwaiter is the kitchen's direct line up to the gallery (saving the
        # trip back down through the foyer to the grand stair). A blind playtester
        # (seed 101) flagged that its old "Ride the dumbwaiter up" framing read like a
        # clever stealth bypass, yet it lands you on the exact same patrolled gallery
        # the stair does — an over-promise the room never pays off. The fix is honest
        # reframing only: the choice text + a narration name it the cramped servants'
        # lift, a quieter and more direct way up that leaves you no closer to the vault
        # than the steps would. No route/tick/gating change — it still goes to `landing`
        # (which charges the same gallery tick the stair does), so the watchman/ledger
        # tuning (bug_0019/0040/0042/0043) is untouched (bug_0046).
        text: "Take the servants' dumbwaiter straight up to the gallery."
        effects:
          - narrate: "Rather than doubling back to the foyer's grand stair, you fold yourself into the cramped servants' lift and haul on its complaining rope. The box grinds up the shaft and you climb out onto the gallery — the very floor the staircase serves. A quieter way up, and a more direct one from the kitchens, but it leaves you no closer to the vault than the open steps would."
        next: landing
      - id: back_foyer
        text: "Return to the foyer."
        next: foyer

  - id: landing
    title: "The Automaton Gallery"
    on_enter:
      - inc_var: { name: ticks, by: 1 }
    text: >
      A long gallery lined with frozen automata, their glass eyes following you. The
      vault door broods at the far end. A study stands ajar to one side.
    # The gallery is where the steward's ledger says a guard walks "on the hour".
    # As ticks climb the prose builds the deadline (first match wins, so the
    # higher threshold is listed first). The ticks>=2 variant likewise dropped the
    # vague "your time in the manor is running short" for a threat pointed at the real
    # mechanic: this gallery is the floor the watchman will walk at the hour, so standing
    # here when it chimes is the actual danger (blind-playtest finding, bug_0061).
    variants:
      - when: [{ var_gte: { name: ticks, value: 4 } }]
        text: >
          A long gallery lined with frozen automata, their glass eyes following you.
          The vault door broods at the far end — but a watchman's lantern now sweeps
          the gallery, the hourly patrol the steward's ledger warned of. The long
          crossing to the vault runs right under his beam. The study still stands
          ajar to one side, and the stair drops safely back to the foyer.
      - when: [{ var_gte: { name: ticks, value: 2 } }]
        text: >
          A long gallery lined with frozen automata, their glass eyes following you.
          The vault door broods at the far end. Somewhere a great mechanism grinds
          toward the hour, and you sense this long gallery will be no place to be caught
          standing when it chimes. A study stands ajar to one side.
    choices:
      - id: enter_study
        text: "Step into the study."
        next: study
      - id: approach_vault
        # Safe crossing: before the hour (ticks <= 3), OR you read the ledger and
        # know the watchman's rounds — the payoff for the study clue. The hour is
        # tuned (>= 4) so a thorough vault route arrives just as the patrol starts:
        # the reader crosses on his rounds here, the un-read player gets the gamble.
        text: "Cross the gallery to the vault door."
        conditions: [{ any_of: [{ var_lte: { name: ticks, value: 3 } }, { has_flag: read_ledger }] }]
        next: vault_door
      - id: cross_to_vault_blind
        # On the hour and you don't know his rounds: crossing is an open gamble,
        # and the prose has already shown you the patrol. An informed risk, not a
        # gotcha — the safe study/foyer exits remain.
        text: "Chance the long crossing to the vault while the guard patrols."
        conditions: [{ var_gte: { name: ticks, value: 4 } }, { not_flag: read_ledger }]
        next: ending_patrol
      - id: back_down
        text: "Go back down to the foyer."
        next: foyer

  - id: study
    title: "The Steward's Study"
    on_enter:
      - inc_var: { name: ticks, by: 1 }
      # The brass wall-plate ("yields only to a steady hand — never to force") hangs
      # HERE in the study, so simply entering this room is when the thief reads its
      # warning. Record that so the vault door only "echoes" the plate to a player who
      # has actually seen it — a no-study route up the grand stair must not quote a
      # warning the player never read (blind-playtest finding, bug_0058).
      - set_flag: saw_plate
    text: >
      Shelved ledgers, a cold lamp, and a brass wall-plate engraved: "The vault
      yields only to a steady hand — never to force." One ledger lies open on the
      desk — the steward's daily reckoning, its last page ruled into the household's
      hours: when the staff retire, and when the watch walks its rounds.
    # The open ledger is the heist's load-bearing clue (bug_0040): reading it is what
    # lets you time the watchman's crossing on the hour. But a fresh blind playtester
    # (seed 211) found its value "subtle" — the study named "Ledgers" only as ambient
    # furniture and the wall-plate speaks to the LOCK, so nothing told a first-timer
    # the open ledger logs the WATCH before they committed to reading it, and a player
    # could leave the study having skipped its whole point. The fix is legibility only:
    # the scene text now draws the eye to the one open ledger and names what its last
    # page records (the watch's rounds), and the read choice says so — giving the clue
    # an honest pull and pre-seeding the gallery's later "the hourly patrol the
    # steward's ledger warned of" callback. No flag/tick/route/gating/ending change;
    # the read_ledger payoff (journal + safe-crossing gate) is untouched (bug_0053).
    choices:
      - id: read_ledger
        text: "Read the open ledger's account of the watch's rounds."
        conditions: [{ not_flag: read_ledger }]
        effects:
          - set_flag: read_ledger
          - add_journal: "The ledger notes a guard who walks the gallery on the hour. Now that you know his rounds, you could time a crossing he'd never catch."
        next: study
      - id: leave_study
        text: "Return to the gallery."
        next: landing

  - id: vault_door
    title: "The Vault Door"
    # The base text is the PLATE-NAIVE fallback: a thief who came straight up the
    # grand stair to the vault never passed through the study, so cannot "echo" the
    # steward's brass plate. It still telegraphs pick-don't-force, but from the lock's
    # own patient, fastidious feel rather than by quoting a warning the player has not
    # read. A blind playtester (seed 53) hit the leak on the climb_stairs→approach_vault
    # route: the door "echoed" a brass-plate warning they had never seen. The fix gates
    # every brass-plate reference on `saw_plate` (set on entering the study) — see the
    # `saw_plate` variant below and the reworded `study_lock` narration (bug_0058).
    text: >
      The vault's clockwork lock ticks under your fingers — a hundred tiny tumblers,
      each finer than a hair. This is plainly no door for a crowbar: it has the
      patient, fastidious look of a thing that will yield only to a steady, coaxing
      hand, and never to force.
    # Reaching the door at/after the hour (ticks >= 4) is only possible for a
    # ledger reader — a no-ledger player past the hour gets the blind gamble, never
    # this safe crossing (see `landing`). So this variant fires exactly when the
    # player has just timed the patrolled crossing the ledger promised, and gives
    # that signature beat the on-screen payoff it lacked: the careful player now
    # *feels* the clock at its tensest moment instead of strolling across in
    # silence (blind-playtest finding — the deadline never bit careful play).
    # (read_ledger implies a study visit, so quoting the brass plate here is sound.)
    variants:
      - when: [{ var_gte: { name: ticks, value: 4 } }, { has_flag: read_ledger }]
        text: >
          You wait, pressed to the automata, until the watchman's lantern sweeps
          to the gallery's far end — then cross in its wake and crouch at the vault
          while his tread recedes, just as the ledger swore you could. The clockwork
          lock ticks under your fingers, a hundred tiny tumblers. The brass plate's
          warning echoes: force will not open this.
      # Plate-aware: you stood in the study and read the steward's brass plate, so its
      # warning is yours to echo at the lock. Below the ticks>=4 patrol case, above the
      # plate-naive base (first match wins), so a study-visitor before the hour gets it.
      - when: [{ has_flag: saw_plate }]
        text: >
          The vault's clockwork lock ticks under your fingers — a hundred tiny tumblers.
          The brass plate's warning echoes: force will not open this.
    choices:
      - id: pick_lock
        text: "Pick the lock with the lockpicks."
        conditions: [{ has_item: lockpick }, { not_flag: alarm }]
        effects:
          - set_flag: vault_open
          - add_journal: "The tumblers fall, one by one. The vault sighs open."
        next: vault
      - id: study_lock
        text: "Study the clockwork lock for a way through."
        conditions: [{ not_item: lockpick }, { not_flag: alarm }]
        effects:
          # No brass-plate reference here: this nudge can fire on a no-study route, so
          # it learns "force won't open it" from the lock's own feel, not from a plate
          # the player may never have read (bug_0058). Keeps tool/instrument/steady-hand.
          - narrate: "A hundred tumblers, each finer than a hair — this is a lock to coax, not to break. Your bare fingers find no purchase, and you can feel it in the mechanism: force will only wake the house. You need a slender tool and a steady hand. Better search the manor for the right instrument before you try the door again."
        next: landing
      - id: force_door
        text: "Force the door with your shoulder."
        effects:
          - set_flag: alarm
          - add_journal: "Steel shrieks — and somewhere a bell begins to clang."
        next: ending_caught
      - id: retreat
        text: "Back away to the gallery."
        next: landing

  - id: vault
    title: "Inside the Vault"
    text: >
      Stacked gold gleams on iron shelves. Apart from it all, on a velvet cushion,
      lies a single sealed letter addressed to no one — laid out in plain sight, as
      though its writer meant whoever cracked the vault to find it here among the gold.
    # The loot room is the one beat the gold route used to reach in clock-silence — a
    # blind playtester (seed 91) flagged that the marquee deadline "never bites" the
    # player who beelines for the gold, since the watchman only walks the gallery and
    # an efficient thief is in and out before the hour. So the room itself now feels
    # the clock the rest of the manor drums up: the fast thief is warned to grab and
    # go before the chime, and the careful ledger-reader (the only player who can be
    # here at/after the hour — see `landing`) feels the watchman patrolling the only
    # way out. Higher threshold first (first match wins), as elsewhere. Reactive text
    # only: the gold/letter framing and every choice/ending are unchanged (bug_0043).
    variants:
      - when: [{ var_gte: { name: ticks, value: 4 } }]
        text: >
          Stacked gold gleams on iron shelves. Apart from it all, on a velvet cushion,
          lies a single sealed letter addressed to no one — laid out in plain sight, as
          though its writer meant whoever cracked the vault to find it here among the
          gold. Beyond the door the watchman's tread passes and returns on his rounds;
          you came in behind his lantern, and the ledger swears you can go back out the
          same way — but only while his rounds are still fresh in your head. Whatever
          you mean to carry off, choose it now.
      - when: [{ var_gte: { name: ticks, value: 2 } }]
        text: >
          Stacked gold gleams on iron shelves. Apart from it all, on a velvet cushion,
          lies a single sealed letter addressed to no one — laid out in plain sight, as
          though its writer meant whoever cracked the vault to find it here among the
          gold. Past the gallery the great clock grinds toward the hour, and you know
          what the hour wakes: fill your hands and be gone before the chime sets the
          watchman walking.
    choices:
      - id: grab_gold
        text: "Fill your pockets with gold and run."
        effects:
          - add_item: gold
          - add_journal: "Heavy, cold, and yours."
        next: ending_rich
      - id: take_letter
        text: "Take the sealed letter instead."
        # The vault copy is the one "laid out in plain sight": flag it so the truth
        # ending can name how you found it (the displayed copy) rather than printing
        # one epilogue that fits only the other route (blind-playtest finding,
        # bug_0051 — the two oppositely-framed letters used to share one text).
        effects:
          - add_item: letter
          - set_flag: has_letter
          - set_flag: letter_displayed
        next: ending_truth

  - id: crawlspace
    title: "The Crawlspace"
    text: >
      Dust and cobweb and the smell of old brass. The passage runs behind the vault
      to a forgotten iron strongbox, its lid locked fast — and folded inside it, you
      are certain, a sealed letter in the steward's own hand: not laid out for show
      like a thing meant to be found, but hidden away here in the dark, apart from the
      gold, where he meant no eye ever to fall on it.
    choices:
      - id: open_strongbox
        text: "Pick the strongbox's lock with the lockpicks."
        conditions: [{ has_item: lockpick }]
        # The crawlspace copy is the one "hidden away in the dark": its own flag, so
        # the truth ending's hidden-copy epilogue fires for this route (bug_0051).
        effects:
          - add_item: letter
          - set_flag: has_letter
          - set_flag: letter_hidden
        next: ending_truth
      - id: study_strongbox
        # No-pick nudge: the manor's "never to force" rule holds even here — the
        # box won't yield to brute force, so this routes OUT to the foyer (a real
        # scene change = progress, never a self-loop) to go find the tool.
        text: "Try the rusted strongbox."
        conditions: [{ not_item: lockpick }]
        effects:
          - narrate: "The lid will not give. The lock is rusted but solid — no hinge to lever, no gap to force, and forcing would only ring through the still house. This wants the same slender tool the vault does: a pick, a probe, something to coax the lock. Better search the manor for it before you crawl back here."
        next: foyer
      - id: back_crawl
        text: "Crawl back out to the foyer."
        next: foyer

endings:
  - id: ending_rich
    title: "Rich"
    text: >
      You melt into the night with your pockets full of gold. By dawn you are three
      towns away, and the clockwork manor is just a story you will never tell.
  - id: ending_caught
    title: "Caught"
    text: >
      The alarm bell brings the house awake. Lanterns, shouts, the gallery's
      automata grinding to life around you. There is nowhere in the manor to run.
  - id: ending_patrol
    title: "Caught on the Hour"
    text: >
      Halfway across the gallery the watchman's lantern swings round and pins you
      against the automata. "On the hour, every hour," he says, almost kindly, as
      his shout brings the sleeping house awake. The steward's own ledger kept his
      rounds — if only you had stopped to read it. The cell is cold, and somewhere
      the great clock keeps ticking.
  - id: ending_truth
    title: "The Truth"
    # Two routes reach this ending carrying two oppositely-framed letters: the vault
    # copy "laid out in plain sight... meant to be found", the crawlspace copy "hidden
    # away in the dark... where he meant no eye to fall". A fresh blind playtester
    # (seed 137) flagged that one shared epilogue contradicts whichever route you just
    # played. With reactive ending `variants` (engine: endingText, mirrors scene
    # variants) the epilogue now names the copy you carried — the steward's paired
    # confession honoured at the payoff, not just at pickup (bug_0041 → bug_0051). The
    # base text is the route-neutral fallback for any future path that sets neither flag.
    variants:
      - when: [{ has_flag: letter_displayed }]
        text: >
          You slip out into the dark with the letter still sealed, and break it open by
          moonlight only once the manor's walls are well behind you. It is the steward's
          confession — the copy he left lying open among his gold, as though he wanted
          the one thief good enough to crack his lock to know. The manor's fortune was
          stolen, every coin of it, from people like you. You came to rob this house and
          could have vanished rich on its hoard; instead you carry away the truth he meant
          to be found. Some things are worth more than escaping rich.
      - when: [{ has_flag: letter_hidden }]
        text: >
          You slip out into the dark with the letter still sealed, and break it open by
          moonlight only once the manor's walls are well behind you. It is the steward's
          confession — the copy he hid in the dark behind the vault, where he meant no eye
          ever to fall on it. The manor's fortune was stolen, every coin of it, from people
          like you. You came to rob this house and could have vanished rich on its hoard;
          instead you carry away the secret he could not bring himself to burn. Some things
          are worth more than escaping rich.
    text: >
      You slip out into the dark with the letter still sealed, and break it open by
      moonlight only once the manor's walls are well behind you. It is the steward's
      confession — the manor's fortune was stolen, every coin of it, from people like
      you. You came to rob this house and could have vanished rich on its hoard;
      instead you carry away nothing but the truth. Some things are worth more than
      escaping rich.
