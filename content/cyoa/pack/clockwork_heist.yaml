# The Clockwork Heist — a CYOA pack (Stage 1 format).
#
# A thief in a clockwork manor. Three endings: escape rich (the loot), get caught
# (force the vault and trip the alarm), or learn the truth (the hidden letter,
# reachable either through the vault or a secret crawlspace behind the great
# clock). The lockpick (found in the kitchen) is the heist's signature item: it
# gates BOTH routes to the truth — the vault's clockwork lock and the crawlspace
# strongbox — so the "truth" always sits behind a picked lock, true to the
# manor's motif ("yields only to a steady hand — never to force"). The crawlspace
# is a hidden scene (found by inspecting the clock) that complements the vault
# rather than pre-empting it: discovering it still sends you through the manor for
# the pick before it pays off, and once found it can be re-entered from the foyer.

meta:
  id: clockwork_heist_v1
  title: "The Clockwork Heist"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Clockmaker's Ward"
    quest: "steal or expose the clockwork manor secret"
    role: "city thief"
    connection: "Charterhaven's underworld uses the manor as a proving ground for thieves who can move through court machinery."
  start: foyer
  flags_init: []
  # `ticks` is the clock creeping toward the hour. Moving through the manor's
  # upstairs rooms (kitchen, gallery, study) advances it; the ground-floor foyer
  # is safe ground and does not. On the hour (ticks >= 4) the watchman the
  # steward's ledger warns of begins his patrol of the gallery — see `landing`.
  # The hour is tuned so a thorough vault route (kitchen for the pick, the study
  # for the ledger, then the crossing — about four ticks) arrives just as the
  # patrol begins, so the ledger is load-bearing, not a clue you only meet by
  # dawdling (blind-playtest finding, bug_0040 refining bug_0019).
  # `guile` (value 3) is the d20 skill rolled by the single skill-checked choice in this
  # pack — `slip_out_quiet` on the kitchen scene (below), where withdrawing through the
  # dark service room without rattling its hanging copper invites a roll for a thief's
  # quiet hands. CYOA skill checks are now first-class (the shared resolveSkillCheck d20 +
  # skill var vs difficulty), but this beat is a TENSION beat, not a gate: its on_success
  # and on_failure both route to the SAME scene (foyer) — the very safe ground the
  # kitchen's own `back_foyer` choice leads to, the hub the thief circles back to anyway —
  # differing solely in NARRATION (a soundless withdrawal vs a heart-stopping near-miss
  # that still settles into silence). No route, ending, score award, tick, quest_stage, or
  # reactive variant turns on the outcome, and the destination foyer's on_enter advances no
  # tick (it only re-seats the `infiltrating` quest stage every return, as it already does
  # on any foyer arrival — see foyer), so a success and a failure leave IDENTICAL
  # BFS-fingerprinted state (only the append-only journal differs, which stateKey excludes).
  # The exhaustive every-ending-reachable and score-economy proofs therefore stay sound
  # under their single seeded roll per step: whichever way the seed rolls, the search reaches
  # the foyer all the same. Difficulty 12 is beatable on a mid roll (d20 9 + guile 3 = 12),
  # well under the 20 + 3 = 23 ceiling — a real swing, never luck-gating the story. Sits
  # alongside `ticks`; nothing is gated on `guile`, and no condition/next/ending/quest_stage/
  # deadline/tick is touched.
  vars_init: { ticks: 0, guile: 3 }
  # The heist's SCORE ceiling — a thief's scorecard, in the conventional `score` var
  # (tracked by `inc_var` awards on the beats below; CYOA scoring is first-class —
  # `meta.max_score` + the runner's Zork-style "[Your score has gone up…]" feedback,
  # same chrome as parser/RPG). A fresh blind playtester (seed 7, report
  # blind-tester/reports/20260622T200812Z_clockwork_heist_seed7.md §5 B1) reached
  # ending_truth through the crawlspace at 20/45 and called out the contradiction:
  # the ending says truth is worth more than escaping rich, while the scoreboard said
  # the moral route was a poor solve. The score now values satisfying completions, not
  # only the vault job. The awards:
  #   • read the ledger (intel)              +10 — `read_ledger`, one-shot
  #   • crack the clockwork vault (feat)     +15 — `pick_lock`, one-shot terminal path
  #   • carry off the gold (rich ending)     +20 — `grab_gold` -> 45 with ledger+vault
  #   • carry the displayed confession       +20 — `take_letter` -> 45 with ledger+vault
  #   • carry the hidden confession          +45 if no ledger, +35 if ledger already scored
  # The hidden-confession split keeps both crawlspace truth routes at the declared cap
  # without overflowing: no-ledger crawlspace truth is 45/45; ledger+crawlspace truth is
  # 10+35=45/45; vault truth and rich remain 10+15+20=45/45. Every score award remains
  # one-shot and terminal-guarded, so the reachable max equals max_score EXACTLY and no
  # path farms or exceeds the cap. Sits alongside `ticks`/`deadline`; no route, ending,
  # quest stage, deadline, or tick gate turns on `score`.
  max_score: 45
  # The clock's teeth — the namesake mechanic, finally made real. A fresh blind
  # playtester (seed 7, ai-runs/2026-06-01T21-00-24-111Z/playtest.md §4/§5/§6) reached
  # all endings, rated the pack 5/5 clarity, and flagged ONE thing in three sections:
  # the ticking clock is the LOUDEST mechanic ("be gone before the chime"), yet `ticks`
  # was never enforced — a Chekhov's gun, urgency text writing a check the engine never
  # cashed. bug_0061 made that text honest (it points the urgency at the house/watchman
  # waking at the hour, not a phantom global timeout), but the warning still had no
  # consequence of its own. This gives it a real, if distant, bite via the engine's
  # `checkWin` deadline (§8.4.5): linger long enough — ticks >= 10 — and the hour fully
  # turns, the woken house closes in, and you end at `ending_overstayed`.
  #
  # Tuned GENEROUS on purpose, so it never punishes honest play, only aimless circling:
  # the efficient vault route is ~4 ticks; a maximally thorough first-timer (explore
  # upstairs, poke the vault before finding the pick, backtrack for it, return) wins at
  # ticks 6 (verified live, seed 7); and the existing patrol-deadline regression
  # (clockwork_guard_patrol_deadline) deliberately drives legitimate dawdle routes to
  # ticks 7 at the gallery and treats them as still-playable. So 10 fires ONLY on
  # genuine aimless wandering of the patrolled upstairs — never on the thorough
  # exploration the same playtest asked for MORE of. ticks advance only upstairs
  # (kitchen, gallery, study), so this is a clock, not a global move counter: the
  # crawlspace/foyer "stealth" route stays at low ticks and is never threatened, which
  # is right — that route slips past the clock entirely. (bug_0079.)
  deadline:
    when: [{ var_gte: { name: ticks, value: 10 } }]
    ending: ending_overstayed

scenes:
  - id: foyer
    title: "The Clockwork Foyer"
    text: >
      Moonlight pours through the manor's glass dome onto a thousand turning gears.
      A grand staircase rises into shadow; a low door leads off to the kitchens; and
      the great hall clock ticks against the far wall, vast as a coffin.
    # The heist's one quest, `the_heist`, tracks the thief's progression through the
    # job as named stages (core DSL questStage, §6). The foyer is the START scene, so
    # this on_enter fires at game start — the moment the thief is inside the manor — and
    # opens the quest at `infiltrating`. The later milestones are set as the thief earns
    # them: `ledger_read` when the steward's ledger is read (study), and `vaulted` when
    # the clockwork vault is cracked (vault door). The foyer is safe ground the thief
    # circles back to, so this on_enter RE-FIRES on every return and re-opens the quest
    # at `infiltrating`; that is harmless here, because the one reactive read of this
    # quest is OF the `infiltrating` stage on this same foyer (the panel-naive early-job
    # variant below), so the foyer is always self-consistent with what it sets, and the
    # later stages are job milestones, not a strict ratchet. Sits alongside the existing
    # flags/ticks; no choice/flag/tick/route/gating/ending/deadline change.
    on_enter:
      - set_quest_stage: { quest: the_heist, stage: infiltrating }
    # The namesake clock stands right here, so the foyer feels the same deadline the
    # gallery does — even though this safe ground floor never advances `ticks` itself.
    # Higher threshold first (first match wins), mirroring the gallery's escalation.
    # The ticks>=2 variant once said "your time in the manor is running short" — a blind
    # playtester (seed 17) flagged that this oversells a GLOBAL countdown the engine never
    # enforces (there is no run-out-of-time loss; the clock's only bite is the watchman it
    # wakes onto the gallery at the hour). The line now names that real consequence — the
    # house stirring awake at the chime — instead of an unkept timeout, honest about what
    # the clock actually does. Atmospheric only (no specific unseen clue is quoted, per the
    # bug_0058 plate-leak lesson); the ticks>=4 variant already names the watchman. No
    # flag/tick/route/gating/ending change (bug_0061).
    #
    # Once the panel behind the clock's pendulum is pried open (`found_passage`), the
    # foyer acknowledges the gaping crawlspace — a blind playtester (seed 29) flagged
    # that after prying the panel the room still read as a sealed wall, "vast as a
    # coffin," with no trace of the passage just opened. This is also a legibility
    # beat: a player who found the passage but has no lockpick sees the `enter_panel`
    # choice HIDDEN (it gates on the pick), so without this text the only on-screen
    # trace of the crawlspace is a journal line. The panel-aware variants mirror each
    # tick tier (found_passage paired with each threshold, first-match-wins), so the
    # acknowledgment survives the clock's escalation. Atmospheric/continuity only: no
    # flag/tick/route/gating/ending change, and the non-panel tiers are untouched
    # (bug_0063).
    # The ticks>=7 tier is the deadline's missing middle (bug_0082). bug_0079 gave
    # the clock real teeth — linger to ticks>=10 and `ending_overstayed` fires — but
    # every room's reactive prose topped out at the ticks>=4 "the hour has come round"
    # tier, so a lingering player saw the SAME line at ticks 4 through 9 and then died
    # at 10 with no mounting dread. A fresh blind playtester (seed 13, ai-runs/
    # 2026-06-01T21-46-13-894Z/playtest.md §5) caught exactly this: the warning prose
    # "plateaus after the chime at tick 4 and stops escalating," so the urgency
    # "overpromises relative to what the clock mechanically enforces" and "a player
    # can't tell how close the real deadline is." This tier bridges the gap: at the
    # safe-ground foyer (the namesake-clock hub, the only entrance to the kitchen
    # tick-source) the house is now shown ROUSING IN EARNEST — the watchman's tread no
    # longer alone, lamps moving on the landings — escalating toward the ticks>=10
    # ending's full waking ("the watchman's tread no longer alone but answered now by
    # others"). Content-only reactive variants, higher threshold first (first match
    # wins), paired with found_passage like the lower tiers. No choice/flag/tick/gate/
    # ending change; the foyer never advances ticks and its choices are untouched.
    variants:
      - when: [{ var_gte: { name: ticks, value: 7 } }, { has_flag: found_passage }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens; and
          behind the great clock's pendulum the panel you pried loose still gapes on the
          dark crawlspace. The hour chimed a while ago, and the house no longer merely
          stirs: lamps are moving on the upper landings, and the watchman's tread no
          longer walks alone — other feet answer it now, room to room. You have lingered
          too long; the great clock at the wall, vast as a coffin, has only a few beats
          left to give before the manor stands fully awake.
      - when: [{ var_gte: { name: ticks, value: 7 } }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens. The
          hour chimed a while ago, and the house no longer merely stirs: lamps are moving
          on the upper landings, and the watchman's tread no longer walks alone — other
          feet answer it now, room to room. You have lingered too long; the great clock
          at the wall, vast as a coffin, has only a few beats left to give before the
          manor stands fully awake.
      - when: [{ var_gte: { name: ticks, value: 4 } }, { has_flag: found_passage }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens; and
          behind the great clock's pendulum the panel you pried loose still gapes on the
          dark crawlspace. The clock has come round to the hour at last, its slow chime
          rolling through the gears vast as a coffin-lid falling — and somewhere up the
          stair, on the gallery landing, a watchman's tread answers it.
      - when: [{ var_gte: { name: ticks, value: 4 } }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens. The
          great hall clock has come round to the hour at last, its slow chime rolling
          through the gears vast as a coffin-lid falling — and somewhere up the stair, on
          the gallery landing, a watchman's tread answers it.
      - when: [{ var_gte: { name: ticks, value: 2 } }, { has_flag: found_passage }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens; and
          the great hall clock grinds toward the hour against the far wall, the panel you
          pried loose still open behind its pendulum on the dark crawlspace. A sleeping
          house keeps its peace only until the chime — best be done before the hour stirs
          the manor awake.
      - when: [{ var_gte: { name: ticks, value: 2 } }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens; and
          the great hall clock grinds toward the hour against the far wall, vast as a
          coffin — and a sleeping house keeps its peace only until the chime. Best be
          done upstairs before the hour stirs the manor awake.
      - when: [{ has_flag: found_passage }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens; and
          the great hall clock ticks against the far wall, vast as a coffin — and behind
          its pendulum the panel you pried loose still stands open on the dark crawlspace.
      # The quest's one reactive read (`the_heist` at `infiltrating`): the early-job foyer,
      # AFTER the thief has examined the clock and found the seam (saw_clock) but BEFORE the
      # panel is pried (not_flag found_passage). Declared LAST among the foyer's variants and
      # guarded by `not_flag: found_passage`, so it can never shadow the clock tiers (all of
      # which sit above it and win first when ticks>=2) nor the found-passage tiers (it cannot
      # match once the panel is open). It is reachable as displayed text: `inspect_clock` is
      # offered at the start (its only gate, not_flag saw_clock, holds at the start), it sets
      # saw_clock and returns to the foyer — whose on_enter re-opens the quest at infiltrating
      # — and on that re-display ticks are still 0 and the panel unpried, so every earlier
      # variant fails and this one shows (bug_0145 CYOA variant-liveness). The base `text`
      # remains the true opening, shown at turn 0 before the clock is examined. Atmospheric/
      # legibility only, matching the foyer voice (glass dome, turning gears, the coffin-clock);
      # no choice/flag/tick/route/gating/ending/deadline change.
      - when: [{ quest_stage: { quest: the_heist, stage: infiltrating } }, { has_flag: saw_clock }, { not_flag: found_passage }]
        text: >
          Moonlight pours through the manor's glass dome onto a thousand turning gears.
          A grand staircase rises into shadow; a low door leads off to the kitchens; and
          the great hall clock ticks against the far wall, vast as a coffin. The job is
          only begun, and the house still keeps its sleeping peace — but you have the
          measure of it now: behind the clock's slow pendulum runs the faint seam you
          marked, a hidden panel waiting on a steadier moment to be pried.
    choices:
      - id: inspect_clock
        text: "Examine the great clock."
        conditions: [{ not_flag: saw_clock }]
        effects:
          - set_flag: saw_clock
          - add_journal: "Behind the clock's pendulum runs a faint seam — a hidden panel?"
        next: foyer
      - id: pry_panel
        text: "Pry open the panel behind the clock."
        conditions: [{ has_flag: saw_clock }, { not_flag: found_passage }]
        effects:
          - set_flag: found_passage
          - add_journal: "The panel swings back on a dusty crawlspace."
        next: crawlspace
      - id: enter_panel
        # Re-entry once the panel is open AND you hold the pick the strongbox needs.
        # Gating on the lockpick keeps the crawlspace reachable after you leave to
        # fetch it, while giving a tool-less player no reason (or way) to bounce
        # back into a locked box — the nudge already sent them off to find one.
        text: "Slip back through the open panel behind the clock."
        conditions: [{ has_flag: found_passage }, { has_item: lockpick }]
        next: crawlspace
      - id: climb_stairs
        text: "Climb the grand staircase."
        next: landing
      - id: kitchens
        text: "Slip through the door to the kitchens."
        next: kitchen

  - id: kitchen
    title: "The Cold Kitchen"
    on_enter:
      - inc_var: { name: ticks, by: 1 }
    text: >
      Copper pots hang in rows above a banked hearth. By the dumbwaiter, a servant
      has left a slim roll of lockpicks.
    # The kitchen CHARGES a tick on entry (on_enter above), yet it was the last
    # tick-advancing room the clockwork-deadline arc never made reactive: the gallery,
    # vault door, loot room (bug_0019/0040/0042/0043), crawlspace (bug_0064), and study
    # (bug_0068) all feel the hour, but the kitchen stayed clock-silent — bug_0068 even
    # mislabelled the study the "LAST" such room, overlooking this one. A fresh blind
    # playtester (seed 59) caught it directly: returning to the kitchen with the patrol
    # already walking upstairs (ticks high), the Cold Kitchen text was unchanged and
    # "gave no hint the clock had advanced ... the one spot that feels clock-blind."
    # The fix is the same content-only `variants` treatment, now COMPOSED with the
    # existing lockpick-taken state (mirroring the foyer's found_passage × tick pairing):
    # each tick tier gets a pick-present and a pick-taken wording, first-match-wins,
    # higher threshold first. The clock is named ONLY by the manor-wide motif (the gears
    # carrying through the walls, the chime) — never by the watchman, ledger, or plate
    # (the bug_0058 leak lesson), since a player can stand in this downstairs service room
    # having met none of them; and the >=4 line speaks of the house overhead stirring,
    # not of a guard at the kitchen (he walks only the gallery). The base `text` (pick
    # present, low tick) is UNCHANGED and remains the schema fallback for the first arrival
    # at ticks 1. No choice/effect/flag/item/exit/tick/gating/ending change (bug_0072).
    # The ticks>=7 escalation tier completes bug_0082 for the kitchen (bug_0084). bug_0082
    # gave the foyer and gallery a ticks>=7 tier so a lingering player SEES the deadline
    # mount on every loop (they re-read one of those two hubs each circuit) — but it argued
    # the kitchen/study didn't need it, which is true for warning VISIBILITY and false for
    # IN-ROOM continuity. A fresh blind playtester (seed 31, ai-runs/2026-06-01T22-19-03-485Z/
    # playtest.md §5) stood IN the kitchen at ticks 9 and saw it revert to the ticks>=4 "the
    # sleeping house has begun to stir" line — "the same line shown at ticks 5" — so the
    # kitchen's own prose contradicted how late it was while the foyer/gallery read "waking
    # in earnest." This tier escalates the kitchen from the >=4 house "begun to stir" toward
    # the ticks>=10 ending's whole-house waking: overhead the manor waking in earnest, feet
    # and voices and lamps moving room to room, only a few beats left. It keeps the bug_0072
    # constraints EXACTLY — clock named only by the manor-wide motif (the clock's working
    # carried through the walls, the chime) and the house overhead, NEVER the watchman/
    # ledger/plate (a downstairs-only visitor may have met none of them) — and the existing
    # lockpick pairing (pick-present vs pick-taken). Above the ticks>=4 tier, first-match-wins,
    # higher threshold first. No choice/effect/flag/item/exit/tick/gating/ending change.
    variants:
      - when: [{ var_gte: { name: ticks, value: 7 } }, { has_item: lockpick }]
        text: >
          Copper pots hang in rows above a banked hearth. By the dumbwaiter, the spot
          where the lockpicks lay is bare — the slim roll is in your pocket now. The hour
          chimed a while ago, and the great clock's working, carried through the walls, no
          longer grinds toward a sleeping house but a waking one: overhead the manor is
          waking in earnest — feet and voices and lamps moving room to room on the floors
          above. Only a few beats left before the whole house stands fully awake.
      - when: [{ var_gte: { name: ticks, value: 7 } }]
        text: >
          Copper pots hang in rows above a banked hearth. By the dumbwaiter, a servant has
          left a slim roll of lockpicks. The hour chimed a while ago, and the great clock's
          working, carried through the walls, no longer grinds toward a sleeping house but a
          waking one: overhead the manor is waking in earnest — feet and voices and lamps
          moving room to room on the floors above. Only a few beats left before the whole
          house stands fully awake.
      - when: [{ var_gte: { name: ticks, value: 4 } }, { has_item: lockpick }]
        text: >
          Copper pots hang in rows above a banked hearth. By the dumbwaiter, the spot
          where the lockpicks lay is bare — the slim roll is in your pocket now. The hour
          has come round at last: the great clock's chime rolls through the manor's gears
          and reaches even this cold kitchen, and overhead the sleeping house has begun to
          stir.
      - when: [{ var_gte: { name: ticks, value: 4 } }]
        text: >
          Copper pots hang in rows above a banked hearth. By the dumbwaiter, a servant
          has left a slim roll of lockpicks. The hour has come round at last: the great
          clock's chime rolls through the manor's gears and reaches even this cold kitchen,
          and overhead the sleeping house has begun to stir.
      - when: [{ var_gte: { name: ticks, value: 2 } }, { has_item: lockpick }]
        text: >
          Copper pots hang in rows above a banked hearth. By the dumbwaiter, the spot
          where the lockpicks lay is bare — the slim roll is in your pocket now. Even down
          here the great clock's working carries through the walls, grinding toward the
          hour — a sleeping house keeps its peace only until the chime.
      - when: [{ var_gte: { name: ticks, value: 2 } }]
        text: >
          Copper pots hang in rows above a banked hearth. By the dumbwaiter, a servant
          has left a slim roll of lockpicks. Even down here the great clock's working
          carries through the walls, grinding toward the hour — a sleeping house keeps its
          peace only until the chime.
      - when: [{ has_item: lockpick }]
        text: >
          Copper pots hang in rows above a banked hearth. By the dumbwaiter, the
          spot where the lockpicks lay is bare — the slim roll is in your pocket now.
    choices:
      - id: take_pick
        text: "Pocket the lockpicks."
        conditions: [{ not_item: lockpick }]
        effects:
          - add_item: lockpick
          - add_journal: "Lockpicks — exactly what a clockwork vault deserves."
        next: kitchen
      - id: dumbwaiter
        # The dumbwaiter is the kitchen's direct line up to the gallery (saving the
        # trip back down through the foyer to the grand stair). A blind playtester
        # (seed 101) flagged that its old "Ride the dumbwaiter up" framing read like a
        # clever stealth bypass, yet it lands you on the exact same patrolled gallery
        # the stair does — an over-promise the room never pays off. The fix is honest
        # reframing only: the choice text + a narration name it the cramped servants'
        # lift, a quieter and more direct way up that leaves you no closer to the vault
        # than the steps would. No route/tick/gating change — it still goes to `landing`
        # (which charges the same gallery tick the stair does), so the watchman/ledger
        # tuning (bug_0019/0040/0042/0043) is untouched (bug_0046).
        text: "Take the servants' dumbwaiter straight up to the gallery."
        effects:
          - narrate: "Rather than doubling back to the foyer's grand stair, you fold yourself into the cramped servants' lift and haul on its complaining rope. The box grinds up the shaft and you climb out onto the gallery — the very floor the staircase serves. A quieter way up from the kitchens, and a more direct one."
        next: landing
      # A d20 tension beat (CYOA skill checks are first-class): the cold kitchen hangs
      # thick with copper pots and a banked hearth's iron, and slipping back out of it
      # toward the foyer — past the dumbwaiter's slack rope and a floor of loose
      # flagstones — without setting any of it ringing in the sleeping house is a test
      # of a thief's quiet hands. This is a CONVERGENT check, not a gate: on_success
      # (a soundless withdrawal) and on_failure (a copper pot rocks on its hook, a
      # heart-stopping beat — then settles into silence) BOTH route to the SAME scene,
      # `foyer` — exactly where the plain `back_foyer` below leads, the safe ground the
      # thief circles back to anyway — so the roll never branches the story, blocks the
      # way, advances the clock, awards score, sets a flag/quest_stage, or flips an
      # ending; it only colours HOW quietly you withdrew. The two branches differ solely
      # in their `add_journal` narration; the foyer's on_enter advances no tick (it only
      # re-seats the `infiltrating` quest stage, as it already does on every foyer return,
      # so arriving via this choice sets nothing a `back_foyer` return wouldn't), leaving
      # both outcomes identical state (the journal is append-only and excluded from the
      # BFS fingerprint). Hence the exhaustive every-ending-reachable and score-economy
      # proofs stay sound under their single seeded roll per step: success and failure are
      # interchangeable states that both reach the foyer. NO `next` — a skill-checked
      # choice routes via its branches' goto effects (schema: exactly one of next /
      # skill_check). Difficulty 12 vs d20 + guile(3) is a true mid-roll swing (beat it on
      # a 9), well under the 20 + 3 ceiling. No re-offer guard is needed: both outcomes go
      # to the foyer regardless, so a return-and-retry is harmless and idempotent, and the
      # kitchen's existing tick is charged on ENTRY (on_enter), never by this exit choice.
      - id: slip_out_quiet
        text: "Slip quietly back to the foyer through the dark kitchen."
        skill_check:
          skill: guile
          difficulty: 12
          on_success:
            - add_journal: "You step between the loose flagstones and the slack dumbwaiter rope, easing past the hanging copper without a whisper — and gain the foyer with the sleeping house none the wiser."
            - goto: foyer
          on_failure:
            - add_journal: "Your sleeve catches a hanging pot; it rocks on its hook with a soft copper murmur and your breath stops — but it settles back to silence, and you reach the foyer with the house still sleeping."
            - goto: foyer
      - id: back_foyer
        text: "Return to the foyer."
        next: foyer

  - id: landing
    title: "The Automaton Gallery"
    on_enter:
      - inc_var: { name: ticks, by: 1 }
    text: >
      A long gallery lined with frozen automata, their glass eyes following you. The
      vault door broods at the far end. A study stands ajar to one side.
    # The gallery is where the steward's ledger says a guard walks "on the hour".
    # As ticks climb the prose builds the deadline (first match wins, so the
    # higher threshold is listed first). The ticks>=2 variant likewise dropped the
    # vague "your time in the manor is running short" for a threat pointed at the real
    # mechanic: this gallery is the floor the watchman will walk at the hour, so standing
    # here when it chimes is the actual danger (blind-playtest finding, bug_0061).
    # The ticks>=2 case is now also split on `read_ledger` (blind-playtest finding,
    # bug_0292). "No place to be caught standing when it chimes" implies the chime
    # triggers the guard's patrol — knowledge a player who skipped the study never
    # earned. The ledger-reader variant keeps that phrasing (it's earned); the
    # no-ledger variant replaces it with the foyer's neutral register ("a sleeping
    # house keeps its peace only until the chime") — same urgency, no imputed knowledge.
    # Prose-only; no choice/flag/tick/route/gating/ending change.
    #
    # The ticks>=4 case is split on `read_ledger` (blind-playtest finding, bug_0066,
    # continuing the bug_0058 plate-leak lesson). The patrol-at-the-hour text once
    # named "the hourly patrol the steward's ledger warned of" unconditionally — but a
    # player can reach the gallery at the hour without ever reading (or even seeing) the
    # ledger (e.g. pacing up the stair and back), and `cross_to_vault_blind` only exists
    # for exactly that no-ledger player. Naming the ledger to someone who never read it
    # attributes foreknowledge they don't have — out of character for a pack whose every
    # other reactive line is gated on what the player actually knows. The reader gets the
    # ledger callback (the payoff for the study clue, pre-seeded by the read_ledger
    # journal line); the non-reader simply sees the watchman appear at the chime, with no
    # claim of prior warning. No flag/tick/route/gating/ending change: the choice gates
    # already mirror this split (approach_vault for ticks<=3 OR read_ledger;
    # cross_to_vault_blind for ticks>=4 AND not read_ledger).
    #
    # The reader's ticks>=4 line further reframes the crossing from danger to informed
    # confidence (blind-playtest finding, bug_0067). It once said the crossing "runs
    # right under his beam" — the same threat framing as the non-reader's variant — even
    # though for the reader that crossing is the SAFE ledger payoff (`approach_vault`), the
    # one the vault-door beat then rewards with "just as the ledger swore you could." A
    # fresh playtester (seed 73) read this solved threat as a live timing puzzle and
    # over-dodged it, hesitating at a crossing the ledger had already made safe. The reader
    # now sees that he knows the rounds and can time the crossing, matching the safe choice
    # he is offered and the vault-door payoff; the non-reader keeps "right under his beam"
    # because his crossing (cross_to_vault_blind → ending_patrol) really is the gamble that
    # framing promises. Atmospheric/legibility only: no flag/tick/route/gating/ending change.
    # The ticks>=7 tier is the deadline's missing middle (bug_0082), mirroring the
    # foyer treatment in the gallery — the patrolled danger room and the only entrance
    # to the study tick-source, so together the two scenes cover every tick-accruing
    # loop a lingering player can take. Above the ticks>=4 patrol tier (first match
    # wins, higher threshold first), it escalates from the lone watchman of the hour
    # toward the ticks>=10 ending's whole-house waking. The read_ledger split is
    # preserved exactly as at ticks>=4: the reader keeps his ledger callback and the
    # solved, time-it-in-his-wake framing (no "right under his beam"), matching the
    # safe approach_vault he is still offered (bug_0066/bug_0067); the non-reader keeps
    # the real-gamble "right under his beam" danger and is never told of a ledger he
    # didn't read, matching the blind crossing he is offered. Content-only; no choice/
    # flag/tick/gate/ending change.
    variants:
      - when: [{ var_gte: { name: ticks, value: 7 } }, { has_flag: read_ledger }]
        text: >
          A long gallery lined with frozen automata, their glass eyes following you. The
          vault door broods at the far end, and the watchman's lantern still sweeps the
          gallery on the rounds the steward's ledger warned of — but the hour chimed a
          while ago, and his tread no longer walks alone. Lamps are stirring along the
          landings and other feet answer him now, room to room: the house is waking in
          earnest. You still have his rounds by heart and can time the crossing in his
          wake just as the ledger swore — but only for a few beats more, before there are
          too many lanterns to read. The study stands ajar to one side, and the stair
          drops safely back to the foyer.
      - when: [{ var_gte: { name: ticks, value: 7 } }]
        text: >
          A long gallery lined with frozen automata, their glass eyes following you. The
          vault door broods at the far end, and a watchman's lantern sweeps the gallery on
          his slow rounds — the long crossing runs right under his beam. But the hour
          chimed a while ago, and his tread no longer walks alone: lamps are stirring
          along the landings and other feet answer him now, room to room, the house waking
          in earnest around you. There are only a few beats left before there is nowhere
          on this gallery left to stand unseen. The study stands ajar to one side, and the
          stair drops safely back to the foyer.
      - when: [{ var_gte: { name: ticks, value: 4 } }, { has_flag: read_ledger }]
        text: >
          A long gallery lined with frozen automata, their glass eyes following you.
          The vault door broods at the far end — and a watchman's lantern now sweeps
          the gallery, the hourly patrol the steward's ledger warned of. But you have
          his rounds by heart: you can read the slow swing of his lantern and pick the
          moment it turns away, crossing to the vault in his wake just as the ledger
          swore you could. The study still stands ajar to one side, and the stair drops
          safely back to the foyer.
      - when: [{ var_gte: { name: ticks, value: 4 } }]
        text: >
          A long gallery lined with frozen automata, their glass eyes following you.
          The vault door broods at the far end — but the hour has chimed, and a
          watchman's lantern now sweeps the gallery on his slow rounds. The long
          crossing to the vault runs right under his beam. The study still stands
          ajar to one side, and the stair drops safely back to the foyer.
      - when: [{ var_gte: { name: ticks, value: 2 } }, { has_flag: read_ledger }]
        text: >
          A long gallery lined with frozen automata, their glass eyes following you.
          The vault door broods at the far end. Somewhere a great mechanism grinds
          toward the hour, and you sense this long gallery will be no place to be caught
          standing when it chimes. A study stands ajar to one side.
      - when: [{ var_gte: { name: ticks, value: 2 } }]
        text: >
          A long gallery lined with frozen automata, their glass eyes following you.
          The vault door broods at the far end. Somewhere a great mechanism grinds
          toward the hour — and a sleeping house keeps its peace only until the chime.
          A study stands ajar to one side.
    choices:
      - id: enter_study
        text: "Step into the study."
        next: study
      - id: approach_vault
        # Safe crossing: before the hour (ticks <= 3), OR you read the ledger and
        # know the watchman's rounds — the payoff for the study clue. The hour is
        # tuned (>= 4) so a thorough vault route arrives just as the patrol starts:
        # the reader crosses on his rounds here, the un-read player gets the gamble.
        text: "Cross the gallery to the vault door."
        conditions: [{ any_of: [{ var_lte: { name: ticks, value: 3 } }, { has_flag: read_ledger }] }]
        next: vault_door
      - id: cross_to_vault_blind
        # On the hour and you don't know his rounds: crossing is an open gamble,
        # and the prose has already shown you the patrol. An informed risk, not a
        # gotcha — the safe study/foyer exits remain.
        text: "Chance the long crossing to the vault while the guard patrols."
        conditions: [{ var_gte: { name: ticks, value: 4 } }, { not_flag: read_ledger }]
        next: ending_patrol
      - id: back_down
        text: "Go back down to the foyer."
        next: foyer

  - id: study
    title: "The Steward's Study"
    on_enter:
      - inc_var: { name: ticks, by: 1 }
      # The brass wall-plate ("yields only to a steady hand — never to force") hangs
      # HERE in the study, so simply entering this room is when the thief reads its
      # warning. Record that so the vault door only "echoes" the plate to a player who
      # has actually seen it — a no-study route up the grand stair must not quote a
      # warning the player never read (blind-playtest finding, bug_0058).
      - set_flag: saw_plate
    text: >
      Shelved ledgers, a cold lamp, and a brass wall-plate engraved: "The vault
      yields only to a steady hand — never to force." One ledger lies open on the
      desk — the steward's daily reckoning, its last page ruled into the household's
      hours: when the staff retire, and when the watch walks its rounds.
    # The open ledger is the heist's load-bearing clue (bug_0040): reading it is what
    # lets you time the watchman's crossing on the hour. But a fresh blind playtester
    # (seed 211) found its value "subtle" — the study named "Ledgers" only as ambient
    # furniture and the wall-plate speaks to the LOCK, so nothing told a first-timer
    # the open ledger logs the WATCH before they committed to reading it, and a player
    # could leave the study having skipped its whole point. The fix is legibility only:
    # the scene text now draws the eye to the one open ledger and names what its last
    # page records (the watch's rounds), and the read choice says so — giving the clue
    # an honest pull and pre-seeding the gallery's later "the hourly patrol the
    # steward's ledger warned of" callback. No flag/tick/route/gating/ending change;
    # the read_ledger payoff (journal + safe-crossing gate) is untouched (bug_0053).
    #
    # The study was the LAST upstairs (tick-charging) room the clock never touched: the
    # deadline arc gave the foyer, gallery, vault door, loot room (bug_0019/0040/0042/0043),
    # and finally the crawlspace (bug_0064) reactive clock prose, but the study — the very
    # room where the player reads that the watch walks "on the hour" — stayed clock-silent.
    # A fresh blind playtester (seed 91) rated the pack 5/5 clarity but flagged that the
    # hour's approach "reads as atmosphere, not a solvable timing puzzle … a player can't
    # tell how close the hour is." The fix mirrors the bug_0064 crawlspace treatment:
    # content-only reactive `variants` (first-match-wins, higher threshold first) so the
    # clock the rest of the manor drums up is felt HERE too — at the exact moment the player
    # learns the watch's rounds, the room tells them that very hour is grinding near, tying
    # the ledger clue to the live deadline. The clock is named by the manor-wide motif (the
    # gears, the chime) and the visible open ledger page, never by foreknowledge the entrant
    # lacks (the bug_0058 leak lesson) — so the >=4 variant is sound for the no-ledger player
    # who can also stand here past the hour (gallery→enter_study). Every study entry costs a
    # tick via a tick-charging landing, so a live study visit is always ticks>=2; the base
    # `text` is UNCHANGED and remains the schema fallback. No choice/effect/flag/item/exit/
    # gating/ending change (bug_0068).
    # The ticks>=7 escalation tier completes bug_0082 for the study, the kitchen's structural
    # twin (bug_0084). The study is the other remaining tick-charging room a lingering player
    # stands in at ticks 7-9 (a circling player oscillates study<->gallery to climb the
    # clock), yet its prose plateaued at the ticks>=4 tier — the same in-room continuity gap a
    # fresh blind playtester (seed 31) hit in the kitchen, present here too. This tier
    # escalates from the >=4 "the watch has begun to walk the gallery" toward the ticks>=10
    # ending's whole-house waking. It keeps the bug_0068 constraints: the clock is named by the
    # manor-wide motif (gears, chime) and the VISIBLE open ledger page the base text already
    # describes — and naming "the watch" is sound here (the open page logs its rounds, the
    # entrant has read the brass plate via saw_plate), exactly as the >=4 variant does. Above
    # the ticks>=4 tier, first-match-wins, higher threshold first. The load-bearing read_ledger
    # clue and saw_plate flag are untouched. No choice/effect/flag/item/exit/tick/gating/ending change.
    variants:
      # read_ledger variant: player has already read the ledger; drop the "read a stolen
      # page" framing that presupposes the page is unread (reactive-description-blindness
      # class, bug_0287). Keeps the urgency escalation and clock motifs; replaces the
      # unread-presupposing close. Placed ABOVE the plain ticks>=7 tier (first-match-wins).
      - when: [{ var_gte: { name: ticks, value: 7 } }, { has_flag: read_ledger }]
        text: >
          Shelved ledgers, a cold lamp, and a brass wall-plate engraved: "The vault
          yields only to a steady hand — never to force." One ledger lies open on the
          desk — the steward's daily reckoning, its last page already turned; you have
          what the schedule could give you. The hour it named came round a while ago,
          and the house is waking in earnest now: through the wall the great clock's
          gears carry the whole manor rousing — lamps on the landings, more feet than
          the watch's own answering room to room. There is nothing left in this still
          room for you; only a few beats before there are no still rooms left.
      - when: [{ var_gte: { name: ticks, value: 7 } }]
        text: >
          Shelved ledgers, a cold lamp, and a brass wall-plate engraved: "The vault
          yields only to a steady hand — never to force." One ledger lies open on the
          desk — the steward's daily reckoning, its last page ruled into the household's
          hours: when the staff retire, and when the watch walks its rounds. The hour that
          page names came round a while ago, and the house is waking in earnest now: through
          the wall the great clock's gears carry the whole manor rousing — lamps on the
          landings, more feet than the watch's own answering room to room. Only a few beats
          left before there is no still room left in which to read a stolen page.
      - when: [{ var_gte: { name: ticks, value: 4 } }]
        text: >
          Shelved ledgers, a cold lamp, and a brass wall-plate engraved: "The vault
          yields only to a steady hand — never to force." One ledger lies open on the
          desk — the steward's daily reckoning, its last page ruled into the household's
          hours: when the staff retire, and when the watch walks its rounds. And the hour
          that page names has come round at last: the great clock's chime rolls up through
          the manor's gears even into this still room, and beyond the door the watch has
          begun to walk the gallery.
      # read_ledger variant: player has already read the ledger; drop the "take what this
      # page can tell you" framing that presupposes the page is unread (reactive-description-
      # blindness class, bug_0287). Keeps the clock motif; replaces the unread-presupposing
      # prompt with acknowledgment that the schedule is already known. Placed ABOVE the plain
      # ticks>=2 tier (first-match-wins).
      - when: [{ var_gte: { name: ticks, value: 2 } }, { has_flag: read_ledger }]
        text: >
          Shelved ledgers, a cold lamp, and a brass wall-plate engraved: "The vault
          yields only to a steady hand — never to force." One ledger lies open on the
          desk — its last page already turned; the schedule it kept is yours now. Through
          the wall the great clock grinds toward the hour — you know what the chime wakes,
          so be gone before it rings.
      - when: [{ var_gte: { name: ticks, value: 2 } }]
        text: >
          Shelved ledgers, a cold lamp, and a brass wall-plate engraved: "The vault
          yields only to a steady hand — never to force." One ledger lies open on the
          desk — the steward's daily reckoning, its last page ruled into the household's
          hours: when the staff retire, and when the watch walks its rounds. Through the
          wall the great clock grinds toward that very hour — a sleeping house keeps its
          peace only until the chime, so take what this page can tell you and be gone
          before it strikes.
    choices:
      - id: read_ledger
        text: "Read the open ledger's account of the watch's rounds."
        conditions: [{ not_flag: read_ledger }]
        effects:
          - set_flag: read_ledger
          # The heist quest's second milestone: reading the steward's ledger. Sits
          # alongside the load-bearing read_ledger flag (untouched) so the job's
          # progression advances at the moment the thief learns the watch's rounds.
          - set_quest_stage: { quest: the_heist, stage: ledger_read }
          # SCORE: the intel award (+10). One-shot — the choice's existing
          # `not_flag: read_ledger` guard (and the flag set above) means it can be
          # taken only once, so re-entering the study (study<->gallery loop) never
          # re-banks it. Pure additive effect: the read_ledger flag/gate is untouched.
          - inc_var: { name: score, by: 10 }
          - add_journal: "The ledger notes a guard who walks the gallery on the hour. Now that you know his rounds, you could time a crossing he'd never catch."
        next: study
      - id: leave_study
        text: "Return to the gallery."
        next: landing

  - id: vault_door
    title: "The Vault Door"
    # The base text is the PLATE-NAIVE fallback: a thief who came straight up the
    # grand stair to the vault never passed through the study, so cannot "echo" the
    # steward's brass plate. It still telegraphs pick-don't-force, but from the lock's
    # own patient, fastidious feel rather than by quoting a warning the player has not
    # read. A blind playtester (seed 53) hit the leak on the climb_stairs→approach_vault
    # route: the door "echoed" a brass-plate warning they had never seen. The fix gates
    # every brass-plate reference on `saw_plate` (set on entering the study) — see the
    # `saw_plate` variant below and the reworded `study_lock` narration (bug_0058).
    text: >
      The vault's clockwork lock ticks under your fingers — a hundred tiny tumblers,
      each finer than a hair. This is plainly no door for a crowbar: it has the
      patient, fastidious look of a thing that will yield only to a steady, coaxing
      hand, and never to force.
    # Reaching the door at/after the hour (ticks >= 4) is only possible for a
    # ledger reader — a no-ledger player past the hour gets the blind gamble, never
    # this safe crossing (see `landing`). So this variant fires exactly when the
    # player has just timed the patrolled crossing the ledger promised, and gives
    # that signature beat the on-screen payoff it lacked: the careful player now
    # *feels* the clock at its tensest moment instead of strolling across in
    # silence (blind-playtest finding — the deadline never bit careful play).
    # (read_ledger implies a study visit, so quoting the brass plate here is sound.)
    variants:
      - when: [{ var_gte: { name: ticks, value: 4 } }, { has_flag: read_ledger }]
        text: >
          You wait, pressed to the automata, until the watchman's lantern sweeps
          to the gallery's far end — then cross in its wake and crouch at the vault
          while his tread recedes, just as the ledger swore you could. The clockwork
          lock ticks under your fingers, a hundred tiny tumblers. The brass plate's
          warning echoes: force will not open this.
      # Plate-aware: you stood in the study and read the steward's brass plate, so its
      # warning is yours to echo at the lock. Below the ticks>=4 patrol case, above the
      # plate-naive base (first match wins), so a study-visitor before the hour gets it.
      - when: [{ has_flag: saw_plate }]
        text: >
          The vault's clockwork lock ticks under your fingers — a hundred tiny tumblers.
          The brass plate's warning echoes: force will not open this.
    choices:
      - id: pick_lock
        text: "Pick the lock with the lockpicks."
        conditions: [{ has_item: lockpick }, { not_flag: alarm }]
        effects:
          # The heist quest's final milestone: the clockwork vault is cracked. Set on
          # the choice that opens the vault (alongside the existing journal line), so the
          # job's progression reaches `vaulted` exactly as the door swings. Only the
          # picked route earns it — forcing the door (force_door) trips the alarm and
          # ends at ending_caught, never reaching this stage, which is right.
          - set_quest_stage: { quest: the_heist, stage: vaulted }
          # SCORE: the vault-cracked award (+15) — the heist's signature feat. One-shot
          # WITHOUT a new guard: picking the lock routes to `vault` (next, below), whose
          # only choices (grab_gold/take_letter) both END the game, so the player can
          # never loop back to this door to pick it again — the award fires at most once
          # per playthrough. Earned only on the picked route (force_door ends at
          # ending_caught, never here). Pure additive effect; the choice's conditions/
          # next are untouched.
          - inc_var: { name: score, by: 15 }
          - add_journal: "The tumblers fall, one by one. The vault sighs open."
        next: vault
      - id: study_lock
        text: "Study the clockwork lock for a way through."
        conditions: [{ not_item: lockpick }, { not_flag: alarm }]
        effects:
          # No brass-plate reference here: this nudge can fire on a no-study route, so
          # it learns "force won't open it" from the lock's own feel, not from a plate
          # the player may never have read (bug_0058). Keeps tool/instrument/steady-hand.
          - narrate: "A hundred tumblers, each finer than a hair — this is a lock to coax, not to break. Your bare fingers find no purchase, and you can feel it in the mechanism: force will only wake the house. You need a slender tool and a steady hand. Better search the manor for the right instrument before you try the door again."
        next: landing
      - id: force_door
        text: "Force the door with your shoulder."
        effects:
          - set_flag: alarm
          - add_journal: "Steel shrieks — and somewhere a bell begins to clang."
        next: ending_caught
      - id: retreat
        text: "Back away to the gallery."
        next: landing

  - id: vault
    title: "Inside the Vault"
    text: >
      Stacked gold gleams on iron shelves. Apart from it all, on a velvet cushion,
      lies a single sealed letter addressed to no one — laid out in plain sight, as
      though its writer meant whoever cracked the vault to find it here among the gold.
    # The loot room is the one beat the gold route used to reach in clock-silence — a
    # blind playtester (seed 91) flagged that the marquee deadline "never bites" the
    # player who beelines for the gold, since the watchman only walks the gallery and
    # an efficient thief is in and out before the hour. So the room itself now feels
    # the clock the rest of the manor drums up: the fast thief is warned to grab and
    # go before the chime, and the careful ledger-reader (the only player who can be
    # here at/after the hour — see `landing`) feels the watchman patrolling the only
    # way out. Higher threshold first (first match wins), as elsewhere. Reactive text
    # only: the gold/letter framing and every choice/ending are unchanged (bug_0043).
    #
    # The ticks>=2 tier originally said "you know what the hour wakes: fill your hands
    # and be gone before the chime sets the watchman walking" — presupposing the player
    # read the steward's ledger and therefore knows the watchman walks on the hour
    # (reactive-description-blindness class, bug_0288). A no-ledger player CAN reach
    # the vault at ticks 2-3 via kitchen→dumbwaiter→approach_vault (which requires
    # only ticks<=3 OR read_ledger), so the "you know" claim was unearned on that path.
    # The ticks>=4 variant is already implicitly ledger-gated — no-ledger players past
    # the hour are routed to ending_patrol on the gallery via cross_to_vault_blind,
    # never arriving here — so its "ledger swears you can go back out" is always correct
    # and needs no companion. A ticks>=2 AND read_ledger companion would also be dead:
    # earning the ledger requires visiting study (+1 tick) and returning through landing
    # (+1 tick), giving a minimum of 4 ticks at vault entry for any ledger-reading path.
    # Fix: plain ticks>=2 text drops "you know" and "the watchman" (knowledge the
    # no-ledger player never earned), replacing with state-neutral urgency. No
    # choice/flag/effect/item/exit/gating/ending change — prose only.
    variants:
      - when: [{ var_gte: { name: ticks, value: 4 } }]
        text: >
          Stacked gold gleams on iron shelves. Apart from it all, on a velvet cushion,
          lies a single sealed letter addressed to no one — laid out in plain sight, as
          though its writer meant whoever cracked the vault to find it here among the
          gold. Beyond the door the watchman's tread passes and returns on his rounds;
          you came in behind his lantern, and the ledger swears you can go back out the
          same way — but only while his rounds are still fresh in your head. Whatever
          you mean to carry off, choose it now.
      - when: [{ var_gte: { name: ticks, value: 2 } }]
        text: >
          Stacked gold gleams on iron shelves. Apart from it all, on a velvet cushion,
          lies a single sealed letter addressed to no one — laid out in plain sight, as
          though its writer meant whoever cracked the vault to find it here among the
          gold. Past the gallery the great clock grinds toward the hour — fill your
          hands and be gone before the chime sets the manor stirring.
    choices:
      - id: grab_gold
        text: "Fill your pockets with gold and run."
        effects:
          - add_item: gold
          # SCORE: the gold haul (+20) — the loot carried out the door, the clean
          # rich getaway. One-shot: this choice routes straight to ending_rich (a
          # terminal), so it fires exactly once. Mutually exclusive with the letter
          # haul below (the vault's two choices both end the game), so no single
          # playthrough banks both 20s. Pure additive effect; next is untouched.
          - inc_var: { name: score, by: 20 }
          - add_journal: "Heavy, cold, and yours."
        next: ending_rich
      - id: take_letter
        text: "Take the sealed letter instead."
        # The vault copy is the one "laid out in plain sight": flag it so the truth
        # ending can name how you found it (the displayed copy) rather than printing
        # one epilogue that fits only the other route (blind-playtest finding,
        # bug_0051 — the two oppositely-framed letters used to share one text).
        effects:
          - add_item: letter
          - set_flag: letter_displayed
          # SCORE: the confession haul (+20) — the steward's letter carried off, the
          # vault route's prize. Same award as the gold (a haul is a haul on the
          # scorecard; the truth's premium over riches is the ending's MORAL, not a
          # point bonus) and MUTUALLY EXCLUSIVE with it, so the best vault path scores
          # 45 either way. One-shot: routes straight to ending_truth (a terminal).
          # Pure additive effect; the letter_displayed flag/route are untouched.
          - inc_var: { name: score, by: 20 }
        next: ending_truth

  - id: crawlspace
    title: "The Crawlspace"
    # The base text is the clock-quiet fallback: a thief who slipped straight from the
    # foyer to the crawlspace (the stealth route) has barely stirred the manor, so the
    # passage is still and timeless.
    text: >
      Dust and cobweb and the smell of old brass. The passage runs behind the vault
      to a forgotten iron strongbox, its lid locked fast — and folded inside it, you
      are certain, a sealed letter in the steward's own hand: not laid out for show
      like a thing meant to be found, but hidden away here in the dark, apart from the
      gold, where he meant no eye ever to fall on it.
    # The crawlspace was the ONE beat the clock never touched. The clockwork-deadline
    # arc (bug_0019/0040/0042/0043) made the gallery, the vault door, and the loot room
    # all feel the hour, but the hidden strongbox route to the truth resolved in clock
    # silence — a fresh blind playtester (seed 47) flagged exactly this: "the headline
    # tension mechanic is completely bypassable via the strongbox route, so a player who
    # beelines the hidden letter may never feel it... the two halves feel tonally
    # disconnected." The fix mirrors bug_0043's loot-room treatment: content-only reactive
    # `variants` (first-match-wins, higher threshold first), so a player who wandered the
    # manor's upstairs rooms before crawling back to crack the box (any ticks>=2 crawlspace
    # arrival has stood in the gallery at least once — kitchen/landing/study are the only
    # tick sources) now feels the same clock the rest of the manor drums up, carried down
    # through the clockwork's gears even into this forgotten passage. Atmospheric only: the
    # strongbox/hidden-letter framing and every choice/ending are unchanged, and the clock
    # is named by the manor-wide motif (the gears, the chime), never by a watchman or plate
    # the crawler may not have met (the bug_0058 leak lesson). The pure-foyer beeliner stays
    # at low ticks and reads the still base text — the quiet is earned by taking the route
    # that slips past the gallery entirely (bug_0064).
    variants:
      # Pick-aware variants: when the player returns with lockpicks the strongbox is
      # no longer "locked fast" — they now have the means to open it. Each tick tier
      # gets a pick-present form above its no-pick counterpart (first-match-wins,
      # higher threshold first), mirroring the kitchen's pick-taken × tick pairing.
      # Reactive-description-blindness class, bug_0286.
      - when: [{ var_gte: { name: ticks, value: 4 } }, { has_item: lockpick }]
        text: >
          Dust and cobweb and the smell of old brass. The passage runs behind the vault
          to a forgotten iron strongbox — its lock rusted, but no match for the picks in
          your pocket now. Folded inside, a sealed letter in the steward's own hand,
          hidden away here in the dark where he meant no eye ever to fall on it. The
          hour has come round at last: the great clock's chime rolls down through the
          manor's thousand gears and reaches you even here behind the wall, and through
          the brick a slow tread answers it, passing along the vault's far side and away.
          Crack the box and crawl clear.
      - when: [{ var_gte: { name: ticks, value: 4 } }]
        text: >
          Dust and cobweb and the smell of old brass. The passage runs behind the vault
          to a forgotten iron strongbox, its lid locked fast — and folded inside it, you
          are certain, a sealed letter in the steward's own hand, hidden away here in the
          dark where he meant no eye ever to fall on it. The hour has come round at last:
          the great clock's chime rolls down through the manor's thousand gears and reaches
          you even here behind the wall, and through the brick a slow tread answers it,
          passing along the vault's far side and away. Crack the box and crawl clear.
      - when: [{ var_gte: { name: ticks, value: 2 } }, { has_item: lockpick }]
        text: >
          Dust and cobweb and the smell of old brass. The passage runs behind the vault
          to a forgotten iron strongbox — its lock rusted, but no match for the picks in
          your pocket now. Folded inside, a sealed letter in the steward's own hand,
          hidden away here in the dark where he meant no eye ever to fall on it. Somewhere
          above, the great clock grinds toward the hour, its working carried down through
          the manor's gears into even this forgotten passage — best crack the box and be
          gone before the chime wakes the sleeping house.
      - when: [{ var_gte: { name: ticks, value: 2 } }]
        text: >
          Dust and cobweb and the smell of old brass. The passage runs behind the vault
          to a forgotten iron strongbox, its lid locked fast — and folded inside it, you
          are certain, a sealed letter in the steward's own hand, hidden away here in the
          dark where he meant no eye ever to fall on it. Somewhere above, the great clock
          grinds toward the hour, its working carried down through the manor's gears into
          even this forgotten passage — best crack the box and be gone before the chime
          wakes the sleeping house.
      - when: [{ has_item: lockpick }]
        text: >
          Dust and cobweb and the smell of old brass. The passage runs behind the vault
          to a forgotten iron strongbox — the lock rusted but yielding, the picks in your
          pocket exactly what this wants. Folded inside, you are certain, a sealed letter
          in the steward's own hand: not laid out for show like a thing meant to be found,
          but hidden away here in the dark, where he meant no eye ever to fall on it.
    choices:
      - id: open_strongbox
        text: "Pick the strongbox's lock with the lockpicks."
        conditions: [{ has_item: lockpick }, { not_flag: read_ledger }]
        # The crawlspace copy is the one "hidden away in the dark": its own flag, so
        # the truth ending's hidden-copy epilogue fires for this route (bug_0051).
        effects:
          - add_item: letter
          - set_flag: letter_hidden
          # SCORE: hidden confession capstone (+45). Blind seed 7 showed that ending
          # truth at 20/45 contradicted the epilogue's moral; the no-ledger crawlspace
          # route now lands at the cap instead of reading as a failed solve. One-shot:
          # routes straight to ending_truth (a terminal). The ledger-read companion
          # below awards only the remaining +35 to avoid a 55/45 overflow.
          - inc_var: { name: score, by: 45 }
        next: ending_truth
      - id: open_strongbox_after_ledger
        text: "Pick the strongbox's lock with the lockpicks."
        conditions: [{ has_item: lockpick }, { has_flag: read_ledger }]
        # Same hidden confession route as open_strongbox, but the ledger's +10 is
        # already banked. Award exactly the remaining points to the 45-point cap.
        effects:
          - add_item: letter
          - set_flag: letter_hidden
          - inc_var: { name: score, by: 35 }
        next: ending_truth
      - id: study_strongbox
        # No-pick nudge: the manor's "never to force" rule holds even here — the
        # box won't yield to brute force, so this routes OUT to the foyer (a real
        # scene change = progress, never a self-loop) to go find the tool.
        text: "Try the rusted strongbox."
        conditions: [{ not_item: lockpick }]
        effects:
          - narrate: "The lid will not give. The lock is rusted but solid — no hinge to lever, no gap to force, and forcing would only ring through the still house. This wants the same slender tool the vault does: a pick, a probe, something to coax the lock. You back out through the panel to the foyer to search the manor: the kitchens are off the hall below, and the steward's study waits up the stair."
        next: foyer
      - id: back_crawl
        text: "Crawl back out to the foyer."
        next: foyer

endings:
  - id: ending_rich
    title: "Rich"
    text: >
      You melt into the night with your pockets full of gold. By dawn you are three
      towns away, and the clockwork manor is just a story you will never tell.
  - id: ending_caught
    death: true
    title: "Caught"
    text: >
      The alarm bell brings the house awake. Lanterns, shouts, the gallery's
      automata grinding to life around you. There is nowhere in the manor to run.
  - id: ending_patrol
    death: true
    title: "Caught on the Hour"
    text: >
      Halfway across the gallery the watchman's lantern swings round and pins you
      against the automata. "On the hour, every hour," he says, almost kindly, as
      his shout brings the sleeping house awake. The steward's own ledger kept his
      rounds — if only you had stopped to read it. The cell is cold, and somewhere
      the great clock keeps ticking.
  - id: ending_overstayed
    # The deadline ending (meta.deadline, ticks >= 10). Distinct in cause from the
    # other two losses: ending_caught is forcing the vault (the alarm bell), and
    # ending_patrol is being caught crossing the gallery on the hour. This one is
    # simply staying too long — the hour turns while you are still circling the house,
    # the manor wakes around you, and the clock the whole pack drums up finally bites.
    death: true
    title: "The Hour Turns"
    text: >
      You lingered too long, and the great clock keeps no secrets. Its slow chime
      rolls through the manor's thousand gears, and the sleeping house wakes around
      you — lamps flaring along the landings, a steward's startled voice, the
      watchman's tread no longer alone but answered now by others. The frozen automata
      catch the rising light, their glass eyes turning. Whatever you came to carry off,
      and wherever you meant to be by the hour, you are still here when it strikes — and
      there is no corner of the clockwork manor left dark enough to hide a thief who
      stayed past his welcome.
  - id: ending_truth
    title: "The Truth"
    # Two routes reach this ending carrying two oppositely-framed letters: the vault
    # copy "laid out in plain sight... meant to be found", the crawlspace copy "hidden
    # away in the dark... where he meant no eye to fall". A fresh blind playtester
    # (seed 137) flagged that one shared epilogue contradicts whichever route you just
    # played. With reactive ending `variants` (engine: endingText, mirrors scene
    # variants) the epilogue now names the copy you carried — the steward's paired
    # confession honoured at the payoff, not just at pickup (bug_0041 → bug_0051). The
    # base text is the route-neutral fallback for any future path that sets neither flag.
    variants:
      - when: [{ has_flag: letter_displayed }]
        text: >
          You slip out into the dark with the letter still sealed, and break it open by
          moonlight only once the manor's walls are well behind you. It is the steward's
          confession — the copy he left lying open among his gold, as though he wanted
          the one thief good enough to crack his lock to know. The manor's fortune was
          stolen, every coin of it, from people like you. You came to rob this house and
          could have vanished rich on its hoard; instead you carry away the truth he meant
          to be found. Some things are worth more than escaping rich.
      - when: [{ has_flag: letter_hidden }]
        text: >
          You slip out into the dark with the letter still sealed, and break it open by
          moonlight only once the manor's walls are well behind you. It is the steward's
          confession — the copy he hid in the dark behind the vault, where he meant no eye
          ever to fall on it. The manor's fortune was stolen, every coin of it, from people
          like you. You came to rob this house and could have vanished rich on its hoard;
          instead you carry away the secret he could not bring himself to burn. The vault
          above stays cold and locked; his other copy still waits inside it, where he left
          it for whoever cracked the front door. Some things are worth more than escaping
          rich.
    text: >
      You slip out into the dark with the letter still sealed, and break it open by
      moonlight only once the manor's walls are well behind you. It is the steward's
      confession — the manor's fortune was stolen, every coin of it, from people like
      you. You came to rob this house and could have vanished rich on its hoard;
      instead you carry away nothing but the truth. Some things are worth more than
      escaping rich.
