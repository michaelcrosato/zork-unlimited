# The Tidewaiter's Watch — a CYOA pack (Stage 1 format).
#
# First light over the river port. The keel Sister Moon has come in on
# the ebb from Bristol. Aldric Moyne, her master, stands at the gangway
# with his manifest ready. You are a tidewaiter — empowered by the Crown
# to inspect, certify, and seal before a single bale comes ashore. You
# carry a stamp and a seal, not a sword. The alderman's house is three
# streets away.
#
# Whether you look — and how deeply — shapes whose interests you serve.
#
# Novel contributions vs existing CYOA corpus:
#   (1) FIRST OFFICIAL INSPECTION ROLE — the player is an authority
#       figure; investigation is the job, not voluntary. The moral axis
#       is "how much of the law do you enforce when enforcement costs you?"
#       Distinct from the bellman (voluntary, no formal power) and
#       night_dispensary (private moral witness) — here the player holds
#       legal standing to impound, seal, and certify.
#   (2) DOCUMENTARY EVIDENCE CHAIN — three source documents (manifest,
#       bill of lading, port register) must be cross-referenced to build
#       the full case; first CYOA where evidence is primarily textual
#       rather than physical or testimonial; the tampered bill of lading
#       is the central artefact, not a body or a clue.
#   (3) MULTI-AREA SHIP INSPECTION — three ship zones (quarterdeck,
#       cargo_hold, passenger_berth) plus a quayside port office, each
#       with independent evidence; the spatial layout is a working vessel,
#       not a building interior or an outdoor street grid.
#   (4) CONVERGENT CONFRONTATION BEAT — confront_captain (gated on
#       found_discrepancy + found_hidden; steadiness DC 11) routes both
#       skill_check branches to ending_extracted (+20); only the journal
#       narration differs. Identical score ceiling (50) to the formal
#       seal-and-report path.
#
# Score economy (awards one-shot, guarded — score cannot be farmed past
# the ceiling, and every award lies on one traversable run):
#   +5  examine_manifest   — seventy-two vs eighty bales (not_flag found_discrepancy)
#   +5  read_bill          — two-hand correction, no countersign
#                            (cond: found_discrepancy; not_flag found_shortweight)
#   +5  sound_cargo        — eight bales behind the main stack (not_flag found_hidden)
#   +5  ask_bosun          — bosun's hold count was eighty (not_flag heard_bosun)
#   +5  check_papers       — Crane name; chest too heavy (not_flag found_name)
#   +5  check_records      — prior query referred to alderman, no action taken
#                            (not_flag found_priors)
#   +20 seal_the_cargo     — impound and lodge with harbour master
#                            (gate: found_discrepancy + heard_bosun + found_priors)
#   OR
#   +20 confront_captain   — direct confrontation at the gangway
#                            (gate: found_discrepancy + found_hidden;
#                             convergent steadiness DC 11 beat → ending_extracted)
# Best path: all six clues (+30) → seal_the_cargo (+20) = 50.
# Confrontation path: examine_manifest (+5) + sound_cargo (+5) + confront_captain (+20)
#   + any remaining clues = same ceiling 50.
# Reporting path: discrepancy + any clues + file_report (+10) = up to 40.

meta:
  id: tidewaiters_watch_v1
  title: "The Tidewaiter's Watch"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Tide Office Quay"
    quest: "inspect the suspect cargo before it clears"
    role: "Crown tidewaiter"
    connection: "Charterhaven's tide office is the customs mouth of the Marches, and every false manifest feeds the hub."
  start: ship_side
  flags_init: []
  # `steadiness` (init 3) — the stat for the confront_captain TENSION beat
  # (d20 + steadiness vs DC 11). Both branches award +20 to score and
  # goto ending_extracted with end_game — stateKey-convergent (same
  # current, vars, ended/endingId in both outcomes; only add_journal
  # narration differs). Roll 8 + 3 = 11 beats it — a real swing.
  vars_init: { steadiness: 3 }
  max_score: 50

scenes:
  # ── Ship's Side (hub / start) ─────────────────────────────────────────────
  - id: ship_side
    title: "The Sister Moon's Side"
    on_enter:
      - set_quest_stage: { quest: the_watch, stage: boarded }
    # Higher-specificity variant first: three key flags is strictest; a
    # player satisfying it also satisfies the any_of, so it must come first.
    variants:
      - when:
          - all_of:
              - { has_flag: found_discrepancy }
              - { has_flag: heard_bosun }
              - { has_flag: found_priors }
        text: >
          The gangway shifts under the morning tide. You have three lines
          of evidence — the manifest altered, the bosun's count, the
          alderman's buried query — and they all pull the same direction.
          Moyne is watching you from the wheel. He knows you know.
      - when:
          - any_of:
              - { has_flag: found_discrepancy }
              - { has_flag: found_hidden }
              - { has_flag: heard_bosun }
              - { has_flag: found_priors }
        text: >
          The Sister Moon rides the morning tide. Something is not right
          in the numbers — the shape of it assembling itself from what
          you have found, even if you cannot yet name all its parts.
    text: >
      First light finds the keel Sister Moon at the dock, fresh in from
      the Bristol run. Captain Aldric Moyne waits at the head of the
      gangway, manifest rolled in his hand, his expression the careful
      neutral of a man who knows the game and expects to win it. The
      morning is cold. The tide does not wait.
    choices:
      - id: go_to_quarterdeck
        text: "Go aboard to examine the ship's papers."
        next: quarterdeck
      - id: go_to_hold
        text: "Descend to the cargo hold for a count."
        next: cargo_hold
      - id: go_to_berth
        text: "Check the passenger berth — the manifest shows one traveller."
        next: passenger_berth
      - id: go_to_office
        text: "Cross to the port office and check the harbour register."
        next: port_office
      - id: seal_the_cargo
        text: "Order the cargo sealed and lodge the report with the harbour master."
        conditions:
          - all_of:
              - { has_flag: found_discrepancy }
              - { has_flag: heard_bosun }
              - { has_flag: found_priors }
        effects:
          - inc_var: { name: score, by: 20 }
        next: ending_sealed
      - id: confront_captain
        text: "Put the discrepancy to Moyne directly, here at the gangway."
        conditions:
          - all_of:
              - { has_flag: found_discrepancy }
              - { has_flag: found_hidden }
        # Tension beat: steadiness (init 3) vs DC 11. Both branches award
        # +20 and route to ending_extracted via goto + end_game —
        # stateKey-convergent. Only the add_journal narration differs.
        skill_check:
          skill: steadiness
          difficulty: 11
          on_success:
            - add_journal: "You name the numbers without raising your voice — seventy-two declared, eighty billed, eight bales behind the main stack in oilcloth. Moyne's expression does not change, but his hand tightens on the manifest. He reaches into his coat and produces a folded note — five pounds, drawn on a Bristol bank. He calls it an expedite fee. You call it the same."
            - inc_var: { name: score, by: 20 }
            - goto: ending_extracted
            - end_game: ending_extracted
          on_failure:
            - add_journal: "Your voice catches once on the accusation, and Moyne catches it. But you have the manifest in one hand and the sounding figures in the other, and he can see there is no clean way out of this. He reaches into his coat. Five pounds, he says — an expedite fee. You take it without answering."
            - inc_var: { name: score, by: 20 }
            - goto: ending_extracted
            - end_game: ending_extracted
      - id: file_report
        text: "File an irregularity report and let the alderman's office investigate."
        conditions: [ { has_flag: found_discrepancy } ]
        effects:
          - inc_var: { name: score, by: 10 }
        next: ending_reported
      - id: certify_manifest
        text: "Stamp the manifest. The cargo lands."
        next: ending_certified

  # ── Quarterdeck (ship's papers) ───────────────────────────────────────────
  - id: quarterdeck
    title: "The Quarterdeck"
    variants:
      - when:
          - all_of:
              - { has_flag: found_discrepancy }
              - { has_flag: found_shortweight }
        text: >
          The papers lie where you left them. The two-hand correction on
          the bill is clear as daylight once you know to look for it —
          the second, neater hand, no countersign.
      - when: [ { has_flag: found_discrepancy } ]
        text: >
          The manifest is open on the chart table where you set it. The
          figure seventy-two looks back at you.
    text: >
      The chart table is spread with the ship's papers: the manifest in
      Moyne's hand, a tallow candle still guttering from the night watch.
      The bill of lading is bundled beneath the manifest, sealed at Bristol
      and counter-stamped at the Thames mouth.
    choices:
      - id: examine_manifest
        text: "Compare the manifest figures against the bill of lading."
        conditions: [ { not_flag: found_discrepancy } ]
        effects:
          - set_flag: found_discrepancy
          - add_journal: "The manifest declares seventy-two bales of raw wool, certified by Moyne at Bristol. The bill of lading, pinned beneath, reads eighty. Eight bales stated at origin, absent at destination — the weight-fee on eight bales at this rate is four shillings. Not a clerical error."
          - inc_var: { name: score, by: 5 }
        next: quarterdeck
      - id: read_bill
        text: "Examine the bill of lading more closely."
        conditions:
          - all_of:
              - { has_flag: found_discrepancy }
              - { not_flag: found_shortweight }
        effects:
          - set_flag: found_shortweight
          - add_journal: "The original entry is clear — eighty bales, consigned to Aldric Crane, Bristol merchant, authorised and signed. Beside it, in a second and neater hand: seventy-two, with a correction mark. The second hand is not the port registrar's counter-stamp. There is no countersignature. Someone altered this bill after it left Bristol."
          - inc_var: { name: score, by: 5 }
        next: quarterdeck
      - id: return_from_quarterdeck
        text: "Return to the gangway."
        next: ship_side

  # ── Cargo hold ───────────────────────────────────────────────────────────
  - id: cargo_hold
    title: "The Cargo Hold"
    variants:
      - when: [ { has_flag: found_hidden } ]
        text: >
          The hold smells of raw fleece and bilge. The gap behind the
          main stack is where it always was — the oilcloth bundles dark
          against the hull, outside the numbered sequence.
    text: >
      The cargo hold is low-ceilinged and smells of raw fleece. Bales of
      wool are stacked in numbered rows under the bosun's eye — he stands
      at the foot of the ladder with his hold log open, watching your
      lantern move across the consignment.
    choices:
      - id: sound_cargo
        text: "Sound the stacks with your rod — check the depth of each row."
        conditions: [ { not_flag: found_hidden } ]
        effects:
          - set_flag: found_hidden
          - add_journal: "A long rod dropped between the bales finds resistance at eleven feet, not the fourteen the manifest warrants. Eight bales are behind the main stack, wrapped in oilcloth, outside the numbered sequence. They are not on the manifest."
          - inc_var: { name: score, by: 5 }
        next: cargo_hold
      - id: ask_bosun
        text: "Ask the bosun about the loading count at Bristol."
        conditions: [ { not_flag: heard_bosun } ]
        effects:
          - set_flag: heard_bosun
          - add_journal: "The bosun has been on the Sister Moon three years. He says the wool loaded at Bristol was eighty bales — by his count, his hand, and his mark in the hold log. He says the manifest was written out by the captain's man, not himself. He says this directly and without looking away. He does not ask what you intend to do with it."
          - inc_var: { name: score, by: 5 }
        next: cargo_hold
      - id: return_from_hold
        text: "Climb back to the gangway."
        next: ship_side

  # ── Passenger berth ───────────────────────────────────────────────────────
  - id: passenger_berth
    title: "The Passenger Berth"
    variants:
      - when: [ { has_flag: found_name } ]
        text: >
          The berth is as you left it. The chest sits at the foot of the
          bunk, locked, heavier than one traveller's wardrobe.
    text: >
      A single small cabin amidships — the manifest lists one passenger
      travelling separately from the crew. The berth is tidy: a locked
      chest at the foot of the bunk, a cloak on the lantern hook, travel
      papers folded on the ledge.
    choices:
      - id: check_papers
        text: "Examine the passenger's travel papers."
        conditions: [ { not_flag: found_name } ]
        effects:
          - set_flag: found_name
          - add_journal: "The papers are made out in the name of Crane — the same merchant name as the Bristol consignment on the bill of lading. The chest at the foot of the bunk is locked with a good iron padlock and sits lower on the planks than a single trunk of clothes would warrant."
          - inc_var: { name: score, by: 5 }
        next: passenger_berth
      - id: return_from_berth
        text: "Return to the gangway."
        next: ship_side

  # ── Port office (quayside) ────────────────────────────────────────────────
  - id: port_office
    title: "The Port Office"
    variants:
      - when: [ { has_flag: found_priors } ]
        text: >
          The register is open where the clerk left it. Last October's
          entry is still face-up — the unsigned margin note in its corner.
    text: >
      The harbour clerk keeps his register in a stone room behind the
      weighing house. He looks up from the morning entries when you step
      in, and your tide-office badge does the rest.
    choices:
      - id: check_records
        text: "Check the register for prior inspections of the Sister Moon."
        conditions: [ { not_flag: found_priors } ]
        effects:
          - set_flag: found_priors
          - add_journal: "Two prior inspections of the Sister Moon — both routine, both passed clean. But the margin of last October's entry carries a note in a different hand: query, wool weight, referred to the port alderman, no action taken. The note is unsigned. The clerk says he wrote it. He says he heard nothing more."
          - inc_var: { name: score, by: 5 }
        next: port_office
      - id: return_from_office
        text: "Return to the dock."
        next: ship_side

endings:
  - id: ending_sealed
    title: "The Seal Applied"
    text: >
      You order the gangway held and write the impound notice in your own
      hand: cargo of the Sister Moon, held pending inquiry, submitted to
      the harbour master's office this day. You do not send it to the
      alderman's house. You send it up the chain, over his head.

      The bosun is still at his log when they come to seal the hold. He
      does not look surprised.

      Moyne is taken at the dock's edge before the morning market opens.
      Aldric Crane — the name on the bill, the name in the berth — is
      found at an inn two streets from the quay. The inquiry takes three
      weeks. The alderman's name appears in the record as the official who
      received last October's query and referred it nowhere.

      You certify the next three vessels that morning without incident,
      your stamp marking each manifest clean. The work continues. It was
      always the work.
  - id: ending_extracted
    title: "Expedite Fee"
    text: >
      The note is drawn on a Bristol bank — clean paper, no names, the
      kind that moves without trace. You fold it into your coat and tell
      yourself the bosun's account is in your memory either way, and what
      the alderman buried last October is still buried, and the eight bales
      behind the stack will be quietly landed and sold and no one will ask
      again.

      The Sister Moon clears the dock by the third bell. Moyne tips his
      hat from the wheel.

      You certify the next vessel in line. The stamp sounds the same as
      it always does. You keep your round.
  - id: ending_reported
    title: "Filed and Referred"
    variants:
      - when: [ { has_flag: found_priors } ]
        text: >
          You write the irregularity notice in a careful hand — seventy-two
          declared, eighty billed, query for review — and lodge it with the
          harbour clerk before the manifests can be stamped. It will go to
          the alderman's office. You have done your duty as the forms define it.

          Whether anything follows, you cannot say. The alderman's name was
          in the register once before, beside a query that went nowhere. You
          know that. You filed anyway.

          The Sister Moon is certified by midday by the next tidewaiter on
          the rota. You call it a morning's work and walk back to the weighing
          house.
    text: >
      You write the irregularity notice in a careful hand — seventy-two
      declared, eighty billed, query for review — and lodge it with the
      harbour clerk before the manifests can be stamped. It will go to
      the alderman's office. You have done your duty as the forms define it.

      Whether anything follows, you cannot say. The harbour has a way of
      passing paper from hand to hand until no hand is responsible. You
      filed anyway.

      The Sister Moon is certified by midday by the next tidewaiter on
      the rota. You call it a morning's work and walk back to the weighing
      house.
  - id: ending_certified
    title: "The Stamp and the Fee"
    text: >
      Your stamp descends on the manifest — seventy-two bales of wool,
      Bristol to port, certified. Moyne signs with the quick ease of a
      man who expected this outcome. The gangway swings down and the
      cargo begins to move.

      The Sister Moon is in the roads before noon. The eight bales behind
      the main stack land quietly on a private wharf down-river, where
      no tidewaiter watches.

      You take your certification fee and move to the next vessel in the
      queue. There are always more ships.
