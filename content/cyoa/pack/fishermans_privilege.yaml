# The Fisherman's Privilege — a CYOA pack (Stage 1 format).
#
# Nine Years' War, summer 1697. Agnes Tyrell, wife of a licensed
# herring fisherman, has filed a complaint of wrongful impressment:
# her husband Robert was seized from his boat by a naval press gang
# under Lieutenant Pryce while at his lawful work on the morning of
# the fourteenth. You are the magistrate's clerk — sole officer of
# the court this week — and you have until the fleet's tender leaves
# the roads to determine whether the complaint has merit.
#
# Novel contributions vs existing CYOA corpus:
#   (1) MAGISTRATE'S CLERK ROLE — first quasi-judicial inquiry role
#       in CYOA corpus; distinct from alnager (trade enforcement),
#       tidewaiter (revenue inspection), bellman (voluntary civic),
#       constable (criminal law). The clerk gathers evidence and writes
#       the formal finding; authority to compel belongs to the
#       magistrate, not the clerk.
#   (2) JURISDICTIONAL CONFLICT — first CYOA pack where the central
#       question is not 'who committed a crime' but 'which authority's
#       law applies.' Crown prerogative (Admiralty impressment warrant)
#       vs common law exemption (licensed fishermen at lawful work).
#       Both claims have legal grounding; neither is obviously wrong.
#   (3) CONVERGENT INQUIRY PATHS — rule_illegal (licence + statute +
#       witness; steadiness DC 11 tension beat) and report_contested
#       (all six clues; jurisdictional referral) both award +20 and
#       reach max score 50; each is a valid professional response
#       given the evidence gathered. The office prose distinguishes the
#       direct-finding threshold from the fuller referral record so the
#       player can see why Pryce's account and the Ardent muster still
#       matter. rule_legal (Pryce accepted, licence unverified) awards
#       only +10 and reflects insufficient inquiry; dismiss_complaint
#       awards 0 and is available only before any inquiry step.
#   (4) WARTIME NAVAL FICTION — Nine Years' War impressment dispute,
#       coastal English market town, licensed fisherman's exemption,
#       press gang muster notation anomaly; first CYOA set in a
#       wartime maritime-legal context (distinct from tidewaiter's
#       commercial cargo inspection and dead_reckoning's navigation).
#
# Score economy (awards one-shot, all guarded):
#   +5  read_complaint      — Agnes's complaint read (+not_flag read_complaint)
#   +5  check_license       — licence current confirmed (+not_flag checked_license)
#   +5  read_exemption_act  — Admiralty proclamation consulted (+not_flag read_act)
#   +5  question_pryce      — Pryce's account heard (+not_flag heard_pryce)
#   +5  check_roster        — muster notation examined (+not_flag checked_roster)
#   +5  find_witness        — chandler's man found (+not_flag found_witness)
#   +20 rule_illegal        — finding: press unlawful (gate: checked_license +
#                             read_act + found_witness; steadiness DC 11 tension
#                             beat — both branches +20 → ending_illegal, convergent)
#   OR
#   +20 report_contested    — full report referred to Admiralty (gate: all six flags)
#   +10 rule_legal          — Pryce accepted without verification (gate: heard_pryce
#                             + not_flag checked_license; lower score path)
#    +0 dismiss_complaint   — no investigation
# Best path: all six clues (+30) + either +20 terminal = 50.
# Licence path: checked_license + read_act + found_witness → rule_illegal (+20)
#   + remaining clues = same ceiling 50.
# Referral path: all six clues → report_contested (+20) = 50.

meta:
  id: fishermans_privilege_v1
  title: "The Fisherman's Privilege"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Harbour Magistracy"
    quest: "resolve the fishing privilege dispute"
    role: "magistrate's clerk"
    connection: "Charterhaven's harbour court controls the fishing rights that keep the river market from tearing itself apart."
  start: magistrate_office
  flags_init: []
  # `steadiness` (init 3) — stat for the rule_illegal TENSION beat
  # (d20 + steadiness vs DC 11). Both branches award +20 and route to
  # ending_illegal — stateKey-convergent. Roll 8 + 3 = 11 beats DC 11.
  vars_init: { steadiness: 3 }
  max_score: 50

scenes:
  # ── The Magistrate's Office (hub / start) ────────────────────────────────
  - id: magistrate_office
    title: "The Magistrate's Office"
    # Higher-specificity variants first.
    variants:
      - when:
          - all_of:
              - { has_flag: read_complaint }
              - { has_flag: checked_license }
              - { has_flag: heard_pryce }
              - { has_flag: found_witness }
              - { has_flag: read_act }
              - { has_flag: checked_roster }
        text: >
          The full record is on your desk now: Agnes's complaint and the
          missing countersignature, Gent's ledger, the Admiralty proclamation,
          Tom Vear's witness account, Pryce's denial, and the Ardent muster
          with its late-looking notation. You can write the direct finding
          yourself, or send the whole jurisdictional conflict upward.
      - when:
          - all_of:
              - { has_flag: checked_license }
              - { has_flag: read_act }
              - { has_flag: found_witness }
              - { not_flag: checked_roster }
        text: >
          You have enough for a direct finding. The harbour master's ledger,
          the Admiralty proclamation, and the chandler's man each say Robert
          Tyrell's licence was current and he was at lawful work when taken.
          If you mean to refer the jurisdictional question instead, Pryce's
          account and the Ardent muster entry still belong in the record.
      - when:
          - all_of:
              - { has_flag: checked_license }
              - { has_flag: heard_pryce }
              - { has_flag: checked_roster }
        text: >
          Gent's ledger, Pryce's denial, and the Ardent muster are now in
          conflict. The late-looking notation makes Pryce's record look less
          certain than his voice. A direct finding still rests on the harbour
          licence, the exemption rule, and a witness to Tyrell's lawful work;
          a full referral also needs Agnes's formal complaint in the record.
      - when:
          - all_of:
              - { has_flag: checked_license }
              - { has_flag: heard_pryce }
              - { not_flag: checked_roster }
        text: >
          The ledger says the licence was renewed in February. Pryce says it
          lapsed in March. Someone has the wrong date, and the difference
          between them is a man in irons aboard HMS Ardent. The muster roll
          he relied on is the next record to put beside his denial.
      - when:
          - all_of:
              - { has_flag: heard_pryce }
              - { not_flag: checked_roster }
        text: >
          Pryce's account is on the table: he says the licence lapsed and the
          press was regular. If this is to become a contested record rather
          than one officer's word against one complaint, the Ardent muster
          entry still needs to be seen.
      - when: [ { has_flag: read_complaint } ]
        text: >
          Agnes Tyrell's complaint lies on your desk — her words through a
          notary's hand. The facts as she gives them are plain: her husband
          was at lawful work and was taken. You must determine whether the
          law agrees with her.
    text: >
      The magistrate's office is two rooms and a fireplace on Market Street.
      Mr Collyer, the magistrate, is at the assizes in Dorchester until
      the end of the week; you are his clerk and, for the moment, the sole
      officer of the court.
      Agnes Tyrell stands before your desk in the dress she wore three days
      ago when her husband was taken. She has filed a complaint of wrongful
      impressment. You have until the fleet's tender leaves the roads to
      determine whether the complaint has merit.
    choices:
      - id: read_complaint
        text: "Read Agnes Tyrell's formal complaint."
        conditions: [ { not_flag: read_complaint } ]
        effects:
          - set_flag: read_complaint
          - set_quest_stage: { quest: the_inquiry, stage: complaint_received }
          - add_journal: "The complaint names Lieutenant Pryce of HMS Ardent as the officer who ordered the press. Her husband, Robert Tyrell, licensed herring fisherman of this port, was taken from his boat on the morning of the fourteenth — sixty yards from the wharf, running in with a morning's catch. She says he held out his licence papers and the press men took him anyway. She gives the licence number and says it was renewed in February last. There is no magistrate's countersignature on the Admiralty warrant Pryce presented."
          - inc_var: { name: score, by: 5 }
        next: magistrate_office
      - id: go_to_harbour
        text: "Go to the harbour master's office to examine the licensing records."
        next: harbour_office
      - id: go_to_pressing_room
        text: "Go to the Anchor to speak with Lieutenant Pryce."
        next: pressing_room
      - id: go_to_wharf
        text: "Go to Chandler's Wharf, where the pressing took place."
        next: chandlers_wharf
      - id: rule_illegal
        text: "Steady your hand and write a finding: the pressing was not lawful. File it with the fleet's agent."
        conditions:
          - all_of:
              - { has_flag: checked_license }
              - { has_flag: read_act }
              - { has_flag: found_witness }
        # Tension beat: steadiness (init 3) vs DC 11. Both branches award
        # +20 and route to ending_illegal via goto + end_game —
        # stateKey-convergent. Only the add_journal narration differs.
        skill_check:
          skill: steadiness
          difficulty: 11
          on_success:
            - add_journal: "You write it without hesitation. The harbour master's ledger, the Admiralty's own proclamation, and a named witness: Tyrell's licence was current, and the press was not made under lawful authority."
            - set_quest_stage: { quest: the_inquiry, stage: direct_finding_filed }
            - inc_var: { name: score, by: 20 }
            - goto: ending_illegal
            - end_game: ending_illegal
          on_failure:
            - add_journal: "Your hand is not entirely steady on the first line. Pryce is a lieutenant of the Crown and he will not thank you for this. But the evidence is what it is, and the clerk's job is to write what the evidence says."
            - set_quest_stage: { quest: the_inquiry, stage: direct_finding_filed }
            - inc_var: { name: score, by: 20 }
            - goto: ending_illegal
            - end_game: ending_illegal
      - id: report_contested
        text: "Write a full inquiry report, including the warrant and muster defects, and refer the jurisdictional question to the Admiralty."
        conditions:
          - all_of:
              - { has_flag: read_complaint }
              - { has_flag: checked_license }
              - { has_flag: heard_pryce }
              - { has_flag: found_witness }
              - { has_flag: read_act }
              - { has_flag: checked_roster }
        effects:
          - set_quest_stage: { quest: the_inquiry, stage: admiralty_referral_filed }
          - inc_var: { name: score, by: 20 }
        next: ending_contested
      - id: rule_legal
        text: "Accept the lieutenant's account and close the inquiry without further steps."
        conditions:
          - all_of:
              - { has_flag: heard_pryce }
              - { not_flag: checked_license }
        effects:
          - set_quest_stage: { quest: the_inquiry, stage: closed_on_pryce }
          - inc_var: { name: score, by: 10 }
        next: ending_legal
      - id: dismiss_complaint
        text: "Dismiss the complaint without investigation."
        conditions:
          - none_of:
              - { has_flag: read_complaint }
              - { has_flag: checked_license }
              - { has_flag: read_act }
              - { has_flag: heard_pryce }
              - { has_flag: checked_roster }
              - { has_flag: found_witness }
        effects:
          - set_quest_stage: { quest: the_inquiry, stage: dismissed_unexamined }
        next: ending_dismissed

  # ── The Harbour Master's Office ──────────────────────────────────────────
  - id: harbour_office
    title: "The Harbour Master's Office"
    variants:
      - when: [ { has_flag: checked_license } ]
        text: >
          The licensing ledger is still open on Mr Gent's desk. The entry
          for Tyrell sits where you found it: renewal in February, current
          for the year.
    text: >
      The harbour master's office overlooks the quay from a low stone
      building at the seaward end of Market Street. Mr Gent is elderly,
      methodical, and does not conceal that he does not like press gangs.
      He says so before you have finished explaining your errand.
    choices:
      - id: check_license
        text: "Ask to see the licensing register for herring fishermen."
        conditions: [ { not_flag: checked_license } ]
        effects:
          - set_flag: checked_license
          - set_quest_stage: { quest: the_inquiry, stage: license_confirmed }
          - add_journal: "Gent finds the entry without pausing to look. Robert Tyrell, herring fisherman, licence number 147, renewed the third of February last for a fee of four shillings. Valid for the calendar year. Gent says he took the renewal himself and Tyrell paid on the day. The licence was current when he was taken. The ledger is not in dispute — Gent will swear to it."
          - inc_var: { name: score, by: 5 }
        next: harbour_office
      - id: read_exemption_act
        text: "Ask whether Gent has the Admiralty proclamation on fishermen's exemptions."
        conditions: [ { not_flag: read_act } ]
        effects:
          - set_flag: read_act
          - set_quest_stage: { quest: the_inquiry, stage: exemption_read }
          - add_journal: "He has the 1696 Admiralty proclamation pinned behind his door. The relevant passage: licensed fishermen, watermen, and harbour-craft operators are not to be pressed so long as their licence is current and they are engaged in their licensed work at the time of seizure. Both conditions applied to Tyrell on the morning of the fourteenth, according to the ledger and Agnes's account. Gent says the proclamation is not an Act of Parliament — Pryce's people know that — but it is the standing instruction from the Admiralty itself."
          - inc_var: { name: score, by: 5 }
        next: harbour_office
      - id: leave_harbour
        text: "Return to the magistrate's office."
        next: magistrate_office

  # ── The Pressing Room at the Anchor ─────────────────────────────────────
  - id: pressing_room
    title: "The Pressing Room"
    variants:
      - when:
          - all_of:
              - { has_flag: heard_pryce }
              - { has_flag: checked_roster }
        text: >
          You have Pryce's account and the muster entry. The annotation
          in the muster is what it is: 'lapsed', in a slightly different
          ink, in Pryce's hand.
      - when: [ { has_flag: heard_pryce } ]
        text: >
          Pryce has said what he means to say and is not interested in
          saying more. He believes the law is on his side.
    text: >
      The Anchor's back room has been requisitioned by HMS Ardent's press
      party for the duration of the muster. Lieutenant Pryce is a compact
      man of forty with the manner of an officer who has been answering
      magistrates' clerks long enough to be tired of it. He does not stand
      when you enter.
    choices:
      - id: question_pryce
        text: "Ask Pryce his account of the pressing, his warrant, and on what basis he acted."
        conditions: [ { not_flag: heard_pryce } ]
        effects:
          - set_flag: heard_pryce
          - set_quest_stage: { quest: the_inquiry, stage: pryce_heard }
          - add_journal: "Pryce says Tyrell's licence lapsed in March of last year and was not renewed — that the man was an unlicensed fisherman, not exempt from impressment under any standing order. He says he checked the harbour master's roll himself before the tender went out and the roll he saw showed no renewal. When you tell him that Gent's ledger shows a February renewal, Pryce says harbour office records are not always timely and that the licence number Agnes gives is not the number in his copy of the roll. On the warrant's missing magistrate's countersignature, he says a naval press warrant needs no clerk's ink to make it Crown authority. He says this without embarrassment."
          - inc_var: { name: score, by: 5 }
        next: pressing_room
      - id: check_roster
        text: "Ask to see the muster roll entry and warrant copy for Robert Tyrell."
        conditions: [ { not_flag: checked_roster } ]
        effects:
          - set_flag: checked_roster
          - set_quest_stage: { quest: the_inquiry, stage: roster_checked }
          - add_journal: "Pryce produces the Ardent's press muster without argument, with the warrant copy folded behind it. The entry reads: 'Robert Tyrell, able seaman, not exempt, pressed 14th inst., licence lapsed.' The entry date is correct. 'Not exempt' and 'licence lapsed' are written in ink that is a slightly different shade from the surrounding entries and at a marginally different angle, as if added after the main entry was made rather than at the time of pressing. The warrant copy is still bare of any magistrate's countersignature."
          - inc_var: { name: score, by: 5 }
        next: pressing_room
      - id: leave_anchor
        text: "Return to the magistrate's office."
        next: magistrate_office

  # ── Chandler's Wharf ─────────────────────────────────────────────────────
  - id: chandlers_wharf
    title: "Chandler's Wharf"
    variants:
      - when: [ { has_flag: found_witness } ]
        text: >
          Tom Vear is still on the wharf, carrying casks. He told you
          what he saw and seemed relieved to have told it to someone
          who wrote it down.
    text: >
      The wharf smells of tar and low tide. A chandler's apprentice named
      Tom Vear was loading casks onto a lighter when the press tender came
      in on the morning of the fourteenth. He is a chandler's man, exempt
      by trade, and he did not run. He watched.
    choices:
      - id: find_witness
        text: "Speak to Tom Vear about what he witnessed."
        conditions: [ { not_flag: found_witness } ]
        effects:
          - set_flag: found_witness
          - set_quest_stage: { quest: the_inquiry, stage: witness_recorded }
          - add_journal: "Vear gives a clear account: Tyrell's boat was sixty yards off the wharf, running in with a morning's catch, when the press tender came alongside. He saw Tyrell hold up papers — something from his coat, held out flat. The press men did not look at them. Three men went aboard and brought Tyrell off, and the boat was brought in crewless and moored below the wharf. Vear says Tyrell called out that his licence was current and he was at his lawful work. Vear says this quietly, as if he has been waiting for someone to ask."
          - inc_var: { name: score, by: 5 }
        next: chandlers_wharf
      - id: leave_wharf
        text: "Return to the magistrate's office."
        next: magistrate_office

endings:
  - id: ending_illegal
    title: "The Clerk's Finding"
    text: >
      You write the finding in two copies — one for the magistrate's
      file, one for the fleet's prize agent in Weymouth who handles
      press disputes on behalf of the court. The language is measured:
      the harbour master's ledger shows Tyrell's licence renewed in
      February last, current at the date of seizure; the 1696 Admiralty
      proclamation exempts current licence-holders taken while at their
      lawful work; a named witness places Tyrell fishing on licensed
      grounds on the morning in question; and Pryce's warrant carries
      no magistrate's countersignature to cure the local defect. The
      press was not made under lawful authority.

      Whether the prize agent acts on it is beyond your authority to
      compel. You are the clerk. The clerk's job was to write what the
      evidence said, and you have written it. Agnes Tyrell reads the
      finding once and does not look up for a long time.

  - id: ending_contested
    title: "A Matter Above the Clerk's Station"
    text: >
      The inquiry report runs to four pages: the complaint, the harbour
      master's ledger, Pryce's account, the discrepancy in the muster
      notation, the warrant copy without a magistrate's countersignature,
      the chandler's man's testimony, the Admiralty proclamation, and the
      central question — whether a magistrate's clerk can compel a naval
      officer to release a pressed man on the basis of a harbour master's
      ledger and the word of a chandler's apprentice.

      You reach no verdict. You set out the conflict of evidence and
      the jurisdictional question and refer both to the Admiralty Court
      in London. It is the honest answer when you have all the facts
      and none of the authority to decide them.

      Robert Tyrell may be home in six weeks or at sea for two years.
      What you have done is ensure that someone with the authority to
      decide will have to decide it, on a record that does not let
      the muster notation go unexamined. That is not nothing.

  - id: ending_legal
    title: "The Lieutenant's Account"
    text: >
      You close the inquiry on Pryce's word. The licence had lapsed,
      he said, and you have not checked whether Gent's ledger agrees
      or disagrees — the register is a ten-minute walk, but you have
      not made it. A naval officer's sworn account of the grounds for
      a press is, arguably, sufficient basis for a magistrate's clerk
      acting in good faith.

      The tender leaves the roads on the evening tide. Agnes Tyrell
      stops coming to the office after the third day. You do not know
      whether you were right. The law does not require you to be right —
      only to act in good faith on the account given to you. You hope
      it amounts to the same thing.

  - id: ending_dismissed
    title: "Received and Closed"
    text: >
      You note the complaint in the register — received, closed without
      judicial finding — and show Agnes Tyrell out. The fleet needs men.
      The Nine Years' War is ending and men are still needed nonetheless,
      and a clerk in a market town is not the instrument for questioning
      an Admiralty warrant.

      You do not know her husband's name by the time the door closes.
      You do not need to.
