meta:
  id: priors_cellar_v1
  title: "The Prior's Cellar"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Prior's Cellar"
    quest: "recover the truth under the dissolved house"
    role: "cellar investigator"
    connection: "The old priory cellar sits beneath Charterhaven leases, and its hidden stores still distort city power."
  start: priory_gate
  flags_init: []
  max_score: 50
  # Score economy — two-path structure:
  #   +5  listen_to_aldric   — Aldric's testimony (not_flag heard_pilgrim)
  #   +5  examine_altar      — scratched silver (not_flag found_scratching)
  #   +5  hear_emric_out     — Brother Emric's corroboration (not_flag heard_monk)
  #   +10 examine_cache      — pilgrim effects in cellar (not_flag seen_cache)
  #   +10 read_ledger        — the prior's accounts in the scriptorium (not_flag ledger_read)
  #   +15 go_to_bishop       — carry the truth to the chapter house (terminal)
  #   Total: 50
  #
  # bug_0475: Aldric's "moved to the infirmary" clue now pays off in the cellar
  # cache. The pack does not add an infirmary room; the dead pilgrim's effects
  # identify where he was taken and why the clue mattered.
  #
  # Safe path (all six, maximum score):
  #   listen_to_aldric (+5) → examine_altar (+5) → hear_emric_out (+5) →
  #   wait_for_vespers → priors_study (search_desk_for_key) → scriptorium
  #   (read_ledger +10) → cellar_door → cellar (examine_cache +10) →
  #   south_road → go_to_bishop (+15) = 50
  #
  # Risky path (snoop while prior present; bypasses Vespers → scriptorium unreachable):
  #   listen_to_aldric (+5) → examine_altar (+5) → hear_emric_out (+5) →
  #   snoop_while_prior_present (no roll) → cellar (examine_cache +10) →
  #   south_road → go_to_bishop (+15) = 40 (ledger +10 unreachable on this path)
  #
  # Death path: prior_talk → accuse_prior (not_flag: learned_truth) → ending_seized
  #
  # Novel contributions vs existing CYOA corpus:
  #   (1) MONASTERY/PRIORY setting — first religious institutional setting; all 9 prior
  #       packs are secular (road, coastal, maritime, rural, urban, heist, ferry).
  #   (2) AUTHORITY AS PERPETRATOR — the trusted caretaker is the villain; the player
  #       is a guest in the house of the man they are investigating; every interaction
  #       carries risk. No prior pack puts the player inside the perpetrator's home.
  #   (3) TWO-ROUTE ACCESS to the same evidence with score tradeoff — risky snoop
  #       (always succeeds, but bypasses scriptorium, scores 40 max) vs safe Vespers
  #       window (scores 50 max). First pack where the riskier path caps below the
  #       careful path — patience is mechanically rewarded.
  #   (4) DEATH FROM RASH ACCUSATION — confronting the prior without evidence
  #       (prior_talk → accuse_prior, gated on not_flag: learned_truth) triggers
  #       ending_seized. Teaches the same lesson as the Vespers tradeoff: gather
  #       evidence before acting.

scenes:
  # ── Priory gate (hub) ─────────────────────────────────────────────────────
  - id: priory_gate
    title: "The Priory Gate"
    # No on_enter quest-stage write here: this is the hub, revisited after the
    # ledger/cellar truth is known. Re-setting `arrived` here would clobber
    # `truth_known` every time the player returns to decide what to do next.
    # bug_0421: first-entry prose lives in the base text only. Any return from
    # the surrounding rooms shows the gate as an already-entered hub, not another
    # arrival where the lay-brother waves you in from the cold.
    variants:
      - when:
          - any_of:
              - { visited: guest_hall }
              - { visited: chapel }
              - { visited: cloister_walk }
              - { visited: priors_study }
              - { visited: south_road }
        text: >
          Rain needles the arch and runs in black threads down Saint Maren's
          stones. The lay-brother who waved you in has gone back to his duties;
          the guest hall, chapel, cloister, study, and south road all wait from
          this same dripping threshold.
    text: >
      Rain-dark walls and a lantern guttering above the arch. The road behind
      you is mud to the knee; the priory of Saint Maren is the only shelter for
      seven miles. A lay-brother waves you in from the cold.
    choices:
      - id: go_to_hall
        text: "Follow the brother to the guest hall."
        next: guest_hall
      - id: go_to_chapel
        text: "Visit the chapel."
        next: chapel
      - id: go_to_cloister
        text: "Walk the cloister before settling in."
        next: cloister_walk
      - id: go_to_study
        text: "Find the prior's study."
        next: priors_study
      - id: take_south_road
        text: "Leave — take the south road."
        next: south_road

  # ── Guest hall cluster ────────────────────────────────────────────────────
  - id: guest_hall
    title: "The Guest Hall"
    text: >
      Long trestle tables and a fire that barely defeats the damp. Three pilgrims
      sleep on straw near the far wall. One turns toward the light; his breathing
      is the wrong kind of shallow.
    choices:
      - id: go_to_sick_pilgrim
        text: "Go to the sick man."
        next: sick_pilgrim
      - id: leave_hall
        text: "Step back out."
        next: priory_gate

  - id: sick_pilgrim
    title: "Aldric"
    # On re-entry, the reactive variant shows the pilgrim resting; listen_to_aldric
    # is retired by its not_flag guard once fired, so the score awards exactly once.
    variants:
      - when: [ { has_flag: heard_pilgrim } ]
        text: >
          Aldric is resting now. His fever hasn't broken. There is nothing more
          he can tell you, and he knows it.
    text: >
      He gives his name like something already half-surrendered: Aldric, a
      drover, three days here. He came with a purse of twenty silver and a farm
      deed he meant to sell on the way home. He has nothing now and his fever
      will not break. "They came in the night," he says. "The prior himself and
      two of the brothers. They said it was a tithe — for my soul's sake. I was
      too ill to fight them."
    choices:
      - id: listen_to_aldric
        text: "Hear him out — what happened exactly?"
        conditions: [ { not_flag: heard_pilgrim } ]
        effects:
          - set_flag: heard_pilgrim
          - add_journal: "Aldric: robbed in the night by the prior and two brothers while he lay fevered. His deed and twenty silver taken. 'A tithe for my soul's sake,' they told him."
          - inc_var: { name: score, by: 5 }
        next: sick_pilgrim
      - id: ask_about_others
        text: "Ask if it happened to others here."
        conditions: [ { has_flag: heard_pilgrim } ]
        effects:
          - narrate: "He turns his head toward the sleeping figures. 'Ask them. If they'll answer. The one before me who complained was moved to the infirmary. He did not come back. He kept touching a silver ring and saying Arden would know where he stopped.'"
          - add_journal: "Aldric implies a prior victim — moved to the infirmary and gone. He remembered a silver ring and Arden kin."
        next: sick_pilgrim
      - id: leave_aldric
        text: "Leave him to rest."
        next: guest_hall

  # ── Chapel ────────────────────────────────────────────────────────────────
  - id: chapel
    title: "The Chapel"
    text: >
      Candlelight on whitewashed stone. The altar is rough-hewn oak and linen —
      but the silver work above it does not belong in a roadside priory: a
      chalice and two candlesticks that belong in a cathedral.
    choices:
      - id: examine_altar
        text: "Step closer to examine the silver."
        conditions: [ { not_flag: found_scratching } ]
        effects:
          - set_flag: found_scratching
          - add_journal: "The chalice bears scratched-out hallmarks — a donor's name removed and replaced with Saint Maren's mark. The candlesticks match. These pieces were stripped and re-marked."
          - inc_var: { name: score, by: 5 }
        next: chapel
      - id: pray
        text: "Kneel and pray."
        effects:
          - narrate: "The silence is not comfortable. Whatever sanctity this place holds, it has company."
        next: chapel
      - id: leave_chapel
        text: "Go."
        next: priory_gate

  # ── Cloister cluster ──────────────────────────────────────────────────────
  - id: cloister_walk
    title: "The Cloister Walk"
    variants:
      - when: [ { has_flag: prior_at_vespers } ]
        text: >
          Stone arches frame a square of dead grass. Vespers has emptied the
          walk; Emric's broom leans in the corner where he left it, and the
          north-wall cellar door sits unwatched in the rain-dark quiet.
    text: >
      Stone arches frame a square of dead grass. A young monk sweeps the far
      corner with more force than the task needs — the kind of sweeping that has
      somewhere else it would rather be.
    choices:
      - id: speak_to_monk
        text: "Speak to the monk."
        conditions: [ { not_flag: heard_monk } ]
        next: monk_talk
      - id: wait_for_vespers
        # Emric pointed the player at the Vespers window (heard_monk gates this).
        # Once prior_at_vespers is set the priors_study variant changes to show
        # the empty room and the scriptorium door standing open.
        text: "Wait here until the prior goes to Vespers."
        conditions: [ { has_flag: heard_monk }, { not_flag: prior_at_vespers } ]
        effects:
          - set_flag: prior_at_vespers
          - narrate: "The bell rings Vespers. Prior Aldwulf passes without looking at you, his habit brushing the stones. You count sixty heartbeats before the cloister is empty."
        next: cloister_walk
      - id: go_to_cellar_door
        text: "Try the low door in the north wall."
        next: cellar_door
      - id: return_to_gate_from_cloister
        text: "Return to the gate."
        next: priory_gate

  - id: monk_talk
    title: "Brother Emric"
    variants:
      - when: [ { has_flag: heard_monk } ]
        text: >
          Emric looks up from his sweeping. He has told you what he knows, and
          the broom gives him somewhere else to look.
    text: >
      He gives his name grudgingly: Emric, here four years. He won't meet your
      eyes. When you mention the sick pilgrim in the hall he stops sweeping and
      stares at the ground. "Prior Aldwulf keeps the accounts," he says at last.
      "He keeps everything. Three pilgrims died here this year — their families
      wrote to the bishop, the bishop wrote to the prior, the prior wrote back
      with seals and figures." He looks up. "I am still here, which tells you
      what I am worth as a witness. But the prior's accounts are in the
      scriptorium, past his study. He goes to Vespers at the bell."
    choices:
      - id: hear_emric_out
        text: "Ask him what he knows."
        conditions: [ { not_flag: heard_monk } ]
        effects:
          - set_flag: heard_monk
          - add_journal: "Brother Emric: three pilgrims died at Saint Maren this year. Their families complained; the prior answered with figures and seals. The prior's accounts are in the scriptorium — past his study. The cellar key hangs on a hook behind his desk. He goes to Vespers at the bell."
          - inc_var: { name: score, by: 5 }
        next: monk_talk
      - id: ask_emric_about_key
        text: "Ask about the cellar key."
        conditions: [ { has_flag: heard_monk } ]
        effects:
          - narrate: "'On a hook behind the writing table,' Emric says. 'Same iron pattern as the padlock outside. At Vespers he's in the chapel twenty minutes — more, if the boys are slow with the responses.' He goes back to sweeping. He does not look at you."
          - add_journal: "The cellar key is on a hook behind the prior's desk. Twenty minutes at Vespers."
        next: monk_talk
      - id: leave_emric
        text: "Thank him and go."
        next: cloister_walk

  # ── Cellar door (locked until has_cellar_key) ─────────────────────────────
  - id: cellar_door
    title: "The Cellar Door"
    text: >
      A low door of iron-banded oak with a heavy padlock. The kind locked from
      outside habit, not inconvenience.
    choices:
      - id: try_padlock
        text: "Try the padlock."
        conditions: [ { not_flag: has_cellar_key } ]
        effects:
          - narrate: "Cold iron. Solid. Whatever is down there, the prior keeps it locked."
        next: cellar_door
      - id: unlock_cellar
        text: "Use the cellar key."
        conditions: [ { has_flag: has_cellar_key } ]
        next: cellar
      - id: back_to_cloister
        text: "Step back."
        next: cloister_walk

  # ── Prior's study (two states: prior present vs prior at Vespers) ──────────
  - id: priors_study
    title: "The Prior's Study"
    # First-match-wins: variant fires when prior IS present (not_flag: prior_at_vespers);
    # base text shows when prior IS at Vespers (flag set) — the empty room.
    variants:
      - when: [ { has_flag: prior_at_vespers }, { has_flag: has_cellar_key } ]
        text: >
          The study is empty. A fire, a writing table, a shelf of ledgers. The
          door to the scriptorium stands open. Behind the desk, the hook where
          the cellar key hung is bare.
      - when: [ { not_flag: prior_at_vespers } ]
        text: >
          Prior Aldwulf sits at his writing table. He looks up without warmth.
          Beyond his chair, a door stands ajar — the scriptorium, and the
          accounts kept there.
    text: >
      The study is empty. A fire, a writing table, a shelf of ledgers. The door
      to the scriptorium stands open. On a hook behind the desk hangs a heavy
      iron key.
    choices:
      - id: enter_scriptorium
        text: "Go through to the scriptorium."
        conditions: [ { has_flag: prior_at_vespers } ]
        next: scriptorium
      - id: search_desk_for_key
        text: "Take the key from the hook behind the desk."
        conditions: [ { has_flag: prior_at_vespers }, { not_flag: has_cellar_key } ]
        effects:
          - set_flag: has_cellar_key
          - add_journal: "A heavy iron key on a hook behind the writing table — the same pattern as the padlock on the cellar door."
          - narrate: "You lift the key from its hook. It is heavy and cold."
        next: priors_study
      - id: speak_to_prior
        text: "Speak to the prior."
        conditions: [ { not_flag: prior_at_vespers } ]
        next: prior_talk
      # Risky path: snoop while the prior is at his desk. The player palms the key
      # without a skill roll — the risk is STRATEGIC, not mechanical: this bypasses
      # the Vespers window, so the scriptorium remains inaccessible and the ledger
      # (+10) is unreachable. Max score on this path is 40/50. Cautious players who
      # wait for Vespers reach 50/50. No skill_check — this pack's death ending comes
      # from rash accusation in prior_talk (accuse_prior), not from snooping.
      - id: snoop_while_prior_present
        text: "Search the desk while the prior's attention is elsewhere."
        conditions: [ { not_flag: prior_at_vespers }, { not_flag: has_cellar_key } ]
        effects:
          - set_flag: has_cellar_key
          - add_journal: "You palmed the cellar key from the hook while the prior studied his papers. He did not look up."
          - narrate: "Your hand is steady. The key comes free without a sound."
        next: priors_study
      - id: leave_study
        text: "Back out."
        next: priory_gate

  - id: prior_talk
    title: "Prior Aldwulf"
    text: >
      "Our house is small," the prior says, "but Saint Maren provides." He pours
      wine without asking if you want it. He speaks pleasantly about the road
      and the weather and the pilgrims who pass through. He does not mention
      the sick man in the guest hall. He is the kind of man who decides what you
      need before you think to ask.
    choices:
      - id: ask_about_aldric
        text: "Ask about the sick pilgrim — Aldric."
        effects:
          - narrate: "'He is in God's hands.' The prior's tone closes the subject. He refills his own cup."
        next: prior_talk
      - id: accuse_prior
        # Death trigger: player confronts the prior without evidence. Gated on
        # not_flag: learned_truth — once the player has proof (cellar or ledger),
        # this choice is retired; they can take the south road to the bishop instead.
        # The lesson mirrors the score tradeoff above: rash action without evidence fails.
        text: "Lay your suspicions on the table — tell him what you think happens to pilgrims here."
        conditions: [ { not_flag: learned_truth } ]
        effects:
          - add_journal: "You accused him without proof. The prior did not flinch. He called for the brothers before you finished speaking."
        next: ending_seized
      - id: take_the_wine
        text: "Take the wine and go."
        effects:
          - narrate: "It is good wine. Better than the broth in the guest hall. You note that and say nothing."
        next: priory_gate
      - id: decline_wine
        text: "Decline and go."
        next: priory_gate

  # ── Scriptorium (requires prior_at_vespers) ───────────────────────────────
  - id: scriptorium
    title: "The Scriptorium"
    variants:
      - when: [ { has_flag: has_ledger } ]
        text: >
          A copying desk and shelves of rolled parchment. On the separate shelf
          where the prior's accounts sat, dust marks the rectangular gap your
          borrowed ledger left behind.
    text: >
      A copying desk and shelves of rolled parchment — and on a separate shelf,
      bound in plain calfskin but fat with pages: the prior's accounts. Three
      years of them.
    choices:
      - id: read_ledger
        text: "Read the accounts."
        conditions: [ { not_flag: ledger_read } ]
        effects:
          - set_flag: ledger_read
          - set_flag: learned_truth
          - set_quest_stage: { quest: the_priory, stage: truth_known }
          - add_journal: "The prior's accounts: every pilgrim who died at Saint Maren over three years is listed as a 'pious donor.' Their estates — however small — recorded as gifts to the house. The figures match what Aldric described. This is a ledger of theft dressed as salvation."
          - inc_var: { name: score, by: 10 }
        next: scriptorium
      - id: take_ledger_item
        text: "Take the ledger with you."
        conditions: [ { has_flag: ledger_read }, { not_flag: has_ledger } ]
        effects:
          - set_flag: has_ledger
          - add_journal: "You roll the ledger under your cloak. The weight of three years of quiet crime."
          - narrate: "The ledger fits under your cloak. It is heavier than it looks."
        next: scriptorium
      - id: leave_scriptorium
        text: "Go back."
        next: priors_study

  # ── Cellar (reveals truth; requires has_cellar_key via cellar_door) ────────
  - id: cellar
    title: "The Prior's Cellar"
    on_enter:
      # set_flag and set_quest_stage are idempotent — fire safely on re-entry.
      # Score is awarded by examine_cache (guarded by not_flag: seen_cache), not here.
      - set_flag: learned_truth
      - set_quest_stage: { quest: the_priory, stage: truth_known }
      - add_journal: "The cellar holds pilgrim effects — a sealed satchel, bolts of cloth, a broken chest. Stripped from travelers who died here and stored below. Proof without any ledger."
    text: >
      Not provisions. A leather satchel still marked with a pilgrim's seal, and
      tied shut with a strip of linen from the infirmary. Two bolts of good
      cloth. A small ironbound chest with a broken lock, empty. This is where
      things come when their owners stop needing them.
    choices:
      - id: examine_cache
        text: "Look through what is here."
        conditions: [ { not_flag: seen_cache } ]
        effects:
          - set_flag: seen_cache
          - add_journal: "Inside the infirmary-tied satchel: a letter addressed to a family in Arden, a silver ring, a tally stick — the effects Aldric's missing pilgrim kept trying to name. These were never sent."
          - inc_var: { name: score, by: 10 }
        next: cellar
      - id: go_back_up
        text: "Climb back out."
        next: cloister_walk

  # ── South road + endings ──────────────────────────────────────────────────
  - id: south_road
    title: "The South Road"
    text: >
      The priory gate behind you, the road ahead. You have what you came in with
      and more besides. The question is what you do with it.
    choices:
      - id: go_to_bishop
        text: "Walk to the bishop's seat and deliver everything."
        conditions: [ { has_flag: learned_truth } ]
        effects:
          - inc_var: { name: score, by: 15 }
        next: ending_witness
      - id: walk_away
        text: "Take the road and say nothing."
        next: ending_departed
      - id: go_back_inside
        text: "Go back inside."
        next: priory_gate

endings:
  - id: ending_witness
    title: "Carried to the Chapter House"
    text: >
      The road to the bishop's chapter house takes two days. You arrive with mud
      on your boots and the prior's accounts under your arm — or, if you left the
      ledger behind, Aldric's testimony written in your own hand while he still
      had breath to correct it, and what you found in the cellar, and Brother
      Emric's name. The bishop's secretary reads it twice. By the end of the week
      a commission rides for Saint Maren. By the end of the month Prior Aldwulf
      is answering questions he had assumed no one would think to ask. The pilgrims
      who survived receive letters. The dead get their names in the record, which
      is not nothing.

  - id: ending_departed
    title: "The Road at Dawn"
    text: >
      You walk until the priory is out of sight, and then a little further.
      Whatever Aldric told you, whatever you found — it stays behind you with
      the mud and the rain. Someone else will find it. Or they won't. The road
      is long and your boots are already wet and this is not your name in that
      ledger, and you tell yourself it is not your problem. The telling gets
      easier after the first mile.

  - id: ending_seized
    death: true
    title: "The Brothers Come"
    text: >
      Two brothers fill the doorway before anyone has to raise their voice.
      Prior Aldwulf speaks quietly and they listen. You spend the night in the
      cellar that would have told you everything, and by morning there is a very
      reasonable explanation for why a guest was found searching through the
      prior's desk. The bishop receives a letter. It has Prior Aldwulf's seal,
      and Aldwulf has been writing letters for thirty years, and they are very
      persuasive letters. You are not mentioned in any of them.
