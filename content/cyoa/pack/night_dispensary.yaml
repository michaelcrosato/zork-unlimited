# The Night Dispensary — a CYOA pack (Stage 1 format).
#
# A prosperous wool factor arrives at the apothecary's night dispensary to buy
# white arsenic for warehouse rats. Nothing prevents you from selling it — a
# lawful request, lawful coin. The question is whether you look before you sell,
# and what you do with what you find.
#
# You are the licensed assistant running the night dispensary alone while
# Mistress Halse is ill. Varnet Cole stands across the counter: prosperous,
# civil, wearing mourning black. He has been here before.
#
# Unlike the investigation-first packs, the goal is legible from the first beat
# and always legal: he asks; you sell, or you don't. The evidence you gather does
# not change what he has done — only what you knew when you chose. The ending
# variants make that weight visible.
#
# Four outcomes, each earned:
#   * sell — knowing or not knowing                           → ending_sold
#   * refuse — with cause or without                          → ending_refused
#   * send your boy to the nightwatch with what you have      → ending_reported
#     (gated: ledger entry + mourning badge confirmed)
#   * name the accusation to his face                         → ending_confronted
#     (gated: he lied about the warehouse + parish record confirmed;
#      composure TENSION beat — gates nothing, both routes reach the same end)
#
# The moral axis is epistemic, not investigative: the evidence you collect does
# not change what he did, only what you knew when you chose. Selling with full
# knowledge is a different act from selling with none; the ending variants make
# that distinction visible. The DARKNESS-of-the-shop atmosphere and the suspect
# standing PRESENT THROUGHOUT are both new to the corpus.
#
# Score economy: rewards looking. Maximum single path = 50.
#   +5  note_mourning_badge     — badge identified; wife named (not_flag: noted_mourning)
#   +5  question_the_warehouse  — he stumbles naming the street (not_flag: heard_lie)
#   +5  read_ledger             — April purchase; April death (not_flag: checked_register)
#   +5  check_arsenic_jar       — jar light; Wick Lane stub (not_flag: low_stock)
#   +5  read_city_register      — parish record: Cecilia Cole, 23rd April
#                                  (gated: checked_register; not_flag: confirmed_death)
#   +5  watch_driver            — the driver won't hold your eye (not_flag: noted_carriage)
#   +20 ending_confronted       — you named it; he answered (terminal)
#   OR
#   +10 ending_reported         — the nightwatch heard you out (terminal)
# Best path: all six clues (+30) → speak_the_name (+20) = 50.

meta:
  id: night_dispensary_v1
  title: "The Night Dispensary"
  world:
    id: charter_marches
    name: "The Charter Marches"
    hub: "Charterhaven"
    district: "Apothecary Row"
    quest: "choose what remedy and testimony survive the night"
    role: "night dispensary keeper"
    connection: "Charterhaven's poor come to Apothecary Row after curfew, where one counter can preserve or bury a scandal."
  start: apothecary_counter
  flags_init: []
  # `composure` (init 3) — the stat for the speak_the_name TENSION beat
  # (d20 + composure vs DC 11). Both branches award +20 to score and goto
  # ending_confronted with end_game — stateKey-convergent (same current, vars,
  # ended/endingId in both outcomes). Only the add_journal narration differs.
  # NO `next` on speak_the_name — skill-checked choices self-route via their
  # on_success/on_failure goto/end_game effects (schema: exactly one of next /
  # skill_check). Difficulty 11 vs d20 + composure(3): beat it on a roll of 8
  # (8 + 3 = 11), well under the 20 + 3 = 23 ceiling — a true swing.
  vars_init: { composure: 3 }
  max_score: 50

scenes:
  # ── The counter (hub) ──────────────────────────────────────────────────────
  - id: apothecary_counter
    title: "The Night Dispensary"
    # Reactivity is ordered most-specific first. bug_0420 adds case-completeness
    # signposts: once the watch report or direct confrontation is available, the
    # counter tells the player whether they have a sufficient-but-partial record or
    # enough to speak the accusation, without changing any gates or score awards.
    variants:
      - when: [ { all_of: [ { has_flag: confirmed_death }, { has_flag: heard_lie } ] } ]
        text: >
          Cole is still at the counter. He has run out of small movements — the
          adjustment of his cuffs, the turning of his coin — and stands quite
          still now, watching you the way a man watches a door he is not sure
          he can reach. The ledger, the parish notice, and the street that does
          not exist are enough to speak the accusation aloud; any unchecked
          shelf, window, or stock-room clue can only add weight now.
      - when:
          - all_of:
              - { has_flag: checked_register }
              - { has_flag: noted_mourning }
              - { has_flag: confirmed_death }
              - { not_flag: heard_lie }
        text: >
          Cole is still at the counter. The mourning badge and the April ledger
          are no longer only suggestive: the parish notice has put Cecilia
          Cole's death beside his old arsenic entry. It is enough to send word
          to the watch, but the warehouse question can still make him account
          for the street before you close the record.
      - when:
          - all_of:
              - { has_flag: checked_register }
              - { has_flag: noted_mourning }
              - { not_flag: confirmed_death }
        text: >
          Cole is still at the counter. The mourning badge and the April ledger
          are enough to justify sending word to the watch, but the parish-deaths
          notice above the shelf can still turn suspicion into a named record
          before you choose how far to carry it.
      - when:
          - any_of:
              - { has_flag: noted_mourning }
              - { has_flag: checked_register }
              - { has_flag: noted_carriage }
        text: >
          Cole is still at the counter. The mourning badge catches the
          lamp-light. He has asked once and not asked again — a patience that
          has a bottom to it.
    text: >
      Midnight, and the dispensary lamp is the only light on Aldgate Street
      outside. Varnet Cole — wool factor, prosperous, wearing mourning black
      three months in — leans on the counter and names what he needs: two drams
      of white arsenic for the rats in his warehouse cellar. He sets a coin on
      the wood. His hands are still.
    choices:
      - id: note_mourning_badge
        text: "Ask after his mourning badge — who did he lose?"
        conditions: [ { not_flag: noted_mourning } ]
        effects:
          - set_flag: noted_mourning
          - add_journal: "His wife. Cecilia. Dead in late April — a wasting fever, gentle at the end, he says. He smooths the badge with one thumb and does not look up."
          - inc_var: { name: score, by: 5 }
        next: apothecary_counter
      - id: question_the_warehouse
        text: "Ask which warehouse on which street."
        conditions: [ { not_flag: heard_lie } ]
        effects:
          - set_flag: heard_lie
          - add_journal: "He named the Wool Quarter, south of the customs house. When I pressed for the street he paused — one beat — then said Wool Lane. There is no Wool Lane in this city. There is a Wool Quay."
          - inc_var: { name: score, by: 5 }
        next: apothecary_counter
      - id: go_to_ledger
        text: "Step to the prescription ledger on the shelf."
        next: ledger_shelf
      - id: go_to_storeroom
        text: "Step into the back room."
        next: storeroom
      - id: go_to_window
        text: "Look out the front window."
        next: street_window
      - id: read_city_register
        text: "Glance at the parish-deaths notice pinned above the shelf."
        conditions:
          - all_of:
              - { has_flag: checked_register }
              - { not_flag: confirmed_death }
        effects:
          - set_flag: confirmed_death
          - add_journal: "Cecilia Cole, wife of Varnet Cole, factor. Died 23rd April. Wick Lane parish. Cause: wasting fever. The ledger says he bought arsenic the day before."
          - inc_var: { name: score, by: 5 }
        next: apothecary_counter
      - id: sell_arsenic
        text: "Measure out the arsenic and name your price."
        next: ending_sold
      - id: decline_service
        text: "Tell him you cannot fill this order tonight."
        next: ending_refused
      - id: send_boy_to_watch
        text: "Excuse yourself to the back room and send your boy to the nightwatch with the evidence gathered so far."
        conditions:
          - all_of:
              - { has_flag: checked_register }
              - { has_flag: noted_mourning }
        effects:
          - inc_var: { name: score, by: 10 }
        next: ending_reported
      - id: speak_the_name
        text: "Open the ledger on the counter and tell him what you know."
        conditions:
          - all_of:
              - { has_flag: heard_lie }
              - { has_flag: confirmed_death }
        # Tension beat: composure (init 3) vs DC 11. Both branches award +20 to
        # score and goto ending_confronted with end_game — stateKey-convergent
        # (same current/vars/ended/endingId in both outcomes; only add_journal
        # differs). Convergent-skill-check test (bug_0252) will verify this.
        # The effect ordering (add_journal → inc_var → goto → end_game) matches
        # the test's expectation: narrative, then state change, then routing.
        skill_check:
          skill: composure
          difficulty: 11
          on_success:
            - add_journal: "Your voice does not shake. He reads that. The coin on the counter stops."
            - inc_var: { name: score, by: 20 }
            - goto: ending_confronted
            - end_game: ending_confronted
          on_failure:
            - add_journal: "Your voice catches once, and you steady it. He hears the catch and the steadying both."
            - inc_var: { name: score, by: 20 }
            - goto: ending_confronted
            - end_game: ending_confronted

  # ── The ledger shelf ───────────────────────────────────────────────────────
  - id: ledger_shelf
    title: "The Prescription Ledger"
    variants:
      - when: [ { has_flag: checked_register } ]
        text: >
          The April pages are open where you left them. The entry is in Mistress
          Halse's hand: Cole, V. — white arsenic, half a dram, 22nd April.
    text: >
      The shop's record of every sale going back four years — date, name, remedy,
      quantity. The April pages are worn at the corner, as if turned to more than once.
    choices:
      - id: read_ledger
        text: "Read the April entries."
        conditions: [ { not_flag: checked_register } ]
        effects:
          - set_flag: checked_register
          - add_journal: "22nd April: Cole, V. — white arsenic, half a dram, pest control. No complaint logged before or since. His wife died the following morning."
          - inc_var: { name: score, by: 5 }
        next: ledger_shelf
      - id: leave_ledger
        text: "Return to the counter."
        next: apothecary_counter

  # ── The storeroom ──────────────────────────────────────────────────────────
  - id: storeroom
    title: "The Storeroom"
    variants:
      - when: [ { has_flag: low_stock } ]
        text: >
          The arsenic jar sits in its place on the locked shelf. You have already
          weighed it — light for a refilled jar, the Wick Lane delivery stub
          tucked behind it from four days ago.
    text: >
      Herbs, locked drawers, the sharp smell of camphor. The arsenic jar sits in
      its place on the locked shelf — you have the key tonight.
    choices:
      - id: check_arsenic_jar
        text: "Lift the arsenic jar and weigh it in your hand."
        conditions: [ { not_flag: low_stock } ]
        effects:
          - set_flag: low_stock
          - add_journal: "The jar is lighter than it should be after last week's refill. A delivery stub is tucked behind it: one dram, dispensed to a household on Wick Lane, four days ago. His address."
          - inc_var: { name: score, by: 5 }
        next: storeroom
      - id: return_to_counter
        text: "Return to the counter."
        next: apothecary_counter

  # ── The street window ─────────────────────────────────────────────────────
  - id: street_window
    title: "The Street"
    variants:
      - when: [ { has_flag: noted_carriage } ]
        text: >
          The carriage is still at the curb. The driver is in the box, facing
          the far end of the street, not looking at the window.
    text: >
      The carriage is still at the curb — a decent rig with a black mourning
      sash on the nearside lantern. The driver is in the box. The street is
      otherwise empty at this hour.
    choices:
      - id: watch_driver
        text: "Watch the driver a moment."
        conditions: [ { not_flag: noted_carriage } ]
        effects:
          - set_flag: noted_carriage
          - add_journal: "He is awake — and watching the shop door. When he caught me at the window he looked away too quickly, toward the water-trough. A man on a clean errand does not coach a driver who sits that still."
          - inc_var: { name: score, by: 5 }
        next: street_window
      - id: leave_window
        text: "Return to the counter."
        next: apothecary_counter

endings:
  - id: ending_sold
    title: "The Sale"
    # Higher-specificity variant first (the shadowing-check invariant):
    # variant 1 requires both flags; variant 2 requires any one of three.
    # A player satisfying variant 1 also satisfies variant 2, so variant 1
    # must be listed first or it would never display.
    variants:
      - when:
          - all_of:
              - { has_flag: confirmed_death }
              - { has_flag: heard_lie }
        text: >
          You measure out the two drams, fold the paper twist, and name your
          price. He sets the coin on the counter without a word and pockets
          the packet.

          You know the lie about the street. You know Cecilia died the morning
          after his April purchase. You sold him the arsenic anyway. That is a
          fact about you now, as durable as the entry you write in the ledger:
          Cole, V. — white arsenic, two drams, pest control. You write it in
          the same hand you write everything.
      - when:
          - any_of:
              - { has_flag: checked_register }
              - { has_flag: noted_mourning }
              - { has_flag: noted_carriage }
        text: >
          You measure out the two drams and take his coin. There was something
          in the ledger, or something in the way he said his wife's name — a
          thread you pulled at and then let go. He thanks you flatly and steps
          out into the street. The lamp burns. You go back to your stool and
          do not quite pick up the book you were reading before he came.
    text: >
      You measure out the two drams, seal the paper, and name your price.
      He pays without a word and pockets the packet. The door closes behind
      him, and the carriage takes him back toward Wick Lane with enough white
      powder in his coat to quiet anything he cares to quiet.

      You record the sale in the ledger beneath older lines you did not turn
      back to read. In the morning, if a cup is sweetened or a witness fails to
      wake, there will be a lawful entry in your hand and nothing else: Cole,
      V. — white arsenic, two drams, pest control.
  - id: ending_refused
    title: "Declined"
    variants:
      - when: [ { has_flag: heard_lie } ]
        text: >
          You tell him you cannot fill the order tonight. He asks why — your
          face or your voice gives something away, because he does not press
          for a reason. He takes his coin off the counter and goes. The door
          closes.

          You do not know what he does next. The ledger entry from April stays
          on its page, unread by anyone with authority to act on it.
    text: >
      You tell him you cannot fill this order tonight — you are low on stock,
      or the compound needs preparing fresh, or the hour is late. He does not
      argue. He pockets his coin and goes, and you do not know where.
  - id: ending_reported
    title: "Word Sent"
    variants:
      - when: [ { has_flag: confirmed_death } ]
        text: >
          The nightwatch takes your testimony with the ledger open before him:
          the April entry, the parish death record confirmed. He sends a man
          to Cole's house before dawn. By morning Cole is at the watch station;
          by noon an inquiry is opened into Cecilia Cole's death. You gave what
          you had to the people whose business it is, and they are doing their
          business.
    text: >
      Your boy runs to the watch station while you keep Cole at the counter
      with talk about preparation time. The watchman arrives within the quarter
      hour. You show him the ledger — the April purchase, the name, the
      mourning badge and the wife who died the next day. It is not a great
      deal. Cole, when the constable speaks to him tomorrow, may explain it
      away. But the record is made, and the question has been asked.
  - id: ending_confronted
    title: "Named"
    text: >
      You lay the ledger on the counter and open it to April. You say his
      wife's name. You say the date, and the date she died, and the street
      he named that does not exist. You say it plainly and wait.

      He is very still for a long time. The coin has stopped moving. Then
      he says it was a mercy — she had been genuinely ill for months, real
      suffering, before he helped it along — as if the word "mercy" settles
      something it cannot settle.

      You close the ledger. You tell him to present himself at the nightwatch
      station before dawn. He picks up his coin and goes.

      Whether he does is not something you can know tonight. But the name is
      out of you now, spoken aloud into the lamp-lit room, and it cannot go
      back in.
