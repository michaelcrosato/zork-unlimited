# The Fire Office Examiner — a CYOA pack (Stage 1 format).
#
# London, autumn 1696. Edmund Varley, cloth merchant of Thames Street, has
# submitted a fire-loss claim to the Sun Fire Office for £180 — the declared
# value of goods destroyed when his warehouse burned last Tuesday night.
# Varley's account: the fire began in the kitchen hearth from an improperly
# banked coal left by his cook, Hannah Finch. The board is not satisfied and
# sends you, their examiner, to inspect the site, take testimonies, and
# file a recommendation before any payment is authorised.
#
# Novel contributions vs existing CYOA corpus:
#   (1) FIRE OFFICE EXAMINER — first private commercial investigator in the
#       CYOA corpus; not a Crown or civic officer; you answer to the board of
#       the Sun Fire Office, not a magistrate; your authority derives from
#       the policy's cooperation clause, not statute; you may recommend
#       payment, rejection, or criminal referral, but cannot compel testimony,
#       seize documents, or arrest.
#   (2) TESTIMONIAL DISCREPANCY RESOLUTION — first CYOA pack where the primary
#       investigative challenge is not "find the evidence" but "determine which
#       witness is lying and why." Hannah Finch (cook) claims the fire began
#       in the kitchen hearth; Thomas Rawling (yard man) saw Varley himself in
#       the middle warehouse room with a shielded lamp the night of the fire.
#       These accounts are irreconcilable. Physical evidence (burn origin in the
#       middle room, not the kitchen) confirms Thomas and exposes Hannah's story
#       as false; having BOTH testimonies, plus the physical record, is the
#       complete chain of complicity. Prior CYOA packs present evidence that
#       CONVERGES on a truth; this pack presents evidence that first DIVERGES
#       before the physical record RESOLVES the divergence — a higher-order
#       epistemological challenge.
#   (3) INSURANCE FRAUD SUBJECT MATTER — first CYOA pack where the crime is
#       deliberate arson for insurance gain rather than trade evasion, smuggling,
#       impressment, or measurement fraud; the Sun Fire Office has operated in
#       London since 1710 [forerunner offices from 1680s]; moral axis is
#       economic desperation versus institutional trust that underwrites all
#       commercial insurance; Varley is not a career criminal but a merchant
#       who ran out of legal options.
#   (4) TIERED PROFESSIONAL OUTCOME — three terminal tiers gated on evidence
#       depth: approve_claim (0, fraud succeeds — no investigation or convinced
#       by Varley), dispute_claim (+10, reject on physical + financial motive
#       alone — no testimonial chain; civil case only), refer_to_law (+20, full
#       physical + documentary + testimonial chain for criminal prosecution).
#       Partial investigation yields a valid professional outcome; complete
#       investigation yields a higher one. Prior CYOA packs have two equivalent
#       win terminals; this pack's terminals are explicitly ranked by evidence
#       quality, rewarding thoroughness at a higher tier.
#
# Score economy (awards one-shot, all guarded):
#   +5  read_claim_documents — claim list examined; anomalous goods flagged
#       (not_flag: read_claim)
#   +5  check_debt_instruments — Varley's overdue bond debt found
#       (not_flag: checked_debt)
#   +5  examine_burn_origin — fire origin is the middle room, not the kitchen
#       (not_flag: found_burn_origin)
#   +5  check_yard_tracks — wheel-ruts in mud prove goods pre-removed
#       (not_flag: found_wheel_marks)
#   +5  question_thomas — Thomas's midnight sighting collected
#       (not_flag: heard_thomas)
#   +5  question_hannah — Hannah's kitchen-hearth account collected (one-shot
#       via skill_check condition not_flag: heard_hannah; composure DC 11
#       tension beat — both branches set the flag and award the score)
#   +20 refer_to_law — criminal referral (gate: all six flags)
#   +10 dispute_claim — civil rejection (gate: found_burn_origin + checked_debt)
#   +0  approve_claim — ungated; fraud succeeds
# Best single path:
#   claim_office: read_claim (+5), check_debt (+5) → warehouse_ruins:
#   question_thomas (+5) → burn_interior: examine_burn_origin (+5) →
#   warehouse_yard: check_yard_tracks (+5) → cook_interview:
#   question_hannah (+5) → warehouse_ruins → submission_desk:
#   refer_to_law (+20) = 50. All six awards on one traversable run.
#   max_score == reachable maximum (score-economy sound).
#
meta:
  id: fire_office_examiner_v1
  title: "The Fire Office Examiner"
  start: claim_office
  vars_init: { composure: 3 }
  flags_init: []
  max_score: 50

scenes:
  # ── Starting location: the Fire Office ──────────────────────────────────
  - id: claim_office
    title: "The Fire Office"
    text: >
      A plain room off Cornhill: a deal table, a candle, and a sheaf of
      papers. The board secretary has left Varley's claim for you to review
      before you go to the site. The file is thin — one claim sheet, a
      declaration of goods, and whatever correspondence the policyholder
      provided. A fire is a fire until it isn't.
    choices:
      - id: read_claim_documents
        text: "Read through the claim documents carefully."
        conditions: [ { not_flag: read_claim } ]
        effects:
          - set_flag: read_claim
          - add_journal: "The declared goods list is peculiar: Flemish lace, Spanish point, and three bales of Genoa velvet — import quality, the kind moved through a factor's house, not stacked overnight in a Thames Street corner warehouse. A Thames Street cloth merchant's own stock would run to domestic broadcloth and serge. This goods list does not match the premises."
          - inc_var: { name: score, by: 5 }
        next: claim_office
      - id: check_debt_instruments
        text: "Check the file for supporting correspondence."
        conditions: [ { not_flag: checked_debt } ]
        effects:
          - set_flag: checked_debt
          - add_journal: "Filed with the claim is a copy of a bond: Varley owes £240 to Aldous Creed of Gracechurch Street, payment due last Michaelmas and still not discharged. He has been in arrears for six weeks. A man who cannot meet a bond and loses his stock in a fire at the same moment is a man worth examining with care."
          - inc_var: { name: score, by: 5 }
        next: claim_office
      - id: proceed_to_site
        text: "Take the case to the site."
        next: warehouse_ruins

  # ── Hub: the burned warehouse on Thames Street ───────────────────────────
  - id: warehouse_ruins
    title: "The Thames Street Ruins"
    # Variant suppresses the discovery framing once both witnesses have been
    # heard — the two contradictory accounts are in hand and the physical
    # site is examined; the hub now reads as a staging point for submission,
    # not a scene of fresh discovery. Mirrors the mossy_brook / hermit_camp
    # reactive-description pattern in watchtower_road (bug_0282/bug_0309).
    variants:
      - when: [ { all_of: [ { has_flag: heard_hannah }, { has_flag: heard_thomas } ] } ]
        text: >
          The blackened shell of Varley's warehouse. The yard, the interior,
          and both witnesses have been attended to. The submission office on
          Cornhill is the last stop.
    text: >
      Varley's warehouse is a blackened shell: scorched beams, fallen plaster,
      the smell of wet ash and old pitch. Neighbours say the fire burned hot
      and fast — the whole ground floor gone in an hour. A yard man named
      Thomas Rawling sits on a barrel at the side gate, watching the ruins.
      The cook, Hannah Finch, lodges in a court two streets east.
    choices:
      - id: speak_varley
        text: "Speak with Edmund Varley, who is at the gate."
        conditions: [ { not_flag: heard_varley } ]
        effects:
          - set_flag: heard_varley
          - add_journal: "Varley meets you at the gate and recites his losses without prompting — forty yards of broadcloth, twelve bolts of serge, the imported goods on the claim, all gone. He blames a kitchen fire, a moment's carelessness by his cook. His words come a little too smoothly and his eyes stay on yours a little too long."
        next: warehouse_ruins
      - id: enter_ruins
        text: "Enter the ruins to examine the burn."
        next: burn_interior
      - id: check_yard
        text: "Circle round to the yard at the rear."
        next: warehouse_yard
      - id: question_thomas
        text: "Speak with the yard man, Thomas Rawling."
        conditions: [ { not_flag: heard_thomas } ]
        effects:
          - set_flag: heard_thomas
          - add_journal: "Thomas tells it plainly: two nights before the fire, near midnight, he was crossing the rear court to check a loose gate when he saw Mr Varley in the middle warehouse room, working by a shielded lamp — unusual at that hour. He thought nothing of it until the fire. He reports it as a fact, not an accusation, and his manner carries no guile."
          - inc_var: { name: score, by: 5 }
        next: warehouse_ruins
      - id: find_cook
        text: "Find Hannah Finch at her lodgings."
        next: cook_interview
      - id: submit_report
        text: "Return to the Fire Office to file your report."
        next: submission_desk

  # ── Evidence scene: burn interior ────────────────────────────────────────
  - id: burn_interior
    title: "Inside the Ruins"
    text: >
      Inside, the fall of ash and charred timber tells the story of how the
      fire moved. The kitchen is off the north end — a small brick hearth
      separated from the main warehouse floor by a half-wall. The middle
      room is open-beamed, now collapsed inward.
    choices:
      - id: examine_burn_origin
        text: "Study the char patterns to find where the fire began."
        conditions: [ { not_flag: found_burn_origin } ]
        effects:
          - set_flag: found_burn_origin
          - add_journal: "The heaviest char is not at the kitchen hearth. It is in the centre of the main warehouse floor — the middle room — where the beams burned longest and deepest. The kitchen end shows secondary scorching, spreading inward from the middle; the fire moved from the centre outward, not from the kitchen wall outward. Varley's account has the direction of fire travel backwards."
          - inc_var: { name: score, by: 5 }
        next: burn_interior
      - id: leave_ruins
        text: "Step back out."
        next: warehouse_ruins

  # ── Evidence scene: warehouse yard ──────────────────────────────────────
  - id: warehouse_yard
    title: "The Warehouse Yard"
    text: >
      A narrow yard behind the warehouse: cobbles, a loading gate, and a
      strip of soft mud along the wall where the drain runs slow. No cart
      here now.
    choices:
      - id: check_yard_tracks
        text: "Examine the mud along the wall."
        conditions: [ { not_flag: found_wheel_marks } ]
        effects:
          - set_flag: found_wheel_marks
          - add_journal: "Two sets of wheel-ruts cut deep into the mud — a loaded cart, heavy enough to compress the clay, making two passes. The ruts are rained over; they predate the fire by at least two days. A cartload of goods was removed from this yard before the warehouse burned. If those goods are now on the claim list, the declared loss is a fiction."
          - inc_var: { name: score, by: 5 }
        next: warehouse_yard
      - id: leave_yard
        text: "Return to the street."
        next: warehouse_ruins

  # ── Evidence scene: cook testimony ──────────────────────────────────────
  - id: cook_interview
    title: "Hannah Finch's Lodgings"
    # The skill check is a TENSION BEAT, not a gate: both on_success and on_failure
    # set heard_hannah and award the same +5 score, then goto: cook_interview
    # (re-rendering the scene with the now-invisible question_hannah choice, leaving
    # only leave_cook). The check measures whether the examiner's composure is steady
    # enough to catch Hannah's hesitation — success yields richer evidence of rehearsal;
    # failure gives a clean account that still contradicts the burn site. Route,
    # gating, and score ceiling are identical regardless of the roll.
    text: >
      A narrow room above a chandler's shop on Pudding Lane. Hannah Finch is
      a composed woman of fifty, careful with her words. She has her story
      ready: the fire began in the kitchen hearth, an improperly banked coal,
      a moment's carelessness, and she is very sorry for it.
    choices:
      - id: question_hannah
        text: "Take her account and press her on the details."
        conditions: [ { not_flag: heard_hannah } ]
        # set_flag and inc_var at choice level so the validator can find them;
        # skill_check branches carry only the narrative journal (tension beat —
        # both routes award the same flag and score, goto the same scene).
        effects:
          - set_flag: heard_hannah
          - inc_var: { name: score, by: 5 }
        skill_check:
          skill: composure
          difficulty: 11
          on_success:
            - add_journal: "Under careful questioning, Hannah's composure slips once: asked to describe the coal she left banked, she hesitates — not the pause of a woman remembering, but of a woman checking what she was told. She recovers quickly and her account is otherwise consistent; it is also the account of someone who rehearsed it. She places the fire origin firmly in the kitchen hearth."
            - goto: cook_interview
          on_failure:
            - add_journal: "Hannah Finch holds her account without wavering: banked coal, kitchen hearth, a moment's carelessness, nothing more. She is either a reliable witness or a well-practised one. Either way her account places the fire origin in the kitchen hearth — directly at odds with what the burn pattern in the middle room shows."
            - goto: cook_interview
      - id: leave_cook
        text: "Thank her and leave."
        next: warehouse_ruins

  # ── Terminal: submission desk ────────────────────────────────────────────
  - id: submission_desk
    title: "The Submission Desk"
    text: >
      The board clerk waits with a clean sheet and a quill. Your
      recommendation goes to the board this afternoon; it is binding on
      the matter before any payment is authorised. Varley will be
      notified of the outcome by tomorrow's post.
    choices:
      - id: approve_claim
        text: "Recommend payment — the evidence is inconclusive."
        next: ending_approved
      - id: dispute_claim
        text: "Recommend rejection — the physical evidence warrants denial."
        conditions: [ { all_of: [ { has_flag: found_burn_origin }, { has_flag: checked_debt } ] } ]
        effects:
          - inc_var: { name: score, by: 10 }
        next: ending_disputed
      - id: refer_to_law
        text: "Recommend criminal referral — the full chain warrants prosecution."
        conditions:
          - all_of:
              - has_flag: read_claim
              - has_flag: checked_debt
              - has_flag: found_burn_origin
              - has_flag: found_wheel_marks
              - has_flag: heard_thomas
              - has_flag: heard_hannah
        effects:
          - inc_var: { name: score, by: 20 }
        next: ending_referred
      - id: back_to_investigate
        text: "Return to the site — there may be more to find."
        next: warehouse_ruins

endings:
  - id: ending_approved
    title: "The Claim Paid"
    text: >
      The board accepts your recommendation and authorises payment. Varley
      collects £180 within the week and discharges his debt to Creed. Six
      months later a customs man following a different thread turns a receipt
      at a Southwark factor's house into a chain that leads all the way back
      to Thames Street — and to the Fire Office's register, where your name
      sits next to a paid claim it should not have paid.
  - id: ending_disputed
    title: "The Claim Rejected"
    text: >
      The board endorses your rejection on the strength of the burn pattern
      and the overdue bond. Varley lodges a counter-appeal and makes much of
      his cook's testimony, but the board's solicitor points to the physical
      evidence and the appeal goes nowhere. You have not caught a fraudster
      — only stopped one — but the Fire Office's £180 stays in its strongbox,
      and that, the board secretary tells you, is the office's first duty.
  - id: ending_referred
    title: "Referred to Law"
    text: >
      The board forwards your report to the city magistrate with a covering
      letter setting out the chain: the anomalous goods list, the overdue
      bond, the burn origin in the middle room that contradicts the kitchen-
      hearth account, the wheel-ruts that prove the goods were moved before
      the fire, the yard man's testimony placing Varley himself there with a
      lamp the night before, and the cook's contradicted account that
      completes the picture of a prepared story. The magistrate's men find
      the cart at a Southwark factor's yard within three days — the goods on
      the claim list, undamaged, stacked behind a locked door. Varley is
      bound over for trial. It is an ugly business — a man in extremis making
      a bad calculation — but the chain of evidence is clean, and you put
      it there.
