# MUST FAIL: DUPLICATE_ID
# Two rooms share an id.
meta: { id: bad_dup, title: "Bad Dup", start_room: a, vars_init: { hp: 10, attack: 2, defense: 1 } }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    exits: [{ direction: north, to: b }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
  - id: a
    name: "A again"
    description: "A duplicate id."
    exits: [{ direction: south, to: b }]
win_conditions: [{ id: w, conditions: [{ visited: b }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
