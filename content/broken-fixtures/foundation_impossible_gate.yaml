# MUST FAIL: IMPOSSIBLE_GATE
# A locked exit is gated on a flag no effect ever sets.
meta: { id: bad_gate, title: "Bad Gate", start_room: a, vars_init: { hp: 10, attack: 2, defense: 1 } }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    exits:
      - { direction: north, to: b }
      - direction: down
        to: c
        conditions: [{ has_flag: never_set_flag }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
  - id: c
    name: "C"
    description: "Room C."
    exits: [{ direction: up, to: a }]
win_conditions: [{ id: w, conditions: [{ visited: b }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
