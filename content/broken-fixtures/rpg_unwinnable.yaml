# NEGATIVE FIXTURE (§10.4): the RPG validator MUST reject this pack.
# The ogre cannot be beaten from full HP — it kills the hero before it falls —
# so the only path past it is impossible. Expected error code: COMBAT_UNWINNABLE.
meta:
  id: rpg_unwinnable
  title: "Unwinnable"
  start_room: cell
  vars_init: { hp: 5, attack: 1, defense: 0, might: 1 }
  flags_init: []
  max_score: 0
rooms:
  - id: cell
    name: "Cell"
    description: "A cramped cell with a hulking ogre and a barred door."
    exits:
      - direction: north
        to: freedom
        conditions: [ { has_flag: ogre_slain } ]
        locked_msg: "The ogre blocks the door."
  - id: freedom
    name: "Freedom"
    description: "Open sky."
    exits:
      - { direction: south, to: cell }
objects: []
npcs: []
enemies:
  - id: ogre
    name: "ogre"
    description: "A vast, club-handed brute."
    room: cell
    hp: 40
    attack: 10
    defense: 8
    defeat_flag: ogre_slain
    death_ending: ending_crushed
    on_defeat: []
win_conditions:
  - id: escape
    conditions: [ { visited: freedom } ]
    ending: ending_out
endings:
  - { id: ending_out, title: "Out", text: "Free.", death: false }
  - { id: ending_crushed, title: "Crushed", text: "The club falls.", death: true }
