# MUST FAIL: KEY_MISSING
# A locked container names a key object that does not exist.
meta: { id: bad_key, title: "Bad Key", start_room: a, vars_init: { hp: 10, attack: 2, defense: 1 } }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    objects: [chest]
    exits: [{ direction: north, to: b }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
objects:
  - id: chest
    name: "chest"
    description: "A locked chest."
    container: true
    openable: true
    locked: true
    key_id: ghost_key
win_conditions: [{ id: w, conditions: [{ visited: b }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
