# MUST WARN: UNREACHABLE_VARIANT — the room's second reactive variant (needs flag
# "lit" AND "warm") is shadowed by the first (needs only "lit"). Room/object variants
# are first-match-wins (model.ts roomDescription/objectDescription), so whenever the
# second's `when` holds the first's already does, and the first always wins — the
# second's text is dead content that no playthrough can surface. Fix: list the more
# specific (lit AND warm) variant before the more general (lit-only) one.
meta: { id: parser_shadow, title: "Shadowed Variant", start_room: a }
rooms:
  - id: a
    name: "A"
    description: "Room A — the start."
    variants:
      - when: [{ has_flag: lit }]
        text: "Room A, lit."
      - when: [{ has_flag: lit }, { has_flag: warm }]
        text: "Dead — the lit-only variant above always wins first."
    exits: [{ direction: north, to: b }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
win_conditions: [{ id: w, conditions: [{ visited: b }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
