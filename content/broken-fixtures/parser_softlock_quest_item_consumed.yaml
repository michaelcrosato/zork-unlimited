# MUST FAIL: a quest_critical item is CONSUMED (remove_item) at one site but is
# STILL REQUIRED in hand at another (a has_item gate that does not consume it) — it
# can be spent and then needed → SOFTLOCK_QUEST_ITEM. Distinct from
# parser_softlock_quest_item (the one-way-map drop case). This pins the consume
# branch of the check AFTER the bug_0034 "spent vs lost" refinement: a consumed
# quest item that is genuinely needed-while-held must still be rejected.
meta: { id: bad_consumed_quest_item, title: "Bad Consumed Quest Item", start_room: a }
rooms:
  - id: a
    name: "A"
    description: "Room A. A cold brazier stands here; the way north leads on."
    objects: [torch, brazier]
    exits:
      - { direction: north, to: b }
  - id: b
    name: "B"
    description: "Room B. A dark passage runs north; south returns to A."
    exits:
      - { direction: south, to: a }
      - direction: north
        to: c
        conditions: [{ has_item: torch }]
        locked_msg: "It is too dark to go north without a torch in hand."
  - id: c
    name: "C"
    description: "Room C, the goal."
    exits: [{ direction: south, to: b }]
objects:
  - id: torch
    name: "torch"
    aliases: [torch]
    description: "A pitch torch that burns steadily."
    takeable: true
    quest_critical: true
  - id: brazier
    name: "brazier"
    aliases: [brazier]
    description: "A cold iron brazier."
    interactions:
      - verb: USE
        item: torch
        target: brazier
        effects:
          - remove_item: torch
          - narrate: "You thrust the torch into the brazier and leave it there, burning."
win_conditions: [{ id: w, conditions: [{ visited: c }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
