# MUST FAIL: ITEM_REF_MISSING
# An add_item effect targets an object id that does not exist (the item inserted
# into inventory would be a phantom string with no declared object, no description,
# and no interaction entries).
meta: { id: bad_item_ref, title: "Bad Item Ref", start_room: a, vars_init: { hp: 10, attack: 2, defense: 1 } }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    objects: [chest]
    exits: [{ direction: north, to: b }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
objects:
  - id: chest
    name: chest
    description: "An old chest."
    interactions:
      - { verb: OPEN, effects: [ { add_item: phantom_key } ] }
win_conditions: [{ id: w, conditions: [{ visited: b }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
