# MUST FAIL (validator): a `held` object is carried from the start, so listing it ALSO in
# a room gives it two homes (inventory wins, the room copy is dead) → HELD_ALSO_PLACED.
meta: { id: bad_held, title: "Bad Held", start_room: a }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    objects: [lantern]
    exits: [{ direction: north, to: b }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
objects:
  - id: lantern
    name: "lantern"
    description: "A carried lantern that is wrongly also placed in room A."
    held: true
win_conditions: [{ id: w, conditions: [{ visited: b }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
