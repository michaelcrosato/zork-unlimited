# MUST FAIL: DIALOGUE_NONTERMINATING
# An NPC dialogue tree with no path to an exit traps the player in conversation
# (an undeclared, inescapable loop).
meta: { id: bad_dialogue, title: "Bad Dialogue", start_room: a, vars_init: { hp: 10, attack: 2, defense: 1 } }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    exits: [{ direction: north, to: b }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
npcs:
  - id: loop_guard
    name: "the loop guard"
    description: "He never says goodbye."
    room: a
    dialogue:
      root: greet
      nodes:
        - id: greet
          npc_text: "Round and round."
          topics: [{ id: more, prompt: "Go on", goto: more }]
        - id: more
          npc_text: "And round again."
          topics: [{ id: back, prompt: "Back", goto: greet }]
win_conditions: [{ id: w, conditions: [{ visited: b }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
