# Expect: DEADLINE_FIRES_AT_START — a `meta.deadline` whose `when` ALREADY HOLDS in
# the initial state and can never be falsified, so it fires on the player's very
# first action on every path. The engine's §8.4.5 checkWin runs post-action (not at
# game start), so the opening scene is shown once, then ANY first choice ends the
# game at `e_overstay` — no scene past the start is ever playable. This is the exact
# OPPOSITE of DEADLINE_UNFIREABLE (bug_0087): there the urgency mechanic was dead;
# here it is a hair-trigger that bricks the game.
#
# Here the deadline fires at `ticks >= 0`, `ticks` starts at 0 (so 0 >= 0 holds
# immediately) and is only ever advanced by `inc_var` with a positive `by` — a
# monotonically non-decreasing counter, so `ticks >= 0` can never become false.
# (A healthy clockwork-style deadline raises the threshold above the init value, e.g.
# `ticks >= 10`, so the opening scenes are playable before the hour turns.)
meta:
  id: hair_trigger_deadline
  title: "Hair-Trigger Deadline"
  start: s1
  flags_init: []
  vars_init: { ticks: 0 }
  deadline:
    when: [ { var_gte: { name: ticks, value: 0 } } ]
    ending: e_overstay
scenes:
  - id: s1
    title: "The Foyer"
    text: "The great clock has already struck — you are out of time before you begin."
    on_enter:
      - inc_var: { name: ticks, by: 1 }
    choices:
      - id: explore
        text: "Step deeper into the manor."
        next: s2
      - id: leave
        text: "Slip back out."
        next: e_win
  - id: s2
    title: "The Gallery"
    text: "You never reach here in play — the hour turned on your first move."
    choices:
      - id: grab
        text: "Take the prize."
        next: e_win
endings:
  - { id: e_overstay, title: "The Hour Turns", text: "Too late — it always was." }
  - { id: e_win, title: "Win", text: "You made it out." }
