# MUST FAIL: the win condition needs a room nothing reaches → WIN_UNREACHABLE.
meta: { id: bad_win, title: "Bad Win", start_room: a }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    exits: [{ direction: north, to: b }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
  - id: island
    name: "Island"
    description: "No exit leads here."
    exits: [{ direction: south, to: a }]
win_conditions: [{ id: w, conditions: [{ visited: island }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
