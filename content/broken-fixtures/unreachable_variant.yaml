# Expect: UNREACHABLE_VARIANT — a reactive variant is shadowed by an earlier, more
# general sibling. The variants are evaluated first-match-wins, so listing the
# broad `ticks >= 2` case BEFORE the specific `ticks >= 5` case means the >= 5
# variant can never be the first match (any state with ticks >= 5 already has
# ticks >= 2). Its text is dead content. The fix is to list the more specific
# (higher-threshold) variant first.
meta: { id: bad_variant, title: "Bad Variant Order", start: s1, vars_init: { ticks: 0 } }
scenes:
  - id: s1
    title: "Start"
    text: "The base text."
    variants:
      - when: [ { var_gte: { name: ticks, value: 2 } } ]
        text: "Things are stirring."
      - when: [ { var_gte: { name: ticks, value: 5 } } ]
        text: "This can never display — the >= 2 case above always wins first."
    choices: [ { id: go, text: "Leave.", next: e_win } ]
endings:
  - { id: e_win, title: "Win", text: "You made it." }
