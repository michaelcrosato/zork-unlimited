# MUST FAIL: an unlock_exit effect's `from` names a room that does not exist →
# UNLOCK_EXIT_ROOM_MISSING (the exit-flag key written is unreachable, making the unlock
# a permanent silent no-op).
meta: { id: bad_unlock_exit_room, title: "Bad Unlock Exit Room", start_room: a }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    objects: [lever]
    exits: [{ direction: north, to: b }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
objects:
  - id: lever
    name: lever
    description: "A lever."
    interactions:
      - { verb: USE, effects: [ { unlock_exit: { from: ghost_room, to: b } } ] }
win_conditions: [{ id: w, conditions: [{ visited: b }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
