# MUST FAIL: a win_condition's `visited` names a room that does not exist →
# UNRESOLVED_ROOM_REFERENCE (the room-id analogue of EXIT_TARGET_MISSING).
meta: { id: bad_room_ref, title: "Bad Room Ref", start_room: a }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    exits: [{ direction: north, to: b }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
win_conditions: [{ id: w, conditions: [{ visited: nowhere_room }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
