# MUST FAIL: a win condition resolves to a death/failure ending → WIN_IS_DEATH
# (§13 Stage 3) — an unwinnable game dressed up as a win.
meta: { id: bad_win_is_death, title: "Bad Win Is Death", start_room: a }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    exits: [{ direction: north, to: b }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
win_conditions: [{ id: w, conditions: [{ visited: b }], ending: doom }]
endings:
  - { id: doom, title: "Doom", text: "You perish.", death: true }
  - { id: e, title: "Safe", text: "You live." }
