# MUST FAIL: UNRESOLVED_ROOM_REFERENCE
# A win_condition's `visited` names a room that does not exist — the room-id
# analogue of EXIT_TARGET_MISSING. (The dangling win also cascades into
# WIN_UNREACHABLE/SOFTLOCK findings — all from the same single defect.)
meta: { id: bad_room_ref, title: "Bad Room Ref", start_room: a, vars_init: { hp: 10, attack: 2, defense: 1 } }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    exits: [{ direction: north, to: b }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
win_conditions: [{ id: w, conditions: [{ visited: nowhere_room }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
