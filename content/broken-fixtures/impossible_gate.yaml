# Expect: IMPOSSIBLE_GATE — a choice is gated on a flag nothing ever sets.
meta: { id: bad_gate, title: "Bad Gate", start: s1 }
scenes:
  - id: s1
    title: "Start"
    text: "A locked path and an open one."
    choices:
      - id: locked
        text: "Take the sealed door."
        conditions: [ { has_flag: never_set } ]
        next: e_win
      - id: open
        text: "Take the open door."
        next: e_win
endings:
  - { id: e_win, title: "Win", text: "You made it." }
