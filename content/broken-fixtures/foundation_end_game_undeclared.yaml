# MUST FAIL: END_GAME_UNDECLARED
# An end_game effect targets an ending that is not declared (§13 Stage 3 — death
# endings are reached via end_game).
meta: { id: bad_end_game, title: "Bad End Game", start_room: a, vars_init: { hp: 10, attack: 2, defense: 1 } }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    objects: [trap]
    exits: [{ direction: north, to: b }]
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
objects:
  - id: trap
    name: "rusty lever"
    aliases: [lever]
    description: "A rusty lever."
    takeable: true
    interactions:
      - verb: USE
        item: trap
        target: trap
        effects: [{ end_game: ghost_ending }]
win_conditions: [{ id: w, conditions: [{ visited: b }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
