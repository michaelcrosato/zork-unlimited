# MUST FAIL: an exit points at a room that does not exist → EXIT_TARGET_MISSING.
meta: { id: bad_exit_target, title: "Bad Exit", start_room: a }
rooms:
  - id: a
    name: "A"
    description: "Room A."
    exits:
      - { direction: north, to: b }
      - { direction: east, to: nowhere_room }
  - id: b
    name: "B"
    description: "Room B."
    exits: [{ direction: south, to: a }]
win_conditions: [{ id: w, conditions: [{ visited: b }], ending: e }]
endings: [{ id: e, title: "End", text: "Done." }]
