id: charter_marches
name: "The Charter Marches"
hub: "Charterhaven"
premise: "A single early-modern adventure world centered on Charterhaven, a court, guild, river, and road hub whose writ reaches the surrounding ports, mills, moors, barrows, and market towns."
rule: "Every shipped pack is a quest, district, road, port, or frontier site in this world. A pack that cannot be connected to Charterhaven must be rewritten until it can, or removed."
hub_districts:
  - "Guildhall and assay courts"
  - "River stairs and tide offices"
  - "Printers' Ward"
  - "Doctors' Commons and probate courts"
  - "The north road watch"
frontiers:
  - "Moor barrows"
  - "Coastal lights"
  - "Winter steads"
  - "Tidal mills"
  - "Market towns under Charterhaven writ"
